var PAGES = {"application-startup-and-lifecycle":"# Application Startup and Lifecycle\n\n## 应用启动与生命周期\n\n该模块负责把 Writer 实例从“启动参数”推进到“可接收 RPC 请求”，并在终止信号到达后完成收尾提交。它覆盖两个入口：\n\n- `main.go`：FaaS/Lambda 入口，通过 `lambda.Start(handler)` 接收事件 payload。\n- `cmd/writer_server/main.go`：本地或常驻进程入口，通过命令行 flag 启动 Writer Server。\n\n核心边界很清晰：入口层只负责参数接收、归一化和构造 `config.Config`；真正的业务实例由 `writer.New` 创建；启动、阻塞等待和停机收尾由 `lifecycle.Run` 统一编排。\n\n## 启动链路概览\n\n```mermaid\nflowchart TD\n    A[\"入口参数\"] --> B[\"Input.Normalize / flag 校验\"]\n    B --> C[\"config.FromInput\"]\n    C --> D[\"writer.New\"]\n    D --> E[\"lifecycle.Run\"]\n    E --> F[\"w.Start\"]\n    F --> G[\"等待终止信号\"]\n    G --> H[\"w.Shutdown 或 AbortWithoutFinalize\"]\n    H --> I[\"返回 Result / Output\"]\n```\n\n## FaaS 入口：`main.go`\n\nFaaS 模式的入口是：\n\n```go\nfunc main() {\n    lambda.Start(handler)\n}\n```\n\n`handler(ctx context.Context, in Input) (Output, error)` 是 Writer 实例的主要启动流程：\n\n1. 调用 `in.Normalize()` 校验并填充默认值。\n2. 通过 `toConfigInput(&in)` 将入口层 `Input` 转换为 `config.Input`。\n3. 调用 `config.FromInput(ctx, ...)` 构造运行期配置。\n4. 调用 `applyRuntimeMemoryLimit(cfg.Sort.MemoryLimitMB)` 设置 Go runtime 内存上限。\n5. 调用 `reportLocalTmpDirQuota(ctx, cfg.Sort.LocalTmpDir)` 打印本地临时目录容量。\n6. 调用 `writer.New(ctx, cfg)` 初始化 Writer。\n7. 调用 `lifecycle.Run(ctx, w)` 启动服务并阻塞到停机。\n8. 将 `lifecycle.Result` 转换为 `Output` 返回给 Lambda runtime。\n\n`Input` 表示控制面下发的动态启动参数，包含 `JobID`、`BucketIDs`、HDFS 输出路径、HDFS staging 目录、排序参数、控制面参数和 Router 参数。\n\n`Input.Normalize` 执行入口层校验：\n\n- `job_id`、`bucket_ids`、`hdfs_output_path`、`hdfs_temp_dir` 必填。\n- `hdfs_output_path` 和 `hdfs_temp_dir` 必须使用 `hdfs://` scheme。\n- `Sort.ChunkRecords` 默认 `5_000_000`。\n- `Sort.MaxConcurrentMerges` 默认 `4`。\n- `Sort.RunFileCompression` 默认 `\"snappy\"`，只允许 `\"zstd\"`、`\"snappy\"`、`\"none\"`。\n- `Sort.CPUBackPressureThresholdPercent` 默认 `85`。\n- `ControlPlane.HeartbeatIntervalSec` 默认 `30`。\n- `ControlPlane.ProgressReportIntervalSec` 默认 `60`。\n- `ControlPlane.Cluster` 默认 `\"default\"`。\n- `Router.KeyPrefix` 默认使用 `JobID`。\n- `Router.TTLSeconds` 默认 `300`。\n\n`toConfigInput` 是入口层和 `config` 包之间的隔离点。它避免 `config` 反向依赖 `main` 包，同时显式传递 `SortConfig`、`ControlPlaneConfig`、`RouterConfig` 和 `HDFSConfig`。其中 `SkipStartupCheck` 会映射到 `config.HDFSConfig.SkipStartupCheck`，仅跳过启动阶段 HDFS 目录创建和可写性预检查。\n\n## 本地 Server 入口：`cmd/writer_server/main.go`\n\n`cmd/writer_server/main.go` 提供非 Lambda 的启动方式，适合本地调试、集成测试或常驻进程部署。\n\n启动流程由 `main()` 串联：\n\n1. `parseFlags()` 读取命令行参数。\n2. `loadDotEnvIfPresent(opts.envFile)` 加载 `.env` 文件。\n3. `prepareRuntimeEnv()` 准备运行时日志目录。\n4. 校验 `job-id`、`bucket-ids`、`hdfs-output-path`、`hdfs-temp-dir`。\n5. `splitBucketIDs(opts.bucketIDs)` 将逗号分隔的 bucket 表达式转换为 `[]string`。\n6. 调用 `config.FromInput(context.Background(), config.Input{...})` 构造配置。\n7. 调用 `writer.New(context.Background(), cfg)` 初始化 Writer。\n8. 调用 `lifecycle.Run(context.Background(), w)` 启动并等待停机。\n\n本地入口支持的关键 flag 包括：\n\n- `-job-id`\n- `-bucket-ids`\n- `-hdfs-output-path`\n- `-hdfs-temp-dir`\n- `-redis-cluster`\n- `-key-prefix`\n- `-redis-ttl-seconds`\n- `-writer-id`\n- `-service-ip`\n- `-service-port`\n- `-chunk-records`\n- `-local-tmp-dir`\n- `-hdfs-name-node`\n- `-hdfs-user`\n- `-hdfs-token`\n- `-skip-hdfs-startup-check`\n\n`.env` 加载逻辑由 `loadDotEnvIfPresent` 实现：只处理 `KEY=VALUE` 形式，忽略空行和 `#` 注释；如果环境变量已存在，不会覆盖现有值。\n\n`prepareRuntimeEnv` 当前会确保两个目录存在：\n\n- `HDFS_LOG_DIR`，默认 `/tmp/native_hdfs_client`\n- `KITEX_LOG_DIR`，默认 `/tmp/uri_writer_kitex_log`\n\n目录创建由 `ensureEnvDir` 完成，使用 `os.MkdirAll(dir, 0o755)`。\n\n## 配置构造：`config.FromInput`\n\n`config.FromInput(ctx, in)` 是启动参数进入业务代码前的统一归一化点。它返回完整的 `*config.Config`，供 `writer`、`router`、`lifecycle`、`service` 和 `controlplane` 使用。\n\n主要职责：\n\n- 校验 `JobID`、`HDFSOutputPath`、`HDFSTempDir`。\n- 调用 `parseBucketIDs` 解析 bucket 表达式。\n- 调用 `normalizeHDFSPath` 校验并规范化 HDFS 路径。\n- 确保输出目录和 staging 目录使用相同 NameNode。\n- 填充 `FinalFileNameTemplate`。\n- 从 Lambda context 或默认值解析本地临时目录、内存限制和 Writer ID。\n- 自动补齐 `Service.IP` 和 `Router.KeyPrefix`。\n\n`parseBucketIDs` 支持混合输入：\n\n```go\n[]string{\"0-3\", \"8\", \"10,11\"}\n```\n\n会展开、去重并排序为：\n\n```go\n[]int32{0, 1, 2, 3, 8, 10, 11}\n```\n\n`normalizeHDFSPath` 要求路径以 `hdfs://` 开头，并解析 NameNode host 和 port。返回的 `HDFSRootPath` 和 `HDFSTempDir` 是去掉 scheme 与 host 后的规范路径，例如：\n\n```text\nhdfs://namenode:8020/user/data/output\n```\n\n会归一化为：\n\n```text\n/user/data/output\n```\n\n当 `HDFSOutputPath` 与 `HDFSTempDir` 的 NameNode host 不一致，或两者都显式指定 port 但 port 不一致时，`FromInput` 会返回错误。\n\n## 运行时资源处理\n\n`applyRuntimeMemoryLimit(memoryLimitMB int)` 将配置中的内存限制转换为 Go runtime memory limit。当前策略使用 `runtimeMemoryLimitPercent = 75`，即：\n\n```go\nruntimeLimitMB := max(memoryLimitMB*75/100, 1)\ndebug.SetMemoryLimit(int64(runtimeLimitMB) * 1024 * 1024)\n```\n\n这样可以给 native 依赖、HDFS client、RPC runtime 和系统开销保留空间，避免 Go heap 把整个实例内存吃满。\n\n`reportLocalTmpDirQuota(ctx, dir)` 会创建本地临时目录，并通过 `syscall.Statfs` 打印总容量和可用容量。如果 Lambda context 中的 `TmpfsDir` 与当前目录一致，还会额外打印 `TmpfsSizeBytes` 表示的平台 tmpfs quota。\n\n容量格式化由 `formatBytes` 完成，输出类似 `512B`、`64.0MiB`、`2.0GiB`。\n\n## 生命周期编排：`lifecycle.Run`\n\n`lifecycle.Run(ctx, w)` 是启动和停机的中心函数。它不直接处理业务写入，而是负责把 Writer 的运行阶段串起来：\n\n1. 如果 `w == nil`，直接返回空 `Result`。\n2. 调用 `w.AttachRPCServer(service.NewServer(w.Config(), w))` 绑定 RPC server。\n3. 调用 `w.Start(ctx)` 启动 Writer 子组件。\n4. 注册 `signal.Notify` 监听 `SIGTERM` 和 `SIGINT`。\n5. 阻塞等待以下任一事件：\n   - `ctx.Done()`\n   - 系统信号 `SIGTERM` / `SIGINT`\n   - `w.AutoShutdownCh()`\n   - `w.IdleAbortCh()`\n6. 如果收到 `IdleAbortCh`，调用 `w.AbortWithoutFinalize`，不执行最终提交。\n7. 否则创建 30 秒超时的 `shutdownCtx`，调用 `w.Shutdown(shutdownCtx)`。\n8. 将 committed 和 failed bucket 封装为 `lifecycle.Result` 返回。\n\n`Run` 与 `writer.Writer` 的连接点包括：\n\n- `w.Config()`\n- `w.AttachRPCServer(...)`\n- `w.Start(ctx)`\n- `w.AutoShutdownCh()`\n- `w.IdleAbortCh()`\n- `w.AbortWithoutFinalize(ctx)`\n- `w.Shutdown(ctx)`\n\n根据调用链，`w.Start` 会进一步启动控制面客户端、Router 注册和 RPC 服务；`writer.New` 会创建 Router `Registrar`，并根据配置初始化 Writer 内部状态。\n\n## 停机语义\n\n生命周期模块区分两类结束路径。\n\n正常收尾路径由 `ctx.Done()`、`SIGTERM`、`SIGINT` 或 `w.AutoShutdownCh()` 触发。此时 `Run` 会调用 `w.Shutdown`，由 Writer 完成 flush、merge、HDFS rename 提交，并返回：\n\n```go\ntype Result struct {\n    Committed []int32\n    Failed    []int32\n}\n```\n\nFaaS 入口会将其转换为：\n\n```go\ntype Output struct {\n    JobID            string\n    WriterID         string\n    CommittedBuckets []int32\n    FailedBuckets    []int32\n}\n```\n\n空闲放弃路径由 `w.IdleAbortCh()` 触发。此时 `Run` 使用 5 秒超时调用 `w.AbortWithoutFinalize`，不会执行最终 finalize，也不会返回 committed / failed bucket。这适用于 Writer 在真正接收数据前被判定为空闲退出的场景。\n\n## 与代码库其他模块的关系\n\n`config` 是启动参数和运行期配置的边界。入口层只构造 `config.Input`，其余模块都消费 `config.Config`，避免直接依赖 Lambda payload 或命令行参数。\n\n`writer` 是业务主体。启动模块只通过 `writer.New` 创建实例，通过 `lifecycle.Run` 间接调用 `Start`、`Shutdown` 和 abort 逻辑。\n\n`service` 提供 RPC server。`lifecycle.Run` 使用 `service.NewServer(w.Config(), w)` 创建 server，并通过 `w.AttachRPCServer` 挂载到 Writer。\n\n`router` 在 `writer.New` 内部初始化。调用链中 `handler -> writer.New -> router.New -> Registrar` 和 `cmd/writer_server.main -> writer.New -> router.New -> Registrar` 表明两种入口共享同一套 Router 注册机制。\n\n`controlplane` 在 `w.Start` 阶段参与运行。调用链显示 `Run -> Start -> controlplane.New -> normalizeConfig`，说明控制面客户端不是入口层直接创建的，而是 Writer 启动子组件的一部分。\n\n## 测试关注点\n\n现有测试覆盖了启动参数和配置构造的关键约束：\n\n- `TestInputNormalize_RequiresHDFSScheme` 验证 FaaS 输入要求 HDFS scheme。\n- `TestInputNormalize_AcceptsHDFSPath` 验证合法 HDFS 路径可通过校验。\n- `TestInputNormalize_RequiresHDFSTempDir` 验证 staging 目录必填。\n- `TestToConfigInput_PropagatesHDFSSkipStartupCheck` 验证 `SkipStartupCheck` 能传递到 `config.HDFSConfig`。\n- `TestFromInput_DefaultLocalTmpDirFromLambdaContext` 验证优先使用 Lambda `TempDir`。\n- `TestFromInput_FallbackLocalTmpDirToTmpfsDir` 验证 `TempDir` 为空时回退到 `TmpfsDir`。\n- `TestFromInput_KeepExplicitLocalTmpDir` 验证显式 `LocalTmpDir` 不会被覆盖。\n- `TestFromInput_HDFSPathEnablesHDFSAndParsesNameNode` 验证 HDFS 路径解析、NameNode 和 port 填充。\n- `TestFromInput_RequiresSameHDFSNamespaceForTempDir` 验证输出目录和 staging 目录必须位于同一 HDFS namespace。\n\n修改启动参数、默认值、HDFS 路径规则或生命周期结束条件时，应优先补充这些层面的测试，因为它们决定 Writer 是否能在控制面、Router、HDFS 和 RPC 服务之间以一致配置启动。","bucket-state-and-spill-management":"# Bucket State and Spill Management\n\n## 模块职责\n\n`writer/bucket_ctx.go` 负责单个 bucket 在 Writer 内部的状态机、内存缓冲、run 文件 spill、最终归并和进度快照。每个 `WriterCtx` 对应一个 `BucketID`，由 `New` 在 `writer/writer.go` 中创建并放入 `Writer.bucketCtx`。\n\n这个模块的核心目标是：\n\n- 接收 `AppendBatch` 提交的 `ObjectRecord` 批次。\n- 将记录先写入内存 `chunkSlot`，达到阈值后异步排序并 spill 成本地 run 文件。\n- 在 `FinalizeMerge` / `RequestFinalize` 阶段停止新写入，等待所有 spill 完成。\n- 对多个有序 run 文件执行 k-way merge，按 `StoreURI` 精确去重后写入 `FinalOutputSink`。\n- 维护 bucket 生命周期状态、计数器和本地磁盘使用量，供 `Snapshot` 上报。\n\n## 生命周期状态\n\n`BucketStatus` 是 Writer 对控制面暴露的 bucket 生命周期状态：\n\n- `BucketStatusRunning`：仍在接收 Reader 写入，并可能周期性生成 run 文件。\n- `BucketStatusMerging`：Reader 已结束，正在等待或执行最终归并准备。\n- `BucketStatusWritingHDFS`：归并结果正在通过 `FinalOutputWriter.WriteRow` 写入最终输出。\n- `BucketStatusDone`：最终输出提交完成，本地临时目录已清理。\n- `BucketStatusFailed`：bucket 进入失败终态，后续写入和 finalize 会返回错误。\n\n状态变更通过 `notifyStatusChange` 调用可选回调 `onStatusChange(bucketID, status)`，最终进度由 `Snapshot` 提供给 `collectBucketProgressForID`、`triggerAutoShutdown` 等调用方。\n\n```mermaid\nstateDiagram-v2\n    [*] --> 运行中\n    运行中 --> 归并中: FinalizeMerge / RequestFinalize\n    归并中 --> 写最终文件: runFinalizeAttempt\n    写最终文件 --> 已完成: mergeRunsToFinalFile 成功\n    运行中 --> 已失败: spill 失败\n    归并中 --> 已失败: finalize 重试耗尽\n    写最终文件 --> 已失败: 写入或关闭失败\n```\n\n## 并发模型\n\n`WriterCtx` 不直接在 RPC goroutine 中修改复杂状态。外部入口会先构造 `bucketOp`，再通过 `submitOp` 投递到 `opCh`：\n\n- `AppendBatch` 投递 `bucketOpAppend`。\n- `SpillRun` 投递 `bucketOpFlush`。\n- `FinalizeMerge` 投递 `bucketOpFinalize`。\n- `RequestFinalize` 异步投递 `bucketOpFinalize`，不等待归并完成。\n\n`initWorker` 懒启动 `runLoop`。`runLoop` 串行处理 `opCh` 中的 bucket 操作，同时接收 `spillResults`。这种设计让 append、flush、finalize 的主流程按 bucket 串行化；真正耗时的本地 run 文件写入由 `runSpill` 在独立 goroutine 中执行，完成后再把 `spillResult` 发回 `spillResults`。\n\n`mu` 仍然存在，用于保护状态字段、统计计数和进度快照。开发时要注意：`handleAppend`、`handleFinalize`、`handleSpillResult` 等内部方法通常会在持锁状态下读取或更新 `WriterCtx` 字段；不要在持锁期间做长时间 I/O，现有代码把 run 文件写入放在 `runSpill` 中完成。\n\n## 内存缓冲与 arena\n\n内存缓冲由 `chunkSlot` 表示：\n\n```go\ntype chunkSlot struct {\n    records []ObjectRecord\n    arena   []byte\n}\n```\n\n`records` 保存当前 chunk 内的 `ObjectRecord`，`arena` 是 `ObjectRecord.StoreURI` 的共享 backing storage。追加时，`handleAppend` 调用 `cloneObjectRecordIntoArena`，后者通过 `appendArenaBytes` 把 URI 字节复制到 arena 中，避免直接引用 RPC 入参的底层内存。\n\n`newChunkSlot(recordCap)` 会做两类预分配：\n\n- `records` 容量至少为 `16`。\n- `arena` 容量由 `initialArenaCapacity` 计算，按 `recordCap * initialArenaBytesPerRecord` 估算，并限制在 `minChunkArenaCapBytes` 到 `defaultChunkArenaCapBytes` 之间。\n\nspill 完成后的 slot 会经过 `sanitizeReusableChunkSlot` 清理后进入 `spareSlots`。它会：\n\n- 用 `clearObjectRecordSlice` 清空旧 `ObjectRecord`，避免保活旧引用。\n- 将 arena 长度归零。\n- 如果 arena 容量超过 `maxReusableChunkArenaCapBytes`，重新分配到上限容量，避免长期持有过大的 backing array。\n\n`spareChunkPoolSize` 当前为 `2`，意味着每个 bucket 最多缓存少量可复用 chunk，降低高频 spill 的分配成本，同时控制常驻内存。\n\n## Append 与反压\n\n`AppendBatch(objects)` 的实际逻辑在 `handleAppend` 中：\n\n1. 调用 `ensureWritableLocked`，拒绝 `FAILED`、非 `RUNNING` 或已经 `finalizeRequested` 的 bucket。\n2. 根据 `effectiveSpillTriggerRecordsLocked` 得到 spill 阈值。\n3. 如果本次追加会触发 spill，但当前没有 spare slot 且不能扩容 buffer pool，则返回 `ErrBackPressure`。\n4. 将每个 `ObjectRecord` 克隆进当前 `chunk.arena`，并追加到 `chunk.records`。\n5. 更新 `totalUrisReceived` 和 `bytesReceived`。\n6. 当 `len(chunk.records) >= spillTriggerRecords` 时，调用 `queueActiveChunkLocked` 封存当前 chunk 并启动 spill。\n\n`queueActiveChunkLocked` 会优先从 `spareSlots` 取复用 slot；没有 spare 时，如果 `shouldGrowBufferPoolLocked` 允许，则创建新的 `chunkSlot`；否则返回 `ErrBackPressure`。封存的旧 chunk 被加入 `spillQueue`，然后由 `startNextSpillLocked` 尝试启动下一个 spill。\n\n## Spill 队列与 run 文件\n\n每个 bucket 同一时间只允许一个 `spillInFlight`。`startNextSpillLocked` 从 `spillQueue` 取出一个 `chunkSlot`，分配递增的 `runID`，然后启动 `runSpill(slot, runID)`。\n\n`runSpill` 会调用可选的 `acquireSpillSlot` / `releaseSpillSlot`，这些钩子由上层 Writer 用来限制全局并发 spill 数。真正写文件的逻辑在 `writeRunFile`：\n\n- 对 `slot.records` 使用 `sort.Sort(byStoreURI(records))` 按 `StoreURI` 字典序排序。\n- 创建 `${LocalTmpDir}/run_%04d{ext}`。\n- 根据 `cfg.Sort.RunFileCompression` 选择 `.zst`、`.snappy` 或 `.run`。\n- 逐条调用 `writeRunObjectRecord` 写入二进制记录。\n- 清空 `slot.records` 和 `slot.arena`，把 slot 作为可复用对象返回。\n\nrun 文件格式由 `writeRunObjectRecord` / `readRunObjectRecord` 成对维护，字段顺序是：\n\n1. `StoreURI`：`writeRunBytes`\n2. `Size`：little-endian `int64`\n3. `StorageClass`：`writeRunString`\n4. `ContentType`：`writeRunString`\n5. `Vid`：`writeRunString`\n6. `Oid`：`writeRunString`\n7. `CreateTimestamp`：little-endian `int64`\n\n`writeRunBytes` 使用 little-endian `uint32` 长度前缀加原始字节。新增字段或调整顺序时，必须同步修改读写两端，并考虑旧 run 文件兼容性。\n\n## Spill 结果处理\n\n`handleSpillResult` 是 spill goroutine 回到 bucket 状态机的入口：\n\n- 失败时设置 `status = BucketStatusFailed`、`lastErr = result.err`，并通知状态变更。\n- 成功时把 `runPath` 追加到 `runs`。\n- 调用 `recordLocalDiskUsageLocked` 统计 run 文件大小，并更新 `peakLocalDiskUsageMb`。\n- 调用 `putSpareSlotLocked` 回收可复用 buffer。\n- 如果当前处于 `BucketStatusMerging`，根据 `finalizeSpillTotal` / `finalizeSpillDone` 更新 `mergeProgress`。\n- 继续调用 `startNextSpillLocked` 处理队列中的下一个 spill。\n\n测试 `TestWriterCtxPeakLocalDiskUsageAccumulatesAcrossRuns` 覆盖了跨多个 run 文件累计本地磁盘峰值的行为；`TestQueueActiveChunkLockedPrefersPrewarmedSpare` 覆盖了优先复用预热 spare slot 的路径。\n\n## Finalize 与最终归并\n\n`FinalizeMerge` 同步等待最终归并完成，`RequestFinalize` 只异步发起 finalize。两者都会保证一旦接受 finalize 请求，新的 `AppendBatch` 会因为 `finalizeRequested` 被拒绝。\n\n`handleFinalize` 的主要流程是：\n\n1. 检查当前状态，已完成直接返回，失败则返回 `lastErr`。\n2. 设置 `finalizeRequested = true`，清零 `mergeProgress` 和 `hdfsWriteProgress`。\n3. 调用 `queueActiveChunkForFinalizeLocked` 把残留 chunk 封存为最后一个 spill；finalize 后不再为 `c.chunk` 预留新 buffer。\n4. 计算 `finalizeSpillTotal`，调用 `waitForSpills` 等待所有 spill 完成。\n5. 通过 `snapshotRuns` 固定本次要归并的 run 文件列表。\n6. 最多执行 `finalizeMaxAttempts` 次 `runFinalizeAttempt`。\n7. 成功后设置 `BucketStatusDone`、最终路径、最终大小、去重统计和进度。\n8. 调用 `os.RemoveAll(c.LocalTmpDir)` 清理本地 run 文件目录。\n\n`runFinalizeAttempt` 会调用可选的 `acquireFinalizeSlot` / `releaseFinalizeSlot`，用于限制全局并发 merge。测试 `TestWriterFinalizeRespectsMaxConcurrentMerges` 验证了 `cfg.Sort.MaxConcurrentMerges` 为 `1` 时两个 bucket 不会同时进入最终输出写入。\n\n## k-way merge 与去重\n\n最终输出由 `mergeRunsToFinalFile` 和 `mergeRunsIntoWriter` 完成。`mergeRunsToFinalFile` 先通过 `finalSink.Open(c.BucketID, c.cfg)` 获取 `FinalOutputWriter`；如果后续归并失败，会调用 `writer.Abort()`。\n\n`mergeRunsIntoWriter` 对每个 run 文件调用 `openRunStream`：\n\n- `newRunFileReader` 根据扩展名选择 zstd、snappy 或原始 reader。\n- `runStream.next` 每次读取一条 `ObjectRecord` 到 `stream.current`。\n- `runStreamHeap` 按 `current.StoreURI` 建小顶堆。\n\n归并循环每次弹出 URI 最小的 stream。因为每个 run 文件内部已排序，堆顶序列整体有序；代码只需要比较当前记录与 `lastWritten`：\n\n- 如果 `bytes.Equal(lastWritten, stream.current.StoreURI)`，计入 `duplicateCount`。\n- 否则调用 `writer.WriteRow(stream.current)`，更新 `lastWritten` 和 `uniqueCount`。\n\n`hdfsWriteProgress` 按 `TotalURIsReceived()` 分 20 个步进更新；总量为 0 时直接设为 1。全部记录处理完成后，调用 `writer.Close()` 返回 `finalPath` 和 `finalSize`。\n\n## 与其他模块的连接\n\n`WriterCtx` 与外部模块的主要边界如下：\n\n- `writer/writer.go`：负责创建每个 bucket 的 `WriterCtx`，初始化 `cfg`、`finalSink`、并发控制钩子、spill 阈值等。\n- `writer/handlers.go`：定义 `ObjectRecord`，并提供 `cloneObjectRecordIntoArena`；`handleAppend` 依赖它复制输入记录。\n- `writer/final_sink.go`：定义 `FinalOutputSink` 和 `FinalOutputWriter`；最终归并通过 `Open`、`WriteRow`、`Close`、`Abort` 写入 Parquet 或测试 sink。\n- `config/config.go`：提供 `config.Config`、`SortConfig` 等配置；本模块使用 `Sort.ChunkRecords`、`Sort.RunFileCompression`、`Sort.LocalTmpDir`、`Sort.MaxConcurrentMerges` 等字段。\n- 控制面上报路径：外部通过 `Snapshot` 读取 bucket 状态、接收量、run 文件数、本地磁盘峰值、merge/HDFS 写入进度、最终路径和最终大小。\n\n## 维护注意事项\n\n修改本模块时，优先保持以下不变量：\n\n- `AppendBatch` 只能在 `BucketStatusRunning` 且未 `finalizeRequested` 时写入。\n- `chunkSlot` 被加入 `spillQueue` 后不能再被 append 路径修改。\n- 每个 bucket 同一时间只有一个 `spillInFlight`，全局并发由 `acquireSpillSlot` 控制。\n- run 文件必须按 `StoreURI` 排序，否则 `mergeRunsIntoWriter` 的相邻去重会失效。\n- run 文件读写格式必须严格对称。\n- 进入 `BucketStatusFailed` 后应保留 `lastErr`，让后续调用返回原始失败原因。\n- `Snapshot` 只读取状态，不应触发 I/O 或改变 bucket 行为。\n- finalize 成功后才清理 `LocalTmpDir`；失败时保留 run 文件，便于后续接管或排查。","control-plane-and-routing":"# Control Plane and Routing\n\n## 模块概览\n\n`controlplane` 和 `router` 共同负责 Writer 实例在集群中的“可见性”：\n\n- `controlplane.Client` 向控制面上报 Writer 存活状态、处理进度和异常告警。\n- `router.Registrar` 将 bucket 到 Writer endpoint 的映射注册到 Redis Router，供 Reader 发现写入目标。\n\n这两个包都不直接处理 URI 写入或文件生成逻辑，而是服务于 Writer 的生命周期管理、任务调度和路由发现。它们主要由 `writer.Writer` 在启动、运行和关闭阶段调用。\n\n## 架构关系\n\n```mermaid\nflowchart TD\n    W[\"writer.Writer\"] --> CP[\"controlplane.Client\"]\n    W --> R[\"router.Registrar\"]\n\n    CP --> HB[\"/api/v1/heartbeat\"]\n    CP --> PG[\"/api/v1/report_progress\"]\n    CP --> AL[\"/api/v1/alert\"]\n\n    R --> Redis[\"Redis Router\"]\n    Reader[\"Reader\"] --> Redis\n    Reader --> W\n```\n\n核心路径：\n\n- Writer 启动时创建 `controlplane.Client` 和 `router.Registrar`。\n- Writer 运行期间：\n  - `Client.StartHeartbeat` 定期发送心跳。\n  - `Client.StartProgressReport` 定期收集并上报 bucket 进度。\n  - `Registrar.Register` 将 bucket 路由写入 Redis 并续期。\n- Writer 关闭时：\n  - `Registrar.Deregister` 删除路由，阻止 Reader 继续写入该实例。\n  - `Client.FlushFinalProgress` 同步上报最终进度。\n  - `Client.Stop` 停止心跳和进度上报协程。\n\n## 控制面客户端：`controlplane.Client`\n\n`controlplane.Client` 封装 Writer 与控制面的 HTTP 交互。它持有：\n\n- `cfg *Config`：控制面 endpoint、PSM、cluster 和上报间隔。\n- `writerID string`：当前 Writer 实例标识。\n- `endpoint string`、`ip string`、`port int`：Writer 自身监听地址，用于心跳 payload。\n- `buckets []int32`：当前 Writer 负责的 bucket 列表。\n- `cli *byted.Client`：Hertz HTTP 客户端。\n- `heartbeatCancel`、`progressCancel`、`wg`：后台上报协程的生命周期控制。\n- `jobIDFn JobIDProvider`：可选的 job id 注入函数，避免 `controlplane` 反向依赖配置包。\n\n### 构造与配置归一化\n\n`New(cfg *Config, writerID, endpoint string, buckets []int32)` 创建客户端，但不会启动任何后台协程。\n\n构造过程包括：\n\n1. 调用 `normalizeConfig` 填充默认配置：\n   - `PSM` 默认为 `bytedance.videoarch.uri_task_control_panel`\n   - `Cluster` 默认为 `default`\n2. 创建 Hertz `byted.Client`，设置：\n   - dial timeout：`1s`\n   - read timeout：`defaultRequestTimeout`，即 `3s`\n3. 调用 `splitHostPort(endpoint)` 拆分 Writer 自身监听地址。\n\n`endpoint` 期望形如：\n\n```go\n\"10.1.2.3:8080\"\n```\n\n如果端口不是纯数字，`splitHostPort` 会返回 host 和 `0` 端口。\n\n### 控制面寻址\n\n请求 URL 由 `requestURL(path string)` 生成：\n\n- 如果 `cfg.Endpoint` 非空，走直连：\n\n```go\nstrings.TrimRight(c.cfg.Endpoint, \"/\") + path\n```\n\n- 如果 `cfg.Endpoint` 为空，使用 PSM：\n\n```go\n\"http://\" + strings.TrimSpace(c.cfg.PSM) + path\n```\n\n在 PSM 模式下，`doJSON` 会额外设置 Hertz discovery 选项：\n\n```go\ndiscovery.WithSD(true)\ndiscovery.WithDestinationCluster(c.cfg.Cluster)\nhconfig.WithRequestTimeout(defaultRequestTimeout)\n```\n\n因此本地调试或特定环境直连时配置 `Endpoint`；线上服务发现路径通常配置 `PSM` 和 `Cluster`。\n\n## 心跳上报\n\n入口函数是 `StartHeartbeat(ctx context.Context)`。\n\n执行流：\n\n```mermaid\nflowchart TD\n    A[\"StartHeartbeat\"] --> B[\"runHeartbeat\"]\n    B --> C[\"sendHeartbeat\"]\n    C --> D[\"doJSON\"]\n    D --> E[\"requestURL\"]\n```\n\n`StartHeartbeat` 的行为：\n\n- 如果 `Client` 或 `cfg` 为 `nil`，直接返回 `nil`。\n- 上报间隔来自 `cfg.HeartbeatIntervalSec`。\n- 如果间隔小于等于 0，默认使用 `30s`。\n- 使用 `context.WithCancel(ctx)` 创建独立心跳上下文。\n- 如果心跳协程已经启动，重复调用不会启动第二个协程。\n\n`runHeartbeat` 会立即发送一次心跳，然后按 ticker 周期继续发送。\n\n心跳 payload 由 `sendHeartbeat` 构造：\n\n```go\nHeartbeatPayload{\n    JobID:     c.jobIDFnSafe(),\n    Kind:      \"writer\",\n    WriterID:  c.writerID,\n    IP:        c.ip,\n    Port:      c.port,\n    Buckets:   c.buckets,\n    Timestamp: time.Now().UTC(),\n}\n```\n\n请求路径固定为：\n\n```go\n/api/v1/heartbeat\n```\n\n## 进度上报\n\n入口函数是 `StartProgressReport(ctx context.Context, collect ProgressCollector)`。\n\n`ProgressCollector` 是一个函数类型：\n\n```go\ntype ProgressCollector func() ProgressSnapshot\n```\n\nWriter 通过这个函数把自身状态暴露给 `controlplane`，避免控制面客户端直接依赖 Writer 内部结构。\n\n执行流：\n\n```mermaid\nflowchart TD\n    A[\"StartProgressReport\"] --> B[\"runProgress\"]\n    B --> C[\"sendProgress\"]\n    C --> D[\"collect\"]\n    C --> E[\"doJSON\"]\n    E --> F[\"requestURL\"]\n```\n\n`StartProgressReport` 的行为：\n\n- 如果 `Client`、`cfg` 或 `collect` 为 `nil`，直接返回 `nil`。\n- 上报间隔来自 `cfg.ProgressReportIntervalSec`。\n- 如果间隔小于等于 0，默认使用 `60s`。\n- 重复调用不会启动多个进度协程。\n\n`sendProgress` 每次调用 `collect()` 获取 `ProgressSnapshot`：\n\n```go\ntype ProgressSnapshot struct {\n    WorkerStatus string\n    ErrorMessage string\n    Buckets      []BucketProgress\n    LastUpdate   time.Time\n}\n```\n\n如果 `snapshot.Buckets` 为空且 `snapshot.WorkerStatus` 为空，本次上报会被跳过。\n\n上报 payload 为 `ProgressPayload`：\n\n```go\nProgressPayload{\n    JobID:          c.jobIDFnSafe(),\n    Kind:           \"writer\",\n    WriterID:       c.writerID,\n    WorkerStatus:   snapshot.WorkerStatus,\n    ErrorMessage:   snapshot.ErrorMessage,\n    Buckets:        snapshot.Buckets,\n    LastUpdateTime: lastUpdate,\n}\n```\n\n请求路径固定为：\n\n```go\n/api/v1/report_progress\n```\n\n`BucketProgress` 描述单个 bucket 的状态，包含：\n\n- `BucketID`\n- `Status`\n- `TotalUrisReceived`\n- `BytesReceived`\n- `RunFilesGenerated`\n- `PeakLocalDiskUsageMb`\n- `MergeProgress`\n- `HDFSWriteProgress`\n- `FinalParquetPath`\n- `FinalByteSize`\n- `LastUpdateTime`\n\n`WorkerStatus` 常用值由常量定义：\n\n```go\nWorkerStateRunning = \"RUNNING\"\nWorkerStateDone    = \"DONE\"\nWorkerStateFailed  = \"FAILED\"\n```\n\n## 最终进度刷新\n\n`FlushFinalProgress(ctx context.Context, snapshot ProgressSnapshot)` 是同步上报接口，通常在 Writer shutdown 阶段调用。\n\n它不会依赖后台 ticker，而是立即构造 `ProgressPayload` 并 POST 到 `/api/v1/report_progress`。\n\n该方法适合在以下时机调用：\n\n- k-way merge 已完成。\n- bucket 状态已更新为最终状态。\n- Writer 总体状态已变为 `DONE` 或 `FAILED`。\n- 需要控制面基于最终状态推进 Job 状态机。\n\n如果 `snapshot.LastUpdate` 是零值，会使用当前 UTC 时间。\n\n## 告警上报\n\n`SendAlert(ctx context.Context, payload AlertPayload)` 同步发送一次告警。\n\n如果调用方未填充字段，方法会自动补齐：\n\n- `WriterID` 为空时使用 `c.writerID`\n- `JobID` 为空时使用 `jobIDFnSafe()`\n- `Timestamp` 为零值时使用当前 UTC 时间\n\n告警类型由 `AlertKind` 定义：\n\n```go\nAlertKindLocalDiskFull   = \"LOCAL_DISK_FULL\"\nAlertKindOOMRisk         = \"OOM_RISK\"\nAlertKindHDFSUnreachable = \"HDFS_UNREACHABLE\"\nAlertKindPanic           = \"PANIC\"\n```\n\n请求路径固定为：\n\n```go\n/api/v1/alert\n```\n\n## HTTP 请求行为：`doJSON`\n\n`doJSON(ctx, method, path, payload, out)` 是控制面客户端的统一请求入口。\n\n它执行以下步骤：\n\n1. 使用 `json.Marshal` 序列化 payload。\n2. 使用 `protocol.NewRequest` 构造 Hertz 请求。\n3. 设置请求头：\n\n```go\nContent-Type: application/json\n```\n\n4. 在 PSM 模式下启用服务发现和请求超时。\n5. 调用 `c.cli.Do(ctx, req, resp)`。\n6. 要求 HTTP status 为 `200 OK`。\n7. 如果 `out != nil`，解析控制面 envelope：\n\n```go\ntype envelope struct {\n    Code    int             `json:\"code\"`\n    Message string          `json:\"message\"`\n    Data    json.RawMessage `json:\"data\"`\n}\n```\n\n需要注意当前调用模式：`sendHeartbeat`、`sendProgress`、`FlushFinalProgress` 和 `SendAlert` 都传入 `out == nil`，因此当前代码只校验 HTTP 200，不会解析 `envelope.code`。如果未来添加需要响应数据的接口并传入 `out`，`doJSON` 会校验 `env.Code == 0` 并把 `env.Data` 反序列化到 `out`。\n\n## Job ID 注入\n\n`controlplane` 不直接依赖外部 config 包，而是通过 `JobIDProvider` 注入 job id：\n\n```go\ntype JobIDProvider func() string\n```\n\n外部调用：\n\n```go\nclient.SetJobID(func() string {\n    return jobID\n})\n```\n\n所有上报都会通过 `jobIDFnSafe()` 获取 job id。未设置时返回空字符串，对应 JSON 字段带 `omitempty`，不会出现在 payload 中。\n\n## 后台协程停止\n\n`Client.Stop(ctx context.Context)` 会停止心跳和进度上报协程：\n\n1. 在锁内调用 `heartbeatCancel` 和 `progressCancel`。\n2. 将 cancel 函数字段置空。\n3. 等待 `wg.Wait()`。\n4. 如果传入的 `ctx` 提前结束，则停止等待并返回 `nil`。\n\n`Stop` 不会关闭底层 Hertz client，也不会发送最终进度。最终状态上报需要调用方在合适阶段显式调用 `FlushFinalProgress`。\n\n## Redis 路由注册：`router.Registrar`\n\n`router.Registrar` 负责把 Writer 负责的 bucket 注册到 Redis Router。\n\n它持有：\n\n- `cfg *config.RouterConfig`：Redis cluster、key prefix、TTL 等配置。\n- `endpoint string`：Writer 当前监听地址，形如 `ip:port`。\n- `buckets []int32`：当前 Writer 负责的 bucket 列表。\n- `client *goredis.Client`：Redis 客户端。\n- `refreshCancel context.CancelFunc`：后台续期协程取消函数。\n\n构造函数：\n\n```go\nfunc New(cfg *config.RouterConfig, endpoint string, buckets []int32) *Registrar\n```\n\n构造时不会连接 Redis，也不会写入任何 key。\n\n如果服务启动后才知道真实监听地址，可以调用：\n\n```go\nfunc (r *Registrar) SetEndpoint(endpoint string)\n```\n\n## 注册流程\n\n`Register(ctx context.Context)` 执行 Redis 路由注册。\n\n主要步骤：\n\n1. 基础参数检查：\n   - `r == nil`\n   - `r.cfg == nil`\n   - `r.cfg.Cluster == \"\"`\n   - `r.endpoint == \"\"`\n\n   任一条件成立时直接返回 `nil`，表示跳过注册。\n\n2. 调用 `ensureClient()` 初始化 Redis client。\n\n3. 调用 `registerBuckets(ctx)` 写入所有 bucket key。\n\n4. 启动后台 refresh 协程，定期重新执行 `registerBuckets`，刷新 TTL。\n\n续期间隔计算方式：\n\n```go\ninterval := time.Duration(r.cfg.TTLSeconds) * time.Second / 5\nif interval <= 0 {\n    interval = time.Minute\n}\n```\n\n例如 TTL 为 300 秒时，续期间隔为 60 秒。\n\n后台协程会在以下情况退出：\n\n- `refreshCtx.Done()`：由 `Deregister` 取消。\n- `ctx.Done()`：注册时传入的上下文结束。\n\n## Redis key 与 value\n\n`registerBuckets` 对每个 bucket 执行：\n\n```go\npipe.Set(r.bucketKey(bucketID), endpoint, ttl)\n```\n\nTTL 来自 `r.cfg.TTLSeconds`，小于等于 0 时默认使用 `5 * time.Minute`。\n\nkey 由 `bucketKey(bucketID int32)` 生成：\n\n- `KeyPrefix` 为空时：\n\n```text\nbucket:00007\n```\n\n- `KeyPrefix` 非空时：\n\n```text\n{prefix}:bucket:00007\n```\n\n其中 bucket id 使用 `%05d` 补齐到 5 位。\n\nvalue 是 Writer endpoint，例如：\n\n```text\n127.0.0.1:9000\n```\n\n这个 key 约定是 Reader 发现 Writer 路由的基础：Reader 根据 bucket id 查询 Redis，拿到 endpoint 后把 `WriteBatch` 请求发往对应 Writer。\n\n## Redis 客户端初始化\n\n`ensureClient()` 负责懒初始化 Redis client。\n\n流程：\n\n1. 如果 `r.client` 已存在，直接返回。\n2. 调用 `splitRedisAddrs(r.cfg.Cluster)` 拆分 cluster 字符串。\n3. 构造 `goredis.Option`，设置超时：\n   - `DialTimeout = 1s`\n   - `ReadTimeout = 1s`\n   - `WriteTimeout = 1s`\n   - `PoolTimeout = 1s`\n4. 调用 `ForceDisableMesh()`。\n5. 调用 `newGoRedisClient(r.cfg.Cluster, addrs, opt)`。\n\n`splitRedisAddrs` 使用逗号分隔并 trim 空白：\n\n```go\n\"host1:6379, host2:6379\"\n```\n\n会变成：\n\n```go\n[]string{\"host1:6379\", \"host2:6379\"}\n```\n\n`newGoRedisClient` 根据地址格式选择连接方式：\n\n- 如果 `isDirectRedisAddrs(addrs)` 为 true，即所有地址都包含 `:`，认为是直连地址。\n- 直连模式会设置：\n  - `DisableGDPRVerify = true`\n  - `DisableAutoLoadConf()`\n  - `SetServiceDiscoveryWithoutConsul()`\n  - 然后调用 `goredis.NewClientWithServers`\n- 否则调用 `goredis.NewClientWithOption`，走普通 cluster/service discovery 路径。\n\n## 取消注册\n\n`Deregister(ctx context.Context)` 用于 Writer shutdown 早期。\n\n它会：\n\n1. 取出并清空 `refreshCancel`。\n2. 调用 cancel 停止后台续期协程。\n3. 如果 Redis client 或配置不可用，直接返回。\n4. 对所有 bucket key 执行 `DEL`。\n5. 返回 pipeline `Exec()` 的错误。\n\n调用时机很重要：它应该发生在 Writer 拒绝新请求之后、资源释放之前。这样 Reader 能尽快感知该 Writer 不再负责对应 bucket，避免继续把写入流量打到正在关闭的实例。\n\n## 与 Writer 生命周期的连接\n\n从调用图看，本模块主要接入点在 `writer/writer.go` 和服务入口：\n\n- `writer.New` 创建 `router.Registrar`。\n- `writer.Start` 创建并启动 `controlplane.Client`。\n- `writer.collectProgressSnapshot` 返回 `controlplane.ProgressSnapshot`。\n- `writer.collectBucketProgress` 返回 `controlplane.BucketProgress`。\n- `writer.SendAlert` 构造 `controlplane.AlertPayload` 并调用 `Client.SendAlert`。\n- `lifecycle.Run` 通过 `writer.Start` 进入控制面初始化路径。\n- `main.go` 和 `cmd/writer_server/main.go` 通过 `writer.New` 间接创建 `Registrar`。\n\n典型生命周期：\n\n```mermaid\nsequenceDiagram\n    participant S as 服务入口\n    participant W as writer.Writer\n    participant R as router.Registrar\n    participant C as controlplane.Client\n    participant Redis as Redis Router\n    participant CP as 控制面\n\n    S->>W: New\n    W->>R: New\n    S->>W: Start\n    W->>R: Register\n    R->>Redis: SET bucket key\n    W->>C: StartHeartbeat\n    C->>CP: POST heartbeat\n    W->>C: StartProgressReport\n    C->>CP: POST report_progress\n    W->>R: Deregister\n    R->>Redis: DEL bucket key\n    W->>C: FlushFinalProgress\n    C->>CP: POST report_progress\n    W->>C: Stop\n```\n\n## 测试覆盖\n\n`router/registrar_test.go` 包含 `TestRegistrar_RegisterAndDeregister`，用于验证 Redis 注册行为。\n\n测试逻辑：\n\n1. 使用固定 Redis cluster：\n\n```go\ntoutiao.redis.videoarch_storage_test\n```\n\n2. 创建 `verifyClient` 直接访问 Redis。\n3. 构造 `Registrar`，使用动态 `KeyPrefix`。\n4. 调用 `Register(context.Background())`。\n5. 读取 Redis key，验证 value 等于 `127.0.0.1:9000`。\n6. 验证 TTL 大于 0。\n\n该测试依赖真实 Redis 环境；连接或 `Ping` 失败时会 `Skip`。\n\n贡献时需要注意：生产代码的 key 格式由 `bucketKey` 决定，带非空 prefix 时是 `{prefix}:bucket:%05d`。测试中手动拼接 key 时应与 `bucketKey` 保持一致，否则会出现测试期望和实际写入 key 不匹配的问题。\n\n## 贡献注意事项\n\n修改 `controlplane.Client` 时，重点确认以下行为是否仍然成立：\n\n- 后台协程重复启动是幂等的。\n- `Stop` 能取消心跳和进度上报，并等待协程退出。\n- `FlushFinalProgress` 不依赖后台 ticker，必须能同步完成最终上报。\n- PSM 模式和 `Endpoint` 直连模式都能生成正确 URL。\n- 新增控制面接口如果需要读取响应，应传入 `out`，并遵循 envelope 解析语义。\n\n修改 `router.Registrar` 时，重点确认：\n\n- `Register` 首次写入 key 后才启动续期协程。\n- `Deregister` 会先停止续期，再删除 key。\n- `bucketKey` 的格式必须与 Reader 侧路由查询逻辑一致。\n- TTL 默认值和 refresh 间隔需要同时考虑：TTL 太短会导致短暂网络抖动时路由过期，TTL 太长会增加实例异常退出后的残留时间。\n- 直连 Redis 地址和服务发现 cluster 两种模式都应保留。","output-sinks-and-resource-pools":"# Output Sinks and Resource Pools\n\n## 模块职责\n\n该模块负责两类基础能力：\n\n1. **最终输出落盘**：通过 `FinalOutputSink` / `FinalOutputWriter` 抽象，把合并后的 `ObjectRecord` 写入本地文本文件或 HDFS Parquet 文件。\n2. **临时切片复用**：通过 `AcquireBatch`、`ReleaseBatch`、`AcquireObjects`、`ReleaseObjects` 复用 `[]BatchRecord` 和 `[]ObjectRecord`，降低批量写入路径上的分配压力。\n\n## 输出 Sink 抽象\n\n核心接口定义在 `writer/final_sink.go`：\n\n```go\ntype FinalOutputSink interface {\n\tOpen(bucketID int32, cfg *config.Config) (FinalOutputWriter, error)\n}\n\ntype FinalOutputWriter interface {\n\tWriteRow(row ObjectRecord) error\n\tClose() (string, int64, error)\n\tAbort() error\n}\n```\n\n`FinalOutputSink` 是按 bucket 打开最终输出 writer 的工厂。`FinalOutputWriter` 负责写入单条 `ObjectRecord`，并在结束时通过 `Close` 提交输出，或通过 `Abort` 清理临时文件。\n\n`Close` 返回三个值：\n\n- 最终文件路径\n- 最终文件大小\n- 错误\n\n该设计让上层合并流程只依赖 `WriteRow`、`Close`、`Abort`，不需要关心本地文件和 HDFS Parquet 的具体差异。\n\n## Sink 选择逻辑\n\n`newFinalOutputSink(cfg *config.Config)` 根据 `cfg.HDFS.Enabled` 选择输出实现：\n\n- `cfg.HDFS.Enabled == false`：返回 `localFinalOutputSink{}`\n- `cfg.HDFS.Enabled == true`：通过 `hdfs.Connect(options...)` 建立 HDFS 连接，返回 `*hdfsParquetFinalOutputSink`\n\nHDFS 连接参数来自：\n\n- `cfg.HDFS.NameNode`\n- `cfg.HDFS.NameNodePort`\n- `cfg.HDFS.UserName`\n- `cfg.HDFS.Token`\n\n该函数也会把已建立的 `*hdfs.FileSystem` 返回给调用方。根据调用关系，`writer.New` 会调用 `newFinalOutputSink`，因此 sink 类型在 writer 初始化阶段确定。\n\n```mermaid\nflowchart TD\n    A[\"writer.New\"] --> B[\"newFinalOutputSink\"]\n    B --> C{\"cfg.HDFS.Enabled\"}\n    C -->|否| D[\"localFinalOutputSink\"]\n    C -->|是| E[\"hdfs.Connect\"]\n    E --> F[\"hdfsParquetFinalOutputSink\"]\n    G[\"mergeRunsIntoWriter\"] --> H[\"FinalOutputWriter.WriteRow\"]\n    H --> I[\"FinalOutputWriter.Close / Abort\"]\n```\n\n## 本地最终输出\n\n本地实现由 `localFinalOutputSink` 和 `localFinalOutputWriter` 组成。\n\n`localFinalOutputSink.Open(bucketID, cfg)` 会构造两个路径：\n\n- 临时路径：`filepath.Join(cfg.HDFSTempDir, fmt.Sprintf(cfg.FinalFileNameTemplate+\".tmp\", bucketID, bucketID))`\n- 最终路径：`filepath.Join(cfg.HDFSRootPath, fmt.Sprintf(cfg.FinalFileNameTemplate, bucketID, bucketID))`\n\n随后它会：\n\n1. 创建临时目录和最终目录：`os.MkdirAll(..., 0o755)`\n2. 创建临时文件：`os.Create(tempPath)`\n3. 包装 `bufio.NewWriterSize(file, 128*1024)`\n4. 返回 `*localFinalOutputWriter`\n\n本地 writer 的写入格式很简单：每个 `ObjectRecord` 只写出 `StoreURI`，并追加换行。\n\n```go\nfunc (w *localFinalOutputWriter) WriteRow(row ObjectRecord) error {\n\tif w.closed {\n\t\treturn fmt.Errorf(\"local final output writer already closed\")\n\t}\n\tif _, err := w.writer.WriteString(string(row.StoreURI)); err != nil {\n\t\treturn err\n\t}\n\treturn w.writer.WriteByte('\\n')\n}\n```\n\n因此，本地输出适合 URI 列表类结果，不包含 `Size`、`StorageClass`、`ContentType`、`Vid`、`Oid`、`CreateTimestamp` 等字段。\n\n`Close` 的提交顺序是：\n\n1. 设置 `closed = true`\n2. `Flush` 缓冲区\n3. 关闭文件\n4. `os.Rename(tempPath, finalPath)`\n5. `os.Stat(finalPath)` 获取文件大小\n\n如果 `Close` 被重复调用，函数不会重新写入或重命名，而是直接 `os.Stat(w.finalPath)` 并返回最终文件信息。\n\n`Abort` 用于失败清理：\n\n1. 如果已经关闭，直接返回\n2. 设置 `closed = true`\n3. 关闭底层文件\n4. 删除临时文件：`os.Remove(w.tempPath)`\n\n## HDFS Parquet 最终输出\n\nHDFS 实现由 `hdfsParquetFinalOutputSink` 和 `hdfsParquetFinalOutputWriter` 组成。\n\n`hdfsParquetFinalOutputSink.Open(bucketID, cfg)` 使用 `path.Join` 构造 HDFS 路径：\n\n- 临时路径：`path.Join(cfg.HDFSTempDir, fmt.Sprintf(cfg.FinalFileNameTemplate+\".tmp\", bucketID, bucketID))`\n- 最终路径：`path.Join(cfg.HDFSRootPath, fmt.Sprintf(cfg.FinalFileNameTemplate, bucketID, bucketID))`\n\n它会先调用 `mkdirAllHDFS` 创建临时目录和最终目录，再通过 `s.fs.Create(tempPath)` 创建 HDFS 文件。\n\nParquet 写入依赖 `github.com/xitongsys/parquet-go/writer`：\n\n```go\npw, err := parquetwriter.NewParquetWriter(parquetFile, new(finalParquetRow), 2)\n```\n\n这里的并发数参数为 `2`。`parquetFile` 是 `*hdfsParquetFile`，用于把 HDFS 文件适配成 parquet-go 需要的 `source.ParquetFile`。\n\n### Parquet 行结构\n\nHDFS 输出使用 `finalParquetRow` 作为 Parquet schema：\n\n```go\ntype finalParquetRow struct {\n\tStoreURI        string `parquet:\"name=store_uri, type=BYTE_ARRAY, convertedtype=UTF8\"`\n\tSize            int64  `parquet:\"name=size, type=INT64\"`\n\tStorageClass    string `parquet:\"name=storage_class, type=BYTE_ARRAY, convertedtype=UTF8, encoding=PLAIN_DICTIONARY\"`\n\tContentType     string `parquet:\"name=content_type, type=BYTE_ARRAY, convertedtype=UTF8, encoding=PLAIN_DICTIONARY\"`\n\tVid             string `parquet:\"name=vid, type=BYTE_ARRAY, convertedtype=UTF8\"`\n\tOid             string `parquet:\"name=oid, type=BYTE_ARRAY, convertedtype=UTF8\"`\n\tCreateTimestamp int64  `parquet:\"name=create_timestamp, type=INT64\"`\n}\n```\n\n`hdfsParquetFinalOutputWriter.WriteRow` 会把 `ObjectRecord` 映射到 `finalParquetRow`：\n\n- `row.StoreURI` → `store_uri`\n- `row.Size` → `size`\n- `row.StorageClass` → `storage_class`\n- `row.ContentType` → `content_type`\n- `row.Vid` → `vid`\n- `row.Oid` → `oid`\n- `row.CreateTimestamp` → `create_timestamp`\n\n如果 writer 已关闭，`WriteRow` 返回错误：`hdfs parquet final output writer already closed`。\n\n### HDFS Parquet 提交流程\n\n`hdfsParquetFinalOutputWriter.Close` 的提交顺序是：\n\n1. 如果已关闭，直接 `w.fs.Stat(w.finalPath)` 并返回最终文件信息\n2. 设置 `closed = true`\n3. 调用 `w.parquet.WriteStop()` 完成 Parquet footer 和元数据写入\n4. 关闭 HDFS 文件\n5. 调用 `w.fs.Rename(w.tempPath, w.finalPath, true)` 把临时文件移动到最终路径\n6. 调用 `w.fs.Stat(w.finalPath)` 获取最终文件大小\n\n如果 `WriteStop` 失败，代码会尽量关闭底层文件，但不会执行 rename。\n\n`Abort` 会关闭底层 HDFS 文件，并删除临时文件：\n\n```go\nreturn w.fs.Delete(w.tempPath, false)\n```\n\n## HDFS 目录创建\n\n`mkdirAllHDFS(fs, dir)` 是 HDFS 目录创建的共享辅助函数。\n\n它会忽略空目录、`.` 和 `/`：\n\n```go\nif dir == \"\" || dir == \".\" || dir == \"/\" {\n\treturn nil\n}\n```\n\n然后执行：\n\n1. `fs.Exists(dir)` 判断目录是否存在\n2. 如果存在，直接返回\n3. 如果不存在，调用 `fs.Mkdir(dir, 0o755, true)` 递归创建\n\n除 `hdfsParquetFinalOutputSink.Open` 外，`writer.prepareOutputPaths` 也会调用该函数。启动链路中，`lifecycle.Run` 会进入 `writer.Start`，再由 `prepareOutputPaths` 创建输出目录。\n\n## Parquet HDFS 文件适配器\n\n`hdfsParquetFile` 封装 `*hdfs.File`，用于满足 parquet-go 的 `source.ParquetFile` 接口需求。\n\n已实现的方法：\n\n- `Write(p []byte)`：转发到 `h.file.Write(p)`\n- `Seek(offset, whence)`：转发到 `h.file.Seek(offset, whence)`\n- `Close()`：转发到 `h.file.Close()`\n\n不支持的方法：\n\n- `Read(p []byte)`：返回 `write-only parquet file`\n- `Create(name string)`：返回 `nested create is not implemented`\n- `Open(name string)`：返回 `open is not implemented`\n\n这说明当前适配器只支持单文件顺序写入场景，不支持 parquet-go 通过同一对象打开子文件或读取文件内容。\n\n## 临时文件提交语义\n\n本地和 HDFS 实现都采用相同的提交模式：\n\n1. 先写入临时路径\n2. `Close` 成功后 rename 到最终路径\n3. `Abort` 删除临时路径\n\n这种模式避免上游在写入未完成时看到最终文件。上层合并逻辑 `mergeRunsIntoWriter` 通过 `FinalOutputWriter.WriteRow` 写入记录，完成后调用 `Close` 提交。如果过程中失败，应调用 `Abort` 清理临时输出。\n\n## 资源池\n\n`writer/pool.go` 使用 `sync.Pool` 复用两类切片：\n\n- `batchSlicePool`：复用 `[]BatchRecord`\n- `objectsSlicePool`：复用 `[]ObjectRecord`\n\n默认容量和最大可复用容量：\n\n```go\nconst (\n\tdefaultBatchSlicePoolCap   = 256\n\tdefaultObjectsSlicePoolCap = 1024\n\tmaxReusableBatchSliceCap   = defaultBatchSlicePoolCap * 8\n\tmaxReusableObjectsSliceCap = defaultObjectsSlicePoolCap * 8\n)\n```\n\n也就是说：\n\n- `[]BatchRecord` 默认容量为 `256`，容量超过 `2048` 时不归还池\n- `[]ObjectRecord` 默认容量为 `1024`，容量超过 `8192` 时不归还池\n\n## 获取和释放 BatchRecord 切片\n\n`AcquireBatch(capHint int)` 从池中获取一个长度为 `0` 的 `[]BatchRecord`。\n\n行为规则：\n\n- 如果 `capHint < 0`，按 `0` 处理\n- 如果池中切片容量小于 `capHint`，重新 `make([]BatchRecord, 0, capHint)`\n- 否则复用池中切片，并截断为 `s[:0]`\n\n`ReleaseBatch(b []BatchRecord)` 把切片归还池：\n\n- `nil` 切片直接忽略\n- 容量超过 `maxReusableBatchSliceCap` 的切片不复用\n- 归还前调用 `clearBatchRecordSlice(b[:cap(b)])` 清空整个底层数组\n- 最后以长度 `0` 放回 `batchSlicePool`\n\n清空整个容量范围很重要，因为 `BatchRecord` 可能持有引用类型字段。把底层数组置零可以避免对象被池长期引用，降低意外内存保留风险。\n\n## 获取和释放 ObjectRecord 切片\n\n`AcquireObjects(capHint int)` 和 `ReleaseObjects(o []ObjectRecord)` 与 Batch 版本对称，只是对象类型和容量阈值不同。\n\n`ReleaseObjects` 会调用：\n\n```go\nclearReusableObjectRecordSlice(o[:cap(o)])\n```\n\n该函数逐项写入零值 `ObjectRecord`，同样用于释放底层数组中可能保留的引用。\n\n根据调用关系，`service.WriteBatch` 会使用：\n\n- `AcquireObjects`\n- `AcquireBatch`\n- `ReleaseObjects`\n- `ReleaseBatch`\n\n因此资源池主要服务于批量写入入口，减少高频请求下的切片分配和 GC 压力。\n\n## 错误定义\n\n`writer/errors.go` 定义了两个包级错误：\n\n```go\nvar ErrMissingReaderID = errors.New(\"reader_id is required\")\nvar ErrBackPressure = errors.New(\"writer back pressure\")\n```\n\n它们不在 `final_sink.go` 和 `pool.go` 内部使用，但属于同一 writer 包的公共错误语义：\n\n- `ErrMissingReaderID` 表示调用方缺少必要的 `reader_id`\n- `ErrBackPressure` 表示 writer 侧触发背压，调用方需要稍后重试或降低写入速度\n\n## 与代码库其他部分的关系\n\n该模块位于 writer 包的底层支撑层：\n\n- `writer.New` 负责初始化输出 sink，并持有 HDFS 文件系统连接\n- `writer.Start` / `prepareOutputPaths` 负责启动前创建输出路径，其中 HDFS 路径复用 `mkdirAllHDFS`\n- `bucket_ctx.mergeRunsIntoWriter` 负责把 bucket 内部归并后的 `ObjectRecord` 写入 `FinalOutputWriter`\n- `service.WriteBatch` 负责接收写入请求，并通过资源池复用 `BatchRecord` 和 `ObjectRecord` 切片\n\n整体数据路径可以概括为：\n\n```mermaid\nflowchart LR\n    A[\"service.WriteBatch\"] --> B[\"AcquireBatch / AcquireObjects\"]\n    B --> C[\"writer 内部批量处理\"]\n    C --> D[\"mergeRunsIntoWriter\"]\n    D --> E[\"FinalOutputWriter.WriteRow\"]\n    E --> F{\"输出类型\"}\n    F -->|本地| G[\"URI 文本文件\"]\n    F -->|HDFS| H[\"Parquet 文件\"]\n    D --> I[\"Close 提交\"]\n```\n\n## 贡献时需要注意\n\n修改输出格式时，需要同时关注本地和 HDFS 的差异。本地 writer 目前只输出 `StoreURI` 文本行，而 HDFS writer 输出完整的 Parquet schema。\n\n修改 `finalParquetRow` 时，需要同步检查所有 `hdfsParquetFinalOutputWriter.WriteRow` 的字段映射，避免 schema 字段存在但没有写入，或 `ObjectRecord` 字段变更后映射失效。\n\n修改资源池容量时，应考虑请求批大小、峰值内存和 GC 行为。最大可复用容量用于阻止异常大切片进入 `sync.Pool`，避免一次大请求长期抬高进程内存占用。\n\n`FinalOutputWriter.Close` 具备重复调用容忍能力，但 `WriteRow` 在关闭后会返回错误。调用方应保证写入完成后再关闭，并在失败路径调用 `Abort` 清理临时文件。","overview":"# uri_writer — Wiki\n\n# uri_writer\n\n`uri_writer` 是 VDA/TOS `store_uri` 大规模分桶排序流水线中的 Writer FaaS。它位于整体链路 `Reader → Router → Writer` 的末端：Reader 按 `bucketId` 将 `store_uri` 数据路由到对应 Writer，Writer 在本地完成外排序、去重和归并，最终为每个 bucket 生成有序文件并写入 HDFS。\n\n这个仓库的核心不是通用写入服务，而是一个面向大规模 URI 排序任务的运行时骨架：它接收批量写入请求，按 bucket 管理状态，在内存压力到达阈值时 spill 本地有序 run 文件，并在 Reader 通知完成后执行最终 merge。\n\n## 整体架构\n\n```mermaid\nflowchart LR\n    Reader[\"Reader 上游\"] --> RPC[\"service RPC 适配层\"]\n    RPC --> Handler[\"writer/handlers.go 写入处理\"]\n    Handler --> Writer[\"writer.Writer 编排层\"]\n    Writer --> Bucket[\"WriterCtx bucket 状态机\"]\n    Bucket --> Sink[\"FinalOutputSink 输出\"]\n    Sink --> HDFS[\"HDFS Parquet 文件\"]\n    Writer --> Router[\"router 注册\"]\n    Writer --> CP[\"controlplane 上报\"]\n    Router --> Redis[\"Redis Router\"]\n```\n\n入口层由 [Application Startup and Lifecycle](application-startup-and-lifecycle.md) 负责。FaaS 场景从 `main.go` 通过 `lambda.Start(handler)` 接收启动 payload，本地或常驻进程场景从 `cmd/writer_server/main.go` 读取命令行参数。两条路径都会归一化为 `config.Config`，随后创建 `writer.Writer` 并交给生命周期编排逻辑启动、阻塞等待和停机收尾。\n\n真正的运行时核心在 [Writer Orchestration](writer-orchestration.md)。`writer.Writer` 持有当前实例负责的所有 bucket、RPC server、HDFS 输出 sink、Router 注册器、控制面客户端和反压守卫。它把“启动服务、注册路由、接收写入、汇报进度、最终提交”这些动作串成一个完整 Writer 实例。\n\n## 数据写入路径\n\n上游 Reader 调用 Thrift/Kitex 定义的 `WriterService`。协议源头在 `idl/base.thrift` 和 `idl/uri_writer.thrift`，生成绑定代码由 [Thrift IDL and Generated RPC Bindings](thrift-idl-and-generated-rpc-bindings.md) 说明。RPC 入口本身很薄，[Writer RPC Service](writer-rpc-service.md) 只负责启动 KiteX server、转换请求对象、调用业务方法，并把业务错误映射成响应码。\n\n进入业务层后，[Write Request Handling and Backpressure](write-request-handling-and-backpressure.md) 处理 `WriteBatch`、`MarkBucketDone` 和 `Flush`。写入请求会先经过 bucket 归属校验、CPU 反压检查和 `(ReaderID, seqNo)` 幂等判断，然后按 bucket 分组并追加到对应 `WriterCtx`。\n\n每个 bucket 的内部状态由 [Bucket State and Spill Management](bucket-state-and-spill-management.md) 管理。`AppendBatch` 不直接写最终文件，而是把 `ObjectRecord` 克隆到 bucket 的 arena 与内存 chunk 中；当 chunk 达到阈值时，后台 worker 会排序并 spill 成本地 run 文件。这个设计让 RPC handler 尽量短路径返回，把排序和磁盘 I/O 交给 bucket worker 异步推进。\n\n## 最终归并与输出\n\n当 Reader 完成某个 bucket 的写入后，会通过 `MarkBucketDone` 推动 bucket 进入 finalize 阶段。`WriterCtx` 会停止接收新数据，将仍在内存中的 active chunk 排队 spill，等待所有 spill 完成，然后对多个有序 run 文件做 k-way merge。归并过程中按 `StoreURI` 精确去重，最后通过 [Output Sinks and Resource Pools](output-sinks-and-resource-pools.md) 中的 `FinalOutputSink` 写入最终输出。\n\n输出层抽象为：\n\n```go\ntype FinalOutputSink interface {\n\tOpen(bucketID int32, cfg *config.Config) (FinalOutputWriter, error)\n}\n\ntype FinalOutputWriter interface {\n\tWriteRow(row ObjectRecord) error\n\tClose() (string, int64, error)\n\tAbort() error\n}\n```\n\n这让 bucket 归并逻辑不需要关心最终目标是本地文件还是 HDFS Parquet。资源池能力也集中在同一模块中，用于复用批量写入路径上的临时切片，降低高吞吐场景下的分配压力。\n\n## 路由、控制面与生命周期\n\nWriter 启动后会把自己负责的 bucket 注册到 Redis Router，供 Reader 发现目标 endpoint；运行过程中则向控制面上报心跳、进度和告警。这部分由 [Control Plane and Routing](control-plane-and-routing.md) 覆盖。它们不参与数据排序本身，但决定 Writer 是否能被调度、发现和观测。\n\n关闭阶段同样由 `writer.Writer` 统一协调：收到终止信号或自动退出条件后，它会触发所有 bucket 的 `FinalizeMerge()`，汇总每个 bucket 的输出路径、行数和错误状态，再完成最终上报。新开发者排查“为什么某个 bucket 没有产出文件”时，通常需要同时查看 bucket 状态机、输出 sink 和控制面上报三部分。\n\n## 本地开发与构建\n\n项目模块名为：\n\n```text\ncode.byted.org/videoarch/uri_writer\n```\n\n当前 `go.mod` 使用 Go `1.25`。本地常用入口在 [Project Operations](project-operations.md) 中说明，最小流程是：\n\n```bash\ngo test -v ./...\ngo build -o uri_writer\n```\n\n也可以使用仓库提供的 `Makefile`：\n\n```bash\nmake test\nmake build\n```\n\n线上或部署构建流程通常走 `build.sh`，它会读取 `.env` 中的 HDFS 客户端 SCM 版本变量，安装构建依赖并产出 `output/uri_writer`。如果要调试 RPC server 的常驻进程形态，可以从 `cmd/writer_server/main.go` 入口启动；如果要验证 FaaS payload 的解析和生命周期行为，则应从根目录 `main.go` 的 Lambda 入口开始看。","project-operations":"# Project Operations\n\n## 项目运维模块\n\n项目运维模块由仓库根目录的工程文件组成，负责定义 `uri_writer` 的构建、测试、清理、依赖声明和部署构建流程。它不参与 Writer FaaS 的运行时调用链，但决定开发者如何在本地验证代码，以及线上构建环境如何产出可部署二进制。\n\n```mermaid\nflowchart TD\n    A[开发者或流水线] --> B[Makefile]\n    B --> C[go build -o uri_writer]\n    B --> D[go test -v ./...]\n    A --> E[build.sh]\n    E --> F[读取 .env]\n    E --> G[安装 bvc]\n    E --> H[拉取 HDFS 客户端]\n    E --> I[go build -o output/uri_writer]\n    C --> J[Writer FaaS 二进制]\n    I --> J\n```\n\n## 文件职责\n\n`Makefile` 提供本地开发入口：\n\n- `default`: 默认执行 `build`。\n- `build`: 运行 `go build -o uri_writer`，在仓库根目录生成本地二进制。\n- `test`: 运行 `go test -v ./...`，覆盖当前 module 下所有 Go package。\n- `clean`: 删除本地构建产物 `uri_writer`。\n\n`build.sh` 是 Linux 构建脚本，面向部署或流水线环境：\n\n```bash\n#!/usr/bin/env bash\n\nif [ $(uname -s | tr A-Z a-z) != \"linux\" ]; then\n    echo \"Unsupported OS, only running this script on Linux\"\n    exit 1\nfi\n\n. .env\n\napt update -y\napt install -y bvc\nbvc clone -f data/inf/hdfs_client /opt/tiger/hdfs_client\n\nrm -rf output && mkdir -p output\ngo build -o output/uri_writer\n```\n\n它的关键行为是：\n\n- 只允许在 Linux 上执行。\n- 通过 `. .env` 注入 HDFS 客户端相关 SCM 版本变量。\n- 使用 `bvc clone -f data/inf/hdfs_client /opt/tiger/hdfs_client` 准备 CGO 依赖的 HDFS 客户端。\n- 清空并重建 `output/` 目录。\n- 将最终产物输出到 `output/uri_writer`。\n\n`go.mod` 定义 Go module：\n\n```go\nmodule code.byted.org/videoarch/uri_writer\n\ngo 1.25\n```\n\n该 module 的直接依赖反映了 Writer 的业务边界：\n\n- `code.byted.org/v_lambda/lambda-go-sdk`: FaaS 入口与运行环境。\n- `code.byted.org/kite/kitex`、`github.com/cloudwego/kitex`: Reader 与 Writer 之间的 RPC 服务框架。\n- `code.byted.org/kv/goredis`: Router 注册、续期和注销所需 Redis 客户端。\n- `code.byted.org/inf/hdfs-go-sdk-on-cgo`: HDFS 写入与 rename 提交。\n- `github.com/xitongsys/parquet-go`: 生成 bucket 级有序 Parquet 文件。\n- `github.com/klauspost/compress`、`github.com/golang/snappy`: 本地 run 文件压缩相关依赖。\n- `github.com/shirou/gopsutil/v3`: 进程资源采样，例如 CPU 观测。\n\n`README.md` 是架构级说明文档，定义了当前骨架与目标执行链路。它明确 `uri_writer` 是 VDA/TOS `store_uri` 大规模分桶排序流水线中的 Writer FaaS，位于 `Reader → Router → Writer` 架构的 Writer 角色。\n\n`debug-cpu-spike-analysis.md` 是问题排查记录，当前聚焦 Writer CPU 尖刺。它不是运行时代码，但记录了对 `process.Percent(100ms)`、`HandleWriteBatch` 并发 fan-out、`WriterCtx.SpillRun` 排序压缩开销、`chunk_records=60000` 等实现细节的分析假设和证据。\n\n## 与业务代码的连接\n\n运维模块本身没有内部函数调用关系，但它通过构建入口连接所有业务 package：\n\n- `main.go` 定义 FaaS handler，并调用 `config.FromInput`、`writer.New`、`lifecycle.Run`。\n- `config/` 负责启动参数解析。\n- `writer/` 承载 `Writer`、`WriterCtx`、`HandleWriteBatch`、`AppendBatch`、`SpillRun`、`FinalizeMerge`、`Shutdown` 等核心逻辑。\n- `router/` 负责 Redis 注册与续期。\n- `controlplane/` 负责心跳、进度上报和告警。\n- `lifecycle/` 负责启动、运行和优雅收尾。\n- `service/` 用于衔接 KiteX 生成代码与 writer handler。\n\n因此，`go build` 或 `go test -v ./...` 会把这些包作为一个整体进行编译或测试。任何 package 的类型错误、缺失依赖或 CGO/HDFS 链接问题，最终都会在项目运维入口暴露。\n\n## 常用操作\n\n本地构建：\n\n```bash\nmake build\n```\n\n运行全部测试：\n\n```bash\nmake test\n```\n\n清理本地产物：\n\n```bash\nmake clean\n```\n\nLinux 流水线构建：\n\n```bash\n./build.sh\n```\n\n本地 `make build` 只生成 `./uri_writer`。部署构建使用 `build.sh`，产物路径是 `./output/uri_writer`，并且会额外准备 `/opt/tiger/hdfs_client`。\n\n## 约束与注意事项\n\n`build.sh` 依赖 Linux、`apt`、`bvc` 和 `.env`。在 macOS 或非 Debian 系环境中不应使用该脚本，本地开发应使用 `make build` 或直接运行 `go build`。\n\nHDFS 客户端来自 `code.byted.org/inf/hdfs-go-sdk-on-cgo` 和 `/opt/tiger/hdfs_client`，因此部署环境必须满足 CGO 和动态库加载要求。构建脚本目前只负责拉取客户端目录，不包含运行时环境校验。\n\n`go.mod` 中同时存在字节内部 `code.byted.org/kite/kitex` 和开源 `github.com/cloudwego/kitex` 依赖，后续生成或接入 `service/` 代码时需要保持 import 路径与 IDL 生成工具一致。\n\n当前 README 标注多数业务方法仍为 TODO。运维入口可以编译项目骨架，但不能代表 Writer 的外排序、HDFS 提交、Redis 注册、控制面上报等完整能力已经实现。","thrift-idl-and-generated-rpc-bindings":"# Thrift IDL and Generated RPC Bindings\n\n## 模块职责\n\n本模块定义 Reader 与 Writer FaaS 实例之间的 Thrift RPC 契约，并包含由 thriftgo / Kitex 生成的 Go 绑定代码。业务代码不应直接修改 `kitex_gen/**`，应以 `idl/base.thrift` 和 `idl/uri_writer.thrift` 作为源头，通过 Kitex 重新生成绑定。\n\n核心服务是 `WriterService`，用于向 Writer 批量写入对象元数据、通知 Bucket 写入结束，以及触发中间刷盘。\n\n```mermaid\nflowchart LR\n    Reader[\"Reader 客户端\"] --> Client[\"writerservice.Client\"]\n    Client --> KClient[\"kClient.Call\"]\n    KClient --> Kitex[\"Kitex RPC\"]\n    Kitex --> Handler[\"writeBatchHandler / markBucketDoneHandler / flushHandler\"]\n    Handler --> Impl[\"uri_writer.WriterService 实现\"]\n    Impl --> Resp[\"WriteBatchResponse / MarkBucketDoneResponse\"]\n```\n\n## IDL 契约\n\n`idl/base.thrift` 定义通用透传字段：\n\n- `TrafficEnv`：流量环境信息，包含 `Open` 和 `Env`。\n- `Base`：请求/响应公共元信息，包含 `LogID`、`Caller`、`Addr`、`Client`、可选 `TrafficEnv` 和可选 `Extra`。\n- `BaseResp`：通用状态响应，包含 `StatusMessage`、`StatusCode` 和可选 `Extra`。\n\n`idl/uri_writer.thrift` 定义 Writer RPC 的业务模型：\n\n- `ErrorCode`：结构化错误码。\n  - `SUCCESS`：成功。\n  - `RETRYABLE_ERROR`：临时错误，客户端可退避重试。\n  - `FATAL_ERROR`：请求不可恢复错误，不应重试。\n  - `BUCKET_NOT_OWNED`：当前 Writer 不负责该 Bucket，Reader 应清理路由缓存并重新查询。\n  - `BACK_PRESSURE`：Writer 反压，客户端应降速或暂停请求。\n- `ObjectMeta`：单个待写入对象的元数据。\n- `DataRecord`：同一个 `bucketId` 下的一批 `ObjectMeta`。\n- `WriteBatchRequest` / `WriteBatchResponse`：批量写入请求与响应。\n- `MarkBucketDoneRequest` / `MarkBucketDoneResponse`：Bucket 完成通知请求与响应。\n- `WriterService`：对外 RPC 服务，包含 `WriteBatch`、`MarkBucketDone` 和 `Flush`。\n\n## 数据模型\n\n`ObjectMeta` 是写入链路的最小业务单元：\n\n```go\ntype ObjectMeta struct {\n    StoreUri        []byte\n    Size            int64\n    StorageClass    string\n    ContentType     string\n    Vid             string\n    Oid             string\n    CreateTimestamp int64\n}\n```\n\nIDL 中 `storeUri` 使用 `binary`，生成到 Go 后是 `[]byte`。这样避免跨语言字符串编码差异影响 URI 哈希或排序逻辑。`ObjectMeta` 的所有字段都是 `required`，反序列化时 `FastRead` 会检查字段是否存在，缺失时返回 `thrift.INVALID_DATA`。\n\n`DataRecord` 将同一个 Bucket 的对象聚合在一起：\n\n```go\ntype DataRecord struct {\n    BucketId int32\n    Objects  []*ObjectMeta\n}\n```\n\n`WriteBatchRequest` 支持一个请求中包含多个 `DataRecord`：\n\n```go\ntype WriteBatchRequest struct {\n    SeqNo int64\n    Batch []*DataRecord\n    Base  *base.Base\n}\n```\n\n`SeqNo` 是客户端生成的单调递增序列号，用于服务端幂等处理。调用方应按 Writer 连接维护独立序列号。`WriteBatchResponse.AckSeqNo` 表示服务端已经成功处理并持久化的最大序列号，客户端重试时应以此同步本地进度。\n\n`MarkBucketDoneRequest` 用于标记 Bucket 数据流结束：\n\n```go\ntype MarkBucketDoneRequest struct {\n    BucketId  int32\n    TotalUris *int64\n    Base      *base.Base\n}\n```\n\n`TotalUris` 是可选字段，服务端可通过 `IsSetTotalUris()` 判断是否传入，再用 `GetTotalUris()` 读取，用于一致性校验。\n\n## 服务接口\n\n生成代码中的核心接口是 `uri_writer.WriterService`：\n\n```go\ntype WriterService interface {\n    WriteBatch(ctx context.Context, req *WriteBatchRequest) (*WriteBatchResponse, error)\n    MarkBucketDone(ctx context.Context, req *MarkBucketDoneRequest) (*MarkBucketDoneResponse, error)\n    Flush(ctx context.Context, req *MarkBucketDoneRequest) (*MarkBucketDoneResponse, error)\n}\n```\n\n业务服务实现位于 `service/impl.go`，并通过该接口接入 Kitex server。调用关系中可以看到：\n\n- `service/impl.go` 的 `WriteBatch` 构造 `WriteBatchResponse`。\n- `service/impl.go` 的 `MarkBucketDone` 构造 `MarkBucketDoneResponse`，并读取 `IsSetTotalUris()` / `GetTotalUris()`。\n- `service/impl.go` 的 `Flush` 复用 `MarkBucketDoneRequest`，返回 `MarkBucketDoneResponse`。\n- `service/server.go` 的 `Start` 使用 `writerservice.NewServerWithBytedConfig` 启动服务。\n\n## 生成代码结构\n\n`kitex_gen/base/base.go` 和 `kitex_gen/uri_writer/uri_writer.go` 提供普通 Go 类型、构造函数、getter/setter 和可选字段判断方法。例如：\n\n- `NewObjectMeta()`、`NewDataRecord()`、`NewWriteBatchRequest()`。\n- `GetErrorCode()`、`GetMessage()`、`GetAckSeqNo()`。\n- `IsSetMessage()`、`IsSetBase()`、`IsSetTotalUris()`。\n- `ErrorCode.String()` 和 `ErrorCodeFromString()`。\n- `ErrorCode.Scan()` / `ErrorCode.Value()` 支持数据库扫描和值转换。\n\n`kitex_gen/base/k-base.go` 和 `kitex_gen/uri_writer/k-uri_writer.go` 提供 Kitex 高性能 Thrift 编解码实现：\n\n- `FastRead(buf []byte)`：从二进制 Thrift payload 反序列化。\n- `FastWrite(buf []byte)` / `FastWriteNocopy(buf []byte, w thrift.NocopyWriter)`：序列化到缓冲区。\n- `BLength()`：计算序列化后的字节长度。\n- `DeepCopy(s interface{}) error`：深拷贝结构体，避免共享可变切片、map 或嵌套指针。\n\n`FastRead` 会根据字段 ID 和 Thrift 类型读取字段；未知字段或类型不匹配字段会通过 `thrift.Binary.Skip` 跳过，从而保留 Thrift 的前后兼容能力。对 `required` 字段，生成代码会维护 `isset...` 标记，并在字段缺失时返回协议错误。\n\n## RPC 客户端绑定\n\n`kitex_gen/uri_writer/writerservice/client.go` 暴露客户端入口：\n\n```go\nclient, err := writerservice.NewClient(destService)\nresp, err := client.WriteBatch(ctx, req)\n```\n\n主要函数：\n\n- `NewClient(destService string, opts ...client.Option)`：创建 `writerservice.Client`，内部配置 `client.WithDestService(destService)` 和 `byted.ClientSuiteWithConfig(...)`。\n- `MustNewClient(...)`：创建失败时 panic。\n- `NewClientWithBytedConfig(destService string, config *byted.ClientConfig, opts ...client.Option)`：允许调用方传入 ByteDance Kitex 配置。\n- `MustNewClientWithBytedConfig(...)`：配置版 panic 构造函数。\n\n实际调用由 `kWriterServiceClient` 转发到 `kClient`：\n\n```go\nfunc (p *kClient) WriteBatch(ctx context.Context, req *uri_writer.WriteBatchRequest) (*uri_writer.WriteBatchResponse, error) {\n    var args uri_writer.WriterServiceWriteBatchArgs\n    args.Req = req\n    var result uri_writer.WriterServiceWriteBatchResult\n    if err := p.c.Call(ctx, \"WriteBatch\", &args, &result); err != nil {\n        return nil, err\n    }\n    return result.GetSuccess(), nil\n}\n```\n\n`MarkBucketDone` 和 `Flush` 使用相同模式，只是方法名和参数/结果类型不同。\n\n## RPC 服务端绑定\n\n`kitex_gen/uri_writer/writerservice/server.go` 暴露服务端入口：\n\n- `NewServer(handler uri_writer.WriterService, opts ...server.Option)`。\n- `NewServerWithBytedConfig(handler uri_writer.WriterService, config *byted.ServerConfig, opts ...server.Option)`。\n- `RegisterService(svr server.Server, handler uri_writer.WriterService, opts ...server.RegisterOption)`。\n\n`NewServer` 和 `NewServerWithBytedConfig` 都会注册 `serviceInfo()`，并启用 `server.WithCompatibleMiddlewareForUnary()`。业务侧只需要实现 `uri_writer.WriterService`，再交给这些函数注册。\n\n`writerservice.go` 中的 `serviceMethods` 定义了 Kitex 方法元信息：\n\n- `\"WriteBatch\"` 对应 `writeBatchHandler`。\n- `\"MarkBucketDone\"` 对应 `markBucketDoneHandler`。\n- `\"Flush\"` 对应 `flushHandler`。\n\n每个 handler 都会将通用 `arg` / `result` 转换为具体生成类型，再调用真实业务实现：\n\n```go\nsuccess, err := handler.(uri_writer.WriterService).WriteBatch(ctx, realArg.Req)\nif err != nil {\n    return err\n}\nrealResult.Success = success\n```\n\n## Base 字段与公共元信息\n\n`WriteBatchRequest`、`WriteBatchResponse`、`MarkBucketDoneRequest` 和 `MarkBucketDoneResponse` 都包含字段号 `255` 的 `Base *base.Base`。生成代码还提供：\n\n```go\nfunc (p *WriteBatchRequest) GetOrSetBase() interface{}\nfunc (p *WriteBatchResponse) GetOrSetBase() interface{}\nfunc (p *MarkBucketDoneRequest) GetOrSetBase() interface{}\nfunc (p *MarkBucketDoneResponse) GetOrSetBase() interface{}\n```\n\n这些方法在 `Base == nil` 时自动创建 `base.NewBase()`，用于框架或中间件注入公共元信息。业务代码如果需要写入 `LogID`、`Caller` 或 `Extra`，优先通过 `GetOrSetBase()` 获取可写对象，避免 nil 判断散落在调用处。\n\n## 与代码库其他部分的连接\n\n该模块处在 RPC 边界层，上游由 Reader 或测试客户端构造请求，下游由 `service/impl.go` 实现具体写入逻辑。\n\n典型链路如下：\n\n1. 调用方构造 `uri_writer.WriteBatchRequest`，填充 `SeqNo`、`Batch` 和可选 `Base`。\n2. `writerservice.Client.WriteBatch` 将请求包装为 `WriterServiceWriteBatchArgs`。\n3. `kClient.WriteBatch` 调用底层 `client.Client.Call(ctx, \"WriteBatch\", ...)`。\n4. 服务端 Kitex 根据 `serviceMethods` 分发到 `writeBatchHandler`。\n5. `writeBatchHandler` 调用业务实现的 `WriteBatch(ctx, req)`。\n6. 业务实现返回 `WriteBatchResponse`，客户端通过 `GetErrorCode()`、`GetMessage()`、`GetAckSeqNo()` 处理结果。\n\n测试中也直接依赖这些绑定：\n\n- `writer/handlers_rpc_integration_test.go` 使用 `writerservice.NewClient` 调用 `WriteBatch`、`MarkBucketDone` 和 `Flush`。\n- `writer/local_hdfs_memory_integration_test.go` 构造 `WriteBatchRequest`、`ObjectMeta`、`base.Base`，并通过 `GetErrorCode()` / `GetMessage()` 校验响应。\n- `service/server.go` 通过 `writerservice.NewServerWithBytedConfig` 将业务实现注册为 Kitex 服务。\n\n## 维护注意事项\n\n不要手工编辑 `kitex_gen/**`。如果需要调整字段、错误码或 RPC 方法，应先修改 `idl/base.thrift` 或 `idl/uri_writer.thrift`，再重新运行生成命令：\n\n```bash\nkitex -module code.byted.org/videoarch/uri_writer idl/uri_writer.thrift\n```\n\nIDL 演进时应遵守 Thrift 兼容性约束：\n\n- 不要复用已删除字段号。\n- 新增字段优先使用 `optional`，避免旧客户端或旧服务端缺失 required 字段导致 `FastRead` 返回 `required field ... is not set`。\n- 已有字段的类型和字段号不要修改。\n- 新增 `ErrorCode` 时，客户端需要同步处理默认分支，避免把未知错误码误判为成功。\n- `ObjectMeta`、`DataRecord`、`WriteBatchRequest` 等已有 `required` 字段缺失会导致反序列化失败，调用方必须完整填充。\n\n响应中的 `Message` 是可选指针字段，读取前如果需要区分“未设置”和“空字符串”，应使用 `IsSetMessage()`；只关心展示文本时可以使用 `GetMessage()`。同理，`TotalUris` 应通过 `IsSetTotalUris()` 区分未传入和传入 `0`。","write-request-handling-and-backpressure":"# Write Request Handling and Backpressure\n\n## 模块概览\n\n写入请求处理与反压模块位于 `writer/handlers.go` 和 `writer/cpu_backpressure.go`，负责把上游 Reader 的批量写入请求转成每个 bucket 的 `WriterCtx.AppendBatch` 调用，并在 Writer 过载时尽早拒绝新写入。\n\n核心职责包括：\n\n- 处理 `WriteBatch`、`MarkBucketDone`、`Flush` 三类 RPC 业务逻辑。\n- 基于 `(ReaderID, seqNo)` 做写入幂等，避免 Reader 重试导致重复写入。\n- 校验 bucket 归属，防止请求写入非本 Writer 负责的 bucket。\n- 将一个 batch 内的记录按 bucket 分组，并并发追加到对应 `WriterCtx`。\n- 通过 `cpuBackPressureGuard` 检测 CPU 过载，返回 `ErrBackPressure` 让上游降速或重试。\n- 将慢路径操作交给 `WriterCtx` 内部 worker 异步推进，避免 RPC handler 长时间阻塞。\n\n## 请求入口\n\n### `HandleWriteBatch`\n\n`HandleWriteBatch(ctx context.Context, src WriteBatchSource, seqNo int64, batch []BatchRecord)` 是 `WriterService.WriteBatch` 的业务实现入口。RPC 层在 `service/impl.go` 中把 thrift 请求转换成：\n\n- `WriteBatchSource`\n- `BatchRecord`\n- `ObjectRecord`\n\n然后调用本方法。\n\n处理顺序是有意设计的：\n\n1. 检查 Writer 是否正在停止：`w.isStopping()`。\n2. 校验 `src.ReaderID` 非空，否则返回 `ErrMissingReaderID`。\n3. 调用 `w.touchWriteBatch()`，刷新活跃写入时间，用于生命周期空闲判断。\n4. 根据 `src.Key()` 读取当前 ack：`w.currentAck(sourceKey)`。\n5. 如果 `seqNo <= ack`，直接返回 `WriteBatchResult{AckSeqNo: ack}`，不做 bucket 校验、不做 CPU 反压检查，也不重复追加数据。\n6. 遍历 `BatchRecord`，通过 `w.bucket(record.BucketID)` 校验 bucket 归属，并按 bucket 聚合 `ObjectRecord`。\n7. 调用 `w.checkCPUBackPressure()`；若 CPU 已进入反压状态，返回包装了 `ErrBackPressure` 的错误。\n8. 按 bucket 并发调用 `WriterCtx.AppendBatch(rows)`。\n9. 所有 bucket 追加成功后，调用 `w.updateAck(sourceKey, seqNo)`。\n10. 返回 `WriteBatchResult{AckSeqNo: seqNo}`。\n\n简化流程如下：\n\n```mermaid\nflowchart TD\n    A[\"收到 WriteBatch\"] --> B[\"校验 Writer 状态与 ReaderID\"]\n    B --> C[\"读取 ackSeqNo\"]\n    C --> D{\"seqNo <= ackSeqNo?\"}\n    D -- \"是\" --> E[\"直接返回当前 ack\"]\n    D -- \"否\" --> F[\"校验并按 bucket 分组\"]\n    F --> G{\"CPU 反压中?\"}\n    G -- \"是\" --> H[\"返回 ErrBackPressure\"]\n    G -- \"否\" --> I[\"并发 AppendBatch\"]\n    I --> J[\"更新 ackSeqNo\"]\n    J --> K[\"返回成功\"]\n```\n\n### 幂等语义\n\n幂等 key 来自 `WriteBatchSource.Key()`：\n\n```go\nfunc (s WriteBatchSource) Key() string {\n\treturn \"reader:\" + s.ReaderID\n}\n```\n\n`ReaderID` 是 Reader FaaS 实例级标识。Writer 维护 `reader:<ReaderID> -> ackSeqNo`，只要请求的 `seqNo` 不大于当前 ack，就认为这是已成功处理过的重试请求。\n\n这有两个重要行为：\n\n- 已 ack 的重试请求会快速成功返回，不重复写入 `ObjectRecord`。\n- 已 ack 的重试请求会跳过 CPU 反压检查。`TestHandleWriteBatchSkipsCPUBackPressureForAckedRetry` 明确覆盖了这一点，保证上游在重试确认成功时不会被过载状态错误阻断。\n\n### bucket 分组与并发追加\n\n`HandleWriteBatch` 先把输入记录聚合成：\n\n```go\ngrouped := make(map[int32][]ObjectRecord, len(batch))\norder := make([]int32, 0, len(batch))\n```\n\n`order` 保存 batch 中首次出现的 bucket 顺序，`grouped` 保存每个 bucket 的对象列表。随后每个 bucket 启动一个 goroutine：\n\n```go\ngo func(ctx *WriterCtx, rows []ObjectRecord, bucketID int32) {\n\terr := ctx.AppendBatch(rows)\n\t...\n}(bucket, objects, bucketID)\n```\n\n并发粒度是 bucket，而不是对象。这样可以让一个 `WriteBatch` 内不同 bucket 的追加并行执行，同时仍然把单个 bucket 的排队、chunk 管理、spill 触发交给对应的 `WriterCtx` worker 串行处理。\n\n如果任意 bucket 追加失败，方法记录首个错误并返回；只有全部 bucket 追加成功后才更新 ack。这保证了 `ackSeqNo` 表示整个 `seqNo` 的 batch 已经完整被接受。\n\n### 慢请求日志\n\n模块定义了两个慢路径阈值：\n\n```go\nconst (\n\tslowWriteBatchLogThreshold = 500 * time.Millisecond\n\tslowBucketAppendThreshold  = 200 * time.Millisecond\n)\n```\n\n- 单 bucket `AppendBatch` 超过 `slowBucketAppendThreshold` 时记录 bucket 级日志。\n- 整个 `HandleWriteBatch` 超过 `slowWriteBatchLogThreshold` 时记录 batch 级日志。\n\n这些日志只在慢请求时输出，避免高峰期每个请求都打日志造成额外 CPU 压力。\n\n## 数据结构\n\n### `BatchRecord`\n\n`BatchRecord` 与 thrift `DataRecord` 等价，但定义在 `writer` 包内，避免 `writer` 反向依赖 `kitex_gen`。\n\n```go\ntype BatchRecord struct {\n\tBucketID int32\n\tObjects  []ObjectRecord\n}\n```\n\nRPC adapter 负责字段转换，核心写入逻辑只依赖该内部类型。\n\n### `ObjectRecord`\n\n`ObjectRecord` 是 Writer 内部处理的一条对象记录：\n\n```go\ntype ObjectRecord struct {\n\tStoreURI        []byte\n\tSize            int64\n\tStorageClass    string\n\tContentType     string\n\tVid             string\n\tOid             string\n\tCreateTimestamp int64\n}\n```\n\n排序和去重只依赖 `StoreURI`，其余字段在最终输出时保留。\n\n`handleAppend` 会通过 `cloneObjectRecordIntoArena` 复制 `StoreURI`：\n\n```go\nfunc cloneObjectRecordIntoArena(arena []byte, in ObjectRecord) ([]byte, ObjectRecord)\n```\n\n该函数调用 `appendArenaBytes`，把 `StoreURI` 放入 bucket 内部 arena，避免直接持有 RPC 请求传入的底层字节切片。执行流是：\n\n`AppendBatch -> submitOp -> initWorker -> runLoop -> handleOp -> handleAppend -> cloneObjectRecordIntoArena -> appendArenaBytes`\n\n`cloneObjectRecord` 保留给测试或非热点路径使用。\n\n### `WriteBatchResult`\n\n`WriteBatchResult` 是 handler 层返回给 RPC adapter 的纯 Go 结果：\n\n```go\ntype WriteBatchResult struct {\n\tAckSeqNo int64\n}\n```\n\n它对应 thrift `WriteBatchResponse` 中的 `AckSeqNo` 字段。\n\n## CPU 反压\n\nCPU 反压由 `cpu_backpressure.go` 实现。`Writer` 初始化时通过 `newCPUBackPressureGuard(ctx, thresholdPercent)` 创建 guard；如果 `thresholdPercent <= 0`，则不启用 CPU 反压。\n\n`HandleWriteBatch` 只在新请求、且 bucket 归属校验通过后调用：\n\n```go\nsnapshot, overloaded, cpuErr := w.checkCPUBackPressure()\n```\n\n如果 `overloaded == true`，返回包含 `ErrBackPressure` 的错误：\n\n```go\nfmt.Errorf(\"%w: normalized cpu usage %.2f%% exceeds threshold %.2f%% ...\", ErrBackPressure, ...)\n```\n\n调用方可以用 `errors.Is(err, ErrBackPressure)` 判断。`TestHandleWriteBatchReturnsBackPressureWhenCPUUsageHigh` 覆盖了该行为。\n\n### `processCPUBackPressureGuard`\n\n生产实现是 `processCPUBackPressureGuard`，核心字段包括：\n\n- `proc *process.Process`：来自 `gopsutil/process`，用于采样当前进程 CPU。\n- `thresholdPercent float64`：配置阈值。\n- `cpuLimitCores float64`：归一化用的 CPU 核数。\n- `lastUsagePercent`、`lastSampleAt`、`lastSampleErr`：最近一次采样结果。\n- `consecutiveHigh`、`consecutiveLow`：进入/退出反压的连续样本计数。\n- `overloaded bool`：当前是否处于反压状态。\n\n后台 goroutine 在 `run()` 中循环调用 `sample()`。`sample()` 使用：\n\n```go\ng.proc.Percent(cpuUsageSampleInterval)\n```\n\n采样间隔固定为 `1s`。\n\n### CPU 使用率归一化\n\n`gopsutil` 返回的是进程级原始 CPU 百分比，多核机器上可能超过 100%。模块通过 `normalizeCPUUsagePercent` 按 CPU 限额归一化：\n\n```go\nfunc normalizeCPUUsagePercent(rawUsagePercent float64, cpuLimitCores float64) float64 {\n\tif cpuLimitCores <= 0 {\n\t\tcpuLimitCores = 1.0\n\t}\n\treturn rawUsagePercent / cpuLimitCores\n}\n```\n\n`resolveCPULimitCores(ctx)` 优先读取 `lambdacontext.FromContext(ctx).Resource.CPU`；如果没有 Lambda CPU 限额，则使用 `runtime.GOMAXPROCS(0)`。\n\n例如原始 CPU 为 `400%`，CPU 限额为 `4`，归一化后是 `100%`。\n\n### 迟滞机制\n\n反压状态不是由单次采样直接决定，而是通过连续样本计数进入或退出：\n\n```go\nconst (\n\trequiredConsecutiveHighCPUSamples = 3\n\trequiredConsecutiveLowCPUSamples  = 2\n)\n```\n\n- 连续 3 次归一化 CPU 大于等于阈值，才进入反压。\n- 已经处于反压时，连续 2 次归一化 CPU 低于阈值，才退出反压。\n- 高于 `maxAllowedNormalizedCPUUsagePercent = 150.0` 的异常尖刺样本会被忽略，不计入进入或退出计数。\n\n这避免了 CPU 在阈值附近抖动时，`WriteBatch` 一会儿成功、一会儿反压。对应测试覆盖包括：\n\n- `TestCPUBackPressureGuardRequiresConsecutiveHighSamples`\n- `TestCPUBackPressureGuardRequiresConsecutiveLowSamplesToExit`\n- `TestCPUBackPressureGuardLowStreakResetByHighSample`\n- `TestCPUBackPressureGuardCheckIgnoresAbnormalHighSample`\n\n### `Check`\n\n`Check()` 是 handler 读取 CPU 状态的线程安全接口：\n\n```go\nfunc (g *processCPUBackPressureGuard) Check() (cpuUsageSnapshot, bool, error)\n```\n\n如果尚未完成第一次采样，返回空 snapshot 且不过载。若最近一次采样失败，返回 snapshot 和错误，但 `HandleWriteBatch` 只记录 warning，不因为采样失败拒绝请求。\n\n`cpuUsageSnapshot` 暴露以下字段用于错误消息和日志：\n\n```go\ntype cpuUsageSnapshot struct {\n\tRawUsagePercent        float64\n\tNormalizedUsagePercent float64\n\tCPULimitCores          float64\n\tThresholdPercent       float64\n}\n```\n\n### 停止 guard\n\n`Stop()` 关闭 `stopCh` 并等待 `doneCh`：\n\n```go\nfunc (g *processCPUBackPressureGuard) Stop() error\n```\n\n`stopOnce` 确保多次调用不会重复关闭 channel。Writer 关闭流程应调用该方法释放采样 goroutine。\n\n## `MarkBucketDone` 与 `Flush`\n\n### `HandleMarkBucketDone`\n\n`HandleMarkBucketDone(ctx, bucketID, totalUris)` 处理 bucket 完成信号：\n\n1. 通过 `w.bucket(bucketID)` 校验 bucket 属于当前 Writer。\n2. 读取本地 `bucket.TotalURIsReceived()`。\n3. 如果请求携带 `totalUris > 0`，且本地也已有统计值，则要求两者一致。\n4. 调用 `bucket.RequestFinalize()` 投递 finalize 请求。\n5. 调用 `w.markFinalizeStarted()` 更新 Writer 生命周期状态。\n6. 立即返回，不等待最终 merge 完成。\n\nfinalize 的状态推进、成功或失败结果通过后续进度上报完成。这一点和 `HandleWriteBatch` 的设计一致：RPC handler 只负责接受请求，不在调用栈上执行慢操作。\n\n### `HandleFlush`\n\n`HandleFlush(ctx, bucketID)` 只触发一次 `bucket.SpillRun()`：\n\n```go\nfunc (w *Writer) HandleFlush(ctx context.Context, bucketID int32) error\n```\n\n它不启动 k-way merge，也不改变 bucket 状态。典型用途是控制面需要中间快照，或者优雅停机前希望把当前内存 chunk 刷成 run 文件。\n\n## 与其他模块的连接\n\n### RPC 层\n\n`service/impl.go` 的 `WriteBatch` 会使用本模块的类型：\n\n- `WriteBatchSource`\n- `BatchRecord`\n- `ObjectRecord`\n\nRPC 层负责从 thrift 请求里提取字段，例如 `reader_id`，并把 handler 返回的 `WriteBatchResult` 转成 thrift response。业务规则集中在 `writer` 包内，避免 RPC 生成代码泄漏到核心写入逻辑。\n\n### bucket 写入与排序链路\n\n`HandleWriteBatch` 不直接排序、不直接落盘。它把数据交给每个 `WriterCtx`：\n\n```go\nctx.AppendBatch(rows)\n```\n\n后续由 `WriterCtx` 内部操作队列和 worker 处理：\n\n- `AppendBatch`\n- `submitOp`\n- `initWorker`\n- `runLoop`\n- `handleOp`\n- `handleAppend`\n- `SpillRun`\n- `RequestFinalize`\n\n`ObjectRecord.StoreURI` 在 `handleAppend` 中复制到 arena，然后进入 chunk、spill run、最终 merge 流程。\n\n### 生命周期\n\n`HandleWriteBatch` 调用 `w.touchWriteBatch()`，用于记录最近一次写入时间。生命周期测试 `TestWriterLifecycle_IdleAbortBeforeFinalize` 依赖该行为：如果没有写入且未进入 finalize，Writer 可以因空闲超时退出。\n\n`HandleMarkBucketDone` 调用 `w.markFinalizeStarted()`，用于告诉生命周期流程 Writer 已进入 finalize 阶段。`TestWriterLifecycle_AutoShutdownAfterAllBucketsMarkedDone` 覆盖了所有 bucket 标记完成后自动结束的行为。\n\n## 测试覆盖\n\n本模块的关键行为由单元测试和 RPC 集成测试共同覆盖。\n\nCPU 反压相关测试集中在 `writer/handlers_cpu_backpressure_test.go`：\n\n- `TestHandleWriteBatchReturnsBackPressureWhenCPUUsageHigh`\n- `TestHandleWriteBatchSkipsCPUBackPressureForAckedRetry`\n- `TestNormalizeCPUUsagePercent`\n- `TestCPUBackPressureGuardCheckIgnoresAbnormalHighSample`\n- `TestCPUBackPressureGuardRequiresConsecutiveHighSamples`\n- `TestCPUBackPressureGuardRequiresConsecutiveLowSamplesToExit`\n- `TestCPUBackPressureGuardLowStreakResetByHighSample`\n\nRPC 和端到端行为在 `writer/handlers_rpc_integration_test.go` 中覆盖：\n\n- `TestWriterServiceRPC_WriteBatchAndMarkDone`：通过 RPC 写入、flush、mark done，并校验最终输出排序去重。\n- `TestWriterLifecycle_AutoShutdownAfterAllBucketsMarkedDone`：所有 bucket 完成后生命周期正常退出。\n- `TestWriterLifecycle_IdleAbortBeforeFinalize`：无写入时空闲退出。\n- `TestWriterServiceRPC_SourcePartFileBatchedToLocalOutput`：大输入文件分批写入本地输出。\n- `TestWriterServiceRPC_WriteBatchToHDFSDatePartition`：写入 HDFS 分区并校验 Parquet 输出头。\n\n内存和多 bucket 压测在 `writer/local_hdfs_memory_integration_test.go` 中实现，主要用于观察 `WriteBatch -> AppendBatch -> finalize` 在不同 bucket 数和数据规模下的内存表现。\n\n## 贡献注意事项\n\n修改 `HandleWriteBatch` 时需要保持以下语义：\n\n- `ReaderID` 为空必须返回 `ErrMissingReaderID`。\n- `seqNo <= ackSeqNo` 的请求必须快速成功返回，不能重复追加，也不应被 CPU 反压阻断。\n- 只有整个 batch 内所有 bucket 都 `AppendBatch` 成功后，才能调用 `w.updateAck`。\n- bucket 归属必须在追加前完成校验，避免部分写入到错误实例。\n- handler 不应等待 finalize merge 等慢操作完成。\n- 反压错误必须包装 `ErrBackPressure`，保证调用方可以用 `errors.Is` 判断。\n- CPU 采样失败只应降级为日志，不应直接拒绝写入请求。\n\n修改 CPU 反压逻辑时，需要特别关注迟滞计数和异常尖刺样本处理。单点高 CPU 样本不应立刻进入反压，反压状态也不应因为单点低样本立即退出。","writer-orchestration":"# Writer Orchestration\n\n## 模块职责\n\n`writer/writer.go` 定义 Writer FaaS 实例的编排层。它不直接实现 RPC handler、外排序或 Parquet 写入细节，而是负责把这些能力组装成一个可启动、可收尾、可上报状态的运行时对象：`Writer`。\n\n核心职责包括：\n\n- 为 `cfg.BucketIDs` 中的每个 bucket 创建并持有一个 `*WriterCtx`。\n- 初始化最终输出通道 `FinalOutputSink`、HDFS 文件系统、CPU 反压守卫、Router 注册器和控制面客户端。\n- 启动 RPC server，注册 bucket 到 Router，并启动心跳与进度上报。\n- 在关闭时触发所有 bucket 的 `FinalizeMerge()`，汇总成功和失败结果。\n- 维护 worker 级别状态、bucket 进度快照、自动退出信号和空闲中止信号。\n- 为 RPC handler 提供 bucket 查找、幂等 ack、停止状态、告警等辅助能力。\n\n## 主要类型\n\n### `Writer`\n\n`Writer` 是模块的中心运行时句柄。它聚合以下状态和组件：\n\n- `cfg *config.Config`：Writer 的完整配置。\n- `bucketCtx map[int32]*WriterCtx`：bucket 到 `WriterCtx` 的映射。\n- `mergeSlots chan struct{}`：限制并发 merge/finalize 数量，容量来自 `cfg.Sort.MaxConcurrentMerges`。\n- `spillSlots chan struct{}`：限制并发 spill 数量，容量由 `defaultMaxConcurrentSpills()` 根据 bucket 数和 CPU limit 计算。\n- `router *router.Registrar`：向 Redis 注册当前 Writer 负责的 bucket endpoint。\n- `cpClient controlPlaneReporter`：控制面心跳、进度、最终状态和告警上报接口。\n- `server RPCServer`：RPC server 抽象，避免 `writer` 包与 service 层循环依赖。\n- `idem map[string]int64`：按 source 记录已确认的最大 ack，用于 handler 侧幂等处理。\n- `finalSink FinalOutputSink`、`hdfsFS *hdfs.FileSystem`：最终输出写入能力。\n- `cpuGuard cpuBackPressureGuard`：CPU 反压检测。\n- `autoShutdownCh`：所有 bucket 完成后关闭，供生命周期层自动退出。\n- `idleAbortCh`：长时间未收到 `WriteBatch` 且尚未进入 finalize 时关闭，供生命周期层中止实例。\n\n`Writer` 的公共方法是生命周期和上层集成的主要入口：\n\n- `New(ctx, cfg)`：构造 Writer。\n- `AttachRPCServer(server)`：挂载 RPC server。\n- `Start(ctx)`：启动服务、注册路由、启动控制面上报。\n- `Shutdown(ctx)`：优雅 finalize 并关闭依赖。\n- `AbortWithoutFinalize(ctx)`：不做 merge/finalize，直接失败退出。\n- `AutoShutdownCh()` / `IdleAbortCh()`：暴露生命周期信号。\n- `SendAlert(ctx, kind, message)`：向控制面发送告警。\n\n### `RPCServer`\n\n`RPCServer` 是本模块对 RPC server 的最小依赖接口：\n\n```go\ntype RPCServer interface {\n\tStart(context.Context) error\n\tStop(context.Context) error\n\tAddr() string\n}\n```\n\n`Writer.Start()` 只依赖这三个方法：先启动 server，再读取真实监听地址 `Addr()`，随后把 endpoint 写入 Router 和本地 endpoint 文件。\n\n### `controlPlaneReporter`\n\n`controlPlaneReporter` 抽象控制面客户端能力：\n\n```go\ntype controlPlaneReporter interface {\n\tSetJobID(controlplane.JobIDProvider)\n\tStartHeartbeat(context.Context) error\n\tStartProgressReport(context.Context, controlplane.ProgressCollector) error\n\tFlushFinalProgress(context.Context, controlplane.ProgressSnapshot) error\n\tSendAlert(context.Context, controlplane.AlertPayload) error\n\tStop(context.Context) error\n}\n```\n\n生产路径中，`Start()` 通过 `controlplane.New()` 创建具体客户端，并把 `w.collectProgressSnapshot` 注册为进度采集函数。\n\n## 生命周期流程\n\n```mermaid\nflowchart TD\n    A[\"New：构造 Writer\"] --> B[\"AttachRPCServer：挂载 RPC server\"]\n    B --> C[\"Start：创建目录并准备输出路径\"]\n    C --> D[\"启动 RPC server\"]\n    D --> E[\"Router 注册 bucket endpoint\"]\n    E --> F[\"控制面心跳与进度上报\"]\n    F --> G{\"运行中\"}\n    G --> H[\"所有 bucket Done\"]\n    G --> I[\"WriteBatch 空闲超时\"]\n    G --> J[\"外部关闭\"]\n    H --> K[\"AutoShutdownCh 关闭\"]\n    I --> L[\"IdleAbortCh 关闭\"]\n    J --> M[\"Shutdown：FinalizeMerge 并提交\"]\n    L --> N[\"AbortWithoutFinalize：失败退出\"]\n```\n\n## 构造阶段：`New`\n\n`New(ctx, cfg)` 只完成对象构造和本地依赖初始化，不启动后台协程，也不对外暴露服务。\n\n它的关键步骤：\n\n1. 校验 `cfg` 非空、`cfg.BucketIDs` 非空。\n2. 初始化 `Writer` 的基础字段：\n   - `bucketCtx`\n   - `mergeSlots`\n   - `spillSlots`\n   - `router.New(&cfg.Router, \"\", cfg.BucketIDs)`\n   - `idem`\n   - `autoShutdownCh`\n   - `idleAbortCh`\n   - 默认 `writeBatchIdleTimeout`\n3. 调用 `touchWriteBatch()` 初始化最近写入时间，避免刚启动就被 idle watcher 误判。\n4. 调用 `newFinalOutputSink(cfg)` 初始化最终输出 sink 和 HDFS 文件系统。\n5. 调用 `newCPUBackPressureGuard(ctx, cfg.Sort.CPUBackPressureThresholdPercent)` 初始化 CPU 反压守卫。\n6. 为每个 bucket 创建 `WriterCtx`：\n   - `LocalTmpDir` 使用 `${cfg.Sort.LocalTmpDir}/${cfg.JobID}/${cfg.Service.WriterID}/${bucketID}/`。\n   - `chunk` 使用 `newChunkSlot(chunkCap)` 预热。\n   - `spareSlots` 预留一个备用 chunk。\n   - `spillTriggerRecords` 使用 `spreadSpillTriggerRecords()` 做轻微错峰。\n   - 注入 spill/finalize slot 的 acquire/release 回调。\n   - 注入 `onStatusChange: w.handleBucketStatusChange`。\n7. 调用每个 `WriterCtx` 的 `initWorker()`。\n8. 将 worker 状态设置为 `controlplane.WorkerStateRunning`。\n\n`spreadSpillTriggerRecords(baseRecords, bucketIndex, bucketCount)` 的作用是把多个 bucket 的 spill 触发点分散在 `baseRecords` 的 90% 到 100% 区间，降低所有 bucket 同时达到阈值造成的 IO 峰值。\n\n`defaultMaxConcurrentSpills(ctx, bucketCount)` 会读取 `resolveCPULimitCores(ctx)`，默认并发 spill 数约为 CPU limit 的一半，并受 bucket 数约束，最后额外加 1。\n\n## 启动阶段：`Start`\n\n`Start(ctx)` 将构造好的 Writer 变成可服务状态。启动顺序刻意保证“本地和外部依赖准备好之后再注册路由”。\n\n执行顺序：\n\n1. 为每个 `WriterCtx.LocalTmpDir` 调用 `os.MkdirAll()`。\n2. 调用 `prepareOutputPaths()` 准备最终输出目录和临时目录。\n3. 校验 `w.server` 已通过 `AttachRPCServer()` 挂载。\n4. 调用 `w.server.Start(ctx)` 启动 RPC server。\n5. 读取 `w.server.Addr()`，保存为 `w.endpoint`。\n6. 调用 `w.router.SetEndpoint(w.endpoint)`。\n7. 调用 `w.router.Register(ctx)` 把 bucket endpoint 注册到 Router。\n8. 调用 `writeEndpointFile()` 在本地写入 endpoint 文件。\n9. 通过 `controlplane.New()` 初始化控制面客户端。\n10. 调用 `SetJobID()`、`StartHeartbeat()`、`StartProgressReport()`。\n11. 启动 `watchWriteBatchIdle(ctx)` 后台协程。\n\n如果 RPC server 启动成功但 Router 注册失败，`Start()` 会调用 `w.server.Stop(ctx)` 尝试回滚监听状态，然后返回错误。\n\n### 输出路径准备：`prepareOutputPaths`\n\n`prepareOutputPaths()` 根据 `cfg.HDFS.Enabled` 选择路径准备方式：\n\n- HDFS 模式：\n  - 要求 `w.hdfsFS` 非空。\n  - 如果 `cfg.HDFS.SkipStartupCheck` 为 true，只打印 warn 日志并跳过目录创建。\n  - 否则调用 `mkdirAllHDFS()` 创建 `cfg.HDFSRootPath` 和 `cfg.HDFSTempDir`。\n- 本地模式：\n  - 使用 `os.MkdirAll()` 创建 `cfg.HDFSRootPath` 和 `cfg.HDFSTempDir`。\n\n当前测试 `TestPrepareOutputPaths_SkipHDFSStartupCheck` 覆盖了 HDFS 启用且跳过启动检查的路径，确保该模式不会尝试访问真实 HDFS。\n\n## 运行期状态与信号\n\n### bucket 查找\n\n`bucket(bucketID)` 在读锁下从 `bucketCtx` 取出 `*WriterCtx`。RPC handler 通常通过它判断当前 Writer 是否负责某个 bucket。\n\n### 幂等 ack\n\n`currentAck(source)` 和 `updateAck(source, ack)` 维护 `idem map[string]int64`：\n\n- `currentAck(source)` 返回当前 source 已确认的最大 ack。\n- `updateAck(source, ack)` 只在新 ack 更大时更新。\n\n这组方法本身不处理 RPC 请求，它们为 handler 层实现 `WriteBatch` 重试幂等提供共享状态。\n\n### worker 状态\n\n`setWorkerStatus(status, errorMessage)` 负责更新 worker 状态，并带有两个保护规则：\n\n- 如果当前状态已经是 `WorkerStateDone`，后续更新被忽略。\n- 如果当前状态已经是 `WorkerStateFailed`，除非新状态仍是 failed，否则不会被覆盖。\n\n这避免了完成态和失败态被后续异步上报回调误改。\n\n`workerSnapshot()` 在读锁下返回当前 worker 状态和错误信息。\n\n### 自动退出\n\n`handleBucketStatusChange(bucketID, status)` 是 `WriterCtx` 状态变化回调。它处理三件事：\n\n- bucket failed 时，将 worker 标记为 `WorkerStateFailed`。\n- bucket done 时，调用 `triggerAutoShutdown()` 检查是否所有 bucket 都已完成。\n- 如果控制面客户端已初始化，异步调用 `FlushFinalProgress()` 上报该 bucket 的最新快照。\n\n`triggerAutoShutdown()` 会遍历所有 bucket 的 `Snapshot()`。只有当所有 bucket 状态都是 `BucketStatusDone` 时，才会通过 `autoShutdownOnce` 关闭 `autoShutdownCh`。\n\n生命周期层通过 `AutoShutdownCh()` 获取这个信号；调用关系中 `lifecycle.Run` 会监听它并进入关闭流程。\n\n### 空闲中止\n\n`watchWriteBatchIdle(ctx)` 用于检测 Writer 长时间未收到 `WriteBatch` 的异常情况。它会定期检查：\n\n- context 是否结束。\n- Writer 是否已经 stopping。\n- finalize 是否已经开始。\n- 距离最近一次 `touchWriteBatch()` 是否超过 `writeBatchIdleTimeout`。\n\n如果超过阈值，它会打印 warn 日志并调用 `triggerIdleAbort()` 关闭 `idleAbortCh`。生命周期层通过 `IdleAbortCh()` 接收该信号，并调用 `AbortWithoutFinalize(ctx)`。\n\n`SetWriteBatchIdleTimeoutForTest(timeout)` 只用于测试缩短 idle 超时时间；生产默认值是 `defaultWriteBatchIdleTimeout`，即 40 分钟。\n\n## 关闭流程：`Shutdown`\n\n`Shutdown(ctx)` 是正常收尾路径，会尝试 finalize 所有 bucket 并提交最终输出。\n\n执行步骤：\n\n1. 在锁内设置 `w.stopping = true`，让后续请求或后台检查看到停止状态。\n2. 调用 `w.router.Deregister(ctx)` 注销 Router。\n3. 为 `bucketCtx` 中每个 bucket 启动 goroutine，调用 `ctx.FinalizeMerge()`。\n4. 等待所有 finalize 完成，并汇总结果：\n   - 无错误的 bucket 加入 `committed`。\n   - 有错误的 bucket 加入 `failed`，错误通过 `errors.Join()` 汇总。\n5. 如果存在失败 bucket 或汇总错误，将 worker 标记为 `WorkerStateFailed`；否则标记为 `WorkerStateDone`。\n6. 调用 `w.server.Stop(ctx)` 停止 RPC server。\n7. 调用 `w.cpClient.FlushFinalProgress(ctx, w.collectProgressSnapshot())` 上报最终快照。\n8. 调用 `w.cpClient.Stop(ctx)` 停止控制面客户端。\n9. 关闭 `w.hdfsFS`。\n10. 停止 `w.cpuGuard`。\n11. 返回 `committed`、`failed` 和汇总错误。\n\n需要注意的是，`Shutdown()` 本身没有直接使用 `mergeSlots`。并发限制是通过 `WriterCtx` 持有的 `acquireFinalizeSlot` / `releaseFinalizeSlot` 回调在 `FinalizeMerge()` 内部执行。\n\n## 非 finalize 中止：`AbortWithoutFinalize`\n\n`AbortWithoutFinalize(ctx)` 用于 idle abort 等不能继续等待数据的路径。它不会调用 `WriterCtx.FinalizeMerge()`，也不会提交最终输出。\n\n它的行为是：\n\n1. 设置 `w.stopping = true`。\n2. 将 worker 状态设置为 `WorkerStateFailed`，错误信息为 `writebatch idle timeout before finalize`。\n3. 注销 Router。\n4. 停止 RPC server。\n5. 上报最终进度并停止控制面客户端。\n6. 关闭 HDFS 文件系统。\n7. 停止 CPU 反压守卫。\n8. 返回过程中收集到的错误。\n\n这个路径适合“尚未进入 finalize，且 Writer 已经异常长时间没有收到写入”的场景，避免生成不完整的最终数据。\n\n## 进度采集与控制面集成\n\n`collectBucketProgress()` 会遍历所有 `WriterCtx`，调用每个 bucket 的 `Snapshot()`，转换为 `controlplane.BucketProgress`。\n\n采集字段包括：\n\n- `BucketID`\n- `Status`\n- `TotalUrisReceived`\n- `BytesReceived`\n- `RunFilesGenerated`\n- `PeakLocalDiskUsageMb`\n- `MergeProgress`\n- `HDFSWriteProgress`\n- `FinalParquetPath`\n- `FinalByteSize`\n- `LastUpdateTime`\n\n`collectProgressSnapshot()` 在 bucket 进度之外补充 worker 级别状态，返回 `controlplane.ProgressSnapshot`。\n\n`collectBucketProgressForID(bucketID)` 只采集单个 bucket，用于 `handleBucketStatusChange()` 中的即时上报。\n\n`SendAlert(ctx, kind, message)` 是生命周期层、panic recover 等上层逻辑发送告警的出口。它构造 `controlplane.AlertPayload`，填入 `WriterID`、`Kind`、`Message` 和当前 UTC 时间。若 `cpClient` 尚未初始化，则直接返回 nil。\n\n## 与代码库其他模块的连接\n\n`writer` 编排层处在主入口、生命周期层、RPC handler、Router、控制面和存储层之间。\n\n- `main.go` 和 `cmd/writer_server/main.go` 调用 `writer.New()` 创建 Writer。\n- `lifecycle.Run` 调用 `AttachRPCServer()`、`Start()`、`Shutdown()`、`AbortWithoutFinalize()`，并监听 `AutoShutdownCh()` 与 `IdleAbortCh()`。\n- RPC handler 通过 `bucket()`、`currentAck()`、`updateAck()`、`isStopping()` 等方法访问运行期状态。\n- `router.New()` 创建的 `router.Registrar` 负责 Redis 注册和注销。\n- `controlplane.New()` 创建控制面客户端，用于心跳、周期进度、最终进度和告警。\n- `newFinalOutputSink()`、`mkdirAllHDFS()` 和 `hdfs.FileSystem` 连接最终输出路径。\n- `newCPUBackPressureGuard()` 和 `resolveCPULimitCores()` 提供 CPU 反压与并发度计算依据。\n- `WriterCtx` 承担单 bucket 的数据缓冲、spill、merge、最终写入和状态快照；`Writer` 只负责创建、持有和协调它们。\n\n## 贡献时需要注意的边界\n\n`Writer` 是编排层，不应把单 bucket 的排序、run 文件格式、merge 算法或 Parquet 写入细节直接塞进 `writer.go`。这些逻辑应继续放在 `WriterCtx`、final sink 或相关存储实现中。\n\n新增启动依赖时，应接入 `Start()` 的顺序控制，并确保失败时能清理已经启动的组件。新增关闭依赖时，应同时考虑 `Shutdown()` 和 `AbortWithoutFinalize()` 两条路径。\n\n修改 worker 状态时，应保留 `setWorkerStatus()` 的单向状态保护，避免异步回调把 done 或 failed 状态覆盖成 running。\n\n新增进度字段时，需要同时更新 `WriterCtx.Snapshot()` 的返回值、`collectBucketProgress()`、`collectBucketProgressForID()` 以及控制面结构体映射。\n\n修改 idle abort 行为时，需要确认 `touchWriteBatch()` 的调用点能准确代表“收到有效 WriteBatch”，并确认 finalize 开始后不会再触发 idle abort。","writer-rpc-service":"# Writer RPC Service\n\n## 模块定位\n\n`service` 包是 Writer 服务的 RPC 适配层，负责把 KiteX 生成代码暴露出的 `WriterService` 接口接到 `writer.Writer` 的业务处理方法上。它本身不实现写入、分片、落盘或状态推进逻辑，只做三件事：\n\n1. 启动和停止 KiteX server。\n2. 将 Thrift 请求对象转换为 `writer` 包内部的数据结构。\n3. 将 `writer` 返回的错误转换为 `uri_writer.ErrorCode` 和响应对象。\n\n核心代码分布在：\n\n- `service/impl.go`：实现 RPC handler。\n- `service/server.go`：封装 KiteX server 生命周期。\n- `service/doc.go`：说明本包作为 KiteX 生成代码与业务实现之间的薄适配层。\n\n## 架构关系\n\n```mermaid\nflowchart TD\n    A[\"cmd/writer_server/main.go\"] --> B[\"lifecycle.Run\"]\n    B --> C[\"service.NewServer\"]\n    C --> D[\"WriterServiceImpl\"]\n    C --> E[\"writerservice.NewServerWithBytedConfig\"]\n    E --> F[\"KiteX Server\"]\n    F --> D\n    D --> G[\"writer.Writer\"]\n```\n\n`service.NewServer` 在生命周期入口中被调用，接收全局 `config.Config` 和已构造好的 `writer.Writer`。随后 `Server.Start` 创建监听端口，并通过 `writerservice.NewServerWithBytedConfig` 把 `WriterServiceImpl` 注册到 KiteX server。\n\n## Server 生命周期\n\n`Server` 是对 KiteX server 的轻量封装：\n\n```go\ntype Server struct {\n    cfg      *config.Config\n    impl     *WriterServiceImpl\n    listener net.Listener\n    server   kitexserver.Server\n    addr     string\n}\n```\n\n### 创建服务\n\n`NewServer(cfg *config.Config, w *writer.Writer) *Server` 会构造 `Server`，并通过 `NewWriterServiceImpl(w)` 创建 RPC 实现对象。\n\n调用链为：\n\n```text\nlifecycle.Run\n  -> service.NewServer\n    -> service.NewWriterServiceImpl\n```\n\n### 启动服务\n\n`Start(ctx context.Context) error` 负责完成监听和 KiteX server 启动。\n\n启动流程如下：\n\n1. 如果 `s.server != nil`，直接返回，保证重复调用不会重复启动。\n2. 从 `s.cfg.Service.Port` 读取端口。\n3. 如果端口大于 0，监听 `0.0.0.0:<port>`；否则监听 `0.0.0.0:0`，由系统分配随机端口。\n4. 通过 `envutil.IPStr()` 获取本机 IP；如果为空，回退到 `s.cfg.Service.IP`；仍为空则使用 `127.0.0.1`。\n5. 设置 `s.addr = net.JoinHostPort(ip, actualPort)`，供测试或注册逻辑读取。\n6. 创建 ByteDance KiteX server 配置，关闭 `DebugConfig.Enable`。\n7. 调用 `writerservice.NewServerWithBytedConfig(s.impl, serverCfg, cwgserver.WithListener(l))` 创建 server。\n8. 在 goroutine 中执行 `s.server.Run()`。\n9. 等待三种结果之一：\n   - `ctx.Done()`：返回上下文错误。\n   - `s.server.Run()` 立即返回：返回该错误。\n   - 经过 `200ms`：认为 server 已启动，返回 `nil`。\n\n`Start` 不阻塞到服务退出，而是等待一个很短的启动窗口。这使得上层生命周期可以继续执行后续逻辑，集成测试也可以在启动后通过 `Addr()` 取得真实监听地址。\n\n### 停止服务\n\n`Stop(ctx context.Context) error` 会停止 KiteX server 并关闭监听器：\n\n```go\nerr := s.server.Stop()\ns.server = nil\nif s.listener != nil {\n    _ = s.listener.Close()\n    s.listener = nil\n}\nreturn err\n```\n\n当前实现没有使用传入的 `ctx`，只是保留了生命周期接口形态。\n\n### 获取地址\n\n`Addr() string` 返回 `Start` 过程中计算出的 `s.addr`。该地址用于集成测试和外部注册流程，例如：\n\n- `writer/handlers_rpc_integration_test.go`\n- `writer/waiting_server_integration_test.go`\n- `writer/local_hdfs_memory_integration_test.go`\n\n## RPC 实现对象\n\n`WriterServiceImpl` 是 KiteX handler 的实际实现：\n\n```go\ntype WriterServiceImpl struct {\n    w *writer.Writer\n}\n```\n\n它持有一个 `*writer.Writer`，所有业务请求都会转发到该对象。\n\n构造函数：\n\n```go\nfunc NewWriterServiceImpl(w *writer.Writer) *WriterServiceImpl {\n    return &WriterServiceImpl{w: w}\n}\n```\n\n当前实现了三个 RPC 方法：\n\n- `WriteBatch`\n- `MarkBucketDone`\n- `Flush`\n\n这些方法返回的 Go `error` 通常为 `nil`。业务错误通过响应体中的 `ErrorCode` 和 `Message` 表达，符合 Thrift RPC 常见模式：RPC 层成功返回，但业务层可能失败。\n\n## WriteBatch 请求处理\n\n`WriteBatch(ctx, req)` 是主要写入入口，负责把 `uri_writer.WriteBatchRequest` 转换为 `writer.Writer.HandleWriteBatch` 所需的内部结构。\n\n核心流程：\n\n```mermaid\nflowchart TD\n    A[\"WriteBatch 请求\"] --> B[\"读取 Base.Extra.reader_id\"]\n    B --> C{\"reader_id 是否存在\"}\n    C -- \"否\" --> D[\"返回 FATAL_ERROR\"]\n    C -- \"是\" --> E[\"统计对象总数\"]\n    E --> F[\"AcquireBatch / AcquireObjects\"]\n    F --> G[\"转换 BatchRecord 和 ObjectRecord\"]\n    G --> H[\"writer.HandleWriteBatch\"]\n    H --> I[\"映射 ErrorCode\"]\n    I --> J[\"返回 WriteBatchResponse\"]\n```\n\n### 请求来源信息\n\n`WriteBatch` 会从 `req.Base.Extra[\"reader_id\"]` 中读取 reader 标识：\n\n```go\nconst requestExtraReaderID = \"reader_id\"\n```\n\n读取结果写入：\n\n```go\nsrc := writer.WriteBatchSource{}\nsrc.ReaderID = req.Base.Extra[requestExtraReaderID]\n```\n\n如果 `ReaderID` 为空，方法会直接返回：\n\n```go\n&uri_writer.WriteBatchResponse{\n    ErrorCode: uri_writer.ErrorCode_FATAL_ERROR,\n    Message:   strPtr(\"reader_id is required\"),\n    AckSeqNo:  0,\n}\n```\n\n这意味着 RPC 调用方必须在 `Base.Extra` 中携带 `reader_id`。该字段不是可选业务字段，而是服务端识别写入来源的必要信息。\n\n### 批量数据转换\n\n`WriteBatch` 会先统计所有 record 中的对象总数：\n\n```go\ntotalObjs := 0\nfor _, record := range req.Batch {\n    totalObjs += len(record.Objects)\n}\n```\n\n随后通过 `writer` 包的对象池申请复用切片：\n\n```go\nbatch := writer.AcquireBatch(len(req.Batch))\nobjectsBuf := writer.AcquireObjects(totalObjs)\ndefer writer.ReleaseBatch(batch)\ndefer writer.ReleaseObjects(objectsBuf)\n```\n\n转换时，`req.Batch` 中每个 Thrift record 会变成一个 `writer.BatchRecord`；每个 Thrift object 会变成一个 `writer.ObjectRecord`：\n\n```go\nobjects[i] = writer.ObjectRecord{\n    StoreURI:        object.StoreUri,\n    Size:            object.Size,\n    StorageClass:    object.StorageClass,\n    ContentType:     object.ContentType,\n    Vid:             object.Vid,\n    Oid:             object.Oid,\n    CreateTimestamp: object.CreateTimestamp,\n}\n```\n\n需要注意的是，`objectsBuf` 是一次性申请的大切片。每个 `BatchRecord.Objects` 都是这块缓冲区上的连续分片：\n\n```go\nobjects := objectsBuf[objCursor : objCursor+numObjs]\nobjCursor += numObjs\n```\n\n因此，`writer.HandleWriteBatch` 不应在返回后继续持有这些切片引用；因为 `WriteBatch` 返回前会通过 `defer` 释放到对象池。\n\n### 调用业务层\n\n转换完成后，RPC 层调用：\n\n```go\nresult, err := s.w.HandleWriteBatch(ctx, src, req.SeqNo, batch)\n```\n\n参数含义：\n\n- `ctx`：RPC 请求上下文。\n- `src`：请求来源，目前主要包含 `ReaderID`。\n- `req.SeqNo`：调用方传入的序列号。\n- `batch`：转换后的内部批量记录。\n\n响应中的 `AckSeqNo` 来自 `result.AckSeqNo`。即使业务层返回错误，当前实现也会把 `result.AckSeqNo` 放入响应，方便调用方理解服务端已确认到哪个序列号。\n\n### 错误映射\n\n`WriteBatch` 将业务错误映射为 Thrift error code：\n\n```go\ncode := uri_writer.ErrorCode_RETRYABLE_ERROR\nif errors.Is(err, writer.ErrMissingReaderID) {\n    code =
