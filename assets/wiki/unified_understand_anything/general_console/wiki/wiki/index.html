nfSec token。\n5. 调用 `buildQueryJobConf` 构造 TQS job conf。\n\n离线队列配置要求 `YarnClusterName` 和 `MapReduceJobQueueName` 必须同时配置或同时为空。只配置其中一个会返回错误：\n\n```text\ninvalid tqs queue config: YarnClusterName and MapReduceJobQueueName must be configured together\n```\n\n`buildQueryJobConf` 总是注入 `tqs.inf.sec.token`。如果配置了完整离线队列，还会注入：\n\n- `yarn.cluster.name`\n- `mapreduce.job.queuename`\n\n## SQL 构造规则\n\n`buildTQSHiveVIDSQL` 生成形如：\n\n```sql\nSELECT `vid` FROM `database`.`table` WHERE `date` = '2026-07-15' AND `region` = 'cn' LIMIT 1\n```\n\n构造规则：\n\n- 只查询 `vid` 列。\n- `Database`、`Table`、过滤字段名都通过 `quoteTQSIdentifier` 处理。\n- `Partitions` 和 `ExtraFilters` 都转换为等值谓词。\n- 谓词 key 会排序，保证 SQL 输出稳定。\n- 字符串值通过 `quoteTQSStringLiteral` 转义单引号。\n- `Limit > 0` 时追加 `LIMIT`。\n- `Limit < 0` 会返回错误。\n\n`quoteTQSIdentifier` 只允许匹配正则 `^[A-Za-z_][A-Za-z0-9_]*$` 的标识符，并使用反引号包裹。这意味着不支持带点号、连字符、空格或表达式的字段名。这个限制用于避免把外部输入拼接成任意 SQL 片段。\n\n## DryRun 预检查\n\nDryRun 路径调用 `runHiveImportDryRunPrecheck`，内部执行：\n\n```go\nsvr.getHiveVIDReader().PrecheckVIDs(ctx, HiveVIDReadRequest{\n    Cluster:      normalized.hiveTable.Cluster,\n    Database:     normalized.hiveTable.Database,\n    Table:        normalized.hiveTable.Table,\n    Partitions:   normalized.hiveTable.Partitions,\n    ExtraFilters: normalized.hiveTable.ExtraFilters,\n    Limit:        1,\n})\n```\n\n`TQSHiveVIDReader.PrecheckVIDs` 会使用 `CreateQueryJob(ctx, query, true, false, conf)` 创建 dry-run TQS job，然后调用 `waitForTQSAnalyze` 等待分析完成。\n\n`waitForTQSAnalyze` 的超时时间最多为 `defaultTQSPrecheckTimeout`，即 10 秒。即使 reader 配置了更长的 `Timeout`，预检查也会被限制在 10 秒内。\n\n## TQS 正式读取\n\n`TQSHiveVIDReader.ReadVIDs` 的流程是：\n\n1. `prepareTQSQueryJob` 构造 SQL、client 和 conf。\n2. `CreateQueryJob(ctx, query, false, false, conf)` 创建正式查询。\n3. `waitForTQSJob` 轮询 job 状态。\n4. `FetchQueryResults` 拉取结果。\n5. `buildHiveVIDReadResultFromTQSRows` 解析 VID 行。\n\n`waitForTQSJob` 使用 `r.conf.timeout` 作为整体等待超时。轮询过程中：\n\n- `STATUS_COMPLETE`：成功返回。\n- `STATUS_ANALYSIS_FAIL`、`STATUS_CANCEL`、`STATUS_FAIL`：转换为 `tqsReadError`。\n- 等待被取消或超时：调用 `CancelJob(context.Background(), jobID)` 尝试取消 TQS job。\n\n## TQS 结果解析\n\n`buildHiveVIDReadResultFromTQSRows` 将 TQS 返回的 `[][]string` 转成 `HiveVIDReadResult`。\n\n解析规则：\n\n- 空结果返回空 `Rows`。\n- 如果第一行包含大小写不敏感的 `vid` 表头，则跳过表头，并按表头位置读取 VID。\n- 如果第一行没有 `vid` 表头且列数大于 1，返回 `tqs query results missing vid column`。\n- 如果第一行没有表头且只有一列，则按单列 VID 数据处理。\n- 空行会生成只有 `RowNumber` 的 `HiveVIDRow`，后续会在 `buildHiveImportResults` 中变成 `empty_vid`。\n- `RowNumber` 使用 TQS 结果中的 1 基行号，包括表头行占位。\n\n## 错误处理与敏感信息清理\n\nTQS 读取错误统一用 `tqsReadError` 表达。它携带：\n\n- `stage`\n- `jobID`\n- `status`\n- `detail`\n- `cause`\n\n`Error()` 输出会经过 `sanitizeTQSErrorDetail` 清理，避免日志或 API 错误里泄漏敏感信息。清理规则包括：\n\n- 替换 JWT 形态的字符串为 `[REDACTED_JWT]`。\n- 替换 `SEC_TOKEN_STRING`、`tqs.inf.sec.token`、`AppKey` 等敏感关键字。\n- 替换形如 `app_key=...`、`sec_token_string:...`、`tqs.inf.sec.token=...` 的赋值片段。\n- 错误详情最多保留 `maxTQSReadErrorDetailSize` 个 rune，超出后追加 `...(truncated)`。\n\nTQS job 失败时，`buildTQSJobFailedError` 会从 `JobStatus.Progress` 中提取错误详情。`extractTQSJobErrorDetail` 支持以下 JSON 字段：\n\n- `extraInfo`\n- `message`\n- `error`\n- `detail`\n- `reason`\n\n## 与服务初始化的关系\n\n调用图显示 `NewGeneralConsoleServer` 会调用 `NewTQSHiveVIDReaderFromConfig`。因此该模块的生产可用性依赖服务初始化时是否提供了有效的 `config.TQSConfig`。\n\n如果配置不完整，`NewTQSHiveVIDReaderFromConfig` 返回 `nil`，后续 `getHiveVIDReader` 会退回到 `notConfiguredHiveVIDReader`，导入或 DryRun 会失败并提示 reader 未配置。\n\n## 可测试性与注入点\n\n模块为测试和替换实现保留了多个注入点：\n\n- `svr.hiveVIDReader`：替换 Hive 读取实现。\n- `svr.hiveImportAsyncRunner`：控制后台任务执行方式，测试中可同步执行。\n- `svr.mdapSourceBatchPreparer`：替换资产组准备逻辑。\n- `svr.mdapSourceBatchCreator`：替换批量创建逻辑。\n- `TQSHiveVIDReader.newClient`：替换 TQS client 创建。\n- `TQSHiveVIDReader.getToken`：替换 InfSec token 获取。\n- `TQSHiveVIDReader.sleep`：替换轮询 sleep，避免测试真实等待。\n\n相关测试覆盖了请求校验、DryRun、后台上下文、Hive 行分类、不去重行为、SQL 构造、TQS token 注入、队列配置校验、TQS 失败详情提取和结果解析等场景。\n\n## 开发注意事项\n\n修改该模块时需要特别注意以下行为契约：\n\n- Hive 导入读取的列名固定为 `vid`。\n- 非 DryRun 要求 `AssetGroupID`、`VODSpaces` 和 `HiveTable.Partitions` 非空。\n- DryRun 只做 TQS 分析预检查，不返回样例 VID。\n- 后台导入使用独立 `context.Background()`，不会因 HTTP 请求结束而取消。\n- 重复 VID 会计入 `DuplicateVIDRows`，但仍会提交给批量创建。\n- 空 VID 行不会提交创建，状态为 `invalid`。\n- 默认 `SkipCheckMediaType` 为 `true`。\n- 默认批量创建时 `dedupeIdenticalSources` 为 `false`。\n- TQS SQL 标识符只支持简单安全标识符，不能传表达式或复杂字段路径。\n- TQS 错误信息必须继续经过 `sanitizeTQSErrorDetail`，避免泄漏 token、AppKey 或 JWT。","mdap-processing-tasks":"# MDAP Processing Tasks\n\n## 模块概览\n\n`biz/handler/mdap_processing_task.go` 实现 MDAP Processing Task 的创建流程：接收一个资产组级别的处理任务请求，查询该资产组下的 Source 列表，并对每个 Source 发起一次 `StartProcessing`。当前实现只支持 `snapshot` 模板任务，底层通过 `bytedance_videoarch_compound` RPC 调用 MDAP/Compound 服务。\n\n该模块的核心入口是：\n\n- `GeneralConsoleServer.CreateMDAPProcessingTask`\n- `GeneralConsoleServer.handleCreateMDAPProcessingTask`\n- `createMDAPProcessingTask`\n\n`createMDAPProcessingTask` 是主要业务函数，测试也直接覆盖它，以便绕开 Hertz 请求上下文和真实 RPC 客户端。\n\n## 执行流程\n\n```mermaid\nflowchart TD\n    A[\"CreateMDAPProcessingTask\"] --> B[\"MDAPResponse 包装\"]\n    B --> C[\"handleCreateMDAPProcessingTask\"]\n    C --> D[\"绑定 CreateMDAPProcessingTaskRequest\"]\n    D --> E[\"createMDAPProcessingTask\"]\n    E --> F[\"校验并归一化请求\"]\n    E --> G[\"MGetAssetGroups 查询资产组\"]\n    G --> H[\"按资产组 Space 做 MDAPAuth\"]\n    H --> I[\"QuerySources 查询 Source\"]\n    I --> J[\"逐个 Source 调用 StartProcessing\"]\n    J --> K[\"聚合 Runs 和任务状态\"]\n```\n\nHTTP 层入口 `CreateMDAPProcessingTask` 不直接处理业务逻辑，而是调用：\n\n```go\nmiddleware.MDAPResponse(ctx, c, \"mdap.processing_task.create\", svr.handleCreateMDAPProcessingTask)\n```\n\n这说明该接口遵循 MDAP 统一响应包装逻辑，并使用 `\"mdap.processing_task.create\"` 作为中间件事件名或操作标识。\n\n## 请求模型\n\n`CreateMDAPProcessingTaskRequest` 是创建任务的输入结构：\n\n```go\ntype CreateMDAPProcessingTaskRequest struct {\n\tAssetGroupID    string `json:\"AssetGroupID\"`\n\tOutputStorage   string `json:\"OutputStorage\"`\n\tDatasetListener *bool  `json:\"DatasetListener\"`\n\tResourceMode    string `json:\"ResourceMode\"`\n\tTaskType        string `json:\"TaskType\"`\n\tTemplate        string `json:\"Template\"`\n\tTemplateId      string `json:\"TemplateId\"`\n}\n```\n\n字段约束由 `validateMDAPProcessingTaskRequest` 统一处理：\n\n| 字段 | 处理方式 | 约束 |\n| --- | --- | --- |\n| `AssetGroupID` | `strings.TrimSpace` | 不能为空 |\n| `OutputStorage` | 去空格后转大写 | 只能是 `TOS` 或 `HDFS` |\n| `DatasetListener` | 不做默认值填充 | 必须显式传入，不能为 `nil` |\n| `ResourceMode` | `strings.TrimSpace` | 只能是 `exclusive` 或 `shared` |\n| `TaskType` | `strings.TrimSpace` | 只能是 `template` |\n| `Template` | `strings.TrimSpace` | 只能是 `snapshot` |\n| `TemplateId` | `strings.TrimSpace` | 不能为空 |\n\n`DatasetListener` 使用 `*bool` 而不是 `bool`，是为了区分“调用方传了 false”和“调用方没有传这个字段”。缺失会被视为非法请求。\n\n## 响应模型\n\n`CreateMDAPProcessingTaskResponse` 描述整个批量创建结果：\n\n```go\ntype CreateMDAPProcessingTaskResponse struct {\n\tTaskID          string               `json:\"TaskID\"`\n\tStatus          string               `json:\"Status\"`\n\tRuns            []*MDAPProcessingRun `json:\"Runs\"`\n\tSucceededCount  int32                `json:\"SucceededCount\"`\n\tFailedCount     int32                `json:\"FailedCount\"`\n\tAssetGroupID    string               `json:\"AssetGroupID\"`\n\tOutputStorage   string               `json:\"OutputStorage\"`\n\tDatasetListener bool                 `json:\"DatasetListener\"`\n\tResourceMode    string               `json:\"ResourceMode\"`\n\tTaskType        string               `json:\"TaskType\"`\n\tTemplate        string               `json:\"Template\"`\n\tTemplateId      string               `json:\"TemplateId\"`\n}\n```\n\n`newCreateMDAPProcessingTaskResponse` 会生成一个新的 `TaskID`：\n\n```go\nTaskID: uuid.NewString()\n```\n\n这里的 `TaskID` 是控制台侧聚合任务 ID，用于表示本次批量提交。每个 Source 对应的真实处理运行 ID 保存在 `MDAPProcessingRun.RunId` 中。\n\n单个 Source 的运行结果由 `MDAPProcessingRun` 表示：\n\n```go\ntype MDAPProcessingRun struct {\n\tSourceID string  `json:\"SourceID\"`\n\tBizID    string  `json:\"BizID\"`\n\tRunId    string  `json:\"RunId\"`\n\tEtc      float64 `json:\"Etc\"`\n\tStatus   string  `json:\"Status\"`\n\tError    string  `json:\"Error,omitempty\"`\n}\n```\n\n`Error` 带有 `omitempty`，成功提交时不会出现在 JSON 响应中。\n\n## 任务状态语义\n\n模块内定义了三个任务状态：\n\n```go\nconst (\n\tmdapProcessingTaskStatusSubmitted     = \"submitted\"\n\tmdapProcessingTaskStatusPartialFailed = \"partial_failed\"\n\tmdapProcessingTaskStatusFailed        = \"failed\"\n)\n```\n\n状态聚合逻辑在 `createMDAPProcessingTask` 末尾完成：\n\n- 所有 Source 都成功调用 `StartProcessing`：返回 `MDAPOK`，整体 `Status` 为 `submitted`\n- 部分 Source 成功、部分失败：返回 `MDAPOK`，整体 `Status` 为 `partial_failed`\n- 所有 Source 都失败：返回 `MDAPErrorWithResponse(errno.CodeInternalErr, ..., resp)`，整体 `Status` 为 `failed`\n\n这意味着 `partial_failed` 是业务上的部分失败，但 HTTP/MDAP 响应层仍按成功返回；调用方需要读取响应体中的 `Status`、`SucceededCount`、`FailedCount` 和 `Runs` 判断每个 Source 的提交情况。\n\n## 核心业务流程\n\n`createMDAPProcessingTask` 是该模块的中心函数，签名如下：\n\n```go\nfunc createMDAPProcessingTask(\n\tctx context.Context,\n\treq CreateMDAPProcessingTaskRequest,\n\tauth string,\n\tbackend mdapProcessingBackend,\n\tauthorize mdapProcessingAuthorizeFunc,\n) errno.Payload\n```\n\n它按以下顺序执行：\n\n1. 调用 `validateMDAPProcessingTaskRequest` 校验并归一化请求。\n2. 调用 `backend.MGetAssetGroups(ctx, []string{normalized.AssetGroupID})` 查询资产组。\n3. 检查 `BaseResp.StatusCode`，非 0 时转成 `CodeInternalErr`。\n4. 从 `groupResp.GetAssetGroups()[normalized.AssetGroupID]` 取资产组；不存在时返回 `CodeNotFound`。\n5. 使用资产组的 `Space` 调用授权函数：\n   ```go\n   authorize(ctx, mdapProcessingTaskAction, group.GetSpace())\n   ```\n6. 调用 `QuerySources` 查询资产组下的 Source。\n7. 要求 Source 数量大于 0，且不超过 `mdapProcessingSourceLimit`。\n8. 为每个 Source 调用 `startMDAPProcessingForSource`。\n9. 统计成功和失败数量，生成最终响应。\n\n授权动作常量是：\n\n```go\nmdapProcessingTaskAction = \"mdap.tenant.query_source\"\n```\n\n虽然接口语义是创建 Processing Task，但授权动作目前使用的是查询 Source 相关 action。贡献代码时需要注意这一点，避免误以为这里使用了单独的创建任务权限。\n\n## Source 查询限制\n\n模块定义了两个相关限制：\n\n```go\nmdapProcessingSourceLimit      = int32(100)\nmdapProcessingQuerySourceLimit = int32(101)\n```\n\n`QuerySources` 调用时使用 `Limit = 101`：\n\n```go\noffset, limit := int32(0), mdapProcessingQuerySourceLimit\nqueryResp, err := backend.QuerySources(ctx, &mdap.QuerySourcesRequest{\n\tAssetGroupID: normalized.AssetGroupID,\n\tOffset:       &offset,\n\tLimit:        &limit,\n})\n```\n\n随后用两个条件限制总量：\n\n```go\nif len(sources) > int(mdapProcessingSourceLimit) || queryResp.GetTotal() > int64(mdapProcessingSourceLimit) {\n\treturn errno.MDAPErrorWithCode(errno.CodeBadRequest, fmt.Errorf(\"source count exceeds limit %d\", mdapProcessingSourceLimit))\n}\n```\n\n这里查询 101 条是为了检测“超过 100 个 Source”的场景。即使当前页返回数量不超过 100，只要 `Total` 大于 100，也会拒绝创建任务。\n\n## 单个 Source 的处理提交\n\n`startMDAPProcessingForSource` 负责把一个 `mdap_model.Source` 转换成一次 `StartProcessing` 调用：\n\n```go\nfunc startMDAPProcessingForSource(\n\tctx context.Context,\n\tbackend mdapProcessingBackend,\n\tauth string,\n\treq CreateMDAPProcessingTaskRequest,\n\tsource *mdap_model.Source,\n) *MDAPProcessingRun\n```\n\n它的失败处理是局部的：不会中断整个批量任务，而是返回一个 `Status = \"failed\"` 的 `MDAPProcessingRun`。\n\n失败场景包括：\n\n- `source == nil`\n- `source.GetID()` 为空\n- `backend.StartProcessing` 返回 error\n- `StartProcessingResponse.BaseResp.StatusCode != 0`\n\n成功时会填充：\n\n```go\nrun.RunId = rsp.GetRunId()\nrun.Etc = rsp.GetEtc()\nrun.Status = mdapProcessingTaskStatusSubmitted\n```\n\n`StartProcessingRequest` 的关键参数如下：\n\n```go\n&compound.StartProcessingRequest{\n\tInput:      &compound.Input{SourceID: &sourceID},\n\tOperatorId: mdapProcessingOperatorSnapshot,\n\tTemplateId: &templateID,\n\tAuth:       auth,\n}\n```\n\n其中 `OperatorId` 固定为：\n\n```go\nmdapProcessingOperatorSnapshot = \"Snapshot\"\n```\n\n因此当前模块虽然请求里有 `Template` 字段，但实际执行分支只支持 `snapshot`，并固定映射到 Compound 的 `\"Snapshot\"` operator。\n\n## 后端抽象\n\n该模块通过 `mdapProcessingBackend` 接口隔离外部 RPC：\n\n```go\ntype mdapProcessingBackend interface {\n\tMGetAssetGroups(ctx context.Context, ids []string) (*mdap.MGetAssetGroupsResponse, error)\n\tQuerySources(ctx context.Context, req *mdap.QuerySourcesRequest) (*mdap.QuerySourcesResponse, error)\n\tStartProcessing(ctx context.Context, req *compound.StartProcessingRequest) (*compound.StartProcessingResponse, error)\n}\n```\n\n生产实现是 `mdapProcessingCompoundBackend`：\n\n```go\ntype mdapProcessingCompoundBackend struct {\n\tclient bytedance_videoarch_compound.OverpassClient\n}\n```\n\n它直接封装 `bytedance_videoarch_compound.OverpassClient`：\n\n- `MGetAssetGroups` 调用 `b.client.MGetAssetGroups(ctx, ids)`\n- `QuerySources` 调用 `b.client.RawCall().QuerySources(...)`\n- `StartProcessing` 调用 `b.client.RawCall().StartProcessing(...)`\n\n`QuerySources` 和 `StartProcessing` 都设置了 5 秒 RPC 超时：\n\n```go\ncallopt.WithRPCTimeout(5*time.Second)\n```\n\n这个接口也是单元测试的主要扩展点。测试可以实现假的 `mdapProcessingBackend`，验证请求校验、授权短路、Source 数量限制、部分失败聚合、全部失败返回等逻辑，而不需要真实 RPC。\n\n## 授权接入\n\n授权函数类型为：\n\n```go\ntype mdapProcessingAuthorizeFunc func(ctx context.Context, action, space string) (denied bool, payload errno.Payload)\n```\n\n`handleCreateMDAPProcessingTask` 传入的实现是：\n\n```go\nfunc(ctx context.Context, action, space string) (bool, errno.Payload) {\n\treturn svr.MDAPAuth(ctx, c, action, space)\n}\n```\n\n授权发生在资产组查询之后、Source 查询之前。这样做的原因是授权需要资产组上的 `Space`：\n\n```go\ngroup.GetSpace()\n```\n\n如果授权拒绝，`createMDAPProcessingTask` 会直接返回 `payload`，不会调用 `QuerySources` 或 `StartProcessing`。\n\n## 错误处理约定\n\n该模块所有对外返回都使用 `errno.Payload`：\n\n- 请求绑定失败：`errno.MDAPErrorWithCode(errno.CodeBadRequest, err)`\n- 参数校验失败：`errno.MDAPErrorWithCode(errno.CodeBadRequest, err)`\n- 资产组 RPC 失败：`errno.MDAPErrorWithCode(errno.CodeInternalErr, err)`\n- 资产组不存在：`errno.MDAPErrorWithCode(errno.CodeNotFound, errors.New(\"asset group not found\"))`\n- Source 为空：`errno.MDAPErrorWithCode(errno.CodeBadRequest, errors.New(\"sources is empty\"))`\n- Source 超限：`errno.MDAPErrorWithCode(errno.CodeBadRequest, fmt.Errorf(...))`\n- 全部 `StartProcessing` 失败：`errno.MDAPErrorWithResponse(errno.CodeInternalErr, errors.New(\"all StartProcessing requests failed\"), resp)`\n- 成功或部分失败：`errno.MDAPOK(resp)`\n\n需要特别注意：单个 Source 的 `StartProcessing` 失败不会立刻返回错误，而是记录在对应 `MDAPProcessingRun.Error` 中。只有当所有 Source 都失败时，整体才返回业务错误。\n\n## 与代码库其他部分的连接\n\n该模块位于 `biz/handler`，属于 `GeneralConsoleServer` 的 HTTP handler 层。它依赖以下代码库组件：\n\n- `biz/middleware.MDAPResponse`：统一包装 MDAP handler 的响应。\n- `biz/middleware.MDAPAuth` 字符串键：从 `RequestContext` 中读取认证信息并传给 Compound `StartProcessing`。\n- `GeneralConsoleServer.MDAPAuth`：按 action 和 space 做权限校验。\n- `biz/errno`：生成 MDAP 风格的成功和错误响应。\n- `bytedance_videoarch_compound.OverpassClient`：访问资产组、Source 和处理任务启动能力。\n\n从调用关系看，请求从 Hertz handler 进入后，业务逻辑集中在 `createMDAPProcessingTask`，外部系统访问集中在 `mdapProcessingBackend`。这种结构使 handler 层较薄，也使核心逻辑更容易通过单元测试覆盖。\n\n## 贡献注意事项\n\n修改该模块时优先保持 `createMDAPProcessingTask` 的可测试性。新增外部调用应尽量挂到 `mdapProcessingBackend` 接口上，而不是直接在业务函数里访问具体 RPC client。\n\n如果要支持新的 `Template` 或 `TaskType`，需要同时调整：\n\n- `validateMDAPProcessingTaskRequest` 的白名单校验\n- `startMDAPProcessingForSource` 中 `OperatorId` 的选择逻辑\n- 请求到 `compound.StartProcessingRequest` 的字段映射\n- 聚合状态和单元测试覆盖\n\n如果要调整 Source 数量限制，需要同时理解 `mdapProcessingSourceLimit` 和 `mdapProcessingQuerySourceLimit` 的配合关系。当前 `101` 的查询上限不是任意值，而是为了准确发现超过 `100` 的情况。","middleware-and-request-authentication":"# Middleware and Request Authentication\n\n## 中间件与请求认证模块\n\n该模块位于 `biz/middleware`，负责统一包装 Handler 返回值、补齐 MDAP 响应链路追踪信息，以及在部分 BPM/MDAP 请求入口上处理鉴权相关逻辑。\n\n模块中的 Handler 约定为：\n\n```go\ntype MyHandlerFunc func(context.Context, *app.RequestContext) errno.Payload\n```\n\n业务 Handler 不直接写 HTTP 响应，而是返回 `errno.Payload`。`Response`、`MDAPResponse` 或 `BPMResponse` 负责序列化 payload、写入 JSON 响应，并在请求上下文中记录 `mkey`。\n\n## 主要组件\n\n### `InitJwtValidator`\n\n```go\nfunc InitJwtValidator(region string)\n```\n\n初始化包级变量 `jwtValidator`：\n\n```go\njwtValidator = jwt.NewValidator([]string{\"cn\", \"i18n\", \"us\", \"tx\", \"sinfi18n\", \"i18nbd\"})\n```\n\n当前实现没有使用 `region` 参数，而是固定允许多个 region。`main` 会调用该函数完成 JWT 校验器初始化。依赖 `BPMResponse` 的路由必须确保该初始化已执行，否则 `jwtValidator.Validate` 会在未初始化状态下被调用。\n\n### `Response`\n\n```go\nfunc Response(ctx context.Context, c *app.RequestContext, key string, f MyHandlerFunc)\n```\n\n用于普通 DevSRE 风格接口。典型调用方包括：\n\n- `PageGetGeneralAccounts`\n- `GetAccountDetail`\n- `GetAllDomain`\n- `AuthorizeAccountUser`\n- `CheckUserAuthorized`\n- `GetConfigByModule`\n- `ScriptUploadFile`\n\n执行流程：\n\n1. 调用业务函数 `f(ctx, c)` 获取 `errno.Payload`。\n2. 使用 `json.Marshal` 序列化返回值。\n3. 如果序列化失败，返回 `errno.DevSreErrorWithCode(errno.CodeInternalErr, err)`。\n4. 使用 `c.Data(http.StatusOK, \"application/json\", bytes)` 写入响应体。\n5. 通过 `c.Set(MKeyContextKey, key)` 保存当前路由或业务 key。\n\n需要注意：HTTP 状态码固定为 `200 OK`，真实业务状态通过 payload 中的 code 表达。\n\n### `MDAPResponse`\n\n```go\nfunc MDAPResponse(ctx context.Context, c *app.RequestContext, key string, f MyHandlerFunc)\n```\n\n用于 MDAP 风格接口。典型调用方包括：\n\n- `QueryArtifacts`\n- `ListVODSpaces`\n- `GetMDAPAssetGroup`\n- `CreateMDAPAssetGroup`\n- `UpdateMDAPSpace`\n- `DeleteMDAPAssetGroup`\n- `CheckMDAPSpaceAuth`\n\n它在 `Response` 的基础上增加了 trace id 处理：\n\n1. 调用业务函数 `f(ctx, c)` 获取 payload。\n2. 从 `logid.GetLogIDFromCtx(ctx)` 读取 trace id。\n3. 如果上下文中没有 trace id，则调用 `logid.GenLogID()` 生成。\n4. 如果返回值是 `errno.MDAPPayload` 或 `*errno.MDAPPayload`，并且 `TraceId` 为空，则填充 trace id。\n5. 序列化 payload 并返回 JSON。\n6. 如果序列化失败，返回 `errno.MDAPErrorWithCode(errno.CodeInternalErr, err)`，并设置 `TraceId`。\n\n这个函数保证 MDAP 响应尽量带有 `TraceId`，方便前端、调用方和日志系统关联问题。\n\n### `BPMResponse`\n\n```go\nfunc BPMResponse(ctx context.Context, c *app.RequestContext, key string, f MyHandlerFunc)\n```\n\n用于 BPM 相关接口，并在执行业务逻辑前校验用户 JWT。\n\n执行流程：\n\n1. 从请求头 `x-jwt-token` 读取 token。\n2. 调用 `jwtValidator.Validate(ctx, token)` 校验。\n3. 校验失败时记录错误日志，并返回：\n\n```go\nerrno.DevSreErrorWithCode(errno.CodeUnauthorized, err)\n```\n\n4. 校验成功时记录操作用户：\n\n```go\nlogs.CtxInfo(ctx, \"user operate bpm: %s\", payload.Username)\n```\n\n5. 调用业务函数 `f(ctx, c)`。\n6. 序列化并返回 JSON。\n7. 设置 `mkey`。\n\n当前实现还会通过 `pretty.Println(callPath)` 输出请求路径：\n\n```go\ncallPath := string(c.Path())\npretty.Println(callPath)\n```\n\n这是调试式输出，贡献代码时需要留意它是否符合运行环境的日志规范。\n\n### `ParseMDAPAuthMiddleware`\n\n```go\nfunc ParseMDAPAuthMiddleware() app.HandlerFunc\n```\n\n用于 MDAP 请求入口的认证头预处理。它不解析 JWT 内容，只负责从请求头提取认证字符串并放入 Hertz 请求上下文。\n\n读取顺序：\n\n1. `X-Jwt-Token`\n2. `Authorization`\n\n如果两个 header 都为空，直接中断请求并返回：\n\n```go\nerrno.MDAPPayload{\n    Code:    4001,\n    Message: \"empty auth, need X-Jwt-Token or Authorization header\",\n    TraceId: traceID,\n}\n```\n\n`traceID` 优先来自 `logid.GetLogIDFromCtx(ctx)`，没有时由 `logid.GenLogID()` 生成。\n\n如果认证头存在，则写入：\n\n```go\nc.Set(MDAPAuth, auth)\n```\n\n其中 `MDAPAuth` 常量值为：\n\n```go\nconst MDAPAuth = \"mdap_auth\"\n```\n\n后续 Handler 可以通过该 key 从 `RequestContext` 中取出认证信息。\n\n## 请求处理流程\n\n```mermaid\nflowchart TD\n    A[业务 Handler] --> B{响应包装函数}\n    B -->|普通接口| C[Response]\n    B -->|MDAP 接口| D[MDAPResponse]\n    B -->|BPM 接口| E[BPMResponse]\n    D --> F[补齐 TraceId]\n    E --> G[校验 x-jwt-token]\n    C --> H[序列化 Payload]\n    F --> H\n    G --> H\n    H --> I[返回 HTTP 200 JSON]\n```\n\nMDAP 认证头处理通常发生在响应包装之前：\n\n```mermaid\nflowchart TD\n    A[HTTP 请求] --> B[ParseMDAPAuthMiddleware]\n    B --> C{是否存在认证头}\n    C -->|否| D[返回 MDAPPayload 错误]\n    C -->|是| E[写入 mdap_auth]\n    E --> F[进入业务 Handler]\n    F --> G[MDAPResponse]\n```\n\n## 与 `errno` 模块的关系\n\n该模块不定义业务错误结构，而是依赖 `biz/errno` 中的 payload 构造函数和结构体：\n\n- `errno.Payload`\n- `errno.DevSreErrorWithCode`\n- `errno.MDAPErrorWithCode`\n- `errno.MDAPPayload`\n- `errno.CodeInternalErr`\n- `errno.CodeUnauthorized`\n\n普通接口走 `DevSREPayload` 风格，MDAP 接口走 `MDAPPayload` 风格。调用图中可以看到典型链路：\n\n```text\nPageGetGeneralAccounts\n-> Response\n-> DevSreErrorWithCode\n-> DevSREPayload\n```\n\n```text\nGetMDAPSpaceDetail\n-> MDAPResponse\n-> MDAPErrorWithCode\n-> MDAPPayload\n```\n\n```text\nBPMCheckAccountName\n-> BPMResponse\n-> DevSreErrorWithCode\n-> DevSREPayload\n```\n\n## 上下文 key\n\n模块定义了两个上下文 key：\n\n```go\nconst MKeyContextKey = \"mkey\"\nconst MDAPAuth = \"mdap_auth\"\n```\n\n`MKeyContextKey` 由 `Response`、`MDAPResponse`、`BPMResponse` 设置，用于记录调用时传入的 `key`。\n\n`MDAPAuth` 由 `ParseMDAPAuthMiddleware` 设置，用于保存请求头中的认证字符串。\n\n贡献代码时应复用这些常量，避免直接散落字符串字面量。\n\n## 错误处理约定\n\n该模块的错误处理有几个一致特征：\n\n- HTTP 状态码通常保持 `http.StatusOK`。\n- 业务错误通过 payload 中的 code/message 表达。\n- JSON 序列化失败会转换为内部错误 payload。\n- MDAP 错误响应会尽量携带 `TraceId`。\n- `ParseMDAPAuthMiddleware` 缺少认证头时会调用 `AbortWithStatusJSON`，不会继续执行后续 Handler。\n\n## 增加新接口时如何选择包装函数\n\n普通 DevSRE 接口使用：\n\n```go\nmiddleware.Response(ctx, c, key, func(ctx context.Context, c *app.RequestContext) errno.Payload {\n    // 返回 DevSRE 风格 payload\n})\n```\n\nMDAP 接口使用：\n\n```go\nmiddleware.MDAPResponse(ctx, c, key, func(ctx context.Context, c *app.RequestContext) errno.Payload {\n    // 返回 errno.MDAPPayload 或 *errno.MDAPPayload 时会自动补齐 TraceId\n})\n```\n\nBPM 接口使用：\n\n```go\nmiddleware.BPMResponse(ctx, c, key, func(ctx context.Context, c *app.RequestContext) errno.Payload {\n    // 只有 JWT 校验通过后才会执行这里\n})\n```\n\n如果 MDAP 接口需要请求认证头，应在路由链路中挂载 `ParseMDAPAuthMiddleware()`，并在业务 Handler 中读取 `MDAPAuth` 对应的值。\n\n## 维护注意事项\n\n`base.go` 中引入的是：\n\n```go\n\"code.byted.org/middleware/hertz/pkg/app\"\n```\n\n`parse_mdap_auth.go` 中引入的是：\n\n```go\n\"github.com/cloudwego/hertz/pkg/app\"\n```\n\n这两个 `app` 包路径不同，但都被用作 `app.HandlerFunc` 和 `app.RequestContext`。修改中间件签名或升级 Hertz 依赖时，需要确认这两个包路径是否兼容，避免路由注册或 Handler 类型不匹配。\n\n`Response` 和 `MDAPResponse` 在 `json.Marshal` 失败后会调用 `c.JSON` 写错误响应，但随后代码仍会继续执行 `c.Data`。如果后续要调整错误处理，应考虑在写入错误响应后立即 `return`，避免同一次请求写入多次响应。","other-build-sh":"# Other — build.sh\n\n## 模块概览\n\n`build.sh` 是项目的构建与产物整理脚本。它负责创建 `output/` 目录结构，复制启动脚本和配置文件，并将当前 Go 项目编译为可执行文件：\n\n```bash\noutput/bin/toutiao.videoarch.general_console\n```\n\n该脚本没有被代码调用图识别为某个运行时模块的依赖；它更像是仓库级的构建入口，通常由本地开发、CI/CD 或发布流程直接执行。\n\n## 执行流程\n\n```mermaid\nflowchart TD\n    A[\"执行 build.sh\"] --> B[\"创建 output/bin 和 output/conf\"]\n    B --> C[\"复制 bootstrap.sh\"]\n    C --> D[\"生成 bootstrap_staging.sh\"]\n    D --> E[\"复制非本地配置文件\"]\n    E --> F[\"go build 生成服务二进制\"]\n```\n\n核心流程如下：\n\n1. 设置运行产物名称：\n\n```bash\nRUN_NAME=\"toutiao.videoarch.general_console\"\n```\n\n该变量决定最终 Go 二进制文件名。\n\n2. 创建构建产物目录：\n\n```bash\nmkdir -p output/bin output/conf\n```\n\n`output/bin` 用于放置编译后的可执行文件，`output/conf` 用于放置运行配置。\n\n3. 复制启动脚本：\n\n```bash\ncp script/bootstrap.sh output 2>/dev/null\nchmod +x output/bootstrap.sh\ncp script/bootstrap.sh output/bootstrap_staging.sh\nchmod +x output/bootstrap_staging.sh\n```\n\n同一个 `script/bootstrap.sh` 会生成两个启动入口：\n\n- `output/bootstrap.sh`\n- `output/bootstrap_staging.sh`\n\n两者都会被设置为可执行文件。`bootstrap_staging.sh` 目前只是 `bootstrap.sh` 的副本，并没有在 `build.sh` 内注入额外的 staging 差异。\n\n4. 复制配置文件：\n\n```bash\nfind conf/ -type f ! -name \"*_local.*\" | xargs -I{} cp {} output/conf/\n```\n\n该命令会查找 `conf/` 下的所有普通文件，并排除文件名匹配 `*_local.*` 的本地配置文件，然后复制到 `output/conf/`。\n\n这意味着本地开发专用配置不会进入构建产物，例如：\n\n```text\nconf/app_local.yaml\nconf/service_local.toml\n```\n\n需要注意的是，`cp {} output/conf/` 会把文件复制到同一个目标目录下，不保留 `conf/` 内的子目录结构。如果 `conf/` 的不同子目录中存在同名文件，后复制的文件可能覆盖先复制的文件。\n\n5. 编译 Go 程序：\n\n```bash\ngo build -o output/bin/${RUN_NAME}\n```\n\n该命令从当前目录构建 Go 主程序，并将输出写入：\n\n```text\noutput/bin/toutiao.videoarch.general_console\n```\n\n因此，执行 `build.sh` 时应位于仓库根目录，并且当前目录应包含可被 `go build` 识别的 Go 入口包。\n\n## 产物结构\n\n成功执行后，脚本期望生成如下结构：\n\n```text\noutput/\n├── bootstrap.sh\n├── bootstrap_staging.sh\n├── bin/\n│   └── toutiao.videoarch.general_console\n└── conf/\n    └── 非 *_local.* 的配置文件\n```\n\n`output/` 是后续运行、打包或发布流程最可能消费的目录。\n\n## 与代码库的关系\n\n`build.sh` 本身不定义 Go 函数、结构体或包，也没有运行时调用关系。它连接代码库的方式主要体现在三个路径约定上：\n\n- `script/bootstrap.sh`：服务启动脚本来源。\n- `conf/`：运行配置来源。\n- 当前 Go 模块：通过 `go build` 编译为服务二进制。\n\n因此，修改以下内容时通常需要考虑 `build.sh`：\n\n- 服务二进制命名规则变化。\n- 启动脚本路径或启动方式变化。\n- 配置目录结构变化。\n- 发布系统期望的 `output/` 目录结构变化。\n\n## 维护注意事项\n\n脚本没有启用 `set -e`，因此中间命令失败时不一定会立即终止，最终退出码主要取决于最后的 `go build` 结果。例如第一次复制 `script/bootstrap.sh` 的错误被重定向到 `/dev/null`，但随后的 `chmod +x output/bootstrap.sh` 仍可能失败。\n\n配置复制使用 `find | xargs`，没有使用 `-print0` / `xargs -0`，因此不适合包含空格或特殊换行字符的配置文件名。当前项目配置文件命名应保持简单、稳定。\n\n如果未来需要保留 `conf/` 子目录结构，当前的复制方式需要调整；否则所有配置文件都会被拍平到 `output/conf/`。","other-conf":"# Other — conf\n\n## 配置模块（conf）\n\n`conf` 模块保存服务运行所需的 YAML 配置，覆盖基础配置、环境覆盖配置、区域覆盖配置以及 Hertz 服务启动配置。该目录本身不包含 Go 函数、类或可执行逻辑；调用图中也没有内部调用、外部调用或入口调用。它通过约定的配置文件名和字段结构，被代码库中的配置加载逻辑读取后注入到数据库、IAM、ByteTree、CloudIAM、MDAP、TOS 等客户端初始化流程中。\n\n## 配置组织方式\n\n核心模式是“基础配置 + 环境/区域覆盖”：\n\n```mermaid\nflowchart TD\n  A[\"基础配置<br/>base.yml / config.yml\"] --> B[\"环境覆盖<br/>boe.test.yml / boe.staging.yml / boe.ut.yml\"]\n  A --> C[\"生产区域覆盖<br/>cn / i18n / tx / sinfi18n 等\"]\n  A --> D[\"Hertz 启动配置<br/>hertz.config.yaml\"]\n  B --> E[\"运行时配置对象\"]\n  C --> E\n  D --> F[\"服务端口、日志、pprof\"]\n```\n\n`base.yml` 是最完整的默认配置，包含大多数业务依赖的默认字段。`config.yml` 只保留 `Meta`、`RetryTimes`、`ReadDB`、`WriteDB`，更像基础模板或轻量默认配置。其他 `*.prod.yml`、`boe.*.yml` 文件只声明需要按环境覆盖的字段。\n\n## 基础配置\n\n`base.yml` 定义服务通用默认值：\n\n- `Meta.PSM`：服务 PSM，当前为 `toutiao.videoarch.general_console`。\n- `RetryTimes`：通用重试次数，默认 `3`。\n- `ReadDB` / `WriteDB`：读写 MySQL 配置模板，包括 `DSNTemplate`、账号、库名、Consul 名称、超时和连接池参数。\n- `GuardianAPI`：Guardian 服务调用配置，包含 `PSM`、`AccessKey`、`SecretKey`。\n- `JingleAPI`：Jingle/IAM 相关访问配置，包含 `UserName`、`Password`、`Host`。\n- `JumpUrl`：前端或业务流程跳转地址，包括 IAM 申请、账号创建、域名修改。\n- `ByteTreeConfig`：ByteTree 域名、分区和密钥。\n- `JwtRegion`：JWT 区域标识，例如 `cn`、`i18n`、`us`、`tx`、`sinfi18n`。\n- `CloudIAM`：Cloud IAM 网关租户、网关域名和服务账号。\n- `MDAP`：MDAP 相关 ByteTree、集群和 IAM 配置。\n- `VCloudControlConfig`：VCloud 控制面访问凭证配置。\n\n数据库配置采用同一 DSN 模板：\n\n```yaml\nDSNTemplate: \"%s:%s@tcp(%s)/%s?charset=utf8&parseTime=True&loc=Local&timeout=%s&readTimeout=%s&writeTimeout=%s\"\n```\n\n运行时通常需要把 `Username`、`Password`、`ConsulName` 解析出的地址、`DBName`、`Timeout`、`ReadTimeout`、`WriteTimeout` 填入模板，生成最终 MySQL DSN。\n\n## Hertz 配置\n\n`hertz.config.yaml` 独立描述 Web 服务运行参数，分为 `Develop` 和 `Product` 两套：\n\n- `ServicePort`：业务服务端口，当前两套环境均为 `6789`。\n- `DebugPort`：调试端口，当前为 `6790`。\n- `EnablePprof`：是否启用 pprof。\n- `LogLevel`：开发环境为 `debug`，生产环境为 `info`。\n- `ConsoleLog`：开发环境开启，生产环境关闭。\n- `AgentLog` / `FileLog`：两套环境均开启。\n\n这份配置与业务依赖配置分离，适合由 Hertz 启动层或框架初始化代码单独读取。\n\n## 环境覆盖配置\n\nBOE 相关文件包括：\n\n- `boe.staging.yml`\n- `boe.test.yml`\n- `boe.ut.yml`\n- `boei18n.staging.yml`\n\n前三者配置相同，覆盖 `WriteDB`、`ReadDB` 和 `JumpUrl`，数据库均指向 `videoarch_account`，Consul 名称分别为 `consul:toutiao.mysql.videoarch_account_write` 和 `consul:toutiao.mysql.videoarch_account_read`。跳转地址使用 BOE 域名。\n\n`boei18n.staging.yml` 同样使用 `videoarch_account`，但跳转地址切换到 BOE i18n 域名，并覆盖 `JingleAPI.Host` 为 BOE i18n IAM 地址。\n\n## 生产区域配置\n\n生产配置按机房或区域拆分，文件名遵循 `<区域>.prod.yml`：\n\n- 国内账号库区域：`gl2.prod.yml`、`hj.prod.yml`、`hl.prod.yml`、`jj.prod.yml`、`lf.prod.yml`、`lq.prod.yml`、`xh.prod.yml`、`zb.prod.yml`、`zjg.prod.yml`\n- 国际化或海外 VCloud 区域：`ie.prod.yml`、`maliva.prod.yml`、`my.prod.yml`、`my3.prod.yml`、`no1a.prod.yml`、`sg1.prod.yml`、`useast2a.prod.yml`、`useast2b.prod.yml`\n- 非 TT / sinf 区域：`mya.prod.yml`、`myb.prod.yml`\n- TX/TTP 区域：`useast5.prod.yml`、`useast8.prod.yml`\n- 新加坡公共账号区域：`sgcomm1.prod.yml`\n\n主要差异集中在以下字段：\n\n- `ReadDB` / `WriteDB`：决定连接 `videoarch_account`、`videoarch_vcloud` 或 `videoarch_account_nontt`。\n- `ByteTreeConfig.Domain` 和 `ByteTreeConfig.Partition`：区分 `cn`、`i18n`、`us`、`sg`、`tx`、`sinfi18n` 等分区。\n- `JwtRegion`：决定 JWT 区域语义。\n- `JingleAPI.Host`：按国内、海外、useast 等 IAM 地址切换。\n- `JumpUrl`：按 BOE、i18n、GCP、TTP、US 等流程入口切换。\n- `CloudIAM.GatewayTenant` / `GatewayHost`：按 Cloud IAM 租户和网关域名切换。\n- `VCloudControlConfig`：仅部分国内区域覆盖。\n- `NonTTTOS`：仅 `mya.prod.yml`、`myb.prod.yml` 提供。\n\n## NonTTTOS 配置\n\n`mya.prod.yml` 和 `myb.prod.yml` 增加 `NonTTTOS` 节点，用于非 TT TOS 场景：\n\n```yaml\nNonTTTOS:\n  Addr: \"...\"\n  UseDomain: true\n  RetryTimes: 3\n  RetryTimeout: \"200ms\"\n  Creator: \"wukuanxin\"\n  IamAddress: \"...\"\n  S3Region: \"ap-southeast-1\"\n  S3Endpoint: \"dualstack-s3.ap-southeast-1.tos.bytepluses.com\"\n```\n\n该配置同时包含内部 OpenAPI 地址、IAM 地址、S3 区域和 S3 Endpoint。贡献相关逻辑时，应确认调用方是否同时依赖 `Addr` 和 S3 兼容字段，避免只更新其中一侧导致跨云访问异常。\n\n## 与代码库的连接点\n\n该模块没有可被调用的函数或类，连接方式是配置字段契约。代码中的配置结构体、初始化函数或客户端构造逻辑需要与这些 YAML key 保持一致。例如：\n\n- 数据库初始化逻辑应读取 `ReadDB` 和 `WriteDB`，并使用 `DSNTemplate` 拼接 DSN。\n- IAM/Jingle 客户端应读取 `JingleAPI.UserName`、`JingleAPI.Password`、`JingleAPI.Host`。\n- ByteTree 客户端应读取 `ByteTreeConfig.Domain`、`Partition`、`SecretKey`。\n- Cloud IAM 客户端应读取 `CloudIAM.GatewayTenant`、`GatewayHost`、`ServiceAccount`。\n- 业务跳转或审批链接生成逻辑应读取 `JumpUrl.IAMApplyUrl`、`CreateAccountUrl`、`ModifyDomainUrl`。\n- 非 TT TOS 逻辑应只在存在 `NonTTTOS` 配置的区域启用对应能力。\n\n由于 YAML 文件中大量使用局部覆盖，新增字段时应先放入 `base.yml` 或 `config.yml` 的默认结构，再在需要差异化的环境文件中覆盖。这样可以降低运行时缺字段的风险。\n\n## 维护注意事项\n\n配置文件包含明文访问凭证、密钥和密码字段，例如 `SecretKey`、`AccessKey`、`Password`、`VCloudControlConfig`。提交前应确认这些值符合当前仓库的密钥管理规范；如果项目支持环境变量、KMS 或配置中心，优先将敏感值迁移到受控系统。\n\n修改区域配置时，不要只看文件名判断区域语义。部分区域虽然文件名不同，但共享同一组数据库、ByteTree、CloudIAM 或 JumpUrl 配置；也有区域使用相同 `JwtRegion` 但不同 `GatewayHost`。建议按字段逐项比对后再修改。\n\n新增生产区域配置时，至少需要确认：\n\n- 读写库名和 Consul 名称是否匹配。\n- ByteTree 域名、分区和密钥是否属于目标区域。\n- `JwtRegion` 是否与认证侧期望一致。\n- `JingleAPI.Host` 是否指向正确 IAM 环境。\n- `JumpUrl` 的审批流程 `cid` 是否属于目标区域。\n- `CloudIAM.GatewayTenant` 和 `GatewayHost` 是否与云环境一致。\n- 是否需要 `NonTTTOS` 或 `VCloudControlConfig` 的区域专属配置。","other-config":"# Other — config\n\n## 配置模块\n\n`biz/config` 负责加载服务运行配置，并向其他业务代码暴露全局配置对象 `Conf *Config`。模块的核心入口是 `InitConf(path string)`：它从本地配置目录读取静态 YAML 配置，然后尝试从 TCC 拉取 `TQS` 动态覆盖配置，最后打印脱敏后的配置内容。\n\n```mermaid\nflowchart TD\n    A[\"InitConf(path)\"] --> B[\"caesar.Unmarshal(Conf, path)\"]\n    B --> C[\"applyTCCConfig(context.Background(), Conf)\"]\n    C --> D[\"defaultTCCConfigSource(conf)\"]\n    C --> E[\"applyTCCConfigFromSource(ctx, conf, source)\"]\n    E --> F[\"fetchTCCConfigFromClient\"]\n    E --> G[\"parseTCCConfigOverride\"]\n    G --> H[\"cloneTQSConfig 后覆盖 conf.TQS\"]\n    A --> I[\"redactedConfigForPrint(Conf)\"]\n```\n\n## 配置结构\n\n主配置类型是 `Config`，字段通过 `yaml` tag 与配置文件绑定：\n\n```go\ntype Config struct {\n    Meta                Meta\n    WriteDB             *Mysql\n    ReadDB              *Mysql\n    GuardianAPI         *GuardianAPI\n    JingleAPI           *JingleAPI\n    VCloudControlConfig *VCloudControlConfig\n    JumpUrl             *JumpUrl\n    ByteTreeConfig      *ByteTreeConfig\n    CloudIAM            *CloudIAMConfig\n    MDAP                *MDAPConfig\n    TQS                 *TQSConfig\n    JwtRegion           string\n    TOS                 NonTTTOS\n}\n```\n\n其中 `Meta.PSM` 会影响 TCC 客户端使用的服务 PSM；如果为空，TCC 默认使用 `toutiao.videoarch.general_console`。\n\n`TQSConfig` 是当前动态覆盖逻辑的重点配置：\n\n```go\ntype TQSConfig struct {\n    AppID                 string\n    AppKey                string\n    UserName              string\n    Cluster               string\n    Timeout               time.Duration\n    PollInterval          time.Duration\n    YarnClusterName       string\n    MapReduceJobQueueName string\n    AuthMode              string\n}\n```\n\n`AuthMode` 已标记为废弃字段，仅保留旧 YAML 兼容；Hive import 始终使用服务 PSM token。\n\n## 初始化流程\n\n`InitConf(path string)` 会执行三个步骤：\n\n1. 初始化全局变量 `Conf = new(Config)`。\n2. 调用 `caesar.Unmarshal(Conf, path)` 从指定路径加载静态配置。\n3. 调用 `applyTCCConfig(context.Background(), Conf)` 尝试用 TCC 中的 `TQS` 配置覆盖本地配置。\n\n如果 `caesar.Unmarshal` 失败，函数会通过 `logs.Fatal` 记录错误并 `panic`。TCC 加载失败不会中断启动；模块会记录 warn 日志并保留本地配置。\n\n测试环境中，`base_test.go` 的 `TestMain` 会先执行：\n\n```go\nlocal.LoadConf()\nInitConf(local.ConfDir())\n```\n\n因此 `mysql_test.go` 和 `tcc_test.go` 都依赖同一套初始化后的 `Conf`。\n\n## TCC 覆盖机制\n\nTCC 相关逻辑集中在 `tcc.go`。默认配置源由 `defaultTCCConfigSource(conf *Config)` 构造：\n\n- `Key` 固定为 `general_console_cfg`\n- `ServicePSM` 优先使用 `strings.TrimSpace(conf.Meta.PSM)`\n- `ServicePSM` 为空时回退到 `defaultTCCServicePSM`\n- `Confspace` 来自 `tccclient.GetClusterFromEnv()`\n- `Fetch` 使用 `fetchTCCConfigFromClient`\n\n实际覆盖由 `applyTCCConfigFromSource(ctx, conf, source)` 完成。它会规范化 `Key`、`ServicePSM`、`Confspace`，调用 `source.Fetch` 获取 YAML 内容，然后通过 `parseTCCConfigOverride` 解析。\n\nTCC YAML 当前只支持覆盖 `TQS`：\n\n```yaml\nTQS:\n  AppID: \"app\"\n  AppKey: \"key\"\n  UserName: \"user\"\n  Cluster: \"lq\"\n  Timeout: \"1s\"\n```\n\n覆盖前会调用 `isCompleteTQSConfig` 校验必要字段：\n\n- `AppID` 非空\n- `AppKey` 非空\n- `UserName` 非空\n- `Cluster` 非空\n- `Timeout > 0`\n\n只有完整配置才会覆盖 `conf.TQS`。覆盖时使用 `cloneTQSConfig`，它会复制配置并 trim 字符串字段，避免把 TCC 中多余空格传播到运行时配置。\n\n如果发生以下情况，`applyTCCConfigFromSource` 返回 `applied=false`，并保持原有静态 `TQS` 不变：\n\n- `source.Fetch` 返回错误\n- TCC 配置不存在，即 `tccclient.ConfigNotFoundError`\n- YAML 解析失败\n- `TQS` 配置不完整\n- `conf == nil`\n- `source.Fetch == nil`\n\n`applyTCCConfig` 会区分配置不存在和普通失败日志，但二者都会保留本地配置。\n\n## TCC 客户端调用\n\n`fetchTCCConfigFromClient(ctx, servicePSM, confspace, key)` 使用 `tccclient.NewConfigV2()` 构造客户端配置：\n\n```go\ncfg.Confspace = confspace\ncfg.SetFirstGetRetry(1)\ncfg.SetFirstGetTimeout(defaultTCCFirstGetTimeout)\n```\n\n默认超时常量为：\n\n```go\ndefaultTCCFirstGetTimeout = 200 * time.Millisecond\ndefaultTCCGetTimeout      = 500 * time.Millisecond\n```\n\n如果传入的 `ctx` 没有 deadline，函数会额外创建一个 `500ms` 的超时上下文，再执行 `client.Get(ctx, key)`。\n\n## MySQL 配置\n\nMySQL 配置由 `Mysql` 结构承载：\n\n```go\ntype Mysql struct {\n    DSNTemplate  string\n    Username     string\n    Password     string\n    DBName       string\n    ConsulName   string\n    Timeout      string\n    ReadTimeout  string\n    WriteTimeout string\n    MaxIdle      int\n    MaxOpen      int\n}\n```\n\n`GetDSN()` 根据环境生成连接串：\n\n- 如果 `IsCodebaseCIEnvironment()` 返回 true，直接返回固定 CI DSN。\n- 否则用 `fmt.Sprintf` 将 `Username`、`Password`、`ConsulName`、`DBName`、`Timeout`、`ReadTimeout`、`WriteTimeout` 填入 `DSNTemplate`。\n\n`IsCodebaseCIEnvironment()` 通过环境变量判断：\n\n```go\nreturn len(os.Getenv(\"CI_REPO_NAME\")) > 0\n```\n\n`NewDB()` 使用 `gorm.Open(\"mysql2\", m.GetDSN())` 建立连接，并配置：\n\n- `db.LogMode(true)`\n- `SetMaxIdleConns(m.MaxIdle)`\n- `SetMaxOpenConns(m.MaxOpen)`\n- `db.SingularTable(true)`\n\n因此调用方通常应通过 `Conf.ReadDB.NewDB()` 或 `Conf.WriteDB.NewDB()` 创建数据库连接。\n\n## 脱敏打印\n\n`redactedConfigForPrint(conf *Config)` 用于初始化结束时打印配置，避免泄露 `TQS.AppKey`。\n\n它的行为是：\n\n- `conf == nil` 时直接返回\n- `conf.TQS == nil` 时直接返回\n- `conf.TQS.AppKey == \"\"` 时直接返回\n- 否则浅拷贝 `Config`，再拷贝 `TQSConfig`，只把副本中的 `TQS.AppKey` 改为 `\"<redacted>\"`\n\n原始 `conf.TQS.AppKey` 不会被修改。测试 `TestRedactedConfigForPrint_redactsTQSAppKey` 覆盖了这一点。\n\n## 与代码库其他部分的连接方式\n\n该模块通过全局变量 `Conf` 向外提供配置。业务代码不需要重复解析 YAML，而是直接读取 `config.Conf` 上的字段，例如数据库、TQS、CloudIAM、MDAP、TOS 等配置。\n\n初始化顺序很重要：任何依赖 `config.Conf` 的代码都必须在 `InitConf` 之后运行。测试中由 `TestMain` 保证这一点；服务启动代码也应遵循同样模式。\n\nTCC 覆盖目前只影响 `Conf.TQS`，不会修改数据库、IAM、TOS 或其他配置域。因此新增动态配置时，需要扩展 `tccConfigOverride`、完整性校验和覆盖逻辑，而不是假设 TCC YAML 会自动合并到整个 `Config`。","other-dal":"# Other — dal\n\n## 模块概览\n\n`biz/dal` 这一组代码负责数据访问层相关的数据库结构和 DAO 行为验证。当前给出的源码主要覆盖两类权限数据：\n\n- 账号与用户授权关系：`v_account_user_rel`\n- 管理员用户：`v_account_admin`\n\n测试代码位于 `biz/dal/dao`，数据库建表 SQL 位于 `biz/dal/db/db.sql`。DAO 的具体实现函数不在本片段中，但测试明确依赖这些真实接口：`InitDb`、`RollbackTX`、`Db.CreateAuthorizeInfo`、`Db.CheckAuthorizeInfo`、`Db.GetAuthorizedAccountIdsOfUser`、`Db.DeleteAuthorizeInfo`、`Db.CreateAdminUserInfo`、`Db.CheckAdminUserInfo`、`Db.DeleteAdminUserInfo`。\n\n## 数据库结构\n\n`biz/dal/db/db.sql` 定义了两个表。\n\n### `v_account_user_rel`\n\n该表保存账号授权给用户的关系。\n\n```sql\nCREATE TABLE IF NOT EXISTS `v_account_user_rel` (\n    `id` INT unsigned NOT NULL AUTO_INCREMENT,\n    `account_id` BIGINT NOT NULL,\n    `account_name` VARCHAR(128) NOT NULL,\n    `user_name` VARCHAR(128) NOT NULL,\n    `operator` VARCHAR(128) NOT NULL,\n    `created_at` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,\n    PRIMARY KEY (`id`),\n    UNIQUE KEY uniq_pair (`account_id`, `user_name`)\n) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;\n```\n\n关键约束：\n\n- `account_id` 与 `user_name` 组成唯一键 `uniq_pair`，防止同一个账号重复授权给同一个用户。\n- `operator` 记录执行授权操作的人。\n- `created_at` 由数据库默认写入当前时间。\n\n该表对应测试中使用的 `dto.AuthorizeInfo`，字段包括：\n\n- `AccountId`\n- `AccountName`\n- `ToAuthorizeUserName`\n- `Operator`\n\n### `v_account_admin`\n\n该表保存管理员用户。\n\n```sql\nCREATE TABLE IF NOT EXISTS `v_account_admin` (\n    `id` INT UNSIGNED NOT NULL AUTO_INCREMENT,\n    `user_name` VARCHAR(128) NOT NULL,\n    `operator` VARCHAR(128) NOT NULL,\n    `created_at` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,\n    PRIMARY KEY (`id`),\n    UNIQUE KEY uniq_name(`user_name`)\n) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;\n```\n\n关键约束：\n\n- `user_name` 通过唯一键 `uniq_name` 保证管理员用户不重复。\n- `operator` 记录创建该管理员记录的操作人。\n- `created_at` 由数据库默认生成。\n\n该表对应测试中使用的 `dto.AdminUserInfo`，字段包括：\n\n- `UserName`\n- `Operator`\n\n## 测试初始化流程\n\n`biz/dal/dao/base_test.go` 中的 `TestMain` 是 DAO 测试的统一入口。\n\n```go\nfunc TestMain(m *testing.M) {\n\tlocal.LoadConf()\n\tconfig.InitConf(local.ConfDir())\n\tutil.InitMetrics()\n\tInitDb()\n\tcode := m.Run()\n\tos.Exit(code)\n}\n```\n\n执行顺序为：\n\n1. `local.LoadConf()` 加载本地配置。\n2. `config.InitConf(local.ConfDir())` 初始化业务配置。\n3. `util.InitMetrics()` 初始化指标能力。\n4. `InitDb()` 初始化数据库连接。\n5. `m.Run()` 执行当前包内测试。\n6. `os.Exit(code)` 使用测试结果退出。\n\n这意味着 `biz/dal/dao` 下的测试依赖完整运行环境配置和真实数据库初始化，而不是纯内存单元测试。\n\n```mermaid\nflowchart TD\n    A[\"测试进程启动\"] --> B[\"local.LoadConf\"]\n    B --> C[\"config.InitConf\"]\n    C --> D[\"util.InitMetrics\"]\n    D --> E[\"InitDb\"]\n    E --> F[\"m.Run 执行 DAO 测试\"]\n```\n\n## 授权关系 DAO 行为\n\n`Test_AllAuthorityInterface` 验证账号授权关系的完整生命周期。\n\n核心流程：\n\n```go\ninfo := dto.AuthorizeInfo{\n\tAccountId:           99999999,\n\tAccountName:         \"test-account-ut\",\n\tToAuthorizeUserName: \"test\",\n\tOperator:            \"ut_test\",\n}\n\nctx := context.TODO()\n\nerr := Db.CreateAuthorizeInfo(ctx, &info)\nerr = Db.CheckAuthorizeInfo(ctx, info.AccountId, info.ToAuthorizeUserName)\n\nauthorizedId, err := Db.GetAuthorizedAccountIdsOfUser(ctx, info.ToAuthorizeUserName)\n\nerr = Db.DeleteAuthorizeInfo(ctx, info.AccountId, info.ToAuthorizeUserName)\n```\n\n涉及的 DAO 接口语义如下：\n\n- `Db.CreateAuthorizeInfo(ctx, &info)`：创建账号到用户的授权关系。\n- `Db.CheckAuthorizeInfo(ctx, accountId, userName)`：检查指定账号是否已授权给指定用户。\n- `Db.GetAuthorizedAccountIdsOfUser(ctx, userName)`：查询指定用户已被授权访问的账号 ID 列表。\n- `Db.DeleteAuthorizeInfo(ctx, accountId, userName)`：删除指定账号与用户之间的授权关系。\n\n测试中断言：\n\n```go\nassert.Nil(t, err)\nassert.Equal(t, len(authorizedId), 1)\nassert.Equal(t, authorizedId[0], info.AccountId)\n```\n\n这说明测试期望在当前测试数据下，`GetAuthorizedAccountIdsOfUser` 返回且只返回刚创建的 `AccountId`。\n\n需要注意，测试使用固定数据：\n\n- `AccountId: 99999999`\n- `ToAuthorizeUserName: \"test\"`\n\n由于数据库表存在唯一键 `uniq_pair(account_id, user_name)`，如果测试环境中残留相同记录，`CreateAuthorizeInfo` 可能因唯一键冲突失败。因此该测试更接近依赖干净测试库的集成测试。\n\n## 管理员用户 DAO 行为\n\n`Test_AllAdminUserInterface` 验证管理员用户的创建、检查和删除。\n\n核心流程：\n\n```go\nadmin := dto.AdminUserInfo{\n\tUserName: \"ut_test\",\n\tOperator: \"ut_test\",\n}\n\nctx := context.TODO()\n\nerr := Db.CreateAdminUserInfo(ctx, admin.UserName, admin.Operator)\nerr = Db.CheckAdminUserInfo(ctx, admin.UserName)\nerr = Db.DeleteAdminUserInfo(ctx, admin.UserName)\n```\n\n涉及的 DAO 接口语义如下：\n\n- `Db.CreateAdminUserInfo(ctx, userName, operator)`：创建管理员用户记录。\n- `Db.CheckAdminUserInfo(ctx, userName)`：检查指定用户是否为管理员。\n- `Db.DeleteAdminUserInfo(ctx, userName)`：删除管理员用户记录。\n\n表 `v_account_admin` 对 `user_name` 设置唯一键，因此测试同样依赖测试环境中没有残留的 `ut_test` 管理员记录。\n\n## 事务回滚工具\n\n`biz/dal/dao/utils_test.go` 测试 `RollbackTX` 的错误处理行为。\n\n测试构造了一个 `*gorm.DB`，并通过 `gomonkey.ApplyMethod` patch `Rollback` 方法，模拟不同回滚结果：\n\n```go\npatches := gomonkey.ApplyMethod(reflect.TypeOf(db), \"Rollback\", func(db *gorm.DB) *gorm.DB {\n\tdb.Error = errors.New(\"tx err\")\n\treturn db\n})\ndefer patches.Reset()\n```\n\n覆盖场景：\n\n- `NormalErr`：调用方已有错误，`Rollback` 本身没有产生新错误，`RollbackTX` 返回原始错误。\n- `TxErr`：调用方没有错误，但 `Rollback` 产生 `\"tx err\"`，`RollbackTX` 返回事务错误。\n- `GormErr`：调用方传入 `gorm.Errors`，`Rollback` 又产生 `\"tx err\"`，`RollbackTX` 返回合并后的 GORM 错误集合。\n\n测试断言方式为比较错误字符串：\n\n```go\nif err := RollbackTX(tt.args.tx, tt.args.err); err.Error() != tt.wantErr.Error() {\n\tt.Errorf(\"RollbackTX() error = %v, wantErr %v\", err, tt.wantErr)\n}\n```\n\n这表明 `RollbackTX` 的重要职责不是简单调用 `tx.Rollback()`，而是保留并合并调用方原有错误与事务回滚错误。\n\n## 与代码库其他部分的连接\n\n该模块连接了配置、指标、DTO 和 DAO 实现：\n\n- `code.byted.org/middleware/hertz/byted/config/local`：测试启动时加载本地配置。\n- `code.byted.org/videoarch/general_console/biz/config`：初始化业务配置。\n- `code.byted.org/videoarch/general_console/biz/util`：初始化 metrics。\n- `code.byted.org/videoarch/general_console/biz/dal/dto`：提供 `AuthorizeInfo` 和 `AdminUserInfo` 数据结构。\n- `code.byted.org/gopkg/gorm`：DAO 层事务和错误处理依赖的 ORM。\n- `code.byted.org/gopkg/gomonkey`：测试中用于 patch `Rollback`，验证异常路径。\n\n整体上，`biz/dal` 是业务逻辑与数据库之间的持久化边界。业务层不应直接拼接访问 `v_account_user_rel` 或 `v_account_admin`，而应通过 `Db` 上的 DAO 方法完成授权关系和管理员记录的读写。\n\n## 贡献注意事项\n\n修改该模块时需要重点关注以下约束：\n\n- 新增授权关系写入逻辑时，应保持 `account_id + user_name` 的唯一性语义。\n- 新增管理员写入逻辑时，应保持 `user_name` 的唯一性语义。\n- 涉及事务的 DAO 逻辑应复用 `RollbackTX` 的错误合并模式，避免回滚错误覆盖原始业务错误。\n- 修改 `InitDb` 或测试初始化链路时，需要确认 `TestMain` 中的配置加载、metrics 初始化和数据库初始化顺序仍然有效。\n- 当前 DAO 测试使用真实配置和数据库连接，测试数据应避免与环境中已有数据冲突，并在测试结束时清理。","other-errno":"# Other — errno\n\n## 模块概览\n\n`biz/errno` 提供统一的业务响应结构和错误码常量。它不负责处理请求、记录日志或写 HTTP 响应，而是为 handler 和 middleware 构造实现了 `Payload` 接口的返回值。\n\n核心职责：\n\n- 定义业务错误码：`CodeOKZero`、`CodeBadRequest`、`CodeForbidden`、`CodeInternalErr` 等。\n- 定义响应包裹结构：`DevSREPayload`、`BPMPayload`、`MDAPPayload`。\n- 提供响应构造函数：`DevSreOK`、`DevSreErrorWithCode`、`BpmOK`、`MDAPErrorWithResponse` 等。\n- 通过 `Payload` 接口让 `biz/middleware` 可以统一接收 handler 返回值。\n\n## 核心接口\n\n```go\ntype Payload interface {\n\tGetCode() int\n\tGetMessage() string\n}\n```\n\n`Payload` 是 middleware 和 handler 之间的响应契约。业务 handler 通常返回 `errno.Payload`，middleware 再将其序列化为 JSON。\n\n当前实现该接口的结构包括：\n\n- `DevSREPayload`\n- `BPMPayload`\n- `MDAPPayload`\n\n`JanusPayload` 也定义在本模块中，但当前代码中没有实现 `GetCode()` / `GetMessage()`，因此不满足 `Payload` 接口。\n\n## 错误码\n\n错误码定义在 `biz/errno/error.go`，按业务语义分组：\n\n```go\nconst (\n\tCodeOKZero = 0\n\tCodeWarn  = 2\n\n\tCodeBadRequest   = 4000\n\tCodeUnauthorized = 4001\n\tCodeForbidden    = 4003\n\tCodeNotFound     = 4004\n\n\tCodeInternalErr  = 5000\n\tCodeGetDataErr   = 5012\n\tCodeParseDataErr = 5013\n\tCodeDbErr        = 5014\n)\n```\n\n注意：HTTP 层通常仍返回 `http.StatusOK`，真实业务状态放在 payload 的 `Code` 字段中。比如 `CodeForbidden` 会被序列化进响应体，而不一定对应 HTTP 403。\n\n## 响应结构\n\n### `DevSREPayload`\n\n```go\ntype DevSREPayload struct {\n\tCode     int         `json:\"code\"`\n\tMessage  string      `json:\"message\"`\n\tResponse interface{} `json:\"response\"`\n\tTraceId  string      `json:\"trace_id\"`\n}\n```\n\n这是普通控制台接口使用较多的响应格式。数据字段叫 `response`。\n\n常用构造函数：\n\n- `DevSreOK(data interface{})`\n- `DevSreError(err error)`\n- `DevSreErrorWithCode(code int, err error)`\n\n`DevSreError(nil)` 会退化为成功响应：\n\n```go\nDevSreOK(nil)\n// Code: CodeOKZero\n// Message: \"ok\"\n```\n\n`DevSreErrorWithCode` 会把 `Response` 设置为 `map[string]string{}`，用于显式错误返回。\n\n### `BPMPayload`\n\n```go\ntype BPMPayload struct {\n\tCode    int         `json:\"code\"`\n\tMessage string      `json:\"message\"`\n\tData    interface{} `json:\"data\"`\n\tTraceId string      `json:\"trace_id\"`\n}\n```\n\nBPM 接口使用 `data` 作为业务数据字段，而不是 `response`。\n\n常用构造函数：\n\n- `BpmOK(data interface{})`\n- `BpmError(err error)`\n- `BpmErrorWithCode(code int, err error)`\n\n`BpmError(nil)` 同样返回成功响应：\n\n```go\nBpmOK(nil)\n```\n\n### `MDAPPayload`\n\n```go\ntype MDAPPayload struct {\n\tCode     int         `json:\"Code\"`\n\tMessage  string      `json:\"Message\"`\n\tResponse interface{} `json:\"Response\"`\n\tTraceId  string      `json:\"TraceId\"`\n}\n```\n\n`MDAPPayload` 专用于 `/mdap/v1` 路由下的接口。它和 `DevSREPayload` 的主要区别是 JSON 字段名采用大写开头的驼峰格式，例如 `Code`、`Message`、`Response`、`TraceId`。\n\n常用构造函数：\n\n- `MDAPOK(data interface{})`\n- `MDAPError(err error)`\n- `MDAPErrorWithCode(code int, err error)`\n- `MDAPErrorWithResponse(code int, err error, response interface{})`\n- `MDAPAuthErrorWithApplyURL(applyURL string)`\n\n`MDAPErrorWithResponse` 用于错误场景仍需要返回结构化响应体的情况。例如批量创建、批处理任务中，部分或全部失败时可以携带详细结果。\n\n`MDAPAuthErrorWithApplyURL` 固定返回：\n\n```go\nMDAPPayload{\n\tCode:    CodeForbidden,\n\tMessage: \"permission denied, applyURL: \" + applyURL,\n}\n```\n\n## 分页响应辅助结构\n\n```go\ntype DevSREPageGetPayloadResp struct {\n\tData          interface{} `json:\"data\"`\n\tTotal         int64       `json:\"total\"`\n\tCurrent       int         `json:\"current\"`\n\tPageSize      int         `json:\"pageSize\"`\n\tSortField     string      `json:\"sortField\"`\n\tSortDirection string      `json:\"sortDirection\"`\n}\n```\n\n`DevSREPageGetPayloadResp` 是 DevSRE 风格分页接口的业务数据结构，常作为 `DevSreOK(...)` 的 `Response` 使用，例如账号、域名、授权列表等分页查询接口。\n\n## 典型执行路径\n\n```mermaid\nflowchart TD\n    A[\"业务 handler\"] --> B[\"返回 errno.Payload\"]\n    B --> C{\"响应类型\"}\n    C --> D[\"DevSREPayload / BPMPayload\"]\n    C --> E[\"MDAPPayload\"]\n    D --> F[\"middleware.Response / BPMResponse 序列化\"]\n    E --> G[\"middleware.MDAPResponse 补 TraceId 并序列化\"]\n```\n\nhandler 通常只负责构造 payload：\n\n```go\nreturn errno.DevSreOK(data)\nreturn errno.DevSreErrorWithCode(errno.CodeBadRequest, err)\n\nreturn errno.BpmOK(result)\nreturn errno.BpmErrorWithCode(errno.CodeInternalErr, err)\n\nreturn errno.MDAPOK(resp)\nreturn errno.MDAPErrorWithResponse(errno.CodeBadRequest, err, detail)\n```\n\nmiddleware 负责把 `errno.Payload` 转成 JSON。`MDAPResponse` 还会在 `MDAPPayload.TraceId` 为空时从上下文读取或生成 trace id。\n\n## 与其他模块的连接\n\n`biz/middleware/base.go` 定义了统一 handler 签名：\n\n```go\ntype MyHandlerFunc func(context.Context, *app.RequestContext) errno.Payload\n```\n\n因此业务 handler 可以只返回 `errno.Payload`，无需直接操作 JSON 序列化。\n\n主要连接方式：\n\n- 普通控制台接口通过 `middleware.Response(...)` 调用 handler，并序列化 `DevSREPayload`。\n- BPM 接口通过 `middleware.BPMResponse(...)` 做 JWT 校验后序列化 `BPMPayload`。\n- MDAP 接口通过 `middleware.MDAPResponse(...)` 序列化 `MDAPPayload`，并自动补齐 `TraceId`。\n- `biz/handler/mdap_*` 中大量使用 `MDAPOK`、`MDAPErrorWithCode`、`MDAPErrorWithResponse`。\n- `biz/handler/bpm.go` 和 `biz/handler/script.go` 使用 `BpmOK`、`BpmErrorWithCode`。\n- `biz/handler/account.go`、`authorize.go`、`config.go`、`domain.go` 等普通控制台接口使用 `DevSreOK`、`DevSreErrorWithCode`。\n\n## 使用约定\n\n成功响应优先使用对应业务线的 `OK` 构造函数：\n\n```go\nreturn errno.DevSreOK(resp)\nreturn errno.BpmOK(resp)\nreturn errno.MDAPOK(resp)\n```\n\n带明确业务错误码的失败响应使用 `ErrorWithCode`：\n\n```go\nreturn errno.MDAPErrorWithCode(errno.CodeBadRequest, err)\nreturn errno.DevSreErrorWithCode(errno.CodeGetDataErr, err)\nreturn errno.BpmErrorWithCode(errno.CodeInternalErr, err)\n```\n\n需要在错误响应中返回额外业务数据时，使用 `MDAPErrorWithResponse`：\n\n```go\nreturn errno.MDAPErrorWithResponse(errno.CodeBadRequest, err, resp)\n```\n\n不要把 `nil` error 传给 `DevSreErrorWithCode`、`BpmErrorWithCode` 或 `MDAPErrorWithCode`，这些函数会直接调用 `err.Error()`。只有 `DevSreError`、`BpmError`、`MDAPError` 对 `nil` 做了成功响应处理。\n\n## 测试覆盖\n\n`biz/errno/response_test.go` 覆盖了三类响应格式的关键行为：\n\n- `DevSreError(nil)`、`BpmError(nil)`、`MDAPError(nil)` 返回成功响应。\n- `DevSreErrorWithCode`、`BpmErrorWithCode`、`MDAPErrorWithCode` 保留传入错误码和错误消息。\n- `DevSreOK` 使用 `Response` 字段。\n- `BpmOK` 使用 `Data` 字段。\n- `MDAPOK` 使用大写 JSON 风格对应的结构字段。\n- `MDAPErrorWithResponse` 能携带自定义 `Response`。\n- `MDAPAuthErrorWithApplyURL` 返回 `CodeForbidden` 并把申请链接拼入 `Message`。\n\n`biz/errno/base_test.go` 的 `TestMain` 会加载本地配置、初始化 metrics 和数据库，保证包测试在接近真实运行环境的上下文中执行。","other-go-mod":"# Other — go.mod\n\n## go.mod 模块说明\n\n`go.mod` 定义了当前仓库的 Go 模块边界、语言版本、依赖集合以及依赖替换规则。该文件本身不包含函数、结构体或可执行逻辑，因此没有内部调用、外部调用或执行流；它通过 Go Modules 机制影响整个代码库的编译、测试、依赖解析和版本选择。\n\n模块路径为：\n\n```go\nmodule code.byted.org/videoarch/general_console\n```\n\n这意味着仓库内代码在互相引用时，会以 `code.byted.org/videoarch/general_console/...` 作为包路径前缀。\n\n## Go 版本\n\n```go\ngo 1.18\n```\n\n该声明表示模块按 Go 1.18 的模块语义进行解析。开发和 CI 环境应至少使用兼容 Go 1.18 的工具链，否则可能出现依赖解析、语法或标准库行为不一致的问题。\n\n## 依赖结构\n\n`go.mod` 使用两个 `require` 块：\n\n第一个 `require` 块是项目显式依赖，通常对应业务代码中直接 `import` 的包。\n\n第二个 `require` 块标记为 `// indirect`，表示这些依赖主要由直接依赖传递引入。它们仍会参与版本选择，保证构建结果可复现。\n\n整体上，该模块依赖可以按职责理解为以下几类：\n\n```mermaid\nflowchart TD\n    A[general_console 模块] --> B[HTTP 与 RPC 框架]\n    A --> C[配置与环境]\n    A --> D[鉴权与安全]\n    A --> E[视频架构业务 SDK]\n    A --> F[存储与数据库]\n    A --> G[日志、链路与指标]\n    A --> H[测试工具]\n```\n\n## HTTP 与 RPC 框架\n\n该模块同时引入 Hertz、Kitex、Thrift 和 Overpass 相关依赖，说明代码库既有 HTTP 服务能力，也可能调用或暴露 RPC 能力。\n\n主要依赖包括：\n\n```go\ncode.byted.org/middleware/hertz v1.14.1\ngithub.com/cloudwego/hertz v0.10.2\ncode.byted.org/kite/kitex v1.20.3\ncode.byted.org/kite/kitex-overpass-suite v0.0.36\ncode.byted.org/kite/kitex/pkg/protocol/bthrift v0.0.0-20250625032607-82820c47ec0e\ngithub.com/apache/thrift v0.16.0\n```\n\n其中：\n\n- `code.byted.org/middleware/hertz` 和 `github.com/cloudwego/hertz` 提供 HTTP 服务框架能力。\n- `code.byted.org/kite/kitex` 提供内部 Kitex RPC 能力。\n- `code.byted.org/kite/kitex-overpass-suite` 支持通过 Overpass 调用内部服务。\n- `code.byted.org/kite/kitex/pkg/protocol/bthrift` 和 `github.com/apache/thrift` 与 Thrift 协议编解码相关。\n\n需要注意的是，文件底部存在 `replace` 规则：\n\n```go\nreplace github.com/apache/thrift => github.com/apache/thrift v0.13.0\n```\n\n虽然直接依赖声明中写的是 `github.com/apache/thrift v0.16.0`，但实际构建会使用 `v0.13.0`。修改 Thrift 相关代码或升级依赖时，必须同时检查该替换规则是否仍然必要，否则可能引入协议兼容性或生成代码兼容性问题。\n\n## 配置、环境与服务发现\n\n配置和运行环境相关依赖集中在以下包：\n\n```go\ncode.byted.org/gopkg/consul v1.2.6\ncode.byted.org/gopkg/env v1.7.19\ncode.byted.org/gopkg/tccclient v1.6.8\ncode.byted.org/videoarch/caesar_config v1.0.9\n```\n\n这些依赖通常承担以下职责：\n\n- `consul`：服务发现或配置发现。\n- `env`：运行环境识别和环境变量处理。\n- `tccclient`：TCC 配置读取。\n- `caesar_config`：视频架构内部配置能力。\n\n开发新功能时，如果需要读取配置，应优先查找代码库中已有的配置封装方式，而不是直接散落读取环境变量或硬编码配置名。\n\n## 鉴权、账号与安全能力\n\n直接依赖中包含多组内部鉴权和账号相关 SDK：\n\n```go\ncode.byted.org/bytecloud/iam_sdk v0.0.7\ncode.byted.org/videoarch/iamsdk v1.0.56\ncode.byted.org/videoarch/account-sdk v1.0.52\ncode.byted.org/videoarch/mdap_auth v0.0.0-20260318031725-da44661884ca\ncode.byted.org/inf/infsecc v1.0.3\n```\n\n这些依赖说明该服务可能涉及：\n\n- 用户或服务身份识别。\n- IAM 权限校验。\n- 视频架构账号体系访问。\n- MDAP 相关鉴权。\n- 内部安全能力接入。\n\n贡献鉴权相关代码时，应确认当前调用路径使用的是哪套 SDK，避免在同一业务链路中混用多个权限来源导致语义不一致。\n\n## 视频架构业务 SDK\n\n该模块显式依赖多个 `code.byted.org/videoarch/...` 包，是当前服务连接视频架构业务能力的主要入口：\n\n```go\ncode.byted.org/videoarch/cloud_gopkg v1.1.226\ncode.byted.org/videoarch/bktmeta-sdk-go v1.0.57\ncode.byted.org/videoarch/general_file_manager_go v0.1.6\ncode.byted.org/videoarch/uploader_v5 v1.0.40\ncode.byted.org/videoarch/vvid v1.1.24\n```\n\n这些依赖大致覆盖：\n\n- 云相关通用能力：`cloud_gopkg`\n- Bucket 元数据：`bktmeta-sdk-go`\n- 通用文件管理：`general_file_manager_go`\n- 上传能力：`uploader_v5`\n- 视频 ID 或资源标识：`vvid`\n\n此外，Overpass 客户端依赖也属于业务服务调用入口：\n\n```go\ncode.byted.org/overpass/bytedance_videoarch_compound v0.0.0-20260422072211-6c5be2272914\ncode.byted.org/overpass/toutiao_videoarch_video_data_access v0.0.0-20260409053906-2dea154fe7d3\n```\n\n这些包通常由生成代码或内部服务定义驱动。升级时应重点关注 IDL 变更、字段兼容性和调用方错误处理逻辑。\n\n## 存储与数据库\n\n数据库相关直接依赖包括：\n\n```go\ncode.byted.org/gopkg/gorm v1.0.5\ncode.byted.org/gopkg/mysql-driver v1.2.7\n```\n\n间接依赖中还包含：\n\n```go\ngorm.io/gorm v1.23.8 // indirect\n```\n\n这表明项目可能使用内部封装的 GORM 和 MySQL driver。新增数据库访问代码时，应先查找仓库已有 DAO、model 或 repository 模式，保持连接初始化、事务处理、错误包装和日志字段一致。\n\n## 日志、指标与链路上下文\n\n可观测性相关依赖包括：\n\n```go\ncode.byted.org/gopkg/ctxvalues v0.5.0\ncode.byted.org/gopkg/logid v0.0.0-20241008043456-230d03adb830\ncode.byted.org/gopkg/logs v1.2.26\ncode.byted.org/gopkg/metrics/v3 v3.1.35\n```\n\n这些包通常用于：\n\n- 从 `context.Context` 中传递请求级信息。\n- 生成或读取 `logid`。\n- 输出结构化日志。\n- 上报业务或系统指标。\n\n在新增入口逻辑、RPC 调用、数据库访问或关键业务分支时，应复用已有日志和指标模式，确保排查问题时能串联请求上下文。\n\n## 序列化与数据格式\n\n直接依赖中包含：\n\n```go\ngithub.com/bytedance/sonic v1.15.0\ngopkg.in/yaml.v3 v3.0.1\n```\n\n`sonic` 通常用于高性能 JSON 编解码，`yaml.v3` 用于 YAML 配置或数据结构解析。若已有代码使用 `sonic`，新增 JSON 处理逻辑应尽量保持一致，避免同一模块内混用多个 JSON 库带来的行为差异。\n\n## 测试依赖\n\n测试相关直接依赖包括：\n\n```go\ncode.byted.org/gopkg/gomonkey v0.1.4\ngithub.com/agiledragon/gomonkey/v2 v2.13.0\ngithub.com/stretchr/testify v1.10.0\ngithub.com/kr/pretty v0.3.1\ngithub.com/niemeyer/pretty v0.0.0-20200227124842-a10e7caefd8e\n```\n\n其中：\n\n- `testify` 常用于断言和 mock 辅助。\n- `gomonkey` 用于函数、方法或变量打桩。\n- `pretty` 用于测试输出中的结构体差异展示。\n\n新增测试时，应优先使用项目已有测试风格。使用 `gomonkey` 时要注意 patch 生命周期，通常需要在测试结束时释放 patch，避免影响同一进程内其他测试。\n\n## indirect 依赖的意义\n\n第二个 `require` 块中的依赖虽然标记为 `// indirect`，但并不表示“不重要”。它们由直接依赖引入，并被 Go Modules 记录下来，以固定最小版本选择结果。\n\n常见间接依赖类别包括：\n\n- 链路追踪：`code.byted.org/bytedtrace/...`、`code.byted.org/trace/trace-client-go`\n- 指标与监控：`prometheus`、`metrics_core`、`monitoring-common-go`\n- 安全和证书：`code.byted.org/security/...`\n- Kitex、Hertz、Thrift 的底层运行时：`github.com/cloudwego/...`\n- Protobuf 与 gRPC：`google.golang.org/protobuf`、`google.golang.org/grpc`\n- 配置解析：`viper`、`toml`、`yaml.v2`\n\n不要手动删除 `// indirect` 依赖来“精简”文件。应通过 Go 工具链维护：\n\n```bash\ngo mod tidy\n```\n\n## 依赖维护建议\n\n修改 `go.mod` 时应遵循以下原则：\n\n1. 新增业务依赖前，先确认仓库中是否已经存在同类内部 SDK 或封装。\n2. 升级 `kitex`、`hertz`、`thrift`、`gorm` 等基础依赖时，应运行完整测试，并重点验证生成代码、RPC 调用和 HTTP handler 行为。\n3. 修改 `replace github.com/apache/thrift` 前，应确认所有 Thrift 生成代码和运行时协议兼容。\n4. 不要直接编辑大量 `// indirect` 项；优先使用 `go mod tidy` 让工具链收敛。\n5. 如果依赖升级改变了 `go.sum`，应把 `go.mod` 和 `go.sum` 一起提交，保证其他开发者和 CI 能复现同样的解析结果。\n\n## 与代码库其他部分的关系\n\n`go.mod` 是整个 `code.byted.org/videoarch/general_console` 模块的依赖入口。仓库中的业务包、HTTP handler、RPC client、DAO、配置初始化、鉴权逻辑和测试代码都会受它影响。\n\n由于该文件没有执行流，理解它的关键不是调用关系，而是依赖边界：\n\n- 它定义当前代码库可以导入哪些外部包。\n- 它固定核心框架和内部 SDK 的版本。\n- 它通过 `replace` 改写实际使用的 Thrift 版本。\n- 它为构建、测试、代码生成和 CI 提供一致的模块解析基础。","other-handler":"# Other — handler\n\n## 其他 handler 模块\n\n该模块覆盖 `biz/handler` 中偏基础设施和批处理性质的入口：服务初始化、BPM 账号/桶流程、脚本工具、MDAP 处理任务、从 Hive 导入 MDAP Source，以及相关测试支撑。它们共同依赖 `GeneralConsoleServer` 聚合外部 SDK/RPC 客户端，并通过 `middleware.BPMResponse`、`middleware.MDAPResponse` 或 `middleware.Response` 统一输出 `errno.Payload`。\n\n### 服务对象与初始化\n\n核心对象是 `GeneralConsoleServer`。`NewGeneralConsoleServer` 会初始化账号、GFM、ODM、ByteTree、Cloud IAM、Uploader、MDAP Auth、MDAP Compound、Hive VID Reader 等客户端，并保存 `db` 与 `topAccounts`。\n\n初始化要点：\n\n- `mdapCompoundClient` 使用 `bytedance_videoarch_compound.NewClientWithBytedConfig`，集群来自 `config.Conf.MDAP.Cluster`，默认是 `mdap`。\n- Hive 导入能力通过 `NewTQSHiveVIDReaderFromConfig(config.Conf.TQS, config.Conf.Meta.PSM)` 注入；配置不完整时不会启用，后续会退化为 `notConfiguredHiveVIDReader`。\n- `VCloudControlConfig` 存在且包含 `AccessKey`、`SecretKey` 时才调用 `passportclient.DefaultInstance.SetAuth`。\n- `MDAP.IAM` 缺失或字段不完整时跳过；字段完整但 `iam.NewClient` 失败会 `panic`。\n- `InitTopAccounts` 会请求 Guardian API `/v1/folders`，按 `nextPageToken` 分页，把 folder id 映射到展示名。\n\n测试入口 `TestMain` 默认会执行 `local.LoadConf`、`config.InitConf`、`dao.InitDb`、`util.InitMetrics` 和 `NewGeneralConsoleServer`。需要跳过真实初始化时设置 `GC_SKIP_HANDLER_TESTMAIN_INIT=1`。\n\n### BPM 账号与桶流程\n\nBPM 入口统一使用 `middleware.BPMResponse` 包装，例如：\n\n- `BPMCreateAccount` -> `handleBPMCreateAccount`\n- `BPMCreateAccountBuckets` -> `handleBPMCreateAccountBuckets`\n- `BPMCheckUserTreePolicy` -> `handleBPMCheckUserTreePolicy`\n\n`handleBPMCreateAccount` 处理 `BPMCreateAccountWorkflow`：\n\n1. 解析请求，并读取 `x-bpm-bkt_skip`、`x-bpm-bkt_name`、`x-bpm-bkt_async`。\n2. 如果账号已存在，复用 `KeyPair`，但如果当前区域已有 `account.ModuleStorage` 配置则返回 `CodeBadRequest`。\n3. 如果账号不存在，先通过 `createByteTreeResource` 创建服务树资源，再调用 `accountClient.Create`。\n4. 创建成功后调用 `authorizeUser` 授权用户为 `AdminUser`。\n5. 调用 `createDomain` 创建 CDN/Internal/InternalRD/ExternalOrigin 域名及账号关系。\n6. 默认调用 `rpc.CreateBucket` 创建 object 桶；设置 `x-bpm-bkt_skip` 时走测试/跳过路径。\n7. 非异步建桶时，通过 `accountClient.MCreateConfig` 写入 `\"object\": bucket` 存储配置。\n\n`handleBPMCheckUserTreePolicy` 校验创建资源权限，实际调用 `checkUserByteTreePolicy(ctx, creator, serviceTreeNodeId, \"groot.nodes.create_resource\")`。`service_tree_node_id` 为 0 会直接报错；权限检查走 `cloudIAMCli.IAM.IAuthCheckerV3.HasPermissionV3Ctx`。\n\n批量建桶逻辑集中在 `doCreateBPMAccountBuckets`。它使用三组映射决定桶名、服务树节点和 TOS vRegion：\n\n- `categoryShortNameMap`：业务分类到短名，例如 `TTS -> \"tts\"`。\n- `shortCategoryServiceTreeNodeIdMap`：短名到服务树节点，例如 `\"tts\" -> 153535`。\n- `sceneTosVRegionMap`：`idc_短名` 到 vRegion；`getSceneTosVRegion` 对 TTS 有 fallback，会退回到 `Original` 对应的短名 `\"v\"`。\n\n低频桶会按区域调整 `StorageClass` 和 vRegion。桶创建完成后，如果 `WriteAccountConfig` 为真且桶创建未失败，会为 category、低频或 source 派生出的 ckey 调用 `accountClient.MCreateConfig`。\n\n### 脚本入口\n\n脚本类接口使用 `middleware.Response`，面向内部批处理或辅助操作。\n\n`ScriptCreateAccountTree` -> `handleScriptCreateAccountTree` 接收账号列表，逐个执行：\n\n1. `accountClient.GetAccountByName`\n2. `createByteTreeResource`\n3. 写回 `acct.ServiceTreeNodeId`\n4. `accountClient.UpdateAccount`\n\n返回值是 `map[string]string`，每个账号对应 `\"ok\"` 或错误信息。\n\n`handleScriptBatchCreateBucket` 解析 `model.BatchCreateBucketReq` 并调用 `rpc.BatchCreateBucket`。注意：`ScriptBatchCreateBucket` 当前绑定的是 `svr.handleScriptCreateAccountTree`，而不是 `handleScriptBatchCreateBucket`；修改路由时需要确认这里是否符合预期。\n\n`ScriptUploadFile` -> `handleScriptUploadFile` 从 multipart 字段 `file` 读取内容，写入临时文件，再调用 `uploadCli.UploadFile(ctx, tmpFile.Name(), consts.OBJECT, space, accountId, uploader.WithFileExt(filepath.Ext(fileExt)))`。`space`、`accountId`、`fileExt` 来自 query 参数，临时文件会在请求结束后删除。\n\n### MDAP 处理任务\n\n`CreateMDAPProcessingTask` 是同步 fan-out 入口，包装方法为 `middleware.MDAPResponse(ctx, c, \"mdap.processing_task.create\", svr.handleCreateMDAPProcessingTask)`。核心逻辑在纯函数 `createMDAPProcessingTask`，方便用 fake backend 测试。\n\n请求结构是 `CreateMDAPProcessingTaskRequest`，校验规则由 `validateMDAPProcessingTaskRequest` 执行：\n\n- `AssetGroupID` 不能为空。\n- `OutputStorage` 会转大写，只允许 `TOS` 或 `HDFS`。\n- `DatasetListener` 必须显式传入。\n- `ResourceMode` 只允许 `exclusive` 或 `shared`。\n- `TaskType` 只允许 `template`。\n- `Template` 只允许 `snapshot`。\n- `TemplateId` 去空格后不能为空。\n\n执行流程：\n\n```mermaid\nflowchart TD\n  A[绑定请求] --> B[校验并归一化]\n  B --> C[查询 AssetGroup]\n  C --> D[MDAPAuth 校验 space]\n  D --> E[QuerySources 最多探测 101 个]\n  E --> F[逐个 StartProcessing]\n  F --> G[汇总 Runs 和状态]\n```\n\n`mdapProcessingBackend` 抽象了 `MGetAssetGroups`、`QuerySources`、`StartProcessing`。生产实现是 `mdapProcessingCompoundBackend`，其中 `QuerySources` 和 `StartProcessing` 使用 5 秒 RPC timeout。\n\n任务最多处理 100 个 source：查询时 limit 使用 `101`，用于发现超限；如果 source 为空、数量超过 100，或 `Total > 100`，返回 `CodeBadRequest`。每个 source 通过 `startMDAPProcessingForSource` 调用 `StartProcessing`，请求中固定 `OperatorId = \"Snapshot\"`，`TemplateId` 来自用户请求，`Auth` 来自 `middleware.MDAPAuth`。\n\n响应状态规则：\n\n- 全部成功：`Status = \"submitted\"`，返回 `errno.MDAPOK`。\n- 部分失败：`Status = \"partial_failed\"`，仍返回 `errno.MDAPOK`。\n- 全部失败：`Status = \"failed\"`，返回 `errno.MDAPErrorWithResponse(errno.CodeInternalErr, ..., resp)`，响应体仍包含每个 run 的失败原因。\n\n### 从 Hive 导入 MDAP Source\n\n`ImportMDAPSourcesFromHive` 负责把 Hive 表中的 `vid` 列转换为 MDAP Source 批量创建请求。入口包装为 `middleware.MDAPResponse(ctx, c, \"mdap.source.import_hive\", svr.handleImportMDAPSourcesFromHive)`。\n\n请求结构 `ImportMDAPSourcesFromHiveRequest` 包含：\n\n- `AssetGroupID`\n- `VODSpaces`\n- `HiveTable`：`Cluster`、`Database`、`Table`、`Partitions`、`ExtraFilters`\n- `SourceConfig`\n- `Tags`\n- `Options`：`DryRun`、`SkipCheckMediaType`\n\n`normalizeHiveImportRequest` 会裁剪字符串和 map 中的空格。非 dry-run 模式要求 `AssetGroupID`、`VODSpaces`、`HiveTable.Partitions` 非空，并且显式传入的 `SourceConfig.Type` 必须是 `mdap_model.SourceType_VDA`。dry-run 模式允许跳过资产组、点播空间、分区和 SourceConfig 类型校验，但 `HiveTable.Cluster`、`Database`、`Table` 仍必须存在。\n\ndry-run 模式只调用 `runHiveImportDryRunPrecheck`，最终走 `HiveVIDReader.PrecheckVIDs`，并强制 `Limit = 1`。成功时返回空 `Summary` 和空 `Results`；如果错误包含 `errHiveImportBadRequest`，返回 `CodeBadRequest`，否则返回 `CodeGetDataErr`。\n\n非 dry-run 模式会先调用 `prepareMDAPSourceBatchCreateForHive` 校验资产组权限与存在性，再通过 `resolveHiveImportSourceConfig` 决定 SourceConfig：请求未传时使用 `group.SourceConfigs[0]`，最终类型必须是 VDA。随后 `startHiveImportInBackground` 异步执行真正导入，并立即返回 `CodeOKZero`。\n\n后台任务 `runHiveImportBackground` 使用 `context.Background()`，不会因为原 HTTP 请求取消而中断。它读取 Hive VID 后调用 `buildHiveImportResults` 分类结果：空 VID 标记为 `invalid/empty_vid`，重复 VID 会计入 `DuplicateVIDRows`，但不会去重，也不会截断，重复项仍会进入批创建候选列表。批创建请求由 `buildHiveImportBatchRequest` 生成，默认 `SkipCheckMediaType = true`，并调用 `runMDAPSourceBatchCreator`；默认实现最终走 `batchCreateMDAPSourcesWithGroupOptions(..., dedupeIdenticalSources: false)`。\n\n批创建结果通过 `mergeHiveImportBatchResults` 合并：\n\n- `Source != nil`：`created`\n- 错误包含 `\"sourceMediaType\"`：`skipped`\n- 缺少批创建结果或其他错误：`failed`\n\n### TQS Hive VID Reader\n\n`TQSHiveVIDReader` 是 `HiveVIDReader` 的 TQS 实现，由 `NewTQSHiveVIDReaderFromConfig` 创建。配置必须包含 `AppID`、`AppKey`、`UserName`、`Cluster` 和正数 `Timeout`；`PollInterval` 缺省为 3 秒。`servicePSM` 为空时使用 `toutiao.videoarch.general_console`。\n\n`ReadVIDs` 和 `PrecheckVIDs` 共用 `prepareTQSQueryJob`：\n\n1. `buildTQSHiveVIDSQL` 生成 `SELECT \\`vid\\` FROM \\`db\\`.\\`table\\``。\n2. `validateQueueConfig` 要求 `YarnClusterName` 和 `MapReduceJobQueueName` 要么同时配置，要么都不配置。\n3. `gotqs.MakeTqsClient` 使用配置里的 TQS `cluster`，不是请求里的 Hive `Cluster`。\n4. 通过 `infsecc.GetToken(false)` 获取 PSM token，并写入 `tqs.inf.sec.token`。\n5. 可选写入 `yarn.cluster.name` 和 `mapreduce.job.queuename`。\n\nSQL 构造只允许安全标识符：`^[A-Za-z_][A-Za-z0-9_]*$`。`Partitions` 与 `ExtraFilters` 会按 key 排序后拼成等值条件，字符串值用单引号包裹并转义内部单引号。`Limit > 0` 时追加 `LIMIT n`。\n\n`ReadVIDs` 创建普通 TQS job，等待 `STATUS_COMPLETE` 后拉取结果并调用 `buildHiveVIDReadResultFromTQSRows`。`PrecheckVIDs` 创建 dry-run job，不拉取结果，只等待 `AnalysisCompleted` 或 `STATUS_COMPLETE`，最长等待时间会限制在 10 秒。\n\n`tqsReadError` 会记录 `stage`、`job_id`、`status`、`detail` 和 `cause`。错误详情会通过 `sanitizeTQSErrorDetail` 脱敏：替换 AppKey、InfSec token、JWT 类字符串，并把超长详情截断到 `maxTQSReadErrorDetailSize`。\n\n### 测试与扩展点\n\n测试代码主要通过 fake 和注入函数隔离外部依赖：\n\n- `fakeMDAPProcessingBackend` 覆盖 MDAP 处理任务的资产组查询、source 查询和处理启动。\n- `fakeHiveVIDReader` 覆盖 dry-run precheck 与后台读取。\n- `fakeTQSQueryClient` 覆盖 TQS job 创建、轮询、结果拉取和取消。\n- `patchNewGeneralConsoleServerDeps` 用 gomonkey 替换 `NewGeneralConsoleServer` 中的大部分外部客户端构造函数。\n- `mdapSourceBatchPreparer`、`mdapSourceBatchCreator`、`hiveImportAsyncRunner` 是 `GeneralConsoleServer` 上的显式测试/扩展注入点。\n\n新增逻辑时优先把可测试的核心行为拆成纯函数或小接口，例如 `createMDAPProcessingTask`、`normalizeHiveImportRequest`、`buildHiveImportResults`、`buildTQSHiveVIDSQL` 这种模式。这样可以避免在单元测试中启动完整配置、数据库和外部 RPC。","other-middleware":"# Other — middleware\n\n## 概览\n\n`biz/middleware` 提供 General Console 的 Hertz 请求中间件和统一响应出口。它不承载业务逻辑，主要负责：\n\n- 将 handler 返回的 `errno.Payload` 序列化为约定 JSON 响应。\n- 为普通接口、MDAP 接口、BPM 接口提供不同的响应包装行为。\n- 在 MDAP 请求中解析鉴权凭证并写入 `RequestContext`。\n- 为 MDAP 响应补齐 `TraceId`。\n- 为 BPM 请求校验 `x-jwt-token`。\n\n核心实现位于：\n\n- `biz/middleware/base.go`\n- `biz/middleware/parse_mdap_auth.go`\n\n## 响应模型\n\n所有响应包装函数都接收同一种业务 handler 签名：\n\n```go\ntype MyHandlerFunc func(context.Context, *app.RequestContext) errno.Payload\n```\n\n业务 handler 返回 `errno.Payload`，由 middleware 负责写 HTTP 响应。`errno.Payload` 当前要求实现：\n\n```go\ntype Payload interface {\n\tGetCode() int\n\tGetMessage() string\n}\n```\n\n实际常用响应结构定义在 `biz/errno/response.go`：\n\n- `errno.DevSREPayload`：普通 General Console 接口使用，JSON 字段为小写，例如 `code`、`message`、`response`、`trace_id`。\n- `errno.MDAPPayload`：`/mdap/v1` 接口使用，JSON 字段为大写驼峰，例如 `Code`、`Message`、`Response`、`TraceId`。\n- `errno.BPMPayload`：BPM 响应结构，当前 `BPMResponse` 实际仍常配合 `errno.DevSreOK` / `errno.DevSreErrorWithCode` 使用。\n\n## 请求执行关系\n\n```mermaid\nflowchart TD\n    A[\"Hertz 路由\"] --> B[\"ResponseMiddleware\"]\n    B --> C[\"业务路由分组\"]\n    C --> D[\"普通 handler\"]\n    C --> E[\"BPM handler\"]\n    C --> F[\"MDAP handler\"]\n    D --> G[\"Response\"]\n    E --> H[\"BPMResponse\"]\n    F --> I[\"ParseMDAPAuthMiddleware\"]\n    I --> J[\"MDAPResponse\"]\n```\n\n`router.go` 中的接入方式：\n\n- 全局调用 `r.Use(middleware.ResponseMiddleware())`。\n- `/general-console/v1` 下普通接口由 handler 内部调用 `middleware.Response(...)`。\n- `/general-console/v1/bpm` 下 BPM 接口由 handler 内部调用 `middleware.BPMResponse(...)`。\n- `/mdap/v1` 路由分组挂载 `middleware.ParseMDAPAuthMiddleware()`，然后由 handler 内部调用 `middleware.MDAPResponse(...)`。\n\n`main.go` 在服务启动时调用：\n\n```go\nmiddleware.InitJwtValidator(config.Conf.JwtRegion)\n```\n\n用于初始化 BPM JWT 校验器。\n\n## `Response`\n\n```go\nfunc Response(ctx context.Context, c *app.RequestContext, key string, f MyHandlerFunc)\n```\n\n`Response` 是普通 General Console 接口的统一出口。\n\n执行流程：\n\n1. 调用业务函数 `f(ctx, c)` 获取 `errno.Payload`。\n2. 使用 `json.Marshal(data)` 序列化响应。\n3. 序列化失败时调用 `c.JSON(http.StatusOK, errno.DevSreErrorWithCode(errno.CodeInternalErr, err))`。\n4. 调用 `c.Data(http.StatusOK, \"application/json\", bytes)` 写响应体。\n5. 将传入的业务 key 写入请求上下文：`c.Set(MKeyContextKey, key)`。\n\n`key` 固定存储在：\n\n```go\nconst MKeyContextKey = \"mkey\"\n```\n\n常见调用模式：\n\n```go\nmiddleware.Response(ctx, c, \"config.module.list\", svr.getConfigModuleList)\n```\n\n业务 handler 通常返回：\n\n```go\nreturn errno.DevSreOK(data)\n```\n\n对应 JSON 格式：\n\n```json\n{\n  \"code\": 0,\n  \"message\": \"ok\",\n  \"response\": {},\n  \"trace_id\": \"\"\n}\n```\n\n注意：当前实现中，`json.Marshal` 失败后没有 `return`，后续仍会执行 `c.Data(...)`。因此修改这段逻辑时要留意现有测试对该行为的覆盖，以及真实序列化失败时响应体可能被后续写入覆盖。\n\n## `MDAPResponse`\n\n```go\nfunc MDAPResponse(ctx context.Context, c *app.RequestContext, key string, f MyHandlerFunc)\n```\n\n`MDAPResponse` 是 `/mdap/v1` 接口的统一出口，核心差异是响应字段名和 `TraceId` 处理。\n\n执行流程：\n\n1. 调用业务函数 `f(ctx, c)` 获取 `errno.Payload`。\n2. 从 `ctx` 中读取 log id：`logid.GetLogIDFromCtx(ctx)`。\n3. 如果 ctx 中没有 log id，则调用 `logid.GenLogID()` 生成。\n4. 如果业务返回的是 `errno.MDAPPayload` 或 `*errno.MDAPPayload`，并且 `TraceId` 为空，则写入上一步得到的 trace id。\n5. 使用 `json.Marshal(data)` 序列化响应。\n6. 序列化失败时构造 `errno.MDAPErrorWithCode(errno.CodeInternalErr, err)`，并显式设置 `TraceId`。\n7. 调用 `c.Data(http.StatusOK, \"application/json\", bytes)` 写响应体。\n8. 写入 `MKeyContextKey`。\n\n常见调用模式：\n\n```go\nmiddleware.MDAPResponse(ctx, c, \"mdap.space.detail\", svr.handleGetMDAPSpaceDetail)\n```\n\n业务 handler 通常返回：\n\n```go\nreturn errno.MDAPOK(data)\n```\n\n对应 JSON 格式：\n\n```json\n{\n  \"Code\": 0,\n  \"Message\": \"ok\",\n  \"Response\": {},\n  \"TraceId\": \"logid-test\"\n}\n```\n\n`TraceId` 规则：\n\n- 业务返回 `errno.MDAPPayload{TraceId: \"exist\"}` 时保留原值。\n- 业务返回 `errno.MDAPPayload{TraceId: \"\"}` 时使用 ctx 中的 log id。\n- ctx 中没有 log id 时使用 `logid.GenLogID()`。\n- 指针形式 `*errno.MDAPPayload` 也会被补齐。\n- 如果返回的 payload 不是 `MDAPPayload` 或 `*MDAPPayload`，不会自动注入 `TraceId`。\n\n和 `Response` 一样，当前 `json.Marshal` 失败后没有提前返回，后续仍会执行 `c.Data(...)`。\n\n## `ParseMDAPAuthMiddleware`\n\n```go\nconst MDAPAuth = \"mdap_auth\"\n\nfunc ParseMDAPAuthMiddleware() app.HandlerFunc\n```\n\n`ParseMDAPAuthMiddleware` 只挂载在 `/mdap/v1` 分组上，用于从请求头提取 MDAP 鉴权凭证。\n\n解析顺序：\n\n1. 优先读取 `X-Jwt-Token`。\n2. 如果为空，回退读取 `Authorization`。\n3. 如果仍为空，返回 MDAP 错误响应并中止请求。\n4. 如果读取成功，将凭证写入 `RequestContext`：`c.Set(MDAPAuth, auth)`。\n5. 调用 `c.Next(ctx)` 继续后续 handler。\n\n缺少鉴权头时返回 HTTP 200，业务码为 `4001`：\n\n```json\n{\n  \"Code\": 4001,\n  \"Message\": \"empty auth, need X-Jwt-Token or Authorization header\",\n  \"TraceId\": \"...\"\n}\n```\n\n`TraceId` 获取规则与 `MDAPResponse` 一致：优先从 ctx log id 读取，缺失时调用 `logid.GenLogID()`。\n\n后续业务代码通过下面方式读取凭证：\n\n```go\ncredential := c.GetString(middleware.MDAPAuth)\n```\n\n例如 `GeneralConsoleServer.MDAPAuth` 会将该凭证传给 `svr.mdapauthClient.ExtractPrincipal(...)`，再调用 `CheckPermission(...)` 做资源权限校验。\n\n## `BPMResponse`\n\n```go\nfunc BPMResponse(ctx context.Context, c *app.RequestContext, key string, f MyHandlerFunc)\n```\n\n`BPMResponse` 是 `/general-console/v1/bpm` 接口的统一出口。它在执行业务 handler 前先校验 JWT。\n\n执行流程：\n\n1. 从请求头读取 `x-jwt-token`。\n2. 调用全局 `jwtValidator.Validate(ctx, token)`。\n3. 校验失败时记录错误日志，并返回：\n\n```go\nerrno.DevSreErrorWithCode(errno.CodeUnauthorized, err)\n```\n\n4. 校验成功时记录操作者用户名：`payload.Username`。\n5. 调用业务函数 `f(ctx, c)` 获取响应 payload。\n6. 序列化响应并写入 HTTP 200 JSON。\n7. 写入 `MKeyContextKey`。\n\nJWT 校验器由下面函数初始化：\n\n```go\nfunc InitJwtValidator(region string) {\n    jwtValidator = jwt.NewValidator([]string{\"cn\", \"i18n\", \"us\", \"tx\", \"sinfi18n\", \"i18nbd\"})\n}\n```\n\n当前实现接收 `region string` 参数，但没有使用该参数，而是使用固定 region 列表初始化 validator。\n\n`BPMResponse` 的失败响应使用 DevSRE 格式：\n\n```json\n{\n  \"code\": 4001,\n  \"message\": \"invalid jwt\",\n  \"response\": {}\n}\n```\n\n校验失败时不会调用业务 handler，也不会设置 `MKeyContextKey`。\n\n## `ResponseMiddleware`\n\n```go\nfunc ResponseMiddleware() app.HandlerFunc\n```\n\n这是一个非常薄的全局 middleware：\n\n```go\nreturn func(ctx context.Context, c *app.RequestContext) {\n    c.Next(ctx)\n}\n```\n\n它当前不修改请求或响应，只负责把请求继续传递给后续 handler。虽然名字叫 `ResponseMiddleware`，真正的响应包装发生在 handler 主动调用的 `Response`、`MDAPResponse`、`BPMResponse` 中。\n\n## 与 handler 层的约定\n\n本模块要求 handler 遵守一个明确模式：路由方法本身不直接写响应，而是把实际业务函数交给 middleware 包装。\n\n普通接口示例：\n\n```go\nfunc (svr *GeneralConsoleServer) GetConfigModuleList(ctx context.Context, c *app.RequestContext) {\n    middleware.Response(ctx, c, \"config.module.list\", svr.getConfigModuleList)\n}\n```\n\nMDAP 接口示例：\n\n```go\nfunc (svr *GeneralConsoleServer) GetMDAPSpaceDetail(ctx context.Context, c *app.RequestContext) {\n    middleware.MDAPResponse(ctx, c, \"mdap.space.detail\", svr.handleGetMDAPSpaceDetail)\n}\n```\n\nBPM 接口示例：\n\n```go\nfunc (svr *GeneralConsoleServer) BPMCheckAccountName(ctx context.Context, c *app.RequestContext) {\n    middleware.BPMResponse(ctx, c, \"account.checkName.bpm\", svr.handleCheckAccountName)\n}\n```\n\n贡献新接口时，应根据路由分组选择对应包装函数：\n\n- `/general-console/v1` 普通接口使用 `Response`。\n- `/general-console/v1/bpm` 接口使用 `BPMResponse`。\n- `/mdap/v1` 接口使用 `MDAPResponse`，并返回 `errno.MDAPPayload` 相关结构。\n\n## 测试覆盖重点\n\n当前单元测试主要覆盖这些行为：\n\n- `Response` 正常响应、设置 `MKeyContextKey`、处理 `json.Marshal` 错误。\n- `MDAPResponse` 自动填充 `TraceId`、保留已有 `TraceId`、支持指针 payload、处理序列化错误。\n- `BPMResponse` 在 JWT 无效时返回 `CodeUnauthorized`，JWT 有效时继续执行业务函数。\n- `ResponseMiddleware` 会调用 `c.Next(ctx)`。\n- `ParseMDAPAuthMiddleware` 支持 `X-Jwt-Token`、`Authorization` fallback，并在缺少鉴权头时 abort。\n\n修改此模块时，最容易影响的是响应 JSON 字段名、HTTP 状态码始终为 200 的约定、`TraceId` 生成规则，以及 `RequestContext` 中 `mkey` / `mdap_auth` 的存储行为。","other-openapi":"# Other — openapi\n\n## OpenAPI 描述模块\n\n`docs/openapi/mdap_v1.yaml` 是 `/mdap/v1` 路由的 OpenAPI 3.0.3 描述文件，用于记录 General Console 中 MDAP 相关接口的请求、响应、鉴权方式和领域模型。该模块本身是静态契约文件，不包含运行时代码，因此没有内部调用、外部调用或可检测的执行流。\n\n## 核心约定\n\n所有接口都挂在 `/mdap/v1` 下，并统一使用 HTTP 200 返回。业务成功或失败由响应体中的 `Code` 判断，`Code=0` 表示成功。\n\n通用响应结构由 `MDAPPayloadBase` 定义：\n\n```yaml\nCode: 0\nMessage: ok\nResponse: {}\nTraceId: \"\"\n```\n\n鉴权通过 `components.securitySchemes` 声明：\n\n- `MDAPJwtToken`：读取 Header `X-Jwt-Token`，服务端优先使用。\n- `Authorization`：兼容 Header，语义等价于 `X-Jwt-Token`。\n\n```mermaid\nflowchart LR\n  客户端 -->|携带 X-Jwt-Token 或 Authorization| MDAP接口\n  MDAP接口 --> 业务处理\n  业务处理 -->|HTTP 200| MDAPPayload\n  MDAPPayload -->|Code=0| 成功响应\n  MDAPPayload -->|Code非0| 业务错误\n```\n\n## 接口分组\n\n### MDAP Space\n\nSpace 管理接口集中在 `MDAP Space` 标签下，描述空间创建、查询、更新、鉴权检查和授权能力。\n\n关键操作：\n\n- `CreateMDAPTenant`：`POST /mdap/v1/spaces/create`，创建 MDAP Space，请求体为 `CreateMDAPSpaceReq`。\n- `GetMDAPSpaceDetail`：`GET /mdap/v1/spaces/{space_name}/detail`，查询 Space 详情，权限点为 `mdap.tenant.view_detail`。\n- `PageGetMDAPSpaces`：`GET /mdap/v1/spaces/page`，返回全量 `Type=MDAP` 的 Space 列表，不做分页。\n- `UpdateMDAPSpace`：`PUT /mdap/v1/spaces/update`，更新 Space，服务端要求 `SpaceName` 非空。\n- `PageGetMDAPVODSpaces`：`GET /mdap/v1/spaces/vod_list`，通过 `query_name`、`offset`、`limit` 查询 VOD 空间名。\n- `CheckMDAPSpaceAuth`：`GET /mdap/v1/spaces/{space_name}/auth_check`，检查 `mdap.tenant.query_source` 权限；无权限时约定返回 `Code=4030`。\n- `GrantMDAPSpaceRole`：`POST /mdap/v1/spaces/{space_name}/grant_role`，为空间主体授权，调用方必须是 Space owner 或 `mdap.admin`。\n\n主要模型包括 `CreateMDAPSpaceReq`、`UpdateMDAPSpaceReq`、`MDAPSpaceSummary`、`MDAPSpaceResp`、`RolePrincipal`、`GrantMDAPSpaceRoleRequest` 和 `GrantMDAPSpaceRoleResponse`。\n\n### MDAP AssetGroup\n\nAssetGroup 接口使用 `MDAP AssetGroup` 标签，覆盖数据集分组的创建、详情、删除和列表查询。\n\n关键操作：\n\n- `CreateMDAPAssetGroup`：`POST /mdap/v1/asset_groups`，创建 AssetGroup，权限点为 `mdap.tenant.create_asset_group`。\n- `GetMDAPAssetGroup`：`GET /mdap/v1/asset_groups/{id}/detail`，按 ID 获取详情，权限点为 `mdap.tenant.query_asset_group`。\n- `DeleteMDAPAssetGroup`：`DELETE /mdap/v1/asset_groups/{id}`，删除 AssetGroup，权限点为 `mdap.tenant.create_asset_group`。\n- `ListMDAPAssetGroups`：`POST /mdap/v1/asset_groups/list`，按 `Space`、`Name`、`MediaTypes`、`Offset`、`Limit` 查询。\n\n`CreateAssetGroupRequest` 保持底层 thrift/kitex 类型的大写 JSON 字段风格，例如 `Space`、`Name`、`MediaTypes`、`SourceConfigs`、`Base`。其中 `Base` 当前在 general_console 接口中未使用，但底层 thrift 定义为 required，调用方通常传空对象。\n\n### MDAP Source\n\nSource 接口位于 `MDAP Source` 标签下，负责创建、批量创建、Hive 导入和分页查询。\n\n关键操作：\n\n- `CreateMDAPSource`：`POST /mdap/v1/sources`，创建单个 Source。`BizID` 必填，`Name` 为空时服务端默认使用 `BizID`。\n- `BatchCreateMDAPSource`：`POST /mdap/v1/sources/batch`，在同一 `AssetGroupID` 下批量创建 Source。\n- `ImportMDAPSourcesFromHive`：`POST /mdap/v1/sources/import/hive`，从 Hive 快照表固定读取 `vid` 列并提交后台导入。\n- `QueryMDAPSources`：`POST /mdap/v1/sources/query`，按 `AssetGroupID` 分页查询 Sources，权限点为 `mdap.tenant.query_source`。\n\n批量创建时，`BatchCreateMDAPSourceRequest.SkipCheckMediaType` 决定媒体类型不匹配的处理方式：默认 `false` 时整体返回参数错误；为 `true` 时跳过不匹配条目，并在对应 `BatchCreateMDAPSourceResult.Error` 中记录失败原因。\n\nHive 导入接口区分 dry-run 和真实导入：`HiveImportOptions.DryRun=true` 时只做轻量 Hive/TQS 可访问性预检，不创建 Source，也不返回实际 VID；`DryRun=false` 时完成参数与权限校验后立即返回，真实读取和创建在后台执行。\n\n### MDAP Processing\n\n`CreateMDAPProcessingTask` 对应 `POST /mdap/v1/processing_tasks`，用于提交短期的模板处理任务。当前契约只覆盖模板任务和抽帧场景：\n\n- `TaskType` 仅支持 `template`。\n- `Template` 仅支持 `snapshot`。\n- `TemplateId` 会原样透传到 Compound `StartProcessing.TemplateId`。\n- `OutputStorage`、`DatasetListener`、`ResourceMode` 当前只作为前端交互字段接收和回显，不传给 `StartProcessing`。\n\n响应模型 `CreateMDAPProcessingTaskResponse` 使用 `Runs` 返回每个 Source 的提交结果，单条结果由 `MDAPProcessingRun` 表示。\n\n### MDAP Artifact\n\nArtifact 查询接口由 `QueryArtifacts` 描述，对应 `POST /mdap/v1/artifacts/query`，权限点为 `mdap.tenant.query_artifact`。\n\n请求模型 `QueryArtifactsRequest` 支持按 `Space`、`SourceBizIDs`、`Types`、`Name`、`DeriveType`、`DeriveIDs`、`WithContents`、`Offset` 和 `Limit` 查询。响应模型 `QueryArtifactsResponse` 返回 `Artifacts` 和 `Total`。\n\n## 领域模型\n\n`AssetGroup` 是 Source 和 Artifact 的上层组织结构，包含 `ID`、`Space`、`Name`、`MediaTypes`、`SourceCount`、`Size`、`SourceConfigs` 和 `ArtifactConfig` 等字段。\n\n`Source` 表示进入 MDAP 处理链路的源数据，核心字段包括 `ID`、`BizID`、`AssetGroupID`、`Name`、`MediaType`、`Format`、`Config`、`Tags`、`CreatedTime` 和 `UpdatedTime`。\n\n`SourceConfig` 描述 Source 的来源配置，`Type` 枚举值为 `0=VDA`、`1=MessEngine`、`2=TOS`、`3=URL`、`4=HDFS`。`StoreLocation.Type` 枚举值为 `0=TOS`、`1=HDFS`、`2=NAS`。\n\n`Artifact` 表示处理产物，支持 `DeriveType`、`DeriveID`、`Name`、`Size`、`Contents`、`CreatedTime` 和 `UpdatedTime`。`ArtifactType` 枚举值为 `0=Snapshots`、`1=Audio`、`2=Image`。\n\n## 维护注意事项\n\n新增或修改 `/mdap/v1` 接口时，需要同步更新 `paths` 下的路径、`operationId`、请求体 schema、响应 schema 和权限说明。响应应继续复用 `MDAPPayloadBase` 的包装模式，并为具体接口定义形如 `MDAPPayload_QueryArtifactsResponse` 的 typed payload schema。\n\n如果后端字段来自 thrift/kitex 类型，应保持实际 JSON tag 风格，不要为了 OpenAPI 统一命名而改成小驼峰。例如 `CreateAssetGroupRequest`、`QueryAssetGroupsRequest`、`SourceConfig` 和 `StoreLocation` 都使用大写字段名。\n\n对于异步语义接口，需要在 `description` 中明确 `Code=0` 的含义。当前 `ImportMDAPSourcesFromHive` 的成功只表示后台导入已提交，`CreateMDAPProcessingTask` 的成功只表示至少一个 Source 成功提交到 Compound。","other-router-test-go":"# Other — router_test.go\n\n## 模块概览\n\n`router_test.go` 是路由注册的回归测试模块，当前只包含一个测试函数：`Test_register_routes_contains_mdap`。它验证 `register` 在 Hertz 服务实例上注册路由后，关键 MDAP 接口路径确实存在。\n\n该测试保护的是路由表契约，而不是具体业务逻辑。它不会调用 handler，也不会发起 HTTP 请求，只检查 `server.Hertz.Routes()` 返回的路由元数据。\n\n## 测试目标\n\n`Test_register_routes_contains_mdap` 覆盖以下路径是否被注册：\n\n```go\n\"/mdap/v1/spaces/create\"\n\"/mdap/v1/asset_groups/list\"\n\"/mdap/v1/sources/import/hive\"\n\"/mdap/v1/processing_tasks\"\n```\n\n这些路径由 `register` 注册到 Hertz 服务中。测试通过后，可以确认 MDAP 相关入口没有因为路由生成、注册逻辑调整或 handler 结构变化而从路由表中消失。\n\n## 执行流程\n\n```mermaid\nflowchart TD\n    A[\"创建 Hertz 服务实例\"] --> B[\"调用 register 注册路由\"]\n    B --> C[\"读取 r.Routes 路由表\"]\n    C --> D[\"匹配 MDAP 目标路径\"]\n    D --> E[\"断言每个路径都存在\"]\n```\n\n测试代码的核心流程如下：\n\n1. 使用 `server.New()` 创建一个新的 Hertz 服务实例。\n2. 调用 `register(r, &handler.GeneralConsoleServer{})` 注册路由。\n3. 通过 `r.Routes()` 获取注册后的路由列表。\n4. 使用 `want map[string]bool` 保存必须存在的 MDAP 路径。\n5. 遍历路由表，如果某个 `rt.Path` 命中 `want`，就将对应值标记为 `true`。\n6. 最后使用 `assert.True(t, found, \"missing route: %s\", path)` 逐个断言路径已注册。\n\n## 关键组件\n\n### `Test_register_routes_contains_mdap`\n\n这是本模块唯一的测试函数。它不依赖请求上下文，也不执行真实 handler，只关心路由注册结果。\n\n测试关注点是 `rt.Path` 字段，因此它只验证路径存在性。它不会验证：\n\n- HTTP 方法是否正确\n- 路由绑定的 handler 是否正确\n- 中间件链是否正确\n- 路由分组或注册顺序是否正确\n\n如果未来需要覆盖这些内容，应在现有路径存在性测试之外新增更具体的断言。\n\n### `register`\n\n`register` 定义在 `router_gen.go`，由本测试直接调用。测试假设 `register` 是服务启动时使用的实际路由注册入口，因此它能够覆盖生成路由表是否包含 MDAP 接口。\n\n如果 `router_gen.go` 的生成逻辑发生变化，或者 MDAP 路由被迁移到其他注册函数，本测试可能失败，需要同步更新测试入口或目标路径。\n\n### `handler.GeneralConsoleServer`\n\n测试传入 `&handler.GeneralConsoleServer{}` 作为路由注册时的 handler 接收者。这里不会执行 `GeneralConsoleServer` 的业务方法，但它必须满足 `register` 所需的 handler 结构。\n\n如果 `register` 对 `GeneralConsoleServer` 的方法集有编译期依赖，相关 handler 方法被删除或签名变化时，该测试也会在编译阶段暴露问题。\n\n## 与代码库的连接\n\n`router_test.go` 位于 `package main`，因此可以直接访问同包内的 `register`。它连接了三个主要部分：\n\n- Hertz 服务框架：`code.byted.org/middleware/hertz/pkg/app/server`\n- 路由注册入口：`register`\n- 业务 handler 类型：`code.byted.org/videoarch/general_console/biz/handler.GeneralConsoleServer`\n\n这使得测试更接近真实服务初始化路径，而不是单独测试某个路由常量或配置片段。\n\n## 维护建议\n\n新增或删除 MDAP 路由时，应同步检查 `want` 中的路径列表。该列表应该只包含对服务兼容性重要、需要防止误删的入口，避免把所有路由机械加入测试导致维护成本过高。\n\n如果某个路径被有意重命名或迁移，测试失败是预期信号。更新测试前应确认调用方、网关配置、前端请求或外部依赖是否已经完成对应迁移。\n\n如果需要验证方法或 handler 绑定，可以扩展遍历逻辑，检查 `rt.Method` 等路由元数据，而不是只比较 `rt.Path`。","other-rpc":"# Other — rpc\n\n## 模块定位\n\n`biz/rpc` 封装了建桶相关的外部 RPC/HTTP 调用，主要连接三类系统：\n\n- `bktmetaapi`：内网 TOS 建桶、BPM 建桶、建桶状态查询。\n- NonTT TOS OpenAPI：`mya`、`myb` IDC 的外部 TOS 建桶。\n- `bktmeta-sdk-go`：查询、创建、更新 bktmeta 桶元数据。\n\n模块入口通常由 `main.go` 调用 `InitRPC(config.Conf)` 完成初始化；业务侧通过 `biz/handler/script.go` 和 `biz/handler/bpm.go` 调用 `BatchCreateBucket`、`CreateBucket`、`CheckBucketCreateStatus`。\n\n## 初始化\n\n`InitRPC(conf *config.Config)` 初始化模块级全局依赖：\n\n- `jwtGenerator`：使用 `conf.TOS.IamAddress` 创建，用于 NonTT TOS 请求签名。\n- `hertzCli`：共享 Hertz HTTP client，供 `HertzDo` 使用。\n- `tosToken`：从环境变量 `TOS_TOKEN` 读取。\n- `tosConfig`：保存 `conf.TOS`，包含 `Addr`、`UseDomain`、`Cluster`、`Creator`、`S3Region`、`S3Endpoint` 等字段。\n- `BktmetaCli`：通过 `bktmeta.NewClient(bktmeta.WithCallingPSM(conf.Meta.PSM))` 创建。\n\n初始化失败会 `panic`，因此调用 RPC 函数前必须保证 `InitRPC` 已执行。\n\n## 批量建桶主流程\n\n`BatchCreateBucket(ctx, batchReq)` 是脚本和 BPM 流程共用的批量建桶入口。\n\n```mermaid\nflowchart TD\n    A[业务 Handler] --> B[BatchCreateBucket]\n    B --> C{首个请求 IDC 是 mya/myb}\n    C -->|是| D[BatchCreateBucketNonTT]\n    C -->|否| E[batchCreateBucketInnerTos]\n    D --> F[CreateTosBucketNonTT]\n    D --> G[BktmetaCli.CreateBucket]\n    E --> H[HertzDo 调用 bktmetaapi]\n    B --> I[updateGatewayConfForPackedBuckets]\n    I --> J[updateBucketGatewayConf]\n```\n\n关键行为：\n\n- 空请求直接返回空的 `model.BatchCreateBucketResp{}`。\n- 分流只检查 `batchReq[0].IDC`：\n  - `mya` 或 `myb` 调用 `BatchCreateBucketNonTT`。\n  - 其他 IDC 调用 `batchCreateBucketInnerTos`。\n- 建桶失败时直接返回错误，不执行网关配置更新。\n- 建桶成功后会对特定打包类目调用 `updateGatewayConfForPackedBuckets`。\n\n调用方应保证同一个 `BatchCreateBucketReq` 中的桶属于同一类 IDC 路径；混合 IDC 会按首个元素分流。\n\n## 内网 TOS 批量建桶\n\n`batchCreateBucketInnerTos(ctx, batchReq)` 调用：\n\n```text\nPOST http://toutiao.videoarch.bktmetaapi/gateway/v1/buckets/batch\n```\n\n请求体是 `model.BatchCreateBucketReq` 的 JSON。请求使用 Hertz `protocol.Request`，并设置：\n\n- `Content-Type: application/json`\n- `discovery.WithSD(true)`\n- `discovery.WithDestinationCluster(\"default\")`\n- `hconfig.WithRequestTimeout(getBktmetaTimeout())`\n\n响应解析到 `errno.JanusPayload`。当 `res.Code == 0` 时，将 `res.Response` 再转换为 `model.BatchCreateBucketResp`；否则返回 `res.Message` 对应的错误。\n\n`getBktmetaTimeout()` 从环境变量 `BKTMETA_TIMEOUT` 读取超时时间：\n\n- 空值使用默认 `30s`。\n- 支持 Go duration 字符串，例如 `45s`。\n- 支持纯数字秒数，例如 `12` 表示 `12s`。\n- 非法值或非正数回退到默认值。\n\n## NonTT TOS 建桶\n\n`BatchCreateBucketNonTT(ctx, batchReq)` 逐个处理桶：\n\n1. 先用 `BktmetaCli.GetBucket` 查询桶是否已存在。\n2. 如果存在，将桶名加入 `model.BatchCreateSkip`。\n3. 如果不存在，构造 `CreateBucketParam` 并调用 `CreateTosBucketNonTT`。\n4. NonTT TOS 创建成功后，再构造 `meta.Bucket` 和 `meta.S3Bucket`，调用 `BktmetaCli.CreateBucket` 写入 bktmeta。\n5. 任一步失败都会把桶名加入 `model.BatchCreateFailed`；成功加入 `model.BatchCreateSuccess`。\n\n`CreateTosBucketNonTT(ctx, param)` 调用：\n\n```text\nPOST {tosConfig.Addr}/public/v3/bucketbu\n```\n\n它会通过 `jwtGenerator.Generate(ctx, tosToken)` 生成 JWT，并设置请求头：\n\n- `x-jwt-token`\n- `Content-Type: application/json`\n\n请求是否走服务发现由 `tosConfig.UseDomain` 决定：`discovery.WithSD(!tosConfig.UseDomain)`。\n\n响应解析为 `model.CreateBucketResult`。`result.IsOK()` 或 `result.IsDuplicateError()` 都视为成功，并返回 `result.Data`；其他情况返回 `result.GetError()`。\n\n## BPM 建桶与状态查询\n\n`CreateBucket(ctx, bpm)` 面向 BPM 建桶流程，调用：\n\n```text\nPOST http://toutiao.videoarch.bktmetaapi/gateway/v1/bpm/buckets/tos/create\n```\n\n请求类型是 `model.BPMCreateTOSBucketsRequest`，响应通过 `errno.DevSREPayload` 解析。成功时返回 `model.CreateTosBucketBPMResp`，其中包含：\n\n- `BucketsCategories map[string]string`\n- `AsyncCreate bool`\n\n`CheckBucketCreateStatus(ctx, buckets)` 调用：\n\n```text\nPOST http://toutiao.videoarch.bktmetaapi/gateway/v1/bpm/buckets/tos/register/status\n```\n\n请求体为：\n\n```json\n{\n  \"buckets\": [\"bucket-a\", \"bucket-b\"]\n}\n```\n\n成功时返回 `model.CheckBucketCreateStatusResp`，包含整体状态 `WholeStatus` 和逐桶状态 `BucketStatus`。\n\n## 打包类目网关配置\n\n建桶完成后，`BatchCreateBucket` 会调用 `updateGatewayConfForPackedBuckets`，只处理以下类目：\n\n- `medigest.image.zip`\n- `vframe:zip`\n\n`shouldUpdateGatewayConf(category)` 负责这个判断。\n\n只有响应状态为 `model.BatchCreateSuccess` 或 `model.BatchCreateSkip` 的桶才会尝试更新网关配置。实际更新由 `updateBucketGatewayConf(ctx, bucketName)` 完成：\n\n1. `BktmetaCli.GetBucket` 获取桶元数据。\n2. 写入 `meta.GatewayC
