onfig`：\n   - `Pack.Enable = true`\n   - `Pack.Delimiter = \"$TOS$\"`\n   - `Pack.AllowedMethods = []string{\"PUT\", \"GET\", \"HEAD\"}`\n   - `Pack.WriteContentType = \"tos/zip\"`\n3. `BktmetaCli.UpdateBucket` 更新桶。\n\n更新失败时，`updateGatewayConfForPackedBuckets` 会记录日志，并调用 `moveBucketStatus(resp, success, failed, bucketName)`。注意：这里仅会把 `success` 中的桶移动到 `failed`；如果桶原本在 `skip` 中，更新失败不会改变其状态。\n\n每个桶更新后会 `time.Sleep(time.Second)`，用于给下游状态传播留出间隔；单测中通过 monkey patch 跳过该等待。\n\n## 通用 HTTP 执行器\n\n`HertzDo(ctx, req, v)` 是模块内 Hertz 请求的共享执行函数：\n\n- 创建 `protocol.Response`。\n- 设置 `X-TT-LOGID` 为 `ctxvalues.LogIDDefault(ctx)`。\n- 使用全局 `hertzCli.Do(ctx, req, rsp)` 发起请求。\n- HTTP 状态码非 `200 OK` 时返回响应体字符串作为错误。\n- 成功后用 `sonic.Unmarshal(rsp.Body(), v)` 解析响应体。\n\n`batchCreateBucketInnerTos` 和 `CreateTosBucketNonTT` 都依赖它。\n\n## 主要数据结构\n\n`model.BatchCreateBucketReq` 是 `[]model.ScriptCreateBucketReq`，包含桶名、IDC、Owner、ServiceNode、VRegion、Category、Public、Qos 等建桶参数。\n\n`model.BatchCreateBucketResp` 是：\n\n```go\nmap[model.BucketCreateStatus][]string\n```\n\n状态常量包括：\n\n- `model.BatchCreateSuccess`\n- `model.BatchCreateSkip`\n- `model.BatchCreateFailed`\n- `model.BatchCreateWaitApprove`\n\n`CreateBucketParam` 是 NonTT TOS OpenAPI 的请求结构，字段包括 `Name`、`Creator`、`ServiceNode`、`Public`、`ReadQPS`、`WriteQPS`、`ReadRate`、`WriteRate`、`SecurityLevel`、`VRegion` 等。\n\n## 贡献注意事项\n\n- 这个包大量使用模块级全局变量，新增测试时通常需要保存旧值并在 `t.Cleanup` 中恢复。\n- `BatchCreateBucket` 的 IDC 分流依赖首个请求元素，修改调用方批量聚合逻辑时要避免混合 IDC。\n- NonTT 路径同时创建真实 TOS 桶和 bktmeta 记录，两个步骤的失败处理不同，改动时要保持 `success`、`skip`、`failed` 语义一致。\n- 打包类目的网关配置是建桶后的补充步骤，不属于底层建桶 API 本身；新增打包类目时应同步更新 `shouldUpdateGatewayConf` 和相关单测。\n- `tosConfig.TosToken` 存在于配置结构中，但当前代码实际读取环境变量 `TOS_TOKEN`。","other-script":"# Other — script\n\n## 模块概览\n\n`script/bootstrap.sh` 是服务进程的启动脚本，负责根据运行目录、端口和部署环境变量组装启动参数，创建日志目录，然后通过 `exec` 启动二进制文件：\n\n```bash\n$CURDIR/bin/toutiao.videoarch.general_console\n```\n\n脚本本身不定义函数，也没有模块内调用关系。它的核心职责是把部署环境转换成服务进程需要的命令行参数和环境变量。\n\n## 启动入口\n\n脚本接收两个位置参数：\n\n```bash\n./bootstrap.sh [RUNTIME_ROOT] [PORT]\n```\n\n参数含义：\n\n- `$1`：`RUNTIME_ROOT`，运行根目录。未传入时默认使用脚本所在目录 `CURDIR`。\n- `$2`：`PORT`，可选服务端口。传入后会追加到启动参数 `-port=$PORT`。\n\n脚本通过以下逻辑确定当前目录：\n\n```bash\nCURDIR=$(cd $(dirname $0); pwd)\n```\n\n因此无论从哪个工作目录执行脚本，二进制路径和配置目录都会相对于 `bootstrap.sh` 所在目录解析。\n\n## 执行流程\n\n```mermaid\nflowchart TD\n    A[解析脚本目录 CURDIR] --> B[确定 RUNTIME_ROOT]\n    B --> C{RUNTIME_ROOT 是否为空}\n    C -->|是| D[打印用法并退出]\n    C -->|否| E[确定日志目录 RUNTIME_LOG_ROOT]\n    E --> F[创建 app 和 rpc 日志目录]\n    F --> G{是否主机网络模式}\n    G -->|是| H[导出 RUNTIME_SERVICE_PORT 和 RUNTIME_DEBUG_PORT]\n    G -->|否| I[跳过端口环境变量]\n    H --> J[导出 HERTZ_LOG_DIR 和 PSM]\n    I --> J\n    J --> K[组装启动参数 args]\n    K --> L[exec 启动服务二进制]\n```\n\n## 路径与目录约定\n\n### 脚本目录：`CURDIR`\n\n`CURDIR` 是 `bootstrap.sh` 所在目录，后续这些路径都基于它：\n\n- 二进制文件：`$CURDIR/bin/toutiao.videoarch.general_console`\n- 配置目录：`$CURDIR/conf/`\n\n### 运行根目录：`RUNTIME_ROOT`\n\n`RUNTIME_ROOT` 来自第一个参数，未传时退回到 `CURDIR`：\n\n```bash\nif [ \"X$1\" != \"X\" ]; then\n    RUNTIME_ROOT=$1\nelse\n    RUNTIME_ROOT=${CURDIR}\nfi\n```\n\n脚本还设置了：\n\n```bash\nRUNTIME_CONF_ROOT=$RUNTIME_ROOT/conf\n```\n\n但当前实现没有继续使用 `RUNTIME_CONF_ROOT`。实际传给服务进程的配置目录是：\n\n```bash\nCONF_DIR=$CURDIR/conf/\n```\n\n这意味着即使调用方传入了不同的 `RUNTIME_ROOT`，配置仍然从脚本目录下的 `conf/` 读取。\n\n### 日志目录：`RUNTIME_LOG_ROOT`\n\n日志根目录根据部署环境决定：\n\n```bash\nif [ \"${IS_TCE_DOCKER_ENV}\" == 1 ] && [ -n \"${RUNTIME_LOGDIR}\" ]; then\n    RUNTIME_LOG_ROOT=$RUNTIME_LOGDIR\nelse\n    RUNTIME_LOG_ROOT=$RUNTIME_ROOT/log\nfi\n```\n\n规则如下：\n\n- 在 TCE Docker 环境中，且 `RUNTIME_LOGDIR` 非空时，使用 `RUNTIME_LOGDIR`。\n- 其他情况下，使用 `$RUNTIME_ROOT/log`。\n\n脚本会确保以下目录存在：\n\n```bash\n$RUNTIME_LOG_ROOT/app\n$RUNTIME_LOG_ROOT/rpc\n```\n\n随后导出：\n\n```bash\nexport HERTZ_LOG_DIR=$RUNTIME_LOG_ROOT\n```\n\n服务进程会通过 `HERTZ_LOG_DIR` 感知日志根目录，同时命令行参数也会传入：\n\n```bash\n-log-dir=$HERTZ_LOG_DIR\n```\n\n## 服务身份\n\n脚本固定服务名和二进制名：\n\n```bash\nSVC_NAME=toutiao.videoarch.general_console\nBinaryName=toutiao.videoarch.general_console\n```\n\n服务名会通过两种方式传递给进程：\n\n```bash\nexport PSM=$SVC_NAME\n-psm=$SVC_NAME\n```\n\n这说明运行时既可能通过环境变量 `PSM` 获取服务身份，也可能通过命令行参数 `-psm` 获取。\n\n## 端口处理\n\n第二个参数 `PORT` 是普通服务端口。传入时追加到启动参数：\n\n```bash\n-port=$PORT\n```\n\n在主机网络模式下，脚本还会读取外部环境变量：\n\n```bash\nif [ \"$IS_HOST_NETWORK\" == \"1\" ]; then\n    export RUNTIME_SERVICE_PORT=$PORT0\n    export RUNTIME_DEBUG_PORT=$PORT1\nfi\n```\n\n这里的约定是：\n\n- `IS_HOST_NETWORK=1` 表示使用主机网络模式。\n- `PORT0` 被导出为 `RUNTIME_SERVICE_PORT`。\n- `PORT1` 被导出为 `RUNTIME_DEBUG_PORT`。\n\n这些变量不会直接追加到 `args`，而是通过环境变量暴露给服务进程或运行时框架。\n\n## 启动参数\n\n最终命令行参数由 `args` 变量组装：\n\n```bash\nargs=\"-psm=$SVC_NAME -conf-dir=$CONF_DIR -log-dir=$HERTZ_LOG_DIR\"\n```\n\n如果传入了第二个参数：\n\n```bash\nargs+=\" -port=$PORT\"\n```\n\n最终启动命令形态为：\n\n```bash\n$CURDIR/bin/toutiao.videoarch.general_console \\\n  -psm=toutiao.videoarch.general_console \\\n  -conf-dir=$CURDIR/conf/ \\\n  -log-dir=$RUNTIME_LOG_ROOT \\\n  [-port=$PORT]\n```\n\n脚本会先打印完整命令，再使用 `exec` 替换当前 shell 进程：\n\n```bash\nexec $CURDIR/bin/${BinaryName} $args\n```\n\n使用 `exec` 后，`bootstrap.sh` 不再作为父进程保留；当前进程会直接变成服务二进制进程。这对容器和进程管理系统很重要，因为信号会直接发送到服务进程。\n\n## 与代码库其他部分的连接\n\n该脚本位于 `script/bootstrap.sh`，属于部署和运行入口层。它不调用仓库中的其他脚本或函数，而是通过文件布局和运行时约定连接到服务主体：\n\n- 依赖 `bin/toutiao.videoarch.general_console` 已存在且可执行。\n- 依赖 `conf/` 目录位于脚本目录下。\n- 为服务导出 `PSM`、`HERTZ_LOG_DIR`、`RUNTIME_SERVICE_PORT`、`RUNTIME_DEBUG_PORT` 等环境变量。\n- 通过 `-psm`、`-conf-dir`、`-log-dir`、`-port` 参数把启动配置传给二进制。\n\n因此修改该脚本时，重点要确认服务二进制对这些参数和环境变量的兼容性。\n\n## 使用示例\n\n使用脚本所在目录作为运行根目录：\n\n```bash\n./script/bootstrap.sh\n```\n\n指定运行根目录：\n\n```bash\n./script/bootstrap.sh /opt/toutiao.videoarch.general_console\n```\n\n指定运行根目录和服务端口：\n\n```bash\n./script/bootstrap.sh /opt/toutiao.videoarch.general_console 8080\n```\n\nTCE Docker 环境中指定日志目录：\n\n```bash\nIS_TCE_DOCKER_ENV=1 \\\nRUNTIME_LOGDIR=/var/log/toutiao.videoarch.general_console \\\n./script/bootstrap.sh /runtime 8080\n```\n\n主机网络模式下传入端口环境变量：\n\n```bash\nIS_HOST_NETWORK=1 \\\nPORT0=8080 \\\nPORT1=9090 \\\n./script/bootstrap.sh /runtime\n```\n\n## 维护注意事项\n\n路径变量在脚本中没有统一加引号，例如 `mkdir -p $RUNTIME_LOG_ROOT/app` 和 `exec $CURDIR/bin/${BinaryName} $args`。部署路径应避免包含空格或特殊 shell 字符。\n\n`RUNTIME_CONF_ROOT` 当前只被赋值，没有参与后续启动参数。如果后续希望配置目录跟随 `RUNTIME_ROOT`，需要同步调整 `CONF_DIR` 的来源。\n\n`exit -1` 在 shell 中通常会表现为退出码 `255`。如果调用方依赖具体退出码，修改前需要确认部署系统的约定。","other-util":"# Other — util\n\n## util 模块测试说明\n\n`biz/util` 的测试代码覆盖两个主要能力：IAM 请求签名和指标上报初始化/调用。测试文件与被测代码同属 `package util`，因此可以直接访问该包中的函数、常量和初始化逻辑。\n\n## 测试入口\n\n`base_test.go` 定义了包级测试入口：\n\n```go\nfunc TestMain(m *testing.M) {\n\tlocal.LoadConf()\n\tInitMetrics()\n\tcode := m.Run()\n\tos.Exit(code)\n}\n```\n\n所有 `biz/util` 测试执行前都会先调用：\n\n- `local.LoadConf()`：加载本地配置。\n- `InitMetrics()`：初始化指标系统，供后续 `EmitError`、`EmitLatency`、`EmitThroughput` 使用。\n- `m.Run()`：执行当前包的全部测试。\n- `os.Exit(code)`：以测试执行结果作为进程退出码。\n\n这意味着新增 util 测试时，默认可以依赖已经加载的配置和已初始化的 metrics 环境。\n\n```mermaid\nflowchart TD\n    A[\"go test ./biz/util\"] --> B[\"TestMain\"]\n    B --> C[\"local.LoadConf\"]\n    B --> D[\"InitMetrics\"]\n    D --> E[\"m.Run\"]\n    E --> F[\"各测试用例\"]\n```\n\n## IAM 签名测试\n\n`iam_test.go` 覆盖 HTTP 和 RPC 两类 IAM 签名函数。\n\n### `Test_IAMSignHttpRequest`\n\n该测试构造一个 HTTP GET 请求：\n\n```go\nurl := fmt.Sprintf(\"http://%s/v1/folders\", PSM)\nr, _ := http.NewRequest(\"GET\", url, nil)\nerr := IAMSignHttpRequest(r, AK, SK)\n```\n\n核心验证路径是：\n\n1. 使用 `PSM` 拼出目标地址。\n2. 创建 `GET /v1/folders` 请求。\n3. 调用 `IAMSignHttpRequest(r, AK, SK)` 对请求签名。\n4. 使用 `chttp.DefaultClient.Do(r)` 发起真实请求。\n\n该测试更接近集成测试，因为它依赖：\n\n- `PSM` 可解析并可访问；\n- `AK`、`SK` 有效；\n- `code.byted.org/gopkg/consul/http` 的默认客户端可正常工作；\n- 当前环境网络和服务状态正常。\n\n如果新增或调整 HTTP 签名逻辑，需要关注请求头、鉴权字段和请求发送前的签名副作用是否仍由 `IAMSignHttpRequest` 完成。\n\n### `Test_IAMSignRpcRequest`\n\n该测试调用：\n\n```go\nauth, err := IAMSignRpcRequest(\"TestMethod\", AK, SK)\nassert.NotEqual(t, 0, len(auth))\nassert.Nil(t, err)\n```\n\n它验证 `IAMSignRpcRequest` 返回非空鉴权字符串，并且没有错误。测试不发起真实 RPC 请求，因此比 HTTP 签名测试更轻量，适合用于快速确认签名字符串生成逻辑可用。\n\n## Metrics 测试\n\n`metrics_test.go` 覆盖三个指标上报函数：\n\n- `EmitError(\"mkey\")`\n- `EmitLatency(\"mkey\", time.Now())`\n- `EmitThroughput(\"mkey\")`\n\n每个测试都会连续调用两次同一个函数：\n\n```go\nEmitError(\"mkey\")\n// cache\nEmitError(\"mkey\")\n```\n\n这个模式说明 metrics 实现中存在缓存路径，第二次调用用于覆盖或验证缓存后的执行分支。测试当前没有断言返回值，因为这些函数没有在测试中表现为返回错误；重点是确认初始化后调用不会 panic 或失败。\n\n`EmitLatency` 的第二个参数是起始时间：\n\n```go\nEmitLatency(\"mkey\", time.Now())\n```\n\n调用方应传入业务开始时间，函数内部根据当前时间计算耗时并上报。\n\n## 空测试文件\n\n`ctx_test.go` 目前只声明了包名：\n\n```go\npackage util\n```\n\n它不包含测试用例。该文件可能是为后续上下文相关工具函数预留的测试入口；如果没有计划补充测试，可以考虑删除以减少噪音。\n\n## 与代码库其他部分的关系\n\n当前测试模块没有被其他模块调用，调用方向主要是从测试代码进入 util 的实现函数：\n\n- `TestMain` 调用 `InitMetrics`\n- `TestEmitError` 调用 `EmitError`\n- `TestEmitLatency` 调用 `EmitLatency`\n- `TestEmitThroughput` 调用 `EmitThroughput`\n- `Test_IAMSignHttpRequest` 调用 `IAMSignHttpRequest`\n- `Test_IAMSignRpcRequest` 调用 `IAMSignRpcRequest`\n\n因此，这组测试承担的是 util 包基础能力的回归验证：配置初始化、指标上报入口可用、IAM 签名函数可生成有效鉴权信息。新增 util 功能时，建议沿用同包测试方式，直接覆盖实际导出的工具函数；如果测试需要网络或真实凭证，应明确区分单元测试和集成测试，避免影响本地快速回归。","other":"# Other\n\n## 模块概览\n\n`Other` 汇总了 General Console 的运行支撑层：配置、启动构建、路由与中间件、统一响应、外部 RPC、数据访问、OpenAPI 契约以及测试支撑。它们不属于单一业务域，但共同构成服务从“配置加载”到“请求处理”和“发布运行”的基础链路。\n\n```mermaid\nflowchart TD\n  A[\"conf 配置文件\"] --> B[\"config.InitConf\"]\n  B --> C[\"handler.NewGeneralConsoleServer\"]\n  B --> D[\"rpc.InitRPC\"]\n  C --> E[\"路由注册\"]\n  E --> F[\"middleware 响应包装与鉴权\"]\n  F --> G[\"handler 业务入口\"]\n  G --> H[\"dal 数据访问\"]\n  G --> I[\"rpc 外部系统调用\"]\n  G --> J[\"errno.Payload 统一响应\"]\n  K[\"openapi 契约\"] -.-> E\n  L[\"build.sh 与 bootstrap.sh\"] --> B\n```\n\n## 子模块协作关系\n\n[conf](conf.md) 提供 YAML 配置文件，包含基础配置、环境覆盖、区域覆盖和 Hertz 启动配置。[config](config.md) 通过 `InitConf(path)` 加载这些配置，并尝试用 TCC 中的 `TQS` 动态配置覆盖本地值，最终向其他模块暴露全局 `Conf *Config`。\n\n[handler](handler.md) 是主要业务入口，`GeneralConsoleServer` 在初始化时聚合数据库、账号、GFM、ODM、ByteTree、Cloud IAM、MDAP、Hive VID Reader 等依赖。它从 [config](config.md) 读取运行配置，并在 BPM、MDAP、脚本任务等流程中调用 [rpc](rpc.md) 和 [dal](dal.md)。\n\n[middleware](middleware.md) 负责 Hertz 请求的统一出口。普通接口、BPM 接口和 MDAP 接口分别通过 `Response`、`BPMResponse`、`MDAPResponse` 包装 handler 返回值，并使用 [errno](errno.md) 中的 `Payload` 契约序列化响应。MDAP 请求的鉴权解析和 `TraceId` 补齐也在这里完成。\n\n[errno](errno.md) 定义跨 handler 与 middleware 的响应协议，包括 `DevSREPayload`、`BPMPayload`、`MDAPPayload` 以及业务错误码。handler 不直接写 HTTP 响应，而是返回这些 payload，由 middleware 统一输出。\n\n[rpc](rpc.md) 封装建桶相关的外部系统访问，包括 `bktmetaapi`、NonTT TOS OpenAPI 和 `bktmeta-sdk-go`。`InitRPC(config.Conf)` 通常在服务启动阶段完成，随后由 BPM 与脚本类 handler 调用 `BatchCreateBucket`、`CreateBucket`、`CheckBucketCreateStatus` 等能力。\n\n[dal](dal.md) 提供账号授权和管理员用户相关的数据访问约束与测试覆盖，围绕 `v_account_user_rel`、`v_account_admin` 两类表验证 DAO 行为。handler 中涉及授权关系或管理员信息的流程依赖这些持久化能力。\n\n## 关键跨模块流程\n\n服务启动流程由 [build.sh](build.sh.md)、[script](script.md)、[conf](conf.md)、[config](config.md)、[handler](handler.md) 和 [rpc](rpc.md) 串联：构建脚本整理 `output/` 产物，启动脚本设置运行目录、端口和日志目录，服务进程加载配置，再初始化 `GeneralConsoleServer` 与 RPC 客户端。\n\n请求处理流程由路由、middleware、handler 和 errno 串联：路由注册将路径绑定到 handler；middleware 校验 BPM 或 MDAP 鉴权信息；handler 执行业务逻辑并返回 `errno.Payload`；middleware 将 payload 转换为约定 JSON 响应。\n\nMDAP 相关能力同时受 [openapi](openapi.md) 和 [router_test.go](router_test.go.md) 保护。`docs/openapi/mdap_v1.yaml` 描述 `/mdap/v1` 的接口契约、鉴权 Header 和 `MDAPPayload` 响应结构；`Test_register_routes_contains_mdap` 确认关键 MDAP 路径实际注册到 Hertz 路由表中。\n\n[util](util.md) 提供 IAM 签名与指标初始化/上报相关测试支撑，和运行期的鉴权、观测能力相互补充。[go.mod](go.mod.md) 则定义整个仓库的 Go 模块边界、依赖版本和替换规则，是这些子模块能够统一编译、测试和发布的基础。","overview":"# general_console — Wiki\n\n# general_console\n\n`general_console` 是 VideoArch 通用控制台后端服务，提供账号管理、权限授权、MDAP 空间与资产管理、BPM 开通流程、TOS bucket 操作以及部分脚本化运维入口。项目使用 Go 1.18，模块路径为 `code.byted.org/videoarch/general_console`，HTTP 框架基于 Hertz，外部能力主要通过内部 SDK、Kitex/RPC、TQS、MySQL 和 IAM 签名接入。\n\n新开发者可以先从 [Application Entry and Routing](application-entry-and-routing.md) 理解服务如何启动、如何注册路由，再进入 [General Console Handlers](general-console-handlers.md)、[MDAP Core APIs](mdap-core-apis.md) 和 [BPM and Account Provisioning](bpm-and-account-provisioning.md) 查看主要业务入口。\n\n## 整体架构\n\n```mermaid\nflowchart TD\n    A[\"入口与路由<br/>main.go / router.go\"] --> B[\"中间件与认证<br/>biz/middleware\"]\n    B --> C[\"统一响应与错误<br/>biz/errno\"]\n    B --> D[\"业务 Handler<br/>biz/handler\"]\n    D --> E[\"MDAP 核心接口\"]\n    D --> F[\"BPM 与账号开通\"]\n    D --> G[\"Hive Source 导入\"]\n    D --> H[\"数据库访问<br/>biz/dal\"]\n    D --> I[\"外部 RPC / SDK<br/>biz/rpc / kitex_gen\"]\n    H --> J[\"共享工具与指标<br/>biz/util\"]\n    I --> J\n```\n\n请求从 `main.go` 启动的 Hertz 服务进入，由 `router.go` 注册到不同业务路径，再经过 [Middleware and Request Authentication](middleware-and-request-authentication.md) 完成响应包装、链路信息补齐和部分鉴权处理。业务 Handler 返回统一的 `errno.Payload`，由 [Error and Response Contracts](error-and-response-contracts.md) 定义不同业务域的响应格式。\n\n## 启动与运行时配置\n\n服务启动时会依次初始化基础环境、Hertz 实例、配置、鉴权、数据库、指标、RPC 客户端和 `GeneralConsoleServer`。配置加载集中在 [Runtime Configuration](runtime-configuration.md)：`biz/config.InitConf(path string)` 先读取本地 YAML，再尝试从 TCC 拉取运行时覆盖配置，并把最终结果写入全局 `config.Conf`。\n\n本地开发前需要确认：\n\n- 使用 Go 1.18。\n- 具备访问 `code.byted.org` 内部 Go 依赖的环境。\n- 准备可用的 `conf` 配置文件，尤其是 MySQL、TQS、RPC、Hertz 启动参数。\n- 如需跑通完整链路，需要对应环境的 MySQL、TCC、IAM、Kitex/RPC 和内部服务权限。\n\n常见检查命令：\n\n```bash\ngo test ./...\ngo build ./...\n```\n\n如果测试或构建依赖内部网络、TCC 配置或 RPC 服务，失败时优先检查本地环境、凭证和配置文件，而不是只看业务代码。\n\n## 请求处理模型\n\n这个项目的核心约定是：业务 Handler 不直接写 HTTP 响应，而是返回 `errno.Payload`。中间件负责把 payload 序列化为 JSON、补充 `TraceId`，并写回 Hertz `RequestContext`。\n\n典型链路如下：\n\n```mermaid\nsequenceDiagram\n    participant C as 调用方\n    participant R as 路由\n    participant M as 中间件\n    participant H as Handler\n    participant D as DAO / RPC\n\n    C->>R: HTTP 请求\n    R->>M: 匹配业务入口\n    M->>H: 调用 GeneralConsoleServer 方法\n    H->>D: 查询数据库或调用外部服务\n    D-->>H: 返回业务结果\n    H-->>M: 返回 errno.Payload\n    M-->>C: 写入统一 JSON 响应\n```\n\n普通控制台接口主要位于 [General Console Handlers](general-console-handlers.md)，负责账号、配置、域名、对象元数据、管理员和授权关系等能力。MDAP 相关接口进一步拆分为 [MDAP Core APIs](mdap-core-apis.md)、[MDAP Processing Tasks](mdap-processing-tasks.md) 和 [MDAP Hive Source Import](mdap-hive-source-import.md)，分别处理资源管理、处理任务创建和 Hive VID 批量导入。\n\n## 核心业务流\n\n账号和 BPM 开通链路由 [BPM and Account Provisioning](bpm-and-account-provisioning.md) 承接。BPM 入口方法通常只做动作绑定，实际逻辑落在 `handle...` 方法中，再调用账号 SDK、数据库访问层、TOS/bktmeta 能力或其他内部服务。涉及建桶、查状态和批量建桶的逻辑在 [Bucket and TOS Operations](bucket-and-tos-operations.md) 中收敛。\n\nMDAP 链路以空间、资产组、素材源、产物和权限角色为核心资源层级。Handler 会把 HTTP 请求转换为内部 SDK 或 Kitex 调用，通过 `middleware.MDAPResponse` 和 `errno.MDAPOK` / `errno.MDAPErrorWithCode` 输出 MDAP 约定格式。Hive 导入场景会先通过 TQS 读取 Hive 表中的 `vid` 列，再异步批量创建 MDAP Source。\n\n数据库访问集中在 [Database Access](database-access.md)。写操作使用 `DbHandler.w` 并显式开启事务，读操作使用 `DbHandler.r`；DAO 方法统一包裹重试逻辑，并通过 [Shared Utilities](shared-utilities.md) 上报吞吐、延迟和错误指标。\n\n## 生成代码与外部边界\n\n[Thrift IDL and Generated Clients](thrift-idl-and-generated-clients.md) 定义 Object Duplication Manager 等 RPC 通信所需的 Thrift 契约和 Kitex 生成代码。业务层一般不直接关心序列化细节，但这些生成结构是 Handler、RPC 客户端和远端服务之间的重要数据边界。\n\n仓库里还有 [Other](other.md) 汇总运行支撑层，包括 `conf` 配置、OpenAPI 契约、构建脚本、路由测试和跨模块支撑文件。阅读业务前不必一次看完，但当你需要理解发布、启动参数或辅助脚本时，这一页是合适入口。\n\n## 推荐阅读路径\n\n第一次接触代码时，建议按请求生命周期阅读：先看 [Application Entry and Routing](application-entry-and-routing.md)，理解 `main.go` 和路由注册；再看 [Runtime Configuration](runtime-configuration.md) 与 [Middleware and Request Authentication](middleware-and-request-authentication.md)，掌握运行环境和响应约定；随后根据任务进入 [General Console Handlers](general-console-handlers.md)、[MDAP Core APIs](mdap-core-apis.md) 或 [BPM and Account Provisioning](bpm-and-account-provisioning.md)。\n\n如果你要改数据读写，优先看 [Database Access](database-access.md)。如果你要接外部服务或排查 RPC 数据结构，优先看 [Thrift IDL and Generated Clients](thrift-idl-and-generated-clients.md) 和相关 `biz/rpc` 实现。","runtime-configuration":"# Runtime Configuration\n\n## 模块概览\n\n`biz/config` 负责运行时配置的加载、覆盖和数据库连接配置构造。模块的核心入口是 `InitConf(path string)`，它从本地 YAML 配置加载 `Config`，再尝试从 TCC 拉取运行时覆盖配置，最后将结果写入全局变量 `Conf`。\n\n该模块目前覆盖三类配置能力：\n\n- 本地配置模型：`Config` 及其子配置结构体定义 YAML 映射。\n- TCC 动态覆盖：只覆盖 `Config.TQS`，并要求覆盖值完整。\n- MySQL 初始化：`Mysql.GetDSN()` 生成 DSN，`Mysql.NewDB()` 创建 `*gorm.DB`。\n\n## 初始化流程\n\n```mermaid\nflowchart TD\n    A[\"main\"] --> B[\"InitConf(path)\"]\n    B --> C[\"caesar.Unmarshal\"]\n    C --> D[\"applyTCCConfig\"]\n    D --> E[\"defaultTCCConfigSource\"]\n    D --> F[\"applyTCCConfigFromSource\"]\n    F --> G[\"Fetch\"]\n    F --> H[\"parseTCCConfigOverride\"]\n    F --> I[\"isCompleteTQSConfig\"]\n    F --> J[\"cloneTQSConfig\"]\n    B --> K[\"redactedConfigForPrint\"]\n```\n\n`InitConf` 的执行顺序固定：\n\n1. 创建新的 `Config` 实例并赋值给全局变量 `Conf`。\n2. 调用 `caesar.Unmarshal(Conf, path)` 从指定路径加载 YAML。\n3. 如果本地配置加载失败，调用 `logs.Fatal` 并 `panic`。\n4. 调用 `applyTCCConfig(context.Background(), Conf)` 尝试应用 TCC 覆盖。\n5. 调用 `redactedConfigForPrint(Conf)` 打印脱敏后的配置。\n\n`Conf` 是包级全局变量，业务代码通常通过 `config.Conf` 读取运行时配置。调用方应保证 `InitConf` 在依赖配置的组件初始化之前执行。\n\n## 配置结构\n\n主配置结构体是 `Config`：\n\n```go\ntype Config struct {\n    Meta                Meta\n    WriteDB             *Mysql\n    RetryTimes          int\n    ReadDB              *Mysql\n    GuardianAPI         *GuardianAPI\n    JingleAPI           *JingleAPI\n    VCloudControlConfig *VCloudControlConfig\n    JumpUrl             *JumpUrl\n    ByteTreeConfig      *ByteTreeConfig\n    CloudIAM            *CloudIAMConfig\n    MDAP                *MDAPConfig\n    TQS                 *TQSConfig\n    JwtRegion           string\n    TOS                 NonTTTOS\n}\n```\n\n这些字段通过 `yaml` 标签和 YAML 配置文件绑定。指针字段表示对应配置块可以缺省，使用前需要由调用方做空值判断。\n\n### `Meta`\n\n`Meta.PSM` 表示服务 PSM。TCC 配置源会优先使用 `Conf.Meta.PSM` 作为 TCC client 的 `servicePSM`；如果为空，则使用默认值 `toutiao.videoarch.general_console`。\n\n### 数据库配置 `Mysql`\n\n`WriteDB` 和 `ReadDB` 都使用 `*Mysql`：\n\n```go\ntype Mysql struct {\n    DSNTemplate  string\n    Username     string\n    Password     string\n    DBName       string\n    ConsulName   string\n    Timeout      string\n    ReadTimeout  string\n    WriteTimeout string\n    MaxIdle      int\n    MaxOpen      int\n}\n```\n\n`Mysql.GetDSN()` 使用 `fmt.Sprintf` 将 `Username`、`Password`、`ConsulName`、`DBName`、`Timeout`、`ReadTimeout`、`WriteTimeout` 填入 `DSNTemplate`。\n\n`Mysql.NewDB()` 基于 `GetDSN()` 创建 GORM 连接：\n\n```go\ndb, err := gorm.Open(\"mysql2\", m.GetDSN())\ndb.LogMode(true)\ndb.DB().SetMaxIdleConns(m.MaxIdle)\ndb.DB().SetMaxOpenConns(m.MaxOpen)\ndb.SingularTable(true)\n```\n\n在 Codebase CI 环境中，`GetDSN()` 不使用 YAML 配置，而是返回固定的测试 DSN。判断逻辑由 `IsCodebaseCIEnvironment()` 完成：只要环境变量 `CI_REPO_NAME` 非空，就认为当前处于 CI 环境。\n\n### 外部服务配置\n\n模块中还定义了多组外部服务配置结构：\n\n- `GuardianAPI`：包含 `PSM`、`AccessKey`、`SecretKey`。\n- `JingleAPI`：包含 `Host`、`UserName`、`Password`。\n- `VCloudControlConfig`：包含 `AccessKey`、`SecretKey`，用于调用 passport 等需要租户 AK/SK BasicAuth 的接口。\n- `JumpUrl`：包含 IAM 申请、账号创建、域名修改相关跳转地址。\n- `ByteTreeConfig`：包含 `Domain`、`Partition`、`SecretKey`。\n- `CloudIAMConfig`：包含网关租户、网关地址和服务账号。\n- `MDAPConfig` / `MDAPIAMConfig`：包含 MDAP、ByteTree 和 IAM 相关配置。\n- `NonTTTOS`：包含 TOS 地址、集群、重试、IAM、S3 兼容访问等配置。\n\n这些结构体只负责承载配置，不包含业务逻辑。\n\n## TCC 覆盖机制\n\nTCC 逻辑位于 `biz/config/tcc.go`。当前只支持覆盖 `Config.TQS`。\n\n默认 TCC key 是：\n\n```go\nconst generalConsoleTCCConfigKey = \"general_console_cfg\"\n```\n\n默认服务 PSM 是：\n\n```go\nconst defaultTCCServicePSM = \"toutiao.videoarch.general_console\"\n```\n\n### 配置源构造\n\n`defaultTCCConfigSource(conf *Config)` 构造 `tccConfigSource`：\n\n```go\ntype tccConfigSource struct {\n    Key        string\n    ServicePSM string\n    Confspace  string\n    Fetch      tccConfigFetcher\n}\n```\n\n字段来源如下：\n\n- `Key`：默认 `general_console_cfg`。\n- `ServicePSM`：优先使用 `conf.Meta.PSM`，为空时使用 `defaultTCCServicePSM`。\n- `Confspace`：来自 `tccclient.GetClusterFromEnv()`。\n- `Fetch`：默认是 `fetchTCCConfigFromClient`。\n\n`applyTCCConfigFromSource` 接收 `tccConfigSource`，因此单测可以注入自定义 `Fetch`，避免真实访问 TCC。\n\n### 拉取和超时\n\n`fetchTCCConfigFromClient` 使用 `tccclient.NewConfigV2()` 创建配置：\n\n```go\ncfg.Confspace = confspace\ncfg.SetFirstGetRetry(1)\ncfg.SetFirstGetTimeout(defaultTCCFirstGetTimeout)\n```\n\n默认首次获取超时是 `200ms`。如果传入的 `context.Context` 没有 deadline，函数会额外包一层 `500ms` 超时：\n\n```go\nctx, cancel = context.WithTimeout(ctx, defaultTCCGetTimeout)\n```\n\n然后调用：\n\n```go\nclient.Get(ctx, key)\n```\n\n### 覆盖规则\n\n`applyTCCConfigFromSource(ctx, conf, source)` 的覆盖规则是保守的：\n\n1. `conf == nil` 时直接返回 `false, nil`。\n2. `source.Fetch == nil` 时返回错误 `missing TCC fetcher`。\n3. `source.Key`、`source.ServicePSM`、`source.Confspace` 为空时使用默认值。\n4. 通过 `source.Fetch` 获取 TCC YAML 字符串。\n5. 调用 `parseTCCConfigOverride` 解析 YAML。\n6. 调用 `isCompleteTQSConfig` 校验 `TQS` 是否完整。\n7. 校验通过后，调用 `cloneTQSConfig` 克隆并清理字符串字段，再赋值给 `conf.TQS`。\n\n只有完整的 TCC `TQS` 配置会覆盖本地配置。空 YAML、非法 YAML、缺字段、拉取失败都会导致不覆盖。\n\n`applyTCCConfig` 会吞掉 TCC 错误并保留本地配置：\n\n- 如果错误是 `tccclient.ConfigNotFoundError`，记录 `TCC config ... not found, keep local config`。\n- 其他错误记录 `load TCC config ... failed, keep local config: ...`。\n- 成功覆盖后记录 TCC key、confspace 和 `conf.TQS.Cluster`。\n\n## TQS 配置\n\n`TQSConfig` 用于 Hive/TQS 相关能力：\n\n```go\ntype TQSConfig struct {\n    AppID                 string\n    AppKey                string\n    UserName              string\n    Cluster               string\n    Timeout               time.Duration\n    PollInterval          time.Duration\n    YarnClusterName       string\n    MapReduceJobQueueName string\n    AuthMode              string\n}\n```\n\n`isCompleteTQSConfig` 认为以下字段必须存在：\n\n- `AppID`\n- `AppKey`\n- `UserName`\n- `Cluster`\n- `Timeout > 0`\n\n`PollInterval`、`YarnClusterName`、`MapReduceJobQueueName` 不参与完整性校验，但 `cloneTQSConfig` 会对字符串字段做 `strings.TrimSpace`。\n\n`AuthMode` 已废弃，仅保留旧 YAML 兼容性。代码注释明确说明 Hive import 始终使用服务 PSM token。\n\n## 脱敏打印\n\n`redactedConfigForPrint(conf *Config)` 只处理 `conf.TQS.AppKey`：\n\n```go\ntqs.AppKey = \"<redacted>\"\n```\n\n实现方式是浅拷贝 `Config`，再浅拷贝 `TQSConfig`，替换 `AppKey` 后返回新的 `*Config`。这避免了打印时修改实际运行配置。\n\n如果 `conf == nil`、`conf.TQS == nil` 或 `conf.TQS.AppKey == \"\"`，函数直接返回原对象。\n\n需要注意的是，当前只脱敏 `TQS.AppKey`。其他字段如数据库密码、AK/SK、Jingle 密码不会在这个函数中脱敏；如果新增打印路径，需要单独评估敏感信息风险。\n\n## 与代码库其他部分的关系\n\n`InitConf` 是模块对外最重要的入口。测试中 `TestMain` 会调用它初始化全局配置，业务启动流程也通过它完成配置加载。\n\n`TQSConfig` 被 Hive/TQS 数据读取逻辑使用。相关测试包括：\n\n- `TestNewTQSHiveVIDReaderFromConfig_requiresCompleteConfig`\n- `TestTQSHiveVIDReader_ReadVIDs_alwaysUsesPSMTokenEvenWithLegacyAuthModeConfig`\n\n`VCloudControlConfig` 被服务初始化逻辑用于判断是否调用认证设置。相关测试包括：\n\n- `TestNewGeneralConsoleServer_vcloud_control_config_present_should_call_setauth`\n\n`MDAPConfig` 和 `MDAPIAMConfig` 被服务初始化逻辑读取，并允许 IAM 配置缺失时跳过相关初始化。相关测试包括：\n\n- `TestNewGeneralConsoleServer_missing_mdap_iam_config_should_skip`\n\n`NonTTTOS` 在 TOS 相关 RPC 测试中被直接构造，用于初始化非 TTTOS 访问配置。\n\n## 贡献注意事项\n\n新增配置字段时，应同时更新对应结构体的 `yaml` 标签，避免本地 YAML 无法映射。指针配置块的新增使用方应显式处理 `nil`，因为 `Config` 中大多数子配置都是可选指针。\n\n调整 TCC 行为时，应优先修改 `applyTCCConfigFromSource`，并通过注入 `tccConfigSource.Fetch` 写单测。这个函数是 TCC 覆盖逻辑的核心边界，适合覆盖拉取失败、配置不存在、YAML 非法、字段不完整和成功覆盖等场景。\n\n如果扩展 TCC 覆盖范围，建议保持当前“完整校验后一次性覆盖”的模式，避免部分字段覆盖导致本地配置和动态配置混用后状态不明确。\n\n数据库相关修改需要注意 `IsCodebaseCIEnvironment()` 的分支。CI 环境下 `GetDSN()` 会返回固定 DSN，本地配置中的 `DSNTemplate`、用户名和密码不会生效。","shared-utilities":"# Shared Utilities\n\n## 共享工具模块\n\n`biz/util` 提供跨 handler、DAO 和启动流程复用的轻量工具能力，当前包含三类职责：\n\n- 从 Hertz 请求上下文读取 DevSRE 注入的操作者身份\n- 使用 `iamsdk` 为 HTTP/RPC 请求生成 IAM 签名\n- 初始化并发送吞吐、延迟和错误指标\n\n这些工具函数彼此之间没有内部调用关系，都是面向业务层和数据访问层的独立入口。\n\n```mermaid\nflowchart TD\n    A[\"main / TestMain\"] --> B[\"InitMetrics\"]\n    C[\"dal/dao/authority.go\"] --> D[\"EmitThroughput / EmitLatency\"]\n    E[\"handler 账户/域名/配置/鉴权/对象接口\"] --> F[\"DevSreGetOperatorName\"]\n    G[\"NewGeneralConsoleServer\"] --> H[\"InitTopAccounts\"]\n    H --> I[\"IAMSignHttpRequest\"]\n    J[\"getObjectMetaData\"] --> K[\"IAMSignRpcRequest\"]\n```\n\n## 请求上下文工具\n\n文件：[biz/util/ctx.go](/Users/bytedance/videoarch/general_console/biz/util/ctx.go)\n\n`ctx.go` 目前只暴露一个请求头读取工具：\n\n```go\nconst VPaasOperator = \"x-vpaas-operator-name\"\n\nfunc DevSreGetOperatorName(ctx *app.RequestContext) string\n```\n\n`DevSreGetOperatorName` 从 Hertz 的 `*app.RequestContext` 中读取 `x-vpaas-operator-name` 请求头，并以 `string` 返回。\n\n该请求头由 DevSRE Web 请求注入，用于标识当前操作人。调用方主要位于 handler 层，例如：\n\n- `getProviderAuthInfo`\n- `checkUserAuthorized`\n- `handlerGetAllDomain`\n- `handlePageGetGeneralAccounts`\n- `handleGetAccountDetail`\n- `getConfigByModule`\n- `handleGetObject`\n\n使用模式很直接：\n\n```go\noperator := util.DevSreGetOperatorName(ctx)\n```\n\n注意：函数不会校验空值，也不会做 fallback。调用方如果依赖操作者身份做鉴权、审计或查询过滤，需要自行处理请求头缺失的情况。\n\n## IAM 签名工具\n\n文件：[biz/util/iam.go](/Users/bytedance/videoarch/general_console/biz/util/iam.go)\n\n`iam.go` 封装了对 `code.byted.org/videoarch/iamsdk` 的调用，用于生成 HTTP 和 RPC 请求签名。\n\n模块级常量：\n\n```go\nconst PSM = \"toutiao.videoarch.general_console\"\n```\n\n`PSM` 同时被 metrics 初始化和 RPC IAM 签名复用，代表当前服务身份。\n\n### `IAMSignHttpRequest`\n\n```go\nfunc IAMSignHttpRequest(req *http.Request, ak, sk string) error\n```\n\n该函数使用传入的 `ak`、`sk` 初始化 `iamsdk` 默认客户端，并设置 5 分钟过期时间：\n\n```go\niamsdk.InitDefaultClient(\n    &iamsdk.Credential{\n        AccessKey: ak,\n        SecretKey: sk,\n    },\n    iamsdk.WithExpire(time.Minute*5),\n)\nreturn iamsdk.SignHttpRequest(req)\n```\n\n当前调用链中，服务初始化会通过：\n\n`NewGeneralConsoleServer` → `InitTopAccounts` → `IAMSignHttpRequest`\n\n这说明 HTTP 签名主要用于初始化 Top Accounts 相关请求。函数会直接修改传入的 `*http.Request`，调用方应在发送请求前完成签名。\n\n### `IAMSignRpcRequest`\n\n```go\nfunc IAMSignRpcRequest(method string, ak, sk string) (string, error)\n```\n\n该函数创建独立的 `iamsdk.Client`，并对指定 RPC `method` 生成认证字符串：\n\n```go\niamClient := iamsdk.NewClient(&iamsdk.Credential{AccessKey: ak, SecretKey: sk})\nauth, err := iamClient.SignRpcRequest(iamsdk.RpcRequest{\n    Method: method,\n    Caller: PSM,\n    Extra:  nil,\n})\n```\n\n当前主要由 `getObjectMetaData` 调用，用于对象元数据相关 RPC 请求签名。返回值中的 `auth` 通常由调用方放入 RPC 请求的认证字段或 header 中，具体传递方式由调用方决定。\n\n## 指标工具\n\n文件：[biz/util/metrics.go](/Users/bytedance/videoarch/general_console/biz/util/metrics.go)\n\n`metrics.go` 基于 `code.byted.org/gopkg/metrics/v3` 封装指标客户端和指标对象缓存。\n\n核心常量：\n\n```go\nconst (\n    CommandThroughput = \"cmd.throughput\"\n    CommandLatency    = \"cmd.latency\"\n\n    TagCommand = \"cmd\"\n)\n```\n\n全局状态：\n\n```go\nvar client m.Client\nvar throughputMetricMap = sync.Map{}\nvar latencyMetricMap = sync.Map{}\nvar errorMetricMap = sync.Map{}\n```\n\n三个 `sync.Map` 分别缓存吞吐、延迟和错误指标对象，key 是调用方传入的指标名。缓存的目的是避免每次发送指标时重复调用 `client.NewMetric`。\n\n### 初始化：`InitMetrics`\n\n```go\nfunc InitMetrics()\n```\n\n`InitMetrics` 初始化全局 metrics client：\n\n```go\nclient = m.NewClient(PSM, m.SetTceTags())\n```\n\n该函数由 `main` 调用，也在多个测试包的 `TestMain` 中调用，包括 `biz/util`、`biz/handler`、`biz/errno`、`dal/dao`。发送指标前必须先初始化 `client`，否则后续 `client.NewMetric` 会依赖未初始化的全局客户端。\n\n### 吞吐指标：`EmitThroughput`\n\n```go\nfunc EmitThroughput(key string, tags ...m.T)\n```\n\n`EmitThroughput` 发送计数器指标，实际 suffix 为 `\"throughput\"`：\n\n```go\nthroughputMetric.WithTags(tags...).Emit(\n    m.WithSuffix(\"throughput\").IncrCounter(1),\n)\n```\n\n函数会根据 `tags` 提取 tag 名称创建 metric：\n\n```go\ntagNames := make([]string, len(tags))\nfor i, tag := range tags {\n    tagNames[i] = tag.Name\n}\nthroughputMetric = client.NewMetric(key, tagNames...)\n```\n\n当前 DAO 层大量使用该函数统计 authority 相关操作吞吐，例如：\n\n- `CreateAdminUserInfo`\n- `DeleteAdminUserInfo`\n- `CheckAdminUserInfo`\n- `CreateAuthorizeInfo`\n- `DeleteAuthorizeInfo`\n- `CheckAuthorizeInfo`\n- `GetAuthorizedAccountIdsOfUser`\n- `GetAuthorizedUsersOfAccountName`\n\n### 延迟指标：`EmitLatency`\n\n```go\nfunc EmitLatency(key string, start time.Time, tags ...m.T)\n```\n\n`EmitLatency` 根据传入的 `start` 计算耗时，单位为微秒：\n\n```go\ncost := time.Since(start).Nanoseconds() / 1000\n```\n\n随后发送 observation 指标，suffix 为 `\"latency\"`：\n\n```go\nlatencyMetric.WithTags(tags...).Emit(\n    m.WithSuffix(\"latency\").Observe(int(cost)),\n)\n```\n\n典型调用方式是在函数开始处记录时间，并在结束前或 `defer` 中上报：\n\n```go\nstart := time.Now()\ndefer util.EmitLatency(metricKey, start, tags...)\n```\n\n当前主要由 `dal/dao/authority.go` 中的 authority 查询、创建、删除、检查逻辑调用，用于观测 DAO 操作耗时。\n\n### 错误指标：`EmitError`\n\n```go\nfunc EmitError(mkey string, tags ...m.T)\n```\n\n`EmitError` 发送错误计数器指标，suffix 为 `\"error\"`：\n\n```go\nerrorMetric.WithTags(tags...).Emit(\n    m.WithSuffix(\"error\").IncrCounter(1),\n)\n```\n\n实现上与吞吐指标类似，也会按 `mkey` 缓存 metric。和 `EmitThroughput`、`EmitLatency` 不同的是，`EmitError` 每次都会执行：\n\n```go\nerrorMetricMap.Store(mkey, errorMetric)\n```\n\n这不会改变功能结果，但意味着即使缓存命中也会重复写回一次 `sync.Map`。\n\n## 指标 tag 的约束\n\n三个指标发送函数都在首次创建 metric 时，根据首次调用传入的 `tags` 生成 tag name 列表。后续同一个 `key` 会直接复用缓存中的 metric。\n\n因此，同一个指标 `key` 应保持稳定的 tag 结构：\n\n```go\nutil.EmitThroughput(\"authority.operation\", m.T{Name: util.TagCommand, Value: \"create\"})\nutil.EmitLatency(\"authority.operation\", start, m.T{Name: util.TagCommand, Value: \"create\"})\n```\n\n不要对同一个 `key` 混用不同 tag name 集合，否则缓存中的 metric 定义可能与后续 tags 不一致，导致指标上报行为难以预测。\n\n## 与代码库的连接方式\n\n`biz/util` 是一个低耦合共享模块：\n\n- handler 层通过 `DevSreGetOperatorName` 获取 DevSRE 操作者身份\n- handler 初始化和对象元数据逻辑通过 IAM 工具完成外部请求签名\n- DAO 层通过 metrics 工具上报 authority 相关数据库操作的吞吐和延迟\n- `main` 和测试入口通过 `InitMetrics` 建立全局指标客户端\n\n新增工具函数时，应优先保持当前模块风格：函数小、无复杂状态、调用方显式传参。若新增全局状态，需像 metrics 缓存一样考虑初始化顺序和并发访问。","thrift-idl-and-generated-clients-biz":"# Thrift IDL and Generated Clients — biz\n\n## 模块概览\n\n`biz/base.thrift` 定义了一组跨语言共享的 Thrift 基础数据结构，用于在业务请求和响应中承载通用元信息。该文件只包含 `struct` 定义，不包含 `service`、函数实现或执行逻辑，因此没有内部调用、外部调用或运行时调用链。\n\n该 IDL 同时声明了两个命名空间：\n\n```thrift\nnamespace py base\nnamespace go base\n```\n\n生成代码后，Python 和 Go 侧都会使用 `base` 作为对应语言的命名空间或包名。\n\n## 核心结构\n\n### `TrafficEnv`\n\n`TrafficEnv` 描述流量环境相关信息，通常用于标识请求是否启用了特定环境路由。\n\n```thrift\nstruct TrafficEnv {\n    1: bool Open = false,\n    2: string Env = \"\",\n}\n```\n\n字段说明：\n\n| 字段 | 类型 | 默认值 | 含义 |\n| --- | --- | --- | --- |\n| `Open` | `bool` | `false` | 是否开启流量环境标识 |\n| `Env` | `string` | `\"\"` | 环境名称或环境标识 |\n\n`TrafficEnv` 本身不决定路由行为，只提供结构化数据。具体如何解释 `Open` 和 `Env`，由使用该结构的业务代码、RPC 框架或中间件决定。\n\n### `Base`\n\n`Base` 是请求侧通用元信息结构，用于携带日志、调用方、客户端、地址和扩展字段。\n\n```thrift\nstruct Base {\n    1: string LogID = \"\",\n    2: string Caller = \"\",\n    3: string Addr = \"\",\n    4: string Client = \"\",\n    5: optional TrafficEnv TrafficEnv,\n    6: optional map<string, string> Extra,\n}\n```\n\n字段说明：\n\n| 字段 | 类型 | 默认值 | 含义 |\n| --- | --- | --- | --- |\n| `LogID` | `string` | `\"\"` | 请求日志标识，常用于链路追踪或日志检索 |\n| `Caller` | `string` | `\"\"` | 调用方标识 |\n| `Addr` | `string` | `\"\"` | 调用方地址或来源地址 |\n| `Client` | `string` | `\"\"` | 客户端标识 |\n| `TrafficEnv` | `optional TrafficEnv` | 未设置 | 可选的流量环境信息 |\n| `Extra` | `optional map<string, string>` | 未设置 | 可选扩展字段 |\n\n`Base` 的前四个字段都有空字符串默认值，因此生成代码在未显式赋值时也会有稳定的默认表现。`TrafficEnv` 和 `Extra` 是 `optional` 字段，调用方需要区分“未设置”和“设置为空值”的语义。\n\n### `BaseResp`\n\n`BaseResp` 是响应侧通用状态结构，用于承载接口返回状态和扩展信息。\n\n```thrift\nstruct BaseResp {\n    1: string StatusMessage = \"\",\n    2: i32 StatusCode = 0,\n    3: optional map<string, string> Extra,\n}\n```\n\n字段说明：\n\n| 字段 | 类型 | 默认值 | 含义 |\n| --- | --- | --- | --- |\n| `StatusMessage` | `string` | `\"\"` | 状态描述信息 |\n| `StatusCode` | `i32` | `0` | 状态码 |\n| `Extra` | `optional map<string, string>` | 未设置 | 可选扩展字段 |\n\n`StatusCode = 0` 通常可作为默认成功或未指定状态，但该语义并未在 IDL 中强制定义。业务代码应以具体接口约定为准。\n\n## 数据模型关系\n\n`Base` 依赖 `TrafficEnv` 作为可选字段；`BaseResp` 独立存在，和 `Base` 没有直接结构引用。\n\n```mermaid\nflowchart TD\n    Base[\"Base<br/>请求通用信息\"]\n    TrafficEnv[\"TrafficEnv<br/>流量环境\"]\n    BaseResp[\"BaseResp<br/>响应通用状态\"]\n    ExtraReq[\"Extra<br/>请求扩展字段\"]\n    ExtraResp[\"Extra<br/>响应扩展字段\"]\n\n    Base --> TrafficEnv\n    Base --> ExtraReq\n    BaseResp --> ExtraResp\n```\n\n## 生成代码中的角色\n\n该 Thrift 文件本身不会生成 RPC 客户端方法，因为它没有定义 `service`。生成产物主要是跨语言的数据类型：\n\n- Python 命名空间：`base`\n- Go 命名空间：`base`\n- 生成类型：`TrafficEnv`、`Base`、`BaseResp`\n\n这些类型通常被其他业务 IDL 引用，例如在请求结构中嵌入 `Base`，在响应结构中嵌入 `BaseResp`。本模块提供的是公共协议层的数据契约，而不是业务逻辑实现。\n\n## 使用约定\n\n### 请求元信息\n\n业务请求如果需要携带通用上下文，可以引用 `Base`：\n\n```thrift\nstruct ExampleRequest {\n    1: base.Base Base,\n    2: string Payload = \"\",\n}\n```\n\n其中 `Base.LogID` 可用于日志串联，`Base.Caller` 可用于识别调用来源，`Base.Extra` 可用于传递不适合固化为字段的扩展键值。\n\n### 响应状态\n\n业务响应如果需要统一表达状态，可以引用 `BaseResp`：\n\n```thrift\nstruct ExampleResponse {\n    1: base.BaseResp BaseResp,\n    2: string Result = \"\",\n}\n```\n\n这种模式可以让不同接口复用相同的状态码、状态消息和扩展信息结构。\n\n## 字段演进注意事项\n\n由于这是跨语言 IDL，修改时需要保持 Thrift 兼容性：\n\n- 不要复用已经使用过的字段编号。\n- 新增字段优先使用 `optional`，降低对旧客户端和旧服务端的兼容风险。\n- 不要随意修改已有字段类型，例如将 `StatusCode` 从 `i32` 改成 `string` 会破坏兼容性。\n- 不要重命名字段后假设所有语言生成代码都能无感兼容；字段名会影响生成代码的访问方式。\n- `Extra` 适合承载临时或弱约束扩展，但长期稳定语义应考虑新增明确字段。\n\n## 模块边界\n\n`biz/base.thrift` 只定义基础结构，不负责：\n\n- 生成代码的构建流程\n- RPC 服务定义\n- 请求路由\n- 状态码语义解释\n- 日志写入或链路追踪实现\n- `Extra` 中键值的业务约定\n\n这些行为应由引用该 IDL 的业务接口、生成代码配置、RPC 框架或调用方代码负责。","thrift-idl-and-generated-clients-idl":"# Thrift IDL and Generated Clients — idl\n\n## 模块概览\n\n`biz/idl` 定义并承载 Object Duplication Manager 的 Thrift 契约和 Kitex 生成代码。该模块本身不实现业务逻辑，而是提供跨进程 RPC 的数据模型、序列化代码、服务接口、客户端封装和服务端处理器骨架。\n\n核心契约来自 `biz/idl/object_duplication_manager.thrift`，生成代码位于：\n\n- `biz/idl/kitex_gen/base`：通用 `Base`、`BaseResp`、`TrafficEnv`。\n- `biz/idl/kitex_gen/bytedance/videoarch/object_duplication_manager`：对象元信息与副本管理的请求、响应、服务接口。\n- `biz/idl/kitex_gen/bytedance/videoarch/object_duplication_manager/objectduplicationmanager`：Kitex 客户端包，提供 `NewClient`、`MustNewClient` 以及各 RPC 方法封装。\n\n该模块被业务层通过生成类型直接引用。例如 `biz/handler/object.go` 使用 `QueryObjectRequest` 查询对象元信息，`biz/handler/server.go` 通过 `MustNewClient` 初始化 Object Duplication Manager 客户端。\n\n## IDL 契约\n\n`object_duplication_manager.thrift` 使用 `include \"../base.thrift\"` 引入通用上下文字段，并声明 Go/Python 命名空间：\n\n```thrift\nnamespace go bytedance.videoarch.object_duplication_manager\nnamespace py bytedance.videoarch.object_duplication_manager\n```\n\n### 核心实体\n\n`Object` 表示业务对象元信息：\n\n```thrift\nstruct Object {\n    1: string ObjectID\n    2: string Name\n    3: string UploadIDC\n    4: i64 Size\n    5: string UserID\n    6: string BizID\n    7: string BizType\n    8: string Provider\n    9: string AppID\n    10: string Status\n    11: i64 ObjectCreateTime\n    12: UserActionLevel UserAction\n\n    100: map<string, ObjectDuplication> Duplications\n    101: map<string, string> Extras\n}\n```\n\n`ObjectDuplication` 表示对象的一个副本，包含存储位置、生命周期和文件时间信息：\n\n```thrift\nstruct ObjectDuplication {\n    1: string URI\n    2: string Bucket\n    3: string Region\n    4: string IDC\n    5: i64 TTL\n    6: map<string, string> Extras\n    7: i64 FileCreateTime\n    8: i64 FileModifiedTime\n}\n```\n\n`Duplications` 使用 `map<string, ObjectDuplication>` 存储多个副本。生成到 Go 后，map value 会变成指针类型，例如 `map[string]*ObjectDuplication`。\n\n### 操作枚举\n\n`CreateType` 控制创建对象或副本时遇到重复数据的处理方式：\n\n- `IgnoreDuplicate = 0`\n- `RejectDuplicate = 1`\n\n`DeleteType` 控制删除范围：\n\n- `MarkDelete = 0`：标记删除。\n- `OnlyMetaData = 1`：只删除元数据。\n- `BothMetaAndFile = 2`：删除元数据和文件。\n\n`QueryType` 控制查询是否包含标记删除的数据：\n\n- `ExcludeMarkDelete = 0`\n- `IncludeMarkDelete = 1`\n\n`ReadPreference` 控制读偏好：\n\n- `Default = 0`\n- `Primary = 1`\n\n`UserActionLevel` 表示用户行为等级，`NOACTION = 0` 用于表达空动作，其余等级从 `VL0 = 1000` 到 `VL4 = 1004`。\n\n## 服务接口\n\n`ObjectDuplicationManager` 提供对象和对象副本两组操作：\n\n```thrift\nservice ObjectDuplicationManager {\n    CreateObjectResponse CreateObject(1: CreateObjectRequest req)\n    DeleteObjectResponse DeleteObject(1: DeleteObjectRequest req)\n    UpdateObjectResponse UpdateObject(1: UpdateObjectRequest req)\n    QueryObjectResponse QueryObject(1: QueryObjectRequest req)\n    RecoverObjectResponse RecoverObject(1: RecoverObjectRequest req)\n    MQueryObjectsResponse MQueryObjects(1: MQueryObjectsRequest req)\n\n    CreateObjectDuplicationResponse CreateObjectDuplication(1: CreateObjectDuplicationRequest req)\n    UpdateObjectDuplicationResponse UpdateObjectDuplication(1: UpdateObjectDuplicationRequest req)\n    DeleteObjectDuplicationResponse DeleteObjectDuplication(1: DeleteObjectDuplicationRequest req)\n    RecoverObjectDuplicationResponse RecoverObjectDuplication(1: RecoverObjectDuplicationRequest req)\n\n    UpsertObjectDuplicationResponse UpsertObjectDuplication(1: UpsertObjectDuplicationRequest req)\n}\n```\n\n对象操作处理 `Object` 本体。副本操作处理 `ObjectDuplication`。`UpsertObjectDuplication` 是组合语义：创建或更新副本，同时更新 `Object`，如果对象不存在则创建对象。\n\n## 请求与响应约定\n\n所有主要请求都保留字段 `255: base.Base Base`，所有响应都保留字段 `255: base.BaseResp BaseResp`。业务字段使用低位字段号，通用 RPC 元信息固定放在 `255`，这有利于后续兼容扩展。\n\n典型响应结构只有 `BaseResp`：\n\n```thrift\nstruct CreateObjectResponse {\n    255: base.BaseResp BaseResp\n}\n```\n\n查询响应会额外携带数据：\n\n```thrift\nstruct QueryObjectResponse {\n    1: Object object\n    255: base.BaseResp BaseResp\n}\n```\n\n批量查询通过 `MQueryObjectsResponse.ObjectInfos` 返回 `map<string, Object>`。\n\n## 生成代码结构\n\n生成的 Go 类型遵循 thriftgo 和 Kitex 的固定模式：\n\n- `New<Type>()` 创建结构体并填充默认值。\n- `InitDefault()` 将已有结构体重置为默认值。\n- `Get<Field>()` 读取字段；可选字段未设置时返回对应默认变量。\n- `Set<Field>(val)` 设置字段。\n- `IsSet<Field>()` 判断可选字段是否非 nil。\n- `Read(iprot thrift.TProtocol)` 和 `Write(oprot thrift.TProtocol)` 实现标准 Thrift 协议读写。\n- `FastRead(buf []byte)`、`FastWriteNocopy(buf []byte, binaryWriter bthrift.BinaryWriter)` 和 `BLength()` 实现 Kitex 二进制快速路径。\n- `DeepEqual()` 和 `Field<N>DeepEqual()` 用于结构体比较。\n\n示例：`base.Base` 的可选字段 `TrafficEnv` 和 `Extra` 通过 nil 判断是否写出：\n\n```go\nfunc (p *Base) IsSetTrafficEnv() bool {\n\treturn p.TrafficEnv != nil\n}\n\nfunc (p *Base) IsSetExtra() bool {\n\treturn p.Extra != nil\n}\n```\n\n写入时会先检查 `IsSetExtra()`，只有非 nil map 才会序列化：\n\n```go\nfunc (p *Base) writeField6(oprot thrift.TProtocol) (err error) {\n\tif p.IsSetExtra() {\n\t\t// 写入 Extra map\n\t}\n\treturn nil\n}\n```\n\n## 序列化执行流\n\n标准 Thrift 路径通过 `Read` / `Write` 使用 `thrift.TProtocol`。Kitex 快速路径通过 `FastRead` / `FastWriteNocopy` 使用 `bthrift.Binary` 直接读写二进制 buffer。\n\n```mermaid\nflowchart TD\n    A[\"服务端 Process\"] --> B[\"读取 Args\"]\n    B --> C[\"调用 Handler 方法\"]\n    C --> D[\"填充 Result\"]\n    D --> E[\"Result.Write\"]\n    E --> F[\"Response.writeField255\"]\n    F --> G[\"base.BaseResp.Write\"]\n    G --> H[\"BaseResp.writeField3\"]\n    H --> I[\"IsSetExtra\"]\n```\n\n这条路径说明响应写出时，业务层返回的 `BaseResp` 会参与最终序列化；`BaseResp.Extra` 只有在非 nil 时才进入响应包。\n\n## 必填字段校验\n\nIDL 中声明为 `required` 的字段会在生成代码的读取阶段强制校验。以 `CreateObjectRequest` 为例，字段 `object` 是必填字段。`FastRead` 会维护 `issetObject` 标记，读完结构体后如果未设置则返回 `thrift.INVALID_DATA`：\n\n```go\nif !issetObject {\n\tfieldId = 1\n\tgoto RequiredFieldNotSetError\n}\n```\n\n`DeleteObjectRequest` 同时要求 `ObjectID` 和 `DeleteOption`。调用方构造请求时必须显式设置这些字段，否则远端反序列化会失败，而不是进入业务 handler。\n\n## 客户端调用方式\n\n业务代码通常不直接操作底层 `ObjectDuplicationManagerClient`，而是通过 `objectduplicationmanager` 子包创建 Kitex client。调用链为：\n\n```text\nbiz/handler/server.go\n  -> objectduplicationmanager.MustNewClient(...)\n  -> objectduplicationmanager.NewClient(...)\n  -> 生成的 RPC 方法，如 QueryObject/CreateObject/DeleteObjectDuplication\n```\n\n请求结构来自 `kitex_gen/bytedance/videoarch/object_duplication_manager` 包，例如：\n\n```go\nreq := object_duplication_manager.NewQueryObjectRequest()\nreq.ObjectID = objectID\nreq.Region = &region\nreq.Preference = &object_duplication_manager.ReadPreference_Default\n```\n\n可选字段在 Go 中通常生成为指针字段，设置时需要传地址；map 可选字段通过 nil 与空 map 区分是否写出。\n\n## 与业务层的连接\n\n`biz/handler/object.go` 使用生成类型查询对象元信息，典型入口是 `getObjectMetaData` 构造 `QueryObjectRequest`。`handleGetObject` 使用 `NewObject()` 创建返回对象结构。\n\n`biz/handler/mdap_asset_group.go` 会构造 `base.Base` 作为 RPC 请求上下文。`biz/handler/mdap_processing_task_test.go` 中多个 mock 方法返回 `NewBaseResp()`，用于模拟下游服务响应。\n\n这些依赖说明 `biz/idl` 是业务 handler 与对象副本服务之间的边界层：业务层只依赖稳定的请求/响应类型和客户端接口，不直接依赖远端服务实现。\n\n## 维护注意事项\n\n不要手工编辑 `kitex_gen` 下的文件。文件头已经标注：\n\n```go\n// Code generated by thriftgo (0.2.8). DO NOT EDIT.\n// Code generated by Kitex v1.11.0. DO NOT EDIT.\n```\n\n需要变更接口、字段或枚举时，应修改 `biz/idl/object_duplication_manager.thrift` 或对应 base IDL，然后重新生成 Kitex 代码。\n\n演进 IDL 时应遵守 Thrift 兼容性规则：\n\n- 新增字段使用新的字段号，不复用已删除字段号。\n- 废弃字段保留注释，例如已有的 `NameSpace [DEPRECATED]` 字段。\n- 不随意改变已有字段类型、字段号和 required/optional 语义。\n- 响应保持 `BaseResp`，便于业务层统一处理状态码和错误信息。\n- 对 optional map，nil 表示未设置，空 map 表示显式设置为空，两者在写出行为上不同。","thrift-idl-and-generated-clients":"# Thrift IDL and Generated Clients\n\n## 模块概览\n\n该模块组提供 Object Duplication Manager RPC 通信所需的 Thrift 契约、通用基础结构和 Kitex 生成客户端。它不承载业务实现，而是定义业务层、RPC 框架和远端服务之间共享的数据边界。\n\n两个子模块分工明确：\n\n- [biz 基础结构](biz.md)：定义 `TrafficEnv`、`Base`、`BaseResp` 等跨语言通用元信息。\n- [idl 契约与生成客户端](idl.md)：定义对象副本管理服务的 Thrift 契约，并承载 `kitex_gen` 下生成的数据模型、序列化逻辑、服务接口和客户端封装。\n\n## 协作关系\n\n`biz/base.thrift` 是底层公共依赖，提供请求和响应中的通用上下文，例如日志标识、调用方信息、地址、环境标识和扩展字段。`biz/idl/object_duplication_manager.thrift` 通过 `include \"../base.thrift\"` 复用这些结构，并在此基础上定义对象副本管理相关的请求、响应和服务方法。\n\n生成代码后，`kitex_gen/base` 提供 `Base`、`BaseResp`、`TrafficEnv` 的读写与快速序列化能力；`kitex_gen/bytedance/videoarch/object_duplication_manager` 则提供 `Object`、`QueryObjectRequest`、`RecoverObjectResponse`、`ObjectDuplicationManagerProcessor` 等服务数据结构和处理器骨架；`objectduplicationmanager` 客户端包进一步封装 `NewClient`、`MustNewClient` 以及 `QueryObject`、`UpdateObject` 等 RPC 调用入口。\n\n```mermaid\nflowchart TD\n    A[\"通用基础 IDL：base.thrift\"] --> B[\"服务契约 IDL：object_duplication_manager.thrift\"]\n    B --> C[\"生成基础类型：kitex_gen/base\"]\n    B --> D[\"生成服务模型与处理器\"]\n    D --> E[\"生成 Kitex 客户端封装\"]\n    C --> D\n    E --> F[\"业务层发起 RPC 调用\"]\n```\n\n## 关键工作流\n\n请求侧通常由业务代码构造生成类型，例如 `QueryObjectRequest`，并通过 `objectduplicationmanager.MustNewClient` 初始化客户端后调用远端 Object Duplication Manager。请求结构中可携带 `Base`，使日志、调用方、环境和扩展信息随 RPC 一起传递。\n\n服务侧由生成的 `ObjectDuplicationManagerProcessor` 将 RPC 方法分发到对应处理逻辑。处理结果写回时，生成代码会沿着服务响应结构继续序列化 `BaseResp` 等公共字段，因此通用响应信息和业务响应数据保持同一套 Thrift 编码路径。\n\n序列化层由普通 `Read`/`Write` 与快速 `FastRead`/`FastWriteNocopy` 共同支撑。跨模块调用中，服务结构的字段读写会进入 `kitex_gen/base`，例如写入响应公共字段时会调用 `BaseResp` 的字段写入逻辑，读取请求公共字段时也会创建或填充 `Base`。这使业务契约可以专注于对象副本管理语义，而公共元信息由基础 IDL 统一维护。"};

(function() {
  var activePage = 'overview';

  document.addEventListener('DOMContentLoaded', function() {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
    renderMeta();
    renderNav();
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });
    if (location.hash && location.hash.length > 1) {
      activePage = decodeURIComponent(location.hash.slice(1));
    }
    navigateTo(activePage);
  });

  function renderMeta() {
    if (!META) return;
    var el = document.getElementById('meta-info');
    var parts = [];
    if (META.generatedAt) {
      parts.push(new Date(META.generatedAt).toLocaleDateString());
    }
    if (META.model) parts.push(META.model);
    if (META.fromCommit) parts.push(META.fromCommit.slice(0, 8));
    el.textContent = parts.join(' \u00b7 ');
  }

  function renderNav() {
    var container = document.getElementById('nav-tree');
    var html = '<div class="nav-section">';
    html += '<a class="nav-item overview" data-page="overview" href="#overview">Overview</a>';
    html += '</div>';
    if (TREE.length > 0) {
      html += '<div class="nav-group-label">Modules</div>';
      html += buildNavTree(TREE);
    }
    container.innerHTML = html;
    container.addEventListener('click', function(e) {
      var target = e.target;
      while (target && !target.dataset.page) { target = target.parentElement; }
      if (target && target.dataset.page) {
        e.preventDefault();
        navigateTo(target.dataset.page);
      }
    });
  }

  function buildNavTree(nodes) {
    var html = '';
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      html += '<div class="nav-section">';
      html += '<a class="nav-item" data-page="' + escH(node.slug) + '" href="#' + encodeURIComponent(node.slug) + '">' + escH(node.name) + '</a>';
      if (node.children && node.children.length > 0) {
        html += '<div class="nav-children">' + buildNavTree(node.children) + '</div>';
      }
      html += '</div>';
    }
    return html;
  }

  function escH(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function navigateTo(page) {
    activePage = page;
    location.hash = encodeURIComponent(page);

    var items = document.querySelectorAll('.nav-item');
    for (var i = 0; i < items.length; i++) {
      if (items[i].dataset.page === page) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }

    var contentEl = document.getElementById('content');
    var md = PAGES[page];

    if (!md) {
      contentEl.innerHTML = '<div class="empty-state"><h2>Page not found</h2><p>' + escH(page) + '.md does not exist.</p></div>';
      return;
    }

    contentEl.innerHTML = marked.parse(md);

    // Rewrite .md links to hash navigation
    var links = contentEl.querySelectorAll('a[href]');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href');
      if (href && href.endsWith('.md') && href.indexOf('://') === -1) {
        var slug = href.replace(/\.md$/, '');
        links[i].setAttribute('href', '#' + encodeURIComponent(slug));
        (function(s) {
          links[i].addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(s);
          });
        })(slug);
      }
    }

    // Convert mermaid code blocks into mermaid divs
    var mermaidBlocks = contentEl.querySelectorAll('pre code.language-mermaid');
    for (var i = 0; i < mermaidBlocks.length; i++) {
      var pre = mermaidBlocks[i].parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = mermaidBlocks[i].textContent;
      pre.parentNode.replaceChild(div, pre);
    }
    try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}

    window.scrollTo(0, 0);
    document.getElementById('sidebar').classList.remove('open');
  }
})();
