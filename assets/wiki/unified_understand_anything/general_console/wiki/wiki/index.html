var PAGES = {"application-entry-and-routing":"# Application Entry and Routing\n\n## 模块概览\n\nApplication Entry and Routing 模块负责服务启动、基础依赖初始化和 HTTP 路由注册。它由三个入口层文件组成：\n\n- `main.go`：进程入口，按顺序初始化 Hertz、配置、鉴权、数据库、指标、RPC 和业务服务实例。\n- `router_gen.go`：由 `hertztool` 生成的路由注册入口，`register` 只负责转发到 `customizeRegister`。\n- `router.go`：手写扩展路由，集中声明 `general-console/v1`、`bpm`、`script` 和 `mdap/v1` 接口。\n\n本模块不承载具体业务逻辑。所有请求最终都会分发到 `handler.GeneralConsoleServer` 上的方法，例如 `PageGetGeneralAccounts`、`CreateMDAPTenant`、`BPMCreateAccount` 等。\n\n## 启动流程\n\n`main` 是应用唯一进程入口，初始化顺序如下：\n\n```mermaid\nflowchart TD\n    A[\"main\"] --> B[\"byted.Init\"]\n    B --> C[\"byted.Default<br/>创建 Hertz 实例\"]\n    C --> D[\"config.InitConf\"]\n    D --> E[\"middleware.InitJwtValidator\"]\n    E --> F[\"dao.InitDb\"]\n    F --> G[\"util.InitMetrics\"]\n    G --> H[\"rpc.InitRPC\"]\n    H --> I[\"handler.NewGeneralConsoleServer\"]\n    I --> J[\"register\"]\n    J --> K[\"customizeRegister\"]\n    K --> L[\"r.Spin<br/>启动服务\"]\n```\n\n关键顺序有实际依赖关系：\n\n- `config.InitConf(local.ConfDir())` 必须早于 `middleware.InitJwtValidator(config.Conf.JwtRegion)` 和 `rpc.InitRPC(config.Conf)`，因为后两者依赖全局配置 `config.Conf`。\n- `dao.InitDb()` 必须早于 `handler.NewGeneralConsoleServer(dao.Db)`，因为服务实例通过 `dao.Db` 注入数据库连接。\n- `register(r, svr)` 必须在 `r.Spin()` 前完成，否则路由不会在服务启动时生效。\n\nHertz 实例通过以下代码创建：\n\n```go\nr := byted.Default(server.WithMaxRequestBodySize(1024 * 1024 * 1024 * 5))\n```\n\n这表示服务允许最大约 5GiB 的请求体，适合包含上传或批量导入场景的接口，例如 `ScriptUploadFile`、`BatchCreateMDAPSource`、`ImportMDAPSourcesFromHive` 等。\n\n## 配置初始化\n\n`main` 调用：\n\n```go\nconfig.InitConf(local.ConfDir())\n```\n\n配置初始化从本地配置目录开始，并在内部进入 TCC 配置覆盖流程。根据执行流，`InitConf` 会调用 `applyTCCConfig`，再进入以下逻辑：\n\n- `defaultTCCConfigSource`\n- `tccConfigSource`\n- `applyTCCConfigFromSource`\n- `Fetch`\n- `parseTCCConfigOverride`\n- `cloneTQSConfig`\n- `isCompleteTQSConfig`\n\n因此，入口层只暴露一个 `InitConf` 调用，但实际配置来源包含本地配置和 TCC 动态配置。贡献代码时要注意：如果新增启动期依赖配置的组件，应放在 `config.InitConf` 之后，并使用已经完成覆盖后的 `config.Conf`。\n\n## 服务实例\n\n业务服务通过以下代码创建：\n\n```go\nsvr := handler.NewGeneralConsoleServer(dao.Db)\n```\n\n`GeneralConsoleServer` 是路由层绑定 handler 的核心对象。`router.go` 中所有接口都以方法值形式挂载到这个实例上：\n\n```go\ngeneralConsoleV1.GET(\"/list\", svr.PageGetGeneralAccounts)\nmdapV1.POST(\"/spaces/create\", svr.CreateMDAPTenant)\nbpmV1.POST(\"/account/create\", svr.BPMCreateAccount)\n```\n\n这使路由层保持很薄：路由只描述 HTTP 方法、路径、分组和中间件，业务行为由 `biz/handler` 下的具体方法实现。\n\n## 路由注册入口\n\n`router_gen.go` 定义：\n\n```go\nfunc register(r *server.Hertz, svr *handler.GeneralConsoleServer) {\n\t//INSERT POINT: DO NOT CHANGE NEXT LINE!\n\tcustomizeRegister(r, svr)\n}\n```\n\n该文件由 `hertztool` 生成，注释中的插入点用于代码生成工具维护。手写路由应放在 `customizeRegister` 中，而不是直接修改 `register` 的结构。\n\n已有测试 `Test_register_routes_contains_mdap` 会调用 `register` 验证路由注册结果，因此新增或调整路由时应保持 `register -> customizeRegister` 这条调用链稳定。\n\n## 全局响应中间件\n\n`customizeRegister` 首先注册：\n\n```go\nr.Use(middleware.ResponseMiddleware())\n```\n\n`ResponseMiddleware` 是全局响应处理中间件。它在 `general-console/v1`、`mdap/v1` 等路由分组注册之前被挂载，因此这些接口会经过统一响应处理逻辑。\n\n路由层没有直接处理响应包装、错误格式化或通用返回结构，这些横切逻辑应继续放在 middleware 或 handler 内，避免散落在路由声明中。\n\n## General Console 路由\n\n基础控制台接口挂载在：\n\n```go\ngeneralConsoleV1 := r.Group(\"/general-console/v1\")\n```\n\n主要接口如下：\n\n| 方法 | 路径 | Handler |\n|---|---|---|\n| `GET` | `/general-console/v1/list` | `PageGetGeneralAccounts` |\n| `GET` | `/general-console/v1/detail` | `GetAccountDetail` |\n| `GET` | `/general-console/v1/detail/config/:module` | `GetConfigByModule` |\n| `GET` | `/general-console/v1/detail/config/modules` | `GetConfigModuleList` |\n| `GET` | `/general-console/v1/detail/domain` | `GetAllDomain` |\n| `POST` | `/general-console/v1/authorize` | `AuthorizeAccountUser` |\n| `GET` | `/general-console/v1/object` | `GetObject` |\n| `GET` | `/general-console/v1/check/authority` | `CheckUserAuthorized` |\n| `GET` | `/general-console/v1/detail/auth` | `GetProviderAuthInfo` |\n| `GET` | `/general-console/v1/jump/url` | `GetJumpUrl` |\n| `GET` | `/general-console/v1/detail/authed_users` | `GetAuthorizedUsers` |\n\n路径参数使用 Hertz 风格的 `:module`，例如：\n\n```go\ngeneralConsoleV1.GET(\"/detail/config/:module\", svr.GetConfigByModule)\n```\n\n## BPM 路由\n\nBPM 接口是 `/general-console/v1` 下的子分组：\n\n```go\nbpmV1 := generalConsoleV1.Group(\"/bpm\")\n```\n\n完整路径都带有 `/general-console/v1/bpm` 前缀。它们主要处理账号创建、域名创建、存储配置、迁移和策略校验：\n\n| 方法 | 路径 | Handler |\n|---|---|---|\n| `GET` | `/general-console/v1/bpm/check/name` | `BPMCheckAccountName` |\n| `POST` | `/general-console/v1/bpm/account/create` | `BPMCreateAccount` |\n| `POST` | `/general-console/v1/bpm/account/bucket_create_status` | `BPMCheckBucketCreateStatus` |\n| `POST` | `/general-console/v1/bpm/new/domain` | `BPMCreateDomain` |\n| `POST` | `/general-console/v1/bpm/new/storage/config` | `BPMCreateStorageConfig` |\n| `POST` | `/general-console/v1/bpm/account/create_with_buckets` | `BPMCreateAccountBuckets` |\n| `POST` | `/general-console/v1/bpm/account/create_with_buckets_batch` | `BPMCreateAccountBucketsBatch` |\n| `POST` | `/general-console/v1/bpm/account/check_user_tree_policy` | `BPMCheckUserTreePolicy` |\n| `POST` | `/general-console/v1/bpm/account/config/migrate` | `BPMMigrateAccountConfigs` |\n| `POST` | `/general-console/v1/bpm/account/nontt/migrate` | `BPMMigrateNonTTAccount` |\n| `POST` | `/general-console/v1/bpm/account/config/nontt_sync_domain` | `BPMNonTTConfigSyncDomain` |\n\n其中 `BPMCreateAccountBuckets` 和 `BPMCreateAccountBucketsBatch` 的代码注释说明它们用于“创建 account（如果不存在）和一组 bucket”，后者是批量版本。\n\n## Script 路由\n\n脚本类接口同样位于 `/general-console/v1` 下：\n\n```go\nscriptV1 := generalConsoleV1.Group(\"/script\")\n```\n\n当前路由包括：\n\n| 方法 | 路径 | Handler |\n|---|---|---|\n| `POST` | `/general-console/v1/script/account/tree/correct` | `ScriptCreateAccountTree` |\n| `POST` | `/general-console/v1/script/bucket_create_batch` | `ScriptCreateAccountTree` |\n| `PUT` | `/general-console/v1/script/upload_file` | `ScriptUploadFile` |\n\n注意 `/account/tree/correct` 和 `/bucket_create_batch` 当前都绑定到 `ScriptCreateAccountTree`。如果后续要拆分批量 bucket 创建逻辑，应先确认这是否是复用设计，避免直接改动导致兼容性问题。\n\n## MDAP 路由\n\nMDAP 接口不挂在 `/general-console/v1` 下，而是独立分组：\n\n```go\nmdapV1 := r.Group(\"/mdap/v1\")\n```\n\n该分组单独启用鉴权解析中间件：\n\n```go\nmdapV1.Use(middleware.ParseMDAPAuthMiddleware())\n```\n\n这意味着 MDAP 请求除了经过全局 `ResponseMiddleware`，还会额外经过 `ParseMDAPAuthMiddleware`，用于解析 MDAP 相关鉴权上下文。\n\n### Space 接口\n\n| 方法 | 路径 | Handler |\n|---|---|---|\n| `POST` | `/mdap/v1/spaces/create` | `CreateMDAPTenant` |\n| `GET` | `/mdap/v1/spaces/:space_name/detail` | `GetMDAPSpaceDetail` |\n| `GET` | `/mdap/v1/spaces/page` | `PageGetMDAPSpaces` |\n| `GET` | `/mdap/v1/spaces/vod_list` | `ListVODSpaces` |\n| `PUT` | `/mdap/v1/spaces/update` | `UpdateMDAPSpace` |\n| `GET` | `/mdap/v1/spaces/:space_name/auth_check` | `CheckMDAPSpaceAuth` |\n| `POST` | `/mdap/v1/spaces/:space_name/grant_role` | `GrantMDAPSpaceRole` |\n\n`auth_check` 用于针对单个空间做权限检查；`grant_role` 用于空间 owner 或 `mdap.admin` 主动为其他主体绑定角色。\n\n### Asset Group、Source、Task 和 Artifact 接口\n\n| 方法 | 路径 | Handler |\n|---|---|---|\n| `POST` | `/mdap/v1/asset_groups` | `CreateMDAPAssetGroup` |\n| `GET` | `/mdap/v1/asset_groups/:id/detail` | `GetMDAPAssetGroup` |\n| `POST` | `/mdap/v1/asset_groups/list` | `ListMDAPAssetGroups` |\n| `DELETE` | `/mdap/v1/asset_groups/:id` | `DeleteMDAPAssetGroup` |\n| `POST` | `/mdap/v1/sources` | `CreateMDAPSource` |\n| `POST` | `/mdap/v1/sources/batch` | `BatchCreateMDAPSource` |\n| `POST` | `/mdap/v1/sources/import/hive` | `ImportMDAPSourcesFromHive` |\n| `POST` | `/mdap/v1/sources/query` | `QueryMDAPSources` |\n| `POST` | `/mdap/v1/processing_tasks` | `CreateMDAPProcessingTask` |\n| `POST` | `/mdap/v1/artifacts/query` | `QueryArtifacts` |\n\nMDAP 路由中路径参数包括 `:space_name` 和 `:id`，handler 需要从请求上下文中读取这些参数。\n\n## 添加新路由的约定\n\n新增接口时优先修改 `customizeRegister`：\n\n```go\nfunc customizeRegister(r *server.Hertz, svr *handler.GeneralConsoleServer) {\n\tgeneralConsoleV1 := r.Group(\"/general-console/v1\")\n\t{\n\t\tgeneralConsoleV1.GET(\"/new/path\", svr.SomeHandler)\n\t}\n}\n```\n\n贡献时应遵守现有模式：\n\n- 不直接修改 `main` 的启动顺序，除非新增组件确实有初始化依赖。\n- 不把业务逻辑写进 `router.go`，路由层只做分组、中间件和 handler 绑定。\n- 生成文件 `router_gen.go` 保持轻量，避免在 `register` 中加入手写业务路由。\n- 新增 MDAP 接口应放在 `mdapV1` 分组下，默认继承 `ParseMDAPAuthMiddleware`。\n- 新增 General Console、BPM、Script 接口应复用现有 `/general-console/v1` 前缀和对应子分组。\n- 如果路由注册行为影响测试，应同步更新覆盖 `register` 的路由测试。","bpm-and-account-provisioning":"# BPM and Account Provisioning\n\n## 模块概览\n\n该模块负责 BPM 流程驱动的账号开通、存储桶创建、域名配置、账号配置迁移，以及少量脚本化运维入口。核心实现位于 `biz/handler/bpm.go`，辅助脚本入口位于 `biz/handler/script.go`。\n\nBPM 入口统一通过 `middleware.BPMResponse` 包装，脚本入口通过 `middleware.Response` 包装。业务处理函数返回 `errno.Payload`，成功路径使用 `errno.BpmOK`，失败路径按场景返回 `errno.BpmErrorWithCode` 或 `errno.BpmError`。\n\n## 对外入口\n\nBPM 入口方法只做路由语义绑定，实际逻辑在对应的 `handle...` 方法中：\n\n| 入口方法 | BPM 动作名 | 实际处理函数 | 作用 |\n|---|---|---|---|\n| `BPMCheckAccountName` | `account.checkName.bpm` | `handleCheckAccountName` | 检查账号名是否已存在 |\n| `BPMCreateAccount` | `account.create.bpm` | `handleBPMCreateAccount` | 创建通用账号、域名、对象桶配置 |\n| `BPMCreateStorageConfig` | `config.create.bpm` | `handleBPMCreateStorageConfig` | 为账号写入 `storage/object` 配置 |\n| `BPMCreateDomain` | `domain.create.bpm` | `handleBPMCreateDomain` | 单独补建域名及账号关联 |\n| `BPMCheckBucketCreateStatus` | `account.check_bucket_create_status.bpm` | `handleCheckGeneralBucketCreateStatus` | 查询 TOS bucket 创建状态 |\n| `BPMCreateAccountBuckets` | `account.buckets.create.bpm` | `handleBPMCreateAccountBuckets` | 创建账号及多个分类 bucket |\n| `BPMCreateAccountBucketsBatch` | `account.buckets.create_batch.bpm` | `handleBPMCreateAccountBucketsBatch` | 批量账号执行 bucket 创建 |\n| `BPMMigrateAccountConfigs` | `account.config.migrate` | `handleBPMMigrateAccountConfig` | 跨区域复制账号配置 |\n| `BPMNonTTConfigSyncDomain` | `account.config.nontt_sync_domain` | `handleBPMConfigNonTTSyncDomain` | 为 Non-TT 账号配置 `sync_domain` |\n| `BPMMigrateNonTTAccount` | `account.nontt.migrate` | `handleBPMMigrateNonTTAccount` | Non-TT 账号迁移辅助流程 |\n| `BPMCheckUserTreePolicy` | `account.user_tree_policy.bpm` | `handleBPMCheckUserTreePolicy` | 校验用户是否有服务树资源创建权限 |\n\n脚本入口在 `script.go` 中：\n\n| 入口方法 | 动作名 | 实际处理函数 | 作用 |\n|---|---|---|---|\n| `ScriptCreateAccountTree` | `script.tree.create` | `handleScriptCreateAccountTree` | 为已有账号创建 ByteTree 资源并回写账号 |\n| `ScriptBatchCreateBucket` | `script.buckets.create` | 当前绑定到 `handleScriptCreateAccountTree` | 代码中存在绑定异常，实际 bucket 处理函数是 `handleScriptBatchCreateBucket` |\n| `ScriptUploadFile` | `script.file.upload.stream` | `handleScriptUploadFile` | 接收表单文件，落临时文件后通过 uploader 上传 |\n\n## 核心数据结构\n\n`BPMCreateAccountWorkflow` 是通用账号开通主请求，继承 `model.BPMWorkflowBasic`，包含账号名、用户、父账号、服务树节点、描述、域名配置 `DomainCreateConfig` 和 bucket 配置 `BucketCreateConfig`。\n\n`DomainCreateConfig` 控制四类域名创建：\n\n- `CreateCDNDomain`：创建调度域名，默认格式为 `lf-{BizAbbreviated}.{CDNSecondLevelDomain}`，如果 `DirectCDNDomain` 非空则直接使用该值。\n- `CreateInternalDomain`：创建 `account.InternalDomain`。\n- `CreateInternalRDDomain`：创建 `account.InternalRDDomain`。\n- `CreateExternalOriginDomain`：创建 `account.OriginalDomain`。\n\n`BPMCreateAccountBucketsWorkflow` 用于更通用的账号加 bucket 开通。其 `Buckets` 字段是 `[]*BucketCreateInfo`，每个 bucket 指定 `Category`、`Qos`、是否写账号配置、是否低频、分段后缀、数据来源和 VFrame 集群编号。\n\n`BPMCreateAccountBucketsResp` 返回账号名、账号 ID，以及按 bucket 名索引的 `BucketCreateResult`。`BucketCreateResult` 同时记录 bucket 创建状态 `BucketCreateStatus` 和账号存储配置写入状态 `StorageConfigWriteStatus`。\n\n## 账号开通流程\n\n`handleBPMCreateAccount` 是传统通用账号创建流程，面向单账号、单对象桶场景。\n\n```mermaid\nflowchart TD\n    A[\"handleBPMCreateAccount\"] --> B[\"解析 BPMCreateAccountWorkflow\"]\n    B --> C[\"GetAccountByName\"]\n    C --> D{\"账号存在\"}\n    D -->|否| E[\"createByteTreeResource\"]\n    E --> F[\"accountClient.Create\"]\n    F --> G[\"authorizeUser\"]\n    D -->|是| H[\"检查当前区域 storage 配置\"]\n    G --> I[\"createDomain\"]\n    H --> I\n    I --> J[\"rpc.CreateBucket 或跳过\"]\n    J --> K[\"必要时 MCreateConfig 写 object\"]\n```\n\n执行细节：\n\n1. 请求体通过 `json.Unmarshal(c.Request.Body(), createReq)` 解析为 `BPMCreateAccountWorkflow`。\n2. 如果账号已存在，复用 `AccessKey`、`SecretKey` 和 ID，但会检查已有配置中是否存在 `account.ModuleStorage`。存在则认为当前区域已配置，返回 `CodeBadRequest`。\n3. 如果账号不存在，先调用 `createByteTreeResource` 在服务树父节点下创建资源，再调用 `accountClient.Create` 创建账号。\n4. 新账号创建后调用 `authorizeUser` 给 `UserName` 授权 `AdminUser`，授权失败只记录日志，不中断主流程。\n5. 调用 `createDomain` 按 `DomainConf` 创建域名及账号关联。\n6. 默认调用 `rpc.CreateBucket` 创建 `object` 分类 bucket；如果请求头 `x-bpm-bkt_skip` 存在，则走 BPM 测试或跳过 bucket 创建逻辑。\n7. 如果 bucket 不是异步创建，则通过 `accountClient.MCreateConfig` 写入 `account.ModuleStorage` 下的 `object: bucket` 配置。\n\n## 多分类 bucket 创建流程\n\n`handleBPMCreateAccountBuckets` 和 `handleBPMCreateAccountBucketsBatch` 最终都调用 `doCreateBPMAccountBuckets`。该函数是本模块最重要的编排逻辑，覆盖账号复用、bucket 命名、机房和 vRegion 映射、低频存储策略、批量建桶、配置写入和点播空间兼容配置。\n\n关键步骤：\n\n1. 根据 `AccountName` 查询账号。存在则复用 `account.KeyPair`；不存在则用 `accountClient.Create` 创建。\n2. 从 `bucketNamePattern[env.IDC()]` 获取当前 IDC 的 bucket 命名模板，不支持的 IDC 直接返回 `CodeBadRequest`。\n3. 对每个 `BucketCreateInfo`：\n   - 使用 `categoryShortNameMap` 将业务分类映射为短名，例如 `original -> v`、`encoded -> ve`、`object -> o`。\n   - 使用 `getSceneTosVRegion(env.IDC(), shortCategory, bucket.VFrameClusterId)` 查找 TOS vRegion。\n   - 使用 `shortCategoryServiceTreeNodeIdMap` 获取成本归属服务树节点。\n   - 根据 `LowFrequency` 和 `env.Region()` 调整 `StorageClass` 与 vRegion。\n   - 用命名模板生成 `GeneratedBucketName`。\n   - 组装 `model.ScriptCreateBucketReq`，最终形成 `model.BatchCreateBucketReq`。\n4. 调用 `rpc.BatchCreateBucket(ctx, req)` 批量创建 bucket。\n5. 将返回的状态写回 `createResp.Buckets[name].BucketCreateStatus`。\n6. 读取当前账号当前区域已有 storage 配置：`accountClient.GetConfigWithRegion(ctx, accessKey, account.ModuleStorage, account.Region(env.IDC()))`。\n7. 如果 `WriteAccountConfig` 为真且 bucket 创建未失败，则按分类生成 ckey 并调用 `accountClient.MCreateConfig` 写入；已有 key 不覆盖，状态记为 `skip`。\n8. 如果账号类型是 `account.TypeSpace`，并且缺少 `storage/bucket` 配置，会尝试用新建或已有的 `original` bucket 补齐 JSON 格式的 `bucket` 配置，方便控制台展示。\n\n## 分类、命名与区域映射\n\n`Category` 定义了模块支持的 bucket 业务分类，包括 `original`、`encoded`、`object`、`poster`、`image`、`tts`、`dash`、多种 `vframe:*`、`medigest.*`，以及新增的 `medigest.image.zip` 和 `vframe:zip`。\n\n映射链路是：\n\n```text\nCategory -> categoryShortNameMap -> shortCategory -> sceneTosVRegionMap / bucketNamePattern / shortCategoryServiceTreeNodeIdMap\n```\n\n示例：\n\n```go\n// original 分类在命名中使用短名 v\ncategoryShortNameMap[Original] == \"v\"\n\n// 当前 IDC 和短分类组合后查 vRegion\ngetSceneTosVRegion(env.IDC(), \"v\", bucket.VFrameClusterId)\n```\n\n`getSceneTosVRegion` 会优先查 `{idc}_{shortCategory}{vFrameClusterId}`。如果分类是 `tts` 且没有直接命中，会回退到 `original` 的短名 `v` 查找，这也是 `TestBPMCreateAccountBuckets_TTSCategoryMappings` 关注的行为。\n\n`getIdcFromVRegion` 用于从 vRegion 推导建桶请求中的 IDC。它对特殊值做了显式处理：\n\n- `US-East/useastazure/Infreq/Azure` 返回 `env.DC_MALIVA`\n- `ap-southeast-1` 返回 `env.DC_MYA`\n- `.../CN-3DC/...` 返回 `\"cn\"`\n- `.../CN6-3DC/...` 返回 `env.DC_ZB`\n- 其他标准路径返回第二段，例如 `Singapore-Central/sg1/Default/Gcs` 返回 `sg1`\n\n## 域名创建\n\n`createDomain` 根据 `BPMCreateAccountWorkflow.DomainConf` 创建不同类型的 `account.VDomain`，并通过 `createDomainWithRel` 落库或调用账号服务。每个域名都会带一个 `account.DomainAccountRel`，默认关联：\n\n- `AccountName`: 当前账号\n- `Category`: `\"object\"`\n- `Module`: `\"general\"`\n- `DomainType`: 与域名类型一致\n\nCDN 域名使用 `account.ScheduleDomain`；内网域名使用 `account.InternalDomain`；研发内网域名使用 `account.InternalRDDomain`；外部源站域名使用 `account.OriginalDomain`。\n\n`handleBPMCreateDomain` 用于单独补建域名。它会先通过 `accountClient.GetAccountByName` 查询账号，并把账号的 `TopAccountID` 写回请求对象，再调用 `createDomain`。\n\n## 服务树权限与资源创建\n\n`handleBPMCheckUserTreePolicy` 用于 BPM 前置校验。它解析 `BPMCreateAccountWorkflow`，调用 `checkUserByteTreePolicy(ctx, creator, serviceTreeNodeId, \"groot.nodes.create_resource\")`。\n\n`checkUserByteTreePolicy` 使用 `cloudIAMCli.IAM.IAuthCheckerV3.HasPermissionV3Ctx` 检查指定用户在父服务树节点上是否有权限。`parentNode == 0` 会直接返回错误。\n\n`createByteTreeResource` 使用 `byteTreeCli.CreateResource` 创建资源节点，资源信息由账号名派生：\n\n```go\nschema.ResBrief{\n    PSM:      fmt.Sprintf(\"vcloud.general.%s\", accountName),\n    Provider: \"vcloud_general\",\n    Region:   account.GetRegion(env.IDC()),\n    Env:      \"prod\",\n    Rtype:    \"vcloud_general\",\n    RID:      accountName,\n}\n```\n\n脚本函数 `handleScriptCreateAccountTree` 复用 `createByteTreeResource`，为已有账号补建服务树资源，并通过 `accountClient.UpdateAccount` 回写 `ServiceTreeNodeId`。\n\n## 配置迁移与 Non-TT 迁移\n\n`handleBPMMigrateAccountConfig` 解析 `BPMMigrateAccountConfigWorkflow` 后调用 `doMigrateAccountConfig`。`doMigrateAccountConfig` 会查询账号拿到 `AccessKey`，把请求中的字符串模块转换为 `[]account.Module`，然后调用：\n\n```go\naccountClient.MCopyConfig(ctx, &account.CopyConfigParam{\n    AccessKey:     cReq.AccessKey,\n    Modules:       modules,\n    SourceRegion:  cReq.SourceRegion,\n    TargetRegions: cReq.TargetRegions,\n})\n```\n\n`handleBPMMigrateNonTTAccount` 是 Non-TT 迁移编排：\n\n1. 调用 `createNonTTMigrateBuckets` 创建 `original`、`encoded`、`poster`、`image` 四类 bucket，默认 QOS 为 `3000`。\n2. 额外写入 storage 配置：`all`、`encoded.row`、`poster.row`、`original.row`。\n3. 调用 `doMigrateAccountConfig`，把 `upload`、`transcode`、`play`、`picture`、`media`、`storagegw`、`general` 模块从源区域复制到 `mya`。\n\n`handleBPMConfigNonTTSyncDomain` 和 `doConfigNonTTSyncDomain` 用于写入 Non-TT 多区域的 `global/sync_domain` 配置。默认值为：\n\n- `env.DC_MYA`: `2110`\n- `env.DC_SG1`: `2620`\n- `env.DC_MALIVA`: `2618`\n\n请求中的 `MyaSyncDomain`、`SgSyncDomain`、`VaSyncDomain` 大于 0 时会覆盖默认值。\n\n## 脚本上传入口\n\n`handleScriptUploadFile` 处理 multipart 表单字段 `file`：\n\n1. 使用 `os.CreateTemp(os.TempDir(), \"upload-*.tmp\")` 创建临时文件。\n2. 通过 `c.FormFile(\"file\")` 获取上传文件并复制到临时文件。\n3. 读取 query 参数 `space`、`accountId`、`fileExt`。\n4. 调用 `svr.uploadCli.UploadFile(ctx, tmpFile.Name(), consts.OBJECT, space, accountId, uploader.WithFileExt(filepath.Ext(fileExt)))` 上传。\n5. 使用 `defer` 关闭并删除临时文件。\n\n## 与其他模块的连接\n\n该模块主要依赖以下外部能力：\n\n- `accountClient`：账号查询、创建、更新、配置创建、配置复制、按区域读取配置。\n- `rpc.CreateBucket`、`rpc.BatchCreateBucket`、`rpc.CheckBucketCreateStatus`：TOS bucket 创建和状态查询。\n- `byteTreeCli`：创建 ByteTree 资源节点。\n- `cloudIAMCli`：校验服务树权限。\n- `uploadCli`：脚本文件上传。\n- `errno`：统一 BPM 响应结构。\n- `middleware.BPMResponse` / `middleware.Response`：统一 handler 包装、动作名记录和错误转换。\n\n## 实现注意点\n\n`doCreateBPMAccountBuckets` 不覆盖已有 storage ckey。发生 key 冲突时返回状态中追加 `skip{ckey};`，而不是调用 `MUpdateConfig`。\n\n低频 bucket 会改变 `StorageClass` 和 vRegion。CN、MALIVA、ALISG、ChinaEast 有专门分支，新增区域或新增分类时需要同时检查 `sceneTosVRegionMap`、`bucketNamePattern`、`shortCategoryServiceTreeNodeIdMap` 和低频逻辑。\n\n`handleBPMCreateDomain` 当前从 `c.Response.Body()` 解析请求，而其他 BPM handler 都读取 `c.Request.Body()`；维护该入口时需要确认这是否符合调用链预期。\n\n`ScriptBatchCreateBucket` 当前把 `script.buckets.create` 绑定到了 `handleScriptCreateAccountTree`，而不是已经实现的 `handleScriptBatchCreateBucket`；如果脚本批量建桶入口不可用，应优先检查该绑定。","bpm-workflow-models":"# BPM Workflow Models\n\n## 模块概览\n\n`biz/model/bpm_workflow.go` 定义了 BPM 工作流的基础数据模型：`BPMWorkflowBasic`。该模块只包含结构体声明，不包含方法、函数、校验逻辑或业务流程控制。\n\n`BPMWorkflowBasic` 的主要职责是承载工作流基础信息，并通过 `json` tag 约定对外序列化字段名。它适合作为接口响应、接口请求中嵌套对象，或服务层与展示层之间传递 BPM 工作流摘要信息的数据结构。\n\n## 核心类型\n\n### `BPMWorkflowBasic`\n\n```go\ntype BPMWorkflowBasic struct {\n\tCreateAssignee        string `json:\"create_assignee\"`\n\tCreateOperator        string `json:\"create_operator\"`\n\tRejectOperator        string `json:\"reject_operator\"`\n\tID                    int64  `json:\"id\"`\n\tStatusName            string `json:\"status_name\"`\n\tStatus                string `json:\"status\"`\n\tCreator               string `json:\"creator\"`\n\tAssignee              string `json:\"assignee\"`\n\tWorkflowConfigVersion int64  `json:\"workflow_config_version\"`\n\tCreateTime            int64  `json:\"ctime\"`\n\tUpdateTime            int64  `json:\"utime\"`\n\tVersion               int64  `json:\"version\"`\n\tBranch                string `json:\"branch\"`\n\tFinished              int64  `json:\"finished\"`\n\tIsPlatform            int64  `json:\"is_platform\"`\n\tCurrentAssignees      string `json:\"current_assignees\"`\n}\n```\n\n该结构体是一个纯数据模型，字段全部导出，便于 Go 代码直接读写，也便于 `encoding/json` 按照 tag 进行序列化和反序列化。\n\n## 字段说明\n\n| Go 字段 | JSON 字段 | 类型 | 含义 |\n|---|---|---:|---|\n| `ID` | `id` | `int64` | 工作流实例或记录的唯一标识。 |\n| `Status` | `status` | `string` | 工作流状态编码。 |\n| `StatusName` | `status_name` | `string` | 工作流状态的展示名称。 |\n| `Creator` | `creator` | `string` | 工作流创建人。 |\n| `Assignee` | `assignee` | `string` | 当前或默认处理人。 |\n| `CurrentAssignees` | `current_assignees` | `string` | 当前处理人集合的字符串表示。具体格式由上下游约定。 |\n| `CreateAssignee` | `create_assignee` | `string` | 创建阶段的处理人。 |\n| `CreateOperator` | `create_operator` | `string` | 创建操作人。 |\n| `RejectOperator` | `reject_operator` | `string` | 驳回操作人。 |\n| `WorkflowConfigVersion` | `workflow_config_version` | `int64` | 工作流配置版本。 |\n| `Version` | `version` | `int64` | 工作流记录自身版本。 |\n| `CreateTime` | `ctime` | `int64` | 创建时间戳。单位未在模型中声明，应以上游数据约定为准。 |\n| `UpdateTime` | `utime` | `int64` | 更新时间戳。单位未在模型中声明，应以上游数据约定为准。 |\n| `Branch` | `branch` | `string` | 工作流关联分支。 |\n| `Finished` | `finished` | `int64` | 是否完成的数值标记。具体枚举含义由业务层约定。 |\n| `IsPlatform` | `is_platform` | `int64` | 是否平台相关工作流的数值标记。具体枚举含义由业务层约定。 |\n\n## 设计特点\n\n`BPMWorkflowBasic` 不封装行为，只表达数据形状。模块中没有内部调用、外部调用或执行流，因此它不会直接驱动 BPM 流程，也不会执行状态迁移、权限判断、时间转换或字段校验。\n\n这种设计意味着：\n\n- 字段合法性需要由创建该结构体的上游逻辑保证。\n- `Status`、`Finished`、`IsPlatform` 等字段的枚举含义不在该模型内定义。\n- `CreateTime` 和 `UpdateTime` 只是 `int64`，模型本身不区分秒、毫秒或其他时间单位。\n- `CurrentAssignees` 是字符串而不是切片，调用方需要知道其具体编码格式。\n\n## JSON 使用方式\n\n该模型通过 struct tag 固定 JSON 字段名。例如 `CreateTime` 会序列化为 `ctime`，`WorkflowConfigVersion` 会序列化为 `workflow_config_version`。\n\n```go\nworkflow := model.BPMWorkflowBasic{\n\tID:                    123,\n\tStatus:                \"running\",\n\tStatusName:            \"进行中\",\n\tCreator:               \"alice\",\n\tAssignee:              \"bob\",\n\tWorkflowConfigVersion: 2,\n\tCreateTime:            1710000000,\n\tUpdateTime:            1710000300,\n\tVersion:               1,\n\tBranch:                \"main\",\n\tFinished:              0,\n\tIsPlatform:            1,\n\tCurrentAssignees:      \"bob\",\n}\n```\n\n序列化后的字段会遵循模型中的 `json` tag，而不是 Go 字段名：\n\n```json\n{\n  \"id\": 123,\n  \"status\": \"running\",\n  \"status_name\": \"进行中\",\n  \"creator\": \"alice\",\n  \"assignee\": \"bob\",\n  \"workflow_config_version\": 2,\n  \"ctime\": 1710000000,\n  \"utime\": 1710000300,\n  \"version\": 1,\n  \"branch\": \"main\",\n  \"finished\": 0,\n  \"is_platform\": 1,\n  \"current_assignees\": \"bob\"\n}\n```\n\n## 与代码库的连接方式\n\n当前模块没有函数，因此调用图中不会出现内部调用、外部调用或执行流。它与代码库其他部分的连接通常发生在类型层面：其他包可以引用 `model.BPMWorkflowBasic` 来声明接口返回值、组装响应数据、接收反序列化结果，或在业务逻辑之间传递工作流基础信息。\n\n维护该模型时需要注意 JSON 字段名的兼容性。修改字段名、类型或 tag 都可能影响依赖该结构体的接口契约；新增字段通常风险较低，但仍需要确认前后端、存储映射或 RPC/HTTP 协议是否接受该变化。","bucket-and-tos-operations":"# Bucket and TOS Operations\n\n## 模块概览\n\nBucket and TOS Operations 负责创建、查询和登记 TOS bucket，并在特定场景下同步更新 bktmeta 的 bucket 网关配置。模块主要分布在：\n\n- `biz/model/bktmeta.go`：BPM、脚本批量建桶和 bktmeta 批量响应模型。\n- `biz/model/tos.go`：TOS 建桶接口返回模型与状态判断方法。\n- `biz/rpc/bktmeta.go`：bktmeta BPM 建桶、状态查询、批量建桶入口与网关配置更新。\n- `biz/rpc/nontt_tos.go`：NonTT IDC 的 TOS 建桶、bktmeta 登记和通用 Hertz HTTP 调用封装。\n\n该模块被 `biz/handler/bpm.go` 和 `biz/handler/script.go` 调用：BPM 流程通过 `CreateBucket`、`CheckBucketCreateStatus` 和 `BatchCreateBucket` 触发建桶；脚本接口通过 `BatchCreateBucket` 执行批量建桶。\n\n## 核心执行路径\n\n`BatchCreateBucket` 是脚本和 BPM 批量建桶的统一入口。它根据请求中第一个 bucket 的 `IDC` 选择不同后端路径：\n\n```mermaid\nflowchart TD\n    A[调用方: handler] --> B[BatchCreateBucket]\n    B --> C{IDC 是 mya/myb?}\n    C -->|是| D[BatchCreateBucketNonTT]\n    C -->|否| E[batchCreateBucketInnerTos]\n    D --> F[CreateTosBucketNonTT]\n    D --> G[BktmetaCli.CreateBucket]\n    E --> H[HertzDo]\n    B --> I[updateGatewayConfForPackedBuckets]\n```\n\n注意：路由判断只读取 `batchReq[0].IDC`。因此一次批量请求应避免混合 TT 与 NonTT IDC，否则整批都会走同一条建桶路径。\n\n## 数据模型\n\n### BPM 建桶模型\n\n`BPMCreateTOSBucketsRequest` 用于 BPM 创建 TOS bucket：\n\n```go\ntype BPMCreateTOSBucketsRequest struct {\n    BPMWorkflowBasic\n    AccountName string\n    AccountId   int64\n    Categories  []string\n    Description string\n    Qos         *Qos\n}\n```\n\n对应 RPC 方法是 `CreateBucket(ctx, bpm)`，它请求 bktmeta API：\n\n```text\nPOST /gateway/v1/bpm/buckets/tos/create\n```\n\n返回值使用 `CreateTosBucketBPMResp`：\n\n```go\ntype CreateTosBucketBPMResp struct {\n    BucketsCategories map[string]string // bucket -> category\n    AsyncCreate       bool\n}\n```\n\n`AsyncCreate` 表示是否异步创建；调用方如果需要跟踪进度，会继续调用 `CheckBucketCreateStatus`。\n\n### 批量脚本建桶模型\n\n`ScriptCreateBucketReq` 是批量建桶的单个 bucket 请求：\n\n```go\ntype ScriptCreateBucketReq struct {\n    BucketName   string\n    AccessKey    string\n    SecretKey    string\n    IDC          string\n    Owner        string\n    ServiceNode  int\n    VRegion      string\n    TosCreate    bool\n    StorageClass meta.BucketStorageClass\n    Category     string\n    Public       string\n    Qos          Qos\n}\n```\n\n批量请求和响应分别是：\n\n```go\ntype BatchCreateBucketReq []ScriptCreateBucketReq\ntype BatchCreateBucketResp map[BucketCreateStatus][]string\n```\n\n`BucketCreateStatus` 的合法状态包括：\n\n- `BatchCreateSuccess`：创建成功。\n- `BatchCreateFailed`：创建失败。\n- `BatchCreateSkip`：bucket 已存在，跳过创建。\n- `BatchCreateWaitApprove`：等待审批，当前代码中仅定义状态，未在本模块内写入。\n\n### TOS 返回模型\n\n`CreateBucketResult` 封装 TOS 建桶接口返回：\n\n```go\nfunc (r *CreateBucketResult) IsOK() bool\nfunc (r *CreateBucketResult) IsDuplicateError() bool\nfunc (r *CreateBucketResult) GetError() error\n```\n\n`CreateTosBucketNonTT` 依赖这些方法判断结果：\n\n- `IsOK()`：`Status == 0`，表示创建成功。\n- `IsDuplicateError()`：错误信息包含 `\"duplicate\"`，按可复用结果处理。\n- 其他情况返回 `GetError()`。\n\n`BucketInfo.IsAsync()` 用于判断 `SysTicketID` 是否表示异步工单：`SysTicketID != 0 && SysTicketID != -1`。\n\n## bktmeta BPM 操作\n\n### `CreateBucket`\n\n`CreateBucket(ctx, bpm)` 将 `BPMCreateTOSBucketsRequest` 序列化后发送到 bktmeta BPM 创建接口。响应先解到 `errno.DevSREPayload`，当 `Code == 0` 时再把 `Response` 反序列化为 `CreateTosBucketBPMResp`。\n\n错误处理分为三类：\n\n- HTTP 调用失败：返回 `\"create tos bucket error\"`。\n- 响应 JSON 解析失败：返回 `\"create tos bucket resp unmarshall failed\"`。\n- 业务 `Code != 0`：返回远端 `Message`。\n\n### `CheckBucketCreateStatus`\n\n`CheckBucketCreateStatus(ctx, buckets)` 查询 BPM 异步建桶状态，请求体格式为：\n\n```json\n{\n  \"buckets\": [\"bucket-a\", \"bucket-b\"]\n}\n```\n\n返回 `CheckBucketCreateStatusResp`：\n\n```go\ntype CheckBucketCreateStatusResp struct {\n    WholeStatus  int8\n    BucketStatus map[string]int8\n}\n```\n\n`WholeStatus` 表示整体状态，`BucketStatus` 表示单个 bucket 状态。状态值含义由 bktmeta API 约定，本模块只透传。\n\n## 批量建桶路径\n\n### TT / 内部 TOS：`batchCreateBucketInnerTos`\n\n非 `mya`、`myb` 的 IDC 会走 `batchCreateBucketInnerTos(ctx, batchReq)`。该函数调用：\n\n```text\nPOST http://toutiao.videoarch.bktmetaapi/gateway/v1/buckets/batch\n```\n\n请求使用 Hertz `protocol.Request`，开启服务发现：\n\n```go\nreq.SetOptions(\n    discovery.WithSD(true),\n    discovery.WithDestinationCluster(\"default\"),\n    hconfig.WithRequestTimeout(getBktmetaTimeout()),\n)\n```\n\n超时时间由 `getBktmetaTimeout()` 决定：\n\n- 未设置 `BKTMETA_TIMEOUT`：默认 `30s`。\n- 设置为 Go duration，例如 `45s`、`1m`：直接使用。\n- 设置为正整数，例如 `60`：按秒处理。\n- 非法或非正值：记录 warn 日志并回退默认值。\n\n### NonTT TOS：`BatchCreateBucketNonTT`\n\n`IDC == \"mya\"` 或 `IDC == \"myb\"` 时走 NonTT 路径。每个 bucket 按顺序处理：\n\n1. 通过 `BktmetaCli.GetBucket(ctx, req.BucketName)` 检查是否已存在。\n2. 已存在则写入 `BatchCreateSkip`。\n3. 不存在则构造 `rpc.CreateBucketParam` 并调用 `CreateTosBucketNonTT`。\n4. TOS 创建成功后，构造 `meta.Bucket` 和 `meta.S3Bucket`。\n5. 调用 `BktmetaCli.CreateBucket(ctx, bktmetaBucket)` 在 bktmeta 登记。\n6. 登记成功写入 `BatchCreateSuccess`，失败写入 `BatchCreateFailed`。\n\nNonTT 请求中的 QoS 映射关系是：\n\n```go\nReadQPS   = req.Qos.GetQps\nWriteQPS  = req.Qos.PutQps\nReadRate  = req.Qos.GetRate\nWriteRate = req.Qos.PutRate\n```\n\nbktmeta 登记时会使用 S3 后端：\n\n```go\nbktmetaBucket.BackendType = meta.BackendS3\ns3Bucket.Region = tosConfig.S3Region\ns3Bucket.Endpoint = tosConfig.S3Endpoint\n```\n\n## NonTT TOS 创建\n\n`CreateTosBucketNonTT(ctx, param)` 负责调用 NonTT TOS 建桶接口：\n\n```text\nPOST {tosConfig.Addr}/public/v3/bucketbu\n```\n\n它会先通过全局 `jwtGenerator` 和环境变量 `TOS_TOKEN` 生成 JWT，并设置请求头：\n\n```go\nreq.Header.Add(\"x-jwt-token\", jwtToken)\nreq.Header.Add(\"Content-Type\", \"application/json\")\n```\n\n服务发现行为由配置控制：\n\n```go\ndiscovery.WithSD(!tosConfig.UseDomain)\ndiscovery.WithDestinationCluster(tosConfig.Cluster)\n```\n\n当远端返回成功或 duplicate 错误时，函数都会返回 `result.Data`，并补齐：\n\n```go\nresult.Data.Name = param.Name\n```\n\n这使 duplicate 场景可以继续走后续 bktmeta 登记逻辑。\n\n## 网关配置更新\n\n`BatchCreateBucket` 在建桶路径完成后会调用：\n\n```go\nupdateGatewayConfForPackedBuckets(ctx, batchReq, resp, updateBucketGatewayConf)\n```\n\n该逻辑只对特定 `Category` 生效：\n\n```go\nfunc shouldUpdateGatewayConf(category string) bool {\n    return category == \"medigest.image.zip\" || category == \"vframe:zip\"\n}\n```\n\n同时，bucket 必须在响应中处于 `BatchCreateSuccess` 或 `BatchCreateSkip`。满足条件后，`updateBucketGatewayConf` 会读取 bktmeta bucket，设置 `GatewayConf`：\n\n```go\nmeta.GatewayConfig{\n    Pack: meta.GatewayPackConfig{\n        Enable:           true,\n        Delimiter:        \"$TOS$\",\n        AllowedMethods:   []string{\"PUT\", \"GET\", \"HEAD\"},\n        WriteContentType: \"tos/zip\",\n    },\n}\n```\n\n如果网关配置更新失败，`updateGatewayConfForPackedBuckets` 会记录错误，并调用 `moveBucketStatus` 把该 bucket 从 `BatchCreateSuccess` 移到 `BatchCreateFailed`。如果 bucket 原本是 `BatchCreateSkip`，当前实现不会把它从 `skip` 移到 `failed`，因为 `moveBucketStatus` 的来源状态固定传入 `BatchCreateSuccess`。\n\n每个 bucket 更新后会 `time.Sleep(time.Second)`，避免连续更新过快。\n\n## 初始化与全局依赖\n\n`InitRPC(conf)` 在程序启动时由 `main` 调用，初始化本模块依赖的全局客户端和配置：\n\n- `jwtGenerator`：基于 `conf.TOS.IamAddress` 创建。\n- `hertzCli`：通用 Hertz HTTP 客户端。\n- `tosToken`：从环境变量 `TOS_TOKEN` 读取。\n- `tosConfig`：保存 `conf.TOS`。\n- `BktmetaCli`：通过 `bktmeta.NewClient(bktmeta.WithCallingPSM(conf.Meta.PSM))` 创建。\n\n`BatchCreateBucketNonTT`、`CreateTosBucketNonTT`、`updateBucketGatewayConf` 都依赖这些全局变量，因此测试或本地调试前需要确保 `InitRPC` 已执行，或在测试中替换相关依赖。\n\n## HTTP 调用封装\n\n`HertzDo(ctx, req, v)` 是本模块内 Hertz 请求的通用执行函数，被 `CreateTosBucketNonTT` 和 `batchCreateBucketInnerTos` 复用。\n\n它会：\n\n1. 设置 `X-TT-LOGID`：\n   ```go\n   req.SetHeader(\"X-TT-LOGID\", ctxvalues.LogIDDefault(ctx))\n   ```\n2. 调用全局 `hertzCli.Do(ctx, req, rsp)`。\n3. 非 `http.StatusOK` 时返回响应 body 作为错误。\n4. 使用 `sonic.Unmarshal(rsp.Body(), v)` 解析响应。\n\n因此调用方传入的 `v` 必须是可被 JSON 反序列化的指针类型，例如 `*model.CreateBucketResult` 或 `*errno.JanusPayload`。\n\n## 与调用方的连接\n\n主要入口关系如下：\n\n- `handleBPMCreateAccount` 调用 `CreateBucket`，并使用 `BPMCreateTOSBucketsRequest`、`Qos`、`CreateTosBucketBPMResp`。\n- `handleCheckGeneralBucketCreateStatus` 调用 `CheckBucketCreateStatus`。\n- `handleScriptBatchCreateBucket` 调用 `BatchCreateBucket`。\n- `doCreateBPMAccountBuckets` 调用 `BatchCreateBucket`，并构造 `ScriptCreateBucketReq`。\n- `createNonTTMigrateBuckets` 使用 `Qos` 构造迁移建桶请求。\n\n贡献代码时应优先保持这些入口的语义稳定：`BatchCreateBucketResp` 的状态分组是 handler 向上游返回结果的核心结构，新增状态或改变状态迁移逻辑会直接影响调用方展示和重试判断。","database-access":"# Database Access\n\n## 模块职责\n\n`biz/dal` 提供数据库访问层，当前代码主要覆盖账号授权关系和管理员用户两类数据的读写。模块将业务侧对数据库的直接操作收敛到 `dao.DbHandler` 方法中，并通过 `dto` 结构体定义表字段映射。\n\n核心约定：\n\n- 写操作使用 `DbHandler.w`，并显式开启事务。\n- 读操作使用 `DbHandler.r`。\n- 所有 DAO 方法都包在 `retry.Do(...)` 中。\n- 所有 DAO 方法都会上报吞吐和延迟指标。\n- 写事务失败时统一通过 `RollbackTX` 回滚并合并错误。\n\n## 初始化流程\n\n数据库入口在 `biz/dal/dao/db.go`。\n\n```go\nvar Db *DbHandler\n\ntype DbHandler struct {\n\tr            *gorm.DB\n\tw            *gorm.DB\n\tretryTimes   int\n\tretryTimeout time.Duration\n}\n```\n\n`InitDb()` 会完成全局数据库句柄初始化：\n\n1. 调用 `mysql.OpenInterpolation(OpenMysqlPSM)` 开启 MySQL 参数插值。\n2. 通过 `config.Conf.WriteDB.NewDB()` 创建写库连接。\n3. 通过 `config.Conf.ReadDB.NewDB()` 创建读库连接。\n4. 将读写连接和重试配置注入全局变量 `dao.Db`。\n\n```go\nfunc InitDb() {\n\tmysql.OpenInterpolation(OpenMysqlPSM)\n\n\twriteDB, err := config.Conf.WriteDB.NewDB()\n\tif err != nil {\n\t\tlogs.Error(\"new write db error %v\", err)\n\t\tpanic(err)\n\t}\n\n\treadDB, err := config.Conf.ReadDB.NewDB()\n\tif err != nil {\n\t\tlogs.Error(\"new read db error %v\", err)\n\t\tpanic(err)\n\t}\n\n\tDb = &DbHandler{\n\t\tr:            readDB,\n\t\tw:            writeDB,\n\t\tretryTimes:   config.Conf.RetryTimes,\n\t\tretryTimeout: 5 * time.Second,\n\t}\n}\n```\n\n`InitDb()` 会被 `main` 和多个测试入口调用，因此新增 DAO 能力时通常应挂载到 `DbHandler` 上，而不是绕过全局初始化流程单独创建连接。\n\n```mermaid\nflowchart TD\n    A[程序入口 main] --> B[InitDb]\n    B --> C[创建写库连接]\n    B --> D[创建读库连接]\n    C --> E[DbHandler.w]\n    D --> F[DbHandler.r]\n    E --> G[全局 dao.Db]\n    F --> G\n```\n\n## 数据模型\n\n授权相关 DTO 定义在 `biz/dal/dto/authority.go`。\n\n### `AuthorizeInfo`\n\n`AuthorizeInfo` 对应授权关系表 `v_general_user_rel`，用于描述某个用户被授权访问某个账号。\n\n```go\ntype AuthorizeInfo struct {\n\tId                  uint64    `gorm:\"id\" json:\"id\"`\n\tAccountId           int64     `gorm:\"column:account_id\" json:\"account_id\"`\n\tAccountName         string    `gorm:\"column:account_name\" json:\"account_name\"`\n\tToAuthorizeUserName string    `gorm:\"column:user_name\" json:\"user_name\"`\n\tOperator            string    `gorm:\"column:operator\" json:\"authorize_user\"`\n\tCreatedAt           time.Time `gorm:\"column:created_at\" json:\"created_at\"`\n}\n```\n\n字段映射重点：\n\n- `AccountId` 映射 `account_id`\n- `AccountName` 映射 `account_name`\n- `ToAuthorizeUserName` 映射 `user_name`\n- `Operator` 映射 `operator`\n- `CreatedAt` 映射 `created_at`\n\n### `AdminUserInfo`\n\n`AdminUserInfo` 对应管理员表 `v_general_admin`。\n\n```go\ntype AdminUserInfo struct {\n\tId        uint64    `gorm:\"column:id\" json:\"id\"`\n\tUserName  string    `gorm:\"column:user_name\" json:\"user_name\"`\n\tOperator  string    `gorm:\"column:operator\" json:\"operator\"`\n\tCreatedAt time.Time `gorm:\"column:created_at\" json:\"created_at\"`\n}\n```\n\n## 表名常量\n\n授权 DAO 使用两个表名常量：\n\n```go\nconst (\n\tTableAccountUser  = \"v_general_user_rel\"\n\tTableAccountAdmin = \"v_general_admin\"\n)\n```\n\n所有查询都通过 `db.r.Table(...)` 或 `db.w.Table(...)` 显式指定表名，因此 DTO 本身没有依赖 GORM 的 `TableName()` 方法。\n\n## 通用执行模式\n\n`biz/dal/dao/authority.go` 中的每个 DAO 方法都遵循同一套执行模式：\n\n```go\nretryInfo := \"CreateAuthorizeInfo\"\n\nutil.EmitThroughput(util.CommandThroughput, metrics.T{\n\tName:  util.TagCommand,\n\tValue: retryInfo,\n})\n\ndefer util.EmitLatency(util.CommandLatency, time.Now(), metrics.T{\n\tName:  util.TagCommand,\n\tValue: retryInfo,\n})\n\nreturn retry.Do(retryInfo, db.retryTimes, db.retryTimeout, func() error {\n\t// 实际数据库操作\n})\n```\n\n这个模式提供三类能力：\n\n- 指标：`EmitThroughput` 记录命令调用次数，`EmitLatency` 记录命令耗时。\n- 重试：`retry.Do` 按 `DbHandler.retryTimes` 和 `DbHandler.retryTimeout` 包裹数据库操作。\n- 命令标识：`retryInfo` 同时作为重试名称和指标标签值，便于按 DAO 方法观测。\n\n新增 DAO 方法时应保持同样结构，避免监控口径不一致。\n\n## 授权关系 DAO\n\n授权关系方法操作 `v_general_user_rel` 表。\n\n### `CreateAuthorizeInfo`\n\n```go\nfunc (db *DbHandler) CreateAuthorizeInfo(ctx context.Context, info *dto.AuthorizeInfo) error\n```\n\n创建一条授权关系。方法使用写库事务：\n\n1. `db.w.Begin().Context(ctx)` 开启事务并绑定请求上下文。\n2. `tx.Table(TableAccountUser)` 指定 `v_general_user_rel`。\n3. `Create(info)` 插入授权记录。\n4. 插入失败时调用 `RollbackTX(tx, res.Error)`。\n5. 成功后提交事务。\n\n调用方需要传入完整的 `dto.AuthorizeInfo`，包括 `AccountId`、`AccountName`、`ToAuthorizeUserName` 和 `Operator` 等业务字段。\n\n### `CheckAuthorizeInfo`\n\n```go\nfunc (db *DbHandler) CheckAuthorizeInfo(ctx context.Context, accountId int64, userName string) error\n```\n\n检查某个用户是否拥有某个账号的授权。方法只返回 `error`，不返回记录本身。\n\n查询条件：\n\n```sql\naccount_id = ? AND user_name = ?\n```\n\n实现上使用：\n\n```go\nconn.Where(\" account_id = ? AND user_name = ? \", accountId, userName).First(info)\n```\n\n如果记录不存在，`First` 返回的错误会直接传给调用方。业务层可以根据错误类型判断是无授权、数据库错误还是其他异常。\n\n### `DeleteAuthorizeInfo`\n\n```go\nfunc (db *DbHandler) DeleteAuthorizeInfo(ctx context.Context, accountId int64, userName string) error\n```\n\n删除某个账号和用户之间的授权关系。删除前会先查询记录：\n\n1. 在写库事务中查询 `account_id` 与 `user_name` 匹配的记录。\n2. 如果查询失败，回滚并返回错误。\n3. 使用相同条件执行 `Delete(dto.AuthorizeInfo{})`。\n4. 删除失败时回滚。\n5. 成功后提交事务。\n\n这个方法的语义是“存在才删除”。如果记录不存在，前置 `First` 会返回错误，删除不会继续执行。\n\n### `GetAuthorizedAccountIdsOfUser`\n\n```go\nfunc (db *DbHandler) GetAuthorizedAccountIdsOfUser(ctx context.Context, userName string) (ids []int64, err error)\n```\n\n查询某个用户被授权的所有账号 ID。\n\n查询条件：\n\n```sql\nuser_name = ?\n```\n\n返回值来自：\n\n```go\nPluck(\"account_id\", &ids)\n```\n\n该方法只读取 `account_id` 列，不加载完整 `AuthorizeInfo`，适合权限判断、账号列表过滤等场景。\n\n### `GetAuthorizedUsersOfAccountName`\n\n```go\nfunc (db *DbHandler) GetAuthorizedUsersOfAccountName(ctx context.Context, accountName string) (users []string, err error)\n```\n\n查询某个账号名称下被授权的所有用户名。\n\n查询条件：\n\n```sql\naccount_name = ?\n```\n\n返回值来自：\n\n```go\nPluck(\"user_name\", &users)\n```\n\n该方法按 `account_name` 查询，而不是 `account_id`。调用方需要确保传入的是账号名称。\n\n## 管理员 DAO\n\n管理员方法操作 `v_general_admin` 表。\n\n### `CreateAdminUserInfo`\n\n```go\nfunc (db *DbHandler) CreateAdminUserInfo(ctx context.Context, userName string, operator string) error\n```\n\n创建管理员用户记录。方法内部构造 `dto.AdminUserInfo`：\n\n```go\nadminUser := dto.AdminUserInfo{\n\tUserName: userName,\n\tOperator: operator,\n}\n```\n\n然后在写库事务中插入到 `v_general_admin`。`CreatedAt` 没有在代码中显式赋值，通常依赖数据库默认值或 GORM 行为。\n\n### `CheckAdminUserInfo`\n\n```go\nfunc (db *DbHandler) CheckAdminUserInfo(ctx context.Context, userName string) error\n```\n\n检查用户是否是管理员。查询条件：\n\n```sql\nuser_name = ?\n```\n\n方法只返回 `error`。如果没有匹配记录，`First(adminUser).Error` 会返回错误，由调用方决定如何解释。\n\n### `DeleteAdminUserInfo`\n\n```go\nfunc (db *DbHandler) DeleteAdminUserInfo(ctx context.Context, userName string) error\n```\n\n删除管理员记录。流程与授权删除类似：\n\n1. 在写库事务中按 `user_name` 查询管理员记录。\n2. 查询失败则回滚。\n3. 调用 `txAdmin.Delete(adminUser)` 删除查询到的实体。\n4. 删除失败则回滚。\n5. 成功后提交事务。\n\n## 事务回滚与错误合并\n\n`RollbackTX` 定义在 `biz/dal/dao/utils.go`，用于统一处理事务回滚。\n\n```go\nfunc RollbackTX(tx *gorm.DB, err error) error {\n\ttx.Rollback()\n\n\tif tx.Error == nil {\n\t\treturn err\n\t} else if err == nil {\n\t\treturn tx.Error\n\t} else if errs, ok := err.(gorm.Errors); ok {\n\t\treturn errs.Add(tx.Error)\n\t} else {\n\t\treturn gorm.Errors([]error{err, tx.Error})\n\t}\n}\n```\n\n它处理三种情况：\n\n- 原始错误存在、回滚无错误：返回原始错误。\n- 原始错误为空、回滚失败：返回事务错误。\n- 原始错误和事务错误都存在：合并为 `gorm.Errors`。\n\n写 DAO 中只要事务内任意步骤失败，都应使用 `RollbackTX(tx, err)` 返回，避免丢失回滚错误。\n\n## 与业务层的连接\n\n数据库访问模块主要被业务处理层和测试代码使用：\n\n- `main` 调用 `InitDb()` 初始化全局数据库连接。\n- handler 侧会构造 `dto.AuthorizeInfo`，再调用授权 DAO 写入授权关系。\n- 权限判断逻辑可以通过 `CheckAuthorizeInfo`、`CheckAdminUserInfo` 判断用户权限。\n- 列表类逻辑可以通过 `GetAuthorizedAccountIdsOfUser` 或 `GetAuthorizedUsersOfAccountName` 获取过滤条件。\n- 单元测试通过 `TestMain` 初始化数据库，并覆盖 `RollbackTX`、授权 DAO 和管理员 DAO。\n\n典型调用形态如下：\n\n```go\ninfo := &dto.AuthorizeInfo{\n\tAccountId:           accountId,\n\tAccountName:         accountName,\n\tToAuthorizeUserName: userName,\n\tOperator:            operator,\n}\n\nerr := dao.Db.CreateAuthorizeInfo(ctx, info)\n```\n\n## 扩展建议\n\n新增数据库访问方法时，建议遵循当前模块的既有约定：\n\n- 将方法定义为 `func (db *DbHandler) ...`，复用 `dao.Db` 的初始化结果。\n- 读操作使用 `db.r.Table(...).Context(ctx)`。\n- 写操作使用 `db.w.Begin().Context(ctx)`，并在失败时调用 `RollbackTX`。\n- 使用表名常量，不在多个方法中重复写裸字符串。\n- 使用 `retry.Do` 包裹实际数据库操作。\n- 使用 `EmitThroughput` 和 `EmitLatency` 上报统一指标。\n- 返回明确的 `error`，不要在 DAO 层吞掉 `First`、`Create`、`Delete` 等 GORM 错误。","error-and-response-contracts":"# Error and Response Contracts\n\n## 模块职责\n\n`biz/errno` 定义项目内统一的业务错误码和响应包裹结构。它不负责写 HTTP 状态码，也不调用外部依赖；它只提供：\n\n- 业务码常量，例如 `CodeOKZero`、`CodeBadRequest`、`CodeForbidden`、`CodeInternalErr`\n- 多套响应结构，例如 `DevSREPayload`、`MDAPPayload`、`BPMPayload`\n- 构造成功或失败响应的便捷函数，例如 `DevSreOK`、`MDAPErrorWithCode`、`BpmError`\n- 供调用方统一读取响应结果的 `Payload` 接口\n\n该模块主要被 handler 和 middleware 使用。handler 负责业务逻辑并返回 payload；middleware 负责把 payload 序列化、补充 `TraceId` 或转换成 HTTP 响应。\n\n## 错误码\n\n错误码定义在 `biz/errno/error.go`。\n\n| 常量 | 值 | 语义 |\n|---|---:|---|\n| `CodeOKZero` | `0` | 成功。当前响应构造函数普遍使用这个成功码 |\n| `CodeWarn` | `2` | 警告类结果 |\n| `CodeOK` | `2000` | 成功类业务码 |\n| `CodeCreated` | `2001` | 创建成功 |\n| `CodePartialContent` | `2006` | 部分内容 |\n| `CodeBadRequest` | `4000` | 请求参数或格式错误 |\n| `CodeUnauthorized` | `4001` | 未认证 |\n| `CodeForbidden` | `4003` | 无权限 |\n| `CodeNotFound` | `4004` | 资源不存在 |\n| `CodeTooManyRequests` | `4029` | 请求过多 |\n| `CodeInternalErr` | `5000` | 内部错误 |\n| `CodeServiceUnavailable` | `5003` | 服务不可用 |\n| `CodeVsreErr` | `5004` | VSRE 相关错误 |\n| `CodeGetDataErr` | `5012` | 获取数据失败 |\n| `CodeParseDataErr` | `5013` | 解析数据失败 |\n| `CodeDbErr` | `5014` | 数据库错误 |\n\n需要注意：`CodeOKZero` 和 `CodeOK` 都表示成功类语义，但当前 `DevSreOK`、`MDAPOK`、`BpmOK` 都使用 `CodeOKZero`。如果新增接口需要兼容现有响应契约，应优先确认调用方期望的是 `0` 还是 `2000`。\n\n## 响应契约\n\n### `Payload` 接口\n\n```go\ntype Payload interface {\n\tGetCode() int\n\tGetMessage() string\n}\n```\n\n`Payload` 是最小响应读取接口，用于只关心业务码和错误信息的流程。例如 `runHiveImportBackground` 会通过 `GetCode()` 和 `GetMessage()` 判断异步导入结果，而不需要知道具体响应结构是 `DevSREPayload`、`MDAPPayload` 还是 `BPMPayload`。\n\n当前实现了 `Payload` 的类型包括：\n\n- `DevSREPayload`\n- `MDAPPayload`\n- `BPMPayload`\n\n`JanusPayload` 没有实现 `GetCode()` / `GetMessage()`，因此不是 `Payload` 实现。\n\n### `DevSREPayload`\n\n```go\ntype DevSREPayload struct {\n\tCode     int         `json:\"code\"`\n\tMessage  string      `json:\"message\"`\n\tResponse interface{} `json:\"response\"`\n TraceId  string      `json:\"trace_id\"`\n}\n```\n\n`DevSREPayload` 是通用 DevSRE 风格响应结构，JSON 字段使用小写和下划线命名。它被普通 handler 和 BPM middleware 广泛使用，例如：\n\n- `getConfigByModule`\n- `handleGetJumpUrl`\n- `handleGetObject`\n- `getAuthorizedUsers`\n- `handleGetAccountDetail`\n- `BPMCheckBucketCreateStatus`\n- `BPMMigrateNonTTAccount`\n\n成功响应通过 `DevSreOK(data)` 构造：\n\n```go\nfunc DevSreOK(data interface{}) DevSREPayload {\n\treturn DevSREPayload{\n\t\tCode:     CodeOKZero,\n\t\tMessage:  \"ok\",\n\t\tResponse: data,\n\t}\n}\n```\n\n错误响应有两种常见构造方式：\n\n```go\nfunc DevSreError(err error) DevSREPayload\nfunc DevSreErrorWithCode(code int, err error) DevSREPayload\n```\n\n`DevSreError(nil)` 会降级为 `DevSreOK(nil)`。但 `DevSreErrorWithCode(code, err)` 会直接调用 `err.Error()`，调用方必须保证 `err != nil`。\n\n### `MDAPPayload`\n\n```go\ntype MDAPPayload struct {\n\tCode     int         `json:\"Code\"`\n\tMessage  string      `json:\"Message\"`\n\tResponse interface{} `json:\"Response\"`\n\tTraceId  string      `json:\"TraceId\"`\n}\n```\n\n`MDAPPayload` 专用于 `/mdap/v1` 路由下的接口。它和 `DevSREPayload` 的字段含义接近，但 JSON 字段名采用大写开头的驼峰命名：\n\n- `Code`\n- `Message`\n- `Response`\n- `TraceId`\n\n这个结构是为了避免修改 DevSRE 通用响应格式时影响其他路由。相关测试如 `TestMDAPResponse_marshal_error`、`TestMDAPResponse_fill_trace_id`、`TestMDAPResponse_keep_existing_trace_id` 覆盖了 MDAP 响应的序列化和 trace id 行为。\n\n常用构造函数：\n\n```go\nfunc MDAPOK(data interface{}) MDAPPayload\nfunc MDAPError(err error) MDAPPayload\nfunc MDAPErrorWithCode(code int, err error) MDAPPayload\nfunc MDAPErrorWithResponse(code int, err error, response interface{}) MDAPPayload\nfunc MDAPAuthErrorWithApplyURL(applyURL string) MDAPPayload\n```\n\n`MDAPError(nil)` 会返回 `MDAPOK(nil)`。`MDAPErrorWithCode` 和 `MDAPErrorWithResponse` 会直接调用 `err.Error()`，调用方必须传入非空错误。\n\n`MDAPAuthErrorWithApplyURL(applyURL)` 使用 `CodeForbidden`，并把申请链接拼进 `Message`：\n\n```go\nMessage: \"permission denied, applyURL: \" + applyURL\n```\n\n### `BPMPayload`\n\n```go\ntype BPMPayload struct {\n\tCode    int         `json:\"code\"`\n\tMessage string      `json:\"message\"`\n\tData    interface{} `json:\"data\"`\n\tTraceId string      `json:\"trace_id\"`\n}\n```\n\n`BPMPayload` 用于 BPM 场景，和 `DevSREPayload` 的主要差异是业务数据字段叫 `data`，不是 `response`。\n\n常用构造函数：\n\n```go\nfunc BpmOK(data interface{}) BPMPayload\nfunc BpmError(err error) BPMPayload\nfunc BpmErrorWithCode(code int, err error) BPMPayload\n```\n\n`BpmError(nil)` 会返回 `BpmOK(nil)`。`BpmErrorWithCode(code, err)` 会直接调用 `err.Error()`，调用方必须保证 `err != nil`。\n\n### `JanusPayload`\n\n```go\ntype JanusPayload struct {\n\tCode     int         `json:\"code\"`\n\tMessage  string      `json:\"message\"`\n\tTraceId  string      `json:\"trace_id\"`\n\tResponse interface{} `json:\"response\"`\n}\n```\n\n`JanusPayload` 定义了 Janus 风格响应结构，但当前模块没有提供构造函数，也没有实现 `Payload` 接口。新增使用点时需要显式决定是否补充 `GetCode()`、`GetMessage()` 或构造函数。\n\n### `DevSREPageGetPayloadResp`\n\n```go\ntype DevSREPageGetPayloadResp struct {\n\tData          interface{} `json:\"data\"`\n\tTotal         int64       `json:\"total\"`\n\tCurrent       int         `json:\"current\"`\n\tPageSize      int         `json:\"pageSize\"`\n\tSortField     string      `json:\"sortField\"`\n\tSortDirection string      `json:\"sortDirection\"`\n}\n```\n\n`DevSREPageGetPayloadResp` 是分页数据结构，通常作为 `DevSREPayload.Response` 的内容使用。调用点包括：\n\n- `getConfigByModule`\n- `handlePageGetGeneralAccounts`\n- `handlerGetAllDomain`\n\n它不是完整响应包裹结构，不包含 `Code`、`Message` 或 `TraceId`。\n\n## 构造函数行为\n\n```mermaid\nflowchart TD\n    A[\"handler 返回业务结果\"] --> B{\"响应族\"}\n    B --> C[\"DevSreOK / DevSreErrorWithCode\"]\n    B --> D[\"MDAPOK / MDAPErrorWithCode\"]\n    B --> E[\"BpmOK / BpmError\"]\n    C --> F[\"DevSREPayload\"]\n    D --> G[\"MDAPPayload\"]\n    E --> H[\"BPMPayload\"]\n    F --> I[\"middleware 序列化并补充 TraceId\"]\n    G --> I\n    H --> I\n```\n\n构造函数整体保持简单：根据输入数据或错误创建结构体，不做日志、序列化、HTTP 状态转换或 trace id 生成。\n\n成功响应：\n\n```go\nDevSreOK(data) // Code: 0, Message: \"ok\", Response: data\nMDAPOK(data)   // Code: 0, Message: \"ok\", Response: data\nBpmOK(data)    // Code: 0, Message: \"ok\", Data: data\n```\n\n普通错误响应：\n\n```go\nDevSreError(err) // err 非空时 Code: 600, Message: err.Error()\nMDAPError(err)   // err 非空时 Code: 600, Message: err.Error()\nBpmError(err)    // err 非空时 Code: 600, Message: err.Error()\n```\n\n带指定错误码的响应：\n\n```go\nDevSreErrorWithCode(code, err)\nMDAPErrorWithCode(code, err)\nBpmErrorWithCode(code, err)\n```\n\n其中 `DevSreErrorWithCode` 和 `MDAPErrorWithCode` 会把空 map 放入响应体：\n\n```go\nResponse: map[string]string{}\n```\n\n这可以避免部分前端或调用方在错误场景下拿到缺失的 `response` 字段。\n\n## 与代码库其他部分的连接\n\n该模块位于响应链路的末端，典型调用路径如下：\n\n1. handler 执行业务逻辑。\n2. handler 根据成功或失败调用 `DevSreOK`、`MDAPOK`、`BpmError` 等函数。\n3. middleware 识别返回的 payload，完成响应序列化。\n4. middleware 或测试逻辑补充、保留或验证 `TraceId`。\n\n几个典型执行流：\n\n- `handleBatchCreateMDAPSource` 在批量创建 MDAP Source 失败时，经由 `batchCreateMDAPSourcesWithGroupOptions` 调用 `MDAPErrorWithCode`，最终返回 `MDAPPayload`。\n- `GrantMDAPSpaceRole` 通过 `MDAPResponse` middleware 使用 `MDAPErrorWithCode` 返回 MDAP 格式错误。\n- `createNonTTMigrateBuckets` 在 BPM 创建桶流程中调用 `BpmError`，当错误为空时会回退到 `BpmOK(nil)`。\n- `BPMCheckBucketCreateStatus` 和 `BPMMigrateNonTTAccount` 通过 `BPMResponse` middleware 使用 `DevSreErrorWithCode` 返回 `DevSREPayload`。\n- `runHiveImportBackground` 不依赖具体结构体，而是通过 `Payload.GetCode()` 和 `Payload.GetMessage()` 读取执行结果。\n\n## 使用建议\n\n新增普通 DevSRE 风格接口时，优先使用：\n\n```go\nreturn errno.DevSreOK(data)\n```\n\n错误场景如果需要指定业务码：\n\n```go\nreturn errno.DevSreErrorWithCode(errno.CodeBadRequest, err)\n```\n\n新增 `/mdap/v1` 接口时，应使用 MDAP 响应族，确保 JSON 字段名保持大写开头：\n\n```go\nreturn errno.MDAPOK(data)\n```\n\nMDAP 权限失败且需要返回申请链接时，使用：\n\n```go\nreturn errno.MDAPAuthErrorWithApplyURL(applyURL)\n```\n\n新增 BPM `data` 风格响应时，使用：\n\n```go\nreturn errno.BpmOK(data)\n```\n\n如果只是消费响应状态，不需要关心具体响应结构，应依赖 `Payload` 接口：\n\n```go\nfunc handleResult(payload errno.Payload) error {\n\tif payload.GetCode() != errno.CodeOKZero {\n\t\treturn fmt.Errorf(payload.GetMessage())\n\t}\n\treturn nil\n}\n```\n\n调用 `DevSreErrorWithCode`、`MDAPErrorWithCode`、`MDAPErrorWithResponse`、`BpmErrorWithCode` 前必须保证 `err` 非空，否则会因为 `err.Error()` 触发 panic。","general-console-handlers":"# General Console Handlers\n\n## 模块概览\n\n`biz/handler` 中的 General Console Handlers 负责承接 Hertz HTTP 请求，并把控制台页面操作转换为对账号 SDK、权限表、对象元数据服务、GFM、ByteTree、Guardian、Jingle 等后端能力的调用。\n\n核心类型是 `GeneralConsoleServer`。它保存所有 handler 需要复用的客户端和状态：\n\n- `accountClient`：查询账号、配置、域名关系。\n- `db`：查询授权用户、管理员、账号授权关系。\n- `topAccounts`：顶级账号 ID 到业务线名称的缓存，由 `InitTopAccounts` 初始化。\n- `odmClient` / `odmDefaultClient`：查询对象元数据，优先 `gfm` 集群，失败后查 `default` 集群。\n- `gfmClient`：生成对象下载 URL。\n- `byteTreeCli`：补齐服务树节点路径。\n- `mdap*`、`bktmetaClient`、`uploadCli`、`cloudIAMCli`：供同包其他 handler 使用。\n\n所有公开 HTTP 入口都遵循同一模式：\n\n```go\nfunc (svr *GeneralConsoleServer) SomeAPI(ctx context.Context, c *app.RequestContext) {\n    middleware.Response(ctx, c, \"event.name\", svr.someAPI)\n}\n```\n\n实际业务逻辑放在未导出的 `svr.someAPI` 方法中，并返回 `errno.Payload`。成功响应通常使用 `errno.DevSreOK`，失败响应使用 `errno.DevSreErrorWithCode`。\n\n## 初始化流程\n\n`NewGeneralConsoleServer(db *dao.DbHandler)` 构造服务实例并初始化依赖。它由 `main.go` 和测试直接调用。\n\n```mermaid\nflowchart TD\n    A[\"NewGeneralConsoleServer\"] --> B[\"初始化 account / gfm / bktmeta\"]\n    A --> C[\"初始化 MDAP compound / Hive reader\"]\n    A --> D[\"初始化 ODM gfm 与 default 客户端\"]\n    A --> E[\"绑定 db\"]\n    A --> F[\"InitTopAccounts\"]\n    A --> G[\"初始化 ByteTree / CloudIAM / uploader / MDAP IAM\"]\n    A --> H[\"初始化 mdapauth\"]\n```\n\n需要注意的初始化行为：\n\n- `gfm.NewClient`、`mdap compound client`、`mdapauth.NewDefaultClient` 初始化失败会 `logs.Fatal`。\n- `odmClient` 和 `odmDefaultClient` 使用 `objectduplicationmanager.MustNewClient`，配置了长连接、TTHeaderFramed、3 秒连接和 RPC 超时。\n- `InitTopAccounts` 会分页请求 Guardian `/v1/folders`，用 `folder.Name` 中的 ID 建立 `topAccounts[folderId] = folder.DisplayName`。\n- `VCloudControlConfig` 和 `MDAP.IAM` 缺失时会跳过部分认证客户端初始化，而不是直接失败；`MDAP.IAM` 字段不完整时也会跳过。\n\n## 响应与分页约定\n\n分页类 handler 统一读取这些查询参数：\n\n- `current`：当前页，解析失败时通常置为 `0`。\n- `pageSize`：每页大小，解析失败时返回 `CodeBadRequest`。\n- `selector`：账号列表的名称筛选。\n- `accountId` / `accountName`：账号详情、配置、域名、对象查询的定位参数。\n- `module`：配置模块路径参数。\n\n分页响应使用 `errno.DevSREPageGetPayloadResp`：\n\n```go\n&errno.DevSREPageGetPayloadResp{\n    Data:     data,\n    Total:    total,\n    Current:  current,\n    PageSize: pageSize,\n}\n```\n\n## 账号查询\n\n`PageGetGeneralAccounts` 包装 `handlePageGetGeneralAccounts`，用于分页查询通用账号列表。\n\n执行流程：\n\n1. 解析 `current` 和 `pageSize`。\n2. 构造 `account.PageGetParam`，固定 `param.MGetParam.Type = \"general\"`。\n3. 通过 `util.DevSreGetOperatorName(c)` 获取当前操作者。\n4. 如果 `action != \"all\"`，调用 `db.GetAuthorizedAccountIdsOfUser` 限制账号范围。\n5. 如果传入 `selector`，设置 `param.MGetParam.QueryName`。\n6. 调用 `accountClient.PageGetAccount`。\n7. 将 `account.AccountInfo` 转为 `AccountInfoWithBizName`，补齐 `BizName`。\n8. 清空 `AccessKey` 和 `SecretKey`，避免列表接口泄露 AK/SK。\n9. 返回分页数据。\n\n`GetAccountDetail` 包装 `handleGetAccountDetail`，用于按 `accountId` 查询账号详情。它会先调用 `accountClient.GetAccountByID`，再通过 `isUserAuthorized` 判断当前用户是否有权限。无权限时不会拒绝整个请求，而是把 `AccessKey` 和 `SecretKey` 设置为常量 `\"NoPermission\"`。返回结构同样使用 `AccountInfoWithBizName`，并额外通过 `byteTreeCli.GetNodeByID` 补齐 `ServiceTreeNodeName`。\n\n## 权限模型\n\n权限判断集中在 `isUserAuthorized`：\n\n```go\nfunc (svr *GeneralConsoleServer) isUserAuthorized(ctx context.Context, accountInfo *account.AccountInfo, currentUserName string) bool\n```\n\n判定顺序是：\n\n1. `accountInfo.Username == currentUserName`：账号 owner 直接授权。\n2. `isUserAdmin(ctx, currentUserName)`：管理员直接授权。\n3. `db.CheckAuthorizeInfo(ctx, accountInfo.ID, currentUserName)`：显式授权关系存在则授权。\n\n`isUserAdmin` 使用 `db.CheckAdminUserInfo` 查询管理员表。查询失败会记录 warn 并返回 `false`。\n\n授权写入由 `AuthorizeAccountUser` 和 `authorizeAccountUser` 处理。请求体映射到 `AuthorizeAccountUserReq`：\n\n```go\ntype AuthorizeAccountUserReq struct {\n    AccountName           string `json:\"account_name\"`\n    ToAuthorizeUserName   string `json:\"user_name\"`\n    AuthorizedUser        string `json:\"authorize_user\"`\n}\n```\n\n`authorizeAccountUser` 会先按 `AccountName` 查询账号，再验证 `AuthorizedUser` 对该账号已有权限，最后调用 `authorizeUser` 写入授权关系。`authorizeUser` 会先用 `db.CheckAuthorizeInfo` 检查重复授权；如果已经存在，会返回错误 `\"user: ... has been authorized to provider: ...\"`。\n\n其他权限相关接口：\n\n- `CheckUserAuthorized` / `checkUserAuthorized`：按 `accountId` 判断当前登录用户是否有账号权限。\n- `GetAuthorizedUsers` / `getAuthorizedUsers`：按 `accountName` 查询已授权用户列表。\n- `GetProviderAuthInfo` / `getProviderAuthInfo`：查询 Jingle provider 权限前，也会调用 `isUserAuthorized` 校验当前用户。\n\n## 配置查询\n\n`GetConfigModuleList` 返回固定的 `allModuleName` 列表，模块值来自 `account.ModuleGlobal`、`account.ModuleUpload`、`account.ModuleTranscode`、`account.ModulePlay`、`account.ModulePicture`、`account.ModuleTasks`、`account.ModuleStorage`、`account.ModuleOpenAPI`。\n\n`GetConfigByModule` 包装 `getConfigByModule`，按账号和模块读取配置：\n\n1. 从路径参数读取 `module`。\n2. 从 query 读取 `accountName`、`current`、`pageSize`。\n3. 查询账号并调用 `isUserAuthorized` 校验权限。\n4. 调用 `accountClient.GetConfigByName(ctx, accountName, module)`。\n5. 把返回的 `map[string]string` 转成 `[]*AccountModuleConfigEntry`。\n6. 当模块是 `account.ModuleStorage` 时，跳过 `bucket_selection_strategy`。\n7. 使用 `ConfigEntrySlice` 按 `EntryName` 升序排序。\n8. 返回分页结构。\n\n配置项返回结构：\n\n```go\ntype AccountModuleConfigEntry struct {\n    EntryName   string `json:\"entry_name\"`\n    EntryConfig string `json:\"entry_config\"`\n}\n```\n\n## 域名关系\n\n`GetAllDomain` 包装 `handlerGetAllDomain`，用于查询账号关联域名。\n\n流程与配置查询相似：解析分页参数，按 `accountName` 查询账号，调用 `isUserAuthorized` 校验权限，然后构造 `account.ListDomainAccountRelRequest` 并调用 `accountClient.ListDomainAccountRel`。\n\n`createDomainWithRel` 是同文件中的辅助方法，用于创建域名和账号关系：\n\n- 先调用 `accountClient.CreateDomain`。\n- 如果错误包含 `\"Duplicate\"`，认为域名已存在，转而遍历 `domain.AccountRels` 调用 `CreateDomainAccountRel`。\n- 创建关系时同样忽略 `\"Duplicate\"` 错误。\n- 其他错误直接返回。\n\n## 对象查询与下载 URL\n\n`GetObject` 包装 `handleGetObject`，用于按 `accountId` 和 `oid` 查询对象元信息，并尝试生成下载地址。\n\n返回结构是 `ConsoleObject`，它嵌入 `object_duplication_manager.Object`，并增加控制台字段：\n\n```go\ntype ConsoleObject struct {\n    object_duplication_manager.Object\n    AccountId       int64             `json:\"account_id\"`\n    QueryResult     string            `json:\"query_result\"`\n    Permission      bool              `json:\"permission\"`\n    CreateTimeStamp string            `json:\"create_time_stamp\"`\n    DownloadUrls    map[string]string `json:\"download_urls\"`\n}\n```\n\n主要流程：\n\n1. 解析 `accountId`，失败时返回 `ConsoleObject{QueryResult: \"account id is invalid\", Permission: false}`。\n2. 查询账号并调用 `isUserAuthorized`；无权限时返回 `CodeWarn`。\n3. 如果 `oid` 为空，返回 `object_duplication_manager.NewObject()`。\n4. 调用 `getObjectMetaData` 查询 ODM 对象。\n5. 将 ODM object 序列化再反序列化到 `ConsoleObject`。\n6. 如果对象不存在，返回 `QueryResult = \"Not Found in ODM\"`。\n7. 如果对象存在，设置 `QueryResult = \"Got It in ODM\"`、`Permission = true`，并格式化 `ObjectCreateTime` 到 `CreateTimeStamp`。\n8. 使用账号 AK/SK 初始化 GFM client，分别尝试生成 `internal_dev` 和 `internal_all` 两类下载 URL。\n\n`getObjectMetaData` 会用 `util.IAMSignRpcRequest(\"QueryObject\", accountInfo.AccessKey, accountInfo.SecretKey)` 构造 RPC 鉴权信息，然后先查 `svr.odmClient`。如果返回错误、对象为空或 `ObjectID` 为空，会再查 `svr.odmDefaultClient`。\n\n`getObjectStorageUrl` 使用 `gfm.GetFileURLs`，并启用：\n\n```go\nOptions: gfm.GetFileURLsOptions{\n    ReadPrimary:        true,\n    SetFileStatusIfVL3: gfm.FileStatusVL1,\n}\n```\n\n它优先返回 `fileInfo.MainURL`，为空时返回 `fileInfo.BackupURL`。如果响应中没有对应 `oid`，或 `fileInfo.Status != errno.CodeOKZero`，会返回错误。\n\n## Provider 权限查询\n\n`GetProviderAuthInfo` 包装 `getProviderAuthInfo`，用于从 Jingle 查询 provider 级权限信息。\n\n接口要求 query 中存在 `accountName`。处理流程：\n\n1. 解析分页参数。\n2. 按 `accountName` 查询账号。\n3. 使用 `isUserAuthorized` 校验当前用户。\n4. 请求 `https://{config.Conf.JingleAPI.Host}/v1/biz/project/auth?provider={accountName}`。\n5. 使用 `config.Conf.JingleAPI.UserName` 和 `Password` 设置 BasicAuth。\n6. 解码到 `JingleRespPayload`。\n7. 当 `result.Code == 2000` 时返回分页成功响应，否则直接返回 `errno.DevSREPayload`，保留 Jingle 的 code、message 和 data。\n\n相关数据结构：\n\n```go\ntype JingleRespPayload struct {\n    Code    int                      `json:\"code\"`\n    Message string                   `json:\"message\"`\n    Data    []*AccessKeyProviderAuth `json:\"data,omitempty\"`\n}\n```\n\n## 通用配置接口\n\n`GetJumpUrl` 包装 `handleGetJumpUrl`，直接返回 `config.Conf.JumpUrl`。它不做权限校验，也不访问外部服务。\n\n## 与其他模块的连接\n\n- `biz/middleware.Response`：统一包装 handler 执行、事件名和响应写入。\n- `biz/errno`：定义统一 payload、错误码和分页响应结构。\n- `biz/util`：提供 `DevSreGetOperatorName`、`IAMSignRpcRequest`、`IAMSignHttpRequest`。\n- `biz/dal/dao.DbHandler`：提供授权关系、管理员、授权用户列表等持久化查询。\n- `account-sdk/client`：账号、配置、域名关系的主数据来源。\n- `object_duplication_manager` 与 `general_file_manager_go`：支撑对象元数据查询和下载 URL 生成。\n- `bytetree_go_sdk`：账号详情中服务树节点名的补充信息来源。\n- `biz/config`：所有外部服务地址、鉴权信息和开关配置的来源。\n\n## 贡献注意事项\n\n新增 handler 时建议保持现有分层：导出方法只调用 `middleware.Response`，业务逻辑放在未导出方法并返回 `errno.Payload`。需要账号级数据时，应复用 `isUserAuthorized`，避免每个接口重新实现权限判断。\n\n处理 AK/SK 时要区分列表和详情场景。账号列表中 `handlePageGetGeneralAccounts` 会直接清空 `AccessKey`、`SecretKey`；账号详情中 `handleGetAccountDetail` 对无权限用户返回 `\"NoPermission\"`；对象查询必须在权限校验通过后才使用账号 AK/SK 访问 ODM 和 GFM。\n\n分页接口当前多数只透传 `current`、`pageSize` 到响应，部分后端调用并没有真正按页裁剪本地结果。修改这类接口时，需要确认前端依赖的是后端分页、前端分页，还是仅依赖统一分页响应结构。","mdap-core-apis":"# MDAP Core APIs\n\n## 模块概览\n\nMDAP Core APIs 位于 `biz/handler/mdap*.go`，负责 General Console 对 MDAP 租户、资产组、素材源、产物和空间权限的 HTTP 接入层。模块不直接实现 MDAP 业务存储，而是把 Hertz 请求转换为内部 SDK / Kitex 调用，并统一走 `middleware.MDAPResponse`、`errno.MDAPOK`、`errno.MDAPErrorWithCode` 返回 MDAP 格式响应。\n\n核心资源层级是：\n\n```mermaid\nflowchart TD\n    A[\"MDAP 空间<br/>account.Type=MDAP\"] --> B[\"资产组<br/>mdap_model.AssetGroup\"]\n    B --> C[\"素材源<br/>mdap_model.Source\"]\n    C --> D[\"产物<br/>Artifact\"]\n    A --> E[\"权限角色<br/>Cloud IAM ACL\"]\n```\n\n模块的主要外部依赖：\n\n- `accountClient`：创建、查询、更新 MDAP 空间账户，也用于校验 VOD 空间和 VID 归属。\n- `byteTreeCli`：创建 MDAP 租户的服务树资源。\n- `mdapIAMClient`：在 IAM 侧注册 MDAP 租户资源。\n- `mdapauthClient`：提取调用方 principal，并校验 MDAP action 权限。\n- `mdapCompoundClient`：调用 MDAP Compound Kitex 服务，处理资产组、素材源、产物。\n- `cloudIAMCli`：查询和修改服务树节点 ACL。\n- `passportclient`：根据服务树一级节点推断 `TopAccountId`。\n- `video_data_access` 和 `vvid`：批量创建 VDA 类型素材源时校验 VID、媒体格式和大小。\n\n## 请求包装与错误模型\n\n对外 handler 方法通常只做一件事：调用 `middleware.MDAPResponse`，传入 action 名称和内部 `handle*` 函数。例如：\n\n```go\nfunc (svr *GeneralConsoleServer) CreateMDAPSource(ctx context.Context, c *app.RequestContext) {\n\tmiddleware.MDAPResponse(ctx, c, \"mdap.source.create\", svr.handleCreateMDAPSource)\n}\n```\n\n内部 `handle*` 函数返回 `errno.Payload`：\n\n- 成功使用 `errno.MDAPOK(data)`。\n- 参数错误使用 `errno.MDAPErrorWithCode(errno.CodeBadRequest, err)`。\n- 解析失败使用 `errno.CodeParseDataErr`。\n- 下游查询失败常用 `errno.CodeGetDataErr` 或 `errno.CodeInternalErr`。\n- 资源不存在使用 `errno.CodeNotFound`。\n- 权限失败使用 `errno.CodeForbidden` 或 `errno.MDAPAuthErrorWithApplyURL(applyURL)`。\n\n需要新增 API 时，建议保持这个分层：外层 handler 只注册 action 和响应包装，内层 `handle*` 完成绑定参数、鉴权、调用下游和构造响应。\n\n## 权限模型\n\n通用权限校验由 `MDAPAuth` 实现：\n\n```go\nfunc (svr *GeneralConsoleServer) MDAPAuth(ctx context.Context, c *app.RequestContext, action, space string) (denied bool, payload errno.Payload)\n```\n\n执行顺序：\n\n1. 从 `c.GetString(middleware.MDAPAuth)` 提取 principal：`mdapauthClient.ExtractPrincipal`。\n2. 调用 `mdapauthClient.CheckPermission(ctx, principal, action, space)`。\n3. 提取或校验失败时返回 `CodeForbidden`。\n4. 无权限但可申请权限时返回 `errno.MDAPAuthErrorWithApplyURL(applyURL)`。\n5. 有权限时返回 `(false, nil)`。\n\n不同 API 使用不同 action：\n\n- 查询资产组：`mdap.tenant.query_asset_group`\n- 创建资产组：`mdap.tenant.create_asset_group`\n- 查询素材源：`mdap.tenant.query_source`\n- 查询产物：`mdap.tenant.query_artifact`\n- 空间列表可见性检查：`mdap.tenant.view_detail`\n\n注意：`handleDeleteMDAPAssetGroup` 删除资产组前使用的是 `mdap.tenant.create_asset_group`，代码注释明确说明这是按请求保留的行为。\n\n## 空间 API\n\n### 创建空间\n\n入口：\n\n- `CreateMDAPTenant`\n- `handleCreateMDAPSpace`\n\n请求结构是 `CreateMDAPSpaceReq`：\n\n```go\ntype CreateMDAPSpaceReq struct {\n\tSpaceName         string\n\tDescription       string\n\tCreator           string\n\tServiceTreeNodeId uint64\n\tTopAccountId      int64\n}\n```\n\n必填字段：\n\n- `SpaceName`\n- `Creator`\n- `ServiceTreeNodeId`\n\n创建流程：\n\n```mermaid\nflowchart TD\n    A[\"解析 CreateMDAPSpaceReq\"] --> B[\"校验 SpaceName / Creator / ServiceTreeNodeId\"]\n    B --> C{\"已存在同名 VOD space?\"}\n    C -->|是| D[\"createVODByteTreeResource\"]\n    C -->|否| E[\"createMDAPByteTreeResource\"]\n    E --> F[\"createMDAPIAMResource\"]\n    F --> G[\"推断 TopAccountId\"]\n    G --> H[\"accountClient.Create\"]\n    H --> I[\"accountClient.GetAccountByID\"]\n    I --> J[\"buildMDAPSpaceResp\"]\n```\n\n如果 `accountClient.GetAccountByName(ctx, SpaceName)` 找到已存在账户，且 `acct.Type == account.TypeSpace`，会走兼容路径：调用 `createVODByteTreeResource` 为既有 VOD space 创建 MDAP 服务树资源，然后直接返回成功。\n\n新建 MDAP 空间时会依次：\n\n1. `createMDAPByteTreeResource` 在 `ServiceTreeNodeId` 下创建服务树资源，资源 `PSM` 为 `videoarch.mdap.<SpaceName>`，`Rtype` 为 `mdap_tenant`，`RID` 为空间名。\n2. `createMDAPIAMResource` 在 IAM 侧创建 `brn:cn:mdap::prod:tenant:<SpaceName>` 资源。\n3. 如果未传 `TopAccountId`，通过 `byteTreeCli.GetIndexNodeAllParent` 查找一级节点，再用 `queryPassportTopAccountID` 查询 Passport 顶层账户。\n4. 调用 `accountClient.Create` 创建 `Type: \"MDAP\"` 的账户。\n5. 尝试用 `GetAccountByID` 读回账户并通过 `buildMDAPSpaceResp` 返回；读回失败时返回基于请求字段构造的兜底响应。\n\n### 查询空间详情\n\n入口：\n\n- `GetMDAPSpaceDetail`\n- `handleGetMDAPSpaceDetail`\n\n路径参数：\n\n- `space_name`\n\n流程：\n\n1. 校验 `space_name` 非空。\n2. `accountClient.GetAccountByName` 查询空间账户。\n3. 要求 `strings.ToUpper(acct.Type) == \"MDAP\"`。\n4. 使用 `buildMDAPSpaceResp(acct, true)` 构造基础信息。\n5. 调用 `getMDAPRolePrincipalsByNodeID(ctx, acct.ServiceTreeNodeId)` 查询角色成员，填充 `RolePrincipals`。\n\n`RolePrincipal` 会把 Cloud IAM ACL 中的角色成员拆成：\n\n- `UserAccounts`\n- `ServiceAccounts`\n- `Organizations`\n- `CustomGroups`\n\n### 分页查询空间列表\n\n入口：\n\n- `PageGetMDAPSpaces`\n- `handlePageGetMDAPSpaces`\n\n当前实现不暴露分页参数，默认返回所有 MDAP 空间：\n\n1. 通过 `mdapauthClient.ExtractPrincipal` 提取 principal；失败不会中断请求，只会让所有空间 `Viewable=false`。\n2. 调用 `accountClient.MGetAccount(ctx, &account.MGetParam{Type: \"MDAP\", NoCache: true})`。\n3. 对每个空间调用 `mdapauthClient.CheckPermission(ctx, principal, \"mdap.tenant.view_detail\", info.AccountName)`，决定 `Viewable`。\n4. 返回 `PageGetMDAPSpacesResp{Total, Spaces}`。\n\n### 更新空间\n\n入口：\n\n- `UpdateMDAPSpace`\n- `handleUpdateMDAPSpace`\n\n请求结构是 `UpdateMDAPSpaceReq`：\n\n```go\ntype UpdateMDAPSpaceReq struct {\n\tSpaceName   string\n\tDescription string\n\tStatus      string\n}\n```\n\n`SpaceName` 必填。`Description` 和 `Status` 非空时才会覆盖账户字段，然后调用 `accountClient.UpdateAccount(ctx, acct)`。返回值同样由 `buildMDAPSpaceResp` 构造。\n\n当前更新接口没有调用 `MDAPAuth` 做 MDAP action 校验；如果新增敏感字段或调整权限策略，需要显式补上鉴权。\n\n### 检查空间权限\n\n入口：\n\n- `CheckMDAPSpaceAuth`\n- `handleCheckMDAPSpaceAuth`\n\n路径参数：\n\n- `space_name`\n\n固定检查 action：`mdap.tenant.query_source`。通过 `MDAPAuth` 后返回 `MDAPOK(nil)`。\n\n### 查询 VOD 空间列表\n\n入口：\n\n- `ListVODSpaces`\n- `handleListVODSpaces`\n\n查询参数：\n\n- `offset`，默认 `0`\n- `limit`，默认 `15`\n- `query_name`\n\n实现会调用 `accountClient.SearchAccounts`，实际查询 `Limit` 为 `2 * limit`，然后筛选：\n\n```go\n(info.Type == \"space\" || info.Type == \"\") && info.TopAccountID < 2_000_000_000\n```\n\n最后截断到 `limit` 条，返回 `ListVODSpacesResp{Total, SpaceNames}`。\n\n## 资产组 API\n\n资产组相关请求主要转发到 `mdapCompoundClient.KitexClient()`。\n\n### 创建资产组\n\n入口：\n\n- `CreateMDAPAssetGroup`\n- `handleCreateMDAPAssetGroup`\n\n请求结构：\n\n```go\ntype CreateAssetGroupRequest struct {\n\tmdap.CreateAssetGroupRequest `json:\",inline\"`\n}\n```\n\n流程：\n\n1. `c.Bind(&req)` 绑定请求。\n2. 使用 `req.Space` 调用 `MDAPAuth(ctx, c, \"mdap.tenant.create_asset_group\", req.Space)`。\n3. 调用 `CreateAssetGroup(ctx, &req.CreateAssetGroupRequest)`。\n4. 检查 `group.BaseResp.StatusCode`。\n5. 返回 `CreateAssetGroupResponse{AssetGroup: group.AssetGroup}`。\n\n### 查询资产组列表\n\n入口：\n\n- `ListMDAPAssetGroups`\n- `handleListMDAPAssetGroups`\n\n请求结构：\n\n```go\ntype ListAssetGroupsRequest struct {\n\tmdap.QueryAssetGroupsRequest `json:\",inline\"`\n}\n```\n\n`Space` 不能为空。通过 `mdap.tenant.query_asset_group` 权限后调用 `QueryAssetGroups`，返回 `ListAssetGroupsResponse{AssetGroups, Total}`。\n\n### 查询单个资产组\n\n入口：\n\n- `GetMDAPAssetGroup`\n- `handleGetMDAPAssetGroup`\n\n路径参数：\n\n- `id`\n\n流程：\n\n1. 校验 `id`。\n2. 调用 `mdapCompoundClient.MGetAssetGroups(ctx, []string{id})`。\n3. 如果 `group.AssetGroups` 为空，返回 `CodeNotFound`。\n4. 使用查到的 `group.AssetGroups[id].Space` 做 `mdap.tenant.query_asset_group` 鉴权。\n5. 返回对应 `mdap_model.AssetGroup`。\n\n注意：当前代码只判断 `len(group.AssetGroups) == 0`，随后直接访问 `group.AssetGroups[id].Space`。删除接口额外判断了 `group.AssetGroups[id] == nil`，如果维护查询接口时可以考虑补齐一致性检查。\n\n### 删除资产组\n\n入口：\n\n- `DeleteMDAPAssetGroup`\n- `handleDeleteMDAPAssetGroup`\n\n路径参数：\n\n- `id`\n\n删除前会先通过 `MGetAssetGroups` 查询资产组，以便拿到 `Space` 做权限校验。权限 action 是 `mdap.tenant.create_asset_group`。真正删除时构造：\n\n```go\nreq := mdap.NewDeleteAssetGroupRequest()\nreq.ID = id\nreq.Base = &base.Base{}\n```\n\n然后调用 `DeleteAssetGroup`，成功后返回：\n\n```go\nDeleteAssetGroupResponse{\n\tDeleted: true,\n\tID:      id,\n}\n```\n\n## 素材源 API\n\n素材源 API 位于 `mdap_source.go`，包含单个创建、批量创建和查询。批量创建逻辑最多，是本模块维护时需要重点理解的部分。\n\n### 查询素材源\n\n入口：\n\n- `QueryMDAPSources`\n- `handleQueryMDAPSources`\n\n请求结构：\n\n```go\ntype QueryMDAPSourcesRequest struct {\n\tAssetGroupID string\n\tOffset       *int32\n\tLimit        *int32\n}\n```\n\n流程：\n\n1. 校验 `AssetGroupID`。\n2. 用 `MGetAssetGroups` 查询资产组。\n3. 根据资产组 `Space` 校验 `mdap.tenant.query_source`。\n4. 构造 `mdap.NewQuerySourcesRequest()`。\n5. 调用 `QuerySources`，附带 `callopt.WithRPCTimeout(5*time.Second)`。\n6. 返回 `QueryMDAPSourcesResponse{Sources, Total}`。\n\n### 创建单个素材源\n\n入口：\n\n- `CreateMDAPSource`\n- `handleCreateMDAPSource`\n\n请求结构：\n\n```go\ntype CreateMDAPSourceRequest struct {\n\tAssetGroupID string\n\tBizID        string\n\tName         string\n\tMediaType   string\n\tFormat      string\n\tSourceConfig *mdap_model.SourceConfig\n\tTags        []string\n\tMeta        []byte\n}\n```\n\n必填字段：\n\n- `AssetGroupID`\n- `BizID`\n\n`Name` 为空时默认使用 `BizID`。`SourceConfig` 为空时，会尝试使用资产组的第一个 `group.SourceConfigs[0]`；如果资产组也没有配置，返回 `sourceConfig is empty`。\n\n权限校验使用资产组所属空间和 action `mdap.tenant.create_asset_group`。通过后构造 `mdap.NewCreateSourceRequest()` 并调用 `CreateSource`。\n\n### 批量创建素材源\n\n入口：\n\n- `BatchCreateMDAPSource`\n- `handleBatchCreateMDAPSource`\n- `batchCreateMDAPSources`\n- `prepareMDAPSourceBatchCreate`\n- `batchCreateMDAPSourcesWithGroup`\n- `batchCreateMDAPSourcesWithGroupOptions`\n\n请求结构：\n\n```go\ntype BatchCreateMDAPSourceRequest struct {\n\tAssetGroupID       string\n\tVODSpaces          []string\n\tSources            []BatchCreateMDAPSourceItem\n\tSkipCheckMediaType bool\n}\n```\n\n每个素材项是 `BatchCreateMDAPSourceItem`：\n\n```go\ntype BatchCreateMDAPSourceItem struct {\n\tBizID        string\n\tName         string\n\tMediaType    string\n\tFormat       string\n\tSourceConfig *mdap_model.SourceConfig\n\tTags         []string\n\tMeta         []byte\n}\n```\n\n批量创建的主流程：\n\n```mermaid\nflowchart TD\n    A[\"校验 AssetGroupID 和 Sources\"] --> B[\"查询资产组并鉴权\"]\n    B --> C[\"收集 VDA 类型 BizID\"]\n    C --> D[\"校验 VID 归属 VODSpaces\"]\n    D --> E[\"fetchVDAVideoGroupInfos\"]\n    E --> F[\"构造 CreateSource 任务\"]\n    F --> G{\"媒体类型是否允许\"}\n    G -->|不允许且不跳过| H[\"整体 BadRequest\"]\n    G -->|允许或跳过| I[\"按去重 key 调用 CreateSource\"]\n    I --> J[\"回填重复项结果\"]\n    J --> K[\"尽力更新资产组 SourceCount/Size\"]\n```\n\n#### VDA 来源校验\n\n批量逻辑会先收集 `SourceConfig.Type == mdap_model.SourceType_VDA` 的素材项，并把它们的 `BizID` 作为 VID 处理。\n\nVDA 素材需要满足：\n\n1. `VODSpaces` 不能为空。\n2. `vvid.Parse(id)` 能解析 VID。\n3. VID 中的 `AccountID()` 能通过 `accountClient.GetAccountByID` 查到账户。\n4. 账户名必须在请求的 `VODSpaces` 中。\n\n任何 VID 不满足以上条件，整个请求返回 `CodeBadRequest`，错误信息形如：\n\n```text\nvid format error or not belongs to vod space[spaceA,spaceB]: vid1,vid2\n```\n\n之后调用 `fetchVDAVideoGroupInfos(ctx, vids)` 查询 VDA 原视频信息。该函数会：\n\n- 去重并去掉空 VID。\n- 按最多 30 个 VID 一批调用 `vda.MGetVideoInfo(ctx, batch, \"\")`。\n- 缺失 `VideoGroupInfo`、`OriginalVideoInfo` 或 `MetaInfo` 时加入 `notFoundVIDs`。\n- 原始格式为空时加入 `illegalFormats`，原因是 `empty`。\n- 原始格式属于 `imageFormatEnums` 时加入 `illegalFormats`，原因是 `image_format`。\n- 合法视频写入 `infoByVID`。\n\nVDA 类型素材会忽略调用方传入的 `Format`，改用 VDA 原视频的 `OriginalVideoInfo.MetaInfo.Format`。成功创建后，资产组大小增量来自 VDA 原视频 `MetaInfo.Size`。\n\n#### 媒体类型推断与校验\n\n模块使用两个枚举集合：\n\n- `audioEnums`：用于识别音频格式。\n- `imageFormatEnums`：用于拒绝 VDA 原视频中的图片格式。\n\n`checkMediaTypeIsAudio(format)` 的规则很简单：\n\n```go\nif _, ok := audioEnums[strings.ToUpper(format)]; ok {\n\treturn \"audio\", true\n}\nreturn \"video\", false\n```\n\n也就是说，未命中 `audioEnums` 的格式都会被视为 `video`。如果调用方未传 `MediaType` 但有 `Format`，批量创建会自动推断并填充 `createReq.MediaType`。\n\n资产组如果配置了 `group.MediaTypes`，批量创建会检查每个素材由格式推断出的 `sourceMediaType` 是否在允许列表里：\n\n- `SkipCheckMediaType == false`：收集所有违规项，并用 `errno.MDAPErrorWithResponse(errno.CodeBadRequest, err, badRequestResp)` 整体拒绝。\n- `SkipCheckMediaType == true`：违规项不创建，但会在该 item 的 `BatchCreateMDAPSourceResult.Error` 中返回错误；其他合法项继续创建。\n\n违规项结构是 `BatchCreateMDAPSourceBadRequestItem`：\n\n```go\ntype BatchCreateMDAPSourceBadRequestItem struct {\n\tBizID    string\n\tExpected string\n\tActual   string\n}\n```\n\n#### 去重策略\n\n批量创建默认开启 `dedupeIdenticalSources`。去重 key 由 `sourceDedupKey(bizID, sc)` 生成：\n\n```go\nreturn bizID + \"\\n\" + sourceConfigDedupKey(sc)\n```\n\n`sourceConfigDedupKey` 使用 `SourceConfig` 的内容构造确定性 key，包括：\n\n- `Type`\n- `NeedFetch`\n- base64 编码后的 `Config`\n- 每个 `Location` 的 `Type` 和 `Path`\n\n这意味着只有 `BizID + SourceConfig` 完全相同时才复用创建结果。重复项不会再次调用 `CreateSource`，而是在首次创建完成后复制 `Source` 或 `Error` 到重复项结果中。\n\nHive 导入相关代码会直接复用批量创建能力：`buildHiveImportBatchRequest` 构造 `BatchCreateMDAPSourceRequest`，`runMDAPSourceBatchCreator` 使用 `batchCreateMDAPSourceOptions` 调整内部行为。\n\n#### 资产组统计更新\n\n批量创建结束后，如果 `successCreated > 0 || successSize > 0`，会尽力调用 `UpdateAssetGroup` 更新：\n\n- `SourceCount = group.SourceCount + successCreated`\n- `Size = group.Size + successSize`\n\n这一步失败只记录 `logs.CtxWarn`，不会让整个批量创建失败。\n\n## 产物查询 API\n\n入口：\n\n- `QueryArtifacts`\n- `handleQueryArtifacts`\n\n请求结构：\n\n```go\ntype QueryArtifactsRequest struct {\n\tmdap.QueryArtifactsRequest `json:\",inline\"`\n}\n```\n\n`Space` 不能为空。通过 `MDAPAuth(ctx, c, \"mdap.tenant.query_artifact\", space)` 后，调用：\n\n```go\nsvr.mdapCompoundClient.KitexClient().QueryArtifacts(ctx, &req.QueryArtifactsRequest)\n```\n\n返回结构是本模块重新包装过的 `QueryArtifactsResponse`，其中 `Artifact` 和 `ArtifactContent` 保留了 thrift 字段语义，同时把下游的 binary content 转成 `[]json.RawMessage`：\n\n```go\ntype ArtifactContent struct {\n\tType     mdap_model.ArtifactType\n\tContents []json.RawMessage\n}\n```\n\n`Artifact.DeriveType` 和 `Artifact.DeriveID` 表示产物来源：\n\n- `DeriveType=Source` 时，`DeriveID` 是 `SourceID`。\n- `DeriveType=Artifact` 时，`DeriveID` 是另一个 `ArtifactID`。\n\n## 空间角色授权 API\n\n入口：\n\n- `GrantMDAPSpaceRole`\n- `handleGrantMDAPSpaceRole`\n\n路径参数：\n\n- `space_name`\n\n请求结构：\n\n```go\ntype GrantMDAPSpaceRoleRequest struct {\n\tRoleName        string\n\tUserAccounts    []string\n\tServiceAccounts []string\n}\n```\n\n响应结构：\n\n```go\ntype GrantMDAPSpaceRoleResponse struct {\n\tSpaceName       string\n\tRoleName        string\n\tUserCount       int\n\tServiceAccCount int\n}\n```\n\n授权接口允许已有空间 owner 或 `mdap.admin` 给其他 principal 授权。权限判断不走 `MDAPAuth`，而是直接读取空间服务树节点上的 ACL：\n\n1. 根据 `space_name` 查询 account。\n2. 要求账户类型为 `MDAP`。\n3. 从 MDAP auth 上下文中提取 principal。\n4. `parseMDAPPrincipal` 从 principal 字符串中解析类型和名称，例如：\n   - `brn::iam:::user_account:test` → `(\"user_account\", \"test\")`\n   - 包含 `service_account` → `(\"service_account\", lastSegment)`\n5. 调用 `getMDAPRolePrincipalsByNodeID(ctx, acct.ServiceTreeNodeId)`。\n6. 只有调用方出现在 `owner` 或 `mdap.admin` 角色中时，才允许继续。\n7. 校验 `RoleName` 非空，并且 `UserAccounts` 与 `ServiceAccounts` 至少有一个非空。\n8. 构造 `schema.UsersOfRoleArray`，调用 `cloudIAMCli.BatchAddUsersOfRole`。\n\n授权目标节点通过 PSM 选择：\n\n```go\nselector := cloud.NewNodeSelectorByPSM(\"videoarch.mdap.\" + spaceName)\n```\n\n`buildCloudIAMCallerHeaders` 会把 HTTP 请求中的调用方凭证透传给 Cloud IAM：\n\n- `X-Jwt-Token` → `X-User-Jwt-Token`\n- `Authorization` → `Authorization`\n\n## 服务树、IAM 和 Passport 辅助函数\n\n### `createMDAPByteTreeResource`\n\n用于新建 MDAP 空间时创建服务树资源。要求 `parentNode != 0`，否则返回 `service_tree_node_id cannot be 0`。\n\n默认配置：\n\n- `provider = \"videoarch_mdap\"`\n- `envValue = \"prod\"`\n- `region = env.GetCurrentVRegion()`\n- `psm = \"videoarch.mdap.\" + accountName`\n- `Rtype = \"mdap_tenant\"`\n- `RID = accountName`\n\n如果 `config.Conf.MDAP.ByteTreeProvider` 或 `ByteTreeEnv` 非空，会覆盖默认值。\n\n### `createVODByteTreeResource`\n\n用于兼容已有 VOD space。和 `createMDAPByteTreeResource` 类似，但父节点默认是 `18171368`，可由 `config.Conf.MDAP.ByteTreeDefaultParentNode` 覆盖。\n\n该函数还会在 `schema.ResBrief.Authorization` 中给原 VOD space 创建者配置 `owner`：\n\n```go\nAuthorization: []schema.IAMAuth{{\n\tRoleName: \"owner\",\n\tUserList: []schema2.UserInfoListV2{\n\t\t{\n\t\t\tUserType: schema2.TypePersonAccount,\n\t\t\tUser:     []string{acct.Username},\n\t\t},\n\t},\n}}\n```\n\n### `createMDAPIAMResource`\n\n用于在 IAM 侧注册 MDAP 租户资源。`mdapIAMClient` 为空时直接报错。\n\n资源关键字段：\n\n- `Brn`: `brn:cn:mdap::prod:tenant:<accountName>`\n- `Name`: `MDAP租户: <accountName>`\n- `Creator`: `brn::iam:::user_account:<userName>`\n- `Provider`: `MDAP`\n- `ResourceType`: `tenant`\n- `ResourceId`: `<accountName>`\n- `NodeId`: 服务树节点 ID\n- `ResourceLink`: 空间名\n\n### `queryPassportTopAccountID`\n\n用于从服务树一级节点推断 account 系统需要的 `TopAccountId`。\n\n查询参数：\n\n- `Site=inner`\n- `Limit=1`\n- `Offset=0`\n- `Tags[service_tree_node_id]=<level1NodeID>`\n\n函数会调用 `passportclient.DefaultInstance.ListAccount`，取第一条结果的 `ID`，并检查是否能安全转换为 `int64`。\n\n## 数据结构与响应构造\n\n空间响应统一由 `buildMDAPSpaceResp` 构造：\n\n```go\nfunc buildMDAPSpaceResp(acct *account.AccountInfo, viewable bool) *MDAPSpaceResp\n```\n\n当 `acct == nil` 时只返回 `Viewable`；否则映射：\n\n- `AccountName` → `SpaceName`\n- `Description` → `Description`\n- `Status` → `Status`\n- `Username` → `Creator`\n- `CreatedAt` → `CreatedAt`\n- `UpdatedAt` → `UpdatedAt`\n\n`mgetAccounts` 只是 `accountClient.MGetAccount` 的薄包装，注释说明它主要是为了单元测试可以 patch 方法，而不依赖 account-sdk 的内部 variadic option 类型。\n\n## 与其他模块的连接点\n\n本模块是 HTTP handler 层，向上连接路由和中间件，向下连接多个服务客户端。\n\n典型调用链：\n\n```mermaid\nflowchart TD\n    A[\"Hertz 路由\"] --> B[\"GeneralConsoleServer 对外 handler\"]\n    B --> C[\"middleware.MDAPResponse\"]\n    C --> D[\"内部 handle* 函数\"]\n    D --> E[\"MDAPAuth / 参数校验\"]\n    E --> F[\"account / ByteTree / IAM / Compound / VDA\"]\n    F --> G[\"errno.MDAPOK 或 MDAPErrorWithCode\"]\n```\n\nHive 导入模块也复用了这里的批量创建能力：\n\n- `buildHiveImportBatchRequest` 构造 `BatchCreateMDAPSourceRequest` 和 `BatchCreateMDAPSourceItem`。\n- `runMDAPSourceBatchCreator` 使用 `batchCreateMDAPSourceOptions`。\n- 相关测试直接断言 `BatchCreateMDAPSourceResponse`。\n\n因此修改批量创建字段、去重策略、错误响应形状时，需要同时关注 Hive 导入路径和 `mdap_source_hive_test.go` 中的预期。\n\n## 维护建议\n\n新增 MDAP API 时，优先复用现有模式：\n\n```go\nfunc (svr *GeneralConsoleServer) SomeAPI(ctx context.Context, c *app.RequestContext) {\n\tmiddleware.MDAPResponse(ctx, c, \"mdap.some.action\", svr.handleSomeAPI)\n}\n\nfunc (svr *GeneralConsoleServer) handleSomeAPI(ctx context.Context, c *app.RequestContext) errno.Payload {\n\t// 绑定请求、校验参数、MDAPAuth、调用下游、返回 errno.Payload\n}\n```\n\n涉及空间权限时，先明确 action 字符串和 space 来源。资产组、素材源、产物通常需要先查上游资源拿到 `Space`，再调用 `MDAPAuth`。\n\n涉及 VDA 素材时，不要绕过 `fetchVDAVideoGroupInfos` 和 VID 归属校验。当前批量创建依赖 VDA 原始格式决定 `Format`、`MediaType` 和资产组大小统计。\n\n涉及空间创建时，需要同时考虑三套资源状态：服务树资源、IAM 资源、account 账户。当前创建流程不是事务式的，任一步失败都会返回错误，但已经创建成功的上游资源不会自动回滚。","mdap-hive-source-import":"# MDAP Hive Source Import\n\n## 模块概览\n\nMDAP Hive Source Import 模块负责从 Hive 表读取 `vid` 列，并将这些 VID 批量导入为 MDAP Source。它由两部分组成：\n\n- [biz/handler/mdap_source_hive.go](/Users/bytedance/videoarch/general_console/biz/handler/mdap_source_hive.go)：HTTP 入口、请求校验、异步导入编排、Hive 行结果到批量创建请求的转换。\n- [biz/handler/mdap_source_hive_tqs.go](/Users/bytedance/videoarch/general_console/biz/handler/mdap_source_hive_tqs.go)：基于 TQS 的 `HiveVIDReader` 实现，负责构造 Hive SQL、提交 TQS 查询、轮询状态、解析结果。\n\n模块的输入是 `ImportMDAPSourcesFromHiveRequest`，核心字段包括 `AssetGroupID`、`VODSpaces`、`HiveTable`、可选 `SourceConfig`、`Tags` 和 `Options`。Hive 表必须包含名为 `vid` 的列，列名由常量 `hiveImportVIDColumn` 固定为 `\"vid\"`。\n\n## 入口与执行流程\n\nHTTP handler 是 `GeneralConsoleServer.ImportMDAPSourcesFromHive`，它通过 `middleware.MDAPResponse` 统一包装响应，并把实际逻辑交给 `handleImportMDAPSourcesFromHive`。\n\n```mermaid\nflowchart TD\n    A[\"ImportMDAPSourcesFromHive\"] --> B[\"handleImportMDAPSourcesFromHive\"]\n    B --> C[\"normalizeHiveImportRequest\"]\n    C --> D{\"DryRun?\"}\n    D -- \"是\" --> E[\"runHiveImportDryRunPrecheck\"]\n    E --> F[\"HiveVIDReader.PrecheckVIDs\"]\n    D -- \"否\" --> G[\"prepareMDAPSourceBatchCreateForHive\"]\n    G --> H[\"resolveHiveImportSourceConfig\"]\n    H --> I[\"startHiveImportInBackground\"]\n    I --> J[\"runHiveImportBackground\"]\n```\n\n`handleImportMDAPSourcesFromHive` 的行为分为两条路径：\n\n1. `Options.DryRun == true`  \n   只校验 Hive 查询是否可分析执行，不读取完整数据，也不创建 Source。成功后返回空 `Summary` 和空 `Results`。\n\n2. `Options.DryRun == false`  \n   校验资产组、VOD 空间、SourceConfig 后，启动后台导入任务，并立即返回成功响应。实际 Hive 读取和批量创建在 `runHiveImportBackground` 中执行。\n\n注意：非 DryRun 的返回响应不包含最终导入结果。后台任务只通过日志记录读取、创建、失败和汇总信息。\n\n## 请求归一化与校验\n\n`normalizeHiveImportRequest` 负责把外部请求转换为内部使用的 `normalizedHiveImportRequest`。\n\n主要校验规则：\n\n- 非 DryRun 必须提供非空 `AssetGroupID`。\n- 非 DryRun 必须提供至少一个非空 `VODSpaces`。\n- `HiveTable.Cluster`、`HiveTable.Database`、`HiveTable.Table` 必须非空。\n- 非 DryRun 时 `HiveTable.Partitions` 必须非空。\n- DryRun 允许 `Partitions` 为空。\n- 非 DryRun 如果显式传入 `SourceConfig`，其 `Type` 必须是 `mdap_model.SourceType_VDA`。\n- `Options.SkipCheckMediaType` 默认值为 `true`。\n\n归一化工具函数包括：\n\n- `normalizeNonEmptyStrings`：去除字符串数组中的空白项。\n- `normalizeStringMap`：裁剪 map 的 key/value，过滤空 key 或空 value，最终为空时返回 `nil`。\n- `normalizeHiveTableConfig`：归一化 Hive 表配置并执行必填校验。\n- `normalizeHiveImportOptions`：生成 `hiveImportEffectiveOptions`。\n\n## SourceConfig 解析\n\n非 DryRun 导入需要一个 VDA 类型的 `SourceConfig`。解析逻辑在 `resolveHiveImportSourceConfig` 中：\n\n- 如果请求传入了 `SourceConfig`，直接使用它。\n- 如果请求未传入，则从 `group.SourceConfigs[0]` 取默认配置。\n- 最终配置的 `Type` 必须是 `mdap_model.SourceType_VDA`。\n- 如果资产组没有可用 SourceConfig，会返回 `sourceConfig is empty` 的 BadRequest。\n\n资产组准备由 `prepareMDAPSourceBatchCreateForHive` 完成。默认调用已有的 `prepareMDAPSourceBatchCreate`，测试或特殊场景可通过 `svr.mdapSourceBatchPreparer` 注入替代实现。\n\n## 后台导入流程\n\n`startHiveImportInBackground` 会启动后台任务：\n\n- 如果配置了 `svr.hiveImportAsyncRunner`，使用该 runner 执行。\n- 否则直接 `go run()`。\n- 后台任务使用 `context.Background()`，不会继承 HTTP 请求上下文取消。\n\n实际导入逻辑在 `runHiveImportBackground` 中：\n\n1. 调用 `svr.getHiveVIDReader().ReadVIDs` 读取 Hive VID。\n2. 使用 `buildHiveImportResults` 将 Hive 行转换为导入结果和候选项。\n3. 如果没有有效候选 VID，记录日志并结束。\n4. 使用 `buildHiveImportBatchRequest` 构造 `BatchCreateMDAPSourceRequest`。\n5. 调用 `runMDAPSourceBatchCreator` 批量创建 MDAP Source。\n6. 使用 `extractBatchCreateMDAPSourceResponse` 解析批量创建响应。\n7. 使用 `mergeHiveImportBatchResults` 合并每条 VID 的创建结果并更新汇总。\n\n默认批量创建路径会调用：\n\n```go\nsvr.batchCreateMDAPSourcesWithGroupOptions(\n    ctx,\n    req,\n    group,\n    batchCreateMDAPSourceOptions{dedupeIdenticalSources: false},\n)\n```\n\n这里显式关闭 `dedupeIdenticalSources`。因此 Hive 中重复 VID 不会在本模块内去重，也不会在批量创建入口被合并。\n\n## Hive 行分类规则\n\n`buildHiveImportResults` 负责把 `[]HiveVIDRow` 转换为：\n\n- `[]*HiveImportResult`\n- `[]hiveImportCandidate`\n- `HiveImportSummary`\n\n每行都会生成一个 `HiveImportResult`。字段含义：\n\n- `Index`：当前行在读取结果中的 0 基下标。\n- `RowNumber`：优先使用 `HiveVIDRow.RowNumber`；如果小于等于 0，则使用 `i + 1`。\n- `VID`：裁剪空白后的 VID。\n- `Status`：后续根据结果设置为 `invalid`、`created`、`skipped` 或 `failed`。\n- `Reason`：失败、跳过或非法原因。\n- `Source`：创建成功后填充批量创建返回的 `mdap_model.Source`。\n\n分类规则：\n\n- 空 VID：`Status = \"invalid\"`，`Reason = \"empty_vid\"`，计入 `EmptyVIDRows`，不会提交创建。\n- 非空 VID：都会加入候选列表，即使是重复 VID。\n- 重复 VID：计入 `DuplicateVIDRows`，但仍然提交创建。\n- `UniqueVIDs` 只统计首次出现的非空 VID 数量。\n- `TotalRows` 等于 Hive 返回行数。\n\n## 批量创建请求构造\n\n`buildHiveImportBatchRequest` 会把每个 `hiveImportCandidate` 转成一个 `BatchCreateMDAPSourceItem`：\n\n```go\nBatchCreateMDAPSourceItem{\n    BizID:        candidate.vid,\n    Name:         candidate.vid,\n    SourceConfig: req.sourceConfig,\n    Tags:         req.tags,\n}\n```\n\n最终生成的 `BatchCreateMDAPSourceRequest` 包含：\n\n- `AssetGroupID`\n- `VODSpaces`\n- `Sources`\n- `SkipCheckMediaType`\n\n`SkipCheckMediaType` 默认是 `true`，除非请求里通过 `Options.SkipCheckMediaType` 显式覆盖。\n\n## 批量创建结果合并\n\n`mergeHiveImportBatchResults` 使用批量创建响应中的 `Index` 字段，将 `BatchCreateMDAPSourceResult` 映射回候选 VID。\n\n合并规则：\n\n- 找不到对应 batch result：标记为 `failed`，`Reason = \"missing_batch_result\"`。\n- `batchResult.Source != nil`：标记为 `created`，并写入 `Name` 和 `Source`。\n- `batchResult.Source == nil`：\n  - 如果 `batchResult.Error` 包含 `\"sourceMediaType\"`，`isHiveImportSkippedBatchError` 会将其判定为 `skipped`。\n  - 其他错误标记为 `failed`。\n- `SubmittedVIDs` 等于候选 VID 数量，不包含空 VID 行。\n\n## HiveVIDReader 抽象\n\n模块通过接口 `HiveVIDReader` 解耦 Hive 读取实现：\n\n```go\ntype HiveVIDReader interface {\n    PrecheckVIDs(ctx context.Context, req HiveVIDReadRequest) error\n    ReadVIDs(ctx context.Context, req HiveVIDReadRequest) (*HiveVIDReadResult, error)\n}\n```\n\n`getHiveVIDReader` 会返回：\n\n- `svr.hiveVIDReader`，如果服务上已经配置；\n- 否则返回 `notConfiguredHiveVIDReader`。\n\n`notConfiguredHiveVIDReader` 的 `PrecheckVIDs` 和 `ReadVIDs` 都会返回 `\"hive vid reader is not configured\"`，用于避免空指针并明确暴露配置缺失。\n\n## TQS 读取实现\n\n`TQSHiveVIDReader` 是当前模块提供的 TQS 实现。它通过 `NewTQSHiveVIDReaderFromConfig` 从 `config.TQSConfig` 创建：\n\n```go\nreader := NewTQSHiveVIDReaderFromConfig(cfg, servicePSM...)\n```\n\n配置归一化由 `normalizeTQSHiveVIDReaderConfig` 完成。必填字段包括：\n\n- `AppID`\n- `AppKey`\n- `UserName`\n- `Cluster`\n- `Timeout`\n\n如果 `PollInterval` 小于等于 0，会使用 `defaultTQSPollInterval`，即 3 秒。\n\n`servicePSM` 通过 `normalizeTQSServicePSM` 解析，未传时使用默认值：\n\n```go\ndefaultTQSServicePSM = \"toutiao.videoarch.general_console\"\n```\n\n### TQS 查询准备\n\n`prepareTQSQueryJob` 是 `ReadVIDs` 和 `PrecheckVIDs` 的共同准备路径：\n\n1. 调用 `buildTQSHiveVIDSQL` 构造 SQL。\n2. 调用 `validateQueueConfig` 校验离线队列配置。\n3. 调用 `r.newClient` 创建 TQS client。\n4. 调用 `r.getToken` 获取 I
