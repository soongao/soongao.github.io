var PAGES = {"barrier-and-finalization":"# Barrier and Finalization\n\n## 模块定位\n\nBarrier and Finalization 模块负责在一个 job 的所有 Reader 都完成后，触发 Writer 侧收尾动作。\n\n核心流程是：\n\n1. `barrier.Watcher.Start` 周期扫描活跃 job。\n2. `barrier.AllReadersDone` 判断某个 job 下的 reader 集合是否非空且全部为 `types.WorkerStateDone`。\n3. `store.SetNXBarrierFired` 用 Redis `SETNX` 语义保证同一个 job 的 barrier 只触发一次。\n4. job 状态被推进到 `types.JobStateFinalizing`。\n5. 注入的 `finalizer.Finalizer.FanOut` 按 bucket 调用 Writer 服务的 `MarkBucketDone`。\n\n```mermaid\nflowchart TD\n    A[\"Watcher.Start\"] --> B[\"tick\"]\n    B --> C[\"store.ActiveJobIDs\"]\n    B --> D[\"AllReadersDone\"]\n    D --> E[\"store.AllReaderStatuses\"]\n    B --> F[\"store.SetNXBarrierFired\"]\n    F --> G[\"store.SetJobState(FINALIZING)\"]\n    G --> H[\"Finalizer.FanOut\"]\n    H --> I[\"WriterRPCClient.MarkBucketDone\"]\n```\n\n## `internal/barrier`\n\n`internal/barrier` 维护 Reader-Done Barrier 的后台协程。它不直接依赖 Writer RPC，而是通过本包定义的接口注入最终动作：\n\n```go\ntype Finalizer interface {\n\tFanOut(ctx context.Context, jobID string) error\n}\n```\n\n当前实际实现由 `internal/finalizer.Finalizer` 提供，并在 `cmd/main.go` 中组装。\n\n### `Watcher`\n\n`Watcher` 是 barrier 的运行实体：\n\n```go\ntype Watcher struct {\n\tst        *store.Store\n\tcfg       *config.Config\n\tfinalizer Finalizer\n}\n```\n\n通过 `New(st, cfg, fin)` 构造。`Watcher` 本身只持有三类依赖：\n\n- `store.Store`：读取活跃 job、reader 状态，并写入 barrier/job 状态。\n- `config.Config`：读取 barrier 检查间隔。\n- `Finalizer`：barrier 触发后的 fan-out 动作。\n\n### `Start`\n\n`Start(ctx)` 是阻塞式后台循环，通过 `ctx.Done()` 停止：\n\n```go\nfunc (w *Watcher) Start(ctx context.Context)\n```\n\n检查间隔来自 `cfg.Barrier.CheckIntervalSec`，当配置小于等于 0 时回退到 `10s`。每次 ticker 触发后调用 `w.tick(ctx)`。\n\n这个函数适合在服务启动阶段以 goroutine 形式运行，例如由 `cmd/main.go` 创建 `Watcher` 后启动。\n\n### `tick`\n\n`tick(ctx)` 是单轮扫描逻辑：\n\n1. 调用 `w.st.ActiveJobIDs(ctx)` 获取当前活跃 job。\n2. 对每个 `jobID` 调用 `AllReadersDone(ctx, w.st, jobID)`。\n3. 若 reader 全部完成，调用 `w.st.SetNXBarrierFired(ctx, jobID)`。\n4. 只有 `SetNXBarrierFired` 返回 `ok == true` 时才继续执行 fan-out。\n5. 写入 `types.JobStateFinalizing`。\n6. 调用 `w.finalizer.FanOut(ctx, jobID)`。\n\n`SetNXBarrierFired` 是这里的幂等关键点。即使多个 control panel 实例同时运行，只有一个实例能成功设置 `cp:job:{jobId}:barrier_fired`，从而避免重复触发 Writer fan-out。\n\n需要注意：`SetJobState` 的错误被忽略，`FanOut` 的错误只记录日志，不会重试整个 barrier。真正的调用重试发生在 finalizer 内部的单个 bucket dispatch 上。\n\n### `AllReadersDone`\n\n```go\nfunc AllReadersDone(ctx context.Context, st *store.Store, jobID string) bool\n```\n\n判定规则非常保守：\n\n- `st.AllReaderStatuses(ctx, jobID)` 出错，返回 `false`。\n- reader 状态集合为空，返回 `false`。\n- 只要有任意 reader 状态不是 `types.WorkerStateDone`，返回 `false`。\n- 只有集合非空且全部为 `types.WorkerStateDone`，返回 `true`。\n\n根据执行流，`AllReaderStatuses` 会继续读取 `KeyReaders` 对应集合，并通过 store 内部的 `effectiveWorkerStatus`、`isTerminalWorkerStatus` 计算有效 worker 状态。因此 barrier 依赖的是 store 层归一化后的 reader 状态，而不是直接扫描原始字段。\n\n## `internal/finalizer`\n\n`internal/finalizer` 在 barrier 触发后负责对 Writer 服务做 bucket 级 fan-out。它不直接创建 Writer RPC 客户端，而是依赖接口：\n\n```go\ntype WriterRPCClient interface {\n\tMarkBucketDone(ctx context.Context, endpoint string, bucketID int) error\n}\n```\n\n这样可以避免 `finalizer` 与 `writerrpc` 之间形成包循环，也便于测试时注入 mock。\n\n### `Finalizer`\n\n```go\ntype Finalizer struct {\n\tst  *store.Store\n\tcfg *config.Config\n\trpc WriterRPCClient\n}\n```\n\n通过 `New(st, cfg, rpc)` 构造。构造函数会显式校验依赖：\n\n- `st == nil` 返回 `finalizer: nil store`\n- `cfg == nil` 返回 `finalizer: nil config`\n- `rpc == nil` 返回 `finalizer: nil WriterRPCClient`\n\n这意味着服务启动时必须注入真实可用的 Writer RPC 实现，不能静默退化为空实现。\n\n### `FanOut`\n\n```go\nfunc (f *Finalizer) FanOut(ctx context.Context, jobID string) error\n```\n\n`FanOut` 是 finalization 的核心入口。执行过程如下：\n\n1. 调用 `f.st.BucketAssignAll(ctx, jobID)` 获取 job 的 bucket 分配。\n2. 如果读取失败，直接返回错误。\n3. 如果分配为空，返回 `empty bucket_assign`。\n4. 提取所有 bucket ID 并使用 `sort.Ints` 排序。\n5. 按 `cfg.Fanout.Concurrency` 控制并发，默认值为 `64`。\n6. 对每个 bucket 启动 goroutine：\n   - 调用 `f.st.RouterEndpoint(ctx, jobID, bid)` 找到 Writer endpoint。\n   - endpoint 为空时记录 warn，并计入 `dispatchFailed`。\n   - 调用 `f.callWithRetry(ctx, endpoint, bid)`。\n   - 调用失败时记录 error，并计入 `dispatchFailed`。\n7. 等待全部 goroutine 完成后记录汇总日志。\n\nbucket ID 排序保证 dispatch 的启动顺序稳定，但由于实际调用是并发 goroutine，Writer 侧接收顺序不保证严格递增。\n\n一个重要行为是：`FanOut` 会统计并记录 `dispatch_failed`，但在部分 bucket dispatch 失败时仍返回 `nil`。当前只有 `BucketAssignAll` 失败或 bucket 分配为空会让 `FanOut` 返回错误。调用方 `barrier.tick` 也只记录 `FanOut` 返回的错误，不会基于 `dispatch_failed` 做二次处理。\n\n### `callWithRetry`\n\n```go\nfunc (f *Finalizer) callWithRetry(ctx context.Context, endpoint string, bucketID int) error\n```\n\n`callWithRetry` 封装单个 bucket 的 Writer RPC 调用：\n\n- 最大重试次数来自 `cfg.Fanout.MaxRetries`，默认 `3`。\n- 单次 RPC 超时来自 `cfg.WriterRPC.TimeoutMs`，默认 `3s`。\n- 每次调用使用 `context.WithTimeout(ctx, timeout)`。\n- 调用目标是 `f.rpc.MarkBucketDone(callCtx, endpoint, bucketID)`。\n- 失败后使用指数退避：`200ms`, `400ms`, `800ms`...\n- 每次退避额外加入 `0-50ms` 抖动。\n- 如果外层 `ctx` 在退避期间取消，立即返回 `ctx.Err()`。\n\n`maxRetries` 表示总尝试次数，不是“失败后的额外重试次数”。例如配置为 `3` 时最多调用 `MarkBucketDone` 三次。\n\n## 幂等性与状态推进\n\nBarrier 的一次性语义由 store 层的 `SetNXBarrierFired` 提供。`tick` 中只有成功设置 barrier fired 标记的实例才会进入 finalization：\n\n```go\nok, err := w.st.SetNXBarrierFired(ctx, jobID)\nif err != nil {\n\t// 记录错误并跳过\n}\nif !ok {\n\t// 已有其他实例触发过\n}\n```\n\n成功触发后，`Watcher` 会把 job 状态写为 `types.JobStateFinalizing`，再执行 `Finalizer.FanOut`。这说明 job 状态推进发生在 fan-out 之前，而不是所有 Writer RPC 成功之后。\n\n## 错误处理模型\n\n这个模块整体采用“后台任务记录日志并继续扫描”的模式：\n\n- `ActiveJobIDs` 失败：本轮扫描结束。\n- `AllReaderStatuses` 失败：该 job 被视为未完成。\n- `SetNXBarrierFired` 失败：该 job 本轮跳过。\n- `SetJobState` 失败：错误被忽略，仍继续 fan-out。\n- `FanOut` 返回错误：barrier 记录 error，但 fired 标记已经写入。\n- 单个 bucket dispatch 失败：finalizer 记录 error 并计数，不影响其他 bucket。\n\n贡献代码时需要特别注意：`barrier_fired` 一旦写入，后续 `tick` 不会再次触发同一个 job 的 fan-out。若要改变失败恢复语义，需要同时设计 fired 标记、job 状态和 bucket dispatch 失败的补偿策略。\n\n## 与代码库其他部分的连接\n\n`cmd/main.go` 负责组装依赖：\n\n- 创建 `internal/finalizer.Finalizer`。\n- 创建 `internal/barrier.Watcher`。\n- 调用 `Watcher.Start` 启动后台扫描。\n\n`internal/store` 提供 barrier 和 finalizer 所需的状态访问能力：\n\n- `ActiveJobIDs`\n- `AllReaderStatuses`\n- `SetNXBarrierFired`\n- `SetJobState`\n- `BucketAssignAll`\n- `RouterEndpoint`\n\n`internal/types` 提供状态常量：\n\n- `types.WorkerStateDone`\n- `types.JobStateFinalizing`\n\nWriter RPC 的真实实现位于 `internal/writerrpc`，但 `finalizer` 只知道 `WriterRPCClient` 接口，从而保持包依赖方向清晰。","client-example":"# Client Example\n\n## 模块定位\n\n`examples/hertz_client` 是 `uri_task_control_panel` 控制面的 Hertz HTTP 客户端调用示例。它不是服务端运行时的一部分，而是一个可执行 demo，用于验证控制面 API 的 happy path：\n\n1. 创建 Job：`POST /api/v1/jobs`\n2. 上报 Writer 心跳：`POST /api/v1/heartbeat`\n3. 上报 Writer bucket 进度：`POST /api/v1/report_progress`\n4. 查询 Job 聚合详情：`GET /api/v1/jobs/{job_id}`\n5. 上报告警：`POST /api/v1/alert`\n\n该模块集中展示了两类接入方式：\n\n- 如何用 Hertz `client.Client` 调用控制面 HTTP API。\n- 如何复用 `internal/types` 中的 DTO 结构构造请求和解析响应。\n\n## 运行方式\n\n默认访问本地控制面服务：\n\n```bash\ngo run ./examples/hertz_client\n```\n\n通过环境变量指定服务地址：\n\n```bash\nBASE_URL=http://uri-task-control-panel.bytedance.net go run ./examples/hertz_client\n```\n\n通过命令行参数指定服务地址：\n\n```bash\ngo run ./examples/hertz_client -base-url http://127.0.0.1:8090\n```\n\n`defaultBaseURL()` 会优先读取 `BASE_URL` 环境变量；如果未设置，则回退到 `http://127.0.0.1:8090`。\n\n## 执行流程\n\n`main()` 是唯一入口，负责创建 Hertz client、设置全局超时上下文，并串行执行五个 demo 函数。前一步的输出会影响后续步骤：`demoCreateJob()` 返回的 `jobID` 会传入心跳、进度、详情查询和告警上报。\n\n```mermaid\nflowchart TD\n    A[\"main\"] --> B[\"defaultBaseURL\"]\n    A --> C[\"demoCreateJob\"]\n    C --> D[\"返回 jobID\"]\n    D --> E[\"demoHeartbeat\"]\n    D --> F[\"demoReportProgress\"]\n    D --> G[\"demoGetJobDetail\"]\n    D --> H[\"demoAlert\"]\n    C --> I[\"doJSON\"]\n    E --> I\n    F --> I\n    G --> I\n    H --> I\n```\n\n`main()` 使用：\n\n```go\nctx, cancel := context.WithTimeout(context.Background(), 15*time.Second)\n```\n\n因此整个 demo 链路共享 15 秒超时。任一步骤返回错误时都会通过 `logs.Fatal` 终止进程。\n\n## 响应 Envelope 解析\n\n控制面接口统一返回类似结构：\n\n```json\n{\n  \"code\": 0,\n  \"message\": \"ok\",\n  \"data\": {}\n}\n```\n\n客户端用本地 `Envelope` 对应服务端响应结构：\n\n```go\ntype Envelope struct {\n    Code    int             `json:\"code\"`\n    Message string          `json:\"message\"`\n    Data    json.RawMessage `json:\"data,omitempty\"`\n}\n```\n\n`Data` 使用 `json.RawMessage` 延迟解析，原因是不同接口的 `data` 结构不同，例如：\n\n- `types.CreateJobResponse`\n- `types.HeartbeatResponse`\n- `types.ProgressResponse`\n- `types.JobDetailResponse`\n- `map[string]bool`\n\n泛型函数 `parseEnvelope[T any]` 封装了解析逻辑：\n\n```go\nenv, data, err := parseEnvelope[types.CreateJobResponse](raw)\n```\n\n它按顺序完成三件事：\n\n1. 将 HTTP body 解析为 `Envelope`。\n2. 检查 `env.Code`，非 `0` 时返回业务错误。\n3. 如果 `data` 非空且不是 `null`，再反序列化为调用方指定的类型 `T`。\n\n这让每个 demo 函数只需要关心自己的响应 DTO，而不用重复处理统一响应壳。\n\n## HTTP 调用封装\n\n`doJSON()` 是本模块唯一的 HTTP helper：\n\n```go\nfunc doJSON(ctx context.Context, cli *client.Client, method, url string, body []byte) ([]byte, error)\n```\n\n它完成以下工作：\n\n- 使用 `protocol.AcquireRequest()` 和 `protocol.AcquireResponse()` 获取 Hertz 协议对象。\n- 设置 HTTP method、URL 和 `application/json` content type。\n- 当 `body` 非空时设置请求体。\n- 调用 `cli.Do(ctx, req, resp)` 发送请求。\n- 要求 HTTP status 必须是 `200 OK`。\n- 复制响应 body 后返回，避免 `ReleaseResponse()` 后底层内存被复用。\n\n由于 `doJSON()` 只返回原始 body，业务响应解析统一交给 `parseEnvelope[T]`。这种拆分让 HTTP 传输错误、HTTP 状态码错误和业务码错误分别在不同层处理。\n\n## Job 创建示例\n\n`demoCreateJob()` 构造 `types.CreateJobRequest`，调用：\n\n```go\nPOST {base}/api/v1/jobs\n```\n\n请求中覆盖了控制面创建任务所需的主要配置：\n\n- `SourceType`: 使用 `types.SourceTypeHDFSParquet`\n- `Source`: 通过 `types.SourceSpec` 描述 HDFS 输入路径、文件 glob 和 URI 字段提取规则\n- `Output`: 通过 `types.OutputSpec` 描述 HDFS 输出目录和分区\n- `Bucketing`: 使用 `types.BucketingSpec` 配置 bucket 数、hash 算法和 seed\n- `Concurrency`: 使用 `types.ConcurrencySpec` 配置 writer/reader 数量\n- `ReaderRuntime`: 使用 `types.ReaderRuntimeSpec` 和 `types.ReaderLimitsSpec` 配置 reader worker 限制\n- `Sink`: 使用 `types.ReaderSinkSpec` 配置 reader 到 writer 的 RPC sink，以及 Redis 队列信息\n\n响应解析为 `types.CreateJobResponse`：\n\n```go\nenv, data, err := parseEnvelope[types.CreateJobResponse](raw)\n```\n\n函数会校验 `data.JobID` 非空，并将其返回给后续 demo 步骤。这里的 `jobID` 是整个示例链路的关键上下文。\n\n## Writer 心跳示例\n\n`demoHeartbeat()` 构造 `types.HeartbeatRequest`，调用：\n\n```go\nPOST {base}/api/v1/heartbeat\n```\n\n请求模拟一个 Writer 实例存活上报：\n\n```go\ntypes.HeartbeatRequest{\n    JobID:     jobID,\n    Kind:      \"writer\",\n    WriterID:  \"writer-demo-0\",\n    IP:        \"127.0.0.1\",\n    Port:      9100,\n    Buckets:   []int32{0, 1, 2, 3},\n    Timestamp: time.Now().UTC(),\n}\n```\n\n响应解析为 `types.HeartbeatResponse`，主要读取 `NextIntervalSec`，用于展示服务端建议的下一次心跳间隔。\n\n## 进度上报示例\n\n`demoReportProgress()` 构造 `types.ProgressRequest`，调用：\n\n```go\nPOST {base}/api/v1/report_progress\n```\n\n它模拟 Writer 对单个 bucket 的处理进度上报。核心字段在 `types.BucketProgress` 中：\n\n- `BucketID`\n- `Status`\n- `TotalUrisReceived`\n- `BytesReceived`\n- `RunFilesGenerated`\n- `PeakLocalDiskUsageMb`\n- `MergeProgress`\n- `HDFSWriteProgress`\n- `LastUpdateTime`\n\n响应解析为 `types.ProgressResponse`，并读取 `Ack` 表示服务端确认收到进度。\n\n## Job 详情查询示例\n\n`demoGetJobDetail()` 调用：\n\n```go\nGET {base}/api/v1/jobs/{job_id}\n```\n\n该接口不需要请求体，因此传给 `doJSON()` 的 body 为 `nil`：\n\n```go\nraw, err := doJSON(ctx, cli, consts.MethodGet, url, nil)\n```\n\n响应解析为 `types.JobDetailResponse`，示例日志会输出：\n\n- `data.State`\n- `data.Summary.BucketsTotal`\n- `len(data.Writers)`\n- `len(data.Readers)`\n\n这个步骤用于确认前面创建任务、心跳和进度上报是否已经反映到聚合详情中。\n\n## 告警上报示例\n\n`demoAlert()` 构造 `types.AlertRequest`，调用：\n\n```go\nPOST {base}/api/v1/alert\n```\n\n请求模拟 Writer 异常告警：\n\n```go\ntypes.AlertRequest{\n    JobID:     jobID,\n    Kind:      \"writer\",\n    WriterID:  \"writer-demo-0\",\n    Message:   \"demo alert from hertz_client example\",\n    Timestamp: time.Now().UTC(),\n}\n```\n\n响应的业务 `data` 是简单对象 `{ \"ack\": true }`，因此解析为：\n\n```go\nenv, data, err := parseEnvelope[map[string]bool](raw)\n```\n\n这里展示了 `parseEnvelope[T]` 不要求响应一定是强类型 DTO；当接口响应很简单时，也可以直接使用 map。\n\n## 与代码库其他模块的关系\n\n`examples/hertz_client` 依赖 `internal/types` 中定义的请求和响应 DTO，而不是自己声明 API schema。这保证示例客户端与服务端控制面接口共享同一套字段定义。\n\n主要依赖关系包括：\n\n- `types.CreateJobRequest`\n- `types.CreateJobResponse`\n- `types.SourceSpec`\n- `types.SourceExtractSpec`\n- `types.OutputSpec`\n- `types.BucketingSpec`\n- `types.ConcurrencySpec`\n- `types.ReaderRuntimeSpec`\n- `types.ReaderLimitsSpec`\n- `types.ReaderSinkSpec`\n- `types.ReaderSinkRedisSpec`\n- `types.HeartbeatRequest`\n- `types.HeartbeatResponse`\n- `types.ProgressRequest`\n- `types.ProgressResponse`\n- `types.BucketProgress`\n- `types.JobDetailResponse`\n- `types.AlertRequest`\n\n当控制面 API DTO 发生字段变更时，这个 example 通常也需要同步调整。它可以作为手动联调入口，也可以作为开发者理解控制面 API 调用顺序的最小参考实现。\n\n## 扩展建议\n\n新增接口示例时，建议沿用当前模式：\n\n```go\nfunc demoSomething(ctx context.Context, cli *client.Client, base string, jobID string) error {\n    req := types.SomeRequest{\n        JobID: jobID,\n    }\n    body, _ := json.Marshal(req)\n\n    raw, err := doJSON(ctx, cli, consts.MethodPost, base+\"/api/v1/something\", body)\n    if err != nil {\n        return err\n    }\n\n    env, data, err := parseEnvelope[types.SomeResponse](raw)\n    if err != nil {\n        return err\n    }\n\n    logs.Info(\"[hertz_client] something ok code=%d msg=%s data=%v\", env.Code, env.Message, data)\n    return nil\n}\n```\n\n保持三个约定：\n\n1. 请求结构优先使用 `internal/types` 中已有 DTO。\n2. HTTP 调用统一走 `doJSON()`。\n3. Envelope 响应统一用 `parseEnvelope[T]` 解析。","configuration":"# Configuration\n\n## 配置模块\n\n配置模块位于 `internal/config/config.go`，负责加载 `uri_task_control_panel` 的运行期配置，并为 Redis、心跳、Barrier、fan-out、Job、Writer RPC、Lambda 和 StorageGW 等子系统提供统一配置入口。\n\n该模块的核心类型是 `Config`，核心生命周期是：\n\n1. `NewConfig(dir)` 创建未初始化的配置对象。\n2. `(*Config).Init()` 连接 TCC，并通过 `caesar.Unmarshal` 合并本地 YAML 与 TCC 配置。\n3. `applyDefaults()` 补齐历史配置缺失字段。\n4. `validate()` 校验关键字段，避免服务以危险的零值启动。\n\n```mermaid\nflowchart TD\n    主程序[\"cmd/main.go\"] --> 创建配置[\"NewConfig(dir)\"]\n    创建配置 --> 配置对象[\"*Config\"]\n    主程序 --> 初始化[\"Config.Init()\"]\n    初始化 --> TCC[\"创建 tccclient.ClientV2\"]\n    初始化 --> 合并配置[\"caesar.Unmarshal\"]\n    合并配置 --> 默认值[\"applyDefaults()\"]\n    默认值 --> 校验[\"validate()\"]\n    校验 --> 运行期使用[\"业务模块读取 Config 字段\"]\n```\n\n## 设计目标\n\n配置加载遵循 `videoarch/asuna` 风格：\n\n- 本地配置作为基线兜底：`conf/base.yml` 和 `conf/{PSM}.yaml`\n- TCC 提供在线下发与热更新配置源\n- `caesar_config/v4` 负责本地 YAML 与 TCC 值的合并反序列化\n- 模块自身只维护结构定义、默认值和合法性校验\n\n历史版本曾基于环境变量加载配置，当前实现已经切换到本地 YAML + TCC 的组合方式。环境变量仍用于确定当前服务身份，例如 `env.PSM()` 和 `env.Cluster()`。\n\n## 核心类型\n\n### `Config`\n\n`Config` 是控制面的顶层运行期配置对象：\n\n```go\ntype Config struct {\n    dir string\n\n    Redis     Redis     `yaml:\"Redis\"`\n    Heartbeat Heartbeat `yaml:\"Heartbeat\"`\n    Barrier   Barrier   `yaml:\"Barrier\"`\n    Fanout    Fanout    `yaml:\"Fanout\"`\n    Job       Job       `yaml:\"Job\"`\n    WriterRPC WriterRPC `yaml:\"WriterRPC\"`\n    Lambda    Lambda    `yaml:\"Lambda\"`\n    StorageGW StorageGW `yaml:\"StorageGW\"`\n\n    tcc *tccclient.ClientV2\n}\n```\n\n字段分为三类：\n\n- `dir`：本地配置目录，由 `NewConfig(dir)` 注入，供 `caesar.WithLocalBase(c.dir)` 使用。\n- 导出的子配置结构：业务模块通过这些字段读取运行参数。\n- `tcc`：TCC 客户端实例，由 `Init()` 创建并保存。\n\n`Config` 本身不封装 getter 方法，代码中直接读取结构字段。测试代码也按需直接构造 `Config`、`Heartbeat`、`Job`、`Barrier`、`Fanout`、`WriterRPC`、`StorageGW` 等结构。\n\n### `Redis`\n\nRedis 连接配置：\n\n```go\ntype Redis struct {\n    Cluster  string   `yaml:\"Cluster\"`\n    Addrs    []string `yaml:\"Addrs\"`\n    Password string   `yaml:\"Password\"`\n    DB       int      `yaml:\"DB\"`\n}\n```\n\n`Redis.Cluster` 是 `kv/goredis v5` 注册的集群名或 consul PSM。配置了 `Addrs` 时，`Cluster` 只作为 metrics tag 使用，不再依赖 consul 服务发现。\n\n`validate()` 要求 `Redis.Cluster` 和 `Redis.Addrs` 至少配置一个：\n\n```go\nif c.Redis.Cluster == \"\" && len(c.Redis.Addrs) == 0 {\n    return errors.New(\"Redis.Cluster and Redis.Addrs are both empty\")\n}\n```\n\n### `Heartbeat`\n\n心跳相关阈值：\n\n```go\ntype Heartbeat struct {\n    TTLSec          int `yaml:\"TTLSec\"`\n    NextIntervalSec int `yaml:\"NextIntervalSec\"`\n}\n```\n\n默认值：\n\n- `TTLSec`: `90`\n- `NextIntervalSec`: `30`\n\n这些字段会被 barrier、collector、store 相关逻辑使用。测试中 `internal/barrier/barrier_test.go`、`internal/api/handlers_test.go`、`internal/collector/collector_test.go` 和 `internal/finalizer/finalizer_test.go` 都直接构造或读取该配置。\n\n### `Barrier`\n\nReader-Done Barrier 后台扫描配置：\n\n```go\ntype Barrier struct {\n    CheckIntervalSec int `yaml:\"CheckIntervalSec\"`\n}\n```\n\n默认值：\n\n- `CheckIntervalSec`: `10`\n\n`internal/barrier` 的 watcher 流程依赖该扫描间隔。\n\n### `Fanout`\n\nfan-out 执行 `MarkBucketDone` 的并发与重试配置：\n\n```go\ntype Fanout struct {\n    Concurrency int `yaml:\"Concurrency\"`\n    MaxRetries  int `yaml:\"MaxRetries\"`\n}\n```\n\n默认值：\n\n- `Concurrency`: `64`\n- `MaxRetries`: `3`\n\n`internal/finalizer` 的 fan-out 测试会构造该配置，用于验证缺失 endpoint 或 RPC 失败时不会错误标记 bucket 失败。\n\n### `Job`\n\nJob 元数据配置：\n\n```go\ntype Job struct {\n    TTLSec int `yaml:\"TTLSec\"`\n}\n```\n\n默认值：\n\n- `TTLSec`: `604800`\n\n该值用于 Job 元数据 TTL，当前默认等于 7 天。\n\n### `WriterRPC`\n\n调用 Writer 服务的 KiteX 客户端配置：\n\n```go\ntype WriterRPC struct {\n    PSM       string `yaml:\"PSM\"`\n    TimeoutMs int    `yaml:\"TimeoutMs\"`\n}\n```\n\n`PSM` 是 Kitex 逻辑服务名，例如 `bytedance.videoarch.uri_writer`。fan-out 实际会通过 `WithHostPorts(endpoint)` 精确路由，不依赖服务发现。\n\n默认值：\n\n- `TimeoutMs`: `3000`\n\n`validate()` 要求：\n\n- `WriterRPC.TimeoutMs > 0`\n- `WriterRPC.PSM` 非空\n\n### `Lambda`\n\n创建 Reader/Writer FaaS 实例所需的网关参数：\n\n```go\ntype Lambda struct {\n    GatewayURL           string `yaml:\"GatewayURL\"`\n    ReaderFunction       string `yaml:\"ReaderFunction\"`\n    WriterFunction       string `yaml:\"WriterFunction\"`\n    Qualifier            string `yaml:\"Qualifier\"`\n    InvokeType           string `yaml:\"InvokeType\"`\n    TimeoutMs            int    `yaml:\"TimeoutMs\"`\n    ControlPlaneEndpoint string `yaml:\"ControlPlaneEndpoint\"`\n    ControlPlanePSM      string `yaml:\"ControlPlanePSM\"`\n    ControlPlaneCluster  string `yaml:\"ControlPlaneCluster\"`\n}\n```\n\n默认值：\n\n- `GatewayURL`: `https://boe-v-lambda.bytedance.net/lambda/apis/gateway/v1/invoke`\n- `ReaderFunction`: `uri_source_reader`\n- `WriterFunction`: `uri_writer`\n- `Qualifier`: `prod`\n- `InvokeType`: `async`\n- `TimeoutMs`: `5000`\n- `ControlPlanePSM`: `env.PSM()`\n- `ControlPlaneCluster`: `env.Cluster()`\n\n`ControlPlaneEndpoint` 没有默认值，也没有在 `validate()` 中强制非空。\n\n### `StorageGW`\n\nTOS root 扫描使用的存储网关配置：\n\n```go\ntype StorageGW struct {\n    AccessKey    string `yaml:\"AccessKey\"`\n    SecretKey    string `yaml:\"SecretKey\"`\n    PSM          string `yaml:\"PSM\"`\n    Cluster      string `yaml:\"Cluster\"`\n    IDC          string `yaml:\"IDC\"`\n    ListPageSize int    `yaml:\"ListPageSize\"`\n}\n```\n\n默认值：\n\n- `PSM`: `env.PSM()`\n- `ListPageSize`: `1000`\n\n`validate()` 要求：\n\n- `StorageGW.PSM` 非空\n- `StorageGW.ListPageSize > 0`\n- `StorageGW.AccessKey` 和 `StorageGW.SecretKey` 必须同时配置或同时为空\n\n文件扫描相关测试会直接使用 `StorageGW`，例如 `TestSDKFileScannerScanTOSFilesPaginatesAndSkipsMarkers` 和 `TestSDKFileScannerScanTOSFilesRequiresCredential`。\n\n## 初始化流程\n\n### `NewConfig`\n\n```go\nfunc NewConfig(dir string) *Config {\n    return &Config{dir: dir}\n}\n```\n\n`NewConfig` 只保存本地配置目录，不执行 IO，也不连接 TCC。主程序负责传入配置目录，调用方通常来自 `cmd/main.go`。\n\n### `Init`\n\n```go\nfunc (c *Config) Init() error\n```\n\n`Init()` 是完整配置加载入口，执行顺序固定：\n\n1. 创建 TCC 配置：\n   - `tccclient.NewConfigV2()`\n   - `cfg.Confspace = env.Cluster()`\n   - `cfg.SetFirstGetTimeout(time.Second * 2)`\n\n2. 创建 TCC 客户端：\n   - `tccclient.NewClientV2(env.PSM(), cfg)`\n\n3. 合并反序列化配置：\n   - `caesar.Unmarshal(c, caesar.WithLocalBase(c.dir), caesar.WithConfigGetter(tcc.Get))`\n\n4. 打印配置日志：\n   - `logs.Info(\"conf %#v\", c)`\n\n5. 应用默认值：\n   - `c.applyDefaults()`\n\n6. 校验配置：\n   - `return c.validate()`\n\n如果 TCC 客户端创建失败，`Init()` 直接返回错误。  \n如果 `caesar.Unmarshal` 失败，会先调用 `logs.Fatal(\"load config error: %s\", err.Error())`，然后返回该错误。最终是否 panic 由 `main` 决定。\n\n## 默认值策略\n\n`applyDefaults()` 的目标是兼容老 YAML 中缺失的新字段，并避免零值带来的危险行为，例如 TTL 为 0、并发数为 0、超时时间为 0。\n\n该函数只在字段为空或小于等于 0 时补默认值，不覆盖已经加载到的有效配置：\n\n```go\nif c.Fanout.Concurrency <= 0 {\n    c.Fanout.Concurrency = 64\n}\n```\n\n字符串字段通常在为空时补齐，例如：\n\n```go\nif c.Lambda.ReaderFunction == \"\" {\n    c.Lambda.ReaderFunction = \"uri_source_reader\"\n}\n```\n\n默认值应用发生在 `caesar.Unmarshal` 之后、`validate()` 之前，因此最终校验检查的是“配置源 + 默认值”合并后的结果。\n\n## 校验规则\n\n`validate()` 负责阻止服务以无效配置启动。它返回第一个遇到的错误，不聚合多个错误。\n\n主要规则包括：\n\n- Redis 至少需要配置 `Cluster` 或 `Addrs`\n- 所有 TTL、间隔、并发、重试、超时、分页大小必须大于 0\n- `WriterRPC.PSM` 必须配置\n- Lambda 网关、函数名、版本标识、调用类型必须配置\n- `StorageGW.PSM` 必须配置\n- `StorageGW.AccessKey` 和 `StorageGW.SecretKey` 必须成对出现\n\n成对密钥校验使用异或式判断：\n\n```go\nif (c.StorageGW.AccessKey == \"\") != (c.StorageGW.SecretKey == \"\") {\n    return errors.New(\"StorageGW.AccessKey and StorageGW.SecretKey must be configured together\")\n}\n```\n\n这意味着以下配置合法：\n\n- 两者都为空：使用非显式 AK/SK 的认证方式\n- 两者都非空：显式配置访问凭证\n\n以下配置非法：\n\n- 只配置 `AccessKey`\n- 只配置 `SecretKey`\n\n## 与代码库其他模块的关系\n\n配置模块位于启动链路的前段。`cmd/main.go` 调用 `NewConfig` 和 `Init` 后，其他模块通过传入的 `*config.Config` 或子配置结构读取运行参数。\n\n主要使用方向包括：\n\n- API handler 测试通过 `Config`、`Heartbeat`、`Job` 构造测试服务。\n- Barrier watcher 使用 `Heartbeat`、`Barrier`、`Job` 控制心跳和扫描行为。\n- Collector 使用 `Config`、`Heartbeat`、`Job`。\n- Finalizer fan-out 使用 `Fanout`、`WriterRPC`、`Config`。\n- Job 文件扫描使用 `StorageGW` 控制存储网关访问和分页大小。\n- Job manager 使用 `Config` 创建作业流程。\n\n配置模块不反向依赖这些业务模块。它只提供数据结构、加载逻辑、默认值和校验规则。\n\n## 开发注意事项\n\n新增配置项时，应同时更新以下位置：\n\n1. 在合适的子配置结构中增加字段，并添加 `yaml` tag。\n2. 如果零值不可接受，在 `applyDefaults()` 中补默认值，或在 `validate()` 中强制要求显式配置。\n3. 如果字段是业务启动必需项，在 `validate()` 中返回清晰错误。\n4. 更新对应 YAML 配置和使用该字段的业务模块测试。\n\n不要直接依赖环境变量扩展新的业务配置。当前模块的加载范式是本地 YAML + TCC，环境变量主要用于服务身份和默认值推导，例如 `env.PSM()`、`env.Cluster()`。","http-api":"# HTTP API\n\n## 模块定位\n\n`internal/api` 提供控制面的 HTTP/JSON 接口层，基于 CloudWeGo Hertz 实现。它负责路由注册、请求绑定、基础参数校验、统一响应包装，以及把 HTTP 请求转发到任务管理、进度采集和 Redis 存储相关模块。\n\n核心入口是 `Server`：\n\n```go\ntype Server struct {\n\tcfg       *config.Config\n\tst        *store.Store\n\tjobMgr    *job.Manager\n\tcollector *collector.Collector\n}\n```\n\n`cmd/main.go` 通过 `NewServer(cfg, st, jobMgr, col)` 构造实例，再调用 `Register(h)` 注册路由。\n\n## 对外接口\n\n`Register` 注册 `/api/v1` 下的业务接口，以及独立的 `/health` 健康检查。\n\n| 方法 | 路径 | Handler | 说明 |\n|---|---|---|---|\n| `POST` | `/api/v1/jobs` | `handleCreateJob` | 创建一次写表任务 |\n| `GET` | `/api/v1/jobs` | `handleListJobs` | 查询 Redis 中仍保留的任务列表 |\n| `GET` | `/api/v1/jobs/:job_id` | `handleGetJob` | 查询单个任务聚合详情 |\n| `POST` | `/api/v1/heartbeat` | `handleHeartbeat` | Reader/Writer 心跳保活 |\n| `POST` | `/api/v1/report_progress` | `handleReportProgress` | Reader/Writer 进度上报 |\n| `POST` | `/api/v1/alert` | `handleAlert` | 异常告警上报 |\n| `POST` | `/api/v1/ops/purge_all_jobs` | `handlePurgeAllJobs` | 清理全部任务及关联元数据 |\n| `GET` | `/health` | 匿名函数 | 返回纯文本 `ok` |\n\n除 `/health` 外，接口统一返回：\n\n```json\n{\n  \"code\": 0,\n  \"message\": \"ok\",\n  \"data\": {}\n}\n```\n\n统一响应由 `Response`、`ok` 和 `fail` 实现。`ok` 固定返回 HTTP 200 且 `code=0`；`fail` 使用调用方传入的 HTTP 状态码和业务错误码。\n\n## 组件关系\n\n```mermaid\nflowchart LR\n    客户端[客户端] --> 路由[Hertz 路由]\n    路由 --> 服务[api.Server]\n    服务 --> 任务管理[job.Manager]\n    服务 --> 采集器[collector.Collector]\n    服务 --> 存储[store.Store]\n    存储 --> 聚合[buildJobList / buildJobDetail]\n    聚合 --> 响应[Response JSON]\n```\n\n`api.Server` 不直接实现任务调度或 Redis 命令细节，而是作为编排层连接这些模块：\n\n- `job.Manager`：由 `handleCreateJob` 调用，负责创建任务。\n- `collector.Collector`：由 `handleHeartbeat` 和 `handleReportProgress` 调用，负责写入心跳和进度。\n- `store.Store`：由查询、告警、清理接口调用，负责读取或写入 Redis 中的任务元数据、worker 状态、bucket 状态和告警列表。\n- `types`：定义请求和响应 DTO，是 HTTP API 的 JSON 合约来源。\n\n## 创建任务流程\n\n`handleCreateJob` 绑定 `types.CreateJobRequest`，然后调用 `s.jobMgr.CreateJob(ctx, &req)`。\n\n请求体主要由以下结构组成：\n\n- `SourceType`：数据源类型，当前 DTO 中包含 `types.SourceTypeHDFSParquet` 和 `types.SourceTypeTOSInventoryCSV`。\n- `Source` / `Sources`：输入源配置。\n- `Output`：输出 HDFS 目录和分区配置。\n- `Bucketing`：分桶数量、hash 算法和 Spark seed。\n- `Concurrency`：Writer 和 Reader 并发数。\n- `ReaderRuntime` / `WriterRuntime` / `Sink`：运行时覆盖参数。\n- `Callback`：回调通道配置。\n\n成功响应为 `types.CreateJobResponse`，包含 `job_id`、`state`、分桶数、worker 数和创建时间。\n\n错误处理：\n\n- 请求绑定失败：HTTP 400，`code=40001`\n- `job.Manager.CreateJob` 返回错误：HTTP 400，`code=40010`\n\n## 心跳与进度上报\n\n`handleHeartbeat` 处理 `types.HeartbeatRequest`：\n\n```go\ntype HeartbeatRequest struct {\n\tJobID     string    `json:\"job_id\"`\n\tKind      string    `json:\"kind\"`\n\tWriterID  string    `json:\"writer_id,omitempty\"`\n\tReaderID  string    `json:\"reader_id,omitempty\"`\n\tIP        string    `json:\"ip\"`\n\tPort      int       `json:\"port\"`\n\tBuckets   []int32   `json:\"buckets,omitempty\"`\n\tTimestamp time.Time `json:\"timestamp\"`\n}\n```\n\n它会额外校验 `job_id` 和 `kind` 非空，然后调用 `s.collector.Heartbeat`。成功后返回 `types.HeartbeatResponse`，其中 `next_interval_sec` 来自 `s.cfg.Heartbeat.NextIntervalSec`。\n\n`handleReportProgress` 处理 `types.ProgressRequest`，同样要求 `job_id` 和 `kind` 非空，然后调用 `s.collector.ReportProgress`。成功返回：\n\n```json\n{\n  \"ack\": true\n}\n```\n\nWriter 进度通过 `buckets` 上报，Reader 进度通过 `files`、`buckets_seen` 等字段上报。`ProgressRequest` 使用同一个 DTO 合并 Reader 和 Writer 两种形态，具体含义由 `kind`、`writer_id`、`reader_id` 区分。\n\n## 任务列表查询\n\n`handleListJobs` 调用 `buildJobList` 构造 `types.ListJobsResponse`。\n\n`buildJobList` 的处理步骤：\n\n1. 通过 `s.st.JobIDs(ctx)` 获取当前 Redis 中的任务 ID。\n2. 对每个任务调用 `s.st.JobMetaRaw(ctx, jobID)` 读取元数据。\n3. 从 Redis hash 字段中恢复 `state`、`num_buckets`、`num_writers`、`num_readers`、`create_time`、`finish_time`。\n4. 用 `parseJobConfigView(meta[\"request\"])` 解析创建请求快照，填充 `source_type`、`source_root`、`output_hdfs_dir`。\n5. 按 `create_time` 倒序排序；时间相同则按 `job_id` 升序。\n\n`jobListSourceRoot` 根据 `JobConfigView.SourceType` 选择列表页展示的源路径：\n\n- `hdfs_parquet` 使用 `cfg.Source.HDFSRoot`\n- `tos_inventory_csv` 使用 `cfg.Source.TOSCSVRoot`\n- 其他类型返回空字符串\n\n如果某个 job 的元数据读取失败，`buildJobList` 会跳过该 job，而不是让整个列表失败。\n\n## 单任务详情查询\n\n`handleGetJob` 查询 `/api/v1/jobs/:job_id`。它支持查询参数：\n\n```text\ninclude_buckets=true|false\n```\n\n解析由 `parseBoolQueryArg` 完成，默认值是 `false`。非法布尔值会返回 HTTP 400，`code=40002`。\n\n核心聚合逻辑在 `buildJobDetail(ctx, jobID, includeBuckets)`。\n\n### 轻量模式\n\n当 `include_buckets=false` 时，返回 `types.JobDetailLiteResponse`。该模式不会扫描 bucket 详情，因此适合列表跳转后的常规详情展示。\n\n轻量响应包含：\n\n- job 基础信息：`job_id`、`state`、`create_time`、`finish_time`\n- 输出路径：`hdfs_output_path`、`hdfs_temp_dir`\n- 创建请求快照：`config`\n- Reader 聚合进度：`files_total`、`files_done`、`rows_read`、`bytes_read`\n- Writer 轻量视图：`[]types.WriterLiteView`\n- Reader 视图：`[]types.WorkerView`\n\n### 完整 bucket 模式\n\n当 `include_buckets=true` 时，返回 `types.JobDetailResponse`。该模式会读取 bucket 分配和 bucket hash，额外构造：\n\n- `summary.buckets_pending`\n- `summary.buckets_running`\n- `summary.buckets_merging`\n- `summary.buckets_done`\n- `summary.buckets_failed`\n- 每个 Writer 的 `buckets`\n- 每个 Writer 的 `buckets_done`\n\n主要读取路径：\n\n1. `s.st.JobMetaRaw(ctx, jobID)` 读取任务元数据。\n2. `s.st.BucketAssignAll(ctx, jobID)` 读取 bucket 到 writer index 的分配关系。\n3. `s.st.BucketHashes(ctx, jobID, allBucketIDs)` 批量读取 bucket 进度。\n4. `buildWorkerBucketsFromHashes` 把 Redis hash 转为 `types.BucketProgress`。\n5. `applyBucketSummary` 按 bucket 状态聚合 summary。\n6. `s.st.ListWorkerIDs`、`s.st.ListReaderIDs` 获取 worker ID。\n7. `s.st.WorkerHashes` 批量读取 worker hash。\n8. 组装 Writer 和 Reader 视图。\n\n`buildJobDetail` 对部分 Redis 读取错误采取容错策略：除任务元数据外，worker、reader、bucket 的读取错误多数被忽略并表现为空数据或丢失状态。这让详情接口尽量返回可用信息，而不是因为局部进度缺失整体失败。\n\n## Worker 状态计算\n\nHTTP API 返回的 worker 状态不是简单透传 Redis 字段，而是经过 `effectiveDetailWorkerStatus` 修正。\n\n规则如下：\n\n- 空状态返回 `lost`。\n- `done` 和 `failed` 是终态，直接返回。\n- 没有心跳时间时：\n  - `booting` 保持 `booting`\n  - 其他状态视为 `lost`\n- 配置了 `ttlSec` 且 `now - lastHB > ttlSec` 时，视为 `lost`\n- 其他情况保持原状态\n\n这意味着详情页看到的 Writer/Reader 状态会反映心跳 TTL，而不是仅依赖最近一次上报的 `status`。\n\n## Bucket 进度聚合\n\n`buildWorkerBucketsFromHashes` 把 Redis 中的 bucket hash 转成 `types.BucketProgress`，字段映射包括：\n\n- `status` → `Status`\n- `total_uris` → `TotalUrisReceived`\n- `bytes` → `BytesReceived`\n- `run_files` → `RunFilesGenerated`\n- `peak_local_disk_mb` → `PeakLocalDiskUsageMb`\n- `merge_progress` → `MergeProgress`\n- `hdfs_write_progress` → `HDFSWriteProgress`\n- `final_path` → `FinalParquetPath`\n- `final_size` → `FinalByteSize`\n- `last_update` → `LastUpdateTime`\n\nbucket 会按 `bucket_id` 升序输出。缺失 hash 的 bucket 会被跳过。\n\n状态分组由 `bucketStateGroup` 定义：\n\n- `types.BucketStateDone` → done\n- `types.BucketStateFailed` → failed\n- `types.BucketStateMerging`、`types.BucketStateWritingHDFS` → merging\n- `types.BucketStateRunning` → running\n- 其他状态 → pending\n\n`applyBucketSummary` 根据这些分组计算 `JobSummary`。`BucketsPending` 使用总数减去 running、merging、done、failed 得到，并保证不会小于 0。\n\n## 告警与清理接口\n\n`handleAlert` 绑定 `types.AlertRequest`，要求 `job_id` 非空。如果 `timestamp` 为空，会填充当前 UTC 时间。请求体会被 JSON 序列化后通过 `s.st.AppendAlert(ctx, req.JobID, body)` 写入 Redis LIST。\n\n`handlePurgeAllJobs` 调用 `s.st.PurgeAllJobs(ctx)` 清理控制面记录的全部任务及关联元数据，返回 `types.PurgeAllJobsResponse`：\n\n```json\n{\n  \"ack\": true,\n  \"jobs_purged\": 3\n}\n```\n\n当前模块中没有看到鉴权、权限校验或环境保护逻辑，因此 `/api/v1/ops/purge_all_jobs` 的访问控制需要由上游网关、部署环境或其他中间件保证。\n\n## DTO 与 JSON 合约\n\nHTTP API 的请求和响应结构主要定义在 `internal/types/dto.go`。这些结构体的 JSON tag 是接口字段名的来源。\n\n需要注意命名风格并不完全统一：\n\n- 大多数字段使用 snake_case，例如 `job_id`、`source_type`、`files_total`。\n- `BucketProgress` 使用 camelCase，例如 `bucketId`、`totalUrisReceived`、`lastUpdateTime`。\n- `ProgressRequest.LastUpdateTime` 的 JSON 字段也是 `lastUpdateTime`。\n\n贡献新接口或扩展字段时，应优先沿用对应 DTO 所在响应体的既有命名风格，避免同一个对象内混用新的风格。\n\n## 工具函数\n\n`handlers.go` 中有一组只服务 API 聚合逻辑的辅助函数：\n\n- `atoi`、`atoi64`、`atof64`：从 Redis 字符串字段解析数值，失败时返回零值。\n- `orDefault`：为空字符串提供默认值。\n- `parseUnixTime`：解析 Unix 秒级时间戳。\n- `parseRFC3339Time`：解析 `time.RFC3339Nano` 或 `time.RFC3339`。\n- `parseJobConfigView`：把任务元数据中的 `request` JSON 快照解析为 `types.JobConfigView`，失败时返回空结构。\n- `parseBoolQueryArg`：解析查询参数中的布尔值。\n- `countDoneBuckets`：统计状态分组为 done 的 bucket 数量。\n- `latestBucketUpdate`：返回 bucket 列表中最新的更新时间；当前源码中未被调用。\n\n这些函数大多采用“解析失败返回零值”的策略，符合详情接口尽量返回部分可用信息的设计。扩展时需要注意：这种策略适合展示聚合，不适合需要强一致校验的写入路径。","job-orchestration":"# Job Orchestration\n\n## 模块概览\n\n`internal/job` 是任务编排层，负责把 `types.CreateJobRequest` 转换成可运行的 Reader / Writer FaaS 实例，并在 Redis 中初始化 Job 元数据、Worker 元数据和 bucket 到 writer 的路由表。\n\n模块入口是 `Manager.CreateJob`。它不直接处理数据文件内容，而是完成控制面编排：\n\n- 校验请求参数。\n- 生成 `jobID`、HDFS 输出路径和 Writer 临时目录。\n- 解析输入文件并生成 Reader 启动计划。\n- 按 `bucketId % numWriters` 构建 bucket 路由分配。\n- 先启动 Writer，等待 Writer 注册所有 bucket 路由。\n- 再启动 Reader，并将 Job 状态切换为 `running`。\n\n## 核心组件\n\n### `Manager`\n\n`Manager` 是 Job 编排入口：\n\n```go\ntype Manager struct {\n\tst                      *store.Store\n\tcfg                     *config.Config\n\tscheduler               scheduler.FaaSLauncher\n\tscanner                 fileScanner\n\twriterRouteReadyTimeout time.Duration\n\twriterReadyPollInterval time.Duration\n}\n```\n\n依赖关系：\n\n- `store.Store`：写入 Job 元数据、Worker 元数据、Job 状态，并检查 Writer 路由是否注册完成。\n- `config.Config`：提供 Redis、Lambda、Heartbeat、Writer RPC、StorageGW 等默认配置。\n- `scheduler.FaaSLauncher`：启动 Reader 和 Writer FaaS 实例。\n- `fileScanner`：扫描 HDFS 或 TOS 输入文件。\n- `writerRouteReadyTimeout` / `writerReadyPollInterval`：控制等待 Writer 路由就绪的轮询行为。\n\n`New` 会初始化默认 `sdkFileScanner`，并通过 `defaultWriterRouteReadyTimeout` 设置 Writer 路由等待超时。默认超时为 `max(cfg.Heartbeat.NextIntervalSec*3, 30)` 秒；没有配置时为 30 秒。\n\n## 创建 Job 的执行流程\n\n`CreateJob` 是同步编排流程。只有当 Writer 已启动、bucket 路由已注册、Reader 已启动且 Redis 状态切到 `running` 后，接口才返回成功。\n\n```mermaid\nflowchart TD\n    A[\"CreateJob\"] --> B[\"validate 校验请求\"]\n    B --> C[\"构建输出路径和临时目录\"]\n    C --> D[\"buildReaderLaunchPlans 生成 Reader 计划\"]\n    D --> E[\"CreateJob 写入 JobMeta 和 bucket 路由\"]\n    E --> F[\"InvokeWriter 启动 Writer\"]\n    F --> G[\"waitForWriterRoutes 等待路由就绪\"]\n    G --> H[\"InvokeReader 启动 Reader\"]\n    H --> I[\"SetJobState running\"]\n```\n\n关键步骤如下：\n\n1. `validate(req)` 校验请求完整性和 source 类型。\n2. 生成 `jobID := uuid.NewString()` 和 UTC `CreateTime`。\n3. `buildHDFSOutputPath` 根据 `output.hdfs_dir` 和 `output.partitions` 生成最终输出路径。\n4. `buildWriterHDFSTempDir` 生成 Writer staging 目录：`<output>/_staging/<jobID>`。\n5. `buildReaderLaunchPlans` 解析输入文件，并按实际文件数减少 Reader 数量，避免空分片。\n6. `BuildBucketAssign(N, M)` 生成 `bucketId -> writerIdx` 路由表。\n7. `store.CreateJob` 写入 `store.JobMeta` 和 bucket 分配。\n8. 启动所有 Writer，并写入 `store.WorkerMeta{Kind: types.KindWriter}`。\n9. `waitForWriterRoutes` 轮询 `Store.AllRouterBucketsRegistered`，等待所有 bucket 路由注册完成。\n10. 启动所有 Reader，并写入 `store.WorkerMeta{Kind: types.KindReader}`。\n11. `Store.SetJobState(..., types.JobStateRunning)` 标记 Job 进入运行态。\n\n如果 Writer 启动、Reader 启动、Worker 元数据写入或状态切换失败，`CreateJob` 会调用 `MarkJobFinished(..., types.JobStateFailed, ...)` 将 Job 标记为失败。\n\n## 请求校验\n\n`validate` 支持两类 source：\n\n- `types.SourceTypeHDFSParquet`\n- `types.SourceTypeTOSInventoryCSV`\n\n通用必填项：\n\n- `source_type`\n- `output.hdfs_dir`\n- `bucketing.num_buckets > 0`\n- `concurrency.num_writers > 0`\n- `concurrency.num_readers > 0`\n\n`hdfs_parquet` 要求至少提供：\n\n- `source.hdfs_root`\n- 或 `source.extract.file_paths`\n\n`tos_inventory_csv` 会对 `flattenCreateJobSources(req)` 返回的每个 source 执行 `validateTOSInventoryCSVSource`。它要求至少提供：\n\n- `tos_csv_root`\n- 或 `extract.csv_uris`\n\n并额外校验：\n\n- `create_timestamp_column` 和 `create_time_str_column` 不能同时设置。\n- `task_type` 只能为空或 `types.TOSInventoryTaskTypeManifestExpand`。\n- 当 `task_type=manifest_expand` 时必须提供 `content_type_column`。\n- 必须能得到对象 URI：提供 `store_uri_column`，或同时提供 `key_column` 和 `bucket`。\n\n## 输出路径构建\n\n`buildHDFSOutputPath(baseDir, partitions)` 负责生成最终 HDFS 输出路径。\n\n没有分区时直接返回清理后的 `baseDir`：\n\n```text\nhdfs://nn/path/output\n```\n\n有分区时追加 `key=value` 目录：\n\n```text\nhdfs://nn/path/output/dt=20260716/hour=10\n```\n\n每个 `types.OutputPartition` 都必须包含非空 `Key` 和 `Value`。\n\n`buildWriterHDFSTempDir(baseDir, jobID)` 生成 Writer 临时目录：\n\n```text\nhdfs://nn/path/output/_staging/<jobID>\n```\n\n如果 `baseDir` 是 URI 形式，会通过 `url.Parse` 保留 scheme 和 host，只修改 path；如果是普通路径，则使用 `path.Join`。\n\n## Bucket 到 Writer 的分配\n\n`BuildBucketAssign(numBuckets, numWriters)` 使用固定规则：\n\n```go\nwriterIdx = bucketId % numWriters\n```\n\n返回值是 `map[int]int`，表示 `bucketId -> writerIdx`。\n\n`bucketIDsForWriterIdx(numBuckets, numWriters, writerIdx)` 则反向计算某个 Writer 承载的 bucket 列表：\n\n```go\nfor i := writerIdx; i < numBuckets; i += numWriters {\n\tout = append(out, int32(i))\n}\n```\n\n这个规则同时用于 Redis 路由表初始化和 Writer 启动参数，因此 Reader 按 bucket 路由写入时能找到对应 Writer。\n\n## Reader 启动计划\n\n`buildReaderLaunchPlans` 根据 `SourceType` 分派：\n\n- `hdfs_parquet`：调用 `resolveHDFSInputFiles`，再用 `partitionFilePaths` 均分文件。\n- `tos_inventory_csv`：调用 `buildTOSInventoryCSVReaderLaunchPlans`，支持多个 source。\n\n### HDFS Parquet\n\n`resolveHDFSInputFiles` 优先使用 `source.extract.file_paths`。这些路径会经过 `normalizeHDFSFilePaths` 标准化，并由 `parseHDFSURI` 校验必须是 `hdfs://<namenode>/<path>`。\n\n如果没有显式 `file_paths`，则使用 `fileScanner.ScanHDFSFiles(ctx, source.HDFSRoot, source.FileGlob)` 扫描目录。\n\n`ScanHDFSFiles` 的过滤规则：\n\n- 跳过目录。\n- 跳过 `_SUCCESS`、`.`、`..` 和以 `.` 开头的文件。\n- 未配置 `fileGlob` 时，只保留文件名以 `part` 开头的文件。\n- 配置 `fileGlob` 时使用 `path.Match` 匹配文件名。\n\n### TOS Inventory CSV\n\n`buildTOSInventoryCSVReaderLaunchPlans` 支持 `req.Source` 和 `req.Sources` 两种输入形式。`flattenCreateJobSources` 会把它们统一成 `[]sourceRef`，其中 label 用于错误信息，例如 `source` 或 `sources[0]`。\n\n每个 source 通过 `resolveTOSInventoryCSVFiles` 解析文件：\n\n- 优先使用 `source.extract.csv_uris`。\n- 如果没有显式 CSV URI，则扫描 `source.tos_csv_root`。\n- 返回结果会排序，保证启动计划稳定。\n\n多 source 场景下，`concurrency.num_readers` 必须大于等于有效 source 数量。`allocateReadersByFileCount` 会先给每个 source 至少分配 1 个 Reader，再按文件数量容量比例分配额外 Reader，且不会给某个 source 分配超过其文件数的 Reader。\n\n## 文件扫描器\n\n`fileScanner` 是输入文件发现接口：\n\n```go\ntype fileScanner interface {\n\tScanHDFSFiles(ctx context.Context, rootPath, fileGlob string) ([]string, error)\n\tScanTOSFiles(ctx context.Context, rootPath string) ([]string, error)\n}\n```\n\n默认实现是 `sdkFileScanner`。\n\n### HDFS 扫描\n\n`ScanHDFSFiles` 使用 `hdfs.Connect(hdfs.WithNameNode(parsedRoot.NameNode))` 连接 NameNode，然后调用 `fs.List(parsedRoot.Path)` 列出目录文件。\n\n`parseHDFSURI` 要求 URI 形式为：\n\n```text\nhdfs://<namenode>/<path>\n```\n\n返回的 `parsedHDFSURI` 包含：\n\n- `NameNode`：`hdfs://<host>`\n- `Path`：URI path 部分\n\n### TOS 扫描\n\n`ScanTOSFiles` 使用 StorageGW 分页列举对象。`getStorageGWClient` 通过 `sync.Once` 延迟初始化客户端，并从配置读取：\n\n- `StorageGW.PSM`\n- `StorageGW.AccessKey`\n- `StorageGW.SecretKey`\n- `StorageGW.Cluster`\n- `StorageGW.IDC`\n- `StorageGW.ListPageSize`\n\n`parseTOSURI` 支持两种格式：\n\n```text\ntos://bucket/prefix\nbucket/prefix\n```\n\n返回对象路径格式为：\n\n```text\nbucket/key\n```\n\n`shouldSkipTOSObject` 会跳过：\n\n- 空 key。\n- 不在 prefix 下的对象。\n- `_SUCCESS`、隐藏文件和目录 marker。\n- 非 `.csv` 文件。\n\n分页时，如果 `ListObjectsInfo.StartAfter` 为空，会回退到最后一个对象的 key；如果游标没有前进，会返回错误，避免死循环。\n\n## Reader / Writer 启动参数\n\n### Writer 参数\n\n`buildWriterInvokeArgs` 构造 `scheduler.WriterInvokeArgs`，核心字段包括：\n\n- `JobID`\n- `BucketIDs`\n- `HDFSOutputPath`\n- `HDFSTempDir`\n- `SkipStartupCheck`\n- `Sort`\n- `ControlPlane`\n- `Router`\n- `Lambda`\n\n默认值来源：\n\n- Control Plane endpoint：`WriterRuntime.ControlPlane.Endpoint` 或 `cfg.Lambda.ControlPlaneEndpoint`\n- Control Plane PSM：`cfg.Lambda.ControlPlanePSM`\n- Control Plane cluster：`cfg.Lambda.ControlPlaneCluster`\n- Heartbeat interval：`cfg.Heartbeat.NextIntervalSec`\n- Writer progress report interval：默认 60 秒\n- Router cluster：`redisCluster()`\n- Router key prefix：默认 `jobID`\n- Router TTL：`max(300, cfg.Heartbeat.TTLSec)`\n\n如果 `req.HDFSTempDir` 为空，函数会尝试通过 `buildWriterHDFSTempDir` 兜底生成，并在失败时记录 warning。\n\n### Reader 参数\n\n`buildReaderInvokeArgs` 构造 `scheduler.ReaderInvokeArgs`，公共字段包括：\n\n- `JobID`\n- `SourceType`\n- `Bucketing`\n- `Limits`\n- `Sink`\n- `ControlPlane`\n- `Lambda`\n\n当 `Bucketing.HashAlg` 为空时，默认设置为 `\"hive\"`。\n\n`hdfs_parquet` 会填充 `scheduler.ReaderHDFSParquetInput`，并要求 `source.extract.store_uri_field` 非空。\n\n`tos_inventory_csv` 会填充 `scheduler.ReaderTOSInventoryInput`，包括 CSV URI、bucket/key/store URI 列、size、content type、storage class、创建时间列和 CSV 格式。\n\n### Reader Sink\n\n`buildReaderSinkInput` 默认 sink 类型为 `\"writer_rpc\"`。\n\n当 sink 为 `writer_rpc` 时，会自动补齐：\n\n- `WriterServiceName`：默认 `cfg.WriterRPC.PSM`\n- Redis cluster：默认 `redisCluster()`\n- Redis key prefix：默认 `jobID`\n- 连接超时：默认 `millisToSeconds(cfg.WriterRPC.TimeoutMs)`\n- RPC 超时：默认 `millisToSeconds(cfg.WriterRPC.TimeoutMs)`\n\n这使 Reader 能通过 Redis 读取 Writer 路由信息，再通过 RPC 写入对应 Writer。\n\n## 状态与失败处理\n\n`CreateJob` 的 Redis 写入顺序很重要：\n\n1. 先 `CreateJob` 写入 Job 元数据和 bucket 分配。\n2. 启动 Writer。\n3. 写入 Writer metadata。\n4. 等待 Writer 注册路由。\n5. 启动 Reader。\n6. 写入 Reader metadata。\n7. 设置 Job 状态为 `running`。\n\nWriter 路由必须在 Reader 启动前就绪，否则 Reader 可能无法根据 bucket 找到 Writer endpoint。`waitForWriterRoutes` 使用带超时的 context 轮询 `AllRouterBucketsRegistered(jobID, numBuckets)`，直到所有 bucket 都注册或超时。\n\n失败时，当前实现不会回滚已启动的 FaaS 实例；它只将 Job 标记为 `failed`。因此贡献代码时要注意：新增的启动步骤如果位于 `CreateJob` 中间，也应在失败路径调用 `MarkJobFinished`，并返回带上下文的错误。\n\n## 与其他模块的连接\n\n`internal/job` 位于控制面中间层：\n\n- 向上接收 `types.CreateJobRequest`，返回 `types.CreateJobResponse`。\n- 向下调用 `store.Store` 写 Redis 状态和路由。\n- 向下调用 `scheduler.FaaSLauncher` 启动 Reader / Writer。\n- 从 `config.Config` 读取默认运行时参数。\n- 通过 HDFS SDK 和 StorageGW SDK 解析输入文件。\n\n`cmd/main.go` 通过 `job.New(st, cfg, sched)` 构造 `Manager`，实际创建任务时调用 `Manager.CreateJob`。\n\n## 开发注意事项\n\n修改这个模块时，优先保持以下不变量：\n\n- Reader 启动前必须等待 Writer 路由全部注册。\n- `effectiveReq.Concurrency.NumReaders` 必须反映实际启动的 Reader 数量。\n- bucket 分配规则必须与 Writer 启动参数保持一致。\n- 多 source 的 TOS Inventory CSV 至少要给每个有效 source 一个 Reader。\n- 文件列表需要排序，避免相同请求在不同运行中产生不稳定的 Reader 分片。\n- URI 解析应继续使用 `url.Parse`、`path.Join`、`path.Match` 等标准 API，避免手写字符串拼接破坏 scheme、host 或 prefix 语义。","other-api":"# Other — api\n\n## 模块概览\n\n`api/swagger.yaml` 是 `uri_task_control_panel` 控制面服务的 OpenAPI 3.0.3 接口契约，描述业务方、Reader、Writer 与运维系统访问控制面的 HTTP/JSON 协议。该模块本身不包含可执行代码；调用图中没有检测到内部调用、外部调用或执行流，说明它承担的是 API 规范、数据模型和接口语义定义的职责。\n\n控制面围绕 Job 生命周期工作：业务方通过 `createJob` 创建写表任务，Reader/Writer 通过 `heartbeat` 与 `reportProgress` 上报状态，控制面维护 Redis 中的 Job 元数据、worker 快照、bucket 进度和告警列表，业务方再通过 `getJob` 或 `listJobs` 查询聚合视图。\n\n```mermaid\nflowchart LR\n    业务方[\"业务方\"] -->|createJob| 控制面[\"控制面 API\"]\n    控制面 -->|拉起| Reader[\"Reader\"]\n    控制面 -->|拉起| Writer[\"Writer\"]\n    Reader -->|heartbeat/reportProgress| 控制面\n    Writer -->|heartbeat/reportProgress| 控制面\n    Writer -->|alert| 控制面\n    业务方 -->|getJob/listJobs| 控制面\n```\n\n## 统一响应格式\n\n所有 JSON 接口都使用 `Envelope` 包装响应：\n\n```json\n{\n  \"code\": 0,\n  \"message\": \"ok\",\n  \"data\": {}\n}\n```\n\n`code=0` 表示成功，此时 `data` 才承载业务负载。错误响应仍使用同一个 `Envelope` 结构，常见业务码包括：\n\n- `40001`：参数格式错误，通常对应绑定或校验失败。\n- `40002`：必填字段缺失。\n- `40010`：任务创建失败。\n- `40401`：任务不存在。\n- `50001`：内部错误，例如 Redis 等下游异常。\n\n`/health` 是例外，它返回 `text/plain` 的固定字符串 `ok`，用于 LB 或容器编排存活探针。\n\n## Job 创建接口\n\n`POST /api/v1/jobs` 对应 `createJob`，请求体为 `CreateJobRequest`。它要求提供 `source_type`、`source`、`output`、`bucketing` 和 `concurrency`，用于创建 Job、分配 `job_id`、构建 bucket 到 Writer 的路由表，并拉起 Reader/Writer。\n\n核心配置对象包括：\n\n- `SourceSpec`：定义输入数据源。`source_type=hdfs_parquet` 时使用 `hdfs_root`、`file_glob` 或 `extract.file_paths`；`source_type=tos_inventory_csv` 时使用 `tos_csv_root` 或 `extract.csv_uris`。\n- `OutputSpec`：定义 HDFS 输出根目录和有序 Hive 分区。`partitions` 的数组顺序就是目录层级顺序。\n- `BucketingSpec`：定义 `num_buckets`、`hash_alg` 和可选的 `spark_seed`。\n- `ConcurrencySpec`：定义 `num_writers` 和 `num_readers`。\n- `ReaderRuntimeSpec`、`ReaderSinkSpec`、`WriterRuntimeSpec`：分别透传 Reader、Reader sink 和 Writer 运行时参数。\n- `LambdaRuntimeSpec`：透传 Lambda 网关调度参数，不进入 Reader/Writer payload。\n- `CallbackSpec`：当前仅存储和透传，不主动触发飞书通知。\n\n成功响应为 `CreateJobResponse`，包含 `job_id`、`state`、`num_buckets`、`num_writers`、`num_readers` 和 `create_time`。当前主流程在拉起 Reader/Writer 后返回 `RUNNING`。\n\n## 任务查询接口\n\n`GET /api/v1/jobs` 对应 `listJobs`，返回 `ListJobsResponse`。每个 `JobListItem` 是轻量任务摘要，包含 Job 状态、创建/结束时间、bucket 数、Reader/Writer 数，以及 `source_type`、`source_root` 和 `output_hdfs_dir`。\n\n`GET /api/v1/jobs/{job_id}` 对应 `getJob`，返回单个 Job 的聚合详情。接口支持 `include_buckets` 查询参数：\n\n- `include_buckets=false`：默认轻量模式，返回 `JobDetailLiteResponse`，不会扫描 bucket 维度数据。\n- `include_buckets=true`：完整模式，返回 `JobDetailResponse`，包含 bucket 聚合、Writer 维度 bucket 明细和完整进度统计。\n\n两种响应都包含 `job_id`、`state`、`create_time`、`finish_time`、`hdfs_output_path`、`hdfs_temp_dir`、`config` 和 `summary`。`config` 使用 `JobConfigView`，完整镜像创建请求，便于排查任务启动参数。\n\nJob 状态枚举由契约描述为 `PENDING`、`RUNNING`、`FINALIZING`、`SUCCEEDED`、`FAILED`、`CANCELLED`。\n\n## Worker 心跳与进度\n\n`POST /api/v1/heartbeat` 对应 `heartbeat`，请求体为 `HeartbeatRequest`。Reader 和 Writer 每 30 秒左右上报一次心跳，控制面更新 worker 快照中的 `last_hb` 和运行状态，并返回 `HeartbeatResponse.next_interval_sec`。\n\n`HeartbeatRequest.kind` 决定必填字段：\n\n- `kind=writer`：`writer_id` 和 `buckets` 必填。\n- `kind=reader`：`reader_id` 必填，`buckets` 可省略。\n\n`LOST` 状态不是通过 Redis key TTL 直接得到，而是在查询详情时根据 `last_hb` 超时推断；如果 worker 当前状态不是 `DONE` 且心跳超过 `Heartbeat.TTLSec`，展示层会返回 `LOST`。\n\n`POST /api/v1/report_progress` 对应 `reportProgress`，请求体为 `ProgressRequest`：\n\n- Writer 使用 `kind=writer`，填充 `writer_id` 和 `buckets`。每个元素为 `BucketProgress`，包含 `bucketId`、`status`、`totalUrisReceived`、`bytesReceived`、`runFilesGenerated`、`peakLocalDiskUsageMb`、`mergeProgress`、`hdfsWriteProgress` 等字段。\n- Reader 使用 `kind=reader`，填充 `reader_id` 和 `files`。`ReaderFilesProgress` 记录 `files_total`、`files_done`、`rows_read` 和 `bytes_read`。\n\n服务端按 bucket 维度更新 `cp:job:{jobId}:bucket:{bucketId}`，并覆盖 worker 快照。Job 的 `summary` 不维护在线 counter，而是在 `getJob` 查询时基于 bucket hash 或 worker 快照现算。\n\n## 告警与运维接口\n\n`POST /api/v1/alert` 对应 `alert`，请求体为 `AlertRequest`。Reader/Writer 在不可恢复异常路径下调用该接口。控制面将告警写入 `cp:job:{jobId}:alerts`，保留最近 1000 条，成功时返回 `{ \"ack\": true }`。\n\n`POST /api/v1/ops/purge_all_jobs` 对应 `purgeAllJobs`，用于删除当前控制面记录的全部任务及关联元数据，包括 job hash、bucket 快照、worker 快照、`bucket_assign`、router bucket、alerts、barrier 标记，以及 `cp:jobs:all` 和 `cp:jobs:active`。这是强副作用接口，只应在明确需要清理控制面状态时调用。\n\n## 数据模型约定\n\n本模块采用 OpenAPI schema 作为跨组件数据契约。新增字段时应优先扩展现有 schema，而不是创建语义重复的新对象。常用 schema 的职责如下：\n\n- `CreateJobRequest`：业务方提交任务的完整配置入口。\n- `JobConfigView`：查询详情时返回的配置快照，与创建请求保持镜像关系。\n- `WorkerView`：完整模式下 Reader/Writer 的展示视图。\n- `WriterLiteView`：轻量模式下 Writer 的展示视图，不包含 bucket 扫描结果。\n- `JobSummary`：完整模式下基于 bucket 维度计算的聚合结果。\n- `JobSummaryLite`：轻量模式下只保留不依赖 bucket 扫描的字段。\n- `BucketProgress`：Writer 上报的 bucket 级进度，字段名使用 camelCase，与 Writer 侧 controlplane 结构对齐。\n- `ReaderFilesProgress`：Reader 上报的文件级进度。\n\n开发者修改控制面实现、Reader/Writer 上报逻辑或客户端 SDK 时，应以这里的字段名、必填约束、枚举值和响应包装为准。尤其需要注意 `include_buckets=false` 的轻量查询语义：实现层不应在该模式下扫描 bucket 数据，否则会破坏接口用于快速列表和低成本诊断的设计目的。","other-build-sh":"# Other — build.sh\n\n## 模块职责\n\n`build.sh` 是项目的构建入口脚本，用于准备运行依赖、整理发布产物目录，并将 Go 主程序编译到 `output/bin/`。它不是业务模块，没有函数、类或内部调用关系；它的作用是在构建环境中串联系统依赖安装、配置复制和 `go build`。\n\n## 构建流程\n\n```mermaid\nflowchart TD\n    A[\"执行 build.sh\"] --> B[\"安装 bvc\"]\n    B --> C[\"拉取 hdfs_client 到 /opt/tiger/hdfs_client\"]\n    C --> D[\"创建 output/bin 和 output/conf\"]\n    D --> E[\"复制 bootstrap.sh 与配置文件\"]\n    E --> F[\"go build 生成可执行文件\"]\n```\n\n脚本按顺序执行以下步骤：\n\n1. 设置产物名称：\n\n```bash\nRUN_NAME=\"bytedance.videoarch.uri_task_control_panel\"\n```\n\n该变量用于最终 Go 二进制文件名，产物路径为：\n\n```bash\noutput/bin/bytedance.videoarch.uri_task_control_panel\n```\n\n2. 安装构建期依赖：\n\n```bash\napt update -y\napt install -y bvc\n```\n\n脚本假设运行环境支持 `apt`，通常意味着 Debian/Ubuntu 系统或兼容的构建镜像。执行用户也需要具备安装系统包的权限。\n\n3. 拉取 HDFS 客户端：\n\n```bash\nbvc clone -f data/inf/hdfs_client /opt/tiger/hdfs_client\n```\n\n这里通过 `bvc` 将 `data/inf/hdfs_client` 克隆到固定路径 `/opt/tiger/hdfs_client`。该目录通常是运行期或构建期依赖路径，后续 Go 编译命令本身没有直接引用它，但运行环境可能依赖该客户端文件布局。\n\n4. 创建输出目录：\n\n```bash\nmkdir -p output/bin output/conf\n```\n\n`output/bin` 存放编译后的二进制文件，`output/conf` 存放发布用配置文件。\n\n5. 准备启动脚本：\n\n```bash\ncp script/bootstrap.sh output 2>/dev/null\nchmod +x output/bootstrap.sh\ncp script/bootstrap.sh output/bootstrap_staging.sh\nchmod +x output/bootstrap_staging.sh\n```\n\n同一个 `script/bootstrap.sh` 会被复制成两个产物：\n\n- `output/bootstrap.sh`\n- `output/bootstrap_staging.sh`\n\n两者都会被设置为可执行文件。第一条 `cp` 将错误输出重定向到 `/dev/null`，因此如果复制失败，错误信息不会显示；但脚本没有使用 `set -e`，失败不会立即中止。\n\n6. 复制配置文件：\n\n```bash\nfind conf/ -type f ! -name \"*_local.*\" | xargs -I{} cp {} output/conf/\n```\n\n该命令会把 `conf/` 下所有非本地配置文件复制到 `output/conf/`。名称匹配 `*_local.*` 的文件会被排除，避免把本地开发配置打进发布产物。\n\n注意：这里使用普通 `cp` 复制到同一个目标目录，不保留 `conf/` 下的子目录结构。如果不同子目录中存在同名配置文件，后复制的文件会覆盖先复制的文件。\n\n7. 编译 Go 主程序：\n\n```bash\ngo build -o output/bin/${RUN_NAME} ./cmd/main.go\n```\n\n编译入口是 `./cmd/main.go`，输出文件名由 `RUN_NAME` 决定。\n\n## 与代码库的关系\n\n`build.sh` 连接了项目中的几个固定路径：\n\n- `cmd/main.go`：Go 程序入口。\n- `script/bootstrap.sh`：运行启动脚本来源。\n- `conf/`：发布配置来源。\n- `output/`：构建产物目录。\n- `/opt/tiger/hdfs_client`：通过 `bvc` 准备的外部客户端依赖。\n\n构建完成后，发布系统通常只需要消费 `output/` 目录，其中包含可执行文件、启动脚本和配置文件。\n\n## 重要约束\n\n脚本依赖以下环境条件：\n\n- 系统提供 `bash`。\n- 系统提供 `apt`，且当前用户有安装包权限。\n- `bvc` 包可通过 `apt install -y bvc` 安装。\n- Go 工具链已可用，`go build` 能正常执行。\n- 项目根目录下存在 `cmd/main.go`、`script/bootstrap.sh` 和 `conf/`。\n\n脚本没有显式设置：\n\n```bash\nset -e\nset -u\nset -o pipefail\n```\n\n因此中间步骤失败时不一定会立刻停止，最终退出码主要取决于最后的 `go build`。如果需要让构建失败更早暴露，后续维护时可以考虑补充严格模式，并逐项确认现有构建环境是否依赖“失败后继续执行”的行为。\n\n## 修改建议\n\n修改该脚本时应保持以下约定：\n\n- 如果变更二进制名称，修改 `RUN_NAME`，并确认部署系统期望的文件名同步更新。\n- 如果新增发布配置，放入 `conf/`，但本地私有配置应继续使用 `*_local.*` 命名以避免被打包。\n- 如果启动逻辑变化，优先修改 `script/bootstrap.sh`，因为 `bootstrap.sh` 和 `bootstrap_staging.sh` 都从该文件复制生成。\n- 如果需要保留配置子目录结构，不应继续使用当前的 `find ... | xargs cp ... output/conf/` 模式，需要改成保留路径的复制方式。","other-conf":"# Other — conf\n\n## 模块概览\n\n`conf` 模块保存服务运行所需的 YAML 配置，目前包含两类配置：\n\n- `conf/base.yml`：业务运行、外部依赖、任务控制相关配置。\n- `conf/hertz.config.yaml`：Hertz 服务在 `Develop` 和 `Product` 环境下的启动与日志配置。\n\n该模块不包含 Go 函数、类或可执行逻辑；调用图中也没有内部调用、外部调用或执行流。它的作用是作为配置源，被代码库中的配置加载逻辑读取后用于初始化 Redis、心跳、任务分发、Lambda 调用、StorageGW、Hertz 服务端口和日志行为。\n\n## `conf/base.yml`\n\n`base.yml` 是核心业务配置文件，按功能域组织。\n\n### `Redis`\n\n```yaml\nRedis:\n  Cluster: toutiao.redis.videoarch_storage_test\n```\n\n`Redis.Cluster` 指定 Redis 集群名。当前值为 `toutiao.redis.videoarch_storage_test`，通常用于任务状态、心跳、屏障或临时控制信息的持久化依赖。\n\n### `Heartbeat`\n\n```yaml\nHeartbeat:\n  TTLSec: 90\n  NextIntervalSec: 30\n```\n\n心跳配置控制任务或执行节点的存活状态更新节奏。\n\n| 配置项 | 当前值 | 含义 |\n| --- | ---: | --- |\n| `Heartbeat.TTLSec` | `90` | 心跳记录的 TTL，单位为秒 |\n| `Heartbeat.NextIntervalSec` | `30` | 下一次心跳上报间隔，单位为秒 |\n\n开发时需要保证 `NextIntervalSec` 明显小于 `TTLSec`，否则心跳可能在下一次续期前过期。\n\n### `Barrier`\n\n```yaml\nBarrier:\n  CheckIntervalSec: 10\n```\n\n`Barrier.CheckIntervalSec` 表示屏障状态检查间隔，单位为秒。该配置适用于需要等待多个并发任务、分片任务或阶段性任务全部完成后再继续推进的场景。\n\n### `Fanout`\n\n```yaml\nFanout:\n  Concurrency: 64\n  MaxRetries: 3\n```\n\n任务扇出配置控制并发度和重试次数。\n\n| 配置项 | 当前值 | 含义 |\n| --- | ---: | --- |\n| `Fanout.Concurrency` | `64` | 扇出处理的并发上限 |\n| `Fanout.MaxRetries` | `3` | 单个扇出操作最大重试次数 |\n\n调整 `Concurrency` 会直接影响下游服务、Redis、Lambda 或 RPC 的压力；调整前需要结合下游限流能力和任务规模评估。\n\n### `Job`\n\n```yaml\nJob:\n  TTLSec: 2592000\n```\n\n`Job.TTLSec` 表示任务记录 TTL，单位为秒。当前值 `2592000` 等于 30 天，用于控制任务元信息或任务状态的保留周期。\n\n### `WriterRPC`\n\n```yaml\nWriterRPC:\n  PSM: bytedance.videoarch.uri_writer\n  TimeoutMs: 3000\n```\n\n`WriterRPC` 配置 URI Writer 服务的 RPC 调用信息。\n\n| 配置项 | 当前值 | 含义 |\n| --- | --- | --- |\n| `WriterRPC.PSM` | `bytedance.videoarch.uri_writer` | Writer RPC 服务标识 |\n| `WriterRPC.TimeoutMs` | `3000` | RPC 超时时间，单位为毫秒 |\n\n当写入链路出现超时、失败或下游不可用时，应优先检查这里的 `PSM` 和 `TimeoutMs` 是否与目标环境匹配。\n\n### `Lambda`\n\n```yaml\nLambda:\n  GatewayURL: 'https://boe-v-lambda.bytedance.net/lambda/apis/gateway/v1/invoke'\n  ReaderFunction: uri_source_reader\n  WriterFunction: uri_writer\n  Qualifier: prod\n  InvokeType: async\n  TimeoutMs: 5000\n  ControlPlanePSM: bytedance.videoarch.uri_task_control_panel\n  ControlPlaneCluster: default\n```\n\n`Lambda` 配置用于通过网关调用 Reader 和 Writer 函数。\n\n| 配置项 | 当前值 | 含义 |\n| --- | --- | --- |\n| `Lambda.GatewayURL` | `https://boe-v-lambda.bytedance.net/lambda/apis/gateway/v1/invoke` | Lambda 网关地址 |\n| `Lambda.ReaderFunction` | `uri_source_reader` | 读取源数据的函数名 |\n| `Lambda.WriterFunction` | `uri_writer` | 写入处理的函数名 |\n| `Lambda.Qualifier` | `prod` | 函数版本或别名标识 |\n| `Lambda.InvokeType` | `async` | 调用类型，当前为异步调用 |\n| `Lambda.TimeoutMs` | `5000` | 网关调用超时时间，单位为毫秒 |\n| `Lambda.ControlPlanePSM` | `bytedance.videoarch.uri_task_control_panel` | 控制面服务 PSM |\n| `Lambda.ControlPlaneCluster` | `default` | 控制面服务集群 |\n\n这里同时包含函数侧配置和控制面标识。修改函数名、`Qualifier` 或 `GatewayURL` 时，需要确认目标环境中的函数已经部署，并且控制面服务信息与当前运行环境一致。\n\n### `StorageGW`\n\n```yaml\nStorageGW:\n  AccessKey: '7d304abe58df7c8f77cd99edfc438024'\n  SecretKey: '08037274a64e56b87504811acad18438'\n  PSM: bytedance.videoarch.uri_task_control_panel\n  Cluster: default\n  ListPageSize: 1000\n```\n\n`StorageGW` 配置用于访问存储网关。\n\n| 配置项 | 当前值 | 含义 |\n| --- | --- | --- |\n| `StorageGW.AccessKey` | `7d304abe58df7c8f77cd99edfc438024` | 存储网关访问凭证 |\n| `StorageGW.SecretKey` | `08037274a64e56b87504811acad18438` | 存储网关密钥 |\n| `StorageGW.PSM` | `bytedance.videoarch.uri_task_control_panel` | 调用方或服务标识 |\n| `StorageGW.Cluster` | `default` | 目标集群 |\n| `StorageGW.ListPageSize` | `1000` | 列表接口分页大小 |\n\n`AccessKey` 和 `SecretKey` 属于敏感配置。修改、迁移或提交配置时，需要遵循仓库和平台的密钥管理规范，避免将生产密钥混入测试环境配置。\n\n## `conf/hertz.config.yaml`\n\n`hertz.config.yaml` 定义 Hertz 服务在不同运行环境下的基础行为，目前包含 `Develop` 和 `Product` 两套配置。\n\n### `Develop`\n\n```yaml\nDevelop:\n    ServicePort: \"6789\"\n    DebugPort: \"6790\"\n    EnablePprof: true\n    LogLevel: \"debug\"\n    ConsoleLog: true\n    AgentLog: true\n    FileLog: true\n```\n\n开发环境开启了更详细的调试能力：\n\n| 配置项 | 当前值 | 含义 |\n| --- | --- | --- |\n| `Develop.ServicePort` | `\"6789\"` | 服务监听端口 |\n| `Develop.DebugPort` | `\"6790\"` | 调试端口 |\n| `Develop.EnablePprof` | `true` | 是否开启 pprof |\n| `Develop.LogLevel` | `\"debug\"` | 日志级别 |\n| `Develop.ConsoleLog` | `true` | 是否输出控制台日志 |\n| `Develop.AgentLog` | `true` | 是否输出 Agent 日志 |\n| `Develop.FileLog` | `true` | 是否输出文件日志 |\n\n### `Product`\n\n```yaml\nProduct:\n    ServicePort: \"6789\"\n    DebugPort: \"6790\"\n    EnablePprof: true\n    LogLevel: \"info\"\n    ConsoleLog: false\n    AgentLog: true\n    FileLog: true\n```\n\n生产环境与开发环境使用相同端口，但日志策略更收敛：\n\n| 配置项 | 当前值 | 含义 |\n| --- | --- | --- |\n| `Product.ServicePort` | `\"6789\"` | 服务监听端口 |\n| `Product.DebugPort` | `\"6790\"` | 调试端口 |\n| `Product.EnablePprof` | `true` | 是否开启 pprof |\n| `Product.LogLevel` | `\"info\"` | 日志级别 |\n| `Product.ConsoleLog` | `false` | 是否输出控制台日志 |\n| `Product.AgentLog` | `true` | 是否输出 Agent 日志 |\n| `Product.FileLog` | `true` | 是否输出文件日志 |\n\n`Develop` 和 `Product` 的主要差异是：\n\n- `LogLevel`：开发环境为 `debug`，生产环境为 `info`。\n- `ConsoleLog`：开发环境开启，生产环境关闭。\n\n## 与代码库的连接方式\n\n`conf` 模块本身没有执行入口，也不直接调用其他模块。它通过“被读取”的方式参与系统运行：\n\n1. 服务启动时，配置加载逻辑读取 `conf/base.yml` 和 `conf/hertz.config.yaml`。\n2. 运行时组件根据配置初始化外部依赖，例如 Redis、Writer RPC、Lambda 网关和 StorageGW。\n3. Hertz 服务根据当前环境选择 `Develop` 或 `Product` 配置，决定端口、pprof、日志级别和日志输出目标。\n4. 任务控制相关逻辑使用 `Heartbeat`、`Barrier`、`Fanout` 和 `Job` 配置控制调度节奏、并发度、重试次数和状态保留时间。\n\n由于当前模块没有调用图边，维护重点不在函数关系，而在配置字段的语义一致性、环境隔离和下游依赖匹配。\n\n## 修改配置时的注意事项\n\n- 修改 `Redis.Cluster`、`WriterRPC.PSM`、`Lambda.GatewayURL`、`Lambda.*Function`、`StorageGW.PSM` 或 `StorageGW.Cluster` 时，需要确认目标环境的服务和资源已经存在。\n- 修改 `Fanout.Concurrency` 前，需要评估下游 RPC、Lambda、Redis 和存储网关的承载能力。\n- 修改 `Heartbeat.TTLSec` 或 `Heartbeat.NextIntervalSec` 时，需要保持续期间隔小于 TTL。\n- 修改 `Job.TTLSec` 会影响任务状态保留周期，可能影响问题追溯、重试和清理策略。\n- `StorageGW.AccessKey` 和 `StorageGW.SecretKey` 是敏感字段，不应随意复制到其他环境。\n- `hertz.config.yaml` 中端口值使用字符串形式，例如 `\"6789\"`；新增环境配置时应保持同样的数据形态，避免配置解析行为不一致。","other-docs":"# Other — docs\n\n## 模块定位\n\n`docs/integration.md` 是 `uri_task_control_panel` 面向接入方的开发者文档，描述 VDA Store URI 排序任务控制面服务的外部契约、调用方式、数据流和运维建议。它不是运行时代码模块，不包含函数、类或可执行调用链；它承担的是把控制面服务的 HTTP API、任务生命周期和 Reader/Writer 对接方式固定为可维护的接入说明。\n\n该文档主要服务三类读者：\n\n- Reader / Writer 组件开发者：理解心跳、进度上报、Reader-Done Barrier 等交互约定。\n- 业务调用方：通过 `/api/v1/jobs` 创建任务并查询任务状态。\n- 运维与联调人员：确认 PSM、端口、错误码、超时、上报频率和依赖文档。\n\n## 与代码库的关系\n\n`docs/integration.md` 不是接口定义的唯一来源，而是围绕代码库内其他资产组织出来的接入说明：\n\n| 关联文件或模块 | 作用 |\n| --- | --- |\n| `api/swagger.yaml` | HTTP 路由、请求体、响应体、错误码等 schema 的权威定义 |\n| `examples/hertz_client/main.go` | 使用 CloudWeGo Hertz Client 调用控制面的完整示例 |\n| `docs/summary-aggregation-comparison.md` | Job summary 聚合方案的设计背景 |\n| 控制面服务实现 | 实际处理 `CreateJob`、`Heartbeat`、`ReportProgress`、`GetJob`、`Alert` 等接口 |\n| 下游 `uri_writer` | 控制面在 Reader 全量完成后通过 Overpass / KiteX 调用 `MarkBucketDone` |\n| 下游 `uri_source_reader` | 控制面根据 `CreateJob` 请求组装 Reader 输入并拉起 Reader |\n\n文档中的 Swagger 锚点直接指向 `api/swagger.yaml`，例如 `createJob`、`heartbeat`、`reportProgress`、`getJob`、`alert`、`health`。贡献者修改接口字段、状态语义或错误码时，需要同步检查这份文档是否仍然准确。\n\n## 控制面职责\n\n文档把 `bytedance.videoarch.uri_task_control_panel` 定义为 VDA Store URI 排序任务的 Control Plane Service。服务本身监听 HTTP 端口 `8090`，使用 CloudWeGo Hertz 提供 HTTP/JSON API。\n\n控制面承担三类核心职责：\n\n1. 任务编排  \n   `POST /api/v1/jobs` 接收 `CreateJob` 请求，基于 bucketing 和 concurrency 配置构建 `bucket -> writer` 路由表，并通过 FaaS Launcher 拉起 Reader / Writer。\n\n2. 状态汇聚  \n   Reader / Writer 通过 `/api/v1/heartbeat` 和 `/api/v1/report_progress` 上报存活状态与进度。控制面将 Worker 哈希和 bucket 快照写入 Redis。`GET /api/v1/jobs/{job_id}` 查询时会基于 bucket hash 现算 summary。\n\n3. Reader-Done Barrier  \n   Reader 全量完成后，控制面向 Writer fan-out 调用 `MarkBucketDone`，推进 bucket 收尾流程。Writer 的后续终态仍通过进度上报进入控制面。\n\n```mermaid\nflowchart LR\n    调用方[\"业务调用方\"]\n    控制面[\"uri_task_control_panel\"]\n    Redis[\"Redis 状态存储\"]\n    Reader[\"Reader\"]\n    Writer[\"Writer\"]\n    FaaS[\"FaaS Launcher\"]\n\n    调用方 -->|\"POST /api/v1/jobs\"| 控制面\n    控制面 -->|\"拉起任务\"| FaaS\n    FaaS --> Reader\n    FaaS --> Writer\n    Reader -->|\"heartbeat / report_progress\"| 控制面\n    Writer -->|\"heartbeat / report_progress\"| 控制面\n    控制面 -->|\"写入 Worker 与 bucket 状态\"| Redis\n    控制面 -->|\"MarkBucketDone\"| Writer\n    调用方 -->|\"GET /api/v1/jobs/{job_id}\"| 控制面\n```\n\n## HTTP API 契约\n\n所有业务接口统一使用 HTTP/JSON，路径前缀为 `/api/v1`。响应统一包装为 Envelope：\n\n```json\n{\n  \"code\": 0,\n  \"message\": \"ok\",\n  \"data\": {}\n}\n```\n\n当前文档覆盖的接口包括：\n\n| 路径 | 方法 | 用途 |\n| --- | --- | --- |\n| `/api/v1/jobs` | `POST` | 创建一次写表任务 |\n| `/api/v1/jobs` | `GET` | 列出 Redis 中仍保留的任务基础信息 |\n| `/api/v1/heartbeat` | `POST` | Reader / Writer 心跳保活 |\n| `/api/v1/report_progress` | `POST` | Reader / Writer 进度上报 |\n| `/api/v1/jobs/{job_id}` | `GET` | 查询 Job 聚合详情 |\n| `/api/v1/alert` | `POST` | 异常告警上报，当前仅写 Redis |\n| `/health` | `GET` | 健康检查，供 LB 或容器探针使用 |\n\n文档明确说明 `GET /api/v1/jobs` 不包含 summary，而 `GET /api/v1/jobs/{job_id}` 的 summary 是查询时基于 bucket hash 现算出来的结果。控制面不再维护 `done_buckets`、`failed_buckets` 这类在线计数。\n\n## `CreateJob` 请求结构\n\n`CreateJob` 是接入文档中最重要的请求体。文档给出的 JSON 示例覆盖以下配置区域：\n\n- `source_type`：当前支持 `hdfs_parquet` 和 `tos_inventory_csv`。\n- `source`：输入数据位置与字段抽取配置。\n- `output`：输出 HDFS 目录与分区。\n- `bucketing`：bucket 数量、hash 算法与 `spark_seed`。\n- `concurrency`：Reader / Writer 并发数。\n- `reader_runtime.limits`：Reader 内部 worker、sink worker、parquet 并发和 batch 行数。\n- `sink`：Reader 到 Writer 的对接方式，当前默认按 `writer_rpc` 组装 Reader 输入。\n\n需要特别注意几个字段演进约定：\n\n- 输出目录字段是 `output.hdfs_dir`，不是 `output.hdfs_path`。\n- `spark_seed` 位于 `bucketing.spark_seed`，不在 `source.extract.spark_seed`。\n- Reader 和 Writer 的对接方式使用顶层 `sink`，不再通过 `source.extract.callback` 或 `reader_runtime.callback` 传递。\n- `sink.redis` 使用嵌套结构：`cluster`、`key_prefix`、`read_timeout_seconds`、`max_retries`。\n- `sink.type` 为空时，控制面当前默认按 `writer_rpc` 处理。\n- 控制面会基于 `output.hdfs_dir` 自动生成 Writer 使用的 `hdfs_temp_dir`，规则为 `${output.hdfs_dir}/_staging/${job_id}`。\n\n## 数据源模式\n\n### `hdfs_parquet`\n\n`hdfs_parquet` 是当前主链路。文档说明它已经对齐 `uri_source_reader` 最新 Input：\n\n- 支持 `source.hdfs_root` + `source.file_glob`。\n- 当提供 `source.extract.file_paths` 时，`source.hdfs_root` 可以为空。\n- 支持透传 `source.extract.format_field`、`create_timestamp_field`、`vid_field`、`oid_field`、`extra_field`、`expand_ts`。\n\n### `tos_inventory_csv`\n\n`tos_inventory_csv` 支持两种输入入口：\n\n- 直接通过 `source.extract.csv_uris` 传入 CSV 文件列表。\n- 通过 `source.tos_csv_root` 让控制面使用存储网关 SDK 扫描 root 下文件。\n\n两种入口最终都会被控制面归一化为 `csv_uris`，再按文件列表分片分发给 Reader。如果 `csv_uris` 来自 `source.tos_csv_root` 扫描，下发给 Reader 的路径格式是不带协议头的 `bucket/key`。\n\n使用 `source.tos_csv_root` 时，服务配置还需要提供 `StorageGW.AccessKey` 和 `StorageGW.SecretKey`，用于初始化存储网关 client。\n\n当 `source.extract.store_uri_column` 为空时，`tos_inventory_csv` 需要同时提供 `source.extract.bucket` 和 `source.extract.key_column`，由 Reader 拼接 `store_uri`。\n\n`tos_inventory_csv` 还支持透传以下字段给 Reader：\n\n- `source.extract.task_type`\n- `source.extract.size_column`\n- `source.extract.content_type_column`\n- `source.extract.storage_class_column`\n- `source.extract.create_timestamp_column`\n- `source.extract.create_time_str_column`\n\n其中 `task_type=manifest_expand` 时必须提供 `content_type_column`，用于展开 HLS/DASH manifest。`create_timestamp_column` 和 `create_time_str_column` 不能同时设置。\n\n## Reader / Writer 并发与分片\n\n`concurrency.num_readers` 表示请求的 Reader 上限，不一定等于最终实际拉起的 Reader 数量。\n\n控制面会根据实际输入规模自动下调 Reader 数：\n\n- 对 `hdfs_parquet`，如果实际输入文件数小于 `num_readers`，会下调到非空分片数。\n- 对 `tos_inventory_csv`，如果 `csv_uris` 数量小于 `num_readers`，也会下调到非空分片数。\n\n下调后的实际 Reader 数会写入任务元数据。因此 `CreateJob` 响应、`GET /api/v1/jobs` 和 `GET /api/v1/jobs/{job_id}` 中看到的 `num_readers` 或 `config.concurrency.num_readers` 可能小于原始请求值。\n\n## Hertz Client 调用模式\n\n文档推荐字节内 Go 服务使用 CloudWeGo Hertz Client 直接调用控制面。仓库内的 `examples/hertz_client/main.go` 是完整示例，覆盖：\n\n- `CreateJob`\n- `Heartbeat`\n- `ReportProgress`\n- `GetJobDetail`\n- `Alert`\n\n示例使用以下 Hertz 代码模式：\n\n```go\nreq := protocol.AcquireRequest()\nresp := protocol.AcquireResponse()\ndefer protocol.ReleaseRequest(req)\ndefer protocol.ReleaseResponse(resp)\n\nreq.SetMethod(consts.MethodPost)\nreq.SetRequestURI(\"http://127.0.0.1:8090/api/v1/heartbeat\")\nreq.Header.SetContentTypeBytes([]byte(\"application/json\"))\n```\n\n请求体通过 `json.Marshal` 序列化，例如心跳请求使用 `types.HeartbeatRequest`：\n\n```go\nbody, _ := json.Marshal(types.HeartbeatRequest{\n    JobID: \"<job_id>\",\n    Kind: \"writer\",\n    WriterID: \"writer-0\",\n    IP: \"127.0.0.1\",\n    Port: 9100,\n    Timestamp: time.Now().UTC(),\n})\nreq.SetBody(body)\n```\n\n示例中还包含泛型 `parseEnvelope[T any]`，用于统一解析 `{code, message, data}` 包装。\n\n控制面地址可以通过环境变量或 flag 注入：\n\n```bash\nBASE_URL=http://uri-task-control-panel.bytedance.net go run ./examples/hertz_client\ngo run ./examples/hertz_client -base-url http://127.0.0.1:8090\n```\n\n默认地址是 `http://127.0.0.1:8090`。\n\n## 错误码约定\n\n文档定义了控制面对外稳定暴露的错误码：\n\n| code | HTTP | 含义 |\n| --- | --- | --- |\n| `0` | `200` | 成功，`message` 为 `\"ok\"` |\n| `40001` | `400` | 参数格式错误，例如 `BindAndValidate` 解析失败或 `job_id` 缺失 |\n| `40002` | `400` | 必填字段缺失，例如 `kind`、`job_id`、Writer ID 或 Reader ID 缺失 |\n| `40010` | `400` | 任务创建失败，例如 `bucketing.num_buckets` 非法或 Redis 写入失败 |\n| `40401` | `404` | 任务不存在，例如 `cp:job:{jobId}` 未找到或元数据缺失 |\n| `50001` | `500` | 内部错误，例如 Redis 读写异常或 Collector 写入失败 |\n\n贡献者在修改 handler、参数校验或 Redis 读写错误处理时，应同步确认这些错误码是否仍与实现一致。\n\n## 心跳、进度与告警\n\n文档给出客户端侧上报频率建议：\n\n| 上报接口 | 建议频率 | 说明 |\n| --- | --- | --- |\n| `/api/v1/heartbeat` | 30 秒一次 | 与配置 `Heartbeat.NextIntervalSec` 对齐 |\n| `/api/v1/report_progress` Writer | 30 秒一次，或 bucket 状态切换时立即上报 | 常见状态包括 `RUNNING`、`MERGING`、`WRITING_HDFS`、`DONE`、`FAILED` |\n| `/api/v1/report_progress` Reader | 30 秒一次 | `files_total`、`files_done` 保持累计单调递增 |\n| `/api/v1/alert` | 事件驱动 | 当前仅写 Redis，不主动发送飞书通知 |\n\n如果 Worker 的 `last_hb` 超过 90 秒未更新，详情查询中会展示为 `LOST`。Writer 在 `MarkBucketDone` 成功后，建议立即补发终态进度，保证控制面详情页尽快反映 bucket 收尾结果。\n\n## 超时与重试建议\n\n控制面当前不做主动限流。客户端侧建议：\n\n- `DialTimeout=1s`\n- `ReadTimeout=3s`\n- `GET /api/v1/jobs/{job_id}` 在 bucket 数量较大时可放宽到 5 秒\n\n重试策略需要区分接口语义：\n\n- `/api/v1/heartbeat` 和 `/api/v1/report_progress` 属于幂等上报，可以按指数退避重试 3 次。\n- `POST /api/v1/jobs` 不应盲目重试，应基于上一次响应中的 `job_id` 判断是否需要继续查询或补偿。\n\n## 维护建议\n\n修改 `docs/integration.md` 时，应优先确认以下来源：\n\n- `api/swagger.yaml` 中的路径、字段、响应 schema 和错误码。\n- `examples/hertz_client/main.go` 中的真实客户端调用方式。\n- Reader 输入结构是否仍与 `reader_runtime.limits`、`source.extract`、`sink` 文档一致。\n- Writer 的 `MarkBucketDone` 行为和 bucket 状态枚举是否发生变化。\n- Redis key、summary 聚合方式、Worker `LOST` 判定阈值是否与服务实现一致。\n\n这份文档的价值在于降低跨服务接入成本。接口字段、任务生命周期或下游协议发生变化时，应把文档更新作为同一变更的一部分处理。","other-go-mod":"# Other — go.mod\n\n## go.mod\n\n`go.mod` 定义当前 Go 模块的身份、语言版本和依赖边界。它不包含可执行逻辑，因此没有内部调用、外部调用或运行时执行流；它由 Go 工具链在构建、测试、依赖解析和模块缓存下载时读取。\n\n当前模块路径为：\n\n```go\nmodule code.byted.org/videoarch/uri_task_control_panel\n```\n\n这意味着仓库内代码应以该路径作为模块根路径进行包引用，例如同仓库内部包会挂在 `code.byted.org/videoarch/uri_task_control_panel/...` 下。\n\n## Go 版本\n\n```go\ngo 1.23.0\n```\n\n该声明影响 Go 命令的模块语义、标准库兼容行为和语言版本选择。开发、CI 和构建环境应使用兼容 Go 1.23 的工具链，避免因为本地 Go 版本过低导致解析或编译行为不一致。\n\n## 直接依赖\n\n第一组 `require` 是项目显式依赖，通常对应业务代码、框架代码或测试代码直接 import 的包。\n\n主要依赖可以按职责理解：\n\n```mermaid\nflowchart TD\n    A[\"uri_task_control_panel 模块\"] --> B[\"HTTP 服务: Hertz\"]\n    A --> C[\"RPC: Kitex / Overpass\"]\n    A --> D[\"配置: TCC / Caesar Config / env\"]\n    A --> E[\"存储: Redis / HDFS / StorageGW\"]\n    A --> F[\"日志与观测: logs\"]\n    A --> G[\"测试: testify / miniredis\"]\n```\n\n### 服务框架\n\n`code.byted.org/middleware/hertz v1.14.3` 和 `github.com/cloudwego/hertz v0.10.4` 表明项目使用 Hertz 作为 HTTP 服务框架。前者是字节内部中间件封装，后者是 CloudWeGo 开源基础框架。业务代码中如果涉及 HTTP 路由、请求上下文、中间件或服务启动，通常会依赖这一组包。\n\n`code.byted.org/kite/kitex v1.20.3` 是内部 Kitex 依赖，用于 RPC 服务或 RPC 客户端相关逻辑。`code.byted.org/overpass/bytedance_videoarch_uri_task_control_panel` 是 Overpass 生成的服务客户端依赖，版本使用伪版本：\n\n```go\nv0.0.0-20260520120833-80095d4e5c46\n```\n\n这类版本绑定到具体提交，更新时要确认 IDL、生成代码和调用方字段兼容。\n\n### 配置与环境\n\n`code.byted.org/gopkg/env v1.7.20` 用于读取运行环境信息。\n\n`code.byted.org/gopkg/tccclient v1.6.8` 和 `code.byted.org/videoarch/caesar_config/v4 v4.0.5` 说明项目存在动态配置或业务配置读取能力。修改配置相关代码时，需要同时关注配置 key、默认值、失败降级策略和环境隔离。\n\n### 存储与外部资源\n\n`code.byted.org/kv/goredis/v5 v5.7.7` 和 `code.byted.org/kv/redis-v6 v1.1.7` 都是 Redis 相关依赖。代码贡献时应确认具体包的使用位置，避免在新增逻辑中混用两套 Redis API 造成连接池、序列化或错误处理风格不一致。\n\n`code.byted.org/inf/hdfs-go-sdk-on-cgo v1.1.5` 表示项目依赖 HDFS SDK，且包名包含 `cgo`，构建环境可能需要满足 CGO 及相关系统库要求。\n\n`code.byted.org/videoarch/storagegw-go v1.1.57` 是 VideoArch 存储网关 SDK，通常用于统一访问对象存储或内部存储服务。\n\n### 日志、标识与测试\n\n`code.byted.org/gopkg/logs/v2 v2.1.60` 是直接日志依赖。新增日志时应优先沿用仓库已有的 `logs/v2` 使用方式。\n\n`github.com/google/uuid v1.6.0` 用于 UUID 生成或解析。\n\n`github.com/stretchr/testify v1.11.1` 是测试断言库，`github.com/alicebob/miniredis/v2 v2.38.0` 用于在单元测试中启动内存 Redis。涉及 Redis 行为的测试应优先考虑 `miniredis`，减少对真实环境的依赖。\n\n## 间接依赖\n\n第二组 `require` 全部带有 `// indirect`，表示它们不是当前模块直接 import 的主要依赖，而是由直接依赖传递引入。它们覆盖的能力包括：\n\n- 链路追踪与监控：`bytedtrace`、`trace-client-go`、`metrics`、`prometheus`、`lidar/profiler`\n- 服务发现与服务治理：`consul`、`service_mesh`、`hystrix`、`circuitbreaker`\n- RPC 与序列化：`cloudwego/kitex`、`thrift`、`protobuf`、`grpc`、`sonic`\n- 安全与身份：`kms`、`spiffe`、`zero-trust`、`cryptoutils`\n- 配置解析：`viper`、`toml`、`yaml`、`ini`\n- 压缩与底层优化：`lz4`、`snappy`、`compress`、`netpoll`\n\n维护时通常不直接修改间接依赖版本，除非需要修复漏洞、解决冲突或配合直接依赖升级。更常见的做法是修改直接依赖版本后运行：\n\n```bash\ngo mod tidy\n```\n\n让 Go 工具链重新收敛间接依赖集合。\n\n## 依赖解析方式\n\nGo 使用最小版本选择机制解析依赖图。`go.mod` 中声明的版本是模块构建时的最低可接受版本；如果传递依赖要求更高版本，最终构建版本可能被提升并记录在 `go.sum` 中。\n\n这个文件没有 `replace` 或 `exclude` 指令，说明当前依赖解析完全依赖模块仓库中的版本声明。引入本地替换或临时分支时应谨慎，避免把调试用 `replace` 提交到主分支。\n\n## 与代码库的连接方式\n\n`go.mod` 是整个仓库的依赖入口：\n\n- 编译业务代码时，Go 根据 `module` 路径解析仓库内部包。\n- 运行测试时，`testify`、`miniredis` 等测试依赖由这里声明。\n- HTTP、RPC、配置、存储、日志等基础能力通过直接依赖提供。\n- 观测、安全、服务治理等能力多由框架依赖传递引入。\n\n由于本模块没有执行流，理解它时重点不是调用关系，而是依赖边界：新增业务代码应优先复用这里已经存在的框架和 SDK，避免引入功能重复的库。\n\n## 维护建议\n\n新增依赖时优先使用 `go get` 或现有构建工具更新版本，再运行 `go mod tidy`。不要只手动编辑 `go.mod`，否则容易遗漏 `go.sum` 或保留无用间接依赖。\n\n升级核心框架依赖时需要特别关注这些包：\n\n```go\ncode.byted.org/middleware/hertz\ngithub.com/cloudwego/hertz\ncode.byted.org/kite/kitex\ncode.byted.org/overpass/bytedance_videoarch_uri_task_control_panel\ncode.byted.org/kv/goredis/v5\ncode.byted.org/kv/redis-v6\n```\n\n这些依赖可能影响服务启动、请求处理、RPC 调用、连接池、序列化和错误处理，升级后应至少运行完整单元测试，并覆盖 HTTP、RPC、Redis 和配置读取相关路径。","other-internal-api":"# Other — internal-api\n\n## internal/api 模块\n\n`internal/api` 提供基于 CloudWeGo Hertz 的 HTTP/JSON 控制面接口。它负责接收外部请求、做基础参数校验、调用 `job.Manager` 或 `collector.Collector` 执行业务动作，并从 `store.Store` 聚合 Redis 中的任务、worker、bucket 进度数据返回给调用方。\n\n模块入口是 `Server`：\n\n```go\ntype Server struct {\n\tcfg       *config.Config\n\tst        *store.Store\n\tjobMgr    *job.Manager\n\tcollector *collector.Collector\n}\n```\n\n`NewServer(cfg, st, jobMgr, col)` 注入配置、Redis 存储层、任务管理器和进度采集器。`Register(h *server.Hertz)` 在 Hertz 实例上注册 `/api/v1` 路由和 `/health` 健康检查。\n\n## 路由与处理器\n\n`Register` 注册的接口如下：\n\n| 方法 | 路径 | 处理函数 | 作用 |\n| --- | --- | --- | --- |\n| `POST` | `/api/v1/jobs` | `handleCreateJob` | 创建任务 |\n| `GET` | `/api/v1/jobs` | `handleListJobs` | 查询任务列表 |\n| `GET` | `/api/v1/jobs/:job_id` | `handleGetJob` | 查询单个任务详情 |\n| `POST` | `/api/v1/heartbeat` | `handleHeartbeat` | 接收 Reader/Writer 心跳 |\n| `POST` | `/api/v1/report_progress` | `handleReportProgress` | 接收 Reader/Writer 进度 |\n| `POST` | `/api/v1/alert` | `handleAlert` | 写入任务告警 |\n| `POST` | `/api/v1/ops/purge_all_jobs` | `handlePurgeAllJobs` | 清理控制面记录的全部任务 |\n| `GET` | `/health` | 内联 handler | 返回 `ok` |\n\n所有业务响应都通过 `Response` 包装：\n\n```go\ntype Response struct {\n\tCode    int         `json:\"code\"`\n\tMessage string      `json:\"message\"`\n\tData    interface{} `json:\"data,omitempty\"`\n}\n```\n\n成功响应由 `ok` 写出，格式为 `{code: 0, message: \"ok\", data: ...}`。失败响应由 `fail` 写出，`code != 0`，HTTP 状态码由调用处决定。\n\n## 主要请求流程\n\n```mermaid\nflowchart TD\n    A[\"HTTP 请求\"] --> B[\"Hertz handler\"]\n    B --> C[\"BindAndValidate / 参数校验\"]\n    C --> D{\"接口类型\"}\n    D --> E[\"job.Manager.CreateJob\"]\n    D --> F[\"collector.Heartbeat / ReportProgress\"]\n    D --> G[\"store.Store 读写 Redis\"]\n    E --> H[\"ok / fail 统一响应\"]\n    F --> H\n    G --> H\n```\n\n`handleCreateJob` 绑定 `types.CreateJobRequest`，调用 `s.jobMgr.CreateJob(ctx, &req)` 创建任务。创建失败按 `40010` 返回，绑定失败按 `40001` 返回。\n\n`handleHeartbeat` 绑定 `types.HeartbeatRequest`，要求 `job_id` 和 `kind` 非空，然后调用 `s.collector.Heartbeat`。成功时返回 `types.HeartbeatResponse{NextIntervalSec: s.cfg.Heartbeat.NextIntervalSec}`。\n\n`handleReportProgress` 绑定 `types.ProgressRequest`，同样要求 `job_id` 和 `kind` 非空，然后调用 `s.collector.ReportProgress`。成功时返回 `types.ProgressResponse{Ack: true}`。\n\n`handleAlert` 绑定 `types.AlertRequest`，要求 `job_id` 非空。如果 `Timestamp` 为空，会用 `time.Now().UTC()` 补齐。请求体被 JSON 序列化后通过 `s.st.AppendAlert(ctx, req.JobID, body)` 写入 Redis LIST。\n\n`handlePurgeAllJobs` 调用 `s.st.PurgeAllJobs(ctx)` 删除控制面记录的任务及关联元数据，返回 `types.PurgeAllJobsResponse`。\n\n## 任务列表聚合\n\n`handleListJobs` 的核心逻辑在 `buildJobList(ctx)`。\n\n它先通过 `s.st.JobIDs(ctx)` 获取当前 Redis 中仍保留的任务 ID，然后逐个读取 `s.st.JobMetaRaw(ctx, jobID)`。每个任务被转换成 `types.JobListItem`：\n\n```go\ntype JobListItem struct {\n\tJobID         string     `json:\"job_id\"`\n\tState         string     `json:\"state\"`\n\tCreateTime    time.Time  `json:\"create_time\"`\n\tFinishTime    *time.Time `json:\"finish_time,omitempty\"`\n\tNumBuckets    int        `json:\"num_buckets\"`\n\tNumWriters    int        `json:\"num_writers\"`\n\tNumReaders    int        `json:\"num_readers\"`\n\tSourceType    string     `json:\"source_type,omitempty\"`\n\tSourceRoot    string     `json:\"source_root,omitempty\"`\n\tOutputHDFSDir string     `json:\"output_hdfs_dir,omitempty\"`\n}\n```\n\n`buildJobList` 依赖 `cp:job:{jobId}` hash 中的字段：\n\n- `state`\n- `request`\n- `num_buckets`\n- `num_writers`\n- `num_readers`\n- `create_time`\n- `finish_time`\n\n`request` 字段会通过 `parseJobConfigView` 反序列化为 `types.JobConfigView`，再用于填充：\n\n- `SourceType`\n- `SourceRoot`\n- `OutputHDFSDir`\n\n`jobListSourceRoot` 根据 `SourceType` 选择数据源根路径：\n\n- `types.SourceTypeHDFSParquet` 使用 `cfg.Source.HDFSRoot`\n- `types.SourceTypeTOSInventoryCSV` 使用 `cfg.Source.TOSCSVRoot`\n- 其他类型返回空字符串\n\n列表结果按 `CreateTime` 倒序排列；如果创建时间相同，则按 `JobID` 升序排列。\n\n## 任务详情聚合\n\n`handleGetJob` 从路径参数读取 `job_id`，并解析 query 参数 `include_buckets`。参数解析使用 `parseBoolQueryArg`，支持 Go 标准布尔字符串；非法值会返回 `40002`。\n\n核心逻辑在：\n\n```go\nfunc (s *Server) buildJobDetail(ctx context.Context, jobID string, includeBuckets bool) (interface{}, error)\n```\n\n当 `includeBuckets=true` 时返回 `*types.JobDetailResponse`，包含 bucket 明细和 bucket 派生统计。当 `includeBuckets=false` 时返回 `*types.JobDetailLiteResponse`，跳过 bucket 明细扫描，只保留不依赖 bucket hash 的轻量字段。\n\n### 详情数据来源\n\n`buildJobDetail` 读取以下 Redis 数据：\n\n| 数据 | Store 方法 | 说明 |\n| --- | --- | --- |\n| Job 元数据 | `JobMetaRaw` | 读取 `cp:job:{jobId}` |\n| Writer ID 集合 | `ListWorkerIDs` | 读取 `cp:job:{jobId}:workers` |\n| Reader ID 集合 | `ListReaderIDs` | 读取 `cp:job:{jobId}:readers` |\n| Worker hash | `WorkerHashes` | 批量读取 writer/reader hash |\n| Bucket 分配表 | `BucketAssignAll` | `includeBuckets=true` 时读取 bucket 到 writer index 的映射 |\n| Bucket hash | `BucketHashes` | `includeBuckets=true` 时批量读取 bucket 进度 |\n\nJob 配置快照来自 `meta[\"request\"]`，由 `parseJobConfigView` 解析为 `types.JobConfigView`。该结构完整镜像创建请求中的核心配置，包括 `Source`、`Output`、`Bucketing`、`Concurrency`、`LambdaRuntime`、`ReaderRuntime`、`Sink`、`WriterRuntime` 和 `Callback`。\n\n### `include_buckets=true` 的完整详情\n\n完整响应类型是 `types.JobDetailResponse`：\n\n```go\ntype JobDetailResponse struct {\n\tJobID          string        `json:\"job_id\"`\n\tState          string        `json:\"state\"`\n\tCreateTime     time.Time     `json:\"create_time\"`\n\tFinishTime     *time.Time    `json:\"finish_time\"`\n\tHDFSOutputPath string        `json:\"hdfs_output_path,omitempty\"`\n\tHDFSTempDir    string        `json:\"hdfs_temp_dir,omitempty\"`\n\tConfig         JobConfigView `json:\"config\"`\n\tSummary        JobSummary    `json:\"summary\"`\n\tWriters        []WorkerView  `json:\"writers\"`\n\tReaders        []WorkerView  `json:\"readers\"`\n}\n```\n\n完整模式会读取 `BucketAssignAll` 和 `BucketHashes`，然后用 `buildWorkerBucketsFromHashes` 将 bucket hash 转成 `types.BucketProgress`。Writer 视图中的 `Buckets` 和 `BucketsDone` 只在完整模式下填充。\n\n`types.JobSummary` 的 bucket 字段也只在完整模式下计算：\n\n- `BucketsTotal` 来自 `configView.Bucketing.NumBuckets`\n- `BucketsDone`\n- `BucketsFailed`\n- `BucketsRunning`\n- `BucketsMerging`\n- `BucketsPending`\n\n`applyBucketSummary` 按 `bucketStateGroup` 分组：\n\n- `types.BucketStateDone` 归为 done\n- `types.BucketStateFailed` 归为 failed\n- `types.BucketStateMerging` 和 `types.BucketStateWritingHDFS` 归为 merging\n- `types.BucketStateRunning` 归为 running\n- 其他状态归为 pending\n\n`BucketsPending` 由总数减去已归类数量得到，并且不会小于 0。\n\n### `include_buckets=false` 的轻量详情\n\n轻量响应类型是 `types.JobDetailLiteResponse`：\n\n```go\ntype JobDetailLiteResponse struct {\n\tJobID          string           `json:\"job_id\"`\n\tState          string           `json:\"state\"`\n\tCreateTime     time.Time        `json:\"create_time\"`\n\tFinishTime     *time.Time       `json:\"finish_time\"`\n\tHDFSOutputPath string           `json:\"hdfs_output_path,omitempty\"`\n\tHDFSTempDir    string           `json:\"hdfs_temp_dir,omitempty\"`\n\tConfig         JobConfigView    `json:\"config\"`\n\tSummary        JobSummaryLite   `json:\"summary\"`\n\tWriters        []WriterLiteView `json:\"writers\"`\n\tReaders        []WorkerView     `json:\"readers\"`\n}\n```\n\n轻量模式不会扫描 bucket hash，因此不会输出这些 bucket 派生字段：\n\n- writer 的 `buckets`\n- writer 的 `buckets_done`\n- summary 的 `buckets_done`\n- summary 的 `buckets_pending`\n- summary 的 `buckets_running`\n- summary 的 `buckets_merging`\n- summary 的 `buckets_failed`\n\n轻量 summary 使用 `types.JobSummaryLite`，只保留：\n\n- `BucketsTotal`\n- `FilesTotal`\n- `FilesDone`\n- `RowsRead`\n- `BytesRead`\n\n这可以避免详情页在 bucket 数量很大时产生大量 Redis 读取。\n\n## Worker 视图与状态判断\n\nWriter 和 Reader 的展示结构主要使用 `types.WorkerView`：\n\n```go\ntype WorkerView struct {\n\tWriterID        string               `json:\"writer_id,omitempty\"`\n\tReaderID        string               `json:\"reader_id,omitempty\"`\n\tStatus          string               `json:\"status\"`\n\tIP              string               `json:\"ip,omitempty\"`\n\tPort            int                  `json:\"port,omitempty\"`\n\tBucketsAssigned int                  `json:\"buckets_assigned,omitempty\"`\n\tBucketsDone     int                  `json:\"buckets_done,omitempty\"`\n\tBucketsSeen     int                  `json:\"buckets_seen,omitempty\"`\n\tFiles           *ReaderFilesProgress `json:\"files,omitempty\"`\n\tBuckets         []BucketProgress     `json:\"buckets,omitempty\"`\n\tLastUpdateTime  *time.Time           `json:\"lastUpdateTime,omitempty\"`\n\tLastHB          time.Time            `json:\"last_hb\"`\n}\n```\n\n轻量模式下 Writer 使用 `types.WriterLiteView`，不包含 bucket 明细和 `BucketsDone`。\n\nWorker 状态通过 `effectiveDetailWorkerStatus` 做展示层修正：\n\n- 空状态视为 `types.WorkerStateLost`\n- `types.WorkerStateDone` 和 `types.WorkerStateFailed` 是终态，即使心跳过期也保持原状态\n- 没有 `last_hb` 时，如果状态是 `types.WorkerStateBooting`，保持 `BOOTING`\n- 没有 `last_hb` 且不是 `BOOTING`，视为 `LOST`\n- `last_hb` 超过 `s.cfg.Heartbeat.TTLSec` 时，视为 `LOST`\n- 其他情况保持原状态\n\n这个规则让刚创建但还没上报心跳的 worker 能显示为 `BOOTING`，同时能把过期的运行中 worker 标记为 `LOST`。\n\n## 排序规则\n\n`buildJobDetail` 会稳定排序 Writer 和 Reader，保证 API 输出可预测。\n\nWriter 排序规则：\n\n1. 有 `writer_idx` 的排在没有 index 的前面\n2. `writer_idx` 小的排在前面\n3. index 相同或没有 index 时，按 `WriterID` 升序\n\nReader 排序规则类似：\n\n1. 有 `reader_idx` 的排在没有 index 的前面\n2. `reader_idx` 小的排在前面\n3. index 相同或没有 index 时，按 `ReaderID` 升序\n\n这些 index 来自 store 层写入的 worker hash 字段：\n\n- writer 使用 `writer_idx`\n- reader 使用 `reader_idx`\n\n## Reader 进度聚合\n\nReader hash 中的文件进度字段会被汇总到详情 summary：\n\n- `files_total`\n- `files_done`\n- `rows_read`\n- `bytes_read`\n\n单个 Reader 只要这些字段中任意一个大于 0，就会生成 `types.ReaderFilesProgress` 并放入 `WorkerView.Files`。\n\n`buildJobDetail` 会累加所有 Reader 的：\n\n- `FilesTotal`\n- `FilesDone`\n- `RowsRead`\n- `BytesRead`\n\n完整模式和轻量模式都会返回这些聚合值，因为它们不依赖 bucket 扫描。\n\n## Bucket 进度转换\n\n`buildWorkerBucketsFromHashes(bucketIDs, bucketHashes)` 将 Redis bucket hash 转换为 `types.BucketProgress`。它会先对 bucket ID 升序排序，再逐个读取 hash 字段：\n\n| Redis 字段 | 响应字段 |\n| --- | --- |\n| `status` | `Status` |\n| `total_uris` | `TotalUrisReceived` |\n| `bytes` | `BytesReceived` |\n| `run_files` | `RunFilesGenerated` |\n| `peak_local_disk_mb` | `PeakLocalDiskUsageMb` |\n| `merge_progress` | `MergeProgress` |\n| `hdfs_write_progress` | `HDFSWriteProgress` |\n| `final_path` | `FinalParquetPath` |\n| `final_size` | `FinalByteSize` |\n| `last_update` | `LastUpdateTime` |\n\n如果某个 bucket hash 为空，该 bucket 不会出现在返回数组中。`countDoneBuckets` 根据 `bucketStateGroup` 统计 Writer 视图中的完成 bucket 数。\n\n## 与其他模块的关系\n\n`internal/api` 本身不直接实现任务调度、心跳落库或进度落库，而是作为 HTTP 边界层连接其他模块：\n\n- `internal/config` 提供 `config.Config`，主要用于心跳间隔和 TTL 判断\n- `internal/job` 提供 `job.Manager`，由 `handleCreateJob` 调用创建任务\n- `internal/collector` 提供 `collector.Collector`，由心跳和进度接口调用\n- `internal/store` 封装 Redis 访问，供列表、详情、告警和清理接口使用\n- `internal/types` 定义所有请求、响应、状态和配置快照 DTO\n\nAPI 层的聚合逻辑集中在 `buildJobList` 和 `buildJobDetail`。如果新增响应字段，通常需要同时检查：\n\n- `internal/types/dto.go` 中对应响应结构\n- `store.Store` 是否已经写入或能读取对应 Redis 字段\n- `buildJobList` 或 `buildJobDetail` 是否需要解析、汇总或排序\n- `handlers_test.go` 是否覆盖完整模式和轻量模式差异\n\n## 测试覆盖重点\n\n`internal/api/handlers_test.go` 使用 `miniredis` 和 `goredis.NewClientWithServers` 构造隔离 Redis，通过 `newTestServer` 创建带测试配置的 `Server` 和 `store.Store`。\n\n已有测试覆盖了这些行为：\n\n- `TestBuildJobDetailIncludesNestedSourceAndOutputConfig` 验证详情接口会保留嵌套配置，并聚合 writer、reader、bucket 和 summary\n- `TestBuildJobDetailSkipsBucketDerivedFieldsWhenBucketsExcluded` 验证 `includeBuckets=false` 不输出 bucket 派生字段\n- `TestBuildJobListReturnsActiveJobsBasicInfo` 验证任务列表字段和创建时间倒序\n- `TestBuildJobDetailAndListDoNotFallbackHDFSPaths` 验证缺失的 `HDFSOutputPath` 和 `HDFSTempDir` 不会被 fallback 成其他路径\n- `TestBuildJobDetailKeepsDoneWorkersAndMarksStaleRunningLost` 验证终态 worker 保持终态，过期运行中 worker 变为 `LOST`\n- `TestBuildJobDetailSummarizesBucketsFromBucketHashes` 验证 bucket 状态分组与 summary 计算\n- `TestBuildJobDetailKeepsBootingWorkersWithoutHeartbeat` 验证无心跳的 booting worker 保持 `BOOTING`\n- `TestBuildJobDetailSortsWritersAndReadersByIndex` 验证 worker 按 index 稳定排序\n\n这些测试主要围绕 `buildJobDetail` 和 `buildJobList`，因此修改聚合逻辑时应优先补充或更新这些用例。","other-internal-barrier":"# Other — internal-barrier\n\n## internal/barrier 模块\n\n`internal/barrier` 维护 Reader-Done Barrier 后台协程。它负责周期性扫描 Redis 中的活跃任务，在确认某个 Job 下所有 Reader 都进入 `DONE` 后，将 Job 状态推进到 `FINALIZING`，并调用注入的 `Finalizer.FanOut(ctx, jobID)` 触发后续 fan-out。\n\n该模块不直接处理 bucket、Writer RPC 或任务成功判定；这些逻辑分别在 `internal/finalizer` 和 `internal/store` 中完成。\n\n## 核心流程\n\n```mermaid\nflowchart TD\n    A[\"Watcher.Start\"] --> B[\"定时 tick\"]\n    B --> C[\"Store.ActiveJobIDs\"]\n    C --> D[\"AllReadersDone\"]\n    D --> E{\"全部 Reader 为 DONE?\"}\n    E -- \"否\" --> B\n    E -- \"是\" --> F[\"Store.SetNXBarrierFired\"]\n    F --> G{\"首次触发?\"}\n    G -- \"否\" --> B\n    G -- \"是\" --> H[\"SetJobState(FINALIZING)\"]\n    H --> I[\"Finalizer.FanOut\"]\n```\n\n`Watcher.Start(ctx)` 是阻塞方法，通常以 goroutine 方式启动：\n\n```go\nfin, err := finalizer.New(st, cfg, writerCli)\nif err != nil {\n\tlogs.Fatal(\"[main] finalizer init: %v\", err)\n}\n\nw := barrier.New(st, cfg, fin)\ngo w.Start(rootCtx)\n```\n\n实际装配发生在 `cmd/main.go`。`rootCtx` 在 Hertz shutdown hook 中取消，`Watcher.Start` 收到 `ctx.Done()` 后退出。\n\n## 关键类型\n\n### `Finalizer`\n\n```go\ntype Finalizer interface {\n\tFanOut(ctx context.Context, jobID string) error\n}\n```\n\n`barrier` 只依赖这个最小接口。当前真实实现是 `internal/finalizer.Finalizer`，其 `FanOut` 会读取 bucket assignment，并按 bucket 调用 Writer 的 `MarkBucketDone`。\n\n这种接口边界让 `barrier` 不需要依赖 Writer RPC，也便于单测用 `fakeFinalizer` 统计调用次数。\n\n### `Watcher`\n\n```go\ntype Watcher struct {\n\tst        *store.Store\n\tcfg       *config.Config\n\tfinalizer Finalizer\n}\n```\n\n`Watcher` 是后台扫描器，包含三个依赖：\n\n- `st *store.Store`：访问 Redis 中的 Job、Reader 状态和 barrier fired 标记。\n- `cfg *config.Config`：读取 `cfg.Barrier.CheckIntervalSec` 控制扫描周期。\n- `finalizer Finalizer`：Barrier 首次触发后执行 fan-out。\n\n使用 `New(st, cfg, fin)` 构造：\n\n```go\nfunc New(st *store.Store, cfg *config.Config, fin Finalizer) *Watcher\n```\n\n当前构造函数不做 nil 校验，调用方需要保证三个依赖都已正确初始化。\n\n## 扫描与触发逻辑\n\n### `Start(ctx context.Context)`\n\n`Start` 根据 `cfg.Barrier.CheckIntervalSec` 创建 `time.Ticker`：\n\n```go\ninterval := time.Duration(w.cfg.Barrier.CheckIntervalSec) * time.Second\nif interval <= 0 {\n\tinterval = 10 * time.Second\n}\n```\n\n虽然 `config.validate()` 要求 `Barrier.CheckIntervalSec > 0`，这里仍保留了运行期兜底。需要注意：`Start` 不会启动后立即扫描，第一次执行发生在第一个 ticker 周期到达时。\n\n### `tick(ctx context.Context)`\n\n`tick` 是每轮扫描的主体：\n\n1. 调用 `w.st.ActiveJobIDs(ctx)` 读取 `cp:jobs:active`。\n2. 对每个 `jobID` 调用 `AllReadersDone(ctx, w.st, jobID)`。\n3. 如果所有 Reader 已完成，调用 `w.st.SetNXBarrierFired(ctx, jobID)`。\n4. 只有 SETNX 成功的第一次触发会继续执行。\n5. 调用 `w.st.SetJobState(ctx, jobID, types.JobStateFinalizing)`。\n6. 调用 `w.finalizer.FanOut(ctx, jobID)`。\n\n`SetJobState` 和 `FanOut` 的错误处理并不对称：`SetJobState` 的返回值被忽略，`FanOut` 失败只记录日志。Barrier 的一次性语义由 `SetNXBarrierFired` 决定，因此一旦 fired 标记写入成功，即使后续 fan-out 报错，下一轮扫描也不会再次触发。\n\n## Reader 完成判定\n\n### `AllReadersDone(ctx, st, jobID)`\n\n```go\nfunc AllReadersDone(ctx context.Context, st *store.Store, jobID string) bool\n```\n\n判定规则很窄：\n\n- `st.AllReaderStatuses(ctx, jobID)` 返回错误时，结果为 `false`。\n- Reader 集合为空时，结果为 `false`。\n- 任意 Reader 状态不是 `types.WorkerStateDone` 时，结果为 `false`。\n- 只有 Reader 集合非空且所有状态都等于 `DONE` 时，结果为 `true`。\n\nReader 状态来自 `store.AllReaderStatuses`，它会读取：\n\n- `cp:job:{jobId}:readers`\n- `cp:job:
