{jobId}:reader:{readerId}` hash 中的 `status` 和 `last_hb`\n\n`store.AllReaderStatuses` 会把缺失状态、缺失心跳、心跳超时的非终态 Reader 视为 `LOST`。已经是终态的 Reader 会保持原状态，其中 `DONE` 不会因为心跳过期被改判为 `LOST`。\n\n因此，Barrier 只接受全员 `DONE`，不会把 `FAILED` 或 `LOST` 当作可通过状态。\n\n## Redis 数据约定\n\n`barrier` 直接或间接依赖以下 key：\n\n| Key | 访问方 | 用途 |\n| --- | --- | --- |\n| `cp:jobs:active` | `Store.ActiveJobIDs` | 当前仍需后台处理的 Job 集合 |\n| `cp:job:{jobId}:readers` | `Store.AllReaderStatuses` | Job 下 Reader ID 集合 |\n| `cp:job:{jobId}:reader:{readerId}` | `Store.AllReaderStatuses` | Reader 状态与心跳 |\n| `cp:job:{jobId}:barrier_fired` | `Store.SetNXBarrierFired` | Barrier 一次性触发标记 |\n| `cp:job:{jobId}` | `Store.SetJobState` | Job 元数据 hash，写入 `state=FINALIZING` |\n\n`SetNXBarrierFired` 使用：\n\n```go\nSETNX cp:job:{jobId}:barrier_fired 1 EX 86400\n```\n\n返回 `true` 表示当前进程或当前轮扫描是首次触发者。这个设计可以防止同一个 Watcher 多轮重复触发，也能覆盖多实例部署时的并发竞争。\n\n## 与其他模块的关系\n\n`internal/job` 创建任务时会写入 Job 元数据、worker 元数据和 `cp:jobs:active`。Reader 运行期间通过 `internal/collector` 上报心跳与进度，最终把 Reader 状态写成 `DONE`。\n\n`internal/barrier` 只负责观察这些状态并完成一次状态跃迁：\n\n```text\nRUNNING -> FINALIZING\n```\n\n进入 `FINALIZING` 后，`internal/finalizer` 负责 fan-out Writer。Writer 后续上报 bucket 完成状态时，`store.maybeMarkJobSucceeded` 会在所有 bucket 都完成后调用 `MarkJobFinished`，将 Job 标记为 `SUCCEEDED` 并从 `cp:jobs:active` 移除。\n\n## 测试覆盖\n\n`internal/barrier/barrier_test.go` 使用 `miniredis` 和真实 `store.Store` 测试模块行为。\n\n`TestAllReadersDone` 覆盖 Reader 完成判定：\n\n- 没有 Reader 时返回 `false`。\n- 部分 Reader 为 `RUNNING` 时返回 `false`。\n- 只有所有 Reader 都为 `DONE` 时返回 `true`。\n\n`TestWatcherFiresOnce` 覆盖 Watcher 的一次性触发：\n\n- 手动写入 `cp:jobs:active`、Reader 集合和 `DONE` 状态。\n- 启动 `Watcher.Start(ctx)`。\n- 使用 `fakeFinalizer` 统计 `FanOut` 调用次数。\n- 等待多个扫描周期后确认 `FanOut` 只调用一次。\n- 确认 `cp:job:{jobId}` 的 `state` 被写成 `FINALIZING`。\n\n## 修改注意事项\n\n修改 `barrier` 时优先保持以下语义不变：\n\n- 空 Reader 集合不能触发 Barrier。\n- 只有所有 Reader 都是 `types.WorkerStateDone` 才能触发。\n- `SetNXBarrierFired` 必须先于 `Finalizer.FanOut`，否则会引入重复 fan-out 风险。\n- `Watcher.Start` 必须响应 `ctx.Done()`，避免进程优雅停机时后台协程泄漏。\n- `barrier` 不应直接依赖 Writer RPC；继续通过 `Finalizer` 接口连接 `internal/finalizer`。","other-internal-collector":"# Other — internal-collector\n\n## 模块职责\n\n`internal/collector` 是控制面接收运行时上报的写入入口，负责处理 Reader/Writer 的心跳与进度上报，并把请求转换为 `internal/store.Store` 的 Redis 写操作。\n\n核心类型是 `Collector`：\n\n```go\ntype Collector struct {\n\tst *store.Store\n}\n\nfunc New(st *store.Store) *Collector\n```\n\n`Collector` 本身不直接操作 Redis，也不做复杂状态聚合；它只负责按 `types.ProgressRequest.Kind` / `types.HeartbeatRequest.Kind` 分流，并统一补齐上报时间。\n\n## 对外入口\n\n### `Heartbeat`\n\n```go\nfunc (c *Collector) Heartbeat(ctx context.Context, req *types.HeartbeatRequest) error\n```\n\n`Heartbeat` 处理 `/api/v1/heartbeat`。它使用 `time.Now().UTC()` 作为当前心跳时间，然后根据 `req.Kind` 写入不同 worker 的心跳：\n\n- `types.KindWriter`：调用 `Store.UpsertWriterHeartbeat(ctx, req.JobID, req, now)`\n- `types.KindReader`：调用 `Store.UpsertReaderHeartbeat(ctx, req.JobID, req, now)`\n- 其他值：返回 `unknown kind: <kind>`\n\nWriter 心跳会写入 `writer_id`、`ip`、`port`、`buckets`、`buckets_assigned`、`last_hb`、`status`，并把 writer ID 加入 `cp:job:{jobId}:workers`。Reader 心跳写入 `reader_id`、`ip`、`port`、`last_hb`、`status`，并加入 `cp:job:{jobId}:readers`。\n\n状态更新规则在 `store.heartbeatWorkerStatus` 中：如果当前 worker 已经是 `DONE` 或 `FAILED`，心跳不会把它改回 `RUNNING`；否则心跳会把状态设为 `RUNNING`。\n\n### `ReportProgress`\n\n```go\nfunc (c *Collector) ReportProgress(ctx context.Context, req *types.ProgressRequest) error\n```\n\n`ReportProgress` 处理 `/api/v1/report_progress`。它先确定本次上报时间：\n\n```go\nprogressTime := req.LastUpdateTime.UTC()\nif progressTime.IsZero() {\n\tprogressTime = time.Now().UTC()\n}\n```\n\n之后按 worker 类型分流。\n\nWriter 进度路径：\n\n1. 调用 `Store.ApplyWriterProgress(ctx, req.JobID, req.WriterID, req.WorkerStatus, req.ErrorMessage, progressTime)` 写入 writer 实例级字段。\n2. 遍历 `req.Buckets`。\n3. 每个 bucket 优先使用 `BucketProgress.LastUpdateTime.UTC()`；如果为空，则回退到 `progressTime`。\n4. 调用 `Store.ApplyBucketProgress(ctx, req.JobID, req.WriterID, &req.Buckets[i], bucketTime)` 写入 bucket 快照。\n\nReader 进度路径：\n\n```go\nc.st.ApplyReaderProgress(\n\tctx,\n\treq.JobID,\n\treq.ReaderID,\n\treq.Files,\n\treq.BucketsSeen,\n\treq.WorkerStatus,\n\treq.ErrorMessage,\n\tprogressTime,\n)\n```\n\nReader 进度会写入文件处理统计、`buckets_seen`、`last_update_time`、`error_message`，并在 `WorkerStatus` 合法时更新 reader 状态。\n\n```mermaid\nflowchart TD\n    A[\"HTTP Handler\"] --> B[\"Collector\"]\n    B --> C{\"kind\"}\n    C -->|\"writer 心跳\"| D[\"UpsertWriterHeartbeat\"]\n    C -->|\"reader 心跳\"| E[\"UpsertReaderHeartbeat\"]\n    C -->|\"writer 进度\"| F[\"ApplyWriterProgress\"]\n    F --> G[\"ApplyBucketProgress\"]\n    C -->|\"reader 进度\"| H[\"ApplyReaderProgress\"]\n    G --> I[\"Redis 控制面状态\"]\n    H --> I\n```\n\n## Redis 写入模型\n\nCollector 依赖 `internal/store` 的 key 约定：\n\n- Job：`store.KeyJob(jobID)` → `cp:job:{jobID}`\n- Writer：`store.KeyWriter(jobID, writerID)` → `cp:job:{jobID}:writer:{writerID}`\n- Reader：`store.KeyReader(jobID, readerID)` → `cp:job:{jobID}:reader:{readerID}`\n- Bucket：`store.KeyBucket(jobID, bucketID)` → `cp:job:{jobID}:bucket:{bucketID}`\n- Writer 集合：`store.KeyWorkers(jobID)` → `cp:job:{jobID}:workers`\n- Reader 集合：`store.KeyReaders(jobID)` → `cp:job:{jobID}:readers`\n- 已完成 bucket 集合：`store.KeyDoneBucketIDs(jobID)` → `cp:job:{jobID}:done_bucket_ids`\n\n`ReportProgress` 不等价于心跳。测试 `TestReportProgressDoesNotTouchWriterHeartbeat` 明确保护这一点：Writer 上报 bucket 进度时，不应覆盖 `ip`、`port`、`buckets`、`buckets_assigned`、`last_hb` 等心跳字段。进度上报只更新 `last_update_time`、worker 进度状态、错误信息以及 bucket 快照。\n\n## 状态语义\n\nworker 上报状态通过 `store.normalizeReportedWorkerStatus` 过滤，只接受以下值：\n\n- `types.WorkerStateBooting`\n- `types.WorkerStateRunning`\n- `types.WorkerStateDone`\n- `types.WorkerStateFailed`\n- `types.WorkerStateLost`\n\n空字符串或未知状态不会写入 `status` 字段。这允许 Writer/Reader 只上报进度数据，而不改变当前 worker 状态。\n\nbucket 状态来自 `types.BucketProgress.Status`，常见值包括：\n\n- `types.BucketStateRunning`\n- `types.BucketStateMerging`\n- `types.BucketStateWritingHDFS`\n- `types.BucketStateDone`\n- `types.BucketStateFailed`\n\n当 `ApplyBucketProgress` 看到某个 bucket 从非 `DONE` 变为 `DONE` 时，会触发 `maybeMarkJobSucceeded`。该逻辑只对 `types.JobStateFinalizing` 的 Job 生效：如果 `cp:job:{jobId}:done_bucket_ids` 的数量达到 `num_buckets`，则调用 `MarkJobFinished` 把 Job 标记为 `types.JobStateSucceeded`，并写入 `finish_time`。\n\n测试 `TestReportProgressAutoMarksJobSucceeded` 覆盖了这个行为：Job 初始为 `FINALIZING`，两个 bucket 都上报 `DONE` 后，`cp:job:j1` 的 `state` 会变为 `SUCCEEDED`，`finish_time` 使用最后完成 bucket 的 `LastUpdateTime`。\n\n## 与 HTTP 层的关系\n\n`internal/api` 中的 handler 负责请求解析和基础校验：\n\n- `handleHeartbeat` 绑定 `types.HeartbeatRequest`，要求 `job_id` 和 `kind` 非空，然后调用 `s.collector.Heartbeat`。\n- `handleReportProgress` 绑定 `types.ProgressRequest`，要求 `job_id` 和 `kind` 非空，然后调用 `s.collector.ReportProgress`。\n\nCollector 不负责 HTTP 状态码、响应结构或请求绑定。成功时由 handler 返回：\n\n- 心跳：`types.HeartbeatResponse{NextIntervalSec: s.cfg.Heartbeat.NextIntervalSec}`\n- 进度：`types.ProgressResponse{Ack: true}`\n\n## 测试覆盖点\n\n`internal/collector/collector_test.go` 使用 `miniredis` 和 `goredis.NewClientWithServers` 构造真实 Redis 行为的单测环境。辅助函数 `newTestCollector` 创建：\n\n- `Collector`\n- `store.Store`\n- `miniredis.Miniredis`\n- 测试配置：`Heartbeat.TTLSec = 90`，`Job.TTLSec = 60`\n\n现有测试重点保护三个约束：\n\n- `TestReportProgressDoesNotTouchWriterHeartbeat`：Writer 进度上报不能污染心跳字段，也不能改写 `last_hb`。\n- `TestReportProgressAutoMarksJobSucceeded`：`FINALIZING` Job 的所有 bucket 完成后自动变为 `SUCCEEDED`。\n- `TestReportProgressStoresExplicitWorkerStatus`：Reader 显式上报 `WorkerStatus` 和 `ErrorMessage` 时，Redis 中对应 reader hash 必须持久化这些字段。\n\n## 贡献注意事项\n\n修改 `Collector.ReportProgress` 时，需要保持 Writer 和 Reader 的路径差异：Writer 有 bucket 级进度，Reader 主要是文件级进度和 `buckets_seen`。不要在进度上报路径中顺手刷新 `last_hb`，否则会破坏心跳 TTL/失联判断的语义。\n\n修改状态流转时，应同时检查 `store.normalizeReportedWorkerStatus`、`store.heartbeatWorkerStatus`、`store.maybeMarkJobSucceeded` 和 collector 测试。尤其是 Job 自动成功逻辑只应该由 bucket 首次进入 `DONE` 触发，并且只对 `FINALIZING` 状态生效。","other-internal-finalizer":"# Other — internal-finalizer\n\n## 模块职责\n\n`internal/finalizer` 负责在 Reader-Done Barrier 触发后，把收尾信号 fan-out 给每个 bucket 所属的 Writer 实例。它的核心动作是调用下游 Writer 的 `MarkBucketDone(ctx, endpoint, bucketID)`，通知 Writer 对对应 bucket 进入最终归并、写 HDFS 或上报终态流程。\n\n该模块只做“派发收尾信号”，不直接决定 bucket 或 job 的最终成功失败状态。bucket 的 `DONE`、`FAILED` 等状态仍由 Writer 通过进度上报写入 Redis；job 是否 `SUCCEEDED` 由 `store.ApplyBucketProgress` 内部的 `maybeMarkJobSucceeded` 在所有 bucket 转为 `DONE` 后推进。\n\n## 运行位置\n\n生产入口在 `cmd/main.go` 中装配：\n\n```go\nwriterCli, err := writerrpc.NewClient(\n\tcfg.WriterRPC.PSM,\n\ttime.Duration(cfg.WriterRPC.TimeoutMs)*time.Millisecond,\n)\n\nfin, err := finalizer.New(st, cfg, writerCli)\nw := barrier.New(st, cfg, fin)\ngo w.Start(rootCtx)\n```\n\n`barrier.Watcher` 在所有 Reader 状态都为 `DONE` 后，通过 `SetNXBarrierFired` 保证每个 job 只触发一次，然后调用：\n\n```go\nw.finalizer.FanOut(ctx, jobID)\n```\n\n## 核心类型\n\n### `WriterRPCClient`\n\n```go\ntype WriterRPCClient interface {\n\tMarkBucketDone(ctx context.Context, endpoint string, bucketID int) error\n}\n```\n\n这是 `finalizer` 对 Writer RPC 层的最小依赖。模块不直接 import `internal/writerrpc`，避免形成包依赖环。真实实现是 `internal/writerrpc.Client`，它通过同名方法隐式实现该接口。\n\n### `Finalizer`\n\n```go\ntype Finalizer struct {\n\tst  *store.Store\n\tcfg *config.Config\n\trpc WriterRPCClient\n}\n```\n\n`Finalizer` 持有三类依赖：\n\n- `store.Store`：读取 bucket 分配表和 Router endpoint。\n- `config.Config`：读取 fan-out 并发、重试次数、RPC 超时。\n- `WriterRPCClient`：向 Writer 发送 `MarkBucketDone`。\n\n构造函数 `New(st, cfg, rpc)` 会显式拒绝 nil 依赖：\n\n```go\nif st == nil {\n\treturn nil, errors.New(\"finalizer: nil store\")\n}\nif cfg == nil {\n\treturn nil, errors.New(\"finalizer: nil config\")\n}\nif rpc == nil {\n\treturn nil, errors.New(\"finalizer: nil WriterRPCClient\")\n}\n```\n\n这能避免启动后才发现 finalizer 静默不可用。\n\n## FanOut 执行流程\n\n`FanOut(ctx, jobID)` 是模块主入口。它的流程如下：\n\n```mermaid\nflowchart TD\n    A[\"Barrier 触发\"] --> B[\"FanOut(jobID)\"]\n    B --> C[\"读取 bucket_assign\"]\n    C --> D[\"按 bucketID 排序\"]\n    D --> E[\"按 Fanout.Concurrency 并发派发\"]\n    E --> F[\"读取 RouterEndpoint\"]\n    F --> G{\"endpoint 存在？\"}\n    G -- \"否\" --> H[\"记录 warn，计入 dispatch_failed\"]\n    G -- \"是\" --> I[\"callWithRetry\"]\n    I --> J{\"RPC 成功？\"}\n    J -- \"否\" --> K[\"记录 error，计入 dispatch_failed\"]\n    J -- \"是\" --> L[\"该 bucket 派发完成\"]\n    H --> M[\"等待所有 goroutine\"]\n    K --> M\n    L --> M\n    M --> N[\"记录 fan-out 汇总日志\"]\n```\n\n### 读取 bucket 分配\n\n`FanOut` 先调用：\n\n```go\nassign, err := f.st.BucketAssignAll(ctx, jobID)\n```\n\n该方法读取 Redis hash：\n\n```go\nstore.KeyBucketAssign(jobID)\n// cp:job:{jobID}:bucket_assign\n```\n\n返回 `map[int]int`，表示 `bucketID -> writerIdx`。`finalizer` 当前只使用 map 的 key，也就是 bucket 列表；实际 Writer endpoint 来自 Router 既有 key。\n\n如果 `BucketAssignAll` 返回错误，`FanOut` 直接返回错误。如果分配表为空，返回：\n\n```go\nerrors.New(\"empty bucket_assign\")\n```\n\n### 固定派发顺序\n\nbucket id 会被排序：\n\n```go\nsort.Ints(bucketIDs)\n```\n\n这让 fan-out 的调度顺序稳定，便于日志排查和测试复现。实际 RPC 是并发执行的，因此完成顺序不保证与 bucket id 顺序一致。\n\n### 并发控制\n\n并发数来自：\n\n```go\nf.cfg.Fanout.Concurrency\n```\n\n如果配置小于等于 0，代码兜底为 `64`：\n\n```go\nif concurrency <= 0 {\n\tconcurrency = 64\n}\n```\n\n实现上使用 buffered channel 作为 semaphore：\n\n```go\nsem := make(chan struct{}, concurrency)\nsem <- struct{}{}\ngo func() {\n\tdefer func() { <-sem }()\n\t// 派发逻辑\n}()\n```\n\n### endpoint 查找\n\n每个 bucket 的 endpoint 通过：\n\n```go\nendpoint, _ := f.st.RouterEndpoint(ctx, jobID, bid)\n```\n\n`RouterEndpoint` 读取 Router 既有 key：\n\n```go\nstore.KeyRouterBucket(jobID, bucketID)\n// {jobID}:bucket:{bucketID padded to 5 digits}\n```\n\n例如 bucket 0 的 key 格式是：\n\n```go\nfmt.Sprintf(\"%s:bucket:%05d\", jobID, 0)\n```\n\n如果 endpoint 为空，`FanOut` 只记录 warn 并增加 `dispatchFailed` 计数，不会调用 RPC，也不会改写 bucket 状态。\n\n## 重试与超时\n\n实际 RPC 调用封装在 `callWithRetry(ctx, endpoint, bucketID)` 中。\n\n重试次数来自：\n\n```go\nf.cfg.Fanout.MaxRetries\n```\n\n如果配置小于等于 0，兜底为 `3`。\n\n单次 RPC 超时来自：\n\n```go\nf.cfg.WriterRPC.TimeoutMs\n```\n\n如果配置小于等于 0，兜底为 `3 * time.Second`。\n\n每次尝试都会创建独立的 timeout context：\n\n```go\ncallCtx, cancel := context.WithTimeout(ctx, timeout)\nerr := f.rpc.MarkBucketDone(callCtx, endpoint, bucketID)\ncancel()\n```\n\n失败后使用指数退避加随机抖动：\n\n```go\nbackoff := time.Duration(1<<attempt) * 200 * time.Millisecond\njitter := time.Duration(rand.Int63n(int64(50 * time.Millisecond)))\n```\n\n如果父 `ctx` 在退避等待期间取消，`callWithRetry` 返回 `ctx.Err()`。\n\n## 失败语义\n\n`finalizer` 的失败语义比较克制：\n\n- `BucketAssignAll` 读取失败：`FanOut` 返回错误。\n- `bucket_assign` 为空：`FanOut` 返回 `empty bucket_assign`。\n- 单个 bucket 缺少 endpoint：记录 warn，计入 `dispatch_failed`，`FanOut` 最终仍返回 nil。\n- 单个 bucket RPC 多次失败：记录 error，计入 `dispatch_failed`，`FanOut` 最终仍返回 nil。\n- bucket 状态不会因为 fan-out 失败被改成 `FAILED`。\n\n测试文件明确覆盖了后两点：\n\n- `TestFanOutMissingEndpointDoesNotMarkBucketFailed`\n- `TestFanOutRPCErrorDoesNotMarkBucketFailed`\n\n这两个测试都会先把 bucket 状态设为 `types.BucketStateRunning`，执行 `fin.FanOut(ctx, jobID)` 后断言 Redis 中 `status` 仍然是 `RUNNING`。\n\n这种设计意味着 finalizer 不是状态裁决者。它只负责尽力通知 Writer；Writer 后续是否成功完成，仍通过常规进度上报路径体现。\n\n## 与 `internal/writerrpc` 的关系\n\n`internal/writerrpc.Client` 实现了 `WriterRPCClient`：\n\n```go\nfunc (c *Client) MarkBucketDone(ctx context.Context, endpoint string, bucketID int) error\n```\n\n它会为每个 endpoint 创建或复用一个 Kitex client，并用：\n\n```go\nkitexclient.WithHostPorts(normalized)\n```\n\n精确路由到目标 Writer 实例。`finalizer` 不关心 Kitex client 的创建、endpoint 规范化、业务错误码翻译；这些都封装在 `writerrpc` 中。\n\n## 与 `internal/store` 的关系\n\n`finalizer` 主要依赖以下 store 方法：\n\n- `BucketAssignAll(ctx, jobID)`：读取 `cp:job:{jobID}:bucket_assign`。\n- `RouterEndpoint(ctx, jobID, bucketID)`：读取 Router 注册的 bucket endpoint。\n- `Client()`：仅测试中直接读取底层 Redis，验证 bucket 状态未被错误改写。\n\n测试辅助函数 `newTestStore(t)` 使用 `miniredis` 和 `goredis.NewUnitTestOption()` 创建隔离 Redis 环境，并通过：\n\n```go\nstore.New(cli, cfg)\n```\n\n构造真实 `store.Store`，避免 mock 掉 Redis key 行为。\n\n## 测试结构\n\n`finalizer_test.go` 使用 `stubWriterRPCClient` 替代真实 Writer RPC：\n\n```go\ntype stubWriterRPCClient struct {\n\tcalls int\n\terr   error\n}\n\nfunc (s *stubWriterRPCClient) MarkBucketDone(context.Context, string, int) error {\n\ts.calls++\n\treturn s.err\n}\n```\n\n两个关键测试关注边界行为：\n\n- 缺少 Router endpoint 时，`rpc.calls == 0`，bucket 保持 `RUNNING`。\n- RPC 持续返回错误时，调用次数等于 `Fanout.MaxRetries`，bucket 仍保持 `RUNNING`。\n\n这组测试保护了一个重要约束：fan-out 派发失败不能被 finalizer 解释为业务失败。业务终态必须来自 Writer 的进度上报。","other-internal-job":"# Other — internal-job\n\n## internal/job 模块\n\n`internal/job` 是控制面创建任务的编排层，负责把 `types.CreateJobRequest` 转换成可执行的 Writer/Reader 启动计划，并把任务元数据写入 Redis。模块的主入口是 `Manager.CreateJob`，它连接了三类依赖：\n\n- `store.Store`：持久化 job、bucket 分配表和 worker 元数据。\n- `scheduler.FaaSLauncher`：通过 `InvokeWriter`、`InvokeReader` 拉起 Writer/Reader 实例。\n- `fileScanner`：扫描 HDFS 或 TOS 输入文件，生成 Reader 文件分片。\n\n```mermaid\nflowchart TD\n    请求[\"CreateJobRequest\"] --> 校验[\"validate\"]\n    校验 --> 文件计划[\"buildReaderLaunchPlans\"]\n    文件计划 --> 持久化[\"Store.CreateJob\"]\n    持久化 --> 拉起写端[\"InvokeWriter\"]\n    拉起写端 --> 等待路由[\"waitForWriterRoutes\"]\n    等待路由 --> 拉起读端[\"InvokeReader\"]\n    拉起读端 --> 运行中[\"SetJobState(RUNNING)\"]\n```\n\n### 创建任务流程\n\n`Manager.CreateJob(ctx, req)` 按同步编排流程执行：\n\n1. 调用 `validate` 校验请求。\n2. 生成 `jobID`，并用 `buildHDFSOutputPath`、`buildWriterHDFSTempDir` 写入 `req.HDFSOutputPath` 和 `req.HDFSTempDir`。\n3. 调用 `buildReaderLaunchPlans` 扫描输入文件并切分 Reader 文件分片。\n4. 用 `BuildBucketAssign(numBuckets, numWriters)` 生成 `bucketID -> writerIdx` 分配表。\n5. 调用 `Store.CreateJob` 写入 job hash、`bucket_assign`、active/all job 集合。此时 job 状态是 `types.JobStatePending`。\n6. 按 writer index 依次调用 `scheduler.InvokeWriter`，每个 Writer 的 bucket 列表来自 `bucketIDsForWriterIdx`。\n7. 所有 Writer 拉起成功后，调用 `Store.CreateWorkerMetadata` 写入 Writer 元数据。\n8. 调用 `waitForWriterRoutes` 轮询 `Store.AllRouterBucketsRegistered`，等待所有 `KeyRouterBucket(jobID, bucketID)` 路由注册完成。\n9. 路由齐备后，逐个构造 `scheduler.ReaderInvokeArgs` 并调用 `scheduler.InvokeReader`。\n10. Reader 全部拉起成功后，写入 Reader 元数据，并调用 `Store.SetJobState(..., types.JobStateRunning)`。\n\n任何 Writer/Reader 拉起失败、worker id 为空、worker 元数据写入失败或 writer route 等待超时，都会调用 `Store.MarkJobFinished(..., types.JobStateFailed, ...)` 标记任务失败。\n\n### Writer 分桶模型\n\n`BuildBucketAssign(numBuckets, numWriters)` 使用固定规则：\n\n```go\nwriterIdx = bucketID % numWriters\n```\n\n例如 `BuildBucketAssign(8, 3)` 生成：\n\n```text\n0->0, 1->1, 2->2, 3->0, 4->1, 5->2, 6->0, 7->1\n```\n\n`bucketIDsForWriterIdx(numBuckets, numWriters, writerIdx)` 生成某个 Writer 承载的 bucket 列表。例如 8 个 bucket、3 个 writer 时：\n\n- writer 0: `0, 3, 6`\n- writer 1: `1, 4, 7`\n- writer 2: `2, 5`\n\n这些 bucket id 会通过 `scheduler.BucketIDsFromInts` 转成字符串，写入 `scheduler.WriterInvokeArgs.BucketIDs`。\n\n### 输出路径\n\n`buildHDFSOutputPath(baseDir, partitions)` 负责生成最终输出目录：\n\n- 无分区时，去掉末尾 `/` 后返回 `baseDir`。\n- 有分区时，按请求顺序追加 `key=value` 路径段。\n\n示例：\n\n```text\n/warehouse/user_log + [{dt,2025-12-31},{hr,23}]\n=> /warehouse/user_log/dt=2025-12-31/hr=23\n```\n\n`buildWriterHDFSTempDir(baseDir, jobID)` 生成 Writer staging 目录：\n\n```text\n/output + job-1 => /output/_staging/job-1\nhdfs://haruna/path/ + job-2 => hdfs://haruna/path/_staging/job-2\n```\n\nURI 形式会用 `net/url` 解析并通过 `path.Join` 修改 `Path`，因此要求同时包含 scheme 和 host。\n\n### Reader 启动计划\n\n`buildReaderLaunchPlans` 根据 `req.SourceType` 分两条路径。\n\n#### HDFS Parquet\n\n`types.SourceTypeHDFSParquet` 支持两种输入方式：\n\n- `source.extract.file_paths`：显式文件列表。\n- `source.hdfs_root` + `source.file_glob`：扫描 HDFS 目录。\n\n显式文件列表会经过 `normalizeHDFSFilePaths`，它要求每个路径都能被 `parseHDFSURI` 解析成 `hdfs://namenode/path`，并按字典序排序。\n\n目录扫描由 `fileScanner.ScanHDFSFiles(ctx, rootPath, fileGlob)` 完成。默认实现 `sdkFileScanner.ScanHDFSFiles` 会：\n\n- 使用 `parseHDFSURI` 拆出 NameNode 和路径。\n- 通过 HDFS SDK `hdfs.Connect`、`fs.List` 列目录。\n- 跳过目录、`_SUCCESS`、`.`、`..` 和以 `.` 开头的文件。\n- `file_glob` 为空时只保留 basename 以 `part` 开头的文件。\n- `file_glob` 非空时用 `path.Match` 匹配 basename。\n- 返回排序后的完整文件路径。\n\nReader 数量会被限制为 `min(req.Concurrency.NumReaders, len(files))`，避免生成空文件分片。实际生效的 Reader 数会写回持久化请求快照中的 `concurrency.num_readers`。\n\n#### TOS Inventory CSV\n\n`types.SourceTypeTOSInventoryCSV` 支持单源 `req.Source`，也支持额外的 `req.Sources`。`flattenCreateJobSources` 会把它们展开成带标签的 `sourceRef`，标签用于错误信息，例如 `source`、`sources[0]`。\n\n每个 source 支持两种 CSV 输入方式：\n\n- `source.extract.csv_uris`：显式 CSV URI 列表。\n- `source.tos_csv_root`：扫描 TOS 前缀。\n\n`resolveTOSInventoryCSVFiles` 会对显式 `CSVURIs` 去空白、拒绝空字符串、排序；如果没有显式列表，则调用 `ScanTOSFiles` 扫描 root。\n\n多 TOS root 场景下，`buildTOSInventoryCSVReaderLaunchPlans` 有两个重要约束：\n\n- 任意 root 没有 CSV 文件都会报错，错误中包含空 root 描述。\n- `concurrency.num_readers` 必须大于等于非空 source 数量，保证每个 source 至少一个 Reader。\n\nReader 数按文件数分配：`allocateReadersByFileCount` 先给每个 source 分配 1 个 Reader，再按各 source 的可切分容量分配剩余 Reader。每个 source 内部通过 `partitionFilePaths` 做连续分片。\n\n### TOS 文件扫描\n\n默认扫描器是 `sdkFileScanner`。`parseTOSURI` 同时接受两种 root 写法：\n\n```text\ntos://bucket/path/to/root\nbucket/path/to/root\n```\n\n解析结果会规范化为：\n\n- `Bucket`: bucket 名。\n- `Prefix`: 去掉首尾 `/` 后追加一个尾部 `/`，非空前缀始终以 `/` 结束。\n\n`ScanTOSFiles` 使用 StorageGW `ListObjectsWithContext` 分页列对象：\n\n- page size 默认 `1000`，可由 `cfg.StorageGW.ListPageSize` 覆盖。\n- 每页传入 `bucket`、`prefix`、`startAfter` 和 `maxKeys`。\n- 如果 `ListObjectsInfo.IsTruncated` 为真，优先用 `ListObjectsInfo.StartAfter` 作为下一页游标；为空时退回到当前页最后一个 object key。\n- 游标为空或没有推进时返回分页错误，避免死循环。\n\n`shouldSkipTOSObject` 会跳过：\n\n- 空 key。\n- 不在目标 prefix 下的 key。\n- basename 为 `_SUCCESS`、`.`、`..` 或以 `.` 开头的对象。\n- 以 `/` 结尾的目录 marker。\n- basename 后缀不是 `.csv` 的对象。\n\n注意：后缀判断只接受 `.csv`，当前实现不会把 `.csv.gz` 作为扫描结果保留；如果需要支持压缩 CSV root 扫描，需要修改 `shouldSkipTOSObject`。\n\nStorageGW 客户端由 `getStorageGWClient` 懒加载。配置了 `cfg` 时，必须提供 `cfg.StorageGW.AccessKey` 和 `cfg.StorageGW.SecretKey`，否则返回 `storagegw credentials are not configured`。可选项包括 `StorageGW.Cluster`、`StorageGW.IDC` 和 `StorageGW.PSM`。\n\n### Reader/Writer 启动参数\n\n`buildWriterInvokeArgs` 生成 `scheduler.WriterInvokeArgs`：\n\n- `JobID`\n- `BucketIDs`\n- `HDFSOutputPath`\n- `HDFSTempDir`\n- `SkipStartupCheck`\n- `Sort`\n- `ControlPlane`\n- `Router`\n- `Lambda`\n\n默认值来源：\n\n- Writer control plane endpoint：`cfg.Lambda.ControlPlaneEndpoint`\n- Writer control plane PSM：`cfg.Lambda.ControlPlanePSM`\n- Writer control plane cluster：`cfg.Lambda.ControlPlaneCluster`\n- heartbeat interval：`cfg.Heartbeat.NextIntervalSec`\n- progress report interval：常量 `defaultWriterProgressReportIntervalSec`，值为 `60`\n- router cluster：`cfg.Redis.Cluster`，为空时用 `cfg.Redis.Addrs` 拼接\n- router key prefix：`jobID`\n- router TTL：`max(300, cfg.Heartbeat.TTLSec)`\n\n`buildReaderInvokeArgs` 生成 `scheduler.ReaderInvokeArgs`。公共部分包括：\n\n- `SourceType`\n- `Bucketing`\n- `Limits`\n- `Sink`\n- `ControlPlane`\n- `Lambda`\n\n当 `Bucketing.HashAlg` 为空时，默认设置为 `\"hive\"`。\n\nHDFS Parquet 必须提供 `source.extract.store_uri_field`，否则构造 Reader 参数时报错。TOS Inventory CSV 会透传 `TaskType`、`Bucket`、各列名以及 `CSVFormat`。\n\n`buildReaderSinkInput` 默认 sink 类型为 `\"writer_rpc\"`。当 sink 是 `writer_rpc` 时：\n\n- `WriterServiceName` 默认取 `cfg.WriterRPC.PSM`\n- Redis cluster 默认取 `redisCluster()`\n- Redis key prefix 默认取 `jobID`\n- connect/rpc timeout 默认由 `cfg.WriterRPC.TimeoutMs` 向上换算成秒\n\n### 校验规则\n\n`validate` 检查通用必填项：\n\n- `source_type`\n- `output.hdfs_dir`\n- `bucketing.num_buckets > 0`\n- `concurrency.num_writers > 0`\n- `concurrency.num_readers > 0`\n\n`hdfs_parquet` 要求 `source.hdfs_root` 或 `source.extract.file_paths` 至少一个存在。\n\n`tos_inventory_csv` 对每个展开后的 source 调用 `validateTOSInventoryCSVSource`：\n\n- `tos_csv_root` 或 `extract.csv_uris` 至少一个存在。\n- `create_timestamp_column` 与 `create_time_str_column` 不能同时设置。\n- `task_type` 只支持空值或 `types.TOSInventoryTaskTypeManifestExpand`。\n- `task_type=manifest_expand` 时必须设置 `content_type_column`。\n- 如果 `store_uri_column` 为空，则必须设置 `key_column` 和 `bucket`。\n\n### 与其他包的关系\n\n`internal/job` 不直接处理 HTTP 请求，也不直接实现真实 FaaS 平台调用。它依赖的边界都通过接口或 DTO 表达：\n\n- 请求/响应和 source/runtime 配置来自 `internal/types`。\n- Redis key 和持久化行为来自 `internal/store`，例如 `KeyJob`、`KeyWriter`、`KeyReader`、`KeyRouterBucket`。\n- Worker 启动协议来自 `internal/scheduler`，例如 `WriterInvokeArgs`、`ReaderInvokeArgs`、`FaaSLauncher`。\n- 默认值来自 `internal/config.Config`，尤其是 `Heartbeat`、`Job`、`WriterRPC`、`Lambda`、`Redis`、`StorageGW`。\n\n修改这个模块时，重点保持三个契约稳定：持久化请求快照应反映实际 Reader 数，Writer route 未就绪前不能拉起 Reader，启动失败必须把 job 标记为 `FAILED`。","other-internal-scheduler":"# Other — internal-scheduler\n\n## internal/scheduler 模块\n\n`internal/scheduler` 封装控制面拉起 Reader/Writer FaaS 实例的能力。它不直接实现任务调度循环，而是定义控制面与执行侧之间的启动契约：控制面组装 `WriterInvokeArgs` 或 `ReaderInvokeArgs`，通过 `FaaSLauncher` 拉起远端实例，并获得可用于后续跟踪的 `WorkerID`。\n\n模块提供两类实现：\n\n- `LogLauncher`：本地联调和单元测试用的 stub，只打印日志并生成随机 worker id。\n- `LambdaLauncher`：真实通过 Lambda 网关发起 HTTP invoke，用于拉起配置中的 Reader/Writer 函数。\n\n## 核心接口\n\n`FaaSLauncher` 是上层依赖的最小接口：\n\n```go\ntype FaaSLauncher interface {\n\tInvokeWriter(ctx context.Context, args WriterInvokeArgs) (*WriterInstance, error)\n\tInvokeReader(ctx context.Context, args ReaderInvokeArgs) (*ReaderInstance, error)\n}\n```\n\n上层只需要依赖该接口，不需要关心当前使用的是日志 stub 还是真实 Lambda 网关。`WriterInstance` 和 `ReaderInstance` 当前都只暴露 `WorkerID`，表示 FaaS 平台创建出的实例标识。\n\n## 启动参数模型\n\n`WriterInvokeArgs` 是拉起 Writer 的 payload：\n\n```go\ntype WriterInvokeArgs struct {\n\tJobID            string                  `json:\"job_id\"`\n\tBucketIDs        []string                `json:\"bucket_ids\"`\n\tHDFSOutputPath   string                  `json:\"hdfs_output_path,omitempty\"`\n\tHDFSTempDir      string                  `json:\"hdfs_temp_dir,omitempty\"`\n\tSkipStartupCheck bool                    `json:\"skip_startup_check,omitempty\"`\n\tSort             WriterSortInput         `json:\"sort,omitempty\"`\n\tControlPlane     WriterControlPlaneInput `json:\"control_plane,omitempty\"`\n\tRouter           WriterRouterInput       `json:\"router,omitempty\"`\n\tLambda           LambdaInvokeOptions     `json:\"-\"`\n}\n```\n\n`ReaderInvokeArgs` 是拉起 Reader 的 payload，支持 HDFS Parquet 和 TOS Inventory CSV 两类输入：\n\n```go\ntype ReaderInvokeArgs struct {\n\tJobID           string                   `json:\"job_id,omitempty\"`\n\tSourceType      string                   `json:\"source_type\"`\n\tHDFSParquet     *ReaderHDFSParquetInput  `json:\"hdfs_parquet,omitempty\"`\n\tTOSInventoryCSV *ReaderTOSInventoryInput `json:\"tos_inventory_csv,omitempty\"`\n\tBucketing       ReaderBucketingInput     `json:\"bucketing\"`\n\tLimits          ReaderLimitsInput        `json:\"limits,omitempty\"`\n\tSink            *ReaderSinkInput         `json:\"sink,omitempty\"`\n\tControlPlane    *ReaderControlPlaneInput `json:\"control_plane,omitempty\"`\n\tLambda          LambdaInvokeOptions      `json:\"-\"`\n}\n```\n\n需要注意 `Lambda` 字段带有 `json:\"-\"`，不会进入 Reader/Writer 函数的业务 payload。它只用于控制 Lambda 网关层面的 invoke 选项，例如 `LambdaInvokeOptions.Cluster` 会被转换为网关请求里的 `Annotations.Cluster`。\n\n## LambdaLauncher 工作流\n\n`NewLambdaLauncher(cfg *config.Config)` 从 `config.Config.Lambda` 读取网关配置，并创建带超时的 `http.Client`。如果 `cfg.Lambda.TimeoutMs <= 0`，默认使用 5 秒超时。\n\n`InvokeWriter` 和 `InvokeReader` 都委托给内部的 `invoke`：\n\n```mermaid\nflowchart TD\n    A[控制面调用 InvokeWriter/InvokeReader] --> B[选择 WriterFunction 或 ReaderFunction]\n    B --> C[序列化业务 payload]\n    C --> D[提取 LambdaInvokeOptions]\n    D --> E[构造 Lambda 网关请求]\n    E --> F[HTTP POST GatewayURL]\n    F --> G[解析 InvocationId]\n    G --> H[返回 WorkerID]\n```\n\n网关请求结构由 `lambdaInvokeRequest` 表示：\n\n```go\ntype lambdaInvokeRequest struct {\n\tFuncName    string                   `json:\"FuncName\"`\n\tQualifier   string                   `json:\"Qualifier\"`\n\tInvokeType  string                   `json:\"InvokeType\"`\n\tPayload     string                   `json:\"Payload\"`\n\tAnnotations *lambdaInvokeAnnotations `json:\"Annotations,omitempty\"`\n}\n```\n\n关键行为：\n\n- `FuncName` 来自 `cfg.Lambda.WriterFunction` 或 `cfg.Lambda.ReaderFunction`。\n- `Qualifier` 来自 `cfg.Lambda.Qualifier`。\n- `InvokeType` 会通过 `strings.ToLower` 转为小写。\n- `Payload` 是已经 JSON 序列化后的字符串，而不是嵌套对象。\n- 当 `LambdaInvokeOptions.Cluster` 非空时，写入 `Annotations.Cluster`。\n- 响应中的 `response.InvocationId` 会被转换成 `WorkerID`，格式为 `InvocationId + \":1\"`。\n- 响应中的 `ExecutedVersion` 会被解析到 `lambdaInvokeResponse`，但当前未参与返回值或校验。\n\n## 错误处理\n\n`LambdaLauncher.invoke` 对以下情况返回错误：\n\n- `LambdaLauncher` 或其 `cfg` 为 `nil`。\n- payload 序列化失败。\n- Lambda invoke request 序列化失败。\n- `http.NewRequestWithContext` 创建请求失败。\n- HTTP 请求失败。\n- HTTP 状态码不是 `200 OK`。\n- 网关响应 JSON 解码失败。\n- 网关响应 `code != 0`。\n- `response.InvocationId` 为空。\n\n网关业务失败时，错误信息会包含函数名、`code`、`message` 和 `trace_id`，便于定位远端 Lambda 网关问题。\n\n## LogLauncher\n\n`LogLauncher` 是本地实现：\n\n```go\nfunc NewLogLauncher() *LogLauncher\n```\n\n`InvokeWriter` 会生成形如 `writer-<uuid>` 的 worker id，并记录 job、bucket 数量和输出路径。`InvokeReader` 会生成形如 `reader-<uuid>` 的 worker id，并记录 job、source type、bucket 数量和输入文件数量。\n\n`readerFilePathsForLog` 只用于日志统计：\n\n- `HDFSParquet != nil` 时返回 `HDFSParquet.FilePaths`。\n- `TOSInventoryCSV != nil` 时返回 `TOSInventoryCSV.CSVURIs`。\n- 两者都为空时返回 `nil`。\n\n## 配置依赖\n\n真实 Lambda 调用依赖 `internal/config.Config` 中的 `Lambda` 配置：\n\n```go\ntype Lambda struct {\n\tGatewayURL           string `yaml:\"GatewayURL\"`\n\tReaderFunction       string `yaml:\"ReaderFunction\"`\n\tWriterFunction       string `yaml:\"WriterFunction\"`\n\tQualifier            string `yaml:\"Qualifier\"`\n\tInvokeType           string `yaml:\"InvokeType\"`\n\tTimeoutMs            int    `yaml:\"TimeoutMs\"`\n\tControlPlaneEndpoint string `yaml:\"ControlPlaneEndpoint\"`\n\tControlPlanePSM      string `yaml:\"ControlPlanePSM\"`\n\tControlPlaneCluster  string `yaml:\"ControlPlaneCluster\"`\n}\n```\n\n`config.applyDefaults` 会为 Lambda 配置补默认值，例如默认网关地址、`uri_source_reader`、`uri_writer`、`prod`、`async` 和 5000ms 超时。`LambdaLauncher` 本身只消费其中的 `GatewayURL`、函数名、`Qualifier`、`InvokeType` 和 `TimeoutMs`。\n\n## Lambda 注解测试\n\n`TestLambdaLauncherInvokeWriterPassesClusterAnnotation` 覆盖了 Writer invoke 的关键契约：\n\n- 使用 `httptest.NewServer` 模拟 Lambda 网关。\n- 构造 `NewLambdaLauncher(&config.Config{Lambda: ...})`。\n- 调用 `InvokeWriter`，传入 `WriterInvokeArgs` 和 `LambdaInvokeOptions{Cluster: \"default_test_lq\"}`。\n- 断言网关请求中的 `Annotations.Cluster` 被正确设置。\n- 断言业务 `Payload` 中不包含 `\"Lambda\"`，说明 `json:\"-\"` 生效。\n- 断言 `Payload` 中仍包含业务字段，例如 `\"job_id\":\"job-1\"`。\n- 断言返回的 `WorkerID` 为 `\"inv-1:1\"`。\n\n这个测试保护了一个容易破坏的边界：Lambda invoke 选项属于网关元数据，不应该泄露给 Reader/Writer 的业务 payload。","other-internal-store":"# Other — internal-store\n\n## 模块概览\n\n`internal/store` 是控制面对 Redis 的唯一持久化访问层。它把任务元数据、worker 状态、bucket 进度、reader barrier、告警记录和清理逻辑封装在 `Store` 上，调用方不直接拼 Redis key 或散落执行 Redis 命令。\n\n核心类型：\n\n- `Store`：持有 `*goredis.Client` 和 `*config.Config`。\n- `JobMeta`：写入 `cp:job:{jobId}` 的任务静态元数据。\n- `WorkerMeta`：写入 writer/reader hash 的静态 worker 元数据。\n\n该模块使用字节内部 `code.byted.org/kv/goredis/v5`。代码模式接近 go-redis v6：通过 `client.WithContext(ctx)` 派生带上下文的 client，命令返回 `*redis.XxxCmd`，空值用 `redisv6.Nil` 判断。\n\n## Redis Key 模型\n\n所有 key 构造函数集中在 `keys.go`，调用方应始终使用这些函数，避免手写字符串。\n\n| 函数 | Redis key | 用途 |\n| --- | --- | --- |\n| `KeyJob(jobID)` | `cp:job:{jobId}` | job 主 hash |\n| `KeyBucketAssign(jobID)` | `cp:job:{jobId}:bucket_assign` | bucket 到 writer index 的路由表 |\n| `KeyWriter(jobID, writerID)` | `cp:job:{jobId}:writer:{writerID}` | writer hash |\n| `KeyReader(jobID, readerID)` | `cp:job:{jobId}:reader:{readerID}` | reader hash |\n| `KeyBucket(jobID, bucketID)` | `cp:job:{jobId}:bucket:{bucketID}` | bucket 进度快照 |\n| `KeyWorkers(jobID)` | `cp:job:{jobId}:workers` | writer ID 集合 |\n| `KeyReaders(jobID)` | `cp:job:{jobId}:readers` | reader ID 集合 |\n| `KeyDoneBucketIDs(jobID)` | `cp:job:{jobId}:done_bucket_ids` | 已完成 bucket 去重集合 |\n| `KeyJobsActive()` | `cp:jobs:active` | 活跃 job 集合 |\n| `KeyJobsAll()` | `cp:jobs:all` | 当前 Redis 中保留的全部 job 集合 |\n| `KeyAlerts(jobID)` | `cp:job:{jobId}:alerts` | job 告警列表 |\n| `KeyBarrierFired(jobID)` | `cp:job:{jobId}:barrier_fired` | reader barrier 单次触发标记 |\n| `KeyRouterBucket(jobID, bucketID)` | `{jobId}:bucket:%05d` | writer router 已有注册 key，控制面只读 |\n\n`KeyRouterBucket` 不使用 `cp:` 前缀，这是 writer/router 侧已有格式。`Store` 只通过 `AllRouterBucketsRegistered` 和 `RouterEndpoint` 读取它，用于等待 writer 路由就绪和 fan-out 定点调用。\n\n## 初始化和 Redis 客户端\n\n`New(rdb, cfg)` 只包装已有的 `*goredis.Client` 和配置。真实服务通常先调用 `NewClient(cfg)` 创建 Redis 客户端，再构造 `Store`。\n\n`NewClient(cfg)` 支持两种连接方式：\n\n1. `cfg.Redis.Cluster` 非空：调用 `goredis.NewClientWithOption`，走 goredis 服务发现，并设置 1 秒级别的 dial/read/write/pool timeout。\n2. `cfg.Redis.Cluster` 为空但 `cfg.Redis.Addrs` 非空：调用 `goredis.NewClientWithServers` 直连显式地址。该路径会关闭 GDPR 校验、auto-load conf 和 consul service discovery，适合本地和单测。\n\n测试里通过 `newTestStore` 使用 `miniredis` 和 `goredis.NewUnitTestOption()` 创建本地 Redis，避免依赖真实集群。\n\n## 任务创建流程\n\n`internal/job.Manager.CreateJob` 是任务编排入口，`internal/store.Store.CreateJob` 负责把编排结果落到 Redis。\n\n```mermaid\nflowchart TD\n    创建请求[\"CreateJobRequest\"]\n    编排器[\"job.Manager.CreateJob\"]\n    任务元数据[\"Store.CreateJob\"]\n    拉起写端[\"InvokeWriter\"]\n    写端元数据[\"Store.CreateWorkerMetadata\"]\n    等待路由[\"AllRouterBucketsRegistered\"]\n    拉起读端[\"InvokeReader\"]\n    运行态[\"SetJobState(RUNNING)\"]\n\n    创建请求 --> 编排器\n    编排器 --> 任务元数据\n    编排器 --> 拉起写端\n    拉起写端 --> 写端元数据\n    写端元数据 --> 等待路由\n    等待路由 --> 拉起读端\n    拉起读端 --> 运行态\n```\n\n`CreateJob(ctx, jobID, meta, bucketAssign)` 写入：\n\n- `cp:job:{jobId}` hash：`state`、`request`、`hdfs_output_path`、`hdfs_temp_dir`、`num_buckets`、`num_writers`、`num_readers`、`create_time`。\n- `cp:job:{jobId}:bucket_assign` hash：字段名是 bucket ID，字段值是 writer index。\n- `cp:jobs:active` set。\n- `cp:jobs:all` set。\n\n`bucketAssign` 会按 4096 个 entry 分批 `HMSet`，避免单次写入过大。`cfg.Job.TTLSec > 0` 时，`KeyJob` 和 `KeyBucketAssign` 会设置 TTL。worker hash、bucket hash、reader hash 默认不在创建或上报时设置 TTL。\n\n## Worker 元数据和心跳\n\n`CreateWorkerMetadata(ctx, jobID, workers)` 批量写入成功拉起的 worker 静态信息：\n\n- writer 写入 `writer_id`、`writer_idx`，加入 `KeyWorkers(jobID)`，并用 `HSetNX` 把 `status` 初始化为 `BOOTING`。\n- reader 写入 `reader_id`、`reader_idx`，加入 `KeyReaders(jobID)`，并用 `HSetNX` 把 `status` 初始化为 `BOOTING`。\n\n该函数会校验：\n\n- `jobID` 不能为空。\n- `WorkerMeta.ID` 不能为空。\n- `WorkerMeta.Idx` 不能小于 0。\n- `WorkerMeta.Kind` 只能是 `types.KindWriter` 或 `types.KindReader`。\n\n`UpsertWriterHeartbeat` 和 `UpsertReaderHeartbeat` 处理 `/api/v1/heartbeat` 的写入：\n\n- writer 心跳写入 `writer_id`、`ip`、`port`、`buckets`、`buckets_assigned`、`last_hb`、`status`。\n- reader 心跳写入 `reader_id`、`ip`、`port`、`last_hb`、`status`。\n- writer/reader 都会加入对应集合。\n- 心跳不会设置 Redis key TTL。\n\n状态更新通过 `heartbeatWorkerStatus(currentStatus)` 保护终态：如果当前状态已经是 `DONE` 或 `FAILED`，心跳不会把它改回 `RUNNING`；否则心跳状态为 `RUNNING`。\n\n## 进度写入\n\n`internal/collector.Collector.ReportProgress` 根据 `ProgressRequest.Kind` 分流：\n\n- writer：先调用 `ApplyWriterProgress`，再对每个 `BucketProgress` 调用 `ApplyBucketProgress`。\n- reader：调用 `ApplyReaderProgress`。\n\n### Writer 进度\n\n`ApplyWriterProgress(ctx, jobID, writerID, workerStatus, errorMessage, progressTime)` 更新 writer 实例级字段：\n\n- `writer_id`\n- `last_update_time`\n- `error_message`\n- `status`，仅当 `workerStatus` 能被 `normalizeReportedWorkerStatus` 识别时写入\n\n如果 `writerID` 为空，函数直接返回 `nil`。这是一个容错路径，避免空 writer 上报制造无效 key。\n\n### Bucket 进度\n\n`ApplyBucketProgress(ctx, jobID, writerID, p, progressTime)` 把单个 bucket 的完整快照写入 `KeyBucket(jobID, bucketID)`：\n\n- `writer_id`\n- `status`\n- `total_uris`\n- `bytes`\n- `run_files`\n- `peak_local_disk_mb`\n- `merge_progress`\n- `hdfs_write_progress`\n- `final_path`\n- `final_size`\n- `last_update`\n\n数值字段以字符串形式写入 Redis。浮点进度使用 `strconv.FormatFloat(..., 'f', 4, 64)`，因此 Redis 中保存为四位小数，例如 `1.0000`。\n\n如果 `writerID` 非空，该函数还会刷新对应 writer hash 的 `writer_id` 和 `last_update_time`，并把 writer 加入 `KeyWorkers(jobID)`。\n\n当 bucket 状态从非 `DONE` 变为 `DONE` 时，`shouldCheckJobSuccessOnBucketUpdate(prevStatus, newStatus)` 返回 `true`，随后调用 `maybeMarkJobSucceeded`。重复上报同一个已完成 bucket 不会重复推进成功判定。\n\n### Reader 进度\n\n`ApplyReaderProgress(ctx, jobID, readerID, files, bucketsSeen, workerStatus, errorMessage, progressTime)` 更新 reader hash：\n\n- `reader_id`\n- `buckets_seen`\n- `last_update_time`\n- `error_message`\n- `files_total`、`files_done`、`rows_read`、`bytes_read`，仅当 `files != nil` 时写入\n- `status`，仅当 `workerStatus` 是合法 worker 状态时写入\n\n该函数也会把 reader 加入 `KeyReaders(jobID)`，但不会设置 TTL。\n\n## Job 成功判定\n\njob 成功不是由 reader 直接决定，而是由 reader barrier 触发 writer fan-out 后，writer 逐个 bucket 上报 `DONE` 来完成。\n\n流程如下：\n\n1. `barrier.Watcher` 周期扫描 `ActiveJobIDs()`。\n2. `barrier.AllReadersDone` 调用 `AllReaderStatuses`。\n3. reader 全部为 `DONE` 时，`SetNXBarrierFired` 设置一次性 barrier key。\n4. barrier 把 job 状态置为 `FINALIZING`，并调用 `finalizer.FanOut`。\n5. finalizer 通过 `BucketAssignAll` 获取 bucket 列表，通过 `RouterEndpoint` 找 writer 端点并调用 writer。\n6. writer 上报 bucket `DONE`。\n7. `ApplyBucketProgress` 调用 `maybeMarkJobSucceeded`。\n8. 当 `KeyDoneBucketIDs(jobID)` 的集合大小等于 `num_buckets`，`MarkJobFinished(jobID, SUCCEEDED, finishTime)` 写终态并从 `cp:jobs:active` 移除。\n\n`maybeMarkJobSucceeded` 只在 job 当前状态为 `FINALIZING` 时推进成功。若 job 已经是 `SUCCEEDED`、`FAILED` 或 `CANCELLED`，不会被 bucket 上报覆盖。若 job 仍是 `RUNNING`，即使某个 bucket 上报 `DONE`，也不会提前把 job 标记成功。\n\n`KeyDoneBucketIDs` 使用 set 去重，因此同一个 bucket 重复上报 `DONE` 不会导致完成计数膨胀。\n\n## Reader 状态有效性\n\n`AllReaderStatuses(ctx, jobID)` 返回 job 下所有 reader 的有效状态，而不是简单返回 Redis 中的原始 `status` 字段。\n\n状态计算由 `effectiveWorkerStatus(status, lastHBUnix, now, ttlSec)` 完成：\n\n- 空状态视为 `LOST`。\n- `DONE` 和 `FAILED` 是终态，即使 `last_hb` 过期也保持原状态。\n- 非终态如果没有有效 `last_hb`，视为 `LOST`。\n- `cfg.Heartbeat.TTLSec > 0` 且心跳超时，视为 `LOST`。\n- 其他情况返回原状态，例如 `RUNNING` 或 `BOOTING`。\n\n这个逻辑直接影响 `barrier.AllReadersDone`：只有所有 reader 的有效状态都是 `DONE` 时，barrier 才会触发 fan-out。\n\n## 查询接口支持\n\n`internal/api` 使用 `Store` 聚合 job 详情和列表展示。常用读取方法包括：\n\n- `JobIDs(ctx)`：从 `cp:jobs:all` 读取并排序返回全部 job ID，不使用 `SCAN`，避免 Redis mesh 不支持的问题。\n- `ActiveJobIDs(ctx)`：读取 `cp:jobs:active`。\n- `JobMetaRaw(ctx, jobID)`：读取 job hash；hash 不存在时返回 `job {id} not found`。\n- `ListWorkerIDs(ctx, jobID)` / `ListReaderIDs(ctx, jobID)`：读取 worker/reader ID 集合。\n- `WorkerHashes(ctx, jobID, kind, ids)`：批量读取 writer 或 reader hash。\n- `BucketHashes(ctx, jobID, bucketIDs)`：批量读取 bucket hash。\n- `BucketStatuses(ctx, jobID, bucketIDs)`：只批量读取 bucket 的 `status` 字段。\n- `BucketAssignAll(ctx, jobID)`：解析 `bucket_assign` hash，返回 `map[int]int`。\n\n批量方法统一使用 Redis pipeline，避免 detail 接口按 worker 或 bucket 逐个往返 Redis。空 hash 会被跳过，因此返回 map 只包含实际存在的对象。\n\n## Router 和 Finalizer 相关方法\n\n`AllRouterBucketsRegistered(ctx, jobID, numBuckets)` 用 pipeline 检查 `0..numBuckets-1` 每个 `KeyRouterBucket` 是否存在。`job.Manager.CreateJob` 在拉起 writer 后调用它，确保 writer router 端点都注册完成，再启动 reader。\n\n`RouterEndpoint(ctx, jobID, bucketID)` 读取单个 router endpoint。Redis 返回 `redisv6.Nil` 时，该方法返回空字符串和 `nil` error。`finalizer.FanOut` 会把空 endpoint 视为该 bucket dispatch 失败。\n\n`SetBucketStatus(ctx, jobID, bucketID, status)` 是直接覆盖 bucket 状态的轻量方法，主要用于 fan-out 失败等需要标记 bucket 状态的场景。\n\n## 告警和 Barrier 幂等\n\n`AppendAlert(ctx, jobID, payload)` 使用 `LPUSH` 写入 `KeyAlerts(jobID)`，随后 `LTRIM 0 999`，只保留最近 1000 条告警。\n\n`SetNXBarrierFired(ctx, jobID)` 对 `KeyBarrierFired(jobID)` 执行 `SETNX 1 EX 86400`。返回值含义：\n\n- `true`：本次首次设置成功，可以触发 finalizer。\n- `false`：之前已经触发过，调用方应跳过。\n\n这个 key 的 24 小时 TTL 用于防止 barrier watcher 重复 fan-out，同时避免永久残留。\n\n## 清理逻辑\n\n`PurgeAllJobs(ctx)` 删除控制面已知的全部 job 及关联元数据，返回清理的 job 数量。\n\n它先通过 `allKnownJobIDs` 合并：\n\n- `JobIDs(ctx)` 从 `cp:jobs:all` 取到的 job。\n- `ActiveJobIDs(ctx)` 从 `cp:jobs:active` 取到的 job。\n\n然后对每个 job 调用 `keysForJobPurge` 收集待删除 key：\n\n- job 主 hash、bucket assign、workers/readers 集合。\n- done bucket set、alerts、barrier fired key。\n- 每个 writer hash。\n- 每个 reader hash。\n- 每个 bucket hash。\n- 每个 router bucket key。\n\nbucket ID 来源优先使用 `JobMetaRaw` 中的 `num_buckets`，生成 `0..num_buckets-1`；如果 job hash 不存在或字段不可用，则退回解析 `BucketAssignAll`。\n\n删除前会用 `dedupeStrings` 去重，最后由 `deleteKeysInChunks` 按 256 个 key 一批执行 `DEL`，避免单次命令过大。\n\n## 关键状态规则\n\nworker 上报状态必须经过 `normalizeReportedWorkerStatus` 才会写入 Redis。合法值包括：\n\n- `types.WorkerStateBooting`\n- `types.WorkerStateRunning`\n- `types.WorkerStateDone`\n- `types.WorkerStateFailed`\n- `types.WorkerStateLost`\n\n心跳路径使用 `heartbeatWorkerStatus`，不会覆盖 `DONE` 和 `FAILED`。进度路径则可以显式写入合法状态，例如 reader 上报 `FAILED` 时会保存 `error_message` 并把状态置为 `FAILED`。\n\njob 终态通过 `MarkJobFinished(ctx, jobID, state, now)` 写入：\n\n- `state`\n- `finish_time`\n- 从 `KeyJobsActive()` 移除 jobID\n\n`SetJobState(ctx, jobID, state)` 只更新 `state` 字段，不维护 `finish_time` 或 active set，适合 `PENDING -> RUNNING -> FINALIZING` 这类中间态切换。\n\n## 贡献注意事项\n\n新增 Redis 字段时，应同时检查三类代码：\n\n- 写入侧：`CreateJob`、`CreateWorkerMetadata`、心跳或进度上报方法。\n- 读取侧：`internal/api` 的详情构建逻辑，以及 `WorkerHashes` / `BucketHashes` 的调用处。\n- 测试侧：`internal/store/store_test.go` 中对应 Redis hash 字段断言。\n\n新增 key 时，应提供 `Key...` 构造函数，并把清理路径接入 `keysForJobPurge` 或全局清理逻辑。不要在业务模块中散落手写 key 字符串。\n\n对批量读取或批量写入，应优先使用 pipeline。现有代码已经在 `CreateJob`、`WorkerHashes`、`BucketHashes`、`BucketStatuses`、`AllReaderStatuses`、`AllRouterBucketsRegistered` 中采用该模式。\n\n处理 Redis 空值时，应区分真实错误和 `redisv6.Nil`。例如 `RouterEndpoint` 把不存在的 router key 转为空 endpoint，`BucketStatuses` 对不存在的 bucket status 直接跳过。","other-internal-writerrpc":"# Other — internal-writerrpc\n\n## 模块概览\n\n`internal/writerrpc` 是控制面对 `uri_writer` 服务的 KiteX/Overpass 客户端封装。它只负责一件事：根据 Writer 心跳注册出来的具体 `endpoint`，精确路由调用目标 Writer 实例的 `MarkBucketDone(bucketId)`。\n\n这个模块不走 PSM 服务发现来挑选 Writer，而是在每个 RPC client 上使用 `kitexclient.WithHostPorts(endpoint)` 指定目标地址。这样 Reader-Done Barrier 做 fan-out 时，可以把每个 bucket 的收尾信号发到持有该 bucket 的具体 Writer 实例。\n\n## 关键类型与函数\n\n### `Client`\n\n`Client` 是本模块的核心结构体：\n\n```go\ntype Client struct {\n    destService    string\n    rpcTimeout     time.Duration\n    connectTimeout time.Duration\n\n    mu         sync.RWMutex\n    byEndpoint map[string]writerservice.Client\n}\n```\n\n字段含义：\n\n- `destService`：Kitex 逻辑服务名，来自 `WriterRPC.PSM`，例如 `bytedance.videoarch.uri_writer`。\n- `rpcTimeout`：单次 RPC 调用超时。\n- `connectTimeout`：建立连接超时，当前与 `rpcTimeout` 使用同一个配置值。\n- `byEndpoint`：按规范化后的 endpoint 缓存 `writerservice.Client`。\n- `mu`：保护 `byEndpoint` 的并发读写。\n\n`Client` 隐式实现了 `finalizer.WriterRPCClient` 接口：\n\n```go\ntype WriterRPCClient interface {\n    MarkBucketDone(ctx context.Context, endpoint string, bucketID int) error\n}\n```\n\n因此 `cmd/main.go` 中可以直接把 `*writerrpc.Client` 注入到 `finalizer.New`。\n\n### `NewClient`\n\n```go\nfunc NewClient(destService string, timeout time.Duration) (*Client, error)\n```\n\n`NewClient` 构造 Writer RPC 客户端工厂，并做基础参数校验：\n\n- `destService == \"\"` 时返回 `writerrpc: empty dest service`。\n- `timeout <= 0` 时返回 `writerrpc: timeout must be > 0`。\n- 成功时初始化 `byEndpoint` 缓存，并把 `rpcTimeout`、`connectTimeout` 都设为传入的 `timeout`。\n\n运行时入口在 `cmd/main.go`：\n\n```go\nwriterCli, err := writerrpc.NewClient(\n    cfg.WriterRPC.PSM,\n    time.Duration(cfg.WriterRPC.TimeoutMs)*time.Millisecond,\n)\n```\n\n对应配置结构是 `config.WriterRPC`：\n\n```go\ntype WriterRPC struct {\n    PSM       string `yaml:\"PSM\"`\n    TimeoutMs int    `yaml:\"TimeoutMs\"`\n}\n```\n\n### `DestService`\n\n```go\nfunc (c *Client) DestService() string\n```\n\n返回客户端绑定的逻辑服务名，主要用于日志、诊断或调试场景。当前主调用链不依赖该方法完成业务逻辑。\n\n### `MarkBucketDone`\n\n```go\nfunc (c *Client) MarkBucketDone(ctx context.Context, endpoint string, bucketID int) error\n```\n\n`MarkBucketDone` 是模块对外的主要能力。它的执行过程是：\n\n1. 调用 `clientForEndpoint(endpoint)` 获取或创建目标 Writer 的 `writerservice.Client`。\n2. 构造 `uri_writer.MarkBucketDoneRequest`，把 `bucketID` 转为 `int32` 写入 `BucketId`。\n3. 调用生成客户端的 `cli.MarkBucketDone(ctx, req)`。\n4. 把传输错误、空响应、业务错误码统一转换为 Go `error`。\n5. 只有 `resp.ErrorCode == uri_writer.ErrorCode_SUCCESS` 时返回 `nil`。\n\n请求结构：\n\n```go\nresp, err := cli.MarkBucketDone(ctx, &uri_writer.MarkBucketDoneRequest{\n    BucketId: int32(bucketID),\n})\n```\n\n错误处理分三类：\n\n- RPC 调用失败：返回包含 service、endpoint、bucket 的包装错误。\n- 响应为空：返回 `writerrpc: empty MarkBucketDoneResponse`。\n- Writer 返回非成功业务码：记录错误日志，并返回包含 `ErrorCode` 与 `Message` 的错误。\n\n业务错误日志格式：\n\n```go\nlogs.Error(\"[writerrpc] mark_bucket_done business error service=%s endpoint=%s bucket=%d code=%s msg=%s\", ...)\n```\n\n## Endpoint 客户端缓存\n\n`clientForEndpoint` 是私有方法，负责 endpoint 级别的客户端复用：\n\n```go\nfunc (c *Client) clientForEndpoint(endpoint string) (writerservice.Client, error)\n```\n\n它使用双重检查锁模式：\n\n1. 空 endpoint 直接报错。\n2. 通过 `normalizeEndpoint` 规范化地址。\n3. 先加读锁查 `byEndpoint`。\n4. 未命中时加写锁再次检查。\n5. 仍未命中时调用 `writerservice.NewClient` 创建新客户端。\n6. 创建成功后写入 `byEndpoint[normalized]`。\n\n创建 Kitex client 时使用的关键选项：\n\n```go\nwriterservice.NewClient(\n    c.destService,\n    kitexclient.WithHostPorts(normalized),\n    kitexclient.WithRPCTimeout(c.rpcTimeout),\n    kitexclient.WithConnectTimeout(c.connectTimeout),\n)\n```\n\n这里的重点是 `WithHostPorts(normalized)`：它让调用固定打到指定 Writer 实例，而不是通过 `destService` 做服务发现负载均衡。`destService` 仍然保留为 Kitex 的逻辑服务名，用于客户端构造、日志、指标等基础能力。\n\n该缓存当前没有淘汰逻辑。现有使用场景下 endpoint 数量与任务内 Writer 实例相关，生命周期跟随控制面进程；如果未来 Writer endpoint 数量变得长期高频变化，需要重新评估缓存上限或淘汰策略。\n\n## Endpoint 规范化\n\n```go\nfunc normalizeEndpoint(endpoint string) string\n```\n\n`normalizeEndpoint` 解决的是裸 IPv6 host:port 无法直接被 `net.SplitHostPort` / Kitex hostport 语义稳定识别的问题。\n\n处理规则：\n\n- 空字符串原样返回。\n- `net.SplitHostPort(endpoint)` 成功时，说明已经是合法 hostport，原样返回。\n- 包含 `[` 或 `]` 但解析失败时，认为格式不明确，原样返回。\n- 冒号数量少于 2 时，通常是 IPv4、域名或非法地址，原样返回。\n- 对多冒号字符串，按最后一个冒号拆分 host 与 port。\n- port 必须是数字。\n- host 必须能解析为 IPv6，且不能是 IPv4。\n- 满足以上条件时，用 `net.JoinHostPort(host, port)` 返回带方括号的 IPv6 endpoint。\n\n示例：\n\n```text\n127.0.0.1:9000\n=> 127.0.0.1:9000\n\nwriter.internal:9000\n=> writer.internal:9000\n\n[2605:340:cd50:f09:16a0:3fd1:f03a:17b]:42459\n=> [2605:340:cd50:f09:16a0:3fd1:f03a:17b]:42459\n\n2605:340:cd50:f09:16a0:3fd1:f03a:17b:42459\n=> [2605:340:cd50:f09:16a0:3fd1:f03a:17b]:42459\n\nnot-an-endpoint\n=> not-an-endpoint\n```\n\n对应测试在 `TestNormalizeEndpoint` 中覆盖了 IPv4、域名、已带方括号 IPv6、裸 IPv6 和非法 endpoint。\n\n## 调用链位置\n\n`internal/writerrpc` 位于 Reader-Done Barrier 的收尾链路中：\n\n```mermaid\nflowchart TD\n    A[\"Barrier 检测 Reader 全部完成\"] --> B[\"finalizer.FanOut\"]\n    B --> C[\"store.RouterEndpoint 获取 bucket endpoint\"]\n    C --> D[\"writerrpc.Client.MarkBucketDone\"]\n    D --> E[\"clientForEndpoint 获取或创建 Kitex client\"]\n    E --> F[\"uri_writer.MarkBucketDone\"]\n```\n\n主程序装配关系：\n\n```go\nwriterCli, err := writerrpc.NewClient(\n    cfg.WriterRPC.PSM,\n    time.Duration(cfg.WriterRPC.TimeoutMs)*time.Millisecond,\n)\n\nfin, err := finalizer.New(st, cfg, writerCli)\n```\n\n`finalizer.FanOut` 会按 bucket 遍历路由表，通过 `store.RouterEndpoint(ctx, jobID, bid)` 找到 bucket 对应 Writer endpoint，然后调用：\n\n```go\nf.rpc.MarkBucketDone(callCtx, endpoint, bid)\n```\n\n这里的 `f.rpc` 实际就是 `*writerrpc.Client`。\n\n## 贡献注意事项\n\n修改本模块时需要特别关注三点：\n\n1. 不要把 `WithHostPorts(endpoint)` 改成普通 PSM 服务发现调用。fan-out 语义要求按 bucket 精确命中具体 Writer 实例。\n2. 新增 endpoint 格式支持时，应同步扩展 `TestNormalizeEndpoint`，尤其覆盖 IPv6、非法地址和已规范化地址。\n3. `MarkBucketDone` 的错误要保留 service、endpoint、bucket 等上下文。上层 `finalizer.callWithRetry` 会基于返回的 `error` 做重试和日志记录，错误上下文是排障入口。","other-readme-md":"# Other — README.md\n\n## README.md 模块说明\n\n`README.md` 是 `uri_task_control_panel` 仓库的入口文档，面向接入方和维护者说明控制面服务的定位、运行方式、接口契约、配置入口和关键实现约定。它本身不包含可执行代码，因此没有内部调用、外部调用或运行时执行流；它的作用是把仓库中多个实际代码模块串成一张可理解的系统图。\n\n## 服务定位\n\n`uri_task_control_panel` 是 VDA Store URI 排序任务的控制面服务，核心职责包括：\n\n- 创建 URI 排序任务；\n- 启动 Reader / Writer 相关执行单元；\n- 接收 Reader / Writer 心跳和进度上报；\n- 汇聚 Job、Bucket、Worker 状态；\n- 在 Reader 全部完成后触发 Reader-Done Barrier；\n- 通过 fan-out 调用 Writer 的 `MarkBucketDone(bucketId)` 完成 bucket 收尾；\n- 将任务元数据、worker 快照、bucket 快照等状态写入 Redis。\n\n服务位于 Reader 与 Writer 之间，上游对接 `videoarch/uri_source_reader`，下游对接 `videoarch/uri_writer`，Writer RPC 通过 `overpass/bytedance_videoarch_uri_task_control_panel` 生成客户端完成调用。\n\n## 架构概览\n\n```mermaid\nflowchart LR\n    A[\"调用方\"] --> B[\"Hertz API\"]\n    B --> C[\"job.Manager\"]\n    B --> D[\"collector\"]\n    C --> E[\"scheduler.FaaSLauncher\"]\n    D --> F[\"store.Client\"]\n    G[\"barrier 后台协程\"] --> F\n    G --> H[\"finalizer\"]\n    H --> I[\"writerrpc.Client\"]\n    I --> J[\"uri_writer.MarkBucketDone\"]\n```\n\n这张图概括了 README 中描述的主流程：HTTP 入口负责接收创建任务、心跳、进度和查询请求；`job` 负责创建任务与 bucket 到 writer 的路由；`collector` 写入运行态快照；`barrier` 定期判断 Reader 是否全部完成；`finalizer` 在收尾阶段 fan-out 调用 Writer；`store` 统一封装 Redis 访问。\n\n## 目录结构与职责\n\nREADME 将代码划分为几个主要区域：\n\n- `api/swagger.yaml`：OpenAPI 3.0.3 接口描述，是 HTTP/JSON 契约的机器可读版本。\n- `cmd/`：进程入口，负责启动服务。\n- `conf/`：本地 yaml 基线和 Hertz 配置，包括 `base.yml` 与 `hertz.config.yaml`。\n- `docs/`：接入指南和方案说明，例如 `integration.md` 与 `summary-aggregation-comparison.md`。\n- `examples/hertz_client/main.go`：Hertz Client 调用示例。\n- `internal/api/`：Hertz HTTP Gateway，暴露 7 个业务接口和 `/health`。\n- `internal/barrier/`：Reader-Done Barrier 后台扫描与触发逻辑。\n- `internal/collector/`：`/heartbeat`、`/report_progress` 的入库逻辑。\n- `internal/config/`：配置加载，包含 yaml、TCC 和 `caesar_config` 对接。\n- `internal/finalizer/`：Reader 完成后的 `MarkBucketDone` fan-out。\n- `internal/job/`：Job 创建、bucket 分配、bucket 到 writer 的路由表构建。\n- `internal/scheduler/`：`FaaSLauncher` 抽象和 `LambdaLauncher` 默认实现。\n- `internal/store/`：Redis 操作封装。\n- `internal/types/`：状态机常量和请求/响应 DTO。\n- `internal/writerrpc/`：KiteX/Overpass Writer 客户端代理。\n\n## HTTP 接口契约\n\nREADME 记录了当前服务暴露的主要接口：\n\n| 路径 | 方法 | 作用 |\n| --- | --- | --- |\n| `/api/v1/jobs` | `POST` | 创建一次写表任务 |\n| `/api/v1/jobs` | `GET` | 列出当前 Redis 中仍保留的任务基础信息 |\n| `/api/v1/heartbeat` | `POST` | Reader / Writer 心跳保活 |\n| `/api/v1/report_progress` | `POST` | Reader / Writer 进度上报 |\n| `/api/v1/jobs/{job_id}` | `GET` | 查询 Job 聚合详情 |\n| `/api/v1/alert` | `POST` | 异常告警上报 |\n| `/api/v1/ops/purge_all_jobs` | `POST` | 清理控制面记录的全部任务及关联元数据 |\n| `/health` | `GET` | 健康检查 |\n\n所有业务响应统一使用 Envelope 结构 `{code, message, data}`。Hertz handler 使用标准签名：\n\n```go\nfunc(ctx context.Context, c *app.RequestContext)\n```\n\n接口 schema 的权威描述位于 `api/swagger.yaml`，接入细节和错误码表位于 `docs/integration.md`。\n\n## Job 创建与 Reader 启动口径\n\nREADME 明确了 `CreateJobRequest` 中多个字段的实际含义，尤其是 Reader 输入和并发控制：\n\n- `CreateJobRequest.concurrency.num_readers` 表示期望启动的 Reader 上限，而不是绝对启动数量。\n- `hdfs_parquet` 支持 `source.extract.file_paths` 显式文件列表；使用该字段时 `source.hdfs_root` 可以为空。\n- `hdfs_parquet` 支持透传 `source.extract.vid_field` 和 `source.extract.oid_field`。\n- `tos_inventory_csv` 支持 `source.tos_csv_root`，控制面会通过存储网关 SDK 扫描 root 下文件并分发给 Reader。\n- `tos_inventory_csv` 也支持 `source.extract.csv_uris` 直传文件列表。\n- `source.tos_csv_root` 和 `source.extract.csv_uris` 最终都会归一化为 `csv_uris` 后下发。\n- 当 `csv_uris` 由 `source.tos_csv_root` 扫描生成时，下发形式是 `bucket/key`，不带 `tos://` 协议头。\n- `tos_inventory_csv` 未提供 `source.extract.store_uri_column` 时，需要同时提供 `source.extract.bucket` 与 `source.extract.key_column`。\n- `source.extract.create_timestamp_column` 和 `source.extract.create_time_str_column` 不能同时设置。\n- 控制面会基于 `output.hdfs_dir` 生成 Writer 使用的 `hdfs_temp_dir`，规则是 `${output.hdfs_dir}/_staging/${job_id}`。\n- 实际输入文件数小于请求 Reader 数时，控制面会自动下调实际 Reader 数。\n\n下调后的 Reader 数会体现在 `POST /api/v1/jobs` 响应、Redis Job 元数据，以及 `GET /api/v1/jobs`、`GET /api/v1/jobs/{job_id}` 的 `num_readers` / `config.concurrency.num_readers` 中。\n\n## 配置加载链路\n\n服务配置加载流程与 `videoarch/asuna` 对齐：\n\n1. 进程入口调用 `byted.Init()` 初始化 PSM、Cluster、日志和 Metrics 等基础设施。\n2. 通过 `config.NewConfig(local.ConfDir())` 解析 `conf` 目录。\n3. 调用 `cfg.Init()`，内部使用 `tccclient.NewClientV2(env.PSM(), ...)` 和 `caesar.Unmarshal`。\n4. 先读取 `conf/base.yml` 作为本地基线。\n5. 再通过 `caesar.WithConfigGetter(tcc.Get)` 使用 TCC 同名 key 覆盖本地配置。\n\n关键配置分组包括：\n\n- `Redis`：Redis 集群名、本地地址、密码和 DB。\n- `Heartbeat`：worker 心跳超时阈值和下次心跳建议间隔。\n- `Barrier`：Reader-Done Barrier 扫描间隔。\n- `Fanout`：`MarkBucketDone` fan-out 并发和重试次数。\n- `Job`：Job 元数据 TTL。\n- `WriterRPC`：Writer 服务 PSM 和单次 RPC 超时。\n- `Lambda`：Lambda 网关、Reader/Writer 函数名、调用方式、超时和控制面 PSM 信息。\n\n## Redis 访问约定\n\n所有 Redis 访问封装在 `internal/store`，对外通过 `store.NewClient(cfg)` 注入。\n\nREADME 中强调了几个实现约定：\n\n- Redis 底层使用 `code.byted.org/kv/goredis/v5`。\n- 当 `Redis.Cluster` 非空时，使用 `goredis.NewClient(cluster)` 走服务发现。\n- 当 `Redis.Cluster` 为空且 `Redis.Addrs` 非空时，使用 `goredis.NewClientWithServers(\"\", addrs, opt)` 本地直连。\n- 单元测试通过 `goredis.NewUnitTestOption()` 和 miniredis 直连。\n- 批量写使用普通 `Pipeline()`，收尾调用 `pipe.Exec()`。\n- `/report_progress` 只写 bucket / worker 快照，不维护 Job 级 `done_buckets` / `failed_buckets` 在线计数。\n- `GET /jobs/{job_id}` 的 `summary` 基于 bucket hash 现算。\n- `FINALIZING -> SUCCEEDED` 通过 `cp:job:{jobId}:done_bucket_ids` 集合做幂等去重和完成判定。\n- Worker hash 不依赖 Redis key TTL，`LOST` 状态在查询时根据 `last_hb` 和超时阈值推断。\n\n这些约定意味着 Redis 既是任务元数据存储，也是运行态快照存储；聚合查询部分偏向读时计算，而不是完全依赖写时维护计数。\n\n## 状态模型\n\nREADME 记录了当前代码中的状态枚举。\n\nJob 状态：\n\n- `PENDING`\n- `RUNNING`\n- `FINALIZING`\n- `SUCCEEDED`\n- `FAILED`\n- `CANCELLED`\n\nBucket 状态：\n\n- `RUNNING`\n- `MERGING`\n- `WRITING_HDFS`\n- `DONE`\n- `FAILED`\n\nWorker 状态：\n\n- `BOOTING`\n- `RUNNING`\n- `DONE`\n- `LOST`\n\n当前主流程已经使用 `PENDING`、`RUNNING`、`FINALIZING` 和 `SUCCEEDED`。`FAILED` 主要依赖显式终态写入，自动失败收敛尚未补齐。`CANCELLED` 已定义但取消接口尚未实现。\n\n`GET /jobs/{job_id}` 的 bucket 汇总按四组计算：\n\n- `RUNNING`\n- `MERGING | WRITING_HDFS`\n- `DONE`\n- `FAILED`\n\nWorker 不引入单独的 `DRAINING` 状态，收尾阶段主要由 Bucket 状态推进体现。\n\n## Writer RPC 与收尾 fan-out\n\n控制面通过 `internal/writerrpc/client.go` 调用 Writer 的 `MarkBucketDone(bucketId)`。底层客户端来自 `overpass/bytedance_videoarch_uri_task_control_panel`。\n\n关键路由规则：\n\n- 逻辑服务名来自 `WriterRPC.PSM`。\n- fan-out 时通过 `WithHostPorts(endpoint)` 精确路由到目标 Writer。\n- `WriterRPC.TimeoutMs` 控制单次调用超时。\n- `Fanout.Concurrency` 控制并发。\n- `Fanout.MaxRetries` 控制单 bucket 失败重试次数。\n\n这个机制服务于 Reader-Done Barrier：当 Reader 全部完成后，控制面需要通知每个 Writer 完成对应 bucket 的最终收尾。\n\n## 本地开发与测试入口\n\nREADME 定义了最短本地启动路径：\n\n```bash\ndocker run --rm -p 6379:6379 redis:7\nmake run\n```\n\n默认健康检查：\n\n```bash\ncurl http://127.0.0.1:8090/health\n```\n\n测试入口：\n\n```bash\nmake test\n```\n\n当前 README 指出的重点测试包括：\n\n- `internal/job/manager_test.go`：验证 bucket_assign 构建逻辑。\n- `internal/store/store_test.go`：基于 miniredis 验证 Redis 操作。\n- `internal/barrier/barrier_test.go`：验证 Reader-Done Barrier 触发判定。\n\n## 示例代码入口\n\n完整 Hertz Client 示例位于 `examples/hertz_client/main.go`。README 中的精简片段展示了两个核心调用：\n\n- 使用 `types.CreateJobRequest` 调用 `POST /api/v1/jobs`。\n- 使用 `types.HeartbeatRequest` 调用 `POST /api/v1/heartbeat`。\n\n示例中的 `postJSON` helper 使用 CloudWeGo Hertz Client 构造 `protocol.Request` / `protocol.Response`，发送 JSON POST，并解析统一 Envelope：\n\n```go\nvar env struct {\n    Code int             `json:\"code\"`\n    Msg  string          `json:\"message\"`\n    Data json.RawMessage `json:\"data\"`\n}\n```\n\n当 `env.Code != 0` 时，示例直接按业务错误处理。\n\n## 与其他文档的关系\n\n`README.md` 是入口索引，不承载所有细节：\n\n- API schema 以 `api/swagger.yaml` 为准。\n- 接入流程、错误码、限流和超时建议见 `docs/integration.md`。\n- Summary 聚合设计取舍见 `docs/summary-aggregation-comparison.md`。\n- 详细设计方案链接到《VDA Store URI 排序任务控制面服务设计方案》。\n\n维护 README 时，应优先保证它反映当前代码的真实边界：已实现能力、配置入口、状态口径、接口列表和已知 TODO。更细的接口字段、错误码和接入步骤应放在对应文档中，README 只保留入口和关键约定。","other-script":"# Other — script\n\n## `script/bootstrap.sh`\n\n`bootstrap.sh` 是服务进程的启动入口脚本，负责在运行二进制文件前准备运行目录、日志目录、关键环境变量和启动参数。脚本最终通过 `exec` 启动：\n\n```bash\n$CURDIR/bin/bytedance.videoarch.uri_task_control_panel $args\n```\n\n该模块本身不包含函数、类或被代码调用的 API；它是独立的运行时脚本，通常由部署系统、容器入口或本地启动流程调用。\n\n## 启动职责\n\n脚本主要完成以下工作：\n\n1. 确定脚本所在目录 `CURDIR`。\n2. 解析运行根目录 `RUNTIME_ROOT` 和端口参数 `PORT`。\n3. 根据运行环境选择日志目录。\n4. 创建 `app` 和 `rpc` 日志子目录。\n5. 在 host network 模式下导出服务端口和调试端口。\n6. 设置 Hertz 相关环境变量。\n7. 拼接二进制启动参数。\n8. 使用 `exec` 将当前 shell 进程替换为服务进程。\n\n## 执行流程\n\n```mermaid\nflowchart TD\n    A[启动 bootstrap.sh] --> B[解析 CURDIR]\n    B --> C[确定 RUNTIME_ROOT]\n    C --> D[选择日志目录]\n    D --> E[创建 app/rpc 日志目录]\n    E --> F[设置 PSM 和 HERTZ_LOG_DIR]\n    F --> G[拼接启动参数]\n    G --> H[exec 启动服务二进制]\n```\n\n## 参数约定\n\n脚本支持两个位置参数：\n\n```bash\n./bootstrap.sh [RUNTIME_ROOT] [PORT]\n```\n\n### `$1`：`RUNTIME_ROOT`\n\n如果传入第一个参数，脚本将其作为运行根目录：\n\n```bash\nRUNTIME_ROOT=$1\n```\n\n如果没有传入，则默认使用脚本所在目录：\n\n```bash\nRUNTIME_ROOT=${CURDIR}\n```\n\n`RUNTIME_ROOT` 主要用于推导默认日志目录：\n\n```bash\nRUNTIME_LOG_ROOT=$RUNTIME_ROOT/log\n```\n\n脚本中还定义了：\n\n```bash\nRUNTIME_CONF_ROOT=$RUNTIME_ROOT/conf\n```\n\n但当前实现没有继续使用 `RUNTIME_CONF_ROOT`。实际传给服务的配置目录来自脚本目录下的 `conf/`：\n\n```bash\nCONF_DIR=$CURDIR/conf/\n```\n\n这意味着配置文件位置与 `bootstrap.sh` 所在目录绑定，而不是与传入的 `RUNTIME_ROOT` 绑定。\n\n### `$2`：`PORT`\n\n第二个参数会被保存为：\n\n```bash\nPORT=$2\n```\n\n如果 `PORT` 非空，脚本会追加服务启动参数：\n\n```bash\n-port=$PORT\n```\n\n最终命令类似：\n\n```bash\nbin/bytedance.videoarch.uri_task_control_panel \\\n  -psm=bytedance.videoarch.uri_task_control_panel \\\n  -conf-dir=/path/to/script/conf/ \\\n  -log-dir=/path/to/log \\\n  -port=8080\n```\n\n如果未传入端口，则不会添加 `-port` 参数。\n\n## 环境变量\n\n### `HERTZTOOL_VERSION`\n\n脚本固定导出 Hertz 工具版本：\n\n```bash\nexport HERTZTOOL_VERSION=v3.4.2\n```\n\n该变量通常用于 Hertz 相关运行时或工具链识别版本。\n\n### `IS_TCE_DOCKER_ENV` 与 `RUNTIME_LOGDIR`\n\n日志目录选择逻辑如下：\n\n```bash\nif [ \"${IS_TCE_DOCKER_ENV}\" == 1 ] && [ -n \"${RUNTIME_LOGDIR}\" ]; then\n    RUNTIME_LOG_ROOT=$RUNTIME_LOGDIR\nelse\n    RUNTIME_LOG_ROOT=$RUNTIME_ROOT/log\nfi\n```\n\n在 TCE Docker 环境中，如果外部注入了 `RUNTIME_LOGDIR`，脚本优先使用该目录作为日志根目录。否则使用：\n\n```bash\n$RUNTIME_ROOT/log\n```\n\n随后脚本确保以下目录存在：\n\n```bash\n$RUNTIME_LOG_ROOT/app\n$RUNTIME_LOG_ROOT/rpc\n```\n\n### `IS_HOST_NETWORK`、`PORT0`、`PORT1`\n\n当启用 host network 模式时：\n\n```bash\nif [ \"$IS_HOST_NETWORK\" == \"1\" ]; then\n    export RUNTIME_SERVICE_PORT=$PORT0\n    export RUNTIME_DEBUG_PORT=$PORT1\nfi\n```\n\n这里脚本期望外部环境已经提供 `PORT0` 和 `PORT1`。它们会被映射为：\n\n```bash\nRUNTIME_SERVICE_PORT=$PORT0\nRUNTIME_DEBUG_PORT=$PORT1\n```\n\n这段逻辑不会直接影响 `-port` 参数；`-port` 仍然只由第二个位置参数 `$2` 决定。\n\n### `HERTZ_LOG_DIR`\n\n脚本将最终选定的日志根目录导出给服务：\n\n```bash\nexport HERTZ_LOG_DIR=$RUNTIME_LOG_ROOT\n```\n\n同时也将同一个路径作为命令行参数传入：\n\n```bash\n-log-dir=$HERTZ_LOG_DIR\n```\n\n### `PSM`\n\n服务名固定为：\n\n```bash\nSVC_NAME=bytedance.videoarch.uri_task_control_panel\n```\n\n脚本导出：\n\n```bash\nexport PSM=$SVC_NAME\n```\n\n并通过启动参数传入：\n\n```bash\n-psm=$SVC_NAME\n```\n\n## 二进制与配置目录\n\n脚本约定二进制文件位于：\n\n```bash\n$CURDIR/bin/bytedance.videoarch.uri_task_control_panel\n```\n\n其中 `CURDIR` 是 `bootstrap.sh` 所在目录。\n\n配置目录固定为：\n\n```bash\n$CURDIR/conf/\n```\n\n启动参数中使用：\n\n```bash\n-conf-dir=$CONF_DIR\n```\n\n因此，部署包需要保持如下结构：\n\n```text\nscript目录/\n  bootstrap.sh\n  bin/\n    bytedance.videoarch.uri_task_control_panel\n  conf/\n    ...\n```\n\n如果移动 `bootstrap.sh`，需要同步保证 `bin/` 和 `conf/` 仍然位于脚本所在目录下。\n\n## 启动命令构造\n\n核心启动参数由 `args` 拼接完成：\n\n```bash\nargs=\"-psm=$SVC_NAME -conf-dir=$CONF_DIR -log-dir=$HERTZ_LOG_DIR\"\n```\n\n当 `PORT` 非空时追加：\n\n```bash\nargs+=\" -port=$PORT\"\n```\n\n脚本会先打印完整命令：\n\n```bash\necho \"$CURDIR/bin/${BinaryName} $args\"\n```\n\n然后执行：\n\n```bash\nexec $CURDIR/bin/${BinaryName} $args\n```\n\n使用 `exec` 后，shell 进程会被服务二进制进程替换。这对容器和进程管理很重要：服务进程会成为当前进程，信号可以直接传递给服务本身。\n\n## 与代码库其他部分的关系\n\n`bootstrap.sh` 不被 Go/JavaScript/Python 等代码模块直接调用，也不暴露可复用函数。它连接代码库的方式主要是运行时约定：\n\n- 依赖 `bin/bytedance.videoarch.uri_task_control_panel` 作为实际服务程序。\n- 依赖 `conf/` 目录作为服务配置来源。\n- 向服务传入 `-psm`、`-conf-dir`、`-log-dir` 和可选 `-port` 参数。\n- 通过 `HERTZ_LOG_DIR`、`PSM`、`RUNTIME_SERVICE_PORT`、`RUNTIME_DEBUG_PORT` 等环境变量影响服务运行环境。\n- 为日志系统预创建 `app` 和 `rpc` 目录。\n\n## 维护注意事项\n\n路径变量当前没有统一加引号，例如：\n\n```bash\nif [ ! -d $RUNTIME_LOG_ROOT/app ]; then\n    mkdir -p $RUNTIME_LOG_ROOT/app\nfi\n```\n\n如果运行路径中包含空格，可能导致 shell 解析异常。现有部署路径通常不包含空格，因此当前实现可以工作；如果后续需要增强通用性，应将路径引用改为带引号的形式。\n\n`RUNTIME_CONF_ROOT` 当前被赋值但未使用：\n\n```bash\nRUNTIME_CONF_ROOT=$RUNTIME_ROOT/conf\n```\n\n如果未来希望配置目录跟随 `RUNTIME_ROOT`，需要明确调整：\n\n```bash\nCONF_DIR=$RUNTIME_CONF_ROOT/\n```\n\n但这会改变现有配置加载位置，修改前需要确认部署包结构和运行平台约定。","other":"# Other\n\n## 模块概览\n\n`Other` 汇总了 `uri_task_control_panel` 的入口文档、接口契约、配置与核心内部模块。它们共同支撑一个控制面闭环：业务方创建 Job，控制面拉起 Reader/Writer，运行期间接收心跳与进度，Reader 全部完成后触发收尾屏障，再按 bucket 路由通知 Writer 完成最终处理。\n\n```mermaid\nflowchart LR\n    接口契约[\"接口契约<br/>api/swagger.yaml\"] --> HTTP[\"HTTP 控制面<br/>internal/api\"]\n    HTTP --> 创建[\"任务编排<br/>job.Manager\"]\n    创建 --> 调度[\"执行单元拉起<br/>scheduler.FaaSLauncher\"]\n    创建 --> 存储[\"状态持久化<br/>store.Store\"]\n    HTTP --> 上报[\"运行上报<br/>collector.Collector\"]\n    上报 --> 存储\n    存储 --> 屏障[\"Reader 完成屏障<br/>barrier.Watcher\"]\n    屏障 --> 收尾[\"bucket 收尾派发<br/>finalizer.Finalizer\"]\n    收尾 --> RPC[\"Writer RPC<br/>writerrpc.Client\"]\n```\n\n## 子模块协作\n\n[README.md](README.md) 给出仓库级定位，说明控制面位于 `uri_source_reader` 与 `uri_writer` 之间，负责 Job 生命周期、Reader-Done Barrier、Writer fan-out 和 Redis 状态管理。\n\n[api](api.md) 定义 HTTP/JSON 契约，[docs](docs.md) 面向接入方解释这些契约的使用方式。运行时由 [internal-api](internal-api.md) 注册 `/api/v1` 路由，并把请求转发到 `job.Manager`、`collector.Collector` 或 `store.Store` 的聚合查询能力。\n\n[internal-job](internal-job.md) 是创建任务的编排层。它校验 `CreateJobRequest`，生成 Reader/Writer 启动计划，通过 [internal-scheduler](internal-scheduler.md) 的 `FaaSLauncher` 拉起执行单元，并把 Job、bucket 分配和 worker 元数据写入 [internal-store](internal-store.md)。\n\n[internal-collector](internal-collector.md) 处理 Reader/Writer 的 `heartbeat` 和 `reportProgress`。它不做复杂聚合，而是把上报转换为 `Store` 写入；`Store` 再负责维护 worker 快照、bucket 状态、告警、活跃 Job 集合以及 Job 终态推进。\n\n[internal-barrier](internal-barrier.md) 周期性读取 `Store.ActiveJobIDs` 并判断 `AllReadersDone`。当某个 Job 的所有 Reader 都完成后，它通过 `SetNXBarrierFired` 保证只触发一次，然后调用 [internal-finalizer](internal-finalizer.md)。\n\n[internal-finalizer](internal-finalizer.md) 根据 bucket 到 Writer 的路由表做 fan-out，通过 [internal-writerrpc](internal-writerrpc.md) 精确调用目标 Writer endpoint 的 `MarkBucketDone(bucketId)`。bucket 是否最终 `DONE` 仍由 Writer 后续进度上报决定，Job 成功推进由 `store.ApplyBucketProgress` 聚合完成。\n\n## 运行与配置边界\n\n[conf](conf.md) 提供 Redis、心跳、任务控制、Lambda、StorageGW、Writer RPC、Hertz 启动与日志配置。[go.mod](go.mod.md) 固定模块路径、Go 版本和框架依赖边界。[build.sh](build.sh.md) 负责构建产物与配置复制，[script](script.md) 中的 `bootstrap.sh` 负责运行前目录、日志和环境变量准备。\n\n整体上，配置和脚本决定服务如何启动，`api/swagger.yaml` 与接入文档决定外部如何调用，`internal/*` 模块负责把一次 URI 排序任务从创建推进到执行、屏障、收尾和状态查询。","overview":"# uri_task_control_panel — Wiki\n\n## 项目概览\n\n`uri_task_control_panel` 是 VDA Store URI 排序任务的控制面服务。它不直接搬运或写入业务数据，而是负责任务生命周期编排：接收创建任务请求，拉起 Reader 和 Writer 工作器，汇聚运行期心跳与进度，在所有 Reader 完成后触发 Reader-Done Barrier，并按 bucket 路由通知 Writer 做最终收尾。\n\n这个仓库的主模块是：\n\n```text\ncode.byted.org/videoarch/uri_task_control_panel\n```\n\n服务面向三个主要角色：\n\n- 上游 Reader：读取输入 URI / HDFS 文件并上报处理进度。\n- 下游 Writer：接收 bucket 数据写入，并在控制面通知后完成 bucket 收尾。\n- 控制面客户端：通过 HTTP API 创建任务、查询状态、上报心跳和告警。\n\n新开发者可以先从 [Service Entry Point](service-entry-point.md) 了解进程如何启动，再阅读 [HTTP API](http-api.md)、[Job Orchestration](job-orchestration.md)、[Persistence and State Store](persistence-and-state-store.md) 和 [Barrier and Finalization](barrier-and-finalization.md)。这几页覆盖了最核心的执行路径。\n\n## 整体架构\n\n```mermaid\nflowchart TD\n    客户端[\"控制面客户端\"] --> 接口[\"HTTP API<br/>internal/api\"]\n    接口 --> 编排[\"任务编排<br/>internal/job\"]\n    接口 --> 采集[\"进度采集<br/>internal/collector\"]\n    编排 --> 调度[\"工作器调度<br/>internal/scheduler\"]\n    编排 --> 存储[\"状态存储<br/>internal/store\"]\n    采集 --> 存储\n    调度 --> 工作者[\"Reader / Writer 工作器\"]\n    存储 --> 屏障[\"完成屏障<br/>internal/barrier\"]\n    屏障 --> 收尾[\"终态派发<br/>internal/finalizer\"]\n    收尾 --> 写入RPC[\"Writer RPC<br/>internal/writerrpc\"]\n```\n\n`cmd/main.go` 是服务入口，负责按顺序装配配置、Redis、任务编排器、进度采集器、Writer RPC 客户端、Barrier 后台循环和 Hertz HTTP 服务。配置由 [Configuration](configuration.md) 统一加载，本地基线位于 `conf/base.yml`，运行期配置会通过 TCC 合并并补默认值。\n\nHTTP 层位于 `internal/api`，它负责请求绑定、基础校验和统一响应包装。真正的业务动作会下沉到 `internal/job`、`internal/collector` 和 `internal/store`，避免 Handler 直接承载状态机逻辑。\n\n`internal/store` 是 Redis 状态访问的唯一封装层。任务元数据、worker 状态、心跳、bucket 进度、barrier 触发标记和终态推进都通过 [Persistence and State Store](persistence-and-state-store.md) 完成。\n\n## 核心执行流程\n\n### 创建任务\n\n创建任务从 `POST /api/v1/jobs` 进入 [HTTP API](http-api.md)，随后交给 [Job Orchestration](job-orchestration.md) 的 `Manager.CreateJob`。\n\n编排层会校验请求参数，生成 `jobID`、输出路径和 Writer 临时目录，然后解析输入源并生成 Reader 启动计划。对于 bucket 路由，控制面按照 `bucketId % numWriters` 建立 bucket 到 Writer 的分配关系，并写入 Redis。\n\n启动顺序很重要：服务会先拉起 Writer，等待 Writer 注册好 bucket 路由，再拉起 Reader，最后把 Job 状态推进到 `running`。工作器拉起能力由 [Worker Scheduling](worker-scheduling.md) 封装，当前支持本地日志 stub 和 Lambda 网关调用两种实现。\n\n### 运行期上报\n\nReader 和 Writer 在运行过程中通过 `/api/v1/heartbeat` 刷新心跳，通过 `/api/v1/report_progress` 上报进度、错误、文件计数和 bucket 状态。这部分由 [Progress Collection](progress-collection.md) 接收，再统一写入 `internal/store`。\n\n控制面查询任务详情时，会从 Redis 聚合 Job、Reader、Writer 和 bucket 维度的状态，返回给调用方。`examples/hertz_client` 提供了一个最小 happy path，可参考 [Client Example](client-example.md) 了解如何创建任务、上报进度并查询结果。\n\n### Reader-Done Barrier 与收尾\n\n[Barrier and Finalization](barrier-and-finalization.md) 是服务的关键后台流程。`barrier.Watcher.Start` 会周期扫描活跃 Job，读取所有 Reader 状态，并判断它们是否都已进入终态。\n\n当某个 Job 的 Reader 集合非空且全部完成后，控制面使用 Redis `SETNX` 语义写入 barrier 触发标记，保证同一个 Job 只触发一次 fan-out。随后 Job 状态进入 `finalizing`，`internal/finalizer` 按 bucket 路由调用 [Writer RPC Integration](writer-rpc-integration.md)，向对应 Writer 实例发送 `MarkBucketDone`。\n\nWriter RPC 不通过普通 PSM 服务发现做模糊路由，而是按 Writer 注册的 endpoint 创建 Kitex client，确保每个 bucket 的收尾请求精确送达对应 Writer。\n\n## 本地启动\n\n本项目使用 Go `1.23.0`。首次开发前可以先拉取依赖：\n\n```bash\ngo mod download\n```\n\n配置入口在 `conf/` 下，主要包括：\n\n```text\nconf/base.yml\nconf/hertz.config.yaml\n```\n\n本地启动服务：\n\n```bash\ngo run ./cmd\n```\n\n如果只想验证 HTTP 调用链，可以在服务启动后运行示例客户端：\n\n```bash\ngo run ./examples/hertz_client\n```\n\n默认示例会访问本地控制面服务；需要切换目标地址时，可通过 `BASE_URL` 指定。\n\n## 阅读建议\n\n如果你是第一次进入这个仓库，建议按运行链路阅读：\n\n先看 [Service Entry Point](service-entry-point.md)，理解服务如何被装配；再看 [Configuration](configuration.md) 和 [HTTP API](http-api.md)，掌握配置与外部契约；随后阅读 [Job Orchestration](job-orchestration.md)、[Worker Scheduling](worker-scheduling.md) 和 [Progress Collection](progress-collection.md)，理解任务如何被启动和上报；最后阅读 [Persistence and State Store](persistence-and-state-store.md)、[Barrier and Finalization](barrier-and-finalization.md) 和 [Writer RPC Integration](writer-rpc-integration.md)，掌握状态机、Reader 完成屏障和 Writer 收尾逻辑。","persistence-and-state-store":"# Persistence and State Store\n\n## 持久化与状态存储模块\n\n`internal/store` 是控制面访问 Redis 的唯一封装层。它负责生成 Redis key、写入任务与 worker 元数据、接收心跳和进度、读取详情接口所需的聚合状态，并在 bucket 全部完成时自动推进 Job 终态。\n\n该模块不包含业务调度逻辑，但承载了控制面状态机的持久化语义。上层模块通过 `Store` 调用 Redis，而不是直接拼接 key 或直接访问底层客户端。\n\n## 核心组件\n\n### `Store`\n\n```go\ntype Store struct {\n    rdb *goredis.Client\n    cfg *config.Config\n}\n```\n\n`Store` 持有 `goredis.Client` 和全局配置：\n\n- `New(rdb, cfg)`：构造 `Store`。\n- `Client()`：暴露底层 Redis 客户端，主要用于复用底层命令或测试注入。\n- `NewClient(cfg)`：按配置创建 `*goredis.Client`。\n\nRedis 客户端使用 `code.byted.org/kv/goredis/v5`，命令风格接近 `go-redis v6`：通过 `client.WithContext(ctx)` 派生带 context 的客户端，Redis 空值用 `redisv6.Nil` 判断。\n\n### Redis Key 约定\n\n所有控制面 key 都集中在 `internal/store/keys.go`：\n\n| 函数 | Redis key | 用途 |\n| --- | --- | --- |\n| `KeyJob(jobID)` | `cp:job:{jobID}` | Job 元数据 HASH |\n| `KeyBucketAssign(jobID)` | `cp:job:{jobID}:bucket_assign` | bucket 到 writer idx 的映射 HASH |\n| `KeyWriter(jobID, writerID)` | `cp:job:{jobID}:writer:{writerID}` | writer 状态 HASH |\n| `KeyReader(jobID, readerID)` | `cp:job:{jobID}:reader:{readerID}` | reader 状态 HASH |\n| `KeyBucket(jobID, bucketID)` | `cp:job:{jobID}:bucket:{bucketID}` | bucket 进度 HASH |\n| `KeyWorkers(jobID)` | `cp:job:{jobID}:workers` | writer ID SET |\n| `KeyReaders(jobID)` | `cp:job:{jobID}:readers` | reader ID SET |\n| `KeyDoneBucketIDs(jobID)` | `cp:job:{jobID}:done_bucket_ids` | 已完成 bucket ID SET |\n| `KeyJobsActive()` | `cp:jobs:active` | 活跃 Job SET |\n| `KeyJobsAll()` | `cp:jobs:all` | 已知 Job SET |\n| `KeyAlerts(jobID)` | `cp:job:{jobID}:alerts` | 告警 LIST |\n| `KeyBarrierFired(jobID)` | `cp:job:{jobID}:barrier_fired` | barrier 触发幂等标记 |\n| `KeyRouterBucket(jobID, bucketID)` | `{jobID}:bucket:{00000}` | Router 既有 bucket endpoint key |\n\n`KeyRouterBucket` 是控制面外部已有 key，控制面只读或在清理时删除，用于诊断和 fan-out endpoint 查找。\n\n## Redis 连接初始化\n\n`NewClient(cfg)` 支持两种连接方式：\n\n1. `cfg.Redis.Cluster` 非空时，使用 `goredis.NewClientWithOption` 走服务发现，并设置 1 秒级别的 dial/read/write/pool timeout。\n2. `cfg.Redis.Cluster` 为空但 `cfg.Redis.Addrs` 存在时，使用 `goredis.NewClientWithServers` 直连显式地址，适合本地环境和单测。\n\n直连模式会关闭 GDPR 校验、关闭自动加载配置，并禁用 consul 服务发现：\n\n```go\nopt.DisableGDPRVerify = true\nopt.DisableAutoLoadConf()\nopt.SetServiceDiscoveryWithoutConsul()\n```\n\n如果配置了 `cfg.Redis.Password` 或 `cfg.Redis.DB`，会写入底层 Redis options。\n\n## 数据写入流程\n\n```mermaid\nflowchart TD\n    A[\"创建任务\"] --> B[\"CreateJob 写入 Job 元数据\"]\n    B --> C[\"写入 bucket_assign\"]\n    B --> D[\"加入 jobs:active / jobs:all\"]\n    D --> E[\"CreateWorkerMetadata 写入 worker 静态元数据\"]\n    E --> F[\"心跳 UpsertWriterHeartbeat / UpsertReaderHeartbeat\"]\n    F --> G[\"进度 ApplyWriterProgress / ApplyReaderProgress / ApplyBucketProgress\"]\n    G --> H[\"bucket 全部 DONE 后 MarkJobFinished\"]\n```\n\n### 创建 Job：`CreateJob`\n\n`CreateJob(ctx, jobID, meta, bucketAssign)` 一次性写入：\n\n- `cp:job:{jobID}` HASH：\n  - `state`\n  - `request`\n  - `hdfs_output_path`\n  - `hdfs_temp_dir`\n  - `num_buckets`\n  - `num_writers`\n  - `num_readers`\n  - `create_time`\n- `cp:job:{jobID}:bucket_assign` HASH：\n  - 字段名为 bucket ID 字符串\n  - 字段值为 writer idx\n- `cp:jobs:active` SET\n- `cp:jobs:all` SET\n\n如果 `cfg.Job.TTLSec > 0`，`CreateJob` 会给 `KeyJob(jobID)` 和 `KeyBucketAssign(jobID)` 设置过期时间。\n\n`bucketAssign` 写入时会按 4096 个 entry 分批 `HMSet`，避免单次 HMSET payload 过大。\n\n### 写入 worker 元数据：`CreateWorkerMetadata`\n\n`CreateWorkerMetadata(ctx, jobID, workers)` 用于批量写入已经成功拉起的 worker 静态信息。\n\nwriter 写入：\n\n- `KeyWriter(jobID, worker.ID)` HASH：\n  - `writer_id`\n  - `writer_idx`\n  - `status`，通过 `HSetNX` 初始化为 `types.WorkerStateBooting`\n- `KeyWorkers(jobID)` SET\n\nreader 写入：\n\n- `KeyReader(jobID, worker.ID)` HASH：\n  - `reader_id`\n  - `reader_idx`\n  - `status`，通过 `HSetNX` 初始化为 `types.WorkerStateBooting`\n- `KeyReaders(jobID)` SET\n\n该方法会校验：\n\n- `jobID` 不能为空\n- `worker.ID` 不能为空\n- `worker.Idx` 不能小于 0\n- `worker.Kind` 只能是 `types.KindWriter` 或 `types.KindReader`\n\n### 心跳写入\n\n`UpsertWriterHeartbeat(ctx, jobID, hb, now)` 写入 writer 心跳：\n\n- `writer_id`\n- `ip`\n- `port`\n- `buckets`\n- `buckets_assigned`\n- `last_hb`\n- `status`\n\n`hb.Buckets` 会被 JSON 序列化后存入 `buckets` 字段。\n\n`UpsertReaderHeartbeat(ctx, jobID, hb, now)` 写入 reader 心跳：\n\n- `reader_id`\n- `ip`\n- `port`\n- `last_hb`\n- `status`\n\n心跳状态通过 `heartbeatWorkerStatus(currentStatus)` 计算：如果当前状态已经是 `DONE` 或 `FAILED`，保持终态不被心跳覆盖；否则写为 `RUNNING`。\n\n### 进度写入\n\n`ApplyWriterProgress(ctx, jobID, writerID, workerStatus, errorMessage, progressTime)` 写入 writer 实例级进度：\n\n- `writer_id`\n- `last_update_time`\n- `error_message`\n- 可选 `status`\n\n`workerStatus` 会经过 `normalizeReportedWorkerStatus` 校验。只有 `BOOTING`、`RUNNING`、`DONE`、`FAILED`、`LOST` 会被接受，其他值会被忽略。\n\n`ApplyReaderProgress(ctx, jobID, readerID, files, bucketsSeen, workerStatus, errorMessage, progressTime)` 写入 reader 进度：\n\n- `reader_id`\n- `buckets_seen`\n- `last_update_time`\n- `error_message`\n- 可选文件进度：\n  - `files_total`\n  - `files_done`\n  - `rows_read`\n  - `bytes_read`\n- 可选 `status`\n\n`ApplyBucketProgress(ctx, jobID, writerID, p, progressTime)` 写入单个 bucket 的快照：\n\n- `writer_id`\n- `status`\n- `total_uris`\n- `bytes`\n- `run_files`\n- `peak_local_disk_mb`\n- `merge_progress`\n- `hdfs_write_progress`\n- `final_path`\n- `final_size`\n- `last_update`\n\n如果 `writerID` 非空，还会更新对应 writer 的 `last_update_time` 并加入 `KeyWorkers(jobID)`。\n\n## Job 自动成功判定\n\n`ApplyBucketProgress` 在 bucket 状态从非 `DONE` 变为 `DONE` 时，会调用 `maybeMarkJobSucceeded`。\n\n判定条件：\n\n1. `JobMetaRaw` 能读取到 Job 元数据。\n2. 当前 Job 状态必须是 `types.JobStateFinalizing`。\n3. `num_buckets` 大于 0。\n4. 当前 bucket ID 被加入 `KeyDoneBucketIDs(jobID)`。\n5. `SCard(KeyDoneBucketIDs(jobID)) == num_buckets`。\n\n满足条件后调用：\n\n```go\ns.MarkJobFinished(ctx, jobID, types.JobStateSucceeded, finishTime)\n```\n\n`MarkJobFinished` 会写入：\n\n- `state`\n- `finish_time`\n\n并从 `cp:jobs:active` 删除该 Job。\n\n已经处于 `SUCCEEDED`、`FAILED`、`CANCELLED` 的 Job 不会被重复推进。\n\n## 状态读取语义\n\n### Job 列表\n\n`ActiveJobIDs(ctx)` 直接读取 `cp:jobs:active`。\n\n`JobIDs(ctx)` 只读取 `cp:jobs:all`，并去重、排序。这里刻意不使用 `SCAN`，避免 Redis mesh 不支持或表现不一致。\n\n`JobMetaRaw(ctx, jobID)` 读取 `KeyJob(jobID)` HASH。如果 HASH 为空，返回 `job {jobID} not found`。\n\n### Worker 读取\n\n`ListWorkerIDs(ctx, jobID)` 读取 writer ID SET。\n\n`ListReaderIDs(ctx, jobID)` 读取 reader ID SET。\n\n`WorkerHash(ctx, jobID, kind, id)` 读取单个 worker HASH。`kind == types.KindWriter` 时读 writer，否则读 reader。\n\n`WorkerHashes(ctx, jobID, kind, ids)` 批量 pipeline 读取 worker HASH，避免详情接口逐 worker 往返 Redis。空 HASH 会被跳过。\n\n### Reader 有效状态：`AllReaderStatuses`\n\n`AllReaderStatuses(ctx, jobID)` 用于 barrier 判断 reader 是否全部完成。它读取 `KeyReaders(jobID)` 下所有 reader 的 `status` 和 `last_hb`，再通过 `effectiveWorkerStatus` 转换成有效状态。\n\n规则：\n\n- `status` 为空：返回 `LOST`\n- `status` 是终态 `DONE` 或 `FAILED`：直接返回原状态，即使心跳过期也不改写\n- `last_hb` 为空或小于等于 0：返回 `LOST`\n- `cfg.Heartbeat.TTLSec > 0` 且心跳超过 TTL：返回 `LOST`\n- 其他情况：返回原 `status`\n\nbarrier 模块的调用链是：\n\n```mermaid\nflowchart TD\n    A[\"barrier.Start\"] --> B[\"tick\"]\n    B --> C[\"AllReadersDone\"]\n    C --> D[\"Store.AllReaderStatuses\"]\n    D --> E[\"effectiveWorkerStatus\"]\n    E --> F[\"isTerminalWorkerStatus\"]\n```\n\n### Bucket 读取\n\n`BucketHash(ctx, jobID, bucketID)` 读取单个 bucket HASH。\n\n`BucketHashes(ctx, jobID, bucketIDs)` 批量 pipeline 读取 bucket HASH，适合详情接口聚合多个 bucket。\n\n`BucketStatuses(ctx, jobID, bucketIDs)` 只批量读取 `status` 字段，适合只需要判断状态的路径。\n\n`BucketAssignAll(ctx, jobID)` 读取 `KeyBucketAssign(jobID)`，并把字符串字段转换为 `map[int]int`。转换失败的 entry 会被跳过。\n\n`SetBucketStatus(ctx, jobID, bucketID, status)` 直接覆盖 bucket 的 `status` 字段，当前用于 fan-out 失败场景。\n\n## Router endpoint 与 barrier 幂等\n\n`AllRouterBucketsRegistered(ctx, jobID, numBuckets)` 会 pipeline 检查每个 `KeyRouterBucket(jobID, bucketID)` 是否存在。只要任意 bucket endpoint 不存在，就返回 `false`。\n\n`RouterEndpoint(ctx, jobID, bucketID)` 读取 Router 既有 bucket endpoint。Redis 返回 `redisv6.Nil` 时，该方法返回空字符串和 `nil` 错误，调用方可以把“未注册 endpoint”作为普通分支处理。\n\n`SetNXBarrierFired(ctx, jobID)` 使用：\n\n```go\nSETNX cp:job:{jobID}:barrier_fired 1 EX 86400\n```\n\n返回 `true` 表示首次设置成功，用于保证 barrier 行为只触发一次。\n\n## 告警存储\n\n`AppendAlert(ctx, jobID, payload)` 使用 pipeline：\n\n1. `LPush(KeyAlerts(jobID), string(payload))`\n2. `LTrim(KeyAlerts(jobID), 0, 999)`\n\n每个 Job 最多保留最近 1000 条告警。\n\n## 清理逻辑\n\n`PurgeAllJobs(ctx)` 删除当前控制面已知的所有 Job 及其关联元数据。\n\n清理流程：\n\n1. `allKnownJobIDs(ctx)` 合并 `JobIDs(ctx)` 和 `ActiveJobIDs(ctx)`。\n2. 对每个 Job 调用 `keysForJobPurge(ctx, jobID)` 收集 key。\n3. 追加 `KeyJobsAll()` 和 `KeyJobsActive()`。\n4. 使用 `dedupeStrings` 去重。\n5. 通过 `deleteKeysInChunks` 按 256 个 key 一批执行 `DEL`。\n\n`keysForJobPurge` 会收集：\n\n- Job HASH\n- bucket assign HASH\n- writer ID SET\n- reader ID SET\n- done bucket SET\n- alerts LIST\n- barrier fired key\n- 所有 writer HASH\n- 所有 reader HASH\n- 所有 bucket HASH\n- 对应 Router bucket key\n\nbucket ID 来源优先级：\n\n1. `bucketIDsForPurge` 先读取 `JobMetaRaw` 的 `num_buckets`，生成 `[0, num_buckets)`。\n2. 如果 Job 元数据不可用，再回退到 `BucketAssignAll` 中存在的 bucket ID。\n\n## 状态常量\n\n状态常量定义在 `internal/types/states.go`。\n\nJob 状态：\n\n- `PENDING`\n- `RUNNING`\n- `FINALIZING`\n- `SUCCEEDED`\n- `FAILED`\n- `CANCELLED`\n\nBucket 状态：\n\n- `RUNNING`\n- `MERGING`\n- `WRITING_HDFS`\n- `DONE`\n- `FAILED`\n\nWorker 状态：\n\n- `BOOTING`\n- `RUNNING`\n- `DONE`\n- `FAILED`\n- `LOST`\n\nWorker kind：\n\n- `writer`\n- `reader`\n\n## 与其他模块的关系\n\n- `cmd/main.go` 调用 `NewClient` 和 `New` 初始化 Redis store。\n- `internal/job/manager.go` 使用 `JobMeta`、`WorkerMeta` 和 `CreateJob` 创建任务记录。\n- `internal/collector` 通过 `ApplyWriterProgress`、`ApplyReaderProgress`、`ApplyBucketProgress` 写入进度，并依赖 bucket 完成时的自动成功判定。\n- `internal/barrier` 通过 `AllReaderStatuses` 判断 reader 是否全部完成，并通过 `SetNXBarrierFired` 做触发幂等。\n- `internal/finalizer` 读取 `RouterEndpoint`，也会在 fan-out 失败时调用 `SetBucketStatus`。\n- `internal/api` 通过 `JobIDs`、`ActiveJobIDs`、`JobMetaRaw`、`WorkerHashes`、`BucketHashes` 等方法构建列表和详情响应。\n\n## 贡献注意事项\n\n新增 Redis key 时应先在 `keys.go` 增加命名函数，避免调用方手写字符串。\n\n新增状态字段时，需要同时考虑写入路径和读取聚合路径。例如 worker 状态字段如果影响 barrier，需要检查 `AllReaderStatuses`、`effectiveWorkerStatus` 和 `normalizeReportedWorkerStatus`。\n\n批量读取场景应优先使用 pipeline，参考 `WorkerHashes`、`BucketHashes`、`BucketStatuses`。详情接口和清理路径都可能涉及大量 bucket，避免逐 key 往返 Redis。\n\n不要在 Job 列表路径引入 `SCAN`。当前 `JobIDs` 明确只依赖 `cp:jobs:all`，是为了兼容 Redis mesh 行为。\n\n心跳写入不应覆盖终态。`heartbeatWorkerStatus` 当前保证 `DONE` 和 `FAILED` 不会被后续心跳改回 `RUNNING`。","progress-collection":"# Progress Collection\n\n## 模块职责\n\n`internal/collector` 是进度采集写入层，负责处理两个上报入口：\n\n- `/api/v1/heartbeat`：刷新 writer 或 reader 的心跳状态。\n- `/api/v1/report_progress`：写入 worker 进度、错误信息、文件计数、bucket 进度等运行状态。\n\n该模块本身不保存状态，也不直接实现持久化逻辑。`Collector` 只做请求分流、时间戳归一化，并调用 `internal/store.Store` 完成实际写入。\n\n## 核心类型\n\n```go\ntype Collector struct {\n\tst *store.Store\n}\n```\n\n`Collector` 持有一个 `*store.Store`，所有写入操作都通过它完成。\n\n```go\nfunc New(st *store.Store) *Collector\n```\n\n`New` 是模块构造入口。当前由 `cmd/main.go` 调用，用于把 store 注入采集层；测试中也通过 `newTestCollector` 间接调用。\n\n## Heartbeat\n\n```go\nfunc (c *Collector) Heartbeat(ctx context.Context, req *types.HeartbeatRequest) error\n```\n\n`Heartbeat` 处理 `/api/v1/heartbeat` 请求。函数会使用当前 UTC 时间作为心跳写入时间：\n\n```go\nnow := time.Now().UTC()\n```\n\n随后根据 `req.Kind` 选择不同的 store 写入方法：\n\n- `types.KindWriter` 调用 `c.st.UpsertWriterHeartbeat(ctx, req.JobID, req, now)`\n- `types.KindReader` 调用 `c.st.UpsertReaderHeartbeat(ctx, req.JobID, req, now)`\n- 其他值返回 `unknown kind: ...` 错误\n\n这里的 `Upsert` 语义表示心跳记录可以被创建或更新。`Collector` 不判断 worker 是否已存在，也不处理 TTL 细节；这些行为由 `store.Store` 负责。\n\n## ReportProgress\n\n```go\nfunc (c *Collector) ReportProgress(ctx context.Context, req *types.ProgressRequest) error\n```\n\n`ReportProgress` 处理 `/api/v1/report_progress` 请求。它的主要职责是把一次进度上报拆分成 writer 进度、bucket 进度或 reader 进度写入。\n\n### 时间戳处理\n\n函数优先使用请求中的 `req.LastUpdateTime`：\n\n```go\nprogressTime := req.LastUpdateTime.UTC()\nif progressTime.IsZero() {\n\tprogressTime = time.Now().UTC()\n}\n```\n\n如果请求没有提供有效时间，则使用当前 UTC 时间。后续 writer、reader 和 bucket 写入都会基于这个归一化后的时间。\n\n对于 writer 的 bucket 明细，每个 bucket 还可以带自己的 `LastUpdateTime`：\n\n```go\nbucketTime := req.Buckets[i].LastUpdateTime.UTC()\nif bucketTime.IsZero() {\n\tbucketTime = progressTime\n}\n```\n\n因此 bucket 的时间优先级是：\n\n1. `req.Buckets[i].LastUpdateTime`\n2. `req.LastUpdateTime`\n3. 当前 UTC 时间\n\n### Writer 进度写入\n\n当 `req.Kind == types.KindWriter` 时，函数先写入 writer 级别状态：\n\n```go\nc.st.ApplyWriterProgress(\n\tctx,\n\treq.JobID,\n\treq.WriterID,\n\treq.WorkerStatus,\n\treq.ErrorMessage,\n\tprogressTime,\n)\n```\n\n随后遍历 `req.Buckets`，逐个调用：\n\n```go\nc.st.ApplyBucketProgress(ctx, req.JobID, req.WriterID, &req.Buckets[i], bucketTime)\n```\n\n注意这里传入的是 `&req.Buckets[i]`，不是 range value 的地址，因此不会出现 Go 中常见的循环变量地址复用问题。\n\nwriter 进度上报不会刷新 writer heartbeat。测试 `TestReportProgressDoesNotTouchWriterHeartbeat` 覆盖了这一点，说明心跳和进度是两个独立写入路径。\n\n### Reader 进度写入\n\n当 `req.Kind` 不是 `types.KindWriter` 时，当前实现会走 reader 进度写入：\n\n```go\nc.st.ApplyReaderProgress(\n\tctx,\n\treq.JobID,\n\treq.ReaderID,\n\treq.Files,\n\treq.BucketsSeen,\n\treq.WorkerStatus,\n\treq.ErrorMessage,\n\tprogressTime,\n)\n```\n\n这意味着 `ReportProgress` 只显式识别 writer；reader 以及其他非 writer kind 都会进入 reader 分支。调用方或上层 HTTP 解析逻辑应保证 `ProgressRequest.Kind` 已经被校验为合法值，否则可能把非法 kind 当作 reader 进度处理。\n\n## 执行路径\n\n```mermaid\nflowchart TD\n    A[\"HTTP 处理层\"] --> B[\"Collector.Heartbeat\"]\n    A --> C[\"Collector.ReportProgress\"]\n\n    B --> D{\"req.Kind\"}\n    D --> E[\"写入 writer 心跳\"]\n    D --> F[\"写入 reader 心跳\"]\n    D --> G[\"返回未知 kind 错误\"]\n\n    C --> H{\"是否为 writer\"}\n    H --> I[\"写入 writer 进度\"]\n    I --> J[\"写入 bucket 进度\"]\n    H --> K[\"写入 reader 进度\"]\n```\n\n## 与其他模块的关系\n\n`collector` 位于 HTTP/API 层和持久化层之间：\n\n- `cmd/main.go` 通过 `collector.New(st)` 创建 `Collector`。\n- API handler 会把请求解析成 `types.HeartbeatRequest` 或 `types.ProgressRequest`。\n- `Collector` 根据请求内容调用 `store.Store` 的写入方法。\n- `store.Store` 负责实际的状态更新、TTL 刷新、任务状态推导等持久化相关逻辑。\n\n本模块依赖的主要类型来自 `internal/types`：\n\n- `types.HeartbeatRequest`\n- `types.ProgressRequest`\n- `types.KindWriter`\n- `types.KindReader`\n\n依赖的主要 store 方法包括：\n\n- `UpsertWriterHeartbeat`\n- `UpsertReaderHeartbeat`\n- `ApplyWriterProgress`\n- `ApplyBucketProgress`\n- `ApplyReaderProgress`\n\n## 贡献注意事项\n\n修改 `Heartbeat` 时，需要保持 writer 和 reader 心跳路径的区分，并确保未知 kind 明确返回错误。\n\n修改 `ReportProgress` 时，需要特别注意三点：\n\n1. 进度上报不应隐式刷新 heartbeat，除非同时更新相关测试和调用约定。\n2. writer 的 bucket 写入应继续使用索引取地址模式 `&req.Buckets[i]`。\n3. 如果要严格校验 reader kind，应显式增加 `types.KindReader` 分支，并处理非法 kind 的错误返回，避免改变现有 reader 上报行为时引入兼容性问题。","service-entry-point":"# Service Entry Point\n\n## 服务入口模块\n\n`cmd/main.go` 是进程入口，负责把配置、存储、调度、任务管理、采集、写入 RPC、终态处理、Barrier 后台循环和 Hertz HTTP 服务装配成一个可运行的服务。该模块不承载业务逻辑，核心职责是按正确顺序初始化依赖，并定义进程生命周期。\n\n### 启动流程\n\n```mermaid\nflowchart TD\n    A[\"main\"] --> B[\"byted.Init\"]\n    B --> C[\"config.NewConfig + cfg.Init\"]\n    C --> D[\"store.NewClient + Redis Ping\"]\n    D --> E[\"装配 Store / Scheduler / Job / Collector\"]\n    E --> F[\"writerrpc.NewClient + finalizer.New\"]\n    F --> G[\"barrier.New + w.Start\"]\n    G --> H[\"byted.Default + api.NewServer.Register\"]\n    H --> I[\"h.Spin\"]\n```\n\n`main()` 的执行顺序是固定的：\n\n1. 调用 `byted.Init()` 初始化 ByteDance 基础运行环境，包括 PSM、Cluster、日志、Metrics 和 agentSDK。代码注释明确要求它必须早于 `env.PSM()`、`tccclient` 等环境相关能力。\n2. 通过 `config.NewConfig(local.ConfDir())` 构造配置对象，再调用 `cfg.Init()` 完成配置加载、默认值填充和校验。调用链会进入 `applyDefaults` 和 `validate`。\n3. 使用 `store.NewClient(cfg)` 创建 Redis 客户端。失败会 `logs.Fatal` 终止进程。\n4. 启动时用 2 秒超时执行 `rdb.WithContext(pingCtx).Ping().Err()` 探活。探活失败只打印 `logs.Warn`，服务继续启动，便于单测或开发环境在 Redis 不可用时仍能拉起。\n5. 构造业务组件：\n   - `store.New(rdb, cfg)` 创建存储封装。\n   - `scheduler.NewLambdaLauncher(cfg)` 创建 Lambda 调度器。\n   - `job.New(st, cfg, sched)` 创建任务管理器。\n   - `collector.New(st)` 创建采集组件。\n   - `writerrpc.NewClient(cfg.WriterRPC.PSM, timeout)` 创建 Writer RPC 客户端。\n   - `finalizer.New(st, cfg, writerCli)` 创建终态处理器。\n6. 创建根上下文 `rootCtx`，用于控制后台协程生命周期。\n7. 通过 `barrier.New(st, cfg, fin)` 创建 Barrier，并在 goroutine 中调用 `w.Start(rootCtx)`。\n8. 使用 `byted.Default()` 创建 Hertz server，通过 `api.NewServer(cfg, st, jobMgr, col).Register(h)` 注册 HTTP 路由。\n9. 注册 `h.OnShutdown` 钩子，停机时取消后台上下文并关闭 Redis 连接。\n10. 调用 `h.Spin()` 启动服务。`Spin()` 内部会监听 `SIGINT`、`SIGTERM` 并触发 shutdown hook。\n\n### 关键组件关系\n\n`cmd/main.go` 只做依赖注入，不直接处理请求或任务状态。各组件的依赖方向如下：\n\n| 组件 | 构造函数 | 主要依赖 | 在入口中的作用 |\n|---|---|---|---|\n| 配置 | `config.NewConfig` / `cfg.Init` | `local.ConfDir()` | 提供所有模块运行参数 |\n| Redis 客户端 | `store.NewClient` | `cfg` | 底层 Redis 连接 |\n| Store | `store.New` | `rdb`, `cfg` | 对业务存储访问进行封装 |\n| Scheduler | `scheduler.NewLambdaLauncher` | `cfg` | 提供 Lambda 启动能力 |\n| Job Manager | `job.New` | `st`, `cfg`, `sched` | 管理任务创建和调度 |\n| Collector | `collector.New` | `st` | 提供状态/数据采集能力 |\n| Writer RPC | `writerrpc.NewClient` | `cfg.WriterRPC` | 连接外部 Writer 服务 |\n| Finalizer | `finalizer.New` | `st`, `cfg`, `writerCli` | 处理任务最终状态 |\n| Barrier | `barrier.New` | `st`, `cfg`, `fin` | 后台扫描并推进状态 |\n| API Server | `api.NewServer` | `cfg`, `st`, `jobMgr`, `col` | 注册 Hertz HTTP 接口 |\n\n### 错误处理策略\n\n入口模块把初始化错误分成两类：\n\n- 致命错误：配置初始化、Redis 客户端创建、Writer RPC 客户端创建、Finalizer 创建失败都会调用 `logs.Fatal`。这些依赖缺失时服务无法正确提供能力。\n- 非致命错误：Redis `Ping()` 失败只记录 warning。原因是 Redis 客户端已成功构造，探活失败可能只是开发、单测或启动阶段的临时环境问题。\n\n这种策略意味着贡献代码时不要把业务依赖的真实初始化失败吞掉；只有“启动前探测类”问题才适合降级为日志。\n\n### 生命周期与优雅停机\n\n后台 Barrier 使用 `rootCtx` 控制：\n\n```go\nrootCtx, rootCancel := context.WithCancel(context.Background())\ndefer rootCancel()\n\nw := barrier.New(st, cfg, fin)\ngo w.Start(rootCtx)\n```\n\nHertz shutdown hook 中再次调用 `rootCancel()`，并关闭 Redis：\n\n```go\nh.O
