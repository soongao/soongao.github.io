var PAGES = {"address-discovery":"# Address Discovery\n\n## 地址发现模块\n\n`addr` 包负责把业务侧的 `idc` 或请求标识映射到 Harden 服务实例地址。它基于 Consul 做服务发现，并用 `consistent.Consistent` 做一致性哈希，保证同一个 `name` 在地址列表稳定时尽量落到同一台服务实例。\n\n模块主要服务于同步链路和初始化链路。当前已知调用方包括 `syncer/pack.go`、`syncer/v2/pack.go` 中的 `syncing`，以及 `tokens/group.go` 中的 `InitAllInitInfos`。\n\n## 对外接口\n\n核心接口是 `ConsistentAddr`：\n\n```go\ntype ConsistentAddr interface {\n\tGetAddr(name string) string\n\tGetAddrs(name string) []string\n\tGetAllAddrs() []string\n}\n```\n\n`name` 是一致性哈希的 key，通常由调用方传入业务标识、请求标识或 token 相关标识。模块不会解释该字符串，只负责把它映射到服务地址。\n\n### `GetAddr(name string) string`\n\n返回当前一致性哈希环上的单个地址。\n\n执行时会先通过 `sync.Once` 触发 `initAddrs`，因此 `ConsulAddr` 是懒加载的。初始化完成后调用：\n\n```go\naddr, _ := ca.curServers.Get(name)\n```\n\n这里会忽略 `Get` 返回的错误。如果当前哈希环为空或查找失败，返回值可能是空字符串。\n\n### `GetAddrs(name string) []string`\n\n返回一个或两个地址：\n\n1. 始终尝试从 `curServers` 获取当前地址。\n2. 当 `rotate == 1` 时，再从 `newServers` 获取新地址。\n3. 如果新旧地址不同，则同时返回两个地址。\n\n这个方法用于地址变更期间的平滑过渡。`updateAddrs` 检测到 Consul 地址列表变化后，会先构建新的哈希环并设置 `rotate = 1`，持续约 1 秒。在这段时间内，`GetAddrs` 可能返回新旧两个地址，调用方可以同时处理两个目标，降低实例列表切换造成的请求丢失或路由抖动。\n\n### `GetAllAddrs() []string`\n\n返回当前 Consul 地址列表 `allAddrs`。\n\n该字段读写由 `mu` 保护，但返回的是内部 slice 本身，不会复制。调用方应把返回值视为只读数据，不要修改其中元素或对 slice 排序。\n\n## 创建和缓存\n\n入口函数是 `GetAddr(idc string)`：\n\n```go\nfunc GetAddr(idc string) ConsistentAddr {\n\tif v, ok := addrs.Load(idc); ok {\n\t\treturn v.(ConsistentAddr)\n\t}\n\tv, _ := addrs.LoadOrStore(\n\t\tidc,\n\t\tNewConsulAddr(\"toutiao.videoarch.harden.service.\"+idc, env.Cluster()),\n\t)\n\treturn v.(ConsistentAddr)\n}\n```\n\n它按 `idc` 在包级 `sync.Map` 中缓存 `ConsistentAddr` 实例。相同 `idc` 会复用同一个 `ConsulAddr`，避免重复创建 Consul 查询和后台刷新协程。\n\n服务名拼接规则固定为：\n\n```go\n\"toutiao.videoarch.harden.service.\" + idc\n```\n\nConsul cluster 来自 `env.Cluster()`。\n\n如果需要绕过默认服务名或 cluster，可以直接使用：\n\n```go\nca := NewConsulAddr(\"toutiao.videoarch.video_data_access\", \"write\")\naddr := ca.GetAddr(\"token-1\")\n```\n\n## 核心类型：`ConsulAddr`\n\n`ConsulAddr` 保存 Consul 查询参数、当前地址列表和一致性哈希环：\n\n```go\ntype ConsulAddr struct {\n\tmu         sync.RWMutex\n\taddr       string\n\tallAddrs   []string\n\tcluster    string\n\tcurServers *consistent.Consistent\n\tnewServers *consistent.Consistent\n\trotate     int32\n\tonce       sync.Once\n}\n```\n\n字段含义：\n\n- `addr`：Consul 服务名。\n- `cluster`：Consul cluster。\n- `allAddrs`：最近一次成功或初始化查询得到的地址列表。\n- `curServers`：当前生效的一致性哈希环。\n- `newServers`：地址变更期间的新哈希环。\n- `rotate`：是否处于新旧地址切换窗口，`1` 表示 `GetAddrs` 会尝试返回双地址。\n- `once`：保证首次调用时只初始化一次。\n- `mu`：保护 `allAddrs` 的读写。\n\n## 初始化流程\n\n第一次调用 `GetAddr`、`GetAddrs` 或 `GetAllAddrs` 时会执行 `initAddrs`：\n\n```go\nfunc (ca *ConsulAddr) initAddrs() {\n\tca.curServers = consistent.New()\n\tee, err := consul.LookupName(ca.addr, consul.WithCluster(ca.cluster))\n\tca.printAddr(ee)\n\n\tca.mu.Lock()\n\tca.allAddrs = ee.Addrs()\n\tca.mu.Unlock()\n\n\tif err == nil {\n\t\tca.curServers.Set(ee.Addrs())\n\t}\n\tgo ca.updateAddrs()\n}\n```\n\n初始化做了四件事：\n\n1. 创建空的当前哈希环 `curServers`。\n2. 通过 `consul.LookupName` 查询服务地址。\n3. 记录地址日志，并更新 `allAddrs`。\n4. 如果查询成功，则把地址写入当前哈希环。\n5. 启动后台 `updateAddrs` 协程，每秒刷新一次 Consul。\n\n即使首次 Consul 查询失败，后台刷新协程仍然会启动。后续查询恢复后，`updateAddrs` 会检测地址变化并更新哈希环。\n\n## 后台刷新与平滑切换\n\n`updateAddrs` 每秒执行一次 Consul 查询：\n\n```go\nticker := time.NewTicker(time.Second)\nfor {\n\t<-ticker.C\n\tee, err := consul.LookupName(ca.addr, consul.WithCluster(ca.cluster))\n\t// ...\n}\n```\n\n当查询失败或返回空地址时，模块会：\n\n- 写入 warning 日志。\n- 通过 `metrics.EmitCounter(\"updateAddrs\", 1, metrics.Status, \"error\")` 上报错误计数。\n- 跳过本轮更新，继续使用现有哈希环。\n\n当地址发生变化时，流程如下：\n\n```mermaid\nflowchart TD\n    A[每秒查询 Consul] --> B{地址是否有效}\n    B -- 否 --> C[记录日志并上报 error]\n    B -- 是 --> D{和当前地址是否不同}\n    D -- 否 --> A\n    D -- 是 --> E[更新 allAddrs]\n    E --> F[创建 newServers 哈希环]\n    F --> G[设置 rotate = 1]\n    G --> H[持续约 1 秒双地址返回]\n    H --> I[设置 rotate = 0]\n    I --> J[newServers 成为 curServers]\n```\n\n地址变化判断由 `addrsChanged` 完成：\n\n```go\nfunc addrsChanged(oldAddrs, newAddrs []string) bool {\n\tif len(oldAddrs) != len(newAddrs) {\n\t\treturn true\n\t}\n\tsort.Sort(sort.StringSlice(oldAddrs))\n\tsort.Sort(sort.StringSlice(newAddrs))\n\tfor i := 0; i < len(newAddrs); i++ {\n\t\tif oldAddrs[i] != newAddrs[i] {\n\t\t\treturn true\n\t\t}\n\t}\n\treturn false\n}\n```\n\n该函数先比较长度，再排序后逐项比较，因此地址顺序变化不会被视为实际变更。\n\n需要注意的是，`addrsChanged` 会原地排序传入的 slice。如果 `curServers.Members()` 或 `ee.Addrs()` 返回的是内部共享 slice，调用方需要意识到这里存在修改输入顺序的行为。\n\n## 一致性哈希行为\n\n地址发现模块不直接选择“第一个可用实例”，而是通过 `consistent.Consistent` 根据 `name` 选择实例：\n\n```go\naddr, err := ca.curServers.Get(name)\n```\n\n这种模式适合需要稳定分片的场景：\n\n- 同一个 `name` 在实例列表不变时会稳定路由到同一地址。\n- 实例扩缩容时，只会影响一部分 key 的映射。\n- 地址变化期间，`GetAddrs` 可以同时返回旧地址和新地址，调用方可以做迁移期兼容处理。\n\n`GetAddr` 只返回当前哈希环上的单地址；`GetAddrs` 才会感知 `rotate` 并返回双地址。\n\n## 日志与指标\n\n每次 Consul 查询后都会调用 `printAddr` 输出当前发现结果：\n\n```go\nlogs.Info(\n\t\"sd lookup cur_dc:%v, cur_ip:%v, cur_cluster:%v, target_consul_name:%v, addrs:%+v\",\n\tenv.IDC(),\n\tenv.HostIP(),\n\tca.cluster,\n\tca.addr,\n\tprintAddr,\n)\n```\n\n日志中包含：\n\n- 当前 IDC：`env.IDC()`\n- 当前机器 IP：`env.HostIP()`\n- 查询 cluster：`ca.cluster`\n- Consul 服务名：`ca.addr`\n- 查询到的地址列表\n\n后台刷新还会上报两类指标：\n\n```go\nmetrics.EmitCounter(\"updateAddrs\", 1, metrics.Status, \"error\")\nmetrics.EmitCounter(\"updateAddrs\", 1, metrics.Status, \"changeAddrs\")\n```\n\n`error` 表示 Consul 查询失败或返回空地址；`changeAddrs` 表示地址列表发生变化并触发哈希环切换。\n\n## 与代码库其他模块的关系\n\n`addr` 包是 Harden 内部服务地址解析的基础模块。调用链通常是：\n\n```mermaid\nflowchart LR\n    A[业务初始化或同步逻辑] --> B[addr.GetAddr]\n    B --> C[NewConsulAddr]\n    C --> D[ConsulAddr]\n    D --> E[consul.LookupName]\n    D --> F[consistent.Consistent]\n```\n\n已知入口包括：\n\n- `tokens/group.go` 的 `InitAllInitInfos`：初始化 token 或分组信息时获取对应 IDC 的地址发现器。\n- `syncer/pack.go` 的 `syncing`：同步逻辑中根据 IDC 获取目标 Harden 服务地址。\n- `syncer/v2/pack.go` 的 `syncing`：新版同步逻辑同样依赖 `addr.GetAddr`。\n\n这意味着 `addr.GetAddr(idc)` 的缓存粒度和服务名拼接规则会直接影响同步链路的路由目标。\n\n## 并发模型\n\n模块内部有三层并发控制：\n\n- `sync.Map addrs`：保证不同 goroutine 按 `idc` 共享同一个地址发现器。\n- `sync.Once once`：保证每个 `ConsulAddr` 只初始化一次。\n- `sync.RWMutex mu`：保护 `allAddrs` 字段读写。\n- `atomic.LoadInt32` / `atomic.StoreInt32`：控制 `rotate` 切换状态。\n\n`curServers` 和 `newServers` 的切换没有显式锁保护。当前实现依赖“先构建新 ring，再通过字段替换发布”的模式。贡献代码时如果要扩展哈希环读写逻辑，应重点检查并发读写是否仍然安全。\n\n## 开发注意事项\n\n`GetAddr(name)` 会吞掉一致性哈希查找错误，调用方需要能处理空字符串。\n\n`GetAddrs(name)` 在地址切换窗口可能返回两个地址。调用方如果只期望一个目标，应明确使用 `GetAddr`；如果要兼容扩缩容迁移，应使用 `GetAddrs`。\n\n`GetAllAddrs()` 返回内部 slice，不要修改返回值。需要排序、过滤或缓存时，应先复制一份。\n\n`addrsChanged` 会原地排序入参。修改该函数或调用来源时，要确认不会破坏 `consistent.Consistent` 内部成员顺序假设。\n\n`initAddrs` 即使首次查询失败也会启动后台刷新，因此首次调用方可能短时间拿到空地址。依赖该模块的启动流程如果要求强一致的服务发现结果，需要在调用方增加重试或空地址处理。","application-entry-and-tooling":"# Application Entry and Tooling\n\n## 应用入口与工具链\n\n该模块负责 `harden` 服务的进程启动、运行时初始化、HTTP/UDP 服务挂载，以及构建产物打包。核心入口是 [main.go](/Users/bytedance/videoarch/harden/main.go)，构建和运行脚本位于 [build.sh](/Users/bytedance/videoarch/harden/build.sh) 与 [script/bootstrap.sh](/Users/bytedance/videoarch/harden/script/bootstrap.sh)。\n\n## 启动流程\n\n`main()` 是服务唯一入口，没有内部调用方。它按固定顺序完成运行环境准备：\n\n1. `tcc.InitTccClient()` 初始化 TCC 配置客户端。\n2. `gopool.SetCap(tcc.GetGoRoutine())` 使用 TCC 配置限制 goroutine 池容量。\n3. `hertz.Init()` 初始化 Hertz 框架。\n4. `hertz.ResetFatestJSONMarshal()` 重置 Hertz JSON 序列化实现。\n5. `config.Init(local.ConfDir())` 从本地配置目录加载服务配置。\n6. `metrics.InitMetrics()` 初始化指标上报。\n7. 如 `config.C.TargetJamesCluster` 非空，则覆盖 `james.Cluster`。\n8. 创建 `app.Default()`，挂载 `middleware.GroupMiddle()`。\n9. 注册 `v1` 与 `v2` HTTP 路由。\n10. 后台启动 `udpserver.Serve(\"0.0.0.0:9555\")`。\n11. 初始化 `syncer.Init()` 与 `syncer2.Init()`。\n12. 后台执行 `tokens.InitAllInitInfos(0)`，从同集群其他节点拉取初始 token bucket 信息。\n13. 调用 `r.Spin()` 阻塞运行 HTTP 服务。\n\n```mermaid\nflowchart TD\n    A[\"main()\"] --> B[\"tcc.InitTccClient()\"]\n    B --> C[\"gopool.SetCap(tcc.GetGoRoutine())\"]\n    C --> D[\"hertz.Init() / config.Init()\"]\n    D --> E[\"metrics.InitMetrics()\"]\n    E --> F[\"app.Default() + GroupMiddle()\"]\n    F --> G[\"注册 v1/v2 路由\"]\n    G --> H[\"启动 UDP 服务\"]\n    G --> I[\"syncer.Init() / syncer2.Init()\"]\n    I --> J[\"tokens.InitAllInitInfos(0)\"]\n    J --> K[\"r.Spin()\"]\n```\n\n执行流数据中还标出了 `main -> tcc.InitTccClient -> Precision`。入口层不直接调用 `Precision`，而是通过 TCC 初始化链路触发相关配置逻辑。\n\n## HTTP 接口挂载\n\n入口使用 Hertz 的 `app.Default()` 创建服务实例，并通过 `r.Group()` 划分版本路由。\n\n`v1` 路由：\n\n| 方法 | 路径 | 处理函数 | 作用 |\n|---|---|---|---|\n| `GET` | `/v1/rate` | `remote.RateLimit` | v1 限流查询/处理入口 |\n| `GET` | `/v1/isThrottled` | `remote.IsThrottled` | 判断请求是否被限流 |\n| `POST` | `/v1/sync` | `remote.Sync` | v1 同步入口 |\n| `GET` | `/v1/conEnter` | `conRemote.ConEnter` | 一致性相关进入逻辑 |\n| `GET` | `/v1/conLeave` | `conRemote.ConLeave` | 一致性相关离开逻辑 |\n\n`v2` 路由：\n\n| 方法 | 路径 | 处理函数 | 作用 |\n|---|---|---|---|\n| `GET` | `/v2/rate` | `remote2.RateLimit` | v2 限流查询/处理入口 |\n| `POST` | `/v2/sync` | `remote2.Sync` | v2 同步入口 |\n| `GET` | `/v2/get_all_token_buckets` | `remote2.GetAllTokenBuckets` | 获取所有 token bucket 状态 |\n\n所有 HTTP 路由都会经过 `middleware.GroupMiddle()`。如果新增接口，应优先放入对应版本分组，避免绕过统一中间件。\n\n## UDP 服务\n\n`main()` 通过 goroutine 启动：\n\n```go\ngo udpserver.Serve(\"0.0.0.0:9555\")\n```\n\nUDP 服务固定监听 `0.0.0.0:9555`。根目录 [README.md](/Users/bytedance/videoarch/harden/README.md) 明确说明：修改 UDP payload 时，应修改 `udpserver` 包内的 `payload.proto`，再执行 `gen_proto.sh` 生成 `payload.pb.go`，不要直接编辑生成文件。\n\n这意味着 UDP 协议结构的源头是 `.proto` 文件，`payload.pb.go` 只应作为生成产物维护。\n\n## 配置、指标与外部集群\n\n入口依赖 `config.Init(local.ConfDir())` 加载本地配置。`local.ConfDir()` 来自 Hertz 本地配置能力，实际运行时配置目录由启动参数 `-conf-dir` 决定。\n\nJames SDK 集群选择逻辑在入口完成：\n\n```go\nif config.C.TargetJamesCluster != \"\" {\n    james.Cluster = config.C.TargetJamesCluster\n}\nlogs.Info(\"the james.Cluster is %s\", james.Cluster)\n```\n\n因此，`config.C.TargetJamesCluster` 是覆盖 James 服务端集群的入口配置；为空时保留 `james-sdk` 默认集群。\n\n`metrics.InitMetrics()` 在路由注册前执行，确保服务启动早期就具备指标上报能力。\n\n## 同步与初始化\n\n入口同时初始化两个同步模块：\n\n```go\nsyncer.Init()\nsyncer2.Init()\n```\n\n二者分别对应旧版与 v2 同步链路。HTTP 层也按 `remote.Sync` 与 `remote2.Sync` 分别暴露 `/v1/sync`、`/v2/sync`。\n\n`tokens.InitAllInitInfos(0)` 在 goroutine 中异步执行，注释说明其职责是“从其他所有同集群获取初始值”。这一步不会阻塞 `r.Spin()` 前的主流程，但会与服务运行并发发生。修改 token bucket 初始化逻辑时，需要考虑服务已经开始接收请求的并发窗口。\n\n## 构建脚本\n\n[build.sh](/Users/bytedance/videoarch/harden/build.sh) 是标准构建入口：\n\n```bash\nexport GO111MODULE=on\n\nRUN_NAME=\"toutiao.videoarch.harden\"\n\nmkdir -p output output/conf output/bin\ncp script/bootstrap.sh script/settings.py output\nchmod +x output/bootstrap.sh\ncp conf/* output/conf 2>/dev/null\ngo build -v -o output/bin/${RUN_NAME}\n```\n\n构建产物结构：\n\n| 路径 | 内容 |\n|---|---|\n| `output/bin/toutiao.videoarch.harden` | Go 编译后的服务二进制 |\n| `output/bootstrap.sh` | 运行入口脚本 |\n| `output/settings.py` | 产品、子系统、模块和端口元信息 |\n| `output/conf/` | 从 `conf/` 拷贝的运行配置 |\n\n`go.mod` 声明模块名为 `code.byted.org/videoarch/harden`，Go 版本为 `1.18`。主要直接依赖包括 Hertz、TCC、gopool、metrics、James SDK、protobuf、mockey 和测试相关库。\n\n## 启动脚本\n\n[script/bootstrap.sh](/Users/bytedance/videoarch/harden/script/bootstrap.sh) 负责运行时目录、日志目录、服务名和启动参数拼装。\n\n关键行为：\n\n- 第一个参数作为 `RUNTIME_ROOT`，为空时默认使用脚本所在目录。\n- 第二个参数作为服务端口 `PORT`。\n- `IS_HOST_NETWORK=1` 时，会根据 `PORT0`、`PORT1`、`PORT2` 和 `REQUIRE_NGINX` 设置运行端口环境变量。\n- 创建 `$RUNTIME_ROOT/log/app` 与 `$RUNTIME_ROOT/log/rpc`。\n- 从 `settings.py` 读取 `PRODUCT`、`SUBSYS`、`MODULE`。\n- 拼出服务名 `SVC_NAME=${PRODUCT}.${SUBSYS}.${MODULE}`。\n- 设置 `GIN_LOG_DIR` 与 `PSM`。\n- 执行 `$CURDIR/bin/${BinaryName}`，并传入：\n  - `-psm=$SVC_NAME`\n  - `-conf-dir=$CONF_DIR`\n  - `-log-dir=$GIN_LOG_DIR`\n  - 可选 `-port=$PORT`\n\n[script/settings.py](/Users/bytedance/videoarch/harden/script/settings.py) 当前定义：\n\n```python\nPRODUCT=\"toutiao\"\nSUBSYS=\"videoarch\"\nMODULE=\"harden\"\nAPP_TYPE=\"binary\"\nPORT=\"9555\"\n```\n\n这与构建脚本中的二进制名 `toutiao.videoarch.harden` 保持一致。修改产品名、模块名或运行名时，需要同步检查 `build.sh`、`settings.py` 和部署侧期望的 PSM。\n\n## 开发注意事项\n\n新增入口初始化逻辑时，应放在 `r.Spin()` 之前；如果该逻辑影响请求处理的正确性，不应使用后台 goroutine 异步初始化。\n\n新增 HTTP 接口时，应挂载到 `g1 := r.Group(\"v1\")` 或 `g2 := r.Group(\"v2\")`，并复用已有的 `middleware.GroupMiddle()` 链路。\n\n修改 UDP payload 时，只改 `udpserver/payload.proto` 并重新生成 `payload.pb.go`，不要直接改生成文件。\n\n修改 goroutine 并发上限时，应通过 TCC 配置影响 `tcc.GetGoRoutine()`，入口只负责把配置值传给 `gopool.SetCap()`。","application-entry-point":"# Application Entry Point\n\n## 模块职责\n\n`main.go` 是服务进程的唯一启动入口，负责完成全局初始化、HTTP 路由注册、后台任务启动，并最终通过 `r.Spin()` 阻塞运行 Hertz 服务。\n\n该模块本身不承载业务逻辑，核心职责是把配置、限流同步、指标、HTTP 中间件、UDP 服务和 token 初始化等组件按正确顺序装配起来。\n\n## 启动流程\n\n```mermaid\nflowchart TD\n    A[\"main() 启动\"] --> B[\"tcc.InitTccClient()\"]\n    B --> C[\"gopool.SetCap(tcc.GetGoRoutine())\"]\n    C --> D[\"hertz.Init() 与 JSON 序列化配置\"]\n    D --> E[\"config.Init(local.ConfDir())\"]\n    E --> F[\"metrics.InitMetrics()\"]\n    F --> G[\"创建 app.Default()\"]\n    G --> H[\"注册中间件与 v1/v2 路由\"]\n    H --> I[\"启动 UDP 服务与同步器\"]\n    I --> J[\"tokens.InitAllInitInfos(0)\"]\n    J --> K[\"r.Spin() 阻塞运行\"]\n```\n\n启动顺序有实际依赖关系：\n\n1. `tcc.InitTccClient()` 最先执行，用于初始化 TCC 客户端。调用图显示该路径会进入 `Precision`，说明部分运行时参数可能依赖 TCC 精度或配置处理。\n2. `gopool.SetCap(tcc.GetGoRoutine())` 使用 TCC 配置控制全局 goroutine 池容量。\n3. `hertz.Init()` 初始化 Hertz 运行环境，随后 `hertz.ResetFatestJSONMarshal()` 调整 JSON 序列化实现。\n4. `config.Init(local.ConfDir())` 从本地配置目录加载服务配置，并填充全局配置 `config.C`。\n5. `metrics.InitMetrics()` 初始化监控指标。\n6. 根据 `config.C.TargetJamesCluster` 可选覆盖 `james.Cluster`，用于指定 james-sdk 访问的服务端集群。\n7. 创建 HTTP 应用、挂载中间件、注册路由。\n8. 启动 UDP 服务、v1/v2 同步器，以及 token bucket 初始值拉取任务。\n9. `r.Spin()` 启动并阻塞主进程。\n\n## 全局初始化\n\n### TCC 与 goroutine 池\n\n```go\ntcc.InitTccClient()\ngopool.SetCap(tcc.GetGoRoutine())\n```\n\n`main()` 先初始化 TCC 客户端，再通过 `tcc.GetGoRoutine()` 读取 goroutine 池容量，并传给 `gopool.SetCap()`。\n\n这意味着并发能力是配置驱动的。如果新增依赖 `gopool` 的后台任务，应保持在这两行之后启动，避免任务在池容量设置前开始运行。\n\n### Hertz 初始化\n\n```go\nhertz.Init()\nhertz.ResetFatestJSONMarshal()\n```\n\n`hertz.Init()` 初始化 HTTP 框架。`hertz.ResetFatestJSONMarshal()` 配置 Hertz 的 JSON 序列化逻辑。所有 HTTP 应用创建和路由注册都发生在这之后。\n\n### 配置加载\n\n```go\nconfig.Init(local.ConfDir())\n```\n\n`config.Init()` 使用 `local.ConfDir()` 作为配置目录来源。后续逻辑直接读取 `config.C`，例如：\n\n```go\nif config.C.TargetJamesCluster != \"\" {\n    james.Cluster = config.C.TargetJamesCluster\n}\n```\n\n因此依赖 `config.C` 的逻辑必须放在 `config.Init()` 之后。\n\n### 指标初始化\n\n```go\nmetrics.InitMetrics()\n```\n\n`metrics.InitMetrics()` 在 HTTP 应用创建前执行，确保后续请求处理、同步任务或后台服务可以正常上报指标。\n\n## james-sdk 集群选择\n\n```go\nif config.C.TargetJamesCluster != \"\" {\n    james.Cluster = config.C.TargetJamesCluster\n}\nlogs.Info(\"the james.Cluster is %s\", james.Cluster)\n```\n\n默认情况下，`james-sdk` 使用自身的默认集群。若配置项 `config.C.TargetJamesCluster` 非空，启动入口会覆盖 `james.Cluster`。\n\n这段逻辑是全局副作用：`james.Cluster` 是 SDK 级别变量，修改后会影响当前进程内所有通过 james-sdk 发起的访问。\n\n## HTTP 应用与中间件\n\n```go\nr := app.Default()\nr.Use(middleware.GroupMiddle())\n```\n\n`app.Default()` 创建默认 Hertz 应用实例。随后通过 `middleware.GroupMiddle()` 挂载全局中间件。\n\n所有后续注册到 `r` 的路由都会经过该中间件链，包括 `v1` 和 `v2` 分组接口。\n\n## 路由结构\n\n### v1 接口\n\n```go\ng1 := r.Group(\"v1\")\n\ng1.GET(\"rate\", remote.RateLimit)\ng1.GET(\"isThrottled\", remote.IsThrottled)\ng1.POST(\"sync\", remote.Sync)\ng1.GET(\"conEnter\", conRemote.ConEnter)\ng1.GET(\"conLeave\", conRemote.ConLeave)\n```\n\n`v1` 路由主要连接旧版远程限流与并发控制逻辑：\n\n| 方法 | 路径 | 处理函数 | 作用 |\n|---|---|---|---|\n| `GET` | `/v1/rate` | `remote.RateLimit` | 查询或执行 v1 限流判断 |\n| `GET` | `/v1/isThrottled` | `remote.IsThrottled` | 查询是否被限流 |\n| `POST` | `/v1/sync` | `remote.Sync` | v1 同步入口 |\n| `GET` | `/v1/conEnter` | `conRemote.ConEnter` | 并发进入控制 |\n| `GET` | `/v1/conLeave` | `conRemote.ConLeave` | 并发离开控制 |\n\n### v2 接口\n\n```go\ng2 := r.Group(\"v2\")\n\ng2.GET(\"rate\", remote2.RateLimit)\ng2.POST(\"sync\", remote2.Sync)\ng2.GET(\"get_all_token_buckets\", remote2.GetAllTokenBuckets)\n```\n\n`v2` 路由连接新版远程限流与 token bucket 相关能力：\n\n| 方法 | 路径 | 处理函数 | 作用 |\n|---|---|---|---|\n| `GET` | `/v2/rate` | `remote2.RateLimit` | v2 限流入口 |\n| `POST` | `/v2/sync` | `remote2.Sync` | v2 同步入口 |\n| `GET` | `/v2/get_all_token_buckets` | `remote2.GetAllTokenBuckets` | 获取所有 token bucket 状态 |\n\n## 后台服务与同步器\n\n### UDP 服务\n\n```go\ngo udpserver.Serve(\"0.0.0.0:9555\")\n```\n\n启动入口在独立 goroutine 中调用 `udpserver.Serve()`，监听 `0.0.0.0:9555`。\n\n由于该调用异步执行，`main()` 不会等待 UDP 服务完成初始化。如果新增依赖 UDP 服务状态的逻辑，需要显式处理就绪条件，而不是假设该 goroutine 启动后服务立即可用。\n\n### v1 与 v2 同步器\n\n```go\nsyncer.Init()\nsyncer2.Init()\n```\n\n`syncer.Init()` 初始化旧版同步器，`syncer2.Init()` 初始化新版同步器。两者在路由注册前后没有强耦合，但都在 `r.Spin()` 前完成，保证服务开始接收 HTTP 请求前同步组件已经初始化。\n\n### token bucket 初始值拉取\n\n```go\ngo tokens.InitAllInitInfos(0)\n```\n\n`tokens.InitAllInitInfos(0)` 在后台 goroutine 中执行，注释说明其用途是“从其他所有同集群获取初始值”。\n\n这个任务是异步的，因此服务可能在 token 初始值完全拉取完成前开始接收请求。处理限流逻辑时需要考虑初始化期间的状态。\n\n## 副作用导入\n\n`main.go` 中有两个空白标识符导入：\n\n```go\n_ \"code.byted.org/lidar/agent/init\"\n_ \"net/http/pprof\"\n```\n\n`code.byted.org/lidar/agent/init` 通过包初始化副作用接入 Lidar agent。\n\n`net/http/pprof` 注册 Go 标准库 pprof 相关 handler。该导入本身不在 `main()` 中显式调用函数，但会触发包级初始化逻辑。\n\n## 修改建议\n\n新增启动逻辑时，应优先判断它属于哪一类：\n\n- 依赖 TCC 配置的逻辑应放在 `tcc.InitTccClient()` 之后。\n- 依赖 `config.C` 的逻辑应放在 `config.Init(local.ConfDir())` 之后。\n- HTTP handler 注册应集中放在对应的 `v1` 或 `v2` group 下。\n- 长期运行或阻塞型任务必须使用 goroutine 启动，否则会阻止 `r.Spin()` 执行。\n- 需要在请求到达前完成的初始化不应异步启动，或必须提供明确的就绪检查。\n\n`main.go` 应继续保持装配层定位：只负责初始化顺序、路由挂载和后台任务启动，具体业务行为应留在 `remote`、`remote/v2`、`syncer`、`syncer/v2`、`tokens`、`udpserver` 等模块中实现。","concurrency-remote-coordination":"# Concurrency Remote Coordination\n\n## 模块定位\n\n`conRemote` 包实现“远端并发协调”：多个调用方通过 `ConEnter` 申请一个并发名额，通过 `ConLeave` 释放名额。模块用 `(group, name)` 作为限流维度，用 `uuid` 表示一次占用，并从 James 配置中心读取该维度允许的最大并发数。\n\n它适合处理跨进程或跨实例的轻量并发协调场景：调用方进入临界区前先请求 `ConEnter`，如果返回 `201` 表示未满，可以继续执行；如果返回 `202` 表示已满，应放弃或重试。调用方完成后请求 `ConLeave` 释放自己的 `uuid`。即使调用方没有主动释放，`ConEnter` 传入的 `timeout` 也会让该 `uuid` 到期后被后台清理。\n\n## 对外入口\n\n模块暴露两个 Hertz handler：\n\n```go\nfunc ConEnter(c *hertz.RequestContext)\nfunc ConLeave(c *hertz.RequestContext)\n```\n\n两个 handler 都通过 query 参数接收请求，并统一返回 `ReturnJson`：\n\n```go\ntype ReturnJson struct {\n\tCode    string `json:\"code\"`\n\tMessage string `json:\"message\"`\n}\n```\n\n### `ConEnter`\n\n`ConEnter` 用于申请并发名额。它读取以下 query 参数：\n\n| 参数 | 说明 |\n| --- | --- |\n| `group` | 并发配置组，也是 James 配置读取维度 |\n| `name` | 组内具体并发项 |\n| `timeout` | 本次占用的有效期，使用 `time.ParseDuration` 解析，例如 `1s`、`500ms` |\n| `uuid` | 本次占用的唯一标识 |\n\n返回码语义：\n\n| Code | 常量 | 含义 |\n| --- | --- | --- |\n| `201` | `NotFull` | 申请成功，当前未满 |\n| `202` | `Full` | 当前已满，申请失败 |\n| `40001` | `ErrorParam` | 缺少必要参数 |\n| `40002` | `TimeoutParseError` | `timeout` 不能被 `time.ParseDuration` 解析 |\n| `40003` | `GetRemoteConfigError` | 获取远端并发配置失败 |\n\n核心执行逻辑：\n\n1. 校验 `group`、`name`、`timeout`、`uuid` 是否为空。\n2. 使用 `time.ParseDuration(timeout)` 解析超时时间。\n3. 通过 `getRemoteConfig(group, name)` 获取 James 中配置的最大并发数。\n4. 通过 `getOrCreateConcurrents(group, name)` 获取本地并发桶。\n5. 先用 `GetUuidsLen()` 快速判断当前数量是否已经大于等于配置值。\n6. 调用 `putUuid(uuid, expireAt, curCon, group, name)` 在桶内写入或刷新占用。\n7. 返回 `201` 或 `202`。\n\n`putUuid` 内部会再次在写锁下判断容量，因此 `ConEnter` 中的第一次长度判断只是快速拒绝路径，真正的并发安全判断发生在 `putUuid`。\n\n### `ConLeave`\n\n`ConLeave` 用于释放并发名额。它读取以下 query 参数：\n\n| 参数 | 说明 |\n| --- | --- |\n| `group` | 并发配置组 |\n| `name` | 组内具体并发项 |\n| `uuid` | 要释放的占用标识 |\n\n返回码语义：\n\n| Code | 常量 | 含义 |\n| --- | --- | --- |\n| `200` | `Success` | 释放成功 |\n| `40001` | `ErrorParam` | 缺少必要参数 |\n| `40004` | `GetLimitersError` | 当前进程中不存在对应的并发桶 |\n\n执行逻辑很直接：校验参数后调用 `getConcurrents(group, name)` 找到桶，再调用 `deleteUuid(uuid)` 删除该 `uuid`。`deleteUuid` 对不存在的 `uuid` 也是幂等的，不会返回错误。\n\n## 核心数据结构\n\n模块的全局状态定义在 `baseInfo.go`：\n\n```go\nvar (\n\tremoteConcurrents = make(map[pair]*remoteConcurrent)\n\tremoteConfigs     = make(map[string]*model.LimiterConConfig)\n\n\tlockRemoteConfigs     sync.RWMutex\n\tlockRemoteConcurrents sync.RWMutex\n)\n```\n\n### `pair`\n\n```go\ntype pair struct {\n\tgroup string\n\tname  string\n}\n```\n\n`pair` 是并发桶的索引键。每个 `(group, name)` 对应一个独立的 `remoteConcurrent`。\n\n### `remoteConcurrent`\n\n```go\ntype remoteConcurrent struct {\n\tsync.RWMutex\n\tuuids map[string]int64\n}\n```\n\n`remoteConcurrent` 保存某个 `(group, name)` 当前被占用的 `uuid` 集合。`uuids` 的 key 是调用方传入的 `uuid`，value 是过期时间的 Unix 纳秒时间戳。\n\n它的方法集中在 `uuidsBase.go`：\n\n| 方法 | 作用 |\n| --- | --- |\n| `putUuid` | 写入或刷新 `uuid`，并在写锁下做容量判断 |\n| `deleteUuid` | 删除 `uuid` |\n| `getUuid` | 判断 `uuid` 是否存在 |\n| `GetUuidsLen` | 获取当前占用数量 |\n| `clearUuids` | 后台循环清理过期 `uuid` |\n\n## 申请与释放流程\n\n```mermaid\nflowchart TD\n    A[\"调用方请求 ConEnter\"] --> B[\"校验参数并解析 timeout\"]\n    B --> C[\"getRemoteConfig 读取并发上限\"]\n    C --> D[\"getOrCreateConcurrents 获取并发桶\"]\n    D --> E[\"putUuid 写入或刷新 uuid\"]\n    E --> F{\"是否有容量\"}\n    F -->|是| G[\"返回 201 NotFull\"]\n    F -->|否| H[\"返回 202 Full\"]\n    I[\"调用方请求 ConLeave\"] --> J[\"getConcurrents 获取并发桶\"]\n    J --> K[\"deleteUuid 删除 uuid\"]\n    K --> L[\"返回 200 Success\"]\n```\n\n## 配置读取与刷新\n\n并发上限由 `getRemoteConfig(group, name)` 读取。配置来源是 James SDK：\n\n```go\nfunc getConConfig(group string) (*model.LimiterConConfig, error) {\n\treturn james.GetConGlobalConfig(group)\n}\n```\n\n配置缓存维度是 `group`，不是 `(group, name)`：\n\n```go\nremoteConfigs map[string]*model.LimiterConConfig\n```\n\n`getRemoteConfig` 的行为：\n\n1. 先从 `remoteConfigs[group]` 读取缓存。\n2. 如果缓存不存在，用 `SingleFight.Do(group, ...)` 合并同一个 `group` 的并发加载请求。\n3. 调用 `getConConfig(group)` 从 James 获取配置。\n4. 将 `*model.LimiterConConfig` 写入 `remoteConfigs[group]`。\n5. 首次成功写入某个 `group` 后，启动 `updateConfig(group, name)` 后台 goroutine。\n6. 从 `groupconfig.Configs[name]` 读取具体并发项的 `Concurrent` 值。\n\n`updateConfig` 每 30 秒调用一次 `getConConfig(group)`。如果获取失败或返回空配置，会记录日志和指标，但不会覆盖本地已有配置；只有成功获取到非空配置时才替换 `remoteConfigs[group]`。\n\n需要注意：`updateConfig` 的入参包含 `name`，但配置刷新实际按 `group` 进行。`name` 主要用于指标 tag。\n\n## 并发桶创建与后台任务\n\n`getOrCreateConcurrents(group, name)` 负责懒加载并发桶。它采用双重检查锁模式：\n\n1. 先用 `lockRemoteConcurrents.RLock()` 尝试读取。\n2. 未命中后升级为 `lockRemoteConcurrents.Lock()`。\n3. 再次检查，避免多个 goroutine 同时创建同一个桶。\n4. 创建 `remoteConcurrent{uuids: make(map[string]int64)}` 并写入 `remoteConcurrents`。\n5. 启动两个后台 goroutine：\n\n```go\ngo info.conInfo(group, name)\ngo info.clearUuids(group, name)\n```\n\n`conInfo` 每 10 秒上报一次当前桶内 `uuid` 数量：\n\n```go\nmetrics.EmitStore(\"conInfo\", li.GetUuidsLen(), metrics.Group, group, metrics.Name, name)\n```\n\n`clearUuids` 每 10 毫秒扫描一次 `uuids`，删除已经过期的条目，并上报清理数量与耗时：\n\n```go\nmetrics.EmitCounter(\"clearOutDate.\"+metrics.ConThroughput, count, metrics.Group, group, metrics.Name, name)\nmetrics.EmitTimer(\"clearOutDate.\"+metrics.ConLatency, now, metrics.Group, group, metrics.Name, name)\n```\n\n这意味着每个活跃的 `(group, name)` 都会常驻两个 goroutine。新增维度不会被回收，`remoteConcurrents` 中的桶也没有删除逻辑。\n\n## `uuid` 语义\n\n`uuid` 是一次占用的身份标识。`putUuid` 对重复 `uuid` 有特殊处理：\n\n```go\n_, ok := li.uuids[uuid]\nif ok {\n\tli.uuids[uuid] = lastTime\n\treturn true\n}\n```\n\n如果同一个 `uuid` 再次调用 `ConEnter`，不会增加并发计数，只会刷新过期时间，并返回成功。这使客户端可以用同一个 `uuid` 做续租式调用。\n\n对于新 `uuid`，`putUuid` 会在写锁中判断：\n\n```go\nif len(li.uuids) >= curCon {\n\treturn false\n}\nli.uuids[uuid] = lastTime\nreturn true\n```\n\n因此容量判断和写入是原子的，不会因为并发请求突破 `curCon` 限制。\n\n## 锁与并发安全\n\n模块有两层锁：\n\n| 锁 | 保护对象 |\n| --- | --- |\n| `lockRemoteConfigs` | 全局配置缓存 `remoteConfigs` |\n| `lockRemoteConcurrents` | 全局并发桶索引 `remoteConcurrents` |\n| `remoteConcurrent.RWMutex` | 单个桶内的 `uuids` map |\n\n这种设计把全局索引和具体桶状态分开。高频的 `uuid` 增删只锁单个 `remoteConcurrent`，不会阻塞其他 `(group, name)` 的桶。\n\n`getRemoteConfig` 和 `getOrCreateConcurrents` 都使用“先读锁、未命中再写锁、写锁下再次检查”的模式，避免并发初始化时重复创建配置或桶。\n\n## 指标与外部依赖\n\n模块和代码库其他部分的主要连接点是 `metrics`、James SDK、Hertz 和日志库。\n\n### Metrics\n\n`ConEnter`、`ConLeave`、`getRemoteConfig`、`updateConfig`、`putUuid`、`conInfo`、`clearUuids` 都会上报指标。入口 handler 使用带请求上下文的版本：\n\n```go\nmetrics.CtxEmitCounter(c, ...)\nmetrics.CtxEmitTimer(c, ...)\n```\n\n后台逻辑使用普通版本：\n\n```go\nmetrics.EmitCounter(...)\nmetrics.EmitTimer(...)\nmetrics.EmitStore(...)\n```\n\n根据调用流，`CtxEmitCounter` 会继续进入 `metrics.GetMetrics`，并读取 `tcc.GetPrecisionConfig`、执行 `Precision`，同时通过 `FormTags` 组织 tag。这说明并发协调模块本身不直接依赖 TCC，但它的指标采样和 tag 处理会走 `metrics` 包里的 TCC 配置逻辑。\n\n常见指标名模式：\n\n| 位置 | 指标名模式 |\n| --- | --- |\n| `ConEnter` | `ConEnter.` + `metrics.ConThroughput` / `metrics.ConLatency` |\n| `ConLeave` | `ConLeave.` + `metrics.ConThroughput` / `metrics.ConLatency` |\n| `getRemoteConfig` / `updateConfig` | `updateConfig.` + `metrics.ConThroughput` |\n| `putUuid` | `putUuid.` + `metrics.ConThroughput` |\n| `clearUuids` | `clearOutDate.` + `metrics.ConThroughput` / `metrics.ConLatency` |\n| `conInfo` | `conInfo` store 指标 |\n\n### James 配置中心\n\n`getConConfig` 通过：\n\n```go\njames.GetConGlobalConfig(group)\n```\n\n读取 `*model.LimiterConConfig`。`getRemoteConfig` 期待该配置中存在：\n\n```go\ngroupconfig.Configs[name].Concurrent\n```\n\n如果 `name` 不存在或配置为空，`ConEnter` 会返回 `40003`，并在指标中记录 `noNameConfig`。\n\n### Hertz\n\n`ConEnter` 和 `ConLeave` 使用 `*hertz.RequestContext` 读取 query 参数并写 JSON 响应。当前代码只定义 handler，不包含路由注册逻辑。\n\n## 特殊测试分支\n\n`ConEnter` 中包含一个固定 `group` 的测试分支：\n\n```go\nif group == \"bytedance.videoarch.unit_testing_concurrent_server_error\" {\n\ttime.Sleep(5 * time.Second)\n\treturn\n}\n```\n\n命中该分支时函数会睡眠 5 秒后直接返回，不写 JSON 响应，也不会继续获取配置或写入并发桶。这个分支看起来用于单测或模拟服务端异常/超时行为，生产调用方不应依赖它作为正常协议的一部分。\n\n## 贡献时需要注意的点\n\n新增或修改行为时，优先保持以下约束：\n\n1. `putUuid` 中的容量判断和写入必须继续在同一个写锁临界区内完成，否则会破坏并发上限。\n2. `remoteConfigs` 和 `remoteConcurrents` 是全局 map，任何读写都需要使用对应的全局锁。\n3. `remoteConcurrent.uuids` 是普通 map，必须通过 `remoteConcurrent` 自身的锁访问。\n4. `ConEnter` 的成功语义是 `201 NotFull`，不是 `200 Success`；`200 Success` 当前只用于 `ConLeave`。\n5. `timeout` 使用 Go duration 字符串，不是裸数字秒数。\n6. 每个新 `(group, name)` 会启动长期 goroutine；如果未来支持大量动态维度，需要考虑桶回收和 goroutine 生命周期管理。\n7. `updateConfig` 失败时保留旧配置，这是当前容错策略；不要在网络抖动或配置短暂不可用时清空本地配置。\n8. 指标 tag 使用 `metrics.Group` 和 `metrics.Name` 贯穿主要路径，新增错误分支时应保持同样的 tag 结构，方便按维度排查问题。","consistent-hashing":"# Consistent Hashing\n\n## 模块概览\n\n`consistent` 包实现了基于一致性哈希环的字符串成员选择逻辑，典型用途是把请求键稳定地映射到一组后端节点，例如缓存节点、服务实例或地址池。相比普通取模哈希，成员增删时只有落在相邻区间内的键会迁移，能降低扩缩容带来的重映射范围。\n\n本仓库中该模块对外暴露 `Consistent` 类型及其方法。调用关系显示，外部模块 `addr/addr.go` 通过 `New()` 初始化哈希环，并通过 `Set()` 刷新地址集合：\n\n- `initAddrs` → `consistent.New`\n- `updateAddrs` → `consistent.New`\n- `updateAddrs` → `Consistent.Set`\n\n## 核心数据结构\n\n```go\ntype Consistent struct {\n    circle           map[uint32]string\n    members          map[string]bool\n    sortedHashes     uints\n    NumberOfReplicas int\n    count            int64\n    scratch          [64]byte\n    sync.RWMutex\n}\n```\n\n`Consistent` 维护两个层次的数据：\n\n- `members` 保存逻辑成员集合，键是成员名，例如 `\"cacheA\"`。\n- `circle` 保存虚拟节点到逻辑成员的映射，键是 `uint32` 哈希值，值是成员名。\n- `sortedHashes` 是 `circle` 中所有哈希点的有序列表，用于二分查找。\n- `NumberOfReplicas` 控制每个逻辑成员生成多少个虚拟节点，`New()` 默认设置为 `20`。\n- `count` 记录逻辑成员数量，供 `GetTwo()` 和 `GetN()` 判断最多能返回多少个不同成员。\n- 内嵌 `sync.RWMutex` 提供并发保护：写操作使用 `Lock()`，读操作使用 `RLock()`。\n\n`uints` 是 `[]uint32` 的排序适配器，实现了 `sort.Interface`：\n\n```go\ntype uints []uint32\n\nfunc (x uints) Len() int\nfunc (x uints) Less(i, j int) bool\nfunc (x uints) Swap(i, j int)\n```\n\n## 哈希环构建\n\n`New()` 创建空哈希环：\n\n```go\nfunc New() *Consistent\n```\n\n默认行为：\n\n- `NumberOfReplicas = 20`\n- 初始化 `circle`\n- 初始化 `members`\n\n如果需要调整副本数，必须在添加成员前设置：\n\n```go\nc := consistent.New()\nc.NumberOfReplicas = 100\nc.Add(\"cacheA\")\n```\n\n成员通过 `Add()` 加入哈希环：\n\n```go\nfunc (c *Consistent) Add(elt string)\n```\n\n内部调用未导出的 `add()`：\n\n```go\nfunc (c *Consistent) add(elt string)\n```\n\n`add()` 会为同一个成员生成 `NumberOfReplicas` 个虚拟节点。每个虚拟节点的 key 由 `eltKey()` 构造：\n\n```go\nfunc (c *Consistent) eltKey(elt string, idx int) string {\n    return strconv.Itoa(idx) + elt\n}\n```\n\n随后通过 `hashKey()` 计算 CRC32：\n\n```go\nfunc (c *Consistent) hashKey(key string) uint32\n```\n\n每个虚拟节点最终写入：\n\n```go\nc.circle[c.hashKey(c.eltKey(elt, i))] = elt\n```\n\n添加完成后，`updateSortedHashes()` 会重新收集并排序所有哈希点：\n\n```go\nfunc (c *Consistent) updateSortedHashes()\n```\n\n## 查询流程\n\n最常用的查询入口是 `Get()`：\n\n```go\nfunc (c *Consistent) Get(name string) (string, error)\n```\n\n它把输入键 `name` 映射到哈希环上的第一个顺时针虚拟节点，并返回该虚拟节点对应的逻辑成员。如果哈希环为空，返回 `ErrEmptyCircle`。\n\n查询过程：\n\n```mermaid\nflowchart TD\n    A[\"Get(name)\"] --> B[\"hashKey(name)\"]\n    B --> C[\"search(key)\"]\n    C --> D[\"sortedHashes 中二分查找\"]\n    D --> E{\"是否越过末尾\"}\n    E -->|是| F[\"回绕到索引 0\"]\n    E -->|否| G[\"使用当前索引\"]\n    F --> H[\"circle[sortedHashes[i]]\"]\n    G --> H\n```\n\n`search()` 使用 `sort.Search` 查找第一个大于输入哈希值的位置：\n\n```go\nfunc (c *Consistent) search(key uint32) (i int) {\n    f := func(x int) bool {\n        return c.sortedHashes[x] > key\n    }\n    i = sort.Search(len(c.sortedHashes), f)\n    if i >= len(c.sortedHashes) {\n        i = 0\n    }\n    return\n}\n```\n\n这里使用的是严格大于 `>`，因此当输入 key 的哈希值刚好等于某个虚拟节点时，会选择它之后的下一个节点；如果已经到环尾，则回绕到第一个节点。\n\n## 多副本选择\n\n模块提供两个面向冗余或备份场景的查询方法。\n\n### `GetTwo()`\n\n```go\nfunc (c *Consistent) GetTwo(name string) (string, string, error)\n```\n\n`GetTwo()` 返回离输入 key 最近的两个不同逻辑成员：\n\n- 如果哈希环为空，返回 `ErrEmptyCircle`。\n- 如果只有一个逻辑成员，返回 `(成员名, \"\", nil)`。\n- 如果有多个成员，从 `search()` 找到的位置开始顺时针扫描，跳过与第一个成员相同的虚拟节点，直到找到第二个不同成员。\n\n这适合主备节点选择，例如第一个返回值作为主节点，第二个返回值作为候选备节点。\n\n### `GetN()`\n\n```go\nfunc (c *Consistent) GetN(name string, n int) ([]string, error)\n```\n\n`GetN()` 返回最多 `n` 个不同逻辑成员：\n\n- 如果哈希环为空，返回 `ErrEmptyCircle`。\n- 如果 `n` 大于当前逻辑成员数，会被截断为 `count`。\n- 返回结果按哈希环顺时针顺序排列。\n- 通过 `sliceContainsMember()` 避免返回重复逻辑成员。\n\n```go\nfunc sliceContainsMember(set []string, member string) bool\n```\n\n因为一个逻辑成员会有多个虚拟节点，`GetN()` 必须继续扫描 `sortedHashes`，直到收集到足够数量的不同成员或回到起点。\n\n## 成员更新\n\n### 单个移除：`Remove()`\n\n```go\nfunc (c *Consistent) Remove(elt string)\n```\n\n`Remove()` 删除某个成员对应的所有虚拟节点，并从 `members` 中移除该成员。内部调用未导出的 `remove()`：\n\n```go\nfunc (c *Consistent) remove(elt string)\n```\n\n删除逻辑会遍历 `NumberOfReplicas`，按同样的 `eltKey()` 和 `hashKey()` 重新计算虚拟节点位置，然后从 `circle` 删除。\n\n需要注意：`remove()` 不检查成员是否存在，会无条件执行 `c.count--`。因此直接调用 `Remove()` 时应确保成员确实存在；如果目标是用一批成员同步整个哈希环，优先使用 `Set()`。\n\n### 批量同步：`Set()`\n\n```go\nfunc (c *Consistent) Set(elts []string)\n```\n\n`Set()` 用传入列表替换当前成员集合：\n\n1. 遍历现有 `members`，移除不在 `elts` 中的成员。\n2. 遍历 `elts`，添加当前不存在的新成员。\n3. 已存在成员不会重复添加。\n\n这个方法适合服务发现或地址池刷新场景，也是 `addr/addr.go` 中更新地址集合的主要入口。\n\n### 获取成员列表：`Members()`\n\n```go\nfunc (c *Consistent) Members() []string\n```\n\n`Members()` 返回当前逻辑成员名列表。返回顺序来自 Go map 遍历，不保证稳定排序；如果调用方需要稳定输出，应自行排序。\n\n## 并发模型\n\n`Consistent` 的公开方法都持有锁：\n\n- `Add()`、`Remove()`、`Set()` 使用写锁。\n- `Members()`、`Get()`、`GetTwo()`、`GetN()` 使用读锁。\n\n内部方法 `add()` 和 `remove()` 的注释明确要求调用前已持有写锁：\n\n```go\n// need c.Lock() before calling\nfunc (c *Consistent) add(elt string)\n\n// need c.Lock() before calling\nfunc (c *Consistent) remove(elt string)\n```\n\n测试 `TestConcurrentGetSet` 覆盖了并发 `Set()` 和 `Get()` 的场景，验证读写锁能保护 `circle`、`members` 和 `sortedHashes` 的一致性。\n\n## 哈希与性能细节\n\n`hashKey()` 使用 `crc32.ChecksumIEEE`：\n\n```go\nfunc (c *Consistent) hashKey(key string) uint32 {\n    if len(key) < 64 {\n        var scratch [64]byte\n        copy(scratch[:], key)\n        return crc32.ChecksumIEEE(scratch[:len(key)])\n    }\n    return crc32.ChecksumIEEE([]byte(key))\n}\n```\n\n短字符串路径使用局部 `[64]byte` 缓冲，避免直接把短字符串转换为 `[]byte` 时产生额外分配。长字符串则直接转换。\n\n`updateSortedHashes()` 会复用已有 `sortedHashes` 的底层数组：\n\n```go\nhashes := c.sortedHashes[:0]\n```\n\n如果旧数组容量相对当前哈希环过大，会释放引用并重新分配：\n\n```go\nif cap(c.sortedHashes)/(c.NumberOfReplicas*4) > len(c.circle) {\n    hashes = nil\n}\n```\n\n这减少频繁增删成员时的分配，同时避免长期持有过大的数组。\n\n## 错误处理\n\n空哈希环查询返回包级变量：\n\n```go\nvar ErrEmptyCircle = errors.New(\"empty circle\")\n```\n\n会返回该错误的方法：\n\n- `Get()`\n- `GetTwo()`\n- `GetN()`\n\n调用方应显式判断：\n\n```go\nserver, err := c.Get(userID)\nif err == consistent.ErrEmptyCircle {\n    // 当前没有可用成员\n}\nif err != nil {\n    return err\n}\n```\n\n## 使用示例\n\n```go\nc := consistent.New()\nc.Add(\"cacheA\")\nc.Add(\"cacheB\")\nc.Add(\"cacheC\")\n\nserver, err := c.Get(\"user_mcnulty\")\nif err != nil {\n    return err\n}\n\n// server 是 cacheA、cacheB、cacheC 中的一个\n_ = server\n```\n\n批量刷新成员更适合动态地址列表：\n\n```go\nc := consistent.New()\n\n// 第一次加载地址\nc.Set([]string{\"10.0.0.1:8080\", \"10.0.0.2:8080\"})\n\n// 服务发现结果变化后同步\nc.Set([]string{\"10.0.0.2:8080\", \"10.0.0.3:8080\"})\n```\n\n选择多个不同成员：\n\n```go\nnodes, err := c.GetN(\"request-key\", 3)\nif err != nil {\n    return err\n}\n\n// nodes 最多包含 3 个不同成员，可用于副本写入或降级候选\n_ = nodes\n```\n\n## 贡献时需要注意\n\n修改该模块时应保持以下不变量：\n\n- `circle` 的 key 必须与 `sortedHashes` 完全一致。\n- 每次成员增删后必须调用 `updateSortedHashes()`。\n- `members` 和 `count` 应表示逻辑成员数量，而不是虚拟节点数量。\n- `GetTwo()` 和 `GetN()` 必须返回不同逻辑成员，不能因为虚拟节点重复而返回重复值。\n- 公开方法需要继续保持并发安全。\n- `NumberOfReplicas` 应在添加成员前配置；已有成员不会因为修改该字段自动重建虚拟节点。\n\n现有测试覆盖了基础增删、空环错误、单成员和多成员查询、`GetTwo()`、`GetN()`、`Set()`、CRC32 碰撞回归、并发 `Get()`/`Set()`，以及若干分配和查询性能基准。","local-rate-limiting":"# Local Rate Limiting\n\n## 模块概览\n\n`rate` 包实现本地令牌桶限流器，核心类型是 `Limiter`。它控制事件发生频率：以 `limit` 指定的速率补充令牌，以 `burst` 限制瞬时可消费的最大令牌数。\n\n该模块主要服务于本地限流逻辑，也被 `token/token_bucket.go` 封装成更高层的 token bucket。远程限流、同步和 UDP 预留等流程会通过 `GetTokenBucket`、`WithRemoteConfig`、`updateConfig` 最终更新或创建这里的 `Limiter`。\n\n## 核心模型\n\n`Limit` 表示每秒允许的事件数：\n\n```go\ntype Limit float64\n```\n\n常用构造方式：\n\n```go\nlim := rate.NewLimiter(rate.Every(100*time.Millisecond), 10)\n```\n\n其中：\n\n- `Every(interval)` 将“事件之间的最小间隔”转换为每秒速率。\n- `Every(100*time.Millisecond)` 等价于每秒 10 个令牌。\n- `Inf` 表示无限速率，所有请求都会被允许，`burst` 会被忽略。\n- `Limit(0)` 不产生令牌，因此会拒绝所有需要令牌的请求。\n\n`Limiter` 内部字段：\n\n```go\ntype Limiter struct {\n\tlimit Limit\n\tburst int64\n\n\tmu     sync.Mutex\n\ttokens float64\n\tlast   time.Time\n\n\tlastEvent       time.Time\n\tlastMetricsTime int64\n}\n```\n\n字段含义：\n\n- `limit`：令牌补充速率，单位是 token/s。\n- `burst`：桶容量，也是单次 `AllowN`、`ReserveN`、`WaitN` 可请求的最大令牌数。\n- `tokens`：当前可用令牌数，可为负数，表示已经预支了未来令牌。\n- `last`：上一次计算令牌补充的时间。\n- `lastEvent`：最近一次已发生或已预留的限流事件时间，用于取消预留时回滚状态。\n- `lastMetricsTime`：用于指标采样节流，`CheckMetricsTime` 每 10 秒返回一次 `true`。\n\n## 令牌补充机制\n\n令牌补充由 `advance(now)` 计算，但不会直接修改 `Limiter` 状态：\n\n```go\nfunc (lim *Limiter) advance(now time.Time) (newNow time.Time, newLast time.Time, newTokens float64)\n```\n\n执行逻辑：\n\n1. 读取 `lim.last`。\n2. 如果调用方传入的 `now` 早于 `last`，将 `last` 回退到 `now`，避免时间倒退导致负补充。\n3. 计算经过时间 `elapsed := now.Sub(last)`。\n4. 使用 `limit.tokensFromDuration(elapsed)` 计算新增令牌。\n5. 将 `tokens` 截断到 `burst` 上限。\n6. 返回计算后的状态，由调用方决定是否写回。\n\n两个换算函数负责速率和时间之间的转换：\n\n```go\nfunc (limit Limit) tokensFromDuration(d time.Duration) float64\nfunc (limit Limit) durationFromTokens(tokens float64) time.Duration\n```\n\n`tokensFromDuration` 用于“经过一段时间能补多少令牌”，`durationFromTokens` 用于“缺少若干令牌需要等待多久”。\n\n## 三种主要消费方式\n\n`Limiter` 提供三类消费接口，语义不同：\n\n| 方法 | 无令牌时行为 | 适用场景 |\n| --- | --- | --- |\n| `Allow` / `AllowN` | 立即返回 `false` | 超限请求可直接丢弃 |\n| `Reserve` / `ReserveN` | 返回未来可执行时间 | 调用方自己等待或调度 |\n| `Wait` / `WaitN` | 阻塞直到可执行或 `context` 取消 | 请求必须执行，但可等待 |\n\n它们都通过内部方法 `reserveN` 实现核心判断。\n\n```mermaid\nflowchart TD\n    A[\"AllowN\"] --> D[\"reserveN\"]\n    B[\"ReserveN\"] --> D\n    C[\"WaitN\"] --> D\n    D --> E[\"advance\"]\n    D --> F[\"更新 tokens / last / lastEvent\"]\n    C --> G[\"DelayFrom\"]\n    C --> H[\"Cancel\"]\n```\n\n## `Allow` 与 `AllowN`\n\n```go\nfunc (lim *Limiter) Allow() bool\nfunc (lim *Limiter) AllowN(now time.Time, n int64) bool\n```\n\n`Allow()` 是 `AllowN(time.Now(), 1)` 的简写。\n\n`AllowN` 用于“能执行就执行，不能执行就放弃”的场景。它调用：\n\n```go\nlim.reserveN(now, n, 0).ok\n```\n\n这里 `maxFutureReserve` 为 `0`，所以只有无需等待的请求才会成功。若令牌不足，即使未来可以补齐，也会返回 `false`。\n\n典型模式：\n\n```go\nif !lim.Allow() {\n\treturn\n}\n\ndoWork()\n```\n\n注意：`AllowN` 成功后会立即扣除令牌。如果后续只使用了一部分令牌，可以用 `RestoreN` 归还未使用部分。\n\n## `Reserve`、`ReserveN` 与 `Reservation`\n\n```go\nfunc (lim *Limiter) Reserve() *Reservation\nfunc (lim *Limiter) ReserveN(now time.Time, n int64) *Reservation\n```\n\n`ReserveN` 会尝试预留未来令牌，并返回 `Reservation`：\n\n```go\ntype Reservation struct {\n\tok        bool\n\tlim       *Limiter\n\ttokens    int64\n\ttimeToAct time.Time\n\tlimit     Limit\n}\n```\n\n调用方通过以下方法检查和使用预留结果：\n\n```go\nfunc (r *Reservation) OK() bool\nfunc (r *Reservation) Delay() time.Duration\nfunc (r *Reservation) DelayFrom(now time.Time) time.Duration\nfunc (r *Reservation) Cancel()\nfunc (r *Reservation) CancelAt(now time.Time)\n```\n\n示例：\n\n```go\nr := lim.ReserveN(time.Now(), 1)\nif !r.OK() {\n\treturn\n}\n\ntime.Sleep(r.Delay())\ndoWork()\n```\n\n`ReserveN` 的等待上限是 `InfDuration`，因此只要 `n <= burst`，通常可以预留成功。预留成功后，`tokens` 可能变成负数，表示已经占用了未来补充的令牌。\n\n## `Wait` 与 `WaitN`\n\n```go\nfunc (lim *Limiter) Wait(ctx context.Context) error\nfunc (lim *Limiter) WaitN(ctx context.Context, n int64) error\n```\n\n`Wait()` 是 `WaitN(ctx, 1)` 的简写。\n\n`WaitN` 的执行流程：\n\n1. 如果 `n > burst` 且 `limit != Inf`，直接返回错误。\n2. 如果 `ctx` 已取消，返回 `ctx.Err()`。\n3. 如果 `ctx` 有 deadline，将 deadline 转换为最大可等待时间。\n4. 调用 `reserveN(now, n, waitLimit)`。\n5. 如果预留失败，返回 `rate: Wait(n=%d) would exceed context deadline`。\n6. 如果无需等待，立即返回 `nil`。\n7. 如果需要等待，创建 `time.Timer`。\n8. 等待期间如果 `ctx` 取消，调用 `Reservation.Cancel()` 回滚预留，然后返回 `ctx.Err()`。\n\n`WaitN` 适合请求不能丢弃、但可以受 `context.Context` 控制等待时间的路径。\n\n## `reserveN` 的状态更新\n\n`reserveN` 是限流判断的核心：\n\n```go\nfunc (lim *Limiter) reserveN(now time.Time, n int64, maxFutureReserve time.Duration) Reservation\n```\n\n核心逻辑：\n\n1. 加锁保护 `Limiter` 状态。\n2. 如果 `limit == Inf`，直接返回成功预留，执行时间为 `now`。\n3. 调用 `advance(now)` 计算当前可用令牌。\n4. 扣除请求令牌：`tokens -= float64(n)`。\n5. 如果扣除后 `tokens < 0`，用 `durationFromTokens(-tokens)` 计算等待时间。\n6. 判断是否允许：\n   - `n <= lim.burst`\n   - `waitDuration <= maxFutureReserve`\n7. 成功时写回：\n   - `lim.last = now`\n   - `lim.tokens = tokens`\n   - `lim.lastEvent = r.timeToAct`\n8. 失败时恢复 `lim.last = last`，不扣令牌。\n\n`AllowN`、`ReserveN`、`WaitN` 的差异主要来自传入的 `maxFutureReserve`：\n\n- `AllowN` 传 `0`，不允许等待。\n- `ReserveN` 传 `InfDuration`，允许无限期预留。\n- `WaitN` 根据 `context` deadline 传入最大等待时间。\n\n## 取消预留\n\n`Reservation.Cancel()` 调用 `CancelAt(time.Now())`。\n\n```go\nfunc (r *Reservation) CancelAt(now time.Time)\n```\n\n取消预留时会尽量恢复令牌，但不是简单地把 `r.tokens` 全部加回去，因为在该预留之后可能已经有其他预留发生。\n\n关键计算：\n\n```go\nrestoreTokens := float64(r.tokens) - r.limit.tokensFromDuration(r.lim.lastEvent.Sub(r.timeToAct))\n```\n\n含义是：从当前最新事件 `lastEvent` 到本次预留的 `timeToAct` 之间，可能存在后续预留占用的令牌，这部分不能恢复。\n\n取消不会生效的情况：\n\n- `r.ok == false`\n- `lim.limit == Inf`\n- `r.tokens == 0`\n- `r.timeToAct.Before(now)`，也就是预留时间已经过去\n\n如果本次取消的是最新事件，还会尝试回退 `lim.lastEvent`：\n\n```go\nprevEvent := r.timeToAct.Add(r.limit.durationFromTokens(float64(-r.tokens)))\n```\n\n这让后续预留可以更早执行。\n\n## 归还令牌：`Restore` 与 `RestoreN`\n\n```go\nfunc (lim *Limiter) Restore()\nfunc (lim *Limiter) RestoreN(n int64)\n```\n\n`Restore()` 是 `RestoreN(1)` 的简写。\n\n内部实现：\n\n```go\nfunc (lim *Limiter) restoreN(n int64) {\n\tlim.mu.Lock()\n\ttokens := lim.tokens + float64(n)\n\tif burst := float64(lim.burst); tokens > burst {\n\t\ttokens = burst\n\t}\n\tlim.tokens = tokens\n\tlim.mu.Unlock()\n}\n```\n\n该能力是本模块相对标准令牌桶实现的扩展，适用于 `AllowN` 成功后只消费了部分令牌的场景。\n\n使用约束很重要：\n\n- 只应在 `AllowN` 成功后调用。\n- 应立即调用，避免时间推进后破坏限流精度。\n- 归还后令牌数最多恢复到 `burst`。\n\n## 尽力获取：`AllowAtMostN`\n\n```go\nfunc (lim *Limiter) AllowAtMostN(n int64) int64\n```\n\n`AllowAtMostN` 会尝试最多获取 `n` 个令牌，并返回实际获取数量。\n\n行为：\n\n- `limit == Inf` 时直接返回 `n`。\n- 当前令牌小于 `0` 时返回 `0`。\n- 当前令牌不足 `n` 时返回 `floor(tokens)`。\n- 成功获取后写回：\n  - `lim.last = now`\n  - `lim.tokens = tokens - float64(got)`\n  - `lim.lastEvent = now`\n\n该方法适合批处理或降级场景：调用方愿意处理部分请求，而不是全量失败。\n\n## 只检查是否限流：`IsThrottled`\n\n```go\nfunc (lim *Limiter) IsThrottled(n int64) bool\n```\n\n`IsThrottled` 用于判断当前请求是否会被限流，但不修改 `tokens`、`last` 或 `lastEvent`。\n\n判断规则：\n\n- `limit == Inf` 返回 `false`。\n- `n > burst` 返回 `true`。\n- 调用 `advance(time.Now())` 计算当前可用令牌。\n- 如果 `tokens < float64(n)` 返回 `true`。\n\n它适合观测、预判或指标路径，不应替代真正的消费方法。\n\n## 动态配置\n\n`Limiter` 支持运行时调整速率和桶容量：\n\n```go\nfunc (lim *Limiter) SetLimit(newLimit Limit)\nfunc (lim *Limiter) SetLimitAt(now time.Time, newLimit Limit)\nfunc (lim *Limiter) SetBurst(newBurst int64)\n```\n\n`SetLimitAt` 会先调用 `advance(now)`，把旧速率下已经产生的令牌结算到当前时间，再写入新的 `limit`。\n\n```go\nnow, _, tokens := lim.advance(now)\n\nlim.last = now\nlim.tokens = tokens\nlim.limit = newLimit\n```\n\n这避免了直接切换速率导致历史时间段被错误地按新速率结算。\n\n`SetBurst` 只更新 `burst`，不会主动裁剪当前 `tokens`。下一次 `advance` 或消费路径会根据新的 `burst` 截断令牌。\n\n## 状态读取方法\n\n模块提供几个读取状态的方法：\n\n```go\nfunc (lim *Limiter) Limit() Limit\nfunc (lim *Limiter) Last() time.Time\nfunc (lim *Limiter) Tokens() float64\nfunc (lim *Limiter) Burst() int64\nfunc (lim *Limiter) CheckMetricsTime() bool\n```\n\n其中 `Limit`、`Last`、`Tokens` 使用互斥锁保护读取。\n\n`Burst` 直接返回 `lim.burst`，没有加锁；如果与 `SetBurst` 并发使用，需要注意数据竞争风险。\n\n`CheckMetricsTime` 也没有加锁，它每 10 秒更新一次 `lastMetricsTime` 并返回 `true`，适合低精度指标采样控制，但不适合作为严格并发安全状态。\n\n## 初始化方式\n\n常规初始化：\n\n```go\nlim := rate.NewLimiter(rate.Limit(100), 200)\n```\n\n`NewLimiter` 只设置 `limit` 和 `burst`：\n\n```go\nfunc NewLimiter(r Limit, b int64) *Limiter {\n\treturn &Limiter{\n\t\tlimit: r,\n\t\tburst: b,\n\t}\n}\n```\n\n虽然 `tokens` 初始为 `0`，但 `last` 也是零值时间。首次调用 `advance(time.Now())` 时会计算从零值时间到当前时间的补充量，并被截断到 `burst`，因此新建限流器首次使用时表现为满桶。\n\n带初始状态初始化：\n\n```go\nfunc NewLimiterWithInitValues(r Limit, b int64, last time.Time, tokens float64) *Limiter\n```\n\n该函数用于从外部状态恢复限流器，例如 `token/token_bucket.go` 的 `InitTokenBucket` 会调用它创建带 `last` 和 `tokens` 的本地桶。\n\n## 与代码库其他模块的关系\n\n`rate` 包本身不依赖业务模块；它只依赖 Go 标准库的 `context`、`fmt`、`math`、`sync` 和 `time`。\n\n外部模块主要通过 `token/token_bucket.go` 使用它：\n\n- `InitTokenBucket` 调用 `NewLimiterWithInitValues` 恢复本地桶状态。\n- `getFallbackLimiter` 调用 `Limit` 和 `NewLimiter` 创建兜底限流器。\n- `updateConfig` 使用 `Limit` 更新远程配置下发的限流速率。\n- `RateLimit`、`Sync`、`handleReserveN` 等流程通过 `GetTokenBucket -> WithRemoteConfig -> updateConfig -> Limit` 间接影响本地限流器配置。\n\n简化关系如下：\n\n```mermaid\nflowchart TD\n    A[\"远程限流入口\"] --> B[\"GetTokenBucket\"]\n    B --> C[\"WithRemoteConfig\"]\n    C --> D[\"updateConfig\"]\n    D --> E[\"rate.Limit\"]\n    F[\"InitTokenBucket\"] --> G[\"NewLimiterWithInitValues\"]\n    G --> H[\"Limiter\"]\n    E --> H\n```\n\n## 贡献时的注意事项\n\n修改该模块时应重点关注状态一致性：\n\n- `reserveN` 是 `AllowN`、`ReserveN`、`WaitN` 的共同核心，修改它会同时影响丢弃、预留和阻塞等待三种模式。\n- `tokens` 可以为负数，这是预留未来令牌的正常状态，不应简单假设其非负。\n- `lastEvent` 只在预留和取消逻辑中有意义，改动 `CancelAt` 时需要考虑后续预留已经占用的令牌。\n- `SetLimitAt` 必须先按旧速率结算令牌，再更新 `limit`。\n- `RestoreN` 会牺牲一定精度，只应服务于“刚刚成功获取令牌但未全部使用”的路径。\n- 并发安全主要依赖 `lim.mu`，新增读写 `Limiter` 状态的方法应默认加锁，除非明确接受非严格一致性。","metrics":"# Metrics\n\n## Metrics 模块\n\n`metrics` 模块集中封装 Harden 服务的指标初始化、打点上报和精度选择逻辑。调用方不直接操作 `code.byted.org/gopkg/metrics/v4` 的客户端，而是通过 `EmitCounter`、`EmitTimer`、`EmitStore`、`CtxEmitCounter`、`CtxEmitTimer`、`CtxEmitStore`、`CtxEmitRateCounter` 这些函数上报指标。\n\n模块文件位于 `metrics/metrics.go`，核心职责包括：\n\n- 初始化高精度和低精度两套指标客户端。\n- 根据 TCC 精度配置、当前集群和请求上下文选择指标客户端。\n- 统一指标前缀、后缀、tag 名称和 tag 格式。\n- 将上报失败降级为 `logs.Warn`，避免指标系统影响主流程。\n\n## 初始化流程\n\n服务启动时，`main` 会调用 `InitMetrics()` 初始化全局指标对象：\n\n```go\nfunc InitMetrics() {\n\tglobalTags := []metrics.T{{Name: ServerCluster, Value: env.Cluster()}}\n\ttags := []string{Group, Name, Preferred, Fallback, Mode, Status, TargetIp, Server, Flag, ReserveFlag, SyncDomains, Source, Function, Version, FromPSM}\n\n\tclient, err := metrics.NewClient(\"\", metrics.SetTenant(config.C.Tenant), metrics.SetGlobalTags(globalTags...), metrics.SetTimeInterval(30), metrics.SetDiscardInvalidTag())\n\t// ...\n\tlowPrecisionMetrics, err = client.NewMetricWithOps(serverPrefix, tags)\n\n\tclient, err = metrics.NewClient(\"\", metrics.SetTenant(config.C.Tenant), metrics.SetGlobalTags(globalTags...), metrics.SetTimeInterval(1), metrics.SetDiscardInvalidTag())\n\t// ...\n\thighPrecisionMetrics, err = client.NewMetricWithOps(serverPrefix, tags)\n}\n```\n\n初始化时会创建两套 `metrics.Metric`：\n\n| 变量 | 时间间隔 | 用途 |\n| --- | --- | --- |\n| `lowPrecisionMetrics` | `30` 秒 | 默认低精度上报，降低指标量和成本 |\n| `highPrecisionMetrics` | `1` 秒 | 针对关键指标、关键集群或关键 group 的高精度上报 |\n\n两套指标都使用相同的指标前缀：\n\n```go\nconst serverPrefix = \"toutiao.service.ratelimit.server\"\n```\n\n并携带全局 tag：\n\n```go\nmetrics.T{Name: ServerCluster, Value: env.Cluster()}\n```\n\n如果客户端或 metric 创建失败，`InitMetrics()` 会直接 `panic`。因此该函数应在服务启动早期调用，且应在业务打点发生前完成。\n\n## 指标命名与 tag\n\n模块定义了一组指标 key 和 tag 名称常量，供调用方复用，避免硬编码字符串分散在业务代码中。\n\n常用指标 key 包括：\n\n```go\nPanic\nThroughput\nLatency\nConcurrent\nConThroughput\nConLatency\nBill\n```\n\n其中：\n\n```go\nConThroughput = Concurrent + \".\" + Throughput\nConLatency    = Concurrent + \".\" + Latency\n```\n\n常用 tag 名称包括：\n\n```go\nGroup\nName\nPreferred\nFallback\nMode\nStatus\nTargetIp\nServer\nFlag\nReserveFlag\nSyncDomains\nSource\nFunction\nVersion\nServerCluster\nFromPSM\n```\n\n`InitMetrics()` 中注册的可用 tag 列表是：\n\n```go\n[]string{\n\tGroup, Name, Preferred, Fallback, Mode, Status,\n\tTargetIp, Server, Flag, ReserveFlag, SyncDomains,\n\tSource, Function, Version, FromPSM,\n}\n```\n\n`ServerCluster` 不是普通业务 tag，而是通过 `SetGlobalTags` 自动挂到所有指标上。\n\n## tag 构造规则\n\n调用方通过变长字符串参数传入 tag：\n\n```go\nmetrics.EmitCounter(metrics.Throughput, 1,\n\tmetrics.Group, group,\n\tmetrics.Name, name,\n\tmetrics.Status, status,\n)\n```\n\n内部由 `FormTags(tagPairs ...string)` 转换为 `[]metrics.T`：\n\n```go\nfunc FormTags(tagPairs ...string) []metrics.T {\n\ttagsLen := len(tagPairs) / 2\n\ttags := make([]metrics.T, 0, tagsLen)\n\tif tagsLen > 0 {\n\t\tfor i := 0; i < tagsLen; i++ {\n\t\t\tkeyIndex := i * 2\n\t\t\tif tagName := tagPairs[keyIndex]; len(tagName) > 0 {\n\t\t\t\tif len(tagPairs[keyIndex+1]) == 0 {\n\t\t\t\t\ttagPairs[keyIndex+1] = \"nil\"\n\t\t\t\t}\n\t\t\t\ttags = append(tags, metrics.T{Name: tagName, Value: tagPairs[keyIndex+1]})\n\t\t\t}\n\t\t}\n\t}\n\treturn tags\n}\n```\n\n需要注意以下行为：\n\n- `tagPairs` 按 `key, value, key, value` 成对解析。\n- 如果传入奇数个字符串，最后一个字符串会被忽略。\n- tag 名为空字符串时，该 tag 会被跳过。\n- tag 值为空字符串时，会被改写为 `\"nil\"`。\n- `FormTags` 会修改 `tagPairs[keyIndex+1]` 的值；在普通变长参数调用中影响很小，但调用方不应依赖原始切片内容不变。\n\n## 上报 API\n\n模块提供两类 API：不带上下文的快捷函数，以及带上下文的精度感知函数。\n\n### 快捷函数\n\n```go\nfunc EmitCounter(mKey string, cnt int64, tagPairs ...string)\nfunc EmitTimer(mKey string, t0 time.Time, tagPairs ...string)\nfunc EmitStore(mKey string, cnt int, tagPairs ...string)\n```\n\n这些函数内部使用 `context.TODO()` 调用对应的 `Ctx*` 函数：\n\n```go\nfunc EmitCounter(mKey string, cnt int64, tagPairs ...string) {\n\tCtxEmitCounter(context.TODO(), mKey, cnt, tagPairs...)\n}\n```\n\n适合没有请求上下文、或者不需要按 group 做高精度选择的后台任务。例如 syncer、token bucket、addr 更新等路径中会使用这些函数。\n\n### 上下文感知函数\n\n```go\nfunc CtxEmitCounter(ctx context.Context, mKey string, cnt int64, tagPairs ...string)\nfunc CtxEmitTimer(ctx context.Context, mKey string, t0 time.Time, tagPairs ...string)\nfunc CtxEmitStore(ctx context.Context, mKey string, cnt int, tagPairs ...string)\nfunc CtxEmitRateCounter(ctx context.Context, mKey string, cnt int64, tagPairs ...string)\n```\n\n这些函数都会执行同样的基本流程：\n\n1. 调用 `FormTags` 构造 tag。\n2. 调用 `GetMetrics(ctx, mKey)` 选择高精度或低精度 metric。\n3. 使用 `metrics.WithSuffix(mKey)` 指定指标后缀。\n4. 调用底层 metrics SDK 上报。\n5. 上报失败时写 `logs.Warn`，不向调用方返回错误。\n\n不同函数对应不同的底层上报类型：\n\n| 函数 | 底层调用 | 语义 |\n| --- | --- | --- |\n| `CtxEmitCounter` | `IncrCounter(int(cnt))` | 计数器累加 |\n| `CtxEmitTimer` | `Observe(int(costs))` | 记录耗时分布 |\n| `CtxEmitStore` | `Store(cnt)` | 存储当前值 |\n| `CtxEmitRateCounter` | `Incr(int(cnt))` | rate 类型累加 |\n\n`CtxEmitTimer` 接收起始时间 `t0`，内部计算从 `t0` 到当前时间的耗时：\n\n```go\ncosts := time.Since(t0).Nanoseconds() / 1000\n```\n\n因此 timer 指标单位是微秒。\n\n## 精度选择逻辑\n\n`GetMetrics(ctx, mKey)` 是模块最关键的函数。它根据 TCC 配置、当前集群和上下文中的 group 决定使用高精度还是低精度 metric。\n\n```go\nfunc GetMetrics(ctx context.Context, mKey string) metrics.Metric {\n\tprecisionConfig := tcc.GetPrecisionConfig(ctx)\n\tif precisionConfig.HighClauses == nil || !precisionConfig.HighClauses[mKey] {\n\t\treturn lowPrecisionMetrics\n\t}\n\n\tif precisionConfig.LowClusters == nil || !precisionConfig.LowClusters[env.Cluster()] {\n\t\treturn highPrecisionMetrics\n\t}\n\tgroup := ctx.Value(\"group\")\n\tif group == nil {\n\t\treturn lowPrecisionMetrics\n\t}\n\tif precisionConfig.HighGroups != nil && precisionConfig.HighGroups[group.(string)] {\n\t\treturn highPrecisionMetrics\n\t}\n\treturn lowPrecisionMetrics\n}\n```\n\n判断顺序如下：\n\n```mermaid\nflowchart TD\n    A[\"上报指标\"] --> B[\"读取 TCC 精度配置\"]\n    B --> C{\"mKey 在 HighClauses 中？\"}\n    C -- \"否\" --> L[\"低精度指标\"]\n    C -- \"是\" --> D{\"当前集群不在 LowClusters？\"}\n    D -- \"是\" --> H[\"高精度指标\"]\n    D -- \"否\" --> E{\"ctx 中存在 group？\"}\n    E -- \"否\" --> L\n    E -- \"是\" --> F{\"group 在 HighGroups 中？\"}\n    F -- \"是\" --> H\n    F -- \"否\" --> L\n```\n\n可以理解为：\n\n- 默认全部使用低精度。\n- 只有 `HighClauses[mKey] == true` 的指标才有机会进入高精度。\n- 如果当前集群不在 `LowClusters` 中，这类指标直接使用高精度。\n- 如果当前集群在 `LowClusters` 中，则还需要上下文里有 `\"group\"`，并且该 group 在 `HighGroups` 中，才使用高精度。\n- 其他情况全部回退到低精度。\n\n这里的 `\"group\"` 是通过 `ctx.Value(\"group\")` 读取的字符串键。代码中使用了 `group.(string)` 强制类型断言，因此如果调用方放入了非字符串值，会触发 panic。需要按现有约定写入字符串类型 group。\n\n## 与 TCC 的关系\n\n`GetMetrics` 依赖 `tcc.GetPrecisionConfig(ctx)` 获取精度配置。调用链通常是：\n\n```text\n业务入口 -> CtxEmit* / Emit* -> GetMetrics -> tcc.GetPrecisionConfig -> Precision\n```\n\n从执行流可以看到，UDP 服务、远程限流、并发控制、同步器、token 初始化等路径都会通过该模块进入 TCC 精度配置：\n\n- `Serve` 通过 `EmitCounter` 进入 `GetMetrics`。\n- `handleReserveN` 通过 `EmitTimer` 进入 `GetMetrics`。\n- `InitAllInitInfos` 通过 `EmitCounter` 进入 `GetMetrics`。\n- `batchedSync` 通过 `EmitCounter` 进入 `GetMetrics`。\n- `ConEnter` 通过 `CtxEmitCounter` 进入 `GetMetrics`。\n\n这意味着精度配置不是单点业务逻辑，而是影响服务内大部分指标上报路径的全局策略。\n\n## 与业务模块的连接\n\n`metrics` 模块被多个核心路径调用：\n\n- `udpserver/server.go`：`Serve`、`handleRequest`、`handleReserveN` 上报服务请求量、耗时和存储值。\n- `remote/rateLimit.go`、`remote/v2/rate_limit.go`：限流请求通过 `CtxEmitCounter` 和 `CtxEmitRateCounter` 上报吞吐、状态等指标。\n- `remote/isThrottled.go`：通过 `CtxEmitTimer` 上报判断耗时。\n- `conRemote/enter.go`、`conRemote/leave.go`、`conRemote/concurrentBase.go`：并发控制路径上报进入、离开、当前并发值和耗时。\n- `syncer/*`：同步器通过 `EmitCounter`、`EmitStore` 上报同步状态和统计值。\n- `token/token_bucket.go`、`tokens/group.go`：token bucket 和 group 初始化路径上报初始化、更新和存储类指标。\n- `addr/addr.go`、`conRemote/config.go`：配置和地址更新路径上报更新结果。\n\n这种设计让业务模块只关心“上报什么指标”和“带什么 tag”，不需要关心指标客户端、tenant、时间粒度或高低精度切换。\n\n## 典型使用方式\n\n上报计数器：\n\n```go\nmetrics.EmitCounter(metrics.Throughput, 1,\n\tmetrics.Group, group,\n\tmetrics.Name, name,\n\tmetrics.Status, status,\n)\n```\n\n在有请求上下文时上报计数器：\n\n```go\nmetrics.CtxEmitCounter(ctx, metrics.Throughput, 1,\n\tmetrics.Group, group,\n\tmetrics.Name, name,\n)\n```\n\n上报耗时：\n\n```go\nstart := time.Now()\n\n// 执行业务逻辑\n\nmetrics.CtxEmitTimer(ctx, metrics.Latency, start,\n\tmetrics.Group, group,\n\tmetrics.Name, name,\n\tmetrics.Status, status,\n)\n```\n\n上报当前值：\n\n```go\nmetrics.EmitStore(metrics.Concurrent, current,\n\tmetrics.Group, group,\n\tmetrics.Name, name,\n)\n```\n\n上报 rate counter：\n\n```go\nmetrics.CtxEmitRateCounter(ctx, metrics.Throughput, 1,\n\tmetrics.Group, group,\n\tmetrics.Source, source,\n)\n```\n\n## 贡献注意事项\n\n新增指标时优先复用已有 key 和 tag 常量。如果确实需要新增 tag，需要同时考虑 `InitMetrics()` 中传给 `NewMetricWithOps` 的 tag 白名单，否则新 tag 可能被 SDK 视为无效并丢弃。\n\n新增上报点时应优先选择 `CtxEmit*` 版本，尤其是请求链路、限流链路和并发控制链路。这样 `GetMetrics` 可以基于 `ctx` 中的 group 做高精度选择。没有上下文的后台任务再使用 `Emit*` 快捷函数。\n\n计时指标应传入操作开始前记录的 `time.Time`，不要传入已经计算好的耗时；`CtxEmitTimer` 会统一转换为微秒并用 `Observe` 上报。\n\n指标上报错误不会中断业务流程，只会写 warn 日志。调用方不需要处理返回值，但排查指标缺失时需要关注日志中的这些前缀：\n\n```text\n[harden]: CtxEmitCounter\n[harden]: GroupEmitTimer\n[harden]: CtxEmitRateCounter\n```\n\n`GetMetrics` 对 `ctx.Value(\"group\")` 使用字符串断言。需要传递 group 时，应保证 context 中 `\"group\"` 对应的是 `string`，并和 tag 中的 `metrics.Group` 保持语义一致。","observability":"# Observability\n\n## 可观测性模块\n\n该模块负责 Harden 服务的指标初始化、指标上报和按配置选择采样精度。代码集中在 `metrics` 包，另有 `middleware.GroupMiddle` 用于把 HTTP 请求中的 `group` 查询参数写入 Hertz 请求上下文。\n\n## 核心职责\n\n`metrics/metrics.go` 提供统一的指标上报入口：\n\n- 初始化高精度和低精度两个 `metrics.Metric` 实例：`InitMetrics`\n- 根据 TCC 精度配置选择上报通道：`GetMetrics`\n- 规范化标签参数：`FormTags`\n- 上报计数、耗时、瞬时值和 rate counter：\n  - `EmitCounter` / `CtxEmitCounter`\n  - `EmitTimer` / `CtxEmitTimer`\n  - `EmitStore` / `CtxEmitStore`\n  - `CtxEmitRateCounter`\n\n所有指标使用统一前缀：\n\n```go\nconst serverPrefix = \"toutiao.service.ratelimit.server\"\n```\n\n最终指标名通过 `metrics.WithSuffix(mKey)` 追加具体指标 key，例如 `throughput`、`latency`、`concurrent.throughput`。\n\n## 初始化流程\n\n`main` 调用 `InitMetrics()` 完成指标客户端初始化。该函数创建两个指标客户端：\n\n- 低精度客户端：`metrics.SetTimeInterval(30)`\n- 高精度客户端：`metrics.SetTimeInterval(1)`\n\n二者都使用相同的 tenant、全局标签和可选标签集合：\n\n```go\nglobalTags := []metrics.T{{Name: ServerCluster, Value: env.Cluster()}}\ntags := []string{\n    Group, Name, Preferred, Fallback, Mode, Status, TargetIp,\n    Server, Flag, ReserveFlag, SyncDomains, Source, Function,\n    Version, FromPSM,\n}\n```\n\n`ServerCluster` 是全局标签，值来自 `env.Cluster()`。其余标签通过 `WithTags` 在每次上报时附加。\n\n初始化失败会直接 `panic(err)`，因此 `InitMetrics` 应在服务启动早期执行，避免运行期才发现指标客户端不可用。\n\n## 精度选择逻辑\n\n`GetMetrics(ctx, mKey)` 是模块中最关键的分流函数。每次上下文版上报函数都会调用它，根据 TCC 配置决定使用 `highPrecisionMetrics` 还是 `lowPrecisionMetrics`。\n\n决策顺序如下：\n\n1. 调用 `tcc.GetPrecisionConfig(ctx)` 获取精度配置。\n2. 如果 `HighClauses` 为空，或当前指标 `mKey` 不在 `HighClauses` 中，使用低精度。\n3. 如果 `LowClusters` 为空，或当前 `env.Cluster()` 不在 `LowClusters` 中，使用高精度。\n4. 从 `ctx.Value(\"group\")` 读取 group。\n5. 如果上下文中没有 group，使用低精度。\n6. 如果 `HighGroups[group]` 为 true，使用高精度。\n7. 其他情况使用低精度。\n\n```mermaid\nflowchart TD\n    A[\"业务代码上报指标\"] --> B[\"CtxEmitCounter / CtxEmitTimer / CtxEmitStore\"]\n    B --> C[\"FormTags 生成标签\"]\n    B --> D[\"GetMetrics 选择精度\"]\n    D --> E[\"tcc.GetPrecisionConfig\"]\n    D --> F[\"highPrecisionMetrics\"]\n    D --> G[\"lowPrecisionMetrics\"]\n    F --> H[\"metrics.Emit\"]\n    G --> H\n```\n\n这个逻辑意味着：高精度不是单纯由指标名决定，还受到集群和 group 的共同控制。调用方如果希望 `GetMetrics` 能按 group 做精度分流，需要确保传入的 `context.Context` 中包含 `\"group\"` 值。\n\n## 指标上报 API\n\n### `EmitCounter` 和 `CtxEmitCounter`\n\n`EmitCounter(mKey string, cnt int64, tagPairs ...string)` 是无上下文便捷方法，内部使用 `context.TODO()` 调用 `CtxEmitCounter`。\n\n`CtxEmitCounter` 用于普通计数器累加：\n\n```go\nmetrics.GetMetrics(ctx, mKey).\n    WithTags(tags...).\n    Emit(metrics.WithSuffix(mKey).IncrCounter(int(cnt)))\n```\n\n典型调用方包括：\n\n- `udpserver.Serve`\n- `remote.RateLimit`\n- `remote/v2.RateLimit`\n- `syncer` 同步流程\n- `token.GetLimiter`\n- `conRemote.ConEnter`\n- `addr.updateAddrs`\n\n### `EmitTimer` 和 `CtxEmitTimer`\n\n`EmitTimer(mKey string, t0 time.Time, tagPairs ...string)` 使用 `context.TODO()` 调用 `CtxEmitTimer`。\n\n`CtxEmitTimer` 计算从 `t0` 到当前时间的耗时，并以微秒为单位上报：\n\n```go\ncosts := time.Since(t0).Nanoseconds() / 1000\nmetrics.WithSuffix(mKey).Observe(int(costs))\n```\n\n它适合包裹请求处理、远程调用、并发控制等路径，例如：\n\n- `udpserver.handleRequest`\n- `remote.IsThrottled`\n- `remote.RateLimit`\n- `conRemote.ConEnter`\n- `conRemote.ConLeave`\n- `conRemote.clearUuids`\n\n### `EmitStore` 和 `CtxEmitStore`\n\n`EmitStore(mKey string, cnt int, tagPairs ...string)` 使用 `context.TODO()` 调用 `CtxEmitStore`。\n\n`CtxEmitStore` 使用 `Store(cnt)` 上报当前值，适合表示某个瞬时状态或容量类指标，例如：\n\n- `syncer.stats`\n- `token.GetLimiter`\n- `conRemote.conInfo`\n\n### `CtxEmitRateCounter`\n\n`CtxEmitRateCounter` 使用 `Incr(int(cnt))`，区别于 `CtxEmitCounter` 的 `IncrCounter(int(cnt))`。当前调用方包括 `remote.RateLimit`，用于 rate 类型计数指标。\n\n## 标签构造规则\n\n所有 `CtxEmit*` 函数都会先调用 `FormTags(tagPairs...)`。\n\n`FormTags` 接收扁平的字符串参数，按 key/value 两两配对：\n\n```go\nmetrics.CtxEmitCounter(\n    ctx,\n    metrics.Throughput,\n    1,\n    metrics.Group, group,\n    metrics.Name, name,\n    metrics.Status, status,\n)\n```\n\n处理规则：\n\n- 参数长度按 `len(tagPairs) / 2` 截断，落单的最后一个字符串会被忽略。\n- 空 tag name 会被跳过。\n- 空 tag value 会被替换为字符串 `\"nil\"`。\n- 返回值类型是 `[]metrics.T`。\n\n因为 `FormTags` 会原地修改空 value 对应的 `tagPairs[keyIndex+1]`，调用方不要依赖传入切片在调用后的原始内容。\n\n## 指标名和标签常量\n\n模块定义了一组指标 key 常量，调用方应优先复用这些常量，避免手写字符串：\n\n```go\nconst (\n    Panic         = \"panic\"\n    Throughput    = \"throughput\"\n    Latency       = \"latency\"\n    Concurrent    = \"concurrent\"\n    ConThroughput = Concurrent + \".\" + Throughput\n    ConLatency    = Concurrent + \".\" + Latency\n    Bill          = \"bill\"\n)\n```\n\n标签常量包括：\n\n```go\nconst (\n    Group       = \"group\"\n    Name        = \"name\"\n    Preferred   = \"preferred\"\n    Fallback    = \"fallback\"\n    Mode        = \"mode\"\n    Status      = \"status\"\n    TargetIp    = \"targetIp\"\n    Server      = \"server\"\n    Flag        = \"flag\"\n    ReserveFlag = \"reserveFlag\"\n    SyncDomains = \"syncDomains\"\n    Source      = \"source\"\n    Function    = \"function\"\n    Version     = \"version\"\n    FromPSM     = \"fromPSM\"\n)\n```\n\n`ServerCluster` 不需要调用方手动传入，它在 `InitMetrics` 中作为全局标签自动添加。\n\n## 请求 group 中间件\n\n`middleware/group_middleware.go` 提供 `GroupMiddle()`：\n\n```go\nfunc GroupMiddle() hertz.HandlerFunc {\n    return func(c *hertz.RequestContext) {\n        c.Set(\"group\", c.Query(\"group\"))\n    }\n}\n```\n\n`main` 会接入该中间件。它从请求 query 参数读取 `group`，并写入 Hertz 的 `RequestContext`。\n\n需要注意的是，`GetMetrics` 读取的是标准 `context.Context`：\n\n```go\ngroup := ctx.Value(\"group\")\n```\n\n因此，只有当业务代码把 Hertz 上下文中的 `\"group\"` 转移到传入 `CtxEmit*` 的 `context.Context` 时，精度分流才会按 group 生效。直接调用 `EmitCounter`、`EmitTimer`、`EmitStore` 会使用 `context.TODO()`，不会携带 group。\n\n## 与业务模块的连接\n\n可观测性模块被多个核心路径调用：\n\n- UDP 服务入口：`udpserver.Serve`、`udpserver.handleRequest`\n- 限流接口：`remote.RateLimit`、`remote/v2.RateLimit`、`remote.IsThrottled`\n- 并发控制：`conRemote.ConEnter`、`conRemote.ConLeave`、`conRemote.conInfo`\n- 同步流程：`syncer`、`syncer/v2`\n- token bucket：`token.GetLimiter`、`token.asyncUpdate`\n- 配置和地址更新：`conRemote.updateConfig`、`conRemote.getRemoteConfig`、`addr.updateAddrs`\n\n典型执行路径是：\n\n```text\n业务函数\n→ EmitCounter / CtxEmitCounter\n→ FormTags\n→ GetMetrics\n→ tcc.GetPrecisionConfig\n→ highPrecisionMetrics 或 lowPrecisionMetrics\n→ metrics.Emit\n```\n\n跨模块调用中，`GetMetrics` 是指标模块与 TCC 配置模块的连接点。TCC 的 `Precision` 配置决定哪些指标、哪些集群、哪些 group 走高精度上报。\n\n## 贡献注意事项\n\n新增指标时，应优先复用已有常量；如果需要新指标 key 或 tag name，应在 `metrics/metrics.go` 中补充常量，并确认 `InitMetrics` 的 `tags` 列表包含该 tag。\n\n新增业务埋点时，根据是否已有 `context.Context` 选择 API：\n\n- 有上下文并且需要 group 精度分流：使用 `CtxEmitCounter`、`CtxEmitTimer`、`CtxEmitStore` 或 `CtxEmitRateCounter`\n- 无上下文或不需要 group 分流：使用 `EmitCounter`、`EmitTimer`、`EmitStore`\n\n耗时指标应在操作开始处保存 `time.Now()`，结束时传给 `CtxEmitTimer` 或 `EmitTimer`。该模块统一以微秒上报耗时，调用方不需要自行换算。","other":"# Other\n\n## Other 模块\n\n`Other` 收纳了项目的工程脚本、运行配置、协议生成说明，以及若干基础能力包的测试用例。它不是单一业务链路模块，而是为主服务 `toutiao.videoarch.harden` 提供构建、启动、环境配置、限流、地址解析和一致性哈希等周边支撑。\n\n## 主要内容\n\n| 路径 | 作用 |\n|---|---|\n| `build.sh` | 构建二进制并组织 `output/` 产物目录 |\n| `script/bootstrap.sh` | 运行时启动脚本，拼接 PSM、配置目录、日志目录和端口参数 |\n| `script/settings.py` | 定义 `PRODUCT`、`SUBSYS`、`MODULE` 等启动元信息 |\n| `conf/*.yml` | 不同机房、环境、业务后缀的运行配置 |\n| `README.md` | UDP 协议生成约束说明 |\n| `udpserver/protocol/gen_proto.sh` | 从 `payload.proto` 生成 Go protobuf 文件 |\n| `consistent/*_test.go` | 一致性哈希包的行为测试和示例 |\n| `rate/rate_test.go` | 令牌桶限流器的行为测试 |\n| `token/token_bucket_test.go` | 业务级限流桶封装测试 |\n| `addr/addr_test.go` | Consul 地址发现封装测试 |\n| `tokens/group_test.go` | 全局 token bucket 初始化信息测试 |\n\n## 构建与启动流程\n\n`build.sh` 是本模块的构建入口。它固定构建目标名为 `toutiao.videoarch.harden`，并将运行所需文件复制到 `output/`：\n\n```bash\nexport GO111MODULE=on\n\nRUN_NAME=\"toutiao.videoarch.harden\"\n\nmkdir -p output output/conf output/bin\ncp script/bootstrap.sh script/settings.py output\nchmod +x output/bootstrap.sh\ncp conf/* output/conf 2>/dev/null\ngo build -v -o output/bin/${RUN_NAME}\n```\n\n构建产物结构如下：\n\n```text\noutput/\n  bootstrap.sh\n  settings.py\n  conf/\n  bin/\n    toutiao.videoarch.harden\n```\n\n`script/bootstrap.sh` 负责运行时启动。它从 `settings.py` 读取：\n\n```python\nPRODUCT=\"toutiao\"\nSUBSYS=\"videoarch\"\nMODULE=\"harden\"\nAPP_TYPE=\"binary\"\nPORT=\"9555\"\n```\n\n然后组装服务名和二进制名：\n\n```bash\nSVC_NAME=${PRODUCT}.${SUBSYS}.${MODULE}\nBinaryName=${PRODUCT}.${SUBSYS}.${MODULE}\n```\n\n最终执行：\n\n```bash\nexec $CURDIR/bin/${BinaryName} -psm=$SVC_NAME -conf-dir=$CONF_DIR -log-dir=$GIN_LOG_DIR\n```\n\n如果传入第二个参数，脚本会追加 `-port=$PORT`。在 `IS_HOST_NETWORK=1` 时，端口会从 `PORT0`、`PORT1`、`PORT2` 环境变量中派生，并根据 `REQUIRE_NGINX` 决定服务端口和调试端口。\n\n```mermaid\nflowchart TD\n    A[执行 build.sh] --> B[复制脚本和配置到 output]\n    B --> C[编译 toutiao.videoarch.harden]\n    C --> D[执行 bootstrap.sh]\n    D --> E[读取 settings.py]\n    E --> F[组装 PSM 和启动参数]\n    F --> G[启动二进制服务]\n```\n\n## 配置文件组织\n\n`conf/base.yml` 提供通用默认值：\n\n```yaml\nWorker: 30\nBuffer: 10000\nTenant: videoarch.harden\n```\n\n其他配置文件按环境和业务后缀拆分，常见字段包括：\n\n| 字段 | 含义 |\n|---|---|\n| `SyncTo` | 当前区域需要同步到的目标区域列表 |\n| `TargetJamesCluster` | James SDK 目标集群 |\n| `Tenant` | 租户名 |\n\n例如生产环境区域同步配置：\n\n```yaml\n# conf/lf.prod.yml\nSyncTo:\n    - \"hl\"\n    - \"alinc2\"\n    - \"lq\"\n```\n\n单元测试或指定业务集群配置：\n\n```yaml\n# conf/lf.prod.unit_test.yml\nTargetJamesCluster: \"staging\"\n```\n\n```yaml\n# conf/lf.prod.default_tob.yml\nTargetJamesCluster: \"default_tob\"\n```\n\n部分海外或特定区域配置中 `SyncTo` 为空，例如 `conf/maliva.prod.yml`、`conf/sg1.prod.yml`、`conf/useast2a.prod.yml`。这表示该环境不声明跨区域同步目标，调用方需要按空配置处理，而不是假设存在默认同步链路。\n\n## UDP 协议生成约束\n\n根目录 `README.md` 明确要求：\n\n修改 UDP 协议时，应修改 `udpserver` 包下的 `payload.proto`，然后执行 `udpserver/protocol/gen_proto.sh` 生成 `payload.pb.go`，不要直接修改生成后的 `payload.pb.go`。\n\n生成脚本实际执行：\n\n```bash\nprotoc -I=$SRC_DIR --go_out=$DST_DIR $SRC_DIR/payload.proto\n```\n\n开发者需要保证本地或构建环境中可用 `protoc` 和 Go protobuf 插件。\n\n## 一致性哈希测试覆盖\n\n`consistent/consistent_test.go` 和 `consistent/example_test.go` 描述了 `consistent` 包对外暴露的核心 API：\n\n| API | 测试中体现的行为 |\n|---|---|\n| `New()` | 创建一致性哈希环，默认 `NumberOfReplicas` 为 `20` |\n| `Add(member)` | 添加节点，并为每个节点创建副本哈希 |\n| `Remove(member)` | 移除节点及其副本 |\n| `Get(key)` | 返回 key 命中的节点；空环返回 `ErrEmptyCircle` |\n| `GetTwo(key)` | 返回两个不同节点；只有一个节点时第二个返回空字符串 |\n| `GetN(key, n)` | 返回最多 `n` 个不重复节点 |\n| `Set([]string)` | 用给定节点集合重建哈希环 |\n\n测试中的关键内部状态包括 `circle`、`sortedHashes` 和 `count`。`TestAdd` 验证 `Add` 会让 `circle` 和 `sortedHashes` 按副本数增长，并保持 `sortedHashes` 有序。`TestRemove` 和 `TestRemoveNonExisting` 分别覆盖删除已有节点和删除不存在节点的情况。\n\n`TestAddCollision` 专门覆盖 CRC32 哈希碰撞场景。它使用 `\"abear\"` 和 `\"solidiform\"` 两个会在副本 key 上产生碰撞的字符串，并验证不同添加顺序下 `Get` 结果一致。这说明实现需要保证碰撞处理具有确定性，不能依赖 map 遍历顺序。\n\n`TestConcurrentGetSet` 同时运行多个 `Set` 和 `Get` goroutine，验证一致性哈希实现需要支持并发读写。维护该包时应特别关注锁粒度、内部切片替换和 map 更新的一致性。\n\n示例用法：\n\n```go\nc := New()\nc.Add(\"cacheA\")\nc.Add(\"cacheB\")\nc.Add(\"cacheC\")\n\nserver, err := c.Get(\"user_mcnulty\")\nif err != nil {\n    log.Fatal(err)\n}\nfmt.Println(server)\n```\n\n## 低层限流器测试覆盖\n\n`rate/rate_test.go` 面向 `rate` 包中的令牌桶限流器。测试中使用的主要 API 包括：\n\n| API | 作用 |\n|---|---|\n| `Limit` | 表示每秒令牌生成速率 |\n| `Inf` | 无限速率 |\n| `Every(interval)` | 将时间间隔转换为 `Limit` |\n| `NewLimiter(limit, burst)` | 创建限流器 |\n| `Allow()` | 尝试获取 1 个令牌 |\n| `AllowN(t, n)` | 在指定时间尝试获取 `n` 个令牌 |\n| `AllowAtMostN(n)` | 最多获取 `n` 个令牌，返回实际允许数量 |\n| `WaitN(ctx, n)` | 阻塞等待令牌，受 `context.Context` 取消和超时控制 |\n| `SetLimitAt(t, limit)` | 在指定时间调整速率 |\n| `Restore()` | 归还最近消耗的令牌 |\n| `reserveN(t, n, maxReserve)` | 内部预约令牌方法 |\n| `Reservation.CancelAt(t)` | 取消预约并归还可恢复令牌 |\n\n测试辅助函数体现了主要执行流：\n\n```go\nfunc run(t *testing.T, lim *Limiter, allows []allow) {\n    for i, allow := range allows {\n        ok := lim.AllowN(allow.t, allow.n)\n        // 校验指定时间点是否允许获取令牌\n    }\n}\n```\n\n```go\nfunc runReserve(t *testing.T, lim *Limiter, req request) *Reservation {\n    return runReserveMax(t, lim, req, InfDuration)\n}\n```\n\n```go\nfunc runWait(t *testing.T, lim *Limiter, w wait) {\n    start := time.Now()\n    err := lim.WaitN(w.ctx, w.n)\n    delay := time.Now().Sub(start)\n    // 校验等待耗时和错误结果\n}\n```\n\n这些测试重点覆盖以下行为：\n\n| 场景 | 代表测试 |\n|---|---|\n| burst 上限 | `TestLimiterBurst1`、`TestLimiterBurst3` |\n| 时间回退 | `TestLimiterJumpBack`、`TestReserveJumpBack` |\n| 并发请求 | `TestSimultaneousRequests` |\n| 长时间 QPS 近似 | `TestLongRunningQPS` |\n| 预约与取消 | `TestSimpleReserve`、`TestCancelLast`、`TestCancelMulti` |\n| 动态调整速率 | `TestReserveSetLimit`、`TestReserveSetLimitCancel` |\n| 等待、取消、超时 | `TestWaitSimple`、`TestWaitCancel`、`TestWaitTimeout` |\n| 无限速率 | `TestWaitInf` |\n| 令牌恢复 | `TestRestore` |\n\n维护 `Limiter` 时，最容易引入回归的点是 `tokens`、`last`、`lastEvent` 三者之间的关系。取消预约时并不总是完整归还请求的令牌数，测试中的 `TestCancel0Tokens`、`TestCancel1Token`、`TestCancelMulti` 覆盖了这种细节。\n\n## 业务级 TokenBuckets\n\n`token/token_bucket_test.go` 测试 `token` 包中的业务限流封装。它基于 `code.byted.org/videoarch/james-sdk/model` 中的 `model.LimiterConfig` 和 `model.Config` 配置限流规则。\n\n核心入口包括：\n\n| API | 作用 |\n|---|---|\n| `NewTokenBuckets(psm, options...)` | 创建业务限流桶集合 |\n| `WithLocalConfig(config)` | 使用本地静态配置 |\n| `WithRemoteConfig(fetch, interval)` | 周期性拉取远端配置 |\n| `Allow(key)` | 判断指定 key 是否允许通过 |\n| `IsThrottled(key, extra1, extra2, n)` | 判断指定 key 和请求量是否会被限流 |\n\n测试中的配置构造：\n\n```go\nfunc testConfig() (*model.LimiterConfig, error) {\n    return &model.LimiterConfig{Configs: map[string]*model.Config{\n        \"a\":         {Qps: 1000, Burst: 20000},\n        \"b\":         {Qps: 2, Burst: 2},\n        \"throttle\":  {Qps: 10, Burst: 10},\n        \"throttle1\": {Qps: 10},\n    }}, nil\n}\n```\n\n`TestAllow` 验证 `Qps: 2, Burst: 2` 的 key `\"b\"` 连续两次允许，第三次拒绝。`TestDefaultBurst` 验证当 `Burst` 缺省时会使用默认 burst；当 `Qps` 为 `0` 或负数时，`Allow` 返回 `false`。\n\n`TestIsThrottled` 同时验证直接按请求量判断和实际消费令牌后的限流状态。测试里所有 metrics 相关函数都会通过 `mockey.Mock` 置空：\n\n```go\nmockey.Mock(metrics.EmitCounter).Return().Build()\nmockey.Mock(metrics.EmitStore).Return().Build()\nmockey.Mock(metrics.EmitTimer).Return().Build()\nmockey.Mock(metrics.CtxEmitCounter).Return().Build()\nmockey.Mock(metrics.CtxEmitStore).Return().Build()\nmockey.Mock(metrics.CtxEmitTimer).Return().Build()\n```\n\n这说明 `TokenBuckets` 的正常路径会打点；写单测时如果不关心指标，应 mock 掉 `metrics` 包，避免测试依赖外部监控环境。\n\n远端配置测试通过 `WithRemoteConfig(getFromEtcd, time.Minute)` 接入 etcd：\n\n```go\nfunc getFromEtcd() (*model.LimiterConfig, error) {\n    defaultValue := \"default\"\n    str, err := etcdutil.Get(etcdKey, defaultValue)\n    if err != nil || str == defaultValue {\n        return nil, nil\n    }\n\n    m := &model.LimiterConfig{}\n    json.Unmarshal([]byte(str), &m)\n    return m, nil\n}\n```\n\n当 etcd 不存在配置或读取失败时，`getFromEtcd` 返回 `nil, nil`。调用方需要支持空配置结果。\n\n## 地址发现与 Token 分组\n\n`addr/addr_test.go` 使用：\n\n```go\nc := NewConsulAddr(\"toutiao.videoarch.video_data_access\", \"write\")\nfmt.Println(c.GetAddrs(\"1\"))\n```\n\n这表明 `addr` 包封装了基于 Consul 的服务地址发现，并按参数 key 获取地址列表。测试多次调用 `GetAddrs`，覆盖相同 key 和不同 key 的重复查询行为。实现上通常需要关注缓存、一致性哈希或负载分配结果是否稳定。\n\n`tokens/group_test.go` 调用：\n\n```go\nans := GetAllInitInfos()\nlogs.Info(\"get all token buckets:/n%+v\", ans)\n```\n\n`GetAllInitInfos` 用于获取所有已初始化 token bucket 的信息，适合排查启动后的限流配置加载状态。该测试只做日志输出，不做断言，因此更接近冒烟测试或调试入口。\n\n## 与主工程的连接方式\n\n`Other` 模块中的内容主要通过以下方式连接主工程：\n\n1. 构建链路通过 `build.sh` 产出 `toutiao.videoarch.harden`，再由 `bootstrap.sh` 以 `-psm`、`-conf-dir`、`-log-dir` 参数启动。\n2. 配置链路通过 `conf/*.yml` 为不同环境提供 `SyncTo`、`TargetJamesCluster`、`Tenant` 等运行参数。\n3. 协议链路通过 `udpserver/protocol/gen_proto.sh` 维护 protobuf 生成文件，确保 UDP payload 的 Go 代码来自 `payload.proto`。\n4. 基础能力链路通过 `consistent`、`rate`、`token`、`addr` 等包提供地址分配、限流和服务发现能力。\n5. 测试链路通过 `mockey`、`goconvey`、`ensure`、`testing/quick` 等工具覆盖边界行为、并发安全和性能特征。\n\n## 贡献注意事项\n\n修改 UDP payload 时，只改 `payload.proto` 并重新执行 `udpserver/protocol/gen_proto.sh`，不要手写 `payload.pb.go`。\n\n调整启动参数时，同步检查 `script/settings.py`、`script/bootstrap.sh` 和 `build.sh` 中的服务名规则。当前二进制名和 PSM 都依赖 `PRODUCT.SUBSYS.MODULE`。\n\n新增环境配置时，优先复用现有命名模式，例如：\n\n```text\n{region}.{env}.yml\n{region}.{env}.{biz}.yml\n```\n\n修改 `consistent` 包时，至少运行一致性哈希相关测试，重点关注 `TestAddCollision` 和 `TestConcurrentGetSet`。\n\n修改 `rate` 包时，重点运行预约、取消、等待和并发相关测试，因为这些测试覆盖内部时间状态和令牌回补逻辑。\n\n修改 `token` 包时，注意同时验证本地配置和远端配置路径，并在单测中 mock `metrics` 打点函数。","overview":"# harden — Wiki\n\n# harden\n\n`harden` 是一个 Go 1.18 实现的分布式限流服务，模块路径为 `code.byted.org/videoarch/harden`。它面向远程 HTTP 调用和 UDP 协议调用，按业务 `group` 和请求 key 管理令牌桶，在本机完成限流判断，并通过实例间同步把配额消耗传播到其他 Harden 节点。\n\n新开发者可以先把它理解成三层：\n\n1. 接入层接收请求：HTTP 远程限流接口、远端并发协调接口、UDP 预留协议。\n2. 核心层执行决策：按 `group/key` 找到 token bucket，再用令牌桶算法判断允许、预留或限流。\n3. 运行层维持服务状态：配置、地址发现、实例间同步和指标上报。\n\n```mermaid\nflowchart TD\n    入口[\"应用入口\"]\n    配置[\"运行时配置\"]\n    远程接口[\"远程限流 HTTP API\"]\n    UDP[\"UDP 协议入口\"]\n    并发协调[\"远端并发协调\"]\n    令牌桶[\"分组令牌桶\"]\n    限流核心[\"令牌桶算法核心\"]\n    同步[\"实例间同步客户端\"]\n    地址[\"地址发现与一致性哈希\"]\n    指标[\"可观测性指标\"]\n\n    入口 --> 配置\n    入口 --> 远程接口\n    入口 --> UDP\n    远程接口 --> 令牌桶\n    UDP --> 令牌桶\n    并发协调 --> 指标\n    令牌桶 --> 限流核心\n    令牌桶 --> 配置\n    远程接口 --> 同步\n    UDP --> 同步\n    同步 --> 地址\n    远程接口 --> 指标\n    UDP --> 指标\n    同步 --> 指标\n    指标 --> 配置\n```\n\n服务从 [Application Entry and Tooling](application-entry-and-tooling.md) 启动。`main.go` 会初始化 TCC、Hertz、本地 YAML 配置、指标系统、token bucket 全局状态、同步 worker，并挂载 HTTP 与 UDP 服务入口。静态配置由 [Runtime Configuration](runtime-configuration.md) 中的 `config.Init(dir)` 加载，动态配置通过 TCC 读取，例如 goroutine 池容量、同步发送间隔和指标精度策略。\n\n限流主路径在 [Remote Rate Limit API](remote-rate-limit-api.md)。HTTP handler 负责解析请求参数、校验调用来源、读取 `group`，然后调用 [Token Buckets](token-buckets.md) 中按分组管理的 bucket。真正的令牌补充、消费、预留和等待逻辑由 [Rate Limiting Core](rate-limiting-core.md) 提供；它基于令牌桶模型，支持立即判断、未来预订、阻塞等待、归还令牌和限流状态检查。\n\n当一次 HTTP 限流请求消耗了本地配额后，接口层会调用 [Synchronization Clients](synchronization-clients.md) 把这次消耗异步同步给其他 Harden 实例。同步客户端会先在内存中聚合配额，再周期性打包、按目标地址分组、进入发送队列，最后由 worker 批量发送 HTTP 请求。目标地址来自 [Address Discovery](address-discovery.md)，该模块通过 Consul 获取服务实例，并使用 [Consistent Hashing](consistent-hashing.md) 保证同一个 key 在地址集合稳定时尽量落到同一台实例。\n\nUDP 调用路径由 [UDP Server Protocol](udp-server-protocol.md) 承担。客户端发送 protobuf 编码的 `ReserveNRequest`，服务端解码后按 `group`、`preferred`、`fallback`、`mode` 和 `quota` 调用本地 token bucket，返回 `ReserveNResponse.permit`。如果需要修改 UDP 协议，应修改 `udpserver/protocol/payload.proto`，再执行 `gen_proto.sh` 生成 `payload.pb.go`，不要直接编辑生成文件。\n\n除了限流，仓库还提供 [Remote Coordination](remote-coordination.md)，用于按 `group/name` 做远端并发占用控制。客户端通过 `ConEnter` 申请并发名额，通过 `ConLeave` 释放名额；服务端在内存中维护当前 `uuid` 占用集合，并按配置中心中的并发上限判断是否允许进入。\n\n[Observability](observability.md) 贯穿所有关键路径。HTTP 限流、UDP 预留、同步发送、并发协调和初始化流程都会上报吞吐、耗时、异常、当前并发或 token 消耗指标。指标通道会根据 TCC 中的精度配置选择高精度或低精度上报，因此常见执行流会从业务入口进入 `metrics.GetMetrics`，再读取 `tcc.GetPrecisionConfig` 决定实际上报方式。\n\n端到端看，一个典型 HTTP 限流请求会经历：客户端请求远程限流 API，API 获取对应 `group` 的 token bucket，核心限流器计算可放行额度，结果写回客户端，同时本次消费进入同步客户端并异步传播到其他实例，整个过程持续打点。一个典型 UDP 预留请求则更轻量：UDP server 收包、解码、调用 token bucket、回包，并按配置精度上报指标。\n\n本地开发时需要 Go 1.18，并确保内部依赖、Consul、TCC、配置目录和运行环境变量可用。常见入口是查看 `build.sh` 和 `script/bootstrap.sh` 了解构建与启动方式；服务启动后，本地 YAML 配置会先加载到 `config.C`，运行期动态参数再由 TCC 覆盖或补充。","rate-limiting-core":"# Rate Limiting Core\n\n## 模块概览\n\n`rate` 包实现了基于令牌桶的限流核心。`Limiter` 按 `Limit` 指定的速率补充令牌，按 `burst` 限制桶容量和单次可消费的最大令牌数。调用方可以选择三种消费模式：\n\n- `Allow` / `AllowN`：立即尝试获取令牌，失败时直接返回 `false`。\n- `Reserve` / `ReserveN`：预订未来令牌，返回需要等待到 `Reservation.timeToAct` 的时间。\n- `Wait` / `WaitN`：阻塞等待令牌，受 `context.Context` 取消和 deadline 约束。\n\n该包来源接近 Go 官方 `x/time/rate` 的实现，并扩展了 `RestoreN`、`AllowAtMostN`、`IsThrottled`、`NewLimiterWithInitValues`、`CheckMetricsTime` 等项目内能力。\n\n## 核心类型\n\n### `Limit`\n\n`Limit` 表示每秒允许发生的事件数：\n\n```go\ntype Limit float64\n```\n\n常用构造方式是 `Every(interval time.Duration)`，它把“事件之间的最小间隔”转换成每秒速率：\n\n```go\nlim := rate.NewLimiter(rate.Every(100*time.Millisecond), 10) // 每秒 10 个，突发 10 个\n```\n\n特殊值 `Inf` 表示无限速率。`limit == Inf` 时忽略 `burst`，所有请求都会被允许。\n\n### `Limiter`\n\n`Limiter` 是令牌桶本体：\n\n```go\ntype Limiter struct {\n    limit Limit\n    burst int64\n\n    mu     sync.Mutex\n    tokens float64\n    last   time.Time\n\n    lastEvent       time.Time\n    lastMetricsTime int64\n}\n```\n\n字段含义：\n\n- `limit`：令牌补充速率，单位是 token/second。\n- `burst`：桶容量，也是 `AllowN`、`ReserveN`、`WaitN` 单次请求的上限。\n- `tokens`：当前可用令牌数，允许为负数。负数表示已经预订了未来的令牌。\n- `last`：上一次计算并更新 `tokens` 的时间。\n- `lastEvent`：最近一次限流事件发生的时间，可以是未来时间，用于取消预订时计算可返还令牌。\n- `lastMetricsTime`：`CheckMetricsTime` 使用的秒级时间戳，用于控制指标更新频率。\n\n所有会读写核心状态的方法都通过 `mu` 加锁，`Limiter` 可以被多个 goroutine 并发使用。\n\n## 令牌桶执行流程\n\n核心逻辑集中在 `reserveN(now, n, maxFutureReserve)`。`AllowN`、`ReserveN`、`WaitN` 都最终走这条路径，只是传入的最大等待时间不同。\n\n```mermaid\nflowchart TD\n    A[\"AllowN / ReserveN / WaitN\"] --> B[\"reserveN\"]\n    B --> C[\"advance：按时间补充令牌\"]\n    C --> D[\"扣减 n 个令牌\"]\n    D --> E{\"令牌是否不足\"}\n    E -->|是| F[\"按 Limit 计算等待时间\"]\n    E -->|否| G[\"立即执行\"]\n    F --> H{\"n <= burst 且等待不超过上限\"}\n    G --> H\n    H -->|允许| I[\"更新 last / tokens / lastEvent\"]\n    H -->|拒绝| J[\"恢复 last，返回不可用 Reservation\"]\n```\n\n`advance(now)` 只计算新状态，不直接修改 `Limiter`。它根据 `now.Sub(last)` 计算补充的令牌数：\n\n```go\ndelta := lim.limit.tokensFromDuration(elapsed)\ntokens := lim.tokens + delta\nif tokens > float64(lim.burst) {\n    tokens = float64(lim.burst)\n}\n```\n\n这样可以保证桶内令牌不会超过 `burst`。\n\n## 消费模式\n\n### 立即丢弃：`Allow` 和 `AllowN`\n\n`Allow()` 等价于 `AllowN(time.Now(), 1)`。`AllowN(now, n)` 用于“超限就丢弃”的场景：\n\n```go\nif !lim.AllowN(time.Now(), 1) {\n    return // 当前没有足够令牌，直接跳过\n}\n```\n\n内部调用：\n\n```go\nfunc (lim *Limiter) AllowN(now time.Time, n int64) bool {\n    return lim.reserveN(now, n, 0).ok\n}\n```\n\n因为 `maxFutureReserve` 为 `0`，只有无需等待的请求才会成功。\n\n### 预订未来令牌：`Reserve` 和 `ReserveN`\n\n`ReserveN(now, n)` 适合调用方自己控制等待的场景。返回的 `Reservation` 记录了是否成功、应该何时执行、预订时的速率和令牌数量。\n\n```go\nr := lim.ReserveN(time.Now(), 1)\nif !r.OK() {\n    return\n}\ntime.Sleep(r.Delay())\n```\n\n当令牌不足但可在未来获得时，`ReserveN` 会让 `tokens` 变成负数，并把 `lastEvent` 推到未来。这意味着后续请求会看到已经被预订出去的令牌。\n\n### 阻塞等待：`Wait` 和 `WaitN`\n\n`WaitN(ctx, n)` 是多数业务调用最直接的入口。它先校验 `n` 是否超过 `burst`，再根据 `ctx.Deadline()` 计算最大可等待时间，最后通过 `reserveN` 预订令牌。\n\n如果等待期间 `ctx` 被取消，`WaitN` 会调用 `Reservation.Cancel()` 尽量返还预订令牌：\n\n```go\ncase <-ctx.Done():\n    r.Cancel()\n    return ctx.Err()\n```\n\n`limit == Inf` 时，`WaitN` 不受 `burst` 限制，立即成功。\n\n## 预订取消与令牌返还\n\n`Reservation.CancelAt(now)` 用于取消还没有执行的预订。它只在以下条件满足时尝试返还令牌：\n\n- `Reservation.ok == true`\n- `lim.limit != Inf`\n- `r.tokens != 0`\n- `r.timeToAct` 不早于 `now`\n\n返还量不是简单的 `r.tokens`，因为在该预订之后可能已经有其他预订。代码通过 `lim.lastEvent.Sub(r.timeToAct)` 计算后续预订消耗的令牌，只返还仍然可安全恢复的部分：\n\n```go\nrestoreTokens := float64(r.tokens) -\n    r.limit.tokensFromDuration(r.lim.lastEvent.Sub(r.timeToAct))\n```\n\n如果取消的是最后一个事件，`CancelAt` 还会尝试回退 `lim.lastEvent`，避免未来等待时间被无效预订继续占用。\n\n## 项目扩展方法\n\n### `Restore` 和 `RestoreN`\n\n`RestoreN(n)` 直接把令牌放回桶中，并把结果限制在 `burst` 以内。注释明确说明它会破坏限流精度，应只在 `AllowN` 成功后、部分令牌未使用时立即调用。\n\n```go\ngot := lim.AllowAtMostN(10)\n// 实际只使用了 7 个\nlim.RestoreN(got - 7)\n```\n\n### `AllowAtMostN`\n\n`AllowAtMostN(n)` 尽力获取最多 `n` 个令牌。令牌不足时返回当前可用的整数令牌数，而不是完全失败：\n\n- `limit == Inf`：直接返回 `n`。\n- `tokens < 0`：返回 `0`。\n- `0 <= tokens < n`：返回 `floor(tokens)`。\n- `tokens >= n`：返回 `n`。\n\n该方法适合批量配额场景：调用方可以根据实际拿到的 token 数处理部分请求。\n\n### `IsThrottled`\n\n`IsThrottled(n)` 只判断当前是否会被限流，不消耗令牌。它会先处理两个快速路径：\n\n- `limit == Inf` 返回 `false`。\n- `n > burst` 返回 `true`。\n\n随后调用 `advance(time.Now())` 计算当前理论令牌数，并判断是否小于 `n`。\n\n### 动态配置\n\n`SetLimitAt(now, newLimit)` 会先调用 `advance(now)` 把旧速率下已经积累的令牌结算完，再更新 `limit`。`SetBurst(newBurst)` 只更新 `burst`，不会重新裁剪当前 `tokens`。\n\n`NewLimiterWithInitValues(r, b, last, tokens)` 允许调用方用外部持久化状态恢复限流器，项目中的 `InitTokenBucket` 会使用它初始化令牌桶。\n\n## 与其他模块的连接\n\n`rate` 包是底层限流算法，不直接依赖业务模块。业务侧通过 token bucket 层创建和管理 `Limiter`：\n\n- `token/token_bucket.go` 中的 `getLimiter`、`getFallbackLimiter` 使用 `NewLimiter`。\n- `InitTokenBucket` 使用 `NewLimiterWithInitValues` 恢复已有状态。\n- `updateConfig`、`getLimiter`、`getFallbackLimiter` 会构造 `Limit` 来更新或创建限流器。\n- `remote/v2/rate_limit.go`、`remote/sync.go`、`remote/v2/sync.go`、`udpserver/server.go` 会通过 `GetTokenBucket` 进入 token bucket 层，再间接使用本包。\n\n`types/reserve.go` 定义了远程预留接口的数据结构：\n\n```go\ntype ReserveRequest struct {\n    Group       string\n    Preferred   string\n    Fallback    string\n    Mode        string\n    Quota       int64\n    Flag        bool\n    ReserveFlag bool\n}\n\ntype ReserveResponse struct {\n    Group     string\n    Preferred string\n    Fallback  string\n    Permit    int64\n}\n```\n\n这些类型本身不执行限流逻辑，但会在 `syncer/sdk.go`、`remote/sync.go` 等模块中承载配额请求和返回结果，最终由 token bucket 和 `Limiter` 计算实际可用配额。\n\n## 贡献注意事项\n\n修改 `reserveN`、`advance`、`CancelAt` 时要同时考虑 `tokens`、`last`、`lastEvent` 三者的一致性。`tokens` 可以为负数，这是预订未来令牌的核心机制，不应被简单裁剪为 `0`。\n\n涉及等待行为时需要覆盖三类路径：立即成功、未来成功、超过 deadline 或取消失败。现有测试中的 `TestWaitSimple`、`TestWaitCancel`、`TestWaitTimeout` 是主要参考。\n\n涉及取消行为时要重点验证后续预订是否影响返还量。`TestCancel0Tokens`、`TestCancel1Token`、`TestCancelMulti` 覆盖了这类边界。\n\n如果新增批量消费能力，应明确它是“全有全无”还是“尽力获取”。当前代码中 `AllowN` 是全有全无，`AllowAtMostN` 是尽力获取，语义不要混用。","remote-coordination":"# Remote Coordination\n\n## 模块概览\n\n`conRemote` 模块实现远端并发协调服务，用于按 `group` 和 `name` 维度控制并发占用。客户端通过 `ConEnter` 申请一个并发名额，通过 `ConLeave` 释放名额；服务端在内存中维护当前占用的 `uuid` 集合，并从 James 配置中心获取每个 `group/name` 的并发上限。\n\n这个模块的核心设计是：\n\n- 配置按 `group` 缓存到 `remoteConfigs`，定时从 James 刷新。\n- 当前占用按 `(group, name)` 缓存到 `remoteConcurrents`。\n- 每个占用通过 `uuid` 标识，并带有过期时间，避免客户端未调用 `ConLeave` 时永久占用。\n- 所有入口都会上报 `metrics`，用于吞吐、延迟、异常和当前并发观测。\n\n## 对外入口\n\n### `ConEnter(c *hertz.RequestContext)`\n\n`ConEnter` 是申请并发名额的 HTTP handler。它读取请求 query 参数：\n\n- `group`：配置组名。\n- `name`：组内具体限流器名称。\n- `timeout`：本次占用的有效期，使用 `time.ParseDuration` 解析，例如 `1s`、`500ms`。\n- `uuid`：本次请求或业务任务的唯一标识。\n\n执行流程：\n\n1. 校验 `group`、`name`、`timeout`、`uuid` 是否为空。\n2. 解析 `timeout` 为 `time.Duration`。\n3. 调用 `getRemoteConfig(group, name)` 获取当前并发上限。\n4. 调用 `getOrCreateConcurrents(group, name)` 获取或创建本地并发桶。\n5. 先用 `GetUuidsLen()` 做一次快速满载判断。\n6. 调用 `putUuid(uuid, expireTime, curCon, group, name)` 原子写入。\n7. 返回 `ReturnJson`。\n\n返回状态码含义：\n\n- `201`，即 `NotFull`：成功占用，当前未满。\n- `202`，即 `Full`：当前并发已满，未占用。\n- `40001`，即 `ErrorParam`：缺少必需参数。\n- `40002`，即 `TimeoutParseError`：`timeout` 无法解析。\n- `40003`，即 `GetRemoteConfigError`：无法获取远端配置。\n\n`ConEnter` 中有两层满载检查。第一次通过 `GetUuidsLen()` 快速判断，第二次在 `putUuid` 持锁后再次检查 `len(li.uuids) >= curCon`，用于避免并发请求同时通过第一次检查后超额写入。\n\n### `ConLeave(c *hertz.RequestContext)`\n\n`ConLeave` 是释放并发名额的 HTTP handler。它读取请求 query 参数：\n\n- `group`\n- `name`\n- `uuid`\n\n执行流程：\n\n1. 校验参数。\n2. 通过 `getConcurrents(group, name)` 查找已有并发桶。\n3. 如果并发桶不存在，返回 `GetLimitersError`。\n4. 调用 `deleteUuid(uuid)` 删除占用。\n5. 返回 `Success`。\n\n`deleteUuid` 对不存在的 `uuid` 是幂等的：直接调用 Go 的 `delete`，不会报错。因此重复释放同一个 `uuid` 不会破坏状态。\n\n## 核心数据结构\n\n### 全局状态\n\n`baseInfo.go` 定义了两个主要全局缓存：\n\n```go\nvar (\n    remoteConcurrents = make(map[pair]*remoteConcurrent)\n    remoteConfigs     = make(map[string]*model.LimiterConConfig)\n)\n```\n\n`remoteConcurrents` 使用 `pair{group, name}` 作为 key，存储每个并发桶。  \n`remoteConfigs` 使用 `group` 作为 key，缓存 James 返回的 `*model.LimiterConConfig`。\n\n两个 map 分别由 `lockRemoteConcurrents` 和 `lockRemoteConfigs` 保护。读路径使用 `RLock`，写路径使用 `Lock`。\n\n### `pair`\n\n```go\ntype pair struct {\n    group string\n    name  string\n}\n```\n\n`pair` 用于把 `group` 和 `name` 组合成当前并发桶的唯一 key。\n\n### `remoteConcurrent`\n\n```go\ntype remoteConcurrent struct {\n    sync.RWMutex\n    uuids map[string]int64\n}\n```\n\n`remoteConcurrent` 表示一个 `(group, name)` 下的当前占用集合。`uuids` 的 key 是客户端传入的 `uuid`，value 是过期时间的 UnixNano。\n\n它提供以下方法：\n\n- `putUuid(uuid, lastTime, curCon, group, name) bool`\n- `deleteUuid(uuid string)`\n- `getUuid(uuid string) bool`\n- `GetUuidsLen() int`\n- `clearUuids(group, name string)`\n\n## 并发桶生命周期\n\n`getOrCreateConcurrents(group, name)` 使用双重检查模式创建并发桶：\n\n1. 先持读锁查询 `remoteConcurrents`。\n2. 未命中时获取写锁。\n3. 写锁内再次查询，防止多个 goroutine 重复创建。\n4. 创建 `remoteConcurrent{uuids: make(map[string]int64)}`。\n5. 启动两个后台 goroutine：\n   - `conInfo(group, name)`\n   - `clearUuids(group, name)`\n\n```mermaid\nflowchart TD\n    A[\"ConEnter\"] --> B[\"getRemoteConfig\"]\n    B --> C[\"James 配置\"]\n    A --> D[\"getOrCreateConcurrents\"]\n    D --> E[\"remoteConcurrent\"]\n    E --> F[\"putUuid\"]\n    E --> G[\"clearUuids\"]\n    E --> H[\"conInfo\"]\n    I[\"ConLeave\"] --> J[\"getConcurrents\"]\n    J --> K[\"deleteUuid\"]\n```\n\n`conInfo` 每 10 秒上报一次当前 `uuid` 数量：\n\n```go\nmetrics.EmitStore(\"conInfo\", li.GetUuidsLen(), metrics.Group, group, metrics.Name, name)\n```\n\n`clearUuids` 每 10 毫秒扫描一次 `uuids`，删除已经过期的占用，并上报清理数量和扫描耗时。\n\n## 配置获取与刷新\n\n### `getRemoteConfig(group, name string) (int, error)`\n\n`getRemoteConfig` 返回指定 `group/name` 的并发上限。它先从 `remoteConfigs` 读缓存，如果没有对应 `group`，则通过 `SingleFight.Do(group, ...)` 合并并发配置加载请求。\n\n首次加载流程：\n\n1. 调用 `getConConfig(group)`。\n2. 校验返回值类型是否为 `*model.LimiterConConfig`。\n3. 写入 `remoteConfigs[group]`。\n4. 首次成功写入后启动 `updateConfig(group, name)` goroutine。\n5. 从 `groupconfig.Configs[name]` 中读取 `Concurrent`。\n\n如果 `Configs[name]` 不存在或为 `nil`，返回错误并上报 `noNameConfig`。\n\n### `updateConfig(group, name string)`\n\n`updateConfig` 每 30 秒调用一次 `getConConfig(group)`，刷新 `remoteConfigs[group]`。\n\n如果刷新失败或返回空配置，模块不会覆盖旧配置。这一点很重要：配置中心临时不可用时，已有并发上限仍然生效，避免因为短暂网络或配置问题导致限流能力失效。\n\n### `getConConfig(group string)`\n\n`getConConfig` 是 James SDK 的薄封装：\n\n```go\njames.GetConGlobalConfig(group)\n```\n\n它把 James 返回的 `*model.LimiterConConfig` 交给本模块缓存和解析。\n\n## `uuid` 占用语义\n\n`putUuid` 是实际占用并发名额的关键方法。\n\n行为规则：\n\n- 如果 `uuid` 已存在，更新过期时间并返回 `true`。\n- 如果 `uuid` 不存在且当前数量已达到 `curCon`，返回 `false`。\n- 如果 `uuid` 不存在且未满，写入 `uuid -> lastTime` 并返回 `true`。\n\n这意味着同一个 `uuid` 重复调用 `ConEnter` 不会重复占用多个并发名额，而是刷新该 `uuid` 的过期时间。\n\n典型调用模式：\n\n```go\nflag := groupBucket.putUuid(\n    uuid,\n    time.Now().Add(timeouts).UnixNano(),\n    curCon,\n    group,\n    name,\n)\n```\n\n`clearUuids` 依赖该过期时间兜底释放占用。客户端正常情况下应调用 `ConLeave` 主动释放；如果客户端异常退出或网络中断，占用会在 `timeout` 到达后被清理。\n\n## 指标与可观测性\n\n模块通过 `metrics` 包上报请求结果、延迟、当前并发和后台任务状态。\n\n主要指标路径：\n\n- `ConEnter.<ConThroughput>`：进入请
