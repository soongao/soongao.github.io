求结果，例如 `errorParam`、`getConfigError`、`FirstFull`、`NotFull`、`SecondFull`。\n- `ConEnter.<ConLatency>`：进入请求延迟。\n- `ConLeave.<ConThroughput>`：释放请求结果，例如 `errParam`、`getLimitersError`、`success`。\n- `ConLeave.<ConLatency>`：释放请求延迟。\n- `putUuid.<ConThroughput>`：写入结果，例如 `repeatUuid`、`full`、`success`。\n- `clearOutDate.<ConThroughput>`：每轮过期清理数量。\n- `clearOutDate.<ConLatency>`：每轮清理耗时。\n- `conInfo`：周期性记录当前占用数量。\n- `updateConfig.<ConThroughput>`：配置初始化、刷新和错误状态。\n\n调用链中，`CtxEmitCounter` 会继续进入 `metrics.GetMetrics`、`tcc.GetPrecisionConfig` 和 `Precision`，因此本模块的请求指标会受到 TCC 精度配置影响。标签格式由 `metrics.FormTags` 统一处理。\n\n## 错误处理与特殊逻辑\n\n`ConEnter` 和 `ConLeave` 都使用 HTTP 200 返回业务状态，实际结果通过 JSON 中的 `Code` 表示。\n\n`conInfo` 和 `updateConfig` 都有 `recover` 保护，panic 会被捕获、记录日志，并上报 `metrics.Panic`。`clearUuids` 没有显式 `recover`，但逻辑只操作受锁保护的本地 map 和指标上报。\n\n`ConEnter` 中存在一个测试专用分支：\n\n```go\nif group == \"bytedance.videoarch.unit_testing_concurrent_server_error\" {\n    time.Sleep(5 * time.Second)\n    return\n}\n```\n\n该分支用于模拟服务端超时或异常响应场景。新增逻辑时应避免把业务行为绑定到这个测试 group。\n\n## 与代码库其他部分的连接\n\n`conRemote` 本身没有被调用方展示在当前模块内，通常由路由层把 `ConEnter` 和 `ConLeave` 注册为 Hertz HTTP handler。\n\n它依赖的外部模块包括：\n\n- `code.byted.org/middleware/hertz`：提供请求上下文和 JSON 响应。\n- `code.byted.org/videoarch/james-sdk/client`：通过 `GetConGlobalConfig` 获取远端并发配置。\n- `code.byted.org/videoarch/james-sdk/model`：定义 `LimiterConConfig`。\n- `code.byted.org/videoarch/harden/metrics`：上报吞吐、延迟、状态和当前并发。\n- `code.byted.org/gopkg/singleflight`：合并同一个 `group` 的并发配置初始化请求。\n- `code.byted.org/gopkg/logs`：记录参数错误、配置错误和 panic。\n\n## 修改建议\n\n修改这个模块时，需要特别注意以下约束：\n\n- 访问 `remoteConfigs` 必须使用 `lockRemoteConfigs`。\n- 访问 `remoteConcurrents` 必须使用 `lockRemoteConcurrents`。\n- 访问 `remoteConcurrent.uuids` 必须使用实例自身的 `Lock` 或 `RLock`。\n- `putUuid` 中的满载判断必须保留在持锁区间内，否则会出现并发超卖。\n- 新增返回码时应同步更新 `ReturnJson` 的调用点和指标状态。\n- 调整配置刷新策略时，应保留“刷新失败不覆盖旧配置”的行为，除非明确接受配置缺失导致限流不可用的风险。\n- 调整 `clearUuids` 频率时，需要权衡释放及时性和每个并发桶一个 goroutine 带来的扫描成本。","remote-rate-limit-api":"# Remote Rate Limit API\n\n## 模块概览\n\nRemote Rate Limit API 是 `harden` 的远程限流 HTTP 接口层。模块基于 Hertz 的 `*hertz.RequestContext` 处理请求参数、校验调用来源、调用本地令牌桶，并把消费结果同步给其他实例。\n\n它本身不实现限流算法。核心限流逻辑委托给：\n\n- `tokens.GetTokenBucket(group)`：按 `group` 获取令牌桶。\n- `(*TokenBucket).AllowAtMostN(...)`：尝试消费最多 `quota` 个令牌。\n- `(*TokenBucket).ForceReserveN(...)`：强制预留指定数量令牌。\n- `(*TokenBucket).IsThrottled(...)`：判断当前请求是否会被限流。\n- `syncer.Sync(...)` / `syncer/v2.Sync(...)`：把本次令牌消费同步到其他节点。\n- `metrics.CtxEmitCounter(...)`、`metrics.CtxEmitTimer(...)`、`metrics.CtxEmitRateCounter(...)`：记录吞吐、延迟、计费和令牌消耗指标。\n\n```mermaid\nflowchart TD\n    请求[\"HTTP 请求\"] --> 参数[\"解析 query/body\"]\n    参数 --> 桶[\"tokens.GetTokenBucket\"]\n    桶 --> 限流[\"AllowAtMostN / ForceReserveN / IsThrottled\"]\n    限流 --> 同步[\"syncer.Sync / syncer/v2.Sync\"]\n    限流 --> 指标[\"metrics 上报\"]\n    同步 --> 响应[\"Hertz JSON 响应\"]\n    指标 --> 响应\n```\n\n## 目录结构\n\n该模块包含两组接口实现：\n\n- `remote/*.go`：v1 远程限流 API。\n- `remote/v2/*.go`：v2 远程限流 API，文件路径在 `remote/v2` 下，但 Go package 仍声明为 `remote`。\n\n公共错误和调用标识定义在 `remote/baseInfo.go`：\n\n```go\nvar (\n    ErrInvalidGroup = errors.New(\"invalid param: group\")\n    ErrInvalidName  = errors.New(\"invalid param: name\")\n    ErrInvalidUA    = errors.New(\"invalid User-Agent\")\n    userAgent       = \"harden_gosdk\"\n)\n```\n\n`userAgent` 用于避免接口被误调用。代码注释明确说明它不是鉴权机制。\n\n## v1 `RateLimit`\n\n`remote.RateLimit(c *hertz.RequestContext)` 是 v1 的核心限流接口。\n\n### 请求参数\n\n通过 query string 读取参数：\n\n- `group`：必填，限流分组。\n- `preferred`：优先使用的限流 key。\n- `name`：兼容字段；当 `preferred` 为空时使用 `name`。\n- `fallback`：备用限流 key。\n- `mode`：转换为 `token.FallbackMode(mode)` 后传入令牌桶。\n- `quota`：本次请求希望消耗的令牌数；解析失败或小于 `1` 时按 `1` 处理。\n- `reserveFlag`：默认 `\"false\"`；为 `\"true\"` 时走强制预留逻辑。\n- `forceQuota`：额外强制预留的令牌数；非 `0` 时先调用 `ForceReserveN`。\n- `from_psm`：客户端 PSM，仅用于计费指标；为空时记为 `\"-\"`。\n\n请求头必须满足：\n\n```http\nUser-Agent: harden_gosdk\n```\n\n### 执行流程\n\n`RateLimit` 的主要路径如下：\n\n1. 解析 `group`、`preferred/name`、`fallback`、`mode`、`quota`、`reserveFlag` 等参数。\n2. 上报 `RateLimit.Bill` 计费指标，标签包含 `group`、`from_psm`、`version=v1`。\n3. 注册延迟指标 `RateLimit.Latency`。\n4. 对特殊测试 group `bytedance.videoarch.unit_testing_server_error` 睡眠 5 秒并直接返回。\n5. 校验 `group`、`preferred` 和 `User-Agent`。\n6. 通过 `tokens.GetTokenBucket(group)` 获取令牌桶。\n7. 如 `forceQuota != 0`，先执行 `t.ForceReserveN(...)`。\n8. 根据 `reserveFlag` 选择消费方式：\n   - `reserveFlag == \"true\"`：调用 `t.ForceReserveN(...)`，响应中的 `n` 等于请求的 `quota`。\n   - 其他情况：调用 `t.AllowAtMostN(...)`，响应中的 `n` 是实际通过的令牌数。\n9. 当 `n > 0` 时调用 `syncer.Sync(group, preferred, fallback, token.FallbackMode(mode), n, flag, reserve)`。\n10. 上报令牌通过、不通过、总量和接口吞吐指标。\n11. 返回 HTTP 200，JSON body 为整数 `n`。\n\n### 响应语义\n\n成功时返回：\n\n```json\n3\n```\n\n这里的数字表示本次实际允许通过的令牌数量。对于普通限流请求，它可能小于请求的 `quota`；对于 `reserveFlag=true` 的强制预留请求，代码会把 `n` 保持为请求的 `quota`。\n\n错误时返回 HTTP 400：\n\n- `group` 为空：`\"invalid param: group\"`\n- `preferred/name` 为空：`\"invalid param: name\"`\n- `User-Agent` 不匹配：`\"invalid User-Agent\"`\n\n## v1 `IsThrottled`\n\n`remote.IsThrottled(c *hertz.RequestContext)` 提供只读式限流探测。\n\n它和 `RateLimit` 使用相同的 `group`、`preferred/name`、`fallback`、`mode`、`quota` 参数解析规则，也要求：\n\n```http\nUser-Agent: harden_gosdk\n```\n\n核心区别是它调用：\n\n```go\nt.IsThrottled(preferred, fallback, token.FallbackMode(mode), quota)\n```\n\n而不是消费令牌。\n\n返回值是整数：\n\n- `1`：会被限流。\n- `0`：不会被限流。\n\n该接口同样会上报 `IsThrottled.Latency` 和 `IsThrottled.Throughput`。调用图显示，`IsThrottled` 的指标链路会经过 `metrics.GetMetrics`、`tcc.GetPrecisionConfig`，最终关联到 TCC 精度配置读取。\n\n## v1 `Sync`\n\n`remote.Sync(c *hertz.RequestContext)` 用于批量同步令牌消费请求。请求体是 JSON 数组，元素类型为 `types.ReserveRequest`。\n\n反序列化失败时：\n\n- 记录 warn 日志。\n- 返回 HTTP 400。\n- 上报 `Sync.Throughput`，状态为 `UnmarshalError`。\n\n成功时逐条处理请求：\n\n1. 调用 `tokens.GetTokenBucket(req.Group)` 获取令牌桶。\n2. 默认 `permit = req.Quota`。\n3. 如果 `req.ReserveFlag` 为真，调用 `ForceReserveN(...)`。\n4. 否则调用 `AllowAtMostN(...)`，并用返回值更新 `permit`。\n5. 上报 `harden.server.total.tokens`，标签包含 `group`、`preferred`、`fallback`、`mode`、`version=v1`。\n6. 构造 `types.ReserveResponse`，字段包括 `Group`、`Preferred`、`Fallback`、`Permit`。\n\n成功响应是 `[]types.ReserveResponse`。\n\n## v2 `RateLimit`\n\n`remote/v2/rate_limit.go` 中的 `RateLimit(c *hertz.RequestContext)` 是 v2 限流接口实现。\n\n它和 v1 的整体流程一致，但有几个重要差异：\n\n- 不校验 `group` 是否为空。\n- 不支持 `name` 作为 `preferred` 的兼容字段。\n- 不校验 `User-Agent`。\n- 指标标签使用 `version=v2`。\n- 同步调用为 `syncer/v2.Sync(group, preferred, fallback, token.FallbackMode(mode), n)`。\n- `ForceReserveN` 返回的 `flag` 不再用于同步参数。\n- `reserveFlag == \"true\"` 时仍调用 `ForceReserveN(...)`，但不接收返回值。\n\nv2 更像内部节点间或新版 SDK 使用的轻量接口，入口层校验更少，依赖调用方保证参数正确。\n\n## v2 `Sync`\n\n`remote/v2/sync.go` 中的 `Sync(c *hertz.RequestContext)` 用于 v2 跨实例同步。请求体是 `[]types/v2.SyncRequest`：\n\n```go\ntype SyncKey struct {\n    Group     string\n    Preferred string\n    Fallback  string\n    Mode      string\n}\n\ntype SyncRequest struct {\n    SyncKey\n    Quota int64\n}\n```\n\n处理逻辑：\n\n1. 反序列化请求体。\n2. 读取 query 参数 `pod_name`。\n3. 如果 `env.PodName() != podName`，说明同步请求来自其他 Pod，才执行本地强制预留。\n4. 对每个请求调用：\n\n```go\ntokens.GetTokenBucket(req.Group).ForceReserveN(\n    req.Preferred,\n    req.Fallback,\n    token.FallbackMode(req.Mode),\n    time.Now(),\n    req.Quota,\n)\n```\n\n5. 上报 `harden.server.total.tokens`，版本标签为 `v2`。\n6. 返回 HTTP 200，body 为 `nil`。\n\n这个 `pod_name` 判断避免当前 Pod 消费令牌后又通过同步请求重复扣减自身令牌。\n\n## v2 `GetAllTokenBuckets`\n\n`remote/v2/get_all_token_buckets.go` 提供：\n\n```go\nfunc GetAllTokenBuckets(c *hertz.RequestContext)\n```\n\n它直接返回：\n\n```go\ntokens.GetAllInitInfos()\n```\n\n该接口用于查看当前进程中已初始化的 token bucket 信息。它不做参数解析、权限校验或额外指标上报。\n\n## 限流与同步的关系\n\n`RateLimit` 是入口，令牌桶是状态持有者，同步器负责把本地消费传播出去。\n\nv1 同步调用携带更多上下文：\n\n```go\nsyncer.Sync(group, preferred, fallback, mode, n, flag, reserve)\n```\n\n其中 `flag` 来自 `AllowAtMostN` 或 `ForceReserveN`，`reserve` 表示本次是否为强制预留。\n\nv2 同步调用更简单：\n\n```go\nv2.Sync(group, preferred, fallback, mode, n)\n```\n\n接收端 `remote/v2.Sync` 总是使用 `ForceReserveN` 应用同步过来的消耗。\n\n## 指标设计\n\n模块在接口层统一记录三类指标：\n\n- 延迟：`RateLimit.Latency`、`IsThrottled.Latency`、`Sync.Latency`。\n- 吞吐：`RateLimit.Throughput`、`IsThrottled.Throughput`、`Sync.Throughput`。\n- 令牌：`harden.server.tokens`、`harden.server.reserve.tokens`、`harden.server.total.tokens`。\n- 计费：`RateLimit.Bill`，标签包含 `from_psm`。\n\n常用标签包括：\n\n- `metrics.Group`\n- `metrics.Preferred`\n- `metrics.Fallback`\n- `metrics.Mode`\n- `metrics.ReserveFlag`\n- `metrics.FromPSM`\n- `metrics.Status`\n- `metrics.Version`\n\nv1 和 v2 通过 `metrics.Version` 区分。\n\n## 特殊测试入口\n\n`RateLimit`、`IsThrottled` 和 v2 `RateLimit` 都包含相同的测试分支：\n\n```go\nif group == \"bytedance.videoarch.unit_testing_server_error\" {\n    time.Sleep(5 * time.Second)\n    return\n}\n```\n\n该分支用于模拟服务端超时或异常延迟。它不会写 JSON 响应，也不会继续执行限流逻辑。\n\n## 贡献注意事项\n\n修改该模块时需要特别注意以下约束：\n\n- v1 `preferred` 兼容 `name`，v2 不兼容；不要无意改变 SDK 兼容行为。\n- v1 有 `User-Agent` 防误调校验，v2 没有；新增接口时需要明确选择哪种模式。\n- `quota` 解析失败会静默降级为 `1`，当前代码不会返回参数错误。\n- `forceQuota` 会额外计入 `harden.server.reserve.tokens` 和 `harden.server.tokens`。\n- `Sync` 接口处理的是批量请求，单条失败没有独立错误响应。\n- v2 同步依赖 `pod_name` 避免本 Pod 重复扣减，调用方必须正确传入源 Pod 名称。\n- `remote/v2` 目录下仍使用 `package remote`，注册路由时需要结合目录和导入路径确认具体函数来源。","remote-rate-limiting":"# Remote Rate Limiting\n\n## 模块概览\n\nRemote Rate Limiting 模块提供 Harden 服务端的远程限流 HTTP handler。它把请求参数解析为 token bucket 操作，并通过 `tokens.GetTokenBucket(group)` 取得对应分组的桶，再调用 `token.TokenBucket` 上的限流方法完成判定、扣减或同步。\n\n模块覆盖两代协议：\n\n- `remote`：v1 handler，包括 `RateLimit`、`IsThrottled`、`Sync`。\n- `remote/v2`：v2 handler，包括 `RateLimit`、`Sync`、`GetAllTokenBuckets`。\n- `types/v2`：v2 同步请求结构体 `SyncKey` 和 `SyncRequest`。\n\n核心依赖关系如下：\n\n```mermaid\nflowchart TD\n    A[\"HTTP handler\"] --> B[\"解析 query/body\"]\n    B --> C[\"tokens.GetTokenBucket\"]\n    C --> D[\"TokenBucket 配置刷新\"]\n    D --> E[\"AllowAtMostN / ForceReserveN / IsThrottled\"]\n    E --> F[\"syncer.Sync 或 syncer/v2.Sync\"]\n    E --> G[\"metrics 指标上报\"]\n    E --> H[\"hertz JSON 响应\"]\n```\n\n## 核心概念\n\n### group\n\n`group` 是 token bucket 的分组键。所有主要操作都会通过：\n\n```go\nt := tokens.GetTokenBucket(group)\n```\n\n拿到该分组对应的桶。执行流显示，`GetTokenBucket` 会进入 `token.TokenBucket` 的远程配置流程：\n\n```text\nGetTokenBucket -> WithRemoteConfig -> updateConfig -> Limit\n```\n\n因此 remote 层本身不维护限流配置，它只负责把 HTTP 请求转换为 bucket 操作。\n\n### preferred、fallback 和 mode\n\n`preferred` 是主限流维度，`fallback` 是备用维度，`mode` 会被转换为：\n\n```go\ntoken.FallbackMode(mode)\n```\n\n之后传给 token bucket 方法：\n\n```go\nt.AllowAtMostN(preferred, fallback, token.FallbackMode(mode), quota)\nt.ForceReserveN(preferred, fallback, token.FallbackMode(mode), time.Now(), quota)\nt.IsThrottled(preferred, fallback, token.FallbackMode(mode), quota)\n```\n\nv1 的 `RateLimit` 和 `IsThrottled` 支持兼容参数 `name`：\n\n```go\npreferred := c.Query(\"preferred\")\nif preferred == \"\" {\n    preferred = c.Query(\"name\")\n}\n```\n\nv2 的 `RateLimit` 不再读取 `name`，只读取 `preferred`。\n\n### quota\n\n`quota` 表示本次最多申请的 token 数。`RateLimit` 和 `IsThrottled` 都会把非法或缺省值归一到 `1`：\n\n```go\nquota, _ := strconv.ParseInt(c.Query(\"quota\"), 10, 64)\nif quota < 1 {\n    quota = 1\n}\n```\n\n返回值语义：\n\n- `RateLimit` 返回实际放行的 token 数 `n`。\n- `IsThrottled` 返回 `0` 或 `1`，其中 `1` 表示被限流。\n- `Sync` 的返回取决于版本：v1 返回每个请求的 `Permit`，v2 返回 `nil`。\n\n## v1 handler\n\n### `remote.RateLimit`\n\n`RateLimit(c *hertz.RequestContext)` 是 v1 的主要远程扣减接口。它读取 query 参数，执行限流扣减，并把实际通过数量返回给调用方。\n\n主要参数：\n\n| 参数 | 说明 |\n| --- | --- |\n| `group` | token bucket 分组，必填 |\n| `preferred` | 主限流维度，优先读取 |\n| `name` | v1 兼容参数，当 `preferred` 为空时使用 |\n| `fallback` | 备用限流维度 |\n| `mode` | fallback 模式，转换为 `token.FallbackMode` |\n| `quota` | 申请 token 数，小于 `1` 时按 `1` 处理 |\n| `reserveFlag` | 为 `\"true\"` 时强制预留，否则按正常限流申请 |\n| `forceQuota` | 非零时额外执行一次强制预留 |\n| `from_psm` | 客户端 PSM，只用于账单指标标签 |\n\n执行流程：\n\n```mermaid\nflowchart TD\n    A[\"remote.RateLimit v1\"] --> B[\"校验 group / preferred / User-Agent\"]\n    B --> C[\"解析 quota / forceQuota / reserveFlag\"]\n    C --> D[\"tokens.GetTokenBucket\"]\n    D --> E{\"reserveFlag == true\"}\n    E -->|是| F[\"ForceReserveN\"]\n    E -->|否| G[\"AllowAtMostN\"]\n    F --> H[\"syncer.Sync\"]\n    G --> H\n    H --> I[\"上报 metrics 并返回 n\"]\n```\n\n关键行为：\n\n1. 先上报账单指标 `RateLimit.Bill`，标签包含 `group`、`from_psm`、`version=v1`。\n2. 使用 `defer metrics.CtxEmitTimer` 记录 `RateLimit.Latency`。\n3. 当 `group == \"bytedance.videoarch.unit_testing_server_error\"` 时 sleep 5 秒后直接返回，用于单测模拟服务端超时。\n4. 校验 `group` 和 `preferred`，失败时返回 `400`。\n5. 校验 `User-Agent` 必须等于包内变量 `userAgent`，即 `\"harden_gosdk\"`。\n6. 根据 `reserveFlag` 选择调用：\n   - `\"true\"`：`ForceReserveN(...)`\n   - 其他值：`AllowAtMostN(...)`\n7. 当实际放行数 `n > 0` 时调用 `syncer.Sync(group, preferred, fallback, mode, n, flag, reserve)` 同步到其他节点。\n8. 返回 HTTP `200`，body 为实际放行 token 数 `n`。\n\n`forceQuota` 是额外的强制预留通道：\n\n```go\nforceQuota, _ := strconv.ParseInt(c.Query(\"forceQuota\"), 10, 64)\nif forceQuota != 0 {\n    t.ForceReserveN(preferred, fallback, token.FallbackMode(mode), time.Now(), forceQuota)\n}\n```\n\n它不改变 `quota` 的申请流程，但会被计入部分指标：\n\n```go\nmetrics.CtxEmitCounter(c, \"harden.server.tokens\", n+forceQuota, ...)\nmetrics.CtxEmitCounter(c, \"harden.server.total.tokens\", n+forceQuota, ...)\n```\n\n### `remote.IsThrottled`\n\n`IsThrottled(c *hertz.RequestContext)` 只判断是否被限流，不执行 `syncer.Sync`。\n\n主要参数：\n\n| 参数 | 说明 |\n| --- | --- |\n| `group` | token bucket 分组，必填 |\n| `preferred` | 主限流维度 |\n| `name` | v1 兼容参数，当 `preferred` 为空时使用 |\n| `fallback` | 备用限流维度 |\n| `mode` | fallback 模式 |\n| `quota` | 判断所需 token 数，小于 `1` 时按 `1` 处理 |\n\n核心调用：\n\n```go\nthrottled := t.IsThrottled(preferred, fallback, token.FallbackMode(mode), quota)\n```\n\n响应 body 是整数：\n\n- `0`：未被限流\n- `1`：被限流\n\n它和 v1 `RateLimit` 使用相同的 `group`、`preferred`、`User-Agent` 校验逻辑，也会上报 `IsThrottled.Latency` 和 `IsThrottled.Throughput`。\n\n### `remote.Sync`\n\n`Sync(c *hertz.RequestContext)` 是 v1 节点间同步入口。它从 request body 读取 `[]types.ReserveRequest`，逐条在本地 token bucket 上执行同样的 token 操作。\n\n执行逻辑：\n\n```go\nvar requests []types.ReserveRequest\nerr := json.Unmarshal(data, &requests)\n```\n\n反序列化失败时：\n\n- 记录 warn 日志\n- 返回 HTTP `400`\n- 上报 `Sync.Throughput`，状态为 `UnmarshalError`\n\n每个请求会按 `ReserveFlag` 分支：\n\n```go\nif req.ReserveFlag {\n    t.ForceReserveN(req.Preferred, req.Fallback, token.FallbackMode(req.Mode), time.Now(), req.Quota)\n} else {\n    permit, _ = t.AllowAtMostN(req.Preferred, req.Fallback, token.FallbackMode(req.Mode), req.Quota)\n}\n```\n\n响应类型是 `[]types.ReserveResponse`，每条包含：\n\n```go\ntypes.ReserveResponse{\n    Group:     req.Group,\n    Preferred: req.Preferred,\n    Fallback:  req.Fallback,\n    Permit:    permit,\n}\n```\n\n这里的 `Permit` 是实际应用到本地 bucket 的 token 数。`ReserveFlag == true` 时，代码保留初始值 `permit := req.Quota`。\n\n## v2 handler\n\n### `remote/v2.RateLimit`\n\n`remote/v2/rate_limit.go` 中的 `RateLimit(c *hertz.RequestContext)` 是 v2 限流入口。它和 v1 的职责相同，但协议行为更轻：\n\n- 不校验 `group` 为空。\n- 不校验 `preferred` 为空。\n- 不检查 `User-Agent`。\n- 不支持 `name` 兼容参数。\n- 同步调用改为 `syncer/v2.Sync(group, preferred, fallback, mode, n)`。\n- 指标标签中的 `version` 为 `\"v2\"`。\n\n核心流程仍然是：\n\n```go\nt := tokens.GetTokenBucket(group)\n\nif forceQuota != 0 {\n    t.ForceReserveN(preferred, fallback, token.FallbackMode(mode), time.Now(), forceQuota)\n}\n\nif reserveFlag == \"true\" {\n    t.ForceReserveN(preferred, fallback, token.FallbackMode(mode), time.Now(), quota)\n} else {\n    n, _ = t.AllowAtMostN(preferred, fallback, token.FallbackMode(mode), quota)\n}\n\nif n > 0 {\n    v2.Sync(group, preferred, fallback, token.FallbackMode(mode), n)\n}\n```\n\n需要注意一个实现细节：当 `reserveFlag == \"true\"` 时，`n` 保持初始值 `quota`，因为 `ForceReserveN` 的返回值没有赋给 `n`。因此响应会返回请求的 `quota`。\n\n### `remote/v2.Sync`\n\n`remote/v2/sync.go` 中的 `Sync(c *hertz.RequestContext)` 是 v2 节点同步入口。它读取 body 中的 `[]types/v2.SyncRequest`。\n\nv2 同步请求结构定义在 `types/v2/sync_struct.go`：\n\n```go\ntype SyncKey struct {\n    Group     string\n    Preferred string\n    Fallback  string\n    Mode      string\n}\n\ntype SyncRequest struct {\n    SyncKey\n    Quota int64\n}\n```\n\nv2 同步和 v1 的主要区别是通过 `pod_name` 避免本 Pod 重放自己的同步请求：\n\n```go\npodName := c.Query(\"pod_name\")\nif env.PodName() != podName {\n    for _, req := range requests {\n        tokens.GetTokenBucket(req.Group).ForceReserveN(...)\n    }\n}\n```\n\n也就是说：\n\n- 如果 `pod_name` 等于当前 `env.PodName()`，handler 不执行本地 token 预留，只返回成功。\n- 如果 `pod_name` 不是当前 Pod，handler 对每条请求执行 `ForceReserveN`。\n- v2 同步不调用 `AllowAtMostN`，同步请求都以强制预留方式落地。\n- 响应固定为 HTTP `200`，body 为 `nil`。\n\n### `remote/v2.GetAllTokenBuckets`\n\n`GetAllTokenBuckets(c *hertz.RequestContext)` 是一个只读 handler：\n\n```go\nfunc GetAllTokenBuckets(c *hertz.RequestContext) {\n    c.JSON(hertz.StatusOK, tokens.GetAllInitInfos())\n}\n```\n\n它直接返回 `tokens.GetAllInitInfos()`，用于暴露当前 token bucket 初始化信息。代码中没有额外鉴权、过滤或指标上报。\n\n## 错误和校验\n\n通用错误定义在 `remote/baseInfo.go`：\n\n```go\nvar (\n    ErrInvalidGroup = errors.New(\"invalid param: group\")\n    ErrInvalidName  = errors.New(\"invalid param: name\")\n    ErrInvalidUA    = errors.New(\"invalid User-Agent\")\n    userAgent       = \"harden_gosdk\"\n)\n```\n\nv1 `RateLimit` 和 `IsThrottled` 会使用这些错误：\n\n| 场景 | HTTP 状态码 | 响应 |\n| --- | --- | --- |\n| `group == \"\"` | `400` | `\"invalid param: group\"` |\n| `preferred == \"\"` 且 `name == \"\"` | `400` | `\"invalid param: name\"` |\n| `User-Agent != \"harden_gosdk\"` | `400` | `\"invalid User-Agent\"` |\n\n`Sync` 的 JSON 解析失败返回 `400` 和 `nil`。\n\nv2 `RateLimit`、`Sync`、`GetAllTokenBuckets` 当前没有复用这些参数校验逻辑。\n\n## 指标上报\n\nRemote 层大量使用 `metrics` 包记录延迟、吞吐和 token 消耗。执行流显示，指标上报会进入：\n\n```text\nCtxEmitCounter / CtxEmitRateCounter / CtxEmitTimer\n-> GetMetrics\n-> GetPrecisionConfig\n-> Precision\n```\n\n因此指标精度由 TCC 配置影响。\n\n常见指标包括：\n\n| 指标 | 使用位置 | 说明 |\n| --- | --- | --- |\n| `RateLimit.Latency` | v1/v2 `RateLimit` | 限流请求延迟 |\n| `RateLimit.Throughput` | v1/v2 `RateLimit` | 限流请求吞吐 |\n| `RateLimit.Bill` | v1/v2 `RateLimit` | 账单计数，包含 `from_psm` |\n| `IsThrottled.Latency` | v1 `IsThrottled` | 判断请求延迟 |\n| `IsThrottled.Throughput` | v1 `IsThrottled` | 判断请求吞吐 |\n| `Sync.Latency` | v1/v2 `Sync` | 同步请求延迟 |\n| `Sync.Throughput` | v1/v2 `Sync` | 同步请求吞吐 |\n| `harden.server.reserve.tokens` | v1/v2 `RateLimit` | `forceQuota` 预留 token 数 |\n| `harden.server.tokens` | v1/v2 `RateLimit` | 通过或未通过的 token 数 |\n| `harden.server.total.tokens` | v1/v2 `RateLimit`、`Sync` | 总 token 消耗 |\n\n主要标签包括：\n\n- `metrics.Group`\n- `metrics.Preferred`\n- `metrics.Fallback`\n- `metrics.Mode`\n- `metrics.ReserveFlag`\n- `metrics.FromPSM`\n- `metrics.Status`\n- `metrics.Version`\n\nv1 使用 `version=v1`，v2 使用 `version=v2`。\n\n## 与其他模块的连接\n\nRemote Rate Limiting 位于 HTTP 边界层，连接以下模块：\n\n| 模块 | 调用点 | 作用 |\n| --- | --- | --- |\n| `tokens` | `tokens.GetTokenBucket`、`tokens.GetAllInitInfos` | 获取分组 token bucket 或初始化信息 |\n| `token` | `AllowAtMostN`、`ForceReserveN`、`IsThrottled`、`FallbackMode` | 执行限流、强制预留和模式转换 |\n| `syncer` | v1 `syncer.Sync` | 将 v1 成功扣减同步给其他节点 |\n| `syncer/v2` | v2 `syncer/v2.Sync` | 将 v2 成功扣减同步给其他节点 |\n| `metrics` | `CtxEmitCounter`、`CtxEmitRateCounter`、`CtxEmitTimer` | 上报延迟、吞吐、账单和 token 指标 |\n| `types` | `types.ReserveRequest`、`types.ReserveResponse` | v1 同步请求与响应结构 |\n| `types/v2` | `SyncKey`、`SyncRequest` | v2 同步请求结构 |\n| `hertz` | `*hertz.RequestContext`、`c.Query`、`c.JSON` | HTTP 请求读取和响应写入 |\n\n## 贡献注意事项\n\n修改 v1 handler 时需要保持兼容行为，尤其是：\n\n- `preferred` 为空时回退到 `name`。\n- `User-Agent` 必须等于 `\"harden_gosdk\"`。\n- `group` 和 `preferred` 参数缺失时返回 `400`。\n- `reserveFlag` 默认值为 `\"false\"`。\n- `quota < 1` 时按 `1` 处理。\n\n修改 v2 handler 时要注意它不是 v1 的简单复制。v2 当前省略了 v1 的参数校验和 UA 检查，并且同步协议使用 `pod_name` 去重。为 v2 增加校验会改变现有调用方的兼容性，需要确认路由层和客户端 SDK 的约定。\n\n修改 token 同步逻辑时，需要同时检查：\n\n- 本地是否正确调用 `AllowAtMostN` 或 `ForceReserveN`。\n- 只有 `n > 0` 时才触发对外同步。\n- v1 同步是否仍需要 `flag` 和 `reserve`。\n- v2 同步是否仍通过 `pod_name` 跳过当前 Pod。\n- `harden.server.tokens`、`harden.server.total.tokens` 等指标是否仍能反映实际 token 消耗。","runtime-configuration":"# Runtime Configuration\n\n## 模块概览\n\nRuntime Configuration 模块负责两类运行时配置：\n\n1. 静态 YAML 配置：由 `config.Init(dir)` 通过 `caesar.Unmarshal` 加载到全局变量 `config.C`。\n2. 动态 TCC 配置：由 `tcc.InitTccClient()` 初始化 TCC 客户端，并通过 `GetGoRoutine`、`GetSendIntervalTime`、`GetPrecisionConfig` 在运行期读取。\n\n该模块没有复杂的内部调用链，但它位于服务启动和运行时路径上：`main` 初始化配置后，限流、同步、指标等模块会持续读取这些配置。\n\n```mermaid\nflowchart TD\n    Main[\"main\"]\n    StaticInit[\"config.Init(dir)\"]\n    GlobalConfig[\"config.C\"]\n    TccInit[\"tcc.InitTccClient()\"]\n    TccClient[\"tccClient / precisionConfig\"]\n    Syncer[\"syncer/v2/pack.go\"]\n    Metrics[\"metrics.GetMetrics\"]\n    Runtime[\"运行时行为\"]\n\n    Main --> StaticInit --> GlobalConfig\n    Main --> TccInit --> TccClient\n    Main --> Runtime\n    Runtime --> Syncer\n    Runtime --> Metrics\n    Syncer --> TccClient\n    Metrics --> TccClient\n```\n\n## 静态配置：`config` 包\n\n`config/config.go` 定义了进程级静态配置结构：\n\n```go\nvar (\n    C = &Config{}\n)\n\ntype Config struct {\n    SyncTo             []string `yaml:\"SyncTo\"`\n    Worker             int      `yaml:\"Worker\"`\n    Buffer             int      `yaml:\"Buffer\"`\n    TargetJamesCluster string   `yaml:\"TargetJamesCluster\"`\n    Tenant             string   `yaml:\"Tenant\"`\n}\n```\n\n`config.C` 是全局配置实例。服务代码通过这个变量读取 YAML 配置结果，测试代码中也直接构造或引用 `Config`。\n\n### `Init(dir string)`\n\n`Init` 是静态配置入口：\n\n```go\nfunc Init(dir string) {\n    if err := caesar.Unmarshal(C, dir); err != nil {\n        panic(err)\n    }\n    logs.Info(\"config: %+v\", C)\n}\n```\n\n它将 `dir` 指向的配置目录交给 `code.byted.org/videoarch/caesar_config` 解析，并把结果写入全局 `config.C`。加载失败会直接 `panic`，因此它应该在服务启动早期调用，避免进程进入半初始化状态。\n\n当前调用关系中，`main.go` 会调用 `config.Init`。测试里的 `token/token_bucket_test.go` 也会使用 `Config` 类型。\n\n## 静态配置文件\n\n`conf/` 目录包含基础配置、机房/集群覆盖配置，以及服务框架配置。\n\n### `base.yml`\n\n基础配置定义默认工作参数：\n\n```yaml\nWorker: 30\nBuffer: 10000\nTenant: videoarch.harden\n```\n\n这些字段对应 `Config.Worker`、`Config.Buffer` 和 `Config.Tenant`。\n\n### 同步目标：`SyncTo`\n\n多个环境文件定义 `SyncTo`，例如：\n\n```yaml\nSyncTo:\n  - \"lf\"\n  - \"alinc2\"\n  - \"lq\"\n```\n\n`SyncTo` 表示当前部署环境需要同步到的目标集群列表。部分文件中写成：\n\n```yaml\nSyncTo:\n```\n\n这种配置会被解析为没有具体目标的值，使用方需要能区分“没有同步目标”和“配置了多个同步目标”的情况。\n\n### James 目标集群：`TargetJamesCluster`\n\n部分环境文件定义：\n\n```yaml\nTargetJamesCluster: \"default_tob\"\n```\n\n或：\n\n```yaml\nTargetJamesCluster: \"staging\"\n```\n\n该字段用于指定目标 James 集群。按现有配置，常见值包括 `default_tob`、`default_tob_bp` 和 `staging`。\n\n### 租户：`Tenant`\n\n基础配置中默认是：\n\n```yaml\nTenant: videoarch.harden\n```\n\n部分环境覆盖为：\n\n```yaml\nTenant: default\n```\n\n例如 `boei18n.yml`、`sinfonline.yml`、`sinfonlinea.yml`、`sinfonlinec.yml`。\n\n### 服务框架配置\n\n`conf/toutiao_videoarch_harden.yaml` 定义 `Develop` 和 `Product` 两套运行模式配置，包括端口、日志、指标、pprof 和 tracing 开关。这部分不映射到 `config.Config`，而是供服务框架按自身规则读取。\n\n## 动态配置：`tcc` 包\n\n`tcc/tcc.go` 负责连接 TCC 并读取运行时可变配置。\n\n包级变量：\n\n```go\nvar (\n    tccClient       *tccclient.ClientV2\n    precisionConfig tccclient.Getter\n)\n```\n\n调用 `tcc.InitTccClient()` 前，这两个变量不会被初始化。依赖 TCC 的函数都假设初始化已经完成，因此服务启动流程必须先执行 `InitTccClient`。\n\n## `InitTccClient`\n\n```go\nfunc InitTccClient() {\n    conf := tccclient.NewConfigV2()\n    conf.SetFirstGetTimeout(5 * time.Second).SetFirstGetRetry(3)\n\n    var err error\n    tccClient, err = tccclient.NewClientV2(\"toutiao.videoarch.harden\", conf)\n    if err != nil {\n        logs.Info(\"tcc Client init error:%+v\", err)\n        panic(fmt.Sprintf(\"tcc Client init error:%v\", err))\n    }\n\n    precisionConfig = tccClient.NewGetter(\"precision\", json.Unmarshal, &Precision{})\n}\n```\n\n初始化行为：\n\n- 创建 `tccclient.ConfigV2`。\n- 首次拉取超时设置为 `5s`。\n- 首次拉取重试次数设置为 `3`。\n- 使用命名空间 `toutiao.videoarch.harden` 创建 `ClientV2`。\n- 初始化名为 `precision` 的 getter，并用 `json.Unmarshal` 解析到 `Precision`。\n\n如果 TCC 客户端创建失败，函数会记录日志并 `panic`。\n\n## `Precision`\n\n```go\ntype Precision struct {\n    HighClauses map[string]bool `json:\"high_clauses\"`\n    LowClusters map[string]bool `json:\"low_clusters\"`\n    HighGroups  map[string]bool `json:\"high_groups\"`\n}\n```\n\n`Precision` 是指标精度相关的动态配置结构。它由 TCC key `precision` 提供，JSON 字段名分别是：\n\n- `high_clauses`\n- `low_clusters`\n- `high_groups`\n\n调用链显示，`Precision` 主要通过指标路径被使用：\n\n```text\n业务路径 -> metrics.EmitCounter / EmitTimer -> metrics.GetMetrics -> tcc.GetPrecisionConfig -> Precision\n```\n\n典型入口包括：\n\n- `udpserver.Serve`\n- `udpserver.handleReserveN`\n- `tokens.InitAllInitInfos`\n- `syncer.batchedSync`\n- `conRemote.ConEnter`\n\n这说明 `Precision` 不直接控制主业务逻辑，而是影响指标聚合、上报或分类时的精度策略。\n\n## `GetPrecisionConfig(ctx context.Context)`\n\n```go\nfunc GetPrecisionConfig(ctx context.Context) *Precision {\n    if getter, err := precisionConfig(ctx); err != nil {\n        logs.CtxWarn(ctx, \"fail to get config from tcc err:%+v\", err)\n        return &Precision{\n            HighClauses: map[string]bool{},\n            LowClusters: map[string]bool{},\n            HighGroups:  map[string]bool{},\n        }\n    } else {\n        return getter.(*Precision)\n    }\n}\n```\n\n该函数从 TCC getter 读取 `precision` 配置。读取失败时不会中断业务，而是返回一个字段均为空 map 的 `Precision`，并记录 `CtxWarn`。\n\n这个降级策略很重要：指标路径通常不应该阻塞核心请求处理。调用方可以直接访问返回值中的 map，不需要额外处理 `nil` 的 `Precision` 指针。\n\n注意：函数内部会执行 `getter.(*Precision)` 类型断言。如果 `precisionConfig` 的解析目标或 TCC getter 行为被修改，需要保持返回值类型仍然是 `*Precision`。\n\n## `GetGoRoutine`\n\n```go\nfunc GetGoRoutine() int32\n```\n\n该函数读取 TCC key `goRoutine`，期望值是一个 JSON map：\n\n```json\n{\n  \"cluster:idc\": 1000,\n  \"cluster\": 2000\n}\n```\n\n解析后按以下优先级选择配置：\n\n1. `env.Cluster() + \":\" + env.IDC()`\n2. `env.Cluster()`\n3. 默认值 `10000`\n\n错误处理：\n\n- `tccClient.Get` 失败时记录错误日志，返回 `10000`。\n- JSON 反序列化失败时记录错误日志，返回 `10000`。\n- 当前集群没有匹配项时返回 `10000`。\n\n`main.go` 会调用 `GetGoRoutine`，因此这个值属于启动后运行时并发规模控制的一部分。\n\n## `GetSendIntervalTime`\n\n```go\nfunc GetSendIntervalTime() int\n```\n\n该函数读取 TCC key `sendIntervalTime`，期望值也是 JSON map：\n\n```json\n{\n  \"cluster:idc\": 25,\n  \"cluster\": 30\n}\n```\n\n选择优先级与 `GetGoRoutine` 一致：\n\n1. `env.Cluster() + \":\" + env.IDC()`\n2. `env.Cluster()`\n3. 默认值 `25`\n\n错误处理更安静：读取失败或 JSON 解析失败时直接返回 `25`，不记录错误日志。\n\n调用关系中，`syncer/v2/pack.go` 的 `syncing` 会调用 `GetSendIntervalTime`，因此它影响同步逻辑的发送间隔。\n\n## 初始化顺序\n\n服务启动时应先完成静态配置和 TCC 初始化，再进入依赖配置的业务逻辑：\n\n```go\nconfig.Init(confDir)\ntcc.InitTccClient()\n\ngoRoutine := tcc.GetGoRoutine()\n```\n\n如果在 `InitTccClient` 前调用 `GetGoRoutine`、`GetSendIntervalTime` 或 `GetPrecisionConfig`，代码中没有保护逻辑，可能因为 `tccClient` 或 `precisionConfig` 未初始化而触发运行时错误。\n\n## 运行时依赖关系\n\nRuntime Configuration 模块连接了多个业务区域：\n\n- `main.go`：启动时加载静态 YAML，并初始化 TCC 客户端。\n- `syncer/v2/pack.go`：通过 `GetSendIntervalTime` 获取同步发送间隔。\n- `metrics/metrics.go`：通过 `GetPrecisionConfig` 获取指标精度配置。\n- `token/token_bucket_test.go`：测试中直接使用 `Config` 类型。\n- `main.go`：通过 `GetGoRoutine` 获取运行时 goroutine 配额。\n\n整体设计是“启动时加载基础配置，运行时从 TCC 拉取可变配置”。静态配置适合部署环境差异，TCC 配置适合无需重新发布即可调整的运行参数。","sync-client":"# Sync Client\n\n## 模块概览\n\n`syncer` 是 Harden 的跨机房同步客户端，负责把本地限流路径产生的配额占用聚合成批量请求，并异步发送到其他 Harden 节点。模块包含两个版本：\n\n- `syncer`：v1 同步客户端，发送到 `/v1/sync`，并根据服务端返回的 `Permit` 结果在本地执行补偿预留。\n- `syncer/v2`：v2 同步客户端，发送到 `/v2/sync?pod_name=...`，只负责广播同步请求，不读取响应体做本地补偿。\n\n调用入口来自业务限流路径：\n\n- `udpserver/server.go` 的 `handleReserveN` 调用 `syncer.Sync`\n- `remote/rateLimit.go` 的 `RateLimit` 调用 `syncer.Sync`\n- `remote/v2/rate_limit.go` 的 `RateLimit` 调用 `syncer/v2.Sync`\n- `main.go` 分别调用 `syncer.Init` 和 `syncer/v2.Init` 启动后台同步循环\n\n## 核心执行模型\n\n同步客户端采用“调用方只入包、后台批量发送”的模型。限流路径调用 `Sync` 时不会直接发 HTTP 请求，而是把请求累加到内存中的 `packages` map。后台 `syncing` goroutine 周期性取出当前批次，按目标节点分组后写入 `queue`。多个 worker 从 `queue` 中消费并调用 `batchedSync` 发送 HTTP 批量请求。\n\n```mermaid\nflowchart LR\n    A[\"限流路径调用 Sync\"] --> B[\"pack / v2.Sync 累加 packages\"]\n    B --> C[\"syncing 周期性取出批次\"]\n    C --> D[\"按目标节点分组 boats\"]\n    D --> E[\"sailing 写入 queue\"]\n    E --> F[\"startWorker 消费队列\"]\n    F --> G[\"batchedSync 发送 HTTP\"]\n```\n\n这个设计把同步发送从限流主路径中剥离出来，主路径只做内存聚合和指标上报。实际网络发送由后台 worker 完成，并受 `config.C.Buffer` 和 `config.C.Worker` 控制。\n\n## 全局状态\n\nv1 和 v2 各自维护独立的全局状态，结构相同但请求类型不同。\n\nv1 位于 `syncer/base.go`：\n\n```go\nvar (\n    packageRW sync.RWMutex\n    packages  = map[string]*types.ReserveRequest{}\n\n    queue   chan *batchedReq\n    httpcli *http.Client\n)\n```\n\nv2 位于 `syncer/v2/base.go`：\n\n```go\nvar (\n    packageRW sync.RWMutex\n    packages  = map[v2.SyncKey]*v2.SyncRequest{}\n\n    queue   chan *batchedReq\n    httpcli *http.Client\n)\n```\n\n关键字段含义：\n\n- `packages`：当前等待打包发送的请求集合。v1 使用字符串 key，格式为 `group:preferred:fallback`；v2 使用结构化的 `v2.SyncKey`，包含 `Group`、`Preferred`、`Fallback`、`Mode`。\n- `packageRW`：保护 `packages` 的读写锁。\n- `queue`：后台发送队列，元素是 `batchedReq`。\n- `httpcli`：共享 HTTP 客户端，超时时间为 `Timeout`，当前值是 `200ms`。\n- `batchedReq`：一次发往单个目标节点的批量请求，包含 `server`、`reqs` 和入队时间 `t`。\n\n`startWorker` 会丢弃入队超过 1 秒的请求，并上报 `syncOutOfTime`，避免过旧同步继续影响当前状态。\n\n## 初始化与后台任务\n\n`Init` 是同步客户端的启动入口。v1 和 v2 的初始化逻辑基本一致：\n\n```go\nfunc Init() {\n    httpcli = &http.Client{Timeout: Timeout}\n    queue = make(chan *batchedReq, config.C.Buffer)\n    for i := 0; i < config.C.Worker; i++ {\n        go startWorker()\n    }\n    go syncing()\n    go stats()\n}\n```\n\n初始化会启动三类 goroutine：\n\n- `startWorker`：启动 `config.C.Worker` 个 worker，从 `queue` 消费 `batchedReq` 并调用 `batchedSync`。\n- `syncing`：周期性把 `packages` 中的请求切成批次，并按目标服务地址分组。\n- `stats`：每 5 秒记录当前同步队列长度。\n\nv1 的 `stats` 会同时调用 `metrics.EmitStore(\"InSyncQueue\", len(queue))` 并打印日志；v2 当前只打印日志。\n\n## v1 同步流程\n\n### `Sync`\n\nv1 对外入口是：\n\n```go\nfunc Sync(group, preferred, fallback string, mode token.FallbackMode, n int64, flag bool, reserveFlag bool)\n```\n\n参数含义来自限流路径：\n\n- `group`：限流组。\n- `preferred`：优先资源标识。\n- `fallback`：兜底资源标识。\n- `mode`：fallback 模式，常见值在后续逻辑中按 `\"shared\"` 和 `\"isolated\"` 判断。\n- `n`：本次需要同步的 quota 数量。\n- `flag`：影响目标地址选择。`true` 时使用 preferred；`false` 时根据 mode 选择 fallback 或 preferred:fallback。\n- `reserveFlag`：写入 `types.ReserveRequest.ReserveFlag`，随请求发送给服务端。\n\n`Sync` 首先调用 `tokens.GetSyncDomains(group)` 判断该 group 是否需要跨域同步。没有同步域时只上报 `whetherSync` 和 `whetherSyncTokens` 的 `noSync` 状态，然后返回。存在同步域时调用 `pack` 聚合请求，并上报 `sync` 状态。\n\n### `pack`\n\n`pack` 把同一个 `group/preferred/fallback` 的请求合并为一个 `types.ReserveRequest`：\n\n```go\nkey := group + \":\" + preferred + \":\" + fallback\natomic.AddInt64(&p.Quota, n)\n```\n\n实现上使用双重检查：\n\n1. 先用 `packageRW.RLock` 读取 `packages[key]`。\n2. 不存在时再加写锁创建 `types.ReserveRequest`。\n3. 最后通过 `atomic.AddInt64` 累加 `Quota`。\n\n需要注意，v1 的 key 不包含 `mode`、`flag` 或 `reserveFlag`。如果同一个 `group/preferred/fallback` 在同一打包周期内以不同模式进入，后进入的请求只会累加 `Quota`，不会更新已经创建的 `Mode`、`Flag` 或 `ReserveFlag`。\n\n### `syncing`\n\nv1 的打包周期由常量控制：\n\n```go\nconst sailInterval = time.Millisecond * 5\n```\n\n`syncing` 每 5ms 执行一次：\n\n1. 加写锁检查 `packages`。\n2. 如果为空，释放锁并等待下一轮。\n3. 如果非空，将当前 `packages` 整体赋给局部变量 `packed`。\n4. 把全局 `packages` 替换为新 map。\n5. 遍历 `packed`，按同步域和目标地址组织 `boats`。\n6. 异步调用 `sailing(boats)` 入队发送。\n\n这种“整体交换 map”的方式让新进入的 `Sync` 调用能立即写入新批次，减少后台打包对限流路径的阻塞时间。\n\n### 目标地址选择\n\nv1 按 `tokens.GetSyncDomains(p.Group)` 返回的同步域逐个发送。每个同步域通过 `addr.GetAddr(d)` 获取地址管理器，再根据请求状态选择具体地址：\n\n```go\nboat := addr.GetAddr(d).GetAddr(p.Preferred)\nsource := \"preferred\"\n\nif !p.Flag {\n    if p.Mode == \"shared\" {\n        source = \"fallback\"\n        boat = addr.GetAddr(d).GetAddr(p.Fallback)\n    } else if p.Mode == \"isolated\" {\n        source = \"preferred:fallback\"\n        boat = addr.GetAddr(d).GetAddr(p.Preferred + \":\" + p.Fallback)\n    } else {\n        logs.Warn(\"[harden]: errorType ...\")\n    }\n}\n```\n\n选择规则：\n\n- `Flag == true`：使用 `Preferred` 查找目标地址，`source` 为 `\"preferred\"`。\n- `Flag == false && Mode == \"shared\"`：使用 `Fallback` 查找目标地址，`source` 为 `\"fallback\"`。\n- `Flag == false && Mode == \"isolated\"`：使用 `Preferred + \":\" + Fallback` 查找目标地址，`source` 为 `\"preferred:fallback\"`。\n- 其他 mode：打印 `errorType` 警告，沿用前面默认的 preferred 地址。\n\n地址为空时会打印 `no addr found`，并上报 `syncAddr`。当前代码没有跳过空地址，`continue` 被注释掉了，因此空字符串也会作为 `boats` 的 key 进入后续发送流程。\n\n### `sailing`\n\n`sailing` 把每个目标节点的一组请求写入 `queue`：\n\n```go\nselect {\ncase queue <- &batchedReq{server, reqs, time.Now()}:\ndefault:\n    metrics.EmitCounter(\"bufferFull\", 1)\n    logs.Warn(\"buffer is full\")\n}\n```\n\n写队列是非阻塞的。队列满时不会阻塞限流路径或后台打包循环，而是丢弃该目标节点的本批请求，并上报 `bufferFull`。\n\n### `batchedSync`\n\nv1 的 `batchedSync` 负责向目标节点发送 HTTP POST：\n\n```go\nurl := fmt.Sprintf(\"http://%s/v1/sync\", r.server)\ndata, err := json.Marshal(r.reqs)\nreq, err := http.NewRequest(http.MethodPost, url, bytes.NewReader(data))\nresp, err := httpcli.Do(req)\n```\n\n处理流程：\n\n1. 空请求直接返回。\n2. 上报 `syncTotal`。\n3. 将 `[]types.ReserveRequest` 序列化为 JSON。\n4. POST 到 `http://{server}/v1/sync`。\n5. 要求 HTTP 状态码为 `200 OK`。\n6. 读取响应体并反序列化为 `[]*types.ReserveResponse`。\n7. 按 `group:preferred:fallback` 建立响应索引。\n8. 对每个请求查找对应响应。\n9. 如果 `req.Quota - resp.Permit > 0`，调用本地 token bucket 做强制预留。\n10. 成功完成后上报 `syncSuccess`。\n\n补偿逻辑如下：\n\n```go\nif overbooked := req.Quota - resp.Permit; overbooked > 0 {\n    tokens.GetTokenBucket(req.Group).ForceReserveN(\n        req.Preferred,\n        req.Fallback,\n        token.FallbackMode(req.Mode),\n        time.Now(),\n        overbooked,\n    )\n    metrics.EmitCounter(\"harden.server.total.tokens\", overbooked, tagPairs...)\n}\n```\n\n这里的语义是：远端返回的 `Permit` 小于本地请求的 `Quota` 时，差值被视为 overbooked，需要在本地 token bucket 中通过 `ForceReserveN` 补偿预留。\n\n错误路径都会上报 `syncError`，并使用不同 `Status` 区分：\n\n- `marshalError`\n- `newRequestError`\n- `sendError`\n- `statusCodeError`\n- `readBodyError`\n- `unmarshalError`\n- `getRespError`\n\n## v2 同步流程\n\nv2 位于 `syncer/v2`，包名为 `v2`。它保留了 v1 的后台队列模型，但请求结构、目标选择和响应处理都有变化。\n\n### `Sync`\n\nv2 对外入口是：\n\n```go\nfunc Sync(group, preferred, fallback string, mode token.FallbackMode, n int64)\n```\n\nv2 没有 `flag` 和 `reserveFlag` 参数，也不会先检查 `tokens.GetSyncDomains(group)` 是否为空。每次调用都会按结构化 key 聚合请求：\n\n```go\nkey := v2.SyncKey{\n    Group:     group,\n    Preferred: preferred,\n    Fallback:  fallback,\n    Mode:      string(mode),\n}\n```\n\n聚合对象是 `v2.SyncRequest`，`Quota` 同样通过 `atomic.AddInt64(&p.Quota, n)` 累加。\n\n和 v1 不同，v2 的 key 包含 `Mode`，因此同一个 `group/preferred/fallback` 在不同 fallback mode 下会形成不同的同步请求。\n\n### `syncing`\n\nv2 的发送间隔不是固定常量，而是每轮读取 TCC 配置：\n\n```go\ntime.Sleep(time.Duration(tcc.GetSendIntervalTime()) * time.Millisecond)\n```\n\n每轮同样会整体交换 `packages` map，然后按目标地址生成 `boats`。v2 的目标选择策略更偏广播：\n\n```go\nfor _, boat := range addr.GetAddr(env.IDC()).GetAllAddrs() {\n    boats[boat] = append(boats[boat], *p)\n}\nfor _, syncIdc := range tokens.GetSyncDomains(p.Group) {\n    for _, boat := range addr.GetAddr(syncIdc).GetAllAddrs() {\n        boats[boat] = append(boats[boat], *p)\n    }\n}\n```\n\n也就是说，每个 `v2.SyncRequest` 会发送到：\n\n- 当前 IDC，即 `env.IDC()` 下的所有地址。\n- 该 group 配置的所有同步 IDC 下的所有地址。\n\nv2 不再根据 `preferred`、`fallback` 或 `mode` 选择单个地址，而是对 IDC 下的全部地址广播。\n\n### `batchedSync`\n\nv2 发送到 `/v2/sync`，并附带当前 pod 名称：\n\n```go\nurl := fmt.Sprintf(\"http://%s/v2/sync?pod_name=%v\", r.server, env.PodName())\n```\n\n发送流程包括 JSON 序列化、创建 POST 请求、执行 HTTP 请求和检查 `200 OK`。与 v1 相比，v2 不读取响应体，也不会调用 `tokens.GetTokenBucket(...).ForceReserveN(...)` 做本地补偿。只要目标返回 200，就上报 `syncSuccess`。\n\n## v1 与 v2 的主要差异\n\n| 维度 | v1 `syncer` | v2 `syncer/v2` |\n| --- | --- | --- |\n| 对外入口 | `Sync(group, preferred, fallback, mode, n, flag, reserveFlag)` | `Sync(group, preferred, fallback, mode, n)` |\n| 聚合 key | `group:preferred:fallback` 字符串 | `v2.SyncKey{Group, Preferred, Fallback, Mode}` |\n| 发送间隔 | 固定 `5ms` | `tcc.GetSendIntervalTime()` 毫秒 |\n| 目标选择 | 按同步域和 `preferred/fallback/mode/flag` 选择地址 | 当前 IDC + 同步 IDC 的全部地址 |\n| HTTP 路径 | `/v1/sync` | `/v2/sync?pod_name=...` |\n| 响应处理 | 解析 `ReserveResponse` 并执行本地补偿预留 | 不读取响应体 |\n| 队列指标 | `stats` 上报 `InSyncQueue` | `stats` 只打印日志 |\n\n## 并发与一致性\n\n`packages` 是同步客户端的核心共享状态。调用方 goroutine 会通过 `Sync` 写入，后台 `syncing` goroutine 会周期性取走。代码使用 `packageRW` 保护 map 本身，并使用 `atomic.AddInt64` 累加请求中的 `Quota`。\n\n需要关注的并发特性：\n\n- map 的创建和替换由写锁保护。\n- 已经存在的请求对象在释放锁后通过 atomic 累加 `Quota`。\n- `syncing` 会把旧 map 赋给局部变量，然后立即创建新 map；后续新请求进入新批次。\n- `batchedSync` 发送的是 `syncing` 取出的请求副本切片，v1/v2 在构造 `boats` 时都使用 `*p` 解引用，把当前请求值复制进切片。\n\n这种模型适合高频小请求聚合，但贡献代码时要避免在无锁状态下修改 `packages` map 或请求对象中非原子字段。\n\n## 指标与日志\n\n该模块大量使用 `metrics.EmitCounter` 和 `metrics.EmitStore`，同步路径中的主要指标包括：\n\n- `whetherSync`：v1 记录某次 `Sync` 是否需要同步。\n- `whetherSyncTokens`：v1 按 token 数量记录是否需要同步。\n- `syncAddr`：v1 记录地址选择结果，标签包含 `Group`、`Preferred`、`Fallback`、`Mode`、`Source`、`Flag`、`SyncDomains`。\n- `bufferFull`：发送队列满，当前批次被丢弃。\n- `syncOutOfTime`：请求在队列中停留超过 1 秒，被 worker 丢弃。\n- `syncTotal`：开始向某个目标发送批量同步请求。\n- `syncError`：同步发送或响应处理失败。\n- `syncSuccess`：批量同步成功。\n- `InSyncQueue`：v1 每 5 秒记录队列长度。\n- `harden.server.total.tokens`：v1 发生 overbooked 补偿时记录差值 token 数。\n\n`metrics.EmitCounter` 的调用会进入 metrics 模块的 `CtxEmitCounter`，再经过 `GetMetrics`、`GetPrecisionConfig`、`Precision` 和 `FormTags` 等逻辑处理精度和标签格式。因此新增指标时应复用已有标签常量，例如 `metrics.Group`、`metrics.Preferred`、`metrics.Fallback`、`metrics.Mode`、`metrics.TargetIp` 和 `metrics.Status`。\n\n## 与其他模块的关系\n\n`syncer` 不是独立的数据源，它连接了限流、地址发现、配置、指标和 token bucket：\n\n- `tokens.GetSyncDomains(group)`：决定 group 需要同步到哪些 IDC 或 domain。\n- `addr.GetAddr(idcOrDomain)`：获取目标地址集合或按 key 查找目标地址。\n- `tokens.GetTokenBucket(group)`：v1 在远端许可不足时获取本地 token bucket 并调用 `ForceReserveN`。\n- `token.FallbackMode`：在入口参数和补偿预留中表示 fallback 模式。\n- `types.ReserveRequest` / `types.ReserveResponse`：v1 HTTP 协议结构。\n- `types/v2.SyncKey` / `types/v2.SyncRequest`：v2 HTTP 协议结构。\n- `config.C.Buffer` / `config.C.Worker`：控制后台队列容量和并发发送 worker 数。\n- `tcc.GetSendIntervalTime()`：v2 控制打包发送间隔。\n- `env.IDC()` / `env.PodName()`：v2 用于目标 IDC 选择和请求 URL 标识。\n- `metrics`：记录同步决策、队列状态、发送结果和错误原因。\n\n## 修改建议与注意事项\n\n修改同步客户端时，优先保持以下约束：\n\n- 不要在 `Sync` 中直接发 HTTP 请求；当前设计依赖异步聚合来降低限流路径延迟。\n- 修改 `packages` 的 key 规则时，需要同步检查响应匹配逻辑。v1 的请求和响应都用 `group:preferred:fallback` 匹配。\n- 新增请求字段时，要确认同一聚合 key 下字段是否可能不同；如果字段会影响发送语义，应考虑纳入 key。\n- 调整发送间隔或 worker 数时，要同时观察 `bufferFull`、`syncOutOfTime` 和队列长度。\n- v1 地址为空仍会入队发送，这是当前行为；如果要改为跳过，需要评估对 `syncAddr` 指标和异常发现能力的影响。\n- v2 是广播模型，不做响应补偿；不要把 v1 的 `ReserveResponse` 处理直接搬到 v2，除非服务端协议也同步变更。","synchronization-clients":"# Synchronization Clients\n\n## 模块概览\n\n`Synchronization Clients` 模块负责把本地消耗的配额异步同步到其他 Harden 实例。代码分为两个客户端实现：\n\n- `syncer`：v1 同步客户端，向目标实例发送 `POST /v1/sync`，并根据返回的 `ReserveResponse` 对本地 token bucket 做补偿预留。\n- `syncer/v2`：v2 同步客户端，向目标实例发送 `POST /v2/sync?pod_name=...`，只负责发送同步请求，不处理响应体中的补偿逻辑。\n\n两个版本都采用相同的基本模式：调用方通过 `Sync` 写入内存聚合区，后台 goroutine 周期性打包请求，按目标地址分组后写入队列，再由 worker 批量 HTTP 发送。\n\n```mermaid\nflowchart LR\n    A[\"业务调用 Sync\"] --> B[\"packages 聚合配额\"]\n    B --> C[\"syncing 周期性取包\"]\n    C --> D[\"按目标地址分组\"]\n    D --> E[\"sailing 写入 queue\"]\n    E --> F[\"startWorker 消费\"]\n    F --> G[\"batchedSync 发送 HTTP\"]\n```\n\n## 初始化与后台任务\n\n入口函数是两个包各自的 `Init`：\n\n- `syncer.Init()` 在 `syncer/init.go`\n- `v2.Init()` 在 `syncer/v2/init.go`\n\n`main.go` 会调用这两个初始化函数。初始化时会创建全局 HTTP client 和队列：\n\n```go\nhttpcli = &http.Client{Timeout: Timeout}\nqueue = make(chan *batchedReq, config.C.Buffer)\n```\n\n随后根据 `config.C.Worker` 启动多个 `startWorker` goroutine，并额外启动：\n\n- `syncing()`：周期性从 `packages` 中取出聚合请求并分发。\n- `stats()`：定期记录队列长度。\n\nv1 的 `stats()` 会通过 `metrics.EmitStore(\"InSyncQueue\", len(queue))` 上报队列长度，并写日志。v2 的 `stats()` 只写日志，不上报 `InSyncQueue`。\n\n`startWorker()` 从 `queue` 中读取 `batchedReq`。如果请求在队列中停留超过 1 秒，会丢弃并上报 `syncOutOfTime`；否则调用 `batchedSync(r)` 发送。\n\n## 核心数据结构\n\n### v1 全局状态\n\n`syncer/base.go` 定义了 v1 客户端的共享状态：\n\n```go\nvar (\n    packageRW sync.RWMutex\n    packages  = map[string]*types.ReserveRequest{}\n\n    queue   chan *batchedReq\n    httpcli *http.Client\n)\n```\n\n`packages` 是内存聚合区，key 由 `group + \":\" + preferred + \":\" + fallback` 拼接而成，value 是 `*types.ReserveRequest`。同一个 key 的多次同步请求会合并，配额通过 `atomic.AddInt64(&p.Quota, n)` 累加。\n\n`batchedReq` 是 worker 队列中的发送单元：\n\n```go\ntype batchedReq struct {\n    server string\n    reqs   []types.ReserveRequest\n    t      time.Time\n}\n```\n\n### v2 全局状态\n\n`syncer/v2/base.go` 使用类型化 key：\n\n```go\npackages = map[v2.SyncKey]*v2.SyncRequest{}\n```\n\n`v2.SyncKey` 包含 `Group`、`Preferred`、`Fallback`、`Mode`。相比 v1，v2 的聚合 key 把 `Mode` 也纳入了 key，避免不同 fallback mode 的请求被合并到同一个包内。\n\n## SDK 入口\n\n### `syncer.Sync`\n\nv1 入口位于 `syncer/sdk.go`：\n\n```go\nfunc Sync(group, preferred, fallback string, mode token.FallbackMode, n int64, flag bool, reserveFlag bool)\n```\n\n调用方包括：\n\n- `udpserver/server.go` 的 `handleReserveN`\n- `remote/rateLimit.go` 的 `RateLimit`\n\n执行逻辑：\n\n1. 构造 metrics tags，包括 `group`、`preferred`、`fallback`、`mode` 和 `version=v1`。\n2. 调用 `tokens.GetSyncDomains(group)` 判断该 group 是否配置了同步域。\n3. 如果没有同步域，直接上报 `whetherSync` 和 `whetherSyncTokens`，状态为 `noSync`，不进入聚合。\n4. 如果有同步域，调用内部 `pack(...)` 聚合请求，并上报状态为 `sync` 的指标。\n\n`pack(...)` 使用读写锁保护 `packages`，采用双重检查模式避免重复创建 `types.ReserveRequest`。新建请求时会保存：\n\n- `Group`\n- `Preferred`\n- `Fallback`\n- `Mode`\n- `Flag`\n- `ReserveFlag`\n\n最后通过 `atomic.AddInt64(&p.Quota, n)` 累加 quota。\n\n### `v2.Sync`\n\nv2 入口位于 `syncer/v2/sdk.go`：\n\n```go\nfunc Sync(group, preferred, fallback string, mode token.FallbackMode, n int64)\n```\n\n调用方是 `remote/v2/rate_limit.go` 的 `RateLimit`。\n\nv2 不在 `Sync` 阶段判断 `tokens.GetSyncDomains(group)`，而是直接写入 `packages`。目标地址选择在后续 `syncing()` 中完成。聚合 key 是 `v2.SyncKey`，包含 `Mode`，value 是 `*v2.SyncRequest`。\n\n## 打包与目标地址选择\n\n### v1 `syncing`\n\nv1 打包逻辑在 `syncer/pack.go`。`syncing()` 每 `sailInterval` 执行一次：\n\n```go\nconst sailInterval = time.Millisecond * 5\n```\n\n每轮会先加写锁，把当前 `packages` 整体取出，并把全局 `packages` 替换为空 map：\n\n```go\npacked := packages\npackages = make(map[string]*types.ReserveRequest)\n```\n\n这意味着同步是分批异步发送的：新的 `Sync` 调用会进入新 map，不会阻塞当前批次的地址分组和发送。\n\nv1 对每个 `ReserveRequest`，遍历 `tokens.GetSyncDomains(p.Group)` 返回的同步域，再根据请求状态选择目标地址：\n\n- 默认使用 `p.Preferred`：\n  ```go\n  boat := addr.GetAddr(d).GetAddr(p.Preferred)\n  source := \"preferred\"\n  ```\n- 当 `p.Flag == false` 且 `p.Mode == \"shared\"` 时，使用 `p.Fallback`：\n  ```go\n  source = \"fallback\"\n  boat = addr.GetAddr(d).GetAddr(p.Fallback)\n  ```\n- 当 `p.Flag == false` 且 `p.Mode == \"isolated\"` 时，使用 `p.Preferred + \":\" + p.Fallback`：\n  ```go\n  source = \"preferred:fallback\"\n  boat = addr.GetAddr(d).GetAddr(p.Preferred + \":\" + p.Fallback)\n  ```\n- 其他 mode 会记录 warning。\n\n地址为空时会记录 warning 并上报 `syncAddr`，但当前代码没有 `continue`，仍然会把请求加入 `boats[boat]`。因此空地址会形成 `server == \"\"` 的批次，后续 `batchedSync` 会尝试访问 `http:///v1/sync` 并在创建或发送请求阶段失败。\n\n分组完成后，`syncing()` 会用 goroutine 调用 `sailing(boats)`，将每个目标地址对应的请求列表写入发送队列。\n\n### v2 `syncing`\n\nv2 打包逻辑在 `syncer/v2/pack.go`。它不使用固定 5ms 间隔，而是每轮读取 TCC 配置：\n\n```go\ntime.Sleep(time.Duration(tcc.GetSendIntervalTime()) * time.Millisecond)\n```\n\nv2 的目标地址策略与 v1 不同：\n\n1. 先把请求发送到当前 IDC 的所有地址：\n   ```go\n   for _, boat := range addr.GetAddr(env.IDC()).GetAllAddrs()\n   ```\n2. 再遍历 `tokens.GetSyncDomains(p.Group)`，把请求发送到每个同步 IDC 的所有地址：\n   ```go\n   for _, boat := range addr.GetAddr(syncIdc).GetAllAddrs()\n   ```\n\n因此 v2 是按 IDC 广播到多个实例，而 v1 是根据 `preferred/fallback/mode/flag` 选择特定目标地址。\n\n## 队列写入与背压\n\n两个版本都通过 `sailing` 把按地址分组后的请求写入 `queue`：\n\n```go\nselect {\ncase queue <- &batchedReq{server, reqs, time.Now()}:\ndefault:\n    metrics.EmitCounter(\"bufferFull\", 1)\n    logs.Warn(\"buffer is full\")\n}\n```\n\n这里使用非阻塞发送。队列满时不会阻塞业务路径或打包 goroutine，而是直接丢弃该批次，并上报 `bufferFull`。这说明该模块的同步语义是 best-effort：吞吐和低延迟优先于强一致送达。\n\nworker 消费时还会检查请求年龄：\n\n```go\nif time.Since(r.t) > time.Second {\n    metrics.EmitCounter(\"syncOutOfTime\", 1)\n    continue\n}\n```\n\n超过 1 秒的批次会被丢弃，避免发送过期同步数据。\n\n## HTTP 发送逻辑\n\n### v1 `batchedSync`\n\nv1 发送逻辑在 `syncer/send.go`：\n\n```go\nfunc batchedSync(r *batchedReq)\n```\n\n当 `r.reqs` 为空时直接返回。否则：\n\n1. 上报 `syncTotal`。\n2. 构造 URL：\n   ```go\n   url := fmt.Sprintf(\"http://%s/v1/sync\", r.server)\n   ```\n3. 将 `[]types.ReserveRequest` 序列化为 JSON。\n4. 创建 `POST` 请求。\n5. 使用全局 `httpcli` 发送，超时时间为 `Timeout = 200ms`。\n6. 要求响应状态码为 `http.StatusOK`。\n7. 读取响应体并反序列化为 `[]*types.ReserveResponse`。\n8. 按 `group:preferred:fallback` 建立响应索引。\n9. 对每个原始请求检查响应中的 `Permit`。\n\n关键补偿逻辑：\n\n```go\nif overbooked := req.Quota - resp.Permit; overbooked > 0 {\n    tokens.GetTokenBucket(req.Group).ForceReserveN(\n        req.Preferred,\n        req.Fallback,\n        token.FallbackMode(req.Mode),\n        time.Now(),\n        overbooked,\n    )\n    metrics.EmitCounter(\"harden.server.total.tokens\", overbooked, tagPairs...)\n}\n```\n\n当请求的 `Quota` 大于远端允许的 `Permit` 时，差值被认为是 overbooked token。客户端会调用 `ForceReserveN` 在本地 token bucket 中强制预留这部分 token，避免本地继续超发。\n\n错误路径会按阶段上报 `syncError`：\n\n- `marshalError`\n- `newRequestError`\n- `sendError`\n- `statusCodeError`\n- `readBodyError`\n- `unmarshalError`\n- `getRespError`\n\n成功完成后上报 `syncSuccess`。\n\n### v2 `batchedSync`\n\nv2 发送逻辑在 `syncer/v2/send.go`，整体更轻：\n\n```go\nurl := fmt.Sprintf(\"http://%s/v2/sync?pod_name=%v\", r.server, env.PodName())\n```\n\n它发送 `[]v2.SyncRequest`，但不读取响应体、不反序列化响应，也不调用 `ForceReserveN`。只要 HTTP 状态码是 200，就上报 `syncSuccess`。\n\n错误阶段包括：\n\n- `marshalError`\n- `newRequestError`\n- `sendError`\n- `statusCodeError`\n\n## 指标与观测\n\n该模块大量使用 `metrics.EmitCounter` 和少量 `metrics.EmitStore`。这些调用会进入 metrics 模块的标签格式化和精度配置流程，例如 `batchedSync -> EmitCounter -> CtxEmitCounter -> GetMetrics -> GetPrecisionConfig -> Precision`，以及 `batchedSync -> EmitCounter -> CtxEmitCounter -> FormTags`。\n\n重要指标包括：\n\n- `whetherSync`：v1 判断某次调用是否需要同步。\n- `whetherSyncTokens`：v1 按 token 数量统计是否同步。\n- `syncAddr`：v1 地址选择结果统计。\n- `bufferFull`：队列满导致批次丢弃。\n- `syncOutOfTime`：批次在队列中超过 1 秒被丢弃。\n- `syncTotal`：尝试发送同步请求。\n- `syncError`：发送或响应处理失败。\n- `syncSuccess`：同步请求成功完成。\n- `InSyncQueue`：v1 队列长度 store 指标。\n- `harden.server.total.tokens`：v1 远端 permit 不足时，本地强制 reserve 的 token 数量。\n\n日志主要用于记录队列长度、地址缺失、HTTP 发送失败、非 200 响应、响应解析失败等异常。\n\n## 并发模型\n\n`packages` 是同步入口和后台打包协程之间的共享内存，因此两个版本都使用 `packageRW` 保护 map 本身。\n\n`Sync` / `pack` 的并发模式是：\n\n1. 读锁查找已有请求。\n2. 未命中时加写锁再次检查。\n3. 必要时创建请求对象并写入 map。\n4. 释放锁后使用 `atomic.AddInt64` 累加 quota。\n\n`syncing` 的并发模式是：\n\n1. 加写锁。\n2. 如果 `packages` 为空则释放锁并进入下一轮。\n3. 把当前 map 整体移动到局部变量 `packed`。\n4. 用新的空 map 替换全局 `packages`。\n5. 释放锁。\n6. 在锁外执行地址分组和队列发送。\n\n这种设计减少了锁持有时间，让业务调用 `Sync` 时只需要和 map 查找/创建竞争，不会等待 HTTP 发送。\n\n需要注意的是，`syncing` 取走 map 后，`Sync` 仍可能持有旧请求指针并执行 `atomic.AddInt64`。当前代码通过指针和原子加法保证单个 `Quota` 字段的并发累加是安全的，但被取走批次的 quota 与新批次之间的边界取决于具体交错时序。贡献代码时应避免把 `Quota` 改成非原子更新。\n\n## v1 与 v2 的主要差异\n\n| 维度 | v1 `syncer` | v2 `syncer/v2` |\n| --- | --- | --- |\n| SDK 函数 | `Sync(group, preferred, fallback, mode, n, flag, reserveFlag)` | `Sync(group, preferred, fallback, mode, n)` |\n| 聚合 key | `group:preferred:fallback` 字符串 | `v2.SyncKey`，包含 `Mode` |\n| 是否在入口判断同步域 | 是，`tokens.GetSyncDomains(group)` 为空则不聚合 | 否，始终聚合 |\n| 发送间隔 | 固定 `5ms` | `tcc.GetSendIntervalTime()` |\n| 地址选择 | 按 sync domain 和 `preferred/fallback/mode/flag` 选单地址 | 当前 IDC 全地址 + sync domains 全地址 |\n| HTTP 路径 | `/v1/sync` | `/v2/sync?pod_name=...` |\n| 响应处理 | 读取 `ReserveResponse` 并执行补偿 reserve | 不读取响应体 |\n| 队列长度指标 | 上报 `InSyncQueue` | 只写日志 |\n\n## 与其他模块的关系\n\n`Synchronization Clients` 位于限流和 token 管理链路之间：\n\n- 上游调用方在处理请求或限流结果时调用 `syncer.Sync` 或 `v2.Sync`。\n- `tokens.GetSyncDomains` 决定 group 需要同步到哪些 IDC。\n- `addr.GetAddr` 提供目标实例地址。\n- `tcc.GetSendIntervalTime` 控制 v2 发送间隔。\n- `metrics` 负责同步链路观测。\n- v1 的 `batchedSync` 会在远端 permit 不足时调用 `tokens.GetTokenBucket(...).ForceReserveN(...)`，直接影响本地 token bucket 状态。\n\n因此，修改本模块时需要同时考虑地址发现、同步域配置、队列容量、worker 数量、HTTP 超时和 token bucket 补偿行为。\n\n## 贡献注意事项\n\n新增或修改同步字段时，需要同时检查请求结构体、聚合 key 和响应匹配 key。v1 当前用 `group:preferred:fallback` 匹配响应，如果新增字段会影响唯一性，需要同步调整 key 构造逻辑。v2 已经使用 `v2.SyncKey`，更适合扩展。\n\n调整发送频率或 worker 数量时，需要关注 `bufferFull`、`syncOutOfTime`、`syncError` 和队列长度。该模块不会重试失败批次，也不会阻塞等待队列空间，因此容量不足会直接转化为同步丢失。\n\n修改 v1 地址选择逻辑时，要特别注意 `Flag`、`Mode`、`Preferred`、`Fallback` 的组合语义。`shared` 和 `isolated` 在 `Flag == false` 时走不同地址 key，这会影响同步目标以及后续远端 permit 计算。\n\n修改 v1 响应处理时，应保留 `ForceReserveN` 的补偿语义，除非同时调整上游限流一致性模型。这里是 v1 客户端在远端发现超额后回写本地 token bucket 的关键路径。","token-buckets":"# Token Buckets\n\n## 模块概览\n\n`Token Buckets` 模块为每个限流分组和限流 key 管理本地令牌桶。它主要由三个包组成：\n\n- `token`：核心令牌桶实现，负责 limiter 创建、配置更新、fallback 策略、指标上报和状态导出。\n- `tokens`：按 `group` 管理全局 `TokenBuckets` 实例，并对接远端配置、跨 IDC 同步域和启动状态初始化。\n- `types`：定义同步/预留令牌时使用的请求与响应结构体。\n\n该模块连接在远端限流入口、UDP 预留入口和同步逻辑之间。典型调用路径是 `remote/v2/rate_limit.go` 或 `udpserver/server.go` 先通过 `tokens.GetTokenBucket(group)` 获取分组桶，再调用 `AllowAtMostN`、`ForceReserveN` 或 `IsThrottled` 执行限流判断。\n\n## 核心数据结构\n\n### `TokenBuckets`\n\n`token.TokenBuckets` 是模块的核心类型：\n\n```go\ntype TokenBuckets struct {\n\tsync.RWMutex\n\tdirectLimiters   map[string]*directLimiter\n\tfallbackLimiters map[string]*fallbackLimiter\n\n\tgetConfig      func() (*model.LimiterConfig, error)\n\tonConfigChange []ConfigChangeCB\n\tConfig         *model.LimiterConfig\n\n\tgroup string\n\tstop  int32\n}\n```\n\n它维护两类 limiter：\n\n- `directLimiters`：显式配置 key 对应的令牌桶。\n- `fallbackLimiters`：当 `preferred` key 未配置时，基于 `fallback` key 临时创建的令牌桶。\n\n`TokenBuckets` 内部使用 `sync.RWMutex` 保护 map 和配置访问。远端配置轮询停止状态通过 `stop int32` 和 `atomic` 控制。\n\n### `Limiter` 接口\n\n`Limiter` 抽象了底层 `rate.Limiter` 的能力：\n\n```go\ntype Limiter interface {\n\tAllow() bool\n\tAllowN(time.Time, int64) bool\n\tIsThrottled(n int64) bool\n\tWait(context.Context) error\n\tAllowAtMostN(int64) int64\n\tReserveN(now time.Time, n int64) Reservation\n\tRestore()\n\tRestoreN(int64)\n\tLimit() Limit\n\tLast() time.Time\n\tTokens() float64\n}\n```\n\n业务入口通常不直接使用底层 `rate.Limiter`，而是通过 `TokenBuckets.GetLimiter` 间接获取 `Limiter`。\n\n### `directLimiter` 与 `fallbackLimiter`\n\n`directLimiter` 只是对 `rate.Limiter` 的轻量包装，主要用于把 `rate.Limit` 转换成模块内的 `token.Limit`：\n\n```go\ntype directLimiter struct {\n\t*rate.Limiter\n}\n```\n\n`fallbackLimiter` 复用 `directLimiter`，并记录 fallback 模式：\n\n```go\ntype fallbackLimiter struct {\n\t*directLimiter\n\tfallbackInfo\n}\n```\n\n`fallbackInfo.FallbackMode` 用于区分当前 fallback limiter 是共享模式还是隔离模式。\n\n## Fallback 模式\n\n模块支持两种 fallback 模式：\n\n```go\nconst (\n\tFallbackModeShared   FallbackMode = \"shared\"\n\tFallbackModeIsolated FallbackMode = \"isolated\"\n)\n```\n\n当 `preferred` key 没有配置，但 `fallback` key 有配置时，`getFallbackLimiter` 会根据模式创建 limiter。\n\n### `FallbackModeIsolated`\n\n隔离模式下，`preferred:fallback` 会获得一个独立 limiter：\n\n```go\nkey := preferred + \":\" + fallback\nfl = &fallbackLimiter{\n\tdirectLimiter: &directLimiter{\n\t\trate.NewLimiter(rate.Limit(c.GetQps()), c.GetBurst()),\n\t},\n\tfallbackInfo: fallbackInfo{FallbackMode: mode},\n}\n```\n\n这意味着多个不同的 `preferred` key 即使使用同一个 `fallback`，也不会共享令牌。\n\n### `FallbackModeShared`\n\n共享模式下，fallback limiter 会复用 `fallback` key 对应的 `directLimiter`：\n\n```go\ndl := t.directLimiters[fallback]\nif dl == nil {\n\tdl = &directLimiter{rate.NewLimiter(rate.Limit(c.GetQps()), c.GetBurst())}\n\tt.directLimiters[fallback] = dl\n}\nfl = &fallbackLimiter{\n\tdirectLimiter: dl,\n\tfallbackInfo: fallbackInfo{FallbackMode: mode},\n}\n```\n\n这意味着所有使用同一个 `fallback` key 的请求会竞争同一个令牌桶。\n\n## 创建与配置加载\n\n### 本地创建\n\n`NewTokenBuckets(group string, opts ...Option)` 创建一个空的分组桶：\n\n```go\ntb := token.NewTokenBuckets(\"video_arch\")\n```\n\n默认状态下，`Config.Configs` 是空 map，`Meta` 是空对象。没有任何 limiter 会被预先创建，limiter 都是按需懒加载。\n\n### 本地配置\n\n`WithLocalConfig` 直接替换当前配置：\n\n```go\ntb := token.NewTokenBuckets(\n\t\"video_arch\",\n\ttoken.WithLocalConfig(cfg),\n)\n```\n\n这个选项常用于测试场景，例如 `token_bucket_test.go` 中的 `TestDefaultBurst` 和 `TestTokenBucket`。\n\n### 远端配置\n\n`WithRemoteConfig` 会设置远端配置获取函数，立即执行一次 `updateConfig()`，然后启动后台轮询：\n\n```go\ntoken.WithRemoteConfig(getConfigFn(group), updateInterval)\n```\n\n在 `tokens.GetTokenBucket` 中，远端配置来源是：\n\n```go\nfunc getConfigFn(group string) func() (*model.LimiterConfig, error) {\n\treturn func() (*model.LimiterConfig, error) {\n\t\treturn james.GetGlobalConfig(group)\n\t}\n}\n```\n\n默认轮询间隔是 `30 * time.Second`。\n\n## 配置更新流程\n\n`updateConfig` 是配置热更新的核心函数：\n\n1. 调用 `t.getConfig()` 获取新的 `model.LimiterConfig`。\n2. 如果 `t.Config.Equals(c)` 返回 true，直接结束。\n3. 遍历已有 `directLimiters`：\n   - 新配置中不存在的 key 会从 `directLimiters` 删除。\n   - QPS 变化时调用 `SetLimit`。\n   - Burst 变化时调用 `SetBurst`。\n4. 将 `t.Config` 替换为新配置。\n5. 清空所有 `fallbackLimiters`。\n6. 解锁后依次执行 `onConfigChange` 回调。\n\n清空 `fallbackLimiters` 是有意设计：fallback limiter 由 fallback 配置派生而来，配置变化后不逐个判断，直接丢弃并在下一次请求时按新配置重建。\n\n```mermaid\nflowchart TD\n    A[\"获取远端配置\"] --> B{\"配置是否变化\"}\n    B -->|否| C[\"结束\"]\n    B -->|是| D[\"更新已有 directLimiter\"]\n    D --> E[\"删除失效 key\"]\n    E --> F[\"替换 Config\"]\n    F --> G[\"清空 fallbackLimiters\"]\n    G --> H[\"触发配置变更回调\"]\n```\n\n## 获取 limiter 的执行路径\n\n业务方法最终都会走到 `GetLimiter(preferred, fallback, mode)`。\n\n优先级如下：\n\n1. 先调用 `getLimiter(preferred)`。\n2. 如果 `preferred` 有显式配置，返回 direct limiter，第二个返回值为 `true`。\n3. 如果没有 direct limiter，再调用 `getFallbackLimiter(preferred, fallback, mode)`。\n4. 如果 fallback 可用，返回 fallback limiter，第二个返回值为 `false`。\n5. 如果两者都不可用，返回 `nil, false`。\n\n这个布尔值会被上层用于区分命中的是 preferred 还是 fallback。例如 `AllowAtMostN` 返回 `(permit, flag)`，其中 `flag` 表示是否命中了 preferred direct limiter。\n\n## 限流 API\n\n### `Allow`\n\n```go\nfunc (t *TokenBuckets) Allow(name string) bool\n```\n\n只检查单个 key，相当于：\n\n```go\nreturn t.AllowOptional(name, \"\", \"\")\n```\n\n如果 key 没有配置 limiter，默认放行。\n\n### `AllowOptional`\n\n```go\nfunc (t *TokenBuckets) AllowOptional(preferred, fallback string, mode FallbackMode) bool\n```\n\n获取 preferred 或 fallback limiter 后调用 `Limiter.Allow()`。没有 limiter 时返回 `true`。\n\n### `AllowN`\n\n```go\nfunc (t *TokenBuckets) AllowN(preferred, fallback string, mode FallbackMode, n int64) bool\n```\n\n使用当前时间调用 `Limiter.AllowN(time.Now(), n)`。没有 limiter 时返回 `true`。\n\n### `AllowAtMostN`\n\n```go\nfunc (t *TokenBuckets) AllowAtMostN(preferred, fallback string, mode FallbackMode, n int64) (int64, bool)\n```\n\n最多消耗 `n` 个令牌，返回实际允许数量和是否命中 preferred limiter。\n\n没有 limiter 时返回：\n\n```go\nreturn n, false\n```\n\n这表示未配置限流时默认允许全部额度。\n\n### `ForceReserveN`\n\n```go\nfunc (t *TokenBuckets) ForceReserveN(preferred, fallback string, mode FallbackMode, now time.Time, n int64) bool\n```\n\n强制调用 `ReserveN(now, n)`，不关心令牌是否足够，常用于同步远端已经发生的消耗。返回值同样表示是否命中 preferred limiter。\n\n### `Restore`\n\n```go\nfunc (t *TokenBuckets) Restore(preferred, fallback string, mode FallbackMode)\n```\n\n获取 limiter 后调用 `Limiter.Restore()`，用于归还一次令牌消耗。\n\n### `IsThrottled`\n\n```go\nfunc (t *TokenBuckets) IsThrottled(preferred, fallback string, mode FallbackMode, n int64) bool\n```\n\n判断请求 `n` 个令牌是否会被限流。没有 limiter 时返回 `false`。\n\n## 指标上报\n\n`GetLimiter` 在成功获取 direct 或 fallback limiter 后，会异步上报指标：\n\n- `rate_limit_config.token`：当前 token 数。\n- `rate_limit_config.limit`：当前限流速率。\n- `rate_limit_config.burst`：当前 burst。\n- `BaseInfo`：基础信息标记。\n\n指标标签包括：\n\n- `metrics.Group`\n- `metrics.Preferred`\n- `metrics.Fallback`\n- `metrics.Mode`\n\ndirect limiter 的 mode 固定为 `\"preferred\"`；fallback limiter 的 mode 使用实际的 `FallbackMode` 字符串。\n\n指标上报 goroutine 内部有 `recover`，panic 会通过 `metrics.EmitCounter(metrics.Panic, 1, metrics.Function, \"getLimiter\")` 记录。\n\n## 分组级全局管理\n\n`tokens/group.go` 维护进程内的全局分组桶：\n\n```go\nvar (\n\ttbs = make(map[string]*token.TokenBuckets)\n\tmu  sync.RWMutex\n)\n```\n\n`GetTokenBucket(group string)` 是获取分组桶的统一入口。\n\n它的行为是：\n\n1. 先读锁检查 `tbs[group]` 是否存在。\n2. 不存在时创建新的 `TokenBuckets`。\n3. 新实例会安装 `updateSyncDomain(group)` 回调，并启用远端配置轮询。\n4. 加写锁后再次检查，避免并发重复注册。\n5. 如果别的 goroutine 已经注册成功，则停止当前新实例的后台配置更新。\n\n这里的 `newOne.StopUpdatingConfig()` 是并发保护的一部分，避免重复创建的临时实例继续轮询远端配置。\n\n## 同步域管理\n\n配置变更回调 `updateSyncDomain(group)` 会读取 `model.LimiterConfig.Meta.SyncDomains`，并写入 `syncDomains`：\n\n```go\nfunc updateSyncDomain(group string) token.ConfigChangeCB {\n\treturn func(c *model.LimiterConfig) {\n\t\tsetSyncDomains(group, c.Meta.SyncDomains)\n\t}\n}\n```\n\n`GetSyncDomains(group string)` 根据当前 IDC 返回需要同步到的其他 IDC：\n\n- 如果没有 group 专属配置，返回全局 `config.C.SyncTo`。\n- 如果当前 IDC 出现在某个 sync domain 中，返回同一 domain 内除当前 IDC 外的其他 IDC。\n- 如果没有匹配 domain，返回 `nil`。\n\n该函数被 `syncer/pack.go`、`syncer/v2/pack.go` 和 `syncer/sdk.go` 使用，用于决定令牌消耗同步目标。\n\n## 状态导出与启动初始化\n\n### `GetAllInitInfos`\n\n`token.TokenBuckets.GetAllInitInfos()` 会导出当前分组内所有 direct 和 fallback limiter 的运行状态：\n\n```go\ntype InitInfo struct {\n\tLast         time.Time\n\tLimiter      float64\n\tBurst        int64\n\tTokens       float64\n\tFallbackMode FallbackMode\n}\n```\n\ndirect limiter 的 `FallbackMode` 为空字符串；fallback limiter 会记录实际 fallback 模式。\n\n`tokens.GetAllInitInfos()` 会遍历全局 `tbs`，返回所有 group 的状态快照。远端接口 `remote/v2/get_all_token_buckets.go` 会调用它。\n\n### `InitAllInitInfos`\n\n`tokens.InitAllInitInfos(cnt int)` 用于进程启动时从同 IDC 的其他节点拉取令牌桶状态：\n\n1. 通过 `addr.GetAddr(env.IDC()).GetAddr(strconv.Itoa(cnt))` 选取一个节点。\n2. 请求 `http://{server}/v2/get_all_token_buckets`。\n3. 解析返回的 `map[string]map[string]*token.InitInfo`。\n4. 对每个 group 调用 `GetTokenBucket(group).InitTokenBucket(initInfos)`。\n5. 失败时最多递归重试 3 次。\n\n失败和成功都会通过 `metrics.EmitCounter(\"InitAllInitInfos\", ...)` 上报状态。\n\n### `InitTokenBucket`\n\n`InitTokenBucket` 根据 `InitInfo.FallbackMode` 判断恢复 direct 还是 fallback limiter：\n\n- `FallbackMode == \"\"`：写入 `directLimiters`。\n- 否则：写入 `fallbackLimiters`，并恢复 fallback 模式。\n\n底层使用 `rate.NewLimiterWithInitValues`，保留 `Last`、`Limiter`、`Burst` 和 `Tokens`，避免重启后令牌桶完全重置。\n\n## 与请求链路的关系\n\n常见执行流如下：\n\n```mermaid\nflowchart TD\n    A[\"限流入口 RateLimit\"] --> B[\"GetTokenBucket(group)\"]\n    B --> C[\"WithRemoteConfig 初始化配置\"]\n    B --> D[\"AllowAtMostN / ForceReserveN\"]\n    D --> E[\"GetLimiter\"]\n    E --> F[\"getLimiter(preferred)\"]\n    E --> G[\"getFallbackLimiter\"]\n    F --> H[\"rate.Limiter\"]\n    G --> H\n```\n\n关键入口包括：\n\n- `remote/v2/rate_limit.go`：调用 `GetTokenBucket`、`AllowAtMostN`、`ForceReserveN`。\n- `remote/rateLimit.go`：调用 `GetTokenBucket`、`AllowAtMostN`、`ForceReserveN`。\n- `udpserver/server.go`：在 `handleReserveN` 中调用 `GetTokenBucket` 和 `AllowAtMostN`。\n- `remote/isThrottled.go`：调用 `GetTokenBucket` 和 `IsThrottled`。\n- `remote/sync.go`、`remote/v2/sync.go`：调用 `GetTokenBucket` 和 `ForceReserveN`。\n- `syncer` 包：通过 `GetSyncDomains` 决定跨 IDC 同步目标。\n\n## 同步请求结构\n\n`types/reserve.go` 定义了同步和预留令牌时使用的数据结构：\n\n```go\ntype ReserveRequest struct {\n\tGroup       string\n\tPreferred   string\n\tFallback    string\n\tMode        string\n\tQuota       int64\n\tFlag        bool\n\tReserveFlag bool\n}\n\ntype ReserveResponse struct {\n\tGroup     string\n\tPreferred string\n\tFallback  string\n\tPermit    int64\n}\n```\n\n`ReserveRequest` 被 `syncer/sdk.go` 的 `pack` 使用。`ReserveResponse` 被 `remote/sync.go` 使用，用于返回实际允许的额度。\n\n## 并发与容错要点\n\n`TokenBuckets` 的 limiter map 和配置由读写锁保护。读取路径先用读锁快速检查，创建路径再切换到写锁并重新检查，避免重复创建 limiter。\n\n`asyncUpdate` 和 `GetLimiter` 的异步指标上报都带有 `recover`。配置轮询 panic 会上报 `metrics.Panic`，并记录函数名 `\"asyncUpdate\"`；指标上报 panic 会记录函数名 `\"getLimiter\"`。\n\n未配置 limiter 时，模块默认放行：\n\n- `AllowOptional`、`AllowN` 返回 `true`。\n- `AllowAtMostN` 返回请求的完整 `n`。\n- `IsThrottled` 返回 `false`。\n\n因此，该模块的语义是“配置驱动限流”：只有配置中存在 preferred 或 fallback key 时才实际限制请求。","udp-server-protocol":"# UDP Server Protocol\n\n## 模块概览\n\n`udpserver` 模块提供 Harden 的 UDP 协议入口，用于接收客户端的令牌预留请求。当前协议只支持一种请求类型：`ReserveNRequest`，服务端根据 `group`、`preferred`、`fallback`、`mode` 和 `quota` 调用本地 token bucket 判断可放行数量，并通过 UDP 返回 `ReserveNResponse.permit`。\n\n核心文件：\n\n- `udpserver/server.go`：UDP 服务启动、收包、解包、业务处理和响应。\n- `udpserver/protocol/payload.proto`：UDP 请求/响应的 protobuf 协议定义。\n- `udpserver/protocol/payload.pb.go`：由 `protoc-gen-go` 生成的 Go 类型。\n- `udpserver/protocol/gen_proto.sh`：重新生成 protobuf Go 代码的脚本。\n- `udpserver/stackprinter.go`：格式化调用栈的辅助函数，目前不在 `server.go` 主流程中使用。\n\n## 协议模型\n\nUDP 包体使用 `github.com/golang/protobuf/proto` 编码。顶层消息通过 `oneof payload` 承载具体请求或响应。\n\n```proto\nmessage ReserveNRequest {\n    string from = 1;\n    string group = 2;\n    string preferred = 3;\n    int32 quota = 4;\n    string fallback = 5;\n    string mode = 6;\n}\n\nmessage ReserveNResponse {\n    int32 permit = 1;\n}\n\nmessage Request {\n    oneof payload {\n        ReserveNRequest reserveN = 1;\n    }\n}\n\nmessage Response {\n    oneof payload {\n        ReserveNResponse reserveN = 1;\n    }\n}\n```\n\n字段语义：\n\n- `from`：调用方来源标识。当前服务端没有读取该字段。\n- `group`：令牌桶分组，传给 `tokens.GetTokenBucket(req.Group)`。\n- `preferred`：优先尝试消耗的资源标识。\n- `fallback`：降级资源标识。\n- `quota`：客户端请求的令牌数量。服务端会将负数修正为 `0`。\n- `mode`：降级模式字符串，会转换为 `token.FallbackMode(req.Mode)`。\n- `permit`：最终允许通过的令牌数量，由 `AllowAtMostN` 返回。\n\n当前 `Request` 和 `Response` 的 `oneof` 中都只有 `reserveN` 一种类型。如果新增协议动作，需要同时修改 `payload.proto`、重新生成 `payload.pb.go`，并扩展 `handleRequest` 的类型分发逻辑。\n\n## 启动入口\n\n外部通过包级函数 `udpserver.Serve(address string) error` 启动服务。调用链中 `main.go` 会调用该函数。\n\n`Serve(address)` 的职责很薄：\n\n1. 安装 `recover`，避免启动流程 panic 直接打崩进程。\n2. 上报 `udphandleRequest.throughput`，状态为 `startUdpServer`。\n3. 创建 `SimpleUDPServer`。\n4. 调用实例方法 `(*SimpleUDPServer).Serve(address)`。\n\n实例方法 `(*SimpleUDPServer).Serve(address)` 才是真正的 UDP 循环：\n\n1. 调用 `net.ListenPacket(\"udp\", address)` 监听 UDP 地址。\n2. 成功后把连接保存到 `s.conn`。\n3. 循环分配 `maxBufferSize` 大小的缓冲区。\n4. 调用 `s.conn.ReadFrom(buffer)` 读取单个 UDP 包。\n5. 对每个成功读取的包启动 goroutine：`go s.handleRequest(buffer[:n], addr)`。\n\n服务当前没有主动退出机制，也没有关闭 `s.conn` 的路径。`Serve` 方法中的 `return nil` 在无限循环后不可达，只是满足函数签名。\n\n## 请求处理流程\n\n```mermaid\nflowchart TD\n    A[\"main.go 调用 udpserver.Serve\"] --> B[\"SimpleUDPServer.Serve 监听 UDP\"]\n    B --> C[\"ReadFrom 读取数据包\"]\n    C --> D[\"goroutine 执行 handleRequest\"]\n    D --> E[\"proto.Unmarshal 到 protocol.Request\"]\n    E --> F{\"payload 类型\"}\n    F -->|ReserveN| G[\"handleReserveN\"]\n    F -->|未知类型| H[\"记录 errorType\"]\n    G --> I[\"GetTokenBucket + AllowAtMostN\"]\n    I --> J[\"必要时 syncer.Sync\"]\n    J --> K[\"返回 ReserveNResponse.permit\"]\n```\n\n`handleRequest(data []byte, addr net.Addr)` 负责协议层解析和分发：\n\n- 使用 `proto.Unmarshal(data, &req)` 解码为 `protocol.Request`。\n- 解码失败时上报 `UnmarshalError` 并返回，不会响应客户端。\n- 通过 type switch 判断 `req.Payload`：\n  - `*protocol.Request_ReserveN`：上报 `successReceieve`，调用 `s.handleReserveN(r.ReserveN, addr)`。\n  - 其他类型：上报 `errorType` 并记录错误日志。\n\n`handleRequest` 内部也有 `recover`，panic 会被记录为 `udpHandleRequest`，并上报 `metrics.Panic`。该函数还通过 `defer metrics.EmitTimer(\"udphandleRequest.\"+metrics.Latency, time.Now())` 统计请求处理延迟。\n\n## ReserveN 处理逻辑\n\n`handleReserveN(req *protocol.ReserveNRequest, addr net.Addr)` 是业务核心。它完成以下步骤：\n\n1. 组装指标标签：\n\n   ```go\n   tagPairs := []string{\n       metrics.Group, req.Group,\n       metrics.Preferred, req.Preferred,\n       metrics.Fallback, req.Fallback,\n       metrics.Mode, req.Mode,\n       metrics.Version, \"v1\",\n   }\n   ```\n\n2. 统计 `handleReserveN.latency`。\n3. 对测试分组 `bytedance.videoarch.unit_testing_server_error` 特殊处理：睡眠 5 秒后直接返回，不发送响应。\n4. 将负数 `req.Quota` 修正为 `0`。\n5. 上报 `BaseInfo` store 指标。\n6. 通过 `tokens.GetTokenBucket(req.Group)` 获取分组对应的 token bucket。\n7. 调用：\n\n   ```go\n   n, flag := t.AllowAtMostN(\n       req.Preferred,\n       req.Fallback,\n       token.FallbackMode(req.Mode),\n       int64(req.Quota),\n   )\n   ```\n\n8. 如果 `n > 0`，调用 `syncer.Sync(req.Group, req.Preferred, req.Fallback, token.FallbackMode(req.Mode), n, flag, false)` 同步消耗结果。\n9. 上报通过和未通过的令牌数量：\n   - `harden.server.tokens`，`status=pass`，值为 `n`。\n   - `harden.server.tokens`，`status=notPass`，值为 `int64(req.Quota)-n`。\n10. 构造并编码 `protocol.Response_ReserveN`，通过 `s.conn.WriteTo(data, addr)` 发回客户端。\n\n当前代码会计算 `outputPreferred` 和 `outputFallback`，将空字符串替换成 `\"nil\"`，但这两个变量没有参与后续逻辑。指标标签仍然使用 `req.Preferred` 和 `req.Fallback` 的原始值。\n\n## 与其他模块的连接\n\n`udpserver` 自身只负责网络协议和请求编排，真正的限流与配置逻辑在其他模块中完成：\n\n- `tokens.GetTokenBucket(req.Group)`：按 `group` 获取 token bucket。调用链会进入 `token.WithRemoteConfig` 和 `updateConfig`，并读取远程配置中的限流参数。\n- `t.AllowAtMostN(...)`：根据 `preferred`、`fallback`、`mode` 和 `quota` 计算允许数量。执行流最终会进入 `token/token_bucket.go` 或 `rate/rate.go` 中的 `Limit`。\n- `syncer.Sync(...)`：当实际放行数量 `n > 0` 时同步令牌消耗结果。\n- `metrics.EmitCounter`、`metrics.EmitTimer`、`metrics.EmitStore`：记录吞吐、延迟、令牌结果和基础标签。指标内部会经过 `GetMetrics`、`GetPrecisionConfig` 和 `Precision`，因此采样精度受 TCC 配置影响。\n- `logs`：记录监听错误、解码错误、未知请求类型和 panic。\n\n## 并发和网络行为\n\n每个 UDP 包都会启动一个 goroutine 调用 `handleRequest`。这意味着服务端可以并发处理多个请求，但也要求下游组件具备并发安全性，尤其是 `tokens.GetTokenBucket` 返回的 bucket、`AllowAtMostN` 和 `syncer.Sync`。\n\n关键常量：\n\n```go\nconst (\n    maxBufferSize = 1024\n    writeTimeout  = time.Millisecond * 10\n)\n```\n\n`maxBufferSize` 限制单个 UDP 包最多读取 1024 字节。超过该大小的 UDP 数据会被截断，随后 `proto.Unmarshal` 可能失败。\n\n`writeTimeout` 当前未被使用。`handleReserveN` 直接调用 `s.conn.WriteTo(data, addr)`，没有设置写超时，也没有检查 `WriteTo` 的返回错误。客户端侧需要自行处理 UDP 丢包、无响应和超时重试。\n\n## 错误处理和可观测性\n\n启动阶段：\n\n- `net.ListenPacket` 失败时记录 `[harden]: ListenPacket error`，上报 `ServeError`，并返回错误。\n- 启动成功后上报 `listernSuccess`。注意指标状态字符串和日志里都使用了 `listern` 拼写。\n\n收包阶段：\n\n- `ReadFrom` 失败时记录 warn，状态为 `readFromBufferError`，继续循环。\n- 成功读取时状态为 `readFromBufferSuccess`。\n\n协议解析阶段：\n\n- protobuf 解码失败：`UnmarshalError`。\n- 成功接收 `ReserveN`：`successReceieve`。\n- 未知 payload：`errorType`。\n\n业务处理阶段：\n\n- `handleReserveN.latency`：按 `group`、`preferred`、`fallback`、`mode`、`version=v1` 打标签。\n- `harden.server.tokens`：分别记录 `pass` 和 `notPass`。\n- `handleReserveN.throughput`：成功完成处理时状态为 `success`。\n\npanic 保护：\n\n- 包级 `Serve` 的 panic 上报函数名为 `udpServeStart`。\n- `handleRequest` 的 panic 上报函数名为 `udpHandleRequest`。\n\n## 生成协议代码\n\n协议源文件是 `udpserver/protocol/payload.proto`。生成脚本是：\n\n```bash\nudpserver/protocol/gen_proto.sh\n```\n\n脚本会以 `payload.proto` 所在目录作为 `SRC_DIR` 和 `DST_DIR`，执行：\n\n```bash\nprotoc -I=$SRC_DIR --go_out=$DST_DIR $SRC_DIR/payload.proto\n```\n\n修改 protobuf 时，需要确保生成后的 `payload.pb.go` 与当前项目使用的 `github.com/golang/protobuf/proto` 版本兼容。生成文件中包含 `proto.ProtoPackageIsVersion3` 编译期检查。\n\n## 扩展新请求类型\n\n新增 UDP 协议动作时，建议按现有模式扩展：\n\n1. 在 `payload.proto` 中新增请求和响应 message。\n2. 将新 message 加入 `Request.payload` 和 `Response.payload` 的 `oneof`。\n3. 运行 `udpserver/protocol/gen_proto.sh` 重新生成 `payload.pb.go`。\n4. 在 `handleRequest` 的 type switch 中新增 `case *protocol.Request_...`。\n5. 将业务逻辑放入独立的 `handle...` 方法，保持 `handleRequest` 只负责解包和分发。\n6. 补齐对应的指标状态，避免新路径只在日志中可见。\n\n新增处理函数需要注意 UDP 的语义：请求可能重复、响应可能丢失、服务端不维护连接状态。因此业务处理最好具备幂等或可重试设计。","udp-server":"# UDP Server\n\n## UDP 服务模块\n\n`udpserver` 模块提供基于 UDP 的令牌预占服务。它监听指定地址，接收 protobuf 编码的 `protocol.Request`，当前只支持 `ReserveNRequest` 请求类型，并返回 `ReserveNResponse`，表示本次实际放行的令牌数量。\n\n该模块主要入口是包级函数 `Serve(address string)`，由 `main.go` 调用。实际监听和请求处理由 `SimpleUDPServer` 完成。\n\n## 核心执行流程\n\n```mermaid\nflowchart TD\n    A[\"main 调用 Serve\"] --> B[\"udpserver.Serve\"]\n    B --> C[\"SimpleUDPServer.Serve\"]\n    C --> D[\"ReadFrom 读取 UDP 包\"]\n    D --> E[\"handleRequest 解析 Request\"]\n    E --> F{\"payload 类型\"}\n    F -->|ReserveN| G[\"handleReserveN\"]\n    F -->|未知类型| H[\"记录 errorType 指标\"]\n    G --> I[\"tokens.GetTokenBucket\"]\n    I --> J[\"AllowAtMostN\"]\n    J --> K[\"syncer.Sync\"]\n    J --> L[\"写回 ReserveNResponse\"]\n```\n\n服务启动后，`(*SimpleUDPServer).Serve` 会进入无限循环。每次从 `net.PacketConn.ReadFrom` 读取一个 UDP 包后，都会启动一个 goroutine 调用 `s.handleRequest(buffer[:n], addr)`，因此请求处理是并发的。\n\n## 对外入口\n\n### `Serve(address string) error`\n\n包级 `Serve` 是模块的启动入口：\n\n```go\nfunc Serve(address string) error\n```\n\n它负责：\n\n- 捕获启动过程中的 panic。\n- 上报 `metrics.Panic`，函数标签为 `udpServeStart`。\n- 创建 `SimpleUDPServer`。\n- 上报启动指标 `udphandleRequest.throughput`，状态为 `startUdpServer`。\n- 调用 `(*SimpleUDPServer).Serve(address)` 开始监听。\n\n该函数本身不直接持有网络连接，连接保存在 `SimpleUDPServer.conn` 中。\n\n### `SimpleUDPServer`\n\n```go\ntype SimpleUDPServer struct {\n    conn net.PacketConn\n}\n```\n\n`SimpleUDPServer` 是实际的 UDP 服务实例。它只保存一个 `net.PacketConn`，用于读取请求和向请求来源地址写回响应。\n\n## 监听与收包\n\n### `(*SimpleUDPServer).Serve(address string) error`\n\n该方法使用：\n\n```go\nnet.ListenPacket(\"udp\", address)\n```\n\n创建 UDP 监听 socket。监听成功后会保存到 `s.conn`，然后持续执行：\n\n1. 创建 `maxBufferSize` 大小的缓冲区。\n2. 调用 `s.conn.ReadFrom(buffer)` 读取 UDP 数据包。\n3. 读取失败时记录 warn 日志并上报 `readFromBufferError`。\n4. 读取成功时上报 `readFromBufferSuccess`。\n5. 启动 goroutine 调用 `handleRequest`。\n\n关键常量：\n\n```go\nconst (\n    maxBufferSize = 1024\n    writeTimeout  = time.Millisecond * 10\n)\n```\n\n当前实现只使用了 `maxBufferSize`。`writeTimeout` 已定义但未用于 `WriteTo` 超时控制。\n\n需要注意：UDP 包超过 1024 字节时，`ReadFrom` 只能读取缓冲区大小内的数据，后续 protobuf 解析可能失败。当前协议只包含少量字段，正常 `ReserveNRequest` 通常不会触发这个限制。\n\n## 请求协议\n\n协议定义在 `udpserver/protocol/payload.proto`，生成代码在 `payload.pb.go`。\n\n### 请求类型\n\n```proto\nmessage Request {\n    oneof payload {\n        ReserveNRequest reserveN = 1;\n    }\n}\n```\n\n当前只支持 `reserveN` 一种 payload。`handleRequest` 会通过 Go 的 oneof wrapper 判断具体类型：\n\n```go\nswitch r := req.Payload.(type) {\ncase *protocol.Request_ReserveN:\n    s.handleReserveN(r.ReserveN, addr)\ndefault:\n    logs.Error(\"unknown request type: %T\", r)\n}\n```\n\n如果未来扩展新的 UDP 请求类型，需要同时修改：\n\n- `payload.proto` 中的 `Request.oneof payload`\n- 重新生成 `payload.pb.go`\n- `handleRequest` 的 `switch` 分支\n- 必要的响应结构与处理函数\n\n### `ReserveNRequest`\n\n```proto\nmessage ReserveNRequest {\n    string from = 1;\n    string group = 2;\n    string preferred = 3;\n    int32 quota = 4;\n    string fallback = 5;\n    string mode = 6;\n}\n```\n\n字段含义：\n\n- `from`：请求来源标识，当前服务端逻辑未使用。\n- `group`：令牌桶分组，用于 `tokens.GetTokenBucket(req.Group)`。\n- `preferred`：首选资源或路径，传给 `AllowAtMostN`。\n- `quota`：请求预占的令牌数。负数会被修正为 `0`。\n- `fallback`：兜底资源或路径，传给 `AllowAtMostN`。\n- `mode`：fallback 模式，转换为 `token.FallbackMode(req.Mode)`。\n\n### `ReserveNResponse`\n\n```proto\nmessage ReserveNResponse {\n    int32 permit = 1;\n}\n```\n\n`permit` 表示本次实际允许通过的令牌数量，对应 `AllowAtMostN` 返回的 `n`。\n\n## 请求处理\n\n### `handleRequest(data []byte, addr net.Addr)`\n\n`handleRequest` 是 UDP 包到业务请求之间的解码层。它负责：\n\n- 捕获单个请求处理中的 panic。\n- 上报 `udphandleRequest.latency`。\n- 使用 `proto.Unmarshal(data, &req)` 解析 `protocol.Request`。\n- 按 `req.Payload` 类型分发到具体处理函数。\n\n解析失败时会：\n\n- 上报 `UnmarshalError`。\n- 记录原始 `data` 和错误。\n- 直接返回，不写响应。\n\n未知 payload 类型时会：\n\n- 上报 `errorType`。\n- 记录 `unknown request type` 错误。\n- 不写响应。\n\n成功接收 `ReserveN` 请求时会上报状态 `successReceieve`，然后调用：\n\n```go\ns.handleReserveN(r.ReserveN, addr)\n```\n\n这里的状态字符串存在拼写问题：`successReceieve` 是代码中的实际指标值，依赖指标查询时需要使用这个拼写。\n\n## 令牌预占逻辑\n\n### `handleReserveN(req *protocol.ReserveNRequest, addr net.Addr)`\n\n`handleReserveN` 是模块的核心业务函数。它根据请求参数从对应令牌桶中预占最多 `quota` 个令牌，并把实际放行数量写回客户端。\n\n执行步骤：\n\n1. 构造指标标签：\n\n   ```go\n   tagPairs := []string{\n       metrics.Group, req.Group,\n       metrics.Preferred, req.Preferred,\n       metrics.Fallback, req.Fallback,\n       metrics.Mode, req.Mode,\n       metrics.Version, \"v1\",\n   }\n   ```\n\n2. 延迟上报 `handleReserveN.latency`。\n\n3. 对特殊测试分组做服务端超时模拟：\n\n   ```go\n   if req.Group == \"bytedance.videoarch.unit_testing_server_error\" {\n       time.Sleep(5 * time.Second)\n       return\n   }\n   ```\n\n   该分支不会返回响应，通常用于单测或客户端超时行为验证。\n\n4. 将负数 `quota` 修正为 `0`：\n\n   ```go\n   if req.Quota < 0 {\n       req.Quota = 0\n   }\n   ```\n\n5. 上报 `BaseInfo` store 指标。\n\n6. 获取分组令牌桶：\n\n   ```go\n   t := tokens.GetTokenBucket(req.Group)\n   ```\n\n   根据调用链，`GetTokenBucket` 会进一步走到 `token.WithRemoteConfig`、`updateConfig`，并读取限流配置中的 `Limit`。\n\n7. 调用令牌桶预占：\n\n   ```go\n   n, flag := t.AllowAtMostN(\n       req.Preferred,\n       req.Fallback,\n       token.FallbackMode(req.Mode),\n       int64(req.Quota),\n   )\n   ```\n\n   `n` 是实际放行数量，`flag` 会传给同步逻辑。\n\n8. 当 `n > 0` 时同步消耗：\n\n   ```go\n   syncer.Sync(req.Group, req.Preferred, req.Fallback, token.FallbackMode(req.Mode), n, flag, false)\n   ```\n\n9. 上报通过和未通过的 token 数：\n\n   ```go\n   metrics.EmitCounter(\"harden.server.tokens\", n, ..., metrics.Status, \"pass\")\n   metrics.EmitCounter(\"harden.server.tokens\", int64(req.Quota)-n, ..., metrics.Status, \"notPass\")\n   ```\n\n10. 构造并写回 protobuf 响应：\n\n    ```go\n    resp := protocol.Response{\n        Payload: &protocol.Response_ReserveN{\n            &protocol.ReserveNResponse{\n                Permit: int32(n),\n            },\n        },\n    }\n    data, _ := proto.Marshal(&resp)\n    s.conn.WriteTo(data, addr)\n    ```\n\n当前实现忽略了 `proto.Marshal` 和 `WriteTo` 的错误，也没有使用 `writeTimeout` 设置写超时。贡献代码时如果要增强可靠性，可以优先补齐这两处错误处理。\n\n## 指标与配置链路\n\n该模块大量依赖 `metrics` 包上报吞吐、延迟、异常和业务 token 统计。根据执行流，指标上报会进入：\n\n```text\nEmitCounter / EmitTimer\n→ CtxEmitCounter / CtxEmitTimer\n→ GetMetrics\n→ tcc.GetPrecisionConfig\n→ Precision\n```\n\n这意味着 UDP 服务的指标采样或精度行为受 TCC 配置影响。排查“指标没有上报”或“指标数量不符合预期”时，不应只看 `udpserver`，还需要检查 `metrics` 和 `tcc` 配置。\n\n主要指标名称包括：\n\n- `udphandleRequest.throughput`\n- `udphandleRequest.latency`\n- `handleReserveN.throughput`\n- `handleReserveN.latency`\n- `harden.server.tokens`\n- `BaseInfo`\n- `metrics.Panic`\n\n常见状态标签包括：\n\n- `startUdpServer`\n- `ServeError`\n- `listernSuccess`\n- `readFromBufferError`\n- `readFromBufferSuccess`\n- `UnmarshalError`\n- `successReceieve`\n- `errorType`\n- `success`\n- `pass`\n- `notPass`\n\n其中 `listernSuccess`、`successReceieve` 是代码中的实际拼写。\n\n## 与其他模块的关系\n\n`udpserver` 本身只负责 UDP 收包、protobuf 编解码、请求分发和响应写回。令牌计算和配置读取由其他模块完成：\n\n- `tokens.GetTokenBucket(req.Group)`：按 `group` 获取令牌桶。\n- `token.TokenBucket.AllowAtMostN(...)`：执行最多 N 个令牌的放行判断。\n- `token.FallbackMode(req.Mode)`：把请求中的字符串模式转换为 fallback 模式。\n- `syncer.Sync(...)`：当有令牌通过时同步消耗结果。\n- `metrics.EmitCounter`、`metrics.EmitTimer`、`metrics.EmitStore`：上报服务状态、延迟和业务结果。\n- `logs`：记录监听、解析、未知请求和 panic 信息。\n\n因此，修改 `handleReserveN` 时要特别关注跨模块契约：`group`、`preferred`、`fallback`、`mode` 和 `quota` 会同时影响令牌桶选择、fallback 策略、同步行为和指标维度。\n\n## 并发模型\n\n`SimpleUDPServer.Serve` 对每个 UDP 包启动一个 goroutine：\n\n```go\ngo s.handleRequest(buffer[:n], addr)\n```\n\n这带来几个实现约束：\n\n- `s.conn` 会被多个 goroutine 并发调用 `WriteTo`。`net.PacketConn` 的并发读写通常由 Go 网络库支持。\n- 共享状态不在 `udpserver` 内部维护，而是在 `tokens`、`token`、`syncer` 等模块中处理。\n- 单个请求 panic 会被 `handleRequest` 的 defer recover 捕获，不会直接退出整个服务。\n- 启动阶段 panic 会被包级 `Serve` 捕获。\n\n因为处理逻辑异步执行，调用方不能依赖 UDP 请求的严格处理顺序。客户端也应按 UDP 的语义处理丢包、乱序和超时。\n\n## `stackprinter.go`\n\n`stackprinter.go` 提供三个栈格式化辅助函数：\n\n- `stack(skip int) []byte`\n- `source(lines [][]byte, n int) []byte`\n- `function(pc uintptr) []byte`\n\n`stack` 使用 `runtime.Caller` 遍历调用栈，读取源码文件并输出函数名与源码行。`source` 根据行号返回去除空白后的源码行，`function` 将 `runtime.FuncForPC` 返回的完整函数名简化为包内更易读的形式。\n\n从当前调用图看，`stack` 没有被 `server.go` 使用；当前 panic 记录使用的是标准库 `runtime/debug.Stack()`。如果要移除或替换该文件，需要先确认仓库其他位置是否依赖这些非导出函数。\n\n## 扩展建议\n\n新增请求类型时，优先保持现有分层：\n\n1. 在 `payload.proto` 中新增 request 和 response message。\n2. 扩展 `Request.oneof payload` 和 `Response.oneof payload`。\n3. 重新生成 `payload.pb.go`。\n4. 在 `handleRequest` 中新增类型分支。\n5. 新增独立的 `handleXxx` 函数处理业务逻辑。\n6. 为新分支补齐吞吐、延迟、错误和业务结果指标。\n\n不要把新业务逻辑直接塞进 `handleRequest`。`handleRequest` 应继续只承担解析、分发和通用异常保护，具体业务应放在独立处理函数中，类似当前的 `handleReserveN`。"};

(function() {
  var activePage = 'overview';

  document.addEventListener('DOMContentLoaded', function() {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
    renderMeta();
    renderNav();
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });
    if (location.hash && location.hash.length > 1) {
      activePage = decodeURIComponent(location.hash.slice(1));
    }
    navigateTo(activePage);
  });

  function renderMeta() {
    if (!META) return;
    var el = document.getElementById('meta-info');
    var parts = [];
    if (META.generatedAt) {
      parts.push(new Date(META.generatedAt).toLocaleDateString());
    }
    if (META.model) parts.push(META.model);
    if (META.fromCommit) parts.push(META.fromCommit.slice(0, 8));
    el.textContent = parts.join(' \u00b7 ');
  }

  function renderNav() {
    var container = document.getElementById('nav-tree');
    var html = '<div class="nav-section">';
    html += '<a class="nav-item overview" data-page="overview" href="#overview">Overview</a>';
    html += '</div>';
    if (TREE.length > 0) {
      html += '<div class="nav-group-label">Modules</div>';
      html += buildNavTree(TREE);
    }
    container.innerHTML = html;
    container.addEventListener('click', function(e) {
      var target = e.target;
      while (target && !target.dataset.page) { target = target.parentElement; }
      if (target && target.dataset.page) {
        e.preventDefault();
        navigateTo(target.dataset.page);
      }
    });
  }

  function buildNavTree(nodes) {
    var html = '';
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      html += '<div class="nav-section">';
      html += '<a class="nav-item" data-page="' + escH(node.slug) + '" href="#' + encodeURIComponent(node.slug) + '">' + escH(node.name) + '</a>';
      if (node.children && node.children.length > 0) {
        html += '<div class="nav-children">' + buildNavTree(node.children) + '</div>';
      }
      html += '</div>';
    }
    return html;
  }

  function escH(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function navigateTo(page) {
    activePage = page;
    location.hash = encodeURIComponent(page);

    var items = document.querySelectorAll('.nav-item');
    for (var i = 0; i < items.length; i++) {
      if (items[i].dataset.page === page) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }

    var contentEl = document.getElementById('content');
    var md = PAGES[page];

    if (!md) {
      contentEl.innerHTML = '<div class="empty-state"><h2>Page not found</h2><p>' + escH(page) + '.md does not exist.</p></div>';
      return;
    }

    contentEl.innerHTML = marked.parse(md);

    // Rewrite .md links to hash navigation
    var links = contentEl.querySelectorAll('a[href]');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href');
      if (href && href.endsWith('.md') && href.indexOf('://') === -1) {
        var slug = href.replace(/\.md$/, '');
        links[i].setAttribute('href', '#' + encodeURIComponent(slug));
        (function(s) {
          links[i].addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(s);
          });
        })(slug);
      }
    }

    // Convert mermaid code blocks into mermaid divs
    var mermaidBlocks = contentEl.querySelectorAll('pre code.language-mermaid');
    for (var i = 0; i < mermaidBlocks.length; i++) {
      var pre = mermaidBlocks[i].parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = mermaidBlocks[i].textContent;
      pre.parentNode.replaceChild(div, pre);
    }
    try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}

    window.scrollTo(0, 0);
    document.getElementById('sidebar').classList.remove('open');
  }
})();
