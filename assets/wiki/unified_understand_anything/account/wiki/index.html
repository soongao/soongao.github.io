var PAGES = {"api-controllers-and-middleware":"# API Controllers and Middleware\n\n## 模块概览\n\n`API Controllers and Middleware` 模块负责把 Gin HTTP 请求转换为统一的业务处理入口，并在控制器外层集中处理鉴权、限流、响应封装、指标、日志、链路追踪和跨域头。\n\n核心约定是 `middleware.MyHandler`：\n\n```go\ntype MyHandler func(c *gin.Context, ctx context.Context) *errno.Payload\n```\n\n业务控制器只返回 `*errno.Payload`，不直接写 HTTP 响应。`Response`、`OpenAPIResponse`、`JanusResponse`、`WandResponse` 等包装器负责把 `errno.Payload` 转成不同调用方需要的 HTTP/JSON 形态。\n\n## 请求处理主链路\n\n```mermaid\nflowchart TD\n    A[\"Gin 路由\"] --> B[\"Filter\"]\n    B --> C[\"Response / OpenAPIResponse / JanusResponse / WandResponse\"]\n    C --> D[\"MyHandler 控制器\"]\n    D --> E[\"DAO / TCC / Validator / Util\"]\n    E --> F[\"errno.Payload\"]\n    F --> C\n    C --> G[\"HTTP JSON 响应\"]\n```\n\n典型内部接口使用 `Filter` 设置调用方 PSM，再通过 `Response(mkey, handler)` 包装控制器。`Response` 会从 `ginex.RPCContext(c)` 取 RPC 上下文，并写入 `gorm.ContextSkipStressForRead = true`，让测试流量的读请求访问原表。\n\n## 账号控制器\n\n`src/controllers/account.go` 定义 `AccountsController`，目前提供两个查询接口。\n\n### `AccountsController.Search`\n\n`Search(c, ctx)` 是 V2 账号分页查询入口，使用 `dto.PageGetAccountRequest` 承载查询参数。它支持分页参数 `Offset`、`Limit`，也支持通过 `AccountIds` 和 `QueryName` 做筛选或模糊查询。\n\n处理流程：\n\n1. 使用 `c.BindQuery(pageGetAccountRequest)` 绑定 query 参数，失败返回 `errno.CodeBadRequest`。\n2. 调用 `validator.RefinePageParams` 修正分页参数。\n3. 通过 `util.EmitThroughput` 和 `util.EmitLatency` 上报 `AccountsController.Search` 指标。\n4. 调用 `dao.Db.GetVideoAccountAmount(ctx, pageGetAccountRequest)` 查询总数。\n5. 总数为 0 时返回空的 `dto.SearchAccountsResponse`。\n6. 调用 `dao.Db.PageGetVideoAccount(ctx, pageGetAccountRequest)` 查询分页账号。\n7. 返回前将每个 `VideoAccount.SecretKey` 清空，避免密钥泄露。\n8. 将结果包装为 `[]dto.MGetVideoAccountResponse`，其中 `VideoConfigs` 当前置为 `nil`。\n\n返回数据结构是 `dto.SearchAccountsResponse`：\n\n```go\nresp.TotalCount = amount\nresp.VideoAccounts = items\nreturn errno.OK(resp)\n```\n\n错误统一通过 `errno.ErrorWithCode` 返回，例如参数错误使用 `errno.CodeBadRequest`，数据库错误使用 `errno.CodeDbErr`。\n\n### `AccountsController.SearchTopAccountIds`\n\n`SearchTopAccountIds(c, ctx)` 查询去重后的 `TopAccountID` 列表，同样使用 `dto.PageGetAccountRequest` 和 `validator.RefinePageParams`。\n\n它先调用 `dao.Db.GetVideoAccountDistinctTopAccountIdAmount` 获取总数，再调用 `dao.Db.PageGetVideoAccountDistinctTopAccountIds` 获取分页数据，最后从 `VideoAccount.TopAccountID` 中提取 `[]int64`，填入 `dto.PageGetTopAccountIdsResponse.TopAccountIds`。\n\n## 统一响应包装\n\n### `Response`\n\n`Response(mkey, f)` 是普通内部 API 的主要包装器。它负责：\n\n- 提取 `PSM`，默认值为 `\"unknown\"`。\n- 读取 SDK 版本头：优先 `X-TT-Account-Sdk-Version`，其次 `X-TT-Biz-Callback-Sdk-Version`。\n- 通过反射获取 handler 方法名，并写入 `c.Set(\"K_METHOD\", method)`。\n- 执行两级限流：`interface_limiter.Allow(mkey)` 和 `util.HardenCli.Allow(psm + \":\" + mkey)`。\n- 设置 CORS 和禁用缓存相关响应头。\n- 使用 `c.JSON(http.StatusOK, data)` 输出 `errno.Payload`。\n- 上报延迟、吞吐、错误指标。\n- 将方法名、来源服务、业务状态码、错误状态写入 bytedtrace span。\n\n`Response` 还会读取 Gin context 中的 `ISGetAllAccounts` 和 `LocalCacheHit`，如果存在则追加到 metrics tag 中。\n\n错误日志分级规则：\n\n- `data.Code >= errno.CodeInternalErr`：使用 `logs.CtxError`。\n- 其他非成功码：使用 `logs.CtxWarn`。\n- 成功码包括 `errno.CodeOK` 和 `errno.CodeOKZero`。\n\n### `OpenAPIResponse`\n\n`OpenAPIResponse(mkey, f)` 面向 OpenAPI 调用场景，除了普通响应封装外，还会执行 IAM 鉴权。\n\n处理流程：\n\n1. 调用 `iamsdk.VerifyV4WithKms(context.Background(), c.Request)` 验签。\n2. 从 `constant.OpenapiMethodPermission[mkey]` 获取当前接口需要的权限。\n3. 从路由参数中读取 `account`。\n4. 调用 `iamsdk.GetIamPermissionsProject(ctx, Account.Name, projectId, []string{permission})` 校验项目权限。\n5. 鉴权通过后执行业务 handler。\n\n响应体仍然是 `errno.Payload` 的 JSON，但这里使用 `json.Marshal(data)` 后通过 `c.Data` 写出。错误指标会额外带上 IAM `account` tag。\n\n注意：当前实现中，项目权限校验失败后会设置 `data = errno.CodeUnauthorized`，但随后仍会继续执行 `data = f(c, ctx)`。维护这段代码时需要特别关注该分支是否符合预期。\n\n### `JanusResponse`\n\n`JanusResponse(mkey, f)` 面向 Janus 调用方，将内部 `errno.Payload` 转换为 `JanusPayload`：\n\n```go\ntype JanusPayload struct {\n    Code      int         `json:\"code\"`\n    Message   string      `json:\"message\"`\n    ReqeustId string      `json:\"trace_id\"`\n    Response  interface{} `json:\"response\"`\n}\n```\n\n`toJanusPayload` 会把 `errno.CodeOK` 映射为 `JanusOkCode`，即 `0`；其他错误码保持原值。业务数据放在 `response` 字段中。\n\n### `WandResponse`\n\n`WandResponse(mkey, f)` 面向 Wand 服务。它与普通响应最大的区别是：\n\n- 响应体只返回 `errno.Payload.Data`，不返回 `code`、`message` 等包装字段。\n- 使用 `X-Verification-Code` 做轻量校验。\n- 校验失败时返回 HTTP `403`，业务 payload 使用 `errno.ErrUnauthorized`。\n\n验证码格式是：\n\n```text\n毫秒时间戳|HMAC-SHA1(毫秒时间戳)\n```\n\n`checkCode` 会校验格式、时间窗口和签名。时间戳与当前时间相差超过 60 秒会失败。`genCode` 生成新的验证码并通过响应头 `X-Verification-Code` 返回。签名密钥来自 `config.Conf.Wand.Token`。\n\n## 前置中间件\n\n### `Filter`\n\n`Filter(c)` 负责提取调用方来源：\n\n```go\npsm := c.GetHeader(\"X-TT-From\")\nc.Set(PSM, psm)\n```\n\n对于非 GET 请求，它会检查 `tcc.GetAllowList(c)[psm]`。如果调用方不在写权限白名单中，直接返回 `errno.ErrNoWriteAuth`，HTTP 状态码仍为 `200`。\n\n`DuplicateStringFilter` 是一个简单的字符串去重工具，返回顺序取决于 map 遍历，不保证保持输入顺序。\n\n### `ACL`\n\n`NewACL()` 从 `tcc.GetACLConfigs(context.Background())` 加载 Basic Auth 配置，构造 `ACL.Check` 中间件。\n\n`ACL.Check` 的逻辑是：\n\n- 如果 `ACLConfig.IsEnabled()` 为 false，直接放行。\n- 读取 `constant.HeaderAuthorization`。\n- 使用 `util.ParseBaseAuth` 解析用户名和密码。\n- 校验 `ACL.Pairs[u] == p`。\n- 失败时调用 `HandleACLUnauthorized`，返回 HTTP `401` 和 `errno.ErrUnauthorized`。\n\n### `RateLimiter`\n\n`NewRateLimiter()` 基于 `config.Conf.RateLimiter` 初始化内存限流器：\n\n- 限流格式由 `config.Conf.RateLimiter.Rate` 提供。\n- 存储使用 `github.com/ulule/limiter/drivers/store/memory`。\n- 默认 key 由 `GetIP` 生成，优先使用 `constant.HeaderRealIP`，否则使用 `c.ClientIP()`。\n\n`RateLimiter.RateLimit` 会写入标准限流响应头：\n\n```go\nc.Header(constant.HeaderRateLimitLimit, strconv.FormatInt(ctx.Limit, 10))\nc.Header(constant.HeaderRateLimitRemaining, strconv.FormatInt(ctx.Remaining, 10))\nc.Header(constant.HeaderRateLimitReset, strconv.FormatInt(ctx.Reset, 10))\n```\n\n超过限流时 `HandleRateLimiterReached` 返回 HTTP `429` 和 `errno.ErrTooManyRequests`。\n\n### `LogRequest`\n\n`LogRequest(c)` 读取请求 body、恢复 `c.Request.Body`，然后记录方法、路径、请求头、JSON body 和 query 参数。因为它会调用 `c.GetRawData()`，恢复 body 的步骤对后续 handler 正常读取请求体是必要的。\n\n## 熔断器\n\n`InitCircuitBreaker()` 从 `tcc.GetCircuitBreakersConfigs(context.Background())` 读取熔断配置，并初始化全局变量 `CircuitBreakers`。\n\n`GetDBCircuitBreaker()` 获取名为 `\"DB\"` 的熔断器。只有同时满足以下条件时才返回有效的 `*gobreaker.CircuitBreaker`：\n\n- `CircuitBreakers[\"DB\"]` 已初始化。\n- `etcdutil.GetWithDefault(cb.Switch, \"0\") == \"1\"`。\n\n否则返回 `nil`。DAO 层多个数据库操作会调用 `GetDBCircuitBreaker`，因此这里是数据库访问熔断能力的统一入口。\n\n## 与其他模块的连接\n\n该模块位于 HTTP 边界层，主要依赖以下内部模块：\n\n- `dto`：定义请求和响应结构，例如 `PageGetAccountRequest`、`SearchAccountsResponse`、`PageGetTopAccountIdsResponse`。\n- `errno`：统一业务错误码和响应 payload。\n- `dao`：执行账号查询和数据库访问。\n- `validator`：修正分页参数，当前使用 `RefinePageParams`。\n- `util`：指标上报、Harden 限流、Basic Auth 解析、工具函数。\n- `tcc` / `config` / `constant`：动态配置、限流配置、ACL 配置和请求头常量。\n- `interface_limiter`：接口级本地限流。\n- `iamsdk`：OpenAPI IAM 验签和权限校验。\n- `bytedtrace`：链路 span 命名、来源服务、业务状态码和错误标记。\n\n新增 API 时，推荐复用现有模式：业务函数实现为 `MyHandler`，只返回 `*errno.Payload`；路由层根据调用方选择 `Response`、`OpenAPIResponse`、`JanusResponse` 或 `WandResponse` 包装；需要写权限的接口依赖 `Filter` 和 TCC allowlist；需要独立 IP 限流的链路使用 `NewRateLimiter()`。","application-runtime":"# Application Runtime\n\n## 模块概览\n\n`main.go` 是服务的应用运行时入口，负责完成进程级初始化、HTTP 引擎创建、中间件装配、路由注册以及最终启动 Gin 服务。该模块本身不承载业务逻辑，业务处理通过 `service` 包和 `controllers` 包暴露，运行时横切能力由 `middleware` 包统一包装。\n\n入口函数只有 `main()`，没有内部调用方，是整个进程的根执行点。\n\n## 启动流程\n\n```mermaid\nflowchart TD\n    A[\"main()\"] --> B[\"ginex.Init()\"]\n    B --> C[\"配置与动态配置初始化\"]\n    C --> D[\"RPC、缓存、DB 初始化\"]\n    D --> E[\"工具、中间件、服务初始化\"]\n    E --> F[\"RocketMQ consumer.Init()\"]\n    F --> G[\"ginex.Default()\"]\n    G --> H[\"注册路由组与接口\"]\n    H --> I[\"r.Run()\"]\n```\n\n`main()` 的初始化顺序是运行时契约的一部分：\n\n1. `ginex.Init()` 初始化 Gin 扩展运行环境。\n2. `defer logs.Stop()` 确保进程退出时刷新并停止日志组件。\n3. `config.InitConf()` 加载基础配置，后续 TCC、RPC、缓存、DAO 初始化都依赖配置可用。\n4. `tcc.SetDefaultValuesAndStartRefresh()` 设置动态配置默认值并启动刷新任务，其中执行流会到达 `SetStorageConfigCheckWhitelist`。\n5. `rpc.Init()` 初始化外部 RPC 客户端，并触发 DECC 元数据缓存刷新链路：`initDecc` → `startDeccMetaCacheRefresh` → `refreshDeccAccountCategoryEmbeddedMetadata` → `getBucketEmbeddedMetadata` → `getAllChannels` / `getAllChannelData`。\n6. `remote_cache.Init()` 初始化远端缓存，内部通过 `newRedisCli` 判断 `config.IsCIEnvironment`。\n7. `dao.InitDb()` 初始化数据库连接。\n8. `util.InitCheckSuffix()` 初始化后缀校验相关工具状态。\n9. `middleware.InitCircuitBreaker()` 初始化熔断器。\n10. `service.Init()` 初始化业务服务层所需的进程内状态。\n11. `util.InitRateLimiter()` 初始化限流器。\n12. `consumer.Init()` 初始化 RocketMQ 消费者。\n13. `ginex.Default()` 创建 HTTP router。\n14. 注册路由和中间件。\n15. `r.Run()` 启动 HTTP 服务。\n\n文件中的两个空导入也属于运行时初始化：\n\n- `_ \"code.byted.org/lidar/agent/init\"`：通过包初始化接入 Lidar agent。\n- `_ \"code.byted.org/videoarch/vda-mysql-driver\"`：注册 VDA MySQL driver，供 DAO 层初始化数据库连接时使用。\n\n## HTTP 路由组织\n\n核心 API 使用 `accountapi := r.Group(\"\")` 作为基础分组，并统一挂载三个中间件：\n\n```go\naccountapi.Use(middleware.Filter)\naccountapi.Use(middleware.NewACL())\naccountapi.Use(middleware.LogRequest)\n```\n\n挂在 `accountapi` 下的 `/account-api/v1`、`/account-api/v2`、`/account-api/v3` 会继承 `Filter`、`NewACL()` 和 `LogRequest`。其他直接从 `r.Group(...)` 创建的分组不会继承这些中间件，它们依赖各自的 response wrapper 实现访问控制或协议适配。\n\n## 响应包装模式\n\n路由处理函数统一使用中间件 wrapper 绑定指标名和业务 handler：\n\n```go\nv1.POST(\"/accounts\", middleware.Response(\"accounts.post\", service.CreateAccount))\n```\n\n常见模式如下：\n\n- `middleware.Response(name, handler)`：普通 account API 使用的响应包装。\n- `middleware.JanusResponse(name, handler)`：Janus/BPM 类内部调用方使用的响应包装。\n- `middleware.OpenAPIResponse(name, handler)`：OpenAPI 使用，注释说明该分组“不使用白名单 filter 而使用签名验签”。\n- `middleware.WandResponse(name, handler)`：Wand 系统回调用接口使用。\n\n第一个字符串参数如 `\"accounts.post\"`、`\"domain.rel.list\"` 是运行时标识，通常用于日志、监控、埋点或错误定位。新增接口时应保持命名稳定、可读，并与接口语义一致。\n\n## API 分组\n\n### `/account-api/v1`\n\n`v1 := accountapi.Group(\"/account-api/v1\")` 是主要的管理接口分组，覆盖账号、配置、计费实例、授权、同步规则、域名、ID Generator 和 schema 配置等能力。\n\n主要业务入口包括：\n\n- 账号管理：`service.CreateAccount`、`service.UpdateAccountStatus`、`service.UpdateAccount`、`service.MGetAccountWithConfig`、`service.PageGetAccount`、`service.CountAccounts`、`service.MGetAllAccountWithConfig`\n- 存储 bucket 查询：`service.GetAccountStorageBuckets`、`service.GetAccountStorageBucket`\n- 配置管理：`service.MCreateConfig`、`service.MCopyConfig`、`service.DeleteConfig`、`service.MUpdateConfig`、`service.GetConfig`、`service.ListConfigsByCondition`\n- 计费实例：`service.CreateInstance`、`service.DeleteInstance`、`service.UpdateInstance`、`service.UpdateInstanceByInstanceID`、`service.GetInstance`、`service.ListInstances`\n- 授权模型：`service.CreateCondition`、`service.DeleteCondition`、`service.GetCondition`、`service.CreateAccess`、`service.DeleteAccess`、`service.GetAccess`、`service.CreateAuthority`、`service.DeleteAuthority`、`service.UpdateAuthorityStatus`、`service.MGetAuthority`\n- 文件同步规则：`service.CreateVideoRule`、`service.UpdateRuleStatus`、`service.UpdateRuleById`、`service.MGetRule`、`service.PageGetRule`、`service.MGetCategory`\n- 文件同步规则 V2：`service.CreateVideoRuleV2`、`service.UpdateRuleStatusV2`、`service.UpdateRuleByIdV2`、`service.MGetRuleV2`\n- 域名与回源鉴权：`service.CreateDomainAuthInfo`、`service.GetDomainAuthInfos`、`service.UpdateDomainAuthStatus`、`service.DeleteDomainAuth`、`service.CreateDomain`、`service.GetDomain`、`service.DeleteDomain`\n- 域名和账号关系：`service.CreateDomainAccountRel`、`service.DeleteDomainAccountRel`、`service.UpdateDomainAccountRel`、`service.ListDomainAccountRel`\n- ID Generator 配置：`service.ListIdFetchers`、`service.UpdateIdFetcher`、`service.CreateIdFetcher`\n- account category schema：`service.CreateAccountCategorySchema`、`service.UpdateAccountCategorySchema`、`service.DeleteAccountCategorySchema`、`service.ListAccountCategorySchema`、`service.GetAccountCategoryEmbeddedSchema`、`service.GetDeccEmbeddedSchema`\n\n### `/account-api/v1/remote`\n\n`v1Remote := r.Group(\"/account-api/v1/remote\")` 直接挂在 root router 上，不继承 `accountapi.Use(...)` 的 `Filter`、`NewACL()`、`LogRequest`。\n\n当前接口包括：\n\n- `POST /configs` → `service.RemoteDeleteConfig`\n- `PUT /accounts` → `service.RemoteUpdateAccountStatus`\n\n维护这组接口时需要特别注意访问控制来源，因为它没有使用 `accountapi` 的统一中间件链。\n\n### `/account-api/v2`\n\n`v2 := accountapi.Group(\"/account-api/v2\")` 仍继承 account API 的通用中间件。账号查询部分使用 controller 风格：\n\n```go\naccountsController := new(controllers.AccountsController)\naccountGroup.GET(\"\", middleware.Response(\"accounts.search\", accountsController.Search))\n```\n\n当前 V2 接口包括：\n\n- `controllers.AccountsController.Search`：分页查询 accounts 列表，参数 `needConfigs` 控制是否返回每个 account 的配置信息。\n- `controllers.AccountsController.SearchTopAccountIds`：分页查询 `top_account_id` 列表。\n- `service.UpdateAccountV2`：全量更新账号字段。\n\n### `/account-api/v3`\n\n`v3 := accountapi.Group(\"/account-api/v3\")` 提供 V3 查询接口：\n\n- `GET /accounts` → `service.MGetAccountV3`\n- `GET /accounts/space/count` → `service.CountRegionSpacesV3`\n\n### `/account-janus/v1`\n\n`janus := r.Group(\"/account-janus/v1\")` 面向 Janus 调用方，主要使用 `middleware.JanusResponse`：\n\n- `service.ListDomainAccountRel`\n- `service.GetDeccEmbeddedSchema`\n\n其中 `POST /domain-account-rel/copy` 使用 `middleware.Response(\"domain_rel.copy\", service.CopyDomainAccountRel)`，这与同分组其他接口不同，修改时应确认调用方期望的响应格式。\n\n### `/account-bpm/v1`\n\n`bpm := r.Group(\"/account-bpm/v1\")` 面向 BPM 流程调用，全部使用 `middleware.JanusResponse`：\n\n- `service.CheckAccountExist`\n- `service.CreateAccount`\n- `service.BPMCreateDomainAccountRel`\n- `service.BPMCreateConfigs`\n- `service.BPMUpsertMetadataClean`\n- `service.BPMMigrateDomainAccountRel`\n\n### `/account-openapi/v1`\n\n`openapi := r.Group(\"/account-openapi/v1\")` 面向通用文件类型租户。代码注释明确说明该分组“不使用白名单 filter 而使用签名验签”，因此接口使用 `middleware.OpenAPIResponse`：\n\n- `GET /accounts/:account` → `service.GetAccountInfo`\n- `PUT /accounts/:account` → `service.ModifyAccount`\n\n### `/account-wand/v1`\n\n`wand := r.Group(\"/account-wand/v1\")` 提供给 Wand 系统回调，用于处理离职、转岗导致的负责人 username 变更：\n\n- `GET /vod/assets` → `service.GetAccountVodAssets`\n- `POST /vod/assets` → `service.UpdateAccountVodAssets`\n\n## 与其他模块的连接\n\nApplication Runtime 只编排模块，不实现业务规则。主要依赖关系如下：\n\n- `config`：提供启动配置和环境判断，例如 `InitConf`、`IsCIEnvironment`。\n- `tcc`：提供动态配置默认值和后台刷新任务。\n- `rpc`：初始化外部 RPC 客户端，并启动 DECC 元数据缓存刷新。\n- `remote_cache`：初始化 Redis 等远端缓存客户端。\n- `dao`：初始化数据库连接。\n- `middleware`：提供访问控制、日志、熔断、响应包装、OpenAPI 验签、Janus/Wand 协议适配。\n- `service`：承载大部分业务 handler。\n- `controllers`：承载 V2 controller 风格入口，目前使用 `controllers.AccountsController`。\n- `consumer`：初始化 RocketMQ 消费者。\n- `util`：初始化后缀校验、限流器和缓存过期时间等工具能力。\n\n## 新增接口的开发方式\n\n新增普通 account API 时，优先挂在 `accountapi` 的版本分组下，例如：\n\n```go\nv1.GET(\"/example\", middleware.Response(\"example.get\", service.GetExample))\n```\n\n开发时需要同时确认三点：\n\n1. 是否应该继承 `middleware.Filter`、`middleware.NewACL()`、`middleware.LogRequest`。如果需要，接口应挂在 `accountapi.Group(...)` 下。\n2. 是否需要特殊调用方协议。Janus/BPM 使用 `JanusResponse`，OpenAPI 使用 `OpenAPIResponse`，Wand 使用 `WandResponse`。\n3. 初始化依赖是否已经在路由注册前完成。需要配置、缓存、DB、RPC、限流或消费者状态的 handler，应确认对应 `Init` 调用顺序满足运行期要求。\n\n## 维护注意事项\n\n`main()` 的启动顺序不应随意调整。特别是 `config.InitConf()` 必须早于依赖配置的初始化逻辑，`dao.InitDb()` 应早于依赖数据库连接的服务处理，`util.InitRateLimiter()` 应早于可能依赖限流配置的消费者和接口运行。\n\n直接从 `r.Group(...)` 创建的分组不会继承 `accountapi` 上的通用中间件。`v1Remote`、`janus`、`bpm`、`openapi`、`wand` 都属于这种模式。调整访问控制或日志策略时，应逐组检查 wrapper 和 middleware，而不是只修改 `accountapi.Use(...)`。\n\n`middleware.Response` 的 name 参数是接口运行期可观测性的关键标识。复制路由时不要复用不相关的 name，否则会影响日志、监控或问题定位的准确性。","async-messaging":"# Async Messaging\n\n## 模块概览\n\nAsync Messaging 模块位于 `src/rocketmq/consumer/handler.go`，负责初始化 RocketMQ 消费者，并把异步消息分发到具体业务处理器。当前模块只注册了一个业务处理器：`ImageXDomainHandler`，用于消费 ImageX 域名接入变更消息，并调用 `service.ImageXDomainOnChange` 执行业务处理。\n\n该模块的入口是 `Init()`，由 `main` 调用。消息到达后，RocketMQ proxy SDK 会回调 `ImageXDomainHandler.HandleMessage`。\n\n## 执行链路\n\n```mermaid\nflowchart TD\n    A[\"main\"] --> B[\"consumer.Init\"]\n    B --> C[\"读取 config.Conf.Consumers\"]\n    C --> D[\"consumer.NewConsumer\"]\n    D --> E[\"RegisterHandler(ImageXDomainHandler)\"]\n    E --> F[\"r.Start\"]\n    F --> G[\"HandleMessage\"]\n    G --> H[\"json.Unmarshal -> dto.ImageXDomainMessage\"]\n    H --> I[\"service.ImageXDomainOnChange\"]\n```\n\n## 初始化流程：`Init`\n\n`Init()` 会遍历 `config.Conf.Consumers` 中的消费者配置，为每一项配置创建一个 RocketMQ consumer。\n\n核心流程如下：\n\n1. 从配置中读取 `Topic`、`ClusterName`、`ConsumerGroup`、`WorkerNum` 和 `Name`。\n2. 调用 `rocketConfig.NewDefaultConsumerConfig(consumerGroup, topic, clusterName)` 创建默认消费者配置。\n3. 设置消费并发数：`rmqCfg.WorkerNum = conf.WorkerNum`。\n4. 设置消费起点：`rmqCfg.ConsumeFromWhere = pb.SubscribeRequest_CONSUME_FROM_LATEST`。\n5. 调用 `consumer.NewConsumer(rmqCfg)` 创建消费者实例。\n6. 根据 `conf.Name` 注册对应 handler。\n7. 在 goroutine 中调用 `r.Start()` 启动消费。\n\n当前只支持一个消费者名称：\n\n```go\nswitch conf.Name {\ncase constant.TopicImageXDomain:\n    r.RegisterHandler(&ImageXDomainHandler{})\n}\n```\n\n这意味着只有当配置项的 `Name` 等于 `constant.TopicImageXDomain` 时，才会注册 `ImageXDomainHandler`。如果新增异步消息类型，应沿用这个分发模式，在 `switch conf.Name` 中增加新的 case，并注册新的 handler。\n\n## 消费配置约定\n\n模块依赖 `config.Conf.Consumers` 提供 RocketMQ 消费者配置。代码中使用到的字段包括：\n\n- `Topic`：RocketMQ topic。\n- `ClusterName`：RocketMQ 集群名。\n- `ConsumerGroup`：消费者组。\n- `WorkerNum`：消费 worker 数量。\n- `Name`：业务消费者名称，用于决定注册哪个 handler。\n\n消费起点固定为：\n\n```go\npb.SubscribeRequest_CONSUME_FROM_LATEST\n```\n\n因此消费者启动后默认从最新消息开始消费，而不是回溯历史消息。\n\n## `ImageXDomainHandler`\n\n`ImageXDomainHandler` 是当前模块唯一的业务消息处理器。\n\n```go\ntype ImageXDomainHandler struct {\n}\n```\n\n它通过实现 `HandleMessage(ctx context.Context, msg *pb.ConsumeMessage) error` 接入 RocketMQ consumer 的 handler 机制。\n\n### `HandleMessage`\n\n`HandleMessage` 负责完成三件事：\n\n1. 将 RocketMQ 消息体反序列化为 `dto.ImageXDomainMessage`。\n2. 记录收到的消息日志。\n3. 调用 `service.ImageXDomainOnChange(ctx, recMsg)` 执行业务处理。\n\n处理逻辑如下：\n\n```go\nfunc (r *ImageXDomainHandler) HandleMessage(ctx context.Context, msg *pb.ConsumeMessage) error {\n    recMsg := &dto.ImageXDomainMessage{}\n    if err := json.Unmarshal(msg.GetMsg().GetMsgBody(), recMsg); err != nil {\n        logs.CtxError(ctx, \"unmarshal message failed, msg:%s, err:%v\", string(msg.GetMsg().GetMsgBody()), err)\n        return err\n    }\n\n    logs.CtxInfo(ctx, \"[ImageXDomainHandler] rec: %v\", recMsg)\n\n    if err := service.ImageXDomainOnChange(ctx, recMsg); err != nil {\n        logs.CtxError(ctx, \"[TopicDomainHandler] error - %v\", err)\n        return err\n    }\n\n    logs.CtxInfo(ctx, \"[ImageXDomainHandler] rec: %v, handle success\", recMsg)\n    return nil\n}\n```\n\n如果 JSON 反序列化失败，函数会返回错误。  \n如果 `service.ImageXDomainOnChange` 返回错误，函数也会返回错误。  \n只有消息解析和业务处理都成功时，才返回 `nil`。\n\n返回错误的语义由 RocketMQ proxy SDK 决定，通常会影响消息是否被判定为消费失败以及后续重试行为。\n\n## 与业务层的连接\n\nAsync Messaging 模块不直接实现 ImageX 域名变更的业务逻辑。它只负责消息接入和协议转换。\n\n边界关系如下：\n\n- 消息协议 DTO：`dto.ImageXDomainMessage`\n- 消息处理入口：`ImageXDomainHandler.HandleMessage`\n- 业务处理函数：`service.ImageXDomainOnChange`\n\n这种划分让 consumer 层保持较薄：它只关心 RocketMQ、反序列化、日志和错误返回；真正的领域逻辑集中在 `service/domain.go` 的 `ImageXDomainOnChange` 中。\n\n## 日志与错误处理\n\n模块使用 `code.byted.org/gopkg/logs` 记录日志。\n\n初始化阶段：\n\n- `consumer.NewConsumer` 失败时调用 `logs.Fatalf(\"initConsumer: %v\", err)`，随后 `panic(err)`。\n- `r.Start()` 的返回值会被记录为 error 日志：`logs.Error(\"initConsumer: %v\", r.Start())`。\n\n消费阶段：\n\n- 反序列化失败时，记录原始消息体和错误。\n- 业务处理失败时，记录错误并返回。\n- 消费成功时，记录成功日志。\n\n需要注意，`HandleMessage` 中业务失败日志使用的 tag 是 `[TopicDomainHandler]`，而其他日志使用 `[ImageXDomainHandler]`。如果排查日志时按 handler 名称过滤，需要同时注意这两个前缀。\n\n## 新增消息消费者的推荐方式\n\n新增异步消息类型时，建议保持现有模式：\n\n1. 定义消息 DTO，例如当前的 `dto.ImageXDomainMessage`。\n2. 新增 handler 类型，并实现 `HandleMessage(ctx context.Context, msg *pb.ConsumeMessage) error`。\n3. 在 `Init()` 的 `switch conf.Name` 中增加对应 `case`。\n4. 在配置中增加一项 `Consumers` 配置，并确保 `Name` 与代码中的常量匹配。\n5. 在 handler 中只做消息解析、日志和服务层调用，避免把复杂业务逻辑写进 consumer 层。\n\n当前模块的扩展点就是这段分发逻辑：\n\n```go\nswitch conf.Name {\ncase constant.TopicImageXDomain:\n    r.RegisterHandler(&ImageXDomainHandler{})\n}\n```\n\n## 测试入口\n\n调用图中显示，测试代码通过 `handleMessage` 调用 `ImageXDomainHandler.HandleMessage`。因此该模块的单元测试重点应覆盖：\n\n- 合法 JSON 消息能反序列化为 `dto.ImageXDomainMessage`。\n- 非法 JSON 消息会返回错误。\n- `service.ImageXDomainOnChange` 返回错误时，`HandleMessage` 会向上返回错误。\n- 成功处理时返回 `nil`。","caching-layer":"# Caching Layer\n\n## 缓存层职责\n\n`remote_cache` 包封装账号服务对 Redis 远端缓存的访问，核心目标是把服务层的缓存读写、失效、互斥锁和降级行为集中在一个模块内。外部代码主要通过 `GetCacheInstance()` 获取 `RemoteCache` 接口，而不是直接操作 `go-remote-cache` 或 Redis。\n\n该模块覆盖三类数据：\n\n- 视频账号查询缓存：`MGetVideoAccount`、`SetVideoAccounts`、`SetQueryResult`、`RemoveAccount`\n- 域名账号关系缓存：`MListDomainAccountRel`、`SetDomainAccountRel`\n- CDN 调度域名缓存：`SetCDNScheduleDomains`、`GetCDNScheduleDomains`、`AcquireCDNScheduleDomainsLock`\n\n此外，模块还提供查询级互斥锁：`Lock`、`Unlock`、`Locked`，用于降低缓存击穿时的并发回源压力。\n\n## 入口与实现\n\n`RemoteCache` 是模块对服务层暴露的接口。当前有两个实现：\n\n- `mCache`：真实缓存实现，内部包装 `g.RemoteCache`\n- `nopRemoteCache`：降级实现，读写大多返回 `nopRemoteCacheErr`，让上层走兜底逻辑或直接跳过缓存\n\n```mermaid\nflowchart TD\n    服务层[\"服务层：account/config/refresh_cache\"]\n    入口[\"GetCacheInstance / Init\"]\n    接口[\"RemoteCache 接口\"]\n    实现[\"mCache\"]\n    降级[\"nopRemoteCache\"]\n    远端[\"go-remote-cache\"]\n    Redis[\"Redis\"]\n\n    服务层 --> 入口\n    入口 --> 接口\n    接口 --> 实现\n    接口 --> 降级\n    实现 --> 远端\n    远端 --> Redis\n```\n\n`mCache` 的定义很薄：\n\n```go\ntype mCache struct {\n    c g.RemoteCache\n}\n```\n\n所有真实读写最终都通过 `r.c.GetOnce`、`r.c.Get`、`r.c.Set`、`r.c.PipelineGet`、`r.c.PipelineSet`、`r.c.PipelineAdd`、`r.c.Delete`、`r.c.GetMembers` 等方法完成。\n\n## 初始化流程\n\n### `Init()`\n\n`Init()` 是服务启动时的显式初始化入口。`main` 和测试入口 `TestMain` 会调用它。\n\n当 `tcc.CheckRedisCacheSwitch()` 返回 `true` 时，`Init()` 会：\n\n1. 调用 `newRedisCli()` 创建 Redis 客户端\n2. 使用 `g.NewCacheBackend(redisCli)` 构造缓存后端\n3. 使用 `g.NewRemoteCache(...)` 创建 `g.RemoteCache`\n4. 将全局 `cacheInstance` 设置为 `&mCache{c: cache}`\n\n`Init()` 对 Redis 初始化失败采取强失败策略：如果 Redis 客户端创建失败或 `g.NewRemoteCache` 失败，会直接 `panic`。代码注释说明这是为了避免启动后大量流量直接穿透到数据库。\n\n### `GetCacheInstance()`\n\n`GetCacheInstance()` 是运行期获取缓存实例的入口。调用方包括：\n\n- `mgetAccountWithConfig`\n- `setAccountRedisCache`\n- `MCreateConfig`\n- `MUpdateConfig`\n- `DeleteConfig`\n- `refreshDomainRel`\n- `refreshCDNScheduleDomainCache`\n\n如果 `cacheInstance` 已经存在，函数直接返回。否则通过 `sync.Once` 延迟初始化：\n\n```go\ninitOnce.Do(func() {\n    redisCli, err := newRedisCli()\n    if err != nil {\n        cacheInstance = nopRemoteCacheInstance\n    } else {\n        cache, err := g.NewRemoteCache(...)\n        if err != nil {\n            cacheInstance = nopRemoteCacheInstance\n        } else {\n            cacheInstance = &mCache{c: cache}\n        }\n    }\n})\n```\n\n和 `Init()` 不同，`GetCacheInstance()` 对初始化失败采取降级策略：返回 `nopRemoteCacheInstance`，使请求继续执行并由上层兜底。\n\n需要注意的是，`GetCacheInstance()` 本身不检查 `tcc.CheckRedisCacheSwitch()`。如果启动时没有通过 `Init()` 建立实例，后续第一次调用 `GetCacheInstance()` 仍会尝试创建 Redis 缓存。\n\n### `newRedisCli()`\n\n`newRedisCli()` 根据环境构造 `goredis.Client`：\n\n- 普通环境使用 `config.Conf.Redis.Cluster`\n- CI 环境使用固定 Redis 地址 `redis://10.37.83.202:6380`，并设置密码与 `DisableGDPRVerify`\n\n超时配置来自：\n\n```go\nconfig.Conf.Redis.ReadTimeout\nconfig.Conf.Redis.WriteTimeout\nconfig.Conf.Redis.DialTimeout\n```\n\n缓存默认 TTL 和重试次数来自 TCC：\n\n```go\ntcc.GetRedisCacheTtl()\ntcc.GetRedisCacheRetryTimes()\n```\n\n## 视频账号缓存\n\n视频账号缓存分为两层 key：\n\n1. 查询结果 key：缓存一次查询对应的账号存储 key 列表\n2. 账号存储 key：缓存具体的 `dto.MGetVideoAccountResponse`\n\n这种设计避免同一个账号对象在不同查询条件下被重复存储，同时允许按 `accessKey` 批量删除所有相关实体缓存。\n\n### Key 结构\n\n`toQueryResultKey(req)` 根据 `dto.MGetAccountWithConfigRequest` 的查询条件生成查询结果 key，字段包括：\n\n- `ID`\n- `AccountName`\n- `QueryName`\n- `AccessKey`\n- `Module`\n- `Status`\n- `UserName`\n- `TopAccountID`\n- `TopInstanceID`\n- `VolcAccountID`\n- `VolcInstanceID`\n- `Type`\n- `AccountType`\n- `Region`\n- `WithDeleted`\n- `VRegion`\n\n末尾追加 `versionTag`，当前为 `@v2`。\n\n`toAccountStoreKey(accessKey, region, module)` 生成实体缓存 key：\n\n```go\nstrings.Join([]string{accessKey, region, module, versionTag}, \".\")\n```\n\n`toStoreKeySetKey(accessKey)` 生成账号到实体 key 集合的索引 key：\n\n```go\naccessKey + \":key_set\" + \"@v2\"\n```\n\n该集合用于 `RemoveAccount` 删除某个账号的所有实体缓存。\n\n### 读取：`MGetVideoAccount`\n\n`MGetVideoAccount(ctx, req)` 的读取流程：\n\n1. 通过 `toQueryResultKey(req)` 读取查询结果中的 `storeKeys`\n2. 对每个 `storeKey` 构造 `g.Item`\n3. 使用 `PipelineGet(ctx, batch, items...)` 批量读取实体缓存\n4. 如果所有实体命中，直接返回 `[]dto.MGetVideoAccountResponse`\n5. 如果某个实体 key 缺失，则解析 `storeKey`，从 DB 回源：\n   - `dao.Db.GetAccountByAK(ctx, &ak)`\n   - `dao.Db.MGetVideoConfig(ctx, ak, module, region)`\n6. 回源结果写入响应数组\n7. 异步将缺失的实体缓存和索引集合补回 Redis\n\n这里的缺失补偿逻辑是为了处理账号创建、更新、删除期间可能出现的查询结果 key 仍存在但实体 key 已被删除的情况。代码会记录 warn 日志，然后按实体 key 中解析出的 `accessKey`、`region`、`module` 回源。\n\n补偿写入是异步执行的：\n\n```go\ngo func() {\n    err := r.c.PipelineAdd(ctx, batch, toAddSets...)\n    ...\n    err = r.c.PipelineSet(ctx, batch, toSetItems...)\n    ...\n}()\n```\n\n这意味着主请求不等待缓存修复完成。调用方需要把 `MGetVideoAccount` 的返回值视为本次请求的权威结果，而不是缓存修复完成的信号。\n\n### 写入实体：`SetVideoAccounts`\n\n`SetVideoAccounts(ctx, req, resp)` 写入账号实体缓存，并维护 `accessKey -> storeKey` 集合。\n\n对每个 `dto.MGetVideoAccountResponse`：\n\n1. 使用 `toAccountStoreKey(acct.AccessKey, req.Region, req.Module)` 生成实体 key\n2. 使用 `toStoreKeySetKey(acct.AccessKey)` 生成集合 key\n3. 将实体写入 `PipelineSet`\n4. 将实体 key 加入集合 `PipelineAdd`\n\n实体缓存 TTL 为：\n\n```go\ntcc.GetRedisCacheTtl() + 30*time.Second\n```\n\n实体缓存比查询结果缓存多 30 秒，是为了降低查询结果 key 仍存在但实体缓存先过期导致的短时间不一致概率。\n\n### 写入查询结果：`SetQueryResult`\n\n`SetQueryResult(ctx, req, resp)` 只缓存查询结果到实体 key 的映射，不缓存实体本身。\n\n它会从 `resp` 中提取每个账号的实体 key：\n\n```go\ntoAccountStoreKey(response.AccessKey, req.Region, req.Module)\n```\n\n然后写入 `toQueryResultKey(req)`，TTL 为 `tcc.GetRedisCacheTtl()`。\n\n典型写入顺序应当是先调用 `SetVideoAccounts` 写实体，再调用 `SetQueryResult` 写查询结果。这样查询结果 key 出现时，对应实体更可能已经存在。\n\n### 删除：`RemoveAccount`\n\n`RemoveAccount(ctx, accessKey)` 用于账号变更后的缓存失效：\n\n1. 通过 `toStoreKeySetKey(accessKey)` 读取该账号关联的所有实体 `storeKeys`\n2. 立即删除这些实体 key\n3. 启动 goroutine，等待 10 秒后再次删除同一批 key\n\n第二次删除是延迟双删，用于降低并发写入旧值造成脏缓存的概率。\n\n需要注意：`RemoveAccount` 删除的是实体缓存 key，不直接删除所有查询结果 key。旧查询结果 key 如果还在，后续 `MGetVideoAccount` 读取到缺失实体时会回源 DB，并异步补齐实体缓存。\n\n## 查询互斥锁\n\n视频账号查询锁围绕 `toLockKey(req)` 构建。锁 key 是查询结果 key 后追加 `\"_lock\"`。\n\n### `Lock`\n\n`Lock(ctx, req)` 使用随机 UUID 作为锁值，并通过 `SetNX` 获取锁：\n\n```go\ng.SetOptions{SetNX: true, TTL: 30 * time.Second}\n```\n\n返回值包括：\n\n- `key`：实际锁 key\n- `value`：本次锁持有者的随机值\n- `err`：底层 `Set` 返回的错误\n\n调用方应保存 `value`，后续释放锁时传给 `Unlock`。\n\n### `Unlock`\n\n`Unlock(ctx, req, value)` 先读取当前锁值，只有 Redis 中的值与传入 `value` 一致时才删除锁：\n\n```go\nif _, err := r.c.Get(ctx, &g.Item{...}); err == nil && curVal == value {\n    return r.c.Delete(ctx, key)\n}\n```\n\n这可以避免误删其他请求刚获得的新锁。\n\n### `Locked`\n\n`Locked(ctx, req)` 只判断锁 key 是否可读。如果 `Get` 成功返回 `true`，否则返回 `false`。\n\n## 域名账号关系缓存\n\n域名账号关系缓存处理 `dto.ListDomainAccountRelRequest` 到 `[]*dto.DomainAccountRel` 的结果缓存。\n\n### Key 结构\n\n`toDomainAccountRelStoreKeySetKey(req)` 使用请求字段生成 key，包含：\n\n- `ID`\n- `Domain`\n- `DomainType`\n- `AccountName`\n- `Region`\n- `Module`\n- `Category`\n- `NeedSubDomains`\n\n这个 key 保存的不是最终结果，而是分片数据 key 列表。\n\n### 写入：`SetDomainAccountRel`\n\n`SetDomainAccountRel(ctx, req, resp)` 会先将 `resp` JSON 序列化，然后按 4096 字节切片：\n\n```go\ngrouped := groupBytes(rawBytes, 4096)\n```\n\n每个分片写入独立 store key：\n\n```go\nfmt.Sprintf(\"%s_%s_%d\", keySetKey, uuid, i)\n```\n\n其中 `uuid.New().String()` 用于区分不同批次的写入，避免新旧分片 key 混淆。\n\n写入流程是：\n\n1. `json.Marshal(resp)`\n2. `groupBytes(rawBytes, 4096)`\n3. `PipelineSet(ctx, batch, items...)` 写入所有分片\n4. `Set(ctx, keySetKey -> storeKeys)` 写入分片 key 列表\n\n### 读取：`MListDomainAccountRel`\n\n`MListDomainAccountRel(ctx, req)` 的读取流程：\n\n1. 通过 `toDomainAccountRelStoreKeySetKey(req)` 读取分片 key 列表 `storeKeys`\n2. 使用 `PipelineGet(ctx, batch, items...)` 批量读取所有分片\n3. 如果任一分片返回 `g.ErrCacheMiss`，整体返回 `g.ErrCacheMiss`\n4. 按顺序拼接所有分片字节\n5. 使用 `json.Unmarshal(rawBytes, &resp)` 还原 `[]*dto.DomainAccountRel`\n\n这个缓存对分片完整性要求较高：只要有一个分片缺失，就不会返回部分结果，而是让调用方走回源逻辑。\n\n## CDN 调度域名缓存\n\n`cdn_domain.go` 提供一组全局缓存 key：\n\n```go\nconst (\n    CDNScheduleDomainsKey     = \"cdn_schedule_domains\"\n    CDNScheduleDomainsLockKey = \"cdn_schedule_domains_lock\"\n)\n```\n\n### `SetCDNScheduleDomains`\n\n`SetCDNScheduleDomains(ctx, result)` 将 `map[string][]string` 写入固定 key `cdn_schedule_domains`。\n\n写入时设置：\n\n```go\ng.SetOptions{TTL: -1}\n```\n\n表示该数据不过期，刷新由业务流程主动控制。\n\n### `GetCDNScheduleDomains`\n\n`GetCDNScheduleDomains(ctx)` 从固定 key 读取 `map[string][]string`。如果底层 `GetOnce` 返回错误，函数返回 `nil, err`。\n\n### `AcquireCDNScheduleDomainsLock`\n\n`AcquireCDNScheduleDomainsLock(ctx)` 使用固定锁 key `cdn_schedule_domains_lock`，随机 UUID 作为锁值，并通过 `SetNX` 获取 30 秒锁。\n\n该函数只负责加锁，不提供对应的显式 unlock 方法。锁释放依赖 TTL 自动过期。\n\n## 降级实现：`nopRemoteCache`\n\n`nopRemoteCache` 实现完整的 `RemoteCache` 接口，用于 Redis 不可用时维持调用方代码路径稳定。\n\n大多数读取和写入方法返回：\n\n```go\nvar nopRemoteCacheErr = errors.New(\"nop remote cache\")\n```\n\n包括：\n\n- `MGetVideoAccount`\n- `SetVideoAccounts`\n- `SetQueryResult`\n- `MListDomainAccountRel`\n- `SetDomainAccountRel`\n- `SetCDNScheduleDomains`\n- `GetCDNScheduleDomains`\n- `AcquireCDNScheduleDomainsLock`\n\n部分方法是无害空操作：\n\n- `RemoveAccount` 返回 `nil`\n- `Lock` 返回空 key、空 value、`nil`\n- `Unlock` 返回 `nil`\n- `Locked` 返回 `false`\n\n因此调用方不应把 `Lock` 成功返回等价理解为真实 Redis 锁已建立；在降级实现下，锁相关方法会表现为无锁运行。\n\n## 与服务层的关系\n\n执行流显示，账号查询链路会经过缓存层：\n\n```text\nGetAccountInfo\n-> mGetAccountWithConfig0\n-> mgetAccountWithConfig\n-> GetCacheInstance\n-> newRedisCli / mCache / TCC 配置\n```\n\n批量查询也会经过同一入口：\n\n```text\nMGetAllAccountWithConfig\n-> mGetAccountWithConfig1\n-> mgetAccountWithConfig\n-> GetCacheInstance\n```\n\n配置变更链路通过 `GetCacheInstance()` 调用 `RemoveAccount` 或写入相关缓存，使账号配置变化能够影响缓存实体。\n\n刷新任务链路也依赖该模块：\n\n- `refreshDomainRel` 使用域名账号关系缓存\n- `refreshCDNScheduleDomainCache` 使用 CDN 调度域名缓存\n- `setAccountRedisCache` 使用视频账号实体缓存和查询结果缓存\n\n这意味着 `remote_cache` 既在在线查询路径上，也在后台刷新路径上。修改 key 结构、TTL、删除策略或降级行为时，需要同时考虑在线请求和刷新任务。\n\n## 一致性与并发特性\n\n该模块采用的是缓存旁路模式，而不是强一致缓存。\n\n关键特性包括：\n\n- 查询结果 key 和实体 key 分离，便于实体复用和按账号删除\n- 实体 TTL 比查询结果 TTL 多 30 秒，减少查询结果存在但实体过期的问题\n- `RemoveAccount` 使用延迟双删降低并发旧值回写风险\n- `MGetVideoAccount` 在实体缺失时会回源 DB，并异步修复缓存\n- 查询锁使用 `SetNX + TTL`，释放时校验 value，避免误删其他请求的锁\n- CDN 调度域名锁没有显式释放，依赖 30 秒 TTL\n\n这些策略提升了可用性，但不提供严格的读后写一致性。调用方需要能处理缓存未命中、缓存错误和短暂旧数据。\n\n## 修改时需要特别注意\n\n修改 `toQueryResultKey`、`toAccountStoreKey`、`toStoreKeySetKey` 或 `toDomainAccountRelStoreKeySetKey` 会改变 Redis key 空间。当前视频账号 key 使用 `versionTag = \"@v2\"` 做版本隔离；如果调整 key 语义，应考虑是否需要提升版本号，避免新旧结构混用。\n\n修改 `parseAccountStoreKey` 时要保持它与 `toAccountStoreKey` 的格式一致。当前解析逻辑假设实体 key 由点号分隔，并且前三段分别是 `accessKey`、`region`、`module`。\n\n修改 `SetVideoAccounts` 和 `SetQueryResult` 的调用顺序或 TTL 时，需要保证查询结果 key 不会长期指向不存在的实体 key。\n\n修改 `RemoveAccount` 时要保留按 `accessKey` 获取 store key 集合的能力，否则配置更新和删除流程无法可靠失效实体缓存。\n\n修改 `nopRemoteCache` 时要确认上层对错误和空操作的预期。当前设计是读写失败让上层兜底，删除和锁释放尽量不阻塞主流程。","configuration-and-tcc-settings":"# Configuration and TCC Settings\n\n## 配置与 TCC 设置模块\n\n该模块负责服务启动配置、TCC 动态配置读取、运行时开关刷新，以及部分下游组件的配置初始化。代码主要分为两个包：\n\n- `config`：加载本地配置，合并 TCC `base` 配置，校验配置结构，并提供数据库、熔断器等配置对象。\n- `tcc`：封装 TCC 客户端、配置读取函数、热更新任务，以及若干运行时缓存的设置项。\n\n```mermaid\nflowchart TD\n    A[\"main 调用 InitConf\"] --> B[\"caesar.Unmarshal 加载本地配置\"]\n    B --> C[\"mergeTCCBaseConfig 合并 TCC base\"]\n    C --> D[\"validator.Validate 校验 Conf\"]\n    D --> E[\"main 调用 SetDefaultValuesAndStartRefresh\"]\n    E --> F[\"写入默认运行时设置\"]\n    E --> G[\"process 首次拉取 TCC\"]\n    G --> H[\"更新 Redis 缓存、白名单、限流、内存限制\"]\n    E --> I[\"refreshTccConfig 定时刷新\"]\n```\n\n## 启动配置加载\n\n全局配置入口是 `config.Conf`：\n\n```go\nvar Conf *Config\n```\n\n服务启动时调用 `InitConf()`：\n\n1. 创建 `Config` 实例。\n2. 通过 `caesar.Unmarshal(Conf, ginex.ConfDir())` 从配置目录加载 YAML。\n3. 调用 `mergeTCCBaseConfig()` 尝试合并 TCC 中的 `base` 配置。\n4. 使用 `validator.Validate(Conf)` 执行结构校验。\n5. 使用 `pretty.Println(Conf)` 打印最终配置。\n\n`Config` 是静态配置的总结构，包含数据库、白名单、限流、熔断器、Redis、TCC、ID 生成器、远程写入等配置：\n\n```go\ntype Config struct {\n    Meta                 Meta\n    WriteDB              *Mysql\n    ReadDB               *Mysql\n    RetryTimes           int\n    ACL                  ACL\n    RateLimiter          RateLimiter\n    InterfaceRateLimiter InterfaceRateLimiterConfig\n    CircuitBreakers      map[string]CircuitBreaker\n    WhiteList            map[string]bool\n    Redis                Redis\n    RedisCache           RedisCache\n    TccInfo              TccInfo\n}\n```\n\n## TCC `base` 配置合并\n\n`mergeTCCBaseConfig()` 在本地 YAML 加载后执行，用于从 TCC 拉取 key 为 `base` 的基础配置，并与本地配置合并。\n\n关键逻辑：\n\n```go\nvalue, err := cli.Get(context.Background(), \"base\")\nyaml.Unmarshal([]byte(value), &tccConf)\nmergo.Merge(&tccConf, Conf)\nConf = &tccConf\n```\n\n合并方向很重要：\n\n- `tccConf` 先从 TCC `base` 解析而来。\n- `mergo.Merge(&tccConf, Conf)` 将本地 `Conf` 中的非零值补充到 `tccConf`。\n- 最终 `Conf = &tccConf`。\n\n因此，TCC `base` 中已经设置的字段优先保留；本地配置主要作为补充默认值。\n\n如果以下任一条件发生，函数只记录 warning 并保留本地配置：\n\n- `Conf == nil`\n- `Conf.Meta.PSM == \"\"`\n- TCC client 初始化失败\n- `base` 拉取失败或为空\n- YAML 解析失败\n- merge 失败\n\n## 配置校验\n\n`validator.go` 在 `init()` 中注册两个自定义校验函数：\n\n```go\nvalidator.SetValidationFunc(\"valid_duration\", validateDuration)\nvalidator.SetValidationFunc(\"valid_psm\", validatePSM)\n```\n\n当前代码中实际使用的是：\n\n```go\ntype Meta struct {\n    PSM string `yaml:\"PSM\" validate:\"valid_psm\"`\n}\n```\n\n`validatePSM()` 要求 PSM 以三段点分格式出现，例如 `a.b.c`。如果 `strings.Split(value, \".\")` 的长度不是 3，会返回 `errInvalidPSM`。\n\n`validateDuration()` 使用 `time.ParseDuration()` 校验字符串格式，但当前给出的配置结构中没有字段使用 `validate:\"valid_duration\"` 标签。需要新增字符串 duration 校验时，可以复用该 validator。\n\n## MySQL 配置\n\n`Mysql` 描述数据库连接参数：\n\n```go\ntype Mysql struct {\n    DSNTemplate  string\n    Username     string\n    Password     string\n    DBName       string\n    ConsulName   string\n    Timeout      string\n    ReadTimeout  string\n    WriteTimeout string\n    MaxIdle      int\n    MaxOpen      int\n}\n```\n\n`GetDSN()` 根据运行环境返回 DSN：\n\n- CI 环境下返回固定测试库 DSN。\n- 非 CI 环境下使用 `DSNTemplate` 和配置字段拼接 DSN。\n\nCI 判断由 `IsCIEnvironment()` 完成：\n\n```go\nreturn len(os.Getenv(\"CI_REPO_NAME\")) > 0 || os.Getenv(\"IS_SYSTEM_TEST_ENV\") == \"1\"\n```\n\n`NewDB()` 基于 `GetDSN()` 创建 GORM 连接：\n\n```go\ndb, err := gorm.Open(\"mysql2\", m.GetDSN())\ndb.LogMode(true)\ndb.DB().SetMaxIdleConns(m.MaxIdle)\ndb.DB().SetMaxOpenConns(m.MaxOpen)\ndb.SingularTable(true)\n```\n\n数据库初始化链路中，`src/dao/db.go` 会使用 `GetReadDBPassword()`、`GetWriteDBPassword()`、`GetDBRetryTimes()` 和 `GetTccSettingsClient()` 从 TCC 获取动态密码与重试参数。\n\n## 双重开关模式\n\n`DoubleSwitch` 用于需要“本地配置 + etcd 开关”共同生效的场景：\n\n```go\ntype DoubleSwitch struct {\n    Enable bool\n    Switch string\n}\n\nfunc (s *DoubleSwitch) IsEnabled() bool {\n    return s.Enable && etcdutil.GetWithDefault(s.Switch, \"0\") == \"1\"\n}\n```\n\n只有 `Enable == true` 且 etcd 中 `Switch` 对应值为 `\"1\"` 时，`IsEnabled()` 才返回 true。\n\n`ACL`、`RateLimiter`、`CircuitBreaker` 都内嵌了 `DoubleSwitch`：\n\n```go\ntype ACL struct {\n    DoubleSwitch `yaml:\",inline\"`\n    Pairs map[string]string\n}\n```\n\n这意味着这些能力可以通过静态配置启用，再通过 etcd 进行运行时开关控制。\n\n## 熔断器配置\n\n`CircuitBreaker` 描述 `github.com/sony/gobreaker` 的运行参数：\n\n```go\ntype CircuitBreaker struct {\n    DoubleSwitch\n    CloseFailures     uint32\n    CloseInterval     time.Duration\n    OpenTimeout       time.Duration\n    HalfOpenSuccesses uint32\n}\n```\n\n`GetSettings(name string)` 将模块配置转换为 `gobreaker.Settings`：\n\n```go\nReadyToTrip: func(counts gobreaker.Counts) bool {\n    return counts.ConsecutiveFailures >= c.CloseFailures\n}\n```\n\n状态变化会通过 `logs.Warn()` 记录：\n\n```go\nOnStateChange: func(name string, from gobreaker.State, to gobreaker.State) {\n    logs.Warn(\"circuit_breaker %s changes state from %s to %s\", name, from.String(), to.String())\n}\n```\n\nTCC 中的熔断器配置由 `GetCircuitBreakersConfigs()` 读取 key `circuit_breakers`。由于 JSON 中的 duration 是字符串，`CircuitBreakerConfig.UnmarshalJSON()` 会显式解析：\n\n- `close_interval` -> `time.Duration`\n- `open_timeout` -> `time.Duration`\n\n解析失败时返回本地 `config.Conf.CircuitBreakers`。\n\n## TCC 客户端\n\n`tcc.GetTccSettingsClient()` 是 TCC 客户端的唯一入口，使用 `sync.Once` 保证进程内只初始化一次：\n\n```go\nvar (\n    tccOnce sync.Once\n    client  *tccclient.ClientV2\n)\n```\n\n初始化参数来自 `config.Conf`：\n\n```go\ntccConfigV2.Auth = true\ntccConfigV2.Confspace = config.Conf.TccInfo.ConfigSpace\ntccConfigV2.SetFirstGetTimeout(1 * time.Second)\ncli, err := tccclient.NewClientV2(config.Conf.Meta.PSM, tccConfigV2)\n```\n\n因此必须先调用 `config.InitConf()`，再调用任何 `tcc` 包读取函数。否则 `config.Conf` 为空会导致 panic 或无效配置。\n\n## 启动后的动态配置刷新\n\n`SetDefaultValuesAndStartRefresh()` 是 TCC 动态配置的启动入口，由 `main.go` 调用。\n\n它先用本地 `config.Conf` 写入默认值：\n\n```go\nSetDefaultAllowList(config.Conf.WhiteList)\nSetStorageConfigCheckWhitelist(config.Conf.StorageConfigCheckWhitelist)\nSetRedisCacheSwitch(config.Conf.RedisCache.Switch)\nSetRedisCacheTtl(config.Conf.RedisCache.TTL)\nSetRedisCacheRetryTimes(config.Conf.RedisCache.RetryTimes)\nSetAccountNoCacheWhitelist(config.Conf.AccountNoCacheWhitelist)\n```\n\n然后初始化接口级限流：\n\n```go\ninitInterfaceRateLimiterFromConfig()\n```\n\n`initInterfaceRateLimiterFromConfig()` 调用 `interface_limiter.InitConfig(config.Conf.InterfaceRateLimiter)`，将静态配置转成限流器初始状态。\n\n接着执行一次 `process()`。如果首次 TCC 拉取或解析失败，`SetDefaultValuesAndStartRefresh()` 会 panic：\n\n```go\nif !process() {\n    panic(\"can't reach tcc or parse tcc config error\")\n}\n```\n\n首次成功后启动后台刷新协程：\n\n```go\ngo refreshTccConfig()\n```\n\n`refreshTccConfig()` 每分钟调用一次 `process()`：\n\n```go\nfor range time.Tick(configUpdateInterval) {\n    process()\n}\n```\n\n## `process()` 刷新的配置项\n\n`process()` 是动态配置热更新的核心函数。它会生成 log id，并创建 tracing span：\n\n```go\nsp, ctx := bytedtracer.StartCustomSpan(ctx, \"TccCron\", \"RefreshTccConfig\", ...)\n```\n\n当前刷新项包括：\n\n| TCC key | 处理函数或目标 | 失败影响 |\n|---|---|---|\n| `redis_cache_switch` | `SetRedisCacheSwitch(val == constant.TrueValue)` | 标记 `success=false` |\n| `redis_cache_ttl` | `time.ParseDuration()` 后 `SetRedisCacheTtl()` | 标记 `success=false` |\n| `redis_cache_retry_times` | `strconv.Atoi()` 后 `SetRedisCacheRetryTimes()` | 标记 `success=false` |\n| `account_nocache_whitelist` | JSON 解析后 `SetAccountNoCacheWhitelist()` | 标记 `success=false` |\n| `metadata_clean_black_list` | 仅 `EnableEmbeddedMetadata` 为 true 时读取 | 标记 `success=false` |\n| `interface_rate_limiter` | `interface_limiter.UpdateConfigFromTCC(val, nil)` | 解析失败标记 `success=false` |\n| `mem_limit_percent` | `mem_limit.ApplyFromPercent(val)` | 不影响启动成功 |\n\n`mem_limit_percent` 是可选项。读取失败、空值或应用失败只记录日志，不会阻塞服务启动。\n\n## Redis 缓存运行时设置\n\nRedis 缓存开关、TTL 和重试次数使用 atomic 变量保存：\n\n```go\nvar redisCacheSwitch = atomic.NewBool(false)\nvar redisCacheRetryTimes = atomic.NewInt32(0)\nvar redisRedisCacheTtl = atomic.NewInt64(0)\n```\n\n对外读取函数：\n\n```go\nCheckRedisCacheSwitch() bool\nGetRedisCacheTtl() time.Duration\nGetRedisCacheRetryTimes() int\n```\n\n这些值会被账号查询链路使用。例如 `GetAccountInfo`、`MGetAllAccountWithConfig` 会经过 `GetCacheInstance()`，再读取 `GetRedisCacheTtl()` 和 `GetRedisCacheRetryTimes()`。\n\n由于这里使用 atomic，后台刷新协程更新值时，业务请求可以无锁读取。\n\n## 白名单与 ACL\n\n模块中有几类白名单配置：\n\n- `WhiteList`：默认允许写白名单，通过 `SetDefaultAllowList()` 初始化，运行时由 `GetAllowList()` 从 TCC key `allow_list` 读取。\n- `StorageConfigCheckWhitelist`：存储配置检查豁免白名单，通过 `SetStorageConfigCheckWhitelist()` 初始化，运行时由 `GetStorageConfigCheckWhitelist()` 从 TCC key `storage_config_check_whitelist` 读取。\n- `AccountNoCacheWhitelist`：账号查询不使用缓存的 PSM 白名单，通过 `SetAccountNoCacheWhitelist()` 写入 `sync.Map`，由 `PSMInAccountNoCacheWhiteList()` 查询。\n- `ACL`：访问控制配置，通过 `GetACLConfigs()` 从 TCC key `acl` 读取。\n\n`GetAllowList()` 和 `GetStorageConfigCheckWhitelist()` 在 TCC 读取或 JSON 解析失败时返回本地默认值。\n\n`SetAccountNoCacheWhitelist()` 当前只增量写入 `sync.Map`：\n\n```go\nfor k, v := range whitelist {\n    accountNoCacheWhitelist.Store(k, v)\n}\n```\n\n这意味着 TCC 删除某个 key 后，旧 key 不会自动从本地 map 中删除。贡献代码时如果需要“全量替换”语义，需要显式清理旧值。\n\n## 远程写入配置\n\n远程写入配置结构为：\n\n```go\ntype WriteRemote struct {\n    RemoteSwitch  bool\n    InvokeSetting string\n    RegionInfo    string\n}\n```\n\nTCC key 为 `write_remote_setting`。\n\n读取入口：\n\n```go\nGetWriteSwitch(ctx)\nGetRemoteSetting(ctx)\nGetRemoteRegionInfo(ctx)\n```\n\n三者都调用内部函数 `getWriteRemoteSetting(ctx)`，后者通过 `GetWithParser()` 使用 `writeRemoteParser()` 解析 JSON。\n\n`writeRemoteParser()` 的容错策略是：\n\n- TCC 读取失败且没有 cache：返回 `config.Conf.WriteRemote`。\n- TCC 读取失败且有 cache：返回 cache。\n- JSON 解析失败：返回 cache。\n- 解析成功：返回新的 `config.WriteRemote`。\n\n这种写法依赖 TCC client 的 parser cache，用于降低配置抖动对业务路径的影响。\n\n## ID 生成器配置\n\n`GetIdGeneratorConfig(ctx)` 读取 TCC key `id_gen_setting`，解析为 `config.IdGenerator`：\n\n```go\ntype IdGenerator struct {\n    Switch                       bool\n    Region                       string\n    TableSupportSetting          map[string]bool\n    TableRemainIdRemindThreshold map[string]int64\n}\n```\n\n解析函数 `idGenParser()` 的容错行为与远程写入类似：\n\n- TCC 读取失败但有 cache：返回 cache。\n- JSON 解析失败但有 cache：返回 cache。\n- 无 cache 且失败：返回错误。\n- `GetIdGeneratorConfig()` 收到错误或类型不匹配时返回 `config.Conf.IdGenerator`。\n\n## 管理员、缓存、密码等按需读取配置\n\n`tcc/config.go` 提供一组简单的 TCC getter：\n\n```go\nGetDBRetryTimes(ctx) int\nGetCacheRefreshTime(ctx) time.Duration\nGetCacheSize(ctx) int\nGetReadDBPassword(ctx) string\nGetWriteDBPassword(ctx) string\n```\n\n这些函数的模式一致：\n\n1. 从固定 TCC key 读取字符串。\n2. 按目标类型解析。\n3. 失败时记录日志并返回 `config.Conf` 中的本地默认值，密码读取失败则返回空字符串。\n\n管理员配置由 `GetAdminUsers(ctx)` 读取 key `admin_user`，解析为 `map[string]bool`。失败时返回 `config.Conf.AdminUser`。\n\n本地缓存开关由 `CheckLocalCacheSwitch(ctx)` 读取 key `local_cache_switch`。读取失败时默认返回 true。\n\n## 元数据黑名单\n\n`MetadataBlackList` 用于嵌入式元数据清理：\n\n```go\ntype MetadataBlackList struct {\n    Version   int\n    BlackList []string\n}\n```\n\n当 `config.Conf.EnableEmbeddedMetadata` 为 true 时，`process()` 会读取 TCC key `metadata_clean_black_list`，解析成功后调用 `setMetadataBlackList()`。\n\n业务侧通过 `GetMetadataBlackList()` 获取当前黑名单。\n\n注意：`metadataBlackList` 是普通包级变量，没有锁或 atomic 保护。如果未来读写频率提高，或结构变得更复杂，需要评估并发读写风险。\n\n## 与业务链路的连接\n\n该模块不是孤立配置层，多个业务路径直接依赖它：\n\n- `main.go` 调用 `config.InitConf()` 完成静态配置加载。\n- `main.go` 调用 `tcc.SetDefaultValuesAndStartRefresh()` 启动动态配置刷新。\n- `src/dao/db.go` 使用 TCC 中的 DB 密码和重试次数初始化数据库。\n- `src/middleware/acl.go` 通过 `GetACLConfigs()` 获取 ACL 配置。\n- `src/middleware/filter.go` 通过 `GetAllowList()` 判断允许访问的 PSM。\n- `src/interface_limiter/interface_limiter.go` 使用 `InterfaceRateLimiterConfig`，并通过 `UpdateConfigFromTCC()` 接收热更新。\n- `src/remote_cache/video_account.go` 使用 `GetRedisCacheTtl()` 控制远程缓存写入 TTL。\n- 账号查询链路通过 `GetRedisCacheRetryTimes()` 和 `GetRedisCacheTtl()` 影响缓存访问行为。\n\n## 新增配置项的建议模式\n\n新增静态配置时：\n\n1. 在 `config.Config` 或子结构中增加字段，并补充 YAML tag。\n2. 如果字段必须存在或有格式要求，增加 validator tag 或自定义校验函数。\n3. 确认 `mergeTCCBaseConfig()` 的合并语义是否符合预期：TCC `base` 优先，本地配置补默认。\n4. 在启动路径中避免直接使用未初始化的 `config.Conf`。\n\n新增动态 TCC 配置时：\n\n1. 定义明确的 TCC key 常量。\n2. 决定配置是按需读取，还是需要在 `process()` 中定时刷新。\n3. 为解析失败设计 fallback：本地默认值、上次 cache、还是允许失败。\n4. 如果业务高频读取，优先使用 atomic、只读快照或带锁结构保存运行时状态。\n5. 如果使用 `GetWithParser()`，parser 应该处理 `err` 和 `cache`，避免短暂 TCC 故障导致业务配置清空。\n\n## 需要注意的实现细节\n\n- `GetTccSettingsClient()` 使用 `sync.Once`，初始化后不会因为 `config.Conf.TccInfo.ConfigSpace` 变化而重建客户端。\n- `SetDefaultValuesAndStartRefresh()` 首次 `process()` 失败会 panic，后续定时刷新失败只记录日志。\n- `AccountNoCacheWhitelist` 使用增量更新，不会删除旧 key。\n- `GetCircuitBreakersConfigs()` 中 duration 字段要求 TCC JSON 使用 Go duration 字符串，例如 `\"1s\"`、`\"500ms\"`。\n- `GetDSN()` 在非 CI 环境会打印 DSN，注意日志中可能包含用户名、密码等敏感信息。\n- `validateDuration()` 直接执行 `v.(string)`，只能用于 string 字段；如果 tag 被加到非 string 字段会 panic。","data-access-layer":"# Data Access Layer\n\n## 数据访问层模块\n\n数据访问层位于 `src/dao`，负责封装账号、配置、域名、规则、实例、权限等核心数据的 MySQL 读写逻辑。模块对外暴露的是 `DbHandler` 方法，调用方主要来自 `service`、`controllers`、测试入口以及 `main.go` 的初始化流程。\n\n核心入口是全局变量 `dao.Db`。`InitDb()` 初始化读写库连接、MySQL 熔断、限流、TCC 密码、重试次数和 ID 生成器：\n\n```go\nvar Db *DbHandler\n\ntype DbHandler struct {\n    r          *gorm.DB // 读库连接\n    w          *gorm.DB // 写库连接\n    retryTimes int\n}\n```\n\n## 通用调用模型\n\n大多数 DAO 方法都采用同一种结构：公开方法处理熔断器，私有方法执行实际数据库访问。\n\n```mermaid\nflowchart TD\n    A[\"业务层调用 DbHandler 方法\"] --> B[\"公开方法检查数据库熔断器\"]\n    B --> C[\"errno.ParseCBError 归一化熔断错误\"]\n    B --> D[\"私有实现方法\"]\n    D --> E[\"EmitThroughput / EmitLatency 打点\"]\n    D --> F[\"util.RetryDo 重试\"]\n    F --> G[\"读库 db.r 或写库 db.w\"]\n    G --> H[\"GORM 查询 / 事务\"]\n```\n\n典型模式如下：\n\n```go\nfunc (db *DbHandler) CreateAccess(ctx context.Context, access *dto.Access) error {\n    if cb := middleware.GetDBCircuitBreaker(); cb != nil {\n        _, err := cb.Execute(func() (interface{}, error) {\n            return nil, db.createAccess(ctx, access)\n        })\n        return errno.ParseCBError(err)\n    }\n    return db.createAccess(ctx, access)\n}\n```\n\n私有方法负责实际访问：\n\n```go\nfunc (db *DbHandler) createAccess(ctx context.Context, access *dto.Access) error {\n    retryInfo := \"CreateAccess\"\n    util.EmitThroughput(util.CommandThroughput, metrics.T{Name: util.TagCommand, Value: retryInfo})\n    defer util.EmitLatency(util.CommandLatency, time.Now(), metrics.T{Name: util.TagCommand, Value: retryInfo})\n\n    return util.RetryDo(ctx, retryInfo, db.retryTimes, func() error {\n        return db.w.Context(ctx).Create(access).Error\n    })\n}\n```\n\n因此新增 DAO 方法时，应该保持三件事一致：公开方法包熔断，私有方法包指标和 `util.RetryDo`，写操作使用 `db.w`，读操作使用 `db.r`。\n\n## 初始化与基础设施\n\n`InitDb()` 在服务启动时由 `main.go` 和测试 `TestMain` 调用。它完成以下工作：\n\n- 通过 `mysqldriver.InitTCCClient(tcc.GetTccSettingsClient())` 配置 TCC Client。\n- 使用 `mysqldriver.InitMySQLCircuitBreakerByTccKey` 为读库和写库初始化 MySQL 熔断配置。\n- 调用 `mysqldriver.OpenStatistics()` 开启驱动统计。\n- 使用 `harden.NewClient` 配置 MySQL 限流客户端，并启用 `mysqldriver.SetMySQLRateLimitEnable(true)`。\n- 从 TCC 获取数据库密码：`tcc.GetWriteDBPassword` 和 `tcc.GetReadDBPassword`。\n- 调用 `config.Conf.WriteDB.NewDB()` 和 `config.Conf.ReadDB.NewDB()` 创建 GORM 连接。\n- 将 `tcc.GetDBRetryTimes` 写入 `DbHandler.retryTimes`。\n- 调用 `util.InitIdGenerator(connW)` 初始化 ID 生成器。\n\n`isDuplicateError(err error)` 只判断 `*mysql.MySQLError` 的错误码是否为 `ErrDuplicate`，当前主要用于 `CreateDomainAuth` 把重复创建转换为业务可识别的错误码。\n\n## 账号与配置\n\n账号相关逻辑分布在 `account.go`、`video_account.go` 和 `video_config.go`。\n\n`CreateAccount(ctx, videoAccount, videoConfigs)` 同时创建 `dto.VideoAccount` 和一组 `dto.VideoConfig`。实现使用事务，先写账号，再逐条写配置；任一失败会通过 `util.RollbackTX` 回滚。创建成功后会对每个配置调用 `EmitCreateConfigEvent`，触发配置同步事件。\n\n`UpdateAccount(ctx, account)` 和 `UpdateAccountV2(ctx, account)` 都更新 `v_account`，区别在于字段处理：\n\n- `UpdateAccount` 只更新非零值或非空字符串字段，例如 `Description`、`Extra`、`TopAccountID`、`Type`、`VRegion`。\n- `UpdateAccountV2` 会把相关字段全部放入 `attrs`，可用于显式清空字段。\n\n`UpdateAccountStatus(ctx, accessKey, status)` 按 `access_key` 更新 `v_account.status`，使用事务。\n\n查询路径有两套 DTO：\n\n- `PageGetAccount`、`GetAccountAmount`、`MGetAccount` 返回 `dto.Account`。\n- `PageGetVideoAccount`、`GetVideoAccountAmount`、`MGetVideoAccount` 返回 `dto.VideoAccount`。\n\n分页查询和计数复用 `queryWithCondition(req, conn)`，支持 `ID`、`AccountIds`、`AccountName`、`QueryName`、`AccessKey`、`Status`、`UserName`、`TopAccountID`、`TopInstanceID`、`VolcAccountID`、`VolcInstanceID`、`Type`、`VRegion` 和 `AccountType` 等条件。默认情况下，`WithDeleted == false` 会过滤为 `enabled`、`unaudited`、`disabled` 三类状态。\n\n`MGetVideoAccount` 对全量查询有特殊处理：当 `dto.IsGetAllAccountsRequest(req)` 为真时，它按 `id >= curID` 和 `pageSize = 200` 分批读取，避免一次性拉取过多数据。状态过滤不是 SQL 条件，而是在内存中过滤，代码注释说明这是为了避免慢 SQL。\n\n配置读取集中在 `video_config.go`：\n\n- `MGetVideoConfig(ctx, accessKey, module, region)` 按账号、模块和地域读取配置；指定模块时会同时包含 `constant.ModuleGlobal`。\n- `MGetVideoConfigByKeys(ctx, accessKeys, module, region)` 支持批量 `access_key in (?)`。\n- `MGetConfigByProvider(ctx, provider, ckey, region)` 固定查询 `module = 'storage'`。\n- `MGetStorageConfigByBucketName(ctx, bucketName, region)` 使用 `cvalue like ?` 按 bucket 名模糊匹配。\n- `ListVideoConfigByCondition` 按 `module`、`ckey`、`cvalue`、`region` 查询。\n- `GetVideoConfigById` 按 `id` 读取单条 `dto.VideoConfig`。\n\n配置写入在 `account.go`：\n\n- `MCreateConfig` 批量创建配置，重复唯一键但非主键冲突时记录 warn 并跳过；主键冲突会回滚。\n- `MUpdateConfig` 按 `access_key/module/ckey/region` 更新 `v_config.cvalue`。\n- `DeleteConfig` 按 `id` 删除配置。\n- `MCopyConfig` 从源地域复制指定模块配置到多个目标地域，跳过 `constant.ModuleGlobal`。\n\n配置创建、更新、删除都会通过 `EmitCreateConfigEvent`、`EmitUpdateConfigEvent`、`EmitDeleteConfigEvent` 连接到配置同步逻辑。\n\n## 配置同步与域名关系\n\n`sync_config.go` 维护一个异步事件队列：\n\n```go\nvar configActionEventQueue = make(chan *ConfigActionEvent, 4096)\n```\n\n`init()` 中启动 `startHandleConfigActionEvent()`，持续消费队列。事件类型包括：\n\n- `ConfigCreateAction`\n- `ConfigUpdateAction`\n- `ConfigDeleteAction`\n\n只有域名配置会触发域名同步。判断逻辑在 `isDomainConfig(config)`：\n\n```go\nreturn (config.Module == constant.ModulePlay || config.Module == constant.ModulePicture) && config.CKey == \"domains\"\n```\n\n创建和更新事件都会调用 `createDomainFromConfig(ctx, config)`。该函数先删除当前账号在指定 `region + module` 下的旧域名关系：\n\n```go\nDb.DeleteDomainRelByRelType(ctx, config.AccountName, dto.BuildDomainRelTypeFromConfig(config.Region, config.Module))\n```\n\n然后通过 `buildDomainsFromConfig` 解析 `config.CValue`。解析过程会先调用 `Db.GetAccountByAK` 获取账号信息，再将 JSON 反序列化为 `dto.AcctConfDomains`，最终构建 `dto.Domain` 和对应的 `dto.DomainAccountRel`。\n\n如果域名不存在，调用 `Db.CreateDomain` 创建域名和关联关系；如果已存在，调用 `Db.UpdateDomain` 更新域名，再逐条调用 `Db.CreateDomainAccountRel` 创建关系。\n\n删除事件会调用 `Db.DeleteDomainRelByRelType` 清理关系，不删除 `dto.Domain` 本身。\n\n## 域名与域名授权\n\n`domain.go` 负责 `dto.Domain` 和 `dto.DomainAccountRel`。\n\n主要方法：\n\n- `CreateDomain`：事务内创建域名，并创建 `domain.AccountRels` 中的关系。\n- `DeleteDomain`：事务内删除域名和同域名下的 `dto.DomainAccountRel`。\n- `GetDomain`：先查 `dto.Domain`，再查关联的 `dto.DomainAccountRel` 填充 `ret.AccountRels`。\n- `UpdateDomain`：按 `domain` 更新证书、厂商、状态、负责人、服务树节点等字段。\n- `CreateDomainAccountRel`：创建单条域名账号关系。\n- `DeleteDomainRelByRelType`：按 `account_name` 和 `rel_type` 删除关系。\n- `DeleteDomainRelById`：按关系 ID 删除。\n- `UpdateDomainAccountRel`：更新关系的 `Category`、`InnerExtra`、`BizExtra`。\n- `ListDomainAccountRel`：按请求条件读取关系。\n- `BatchListDomainAccountRel`：用 `batchSize = 200` 分批读取关系。\n- `MCopyDomainAccountRel`：把某账号源地域的关系复制到目标地域，并重建 `RelType`。\n\n`domain_auth.go` 负责 `v_domain_bucket_relation`：\n\n- `CreateDomainAuth` 创建 `dto.DomainAuth`，重复键时返回 `ErrDuplicate` 错误码但不把重复视为数据库错误。\n- `GetDomainAuths` 按 `bucket` 和 `domain` 可选过滤读取授权关系。\n- `UpdateDomainAuthStatus` 按 `domain` 更新状态。\n- `DeleteDomainAuth` 按 `domain/top_account_id/account_name` 删除授权关系。\n\n## 规则数据\n\n规则有两套表和 DTO：`dto.VideoRule` 对应 `v_rule`，`dto.VideoRuleV2` 对应 `v_rule_v2`。\n\n`video_rule.go` 提供旧版规则接口：\n\n- `CreateRule`\n- `UpdateVideoRuleById`\n- `UpdateVideoRuleStatus`\n- `UpdateVideoRuleByProvider`\n- `DeleteVideoRule`\n- `BatchGetRule`\n- `PageGetRule`\n- `GetRuleAmount`\n\n分页和计数复用 `queryRuleCondition(req, conn)`，按 `ID`、`Provider`、`Category` 过滤，并固定追加：\n\n```go\nconn = conn.Where(\"local_idc = ? and status not in ('deleted')\", req.IDC)\n```\n\n`video_rule_v2.go` 提供 V2 规则接口：\n\n- `CreateRuleV2`\n- `UpdateVideoRuleByIdV2`\n- `UpdateVideoRuleStatusV2`\n- `DeleteVideoRuleV2`\n- `BatchGetRuleV2`\n\nV2 查询条件使用 `dto.MGetRuleRequestV2`，支持 `ID`、`Provider`、`Type`、`LocalIDC`。\n\n## 实例、权限、访问控制与条件\n\n这些文件是较薄的 CRUD 封装，仍然遵循熔断、指标、重试模式。\n\n`instance.go` 操作 `dto.Instance` 和 `t_instance`：\n\n- `CreateInstance` 创建实例。\n- `DeleteInstance` 不是物理删除，而是将 `Status` 更新为 `constant.StatusDeleted`。\n- `UpdateInstance` 按内部 `id` 更新实例字段。\n- `UpdateInstanceByInstanceID` 按 `instance_id` 更新；如果 `InstanceID` 去空格后为空，直接返回 `nil`。\n- `GetInstance` 按 `account_id` 查询未删除实例。\n- `ListInstance` 支持 `where map[string]interface{}`、`configuration in (?)`、分页和总数统计。\n\n`authority.go` 操作 `dto.Authority` 和 `t_authority`：\n\n- `CreateAuthority`\n- `DeleteAuthority`\n- `UpdateAuthorityStatus`\n- `MGetAuthorityByGrantor`\n- `MGetAuthorityByGrantee`\n\n`access.go` 操作 `dto.Access`：\n\n- `CreateAccess`\n- `DeleteAccess`\n- `GetAccess`\n\n`condition.go` 操作 `dto.Condition`：\n\n- `CreateCondition`\n- `DeleteCondition`\n- `GetCondition`\n\n`task.go` 当前只提供 `GetAllConsumers`，读取全部 `dto.ConsumerModel`。\n\n## 账号分类 Schema\n\n`category_schema.go` 管理 `dto.AccountCategorySchema` 和 `dto.AccountCategorySchemaHistory`，重点是变更前写历史。\n\n主要方法：\n\n- `CreateAccountCategorySchema`：创建 schema。\n- `DeleteAccountCategorySchema`：删除前调用 `createAccountCategorySchemaHistory` 写历史，历史原因是 `dto.HistoryReasonDelete`。\n- `ListAccountCategorySchema`：按 `AccountName`、`SchemaType`、`Category`、`Region` 查询，并为每条结果补充 `SchemaVersion = \"{ID}_{Version}\"`。\n- `UpdateAccountCategorySchema`：更新前写历史，历史原因是 `dto.HistoryReasonUpdate`，然后更新 `SchemaValue` 并将 `Version` 加一。\n- `getAccountCategorySchemaById`：按 schema ID 读取当前 schema。\n- `createAccountCategorySchemaHistory`：读取当前 schema 后写入历史表，保留原 schema 的版本、内容和更新时间。\n- `getAccountCategorySchemaHistory`：按 `schema_id` 和 `version` 读取历史记录。\n\n这里的更新路径依赖当前传入对象的 `Version`，写入时使用 `schema.Version + 1`。调用方需要保证传入版本符合当前业务语义，否则可能产生版本跳跃或覆盖预期之外的数据。\n\n## 事务与错误处理约定\n\n需要多表写入或批量写入的方法通常使用 `util.BeginTX` 开启事务，并在失败时调用 `util.RollbackTX`：\n\n- `createAccount`\n- `updateAccountStatus`\n- `mCreateConfig`\n- `copyConfig`\n- `mUpdateConfig`\n- `createDomain`\n- `deleteDomain`\n- `createDomainAccountRel`\n- `deleteDomainRel`\n- `deleteDomainRelById`\n- `updateDomain`\n- `updateDomainAccountRel`\n- `createAccountCategorySchema`\n- `deleteAccountCategorySchema`\n- `updateAccountCategorySchema`\n- `createAccountCategorySchemaHistory`\n\n重复键处理有三种模式：\n\n- `isDuplicateError`：用于 `CreateDomainAuth`，重复时返回 `ErrDuplicate` 错误码。\n- `createAccount`、`mCreateConfig`、`copyConfig`、`copyDomainAccountRel`：识别 MySQL 1062，并对主键冲突输出 ID 生成器告警日志。\n- `mCreateConfig`、`copyConfig`、`copyDomainAccountRel`：非主键重复时记录 warn 并跳过当前记录。\n\n## 与业务层的连接\n\n调用关系上，DAO 是服务层的数据边界：\n\n- `main.go` 调用 `InitDb()` 初始化全局 `dao.Db`。\n- `service/account.go` 的 `mgetAccountWithConfig` 调用 `MGetVideoAccount` 和 `MGetVideoConfigByKeys` 聚合账号与配置。\n- 配置写入方法通过 `EmitCreateConfigEvent`、`EmitUpdateConfigEvent`、`EmitDeleteConfigEvent` 间接驱动域名关系同步。\n- 测试包的 `TestMain` 会调用 `InitDb()` 建立数据库环境。\n\n模块没有复杂的业务编排流，主要承担稳定的数据访问、重试、熔断、指标和事务一致性职责。业务含义较强的逻辑集中在两处：账号配置和域名关系的同步，以及账号分类 schema 的历史版本记录。\n\n## 贡献注意事项\n\n新增或修改 DAO 方法时，优先沿用现有结构：\n\n- 公开方法命名为导出形式，例如 `CreateXxx`；实际实现放在私有方法，例如 `createXxx`。\n- 公开方法先检查 `middleware.GetDBCircuitBreaker()`，熔断错误通过 `errno.ParseCBError` 返回。\n- 私有方法使用 `retryInfo` 作为指标 tag，并调用 `util.EmitThroughput` 和 `util.EmitLatency`。\n- 所有数据库操作放入 `util.RetryDo(ctx, retryInfo, db.retryTimes, func() error { ... })`。\n- 读操作使用 `db.r.Context(ctx)`，写操作使用 `db.w.Context(ctx)`。\n- 多表或批量写入使用 `util.BeginTX`、`util.RollbackTX` 和 `tx.Commit()`。\n- 修改 `v_config` 中 `domains` 配置时，需要考虑 `sync_config.go` 的异步副作用。\n- 对全量或大结果集查询，参考 `MGetVideoAccount` 和 `BatchListDomainAccountRel` 的分页读取方式，避免一次性无界查询。","data-models-and-dtos":"# Data Models and DTOs\n\n## 模块定位\n\n`src/dto` 定义账号系统的数据库模型、请求/响应 DTO、配置值结构和少量解析辅助函数。它位于控制器/服务层与 DAO/GORM 层之间：\n\n```mermaid\nflowchart TD\n    A[控制器接收请求] --> B[请求 DTO: form/json 绑定]\n    B --> C[Validate / Adjust / Parse 方法]\n    C --> D[服务层业务编排]\n    D --> E[DAO 使用 GORM 模型]\n    E --> F[(v_account / v_config / v_domain 等表或视图)]\n```\n\n这个模块不承载完整业务流程，但会做几类关键的边界处理：\n\n- 定义 GORM 表映射，例如 `VideoAccount.TableName()` 返回 `v_account`。\n- 在 `BeforeCreate` / `AfterCreate` 中处理 ID 和默认状态。\n- 把外部请求转换成内部模型，例如 `CreateAccountRequest.ParseAccountAndConfigs()`。\n- 规范化区域字段，例如 `MGetAccountV3Request.Adjust()` 和 `ListConfigsByConditionRequest.ParseListConfigsReq()` 调用 `util.GetRegion()`。\n- 定义 JSON 配置值的结构，例如 `BucketSelectionStrategy`、`UploadPSMCheck`、`EmbeddedMetadataSchema`。\n\n## 核心模型分类\n\n### 账号与配置\n\n账号模型主要分为 `Account` 和 `VideoAccount`。两者都映射到 `v_account`，但创建语义不同：\n\n- `Account`\n  - `TableName()` 返回 `v_account`\n  - `BeforeCreate()` 调用 `AutoIncrID(&account.ID)`\n  - 默认状态为 `constant.StatusUnaudited`\n  - 主要用于较通用或历史路径的账号表示\n\n- `VideoAccount`\n  - `TableName()` 返回 `v_account`\n  - `BeforeCreate()` 调用 `util.GenId(context.TODO(), v.TableName(), 1)`\n  - 默认状态为 `constant.StatusEnabled`\n  - 带 `msg` tag，用于视频账号相关序列化场景\n\n`VideoConfig` 映射到 `v_config`，表示账号配置项：\n\n```go\ntype VideoConfig struct {\n    ID          int64  `gorm:\"column:id\" json:\"id\" msg:\"id\"`\n    AccessKey   string `gorm:\"column:access_key\" json:\"-\" msg:\"-\"`\n    AccountName string `gorm:\"column:account_name\" json:\"account_name\" msg:\"account_name\"`\n    Module      string `gorm:\"column:module\" json:\"module\" msg:\"module\"`\n    CKey        string `gorm:\"column:ckey\" json:\"ckey\" msg:\"ckey\"`\n    CValue      string `gorm:\"column:cvalue\" json:\"cvalue\" msg:\"cvalue\"`\n    Region      string `gorm:\"column:region\" json:\"region\" msg:\"region\"`\n}\n```\n\n注意 `VideoConfig.AccessKey` 的 JSON tag 是 `json:\"-\"`，接口响应不会直接暴露该字段。\n\n### 创建账号请求解析\n\n`CreateAccountRequest.ParseAccountAndConfigs()` 是账号创建链路中最重要的 DTO 方法。它会把请求拆成一个 `VideoAccount` 和一组 `VideoConfig`，并在过程中补齐默认值。\n\n处理顺序如下：\n\n```mermaid\nflowchart TD\n    A[CreateAccountRequest.ParseAccountAndConfigs] --> B[生成或复用 AccessKey / SecretKey]\n    B --> C[构造 VideoAccount]\n    C --> D[fillDefaultVolcAccountId]\n    D --> E[fillDefaultVolcVRegion]\n    E --> F[规范化 VideoConfig 的账号与 Region]\n    F --> G[复制 SyncRegions 配置]\n    G --> H[补默认 BucketSelectionStrategy]\n    H --> I[必要时补 UploadPSMCheck]\n```\n\n关键行为：\n\n- 如果请求没有传 `AccessKey` / `SecretKey`，使用 `util.GetUUID()` 生成。\n- 每个传入的 `VideoConfig` 都会被写入：\n  - `AccessKey`\n  - `AccountName`\n  - `Region = util.GetRegion(req.Region)`\n- `ConfSyncRegions` 只会复制非 `constant.ModuleGlobal` 的配置。\n- 如果请求中没有全局 `constant.BucketSelectionStrategyCKey`，会自动追加：\n  - `BucketSelectionStrategy{DisableAllCategory: false, DisableTerminator: true}`\n- 如果处于 BOE 或内部生产环境，会自动追加上传 PSM 检查配置：\n  - `UploadPSMCheck{Pct: 100, Mode: 2}`\n\n`ParseAccountAndConfigs()` 会直接修改 `req.VideoConfigs`。调用方应避免对同一个请求对象重复调用，否则同步区域配置和默认配置可能被重复追加。\n\n### 火山账号默认值\n\n`fillDefaultVolcAccountId()` 根据账号类型和 `TopAccountID` 区间补齐 `VolcAccountID`：\n\n- 请求已传 `VolcAccountID` 时不修改。\n- `account.Type != constant.TypeSpace` 时不修改。\n- 内部账号区间使用 `config.Conf.DefaultVolcAccountID`。\n- 火山账号区间使用 `uint64(account.TopAccountID)`。\n\n`fillDefaultVolcVRegion()` 为火山空间补默认 `VRegion`：\n\n- 已有 `VRegion` 时不修改。\n- 非空间账号不修改。\n- `TopAccountID` 不在火山账号区间时不修改。\n- 默认值来自 `config.Conf.DefaultVolcVRegion`。\n\n此外，`ParseAccountAndConfigs()` 在遍历配置时，如果发现全局配置 `constant.SpaceGlobalRegionCKey` 且 `VideoAccount.VRegion` 为空，也会用该配置的 `CValue` 补齐 `VRegion`。\n\n## 请求与响应 DTO\n\n### 账号查询\n\n`MGetAccountWithConfigRequest` 是账号查询的通用过滤 DTO，字段通过 `form` tag 绑定：\n\n- `ID`\n- `AccountName`\n- `QueryName`\n- `AccessKey`\n- `Module`\n- `Status`\n- `UserName`\n- `TopAccountID`\n- `TopInstanceID`\n- `VolcAccountID`\n- `VolcInstanceID`\n- `Type`\n- `AccountType`\n- `Region`\n- `WithDeleted`\n- `NoCache`\n- `VRegion`\n\n`IsGetAllAccountsRequest()` 用于判断请求是否缺少主要查询条件。它只检查账号标识类字段，不检查 `Status`、`UserName`、`Type`、`Region` 等过滤字段。\n\n`PageGetAccountRequest` 嵌入 `MGetAccountWithConfigRequest`，额外提供：\n\n- `AccountIds`\n- `Offset`\n- `Limit`\n\n`MGetAccountV3Request.Adjust()` 会：\n\n- 使用 `util.GetRegion()` 规范化 `Region`\n- `strings.TrimSpace()` 清理 `AccountNames`\n- 按逗号切分出 `AccountNameList`\n\n对应执行流为：\n\n```text\nMGetAccountV3\n→ MGetAccountV3Request.Adjust\n→ util.GetRegion\n→ getDefaultRegion\n```\n\n因此新增账号查询入口时，如果接受 region 参数，应尽量在 DTO 解析阶段复用同类规范化逻辑。\n\n### 账号响应\n\n`MGetVideoAccountResponse` 嵌入 `VideoAccount`，并通过 `VideoConfigs` 返回配置列表。\n\n`ParseOpenapiAccountResponse()` 会把内部响应转换为 `MGetVideoAccountOpenapiResponse`，只保留 OpenAPI 需要暴露的账号字段，不包含配置列表。\n\n### 配置创建与更新\n\n`MCreateConfigRequest` 表示批量创建配置请求：\n\n```go\ntype MCreateConfigRequest struct {\n    AccessKey   string         `json:\"access_key\"`\n    AccountName string         `json:\"account_name\"`\n    Region      string         `json:\"region\"`\n    SyncRegions []string       `json:\"sync_regions\"`\n    Configs     []*VideoConfig `json:\"configs\"`\n}\n```\n\n`ParseConfigs()` 与账号创建中的配置处理类似：\n\n- 为每个配置补齐 `AccessKey`、`AccountName`。\n- 把 `Region` 规范化为 `util.GetRegion(req.Region)`。\n- 为非 `constant.ModuleGlobal` 配置复制 `SyncRegions`。\n\n`MUpdateConfigRequest` 只是包装 `*MCreateConfigRequest`，更新配置的校验链路会复用创建配置校验：\n\n```text\nMUpdateConfig\n→ ValidateMUpdateConfigRequest\n→ ValidateMCreateConfigRequest\n→ validateConfigs\n→ BucketSelectionStrategy\n```\n\n这意味着 `BucketSelectionStrategy` 的 JSON 结构不仅用于账号创建默认值，也会被配置更新校验链路识别。\n\n### 条件查询配置\n\n`ListConfigsByConditionRequest` 当前支持按 `Module`、`CKey`、`CValue`、`Region` 查询配置。\n\n- `Validate()` 要求 `Module` 非空。\n- `ParseListConfigsReq()` 会调用 `util.GetRegion()` 规范化 `Region`。\n\n执行流：\n\n```text\nListConfigsByCondition\n→ ListConfigsByConditionRequest.ParseListConfigsReq\n→ util.GetRegion\n→ getDefaultRegion\n```\n\n## 域名模型\n\n### Domain\n\n`Domain` 映射到 `v_domain`，表示域名主体信息。`DomainType` 定义域名类型枚举：\n\n- `ExternalDomain`\n- `InternalDomain`\n- `OriginalDomain`\n- `ScheduleDomain`\n- `InternalRDDomain`\n- `ExternalPrivateDomain`\n- `InternalPrivateDomain`\n\n`Domain.BeforeCreate()` 使用 `util.GenId(context.TODO(), d.TableName(), 1)` 生成 ID，而不是依赖数据库自增。\n\n`Domain.AccountRels` 使用 `gorm:\"-\"`，表示它是接口聚合字段，不直接映射数据库列。\n\n### DomainAccountRel\n\n`DomainAccountRel` 映射到 `v_domain_account_rel`，表示域名与账号的绑定关系。核心字段包括：\n\n- `Domain`\n- `DomainType`\n- `AccountName`\n- `Region`\n- `Module`\n- `Category`\n- `InnerExtra`\n- `BizExtra`\n- `SubDomains`\n\n`RelType` 已标记为历史字段，注释说明它原本表示 `region+module`，现在已拆成 `Region` 和 `Module`。`BuildDomainRelTypeFromConfig(region, module)` 仍会生成 `fmt.Sprintf(\"%s_%s\", region, module)`，用于兼容同步配置等老路径。\n\n`DomainRelInnerExtra` 是 `InnerExtra` 的推荐 JSON 结构，目前只有 `Weight` 字段。\n\n### 点播域名配置结构\n\n`AcctConfDomain`、`AcctConfInstance`、`AcctConfDomainGroup`、`AcctConfDomains` 表示点播配置中的域名数据。\n\n`AcctConfDomains.GetDomains()` 会把 `DomainGroup.ByteStations` 和 `DomainGroup.OtherStations` 下所有实例的 `Domains` 展平成一个列表。调用方包括 `buildDomainsFromConfig`，用于从配置构建域名数据。\n\n## 域名鉴权模型\n\n`DomainAuth` 映射到 `v_domain_bucket_relation`，表示 CDN 域名、空间、bucket 之间的授权关系。\n\n相关 DTO：\n\n- `CreateDomainAuthRequest`\n- `UpdateDomainAuthStatusRequest`\n- `DeleteDomainAuthStatusRequest`\n- `DomainAuthInfo`\n- `GetDomainAuthInfos`\n- `Bucket`\n\n这些结构主要服务于 DAO 层的 `deleteDomainAuth` 等域名 bucket 关系操作。\n\n## 权限、访问与条件模型\n\n`Access`、`Condition`、`Authority` 是权限相关的基础模型：\n\n- `Access` 映射到 `t_access`\n- `Condition` 映射到 `t_condition`\n- `Authority` 映射到 `t_authority`\n\n三者都实现了 GORM `TableName()`。`Access` 和 `Condition` 的 `BeforeCreate()` 调用 `AutoIncrID()`，让 ID 归零后交给数据库自增。\n\n`Authority.BeforeCreate()` 额外设置：\n\n```go\nauthority.Status = constant.StatusUnaudited\n```\n\n`GetAuthorityRequest` 通过 `form` tag 接收：\n\n- `Grantor`\n- `Space`\n- `Grantee`\n\n## 分类 Schema 模型\n\n`AccountCategorySchema` 映射到 `v_account_category_schema`，用于保存账号、category、region 维度下的 schema 配置。\n\n主要字段：\n\n- `AccountName`\n- `Category`\n- `SchemaType`\n- `SchemaValue`\n- `Region`\n- `Version`\n- `SchemaVersion`\n\n`SchemaVersion` 使用 `gorm:\"-\"`，只参与 JSON 输出，不映射数据库列。\n\n`SchemaType` 当前只有：\n\n```go\nconst (\n    SchemaEmbeddedMetadata = SchemaType(\"embedded_metadata\")\n)\n```\n\n允许列表由 `SchemaTypeAllowList` 定义。\n\n`EmbeddedMetadataSchema` 是 `SchemaValue` 中 `embedded_metadata` 类型的 JSON 结构：\n\n- `Enabled`\n- `GrayMode`\n- `GrayPercentage`\n- `IgnoreGlobalConf`\n- `MetadataBlackList`\n- `SchemaVersion`\n\n相关执行流：\n\n```text\nUpdateAccountCategorySchema\n→ ValidateUpdateAccountCategorySchemaRequest\n→ checkEmbeddedMetadataValue\n→ EmbeddedMetadataSchema\n```\n\n因此修改 `EmbeddedMetadataSchema` 字段时，需要同步检查 validator 中的 JSON 校验逻辑。\n\n`AccountCategorySchemaHistory` 映射到 `v_account_category_schema_history`，保存 schema 的历史版本。`HistoryReasonUpdate` 和 `HistoryReasonDelete` 表示历史产生原因。\n\n## 实例、规则与限流模型\n\n### Instance 与 VideoInstance\n\n`Instance` 映射到 `t_instance`，包含配置、计费项、海外计费项、状态等字段。`UpdateInstanceRequest` 和 `UpdateInstanceByInstanceIDRequest` 用于更新实例。\n\n`VideoInstance` 映射到 `v_instance`，字段更少，主要包含：\n\n- `AccountID`\n- `InstanceId`\n- `Extra`\n\n两者不是完全等价模型，新增实例逻辑时需要按 DAO 使用的表选择结构。\n\n### VideoRule 与 VideoRuleV2\n\n`VideoRule` 映射到 `v_rule`，使用 `Category` 区分规则。\n\n`VideoRuleV2` 映射到 `v_rule_v2`，使用 `Type` 区分规则。\n\n相关请求/响应：\n\n- `MGetRuleRequest`\n- `PageGetRuleRequest`\n- `PageGetRuleResponse`\n- `MGetRuleRequestV2`\n- `MGetRuleResponseV2`\n\n当前 `VideoRule` 的 `BeforeCreate` / `AfterCreate` 被注释掉，规则模型没有启用创建钩子。\n\n### ConsumerModel\n\n`ConsumerModel` 映射到 `t_consumer`，用于消费者限流配置。`GetConsumerRateLimitResponse` 是按消费者名称聚合的限流响应，`QPSStruct` 同时带有 thrift 和 JSON tag。\n\n## ID 生成与 GORM 生命周期\n\n本模块有两种 ID 策略。\n\n第一类是数据库自增策略，`BeforeCreate()` 调用：\n\n```go\nAutoIncrID(&model.ID)\n```\n\n`AutoIncrID()` 当前只是把 ID 设置为 `0`。使用该策略的模型包括：\n\n- `Access`\n- `Authority`\n- `Condition`\n- `Account`\n- `Instance`\n- `VideoInstance`\n\n第二类是服务端生成 ID，`BeforeCreate()` 调用 `util.GenId()`：\n\n- `VideoAccount`\n- `VideoConfig`\n- `Domain`\n- `DomainAccountRel`\n\n这些模型会把 `TableName()` 作为 ID 生成参数，因此修改表名、拆表或迁移视图时，需要同时确认 ID 生成器的表名参数是否仍然正确。\n\n`AfterCreate()` 的常见模式是：\n\n```go\nmodel.ID = scope.PrimaryKeyValue().(int64)\n```\n\n或 `uint64` 类型版本。它把 GORM 插入后的主键值重新写回结构体。\n\n## 与其他层的连接\n\n这个模块被多个方向依赖：\n\n- 控制器层使用请求/响应 DTO，例如 `Search` 使用 `PageGetAccountRequest`、`MGetVideoAccountResponse`、`SearchAccountsResponse`。\n- 服务层调用解析方法，例如 `MGetAccountV3` 调用 `MGetAccountV3Request.Adjust()`。\n- Validator 依赖配置值结构，例如 `validateConfigs` 解析 `BucketSelectionStrategy`。\n- DAO 层直接使用 GORM 模型，例如 `deleteConfig` 使用 `VideoConfig`，`getDomain` 使用 `Domain`，`listDomainAccountRel` 使用 `DomainAccountRel`。\n- 同步配置链路使用域名辅助函数，例如 `createDomainFromConfig` 和 `copyDomainAccountRel` 调用 `BuildDomainRelTypeFromConfig()`。\n\n## 贡献注意事项\n\n新增 DTO 时，先确认它是请求/响应结构还是 GORM 模型。请求查询参数使用 `form` tag，写入请求通常使用 `json` tag；数据库模型应补齐 `gorm` tag 和 `TableName()`。\n\n新增 GORM 模型时，需要明确 ID 策略。使用数据库自增时沿用 `AutoIncrID()`；需要提前生成 ID 的表，沿用 `util.GenId(context.TODO(), model.TableName(), 1)` 模式。\n\n新增 region 字段时，应在 DTO 的 `Adjust()`、`Parse...()` 方法中统一调用 `util.GetRegion()`，不要把 region 规范化分散到 DAO 查询里。\n\n修改 `ParseAccountAndConfigs()` 或 `ParseConfigs()` 时要注意它们会原地修改请求对象，并追加配置。调用链默认它们不是幂等函数。\n\n修改 `EmbeddedMetadataSchema`、`BucketSelectionStrategy`、`UploadPSMCheck` 这类 JSON 配置结构时，需要同时检查 validator 和配置更新执行流，避免旧配置 JSON 无法解析或新字段未被校验。\n\n`Account` 与 `VideoAccount`、`Instance` 与 `VideoInstance` 分别映射相近但语义不同的表或视图。新增逻辑时不要只按字段相似度替换模型，应按现有 DAO 和服务链路选择。","domain-services":"# Domain Services\n\n## 领域服务层（`src/service`）\n\n`src/service` 是 Account 服务的业务编排层。它把 Gin 请求上下文转换为 DTO，请求 `validator` 做参数校验，通过 `dao.Db` 访问数据库，并在需要时调用 `remote`、`remote_cache`、`tcc`、`rpc` 等外部能力。对外返回统一的 `*errno.Payload`，由上层 HTTP/RPC handler 负责序列化响应。\n\n服务函数普遍遵循同一模式：\n\n```go\nfunc Xxx(c *gin.Context, ctx context.Context) *errno.Payload {\n    // 读取 path/query/body\n    // 反序列化到 dto.*\n    // validator 校验\n    // dao / remote / cache 编排\n    // errno.OK 或 errno.ErrorWithCode\n}\n```\n\n### 整体架构\n\n```mermaid\nflowchart TD\n    A[\"路由 / Handler\"] --> B[\"service 领域服务\"]\n    B --> C[\"dto 请求与响应模型\"]\n    B --> D[\"validator 参数校验\"]\n    B --> E[\"dao.Db 数据访问\"]\n    B --> F[\"tcc 动态配置\"]\n    B --> G[\"remote 跨区域写代理\"]\n    B --> H[\"remote_cache Redis 缓存\"]\n    B --> I[\"rpc 外部服务\"]\n    J[\"Init / initCache\"] --> K[\"本地缓存与定时刷新\"]\n    K --> B\n```\n\n## 启动与缓存初始化\n\n`Init` 是服务层初始化入口，由 `main` 调用。它负责：\n\n- 使用 `tcc.GetCacheRefreshTime` 和 `tcc.GetCacheSize` 初始化账号本地 LRU 缓存 `lruCache`\n- 注册 `RefreshCache` 作为本地缓存刷新函数\n- 延迟随机时间后启动 `lruCache.StartRefresh`\n- 调用 `initCache` 初始化规则、权限、实例、域名关系、账号分类 Schema、CDN 调度域名等缓存\n- 调用 `iamsdk.MustInitKms(constant.PSM)` 初始化 KMS\n\n`initCache` 位于 `cache.go`，会创建多个本地缓存并启动刷新协程：\n\n| 缓存 | 用途 | 刷新函数 |\n|---|---|---|\n| `ruleCache` | `MGetRule` 查询结果 | `refreshRule` |\n| `authorityCache` | `MGetAuthority` 查询结果 | `refreshAuthority` |\n| `instanceCache` | `GetInstance` 查询结果 | `refreshInstance` |\n| `ruleIDCCache` / `ruleIDCSCache` | 规则同步 IDC 映射 | `refreshRule` 后重建映射 |\n| `ruleIDCSCacheV2` | V2 规则同步 IDC 映射 | 定期置空，下次请求重建 |\n| `domainRelCache` | `ListDomainAccountRel` 查询结果 | `refreshDomainRel` |\n| `accountCategorySchemaCache` | 账号分类 Schema 全量快照 | `refreshAccountCategorySchema` |\n| `cdnScheduleDomainCache` | CDN 主域名到子域名列表 | `refreshCDNScheduleDomainCache` |\n\n刷新协程使用 `newAccountCronSpan` 创建 cron trace，并用 `util.RandomWaitTime` 错峰启动，避免多实例同时打满 DB 或远端服务。\n\n## 账号服务\n\n账号相关逻辑主要在 `account.go`。核心写接口包括：\n\n- `CreateAccount`\n- `UpdateAccount`\n- `UpdateAccountV2`\n- `ModifyAccount`\n- `UpdateAccountStatus`\n- `RemoteUpdateAccountStatus`\n\n读接口包括：\n\n- `MGetAccountWithConfig`\n- `MGetAllAccountWithConfig`\n- `GetAccountInfo`\n- `CheckAccountExist`\n- `PageGetAccount`\n- `CountAccounts`\n- `CountRegionSpacesV3`\n- `GetAccountStorageBuckets`\n- `GetAccountStorageBucket`\n- `MGetAccountV3`\n\n### 跨区域写代理\n\n`CreateAccount`、`UpdateAccount`、`UpdateAccountStatus`、`MCreateConfig`、`MCopyConfig`、`DeleteConfig` 等写接口都有类似判断：\n\n```go\nif util.GetRegion(env.IDC()) == tcc.GetRemoteRegionInfo(ctx) {\n    if tcc.GetWriteSwitch(c) {\n        setting := tcc.GetRemoteSetting(ctx)\n        // 调用 remote.CallRemote*\n    }\n    return errno.ErrNotSupportCreate // 或 ErrNotSupportUpdate / ErrNotSupportDelete\n}\n```\n\n含义是：当前 IDC 属于远端写区域时，本地不直接写 DB，而是按 TCC 配置转发到远端 Account 服务。`tcc.GetWriteSwitch` 关闭时直接拒绝写入，避免海外或非主写区域误写。\n\n### 账号查询主路径\n\n`MGetAccountWithConfig` 和 `MGetAllAccountWithConfig` 最终都会走 `mGetAccountWithConfig1`，后者再调用核心函数 `mgetAccountWithConfig`。\n\n```mermaid\nflowchart TD\n    A[\"MGetAccountWithConfig\"] --> B[\"accountNocache\"]\n    B --> C[\"mGetAccountWithConfig1\"]\n    C --> D[\"lruCache.Get\"]\n    D -->|未命中| E[\"mgetAccountWithConfig\"]\n    E --> F[\"remote_cache.MGetVideoAccount\"]\n    F -->|未命中| G[\"dao.Db.MGetVideoAccount\"]\n    G --> H[\"dao.Db.MGetVideoConfigByKeys\"]\n    H --> I[\"setAccountRedisCache\"]\n    C --> J[\"lruCache.Add\"]\n```\n\n`mgetAccountWithConfig` 同时处理本地缓存、Redis 缓存、DB 回源、批量配置补齐和异步刷新：\n\n1. 根据 `tcc.CheckRedisCacheSwitch` 和 `skipCache` 判断是否使用 Redis。\n2. 优先调用 `remote_cache.GetCacheInstance().MGetVideoAccount`。\n3. 对全量请求或异步刷新请求，使用 Redis 锁减少缓存击穿。\n4. 回源 DB 时先通过 `db.MGetVideoAccount` 查询账号，再按 `batch = 50` 分批调用 `db.MGetVideoConfigByKeys` 查询配置。\n5. 查询完成后异步调用 `setAccountRedisCache` 写 Redis。\n6. `mGetAccountWithConfig0` / `mGetAccountWithConfig1` 再把结果写入本地 `lruCache`。\n\n`accountNocache` 和 `nocache` 用 `X-TT-From` 请求头配合 `tcc.PSMInAccountNoCacheWhiteList` 控制缓存绕过。`MGetAccountWithConfig` 对全量查询还会通过 `util.HardenCli.AllowFallbackShared` 做限流，并打点 `accounts.get.legacy_all`。\n\n### 删除账号限制\n\n`UpdateAccountStatus` 和 `RemoteUpdateAccountStatus` 在将账号状态更新为 `constant.StatusDeleted` 前，会先读取账号并校验：\n\n- `TopAccountID >= 2000000000`\n- `Type == constant.TypeSpace`\n\n因此当前删除逻辑只允许删除 TOB VOD 空间。\n\n## 配置服务\n\n配置逻辑在 `config.go`，围绕 `dto.VideoConfig` 提供批量创建、复制、更新、删除和查询：\n\n- `MCreateConfig`\n- `MCopyConfig`\n- `MUpdateConfig`\n- `DeleteConfig`\n- `RemoteDeleteConfig`\n- `GetConfig`\n- `ListConfigsByCondition`\n\n`MCreateConfig` 和 `MUpdateConfig` 会读取 `X-TT-From`，如果 PSM 命中 `tcc.GetStorageConfigCheckWhitelist`，则在调用 `validator.ValidateMCreateConfigRequest` 或 `validator.ValidateMUpdateConfigRequest` 时跳过部分 storage config 校验。正常路径会进入 `validateStorageConfig`、`validateBucket`，并可能调用 `rpc.GetBucket` 验证 bucket。\n\n成功创建、更新或删除配置后，如果 `tcc.CheckRedisCacheSwitch()` 开启，会调用 `remote_cache.GetCacheInstance().RemoveAccount(ctx, accessKey)` 清除账号维度 Redis 缓存，避免旧配置继续被 `mgetAccountWithConfig` 读到。\n\n`GetConfig` 的查询优先级是：\n\n1. 如果 query 中提供 `access_key`，直接使用。\n2. 如果未提供 `access_key`，尝试使用 `account_name` 查询账号，再取第一个账号的 `AccessKey`。\n3. 使用 `dao.Db.MGetVideoConfig(ctx, accessKey, module, util.GetRegion(region))` 查询配置。\n\n`ListConfigsByCondition` 使用进程内 `sync.Map` 缓存，缓存 key 是解析后的 `dto.ListConfigsByConditionRequest`，过期时间来自 `tcc.GetCacheRefreshTime(ctx)`。\n\n## 域名与域名关系服务\n\n域名相关逻辑在 `domain.go`，维护 `dto.Domain` 和 `dto.DomainAccountRel`：\n\n- `CreateDomain`\n- `DeleteDomain`\n- `GetDomain`\n- `ListAccountsByDomain`\n- `CreateDomainAccountRel`\n- `DeleteDomainAccountRel`\n- `UpdateDomainAccountRel`\n- `ListDomainAccountRel`\n- `CopyDomainAccountRel`\n- `ImageXDomainOnChange`\n\n`GetDomain` 使用 `domainCache` 做本地缓存。DB 返回非 `not found` 错误时，会尝试用过期缓存兜底；DB 返回 `not found` 时，会短暂缓存 `nil` 10 秒，防止缓存穿透。\n\n`ListAccountsByDomain` 使用 `accountsByDomainCache`。当请求带 `module` 时，会用 `dto.BuildDomainRelTypeFromConfig(util.GetRegion(idc), module)` 构造 `relType`，缓存 key 由 `accountsByDomainCacheKey(domain, relType)` 生成。\n\n`ListDomainAccountRel` 走 `listDomainAccountRel`，优先读 `domainRelCache`。当 `req.NeedSubDomains` 为 true 且关系的 `DomainType == dto.ScheduleDomain` 时，会从 `cdnScheduleDomainCache` 补充 `SubDomains`。\n\n`ImageXDomainOnChange` 是 RocketMQ 消费路径调用的领域入口。`HandleMessage` 收到 ImageX 域名事件后调用该函数：\n\n- `constant.EventAddDomain`：不存在域名时创建 `dto.Domain`，随后创建 `dto.DomainAccountRel`\n- `constant.EventDeleteDomain`：查询匹配关系并调用 `dao.Db.DeleteDomainRelById` 删除绑定\n\n## 账号分类 Schema 与内嵌元数据\n\n`account_category_schema.go` 管理 `dto.AccountCategorySchema`：\n\n- `CreateAccountCategorySchema`\n- `DeleteAccountCategorySchema`\n- `UpdateAccountCategorySchema`\n- `ListAccountCategorySchema`\n- `GetAccountCategoryEmbeddedSchema`\n- `GetDeccEmbeddedSchema`\n\n创建和查询时会用 `util.GetRegion` 归一化 region。`ListAccountCategorySchema` 通过 `nocache(c)` 判断是否绕过缓存；未绕过时调用 `listAccountCategorySchemaFromCache`，从 `accountCategorySchemaCache` 中按 `AccountName` 获取全量 Schema，再按 `Category`、`SchemaType`、`Region` 过滤。\n\n`GetAccountCategoryEmbeddedSchema` 查询 `SchemaType == dto.SchemaEmbeddedMetadata`、`Category == \"all\"` 的 Schema，并反序列化为 `dto.EmbeddedMetadataSchema`。当 `config.Conf.EnableEmbeddedMetadata` 关闭时直接返回空 Schema。若 Schema 未设置 `IgnoreGlobalConf`，会合并 `tcc.GetMetadataBlackList()` 的全局黑名单，并把黑名单版本追加到 `SchemaVersion`。\n\n`GetDeccEmbeddedSchema` 从 `rpc.GetAccountDeccEmbeddedMeta()` 读取 DECC 元数据 key 列表并返回。\n\n## BPM 回调服务\n\n`bpm.go` 处理 BPM 工作流回调，结构体会内嵌 `BPMWorkflowBasic` 保存通用审批字段。\n\n主要入口：\n\n- `BPMCreateDomainAccountRel`\n- `BPMMigrateDomainAccountRel`\n- `BPMCreateConfigs`\n- `BPMUpsertMetadataClean`\n\n`BPMCreateDomainAccountRel` 会先查域名是否存在：\n\n- 已存在：使用 DB 中的 `domain.Type` 创建 `dto.DomainAccountRel`\n- 不存在且错误包含 `not found`：构造 `dto.Domain`，把首个 `DomainAccountRel` 放入 `AccountRels`，调用 `dao.Db.CreateDomain`\n- 其他错误：返回 DB 错误\n\n随后它会根据 `SyncRegions` 复制跨 region 关系，重复关系错误包含 `Duplicate` 时跳过。\n\n`BPMMigrateDomainAccountRel` 从旧域名读取所有关系，确保新域名存在，然后复制关系到新域名。复制时会清空 `ID`，更新 `Domain` 和 `DomainType`。\n\n`BPMCreateConfigs` 将 BPM 的 `BucketResp` 转换成 storage 模块的 `dto.VideoConfig` 列表，调用 `validator.ValidateMCreateConfigRequest` 后用 `dao.Db.MCreateConfig` 写入。\n\n`BPMUpsertMetadataClean` 查询账号内嵌元数据 Schema，存在则 `UpdateAccountCategorySchema`，不存在则 `CreateAccountCategorySchema`。\n\n## 权限、规则、实例与基础实体\n\n`access.go`、`condition.go`、`authority.go` 是较薄的 CRUD 编排层：\n\n- `CreateAccess` / `DeleteAccess` / `GetAccess`\n- `CreateCondition` / `DeleteCondition` / `GetCondition`\n- `CreateAuthority` / `DeleteAuthority` / `UpdateAuthorityStatus` / `MGetAuthority`\n\n`MGetAuthority` 根据 `dto.GetAuthorityRequest` 判断查询方向：\n\n- `req.Grantee == \"\"`：调用 `dao.Db.MGetAuthorityByGrantor(ctx, req.Grantor, req.Space)`\n- 否则：调用 `dao.Db.MGetAuthorityByGrantee(ctx, req.Grantee)`\n\n查询结果会写入 `authorityCache`。\n\n规则服务分为 V1 和 V2：\n\n- V1：`CreateVideoRule`、`UpdateRuleById`、`UpdateRuleStatus`、`PageGetRule`、`MGetRule`、`LoadAllSyncIDC`、`LoadAllSyncIDCs`、`MGetCategory`\n- V2：`CreateVideoRuleV2`、`UpdateRuleByIdV2`、`UpdateRuleStatusV2`、`MGetRuleV2`、`LoadAllSyncIDCsV2`\n\nV1/V2 都会用 `util.GetRegion` 归一化 IDC，并通过 `util.GetSyncIDCs(rule.SyncInfo)` 把规则中的同步信息转换为 provider 到 IDC 列表的映射。\n\n实例服务在 `instance.go`：\n\n- `CreateInstance`\n- `DeleteInstance`\n- `UpdateInstance`\n- `UpdateInstanceByInstanceID`\n- `GetInstance`\n- `ListInstances`\n\n`GetInstance` 优先读 `instanceCache`，但命中 `tcc.PSMInAccountNoCacheWhiteList` 的调用方会绕过缓存。函数中还保留了兼容逻辑：如果老账号数据里存在 `TopInstanceID`，会构造单个 `dto.Instance` 返回并写缓存。\n\n## 域名授权、ID 生成、限流与 Wand 资产\n\n`domain_auth.go` 管理域名授权信息：\n\n- `CreateDomainAuthInfo` 校验空间、top account、bucket 后创建 `dto.DomainAuth`\n- `GetDomainAuthInfos` 按 bucket 或 domain 查询授权记录\n- `UpdateDomainAuthStatus` 校验记录存在后更新状态\n- `DeleteDomainAuth` 删除授权记录\n\n`id_gen.go` 是 ID fetcher 管理入口，直接封装 `util.ListIdFetchers`、`util.UpdateIdFetcher`、`util.CreateIdFetcher`。\n\n`task.go` 的 `GetConsumerRateLimit` 查询 consumer 配置并用 `getQPS` 计算当前时间段 QPS。`getQPS` 支持跨天时间段，例如 `23:00-01:00`。\n\n`wand.go` 对接 Wand 资产：\n\n- `GetAccountVodAssets` 根据负责人 `people` 查询账号，把 VOD 空间转换为资产字符串\n- `UpdateAccountVodAssets` 解析 Wand 更新事件，校验原负责人后更新账号 `UserName`\n- `Asset.EncodeAsset` 使用 `EncodeStr` 移除 `::` 和 `|`，避免资产字段拼接格式被破坏\n- `getVodAssetUrl` 根据账号 global 配置中的 `region` 和 `config.Conf.Wand.RegionVConsoleUrl` 拼接 VConsole URL\n\n## 缓存刷新路径\n\n`refresh_cache.go` 放置所有缓存刷新函数。它们通常不直接处理 HTTP 请求，而是由 `cache.go` 的定时器或 `lruCache` 刷新回调调用。\n\n`RefreshCache` 是账号本地 LRU 的刷新函数：\n\n1. 将 key 断言为 `dto.MGetAccountWithConfigRequest`\n2. 使用 `newAccountCronSpan(\"RefreshMGetAccountWithConfigCache\")` 创建 trace\n3. 通过 `util.HardenCli.Allow(\"cache.refresh:accounts.get:<idc>\")` 限流\n4. 调用 `mgetAccountWithConfig(ctx, dao.Db, &req, isAsyncRequest())`\n5. 返回刷新后的账号与配置列表\n\n`refreshDomainRel` 先尝试 `remote_cache.GetCacheInstance().MListDomainAccountRel`，失败后回源 `dao.Db.BatchListDomainAccountRel`，并在需要时补充 CDN 子域名，最后写回 Redis。\n\n`refreshCDNScheduleDomainCache` 会根据 `config.Conf.UseCDNCacheAPI` 选择 `SearchMainDomainCached` 或 `SearchMainDomain`。如果 CDN API 失败，会从 Redis 快照 `GetCDNScheduleDomains` 恢复；成功时会把主域名到子域名的快照异步写入 Redis。\n\n## 错误处理与可观测性\n\n服务层统一返回 `errno.Payload`：\n\n- 请求体读取失败：`errno.CodeGetDataErr`\n- JSON 解析失败：`errno.CodeParseDataErr`\n- 参数校验失败：`errno.CodeBadRequest`\n- DB 失败：`errno.CodeDbErr`\n- 内部错误：`errno.CodeInternalErr` 或 `errno.ErrServer`\n- 成功：`errno.OK(data)`\n\n日志使用 `logs.CtxError`、`logs.CtxWarn`、`logs.CtxInfo`，多数写操作成功后会打 warn 级别日志方便审计。热点查询如 `mgetAccountWithConfig`、`PageGetAccount`、`CountAccounts`、`PageGetRule` 会通过 `util.EmitThroughput` 和 `util.EmitLatency` 打指标。\n\n## 贡献注意事项\n\n新增服务函数时应保持现有约定：入口签名使用 `func(c *gin.Context, ctx context.Context) *errno.Payload`，请求模型放在 `dto`，复杂校验放在 `validator`，数据库访问放在 `dao`。\n\n修改账号或配置写路径时，需要同步考虑缓存失效。账号配置变更后通常要调用 `remote_cache.GetCacheInstance().RemoveAccount`；账号查询变更要检查 `lruCache`、Redis query result、AK 到账号配置映射三层缓存是否一致。\n\n修改跨区域写接口时，要保持 `util.GetRegion(env.IDC()) == tcc.GetRemoteRegionInfo(ctx)`、`tcc.GetWriteSwitch(c)`、`tcc.GetRemoteSetting(ctx)` 这一套判断语义，否则可能造成非主写区域直接写库。\n\n处理 region/idc 字段时，应使用 `util.GetRegion` 归一化；规则、域名关系、账号配置和 Schema 查询都依赖这个约定。\n\n新增缓存刷新逻辑时，应通过 `newAccountCronSpan` 创建可观测上下文，并考虑随机错峰、panic recover、DB 失败时的过期缓存兜底策略。","other-build-sh":"# Other — build.sh\n\n## 模块概览\n\n`build.sh` 是仓库的构建打包脚本，用于把 Go 服务编译成可运行二进制，并整理运行时需要的脚本与配置文件到 `output/` 目录。该模块本身没有 Shell 函数，也没有被代码调用图识别出内部调用、外部调用或执行流；它更像是 CI/CD 或本地构建流程中的独立入口。\n\n脚本最终产物主要包括：\n\n- `output/bin/toutiao.videoarch.account`：由 `go build` 生成的服务二进制。\n- `output/bootstrap.sh`、`output/pre_nginx.sh`、`output/settings.py`：从 `script/` 目录复制出的启动与运行配置脚本。\n- `output/conf/`：从 `conf/` 目录复制出的非本地配置文件。\n\n## 执行流程\n\n```mermaid\nflowchart TD\n    A[\"启动 build.sh\"] --> B[\"设置 RUN_NAME\"]\n    B --> C[\"创建 output/bin 与 output/conf\"]\n    C --> D[\"复制 script 目录下的运行脚本\"]\n    D --> E[\"为启动脚本添加可执行权限\"]\n    E --> F[\"复制 conf 中的非 *_local.* 配置\"]\n    F --> G[\"执行 go build 生成二进制\"]\n    G --> H[\"下载并执行 tos_upload_blame.sh\"]\n```\n\n## 构建产物命名\n\n脚本开头定义了构建产物名称：\n\n```bash\nRUN_NAME=\"toutiao.videoarch.account\"\n```\n\n这个变量只在 `go build` 输出路径中使用：\n\n```bash\ngo build -v -o output/bin/${RUN_NAME}\n```\n\n因此，服务二进制固定生成到：\n\n```text\noutput/bin/toutiao.videoarch.account\n```\n\n如果服务名、发布包名或运行平台约定发生变化，需要同步检查这里的 `RUN_NAME` 是否仍与部署系统期望一致。\n\n## 输出目录结构\n\n脚本首先创建输出目录：\n\n```bash\nmkdir -p output/bin output/conf\n```\n\n`-p` 允许目录已存在时继续执行，不会因为重复构建而失败。构建完成后，预期目录结构为：\n\n```text\noutput/\n├── bin/\n│   └── toutiao.videoarch.account\n├── conf/\n│   └── ...\n├── bootstrap.sh\n├── pre_nginx.sh\n└── settings.py\n```\n\n`output/` 是打包边界：后续部署、镜像构建或发布系统通常只需要消费这个目录，而不需要直接依赖源码目录结构。\n\n## 启动脚本与运行配置复制\n\n脚本会从 `script/` 目录复制三个文件到 `output/` 根目录：\n\n```bash\ncp script/bootstrap.sh script/pre_nginx.sh script/settings.py output 2>/dev/null\nchmod +x output/bootstrap.sh output/pre_nginx.sh\n```\n\n涉及的文件职责通常如下：\n\n- `script/bootstrap.sh`：服务启动入口脚本。\n- `script/pre_nginx.sh`：Nginx 或网关相关的预处理脚本。\n- `script/settings.py`：运行时配置脚本或配置生成逻辑。\n\n`cp` 命令末尾使用了 `2>/dev/null`，因此复制失败时的错误信息会被隐藏。脚本没有设置 `set -e`，所以即使这些文件缺失，后续命令仍会继续执行；但紧接着的 `chmod` 仍会尝试修改 `output/bootstrap.sh` 和 `output/pre_nginx.sh` 的权限。\n\n`chmod +x` 只作用于两个 Shell 脚本，不作用于 `settings.py`。这说明当前构建约定中，`settings.py` 被当作配置或解释执行文件使用，而不是直接作为可执行入口。\n\n## 配置文件复制规则\n\n配置文件复制逻辑为：\n\n```bash\nfind conf/ -type f ! -name \"*_local.*\" | xargs -I{} cp {} output/conf/\n```\n\n该命令从 `conf/` 目录递归查找普通文件，并排除文件名匹配 `*_local.*` 的本地配置文件。符合条件的文件会被复制到 `output/conf/`。\n\n需要注意几个行为：\n\n- 只复制文件，不复制目录结构；所有匹配文件都会被平铺到 `output/conf/`。\n- 同名配置文件如果位于不同子目录，后复制的文件会覆盖先复制的文件。\n- `*_local.*` 文件不会进入构建产物，适合放置本地开发配置、个人配置或不应发布的环境配置。\n- 文件名包含空格或特殊字符时，当前 `find | xargs` 写法可能处理不稳；如果未来配置文件命名变复杂，可以考虑改为 `find ... -exec cp {} output/conf/ \\;`。\n\n## Go 编译\n\n核心构建命令是：\n\n```bash\ngo build -v -o output/bin/${RUN_NAME}\n```\n\n该命令在仓库根目录执行，默认编译当前 Go module 或当前目录对应的主包。`-v` 会输出编译过程中的包信息，便于在 CI 日志中排查依赖或编译问题。\n\n脚本没有显式设置 `GOOS`、`GOARCH`、`CGO_ENABLED` 等环境变量，因此编译目标由当前执行环境决定。如果该脚本运行在 CI 中，目标平台需要由 CI 环境或外层构建系统保证。\n\n## TOS blame 上传脚本\n\n最后一行会下载并执行远端脚本：\n\n```bash\nbash -c \"$(curl -fsL https://tosv.byted.org/obj/uitesting/tos_upload_blame.sh)\" || echo \"\"\n```\n\n这里的作用是尝试执行 `tos_upload_blame.sh`，通常用于上传构建归因、测试归因或相关元数据。命令失败时会执行 `echo \"\"`，避免整个脚本以失败状态结束。\n\n`curl` 参数含义：\n\n- `-f`：HTTP 错误状态码时失败。\n- `-s`：静默模式。\n- `-L`：跟随重定向。\n\n由于该步骤使用 `|| echo \"\"` 容错，远端脚本不可用、网络失败或上传失败通常不会阻断主构建产物生成。\n\n## 与代码库其他部分的关系\n\n`build.sh` 不参与服务运行时调用链，也不被 Go 代码直接调用。它连接
