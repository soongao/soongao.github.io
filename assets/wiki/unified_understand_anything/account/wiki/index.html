race span 标记。\n\n## Wand 响应包装：`WandResponse`\n\n`WandResponse` 用于 `/account-wand/v1`，当前路由用于 Wand 系统回调，例如：\n\n```go\nwand.GET(\"/vod/assets\", middleware.WandResponse(\"wand.accounts.get\", service.GetAccountVodAssets))\nwand.POST(\"/vod/assets\", middleware.WandResponse(\"wand.accounts.update\", service.UpdateAccountVodAssets))\n```\n\nWand 协议有两个特点：\n\n第一，响应体只返回 `errno.Payload.Data`，不返回标准 `code/message/data` 包装：\n\n```go\nfunc toWandPayload(p *errno.Payload) interface{} {\n    return p.Data\n}\n```\n\n第二，请求需要通过 `X-Verification-Code` 做轻量校验：\n\n```go\nconst XCODE = \"X-Verification-Code\"\n```\n\n`checkCode` 要求 header 格式为：\n\n```text\n时间戳毫秒|签名\n```\n\n校验规则：\n\n- 必须能按 `|` 切成两段\n- 第一段必须能解析为毫秒时间戳\n- 与当前时间差不能超过 60 秒\n- 第二段必须等于 `hmacSha1(时间戳毫秒)`\n\n`hmacSha1` 使用 `config.Conf.Wand.Token` 作为密钥。业务成功执行后，`WandResponse` 会通过响应头返回新的验证码：\n\n```go\nc.Header(XCODE, genCode())\n```\n\n如果验证码校验失败，`data = errno.ErrUnauthorized`，HTTP 状态码返回 `403`；其他场景返回 `200`。\n\n## 限流组件\n\n### `NewRateLimiter` 与 `RateLimiter.RateLimit`\n\n`NewRateLimiter` 基于 `github.com/ulule/limiter` 创建一个 Gin 中间件：\n\n```go\nrate, err := limiter.NewRateFromFormatted(config.Conf.RateLimiter.Rate)\nstore := memory.NewStoreWithOptions(limiter.StoreOptions{\n    Prefix:          config.Conf.RateLimiter.Prefix,\n    CleanUpInterval: config.Conf.RateLimiter.CleanUpInterval,\n})\n```\n\n它构造的 `RateLimiter` 包含：\n\n- `Limiter`：实际限流器\n- `KeyGetter`：默认是 `GetIP`\n- `OnError`：默认是 `HandleRateLimiterError`\n- `OnReached`：默认是 `HandleRateLimiterReached`\n\n`RateLimiter.RateLimit` 只有在 `config.Conf.RateLimiter.IsEnabled()` 为 true 时生效。通过时会写入标准限流响应头：\n\n- `constant.HeaderRateLimitLimit`\n- `constant.HeaderRateLimitRemaining`\n- `constant.HeaderRateLimitReset`\n\n达到限流时调用：\n\n```go\nc.AbortWithStatusJSON(http.StatusTooManyRequests, errno.ErrTooManyRequests)\n```\n\n当前 `main.go` 中没有把 `NewRateLimiter()` 挂到主路由链上；主业务路径实际使用的是 `Response` 内部的 `interface_limiter` 和 `util.HardenCli`。\n\n### `GetIP`\n\n`GetIP` 优先读取：\n\n```go\nconstant.HeaderRealIP\n```\n\n如果没有该 header，则回退到：\n\n```go\nc.ClientIP()\n```\n\n测试中通过 `RemoteAddr = \"127.0.0.1:80\"` 验证了回退行为。\n\n## 熔断组件\n\n`InitCircuitBreaker` 从 TCC 获取熔断配置：\n\n```go\nfor n, cb := range tcc.GetCircuitBreakersConfigs(context.Background()) {\n    if cb.Enable {\n        CircuitBreakers[n] = &CircuitBreaker{\n            CB:     gobreaker.NewCircuitBreaker(cb.GetSettings(n)),\n            Switch: cb.Switch,\n        }\n    }\n}\n```\n\n本模块定义的熔断结构是：\n\n```go\ntype CircuitBreaker struct {\n    CB     *gobreaker.CircuitBreaker\n    Switch string\n}\n```\n\n`GetDBCircuitBreaker` 只返回名为 `\"DB\"` 的熔断器，并且还要求对应的 etcd switch 打开：\n\n```go\ncb := CircuitBreakers[\"DB\"]\nif cb != nil && etcdutil.GetWithDefault(cb.Switch, \"0\") == \"1\" {\n    return cb.CB\n}\nreturn nil\n```\n\n因此调用方需要处理返回 `nil` 的情况。`circuit_breaker_test.go` 当前断言默认初始化下 `GetDBCircuitBreaker()` 返回 `nil`。\n\n## 辅助函数\n\n### `DuplicateStringFilter`\n\n`DuplicateStringFilter` 对字符串切片去重：\n\n```go\nfunc DuplicateStringFilter(duplicateSlice []string) []string\n```\n\n它通过 map 去重后再组装结果切片。返回顺序不稳定，因为 Go map 遍历顺序不保证固定。调用方不能依赖输出顺序。\n\n该函数被业务层使用，例如 `service.MGetCategory` 会对 category 列表去重后返回。\n\n### `checkCode`、`genCode`、`hmacSha1`\n\n这三个函数只服务 Wand 验证码机制：\n\n- `genCode` 生成 `当前毫秒时间戳|hmacSha1(时间戳)` 字符串\n- `checkCode` 校验格式、时间窗口和签名\n- `hmacSha1` 使用 `config.Conf.Wand.Token` 做 HMAC-SHA1\n\n## 与配置和外部模块的关系\n\n中间件模块依赖多个配置源和基础设施模块：\n\n- `config.Conf.ACL`：控制 `NewACL` 是否启用以及用户名密码对\n- `config.Conf.RateLimiter`：控制 `NewRateLimiter`\n- `config.Conf.InterfaceRateLimiter`：由 `interface_limiter` 使用，`Response` 通过 `interface_limiter.Allow(mkey)` 生效\n- `config.Conf.CircuitBreakers`：作为 TCC 熔断配置失败时的兜底\n- `config.Conf.Harden`：用于 `util.InitRateLimiter` 创建 `util.HardenCli`\n- `config.Conf.Wand.Token`：用于 Wand 验证码签名\n- `tcc.GetAllowList`：用于 `Filter` 的写接口白名单\n- `tcc.GetACLConfigs`：用于 `NewACL`\n- `tcc.GetCircuitBreakersConfigs`：用于 `InitCircuitBreaker`\n- `errno.Payload`：所有业务 handler 的统一返回类型\n- `ginex.RPCContext`：为业务 handler 构造上下文\n- `util.EmitLatency`、`util.EmitThroughput`、`util.EmitError`：统一指标上报\n\n## 测试覆盖\n\n`src/middleware/*_test.go` 主要覆盖中间件的基础可调用性和关键转换逻辑：\n\n- `TestResponse`、`TestOpenAPIResponse`：验证响应包装器能构造并执行\n- `TestJanusResponse`、`Test_toJanusPayload`：验证 Janus 包装和成功码转换\n- `TestWandResponse`、`Test_checkCode`、`Test_genCode`：验证 Wand 包装和验证码生成/校验\n- `Test_ACL`：验证 `NewACL` 返回可执行 handler\n- `TestDuplicateStringFilter`、`TestFilter`：验证去重和来源过滤基本路径\n- `TestLogRequest`：验证请求体读取后不阻断流程\n- `TestNewRateLimiter`、`TestGetIP`、`TestHandleRateLimiterError`、`TestHandleRateLimiterReached`：验证限流组件基础行为\n- `TestGetDBCircuitBreaker`：验证默认情况下 DB 熔断器为空\n\n`TestMain` 会初始化：\n\n```go\nginex.Init()\nconfig.InitConf()\nutil.InitRateLimiter()\nInitCircuitBreaker()\n```\n\n因此新增测试如果依赖 `config.Conf`、`util.HardenCli` 或 `CircuitBreakers`，应复用当前测试初始化模型。","other-readme-md":"# Other — README.md\n\n## 模块定位\n\n`README.md` 是仓库级开发说明文档，不参与运行时调用链；当前模块没有内部调用、外部调用或执行流。它的主要作用是统一项目开发约定，包括 Go 版本、包管理方式、命名规范、RESTful 路由写法、目录职责、第三方库补丁记录，以及新机房部署注意事项。\n\n## 开发基础\n\n项目使用：\n\n- Go 版本：`go 1.16`\n- 包管理：`go mod`\n\n开发和构建时应以 `go.mod` 为依赖来源，避免绕过模块系统直接修改依赖版本。仓库中存在 `vendor/` 修改记录，相关变更需要单独关注，见“对 libs 的修改”。\n\n## 命名规范\n\n### Controller\n\nController 使用复数命名：\n\n```go\nMembersController\nCategoriesController\n```\n\n这与 RESTful 资源集合语义一致。新增接口控制器时应保持同样风格，例如账号集合对应 `AccountsController`。\n\n### Model\n\nModel 使用单数命名：\n\n```go\nMember\nCategory\n```\n\nModel 表示单个业务实体，不使用复数。\n\n### Routes\n\nRoutes 依 RESTful 资源风格组织，资源路径使用复数。README 中的标准模式如下：\n\n```go\naccountGroup := v2.Group(\"accounts\")\n{\n    accountsController := new(controllers.AccountsController)\n    accountGroup.GET(\"\", middleware.Response(\"accounts.search\", accountsController.Search))\n}\n```\n\n这里体现了几个项目约定：\n\n- 路由分组使用复数资源名：`v2.Group(\"accounts\")`\n- Controller 使用复数类型：`controllers.AccountsController`\n- Handler 方法使用行为动词：`Search`\n- 响应包装统一通过 `middleware.Response`\n- 路由名称使用 `资源.动作`：`accounts.search`\n\n常见 RESTful 映射：\n\n| 动作 | URI | 行为 | 路由名称 |\n| --- | --- | --- | --- |\n| `GET` | `/photos` | `search` | `photos.search` |\n| `POST` | `/photos` | `create` | `photos.create` |\n| `GET` | `/photos/{photo_id}` | `show` | `photos.show` |\n| `PUT/PATCH` | `/photos/{photo_id}` | `update` | `photos.update` |\n| `DELETE` | `/photos/{photo_id}` | `destroy` | `photos.destroy` |\n\n## 请求处理结构\n\nREADME 描述的是典型分层结构：路由把请求交给 `middleware.Response` 包装，再进入 `controllers`，由 `service` 承载业务逻辑，必要时通过 `dao` 访问数据库。\n\n```mermaid\nflowchart LR\n    A[路由分组 v2.Group] --> B[middleware.Response]\n    B --> C[controllers.AccountsController.Search]\n    C --> D[service 业务逻辑]\n    D --> E[dao 数据库访问]\n    D --> F[lrucache 账号缓存]\n```\n\n该图是 README 中目录职责和示例路由的抽象，不代表某个具体函数的完整调用链。\n\n## 目录职责\n\nREADME 记录的主要目录约定如下：\n\n| 目录 | 职责 |\n| --- | --- |\n| `dao` | `data access object`，封装数据库 CRUD 代码 |\n| `dto` | `data transfer object`，承载接口或层间传输数据 |\n| `errno` | 错误码、错误定义相关逻辑 |\n| `middleware` | 中间件，README 特别提到 `access.go` |\n| `service` | 业务代码；其中 `service` 的 `lrucache` 存储账号表缓存信息 |\n| `controllers` | API 业务入口；V2 开始的 API 业务代码实现在 `controllers` 中 |\n| `util` | 通用工具逻辑 |\n| `validator` | 请求参数或业务参数校验逻辑 |\n\n新增代码时应优先放入符合职责的目录中：接口编排放 `controllers`，核心业务规则放 `service`，数据库 CRUD 放 `dao`，请求/响应结构放 `dto`，通用辅助逻辑放 `util`。\n\n## 对 libs 的修改\n\nREADME 记录了对 vendored 依赖 `vendor/code.byted.org/gin/ginex/apimetrics/metrics.go` 的项目内补丁。\n\n修改点位于：\n\n```go\nfunc MetricsWithSuccessDecider(psm string, meshMode bool, successDecider SuccessDecider)\n```\n\n补丁从 Gin context 中读取 `PSM`：\n\n```go\nfrom := c.GetString(\"PSM\")\n```\n\n并把它加入 metrics tags：\n\n```go\ntags := map[string]string{\n    \"status\":        strconv.Itoa(statusCode),\n    \"from_cluster\":  \"default\",\n    \"to_cluster\":    env.Cluster(),\n    \"stress_tag\":    stressTag,\n    \"from\":          from,\n}\n```\n\n这个变更会影响 API metrics 上报维度：除了状态码、目标集群、压测标记等字段外，额外上报来源 `from`。维护时需要注意：\n\n- `PSM` 必须在进入 metrics 中间件前被写入 Gin context，否则 `from` 为空字符串。\n- 更新 `vendor/code.byted.org/gin/ginex` 或重新生成 `vendor/` 时，需要确认该补丁没有丢失。\n- 如果后续改用上游版本，应检查是否已有等价的来源标记能力。\n\n## 新机房部署\n\n部署新机房时 README 记录了两个必要步骤：\n\n1. 更新 `gopkg/env` 包。\n2. 在 `util/region.go` 中更新 `regionMapping`。\n\n`regionMapping` 是新 region 接入时的关键配置点。新增机房或 region 后，如果环境包和映射表不一致，可能导致集群、地域或环境识别异常。\n\n## 维护建议\n\n`README.md` 当前更像项目约定索引，而不是完整开发手册。后续更新时建议继续保持它的职责边界：记录全局约定、目录职责、运行环境和特殊补丁；具体业务流程、接口行为和复杂实现细节应放在对应模块文档或代码注释中。","other-remote-cache":"# Other — remote_cache\n\n## remote_cache 模块\n\n`src/remote_cache` 提供跨实例的 Redis 远端缓存封装，主要服务于账号查询、域名账号关系查询和 CDN 调度域名快照。它不是业务入口层，而是 `service` 包在本地缓存和数据库之间使用的一层共享缓存，用来降低 DB 压力、协调异步刷新，并在部分外部依赖失败时提供快照兜底。\n\n```mermaid\nflowchart LR\n    A[\"service.mgetAccountWithConfig\"] --> D[\"RemoteCache 接口\"]\n    B[\"service.refreshDomainRel\"] --> D\n    C[\"service.refreshCDNScheduleDomainCache\"] --> D\n    D --> E[\"mCache\"]\n    E --> F[\"go-remote-cache\"]\n    F --> G[\"Redis / goredis\"]\n    D -.初始化失败.-> H[\"nopRemoteCache\"]\n```\n\n## 对外接口\n\n核心接口定义在 `cache.go` 的 `RemoteCache`：\n\n- 账号查询缓存：`MGetVideoAccount`、`SetVideoAccounts`、`SetQueryResult`、`RemoveAccount`\n- 账号查询刷新锁：`Lock`、`Unlock`、`Locked`\n- 域名账号关系缓存：`MListDomainAccountRel`、`SetDomainAccountRel`\n- CDN 调度域名快照：`AcquireCDNScheduleDomainsLock`、`SetCDNScheduleDomains`、`GetCDNScheduleDomains`\n\n真实实现是 `mCache`，内部持有 `go-remote-cache` 的 `g.RemoteCache`。`nopRemoteCache` 是降级实现：大多数读写方法返回 `nop remote cache`，`RemoveAccount`、`Lock`、`Unlock` 为无害空操作，`Locked` 恒为 `false`。\n\n## 初始化与实例选择\n\n`Init()` 会在 `tcc.CheckRedisCacheSwitch()` 为真时主动创建 Redis 远端缓存：\n\n1. `newRedisCli()` 使用 `config.Conf.Redis` 的 `Cluster`、`DialTimeout`、`ReadTimeout`、`WriteTimeout` 创建 `goredis.Client`。\n2. CI 环境下改用固定 Redis 地址 `redis://10.37.83.202:6380`，设置测试密码并关闭 GDPR 校验。\n3. `g.NewRemoteCache` 绑定 Redis backend，并使用 `tcc.GetRedisCacheTtl()` 和 `tcc.GetRedisCacheRetryTimes()` 配置默认 TTL 与重试次数。\n4. 启动阶段 Redis 初始化失败会 `panic`，避免缓存开关打开但大量流量直接穿透 DB。\n\n`GetCacheInstance()` 是惰性兜底入口。若 `cacheInstance` 已存在则直接返回；否则通过 `sync.Once` 创建实例。惰性创建失败时不会 `panic`，而是返回 `nopRemoteCacheInstance`，由调用方继续走 DB 或本地兜底逻辑。\n\n## 账号查询缓存\n\n账号缓存围绕 `dto.MGetAccountWithConfigRequest` 和 `dto.MGetVideoAccountResponse` 设计，使用两层 key：\n\n- 查询结果 key：`toQueryResultKey(req)`，由请求字段拼成，包括 `ID`、`AccountName`、`QueryName`、`AccessKey`、`Module`、`Status`、`UserName`、`TopAccountID`、`TopInstanceID`、`VolcAccountID`、`VolcInstanceID`、`Type`、`AccountType`、`Region`、`WithDeleted`、`VRegion`，末尾带 `@v2`。\n- 账号存储 key：`toAccountStoreKey(accessKey, region, module)`，格式为 `accessKey.region.module.@v2`。\n- 反向索引 key：`toStoreKeySetKey(accessKey)`，格式为 `accessKey:key_set@v2`，保存该账号关联过的 store key，供失效删除使用。\n\n`MGetVideoAccount` 的读取流程：\n\n1. 先用查询结果 key 读取 store key 列表；这个 key 缺失时直接返回错误，通常是 `go-remote-cache.ErrCacheMiss`。\n2. 对 store key 列表执行 `PipelineGet`，批大小为常量 `batch = 50`。\n3. 如果某个 store key 缺失，会通过 `parseAccountStoreKey` 拿到 `accessKey`、`region`、`module`，再查询 `dao.Db.GetAccountByAK` 和 `dao.Db.MGetVideoConfig` 修复该条数据。\n4. 修复出的数据会异步写回 Redis，同时补回 `accessKey:key_set@v2` 反向索引。\n\n`SetVideoAccounts` 先写账号维度的 store key，并维护反向索引；每个账号数据的 TTL 是 `tcc.GetRedisCacheTtl() + 30*time.Second`。`SetQueryResult` 再写查询结果 key，TTL 是 `tcc.GetRedisCacheTtl()`。这种顺序保证查询结果不会先指向一批尚未写入的 store key。\n\n`RemoveAccount(accessKey)` 通过反向索引取出所有 store key 并删除，随后启动 10 秒后的延迟双删。配置变更路径如 `service.MCreateConfig`、`service.DeleteConfig`、`service.MUpdateConfig` 会在 Redis 开关打开时调用它，使账号配置更新后远端缓存失效。\n\n## 刷新锁\n\n账号查询缓存使用查询粒度的轻量锁避免多个实例同时重建大结果集：\n\n- `toLockKey(req)` 是 `toQueryResultKey(req) + \"_lock\"`。\n- `Lock` 使用 `SetNX` 写入 UUID，TTL 为 30 秒。\n- `Unlock` 会先读取当前锁值，只在值与调用方持有的 UUID 一致时删除。\n- `Locked` 只判断锁 key 是否存在。\n\n`service.mgetAccountWithConfig` 在远端缓存 miss 时使用这些方法协调刷新。异步请求会尝试抢锁；抢到锁的实例查询 DB 并调用 `setAccountRedisCache`。同步请求如果发现锁存在，会短暂重试 Redis，超过重试次数后仍会回源 DB。\n\n## 域名账号关系缓存\n\n域名关系缓存处理 `dto.ListDomainAccountRelRequest` 到 `[]*dto.DomainAccountRel` 的结果。key 由 `toDomainAccountRelStoreKeySetKey(req)` 构造，包含 `ID`、`Domain`、`DomainType`、`AccountName`、`Region`、`Module`、`Category`、`NeedSubDomains`。\n\n`SetDomainAccountRel` 会先把完整响应 JSON 序列化，再用 `groupBytes(rawBytes, 4096)` 切成多个 4096 字节分片。每个分片写到独立 key：`<查询key>_<uuid>_<序号>`，最后把分片 key 列表写到查询 key。没有显式 TTL 的写入使用 `go-remote-cache` 的默认 TTL。\n\n`MListDomainAccountRel` 先读取分片 key 列表，再 `PipelineGet` 拉取所有分片，按顺序拼接后 `json.Unmarshal`。任意分片缺失都会返回 `go-remote-cache.ErrCacheMiss`，调用方会回源 DB。\n\n该缓存由 `service.refreshDomainRel` 使用：先尝试 `MListDomainAccountRel`，失败后调用 `dao.Db.BatchListDomainAccountRel`，必要时从 `cdnScheduleDomainCache` 补充调度子域名，再通过 `SetDomainAccountRel` 写回远端缓存。\n\n## CDN 调度域名快照\n\n`cdn_domain.go` 维护 CDN 调度主域名到子域名列表的 Redis 快照：\n\n- 数据 key：`CDNScheduleDomainsKey = \"cdn_schedule_domains\"`\n- 锁 key：`CDNScheduleDomainsLockKey = \"cdn_schedule_domains_lock\"`\n\n`SetCDNScheduleDomains` 写入 `map[string][]string`，并设置 `TTL: -1`，表示快照不按普通缓存 TTL 过期。`GetCDNScheduleDomains` 读取该快照。`AcquireCDNScheduleDomainsLock` 使用 `SetNX` 加 30 秒锁，避免多个实例同时写快照。\n\n`service.refreshCDNScheduleDomainCache` 正常情况下从 CDN schedule API 获取最新主域名和子域名，写入本地 `cdnScheduleDomainCache`，再异步抢锁写 Redis 快照。若 CDN API 失败，则调用 `GetCDNScheduleDomains` 从 Redis 快照恢复本地缓存。\n\n## 错误语义与降级\n\n`remote_cache` 本身不会把所有 miss 都转成 DB 查询。账号查询中，只有 store key 层面的局部缺失会在 `MGetVideoAccount` 内部修复；查询结果 key 缺失、Redis 操作失败、域名关系分片缺失等错误会返回给调用方。\n\n主要调用方的降级策略在 `service` 层：\n\n- `mgetAccountWithConfig`：远端缓存 miss 或错误后按请求类型重试、抢锁或回源 `dao.Db.MGetVideoAccount`。\n- `refreshDomainRel`：远端缓存失败后回源 `dao.Db.BatchListDomainAccountRel`。\n- `refreshCDNScheduleDomainCache`：CDN API 失败后尝试 Redis 快照；快照也失败时返回错误。\n\n`nopRemoteCache` 的存在是为了让惰性初始化失败时接口仍可调用，并把失败显式暴露给这些服务层兜底逻辑。\n\n## 测试与维护注意事项\n\n测试入口 `base_test.go` 的 `TestMain` 会初始化 `ginex`、配置、TCC 默认值刷新和 `remote_cache.Init()`，因此多数测试依赖可用 Redis 配置。`video_account_test.go`、`domain_rel_test.go`、`cdn_domain_test.go` 会真实读写测试 key。\n\n修改 key 生成逻辑时要同时考虑历史缓存兼容性。目前账号缓存通过 `versionTag = \"@v2\"` 隔离版本；域名关系 key 没有版本后缀。修改 `toQueryResultKey`、`toAccountStoreKey`、`toDomainAccountRelStoreKeySetKey` 会直接影响缓存命中率和删除能力。\n\n新增缓存类型时优先复用现有模式：先定义稳定 key，再保证写入顺序不会产生悬挂引用，最后明确调用方对 `ErrCacheMiss` 和普通 Redis 错误的兜底行为。","other-remote":"# Other — remote\n\n## 模块定位\n\n`src/remote` 模块提供跨地域写操作的 HTTP 转发封装。它不负责业务校验、数据库写入或路由注册，而是在 `service` 层判断“当前地域需要把写请求转发到远端”之后，接收原始请求体和远端地址模板，调用远端 Account 服务，并把远端统一响应中的 `data` 返回给上层。\n\n核心实现集中在 `src/remote/http_utils.go`，测试集中在 `src/remote/http_utils_test.go`。\n\n## 触发场景\n\n`remote` 模块主要服务于账号和配置写接口。典型调用方位于：\n\n- `service.CreateAccount`\n- `service.UpdateAccount`\n- `service.UpdateAccountStatus`\n- `service.MCreateConfig`\n- `service.MCopyConfig`\n- `service.DeleteConfig`\n- `service.MUpdateConfig`\n\n这些服务函数通常按同一模式决定是否走远端：\n\n```go\nif util.GetRegion(env.IDC()) == tcc.GetRemoteRegionInfo(ctx) {\n\tif tcc.GetWriteSwitch(c) {\n\t\tsetting := tcc.GetRemoteSetting(ctx)\n\t\tif len(setting) != 0 {\n\t\t\t// 调用 remote.CallRemote...\n\t\t}\n\t}\n}\n```\n\n也就是说，`remote` 模块只在当前 IDC 所属地域命中 `tcc.GetRemoteRegionInfo(ctx)`，且远端写开关 `tcc.GetWriteSwitch(c)` 打开、远端地址模板 `tcc.GetRemoteSetting(ctx)` 非空时参与执行。否则服务层会走本地校验和本地 DAO 写入，或直接返回“不支持跨区写”的错误。\n\nGitNexus 没有为 `src/remote` 检测到独立 execution flow；它更像是服务层写操作流程中的底层转发工具。\n\n## 整体结构\n\n```mermaid\nflowchart TD\n    A[\"service 写接口\"] --> B[\"读取请求体或组装请求体\"]\n    B --> C[\"判断远端写条件\"]\n    C --> D[\"remote.CallRemote*\"]\n    D --> E[\"补默认 Region（配置类请求）\"]\n    D --> F[\"格式化远端方法路径\"]\n    E --> G[\"InvokeRemoteHTTP\"]\n    F --> G\n    G --> H[\"远端 Account 服务\"]\n    H --> I[\"解析 errno.Payload\"]\n```\n\n`remote` 模块内部可以分为两层：\n\n- `CallRemote*` 系列函数：面向具体远端方法，负责选择 HTTP method、格式化 path、必要时补默认地域。\n- `InvokeRemoteHTTP`：通用 HTTP 执行器，负责继承请求头、发送 JSON 请求、校验 HTTP 状态和业务 `code`。\n\n## 通用执行器：`InvokeRemoteHTTP`\n\n```go\nfunc InvokeRemoteHTTP(ctx *gin.Context, method, path, data string) (interface{}, error)\n```\n\n`InvokeRemoteHTTP` 是所有远端调用的公共入口，调用方包括：\n\n- `CallRemoteCreateAccount`\n- `CallRemoteUpdateAccount`\n- `CallRemoteUpdateAccountStatus`\n- `CallRemoteCreateConfig`\n- `CallRemoteCopyConfig`\n- `CallRemoteUpdateConfig`\n- `CallRemoteDeleteConfig`\n\n它的执行过程是：\n\n1. 从 `ctx.Request.Header` 复制所有请求头。\n2. 使用 `HttpRequest.NewRequest()` 创建请求对象。\n3. 调用 `req.SetHeaders(header)` 把原请求头透传给远端。\n4. 根据 `method` 选择 `POST`、`PUT` 或 `DELETE`。\n5. 使用 `req.JSON().Post/Put/Delete(path, data)` 发送 JSON 请求。\n6. 要求远端 HTTP 状态码为 `http.StatusOK`。\n7. 使用 `simplejson.NewJson(body)` 解析响应体。\n8. 读取响应中的 `code` 字段，要求等于 `errno.CodeOK`。\n9. 返回响应中的 `data` 字段，即 `resp.Get(\"data\")`。\n\n远端响应预期符合本仓库的 `errno.Payload` 风格：\n\n```json\n{\n  \"code\": 0,\n  \"message\": \"...\",\n  \"data\": ...\n}\n```\n\n其中 `InvokeRemoteHTTP` 只把 `data` 暴露给上层，`code` 用于判断远端业务是否成功。\n\n## 支持的 HTTP 方法\n\n当前只支持三种方法：\n\n- `\"POST\"`\n- `\"PUT\"`\n- `\"DELETE\"`\n\n其他方法会直接返回：\n\n```go\nerrors.New(fmt.Sprintf(\"Unknown HTTP Method: %s\", method))\n```\n\n测试 `TestInvokeRemoteHTTP` 覆盖了 `POST`、`PUT`、`DELETE` 成功路径，以及 `PATCH` 失败路径。\n\n## 错误语义\n\n模块定义了两个包级错误：\n\n```go\nvar (\n\tcallErr   = errors.New(\"http call method failed\")\n\tserverErr = errors.New(\"server process failed\")\n)\n```\n\n实际含义如下：\n\n- `callErr`：HTTP 调用失败，或远端 HTTP 状态码不是 `200 OK`。`CallRemote*` 函数在捕获任意远端调用错误后，也统一向上返回 `callErr`。\n- `serverErr`：HTTP 请求成功，但远端业务响应中的 `code` 不是 `errno.CodeOK`。\n\n`InvokeRemoteHTTP` 在业务失败时会记录：\n\n```go\nlogs.CtxError(ctx, \"remote execute failed, resp: %v\", resp)\n```\n\n`CallRemote*` 函数还会记录具体业务动作和请求参数，例如：\n\n```go\nlogs.CtxError(ctx, \"call create config method failed, err: %v, param: %s\", err, val)\n```\n\n服务层通常不会区分 `callErr` 和 `serverErr`，而是统一转换成 `errno.ErrRemoteCallFailed` 返回给 API 调用方。\n\n## 远端方法封装\n\n### 账号写操作\n\n`CallRemoteCreateAccount`：\n\n```go\nfunc CallRemoteCreateAccount(ctx *gin.Context, path string, param []byte) (interface{}, error)\n```\n\n行为：\n\n- 将 `param` 转为字符串。\n- 用 `fmt.Sprintf(path, \"AccountCreateAccount\")` 生成最终远端 URL。\n- 通过 `InvokeRemoteHTTP(ctx, \"POST\", path, val)` 调用远端。\n\n`service.CreateAccount` 在远端写分支中调用它，并把远端返回的 `data` 包装为 `errno.OK(resp)` 返回。\n\n`CallRemoteUpdateAccount`：\n\n```go\nfunc CallRemoteUpdateAccount(ctx *gin.Context, path string, param []byte) (interface{}, error)\n```\n\n行为：\n\n- 使用远端方法名 `\"AccountUpdateAccount\"`。\n- 使用 HTTP `PUT`。\n- 请求体直接透传原始 `dto.VideoAccount` JSON。\n\n`CallRemoteUpdateAccountStatus`：\n\n```go\nfunc CallRemoteUpdateAccountStatus(ctx *gin.Context, path string, param []byte) (interface{}, error)\n```\n\n行为：\n\n- 使用远端方法名 `\"AccountUpdateAccountStatus\"`。\n- 使用 HTTP `PUT`。\n- `service.UpdateAccountStatus` 会先把 `access_key` 和 `status` 组装为 JSON map，再传入该函数。\n\n### 配置写操作\n\n`CallRemoteCreateConfig`：\n\n```go\nfunc CallRemoteCreateConfig(ctx *gin.Context, path string, param []byte) (interface{}, error)\n```\n\n行为：\n\n- 先调用 `AddDefaultRegionToUpdateConfigRequest(param)`。\n- 使用远端方法名 `\"AccountMCreateConfig\"`。\n- 使用 HTTP `POST`。\n\n`CallRemoteUpdateConfig`：\n\n```go\nfunc CallRemoteUpdateConfig(ctx *gin.Context, path string, param []byte) (interface{}, error)\n```\n\n行为：\n\n- 同样先调用 `AddDefaultRegionToUpdateConfigRequest(param)`。\n- 使用远端方法名 `\"AccountMCreateConfig\"`。\n- 使用 HTTP `PUT`。\n\n这里需要注意：创建和更新配置都使用远端方法名 `\"AccountMCreateConfig\"`，差异由 HTTP method 区分。修改这部分时需要同步确认远端服务的路由或方法映射规则。\n\n`CallRemoteCopyConfig`：\n\n```go\nfunc CallRemoteCopyConfig(ctx *gin.Context, path string, param []byte) (interface{}, error)\n```\n\n行为：\n\n- 先调用 `AddDefaultRegionToCopyConfigRequest(param)`。\n- 使用远端方法名 `\"AccountMCopyConfig\"`。\n- 使用 HTTP `POST`。\n\n`CallRemoteDeleteConfig`：\n\n```go\nfunc CallRemoteDeleteConfig(ctx *gin.Context, path string, param []byte) (interface{}, error)\n```\n\n行为：\n\n- 请求体直接转为字符串。\n- 使用远端方法名 `\"AccountMDeleteConfig\"`。\n- 使用 HTTP `POST`。\n\n`service.DeleteConfig` 中传入的请求体是：\n\n```go\njson.Marshal(map[string]int64{\"id\": id})\n```\n\n而远端落地函数 `service.RemoteDeleteConfig` 会解析为 `dto.DeleteConfigRequest`，再调用 `dao.Db.DeleteConfig(ctx, request.ID)`。\n\n## 默认 Region 补齐\n\n配置类远端请求有两个辅助函数用于补齐地域字段。\n\n### `AddDefaultRegionToUpdateConfigRequest`\n\n```go\nfunc AddDefaultRegionToUpdateConfigRequest(param []byte) (string, error)\n```\n\n该函数将 `param` 解析为 `dto.MUpdateConfigRequest`：\n\n```go\nreq := &dto.MUpdateConfigRequest{}\nif err := json.Unmarshal(param, req); err != nil {\n\treturn \"\", err\n}\n```\n\n如果 `req.Region == \"\"`，则设置为：\n\n```go\nreq.Region = util.GetRegion(env.IDC())\n```\n\n最后重新 `json.Marshal(*req)` 并返回字符串。\n\n它被 `CallRemoteCreateConfig` 和 `CallRemoteUpdateConfig` 使用，用于保证转发到远端前请求体中带有明确的 `Region`。测试 `TestAddDefaultRegionToUpdateConfigRequest` 验证了空 `Region` 会在 BOE 环境中补为 `\"boe\"`。\n\n### `AddDefaultRegionToCopyConfigRequest`\n\n```go\nfunc AddDefaultRegionToCopyConfigRequest(param []byte) (string, error)\n```\n\n该函数将 `param` 解析为 `dto.MCopyConfigRequest`。如果 `req.SourceRegion == \"\"`，则设置为：\n\n```go\nreq.SourceRegion = util.GetRegion(env.IDC())\n```\n\n它只被 `CallRemoteCopyConfig` 使用。测试 `TestAddDefaultRegionToCopyConfigRequest` 验证了空 `SourceRegion` 会补为 `\"boe\"`。\n\n这两个函数只处理“缺省地域”问题，不做业务合法性校验。请求结构校验仍由服务层和 `validator` 模块负责，例如 `validator.ValidateMUpdateConfigRequest`、`validator.ValidateMCopyConfigRequest`。\n\n## `path` 参数约定\n\n所有 `CallRemote*` 函数都接收 `path string`，并用 `fmt.Sprintf(path, methodName)` 生成最终调用地址：\n\n```go\npath = fmt.Sprintf(path, \"AccountCreateAccount\")\n```\n\n因此，`path` 不是普通固定 URL，而是一个包含格式化占位符的远端地址模板。该模板来自：\n\n```go\ntcc.GetRemoteSetting(ctx)\n```\n\n贡献新远端调用时，需要确认 TCC 中的 `InvokeSetting` 能正确接收一个远端方法名参数。否则 `fmt.Sprintf` 可能生成错误 URL，或原样返回不含方法名的地址。\n\n## 请求头透传\n\n`InvokeRemoteHTTP` 会遍历 `ctx.Request.Header`，并用 `ctx.GetHeader(k)` 获取每个 header 的值：\n\n```go\nheader := make(map[string]string)\nfor k := range ctx.Request.Header {\n\theader[k] = ctx.GetHeader(k)\n}\n```\n\n这意味着远端调用会继承原始请求中的调用方标识、链路信息或内部鉴权相关 header。上层服务依赖的一些 header，例如 `X-TT-From`，也可能被继续传给远端。\n\n需要注意的是，`map[string]string` 只能保留每个 header 的单个字符串值；如果某个 header 有多个值，当前实现不会保留完整多值列表。\n\n## 与服务层的职责边界\n\n`remote` 模块保持了较薄的职责边界：\n\n- 不读取 TCC：远端开关、远端地域和地址模板由 `service` 层读取。\n- 不判断当前地域：`util.GetRegion(env.IDC()) == tcc.GetRemoteRegionInfo(ctx)` 的判断在 `service` 层完成。\n- 不执行业务校验：例如账号参数、配置内容、状态值校验都在 `service` 或 `validator` 中完成。\n- 不访问 DAO：远端落地逻辑如 `RemoteDeleteConfig` 在 `service` 层，具体写库仍由 `dao.Db` 完成。\n- 不包装 API 响应：`remote` 返回远端 `data`，由服务层决定返回 `errno.OK(...)` 或错误 payload。\n\n这种设计让 `remote` 只关注“把已经决定要转发的写请求按约定发出去”。\n\n## 测试覆盖\n\n`src/remote/http_utils_test.go` 使用 `gomonkey` 对外部依赖进行 patch，重点覆盖以下行为：\n\n- `TestAddDefaultRegionToCopyConfigRequest`：验证 `MCopyConfigRequest.SourceRegion` 为空时会补默认地域。\n- `TestAddDefaultRegionToUpdateConfigRequest`：验证 `MUpdateConfigRequest.Region` 为空时会补默认地域。\n- `TestCallRemoteCopyConfig`、`TestCallRemoteCreateAccount`、`TestCallRemoteCreateConfig`、`TestCallRemoteDeleteConfig`、`TestCallRemoteUpdateAccount`、`TestCallRemoteUpdateAccountStatus`、`TestCallRemoteUpdateConfig`：通过 patch `InvokeRemoteHTTP` 验证各封装函数能成功返回远端结果。\n- `TestInvokeRemoteHTTP`：通过 patch `HttpRequest.Request` 的 `Post`、`Put`、`Delete` 方法和 `HttpRequest.Response` 的 `StatusCode`、`Body` 方法，验证支持的 HTTP method 能解析 `errno.OK(\"success\")`，不支持的 `PATCH` 会返回错误。\n\n测试中远端响应体由：\n\n```go\njson.Marshal(errno.OK(\"success\"))\n```\n\n构造，因此 `InvokeRemoteHTTP` 返回的 `data` 会被断言为 `\"success\"`。\n\n## 扩展新远端写操作的步骤\n\n新增一个远端写操作时，优先沿用现有 `CallRemote*` 模式：\n\n1. 在 `service` 层决定是否需要远端转发，保持与现有写接口一致的 `GetRemoteRegionInfo`、`GetWriteSwitch`、`GetRemoteSetting` 判断。\n2. 如果请求体需要补默认地域，新增或复用类似 `AddDefaultRegionToUpdateConfigRequest` 的辅助函数。\n3. 新增 `CallRemoteXxx(ctx, path, param)`，内部用 `fmt.Sprintf(path, \"远端方法名\")` 生成地址。\n4. 根据远端接口约定选择 `\"POST\"`、`\"PUT\"` 或 `\"DELETE\"`。\n5. 调用 `InvokeRemoteHTTP`，失败时记录包含具体动作和参数的日志，并返回 `callErr`。\n6. 在 `src/remote/http_utils_test.go` 中 patch `InvokeRemoteHTTP` 覆盖封装函数；必要时补充 `InvokeRemoteHTTP` 的响应解析或错误分支测试。\n\n新增封装时不要在 `remote` 层加入业务校验或数据库逻辑，否则会破坏当前模块与 `service`、`validator`、`dao` 的职责边界。","other-rocketmq":"# Other — rocketmq\n\n## RocketMQ 消费模块\n\n`src/rocketmq/consumer` 负责启动 RocketMQ 消费者，并把 ImageX 域名变更消息转交给账号域名服务处理。生产入口是 `main.go` 中的 `consumer.Init()`，测试入口由 `TestMain` 初始化 `ginex` 和配置。\n\n```mermaid\nflowchart TD\n    A[\"服务启动 main()\"] --> B[\"config.InitConf()\"]\n    B --> C[\"consumer.Init()\"]\n    C --> D[\"读取 config.Conf.Consumers\"]\n    D --> E[\"注册 ImageXDomainHandler\"]\n    E --> F[\"HandleMessage() 解析消息\"]\n    F --> G[\"service.ImageXDomainOnChange()\"]\n```\n\n## 核心组件\n\n### `Init()`\n\n`Init()` 遍历 `config.Conf.Consumers`，为每一项消费者配置创建 RocketMQ consumer：\n\n- 使用 `rocketConfig.NewDefaultConsumerConfig(consumerGroup, topic, clusterName)` 构造配置。\n- 设置 `rmqCfg.WorkerNum = conf.WorkerNum`。\n- 设置 `rmqCfg.ConsumeFromWhere = pb.SubscribeRequest_CONSUME_FROM_LATEST`，只从最新消息开始消费。\n- 调用 `consumer.NewConsumer(rmqCfg)` 创建消费者。\n- 当 `conf.Name == constant.TopicImageXDomain` 时注册 `&ImageXDomainHandler{}`。\n- 通过 goroutine 调用 `r.Start()` 启动消费。\n\n当前配置中 `constant.TopicImageXDomain` 的值是 `\"imagex\"`，各环境 YAML 通常配置为：\n\n```yaml\nConsumers:\n  - Topic: \"imagex_domain_event\"\n    Name: \"imagex\"\n    ConsumerGroup: \"toutiao_videoarch_account\"\n    ClusterName: \"videoarch_normal\"\n    WorkerNum: 4\n```\n\nBOE 环境的 `ClusterName` 通常是 `\"sandbox\"`。\n\n### `ImageXDomainHandler`\n\n`ImageXDomainHandler` 是当前模块唯一实际注册的消息处理器。它实现的方法是：\n\n```go\nfunc (r *ImageXDomainHandler) HandleMessage(ctx context.Context, msg *pb.ConsumeMessage) error\n```\n\n处理流程：\n\n1. 从 `msg.GetMsg().GetMsgBody()` 读取消息体。\n2. 反序列化到 `dto.ImageXDomainMessage`。\n3. 记录收到的消息日志。\n4. 调用 `service.ImageXDomainOnChange(ctx, recMsg)` 执行业务处理。\n5. 反序列化失败或业务处理失败时返回 `error`。\n\n`HandleMessage()` 不直接操作数据库，也不包含域名业务规则；它只负责 MQ 消息到服务层 DTO 的适配和错误传播。\n\n## 消息模型\n\nRocketMQ 消息体对应 `dto.ImageXDomainMessage`：\n\n```go\ntype ImageXDomainMessage struct {\n    Event     string `json:\"event\"`\n    Idc       string `json:\"idc\"`\n    ServiceID string `json:\"service_id\"`\n    AccountID string `json:\"account_id\"`\n    Domain    string `json:\"domain\"`\n    Extra     Extra  `json:\"extra\"`\n    Ts        int    `json:\"ts\"`\n}\n```\n\n已被服务层识别的事件类型在 `constant` 中定义：\n\n- `constant.EventAddDomain = \"add_domain\"`\n- `constant.EventDeleteDomain = \"delete_domain\"`\n\n示例消息：\n\n```json\n{\n  \"event\": \"add_domain\",\n  \"idc\": \"lf\",\n  \"service_id\": \"ExistAccountName\",\n  \"account_id\": \"1000000155\",\n  \"domain\": \"ExistDomain\",\n  \"extra\": {},\n  \"ts\": 1658739430\n}\n```\n\n## 与服务层的连接\n\n`ImageXDomainHandler.HandleMessage()` 将消息转交给 `service.ImageXDomainOnChange()`。服务层根据 `event.Event` 分支处理：\n\n- `add_domain`：如果域名不存在，创建 `dto.Domain`；随后创建 `dto.DomainAccountRel`，把域名绑定到 `event.ServiceID` 对应的账号名。\n- `delete_domain`：查询 `DomainAccountRel`，并按记录 ID 删除绑定关系。\n\n因此 RocketMQ 模块的职责边界很窄：它不判断域名是否存在、不做参数校验、不决定数据库写入方式；这些都由 `service.ImageXDomainOnChange()`、`validator` 和 `dao.Db` 负责。\n\n## 启动顺序\n\n`main()` 中的初始化顺序会影响消费者是否能正常处理消息：\n\n```go\nconfig.InitConf()\ntcc.SetDefaultValuesAndStartRefresh()\nrpc.Init()\nremote_cache.Init()\ndao.InitDb()\nutil.InitCheckSuffix()\nmiddleware.InitCircuitBreaker()\nservice.Init()\nutil.InitRateLimiter()\nconsumer.Init()\n```\n\n`consumer.Init()` 位于 DAO、middleware、service 初始化之后，这使得消息处理进入 `service.ImageXDomainOnChange()` 时可以使用数据库句柄、校验逻辑和相关运行时配置。\n\n## 错误处理\n\n`Init()` 创建 consumer 失败时会：\n\n```go\nlogs.Fatalf(\"initConsumer: %v\", err)\npanic(err)\n```\n\n`HandleMessage()` 中有两类错误会向上返回：\n\n- JSON 解析失败：记录 `unmarshal message failed` 并返回解析错误。\n- 服务层处理失败：记录 `[TopicDomainHandler] error` 并返回服务层错误。\n\n消息确认、重试或失败投递策略不在本模块中显式实现，由 `rocketmq-go-proxy` 的 consumer 框架根据 `HandleMessage()` 返回值处理。\n\n## 测试覆盖\n\n`base_test.go` 的 `TestMain` 在测试前执行：\n\n```go\nginex.Init()\nconfig.InitConf()\n```\n\n`handler_test.go` 覆盖两个主要行为：\n\n- `TestImageXDomainHandler_HandleMessage`：构造 `pb.ConsumeMessage`，并用 `gomonkey.ApplyFunc` 替换 `service.ImageXDomainOnChange`，验证 handler 会把 JSON 消息解析后传入服务层，并正确透传成功或失败。\n- `TestInitConsumer`：调用 `config.InitConf()` 和 `Init()`，断言初始化过程不 panic。\n\n测试中的 `handleMessage()` 是测试辅助函数，不是生产代码入口。它手动构造 `pb.ConsumeMessage`：\n\n```go\nmsg := &pb.ConsumeMessage{}\nmsg.Msg = new(proto.Message)\nmsg.Msg.MsgBody = []byte(msgBody)\n\nhandler := &ImageXDomainHandler{}\nreturn handler.HandleMessage(ctx, msg)\n```\n\n## 扩展新消费者\n\n新增 RocketMQ 消费逻辑时，现有模式是：\n\n1. 在配置文件的 `Consumers` 中增加一项 consumer 配置。\n2. 在 `constant` 中定义新的 `Name` 常量。\n3. 新增 handler 类型，并实现 `HandleMessage(ctx context.Context, msg *pb.ConsumeMessage) error`。\n4. 在 `Init()` 的 `switch conf.Name` 中注册对应 handler。\n\n当前 `switch` 只处理 `constant.TopicImageXDomain`。如果配置中出现未知 `Name`，`Init()` 仍会创建并启动 consumer，但不会注册业务 handler；修改这里时要明确未知配置是否应该被拒绝、告警或保持当前行为。","other-rpc":"# Other — rpc\n\n## Other — rpc 模块\n\n`src/rpc` 模块承载 RPC 层的初始化和访问能力。当前给出的代码主要是该模块的测试入口与 `GetBucket` 的调用验证，用来保证 RPC 相关依赖在测试执行前完成初始化，并验证 `GetBucket` 能在测试环境中按 bucket 名称取回结果。\n\n## 测试启动流程\n\n`src/rpc/base_test.go` 定义了包级测试入口 `TestMain`：\n\n```go\nfunc TestMain(m *testing.M) {\n\tginex.Init()\n\tconfig.InitConf()\n\tInit()\n\tcode := m.Run()\n\tos.Exit(code)\n}\n```\n\n`TestMain` 会在 `rpc` 包内所有测试运行前执行一次。它按固定顺序完成三件事：\n\n1. 调用 `ginex.Init()` 初始化 Gin 扩展环境。\n2. 调用 `config.InitConf()` 加载项目配置。\n3. 调用 `Init()` 初始化 `rpc` 包自身依赖。\n4. 执行 `m.Run()` 运行测试，并通过 `os.Exit(code)` 保留测试退出码。\n\n这个顺序很重要：`Init()` 通常依赖已经加载完成的配置，因此 `config.InitConf()` 必须先执行。`TestGetBucket` 等测试不需要重复初始化，只依赖 `TestMain` 提供的全局测试环境。\n\n```mermaid\nflowchart LR\n    A[\"go test 执行 rpc 包\"] --> B[\"TestMain\"]\n    B --> C[\"ginex.Init\"]\n    B --> D[\"config.InitConf\"]\n    B --> E[\"Init\"]\n    B --> F[\"m.Run\"]\n    F --> G[\"TestGetBucket\"]\n    G --> H[\"GetBucket\"]\n```\n\n## Bucket 查询测试\n\n`src/rpc/bucket_test.go` 中的 `TestGetBucket` 验证 `GetBucket` 的基本调用路径：\n\n```go\nfunc TestGetBucket(t *testing.T) {\n\tgot, err := GetBucket(context.TODO(), \"tostest\")\n\tassert.Nil(t, err)\n\tt.Logf(\"bucket: %v\", got)\n}\n```\n\n从调用方式可以看出，`GetBucket` 接收：\n\n- `context.Context`：这里使用 `context.TODO()`，表示测试当前没有传入超时、取消信号或请求级元数据。\n- bucket 名称：测试中使用固定名称 `\"tostest\"`。\n- 返回值：一个 bucket 结果和一个 `error`。\n\n测试只断言 `err == nil`，并通过 `t.Logf` 打印返回的 bucket 内容。它更像是一个集成验证：确认 RPC 初始化、配置加载和远端 bucket 查询链路能够跑通，而不是验证 bucket 结构的具体字段。\n\n## 与其他模块的关系\n\n该模块测试代码直接连接到以下依赖：\n\n- `code.byted.org/gin/ginex`：由 `ginex.Init()` 初始化运行时环境。\n- `src/config`：由 `config.InitConf()` 加载配置，是 RPC 初始化前置条件。\n- `src/rpc` 包内部生产代码：`Init()` 负责 RPC 层初始化，`GetBucket` 负责 bucket 查询。\n\n调用图中没有检测到来自其他模块对这些测试函数的入边，也没有独立的执行流记录。这符合 Go 测试代码的特点：`TestMain` 和 `TestGetBucket` 由 `go test` 框架发现并调用，而不是由业务代码直接调用。\n\n## 贡献注意事项\n\n修改 `rpc` 包初始化逻辑时，需要关注 `TestMain` 的初始化顺序。新增依赖如果影响 `GetBucket` 或其他 RPC 调用，应放在 `m.Run()` 之前完成初始化。\n\n扩展 bucket 相关测试时，优先在现有 `TestMain` 初始化环境下添加测试函数，避免在单个测试里重复调用 `ginex.Init()`、`config.InitConf()` 或 `Init()`。如果新增测试依赖不同 bucket 名称或环境配置，应明确测试数据来源，避免让测试只能在某个开发者本地环境通过。\n\n当前 `TestGetBucket` 只验证无错误返回。如果 `GetBucket` 的返回结构有稳定字段，后续可以补充字段级断言，让测试从“链路可用”进一步覆盖“结果正确”。","other-script":"# Other — script\n\n## script 模块\n\n`script` 模块负责服务进程的启动编排。它不包含业务逻辑，也没有被代码图识别出内部调用、外部调用或执行流；它的职责集中在运行时目录初始化、读取部署元信息、组装启动参数，并最终通过 `exec` 启动二进制文件。\n\n核心入口是 [script/bootstrap.sh](/Users/bytedance/videoarch/account/script/bootstrap.sh)，配置来源是 [script/settings.py](/Users/bytedance/videoarch/account/script/settings.py)。[script/pre_nginx.sh](/Users/bytedance/videoarch/account/script/pre_nginx.sh) 当前为空文件，保留给 nginx 启动前扩展使用。\n\n```mermaid\nflowchart TD\n    A[\"执行 bootstrap.sh\"] --> B[\"确定 RUNTIME_ROOT\"]\n    B --> C[\"创建 log/app 与 log/rpc\"]\n    C --> D[\"读取 settings.py\"]\n    D --> E[\"拼接 PSM 与二进制名\"]\n    E --> F[\"导出 GIN_LOG_DIR 与 PSM\"]\n    F --> G[\"exec 启动 bin/toutiao.videoarch.account\"]\n```\n\n### 启动入口：bootstrap.sh\n\n`bootstrap.sh` 的典型调用形式是：\n\n```bash\n./script/bootstrap.sh /path/to/runtime/root 8080\n```\n\n第一个参数用于指定 `RUNTIME_ROOT`。如果未传入，则默认使用 `bootstrap.sh` 所在目录。第二个参数会赋给 `PORT`，并在非空时追加到最终启动参数中：\n\n```bash\nargs=\"-psm=$SVC_NAME -conf-dir=$CONF_DIR -log-dir=$GIN_LOG_DIR\"\nif [ \"X$PORT\" != \"X\" ]; then\n    args+=\" -port=$PORT\"\nfi\n```\n\n最终脚本会执行：\n\n```bash\nexec $CURDIR/bin/${BinaryName} $args\n```\n\n其中当前配置下：\n\n```text\nSVC_NAME=toutiao.videoarch.account\nBinaryName=toutiao.videoarch.account\n```\n\n因此脚本期望二进制文件位于：\n\n```text\nscript/bin/toutiao.videoarch.account\n```\n\n### 运行时目录\n\n脚本会根据 `RUNTIME_ROOT` 推导运行时目录：\n\n```bash\nRUNTIME_CONF_ROOT=$RUNTIME_ROOT/conf\nRUNTIME_LOG_ROOT=$RUNTIME_ROOT/log\n```\n\n其中 `RUNTIME_CONF_ROOT` 当前只被赋值，没有继续参与启动参数。实际传给二进制的配置目录是：\n\n```bash\nCONF_DIR=$CURDIR/conf/\n```\n\n也就是 `script/conf/`。\n\n日志目录会使用 `RUNTIME_LOG_ROOT`，并确保以下子目录存在：\n\n```text\n$RUNTIME_ROOT/log/app\n$RUNTIME_ROOT/log/rpc\n```\n\n随后导出：\n\n```bash\nexport GIN_LOG_DIR=$RUNTIME_LOG_ROOT\nexport PSM=$SVC_NAME\n```\n\n二进制进程会通过环境变量 `GIN_LOG_DIR` 获取日志根目录，通过 `PSM` 获取服务标识。\n\n### settings.py 配置\n\n`settings.py` 是启动脚本读取服务身份的唯一配置文件。当前内容为：\n\n```python\nPRODUCT=\"toutiao\"\nSUBSYS=\"videoarch\"\nMODULE=\"account\"\nAPP_TYPE=\"binary\"\n```\n\n`bootstrap.sh` 使用 Python 动态读取这些变量：\n\n```bash\nPRODUCT=$(cd $CURDIR; python -c \"import settings; print (settings.PRODUCT)\")\nSUBSYS=$(cd $CURDIR; python -c \"import settings; print (settings.SUBSYS)\")\nMODULE=$(cd $CURDIR; python -c \"import settings; print (settings.MODULE)\")\n```\n\n`PRODUCT`、`SUBSYS`、`MODULE` 三者共同组成服务名和二进制名：\n\n```bash\nSVC_NAME=${PRODUCT}.${SUBSYS}.${MODULE}\nBinaryName=${PRODUCT}.${SUBSYS}.${MODULE}\n```\n\n如果三者任意一个为空，脚本会报错退出：\n\n```text\nSupport PRODUCT SUBSYS MODULE PORT in settings.py\n```\n\n`settings.py` 中还保留了 nginx 相关配置说明：\n\n```python\n# REQUIRE_NGINX = True\n# PRENGINX_SCRIPT = \"pre_nginx.sh\"\n```\n\n当前这两项被注释，因此 `bootstrap.sh` 读取 `settings.REQUIRE_NGINX` 时会失败，但 stderr 被重定向到 `/dev/null`，变量最终为空。这意味着默认不会进入需要 nginx 的端口分配分支。\n\n### nginx 与 Mesh 相关逻辑\n\n`bootstrap.sh` 包含以下兼容逻辑：\n\n```bash\nREQUIRE_NGINX=$(cd $CURDIR; python -c \"import settings; print (settings.REQUIRE_NGINX)\" 2>/dev/null)\n\nif [ \"$REQUIRE_HTTP_MESH\" == \"True\" ]; then\n    REQUIRE_NGINX=False\nfi\n```\n\n这里的 `REQUIRE_HTTP_MESH` 不是在 `settings.py` 中读取的变量，而是依赖外部环境变量。如果运行环境设置了：\n\n```bash\nREQUIRE_HTTP_MESH=True\n```\n\n脚本会强制关闭 nginx 需求。\n\n在主机网络模式下，脚本还会根据 `REQUIRE_NGINX` 设置服务端口和调试端口：\n\n```bash\nif [ \"$IS_HOST_NETWORK\" == \"1\" ]; then\n    if [ \"$REQUIRE_NGINX\" == \"True\" ]; then\n        export RUNTIME_SERVICE_PORT=$PORT1\n        export RUNTIME_DEBUG_PORT=$PORT2\n    else\n        export RUNTIME_SERVICE_PORT=$PORT0\n        export RUNTIME_DEBUG_PORT=$PORT1\n    fi\nfi\n```\n\n`IS_HOST_NETWORK`、`PORT0`、`PORT1`、`PORT2` 都需要由部署平台或外层启动环境提供。脚本本身不会解析或生成这些端口。\n\n### pre_nginx.sh\n\n`pre_nginx.sh` 当前为空。结合 `settings.py` 中注释掉的：\n\n```python\n# PRENGINX_SCRIPT = \"pre_nginx.sh\"\n```\n\n它更像是部署框架预留的扩展点，用于在 nginx 启动前执行自定义准备逻辑。当前模块没有启用该脚本，也没有任何代码直接调用它。\n\n### 与代码库其他部分的连接\n\n`script` 模块是服务进程和部署环境之间的连接层，而不是业务代码的一部分。它通过以下约定连接到其余系统：\n\n- 二进制产物必须放在 `script/bin/${PRODUCT}.${SUBSYS}.${MODULE}`。\n- 运行配置默认从 `script/conf/` 读取，并通过 `-conf-dir` 传给二进制。\n- 日志根目录来自 `RUNTIME_ROOT/log`，并通过 `-log-dir` 和 `GIN_LOG_DIR` 同时传递。\n- 服务标识通过 `-psm` 和 `PSM` 同时传递，当前为 `toutiao.videoarch.account`。\n- 端口可以通过启动脚本第二个参数传入，也可以在主机网络模式下通过 `PORT0`、`PORT1`、`PORT2` 环境变量参与派生。\n\n由于代码图没有识别出该模块的内部调用、外部调用或业务执行流，维护时应把它视为部署启动约定的一部分。修改 `PRODUCT`、`SUBSYS`、`MODULE` 会同时影响服务名、二进制名、`PSM` 和启动路径，通常需要同步检查构建产物名称、部署配置和监控标识。","other-service":"# Other — service\n\n## 模块概览\n\n`src/service` 是账号系统的业务入口层。它承接 Gin 路由传入的 `*gin.Context` 和业务 `context.Context`，把 HTTP 请求解析为 `dto` 对象，调用 `validator` 做参数校验，再通过 `dao.Db` 访问数据库，最终统一返回 `*errno.Payload`。\n\n这个模块不是单一业务流程，而是一组账号域能力的 service 函数集合，覆盖账号、配置、域名、权限、实例、规则、类目 schema、BPM 审批回调、Wand 资产同步和缓存刷新等场景。\n\n```mermaid\nflowchart TD\n    A[路由层 Gin Context] --> B[service 入口函数]\n    B --> C[解析请求参数或请求体]\n    C --> D[validator 参数校验]\n    D --> E[dao.Db 持久化访问]\n    B --> F[本地缓存和远端缓存]\n    B --> G[remote 远端写代理]\n    E --> H[errno.Payload 响应]\n    F --> H\n    G --> H\n```\n\n## 通用代码模式\n\n大多数入口函数遵循同一结构：\n\n1. 使用 `c.GetRawData()`、`c.BindQuery()`、`util.ParamString()`、`util.ParamInt64()` 或 `util.QueryString()` 获取请求数据。\n2. 使用 `json.Unmarshal()` 反序列化请求体到 `dto` 类型。\n3. 调用 `validator` 中的校验函数，例如 `ValidateCreateAccountRequest`、`ValidateMCreateConfigRequest`、`ValidateCreateDomainRequest`。\n4. 调用 `dao.Db` 执行数据库操作。\n5. 使用 `errno.OK(...)` 或 `errno.ErrorWithCode(...)` 返回统一响应。\n\n典型写法如下：\n\n```go\nfunc CreateAccess(c *gin.Context, ctx context.Context) *errno.Payload {\n    content, err := c.GetRawData()\n    if err != nil {\n        return errno.ErrorWithCode(errno.CodeGetDataErr, err)\n    }\n\n    access := &dto.Access{}\n    if err = json.Unmarshal(content, access); err != nil {\n        return errno.ErrorWithCode(errno.CodeParseDataErr, err)\n    }\n\n    if err = dao.Db.CreateAccess(ctx, access); err != nil {\n        return errno.ErrorWithCode(errno.CodeDbErr, err)\n    }\n    return errno.OK(nil)\n}\n```\n\n新增 service 入口时应保持这个返回约定，不要直接写 Gin response。\n\n## 账号与配置\n\n账号主流程在 `account.go` 和 `config.go` 中。\n\n`CreateAccount` 创建账号并写入初始配置。它先判断当前 IDC 是否等于 `tcc.GetRemoteRegionInfo(ctx)`：如果命中远端写入区域，并且 `tcc.GetWriteSwitch(c)` 开启，则通过 `remote.CallRemoteCreateAccount` 代理写入；否则才解析 `dto.CreateAccountRequest`，调用 `validator.ValidateCreateAccountRequest`，再通过 `dao.Db.CreateAccount` 落库。\n\n`UpdateAccountStatus`、`UpdateAccount`、`MCreateConfig`、`MUpdateConfig`、`DeleteConfig`、`MCopyConfig` 也有相同的远端写代理逻辑。远端 URL 来自 `tcc.GetRemoteSetting(ctx)`，为空时返回 `errno.ErrRemoteCallFailed`。\n\n账号读取的核心函数是 `mgetAccountWithConfig`。它会同时返回账号和配置：\n\n- 先尝试 `remote_cache.GetCacheInstance().MGetVideoAccount(ctx, req)` 读取 Redis。\n- 缓存未命中时，根据请求类型和 `isAsyncRequest()` 决定是否抢锁刷新。\n- 最终回源 `dao.Db.MGetVideoAccount`，再按 `accessKey` 分批调用 `dao.Db.MGetVideoConfigByKeys` 补齐配置。\n- 回源成功后异步调用 `setAccountRedisCache` 写入 Redis。\n\n对外读取入口包括：\n\n- `MGetAccountWithConfig`\n- `MGetAllAccountWithConfig`\n- `GetAccountInfo`\n- `PageGetAccount`\n- `CountAccounts`\n- `CountRegionSpacesV3`\n- `MGetAccountV3`\n- `GetAccountStorageBuckets`\n- `GetAccountStorageBucket`\n\n`MGetAccountWithConfig` 还有本地 `lruCache` 缓存层，由 `mGetAccountWithConfig0` 和 `mGetAccountWithConfig1` 封装。请求包含 `NoCache`，或请求头 `X-TT-From` 在 `tcc.PSMInAccountNoCacheWhiteList` 中时，会穿透本地缓存；账号查询还会继续通过 `skipCache(nocache)` 控制是否穿透 Redis。\n\n## 配置读取与缓存失效\n\n`MCreateConfig`、`MUpdateConfig` 和 `DeleteConfig` 修改配置后，会在 Redis 开关 `tcc.CheckRedisCacheSwitch()` 开启时调用 `remote_cache.GetCacheInstance().RemoveAccount(ctx, accessKey)` 清理账号配置缓存。\n\n`GetConfig` 支持按 `access_key` 查询；如果没有传 `access_key`，会先用 `account_name` 查询账号，再拿账号的 `AccessKey` 查询配置。\n\n`ListConfigsByCondition` 使用包级 `sync.Map` 缓存查询结果，缓存项类型为 `ListConfigCache`，过期时间来自 `tcc.GetCacheRefreshTime(ctx)`。\n\n## 域名与域名关系\n\n域名能力在 `domain.go` 和 `domain_auth.go` 中。\n\n`CreateDomain` 解析 `dto.Domain`，通过 `validator.ValidateCreateDomainRequest` 校验后调用 `dao.Db.CreateDomain`。`GetDomain` 使用 `domainCache` 本地缓存；数据库异常但不是 `not found` 时，会尝试从过期缓存兜底。`not found` 会短暂缓存 `nil`，用于防止缓存穿透。\n\n域名和账号关系由 `dto.DomainAccountRel` 表示：\n\n- `CreateDomainAccountRel` 创建主关系，并按 `SyncRegions` 复制到其他 region。\n- `ListDomainAccountRel` 通过 `listDomainAccountRel` 查询，优先读 `domainRelCache`。\n- `DeleteDomainAccountRel` 按 query 参数 `id` 删除。\n- `UpdateDomainAccountRel` 更新单条关系。\n- `CopyDomainAccountRel` 按源 region 和目标 region 批量复制关系。\n\n当 `ListDomainAccountRelRequest.NeedSubDomains` 为 true，且关系类型是 `dto.ScheduleDomain`，`listDomainAccountRel` 会从 `cdnScheduleDomainCache` 补充 `SubDomains`。\n\n`ImageXDomainOnChange` 是消息消费侧调用的域名同步入口。`constant.EventAddDomain` 会确保域名存在并创建 image 类目的账号关系；`constant.EventDeleteDomain` 会查找并删除匹配关系。该函数被 RocketMQ handler 调用，而不是 HTTP 入口。\n\n`domain_auth.go` 处理域名授权信息。`CreateDomainAuthInfo` 会校验空间存在、`TopAccountId` 匹配，并确认 storage 配置里的 bucket 与请求一致，然后创建 `dto.DomainAuth`。`UpdateDomainAuthStatus` 只接受状态 `0` 或 `1`。\n\n## 权限、访问项、条件与实例\n\n`access.go`、`condition.go` 和 `authority.go` 是薄 CRUD 层：\n\n- `CreateAccess`、`DeleteAccess`、`GetAccess`\n- `CreateCondition`、`DeleteCondition`、`GetCondition`\n- `CreateAuthority`、`DeleteAuthority`、`UpdateAuthorityStatus`、`MGetAuthority`\n\n`MGetAuthority` 根据请求中的 `Grantee` 选择查询路径：为空时调用 `dao.Db.MGetAuthorityByGrantor`，否则调用 `dao.Db.MGetAuthorityByGrantee`。结果会写入 `authorityCache`。\n\n实例入口在 `instance.go`：\n\n- `CreateInstance`\n- `DeleteInstance`\n- `UpdateInstance`\n- `UpdateInstanceByInstanceID`\n- `GetInstance`\n- `ListInstances`\n\n`GetInstance` 为兼容老数据，会先按 `TopAccountID` 查询账号；如果账号里有 `TopInstanceID`，会构造 `dto.Instance` 返回并写入 `instanceCache`。`ListInstances` 支持 `account_id`、`instance_configs`、`limit`、`offset` 查询，其中 `limit` 大于 100 会返回错误。\n\n## 类目 Schema 与嵌入元数据\n\n`account_category_schema.go` 管理账号类目 schema：\n\n- `CreateAccountCategorySchema`\n- `UpdateAccountCategorySchema`\n- `DeleteAccountCategorySchema`\n- `ListAccountCategorySchema`\n- `GetAccountCategoryEmbeddedSchema`\n- `GetDeccEmbeddedSchema`\n\n`ListAccountCategorySchema` 默认从 `accountCategorySchemaCache` 读取；如果请求头命中 no-cache 白名单，则直接访问 `dao.Db.ListAccountCategorySchema`。\n\n`GetAccountCategoryEmbeddedSchema` 查询 `dto.SchemaEmbeddedMetadata` 类型的 schema，并反序列化为 `dto.EmbeddedMetadataSchema`。当 `config.Conf.EnableEmbeddedMetadata` 为 false 时，它返回空 schema。若空间 schema 没有设置 `IgnoreGlobalConf`，函数会把 `tcc.GetMetadataBlackList()` 中的全局黑名单追加进去，并拼接更新 `SchemaVersion`。\n\n## 规则与同步 IDC\n\n规则能力分为旧版 `rule.go` 和新版 `rule_v2.go`。\n\n旧版规则使用 `dto.VideoRule`：\n\n- `CreateVideoRule`\n- `UpdateRuleById`\n- `UpdateRuleStatus`\n- `PageGetRule`\n- `MGetRule`\n- `LoadAllSyncIDC`\n- `LoadAllSyncIDCs`\n- `MGetCategory`\n\n`CreateVideoRule` 会把 `LocalIDC` 规整为 `util.GetRegion(rule.LocalIDC)`，默认状态为 `constant.StatusUnaudited`。`LoadAllSyncIDCs` 会把每条规则的 `SyncInfo` 解析为 `provider -> localIDC -> syncIDCs` 的映射，并缓存到 `ruleIDCSCache`。\n\n新版规则使用 `dto.VideoRuleV2`：\n\n- `CreateVideoRuleV2`\n- `UpdateRuleByIdV2`\n- `UpdateRuleStatusV2`\n- `MGetRuleV2`\n- `LoadAllSyncIDCsV2`\n\n`CreateVideoRuleV2` 额外调用 `validator.ValidateRuleType(rule.Type)`。`LoadAllSyncIDCsV2` 使用 `ruleIDCSCacheV2` 这个带互斥锁的单值缓存，刷新逻辑会定期把缓存置空。\n\n## BPM 入口\n\n`bpm.go` 用于接收审批平台 payload，并转换为内部 DTO。\n\n`BPMCreateDomainAccountRel` 会先检查域名是否存在。存在时只创建关系；不存在时构造 `dto.Domain`，把 `dto.DomainAccountRel` 放入 `AccountRels` 后一起创建。它同样支持 `SyncRegions` 复制关系。\n\n`BPMCreateConfigs` 把 `BPMCreateConfigsWorkflow.BucketResp` 转换为 storage 模块的 `dto.VideoConfig` 列表，然后走 `validator.ValidateMCreateConfigRequest(ctx, req, true)` 和 `dao.Db.MCreateConfig`。\n\n`BPMUpsertMetadataClean` 查询账号 `SchemaEmbeddedMetadata` 配置，存在则保留 `ID` 和 `Version` 更新，不存在则创建新的 `dto.AccountCategorySchema`。\n\n`BPMMigrateDomainAccountRel` 从旧域名读取所有关系，必要时创建新域名，然后把关系复制到新域名下。遇到重复关系会跳过。\n\n## 缓存初始化与刷新\n\n`Init` 是 service 包初始化入口。它会：\n\n- 创建账号查询 `lruCache`，刷新函数是 `RefreshCache`\n- 调用 `initCache()` 初始化规则、权限、实例、域名关系、CDN 调度域名、类目 schema 等缓存\n- 调用 `iamsdk.MustInitKms(constant.PSM)`\n\n`initCache` 会启动多个后台 goroutine。每类缓存都有对应刷新函数：\n\n- `refreshRule`\n- `refreshAuthority`\n- `refreshInstance`\n- `refreshDomainRel`\n- `refreshCDNScheduleDomainCache`\n- `refreshAccountCategorySchema`\n\n`RefreshCache` 专门刷新账号配置查询缓存。它会创建 cron span，做 `util.HardenCli.Allow` 限流，然后以 `isAsyncRequest()` 调用 `mgetAccountWithConfig`，让异步刷新路径使用 Redis 锁和指数退避。\n\n## Wand 资产同步\n\n`wand.go` 对接 Wand 资源迁移场景。\n\n`GetAccountVodAssets` 根据 query 参数 `people` 查询账号负责人名下的账号，只返回 `Type` 为 `\"space\"` 或空字符串的账号。它读取账号 global 配置中的 `region`，通过 `getVodAssetUrl` 根据 `config.Conf.Wand.RegionVConsoleUrl` 拼出 VOD 控制台 URL，然后把资源编码成 Wand 需要的字符串格式。\n\n`Asset.EncodeAsset` 的格式是：\n\n```text\nProduct::AssetId::AssetUrl::AssetDesc\n```\n\n`EncodeStr` 会删除字段中的 `::` 和 `|`，避免破坏分隔格式。`DecodeAssets` 按 `::` 拆回 `Asset`。\n\n`UpdateAccountVodAssets` 接收 `UpdateAssets`，逐条校验当前账号负责人是否等于 `from`，然后把 `UserName` 更新为 `to` 并调用 `dao.Db.UpdateAccount`。\n\n## 测试组织\n\n`base_test.go` 的 `TestMain` 初始化完整运行环境：\n\n```go\nginex.Init()\nconfig.InitConf()\ntcc.SetDefaultValuesAndStartRefresh()\nmiddleware.InitCircuitBreaker()\nutil.InitRateLimiter()\ndao.InitDb()\nremote_cache.Init()\nInit()\n```\n\n单元测试混合了两类风格：\n\n- 对薄 service 层做真实集成验证，例如 `Test_Access`、`Test_Condition`、`Test_Rule`、`Test_DomainAllMethod`。\n- 使用 `gomonkey` patch 掉 `dao.Db`、`validator`、`tcc`、`remote` 依赖，覆盖远端写代理和错误分支，例如 `Test_CreateAccount`、`Test_MCreateConfig_Normal`、`TestBPMUpsertMetadataClean`。\n\n修改 service 代码时，优先补充对应入口的请求解析、校验失败、DAO 失败、缓存命中或远端代理分支测试。","other-tcc":"# Other — tcc\n\n## 模块概览\n\n`src/tcc` 是账号服务的 TCC 配置访问层。它把远端 TCC key 转换成代码内可直接使用的 Go 类型，并为部分高频配置维护进程内快照。业务层、DAO、middleware 不直接解析 TCC 字符串，而是通过这里的 getter 读取配置。\n\n模块主要承担四类职责：\n\n1. 初始化 `tccclient.ClientV2`：`GetTccSettingsClient()` 使用 `sync.Once` 创建全局 TCC client。\n2. 启动动态配置刷新：`SetDefaultValuesAndStartRefresh()` 先加载本地默认值，再调用 `process()` 拉取 TCC，并启动 `refreshTccConfig()` 每分钟刷新。\n3. 提供类型化 getter：例如 `GetACLConfigs()`、`GetCircuitBreakersConfigs()`、`GetWriteSwitch()`、`GetIdGeneratorConfig()`。\n4. 维护热更新快照：Redis 缓存开关、TTL、重试次数、Account no-cache 白名单、metadata 黑名单、接口限流、内存限制等由刷新循环更新。\n\n```mermaid\nflowchart TD\n  A[config.InitConf 初始化基础配置] --> B[SetDefaultValuesAndStartRefresh 设置默认值]\n  B --> C[process 拉取动态 TCC key]\n  C --> D[原子变量 / map / sync.Map 快照]\n  C --> E[interface_limiter 与 mem_limit]\n  B --> F[refreshTccConfig 每分钟刷新]\n  F --> C\n  D --> G[service / dao / middleware 读取 getter]\n```\n\n## 启动顺序\n\n主流程在 `main.go` 中按以下顺序初始化：\n\n1. `config.InitConf()`\n2. `tcc.SetDefaultValuesAndStartRefresh()`\n3. `rpc.Init()`\n4. `remote_cache.Init()`\n5. `dao.InitDb()`\n6. `middleware.InitCircuitBreaker()`\n7. `service.Init()`\n\n这个顺序很重要：`remote_cache.Init()`、`dao.InitDb()`、`middleware.InitCircuitBreaker()` 和 `service.Init()` 都会读取 `tcc` 模块中的配置。`SetDefaultValuesAndStartRefresh()` 必须先执行，否则 Redis 缓存、DB 密码、DB retry、缓存大小、断路器等配置可能仍是零值或本地 fallback。\n\n测试入口 `src/tcc/base_test.go` 也保持了同样的核心顺序：\n\n```go\nginex.Init()\nconfig.InitConf()\nSetDefaultValuesAndStartRefresh()\n```\n\n## TCC client\n\n`GetTccSettingsClient()` 是模块内所有 TCC 读取的入口：\n\n```go\nfunc GetTccSettingsClient() *tccclient.ClientV2\n```\n\n它使用 `sync.Once` 确保进程内只创建一个 `ClientV2`：\n\n- `Auth = true`\n- `Confspace = config.Conf.TccInfo.ConfigSpace`\n- 首次读取超时为 `1 * time.Second`\n- PSM 来自 `config.Conf.Meta.PSM`\n- 初始化失败会 `panic`\n\n`config.InitConf()` 自身也会读取 TCC 的 `\"base\"` key，并把远端 base 配置 merge 到本地 `config.Conf`。这属于 `config` 模块的基础配置加载；`src/tcc` 负责后续运行期配置读取和刷新。\n\n## 配置读取模式\n\n`tcc` 模块中有两种主要读取模式。\n\n### 每次调用直接读 TCC\n\n这些函数调用时会直接访问 TCC，解析失败或读取失败时回退到 `config.Conf` 或模块内默认值：\n\n| 函数 | TCC key | 返回类型 | 失败回退 |\n|---|---|---|---|\n| `GetDBRetryTimes(ctx)` | `retry_times` | `int` | `config.Conf.RetryTimes` |\n| `GetCacheRefreshTime(ctx)` | `cache_refresh_time` | `time.Duration` | `config.Conf.CacheRefreshTime` |\n| `GetCacheSize(ctx)` | `cache_size` | `int` | `config.Conf.CacheSize` |\n| `GetReadDBPassword(ctx)` | `r_db_password` | `string` | `\"\"` |\n| `GetWriteDBPassword(ctx)` | `w_db_password` | `string` | `\"\"` |\n| `GetACLConfigs(ctx)` | `acl` | `*config.ACL` | `&config.Conf.ACL` |\n| `GetCircuitBreakersConfigs(ctx)` | `circuit_breakers` | `map[string]config.CircuitBreaker` | `config.Conf.CircuitBreakers` |\n| `GetAdminUsers(ctx)` | `admin_user` | `map[string]bool` | `config.Conf.AdminUser` |\n| `GetAllowList(ctx)` | `allow_list` | `map[string]bool` | `defaultAllowList` |\n| `GetStorageConfigCheckWhitelist(ctx)` | `storage_config_check_whitelist` | `map[string]bool` | `storageConfigCheckWhitelist` |\n| `CheckLocalCacheSwitch(ctx)` | `local_cache_switch` | `bool` | `true` |\n| `GetIdGeneratorConfig(ctx)` | `id_gen_setting` | `config.IdGenerator` | `config.Conf.IdGenerator` |\n| `GetWriteSwitch(ctx)` | `write_remote_setting` | `bool` | `config.Conf.WriteRemote.RemoteSwitch` |\n| `GetRemoteSetting(ctx)` | `write_remote_setting` | `string` | `config.Conf.WriteRemote.InvokeSetting` |\n| `GetRemoteRegionInfo(ctx)` | `write_remote_setting` | `string` | `config.Conf.WriteRemote.RegionInfo` |\n\n`GetWriteSwitch()`、`GetRemoteSetting()`、`GetRemoteRegionInfo()` 都通过内部函数 `getWriteRemoteSetting(ctx)` 读取同一个 TCC key：`write_remote_setting`。解析逻辑由 `writeRemoteParser()` 完成，并使用 `GetWithParser()` 的 cache 参数在 TCC 失败时保留上一次成功值。\n\n`GetIdGeneratorConfig()` 同样使用 `GetWithParser()` 和 `idGenParser()`。如果读取或 JSON 解析失败，并且没有可用 cache，则回退到 `config.Conf.IdGenerator`。\n\n### 刷新循环维护进程内快照\n\n`SetDefaultValuesAndStartRefresh()` 会先把本地配置写入内存快照，再调用 `process()` 拉取 TCC：\n\n```go\nSetDefaultAllowList(config.Conf.WhiteList)\nSetStorageConfigCheckWhitelist(config.Conf.StorageConfigCheckWhitelist)\nSetRedisCacheSwitch(config.Conf.RedisCache.Switch)\nSetRedisCacheTtl(config.Conf.RedisCache.TTL)\nSetRedisCacheRetryTimes(config.Conf.RedisCache.RetryTimes)\nSetAccountNoCacheWhitelist(config.Conf.AccountNoCacheWhitelist)\n```\n\n随后 `process()` 拉取这些动态 key：\n\n| TCC key | 更新目标 |\n|---|---|\n| `redis_cache_switch` | `SetRedisCacheSwitch()` |\n| `redis_cache_ttl` | `SetRedisCacheTtl()` |\n| `redis_cache_retry_times` | `SetRedisCacheRetryTimes()` |\n| `account_nocache_whitelist` | `SetAccountNoCacheWhitelist()` |\n| `metadata_clean_black_list` | `setMetadataBlackList()`，仅 `config.Conf.EnableEmbeddedMetadata` 为 true 时读取 |\n| `interface_rate_limiter` | `interface_limiter.UpdateConfigFromTCC()` |\n| `mem_limit_percent` | `mem_limit.ApplyFromPercent()` |\n\n`refreshTccConfig()` 使用 `time.Tick(configUpdateInterval)` 周期执行，当前 `configUpdateInterval` 是 `time.Minute`。\n\n## 关键配置组件\n\n### Redis 远端缓存配置\n\n`setting_redis_cache.go` 使用 `go.uber.org/atomic` 保存 Redis 缓存相关快照：\n\n```go\nfunc CheckRedisCacheSwitch() bool\nfunc SetRedisCacheSwitch(val bool)\n\nfunc SetRedisCacheTtl(duration time.Duration)\nfunc GetRedisCacheTtl() time.Duration\n\nfunc SetRedisCacheRetryTimes(retryTimes int)\nfunc GetRedisCacheRetryTimes() int\n```\n\n这些值会影响：\n\n- `remote_cache.Init()`：开关打开时初始化 Redis remote cache。\n- `remote_cache.GetCacheInstance()`：创建 `go-remote-cache` 时设置默认 TTL 和 retry 次数。\n- `service.mgetAccountWithConfig()`：用 `CheckRedisCacheSwitch()` 决定是否查询 Redis。\n- config 写路径：`MCreateConfig()`、`MUpdateConfig()`、`DeleteConfig()` 在 Redis 开关打开时清理缓存。\n\n### Account no-cache 白名单\n\n`setting_account_nocache_whitelist.go` 使用 `sync.Map` 保存白名单：\n\n```go\nfunc PSMInAccountNoCacheWhiteList(psm string) bool\nfunc SetAccountNoCacheWhitelist(whitelist map[string]bool)\n```\n\n服务层通过请求头 `X-TT-From` 判断调用方 PSM 是否需要跳过缓存：\n\n- `service.accountNocache()`\n- `service.nocache()`\n- `service/instance.go` 中实例查询路径\n\n注意：`SetAccountNoCacheWhitelist()` 当前只对传入 key 执行 `Store()`，不会清理旧 key。TCC 中删除某个 PSM 后，进程内旧值不会自动消失，除非进程重启或实现显式清理。\n\n### 写权限 allow list\n\n`setting_allowlist.go` 提供：\n\n```go\nfunc SetDefaultAllowList(allowList map[string]bool)\nfunc GetAllowList(ctx context.Context) map[string]bool\n```\n\n`middleware.Filter()` 在非 GET 请求中读取 `GetAllowList(c)[psm]`。如果调用方 PSM 不在 allow list 中，请求会返回 `errno.ErrNoWriteAuth`。\n\n### 存储配置校验豁免白名单\n\n`setting_check_storage_config_whitelist.go` 提供：\n\n```go\nfunc SetStorageConfigCheckWhitelist(whitelist map[string]bool)\nfunc GetStorageConfigCheckWhitelist(ctx context.Context) map[string]bool\n```\n\n`service.MCreateConfig()` 和 `service.MUpdateConfig()` 会读取请求头 `X-TT-From`，并把白名单结果传入 validator：\n\n```go\nignoreCheckStorageConfig := tcc.GetStorageConfigCheckWhitelist(ctx)[psm]\nvalidator.ValidateMCreateConfigRequest(ctx, req, ignoreCheckStorageConfig)\n```\n\n### ACL 配置\n\n`GetACLConfigs(ctx)` 读取 `acl` key 并解析成 `config.ACL`。`middleware.NewACL()` 在初始化时调用它：\n\n```go\nACLConfig = tcc.GetACLConfigs(context.Background())\n```\n\n`config.ACL` 内嵌 `DoubleSwitch`，并包含 `Pairs map[string]string`。中间件通过 Basic Auth 的 username/password 与 `Pairs` 比对。ACL 是否启用由 `ACLConfig.IsEnabled()` 决定，该方法会同时看本地 `Enable` 和 etcd switch。\n\n### Circuit breaker 配置\n\n`GetCircuitBreakersConfigs(ctx)` 读取 `circuit_breakers`，返回 `map[string]config.CircuitBreaker`。`middleware.InitCircuitBreaker()` 会遍历配置并为启用项创建 `gobreaker.CircuitBreaker`。\n\n`CircuitBreakerConfig` 是 `config.CircuitBreaker` 的 TCC JSON 适配类型。它自定义 `UnmarshalJSON()`，把 JSON 中的字符串字段解析成 `time.Duration`：\n\n```json\n{\n  \"close_interval\": \"10s\",\n  \"open_timeout\": \"10s\"\n}\n```\n\n解析后会写入：\n\n- `CloseInterval`\n- `OpenTimeout`\n\n其他字段按 `config.CircuitBreaker` 的 JSON tag 直接解析，例如 `close_failures`、`half_open_successes`。\n\n### 跨地域写 remote setting\n\n`setting_remote.go` 读取 `write_remote_setting`，解析成 `config.WriteRemote`：\n\n```go\ntype WriteRemote struct {\n    RemoteSwitch  bool   `json:\"remote_switch\"`\n    InvokeSetting string `json:\"invoke_setting\"`\n    RegionInfo    string `json:\"region_info\"`\n}\n```\n\n业务写路径会先比较当前 IDC 所属 region 与 `GetRemoteRegionInfo(ctx)`：\n\n```go\nif util.GetRegion(env.IDC()) == tcc.GetRemoteRegionInfo(ctx) {\n    if tcc.GetWriteSwitch(c) {\n        setting := tcc.GetRemoteSetting(ctx)\n        // 调用 remote 服务\n    }\n}\n```\n\n这影响账号和配置的创建、更新、删除等写操作。典型调用点包括 `service.CreateAccount()`、`service.UpdateAccount()`、`service.MCreateConfig()`、`service.MUpdateConfig()`。\n\n### DB 与本地缓存配置\n\n`dao.InitDb()` 使用：\n\n- `GetTccSettingsClient()`：传给 `mysqldriver.InitTCCClient()`\n- `GetWriteDBPassword()`：设置写库密码\n- `GetReadDBPassword()`：设置读库密码\n- `GetDBRetryTimes()`：设置 `DbHandler.retryTimes`\n\n`service.Init()` 使用：\n\n- `GetCacheRefreshTime()`：设置本地 LRU cache 刷新周期\n- `GetCacheSize()`：设置本地 LRU cache 容量\n\n`service.ListConfigsByCondition()` 也用 `GetCacheRefreshTime(ctx)` 计算 `ListConfigCache.ExpireAt`。\n\n### 管理员配置\n\n`GetAdminUsers(ctx)` 读取 `admin_user` key，返回 `map[string]bool`。`service.IsAdmin()` 直接用用户名查询：\n\n```go\nreturn errno.OK(tcc.GetAdminUsers(ctx)[userName])\n```\n\n### Embedded metadata 黑名单\n\n`MetadataBlackList` 定义在 `setting_metadata_blacklist.go`：\n\n```go\ntype MetadataBlackList struct {\n    Version   int      `json:\"version\"`\n    BlackList []string `json:\"black_list\"`\n}\n```\n\n当 `config.Conf.EnableEmbeddedMetadata` 为 true 时，刷新循环读取 `metadata_clean_black_list` 并调用 `setMetadataBlackList()` 更新全局变量。`service.GetAccountCategoryEmbeddedSchema()` 会读取 `GetMetadataBlackList()`，把全局 metadata 黑名单 merge 到空间级 schema 中，并把 version 拼到 `SchemaVersion`。\n\n当前 `metadataBlackList` 是普通全局变量，不是 atomic 或锁保护结构；读写发生在刷新 goroutine 和请求 goroutine 之间。修改这里时需要特别注意并发安全。\n\n### ID Generator 配置\n\n`GetIdGeneratorConfig(ctx)` 读取 `id_gen_setting`，解析成 `config.IdGenerator`：\n\n```go\ntype IdGenerator struct {\n    Switch                       bool             `json:\"switch\"`\n    Region                       string           `json:\"region\"`\n    TableSupportSetting          map[string]bool  `json:\"table_support_setting\"`\n    TableRemainIdRemindThreshold map[string]int64 `json:\"table_remain_id_remind_threshold\"`\n}\n```\n\n`util.GenId()` 使用该配置决定某张表是否启用 ID 生成器、使用哪个 region，以及剩余 ID 阈值告警。\n\n## 错误处理与 fallback 约定\n\n这个模块通常不把 TCC 读取错误向上传递，而是在本层记录日志并返回 fallback：\n\n- 基础数值配置解析失败时回退 `config.Conf`。\n- JSON 配置解析失败时回退 `config.Conf` 或上一次 cache。\n- Redis 缓存动态配置在 `process()` 中解析失败会让 `success = false`。\n- `SetDefaultValuesAndStartRefresh()` 首次调用 `process()` 如果返回 false，会直接 `panic(\"can't reach tcc or parse tcc config error\")`。\n- `mem_limit_percent` 是可选项，读取失败或应用失败只记录日志，不阻塞服务启动。\n- `interface_rate_limiter` 读取失败不阻塞；JSON 解析或更新失败会让 `process()` 返回 false。\n\n新增配置时需要先判断它是否应该影响启动成功。如果是服务启动必需配置，应在首次 `process()` 失败时返回 false；如果是可选优化项，应像 `mem_limit_percent` 一样只记录日志。\n\n## 与代码库其他模块的关系\n\n`tcc` 模块没有自己的 HTTP 路由，也不是业务执行流入口。调用图中主要表现为其他模块读取它的 getter：\n\n- `middleware.Filter()` 读取 `GetAllowList()` 控制写权限。\n- `middleware.NewACL()` 读取 `GetACLConfigs()` 初始化 ACL。\n- `middleware.InitCircuitBreaker()` 读取 `GetCircuitBreakersConfigs()` 初始化断路器。\n- `dao.InitDb()` 读取 DB 密码、DB retry，并把 TCC client 注入 mysql driver。\n- `remote_cache.Init()` 和 `remote_cache.GetCacheInstance()` 读取 Redis cache 开关、TTL、retry。\n- `service.Init()` 读取本地缓存大小与刷新周期。\n- `service` 写路径读取 remote setting 决定是否转发到远端服务。\n- `service.IsAdmin()` 读取 admin user。\n- `util.GenId()` 读取 ID generator 配置。\n- `interface_limiter` 和 `mem_limit` 由 `process()` 主动推送更新。\n\n从 GitNexus 的执行流看，`src/tcc` 本身没有独立业务流程；它作为配置依赖参与服务初始化、账号查询、配置写入、远端缓存、ACL、限流等流程。\n\n## 添加新 TCC 配置的建议模式\n\n新增配置通常按以下步骤实现：\n\n1. 在对应文件中定义 TCC key 常量。\n2. 明确读取模式：每次直接读 TCC，还是由 `process()` 刷新到内存快照。\n3. 解析成现有 `config` 类型或新增明确结构体。\n4. 读取失败时提供明确 fallback，优先回退 `config.Conf`。\n5. 如果配置会被高频请求读取，使用 `atomic.Value`、`go.uber.org/atomic`、`sync.Map` 或带锁结构维护快照。\n6. 在 `SetDefaultValuesAndStartRefresh()` 中设置本地默认值，避免 TCC 首次失败时出现零值。\n7. 在 `process()` 中拉取远端值，并决定失败是否影响启动。\n8. 增加测试覆盖解析、fallback 和 setter/getter 行为。\n\n已有代码中可以参考：\n\n- 简单数值配置：`GetDBRetryTimes()`、`GetCacheSize()`\n- duration 字符串解析：`GetCacheRefreshTime()`、`CircuitBreakerConfig.UnmarshalJSON()`\n- JSON map 配置：`GetAllowList()`、`GetStorageConfigCheckWhitelist()`\n- 热更新原子值：`setting_redis_cache.go`\n- `GetWithParser()` 缓存解析：`setting_remote.go`、`id_gen.go`\n\n## 贡献时需要注意的边界\n\n- `GetTccSettingsClient()` 依赖 `config.Conf`，不要在 `config.InitConf()` 之前调用。\n- `SetDefaultValuesAndStartRefresh()` 会启动后台 goroutine，测试中重复调用可能产生多个刷新循环。\n- `accountNoCacheWhitelist` 当前不会删除旧 key；如果业务需要 TCC 删除立即生效，需要调整 `SetAccountNoCacheWhitelist()` 的替换语义。\n- `metadataBlackList` 当前不是并发安全结构；如果扩大使用范围，应改成锁或 atomic 快照。\n- `GetAllowList()` 和 `GetStorageConfigCheckWhitelist()` 每次调用都会读 TCC，适合低频或中频路径；如果放到高频路径，需要评估 TCC client cache 行为和延迟。\n- `CircuitBreakerConfig.UnmarshalJSON()` 要求 `close_interval` 和 `open_timeout` 是 Go duration 字符串，例如 `\"10s\"`、`\"1m\"`，不能是裸数字。","other-test-sh":"# Other — test.sh\n\n## `test.sh`\n\n`test.sh` 是仓库根目录下的测试入口脚本，用于在一组固定运行环境变量下执行 `./src/...` 的 Go 单元测试，并生成覆盖率报告。\n\n该脚本不定义函数，也不被代码中的其他模块调用。它的作用是作为开发者或 CI 手动触发的测试辅助脚本，把服务运行所需的环境变量、`go test` 参数和覆盖率 HTML 生成步骤集中到一个文件里。\n\n## 执行流程\n\n```mermaid\nflowchart TD\n    A[\"进入仓库目录\"] --> B[\"设置服务与运行环境变量\"]\n    B --> C[\"通过 doas 执行 go test ./src/...\"]\n    C --> D[\"生成 coverage.out\"]\n    D --> E[\"go tool cover 输出 coverage.html\"]\n```\n\n## 环境变量\n\n脚本在运行测试前导出以下变量：\n\n```sh\nexport PSM=toutiao.videoarch.account\nexport GIN_LOG_DIR=/Users/bytedance/go/src/code.byted.org/videoarch/account/output/\nexport GIN_CONF_DIR=$(pwd)/conf\nexport GIN_MODE=release\nexport RUNTIME_IDC_NAME=boe\nexport TCE_ENV=ut\nexport CGO_ENABLED=1\nexport CI_REPO_NAME=toutiao.videoarch.account\n```\n\n这些变量用于让测试进程在接近服务运行时的上下文中启动：\n\n- `PSM`：服务标识，当前固定为 `toutiao.videoarch.account`。`doas -p ${PSM}` 会使用该值作为执行上下文。\n- `GIN_LOG_DIR`：日志输出目录。当前是开发机上的绝对路径，测试中依赖日志目录存在时需要注意本地路径是否有效。\n- `GIN_CONF_DIR`：配置目录，使用 `$(pwd)/conf`，因此脚本应从仓库根目录执行。\n- `GIN_MODE`：Gin 运行模式，固定为 `release`。\n- `RUNTIME_IDC_NAME`：运行 IDC 名称，固定为 `boe`。\n- `TCE_ENV`：运行环境，固定为 `ut`，表示单元测试环境。\n- `CGO_ENABLED`：启用 CGO，适用于测试依赖 CGO 的包或底层库。\n- `CI_REPO_NAME`：CI 仓库名，固定为 `toutiao.videoarch.account`。\n\n## 测试命令\n\n核心测试命令是：\n\n```sh\ndoas -p ${PSM} go test -gcflags=\"all=-l -N\" -v -cover -coverprofile coverage.out ./src/...\n```\n\n参数含义：\n\n- `doas -p ${PSM}`：在指定 `PSM` 上下文中执行测试命令。\n- `go test ./src/...`：递归测试 `src` 目录下的所有 Go package。\n- `-v`：输出详细测试日志。\n- `-cover`：启用覆盖率统计。\n- `-coverprofile coverage.out`：将覆盖率数据写入 `coverage.out`。\n- `-gcflags=\"all=-l -N\"`：对所有包关闭内联和优化，常用于调试场景，使断点和堆栈更稳定。\n\n测试完成后，脚本会生成 HTML 覆盖率报告：\n\n```sh\ngo tool cover -html=coverage.out -o coverage.html\n```\n\n输出文件：\n\n- `coverage.out`：Go 覆盖率原始数据。\n- `coverage.html`：可在浏览器中查看的覆盖率报告。\n\n## 与代码库的关系\n\n`test.sh` 不参与业务运行时调用链，也没有内部函数、外部函数调用或被其他模块调用的静态关系。它与代码库的连接主要体现在两个方面：\n\n1. 运行范围固定为 `./src/...`，因此只测试 `src` 目录下的 Go 包。\n2. 测试进程会读取仓库根目录下的 `conf` 配置目录，因为 `GIN_CONF_DIR` 被设置为 `$(pwd)/conf`。\n\n这意味着脚本更像是仓库级测试适配层，而不是业务模块。它把本地测试所需的服务环境封装起来，避免开发者每次手动设置环境变量。\n\n## 使用方式\n\n应在仓库根目录执行：\n\n```sh\nsh test.sh\n```\n\n执行后查看覆盖率：\n\n```sh\nopen coverage.html\n```\n\n如果从非根目录执行，`GIN_CONF_DIR=$(pwd)/conf` 会指向错误位置，可能导致测试加载不到配置。\n\n## 注意事项\n\n`GIN_LOG_DIR` 当前写死为 `/Users/bytedance/go/src/code.byted.org/videoarch/account/output/`，在其他机器或不同工作区路径下可能不存在。若测试依赖日志目录可写，需要先创建目录或调整脚本。\n\n`doas` 是脚本运行的前置依赖。如果本地没有 `doas`，或当前用户没有对应 `PSM` 的执行权限，测试会在进入 `go test` 前失败。\n\n`CGO_ENABLED=1` 会使测试依赖本机 C 编译环境。缺少 Xcode Command Line Tools、系统库或 CGO 依赖时，编译阶段可能失败。\n\n`-gcflags=\"all=-l -N\"` 会降低编译优化并影响测试执行性能。它适合调试和可观测性更强的测试场景，但如果只需要最快速度的覆盖率统计，可以考虑在单独脚本中移除该参数。","other-test":"# Other — test\n\n## test 模块\n\n`test` 模块是 `account-sdk/client` 的集成测试与手工验证集合，Go 包名为 `testconfig`。它不实现业务逻辑，而是通过真实的 `account.Client` 调用账号服务 RPC / HTTP 能力，验证账号查询、配置读写、状态更新、缓存一致性、跨区域配置复制以及 storage bucket 约束等行为。\n\n该模块依赖外部测试环境和测试数据，主要入口文件包括：\n\n- `client_test.go`：集成测试主体，直接调用 `account.Client` 的各类方法。\n- `config_test.go`：测试配置加载逻辑，读取 `tsconfig.json` 和测试用例 JSON。\n- `model_test.go`：测试用例 JSON 的结构定义。\n- `iface_test.http`：HTTP 接口的手工调试请求。\n- `tsconfig.json`：测试环境、目标服务地址和用例文件路径配置。\n\n## 模块定位\n\n该模块面向 SDK 客户端行为验证，测试对象是 `code.byted.org/videoarch/account-sdk/client` 包暴露的方法，例如：\n\n- `Create`\n- `MGetAccount`\n- `PageGetAccount`\n- `SearchAccounts`\n- `ListTopAccountIDs`\n- `GetAccountByName`\n- `GetAccountByID`\n- `GetAccount`\n- `GetConfig`\n- `GetConfigByName`\n- `GetConfigByNameAndRegion`\n- `UpdateAccount`\n- `UpdateAccountStatus`\n- `MCreateConfig`\n- `MUpdateConfig`\n- `DeleteConfig`\n- `MCopyConfig`\n- `GetRule`\n\n这些测试多数是集成测试，不是纯单元测试。它们会连接真实或 BOE 环境服务，因此测试结果依赖：\n\n- `account_admin` 服务可用性\n- 目标测试环境地址\n- 远端测试数据状态\n- `testcases.json` 内容\n- 指定账号、AccessKey、bucket 等资源是否仍存在\n\n## 配置加载\n\n`config_test.go` 提供全局配置对象：\n\n```go\nvar Conf *Config\n```\n\n`Config` 保存测试运行所需的环境信息：\n\n```go\ntype Config struct {\n\tPSM          string\n\tServerAddr   string\n\tServerRegion string\n\tTestCases    *TestCaseConfig\n}\n```\n\n`InitConf()` 的职责是从 `tsconfig.json` 加载运行配置：\n\n1. 使用 `viper.SetConfigFile(\"./tsconfig.json\")` 指定配置文件。\n2. 调用 `viper.ReadInConfig()` 读取配置。\n3. 根据 `target_server` 从 `servers` 中选择目标服务。\n4. 设置 `Conf.PSM`、`Conf.ServerAddr`、`Conf.ServerRegion`。\n5. 读取 `test_cases_file` 指向的 JSON 文件。\n6. 将测试用例反序列化到 `Conf.TestCases`。\n\n当前 `client_test.go` 的 `init()` 中没有调用 `InitConf()`，相关代码被注释：\n\n```go\n// InitConf()\n// cli = account.NewClient(Conf.PSM, account.WithTestAddr(Conf.ServerAddr))\n```\n\n因此，依赖 `Conf` 的测试在运行前需要确保 `InitConf()` 已被调用，或者由外部测试初始化流程完成配置注入。否则访问 `Conf.TestCases`、`Conf.PSM`、`Conf.ServerAddr` 时会出现空指针问题。\n\n当前默认客户端初始化为：\n\n```go\ncli = account.NewClient(\"toutiao.videoarch.account_admin\", account.WithAsyncUpdateCache())\n```\n\n这意味着默认测试客户端使用固定 PSM，并启用异步缓存更新。\n\n## 测试用例模型\n\n`model_test.go` 定义了测试用例 JSON 的结构。顶层结构为：\n\n```go\ntype TestCaseConfig struct {\n\tRpcs Rpc\n}\n```\n\n`Rpc` 按接口类型组织测试用例：\n\n```go\ntype Rpc struct {\n\tSearchAccountsCases      []SearchAccountsCase\n\tPageGetAccountCases      []PageGetAccountCase\n\tSearchTopAccountIdsCases []SearchTopAccountIdsCase\n\tGetConfigCases           []GetConfigCase\n\tMGetAccountCases         []MGetAccountCase\n\tUpdateAccountCases       []UpdateAccountCase\n\tUpdateAccountStatusCases []UpdateAccountStatusCases\n\tMCreateConfigCases       []MCreateConfigCase\n}\n```\n\n每个测试用例通常由两部分组成：\n\n- `Inputs`：传给 SDK 方法的请求参数。\n- `Expects`：期望返回结果。\n\n例如 `SearchAccountsCase`：\n\n```go\ntype SearchAccountsCase struct {\n\tInputs  account.PageGetParam\n\tExpects account.PageGetResponse\n}\n```\n\n这种结构使 `client_test.go` 中的测试可以通过循环驱动多组用例：\n\n```go\nfor _, testCase := range Conf.TestCases.Rpcs.SearchAccountsCases {\n\treq := &testCase.Inputs\n\tresp, err := cli.SearchAccounts(ctx, req)\n\tassert.Nil(t, err)\n\tassert.Equal(t, &testCase.Expects.PageGetInfo, resp)\n}\n```\n\n## 运行时结构\n\n```mermaid\nflowchart TD\n    A[\"tsconfig.json\"] --> B[\"InitConf\"]\n    C[\"testcases.json\"] --> B\n    B --> D[\"Conf\"]\n    D --> E[\"client_test.go 测试用例\"]\n    E --> F[\"account.Client\"]\n    F --> G[\"account_admin 服务\"]\n```\n\n该图只描述配置驱动型测试路径。部分测试绕过 `Conf`，直接使用硬编码 PSM、测试地址、AccessKey 或账号名。\n\n## 客户端初始化\n\n`client_test.go` 中定义了共享变量：\n\n```go\nvar (\n\tcli    *account.Client\n\tctx    = context.TODO()\n\ttestak = \"6b796227086646e99b32c371c6ccb428\"\n)\n```\n\n`cli` 是大部分测试共享的 SDK 客户端。`ctx` 使用 `context.TODO()`，说明这些测试没有细分超时或取消策略。\n\n模块还定义了两个默认配置对象：\n\n```go\ndefaultConfig = account.Config{\n\tModule: account.ModuleGlobal,\n\tCKey:   \"global_key\",\n\tCValue: \"global_value\",\n}\n\nuploadConfig = account.Config{\n\tModule: account.ModuleUpload,\n\tCKey:   \"meta\",\n\tCValue: \"1\",\n}\n```\n\n它们主要被 `TestCreate` 用于创建账号时携带初始配置。\n\n## 账号相关测试\n\n### 创建账号\n\n`TestCreate` 构造 `account.CreateParam` 并调用 `Create`：\n\n```go\nreq := &account.CreateParam{\n\tAccountName:   \"lhb_test_t4\",\n\tDescription:   \"this is client test\",\n\tExtra:         \"\",\n\tConfigs:       []account.Config{defaultConfig, uploadConfig},\n\tTopAccountID:  1000,\n\tTopInstanceID: \"Instance100\",\n}\n```\n\n该测试使用带测试地址的临时客户端：\n\n```go\nc := account.NewClient(\"toutiao.videoarch.account_admin\", account.WithTestAddr(Conf.ServerAddr))\n```\n\n创建成功后，测试会调用 `cli.MGetAccount` 获取账号信息并打印结果。这里存在一个细节：创建使用的是临时客户端 `c`，查询使用的是全局客户端 `cli`，两者可能连接不同环境。\n\n### 分页查询账号\n\n`TestPageGetAccount` 使用 `Conf.TestCases.Rpcs.PageGetAccountCases` 驱动测试：\n\n```go\nresp, err := cli.PageGetAccount(ctx, req)\nassert.Nil(t, err)\nassert.Equal(t, &testCase.Expects.PageGetInfo, resp)\n```\n\n该测试验证旧版分页查询接口返回值是否与用例中的 `PageGetInfo` 一致。\n\n### 批量获取账号\n\n`TestMGetAccount` 调用：\n\n```go\nresp, err := cli.MGetAccount(ctx, req)\n```\n\n并将返回的 `[]account.AccountInfo` 与期望值比较。\n\n### 按名称、ID、AccessKey 获取账号\n\n`TestGetAccount` 先调用 `MGetAccount` 获取账号列表，然后对每个账号分别验证：\n\n- `GetAccountByName(ctx, v.AccountName)`\n- `GetAccountByID(ctx, v.ID)`\n- `GetAccount(ctx, v.AccessKey)`\n\n同时它创建了一个不带缓存选项的客户端：\n\n```go\nnoCachecli := account.NewClient(\"toutiao.videoarch.account_admin\")\n```\n\n测试会比较缓存客户端与非缓存客户端的查询结果：\n\n```go\nnoCacheAcct, err := noCachecli.GetAccountByName(ctx, v.AccountName)\nassert.Equal(t, acct, noCacheAcct)\n```\n\n该测试主要用于验证缓存路径和直接查询路径的一致性。\n\n## 配置相关测试\n\n### 获取配置\n\n`TestGetConfig` 先用 `MGetAccount` 拉取包含配置的账号信息：\n\n```go\ninfos, err := cli.MGetAccount(ctx, &account.MGetParam{Region: \"all\"})\n```\n\n随后针对每个账号比较缓存客户端与非缓存客户端在以下方法上的结果：\n\n- `GetConfigByName(ctx, v.AccountName, \"upload\")`\n- `GetConfig(ctx, v.AccessKey, \"upload\")`\n- `GetConfigByNameAndRegion(ctx, v.AccountName, \"upload\", \"cn\")`\n\n该测试关注配置查询在不同索引方式和缓存模式下的一致性。\n\n### 按名称和区域获取配置\n\n`TestGetConfigByNameAndRegion` 直接调用：\n\n```go\nm, err := cli.GetConfigByNameAndRegion(ctx, \"lhb_test_t1\", account.ModuleUpload, account.R_ALL)\n```\n\n该测试依赖硬编码账号名和区域常量，适合手工验证指定账号配置。\n\n### 未命中配置测试\n\n`TestNotFound` 对同一个 AccessKey 和 module 连续调用两次：\n\n```go\nc, err := cli.GetConfig(ctx, testak, account.ModuleUpload)\nc, err = cli.GetConfig(ctx, testak, account.ModuleUpload)\n```\n\n这类测试通常用于观察缓存未命中、空配置或重复读取行为。\n\n### 批量创建与更新配置\n\n`TestMCreateConfig` 依赖 `Conf.TestCases.Rpcs.MCreateConfigCases`，并要求正好 4 条用例：\n\n1. 调用 `MCreateConfig` 插入配置。\n2. 调用 `GetConfig` 验证插入结果。\n3. 调用 `MUpdateConfig` 更新配置。\n4. 再次调用 `GetConfig` 验证更新结果。\n\n验证逻辑只比较期望 map 中出现的 key：\n\n```go\nfor k, v := range testCase2.Expects {\n\tassert.Equal(t, v, configs[k])\n}\n```\n\n这意味着远端返回额外配置项不会导致测试失败。\n\n### 删除配置\n\n`TestDeleteConfig` 当前函数开头直接 `return`：\n\n```go\nfunc TestDeleteConfig(t *testing.T) {\n\treturn\n\terr := cli.DeleteConfig(ctx, 7)\n\tassert.Nil(t, err)\n}\n```\n\n因此该测试默认不会执行删除逻辑。若移除 `return`，它会删除 ID 为 `7` 的配置，风险较高，需要确认目标环境数据。\n\n## 账号更新测试\n\n### 更新账号信息\n\n`TestUpdateAccount` 要求 `UpdateAccountCases` 中必须有 3 条用例：\n\n1. 更新账号。\n2. 查询并验证更新结果。\n3. 恢复原始数据。\n\n测试中通过 `UpdateAccount` 执行修改：\n\n```go\nerr := cli.UpdateAccount(ctx, req)\n```\n\n验证时通过 `SearchAccounts` 按 `AccessKey` 查询：\n\n```go\nresp2, err2 := cli.SearchAccounts(ctx, &account.PageGetParam{\n\tMGetParam: account.MGetParam{AccessKey: req2.AccessKey},\n})\n```\n\n由于 `UpdatedAt` 是服务端生成字段，测试会将期望值中的 `UpdatedAt` 替换为实际返回值后再比较：\n\n```go\ntestCase2.Expects.PageGetInfo.AccountInfos[0].UpdatedAt = resp2.AccountInfos[0].UpdatedAt\n```\n\n### 更新账号状态\n\n`TestUpdateAccountStatus` 与 `TestUpdateAccount` 模式相同，也要求 3 条用例：\n\n1. 调用 `UpdateAccountStatus` 修改状态。\n2. 查询并验证状态。\n3. 调用 `UpdateAccountStatus` 恢复状态。\n\n核心调用为：\n\n```go\nerr := cli.UpdateAccountStatus(ctx, req.AccessKey, req.Status)\n```\n\n这两个测试都会修改远端数据，因此测试用例必须包含恢复步骤，否则会污染共享测试环境。\n\n## storage 配置约束测试\n\n`TestMCreateStorageConfigConstraint` 专门验证 storage bucket 配置的跨 TopAccount 约束。测试注释中描述了核心规则：\n\n1. bucket 如果有 owner，则不允许被跨 TopAccount 的其他空间使用。\n2. owner 为空或 owner 不存在时，如果 bucket 已经被某个空间使用，则不允许被跨 TopAccount 的其他空间使用。\n\n该测试围绕账号 `dh-test` 和固定 AccessKey：\n\n```go\nAccessKey:   \"c0bb4072c0644946b8aca9ad1af5c193\"\nAccountName: \"dh-test\"\nRegion:      \"boe\"\nModule:      \"storage\"\n```\n\n它依次尝试创建不同 key 到 bucket 的映射，并断言是否允许：\n\n- 同 owner 空间：允许。\n- 同 TopAccount 下其他空间：允许。\n- 不同 TopAccount：拒绝。\n- 无 owner 且未被使用：允许。\n- 无效 owner 且未被使用：允许。\n- 已配置到当前空间：允许。\n- 已配置到同 TopAccount 空间：允许。\n- 已配置到不同 TopAccount 空间：拒绝。\n\n测试结束后会通过 `MGetAccount` 查出本次创建的 storage 配置，并调用 `DeleteConfig` 清理 `k1` 到 `k8`：\n\n```go\ndeleteKeys := map[string]string{\n\t\"k1\": \"\", \"k2\": \"\", \"k3\": \"\", \"k4\": \"\",\n\t\"k5\": \"\", \"k6\": \"\", \"k7\": \"\", \"k8\": \"\",\n}\n```\n\n这个测试会真实写入和删除远端配置，适合在可控 BOE 数据集上运行，不适合随意对生产环境执行。\n\n## 跨区域配置复制\n\n`TestMCopyConfig` 构造 `account.CopyConfigParam`：\n\n```go\nparams := &account.CopyConfigParam{\n\tAccessKey:     \"3413ace7e2a9a235a9d5807ad78d9bac\",\n\tModules:       []account.Module{\"openapi\"},\n\tSourceRegion:  \"cn\",\n\tTargetRegions: []string{\"alisg\", \"maliva\"},\n}\n```\n\n它使用带固定测试地址的客户端：\n\n```go\ncli := account.NewClient(Conf.PSM, account.WithTestAddr(\"10.129.130.91:9474\"))\n```\n\n然后调用：\n\n```go\nerr := cli.MCopyConfig(context.Background(), params)\n```\n\n该测试会把指定 AccessKey 的 `openapi` 配置从 `cn` 复制到 `alisg` 和 `maliva`。运行前需要确认目标区域数据是否可以被覆盖或更新。\n\n## V2 查询测试\n\n### 搜索账号\n\n`TestSearchAccounts` 遍历 `SearchAccountsCases`：\n\n```go\nresp, err := cli.SearchAccounts(ctx, req)\nassert.Equal(t, &testCase.Expects.PageGetInfo, resp)\n```\n\n它验证新版搜索接口的分页结果。\n\n### 搜索 TopAccount ID\n\n`TestSearchTopAccountIds` 遍历 `SearchTopAccountIdsCases`：\n\n```go\nresp, err := cli.ListTopAccountIDs(ctx, req)\nassert.Equal(t, &testCase.Expects.SearchTopAccountIdsInfo, resp)\n```\n\n该测试验证根据查询条件列出 TopAccount ID 的接口行为。\n\n## 缓存一致性测试\n\n`TestMGetAccountCache` 创建连接 BOE 地址的客户端：\n\n```go\nboeCli := account.NewClient(Conf.PSM, account.WithTestAddr(\"10.225.80.90:9422\"))\n```\n\n然后组合遍历：\n\n- `accountNames`\n- `modules`\n- `regions`\n\n每组参数调用两次 `MGetAccount`：\n\n```go\nresp, err := boeCli.MGetAccount(ctx, &params)\nrespBoe, errBoe := boeCli.MGetAccount(ctx, &params)\nassert.Equal(t, &respBoe, &resp)\n```\n\n该测试主要验证相同查询条件下重复请求的结果一致性，间接覆盖客户端缓存行为。当前模块列表包含：\n\n```go\n[]string{\"tasks\", \"storage\", \"transcode\", \"upload\", \"global\", \"play\", \"openapi\", \"picture\", \"access\", \"\"}\n```\n\n区域列表包含：\n\n```go\n[]string{\"boe\", \"cn\", \"alisg\", \"maliva\", \"\"}\n```\n\n## 手工调试测试\n\n`TestSy` 和 `TestGetRule` 更接近临时排查代码。\n\n`TestSy` 中保留了创建账号和创建 storage 配置的注释代码，实际执行部分是通过 BOE 客户端调用 `GetAccount`：\n\n```go\nres, err := boeCli.GetAccount(ctx, \"3b5971da0535489fae95622b7e6e6e9c\")\nspew.Dump(res)\nspew.Dump(err)\n```\n\n`TestGetRule` 调用：\n\n```go\nrules, _ := cli.GetRule(ctx, \"test\", \"boe\", \"\")\nfmt.Printf(\"rules: %v\", rules)\n```\n\n它没有断言错误，适合临时查看规则返回内容，不适合作为稳定自动化测试依据。\n\n## HTTP 调试文件\n\n`iface_test.http` 提供了三个 HTTP GET 请求，用于直接调试账号服务 HTTP 接口：\n\n```http\nGET http://10.227.7.243:9984/account-api/v1/accounts/storage/buckets?account_name=test&category=victest2&idc=sg1\nAccept: application/json\n```\n\n```http\nGET http://10.227.7.243:9984/account-api/v1/accounts/storage/bucket?account_name=test&category=victest2&idc=sg1\nAccept: application/json\n```\n\n```http\nGET http://10.227.7.243:9984/account-api/v1/accounts?account_name=test\nAccept: application/json\n```\n\n这些请求不参与 Go 测试执行，通常由 IDE HTTP Client 或其他 REST 客户端手动发送。\n\n## 与代码库其他部分的关系\n\n该模块主要依赖 `account-sdk/client` 的公开 API，不被主业务流程调用。调用图中只有 `InitConf` 与本模块内的 `Config` 结构存在直接内部关系，没有检测到模块级执行流。\n\n需要注意的是，调用图显示存在外部测试引用 `Config`：\n\n```text\nTest_mergeTCCBaseConfig_BitsUTGen -> Config\n```\n\n这说明 `test/config_test.go` 中的 `Config` 类型可能被其他测试代码复用。修改 `Config` 字段名、字段类型或包名时，需要考虑外部测试编译兼容性。\n\n## 维护注意事项\n\n该模块中的许多测试是有状态集成测试，会读写远端账号服务数据。维护时需要特别注意：\n\n- 修改类测试应提供恢复步骤，例如 `TestUpdateAccount` 和 `TestUpdateAccountStatus` 的三段式结构。\n- 使用硬编码 AccessKey、账号名、bucket、服务地址的测试容易随环境变化失效。\n- `UpdatedAt` 等服务端动态字段比较前需要归一化。\n- 删除配置类测试应避免默认执行，除非目标环境和配置 ID 明确可控。\n- 缓存一致性测试应同时覆盖带缓存客户端和普通客户端。\n- 新增用例时应优先通过 `testcases.json` 驱动，减少在测试代码中继续增加环境绑定数据。\n\n## 常见运行风险\n\n`Conf` 未初始化是最常见的本地运行问题。当前 `init()` 没有调用 `InitConf()`，但大量测试直接访问 `Conf`。如果单独运行这些测试，需要先补齐初始化路径。\n\n远端数据漂移也是常见问题。测试期望值来自 `testcases.json`，而实际返回来自共享服务环境。如果账号信息、配置、状态、TopAccount 关系或 bucket owner 发生变化，断言会失败。\n\n此外，部分测试使用固定 IP 和端口，例如：\n\n```go\naccount.WithTestAddr(\"10.225.80.90:9422\")\naccount.WithTestAddr(\"10.129.130.91:9474\")\n```\n\n这些地址不可用时，测试会因连接失败而失败，而不是因为 SDK 行为回归。","other-util":"# Other — util\n\n## util 工具模块\n\n`src/util` 是账号服务的公共工具包，不承载独立业务流程，而是被 `service`、`dao`、`dto`、`controllers`、`rpc` 等层复用。GitNexus 未检测到该模块自身的端到端执行流；它更多是横切能力集合，覆盖 HTTP 参数解析、区域归一化、数据库事务和重试、指标上报、本地缓存、ID 段分配以及限流客户端初始化。\n\n```mermaid\nflowchart TD\n    A[\"业务入口<br/>service / dao / dto\"] --> B[\"HTTP 参数与区域工具<br/>Param* / Query* / GetRegion\"]\n    A --> C[\"数据库执行包装<br/>RetryDo / BeginTX / RollbackTX\"]\n    A --> D[\"可观测性<br/>EmitThroughput / EmitLatency / EmitError\"]\n    A --> E[\"ID 分配<br/>GenId / IdFetcher\"]\n    A --> F[\"缓存与调度抖动<br/>LocalCache / RandomWaitTime\"]\n    E --> G[\"TCC 配置与 id_fetcher 表\"]\n```\n\n## 文件职责\n\n`common.go` 提供 Gin 请求参数解析和随机 TTL 工具。\n\n`tools.go` 提供通用执行工具，包括重试、事务、Basic Auth 解析、UUID、环境开关和 `LocalCache`。\n\n`id_gen_util.go` 实现基于数据库表 `id_fetcher` 的 ID 段分配和管理接口。\n\n`region.go` 负责将 IDC 名称归一化为业务区域，并解析同步规则中的目标 IDC。\n\n`metrics.go` 封装 `code.byted.org/gopkg/metrics` 指标上报。\n\n`rate_limit.go` 初始化 Harden 限流客户端 `HardenCli`。\n\n测试文件覆盖这些工具函数的基础行为；其中 `base_test.go` 的 `TestMain` 会初始化 `ginex`、配置和写库，并调用 `InitIdGenerator(db)`，因此 ID 生成相关测试依赖真实数据库配置。\n\n## HTTP 参数解析\n\n`common.go` 中的 `Query*` 和 `Param*` 函数直接基于 `gin.Context` 读取参数并转换类型：\n\n- `QueryInt64(c, key)`：读取 query string 并用 `strconv.ParseInt(..., 10, 64)` 转成 `int64`。\n- `QueryBool(c, key)`：读取 query string 并用 `strconv.ParseBool` 转成 `bool`。\n- `QueryInt64Slice(c, key)`：读取同名 query 参数数组，例如 `?k=1000&k=1001`，逐个解析为 `[]int64`。\n- `QueryUInt64(c, key)`：读取 query string 并解析为 `uint64`。\n- `QueryString(c, key)`：读取 query string；空字符串返回 `ErrEmpty`。\n- `ParamInt64(c, key)`、`ParamUInt64(c, key)`、`ParamString(c, key)`：读取路径参数并执行相同类型转换。\n\n`ErrEmpty` 是模块内的错误类型，`Error()` 返回 `\"<key> is empty\"`。`QueryString` 和 `ParamString` 会把空字符串视为缺失，因此不能区分参数不存在和显式传入空值。\n\n这些函数在服务层较常见，例如 `service/instance.go`、`service/config.go`、`service/account.go`、`service/rule_v2.go` 等入口会用它们将 Gin 参数转换成 DTO 或 DAO 所需类型。\n\n## 随机 TTL 与调度抖动\n\n`RandomCacheExpireTime(cacheExpireTime)` 基于包级 `random` 生成 `ttl*(1-factor)` 到 `ttl*(1+factor)` 的随机过期时间。当前 `randFactor = 0.5`，所以 5 分钟 TTL 会落在约 2.5 到 7.5 分钟之间。\n\n`RandomWaitTime(cacheExpireTime)` 返回 `[0, cacheExpireTime)` 范围内的随机等待时间。代码中主要用于缓存刷新前的启动抖动，例如 `service/cache.go`、`service/account.go` 和 `rpc/decc.go`，避免多个实例同时刷新。\n\n注意：当前 `random` 是包级 `*rand.Rand`，没有显式加锁。如果未来在高并发路径大量调用这些函数，需要关注 Go race detector 下的并发访问风险。\n\n## 重试与事务工具\n\n`RetryDo(ctx, info, times, run, stopErrors...)` 是 DAO 层的常用执行包装。它最多执行 `times` 次 `run()`：\n\n- 第一次之后的重试会通过 `logs.CtxWarn` 记录 `\"retry %s for %d times\"`。\n- 每次失败都会通过 `logs.CtxError` 记录错误。\n- `run()` 返回 `nil` 时立即成功返回。\n- 命中 `stopErrors` 时提前停止重试。\n\n当前实现使用 `errors.Is(e, err)` 判断停止错误，参数顺序与 Go 常见写法 `errors.Is(err, target)` 相反。新增调用方如果依赖哨兵错误或包装错误，需要先确认匹配行为符合预期。\n\n`BeginTX(db)` 对 `gorm.DB` 调用 `Begin()`，并在 `tx.GetErrors()` 非空时返回 `tx.Error`。\n\n`RollbackTX(tx, err)` 回滚事务，并合并原始错误与回滚错误：\n\n- 回滚没有错误时返回原始 `err`。\n- 原始 `err` 为 `nil` 时返回 `tx.Error`。\n- 原始错误已经是 `gorm.Errors` 时追加回滚错误。\n- 否则返回包含两个错误的 `gorm.Errors`。\n\nDAO 层大量使用统一模式：\n\n```go\nerr := util.RetryDo(ctx, retryInfo, db.retryTimes, func() error {\n    tx, err := util.BeginTX(db.w.Context(ctx))\n    if err != nil {\n        return util.RollbackTX(tx, err)\n    }\n\n    res := tx.Table(table).Create(value)\n    if res.Error != nil {\n        return util.RollbackTX(tx, res.Error)\n    }\n\n    return tx.Commit().Error\n})\n```\n\n这种模式让重试、事务失败处理和指标上报保持一致。\n\n## 其他通用工具\n\n`GetUUID()` 返回去掉连字符的 UUID 字符串，内部使用 `github.com/google/uuid`。\n\n`ParseBaseAuth(auth)` 解析形如 `Basic <base64(user:password)>` 的 Authorization 值。前缀必须严格是 `\"Basic \"`；base64 解码失败或内容不包含冒号时返回 `ok=false`。\n\n`FormatKV(key, value)` 返回 `\"key=value\"` 字符串，常用于拼接标签或日志字段。\n\n`CheckIfSupportCreateProcess()` 根据当前 `env.IDC()` 判断是否支持创建流程。`env.DC_ALISG` 和 `env.DC_MALIVA` 返回 `false`，其他 IDC 返回 `true`。\n\n`InitCheckSuffix()` 将 `config.Conf.CheckSuffix` 写入包级原子变量 `checkSuffix`。`NeedCheckAccountNameSuffix()` 原子读取该值，用于账号名后缀校验开关。\n\n## LocalCache\n\n`LocalCache` 是基于两个 `sync.Map` 的简单本地缓存：\n\n- `m` 保存 key 到 value。\n- `t` 保存 key 到 `expiresAt`。\n- `Add(key, value, expiresAt)` 写入值和过期时间。\n- `Get(key)` 只返回未过期数据；过期时返回 `(nil, false)`。\n- `GetIncludeExpired(key)` 不检查过期时间，直接返回缓存值。\n- `Delete(key)` 同时删除值和过期时间。\n\n`LocalCache` 不会自动清理过期数据，过期数据仍可通过 `GetIncludeExpired` 读取。`service/domain.go` 使用它维护 `accountsByDomainCache` 和 `domainCache`。\n\n## 区域归一化\n\n`region.go` 将 IDC 或区域别名统一映射到业务区域。核心函数是 `GetRegion(idc)`：\n\n- `idc == R_ALL` 时返回 `\"all\"`。\n- `idc == \"\"` 时返回当前进程默认区域。\n- 已知 IDC 会通过 `regionMapping` 映射到标准区域。\n- 未知 IDC 会回退到默认区域。\n\n默认区域由 `getDefaultRegion()` 从 `env.IDC()` 推导，并缓存在 `defaultRegion atomic.Value` 中。进程运行期间一旦缓存，后续环境变化不会自动刷新。\n\n常见映射包括：\n\n- `lf`、`hl`、`lq` 等中国区 IDC 映射到 `R_CN`，即 `\"cn\"`。\n- `useast2a`、`useast2b` 映射到 `R_I18N`，即 `\"i18n\"`。\n- `useast5` 映射到 `\"us-ttp\"`。\n- `alisg` 和 `sg1` 归一到 `env.DC_ALISG`。\n- `maliva` 保持为 `env.DC_MALIVA`。\n\n`IsRegionSupported(idc)` 只判断输入是否存在于 `regionMapping`，不会执行默认回退。\n\n`IsInnerProdEnv(idc)` 先调用 `GetRegion(idc)`，再判断归一后的区域是否在 `AllInnerProdRegions` 中。\n\n`GetSyncIDCs(syncInfo)` 将同步配置 JSON 解析为 IDC 列表。它把 JSON key 转成大写后查 `regionIDC`，并展开成具体 IDC。例如包含 `alisg` 时会返回 `env.DC_ALISG` 和 `env.DC_SG1`。JSON 解析错误会被忽略，未知 key 也会被跳过。\n\n`RuleSyncRegion` 列出允许配置同步规则的区域，包括 `R_CN`、`env.DC_ALISG`、`env.DC_MALIVA`、`env.DC_USEAST2A`、`env.DC_USEAST2B`、`env.DC_USEAST5`、`env.DC_USEAST8`。\n\n## ID 生成器\n\n`id_gen_util.go` 实现按表、按区域维护的 ID 段分配。它依赖全局 `idGenDb`，必须先调用 `InitIdGenerator(db)` 注入数据库连接。测试入口在 `base_test.go` 中通过写库初始化它。\n\n`IdFetcher` 对应数据库表 `id_fetcher`：\n\n```go\ntype IdFetcher struct {\n    ID          uint64\n    Region      string\n    DBTableName string\n    CurrentId   int64\n    MaxId       int64\n    CreateAt    time.Time\n    UpdatedAt   time.Time\n}\n```\n\n`TableName()` 固定返回 `\"id_fetcher\"`。`BeforeCreate` 会把 `ID` 置为 0，`AfterCreate` 会从 GORM scope 回填主键。`GetRemainingCount()` 返回 `MaxId - CurrentId`。\n\n### GenId\n\n`GenId(ctx, tableName, idCount)` 是主要分配入口。它先读取 `tcc.GetIdGeneratorConfig(ctx)`，并检查：\n\n- 全局 `Switch` 是否开启。\n- `TableSupportSetting[tableName]` 是否存在且为 `true`。\n- `TableRemainIdRemindThreshold[tableName]` 是否存在。\n\n如果任一条件不满足，函数会返回长度为 `idCount` 的零值 `[]int64`，且错误为 `nil`。调用方必须知道这个兼容行为，不能仅以 `err == nil` 判断一定拿到了有效 ID。\n\n启用后，流程如下：\n\n```mermaid\nflowchart TD\n    A[\"GenId\"] --> B[\"读取 TCC 配置\"]\n    B --> C[\"开启事务\"]\n    C --> D[\"锁定 id_fetcher 行<br/>select ... for update\"]\n    D --> E[\"检查剩余 ID 数\"]\n    E --> F[\"生成连续 ID 并推进 CurrentId\"]\n    F --> G[\"提交事务\"]\n    G --> H[\"检查目标表是否已有冲突 ID\"]\n    H --> I[\"返回 ID 或错误\"]\n```\n\n并发安全依赖数据库行锁：`select * from id_fetcher where region = ? and table_name = ? for update`。锁住当前区域和表名对应的 `id_fetcher` 行后，函数按 `CurrentId+1` 起生成连续 ID，并把 `CurrentId` 推进 `idCount`。\n\n剩余量不足时，函数提交当前事务并返回包含 `\"remaining not enough\"` 的错误。分配成功后，如果剩余量低于阈值，会用 `logs.Errorf` 输出告警前缀 `IdGeneratorWarningPrefix`。\n\n冲突检测发生在提交事务之后：函数会查询目标业务表 `where id in (?)`。如果目标表已有这些 ID，会返回包含 `\"id conflict\"` 的错误，但此时 `CurrentId` 已经推进。处理这类错误时不要假设同一段 ID 还能再次分配。\n\n`dto/domain.go` 和 `dto/video_account.go` 在构造模型时会调用 `GenId` 获取业务表 ID。\n\n### 管理接口\n\n`ListIdFetchers(ctx)` 查询全部 `id_fetcher` 记录。`service/id_gen.go` 暴露对应服务层入口。\n\n`UpdateIdFetcher(ctx, fetcher)` 用于调整已有 ID 段：\n\n1. 调用 `validateFetcherParam` 校验 `Region`、`DBTableName` 非空，且 `MaxId > CurrentId`。\n2. 查询目标业务表，确认 `[CurrentId, MaxId]` 区间内没有已有 ID。\n3. 开启事务并锁定对应 `id_fetcher` 行。\n4. 校验数据库记录的 `ID` 与请求中的 `fetcher.ID` 一致。\n5. 更新 `CurrentId` 和 `MaxId`。\n\n`CreateIdFetcher(ctx, fetcher)` 用于创建新的表区域配置。它同样校验参数和目标表 ID 区间冲突，然后在事务中 `Create(fetcher)`。如果目标业务表不存在，区间冲突查询会返回数据库错误；如果相同区域和表名已存在，则依赖数据库约束或 GORM create 错误返回失败。\n\n`validateFetcherParam(fetcher)` 是内部校验函数，不检查目标表存在性，也不检查区域是否在 `regionMapping` 中，只做字段非空和 ID 上下界校验。\n\n## 指标上报\n\n`metrics.go` 在 `init()` 中创建默认指标客户端：\n\n```go\nmetrics.NewDefaultMetricsClientV2(\"toutiao.videoarch.account\", true)\n```\n\n封装函数统一为指标名追加后缀：\n\n- `EmitThroughput(name, tags...)` 上报 `name + \".throughput\"`，计数值为 1。\n- `EmitLatency(name, start, tags...)` 上报 `name + \".latency\"`，耗时单位是微秒。\n- `EmitStore(name, value, tags...)` 上报 `name + \".store\"`。\n- `EmitError(mkey, tags...)` 上报 `mkey + \".error\"`，计数值为 1。\n\n上报失败只写 `logs.Warn`，不会影响业务返回。\n\nDAO 层通常使用如下模式记录数据库操作吞吐和耗时：\n\n```go\nretryInfo := \"createAccount\"\nutil.EmitThroughput(util.CommandThroughput, metrics.T{Name: util.TagCommand, Value: retryInfo})\ndefer util.EmitLatency(util.CommandLatency, time.Now(), metrics.T{Name: util.TagCommand, Value: retryInfo})\n```\n\n`CommandThroughput`、`CommandLatency`、`Command`、`TagCommand` 是该模式使用的常量。\n\n## 限流客户端初始化\n\n`InitRateLimiter()` 初始化包级变量 `HardenCli`：\n\n```go\nHardenCli = harden.NewClient(\n    config.Conf.Meta.PSM,\n    harden.WithCluster(config.Conf.Harden.Cluster),\n    harden.UseHTTP(),\n    harden.WithTimeout(100*time.Millisecond),\n    harden.PassOnErr(),\n)\n```\n\n这表示限流客户端使用当前服务 PSM、配置中的 Harden 集群、HTTP 调用、100ms 超时，并在限流系统错误时放行。新增调用方应复用 `HardenCli`，不要在请求路径中重复创建客户端。\n\n## 与代码库其他模块的关系\n\n`dao` 层是 `RetryDo`、`BeginTX`、`RollbackTX`、`EmitThroughput`、`EmitLatency` 的主要消费者。账号、域名、配置、规则、实例、分类 schema 等 DAO 方法都遵循“指标上报 + RetryDo + 事务”的模式。\n\n`service` 层主要使用参数解析、区域归一化、本地缓存和随机等待。比如 `service/config.go`、`service/domain.go`、`service/account.go` 会用 `GetRegion` 归一化请求区域；`service/cache.go` 用 `RandomWaitTime` 打散后台刷新。\n\n`dto` 层使用 `GenId` 为部分模型生成 ID，
