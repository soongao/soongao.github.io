并使用 `GetRegion` 在请求解析阶段统一区域字段。\n\n`controllers/account.go` 会直接调用指标封装记录命令类吞吐和耗时。\n\n`remote/http_utils.go` 使用 `GetRegion(env.IDC())` 填充跨区域请求中的区域字段。\n\n## 维护注意事项\n\n新增 HTTP 参数工具时，要保持 `Query*` 和 `Param*` 的错误语义一致；字符串空值当前会返回 `ErrEmpty`，数值和布尔值直接透传 `strconv` 的解析错误。\n\n修改 `regionMapping` 时，需要同步考虑 `AllInnerProdRegions`、`regionIDC`、`RuleSyncRegion` 和相关单测。`GetRegion` 对未知输入会回退默认区域，业务侧如果需要拒绝非法区域，应先调用 `IsRegionSupported`。\n\n修改 `GenId` 时要谨慎处理事务边界。当前 ID 段推进在冲突检查之前已经提交，这是现有行为；如果改为提交前检查，需要重新评估并发写入目标表和行锁范围。\n\n`LocalCache` 是轻量缓存，不负责后台淘汰。缓存值较大或 key 数量可能无限增长的场景，需要在调用方设计删除策略。\n\n指标封装的失败策略是“只记录 warning，不影响业务”。不要在这些函数里引入会改变业务返回的错误传播。","other-validator":"# Other — validator\n\n## validator 模块\n\n`src/validator` 负责集中校验账号、配置、地域、域名和域名账号关系等请求对象。它不是业务执行入口，而是服务层在写入数据库或复制配置前使用的防御层：先检查必填字段、枚举值、账号存在性、地域合法性，再对存储配置中的 bucket 做更严格的跨账号使用校验。\n\n该模块的测试文件覆盖了 `validator.go` 中的主要公开函数和关键私有校验函数。`TestMain` 会初始化 `ginex`、配置、数据库和 RPC 客户端，因此部分测试依赖真实 DAO/RPC 环境，而不是纯内存单元测试。\n\n## 核心职责\n\n`validator` 的校验逻辑主要分为四类：\n\n1. 基础枚举校验：`ValidateStatus`、`ValidateRuleType`、`ValidateModule`、`ValidateRegion`。\n2. 账号与配置请求校验：`ValidateCreateAccountRequest`、`ValidateMCreateConfigRequest`、`ValidateMUpdateConfigRequest`、`ValidateMCopyConfigRequest`。\n3. 存储配置与 bucket 权属校验：`validateConfigs`、`validateStorageConfig`、`validateBucket`、`validateHasOwnerBucketConfig`、`validateEmptyOwnerBucketConfig`。\n4. 域名与账号关系校验：`ValidateCreateDomainRequest`、`ValidateCreateDomainAccountRelRequest`、`ValidateMCopyDomainAccountRelRequest`。\n\n此外，`RefinePageParams` 提供分页参数归一化，`ValidateCreateAccountCategorySchemaRequest` 和 `ValidateUpdateAccountCategorySchemaRequest` 负责账号分类 schema 的输入校验。\n\n## 初始化与测试环境\n\n`src/validator/base_test.go` 中的 `TestMain` 是整个包测试的统一入口：\n\n```go\nfunc TestMain(m *testing.M) {\n\tginex.Init()\n\tconfig.InitConf()\n\tdao.InitDb()\n\trpc.Init()\n\tcode := m.Run()\n\tos.Exit(code)\n}\n```\n\n这意味着测试执行前会加载配置、初始化数据库连接，并初始化 `rpc.BktCli` 等 RPC 依赖。开发者新增测试时需要注意：\n\n- 访问 `dao.Db` 的测试依赖测试环境数据库数据。\n- 访问 `rpc.GetBucket` 的测试依赖 bucket meta RPC。\n- 需要隔离 RPC 行为时，可以参考 `Test_validateBucket` 使用 `gomonkey.ApplyMethod` patch `rpc.BktCli.GetBucket`。\n\n当前调用图显示测试文件直接覆盖 `validator.go` 中的公开函数和内部函数；该测试模块本身没有被运行时执行流引用。\n\n## 基础校验函数\n\n### `ValidateStatus`\n\n`ValidateStatus(status string) error` 遍历 `constant.StatusList`，只有命中列表中的状态才返回 `nil`，否则返回 `errno.ErrStatusInvalid`。\n\n适用于创建或更新状态字段前的统一检查。测试中 `constant.StatusEnabled` 为合法值，任意未知状态会失败。\n\n### `ValidateRuleType`\n\n`ValidateRuleType(ruleType string) error` 允许以下规则类型：\n\n- `constant.RuleTypeOrigin`\n- `constant.RuleTypeEncoded`\n- `constant.RuleTypePoster`\n- 以 `constant.RuleTypeVideoExtraPre` 开头的扩展类型\n- 以 `constant.RuleTypeFileExtraPre` 开头的扩展类型\n\n其他值返回 `errno.ErrRuleTypeInvalid`。\n\n### `ValidateModule`\n\n`ValidateModule(module string) error` 遍历 `constant.ModuleList`。例如测试中 `constant.ModuleStorage` 合法，`unit_test_module` 非法。\n\n配置校验入口 `validateConfigs` 会先对每个 `dto.VideoConfig.Module` 调用该函数，因此新增模块时必须同步维护 `constant.ModuleList`，否则配置创建、更新、复制都会被拒绝。\n\n### `ValidateRegion`\n\n`ValidateRegion(idc string) error` 使用 `util.IsRegionSupported(idc)` 判断地域是否合法。特殊点是空字符串被视为合法：\n\n```go\nif idc == \"\" {\n\treturn nil\n}\n```\n\n因此调用方如果要求地域必填，不能只依赖 `ValidateRegion`，还需要自己检查空值。当前 `ValidateMCreateConfigRequest`、`ValidateMCopyConfigRequest`、`ValidateMCopyDomainAccountRelRequest` 会在 `ValidateRegion` 返回错误时统一转换为 `errno.ErrRegionMissing`，但空字符串本身不会触发错误。\n\n## 账号创建校验\n\n`ValidateCreateAccountRequest(ctx, req)` 用于校验 `dto.CreateAccountRequest`，主要流程如下：\n\n```mermaid\nflowchart TD\n    A[\"ValidateCreateAccountRequest\"] --> B[\"validateConfigs<br/>忽略存储 bucket 检查\"]\n    B --> C[\"校验 AccountName\"]\n    C --> D[\"ValidateRegion\"]\n    D --> E[\"按环境检查账号名后缀\"]\n    E --> F[\"dao.Db.MGetVideoAccount<br/>检查账号名重复\"]\n    F --> G[\"可选检查 AccessKey 重复\"]\n```\n\n具体规则：\n\n- 先调用 `validateConfigs(ctx, req.AccountName, req.VideoConfigs, true)`。\n- `AccountName` 不能为空，且不能以 `__` 开头，否则返回 `errno.ErrNameInvalid`。\n- `Region` 必须通过 `ValidateRegion`，失败时返回 `errno.ErrRegionMissing`。\n- 当 `util.NeedCheckAccountNameSuffix() == constant.NeedCheckSuffix` 时，账号名必须以 `env.IDC()` 结尾。\n- 使用 `dao.Db.MGetVideoAccount` 按 `AccountName` 和 `WithDeleted: true` 检查账号是否已经存在。\n- 如果请求指定了 `AccessKey`，还会按 `AccessKey` 查询重复账号。\n\n注意：这里调用 `validateConfigs` 时传入 `ignoreCheckStorageConfig=true`，新建账号阶段不会检查 storage 配置中的 bucket 是否存在或是否跨 TopAccount 使用。\n\n## 配置创建、更新与复制校验\n\n### `ValidateMCreateConfigRequest`\n\n`ValidateMCreateConfigRequest(ctx, req, ignoreCheckStorageConfig)` 校验 `dto.MCreateConfigRequest`：\n\n1. `AccessKey` 不能为空，否则返回 `errno.ErrAccessKeyInvalid`。\n2. `Region` 必须通过 `ValidateRegion`，失败返回 `errno.ErrRegionMissing`。\n3. 通过 `dao.Db.MGetVideoAccount` 按 `AccessKey` 查询账号。\n4. 如果账号不存在，返回 `errno.ErrAccessKeyNotExists`。\n5. 将查询到的 `accounts[0].AccountName` 回填到 `req.AccountName`。\n6. 调用 `validateConfigs(ctx, req.AccountName, req.Configs, ignoreCheckStorageConfig)` 校验配置内容。\n\n这个函数会修改请求对象本身：`req.AccountName` 会被回填。调用方如果后续依赖请求中的账号名，可以直接使用该字段。\n\n### `ValidateMUpdateConfigRequest`\n\n`ValidateMUpdateConfigRequest(ctx, req, ignoreCheckStorageConfig)` 是更新配置的薄封装，直接复用创建配置校验：\n\n```go\nreturn ValidateMCreateConfigRequest(ctx, req.MCreateConfigRequest, ignoreCheckStorageConfig)\n```\n\n因此更新配置和创建配置在账号查找、地域检查、模块检查、bucket 检查方面保持一致。\n\n### `ValidateMCopyConfigRequest`\n\n`ValidateMCopyConfigRequest(ctx, req)` 用于复制配置请求 `dto.MCopyConfigRequest`：\n\n- `AccessKey` 不能为空。\n- `SourceRegion` 必须合法。\n- `TargetRegions` 不能为空，且每个目标地域都必须合法。\n- `AccessKey` 必须能查询到已有视频账号。\n- `Modules` 不能为空。\n- `Modules` 中每个 module 都必须通过 `ValidateModule`。\n\n复制场景只校验模块集合和地域集合，不会调用 `validateConfigs` 检查具体 `dto.VideoConfig` 内容。\n\n## 配置内容校验\n\n`validateConfigs(ctx, accountName, videoConfigs, ignoreCheckStorageConfig)` 是配置校验的内部核心。它遍历每个 `*dto.VideoConfig`，执行三类检查：\n\n1. 使用 `ValidateModule(c.Module)` 检查模块合法性。\n2. 如果没有忽略存储配置检查，则检查 storage 模块中的 bucket。\n3. 对全局模块的 bucket 选择策略做 JSON 结构校验。\n\n关键代码路径：\n\n```go\nif c.Module == constant.ModuleStorage {\n\tc.AccountName = accountName\n\tif err := validateStorageConfig(ctx, c, existBucketSet); err != nil {\n\t\treturn err\n\t}\n}\n\nif c.Module == constant.ModuleGlobal && c.CKey == constant.BucketSelectionStrategyCKey {\n\tif err := json.Unmarshal([]byte(c.CValue), &dto.BucketSelectionStrategy{}); err != nil {\n\t\treturn &errno.Payload{Code: errno.CodeBadRequest, Message: \"invalid bucket selection strategy\"}\n\t}\n}\n```\n\n`existBucketSet` 是当前账号已有配置中的 bucket 集合，第一次需要检查存储配置时通过 `getAccountExistBucketSet` 懒加载。已有 bucket 会被放行，用于兼容历史上已经存在的错误配置，避免更新其他配置时被旧 bucket 阻断。\n\n## storage 配置与 bucket 校验\n\n### `getAccountExistBucketSet`\n\n`getAccountExistBucketSet(ctx, accountName, c)` 从 `dao.Db.MGetConfigByProvider(ctx, accountName, \"\", util.R_ALL)` 读取账号现有配置，并提取已经配置过的 bucket 名称。\n\n它兼容两种 `CValue` 形态：\n\n- 普通字符串：`CValue` 本身就是 bucket 名。\n- JSON storage 配置：反序列化为 `dto.StorageConfig`，从 `IDC` 和 `Default` 中提取 `bucketAccount.Name`。\n\n参数 `c *dto.VideoConfig` 当前没有被函数体使用，保留它不会影响行为，但新增逻辑时不应假设它参与过滤。\n\n### `validateStorageConfig`\n\n`validateStorageConfig(ctx, videoConfig, existBucketSet)` 只处理 storage 模块的配置值。它有几个特殊兼容规则：\n\n- `CKey == \"bucket\"` 直接放行。\n- `CKey` 包含 `\"migrater_rules\"` 直接放行。\n- `CValue` 不能解析为 `dto.StorageConfig` 时，按单个 bucket 名处理。\n- `CValue` 能解析为 `dto.StorageConfig` 时，分别检查 `IDC` 和 `Default` 下的 bucket。\n\n如果 bucket 已存在于 `existBucketSet`，函数会跳过 `validateBucket`。否则会调用 `validateBucket(ctx, videoConfig.AccountName, videoConfig.Region, bucketName)` 做真实 bucket 权属校验。\n\n### `validateBucket`\n\n`validateBucket(ctx, accountName, region, bucketName)` 是 bucket 使用边界的核心校验：\n\n```mermaid\nflowchart TD\n    A[\"validateBucket\"] --> B[\"rpc.GetBucket\"]\n    B --> C[\"dao.Db.MGetAccount<br/>查询当前账号\"]\n    C --> D[\"validateHasOwnerBucketConfig\"]\n    D --> E{\"bucket owner 是否为空或无效\"}\n    E -- \"是\" --> F[\"validateEmptyOwnerBucketConfig\"]\n    E -- \"否\" --> G[\"允许或返回跨 TopAccount 错误\"]\n```\n\n规则：\n\n- 如果 `rpc.BktCli == nil`，直接返回 `nil`，即跳过 bucket meta 校验。\n- `rpc.GetBucket` 返回 `bktClient.ErrBucketNotFound` 时，返回 bad request：`bucket: <name> not found`。\n- 其他 RPC 错误返回 internal error。\n- 查询当前账号时使用 `dao.Db.MGetAccount`，并取 `curAccounts[0]` 作为当前账号。\n- 先检查 bucket meta 中的 `Owner`，再在 owner 为空或无效时检查历史配置占用情况。\n\n开发者需要注意：`validateBucket` 默认假设当前账号一定能从数据库查到，并直接访问 `curAccounts[0]`。调用它前应保证 `accountName` 来自已校验过的账号。\n\n### `validateHasOwnerBucketConfig`\n\n`validateHasOwnerBucketConfig(ctx, bucketName, bucketOwner, curAccount)` 用于处理 bucket meta 中有 owner 的情况，返回 `(emptyOwner bool, err error)`。\n\n行为如下：\n\n- `bucketOwner` 为空：返回 `emptyOwner=true`，交给 `validateEmptyOwnerBucketConfig` 继续检查。\n- owner 账号查不到或查询失败：也返回 `emptyOwner=true`，表示 bucket meta owner 不可信，改查历史配置。\n- owner 账号名等于当前账号名，或 owner 与当前账号 `TopAccountID` 相同：允许使用。\n- owner 与当前账号跨 TopAccount：返回 bad request，错误信息包含 `cross top account usage is forbidden 1`。\n\n这里的核心约束是：bucket 如果有有效 owner，不允许被跨 `TopAccountID` 的其他空间使用。\n\n### `validateEmptyOwnerBucketConfig`\n\n`validateEmptyOwnerBucketConfig(ctx, bucketName, region, curAccount)` 处理 bucket meta owner 为空或 owner 账号不存在的情况。\n\n流程：\n\n1. 调用 `getOneExistConfig(ctx, bucketName, region)` 查找已有 storage 配置。\n2. 如果没有任何已有配置，说明 bucket 尚未被账号配置过，允许使用。\n3. 如果存在配置，按 `bucketConfig.AccountName` 查询已有配置所属账号。\n4. 当前账号与已有账号相同，或 `TopAccountID` 相同，允许使用。\n5. 否则返回 bad request，错误信息包含 `cross top account usage is forbidden 2`。\n\n这里的约束是：owner 为空的 bucket 如果已经被某个空间配置过，也不能被跨 TopAccount 的其他空间复用。\n\n### `getOneExistConfig`\n\n`getOneExistConfig(ctx, bucketName, region)` 通过 `dao.Db.MGetStorageConfigByBucketName` 查找包含指定 bucket 名的 storage 配置。\n\n因为底层查询使用 `like`，函数会二次精确过滤：\n\n- 普通字符串配置必须 `bktConfig.CValue == bucketName`。\n- JSON 配置必须在 `dto.StorageConfig.IDC` 或 `dto.StorageConfig.Default` 中找到 `Name == bucketName`。\n\n如果 DAO 查询报错，函数直接返回 `nil`，表示没有阻断配置创建。\n\n## 域名校验\n\n### `ValidateCreateDomainRequest`\n\n`ValidateCreateDomainRequest(ctx, req)` 校验 `dto.Domain`：\n\n- `Domain` 不能为空。\n- `Status` 不能为空。\n- `Type` 不能大于 `dto.InternalPrivateDomain`。\n- 遍历 `req.AccountRels` 并补齐关系字段：\n  - `rel.Region = util.GetRegion(rel.Region)`\n  - `rel.DomainType = req.Type`\n  - `Category` 为空时使用 `dto.DomainDefaultCategory`\n  - `Module` 为空时使用 `dto.DomainDefaultModule`\n  - `RelType = dto.BuildDomainRelTypeFromConfig(rel.Region, rel.Module)`\n\n该函数不仅校验，还会规范化请求对象中的账号关系字段。\n\n### `ValidateCreateDomainAccountRelRequest`\n\n`ValidateCreateDomainAccountRelRequest(ctx, req, ignoreCheckAccountName)` 校验单条 `dto.DomainAccountRel`：\n\n- `Domain` 不能为空，并会执行 `strings.TrimSpace`。\n- 通过 `dao.Db.GetDomain` 检查域名存在，并将 `domain.Type` 回填到 `req.DomainType`。\n- `AccountName` 不能为空。\n- 当 `ignoreCheckAccountName == false` 时，通过 `dao.Db.MGetAccount` 检查账号存在。\n- 规范化 `Region`、`Category`、`Module`，并生成 `RelType`。\n\n这个函数和 `ValidateCreateDomainRequest` 一样会修改请求对象。调用方应把校验后的 `req` 继续传给后续写入逻辑，而不是丢弃。\n\n### `ValidateMCopyDomainAccountRelRequest`\n\n`ValidateMCopyDomainAccountRelRequest(ctx, req)` 校验域名账号关系复制请求：\n\n- `AccountName` 不能为空。\n- `SourceRegion` 必须通过 `ValidateRegion`。\n- `TargetRegions` 不能为空。\n- 每个目标地域必须通过 `ValidateRegion`。\n\n由于 `ValidateRegion(\"\")` 返回 `nil`，测试中空 `SourceRegion` 是合法的；如果业务要求复制时源地域必须明确，调用方需要额外加必填校验。\n\n## 账号分类 schema 校验\n\n`ValidateCreateAccountCategorySchemaRequest(ctx, req)` 用于创建 `dto.AccountCategorySchema`：\n\n- `AccountName` 不能为空。\n- `Category` 不能为空。\n- 当 `SchemaType == dto.SchemaEmbeddedMetadata` 时，调用 `checkEmbeddedMetadataValue` 校验 `SchemaValue` 能否解析为 `dto.EmbeddedMetadataSchema`。\n- 通过 `dao.Db.MGetAccount` 检查账号存在。\n- `SchemaType` 必须存在于 `dto.SchemaTypeAllowList`。\n\n`ValidateUpdateAccountCategorySchemaRequest(ctx, req)` 用于更新 schema：\n\n- `ID` 不能为 0。\n- 如果是 embedded metadata schema，同样校验 `SchemaValue` 结构。\n\n`checkEmbeddedMetadataValue(schemaValue)` 只做 JSON 结构解析，不做更深层的业务语义校验。\n\n## 分页参数归一化\n\n`RefinePageParams(offset, limit)` 用于清洗分页参数：\n\n- `offset <= 0` 时重置为 `0`。\n- `limit <= 0` 时使用 `constant.DefaultPageSize`。\n- `limit > constant.MaxPageSize` 时截断为 `constant.MaxPageSize`。\n\n返回值命名为 `(o, l int64)`，但实际返回的是处理后的 `offset, limit`。\n\n## 与代码库其他模块的连接\n\n`validator` 主要依赖以下包：\n\n- `src/dto`：请求结构、配置结构、域名关系结构和 schema 类型。\n- `src/constant`：状态、模块、规则类型、分页大小、bucket selection ckey 等枚举。\n- `src/errno`：统一业务错误，例如 `ErrNameInvalid`、`ErrRegionMissing`、`ErrModuleInvalid`。\n- `src/dao`：账号、配置、域名的数据库读取。\n- `src/rpc`：通过 `rpc.GetBucket` 查询 bucket meta。\n- `src/util`：地域判断、默认地域转换、账号名后缀策略。\n\n当前测试调用图集中体现了这种连接方式：测试入口初始化 `config.InitConf`、`dao.InitDb`、`rpc.Init`，随后直接调用 `ValidateCreateAccountRequest`、`ValidateMCreateConfigRequest`、`validateBucket`、`validateStorageConfig` 等函数，验证它们与 DAO/RPC 数据的交互结果。\n\n## 贡献注意事项\n\n新增校验逻辑时应优先复用现有入口，而不是在服务层重复写规则。例如配置相关规则应尽量放进 `validateConfigs` 或 `validateStorageConfig`，账号请求规则放进 `ValidateCreateAccountRequest` 或 `ValidateMCreateConfigRequest`。\n\n需要谨慎处理会修改请求对象的函数：`ValidateMCreateConfigRequest` 会回填 `AccountName`，`ValidateCreateDomainRequest` 和 `ValidateCreateDomainAccountRelRequest` 会补齐 `Region`、`Category`、`Module`、`RelType`、`DomainType`。这些副作用是当前业务流程的一部分。\n\n新增依赖数据库或 RPC 的测试时，应明确测试数据来源。对于 bucket meta 这类外部依赖，优先使用 `gomonkey` patch 目标方法，避免测试结果受远端数据波动影响。","other":"# Other\n\n## 模块概览\n\n`Other` 汇集了账号服务的工程支撑层、运行时基础设施、业务入口层与测试验证入口。它不是单一业务模块，而是把服务从“代码仓库”推进到“可配置、可启动、可观测、可测试的账号系统”的外围与核心胶水层。\n\n其中，[README](readme.md)、[go.mod](go-mod.md)、[build.sh](build-sh.md)、[script](script.md)、[conf](conf.md)、[test.sh](test-sh.md) 定义开发、依赖、构建、部署、配置和测试约定；[config](config.md)、[tcc](tcc.md)、[interface_limiter](interface-limiter.md)、[mem_limit](mem-limit.md) 组成运行时配置和动态开关体系；[middleware](middleware.md)、[service](service.md)、[dto](dto.md)、[validator](validator.md)、[dao](dao.md)、[errno](errno.md) 构成主要请求处理链路；[remote](remote.md)、[remote_cache](remote-cache.md)、[rpc](rpc.md)、[rocketmq](rocketmq.md)、[util](util.md) 提供跨地域转发、共享缓存、RPC 客户端、消息消费和公共工具能力。\n\n```mermaid\nflowchart TD\n    A[\"构建与部署<br/>build.sh / script / conf\"] --> B[\"服务启动\"]\n    B --> C[\"config.InitConf\"]\n    C --> D[\"tcc 动态配置\"]\n    D --> E[\"interface_limiter / mem_limit\"]\n    B --> F[\"rpc / remote_cache / dao / rocketmq 初始化\"]\n\n    G[\"Gin 请求\"] --> H[\"middleware\"]\n    H --> I[\"service\"]\n    I --> J[\"dto\"]\n    I --> K[\"validator\"]\n    I --> L[\"dao\"]\n    I --> M[\"remote / remote_cache / rpc\"]\n    L --> N[\"data/db.sql 表结构\"]\n    I --> O[\"errno.Payload\"]\n    O --> H\n```\n\n## 关键协作关系\n\n开发与交付链路从 [README](readme.md) 和 [go.mod](go-mod.md) 确定工程约定、Go Module 依赖与命名规范，再由 [build.sh](build-sh.md) 编译 `toutiao.videoarch.account` 并整理 `script/` 与 `conf/` 到 `output/`。运行时由 [script](script.md) 中的 `bootstrap.sh` 设置 `PSM`、`GIN_LOG_DIR` 等环境信息并启动二进制，[conf](conf.md) 提供 `base.yml` 与环境覆盖文件作为本地配置来源。\n\n服务启动后，[config](config.md) 先通过 `config.InitConf()` 加载 YAML 和 TCC base 配置；随后 [tcc](tcc.md) 通过 `SetDefaultValuesAndStartRefresh()` 维护动态配置快照，并把接口限流和内存上限分别同步给 [interface_limiter](interface-limiter.md) 与 [mem_limit](mem-limit.md)。这些模块共同决定服务运行时的开关、缓存策略、限流策略、熔断配置和资源边界。\n\n主请求链路由 [middleware](middleware.md) 统一承接 Gin 路由，完成 `Filter`、ACL、日志、限流、响应封装和指标上报。业务函数集中在 [service](service.md)，它把请求解析为 [dto](dto.md) 中的结构体，交给 [validator](validator.md) 做字段、枚举、地域、bucket 和账号关系校验，再通过 [dao](dao.md) 访问持久化数据。[errno](errno.md) 的 `Payload` 是 service 到 middleware 的统一返回契约。\n\n数据模型由 [data](data.md) 中的 `db.sql` 定义，和 [dto](dto.md) 的 `VideoAccount`、`VideoConfig`、`VideoInstance`、域名关系、规则与 category schema 等结构对应。DAO 测试覆盖这些表上的账号、配置、域名、授权、实例和规则操作，保证 service 依赖的持久化契约稳定。\n\n跨实例与跨地域能力分散在几个支撑模块中：[remote_cache](remote-cache.md) 使用 Redis 远端缓存降低查询压力并提供快照兜底；[remote](remote.md) 在写开关和地域条件命中时转发账号与配置写请求；[rpc](rpc.md) 初始化 RPC 依赖并支持如 `GetBucket` 之类的外部查询；[rocketmq](rocketmq.md) 消费 ImageX 域名变更消息并触发 `service.ImageXDomainOnChange()`。\n\n## 测试与验证\n\n测试体系分为两层：[controllers](controllers.md)、[dao](dao.md)、[dto](dto.md)、[validator](validator.md)、[interface_limiter](interface-limiter.md)、[remote](remote.md)、[rpc](rpc.md)、[util](util.md) 等包内测试验证模块内部行为和集成初始化；[test](test.md) 则通过 `account-sdk/client` 面向真实服务做端到端能力验证。[test.sh](test-sh.md) 统一测试环境变量、`go test ./src/...` 和覆盖率报告生成流程。","overview":"# account — Wiki\n\n# account\n\n`account` 是 VideoArch 账号服务，负责账号、配置、域名、规则、实例和权限等核心数据的 HTTP 接口、业务编排、数据库访问、缓存协同、外部系统集成与异步消息处理。新开发者可以先把它理解为一个以 Gin HTTP 服务为入口、以 `service` 为业务中心、以 `dao` 为数据访问边界的账号管理后端。\n\n```mermaid\nflowchart TD\n    A[\"应用入口 main\"] --> B[\"配置与 TCC\"]\n    A --> C[\"HTTP 控制器与中间件\"]\n    A --> D[\"异步消息\"]\n    C --> E[\"领域服务 service\"]\n    D --> E\n    E --> F[\"校验与错误 errno / validator\"]\n    E --> G[\"数据模型 dto\"]\n    E --> H[\"数据访问 dao\"]\n    E --> I[\"缓存 remote_cache\"]\n    E --> J[\"外部集成 remote / rpc\"]\n    H --> G\n    H --> B\n    F --> J\n```\n\n服务启动从 [Application Runtime](application-runtime.md) 开始。`main.go` 负责进程级初始化：加载配置、初始化 TCC、RPC、缓存、数据库、工具组件和 RocketMQ consumer，然后创建 Gin 引擎并注册路由。它本身不承载业务规则，而是把运行时能力装配起来。\n\n运行时配置由 [Configuration and TCC Settings](configuration-and-tcc-settings.md) 管理。`config` 负责本地配置加载、TCC `base` 配置合并和结构校验；`tcc` 负责动态配置读取、定时刷新，以及 Redis 缓存、白名单、限流、内存限制等运行时开关更新。服务里的很多保护性能力都依赖这层配置，例如 [Rate and Resource Limits](rate-and-resource-limits.md) 中的接口限流和 Go runtime 内存限制。\n\n请求入口主要在 [API Controllers and Middleware](api-controllers-and-middleware.md)。控制器通过统一的 `middleware.MyHandler` 约定接入 Gin，请求处理函数返回 `*errno.Payload`，由 `Response`、`OpenAPIResponse`、`JanusResponse`、`WandResponse` 等包装器转换成不同调用方需要的 HTTP/JSON 响应。鉴权、限流、日志、指标、链路追踪和响应封装都集中在这层完成。\n\n核心业务逻辑集中在 [Domain Services](domain-services.md)。`src/service` 负责读取请求参数、绑定到 [Data Models and DTOs](data-models-and-dtos.md)、调用 [Validation and Error Handling](validation-and-error-handling.md) 做参数和业务边界校验，再通过 [Data Access Layer](data-access-layer.md) 访问 MySQL，必要时调用 [Caching Layer](caching-layer.md) 或 [Remote Integrations](remote-integrations.md)。服务层返回统一的 `errno.Payload`，让上层入口保持一致的错误和响应模型。\n\n数据访问层位于 `src/dao`，核心入口是全局 `dao.Db`。它封装读写库连接、熔断器、限流、重试、ID 生成器和 GORM 模型访问。`dao` 与 `dto` 的关系非常紧密：`dto` 定义表映射、请求/响应结构和部分转换逻辑，`dao` 则负责实际查询与写入。\n\n外部依赖通过 `remote` 和 `rpc` 隔离。账号和配置变更会通过 `remote` 转发到远端 HTTP 服务；配置校验中的 Bucket 信息由 `rpc.GetBucket` 查询；DECC 相关元数据在启动后通过 RPC 客户端定时刷新。典型链路是 `MUpdateConfig` 进入服务层后，经 `validator` 校验配置，再在校验存储配置时调用 `rpc.GetBucket`，失败时通过 `errno.Payload` 归一化返回。\n\n缓存逻辑由 `remote_cache` 统一封装。服务层不直接操作 Redis，而是通过 `RemoteCache` 读写账号查询缓存、域名账号关系缓存、CDN 调度域名缓存，并使用查询级互斥锁降低缓存击穿时的回源压力。配置不可用时，缓存层也提供降级实现，避免调用方散落降级判断。\n\n异步消息入口在 [Async Messaging](async-messaging.md)。`main` 启动 RocketMQ consumer 后，当前主要由 `ImageXDomainHandler` 消费 ImageX 域名接入变更消息，并调用 `service.ImageXDomainOnChange` 进入同一套业务处理体系。\n\n开发时建议先从这几条端到端链路读起：\n\n- HTTP 请求链路：Gin 路由进入 `middleware.Response`，再到控制器和 `service`，最后访问 `validator`、`dao`、`remote_cache` 或 `remote/rpc`。\n- 配置更新链路：`main` 初始化 `config` 和 `tcc`，TCC 首次拉取并定时刷新运行时开关，影响缓存、限流、白名单和内存限制。\n- 配置校验链路：`service/config.go` 中的配置创建或更新请求进入 `validator`，存储配置会进一步调用 `rpc.GetBucket` 查询外部 Bucket 元数据。\n- 异步域名链路：RocketMQ 消息进入 consumer handler，解析后调用 `service.ImageXDomainOnChange`，复用服务层的数据和校验能力。\n- DECC 元数据链路：`main` 初始化 RPC 后启动 DECC 元数据刷新任务，周期性拉取频道与嵌入元数据供后续业务使用。\n\n本仓库使用 Go module，模块名为：\n\n```text\ncode.byted.org/videoarch/account\n```\n\n`go.mod` 当前声明 Go 版本为 `1.23`。README 中历史开发说明提到 Go `1.16`，新环境应优先以 `go.mod` 为准。依赖管理使用 `go mod`，本地开发通常从安装 Go、拉取依赖、准备配置文件，再启动 `main.go` 入口开始。接口命名遵循 RESTful 约定：Controller 使用复数命名，Model 使用单数命名，路由对象使用复数路径，例如 `accounts.search`、`photos.create`、`photos.update`。\n\n如果你刚接手这个服务，推荐阅读顺序是：[Application Runtime](application-runtime.md) 了解启动装配，[API Controllers and Middleware](api-controllers-and-middleware.md) 了解请求入口，[Domain Services](domain-services.md) 了解业务主干，然后按需要深入 [Data Access Layer](data-access-layer.md)、[Data Models and DTOs](data-models-and-dtos.md)、[Validation and Error Handling](validation-and-error-handling.md)、[Remote Integrations](remote-integrations.md) 和 [Caching Layer](caching-layer.md)。共享常量、事务辅助、指标、区域处理和 ID 生成等跨模块能力集中在 [Shared Utilities](shared-utilities.md)。","rate-and-resource-limits":"# Rate and Resource Limits\n\n## 模块职责\n\n本模块负责两类运行时资源保护：\n\n1. `interface_limiter`：按接口 `mkey` 做 QPS/突发流量限制，用于请求处理中快速判断当前接口是否允许继续处理。\n2. `mem_limit`：根据容器内存上限和配置百分比设置 Go 运行时内存限制，降低进程内存使用超过预期的风险。\n\n两部分都支持运行时配置更新：接口限流通过 TCC JSON 配置热更新，内存限制通过 TCC 百分比配置和环境变量 `MY_MEM_LIMIT` 计算后应用。\n\n## 接口限流：`src/interface_limiter`\n\n### 核心模型\n\n`interface_limiter` 使用不可变快照加原子替换的方式管理限流器：\n\n```go\ntype snapshot struct {\n\tlimiters map[string]*rate.Limiter\n}\n\nvar current atomic.Value\n```\n\n`current` 中保存当前生效的 `*snapshot`。每次配置更新都会重新构建一份 `map[string]*rate.Limiter`，校验通过后整体替换到 `current`。请求路径只读取当前快照，不加锁。\n\n这种模式的效果是：\n\n- `Allow(mkey string)` 在高频请求路径上只做一次原子读取和一次 map 查询。\n- 配置热更新不会修改旧 map，而是构建新快照后替换。\n- 如果新配置校验失败，旧快照不会被覆盖，线上行为保持不变。\n- 未配置的 `mkey` 默认放行。\n\n### 调用关系\n\n```mermaid\nflowchart TD\n    配置初始化[\"配置初始化<br/>InitConfig\"]\n    TCC更新[\"TCC 更新<br/>UpdateConfigFromTCC\"]\n    应用配置[\"应用配置<br/>UpdateConfig\"]\n    构建快照[\"构建限流快照<br/>UpdateLimits\"]\n    当前快照[\"原子快照<br/>current\"]\n    请求入口[\"请求处理<br/>Response\"]\n    放行判断[\"限流判断<br/>Allow\"]\n\n    配置初始化 --> 应用配置\n    TCC更新 --> 应用配置\n    应用配置 --> 构建快照\n    构建快照 --> 当前快照\n    请求入口 --> 放行判断\n    放行判断 --> 当前快照\n```\n\n### 初始化行为\n\n包初始化时会写入一个空快照：\n\n```go\nfunc init() {\n\tcurrent.Store(&snapshot{limiters: map[string]*rate.Limiter{}})\n}\n```\n\n因此在配置尚未加载、配置关闭、或没有命中指定 `mkey` 时，`Allow` 都会返回 `true`。模块的默认策略是“无配置不拦截”。\n\n`InitConfig(cfg config.InterfaceRateLimiterConfig)` 只是初始化入口，内部直接调用 `UpdateConfig(cfg)`，与后续热更新使用同一套逻辑。\n\n### TCC 配置更新\n\n`UpdateConfigFromTCC(value string, err error)` 是 TCC 回调路径使用的入口：\n\n```go\nfunc UpdateConfigFromTCC(value string, err error) error\n```\n\n处理规则：\n\n- `value == \"\"` 时直接返回 `nil`，不改变当前配置。\n- `err != nil` 时直接返回 `nil`，不改变当前配置。\n- 使用 `json.Decoder` 解析到 `config.InterfaceRateLimiterConfig`。\n- 调用 `decoder.DisallowUnknownFields()`，因此 JSON 中出现未知字段会返回错误。\n- JSON 解析成功后调用 `UpdateConfig(c)`。\n\n这里的设计偏保守：TCC 拉取失败或配置为空时不影响现有快照；只有拿到合法配置后才进入更新流程。\n\n### 配置启停\n\n`UpdateConfig(cfg config.InterfaceRateLimiterConfig)` 根据 `cfg.Enable` 决定是否启用限流：\n\n```go\nfunc UpdateConfig(cfg config.InterfaceRateLimiterConfig) error {\n\tif !cfg.Enable {\n\t\treturn UpdateLimits(nil)\n\t}\n\treturn UpdateLimits(cfg.Limits)\n}\n```\n\n当 `Enable` 为 `false` 时，会调用 `UpdateLimits(nil)`，最终生成一个空 `limiters` map 并替换当前快照。此后所有接口都会放行。\n\n当 `Enable` 为 `true` 时，只对 `cfg.Limits` 中配置的 `mkey` 生效。没有出现在 map 中的接口仍然放行。\n\n### 限流器构建与校验\n\n`UpdateLimits(cfg map[string]config.InterfaceRateLimit)` 负责把配置转换成 `golang.org/x/time/rate.Limiter`：\n\n```go\nlimiters[mkey] = rate.NewLimiter(rate.Limit(limit.QPS), limit.Burst)\n```\n\n每条配置会校验两个字段：\n\n- `limit.QPS > 0`\n- `limit.Burst > 0`\n\n任一配置非法时，函数立即返回错误，并且不会执行 `current.Store(...)`。这意味着非法热更新不会污染当前运行中的限流策略。\n\n需要注意的是，`UpdateLimits` 每次都会创建新的 `rate.Limiter`。因此热更新不仅会替换限流参数，也会重置对应接口的令牌桶状态。\n\n### 请求路径判断\n\n`Allow(mkey string) bool` 是请求路径使用的限流判断函数：\n\n```go\nfunc Allow(mkey string) bool {\n\ts, ok := current.Load().(*snapshot)\n\tif !ok || s == nil {\n\t\treturn true\n\t}\n\tlimiter := s.limiters[mkey]\n\tif limiter == nil {\n\t\treturn true\n\t}\n\treturn limiter.Allow()\n}\n```\n\n放行规则按顺序为：\n\n1. 当前快照不存在或类型异常：放行。\n2. 当前 `mkey` 没有配置限流器：放行。\n3. 命中配置：调用 `rate.Limiter.Allow()` 判断是否获取到令牌。\n\n`Allow` 被 `src/middleware/access.go` 中的 `Response` 调用，因此它处于请求处理链路中。这里不能引入阻塞等待逻辑，当前实现使用 `Allow()` 而不是 `Wait()`，超限请求会被立即拒绝或走上层拒绝逻辑。\n\n## 内存限制：`src/mem_limit`\n\n### 核心入口\n\n`mem_limit` 的公开入口是：\n\n```go\nfunc ApplyFromPercent(percentStr string) error\n```\n\n它创建 `memLimiter` 并调用内部方法 `update(percentStr)`。实际解析、校验、计算和应用逻辑都在 `(*memLimiter).update` 中。\n\n该入口被 `src/tcc/async_update.go` 的 `process` 调用，用于处理 TCC 下发的内存限制百分比。\n\n### 配置来源\n\n内存限制由两个值共同决定：\n\n- `MY_MEM_LIMIT`：环境变量，表示 Pod 或容器内存上限，单位是字节。\n- `percentStr`：配置值，必须是整数百分比字符串。\n\n计算公式由 `getMemBytes(total, percent)` 实现：\n\n```go\nfunc getMemBytes(total, percent int64) int64 {\n\treturn total * percent / 100\n}\n```\n\n例如 `MY_MEM_LIMIT=2147483648` 且 `percentStr=\"80\"` 时，最终限制为 `1717986918` 字节。\n\n### 校验规则\n\n`(*memLimiter).update(value string)` 的校验规则如下：\n\n- `MY_MEM_LIMIT` 必须能解析为十进制 `int64`。\n- `MY_MEM_LIMIT` 不能小于 `0`。\n- `value` 必须能解析为十进制 `int64`。\n- `percent > 100` 非法。\n- `percent <= 0` 表示关闭运行时内存限制，实际设置为 `math.MaxInt64`。\n- `1 <= percent <= 100` 时，按 `MY_MEM_LIMIT * percent / 100` 计算字节数。\n\n解析或校验失败时，函数会记录错误日志并返回错误，不会调用 `setMemoryLimit`。\n\n### 应用到 Go 运行时\n\n内存限制最终通过 `setMemoryLimit(limitBytes)` 应用。该函数按 Go 版本分成两个实现。\n\nGo 1.19 及以上版本使用 `runtime/debug.SetMemoryLimit`：\n\n```go\nfunc setMemoryLimit(limitBytes int64) {\n\tdebug.SetMemoryLimit(limitBytes)\n}\n```\n\nGo 1.19 以下版本没有 `debug.SetMemoryLimit`，因此 `setMemoryLimit` 是空操作，只记录日志：\n\n```go\nfunc setMemoryLimit(limitBytes int64) {\n\tlogs.Info(\"skip setting runtime memory limit on Go < 1.19, limit=%d\", limitBytes)\n}\n```\n\n这使得同一套代码可以在不同 Go 版本下编译，但只有 Go 1.19 及以上版本会真正影响运行时内存目标。\n\n## 与代码库其他部分的连接\n\n`interface_limiter` 的配置入口来自两处：\n\n- `src/tcc/async_update.go` 中的 `initInterfaceRateLimiterFromConfig` 调用 `InitConfig` 做初始化。\n- `src/tcc/async_update.go` 中的 `process` 调用 `UpdateConfigFromTCC` 处理 TCC 热更新。\n\n请求路径中，`src/middleware/access.go` 的 `Response` 调用 `Allow`，根据当前 `mkey` 的限流器状态判断是否继续处理。\n\n`mem_limit` 也接入 TCC 更新链路：`src/tcc/async_update.go` 的 `process` 调用 `ApplyFromPercent`，用配置值和环境变量 `MY_MEM_LIMIT` 计算运行时内存限制。\n\n## 贡献注意事项\n\n修改 `interface_limiter` 时要保持请求路径轻量。`Allow` 当前没有锁、没有 JSON 解析、没有配置读取，只依赖 `atomic.Value` 中的快照；如果新增逻辑，应避免在这里引入阻塞调用或共享状态写入。\n\n修改配置更新逻辑时要保留“校验失败不覆盖旧快照”的语义。`UpdateLimits` 现在先完整构建新 map，最后才 `current.Store`，这是热更新安全性的关键。\n\n修改 `mem_limit` 时要注意注释和实现的一致性。当前 `update` 的实际行为是 `percent <= 0` 关闭限制，设置为 `math.MaxInt64`；`ApplyFromPercent` 上方注释写的是 `percent < 0`，贡献代码时应以实际实现或测试期望为准，并同步修正不一致的说明。\n\n测试中已经覆盖了默认放行、配置关闭、热更新替换快照、非法配置保留旧快照、并发 `Allow` 与配置更新、以及内存限制解析校验等行为。新增行为应优先补充这些边界路径，尤其是热更新失败、未配置 `mkey`、Go 版本差异和环境变量解析失败场景。","remote-integrations":"# Remote Integrations\n\n## 模块概览\n\nRemote Integrations 模块负责把 account 服务连接到外部 HTTP/RPC 系统，主要包含三类能力：\n\n1. 通过 `src/remote/http_utils.go` 转发账号和配置变更请求到远端 HTTP 服务。\n2. 通过 `src/rpc/bucket.go` 调用 bktmeta SDK 查询 Bucket 信息，供配置校验使用。\n3. 通过 `src/rpc/decc.go` 初始化 DECC Kitex 客户端，并周期性刷新账号品类可嵌入元数据缓存。\n\n整体上，这个模块不直接处理业务规则，而是作为 service、validator 与外部系统之间的集成层。\n\n```mermaid\nflowchart TD\n    A[\"service/account.go\"] --> B[\"remote.CallRemoteCreateAccount 等\"]\n    C[\"service/config.go\"] --> D[\"remote.CallRemoteCreateConfig 等\"]\n    B --> E[\"remote.InvokeRemoteHTTP\"]\n    D --> E\n    F[\"validator.validateBucket\"] --> G[\"rpc.GetBucket\"]\n    G --> H[\"bktmeta-simple-sdk\"]\n    I[\"main.Init\"] --> J[\"rpc.Init\"]\n    J --> K[\"rpc.initDecc\"]\n    K --> L[\"刷新 DECC 元数据缓存\"]\n```\n\n## HTTP 远端调用\n\nHTTP 集成代码位于 `src/remote/http_utils.go`，核心入口是：\n\n```go\nfunc InvokeRemoteHTTP(ctx *gin.Context, method, path, data string) (interface{}, error)\n```\n\n它负责执行实际 HTTP 请求，其他 `CallRemote...` 函数都是围绕它的业务方法封装。\n\n### 请求构造\n\n`InvokeRemoteHTTP` 会从当前 `gin.Context` 中读取所有请求头，并原样设置到远端请求中：\n\n```go\nheader := make(map[string]string)\nfor k := range ctx.Request.Header {\n    header[k] = ctx.GetHeader(k)\n}\nreq := HttpRequest.NewRequest()\nreq.SetHeaders(header)\n```\n\n这意味着上游请求中的鉴权、trace、IDC 或其他网关注入头会被透传给远端服务。调用方不需要手动传 header。\n\n请求体由 `data string` 提供，并通过 `github.com/kirinlabs/HttpRequest` 的 JSON 模式发送：\n\n```go\nres, err = req.JSON().Post(path, data)\nres, err = req.JSON().Put(path, data)\nres, err = req.JSON().Delete(path, data)\n```\n\n当前只支持 `\"POST\"`、`\"PUT\"`、`\"DELETE\"` 三种 method。其他 method 会返回 `Unknown HTTP Method` 错误。\n\n### 响应约定\n\n`InvokeRemoteHTTP` 对远端响应有两层判断：\n\n1. HTTP 状态码必须是 `http.StatusOK`。\n2. 响应 JSON 中的 `code` 必须等于 `errno.CodeOK`。\n\n响应体会被解析为 `simplejson.Json`：\n\n```go\nresp, _ := simplejson.NewJson(body)\ncode, _ := resp.Get(\"code\").Int()\nif code != errno.CodeOK {\n    logs.CtxError(ctx, \"remote execute failed, resp: %v\", resp)\n    return nil, serverErr\n}\n\nreturn resp.Get(\"data\"), nil\n```\n\n成功时返回的是响应中的 `data` 节点，而不是完整响应对象。\n\n### 错误语义\n\n模块内定义了两个包级错误：\n\n```go\nvar (\n    callErr   = errors.New(\"http call method failed\")\n    serverErr = errors.New(\"server process failed\")\n)\n```\n\n`InvokeRemoteHTTP` 中：\n\n- 网络调用失败，或 HTTP 状态码不是 200，返回 `callErr`。\n- HTTP 调用成功但业务 `code != errno.CodeOK`，返回 `serverErr`。\n\n但外层 `CallRemote...` 方法捕获任意错误后通常都会记录日志并统一返回 `callErr`。因此 service 层多数情况下只能感知“远端调用失败”，无法区分远端业务失败和网络失败。\n\n## 账号远端调用\n\n账号相关封装包括：\n\n```go\nfunc CallRemoteCreateAccount(ctx *gin.Context, path string, param []byte) (interface{}, error)\nfunc CallRemoteUpdateAccount(ctx *gin.Context, path string, param []byte) (interface{}, error)\nfunc CallRemoteUpdateAccountStatus(ctx *gin.Context, path string, param []byte) (interface{}, error)\n```\n\n它们的共同模式是：\n\n1. 将 `param []byte` 转成字符串。\n2. 使用 `fmt.Sprintf(path, \"...\")` 填充远端方法名。\n3. 调用 `InvokeRemoteHTTP`。\n4. 失败时记录包含参数的上下文日志。\n\n对应关系如下：\n\n| 函数 | 远端方法名 | HTTP 方法 | 主要调用方 |\n| --- | --- | --- | --- |\n| `CallRemoteCreateAccount` | `AccountCreateAccount` | `POST` | `CreateAccount` |\n| `CallRemoteUpdateAccount` | `AccountUpdateAccount` | `PUT` | `UpdateAccount` |\n| `CallRemoteUpdateAccountStatus` | `AccountUpdateAccountStatus` | `PUT` | `UpdateAccountStatus` |\n\n`path` 不是最终 URL，而是一个格式化模板，必须能被 `fmt.Sprintf(path, methodName)` 正确填充。\n\n## 配置远端调用\n\n配置相关封装包括：\n\n```go\nfunc CallRemoteCreateConfig(ctx *gin.Context, path string, param []byte) (interface{}, error)\nfunc CallRemoteCopyConfig(ctx *gin.Context, path string, param []byte) (interface{}, error)\nfunc CallRemoteUpdateConfig(ctx *gin.Context, path string, param []byte) (interface{}, error)\nfunc CallRemoteDeleteConfig(ctx *gin.Context, path string, param []byte) (interface{}, error)\n```\n\n对应关系如下：\n\n| 函数 | 远端方法名 | HTTP 方法 | 主要调用方 |\n| --- | --- | --- | --- |\n| `CallRemoteCreateConfig` | `AccountMCreateConfig` | `POST` | `MCreateConfig` |\n| `CallRemoteCopyConfig` | `AccountMCopyConfig` | `POST` | `MCopyConfig` |\n| `CallRemoteUpdateConfig` | `AccountMCreateConfig` | `PUT` | `MUpdateConfig` |\n| `CallRemoteDeleteConfig` | `AccountMDeleteConfig` | `POST` | `DeleteConfig` |\n\n注意：`CallRemoteUpdateConfig` 使用的远端方法名也是 `AccountMCreateConfig`，区别在于 HTTP 方法是 `PUT`。如果远端服务按方法名区分操作，修改这里前需要确认兼容性。\n\n## 默认 Region 补齐\n\n配置创建、更新和复制调用在转发前会补齐 region 字段。\n\n### `AddDefaultRegionToUpdateConfigRequest`\n\n```go\nfunc AddDefaultRegionToUpdateConfigRequest(param []byte) (string, error)\n```\n\n该函数将参数反序列化为 `dto.MUpdateConfigRequest`。如果 `req.Region` 为空，则使用当前 IDC 推导默认 region：\n\n```go\nif req.Region == \"\" {\n    req.Region = util.GetRegion(env.IDC())\n}\n```\n\n随后重新序列化为 JSON 字符串。\n\n调用它的函数包括：\n\n- `CallRemoteCreateConfig`\n- `CallRemoteUpdateConfig`\n\n### `AddDefaultRegionToCopyConfigRequest`\n\n```go\nfunc AddDefaultRegionToCopyConfigRequest(param []byte) (string, error)\n```\n\n该函数将参数反序列化为 `dto.MCopyConfigRequest`。如果 `req.SourceRegion` 为空，则同样通过 `util.GetRegion(env.IDC())` 补齐：\n\n```go\nif req.SourceRegion == \"\" {\n    req.SourceRegion = util.GetRegion(env.IDC())\n}\n```\n\n调用它的函数是 `CallRemoteCopyConfig`。\n\n这两个函数会在 JSON 解析或序列化失败时直接返回错误。外层调用函数不会把这类错误包装成 `callErr`，因此调用方可以识别参数结构问题。\n\n## Bucket RPC 集成\n\nBucket 查询位于 `src/rpc/bucket.go`：\n\n```go\nvar BktCli *bktClient.Client\n\nfunc GetBucket(ctx context.Context, bucketName string) (*model.BucketInfo, error) {\n    return BktCli.GetBucket(ctx, bucketName)\n}\n```\n\n`BktCli` 在 `rpc.Init()` 中初始化：\n\n```go\nBktCli, err = bktClient.NewClient(\n    bktClient.WithCallingPSM(\"toutiao.videoarch.account\"),\n)\n```\n\n该能力主要被配置校验链路使用：\n\n```text\nMUpdateConfig\n  -> ValidateMUpdateConfigRequest\n  -> ValidateMCreateConfigRequest\n  -> validateConfigs\n  -> validateStorageConfig\n  -> validateBucket\n  -> rpc.GetBucket\n```\n\n`BPMCreateConfigs` 也会通过同一条校验链路调用 `GetBucket`。\n\n因此，Bucket RPC 的可用性会影响配置创建、更新以及 BPM 批量创建配置等流程的校验结果。\n\n## RPC 初始化\n\nRPC 模块统一入口是 `src/rpc/base.go`：\n\n```go\nfunc Init()\n```\n\n它完成两件事：\n\n1. 初始化 bktmeta 客户端 `BktCli`。\n2. 调用 `initDecc()` 初始化 DECC 集成。\n\n调用方包括：\n\n- `main`\n- 测试中的 `TestMain`\n\n如果 bktmeta 客户端初始化失败，代码只记录错误日志，不会阻断服务启动：\n\n```go\nif err != nil {\n    logs.Errorf(\"init bktmeta client error: %v\", err)\n}\n```\n\n后续如果调用 `GetBucket`，需要确保 `BktCli` 已成功初始化，否则会有空指针风险。\n\n## DECC 集成与缓存刷新\n\nDECC 相关逻辑位于 `src/rpc/decc.go`。它用于从 DECC channel integration 服务拉取 TOS channel data，并提取可嵌入的 metadata 字段名，缓存在进程内：\n\n```go\nvar accountCategoryEmbeddedMeta map[string]struct{}\n\nfunc GetAccountDeccEmbeddedMeta() map[string]struct{} {\n    return accountCategoryEmbeddedMeta\n}\n```\n\n该缓存被 `GetDeccEmbeddedSchema` 使用，用于账号品类 schema 相关逻辑。\n\n### 初始化开关\n\n`initDecc()` 会先检查配置：\n\n```go\nif config.Conf.Decc.Switch {\n    ...\n} else {\n    logs.Info(\"current idc not support decc\")\n}\n```\n\n只有 `config.Conf.Decc.Switch` 为 true 时才会创建 Kitex 客户端：\n\n```go\ndeccCli, err = channelintegrationservice.NewClient(\n    config.Conf.Decc.PSM,\n    client.WithCluster(config.Conf.Decc.Cluster),\n    client.WithRPCTimeout(timeout),\n    client.WithConnectTimeout(timeout),\n)\n```\n\n超时时间由常量 `timeout = 10 * time.Second` 控制。\n\n### 刷新流程\n\n`startDeccMetaCacheRefresh` 会先同步刷新一次缓存，然后启动 goroutine 按 ticker 周期刷新：\n\n```go\nstartDeccMetaCacheRefresh(\n    time.NewTicker(util.RandomCacheExpireTime(10 * time.Minute)),\n)\n```\n\n刷新链路如下：\n\n```text\ninitDecc\n  -> startDeccMetaCacheRefresh\n  -> refreshDeccAccountCategoryEmbeddedMetadata\n  -> getBucketEmbeddedMetadata\n  -> getAllChannels\n  -> getAllChannelData\n```\n\n其中 `util.RandomCacheExpireTime(10 * time.Minute)` 用来生成带随机偏移的刷新周期，避免多实例同时集中请求 DECC。\n\n### 元数据提取\n\n`getBucketEmbeddedMetadata` 的核心逻辑是：\n\n1. 调用 `getAllChannels` 获取全部非 deprecated 的 TOS channel。\n2. 对每个 channel 并发调用 `getAllChannelData`。\n3. 对每条 channel data 的 `Idl` 字段做两层 JSON 解析。\n4. 将 `content` JSON 中的 key 作为 embedded metadata 名称写入集合。\n\n并发限制通过容量为 5 的 channel 实现：\n\n```go\nch := make(chan struct{}, 5)\n```\n\n最终结果先写入 `sync.Map`，再转换成普通 `map[string]string`。刷新成功后，`refreshDeccAccountCategoryEmbeddedMetadata` 会构造新的 `map[string]struct{}` 并整体替换 `accountCategoryEmbeddedMeta`。\n\n### Channel 分页\n\n`getAllChannels` 使用分页接口拉取 channel：\n\n```go\nreq := &decc.GetChannelListResquest{\n    ChannelType: \"TOS\",\n    Page:        int32(i),\n    Limit:       channelPageSize,\n}\n```\n\n相关分页常量：\n\n```go\nconst (\n    channelPageSize = 100\n    dataPageSize    = 30\n    maxPageNum      = 10000\n)\n```\n\n当响应中的 `Channel` 为空时停止分页。状态为 `\"deprecated\"` 的 channel 会被跳过。\n\n如果 `deccCli == nil`，`getAllChannels` 返回空列表而不是错误：\n\n```go\nif deccCli == nil {\n    return []*decc.Channel{}, nil\n}\n```\n\n这使得 DECC 未启用时刷新流程可以自然得到空缓存。\n\n### Channel Data 分页\n\n`getAllChannelData` 先分页获取 channel data 列表，再对每条非 deprecated 数据调用详情接口：\n\n```go\ndata, err := deccCli.GetChannelData(\n    ctx,\n    &decc.GetChannelDataResquest{DataID: d.Id},\n)\n```\n\n详情接口失败时会跳过该条数据并继续处理其他数据：\n\n```go\nif err != nil {\n    continue\n}\n```\n\n因此单条 channel data 读取失败不会导致整个刷新失败；但分页列表接口失败或 `BaseResp.StatusCode != 0` 会返回错误并终止当前 channel 的数据拉取。\n\n## 与业务层的连接\n\nRemote Integrations 模块被业务层以三种方式使用：\n\n| 调用方 | 集成函数 | 作用 |\n| --- | --- | --- |\n| `CreateAccount` | `CallRemoteCreateAccount` | 创建账号后同步远端账号系统 |\n| `UpdateAccount` | `CallRemoteUpdateAccount` | 更新远端账号信息 |\n| `UpdateAccountStatus` | `CallRemoteUpdateAccountStatus` | 更新远端账号状态 |\n| `MCreateConfig` | `CallRemoteCreateConfig` | 创建配置并转发远端 |\n| `MCopyConfig` | `CallRemoteCopyConfig` | 复制配置并转发远端 |\n| `MUpdateConfig` | `CallRemoteUpdateConfig` | 更新配置并转发远端 |\n| `DeleteConfig` | `CallRemoteDeleteConfig` | 删除配置并转发远端 |\n| `validateBucket` | `GetBucket` | 校验存储配置中的 bucket 是否有效 |\n| `GetDeccEmbeddedSchema` | `GetAccountDeccEmbeddedMeta` | 获取 DECC 缓存中的 embedded metadata 集合 |\n\n## 贡献注意事项\n\n修改 HTTP 集成时，需要保持远端响应格式约定：`InvokeRemoteHTTP` 只认 `code` 和 `data` 字段。如果远端协议变化，应优先在这里集中适配，避免在各个 `CallRemote...` 函数中分散处理。\n\n新增远端方法时，建议沿用现有封装模式：\n\n```go\nfunc CallRemoteXxx(ctx *gin.Context, path string, param []byte) (interface{}, error) {\n    val := string(param)\n    path = fmt.Sprintf(path, \"AccountXxx\")\n\n    res, err := InvokeRemoteHTTP(ctx, \"POST\", path, val)\n    if err != nil {\n        logs.CtxError(ctx, \"call xxx method failed, err: %v, param: %s\", err, val)\n        return nil, callErr\n    }\n    return res, nil\n}\n```\n\n如果请求需要默认 region，应先复用或扩展 `AddDefaultRegionToUpdateConfigRequest`、`AddDefaultRegionToCopyConfigRequest` 的模式，基于 DTO 做结构化 JSON 处理，不要直接拼接字符串。\n\n修改 DECC 缓存逻辑时，需要注意 `accountCategoryEmbeddedMeta` 是进程内全局变量，目前刷新时采用整体替换 map 的方式。读取方通过 `GetAccountDeccEmbeddedMeta` 直接拿到 map 引用，因此如果后续需要在运行时修改 map 内容，应考虑并发读写安全。\n\n修改 `rpc.Init()` 时，需要评估启动链路影响。当前 bktmeta 初始化失败不会阻断启动，而 DECC 初始化失败也只记录日志并返回。改变这种容错行为会影响 `main` 启动路径和测试初始化路径。","shared-utilities":"# Shared Utilities\n\n# 共享工具模块\n\n共享工具模块由 `src/constant` 和 `src/util` 组成，提供跨服务复用的常量、请求参数解析、区域归一化、事务辅助、指标上报、限流客户端初始化、本地缓存和 ID 号段生成能力。它不承载业务流程本身，而是被 `service`、`dao`、`middleware`、`validator`、`remote`、`rpc` 和 `main` 等层调用。\n\n```mermaid\nflowchart TD\n    A[控制器/服务/DAO/中间件] --> B[util 参数与事务工具]\n    A --> C[util 区域工具]\n    A --> D[util 指标工具]\n    A --> E[util ID 生成器]\n    F[constant 常量] --> A\n    E --> G[id_fetcher 表]\n    E --> H[tcc.GetIdGeneratorConfig]\n    D --> I[gopkg metrics]\n```\n\n## 常量定义\n\n`src/constant/const.go` 集中维护跨模块共享的字符串、枚举和默认值，避免业务代码散落硬编码。\n\n常用状态包括：\n\n- `StatusEnabled`\n- `StatusDisabled`\n- `StatusDeleted`\n- `StatusUnaudited`\n\n`StatusList` 汇总了账号状态列表，适合用于参数校验或枚举判断。\n\n模块枚举包括：\n\n- `ModuleGlobal`\n- `ModuleUpload`\n- `ModuleTranscode`\n- `ModulePlay`\n- `ModulePicture`\n- `ModuleTasks`\n- `ModuleStorage`\n- `ModuleOpenAPI`\n- `ModuleAccess`\n- `ModuleStorageGW`\n- `ModuleGeneral`\n- `ModuleMedia`\n- `ModuleBizCallback`\n\n`ModuleList` 是所有模块名的统一列表。\n\nOpenAPI 权限映射由 `OpenapiMethodPermission` 维护：\n\n```go\nvar OpenapiMethodPermission = map[string]string{\n    \"openapi.accounts.get\":    \"account.openapi.get\",\n    \"openapi.accounts.modify\": \"account.openapi.modify\",\n}\n```\n\n分页默认值定义为：\n\n- `DefaultPageSize = 20`\n- `DefaultAmount = 0`\n- `MaxPageSize = 50`\n\nHTTP 头常量包括 `HeaderAuthorization`、`HeaderRealIP`、`HeaderRateLimitLimit`、`HeaderRateLimitRemaining` 和 `HeaderRateLimitReset`，用于鉴权、真实 IP 和限流响应头处理。\n\n## Gin 参数解析\n\n`src/util/common.go` 提供对 `gin.Context` 的轻量参数解析函数。它们只负责读取和类型转换，不做业务校验。\n\n查询参数函数：\n\n- `QueryInt64(c, key)`\n- `QueryUInt64(c, key)`\n- `QueryBool(c, key)`\n- `QueryString(c, key)`\n- `QueryInt64Slice(c, key)`\n\n路径参数函数：\n\n- `ParamInt64(c, key)`\n- `ParamUInt64(c, key)`\n- `ParamString(c, key)`\n\n`QueryString` 和 `ParamString` 在值为空字符串时返回 `*ErrEmpty`：\n\n```go\ntype ErrEmpty struct {\n    key string\n}\n\nfunc (err *ErrEmpty) Error() string {\n    return fmt.Sprintf(\"%s is empty\", err.key)\n}\n```\n\n使用模式通常是控制器或服务层先解析参数，再进入业务逻辑。例如 `DeleteAccess` 调用 `ParamInt64` 解析路径参数，`UpdateAccountStatus` 调用 `ParamString` 读取状态类参数。\n\n需要注意：数值解析函数直接调用 `strconv.ParseInt` 或 `strconv.ParseUint`。如果参数缺失，传入的是空字符串，最终会返回解析错误，而不是 `ErrEmpty`。\n\n## 随机时间扰动\n\n`RandomCacheExpireTime(cacheExpireTime)` 和 `RandomWaitTime(cacheExpireTime)` 用于减少缓存或等待行为的集中触发。\n\n`RandomCacheExpireTime` 在原始 TTL 基础上加入随机扰动：\n\n```go\ninc := int64((random.Float64() - 0.5) * 2 * randFactor * float64(cacheExpireTime))\nreturn cacheExpireTime + time.Duration(inc)\n```\n\n当前 `randFactor = 0.5`，所以返回范围约为：\n\n```text\nttl * 0.5 到 ttl * 1.5\n```\n\n`RandomWaitTime` 返回 `0` 到 `cacheExpireTime` 之间的随机等待时间。调用方包括 `initDecc` 等初始化流程，用于错峰刷新或错峰等待。\n\n## 区域归一化\n\n`src/util/region.go` 把底层 IDC 名称归一化为账号系统使用的区域标识。核心函数是：\n\n- `GetRegion(idc string) string`\n- `IsRegionSupported(idc string) bool`\n- `IsInnerProdEnv(idc string) bool`\n- `GetSyncIDCs(syncInfo string) []string`\n\n`GetRegion` 的行为：\n\n1. 如果传入 `R_ALL`，直接返回 `\"all\"`。\n2. 如果传入空字符串，返回当前运行环境 IDC 对应的默认区域。\n3. 如果 `regionMapping` 中存在传入 IDC 的小写形式，返回映射后的区域。\n4. 否则回退到默认区域。\n\n默认区域通过 `getDefaultRegion` 计算，并使用 `atomic.Value` 缓存：\n\n```go\ndefaultRegion.Store(regionMapping[env.IDC()])\n```\n\n区域工具被配置、域名和远程请求逻辑使用。例如：\n\n- `CreateDomain` 校验创建域名请求时通过 `GetRegion` 获取默认区域。\n- `ListConfigsByCondition` 解析查询条件时通过 `GetRegion` 补齐区域。\n- `MUpdateConfig` 的校验链路会调用 `IsRegionSupported` 判断区域是否合法。\n- `AddDefaultRegionToUpdateConfigRequest` 在远程请求中补默认区域。\n\n`GetSyncIDCs(syncInfo)` 接收 JSON 字符串，解析为 `map[string]string` 后，把其中的区域键转换为 IDC 列表。它会将 key 转成大写后查询 `regionIDC`。\n\n## 事务辅助\n\n`src/util/tools.go` 中的 `BeginTX` 和 `RollbackTX` 是 GORM 事务的公共封装。\n\n```go\nfunc BeginTX(db *gorm.DB) (tx *gorm.DB, err error) {\n    tx = db.Begin()\n    if len(tx.GetErrors()) > 0 {\n        err = tx.Error\n    }\n    return\n}\n```\n\n`RollbackTX(tx, err)` 会执行回滚，并把原始错误和回滚错误合并返回：\n\n- 如果回滚没有错误，返回原始错误。\n- 如果原始错误为空，返回事务错误。\n- 如果原始错误是 `gorm.Errors`，追加事务错误。\n- 否则构造新的 `gorm.Errors`。\n\n这些函数被 ID 号段生成器和 DAO 层复用。例如 `GenId`、`UpdateIdFetcher`、`CreateIdFetcher`、`createAccount` 都依赖这组事务工具。\n\n## 重试工具\n\n`RetryDo(ctx, info, times, run, stopErrors...)` 用于对可重试操作做固定次数重试。调用方传入 `RunFunc`：\n\n```go\ntype RunFunc func() error\n```\n\n执行逻辑：\n\n1. 最多执行 `times` 次。\n2. 每次失败后通过 `logs.CtxError` 打印错误。\n3. 第 2 次及以后执行前通过 `logs.CtxWarn` 打印重试日志。\n4. 如果错误命中 `stopErrors`，立即停止重试并返回该错误。\n5. 如果某次执行成功，直接返回 `nil`。\n\nDAO 层的账号和访问密钥写入流程会使用它，例如 `createAccount`、`updateAccount`、`createAccess`、`deleteAccess`、`getAccountAmount`。\n\n注意当前停止条件使用的是：\n\n```go\nif errors.Is(e, err) {\n    return\n}\n```\n\n因此调用方传入的 `stopErrors` 需要和实际错误匹配该方向的 `errors.Is` 判断。\n\n## ID 号段生成器\n\n`src/util/id_gen_util.go` 提供基于数据库表 `id_fetcher` 的 ID 号段分配能力。初始化入口是：\n\n```go\nfunc InitIdGenerator(db *gorm.DB) {\n    idGenDb = db\n}\n```\n\n`InitDb` 会调用 `InitIdGenerator` 注入数据库连接。后续 `GenId`、`ListIdFetchers`、`UpdateIdFetcher` 和 `CreateIdFetcher` 都依赖包级变量 `idGenDb`。\n\n### 数据模型\n\n`IdFetcher` 对应数据库表 `id_fetcher`：\n\n```go\ntype IdFetcher struct {\n    ID          uint64\n    Region      string\n    DBTableName string\n    CurrentId   int64\n    MaxId       int64\n    CreateAt    time.Time\n    UpdatedAt   time.Time\n}\n```\n\n表名由 `TableName()` 固定返回：\n\n```go\nfunc (IdFetcher) TableName() string {\n    return \"id_fetcher\"\n}\n```\n\n`GetRemainingCount()` 返回当前号段剩余数量：\n\n```go\nreturn d.MaxId - d.CurrentId\n```\n\n### 生成 ID\n\n`GenId(ctx, tableName, idCount)` 是核心分配函数。\n\n执行流程：\n\n1. 调用 `tcc.GetIdGeneratorConfig(ctx)` 读取 ID 生成配置。\n2. 检查总开关、目标表是否支持、剩余量告警阈值是否存在。\n3. 如果配置不满足，返回长度为 `idCount` 的零值数组，不报错。\n4. 开启事务。\n5. 使用 `select * from id_fetcher where region = ? and table_name = ? for update` 加行锁。\n6. 判断 `MaxId - CurrentId` 是否足够分配。\n7. 生成连续 ID：`CurrentId + 1` 到 `CurrentId + idCount`。\n8. 更新 `id_fetcher.current_id`。\n9. 提交事务。\n10. 查询目标业务表，检查生成的 ID 是否已经存在。\n11. 如果剩余 ID 小于等于阈值，通过 `logs.Errorf` 打告警日志。\n\n事务内的行锁保证同一 `region + table_name` 的并发分配不会重复。事务提交后再检查业务表中是否已有冲突 ID，用于发现号段配置与真实数据不一致的问题。\n\n配置未开启时返回零值数组是一个重要行为：调用方不能只根据 `err == nil` 判断是否拿到了有效 ID，还需要理解当前表是否启用了号段生成。\n\n### 管理号段\n\n`ListIdFetchers(ctx)` 返回所有 `id_fetcher` 记录。\n\n`CreateIdFetcher(ctx, fetcher)` 创建新号段，流程是：\n\n1. 调用 `validateFetcherParam` 校验 `Region`、`DBTableName`、`CurrentId` 和 `MaxId`。\n2. 查询目标业务表，确认 `[CurrentId, MaxId]` 区间内没有已存在 ID。\n3. 开启事务。\n4. 调用 `tx.Create(fetcher)` 插入记录。\n5. 提交事务。\n\n`UpdateIdFetcher(ctx, fetcher)` 更新已有号段，流程类似，但会先对 `region + table_name` 对应记录加行锁，并校验数据库中的 `ID` 和请求中的 `fetcher.ID` 一致，避免误更新。\n\n`validateFetcherParam(fetcher)` 的规则：\n\n- `Region` 不能为空。\n- `DBTableName` 不能为空。\n- `MaxId` 必须大于 `CurrentId`。\n\n## 指标上报\n\n`src/util/metrics.go` 封装了 `gopkg/metrics` 的默认客户端：\n\n```go\nmetricsClient = metrics.NewDefaultMetricsClientV2(\"toutiao.videoarch.account\", true)\n```\n\n公共函数包括：\n\n- `EmitThroughput(name, tags...)`\n- `EmitLatency(name, start, tags...)`\n- `EmitStore(name, value, tags...)`\n- `EmitError(mkey, tags...)`\n\n命名规则是给传入名称追加后缀：\n\n```go\nname + \".throughput\"\nname + \".latency\"\nname + \".store\"\nmkey + \".error\"\n```\n\n`EmitLatency` 使用微秒作为耗时单位：\n\n```go\ncost := time.Since(start).Nanoseconds() / 1000\n```\n\n指标上报失败时只记录 warning，不中断业务流程。调用方包括：\n\n- `middleware/access.go` 中的 `Response`、`OpenAPIResponse`\n- `middleware/janus_access.go` 中的 `JanusResponse`\n- `dao/account.go` 中的账号创建、更新、状态更新\n- `dao/access.go` 中的访问密钥创建、查询、删除\n- `service/account.go` 中的账号查询链路\n- `controllers/account.go` 中的搜索接口\n\n## 限流客户端\n\n`src/util/rate_limit.go` 负责初始化 Harden 限流客户端：\n\n```go\nvar HardenCli *harden.Client\n```\n\n`InitRateLimiter()` 使用运行配置构造客户端：\n\n```go\nHardenCli = harden.NewClient(\n    config.Conf.Meta.PSM,\n    harden.WithCluster(config.Conf.Harden.Cluster),\n    harden.UseHTTP(),\n    harden.WithTimeout(100*time.Millisecond),\n    harden.PassOnErr(),\n)\n```\n\n`main` 和测试初始化流程会调用 `InitRateLimiter`。`harden.PassOnErr()` 表示限流服务异常时放行请求，避免限流系统故障直接阻断主业务。\n\n## 认证与格式工具\n\n`ParseBaseAuth(auth)` 解析 HTTP Basic Auth 头：\n\n1. 要求字符串以 `\"Basic \"` 开头。\n2. 对后续内容做 base64 解码。\n3. 按第一个 `:` 分割用户名和密码。\n4. 返回 `(u, p, true)`。\n5. 任一步失败都返回零值和 `false`。\n\n示例：\n\n```go\nu, p, ok := util.ParseBaseAuth(authHeader)\nif !ok {\n    // 认证头格式非法\n}\n```\n\n`FormatKV(key, value)` 返回 `key=value` 字符串，适合构造日志字段或简单配置片段。\n\n`GetUUID()` 返回去掉连字符的 UUID 字符串：\n\n```go\nreturn strings.ReplaceAll(uuid.New().String(), \"-\", \"\")\n```\n\n## 环境与开关工具\n\n`CheckIfSupportCreateProcess()` 根据当前 IDC 判断是否支持创建流程：\n\n```go\nif idc := env.IDC(); idc == env.DC_ALISG || idc == env.DC_MALIVA {\n    return false\n}\nreturn true\n```\n\n`InitCheckSuffix()` 从 `config.Conf.CheckSuffix` 初始化包级原子变量 `checkSuffix`。\n\n`NeedCheckAccountNameSuffix()` 读取当前后缀校验开关：\n\n```go\nreturn atomic.LoadInt32(&checkSuffix)\n```\n\n这组函数用于把运行环境和配置中心中的开关转换成业务层可直接读取的状态。\n\n## 本地缓存\n\n`LocalCache` 是一个基于 `sync.Map` 的简单内存缓存：\n\n```go\ntype LocalCache struct {\n    m sync.Map\n    t sync.Map\n}\n```\n\n其中：\n\n- `m` 存储 key 到 value。\n- `t` 存储 key 到过期时间。\n\n方法包括：\n\n- `Add(key, value, expiresAt)`\n- `Delete(key)`\n- `Get(key)`\n- `GetIncludeExpired(key)`\n\n`Get` 会检查过期时间：\n\n```go\nif expire.(time.Time).Sub(time.Now()) >= 0 {\n    return v, ok\n}\nreturn nil, false\n```\n\n如果 key 没有对应过期时间，则只要 `m` 中存在值就返回。`GetIncludeExpired` 不检查过期时间，直接读取原始值。\n\n需要注意：`Get` 发现过期后只返回 miss，不会主动删除 `m` 和 `t` 中的数据。如果缓存 key 数量持续增长，调用方需要自行在合适时机调用 `Delete` 或控制 key 空间。\n\n## 与业务代码的连接方式\n\n共享工具模块主要服务于以下几类调用链：\n\n配置与区域校验链路：\n\n```text\nMUpdateConfig\n  -> ValidateMUpdateConfigRequest\n  -> ValidateMCreateConfigRequest\n  -> ValidateRegion\n  -> IsRegionSupported\n```\n\n域名创建区域补齐链路：\n\n```text\nCreateDomain\n  -> ValidateCreateDomainRequest\n  -> GetRegion\n  -> getDefaultRegion\n```\n\n账号查询指标链路：\n\n```text\nMGetAllAccountWithConfig\n  -> mGetAccountWithConfig1\n  -> mgetAccountWithConfig\n  -> EmitLatency\n```\n\nID 分配链路：\n\n```text\nInitDb\n  -> InitIdGenerator\n\n业务创建逻辑\n  -> GenId\n  -> BeginTX\n  -> IdFetcher.GetRemainingCount\n  -> RollbackTX / Commit\n```\n\n中间件指标链路：\n\n```text\nResponse / OpenAPIResponse / JanusResponse\n  -> EmitThroughput / EmitLatency / EmitError\n```\n\n这些调用关系说明：`util` 包虽然没有复杂业务模型，但它位于多个关键路径上。修改区域映射、事务封装、指标命名、ID 生成行为或参数解析错误语义时，需要同时考虑控制器、服务、DAO、中间件和验证器的影响。\n\n## 贡献注意事项\n\n修改 `constant` 中的枚举时，应同步检查验证逻辑、数据库字段值、OpenAPI 入参和已有数据。特别是状态、模块名、区域名这类字符串，一旦变更会影响接口兼容性。\n\n修改 `GetRegion` 或 `regionMapping` 时，需要确认默认区域回退行为是否仍符合预期。未知 IDC 当前会回退到默认区域，而不是返回错误。\n\n修改 `GenId` 时，需要保持事务内行锁和 `CurrentId` 更新的原子性。`id_fetcher` 表是并发安全的核心边界，不能把 `for update` 查询和更新拆到不同事务中。\n\n修改 `RollbackTX` 时，要注意 DAO 层依赖它返回组合错误。吞掉原始错误或回滚错误都会降低排障能力。\n\n使用 `LocalCache` 时，不要假设它会自动清理过期 key。它适合小规模、本进程、可容忍短期脏数据的缓存场景，不适合作为强一致缓存或无限 key 空间缓存。\n\n使用指标函数时，传入的 `name` 应保持稳定。因为最终指标名由函数追加 `.throughput`、`.latency`、`.store` 或 `.error`，调用方不应重复拼接这些后缀。","validation-and-error-handling":"# Validation and Error Handling\n\n## 模块概览\n\n`src/errno` 和 `src/validator` 共同承担账号系统的错误表达与请求校验职责。\n\n`errno.Payload` 是对外响应和内部错误传递的核心结构；它实现了 `error` 接口，因此同一个对象既可以作为业务错误返回，也可以被序列化为接口响应。`validator` 则集中处理账号、配置、域名、分类 schema 等写入类请求的参数校验，并在需要时访问 `dao.Db`、`rpc.GetBucket` 和 `util` 辅助函数完成跨模块校验。\n\n## 错误模型\n\n`errno.Payload` 定义在 `src/errno/code.go`：\n\n```go\ntype Payload struct {\n\tCode    int         `json:\"code\"`\n\tMessage string      `json:\"message\"`\n\tData    interface{} `json:\"data,omitempty\"`\n\tAlert   bool        `json:\"-\"`\n}\n```\n\n它的 `Error()` 方法返回 `Message`，所以所有预定义错误，例如 `errno.ErrAccountExists`、`errno.ErrRegionInvalid`、`errno.ErrAccessKeyNotExists`，都可以直接作为 `error` 返回。\n\n常用构造函数：\n\n- `OK(data interface{}) *Payload`：返回业务成功响应，`Code` 为 `CodeOK`，`Message` 为 `\"ok\"`。\n- `Error(err error) *Payload`：将普通 `error` 包装成 `Payload`；如果 `err == nil`，返回 `OK(nil)`。\n- `ErrorWithCode(code int, err error) *Payload`：用指定 code 包装错误。\n- `ParseCBError(err error) error`：把 `gobreaker.ErrOpenState` 和 `gobreaker.ErrTooManyRequests` 转换成数据库熔断错误文案。\n\n需要注意，`ErrAccountExists`、`ErrUnauthorized` 等预定义错误是包级 `*Payload` 指针。调用方应把它们当作只读错误使用，不应修改其中的 `Data`、`Message` 或 `Alert` 字段，否则会影响后续请求。\n\n## 校验入口\n\n`src/validator/validator.go` 提供多个面向 service 层的入口函数：\n\n- `ValidateCreateAccountRequest`：创建账号前校验账号名、地域、账号后缀、重复账号和重复 AccessKey。\n- `ValidateMCreateConfigRequest`：批量创建配置前校验 AccessKey、地域、账号存在性和配置内容。\n- `ValidateMUpdateConfigRequest`：复用 `ValidateMCreateConfigRequest`，用于批量更新配置。\n- `ValidateMCopyConfigRequest`：复制配置前校验源地域、目标地域、AccessKey 和模块列表。\n- `ValidateCreateDomainRequest`：创建域名配置时校验域名、状态、类型，并补齐关系字段。\n- `ValidateCreateDomainAccountRelRequest`：创建域名账号关系时校验域名、账号名，并补齐 region/category/module/rel type。\n- `ValidateCreateAccountCategorySchemaRequest`：创建账号分类 schema 时校验账号、分类、schema 类型和值。\n- `ValidateUpdateAccountCategorySchemaRequest`：更新 schema 时校验 ID 和嵌入元数据格式。\n- `ValidateMCopyDomainAccountRelRequest`：复制域名账号关系时校验账号名和地域。\n- `RefinePageParams`：规范分页参数，限制默认值和最大值。\n\n基础枚举校验由 `ValidateStatus`、`ValidateRuleType`、`ValidateModule` 和 `ValidateRegion` 提供。它们依赖 `constant.StatusList`、`constant.ModuleList`、规则类型常量，以及 `util.IsRegionSupported`。\n\n## 配置校验链路\n\n配置写入的核心逻辑在 `validateConfigs`。它会遍历传入的 `[]*dto.VideoConfig`，先检查 `Module` 是否在允许列表中，再按模块类型执行更深层校验。\n\n```mermaid\nflowchart TD\n    A[\"服务层 MCreate/MUpdate\"] --> B[\"ValidateMCreateConfigRequest\"]\n    B --> C[\"validateConfigs\"]\n    C --> D[\"ValidateModule\"]\n    C --> E[\"validateStorageConfig\"]\n    E --> F[\"validateBucket\"]\n    F --> G[\"rpc.GetBucket\"]\n    F --> H[\"dao.Db.MGetAccount\"]\n```\n\n`validateConfigs` 的主要行为：\n\n1. 对每个 `dto.VideoConfig` 调用 `ValidateModule`。\n2. 当 `ignoreCheckStorageConfig == false` 且模块是 `constant.ModuleStorage` 时，进入存储配置校验。\n3. 首次需要存储校验时，通过 `getAccountExistBucketSet` 查询账号已有 bucket，用于兼容历史错误配置。\n4. 当模块是 `constant.ModuleGlobal` 且 `CKey == constant.BucketSelectionStrategyCKey` 时，尝试把 `CValue` 反序列化为 `dto.BucketSelectionStrategy`，失败则返回 `CodeBadRequest`。\n\n`ValidateCreateAccountRequest` 调用 `validateConfigs` 时传入 `ignoreCheckStorageConfig = true`，因此新建账号阶段不会检查存储 bucket。`ValidateMCreateConfigRequest` 和 `ValidateMUpdateConfigRequest` 是否检查存储配置由调用方传入的 `ignoreCheckStorageConfig` 决定。\n\n## 存储 Bucket 校验\n\n`validateStorageConfig` 负责解析存储配置并逐个校验 bucket。它兼容三类历史格式：\n\n- `CKey == \"bucket\"`：直接跳过校验。\n- `CKey` 包含 `\"migrater_rules\"`：直接跳过校验。\n- `CValue` 是普通 bucket 名：反序列化 `dto.StorageConfig` 失败时，按单个 bucket 名处理。\n- `CValue` 是 JSON：按 `dto.StorageConfig.IDC` 和 `dto.StorageConfig.Default` 中的 bucket 列表逐个处理。\n\n对于账号已有 bucket，`validateStorageConfig` 会直接放行。这是为了兼容历史上已经配置过但不符合当前规则的 bucket。\n\n真正的跨账号安全校验在 `validateBucket` 中完成：\n\n1. 如果 `rpc.BktCli == nil`，直接放行。\n2. 调用 `rpc.GetBucket(ctx, bucketName)` 获取 bucket 信息。\n3. bucket 不存在时返回 `CodeBadRequest`，消息为 `bucket: <name> not found`。\n4. 远程查询失败时返回 `CodeInternalErr`。\n5. 查询当前账号信息。\n6. 调用 `validateHasOwnerBucketConfig` 校验 bucket owner。\n7. 如果 owner 为空或 owner 账号不存在，再调用 `validateEmptyOwnerBucketConfig` 按已有配置判断是否允许复用。\n\n跨 TopAccount 的限制有两条：\n\n- bucket 有 owner 时，只有 owner 账号本身或相同 `TopAccountID` 的账号可以使用。\n- bucket 没有有效 owner 时，如果它已经被其他账号配置过，也只能被相同账号或相同 `TopAccountID` 的账号继续使用。\n\n`getOneExistConfig` 使用 `dao.Db.MGetStorageConfigByBucketName` 查询历史配置，并再次解析 `CValue`，避免因为数据库 `like` 查询把 `tos-cn-v-5` 和 `tos-cn-v-51` 这类前缀匹配结果混淆。\n\n## 账号创建校验\n\n`ValidateCreateAccountRequest` 的顺序很重要：\n\n1. 先调用 `validateConfigs` 校验随账号创建传入的配置，但跳过存储 bucket 检查。\n2. 校验 `AccountName` 非空，且不能以 `\"__\"` 开头。\n3. 调用 `ValidateRegion` 校验地域；失败时返回 `errno.ErrRegionMissing`，而不是 `ErrRegionInvalid`。\n4. 当 `util.NeedCheckAccountNameSuffix() == constant.NeedCheckSuffix` 时，账号名必须以 `env.IDC()` 结尾。\n5. 通过 `dao.Db.MGetVideoAccount` 检查账号名是否已存在，包含已删除账号。\n6. 如果请求指定了 `AccessKey`，再次查询并确保 AccessKey 未被其他账号使用。\n\n这意味着账号名冲突和 AccessKey 冲突都会返回 `errno.ErrAccountExists`。\n\n## 域名与关系校验\n\n`ValidateCreateDomainRequest` 校验 `dto.Domain` 本身，并标准化其 `AccountRels`：\n\n- `Domain` 不能为空。\n- `Status` 不能为空。\n- `Type` 不能大于 `dto.InternalPrivateDomain`。\n- 每个关系的 `Region` 会被 `util.GetRegion` 归一化。\n- 空 `Category` 会补为 `dto.DomainDefaultCategory`。\n- 空 `Module` 会补为 `dto.DomainDefaultModule`。\n- `RelType` 通过 `dto.BuildDomainRelTypeFromConfig(rel.Region, rel.Module)` 生成。\n\n`ValidateCreateDomainAccountRelRequest` 处理单条 `dto.DomainAccountRel`。它会先 trim `Domain`，再通过 `dao.Db.GetDomain` 确认域名存在，并把 `DomainType` 设置为数据库中的类型。默认情况下还会通过 `dao.Db.MGetAccount` 校验账号存在；当 `ignoreCheckAccountName == true` 时跳过账号存在性检查。\n\n## 分类 Schema 校验\n\n`ValidateCreateAccountCategorySchemaRequest` 校验 `dto.AccountCategorySchema`：\n\n- `AccountName` 不能为空。\n- `Category` 不能为空。\n- 如果 `SchemaType == dto.SchemaEmbeddedMetadata`，调用 `checkEmbeddedMetadataValue` 校验 `SchemaValue` 能否反序列化为 `dto.EmbeddedMetadataSchema`。\n- 通过 `dao.Db.MGetAccount` 确认账号存在。\n- `SchemaType` 必须存在于 `dto.SchemaTypeAllowList`。\n\n`ValidateUpdateAccountCategorySchemaRequest` 只要求 `ID != 0`，并在嵌入元数据类型下复用 `checkEmbeddedMetadataValue`。它不会检查账号是否存在，也不会检查 `SchemaTypeAllowList`。\n\n## 与其他层的关系\n\nservice 层在执行写操作前调用 validator。典型链路包括：\n\n- `service/account.go` 的 `CreateAccount` 调用 `ValidateCreateAccountRequest`，成功后用 `errno.OK` 返回响应。\n- `service/config.go` 的 `MUpdateConfig` 调用 `ValidateMUpdateConfigRequest`，再进入配置更新流程。\n- `service/bpm.go` 的 `BPMCreateConfigs` 调用 `ValidateMCreateConfigRequest`，配置校验可能继续访问 bucket 元数据服务。\n\ndao 层大量使用 `errno.ParseCBError` 将 `gobreaker` 的熔断状态转换为统一错误，例如账号、配置、权限、AccessKey 和分类 schema 的数据访问函数。\n\nmiddleware 和 service 层使用 `errno.OK`、`errno.ErrorWithCode` 生成接口响应，例如 `OpenAPIResponse`、`JanusResponse`、`HandleRateLimiterError` 和 `GetAccess`。\n\n## 贡献注意事项\n\n新增校验逻辑时，应优先返回已有的 `errno.Payload`，只有消息需要携带上下文时再构造新的 `&errno.Payload{Code: ..., Message: ...}`。\n\n修改配置校验时要特别关注 `validateConfigs -> validateStorageConfig -> validateBucket` 这条链路。它会访问数据库和远程 bucket 服务，且直接影响 `MCreateConfig`、`MUpdateConfig`、`BPMCreateConfigs` 等写入流程。\n\n处理 region 错误时要保持现有语义：`ValidateRegion` 本身返回 `errno.ErrRegionInvalid`，但多个请求入口会把它转换为 `errno.ErrRegionMissing`。这不是等价命名，而是当前接口对外错误码约定的一部分。\n\n不要把预定义的 `*errno.Payload` 当作临时响应对象修改；需要附加数据时应创建新的 `Payload`，避免包级错误对象被污染。"};

(function() {
  var activePage = 'overview';

  document.addEventListener('DOMContentLoaded', function() {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
    renderMeta();
    renderNav();
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });
    if (location.hash && location.hash.length > 1) {
      activePage = decodeURIComponent(location.hash.slice(1));
    }
    navigateTo(activePage);
  });

  function renderMeta() {
    if (!META) return;
    var el = document.getElementById('meta-info');
    var parts = [];
    if (META.generatedAt) {
      parts.push(new Date(META.generatedAt).toLocaleDateString());
    }
    if (META.model) parts.push(META.model);
    if (META.fromCommit) parts.push(META.fromCommit.slice(0, 8));
    el.textContent = parts.join(' \u00b7 ');
  }

  function renderNav() {
    var container = document.getElementById('nav-tree');
    var html = '<div class="nav-section">';
    html += '<a class="nav-item overview" data-page="overview" href="#overview">Overview</a>';
    html += '</div>';
    if (TREE.length > 0) {
      html += '<div class="nav-group-label">Modules</div>';
      html += buildNavTree(TREE);
    }
    container.innerHTML = html;
    container.addEventListener('click', function(e) {
      var target = e.target;
      while (target && !target.dataset.page) { target = target.parentElement; }
      if (target && target.dataset.page) {
        e.preventDefault();
        navigateTo(target.dataset.page);
      }
    });
  }

  function buildNavTree(nodes) {
    var html = '';
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      html += '<div class="nav-section">';
      html += '<a class="nav-item" data-page="' + escH(node.slug) + '" href="#' + encodeURIComponent(node.slug) + '">' + escH(node.name) + '</a>';
      if (node.children && node.children.length > 0) {
        html += '<div class="nav-children">' + buildNavTree(node.children) + '</div>';
      }
      html += '</div>';
    }
    return html;
  }

  function escH(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function navigateTo(page) {
    activePage = page;
    location.hash = encodeURIComponent(page);

    var items = document.querySelectorAll('.nav-item');
    for (var i = 0; i < items.length; i++) {
      if (items[i].dataset.page === page) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }

    var contentEl = document.getElementById('content');
    var md = PAGES[page];

    if (!md) {
      contentEl.innerHTML = '<div class="empty-state"><h2>Page not found</h2><p>' + escH(page) + '.md does not exist.</p></div>';
      return;
    }

    contentEl.innerHTML = marked.parse(md);

    // Rewrite .md links to hash navigation
    var links = contentEl.querySelectorAll('a[href]');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href');
      if (href && href.endsWith('.md') && href.indexOf('://') === -1) {
        var slug = href.replace(/\.md$/, '');
        links[i].setAttribute('href', '#' + encodeURIComponent(slug));
        (function(s) {
          links[i].addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(s);
          });
        })(slug);
      }
    }

    // Convert mermaid code blocks into mermaid divs
    var mermaidBlocks = contentEl.querySelectorAll('pre code.language-mermaid');
    for (var i = 0; i < mermaidBlocks.length; i++) {
      var pre = mermaidBlocks[i].parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = mermaidBlocks[i].textContent;
      pre.parentNode.replaceChild(div, pre);
    }
    try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}

    window.scrollTo(0, 0);
    document.getElementById('sidebar').classList.remove('open');
  }
})();
