代码库的方式主要体现在文件系统约定上：\n\n- 依赖 `script/bootstrap.sh`、`script/pre_nginx.sh`、`script/settings.py` 作为运行时辅助文件。\n- 依赖 `conf/` 目录提供发布配置。\n- 依赖仓库根目录的 Go module 或主包结构，由 `go build` 生成服务二进制。\n- 产出 `output/` 目录，供部署系统、发布平台或后续打包步骤消费。\n\n因此，修改 `build.sh` 时重点关注构建产物兼容性，而不是业务调用关系。\n\n## 维护注意事项\n\n这个脚本的行为偏宽松：没有 `set -euo pipefail`，部分错误会被忽略或隐藏。这适合兼容历史构建环境，但也会让缺失文件、配置复制异常等问题更晚暴露。\n\n常见修改点包括：\n\n- 修改服务二进制名称时，更新 `RUN_NAME`。\n- 增加运行时文件时，扩展 `cp script/... output` 的文件列表。\n- 调整配置发布策略时，修改 `find conf/ -type f ! -name \"*_local.*\"` 过滤条件。\n- 需要保留配置目录结构时，不能继续使用当前平铺复制方式。\n- 需要让构建在缺失关键文件时立即失败时，应显式引入更严格的错误处理。","other-conf":"# Other — conf\n\n## conf 模块\n\n`conf/` 是服务的运行时配置目录，本身不包含函数、类或执行逻辑。它的对外契约是 YAML/JSON 配置文件、顶层配置键和按环境命名的覆盖文件。调用图中没有内部调用、外部调用或执行流，说明该模块主要作为配置输入，被服务启动流程和各业务子系统读取。\n\n## 配置组织方式\n\n`base.yml` 提供默认配置，环境文件按机房、区域、环境和租户形态覆盖部分字段，例如：\n\n- `boe.staging.yml`、`boe.test.yml`：BOE 测试/预发环境\n- `lf.prod.yml`、`hl.prod.yml`、`lq.prod.yml`：国内生产环境\n- `sg1.prod.yml`、`useast2a.prod.yml`、`ie.prod.yml`：海外或 TTP 区域\n- `*.default_tob.yml`、`*.default_tob_imagex.yml`、`*.default_tob_bp.yml`：ToB、ImageX、BytePlus 等租户形态\n- `toutiao_videoarch_account.yaml`：服务框架层面的 Develop/Product 配置\n- `kitex_remote_config.json`：Kitex 远程配置占位，目前为空对象 `{}`\n\n典型加载模型是：先读取 `base.yml`，再按运行环境读取对应的环境配置文件，环境文件只覆盖差异字段。新增配置时应优先放入 `base.yml` 作为默认值，再在具体环境文件中覆盖。\n\n```mermaid\nflowchart TD\n    A[\"base.yml 默认值\"] --> C[\"最终运行配置\"]\n    B[\"环境覆盖文件\"] --> C\n    C --> D[\"数据库连接\"]\n    C --> E[\"缓存与限流\"]\n    C --> F[\"ID 生成器\"]\n    C --> G[\"消息消费\"]\n    C --> H[\"外部系统开关\"]\n```\n\n## 核心配置键\n\n### Meta\n\n`Meta.PSM` 在 `base.yml` 中定义为：\n\n```yaml\nMeta:\n  PSM: \"toutiao.videoarch.account\"\n```\n\n它标识当前服务的 PSM，通常会被日志、监控、权限或服务治理相关逻辑使用。\n\n### 数据库配置\n\n`ReadDB` 和 `WriteDB` 是所有环境中最核心的配置块。`base.yml` 定义完整结构：\n\n```yaml\nReadDB:\n  DSNTemplate: \"%s:%s@tcp(%s)/%s?charset=utf8&parseTime=True&loc=Local&timeout=%s&readTimeout=%s&writeTimeout=%s&interpolateParams=True\"\n  Username: \"\"\n  Password: \"\"\n  DBName: \"\"\n  ConsulName: \"\"\n  Timeout: \"500ms\"\n  ReadTimeout: \"2s\"\n  WriteTimeout: \"2s\"\n  MaxIdle: 20\n  MaxOpen: 1000\n```\n\n`WriteDB` 使用相同字段。环境文件通常覆盖：\n\n- `Username`\n- `Password`\n- `DBName`\n- `ConsulName`\n- `Timeout`\n\n`ConsulName` 有两类写法：\n\n- 服务发现名：如 `toutiao.mysql.videoarch_account_write`\n- 直连地址：如 `10.227.14.96:3306`\n\n部分环境还存在 `WriteDB-2`、`ReadDB-2`，例如 `boe.test.yml` 和 `boe.test.default_tob.yml`，用于测试环境的备用或直连数据库配置。\n\n需要注意，部分生产文件中存在明文 `Username` 或 `Password` 字段。维护时不要扩大密钥暴露范围，新增敏感信息应优先走平台化密钥或空占位注入方式。\n\n### ACL 与写权限白名单\n\n`ACL` 控制访问控制开关：\n\n```yaml\nACL:\n  Enable: true\n  Switch: \"/web/videoarch/account/acl\"\n  Pairs:\n    test: \"test\"\n```\n\n`WhiteList` 定义允许写操作的 PSM：\n\n```yaml\nWhiteList:\n  \"toutiao.videoarch.account_admin\": true\n  \"toutiao.videoarch.vip_site_bis\": true\n```\n\n相关白名单还包括：\n\n- `StorageConfigCheckWhitelist`：存储配置校验白名单\n- `AccountNoCacheWhitelist`：查询时绕过缓存的 PSM 白名单\n- `AdminUser`：管理员用户名白名单\n\n这些配置是布尔 map 模式，新增项应保持：\n\n```yaml\n\"psm.or.user.name\": true\n```\n\n### 限流与熔断\n\n`RateLimiter` 是全局限流配置：\n\n```yaml\nRateLimiter:\n  Enable: true\n  Switch: \"/web/videoarch/account/rate_limiter\"\n  Rate: \"10-S\"\n  Prefix: \"RateLimiter\"\n  CleanUpInterval: \"1m\"\n```\n\n`InterfaceRateLimiter` 用于接口级限流，默认关闭：\n\n```yaml\nInterfaceRateLimiter:\n  Enable: false\n  Limits: {}\n```\n\n`CircuitBreakers.DB` 控制数据库熔断：\n\n```yaml\nCircuitBreakers:\n  DB:\n    Enable: true\n    Switch: \"/web/videoarch/account/db_circuit_breaker\"\n    CloseFailures: 10\n    CloseInterval: \"10s\"\n    OpenTimeout: \"10s\"\n    HalfOpenSuccesses: 5\n```\n\n这些字段使用字符串形式的时长，例如 `10s`、`1m`、`500ms`，应保持 Go duration 风格，避免写成纯数字。\n\n### 缓存配置\n\n本模块同时配置本地缓存和 Redis 缓存。\n\n本地缓存：\n\n```yaml\nCacheSize: 500\nCacheRefreshTime: \"5m\"\n```\n\nRedis 连接：\n\n```yaml\nRedis:\n  Cluster: \"toutiao.redis.videoarch_account_cache\"\n  DialTimeout: \"250ms\"\n  ReadTimeout: \"10s\"\n  WriteTimeout: \"10s\"\n```\n\nRedis 业务缓存开关：\n\n```yaml\nRedisCache:\n  Switch: false\n  TTL: \"5m\"\n  RetryTimes: 3\n```\n\n`RedisCache.Switch` 在 `base.yml` 中默认关闭，注释说明需要使用 Redis 的区域应在 TCC 上单独开启。环境文件会覆盖 `Redis.Cluster`，例如 ToB 使用 `toutiao.redis.videoarch_account_cache_tob`，非 TT 区域使用 `toutiao.redis.videoarch_account_cache_nontt`。\n\n### TCC 与 Harden\n\n`Tcc.ConfigSpace` 控制 TCC 配置空间：\n\n```yaml\nTcc:\n  ConfigSpace: \"default\"\n```\n\nToB 和 BytePlus 环境会覆盖为：\n\n```yaml\nTcc:\n  ConfigSpace: \"tob\"\n```\n\n或：\n\n```yaml\nTcc:\n  ConfigSpace: \"tob_bp\"\n```\n\n`Harden.Cluster` 标识当前服务所在集群：\n\n```yaml\nHarden:\n  Cluster: \"account\"\n```\n\n常见值包括 `account`、`default_tob`、`default_tob_bp`、`default`。新增环境时，`Tcc.ConfigSpace` 和 `Harden.Cluster` 要与租户形态保持一致，否则会读错动态配置或治理集群。\n\n### Wand\n\n`Wand` 包含区域控制台域名映射和部分环境的访问 token。\n\n`base.yml` 中定义 `RegionVConsoleUrl`：\n\n```yaml\nWand:\n  RegionVConsoleUrl:\n    \"cn-north-1\": \"vconsole.bytedance.net\"\n    \"ap-singapore-1\": \"vconsole-sg.bytedance.net\"\n```\n\n环境文件中常见覆盖：\n\n```yaml\nWand:\n  Token: \"...\"\n```\n\n`DefaultVolcAccountID` 和 `DefaultVolcVRegion` 与 Wand/火山区域能力配套使用：\n\n```yaml\nDefaultVolcAccountID: 2100331610\nDefaultVolcVRegion: \"cn-north-1\"\n```\n\n海外 ToB 环境常将 `DefaultVolcVRegion` 覆盖为 `ap-southeast-1`。\n\n### CDN 与 DECC\n\nCDN 相关开关包括：\n\n```yaml\nEnableCDNRefresh: true\nCDNGatewayEnv: \"cn\"\nUseCDNCacheAPI: true\n```\n\n不同区域配置差异较大：\n\n- 国内生产环境通常开启 `EnableCDNRefresh`，并设置 `CDNGatewayEnv: \"cn\"`\n- BOE 环境可能设置 `CDNGatewayEnv: \"boe\"`\n- 部分海外或 BytePlus 环境显式关闭 `EnableCDNRefresh: false`\n- `UseCDNCacheAPI` 在多个国内和 ToB 生产环境中开启\n\n`Decc` 控制 DECC 集成：\n\n```yaml\nDecc:\n  Switch: true\n  Cluster: default\n  PSM: \"decc.channel.integration\"\n```\n\n`base.yml` 中默认 `Decc.Switch: false`，只有部分区域文件开启，例如 `boei18n.staging.yml`、`maliva.prod.yml`、`useast5.prod.yml`、`boettp.yml`。\n\n### IdGenerator\n\n`IdGenerator` 控制按区域生成 ID 的能力。生产环境普遍使用如下结构：\n\n```yaml\nIdGenerator:\n  Switch: true\n  Region: \"cn6\"\n  TableSupportSetting:\n    v_account: true\n    v_config: true\n    v_domain: true\n    v_domain_account_rel: true\n  TableRemainIdRemindThreshold:\n    v_account: 1000\n    v_config: 1000\n    v_domain: 1000\n    v_domain_account_rel: 1000\n```\n\n字段含义：\n\n- `Switch`：是否开启 ID 生成器\n- `Region`：ID 区域标识，如 `cn6`、`sg`、`mya`、`i18n`、`eu-ttp`\n- `TableSupportSetting`：启用 ID 生成器的表\n- `TableRemainIdRemindThreshold`：表级剩余 ID 告警阈值\n\n单测环境 `boe.ut.yml` 额外包含 `v_unit_test` 和 `v_unit_test_parallel`，用于测试表。\n\n### Consumers\n\n`Consumers` 配置消息消费任务。当前出现的消费者主要是 `imagex_domain_event`：\n\n```yaml\nConsumers:\n  - Topic: \"imagex_domain_event\"\n    Name: \"imagex\"\n    ConsumerGroup: \"toutiao_videoarch_account\"\n    ClusterName: \"videoarch_normal\"\n    WorkerNum: 4\n```\n\nBOE 环境的 `ClusterName` 通常是 `sandbox`，生产环境通常是 `videoarch_normal`。新增消费者时应保持列表结构，避免覆盖已有消费者配置。\n\n### WriteRemote\n\n部分海外生产环境定义 `WriteRemote`：\n\n```yaml\nWriteRemote:\n  RemoteSwitch: false\n  RegionInfo: maliva\n```\n\n或：\n\n```yaml\nWriteRemote:\n  RemoteSwitch: false\n  RegionInfo: useast5\n```\n\n该配置用于表达跨区域写入或远程写策略的区域信息。当前出现的环境均将 `RemoteSwitch` 设为 `false`。\n\n## 服务框架配置\n\n`toutiao_videoarch_account.yaml` 不是业务配置，而是服务框架运行参数，分为 `Develop` 和 `Product` 两套：\n\n```yaml\nDevelop:\n  ServicePort: \"9984\"\n  DebugPort: \"9985\"\n  EnablePprof: true\n  LogLevel: \"trace\"\n  EnableMetrics: false\n  ConsoleLog: true\n  Mode: \"debug\"\n\nProduct:\n  ServicePort: \"9984\"\n  DebugPort: \"9985\"\n  EnablePprof: true\n  LogLevel: \"trace\"\n  EnableMetrics: true\n  ConsoleLog: false\n  Mode: \"release\"\n```\n\n关键差异：\n\n- `Develop.EnableMetrics` 为 `false`，`Product.EnableMetrics` 为 `true`\n- `Develop.ConsoleLog` 为 `true`，`Product.ConsoleLog` 为 `false`\n- `Develop.Mode` 是 `debug`，`Product.Mode` 是 `release`\n\n端口在两套配置中一致：服务端口 `9984`，调试端口 `9985`。\n\n## 环境族群\n\n### 国内 account 环境\n\n代表文件：\n\n- `lf.prod.yml`\n- `hl.prod.yml`\n- `lq.prod.yml`\n- `zjg.prod.yml`\n- `hj.prod.yml`\n- `jj.prod.yml`\n- `xh.prod.yml`\n- `zb.prod.yml`\n- `gl2.prod.yml`\n\n这类环境通常使用：\n\n```yaml\nDBName: \"videoarch_account\"\nConsulName: \"toutiao.mysql.videoarch_account_write\"\n```\n\n并常见开启：\n\n```yaml\nEnableCDNRefresh: true\nCDNGatewayEnv: \"cn\"\nUseCDNCacheAPI: true\n```\n\n### ToB 环境\n\n代表文件：\n\n- `lf.prod.default_tob.yml`\n- `hl.prod.default_tob.yml`\n- `lq.prod.default_tob.yml`\n- `mya.prod.default_tob.yml`\n- `myb.prod.default_tob.yml`\n\n典型特征：\n\n```yaml\nTcc:\n  ConfigSpace: \"tob\"\n\nHarden:\n  Cluster: \"default_tob\"\n```\n\n数据库通常使用 `videoarch_account_tob` 或 `videoarch_account_nontt`，Redis 使用 ToB 专用集群。\n\n### BytePlus 环境\n\n代表文件：\n\n- `mya.prod.default_tob_bp.yml`\n- `myb.prod.default_tob_bp.yml`\n- `boe.staging.default_tob_bp.yml`\n\n典型特征：\n\n```yaml\nTcc:\n  ConfigSpace: \"tob_bp\"\n\nHarden:\n  Cluster: \"default_tob_bp\"\n```\n\n生产环境使用 `videoarch_account_byteplus`，并显式关闭 `EnableCDNRefresh: false`。\n\n### 海外与 TTP 环境\n\n代表文件：\n\n- `sg1.prod.yml`\n- `my.prod.yml`\n- `my2.prod.yml`\n- `my3.prod.yml`\n- `useast2a.prod.yml`\n- `useast2b.prod.yml`\n- `ie.prod.yml`\n- `no1a.prod.yml`\n\n常见差异是数据库名可能为 `videoarch_vcloud`，`IdGenerator.Region` 使用 `sg`、`i18n`、`eu-ttp`、`eu-ttp2` 等区域标识。\n\n## 修改配置时的注意事项\n\n新增环境文件时，建议从最接近的现有环境复制结构，再只修改必要字段。至少检查：\n\n- `WriteDB` 和 `ReadDB` 是否指向正确库名与 Consul 服务\n- `Tcc.ConfigSpace` 是否匹配租户形态\n- `Harden.Cluster` 是否匹配部署集群\n- `Redis.Cluster` 是否为对应区域或租户的缓存集群\n- `IdGenerator.Region` 是否唯一且符合区域规划\n- `EnableCDNRefresh`、`CDNGatewayEnv`、`UseCDNCacheAPI` 是否符合该区域 CDN 接入方式\n- `Consumers.ClusterName` 是否在 BOE 使用 `sandbox`、生产使用正确消息集群\n- 是否意外把测试库、直连地址或明文密码带入生产配置\n\n修改共享默认值时要优先评估 `base.yml` 的影响范围。`base.yml` 中的字段会影响所有未覆盖该字段的环境，因此适合放稳定默认值，不适合放区域特定逻辑。","other-config":"# Other — config\n\n## 配置模块\n\n`src/config` 负责加载服务启动所需的全局配置，并把 YAML、TCC base 配置、运行期开关、数据库连接参数和校验规则统一暴露为 `config.Conf`。服务启动后，大多数模块通过 `config.Conf` 直接读取配置，例如 DAO 初始化、TCC 动态刷新、限流、熔断、Redis 缓存和远端调用配置。\n\n## 启动流程\n\n`main.go` 在 `ginex.Init()` 之后立即调用 `config.InitConf()`：\n\n```go\nginex.Init()\ndefer logs.Stop()\n\nconfig.InitConf()\ntcc.SetDefaultValuesAndStartRefresh()\nrpc.Init()\nremote_cache.Init()\ndao.InitDb()\n```\n\n`InitConf()` 的执行顺序是：\n\n1. 创建全局配置对象：`Conf = new(Config)`\n2. 调用 `caesar.Unmarshal(Conf, ginex.ConfDir())` 从配置目录加载 YAML。\n3. 调用 `mergeTCCBaseConfig()` 尝试加载 TCC 中 key 为 `base` 的基础配置。\n4. 调用 `validator.Validate(Conf)` 执行结构体校验。\n5. 使用 `pretty.Println(Conf)` 打印最终配置。\n\n```mermaid\nflowchart TD\n    A[\"main.go 启动\"] --> B[\"ginex.Init\"]\n    B --> C[\"config.InitConf\"]\n    C --> D[\"caesar.Unmarshal 本地配置\"]\n    D --> E[\"mergeTCCBaseConfig 合并 TCC base\"]\n    E --> F[\"validator.Validate 校验配置\"]\n    F --> G[\"config.Conf 可供其他模块读取\"]\n    G --> H[\"tcc / dao / middleware / remote_cache\"]\n```\n\n## 全局配置对象\n\n模块通过包级变量暴露配置：\n\n```go\nvar Conf *Config\n```\n\n`Config` 是服务配置的根结构体，主要字段包括：\n\n- `Meta`：服务元信息，目前包含 `PSM`。\n- `WriteDB` / `ReadDB`：写库和读库的 `Mysql` 配置。\n- `RetryTimes`：通用重试次数，带 `validate:\"min=1\"` 校验。\n- `ACL`：访问控制配置，内嵌 `DoubleSwitch`。\n- `RateLimiter`：全局 HTTP 限流配置，内嵌 `DoubleSwitch`。\n- `InterfaceRateLimiter`：接口级限流配置，由 `interface_limiter` 模块初始化和更新。\n- `CircuitBreakers`：熔断器配置，供 `middleware.InitCircuitBreaker()` 使用。\n- `WhiteList`、`StorageConfigCheckWhitelist`、`AccountNoCacheWhitelist`：白名单类配置。\n- `CacheSize`、`CacheRefreshTime`：本地缓存容量和刷新时间。\n- `WriteRemote`：远端写配置，由 `src/tcc/setting_remote.go` 读取。\n- `TccInfo`：TCC 配置空间信息。\n- `Harden`：MySQL 限流相关的 Harden 集群配置。\n- `IdGenerator`：ID 生成器配置。\n- `Wand`：Wand 访问 token 和区域控制台地址配置。\n- `Consumers`：RocketMQ consumer 配置列表。\n- `Decc`：DECC RPC 开关、集群和 PSM。\n- `Redis` / `RedisCache`：Redis 客户端和 Redis 缓存行为配置。\n\n由于 `Conf` 是全局指针，调用方通常不做依赖注入，而是直接读取：\n\n```go\nconfig.Conf.WriteDB.NewDB()\nconfig.Conf.RateLimiter.IsEnabled()\nconfig.Conf.CircuitBreakers\nconfig.Conf.RedisCache.TTL\n```\n\n贡献代码时需要注意：`InitConf()` 必须在任何读取 `config.Conf` 的初始化逻辑之前执行，否则会触发 nil pointer 或读取未初始化配置。\n\n## 本地配置加载\n\n`InitConf()` 使用：\n\n```go\ncaesar.Unmarshal(Conf, ginex.ConfDir())\n```\n\n这表示配置文件目录来自 `ginex.ConfDir()`，实际解析由 `code.byted.org/videoarch/caesar_config` 完成。加载失败时，代码会记录 fatal 日志并 panic：\n\n```go\nif err := caesar.Unmarshal(Conf, ginex.ConfDir()); err != nil {\n    logs.Fatal(\"load config error: %v\", err)\n    panic(err)\n}\n```\n\n因此本地配置文件缺失、格式错误或字段类型不匹配都会阻断服务启动。\n\n## TCC base 配置合并\n\n`mergeTCCBaseConfig()` 在本地配置加载完成后执行，用来读取 TCC 中 key 为 `base` 的基础配置。\n\n执行条件：\n\n- `Conf == nil`：直接返回。\n- `Conf.Meta.PSM == \"\"`：记录 warn 并跳过加载。\n- `Conf.TccInfo.ConfigSpace != \"\"`：将 `ConfigSpace` 写入 `tccCfg.Confspace`。\n- TCC client 初始化失败、读取失败、返回空字符串、YAML 反序列化失败或 `mergo.Merge` 失败时，都会记录 warn 并保留原 `Conf`。\n\n核心逻辑：\n\n```go\ntccCfg := tccclient.NewConfigV2()\ntccCfg.Auth = true\nif Conf.TccInfo.ConfigSpace != \"\" {\n    tccCfg.Confspace = Conf.TccInfo.ConfigSpace\n}\ntccCfg.SetFirstGetTimeout(5 * time.Second)\n\ncli, err := tccclient.NewClientV2(Conf.Meta.PSM, tccCfg)\nvalue, err := cli.Get(context.Background(), \"base\")\n\nvar tccConf Config\nyaml.Unmarshal([]byte(value), &tccConf)\nmergo.Merge(&tccConf, Conf)\n\nConf = &tccConf\n```\n\n按当前实现，`mergo.Merge(&tccConf, Conf)` 会把本地 `Conf` 合并到 TCC 反序列化得到的 `tccConf` 中。默认合并行为是填充目标对象的零值字段，不覆盖目标对象已有的非零字段。因此：\n\n- TCC `base` 中已有值的字段会保留 TCC 值。\n- TCC `base` 中缺失或为零值的字段会从本地配置补齐。\n- 合并成功后，全局 `Conf` 指向新的 `tccConf`。\n\n这个行为会影响配置优先级。修改此函数时要特别确认是否希望 TCC base 优先，还是本地环境配置优先。\n\n## 配置校验\n\n`validator.go` 在 `init()` 中注册两个自定义校验器：\n\n```go\nvalidator.SetValidationFunc(\"valid_duration\", validateDuration)\nvalidator.SetValidationFunc(\"valid_psm\", validatePSM)\n```\n\n当前实际使用的校验标签包括：\n\n```go\ntype Meta struct {\n    PSM string `yaml:\"PSM\" validate:\"valid_psm\"`\n}\n```\n\n`validatePSM()` 要求 PSM 按 `.` 分割后正好有 3 段：\n\n```go\nfunc validatePSM(v interface{}, param string) error {\n    value := v.(string)\n    if len(strings.Split(value, \".\")) != 3 {\n        return errInvalidPSM\n    }\n    return nil\n}\n```\n\n例如 `toutiao.videoarch.account` 合法，`toutiao.videoarch` 不合法。\n\n`validateDuration()` 使用 `time.ParseDuration()` 校验字符串格式：\n\n```go\nfunc validateDuration(v interface{}, param string) error {\n    value := v.(string)\n    _, err := time.ParseDuration(value)\n    return err\n}\n```\n\n当前 `Config` 中多数 duration 字段直接声明为 `time.Duration`，例如 `CacheRefreshTime`、`RateLimiter.CleanUpInterval`、`Redis.TTL`，并没有在源码中使用 `valid_duration` 标签。若后续新增字符串型 duration 配置，可以复用该校验器。\n\n## MySQL 配置\n\n`Mysql` 描述数据库连接参数：\n\n```go\ntype Mysql struct {\n    DSNTemplate  string\n    Username     string\n    Password     string\n    DBName       string\n    ConsulName   string\n    Timeout      string\n    ReadTimeout  string\n    WriteTimeout string\n    MaxIdle      int\n    MaxOpen      int\n}\n```\n\n`GetDSN()` 有两条路径：\n\n- CI 环境：返回固定测试 DSN。\n- 非 CI 环境：用 `DSNTemplate` 格式化用户名、密码、Consul 名称、数据库名和超时时间。\n\nCI 判断由 `IsCIEnvironment()` 实现：\n\n```go\nreturn len(os.Getenv(\"CI_REPO_NAME\")) > 0 || os.Getenv(\"IS_SYSTEM_TEST_ENV\") == \"1\"\n```\n\n`NewDB()` 基于 `GetDSN()` 创建 gorm 连接：\n\n```go\ndb, err := gorm.Open(\"mysql2\", m.GetDSN())\ndb.LogMode(true)\ndb.DB().SetMaxIdleConns(m.MaxIdle)\ndb.DB().SetMaxOpenConns(m.MaxOpen)\ndb.SingularTable(true)\n```\n\n实际数据库初始化在 `src/dao/db.go` 的 `InitDb()` 中完成。该函数会先通过 TCC 获取读写库密码：\n\n```go\nconfig.Conf.WriteDB.Password = tcc.GetWriteDBPassword(context.Background())\nconfig.Conf.ReadDB.Password = tcc.GetReadDBPassword(context.Background())\n```\n\n然后分别调用：\n\n```go\nconnW, err := config.Conf.WriteDB.NewDB()\nconnR, err := config.Conf.ReadDB.NewDB()\n```\n\n因此 `WriteDB` / `ReadDB` 的静态配置负责连接模板、用户名、库名、Consul 服务名和连接池参数；密码在运行期由 TCC 注入。\n\n## DoubleSwitch 开关模式\n\n`DoubleSwitch` 是多个配置块复用的双重开关模式：\n\n```go\ntype DoubleSwitch struct {\n    Enable bool   `yaml:\"Enable\"`\n    Switch string `yaml:\"Switch\"`\n}\n\nfunc (s *DoubleSwitch) IsEnabled() bool {\n    return s.Enable && etcdutil.GetWithDefault(s.Switch, \"0\") == \"1\"\n}\n```\n\n它要求两个条件同时成立：\n\n1. YAML 中 `Enable` 为 `true`。\n2. etcd 中 `Switch` 对应的值为 `\"1\"`。\n\n使用该模式的配置包括：\n\n- `ACL`\n- `RateLimiter`\n- `CircuitBreaker`\n\n例如全局限流在 `middleware.RateLimiter.RateLimit()` 中这样判断：\n\n```go\nif !config.Conf.RateLimiter.IsEnabled() {\n    c.Next()\n    return\n}\n```\n\n这让配置具备“静态启用 + 动态开关”的能力：代码和 YAML 允许某项能力存在，但最终是否生效仍可通过 etcd 开关控制。\n\n## 限流配置\n\n`RateLimiter` 配置全局 HTTP 限流：\n\n```go\ntype RateLimiter struct {\n    DoubleSwitch    `yaml:\",inline\"`\n    Rate            string\n    Prefix          string\n    CleanUpInterval time.Duration\n}\n```\n\n`middleware.NewRateLimiter()` 会读取：\n\n- `config.Conf.RateLimiter.Rate`：传给 `limiter.NewRateFromFormatted()`，例如按库支持的格式表达 QPS/窗口。\n- `config.Conf.RateLimiter.Prefix`：memory store key 前缀。\n- `config.Conf.RateLimiter.CleanUpInterval`：内存 store 清理间隔。\n\n真正拦截请求时仍会调用 `RateLimiter.IsEnabled()`，因此限流配置存在不代表一定生效。\n\n接口级限流由 `InterfaceRateLimiterConfig` 表达：\n\n```go\ntype InterfaceRateLimiterConfig struct {\n    Enable bool\n    Limits map[string]InterfaceRateLimit\n}\n\ntype InterfaceRateLimit struct {\n    QPS   float64\n    Burst int\n}\n```\n\n启动时 `tcc.SetDefaultValuesAndStartRefresh()` 会调用 `initInterfaceRateLimiterFromConfig()`，再进入 `interface_limiter.InitConfig(config.Conf.InterfaceRateLimiter)`。之后 TCC key `interface_rate_limiter` 可通过 `interface_limiter.UpdateConfigFromTCC()` 动态更新接口级限流。\n\n## 熔断配置\n\n`CircuitBreaker` 描述 `github.com/sony/gobreaker` 的参数：\n\n```go\ntype CircuitBreaker struct {\n    DoubleSwitch      `yaml:\",inline\"`\n    CloseFailures     uint32\n    CloseInterval     time.Duration\n    OpenTimeout       time.Duration\n    HalfOpenSuccesses uint32\n}\n```\n\n`GetSettings(name string)` 把配置转换为 `gobreaker.Settings`：\n\n- `Name`：使用传入的熔断器名称。\n- `Interval`：来自 `CloseInterval`。\n- `ReadyToTrip`：当 `counts.ConsecutiveFailures >= CloseFailures` 时打开熔断。\n- `Timeout`：来自 `OpenTimeout`。\n- `MaxRequests`：半开状态允许的请求数，来自 `HalfOpenSuccesses`。\n- `OnStateChange`：记录状态变化日志。\n\n`middleware.InitCircuitBreaker()` 会从 `tcc.GetCircuitBreakersConfigs()` 获取配置，并只初始化 `Enable == true` 的熔断器。`GetDBCircuitBreaker()` 读取名称为 `\"DB\"` 的熔断器，并额外检查 etcd switch：\n\n```go\ncb := CircuitBreakers[\"DB\"]\nif cb != nil && etcdutil.GetWithDefault(cb.Switch, \"0\") == \"1\" {\n    return cb.CB\n}\nreturn nil\n```\n\n这里和 `DoubleSwitch.IsEnabled()` 的模式一致：配置中的 `Enable` 控制是否创建实例，etcd switch 控制是否实际使用。\n\n## TCC 动态配置关系\n\n`src/config` 只负责加载启动时配置；运行期动态刷新主要在 `src/tcc` 中完成。\n\n`SetDefaultValuesAndStartRefresh()` 会先把 `config.Conf` 中的默认值写入各类内存状态：\n\n```go\nSetDefaultAllowList(config.Conf.WhiteList)\nSetStorageConfigCheckWhitelist(config.Conf.StorageConfigCheckWhitelist)\nSetRedisCacheSwitch(config.Conf.RedisCache.Switch)\nSetRedisCacheTtl(config.Conf.RedisCache.TTL)\nSetRedisCacheRetryTimes(config.Conf.RedisCache.RetryTimes)\nSetAccountNoCacheWhitelist(config.Conf.AccountNoCacheWhitelist)\n```\n\n然后 `process()` 从 TCC 读取以下 key 并更新运行期状态：\n\n- `redis_cache_switch`\n- `redis_cache_ttl`\n- `redis_cache_retry_times`\n- `account_nocache_whitelist`\n- `metadata_clean_black_list`\n- `interface_rate_limiter`\n- `mem_limit_percent`\n\n也就是说，`config.Conf` 是启动默认值来源；部分配置启动后会被 TCC 刷新逻辑复制到独立的运行期状态中。\n\n## Redis 配置\n\n`Redis` 描述 Redis 客户端连接参数：\n\n```go\ntype Redis struct {\n    Cluster      string\n    DialTimeout  time.Duration\n    ReadTimeout  time.Duration\n    WriteTimeout time.Duration\n}\n```\n\n`remote_cache.Init()` 相关逻辑会读取 `config.Conf.Redis` 创建 remote cache 客户端。\n\n`RedisCache` 描述业务缓存策略：\n\n```go\ntype RedisCache struct {\n    Switch     bool\n    TTL        time.Duration\n    RetryTimes int\n}\n```\n\n启动时这些值会通过 `tcc.SetRedisCacheSwitch()`、`tcc.SetRedisCacheTtl()`、`tcc.SetRedisCacheRetryTimes()` 写入 TCC 模块维护的运行期状态。业务侧一般通过 `tcc.CheckRedisCacheSwitch()`、`tcc.GetRedisCacheTtl()`、`tcc.GetRedisCacheRetryTimes()` 读取，而不是直接读 `config.Conf.RedisCache`。\n\n## 测试结构\n\n`src/config/base_test.go` 定义测试入口：\n\n```go\nfunc TestMain(m *testing.M) {\n    ginex.Init()\n    InitConf()\n    code := m.Run()\n    os.Exit(code)\n}\n```\n\n这保证 `config` 包测试运行前已完成配置加载。\n\n主要测试覆盖：\n\n- `TestCircuitBreaker_GetSettings`：验证 `CircuitBreaker.GetSettings()` 返回非空设置。\n- `TestDoubleSwitch_IsEnabled`：mock `etcdutil.GetWithDefault()`，验证 `Enable && switch == \"1\"` 的开关逻辑。\n- `TestIsCIEnvironment`：验证 CI 环境判断。\n- `TestMysql_GetDSN`：覆盖 CI 固定 DSN 和普通 DSN 生成。\n- `TestMysql_NewDB`：验证 `Conf.WriteDB.NewDB()` 可返回数据库连接。\n- `Test_mergeTCCBaseConfig_BitsUTGen`：覆盖 `mergeTCCBaseConfig()` 的 nil、空 PSM、TCC client 初始化失败、Get 失败、空返回、YAML 失败、merge 失败和成功路径。\n- `Test_validateDuration` / `Test_validatePSM`：覆盖自定义校验器。\n\n测试大量使用 `gomonkey` 和 `mockey` 替换外部依赖，例如 TCC client、etcd 和 `mergo.Merge`，避免测试直接依赖真实远端状态。\n\n## 修改建议\n\n修改 `Config` 字段时，需要同步考虑以下位置：\n\n- YAML tag 是否与配置文件字段一致。\n- 是否需要 `validator` 校验标签。\n- `mergeTCCBaseConfig()` 合并后零值语义是否符合预期。\n- 是否有 TCC 动态刷新逻辑需要从 `config.Conf` 初始化默认值。\n- 使用方是否直接读取 `config.Conf`，还是读取 TCC 模块维护的运行期状态。\n\n新增运行期开关时，优先复用 `DoubleSwitch`，可以保持现有“YAML 静态启用 + etcd 动态开关”的一致模式。\n\n新增数据库或外部依赖配置时，应避免在 `config` 包中直接初始化业务客户端。当前模块的边界是“加载和表达配置”；实际连接初始化分别在 `dao.InitDb()`、`remote_cache.Init()`、`rpc.Init()`、`middleware.InitCircuitBreaker()` 等模块完成。","other-controllers":"# Other — controllers\n\n## 模块定位\n\n`src/controllers` 下的这组测试代码覆盖 `AccountsController` 的账号查询入口，主要验证两个控制器方法在测试环境初始化后能够返回 `errno.CodeOK`：\n\n- `AccountsController.Search`\n- `AccountsController.SearchTopAccountIds`\n\n当前模块没有被业务代码调用，也没有独立的执行流。它是控制器层的测试入口，通过 Gin 测试上下文构造 HTTP 查询参数，再直接调用控制器方法。\n\n## 文件组成\n\n### `src/controllers/base_test.go`\n\n该文件提供测试公共初始化逻辑。\n\n`createTestContext()` 使用 `gin.CreateTestContext` 创建测试用的 `*gin.Context` 和 `*httptest.ResponseRecorder`：\n\n```go\nfunc createTestContext() (*gin.Context, *httptest.ResponseRecorder) {\n\tresp := httptest.NewRecorder()\n\tc, _ := gin.CreateTestContext(resp)\n\treturn c, resp\n}\n```\n\n测试用例通过返回的 `*gin.Context` 手动设置 `c.Request`，再调用控制器方法。当前测试没有通过 Gin 路由分发请求，而是直接调用方法。\n\n`TestMain(m *testing.M)` 是整个 `controllers` 包测试的启动钩子，负责在执行具体测试前初始化运行依赖：\n\n```go\nfunc TestMain(m *testing.M) {\n\tginex.Init()\n\tconfig.InitConf()\n\tmiddleware.InitCircuitBreaker()\n\tdao.InitDb()\n\tcode := m.Run()\n\tos.Exit(code)\n}\n```\n\n初始化顺序很重要：\n\n1. `ginex.Init()` 初始化 Gin 扩展运行环境。\n2. `config.InitConf()` 加载并校验配置，设置全局 `config.Conf`。\n3. `middleware.InitCircuitBreaker()` 根据 TCC 配置初始化熔断器集合。\n4. `dao.InitDb()` 初始化读写数据库连接，并设置全局 `dao.Db`。\n5. `m.Run()` 执行当前包内所有测试。\n\n这意味着这些测试不是纯单元测试。它们依赖配置、TCC、数据库连接以及 DAO 层全局状态。\n\n### `src/controllers/account_test.go`\n\n该文件包含两个针对 `AccountsController` 的测试。\n\n`TestAccountsController_Search` 构造一个 GET 请求：\n\n```go\nc.Request, _ = http.NewRequest(\"GET\", \"/?offset=0&limit=10&account_name=test\", nil)\ngot := accountsController.Search(c, context.TODO())\nassert.True(t, got.Code == errno.CodeOK, \"Search Account err: \"+got.Message)\n```\n\n测试关注点是 `Search` 返回的 `errno.Payload.Code` 是否为 `errno.CodeOK`。它不会断言响应体中的账号列表、分页总数或数据库查询结果。\n\n`TestAccountsController_SearchTopAccountIds` 使用相同的查询参数调用 `SearchTopAccountIds`：\n\n```go\nc.Request, _ = http.NewRequest(\"GET\", \"/?offset=0&limit=10&account_name=test\", nil)\ngot := accountsController.SearchTopAccountIds(c, context.TODO())\nassert.True(t, got.Code == errno.CodeOK, \"Search TopAccountIds err: \"+got.Message)\n```\n\n它同样只验证返回码，不验证 `TopAccountIds` 内容。\n\n## 调用关系\n\n```mermaid\nflowchart TD\n    A[\"TestMain\"] --> B[\"ginex.Init\"]\n    A --> C[\"config.InitConf\"]\n    A --> D[\"middleware.InitCircuitBreaker\"]\n    A --> E[\"dao.InitDb\"]\n    F[\"测试用例\"] --> G[\"createTestContext\"]\n    F --> H[\"AccountsController.Search / SearchTopAccountIds\"]\n```\n\n测试代码没有内部调用链，也没有上游调用者。它的主要外部连接是控制器实现和全局运行时初始化。\n\n## 被测试控制器的行为边界\n\n`AccountsController.Search` 位于 `src/controllers/account.go`，方法签名为：\n\n```go\nfunc (accountsController *AccountsController) Search(c *gin.Context, ctx context.Context) *errno.Payload\n```\n\n主要流程是：\n\n1. 使用 `c.BindQuery(pageGetAccountRequest)` 将查询参数绑定到 `dto.PageGetAccountRequest`。\n2. 使用 `validator.RefinePageParams` 规范化 `Offset` 和 `Limit`。\n3. 通过 `util.EmitThroughput` 和 `util.EmitLatency` 上报指标。\n4. 调用 `dao.Db.GetVideoAccountAmount` 查询总数。\n5. 总数为 `0` 时直接返回空的 `dto.SearchAccountsResponse`。\n6. 调用 `dao.Db.PageGetVideoAccount` 查询分页账号。\n7. 返回前将每个账号的 `SecretKey` 清空。\n8. 使用 `errno.OK(resp)` 包装成功响应。\n\n`AccountsController.SearchTopAccountIds` 的结构相似，区别是它查询去重后的 `TopAccountID`：\n\n1. 绑定 `dto.PageGetAccountRequest`。\n2. 规范化分页参数。\n3. 上报吞吐和延迟指标。\n4. 调用 `dao.Db.GetVideoAccountDistinctTopAccountIdAmount` 查询总数。\n5. 总数为 `0` 时返回空的 `dto.PageGetTopAccountIdsResponse`。\n6. 调用 `dao.Db.PageGetVideoAccountDistinctTopAccountIds` 查询账号记录。\n7. 从每个 `VideoAccount` 中提取 `TopAccountID`，填充 `resp.TopAccountIds`。\n8. 使用 `errno.OK(resp)` 返回。\n\n## 测试方式的含义\n\n当前测试更接近“控制器冒烟测试”，而不是隔离的业务逻辑单元测试。原因是：\n\n- 测试直接依赖 `dao.Db` 的真实初始化。\n- `dao.InitDb()` 会建立读写数据库连接。\n- 查询结果取决于测试环境中的配置和数据。\n- 断言只检查 `errno.CodeOK`，不会覆盖响应结构的完整正确性。\n- 请求没有经过 Gin 路由、中间件链或真实 HTTP 服务。\n\n这种方式适合验证控制器在完整基础设施可用时不会直接失败，但不适合精确验证分页、过滤、异常分支或数据脱敏逻辑。\n\n## 依赖关系\n\n该模块直接依赖：\n\n- `github.com/gin-gonic/gin`：构造测试上下文。\n- `net/http` 和 `net/http/httptest`：构造请求与响应记录器。\n- `github.com/stretchr/testify/assert`：执行测试断言。\n- `code.byted.org/gin/ginex`：测试前初始化 Gin 扩展环境。\n- `src/config`：加载全局配置。\n- `src/middleware`：初始化熔断器。\n- `src/dao`：初始化数据库连接。\n- `src/errno`：判断控制器返回码。\n\n被测控制器进一步依赖 `dto`、`validator`、`util` 和 DAO 方法。\n\n## 贡献注意事项\n\n修改这组测试时，需要注意它们依赖 `TestMain` 的全局初始化。新增控制器测试如果也访问 `dao.Db`、`config.Conf` 或熔断器状态，应复用现有初始化逻辑，不要在单个测试中重复初始化全局资源。\n\n如果新增测试只需要验证参数绑定或错误分支，优先考虑避免真实数据库依赖，例如让测试覆盖 `BindQuery` 失败、分页参数修正等不需要 DAO 成功返回的路径。当前代码没有为 `dao.Db` 提供注入点，因此涉及数据库结果的精确断言会受环境数据影响。\n\n新增断言时应尽量检查返回 payload 的业务字段，而不只是 `errno.CodeOK`。例如 `Search` 可以关注 `TotalCount`、`VideoAccounts`、`SecretKey` 是否被清空；`SearchTopAccountIds` 可以关注 `TopAccountIds` 的提取结果。但这类断言需要稳定的测试数据或可控的 DAO 替身，否则容易产生环境相关的失败。","other-dao":"# Other — dao\n\n## 模块概览\n\n`src/dao` 这里展示的是 DAO 层的集成测试集合，覆盖账号、配置、域名、授权、实例、规则等核心数据访问能力。测试代码统一通过包级变量 `Db` 调用 DAO 方法，验证数据库初始化、CRUD、分页查询、批量查询、逻辑删除、配置同步等行为。\n\n这些测试不是纯单元测试，而是依赖真实 DAO 初始化和底层存储的集成测试。公共入口在 `TestMain` 中完成：\n\n```go\nfunc TestMain(m *testing.M) {\n\tpatches := gomonkey.ApplyFunc(etcdutil.GetWithDefault, func(key string, defaultValue string) string {\n\t\treturn \"1\"\n\t})\n\tdefer patches.Reset()\n\tginex.Init()\n\tconfig.InitConf()\n\tmiddleware.InitCircuitBreaker()\n\ttime.Sleep(3 * time.Second)\n\tInitDb()\n\tcode := m.Run()\n\tos.Exit(code)\n}\n```\n\n测试启动顺序是：\n\n1. 使用 `gomonkey.ApplyFunc` mock `etcdutil.GetWithDefault`，避免测试依赖真实 etcd 配置读取结果。\n2. 调用 `ginex.Init()` 初始化运行框架。\n3. 调用 `config.InitConf()` 加载配置。\n4. 调用 `middleware.InitCircuitBreaker()` 初始化熔断器。\n5. 等待初始化完成后调用 `InitDb()` 创建 DAO 数据库句柄。\n6. 运行所有 `src/dao` 包内测试。\n\n## 主要职责\n\n该测试模块验证 DAO 层对以下数据模型的读写能力：\n\n| 领域 | 主要 DTO | 代表性 DAO 方法 |\n| --- | --- | --- |\n| 访问能力 | `dto.Access` | `CreateAccess`、`GetAccess`、`DeleteAccess` |\n| 条件 | `dto.Condition` | `CreateCondition`、`GetCondition`、`DeleteCondition` |\n| 账号 | `dto.VideoAccount`、`dto.VideoConfig` | `CreateAccount`、`UpdateAccount`、`MGetAccount`、`PageGetAccount` |\n| 视频账号查询 | `dto.PageGetAccountRequest`、`dto.MGetAccountWithConfigRequest` | `GetAccountByAK`、`PageGetVideoAccount`、`MGetVideoAccount` |\n| 配置 | `dto.VideoConfig` | `MCreateConfig`、`MUpdateConfig`、`MGetVideoConfig`、`DeleteConfig` |\n| 域名 | `dto.Domain`、`dto.DomainAccountRel` | `CreateDomain`、`GetDomain`、`UpdateDomainAccountRel`、`DeleteDomain` |\n| 域名授权 | `dto.DomainAuth` | `CreateDomainAuth`、`UpdateDomainAuthStatus`、`GetDomainAuths` |\n| 授权关系 | `dto.Authority` | `CreateAuthority`、`UpdateAuthorityStatus`、`MGetAuthorityByGrantor` |\n| 实例 | `dto.Instance` | `CreateInstance`、`UpdateInstance`、`GetInstance`、`ListInstance` |\n| 规则 | `dto.VideoRule`、`dto.VideoRuleV2` | `CreateRule`、`BatchGetRule`、`UpdateVideoRuleStatus` |\n| 分类 Schema | `dto.AccountCategorySchema` | `CreateAccountCategorySchema`、`UpdateAccountCategorySchema`、`DeleteAccountCategorySchema` |\n\n## 测试结构\n\n### 公共初始化\n\n`base_test.go` 中的 `TestMain` 是整个包测试的基础。所有测试都依赖它初始化 `Db`，因此新增 DAO 测试时不需要在单个测试里重复调用 `InitDb()`。\n\n该测试包默认使用 `context.TODO()` 或 `context.Background()` 调用 DAO 方法。现有代码没有在测试层注入超时控制，新增长耗时测试时应注意避免无限等待。\n\n### 构造测试数据\n\n模块使用小型 helper 构造复杂 DTO：\n\n- `buildNewAccountRequest()` 构造 `*dto.VideoAccount` 和初始 `[]*dto.VideoConfig`\n- `buildNewDomainReq()` 构造带 `AccountRels` 的 `*dto.Domain`\n- `buildCategorySchema()` 构造 `*dto.AccountCategorySchema`\n\n这些 helper 会用 `time.Now().Unix()` 拼接唯一名称，避免多数测试数据与已有记录冲突。例如：\n\n```go\naccountName := strings.Join([]string{\n\t\"account.unittest\",\n\tstrconv.FormatInt(time.Now().Unix(), 10),\n}, \"_\")\n```\n\n新增测试如果会写入唯一约束字段，应沿用这种模式，或者使用 `util.GetUUID()` 生成唯一值。\n\n## 账号与配置测试\n\n`account_test.go` 是覆盖面最广的测试文件，验证账号主表和配置表之间的组合操作。\n\n核心流程如下：\n\n```mermaid\nflowchart TD\n    A[\"构造 VideoAccount 和 VideoConfig\"] --> B[\"CreateAccount\"]\n    B --> C[\"UpdateAccountStatus\"]\n    C --> D[\"MGetAccount\"]\n    D --> E[\"UpdateAccount / UpdateAccountV2\"]\n    E --> F[\"PageGetAccount / GetAccountAmount\"]\n    F --> G[\"MCreateConfig / MCopyConfig / MUpdateConfig\"]\n    G --> H[\"MGetConfigByProvider\"]\n    H --> I[\"DeleteConfig\"]\n    I --> J[\"UpdateAccountStatus 标记删除\"]\n```\n\n### `CreateAccount`\n\n`Db.CreateAccount(context.TODO(), acct, configs)` 同时创建账号和初始配置。测试断言 `acct.ID > 0` 且 `configs[0].ID > 0`，说明 DAO 会回填自增主键。\n\n`buildNewAccountRequest()` 设置的关键字段包括：\n\n- `AccountName`\n- `AccessKey`\n- `SecretKey`\n- `UserName`\n- `ContentSecurityOwner`\n- `TopAccountID`\n- `TopInstanceID`\n- `VolcAccountID`\n- `VolcInstanceID`\n- `Type`\n- `VRegion`\n\n初始配置使用 `dto.VideoConfig`，其中 `Module` 为 `\"storage\"`，`CKey` 为 `\"all\"`，`Region` 为 `\"boe\"`。\n\n### `UpdateAccountStatus`\n\n测试先将账号状态更新为 `constant.StatusUnaudited`，随后通过 `MGetAccount` 验证返回记录的 `Status` 已同步变化。\n\n逻辑删除也通过同一个方法完成：\n\n```go\nerr = Db.UpdateAccountStatus(context.TODO(), acct.AccessKey, constant.StatusDeleted)\n```\n\n删除后，`MGetAccount` 和 `PageGetAccount` 会受 `WithDeleted` 字段控制：\n\n- `WithDeleted: false` 时查不到逻辑删除账号\n- `WithDeleted: true` 时可以查到逻辑删除账号\n\n### `MGetAccount` 和 `PageGetAccount`\n\n`MGetAccount` 使用 `dto.MGetAccountWithConfigRequest` 作为筛选条件，覆盖字段包括账号名、AK、状态、用户名、火山账号、Top 账号、类型、`VRegion` 等。\n\n`PageGetAccount` 在相同筛选条件外增加分页字段：\n\n```go\npageGetReq := &dto.PageGetAccountRequest{\n\tMGetAccountWithConfigRequest: dto.MGetAccountWithConfigRequest{\n\t\tAccountName: acct.AccountName,\n\t\tAccessKey:   acct.AccessKey,\n\t\tUserName:    acct.UserName,\n\t\tType:        acct.Type,\n\t\tVRegion:     acct.VRegion,\n\t},\n\tLimit:  10,\n\tOffset: 0,\n}\n```\n\n`GetAccountAmount` 与 `PageGetAccount` 使用同类请求，用于统计符合筛选条件的账号数量。\n\n### `UpdateAccount` 和 `UpdateAccountV2`\n\n`UpdateAccount` 测试覆盖账号大多数字段的更新，包括：\n\n- `Description`\n- `TopAccountID`\n- `TopInstanceID`\n- `VolcAccountID`\n- `VolcInstanceID`\n- `Type`\n- `UserName`\n- `ContentSecurityOwner`\n- `Extra`\n- `VRegion`\n\n`UpdateAccountV2` 特别验证空字符串更新场景：\n\n```go\nacct.Description = \"\"\nerr = Db.UpdateAccountV2(context.TODO(), acct)\n```\n\n随后通过 `MGetAccount` 断言 `Description` 确实被更新为空字符串。这个测试说明 `UpdateAccountV2` 应支持零值字段写入，而不是简单忽略空值。\n\n### 配置批量操作\n\n账号测试还覆盖配置生命周期：\n\n- `MCreateConfig` 新增配置\n- `MCopyConfig` 将指定区域配置复制到目标区域\n- `MUpdateConfig` 更新已有配置\n- `MGetConfigByProvider` 查询账号下全部配置\n- `DeleteConfig` 删除配置\n\n`MCopyConfig` 的调用方式是：\n\n```go\nerr = Db.MCopyConfig(\n\tcontext.TODO(),\n\tacct.AccessKey,\n\t\"boe\",\n\t[]string{\"boei18n\"},\n\t[]string{\"storage\"},\n)\n```\n\n该方法按 `AccessKey`、源区域、目标区域列表和模块列表复制配置。测试随后用 `MGetConfigByProvider(context.TODO(), acct.AccountName, \"\", util.R_ALL)` 校验复制和更新后的整体结果。\n\n## 视频账号查询\n\n`video_account_test.go` 使用固定 AK：\n\n```go\nvar ak = \"b9c329c103144b0da705252edecfd93a\"\n```\n\n这些测试依赖测试环境中已存在账号 `terminator_default`。\n\n覆盖的方法包括：\n\n- `GetAccountByAK`\n- `PageGetVideoAccount`\n- `GetVideoAccountAmount`\n- `GetVideoAccountDistinctTopAccountIdAmount`\n- `PageGetVideoAccountDistinctTopAccountIds`\n- `MGetVideoAccount`\n\n`GetAccountByAK` 接收 `*string`：\n\n```go\naccount, err := Db.GetAccountByAK(context.TODO(), &ak)\n```\n\n分页查询仍然使用 `dto.PageGetAccountRequest`，筛选条件嵌入 `dto.MGetAccountWithConfigRequest`。这些方法和 `account_test.go` 的账号 CRUD 不同，更偏向视频账号列表页和聚合查询能力。\n\n## 视频配置查询\n\n`video_config_test.go` 主要验证只读配置查询能力，也使用固定账号和 bucket：\n\n```go\nvar (\n\tprovider = \"terminator_default\"\n\tbucket   = \"tos-boe-o-0000\"\n\tmodule   = \"storage\"\n\tcategory = \"image\"\n)\n```\n\n覆盖的方法包括：\n\n- `MGetVideoConfig(context, ak, module, region)`\n- `MGetVideoConfigByKeys(context, []string{ak}, module, region)`\n- `MGetConfigByProvider(context, provider, category, region)`\n- `MGetStorageConfigByBucketName(context, bucket, region)`\n- `ListVideoConfigByCondition(context, req)`\n- `GetVideoConfigById(context, id)`\n\n`ListVideoConfigByCondition` 使用 `dto.ListConfigsByConditionRequest`：\n\n```go\nreq := &dto.ListConfigsByConditionRequest{\n\tModule: module,\n\tCKey:   category,\n\tCValue: bucket,\n\tRegion: \"boe\",\n}\n```\n\n测试通过 `strings.Contains(configs[0].CValue, bucket)` 判断配置内容是否匹配 bucket，说明 `CValue` 可能是包含 bucket 信息的结构化字符串，而不是纯 bucket 字段。\n\n## 域名与账号关系\n\n`domain_test.go` 验证 `dto.Domain` 与 `dto.DomainAccountRel` 的组合关系。\n\n`buildNewDomainReq()` 创建一个外部域名：\n\n```go\nreturn &dto.Domain{\n\tDomain:       domainName,\n\tType:         dto.ExternalDomain,\n\tTopAccountId: 1900000000,\n\tVender:       \"bytedance\",\n\tOwner:        \"wukuanxin\",\n\tStatus:       \"enabled\",\n\tAccountRels: []*dto.DomainAccountRel{{\n\t\tDomain:      domainName,\n\t\tAccountName: \"terminator_default\",\n\t\tRegion:      \"boe\",\n\t\tModule:      \"\",\n\t\tCategory:    \"all\",\n\t\tDomainType:  dto.ExternalDomain,\n\t}},\n}\n```\n\n主要流程是：\n\n1. `CreateDomain` 创建域名及初始账号关系。\n2. `MCopyDomainAccountRel` 将账号域名关系从 `\"boe\"` 复制到 `\"boei18n\"`。\n3. `GetDomain` 查询域名并验证 `AccountRels`。\n4. `ListAccountRelsByDomain` 按域名查询关系。\n5. `UpdateDomainAccountRel` 更新关系字段，例如 `Category`。\n6. `ListDomainAccountRel` 和 `BatchListDomainAccountRel` 按条件查询关系。\n7. `DeleteDomainRelById` 删除关系。\n8. `DeleteDomain` 删除域名。\n9. 对比全量 `ListDomainAccountRel` 和 `BatchListDomainAccountRel` 返回结果一致。\n\n`ListDomainAccountRel` 和 `BatchListDomainAccountRel` 都接收 `dto.ListDomainAccountRelRequest`。测试最后将两个结果 JSON 序列化后比较，说明批量查询实现应保持与普通查询一致的返回语义和排序表现。\n\n## 配置同步域名\n\n`sync_config_test.go` 验证 `VideoConfig` 中的域名配置变更会同步到域名表和域名账号关系表。\n\n测试构造的配置满足以下条件：\n\n- `Module` 为 `constant.ModulePicture`\n- `CKey` 为 `\"domains\"`\n- `Region` 为 `\"boe\"`\n- `CValue` 是包含 `domain_group.byte_stations[].domains[]` 的 JSON 字符串\n\n创建配置后：\n\n```go\nerr := Db.MCreateConfig(context.TODO(), []*dto.VideoConfig{videoConfig})\n```\n\n测试等待 3 秒后调用 `Db.GetDomain(context.TODO(), domainName)`，验证域名已创建，且账号关系中的 `RelType` 等于：\n\n```go\ndto.BuildDomainRelTypeFromConfig(videoConfig.Region, videoConfig.Module)\n```\n\n后续测试覆盖三种同步场景：\n\n1. 更新同一个域名的状态：`MUpdateConfig` 后 `Domain.Status` 从 `\"enable\"` 变为 `\"disabled\"`。\n2. 将配置中的域名替换为新域名：旧域名保留但 `AccountRels` 为空，新域名创建并绑定关系。\n3. 删除配置：调用 `DeleteConfig` 后清理测试域名。\n\n这个测试说明配置 DAO 不只是写配置表，还可能触发异步或延迟的域名同步逻辑。新增相关测试时需要给同步过程预留等待时间，现有代码使用 `time.Sleep(3 * time.Second)`。\n\n## 授权、访问与条件\n\n### `access_test.go`\n\n`Test_Access` 覆盖简单的访问资源 CRUD：\n\n- `CreateAccess`\n- `GetAccess`\n- `DeleteAccess`\n\n测试数据为 `dto.Access{Name, Description}`，创建后通过 `GetAccess` 验证列表非空，再按 `ID` 删除。\n\n### `condition_test.go`\n\n`Test_Condition` 与访问资源测试结构一致，使用 `dto.Condition`：\n\n- `CreateCondition`\n- `GetCondition`\n- `DeleteCondition`\n\n### `authority_test.go`\n\n`Test_Authority` 覆盖授权关系：\n\n- `CreateAuthority`\n- `UpdateAuthorityStatus`\n- `MGetAuthorityByGrantor`\n- `MGetAuthorityByGrantee`\n- `DeleteAuthority`\n\n`dto.Authority` 的关键字段包括：\n\n- `Grantor`\n- `GrantorName`\n- `Space`\n- `Grantee`\n- `AccessID`\n- `Conditions`\n\n测试先创建授权，再将状态更新为 `constant.StatusEnabled`，随后通过授权方和被授权方两个方向查询，验证状态更新结果。\n\n## 域名授权\n\n`domain_auth_test.go` 验证 `dto.DomainAuth` 的创建、重复创建检测、状态更新、查询和删除。\n\n`CreateDomainAuth` 的返回值是 `(errCode, err)`：\n\n```go\nerrCode, err := Db.CreateDomainAuth(context.TODO(), domainAuth)\n```\n\n测试语义是：\n\n- 首次创建：`err == nil` 且 `errCode == 0`\n- 重复创建：`err == nil` 且 `errCode > 0`\n\n这说明重复数据被业务错误码表达，而不是通过 Go `error` 返回。调用方需要同时检查 `errCode` 和 `err`。\n\n状态更新使用域名作为条件：\n\n```go\nerr = Db.UpdateDomainAuthStatus(context.TODO(), domainAuth.Domain, 1)\n```\n\n查询使用 bucket 和 domain：\n\n```go\nauthList, err := Db.GetDomainAuths(context.TODO(), domainAuth.Bucket, domainAuth.Domain)\n```\n\n删除使用 Top 账号、账号名和域名三元组：\n\n```go\nerr = Db.DeleteDomainAuth(context.TODO(), domainAuth.TopAccountId, domainAuth.AccountName, domainAuth.Domain)\n```\n\n## 实例管理\n\n`instance_test.go` 覆盖实例生命周期：\n\n- `CreateInstance`\n- `UpdateInstance`\n- `GetInstance`\n- `DeleteInstance`\n- `ListInstance`\n\n实例数据使用 `dto.Instance`，字段包括：\n\n- `AccountID`\n- `InstanceID`\n- `Configuration`\n- `ChargeItemCodes`\n- `ChargeItemOversea`\n\n`UpdateInstance` 接收 `dto.UpdateInstanceRequest`：\n\n```go\nerr = Db.UpdateInstance(context.TODO(), &dto.UpdateInstanceRequest{\n\tID:     instance.ID,\n\tStatus: constant.StatusEnabled,\n})\n```\n\n`ListInstance` 使用通用 `where map[string]interface{}` 加配置列表、分页参数：\n\n```go\nwhere := map[string]interface{}{\n\t\"account_id\": instance.AccountID,\n}\nvs, _, err := Db.ListInstance(\n\tcontext.TODO(),\n\twhere,\n\t[]string{\"vod.edit.basic.daily\", \"vod.daily.bandwidth\"},\n\t10,\n\t0,\n)\n```\n\n`DeleteInstance` 后再次 `GetInstance`，测试期望返回空列表而不是错误。\n\n## 规则管理\n\n`video_rule_test.go` 分别覆盖旧版 `dto.VideoRule` 和新版 `dto.VideoRuleV2`。\n\n### `VideoRule`\n\n`TestVideoRule` 覆盖：\n\n- `CreateRule`\n- `UpdateVideoRuleById`\n- `BatchGetRule`\n- `UpdateVideoRuleStatus`\n- `UpdateVideoRuleByProvider`\n- `PageGetRule`\n- `GetRuleAmount`\n- `DeleteVideoRule`\n\n`dto.VideoRule` 使用 `Provider`、`LocalIDC`、`Category` 区分规则，`SyncInfo` 保存同步信息 JSON 字符串。\n\n`UpdateVideoRuleByProvider` 通过 `(provider, localIDC, category)` 定位规则：\n\n```go\nerr = Db.UpdateVideoRuleByProvider(\n\tcontext.TODO(),\n\tvideoRule.Provider,\n\tvideoRule.LocalIDC,\n\tvideoRule.Category,\n\t\"{\\\"boei18n\\\":\\\"image\\\"}\",\n)\n```\n\n### `VideoRuleV2`\n\n`TestVideoRuleV2` 覆盖：\n\n- `CreateRuleV2`\n- `UpdateVideoRuleByIdV2`\n- `BatchGetRuleV2`\n- `UpdateVideoRuleStatusV2`\n- `DeleteVideoRuleV2`\n\n`dto.VideoRuleV2` 使用 `Type` 替代旧版中的 `Category` 作为规则维度之一：\n\n```go\nvideoRule := &dto.VideoRuleV2{\n\tProvider: \"unit-test-provider-\" + strconv.FormatInt(time.Now().Unix(), 10),\n\tLocalIDC: \"boe\",\n\tType:     \"encoded_video\",\n\tSyncInfo: \"{\\\"boei18n\\\":\\\"all\\\"}\",\n\tStatus:   constant.StatusUnaudited,\n}\n```\n\n## 分类 Schema\n\n`category_schema_test.go` 验证账号分类 Schema 的版本和历史记录机制。\n\n测试流程：\n\n1. `CreateAccountCategorySchema` 创建 schema。\n2. `ListAccountCategorySchema` 按 `AccountName` 查询。\n3. `getAccountCategorySchemaById` 按 ID 查询。\n4. `UpdateAccountCategorySchema` 更新 `SchemaValue`。\n5. 再次列表查询，验证 `Version` 从 `0` 增加到 `1`。\n6. `getAccountCategorySchemaHistory` 查询更新历史，验证 `HistoryReasonUpdate`。\n7. `DeleteAccountCategorySchema` 删除 schema。\n8. 再次查询历史，验证 `HistoryReasonDelete`。\n\n需要注意，`getAccountCategorySchemaById` 和 `getAccountCategorySchemaHistory` 是小写方法，仅在 `dao` 包内可见。测试文件同属 `package dao`，因此可以直接调用这些非导出方法。\n\n## 消费者信息\n\n`task_test.go` 只包含一个测试：\n\n```go\nfunc TestGetConsumersInfo(t *testing.T) {\n\tinfos, err := Db.GetAllConsumers(context.TODO())\n\tassert.Nil(t, err)\n\tassert.True(t, len(infos) > 0)\n}\n```\n\n该测试验证 `GetAllConsumers` 能从数据源返回至少一条消费者信息。它依赖测试环境中已有基础数据。\n\n## 与其他模块的关系\n\nDAO 测试模块主要连接以下包：\n\n- `src/dto`：提供所有数据库模型和请求结构，例如 `VideoAccount`、`VideoConfig`、`Domain`、`PageGetAccountRequest`。\n- `src/constant`：提供状态和模块常量，例如 `StatusUnaudited`、`StatusEnabled`、`StatusDeleted`、`ModulePicture`。\n- `src/util`：提供工具函数和常量，例如 `GetUUID()`、`R_ALL`。\n- `src/config`：在 `TestMain` 中通过 `InitConf()` 初始化配置。\n- `src/middleware`：在 `TestMain` 中通过 `InitCircuitBreaker()` 初始化熔断器。\n- `src/dao/db.go`：通过 `InitDb()` 初始化包级数据库访问对象 `Db`。\n\n从调用图看，本模块没有被其他代码调用；它是测试入口集合。内部调用也很少，主要是测试函数调用本文件内的构造 helper。绝大多数调用都是从测试直接进入 `Db` 的 DAO 方法，或构造 `dto` 请求对象。\n\n## 新增测试建议\n\n新增 DAO 测试时应遵循现有模式：\n\n1. 在 `src/dao` 包内编写测试，使用 `package dao`，这样可以访问包内非导出方法。\n2. 通过 `Db` 调用 DAO 方法，不要重复初始化数据库。\n3. 写入数据时使用时间戳或 UUID 构造唯一字段，避免与共享测试环境数据冲突。\n4. 测试完成后清理创建的数据，优先使用公开 DAO 删除方法；必要时再使用 `Db.w` 直接清理。\n5. 同时断言 `error` 和关键业务返回值，例如 `CreateDomainAuth` 的 `errCode`。\n6. 对逻辑删除场景同时验证默认不可见和 `WithDeleted: true` 可见。\n7. 如果 DAO 方法触发异步同步，例如配置同步域名，需要等待同步完成后再断言。\n8. 对分页查询，成对验证列表方法和数量方法，例如 `PageGetAccount` 与 `GetAccountAmount`。\n\n该模块的测试更关注 DAO 行为是否符合业务语义，而不是 SQL 细节。贡献代码时，应优先保持这些端到端语义稳定。","other-data":"# Other — data\n\n## 模块概览\n\n`data/db.sql` 是账号服务的数据模型定义文件，负责初始化账号、配置、授权、同步规则、域名和账号类目约束相关的数据表。该模块没有函数、类或运行时代码，也没有检测到调用关系或执行流；它通过数据库表结构、唯一索引和普通索引为代码库其他模块提供持久化契约。\n\n该文件包含两类表：\n\n- `t_*`：较基础的账号、配置、实例、权限和授权模型。\n- `v_*`：视频云账号体系相关模型，扩展了账号类型、区域配置、同步规则、域名绑定和 category schema 约束。\n\n```mermaid\nflowchart TD\n  A[\"v_account<br/>视频云账号\"] --> B[\"v_config<br/>按 access_key/module/ckey/region 存配置\"]\n  A --> C[\"v_rule<br/>按 provider/local_idc/category 定义同步规则\"]\n  A --> D[\"v_domain_account_rel<br/>域名与账号绑定\"]\n  E[\"v_domain<br/>域名信息\"] --> D\n  A --> F[\"v_account_category_schema<br/>账号 category 约束\"]\n  G[\"t_account<br/>基础账号\"] --> H[\"t_instance<br/>计费实例\"]\n  I[\"t_access<br/>权限\"] --> J[\"t_authority<br/>授权记录\"]\n```\n\n## 账号模型\n\n### `t_account`\n\n`t_account` 是基础账号信息表，核心字段包括：\n\n- `account_name`：账号名，受 `uniq_account_name` 唯一约束。\n- `access_key`：公钥，受 `uniq_access_key` 唯一约束。\n- `secret_key`：私钥。\n- `user_id`：申请人 ID，通过 `idx_user_id` 支持按申请人查询。\n- `status`：账号状态，默认 `unaudited`，注释中定义了 `enabled`、`disabled`、`deleted`、`unaudited`。\n- `extra`：扩展信息，使用 `longtext` 保存。\n\n表内没有外键约束，`user_id` 与用户系统的关系需要由业务代码保证。\n\n### `v_account`\n\n`v_account` 是视频云账号信息表，相比 `t_account` 增加了业务线和账号类型相关字段：\n\n- `account_name`：账号名，默认值为 `test`，全表唯一。\n- `access_key`：公钥，全表唯一。\n- `secret_key`：私钥。\n- `status`：账号状态，默认 `unaudited`。\n- `user_name`：用户名。\n- `top_account_id`：top 账号 ID。\n- `top_instance_id`：top 实例 ID。\n- `type`：账号类型，注释定义为 `space`、`provider`，空字符串表示 `provider`。\n- `extra`：扩展信息。\n\n`v_account` 是多个 `v_*` 表的逻辑中心。虽然 SQL 中没有声明外键，但以下表通过账号名或 access key 与它建立约定关系：\n\n- `v_config.access_key` / `v_config.account_name`\n- `v_rule.provider`\n- `v_domain_account_rel.account_name`\n- `v_account_category_schema.account_name`\n\n## 配置模型\n\n### `t_config`\n\n`t_config` 保存基础配置项，配置维度为：\n\n- `access_key`\n- `module`\n- `ckey`\n\n唯一索引 `uniq_ak_module_ckey` 保证同一个账号公钥、模块和配置键只能有一条记录。\n\n`module` 的注释列出了常见模块：\n\n- `global`\n- `upload`\n- `transcode`\n- `play`\n- `picture`\n\n`cvalue` 使用 `longtext`，说明配置值可能是较大的字符串或 JSON 文本。表结构本身不校验格式，业务代码需要负责解析和校验。\n\n### `v_config`\n\n`v_config` 是视频云账号配置表，在 `t_config` 的基础上增加了：\n\n- `account_name`：账号名，用 `idx_acc_name` 支持按账号名查询。\n- `region`：区域，默认 `default`，注释中给出 `CN`、`ALISG`、`MALIVA` 等值。\n\n唯一索引 `uniq_ak_m_k_r` 覆盖：\n\n```sql\naccess_key, module, ckey, region\n```\n\n这意味着同一个 `access_key` 在同一模块、同一配置键下，可以按不同 `region` 保存不同配置。\n\n开发时需要注意：`v_config` 同时保存 `access_key` 和 `account_name`，但没有数据库约束保证二者一定来自同一个 `v_account`。写入和更新配置时，应在业务层保证这两个字段的一致性。\n\n## 计费实例\n\n### `t_instance`\n\n`t_instance` 保存账号与计费实例的关系：\n\n- `account_id`：视频云账号 ID，默认 `0`。\n- `instance_id`：计费实例 ID。\n- `extra`：扩展信息。\n\n索引 `idx_account_id` 支持按账号 ID 查询实例。该字段没有显式外键，通常应对应账号表中的 `id`，但具体对应 `t_account.id` 还是 `v_account.id` 需要结合业务代码确认。\n\n## 权限与授权\n\n### `t_condition`\n\n`t_condition` 是条件定义表，字段较简单：\n\n- `name`：条件名称。\n- `description`：条件描述。\n- `extra`：扩展信息。\n\n它用于沉淀可复用的授权条件定义，但表结构中没有与 `t_authority.conditions` 建立外键关系。\n\n### `t_access`\n\n`t_access` 是权限定义表：\n\n- `name`：权限名称。\n- `description`：权限描述。\n- `extra`：扩展信息。\n\n`t_authority.access_id` 逻辑上引用该表的 `id`。\n\n### `t_authority`\n\n`t_authority` 保存授权记录：\n\n- `grantor`：授权者。\n- `grantor_name`：授权者名字。\n- `space`：空间。\n- `grantee`：被授权者。\n- `access_id`：权限 ID，逻辑上对应 `t_access.id`。\n- `conditions`：条件集合，默认 `'{}'`。\n- `status`：授权状态，默认 `unaudited`。\n- `extra`：扩展信息。\n\n索引用于两类主要查询：\n\n- `idx_grantor_space(grantor, space)`：按授权者和空间查询授权记录。\n- `idx_grantee(grantee)`：按被授权者查询被授予的权限。\n\n`conditions` 是 `varchar(1024)`，默认值是 JSON 对象字符串 `'{}'`。如果业务层将其作为 JSON 使用，需要考虑长度限制和解析失败场景。\n\n## 同步规则\n\n### `v_rule`\n\n`v_rule` 定义 provider 在不同 IDC 和 category 下的同步规则：\n\n- `provider`：指定用户，注释说明引用 `v_account.account_name`。\n- `local_idc`：TOS 文件初始化 IDC。\n- `category`：bucket reference key。\n- `sync_info`：需要同步的 IDC 和关联 category 信息。\n- `status`：规则状态，默认 `unaudited`，注释中定义 `enable`、`disable`、`deleted`、`unaudited`。\n\n唯一索引 `uniq_p_idc_c(provider, local_idc, category)` 保证同一个 provider 在同一个 IDC 和 category 下只有一条同步规则。\n\n辅助索引：\n\n- `idx_provider(provider)`：按 provider 查询规则。\n- `idx_idc(local_idc)`：按 IDC 查询规则。\n\n需要注意这里的状态值注释使用 `enable` / `disable`，而其他表多使用 `enabled` / `disabled`。开发时不要假设所有表的状态枚举完全一致。\n\n## 域名模型\n\n### `v_domain`\n\n`v_domain` 保存域名自身的信息：\n\n- `domain`：域名，全表唯一。\n- `top_account_id`：业务线 ID。\n- `service_tree_node_id`：业务服务树 ID，可为空。\n- `vender`：域名提供商。\n- `owner`：域名 owner。\n- `status`：域名状态，默认 `enabled`，注释包含 `enabled`、`disabled`、`configuring`、`configure_success`。\n- `certificate_id`：证书 ID。\n- `certificate_name`：证书名称。\n- `certificate_status`：证书状态，注释定义为 `off` 或 `on`。\n- `certificate_pub`：证书公钥。\n\n`uniq_domain(domain)` 保证域名唯一，适合以域名作为业务查询入口。\n\n### `v_domain_account_rel`\n\n`v_domain_account_rel` 保存域名与账号名之间的绑定关系：\n\n- `domain`：域名。\n- `account_name`：账号名称。\n\n唯一索引 `uniq_idx_domain_accountName(domain, account_name)` 保证同一个域名和账号不会重复绑定。\n\n辅助索引 `idx_accountName(account_name)` 支持按账号名查询其绑定域名。\n\n该表没有外键约束到 `v_domain.domain` 或 `v_account.account_name`，因此删除域名或账号时，需要业务代码同步清理关联关系，避免悬挂数据。\n\n## Category Schema 约束\n\n### `v_account_category_schema`\n\n`v_account_category_schema` 保存账号在某个 category 下的 schema 约束：\n\n- `account_name`：账号名。\n- `category`：类目。\n- `schema_type`：schema 类型。\n- `schema_value`：schema JSON，使用 `text` 保存。\n\n唯一索引 `uniq_account_name_category_schema_type(account_name, category, schema_type)` 保证同一个账号、类目和 schema 类型只有一条约束配置。\n\n`schema_value` 的注释说明它保存 JSON，但数据库层没有 JSON 类型或格式校验。读写该字段时，应由业务代码负责序列化、反序列化和兼容旧数据。\n\n## 时间字段约定\n\n所有表都包含类似的时间字段：\n\n```sql\ncreated_at timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP\nupdated_at timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP\n```\n\n这表示：\n\n- 插入记录时，`created_at` 和 `updated_at` 默认写入当前时间。\n- 更新记录时，MySQL 自动刷新 `updated_at`。\n- 业务代码通常不需要手动维护 `updated_at`，除非有特殊回放、迁移或修复数据的需求。\n\n## 状态字段约定\n\n多个表使用 `status varchar(128)` 或类似字段保存状态，但枚举值并不完全统一：\n\n- `t_account` / `v_account` / `t_authority`：`enabled`、`disabled`、`deleted`、`unaudited`\n- `v_rule`：`enable`、`disable`、`deleted`、`unaudited`\n- `v_domain`：`enabled`、`disabled`、`configuring`、`configure_success`\n- `v_domain.certificate_status`：`off`、`on`\n\n贡献代码时应按具体表的注释和现有业务逻辑处理，不要把某一张表的状态值复用到所有表。\n\n## 索引与查询入口\n\n该 schema 的索引主要服务以下访问模式：\n\n| 表 | 关键索引 | 适合的查询 |\n| --- | --- | --- |\n| `t_account` | `uniq_account_name` | 按账号名查基础账号 |\n| `t_account` | `uniq_access_key` | 按 access key 查基础账号 |\n| `t_account` | `idx_user_id` | 查某个申请人的账号 |\n| `t_config` | `uniq_ak_module_ckey` | 查某个 access key 下的模块配置 |\n| `t_instance` | `idx_account_id` | 查账号关联的计费实例 |\n| `t_authority` | `idx_grantor_space` | 查某授权者在某空间下的授权 |\n| `t_authority` | `idx_grantee` | 查某被授权者收到的授权 |\n| `v_account` | `uniq_account_name` | 按账号名查视频云账号 |\n| `v_account` | `uniq_access_key` | 按 access key 查视频云账号 |\n| `v_config` | `uniq_ak_m_k_r` | 按 access key、模块、key、region 查配置 |\n| `v_config` | `idx_acc_name` | 按账号名查配置 |\n| `v_rule` | `uniq_p_idc_c` | 查 provider 在 IDC/category 下的同步规则 |\n| `v_domain` | `uniq_domain` | 按域名查域名配置 |\n| `v_domain_account_rel` | `uniq_idx_domain_accountName` | 判断域名与账号是否已绑定 |\n| `v_account_category_schema` | `uniq_account_name_category_schema_type` | 查账号 category 的指定 schema |\n\n## 与代码库其他部分的连接方式\n\n该模块本身没有运行时代码，因此不会主动调用其他模块，也没有被调用的函数入口。它与代码库其他部分的连接点是数据库契约：\n\n- 业务代码依赖表名和字段名进行 CRUD。\n- 唯一索引用于防止重复账号、重复配置、重复绑定和重复 schema。\n- 普通索引用于支撑按账号、access key、provider、IDC、域名、授权对象等维度查询。\n- `longtext`、`text` 和 JSON 字符串字段由业务代码负责格式约束。\n- 逻辑关联没有使用数据库外键，数据一致性主要依赖业务层写入顺序、删除清理和校验逻辑。\n\n修改 `data/db.sql` 时，应把它视为跨模块契约变更。新增字段通常需要同步考虑：\n\n- 是否需要默认值以兼容历史插入逻辑。\n- 是否需要索引支持新的查询路径。\n- 是否会影响现有唯一约束。\n- 是否需要迁移历史数据。\n- 业务代码是否已经同时支持新旧字段。","other-dto":"# Other — dto\n\n## DTO 模块\n\n`src/dto` 是账号服务的数据契约层，集中定义 HTTP/RPC 请求响应结构、GORM 表模型、配置 JSON 结构和少量请求归一化逻辑。该包本身不承载完整业务流程；控制器、`validator`、`service` 和 `dao` 会围绕这些结构完成参数绑定、校验、持久化和同步。\n\n```mermaid\nflowchart LR\n  A[控制器/RPC 入口] --> B[DTO 请求结构]\n  B --> C[validator 校验与补齐]\n  C --> D[DTO 解析方法]\n  D --> E[VideoAccount]\n  D --> F[VideoConfig]\n  E --> G[dao 持久化]\n  F --> G\n  G --> H[配置事件与域名同步]\n```\n\n### 账号与配置\n\n核心模型在 `model.go` 和 `video_account.go`：\n\n- `VideoAccount` 映射 `v_account`，用于当前账号主模型。`BeforeCreate` 通过 `util.GenId(context.TODO(), v.TableName(), 1)` 生成 ID，并把 `Status` 设为 `constant.StatusEnabled`。\n- `VideoConfig` 映射 `v_config`，保存账号配置项：`AccessKey`、`AccountName`、`Module`、`CKey`、`CValue`、`Region`。创建前同样使用 `util.GenId`。\n- `VideoInstance` 映射 `v_instance`。\n- `Account` 也映射 `v_account`，是旧接口/旧查询路径仍在使用的账号结构；`BeforeCreate` 使用 `AutoIncrID` 并把状态设为 `constant.StatusUnaudited`。\n- `Instance` 映射 `t_instance`。\n\n`CreateAccountRequest.ParseAccountAndConfigs()` 是账号创建时最重要的 DTO 转换方法。它会：\n\n1. 使用请求里的 `AccessKey` / `SecretKey`，为空时用 `util.GetUUID()` 生成。\n2. 构造 `VideoAccount`，复制账号名、描述、负责人、火山账号、服务树节点、`VRegion` 等字段。\n3. 调用 `fillDefaultVolcAccountId` 和 `fillDefaultVolcVRegion` 补齐空间类账号的火山账号 ID 与默认归属区域。\n4. 遍历 `VideoConfigs`，统一写入 `AccessKey`、`AccountName`，并用 `util.GetRegion(req.Region)` 归一化配置区域。\n5. 对非 `constant.ModuleGlobal` 配置，根据 `ConfSyncRegions` 复制同步区域配置。\n6. 如果没有传入 `constant.BucketSelectionStrategyCKey`，追加默认 `BucketSelectionStrategy{DisableAllCategory:false, DisableTerminator:true}`。\n7. 在 BOE 或内部生产环境下追加 `UploadPSMCheck{Pct:100, Mode:2}`，对应 `constant.ModuleUpload` / `constant.UploadOpenPsmCheckCKey`。\n\n`MCreateConfigRequest.ParseConfigs()` 是配置创建/更新路径的轻量版本：它只补齐 `AccessKey`、`AccountName`、归一化 `Region`，并复制非 global 配置到 `SyncRegions`，不会补默认 bucket selection strategy 或上传 PSM 检查配置。\n\n查询类 DTO 中需要注意：\n\n- `ListConfigsByConditionRequest.Validate()` 只强制 `Module` 非空；`CKey` 和 `CValue` 可以为空。\n- `ListConfigsByConditionRequest.ParseListConfigsReq()` 会把 `Region` 转成内部区域枚举。\n- `MGetAccountV3Request.Adjust()` 会归一化 `Region`，并把逗号分隔的 `AccountNames` 拆成 `AccountNameList`。\n- `MGetVideoAccountResponse.ParseOpenapiAccountResponse()` 只返回 OpenAPI 需要的账号字段，不包含配置列表、状态、火山账号和 `VRegion`。\n\n### 域名模型\n\n域名相关结构在 `domain.go`：\n\n- `Domain` 映射 `v_domain`，创建前使用 `util.GenId` 生成 `uint64` ID。\n- `DomainAccountRel` 映射 `v_domain_account_rel`，表示域名与账号、区域、模块、category 的绑定关系。\n- `DomainType` 定义域名类型：`ExternalDomain`、`InternalDomain`、`OriginalDomain`、`ScheduleDomain`、`InternalRDDomain`、`ExternalPrivateDomain`、`InternalPrivateDomain`。\n- `DomainDefaultCategory` 为 `\"all\"`，`DomainDefaultModule` 为 `\"none\"`。\n- `BuildDomainRelTypeFromConfig(region, module)` 返回 `region_module` 格式。虽然 `RelType` 字段标注为 Deprecated，但 DAO 删除、复制和同步逻辑仍依赖它定位一组绑定关系。\n- `AcctConfDomains.GetDomains()` 会把 `DomainGroup.ByteStations` 和 `DomainGroup.OtherStations` 下所有实例的 `Domains` 拉平成一个列表。\n\n配置同步中，`dao/sync_config.go` 会识别 `Module` 为 `constant.ModulePlay` 或 `constant.ModulePicture` 且 `CKey == \"domains\"` 的 `VideoConfig`，把 `CValue` 反序列化为 `AcctConfDomains`，再构造 `Domain` 与 `DomainAccountRel`。\n\n### 权限、访问与条件\n\n权限类模型较简单：\n\n- `Access` 映射 `t_access`，字段包括 `Name`、`Description`、`Extra`。\n- `Condition` 映射 `t_condition`。\n- `Authority` 映射 `t_authority`，包含 `Grantor`、`GrantorName`、`Space`、`Grantee`、`AccessID`、`Conditions` 和 `Status`。创建前会把状态设为 `constant.StatusUnaudited`。\n- `GetAuthorityRequest` 用于按 `grantor`、`space`、`grantee` 查询授权。\n\n这些结构的 `BeforeCreate` 多数调用 `AutoIncrID(&id)`。当前 `AutoIncrID` 只是把 ID 置为 `0`，让数据库自增或 GORM 后续主键回填接管；`AfterCreate` 统一从 `scope.PrimaryKeyValue()` 写回模型 ID。\n\n### 分类 Schema\n\n`category_schema.go` 定义账号 category 级别的配置 schema：\n\n- `AccountCategorySchema` 映射 `v_account_category_schema`。\n- `AccountCategorySchemaHistory` 映射 `v_account_category_schema_history`。\n- 当前允许的 `SchemaType` 只有 `SchemaEmbeddedMetadata`，值为 `\"embedded_metadata\"`，通过 `SchemaTypeAllowList` 控制。\n- `EmbeddedMetadataSchema` 是实际的 JSON 配置结构，包含 `Enabled`、`GrayMode`、`GrayPercentage`、`IgnoreGlobalConf`、`MetadataBlackList`、`SchemaVersion`。\n- 历史记录原因使用 `HistoryReasonUpdate` 和 `HistoryReasonDelete`。\n\n`validator.ValidateCreateAccountCategorySchemaRequest` 会校验账号存在、schema 类型合法，并在 `SchemaEmbeddedMetadata` 场景下检查 `SchemaValue` 是否能反序列化为 `EmbeddedMetadataSchema`。\n\n### 其他模型\n\n- `DomainAuth` 映射 `v_domain_bucket_relation`，用于 CDN 域名与 bucket/空间授权关系；配套请求包括 `CreateDomainAuthRequest`、`UpdateDomainAuthStatusRequest`、`DeleteDomainAuthStatusRequest`。\n- `VideoRule` 映射 `v_rule`，`VideoRuleV2` 映射 `v_rule_v2`，用于同步规则查询和分页响应。\n- `ConsumerModel` 映射 `t_consumer`，配合 `GetConsumerRateLimitResponse`、`QPSStruct` 表达消费者限流配置。\n- `RequestLiterals` 集中保存常用请求参数名，例如 `account_name`、`access_key`、`region`、`offset`、`limit`，避免控制器里散落字符串常量。\n\n### 与其他层的协作方式\n\n典型账号创建路径是：\n\n`service.CreateAccount` 读取 body → 反序列化为 `CreateAccountRequest` → `validator.ValidateCreateAccountRequest` 校验账号名、区域、配置和重复 AK → `ParseAccountAndConfigs` 生成 `VideoAccount` 与 `VideoConfig` → `dao.Db.CreateAccount` 在事务中写入 `v_account` 和 `v_config`。\n\n典型配置创建/更新路径是：\n\n入口请求绑定到 `MCreateConfigRequest` 或 `MUpdateConfigRequest` → `validator.ValidateMCreateConfigRequest` 校验 AK、区域和配置内容，并根据 AK 回填 `AccountName` → `ParseConfigs` 补齐配置字段和同步区域 → DAO 写入 `VideoConfig`。\n\n典型域名绑定路径是：\n\n请求绑定为 `Domain` 或 `DomainAccountRel` → `validator.ValidateCreateDomainRequest` / `ValidateCreateDomainAccountRelRequest` 归一化 `Region`、补默认 `Category` 和 `Module`、生成 `RelType` → DAO 写入 `v_domain` 或 `v_domain_account_rel`。\n\n### 贡献注意事项\n\n新增 DTO 字段时，需要同时检查 `gorm`、`json`、`msg` 或 `form` tag 是否符合调用方需要。数据库模型字段通常需要 `gorm:\"column:xxx\"`，请求查询字段通常使用 `form:\"xxx\"`。\n\n修改 `ParseAccountAndConfigs` 或 `ParseConfigs` 时要特别注意区域同步逻辑：`constant.ModuleGlobal` 配置不会被复制到同步区域，其他模块会根据 `ConfSyncRegions` / `SyncRegions` 复制，并使用 `util.GetRegion` 做内部区域映射。\n\n修改域名关系时不要只改 `Region` 或 `Module`，还要确认 `RelType` 是否通过 `BuildDomainRelTypeFromConfig` 同步更新，因为现有 DAO 仍用它做删除、复制和查询定位。\n\n测试主要覆盖表名、GORM hook 和请求解析行为。涉及默认配置、区域同步、火山账号补齐或域名关系生成的改动，应补充对应 DTO 单测，并在 service/validator/dao 层确认调用方是否依赖这些副作用。","other-errno":"# Other — errno\n\n## errno 模块\n\n`src/errno` 提供项目内统一的业务错误码、错误载荷和响应构造函数。service/controller 层通常返回 `*errno.Payload`，再由 `middleware.Response`、`OpenAPIResponse`、`JanusResponse` 或 `WandResponse` 转成具体 HTTP 响应格式。\n\n这个模块不负责写 HTTP 状态码；大多数接口仍由中间件以 `http.StatusOK` 输出，真正的业务成败由 `Payload.Code` 表达。\n\n## 核心数据结构\n\n```go\ntype Payload struct {\n\tCode    int         `json:\"code\"`\n\tMessage string      `json:\"message\"`\n\tData    interface{} `json:\"data,omitempty\"`\n\tAlert   bool        `json:\"-\"`\n}\n```\n\n`Payload` 是项目内的标准返回体：\n\n- `Code`：业务状态码，例如 `CodeOK`、`CodeBadRequest`、`CodeDbErr`\n- `Message`：给调用方或日志使用的错误描述\n- `Data`：成功响应的数据；为空时 JSON 中省略\n- `Alert`：不参与 JSON 序列化，目前作为内部标记保留\n\n`Payload` 实现了 Go 的 `error` 接口：\n\n```go\nfunc (p *Payload) Error() string {\n\treturn p.Message\n}\n```\n\n因此预定义错误如 `ErrStatusInvalid`、`ErrAccountExists` 可以在 validator/dao 这类返回 `error` 的函数中直接返回；上层再通过 `ErrorWithCode(code, err)` 把它包装成响应载荷时，`err.Error()` 会取到 `Payload.Message`。\n\n## 响应构造函数\n\n`OK(data interface{}) *Payload` 用于成功响应，固定返回：\n\n```go\n&Payload{\n\tCode:    CodeOK,\n\tMessage: \"ok\",\n\tData:    data,\n}\n```\n\nservice 层的常见模式是：\n\n```go\nif err := dao.Db.UpdateAccount(ctx, account); err != nil {\n\treturn errno.ErrorWithCode(errno.CodeDbErr, err)\n}\nreturn errno.OK(\"update account successfully\")\n```\n\n`Error(err error) *Payload` 是通用错误包装器：\n\n- `err == nil` 时返回 `OK(nil)`\n- 非空错误返回 `Code: 600` 和 `Message: err.Error()`\n\n当前代码中 `Error` 主要用于少量默认错误场景，例如 `src/service/id_gen.go`。新代码如果能判断错误类别，优先使用 `ErrorWithCode`，这样调用方和监控可以拿到更稳定的业务码。\n\n`ErrorWithCode(code int, err error) *Payload` 用指定业务码包装错误：\n\n```go\nreturn &Payload{\n\tCode:    code,\n\tMessage: err.Error(),\n}\n```\n\n这是 service/controller 层最常见的错误返回方式，例如参数错误使用 `CodeBadRequest`，数据库错误使用 `CodeDbErr`，请求体读取失败使用 `CodeGetDataErr`。\n\n## 错误码分组\n\n`code.go` 中的常量按大致语义分组：\n\n- 成功类：`CodeOKZero = 0`、`CodeOK = 2000`、`CodeCreated = 2001`、`CodePartialContent = 2006`\n- 客户端/鉴权类：`CodeBadRequest = 4000`、`CodeUnauthorized = 4001`、`CodeForbidden = 4003`、`CodeNotFound = 4004`、`CodeTooManyRequests = 4029`\n- 配置缺失类：`CodeMissConfig = 4040`、`CodeMissConfigWithCkey = 4041`\n- 服务端/依赖类：`CodeInternalErr = 5000`、`CodeServiceUnavailable = 5003`、`CodeRemoteCallErr = 5004`、`CodeGetDataErr = 5012`、`CodeParseDataErr = 5013`、`CodeDbErr = 5014`\n- 配置创建专项错误：`CodeCreateConfigError = 6000`、`CodeRegionIsMissing = 6001`、`CodeSuffixIsMissing = 6002`、`CodeSuffixInvalid = 6003`\n\n`CodeOKZero` 是兼容型成功码，实际使用在 `CheckAccountExist` 等接口中；通用中间件把 `CodeOK` 和 `CodeOKZero` 都视为非错误。\n\n## 预定义错误实例\n\n模块中定义了一组全局 `*Payload`，用于复用固定错误语义：\n\n```go\nErrUnauthorized     = &Payload{Code: CodeUnauthorized, Message: \"unauthorized\"}\nErrTooManyRequests  = &Payload{Code: CodeTooManyRequests, Message: \"too many requests\"}\nErrNoWriteAuth      = &Payload{Code: CodeUnauthorized, Message: \"no write authority\"}\nErrRemoteCallFailed = &Payload{Code: CodeRemoteCallErr, Message: \"call remote service failed\"}\nErrDBCircuitBreaker = &Payload{Code: CodeInternalErr, Message: \"db circuit breaker\"}\n```\n\n这些实例在中间件和校验器中直接返回。例如：\n\n- `middleware.Filter` 在非白名单写请求中返回 `ErrNoWriteAuth`\n- `middleware.HandleACLUnauthorized` 返回 `ErrUnauthorized`\n- `middleware.Response` 和 `JanusResponse` 限流时返回 `ErrTooManyRequests`\n- `validator` 中的 `ValidateStatus`、账号/配置校验函数会返回 `ErrStatusInvalid`、`ErrModuleInvalid`、`ErrAccountExists` 等\n\n这些全局实例应当按只读对象使用。不要在调用处修改 `ErrUnauthorized.Message`、`ErrTooManyRequests.Data` 这类字段，否则会影响后续所有请求。\n\n## 断路器错误处理\n\n`ParseCBError(err error) error` 专门处理 `github.com/sony/gobreaker` 的数据库断路器错误：\n\n```go\nfunc ParseCBError(err error) error {\n\tswitch err {\n\tcase gobreaker.ErrOpenState, gobreaker.ErrTooManyRequests:\n\t\treturn errors.New(ErrDBCircuitBreaker.Message)\n\t}\n\treturn err\n}\n```\n\nDAO 层在使用 `middleware.GetDBCircuitBreaker()` 包裹数据库操作后，会调用 `errno.ParseCBError(err)`。这样 `gobreaker.ErrOpenState` 和 `gobreaker.ErrTooManyRequests` 不会直接暴露给 service 层，而是统一变成 `\"db circuit breaker\"`。service 层通常再包装为 `CodeDbErr` 或其他依赖错误码。\n\n```mermaid\nflowchart TD\n    A[\"请求中间件\"] --> B[\"service/controller 返回 *errno.Payload\"]\n    B --> C[\"errno.OK / errno.ErrorWithCode\"]\n    C --> D[\"middleware.Response 直接输出 Payload\"]\n    C --> E[\"JanusResponse 映射成功码为 0\"]\n    C --> F[\"WandResponse 只输出 Data\"]\n    G[\"DAO 断路器错误\"] --> H[\"ParseCBError\"]\n    H --> B\n```\n\n## 与中间件的连接\n\n`middleware.MyHandler` 定义为：\n\n```go\ntype MyHandler func(c *gin.Context, ctx context.Context) *errno.Payload\n```\n\n这使 `errno.Payload` 成为大多数业务 handler 的统一返回契约。\n\n`middleware.Response` 会直接输出完整 payload：\n\n```json\n{\n  \"code\": 2000,\n  \"message\": \"ok\",\n  \"data\": {}\n}\n```\n\n`middleware.JanusResponse` 会调用 `toJanusPayload`，其中 `errno.CodeOK` 会被映射成 Janus 协议的 `0`，业务数据放到 `response` 字段。\n\n`middleware.WandResponse` 只返回 `p.Data`，不输出 `code/message`。但它仍然依赖 `Payload.Code` 做限流、鉴权、日志和指标判断。\n\n## 测试覆盖\n\n`src/errno/code_test.go` 覆盖了模块的基础契约：\n\n- `TestError`：`Error(err)` 返回默认 `Code == 600`，消息来自 `err.Error()`\n- `TestErrorWithCode`：`ErrorWithCode(code, err)` 保留传入 code\n- `TestOK`：`OK(data)` 返回 `CodeOK` 并保留 `Data`\n- `TestParseCBError`：普通错误原样返回，`gobreaker.ErrTooManyRequests` 转成 `ErrDBCircuitBreaker.Message`\n- `TestPayload_Error`：`Payload.Error()` 返回 `Message`\n\n## 贡献注意事项\n\n新增错误码时，先复用现有分组语义；只有调用方或监控确实需要区分新错误类型时再增加常量。新增预定义错误实例时，保持 `Code` 与 `Message` 的语义一致，并按只读全局变量使用。\n\n新增 handler 时优先返回 `errno.OK(data)` 或 `errno.ErrorWithCode(code, err)`。如果返回预定义 `ErrXxx`，确认调用方不需要附加上下文数据；如果需要动态消息或数据，应创建新的 `Payload` 或使用 `ErrorWithCode` 包装具体错误。","other-go-mod":"# Other — go.mod\n\n## 模块定位\n\n`go.mod` 是 `code.byted.org/videoarch/account` 服务的 Go Module 清单。它不包含可执行逻辑、函数或类，因此没有内部调用、外部调用、入站调用，也不会出现在运行时执行流中。它的作用是定义：\n\n- 当前仓库的模块路径：`code.byted.org/videoarch/account`\n- 编译使用的 Go 语言版本：`go 1.23`\n- 直接依赖和间接依赖的版本边界\n- 特定依赖的替换规则\n\n```go\nmodule code.byted.org/videoarch/account\n\ngo 1.23\n```\n\n## 依赖结构\n\n该文件使用两个 `require` 块：\n\n第一个 `require` 块声明当前代码直接依赖的库，例如 Web/RPC 框架、配置、存储、缓存、日志、监控、业务 SDK 和测试工具。\n\n第二个 `require` 块主要是 `// indirect` 依赖，由直接依赖传递引入。它们通常不应被业务代码直接使用，除非确实需要将其提升为直接依赖。\n\n```mermaid\nflowchart TD\n    A[account 模块] --> B[HTTP 与 RPC]\n    A --> C[配置与环境]\n    A --> D[存储与缓存]\n    A --> E[日志监控链路]\n    A --> F[消息与外部 SDK]\n    A --> G[测试与工具库]\n\n    B --> B1[gin / ginex / kitex]\n    C --> C1[viper / tccclient / env]\n    D --> D1[gorm / mysql / redis]\n    E --> E1[logs / metrics / bytedtrace / lidar]\n```\n\n## 核心直接依赖\n\n### 服务框架\n\n`github.com/gin-gonic/gin` 和 `code.byted.org/gin/ginex` 支撑 HTTP 服务能力。`ginex` 是内部封装，通常用于统一接入内部中间件、路由或运行时约定。\n\n`code.byted.org/kite/kitex` 是 RPC 框架依赖，用于服务间通信。间接依赖中还包含 `cloudwego/kitex`、`kite/kitc`、`kite/kite` 等相关运行时和协议支持包。\n\n### 配置与环境\n\n`github.com/spf13/viper` 用于通用配置读取。\n\n`code.byted.org/gopkg/tccclient` 用于接入 TCC 配置。\n\n`code.byted.org/gopkg/env` 和 `code.byted.org/videoarch/env` 提供环境识别、运行环境读取等内部能力。\n\n### 存储、缓存与数据库\n\n`code.byted.org/gopkg/gorm`、`gorm.io/gorm`、`code.byted.org/gopkg/mysql-driver`、`code.byted.org/videoarch/vda-mysql-driver` 共同构成数据库访问相关依赖。该项目同时存在内部 GORM 封装和上游 `gorm.io/gorm` 的间接依赖，修改数据库层代码时需要注意实际 import 的包路径。\n\n`code.byted.org/kv/goredis/v5` 是 Redis 客户端依赖。\n\n`github.com/bluele/gcache`、`code.byted.org/gopkg/refresh_cache`、`code.byted.org/videoarch/go-remote-cache` 提供本地缓存、刷新缓存和远端缓存能力。\n\n### 可观测性\n\n`code.byted.org/gopkg/logs` 和 `code.byted.org/gopkg/logs/v2` 同时存在，说明代码库可能同时使用两个日志版本。新增代码时应优先沿用所在包已有的日志 import 风格，避免在同一模块中混用。\n\n`code.byted.org/gopkg/metrics` 以及间接依赖中的 `metrics/v3`、`metrics/v4` 提供指标上报能力。\n\n`code.byted.org/bytedtrace/interface-go` 和大量 `bytedtrace-*` 间接依赖用于链路追踪。\n\n`code.byted.org/lidar/agent` 以及 `lidar/profiler` 相关间接依赖用于性能采集或运行时 profiling。\n\n### 消息与外部系统\n\n`code.byted.org/rocketmq/rocketmq-go-proxy` 是 RocketMQ 接入依赖，间接依赖中还有 `rocketmq-go-proxy-mqmesh-interceptor`。\n\n业务域 SDK 包括：\n\n- `code.byted.org/videoarch/account-sdk`\n- `code.byted.org/videoarch/iamsdk`\n- `code.byted.org/videoarch/harden-sdk`\n- `code.byted.org/videoarch/bktmeta-simple-sdk`\n- `code.byted.org/videoarch/caesar_config`\n- `code.byted.org/tiktok/decc_channel_integration_sdk`\n- `code.byted.org/ti/cdn_schedule_manager/pkg`\n\n这些依赖通常代表当前服务与账号、权限、加固、配置、调度或外部业务系统之间的边界。\n\n### 测试与辅助库\n\n测试相关依赖包括：\n\n- `github.com/stretchr/testify`\n- `github.com/bytedance/mockey`\n- `github.com/agiledragon/gomonkey/v2`\n- `github.com/kr/pretty`\n\n通用工具包括：\n\n- `github.com/pkg/errors`\n- `github.com/google/uuid`\n- `dario.cat/mergo`\n- `github.com/bitly/go-simplejson`\n- `go.uber.org/atomic`\n- `gopkg.in/validator.v2`\n- `gopkg.in/yaml.v3`\n\n## 替换规则\n\n文件末尾包含一个显式 `replace`：\n\n```go\nreplace github.com/apache/thrift => github.com/apache/thrift v0.13.0\n```\n\n这会强制所有对 `github.com/apache/thrift` 的解析使用 `v0.13.0`，即使依赖图中出现了其他版本声明。当前 `require` 中存在：\n\n```go\ngithub.com/apache/thrift v0.22.0 // indirect\n```\n\n但最终生效版本会被 `replace` 降到 `v0.13.0`。修改该规则前需要确认 Kitex/Kite、Thrift 协议生成代码、RPC 序列化链路是否兼容新版本。\n\n## 与代码库的关系\n\n`go.mod` 是整个仓库构建、测试和依赖解析的入口。业务代码通过普通 Go import 引入这里声明的模块，Go 工具链再根据 `go.mod` 和 `go.sum` 解析实际版本。\n\n由于该文件没有函数、方法或类型定义，调用图不会显示任何执行边。它对代码库的影响体现在构建期和依赖解析期，而不是运行时调用链。\n\n## 维护建议\n\n新增业务代码时，如果引入新的 import，优先确认现有依赖是否已经覆盖需求，避免重复引入功能相近的库。\n\n升级依赖时，应关注以下高风险区域：\n\n- RPC 与 Thrift：`kitex`、`kite/*`、`github.com/apache/thrift`\n- 数据库驱动：`mysql-driver`、`vda-mysql-driver`、`gorm`\n- 可观测性链路：`logs`、`metrics`、`bytedtrace`\n- 安全与鉴权 SDK：`iamsdk`、`harden-sdk`、`security/*`\n\n清理依赖时不要手工删除大量 `// indirect` 项。更稳妥的方式是让 Go 工具链根据实际 import 重新整理：\n\n```bash\ngo mod tidy\n```\n\n如果修改了直接依赖版本，应配套运行编译和测试，确认依赖图、生成代码和运行时初始化逻辑没有被破坏。","other-interface-limiter":"# Other — interface_limiter\n\n## 模块概览\n\n`src/interface_limiter` 提供进程内、本地的接口级限流能力。调用方使用接口标识 `mkey` 调用 `Allow(mkey)`，模块根据当前配置中的 `QPS` 和 `Burst` 判断请求是否放行。\n\n该模块只限制显式配置过的 `mkey`。默认配置、关闭配置、空快照、未命中的 `mkey` 都会放行请求。\n\n## 核心流程\n\n```mermaid\nflowchart TD\n    A[\"服务启动或 TCC 刷新\"] --> B[\"InitConfig / UpdateConfigFromTCC\"]\n    B --> C[\"UpdateConfig\"]\n    C --> D[\"UpdateLimits 构建新快照\"]\n    D --> E[\"atomic.Value 原子替换 current\"]\n    F[\"middleware.Response 收到请求\"] --> G[\"Allow(mkey)\"]\n    G --> H{\"命中 limiter?\"}\n    H -- \"否\" --> I[\"放行\"]\n    H -- \"是\" --> J[\"rate.Limiter.Allow\"]\n    J -- \"通过\" --> I\n    J -- \"拒绝\" --> K[\"ErrTooManyRequests\"]\n```\n\n## 关键组件\n\n### `snapshot`\n\n```go\ntype snapshot struct {\n\tlimiters map[string]*rate.Limiter\n}\n```\n\n`snapshot` 是一次完整限流配置的不可变视图。`limiters` 以 `mkey` 为键，值为 `golang.org/x/time/rate.Limiter`。\n\n模块通过包级变量保存当前快照：\n\n```go\nvar current atomic.Value\n```\n\n`init()` 会写入一个空快照：\n\n```go\ncurrent.Store(&snapshot{limiters: map[string]*rate.Limiter{}})\n```\n\n因此在没有任何业务配置时，`Allow` 仍然可以安全读取 `current`，并因找不到对应 `mkey` 而放行。\n\n### `config.InterfaceRateLimiterConfig`\n\n配置结构定义在 `src/config/config.go`：\n\n```go\ntype InterfaceRateLimiterConfig struct {\n\tEnable bool                          `yaml:\"Enable\" json:\"enable\"`\n\tLimits map[string]InterfaceRateLimit `yaml:\"Limits\" json:\"limits\"`\n}\n\ntype InterfaceRateLimit struct {\n\tQPS   float64 `yaml:\"QPS\" json:\"qps\"`\n\tBurst int     `yaml:\"Burst\" json:\"burst\"`\n}\n```\n\n`Enable` 控制整个接口限流开关。`Limits` 按 `mkey` 配置限流参数：\n\n```yaml\nInterfaceRateLimiter:\n  Enable: true\n  Limits:\n    accounts.get:\n      QPS: 10\n      Burst: 20\n```\n\nTCC 使用 JSON 字段名：\n\n```json\n{\n  \"enable\": true,\n  \"limits\": {\n    \"accounts.get\": {\n      \"qps\": 10,\n      \"burst\": 20\n    }\n  }\n}\n```\n\n`QPS` 必须大于 0，`Burst` 必须大于 0。只要启用配置中存在非法值，整次更新会失败，旧快照不会被替换。\n\n## 配置入口\n\n### `InitConfig`\n\n```go\nfunc InitConfig(cfg config.InterfaceRateLimiterConfig) error {\n\treturn UpdateConfig(cfg)\n}\n```\n\n`InitConfig` 是启动初始化入口。`src/tcc/async_update.go` 中的 `initInterfaceRateLimiterFromConfig` 会从 `config.Conf.InterfaceRateLimiter` 初始化本地限流器。\n\n### `UpdateConfigFromTCC`\n\n```go\nfunc UpdateConfigFromTCC(value string, err error) error\n```\n\n该函数用于 TCC 热更新。行为要点：\n\n- `value == \"\"` 或传入的 `err != nil` 时直接返回 `nil`，不会改动当前快照。\n- 使用 `json.Decoder` 解析 `config.InterfaceRateLimiterConfig`。\n- 调用 `decoder.DisallowUnknownFields()`，因此 TCC JSON 中出现未知字段会返回错误。\n- 解析成功后调用 `UpdateConfig`。\n\nTCC 刷新逻辑位于 `src/tcc/async_update.go`，键名是：\n\n```go\nconst interfaceRateLimiterKey = \"interface_rate_limiter\"\n```\n\n`process()` 每轮刷新会读取该键，并调用：\n\n```go\ninterface_limiter.UpdateConfigFromTCC(val, nil)\n```\n\n### `UpdateConfig`\n\n```go\nfunc UpdateConfig(cfg config.InterfaceRateLimiterConfig) error {\n\tif !cfg.Enable {\n\t\treturn UpdateLimits(nil)\n\t}\n\treturn UpdateLimits(cfg.Limits)\n}\n```\n\n`UpdateConfig` 只处理总开关：\n\n- `Enable == false`：调用 `UpdateLimits(nil)`，写入空快照，相当于清空所有接口限流。\n- `Enable == true`：使用 `Limits` 构建新的限流器集合。\n\n### `UpdateLimits`\n\n```go\nfunc UpdateLimits(cfg map[string]config.InterfaceRateLimit) error\n```\n\n`UpdateLimits` 是快照构建函数。它会先创建新的 `map[string]*rate.Limiter`，逐项校验配置：\n\n```go\nif limit.QPS <= 0 {\n\treturn fmt.Errorf(\"invalid interface rate limiter qps, mkey: %s, qps: %f\", mkey, limit.QPS)\n}\nif limit.Burst <= 0 {\n\treturn fmt.Errorf(\"invalid interface rate limiter burst, mkey: %s, burst: %d\", mkey, limit.Burst)\n}\nlimiters[mkey] = rate.NewLimiter(rate.Limit(limit.QPS), limit.Burst)\n```\n\n所有配置校验通过后，才会执行：\n\n```go\ncurrent.Store(&snapshot{limiters: limiters})\n```\n\n这个顺序很重要：非法配置不会污染当前运行中的限流状态。测试 `TestInterfaceLimiterInvalidEnabledConfigKeepsOldSnapshot` 覆盖了该行为。\n\n## 请求路径中的使用方式\n\n普通请求入口在 `src/middleware/access.go` 的 `Response` 中接入接口限流：\n\n```go\nif !interface_limiter.Allow(mkey) {\n\tlogs.Warnf(\"trigger local interface rate limit: %s\", mkey)\n\tdata = errno.ErrTooManyRequests\n} else if util.HardenCli.Allow(rateLimitKey) {\n\tdata = f(c, ctx)\n} else {\n\tlogs.Warnf(\"trigger rate limit: %s\", rateLimitKey)\n\tdata = errno.ErrTooManyRequests\n}\n```\n\n执行顺序是：\n\n1. 先执行本地接口限流：`interface_limiter.Allow(mkey)`。\n2. 通过后再执行 `util.HardenCli.Allow(rateLimitKey)`。\n3. 两层限流任意一层拒绝，都会返回 `errno.ErrTooManyRequests`。\n4. 本地接口限流使用纯 `mkey`，不会区分调用方 `psm`。\n5. `HardenCli` 使用 `psm:mkey` 组合键，粒度不同。\n\n当前代码中，`OpenAPIResponse`、`janus_access.go`、`wand_access.go` 没有调用 `interface_limiter.Allow`，它们只使用已有的 `HardenCli` 限流路径。\n\n## `Allow` 的放行规则\n\n```go\nfunc Allow(mkey string) bool {\n\ts, ok := current.Load().(*snapshot)\n\tif !ok || s == nil {\n\t\treturn true\n\t}\n\tlimiter := s.limiters[mkey]\n\tif limiter == nil {\n\t\treturn true\n\t}\n\treturn limiter.Allow()\n}\n```\n\n`Allow` 的默认策略是 fail-open：\n\n- `current` 不是 `*snapshot`：放行。\n- `snapshot` 为 `nil`：放行。\n- 当前快照没有配置该 `mkey`：放行。\n- 找到对应 `rate.Limiter`：调用 `limiter.Allow()`。\n\n这意味着新增接口不会因为缺少配置而被误限流。只有明确写入 `Limits` 的 `mkey` 才会进入令牌桶判断。\n\n## 并发与热更新模型\n\n模块使用“构建新快照，然后原子替换”的方式支持热更新：\n\n- `Allow` 只读取 `current`，不加全局锁。\n- `UpdateLimits` 在本地构建完整的新 `limiters` map。\n- 校验全部通过后，通过 `atomic.Value.Store` 一次性替换。\n- 已有 `rate.Limiter` 不会被原地修改，新配置会生成新的 limiter 实例。\n\n这个模型避免了读写同一个 map 的并发风险。测试 `TestInterfaceLimiterConcurrentAllowAndConfigUpdate` 会并发执行 `Allow` 和 `UpdateConfig`，覆盖热更新期间的读写安全性。\n\n需要注意的是，热更新会重建 limiter，所以对应 `mkey` 的令牌桶状态也会重置。测试 `TestInterfaceLimiterHotUpdateReplacesSnapshot` 明确验证了新配置替换旧快照后，新的 `Burst` 会立即生效。\n\n## 测试覆盖的行为契约\n\n`src/interface_limiter/interface_limiter_test.go` 覆盖了以下关键行为：\n\n- `TestInterfaceLimiterDefaultAndDisabledConfigPassAllRequests`：默认配置和关闭配置都放行所有请求。\n- `TestInterfaceLimiterEnabledConfigLimitsOnlyConfiguredMKey`：只限制配置过的 `mkey`，未配置接口继续放行。\n- `TestInterfaceLimiterHotUpdateReplacesSnapshot`：热更新会替换完整快照，新增、修改、删除的 `mkey` 都立即按新快照生效。\n- `TestInterfaceLimiterDisabledHotUpdateClearsSnapshot`：关闭配置会清空当前限流快照。\n- `TestInterfaceLimiterInvalidEnabledConfigKeepsOldSnapshot`：非法 `QPS` 或 `Burst` 会返回错误，并保留旧快照。\n- `TestInterfaceLimiterConcurrentAllowAndConfigUpdate`：并发请求和配置热更新不会产生数据竞争式的共享 map 读写问题。\n\n测试中的辅助函数也表达了模块预期用法：\n\n```go\nfunc exhaustInterface(t *testing.T, mkey string, burst int) {\n\tfor i := 0; i < burst; i++ {\n\t\trequire.True(t, Allow(mkey))\n\t}\n\tassert.False(t, Allow(mkey))\n}\n```\n\n该模式依赖 `rate.Limiter` 的初始桶容量等于 `Burst`：连续消耗完突发额度后，下一次请求应被拒绝。","other-mem-limit":"# Other — mem_limit\n\n## 模块概览\n\n`src/mem_limit` 负责根据 TCC 配置的内存百分比动态设置 Go 运行时内存上限。模块读取容器内存环境变量 `MY_MEM_LIMIT`，结合 TCC 下发的 `mem_limit_percent`，计算最终字节数，并通过 `setMemoryLimit` 应用到运行时。\n\n该模块不承载业务请求流程；它作为运行时配置能力接入 `src/tcc/async_update.go` 的配置刷新逻辑。`mem_limit_percent` 是可选配置，读取失败、为空或应用失败都只记录日志，不阻断服务启动或 TCC 刷新。\n\n## 入口与调用关系\n\n主要入口是：\n\n```go\nfunc ApplyFromPercent(percentStr string) error\n```\n\n`ApplyFromPercent` 创建内部的 `memLimiter`，然后调用：\n\n```go\nfunc (*memLimiter) update(value string) error\n```\n\n在当前代码中，生产路径来自 TCC 配置刷新：\n\n```go\nval, err = GetTccSettingsClient().Get(ctx, memLimitPercentKey)\nif err != nil {\n\tlogs.CtxWarn(ctx, \"get value from tcc failed, err: %v, key: %s\", err, memLimitPercentKey)\n} else if val == \"\" {\n\tlogs.CtxInfo(ctx, \"tcc %s is empty, skip applying mem limit\", memLimitPercentKey)\n} else {\n\tif err := mem_limit.ApplyFromPercent(val); err != nil {\n\t\tlogs.CtxError(ctx, \"apply mem limit from tcc value=%s failed: %v\", val, err)\n\t}\n}\n```\n\n`process()` 会在 `SetDefaultValuesAndStartRefresh()` 中执行一次，并由 `refreshTccConfig()` 每分钟周期执行。因此内存限制会随 TCC 配置刷新被重新计算和应用。\n\n```mermaid\nflowchart TD\n    A[\"TCC 周期刷新 process\"] --> B[\"读取 mem_limit_percent\"]\n    B --> C{\"配置值是否为空\"}\n    C -->|为空| D[\"跳过设置\"]\n    C -->|非空| E[\"ApplyFromPercent\"]\n    E --> F[\"memLimiter.update\"]\n    F --> G[\"setMemoryLimit\"]\n```\n\n## 配置来源\n\n模块依赖两个输入：\n\n| 输入 | 来源 | 含义 |\n| --- | --- | --- |\n| `MY_MEM_LIMIT` | 环境变量 | Pod 或容器可用内存，单位为字节 |\n| `mem_limit_percent` | TCC 配置项 | 运行时内存上限占 `MY_MEM_LIMIT` 的百分比 |\n\n`MY_MEM_LIMIT` 必须是非负整数字符串。`mem_limit_percent` 也必须是整数字符串，且不能大于 `100`。\n\n示例：如果 `MY_MEM_LIMIT=8589934592`，TCC 下发 `mem_limit_percent=80`，最终限制为：\n\n```go\n8589934592 * 80 / 100\n```\n\n也就是约 `6.4 GiB`。\n\n## 核心实现\n\n### `ApplyFromPercent`\n\n`ApplyFromPercent(percentStr string) error` 是包级公开函数，也是外部模块应使用的入口。它只负责创建 `memLimiter` 并委托给 `update`，调用方不需要直接构造 `memLimiter`。\n\n```go\nfunc ApplyFromPercent(percentStr string) error {\n\tl := &memLimiter{}\n\treturn l.update(percentStr)\n}\n```\n\n### `memLimiter`\n\n`memLimiter` 是无状态内部结构体：\n\n```go\ntype memLimiter struct{}\n```\n\n它目前没有字段，主要用于承载 `update` 方法。测试中直接构造 `&memLimiter{}` 是因为测试文件与实现同包，可以覆盖内部解析逻辑。\n\n### `(*memLimiter).update`\n\n`update(value string) error` 是实际的配置解析和应用逻辑，执行顺序如下：\n\n1. 读取 `MY_MEM_LIMIT`。\n2. 使用 `strconv.ParseInt` 将 `MY_MEM_LIMIT` 解析为 `int64`。\n3. 拒绝负数 Pod 内存。\n4. 使用 `strconv.ParseInt` 解析传入的百分比字符串。\n5. 拒绝大于 `100` 的百分比。\n6. 当百分比 `<= 0` 时，将限制设置为 `math.MaxInt64`，等价于关闭显式限制。\n7. 当百分比大于 `0` 时，通过 `getMemBytes` 计算最终限制。\n8. 记录日志并调用 `setMemoryLimit(limitBytes)`。\n\n需要注意：代码注释里 `ApplyFromPercent` 写的是 `percent < 0 means disable limit`，而 `update` 的实际判断是 `percent <= 0`。因此当前行为是 `0` 和负数都会禁用限制。\n\n### `getMemBytes`\n\n`getMemBytes(total, percent int64) int64` 只做整数百分比换算：\n\n```go\nfunc getMemBytes(total, percent int64) int64 {\n\treturn total * percent / 100\n}\n```\n\n该函数不会做溢出保护，也不会处理边界校验；调用前的合法性校验由 `update` 完成。\n\n## 运行时设置实现\n\n`setMemoryLimit` 有两个构建版本。\n\nGo 1.19 及以上：\n\n```go\n//go:build go1.19\n\nfunc setMemoryLimit(limitBytes int64) {\n\tdebug.SetMemoryLimit(limitBytes)\n}\n```\n\n该版本调用 `runtime/debug.SetMemoryLimit`，真正设置 Go 运行时内存限制。\n\nGo 1.19 以下：\n\n```go\n//go:build !go1.19\n\nfunc setMemoryLimit(limitBytes int64) {\n\tlogs.Info(\"skip setting runtime memory limit on Go < 1.19, limit=%d\", limitBytes)\n}\n```\n\n旧版本 Go 没有 `debug.SetMemoryLimit`，因此这里是 no-op，只记录日志，保证代码可以在旧 Go 版本下编译。\n\n## 错误处理语义\n\n`mem_limit` 模块本身会把解析错误返回给调用方：\n\n| 场景 | 行为 |\n| --- | --- |\n| `MY_MEM_LIMIT` 不是整数 | 返回解析错误 |\n| `MY_MEM_LIMIT` 小于 `0` | 返回 `invalid pod mem` |\n| `mem_limit_percent` 不是整数 | 返回解析错误 |\n| `mem_limit_percent > 100` | 返回 `invalid tcc mem limit percent` |\n| `mem_limit_percent <= 0` | 设置为 `math.MaxInt64`，返回 `nil` |\n| `1 <= mem_limit_percent <= 100` | 计算并应用限制，返回 `nil` |\n\n在 TCC 调用方中，这些错误只会被记录：\n\n```go\nlogs.CtxError(ctx, \"apply mem limit from tcc value=%s failed: %v\", val, err)\n```\n\n不会把 `success` 设置为 `false`，因此不会触发 `process()` 失败，也不会阻断服务启动。\n\n## 与 TCC 刷新流程的关系\n\n`src/tcc/async_update.go` 中定义：\n\n```go\nmemLimitPercentKey = \"mem_limit_percent\"\n```\n\n该配置项和 Redis 开关、Redis TTL、接口限流配置等一起在 `process()` 中刷新。但它的失败语义更宽松：注释明确说明 `mem_limit_percent is optional: failures should not block service start.`\n\n因此贡献代码时应保持这个特性：内存限制是运行时优化或保护能力，不应该因为配置缺失或格式错误导致核心 Account 服务不可用。\n\n## 测试覆盖\n\n`src/mem_limit/memlimit_test.go` 覆盖了 `update` 的主要分支：\n\n- `MY_MEM_LIMIT=8589934592` 且百分比为 `80` 时成功。\n- 百分比为 `110ab` 时返回错误。\n- 百分比为 `110` 时返回错误。\n- 百分比为 `-1` 时成功，并表示禁用限制。\n- `MY_MEM_LIMIT=not-a-number` 时返回错误。\n\n测试没有断言 `debug.SetMemoryLimit` 的实际运行时效果，而是聚焦解析、校验和错误返回。这与模块设计一致：`setMemoryLimit` 的真实行为依赖 Go 构建版本，且 Go 1.19 以下是 no-op。\n\n## 修改注意事项\n\n修改该模块时优先保持以下约束：\n\n- 外部调用入口应继续使用 `ApplyFromPercent`，不要让 TCC 直接依赖 `memLimiter`。\n- `mem_limit_percent` 在 TCC 中应继续保持可选，不应让配置错误阻断 `process()`。\n- `setMemoryLimit` 的构建标签需要保持互斥：`go1.19` 与 `!go1.19`。\n- 如果调整 `percent <= 0` 的语义，需要同步更新注释和测试，因为当前代码实际把 `0` 和负数都视为禁用限制。\n- 如果增加新的计算规则，应优先补充 `memlimit_test.go`，尤其是边界值 `0`、`1`、`100` 和非法 `MY_MEM_LIMIT`。","other-middleware":"# Other — middleware\n\n## 中间件模块\n\n`src/middleware` 是 Gin 请求进入业务 `service` 前后的统一处理层。它负责路由级鉴权、来源识别、请求日志、限流、响应封装、指标上报、Trace 标记，以及部分对外协议的响应适配。\n\n业务 handler 在本模块中统一表示为：\n\n```go\ntype MyHandler func(c *gin.Context, ctx context.Context) *errno.Payload\n```\n\n也就是说，业务层不直接写 HTTP 响应，而是返回 `*errno.Payload`；`Response`、`OpenAPIResponse`、`JanusResponse`、`WandResponse` 再根据不同入口协议转换成实际 HTTP 输出。\n\n```mermaid\nflowchart TD\n    A[\"Gin 路由\"] --> B[\"Filter\"]\n    B --> C[\"NewACL().Check\"]\n    C --> D[\"LogRequest\"]\n    D --> E[\"Response / JanusResponse / OpenAPIResponse / WandResponse\"]\n    E --> F[\"service 业务函数\"]\n    F --> G[\"errno.Payload\"]\n    G --> H[\"HTTP 响应 + 指标 + 日志 + Trace\"]\n```\n\n### 路由挂载方式\n\n`main.go` 中主业务入口使用统一的中间件链：\n\n```go\naccountapi := r.Group(\"\")\naccountapi.Use(middleware.Filter)\naccountapi.Use(middleware.NewACL())\naccountapi.Use(middleware.LogRequest)\n```\n\n随后 `/account-api/v1`、`/account-api/v2`、`/account-api/v3` 下的大部分接口使用：\n\n```go\nmiddleware.Response(\"accounts.get\", service.MGetAccountWithConfig)\n```\n\n其他入口按协议选择不同包装器：\n\n- `/account-janus/v1` 和 `/account-bpm/v1` 主要使用 `JanusResponse`\n- `/account-openapi/v1` 使用 `OpenAPIResponse`\n- `/account-wand/v1` 使用 `WandResponse`\n- `/account-api/v1/remote` 直接挂在 `r.Group` 上，不经过 `accountapi.Use(...)` 的全局 `Filter`、`NewACL()`、`LogRequest`\n\n## 请求前置处理\n\n### `Filter`\n\n`Filter` 从请求头 `X-TT-From` 读取调用方 PSM，并写入 Gin context：\n\n```go\nc.Set(PSM, psm)\n```\n\n`PSM` 常量值为 `\"PSM\"`，后续 `Response`、`JanusResponse`、`WandResponse` 都会通过 `c.GetString(PSM)` 读取调用方，用于限流 key、指标 tag 和日志。\n\n`Filter` 还承担写接口白名单控制：\n\n```go\nif c.Request.Method != http.MethodGet && !tcc.GetAllowList(c)[psm] {\n    c.AbortWithStatusJSON(http.StatusOK, errno.ErrNoWriteAuth)\n    return\n}\n```\n\n非 `GET` 请求必须命中 `tcc.GetAllowList(c)` 返回的白名单，否则返回 `errno.ErrNoWriteAuth`。这里 HTTP 状态码是 `200`，业务错误通过 `errno.Payload` 表达。\n\n### `NewACL` 与 `ACL.Check`\n\n`NewACL` 从 TCC 拉取 ACL 配置：\n\n```go\nACLConfig = tcc.GetACLConfigs(context.Background())\n```\n\n然后构造 `ACL`：\n\n```go\ntype ACL struct {\n    Pairs          map[string]string\n    OnUnauthorized OnUnauthorizedFunc\n}\n```\n\n实际校验逻辑在 `(*ACL).Check`：\n\n1. 如果 `ACLConfig.IsEnabled()` 为 `false`，直接 `c.Next()`\n2. 从 `constant.HeaderAuthorization` 读取认证头\n3. 使用 `util.ParseBaseAuth(auth)` 解析用户名和密码\n4. 校验 `a.Pairs[u] == p`\n5. 失败时调用 `HandleACLUnauthorized`\n\n`HandleACLUnauthorized` 会记录 `\"unauthorized\"` 日志，并返回：\n\n```go\nc.AbortWithStatusJSON(http.StatusUnauthorized, errno.ErrUnauthorized)\n```\n\n注意：`NewACL` 只在创建中间件时读取一次 `ACLConfig` 和 `Pairs`。如果 TCC 中 ACL 配置后续发生变化，需要确认外层是否会重建 Gin handler，否则已构造的 `ACL.Pairs` 不会自动替换。\n\n### `LogRequest`\n\n`LogRequest` 读取请求 body、恢复 `c.Request.Body`，并打印请求摘要：\n\n```go\ncontent, err := c.GetRawData()\nc.Request.Body = ioutil.NopCloser(bytes.NewReader(content))\n_ = json.Unmarshal(content, &body)\n\nlogs.CtxInfo(c, \"Req:%s:%s Header:%v Body:%v Query:%v\", ...)\n```\n\n恢复 body 是关键行为：如果不重新写回 `c.Request.Body`，后续业务 handler 就无法再次读取请求体。\n\n`LogRequest` 对 body 的解析是宽松的：`json.Unmarshal` 失败不会中断请求，只会让日志里的 `Body` 保持空 map 或零值。\n\n## 标准响应包装：`Response`\n\n`Response(mkey string, f MyHandler)` 是主业务 API 的核心包装器。它做的事情比简单调用 `f` 多很多：\n\n1. 构造 RPC context\n2. 设置读请求压测绕过标记\n3. 提取调用方 `psm` 和 SDK 版本\n4. 识别业务函数名并写入 `K_METHOD`\n5. 执行接口级限流和 Harden 限流\n6. 调用业务 handler\n7. 统一写 CORS 与禁缓存响应头\n8. 返回 `errno.Payload`\n9. 上报延迟、吞吐、错误指标\n10. 设置 BytedTrace span 信息\n\n核心调用链是：\n\n```go\nctx := ginex.RPCContext(c)\nctx = context.WithValue(ctx, gorm.ContextSkipStressForRead, true)\n\nif !interface_limiter.Allow(mkey) {\n    data = errno.ErrTooManyRequests\n} else if util.HardenCli.Allow(rateLimitKey) {\n    data = f(c, ctx)\n} else {\n    data = errno.ErrTooManyRequests\n}\n```\n\n这里有两层限流：\n\n- `interface_limiter.Allow(mkey)`：按接口 `mkey` 做本地限流\n- `util.HardenCli.Allow(rateLimitKey)`：按 `psm:mkey` 做 Harden 限流\n\n只有两层限流都通过时，业务 handler 才会被调用。\n\n`Response` 会从 header 中按优先级读取 SDK 版本：\n\n1. `X-TT-Account-Sdk-Version`\n2. `X-TT-Biz-Callback-Sdk-Version`\n3. `\"unknown\"`\n\n如果 `psm` 或 SDK 版本为 `\"unknown\"`，会额外记录一条无 SDK 调用日志：\n\n```go\nlogs.CtxInfo(c, \"invalid request, method:%s, clientIP:%s, sdkVersion:%s, psm: %s\", ...)\n```\n\n错误判断使用业务 code：\n\n```go\nif data.Code != errno.CodeOK && data.Code != errno.CodeOKZero {\n    ...\n}\n```\n\n内部错误码 `>= errno.CodeInternalErr` 记为 error 日志，其他错误记为 warn 日志，并调用 `util.EmitError`。\n\n`Response` 还会读取业务 handler 写入 Gin context 的两个标记并加入指标 tag：\n\n- `ISGetAllAccounts`\n- `LocalCacheHit`\n\n例如 `service.MGetAccountWithConfig` 会通过这些 context key 标记是否是全量账号查询、是否命中本地缓存。\n\n## OpenAPI 响应包装：`OpenAPIResponse`\n\n`OpenAPIResponse` 用于 `/account-openapi/v1`，它不依赖 `Filter` 的写白名单，而是进行 IAM 签名与权限校验。\n\n主要流程：\n\n1. 提取 `psm`、SDK 版本、业务函数名\n2. 调用 `iamsdk.VerifyV4WithKms(context.Background(), c.Request)` 验签\n3. 根据 `constant.OpenapiMethodPermission[mkey]` 找到接口所需权限\n4. 从 path 参数中读取 `account`\n5. 调用 `iamsdk.GetIamPermissionsProject(ctx, Account.Name, projectId, []string{permission})`\n6. 校验通过后执行业务 handler\n7. JSON 序列化 `errno.Payload` 并通过 `c.Data` 返回\n\n失败场景包括：\n\n- 验签失败：`errno.CodeBadRequest`\n- `mkey` 不在 `constant.OpenapiMethodPermission`：`errno.CodeBadRequest`\n- path 中没有 `account` 参数：`errno.CodeBadRequest`\n- IAM 权限校验失败：`errno.CodeUnauthorized`\n\n当前实现中，权限校验失败后会给 `data` 赋值为 unauthorized 错误，但随后仍会继续执行：\n\n```go\ndata = f(c, ctx)\n```\n\n因此贡献代码时要特别注意这段控制流：如果目标行为是不允许未授权请求进入业务 handler，需要在权限失败后显式阻断。\n\n## Janus 响应包装：`JanusResponse`\n\n`JanusResponse` 服务 `/account-janus/v1` 和 `/account-bpm/v1` 这类 Janus/BPM 风格入口。它的业务 handler 类型仍然是 `MyHandler`，但响应结构转换为 `JanusPayload`：\n\n```go\ntype JanusPayload struct {\n    Code      int         `json:\"code\"`\n    Message   string      `json:\"message\"`\n    ReqeustId string      `json:\"trace_id\"`\n    Response  interface{} `json:\"response\"`\n}\n```\n\n转换函数是 `toJanusPayload`：\n\n```go\nfunc toJanusPayload(p *errno.Payload) JanusPayload {\n    if p.Code == errno.CodeOK {\n        jp.Code = JanusOkCode\n    } else {\n        jp.Code = p.Code\n    }\n    jp.Message = p.Message\n    jp.Response = p.Data\n    return jp\n}\n```\n\n也就是说，标准成功码 `errno.CodeOK` 会被转换为 Janus 期望的 `0`；业务数据从 `Payload.Data` 移到 `response` 字段。\n\n`JanusResponse` 也会做 Harden 限流、CORS/禁缓存 header、延迟/吞吐/错误指标和错误日志，但没有 `Response` 中的 `interface_limiter.Allow(mkey)` 和 BytedT
