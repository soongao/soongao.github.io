ettings.py` 中的 `PRODUCT`、`SUBSYS` 或 `MODULE` 会同时影响：\n\n- `PSM`\n- `BinaryName`\n- 启动目标路径\n- `-psm` 参数\n\n修改这些字段时，需要确保 `script/bin/` 下存在对应名称的可执行文件。","other-service":"# Other — service\n\n## service 服务模块\n\n`service` 包是 `bktmeta-api` 的业务编排层。它把 Gin 请求转换成 `errno.Payload`，并协调 `db.DbHandler`、`rpc.TosV3Cli`、`rpc.BpmCli`、`remote_cache`、`kms`、`storagegw`、TCC 配置、账号系统和 VSRE/BPM 工单系统。\n\n```mermaid\nflowchart TD\n  A[\"Gin 路由入口\"] --> B[\"middleware.Response\"]\n  B --> C[\"handle*Request\"]\n  C --> D[\"参数绑定与校验\"]\n  D --> E[\"MetaBucketApi / IdcProxySettingApi\"]\n  E --> F[\"db.DbHandler\"]\n  E --> G[\"rpc / kms / remote_cache / storagegw\"]\n  F --> H[\"errno.Payload\"]\n  G --> H\n```\n\n### 核心对象\n\n`MetaBucketApi` 是桶元数据主服务，负责桶创建、查询、更新、删除、缓存刷新、TOS/ToB TOS 补全、BPM/VSRE 回调、签名、加密桶查询和 Volcengine IAM 管理。`NewMetaBucketApi` 会初始化本地缓存、`storagegw.Client`、ToB TOS region endpoint 配置，并立即调用 `asyncUpdateAllBktCache` 预热缓存；随后通过 ticker 和 TCC listener 周期刷新全量缓存。\n\n`IdcProxySettingApi` 管理 IDC 元数据与代理配置。它用 `vfast_cache.VFastCache` 缓存单 IDC 代理和全量代理列表，供 `MetaBucketApi.calcIdcConfigs` 计算桶的单元化视图和跨 IDC 代理信息。\n\n公开接口通常采用固定模式：`CreateBucket(c *gin.Context)` 只调用 `middleware.Response(c, \"buckets.create\", api.handleCreateBucketRequest)`，实际逻辑放在 `handleCreateBucketRequest`、`createBucket` 等内部函数中。新增接口应保持这个模式，避免在路由入口里直接写业务逻辑。\n\n### 桶生命周期\n\n创建主路径是 `handleCreateBucketRequest -> createBucket`。`createBucket` 会根据后端类型做不同补全：\n\n- `meta.BackendTos`：通过 `GetTosBucket` 解析 `BackendBucket`，调用 `fillTosBktInfo` 补 PSM、Public、TTL，并尝试用 `rpc.TosV3Cli.AppendBucketManager` 添加 `videoarch_bktmetaapi` 管理员。\n- `meta.BackendToBTos`：调用 `fillTobTosIDC`，根据 `constant.TobTosRegionIDCMap` 从 region 反推 IDC。\n- 所有后端：调用 `validateBkt` 和 `checkBackendBucketBkt` 校验主桶与 `IdcConfigs` 的 `BackendBucket` JSON。\n- 密钥：`genAkSk` 对 TOS 复用后端桶 AK/SK，对非 TOS 自动生成；`genEncryptionKey` 使用 `kms.NewEncryptedKey` 生成加密 key，并禁止调用方预置 `EncryptionInfo.Key`。\n- 单元化：若请求没有带 `IdcConfigs`，`fillDefaultIDCConfigs` 会从 `tcc.GetDefaultIDCConfigs` 生成默认配置，目前支持 TOS、S3、ToB TOS。\n- 落库后调用 `removeBucketCache`，并在开启远程缓存时异步删除单桶缓存、更新 `bucketNameSetKey`。\n\n更新路径包括 `updateBucket` 和 `overwriteBucket`。两者都会先 `validateBkt`，区别在于分别调用 `dbh.UpdateBucket` 与 `dbh.OverwriteBucket`。删除路径 `deleteBucket` 调用 `dbh.DeleteBucket` 后清理本地和远程缓存。\n\n批量维护接口包括 `handleCreateBucketBatchRequest`、`handleUpdateBucketsIdcJanusRequest`、`handleUpdateBucketsPsmJanusRequest` 和 `handleUpdateBucketsSkJanusRequest`，返回值统一按 `success`、`failed`、`skip` 分组。\n\n### 查询与缓存\n\n单桶查询入口是 `handleGetBucketRequest -> getBucketByName -> getBucket`。`getBucket` 的读取顺序是本地 `bucketCache`、远程 `remote_cache`、DB。DB 命中后先缓存未解密原始对象，再由 `processBucket` 调用 `db.DecryptBucketWithConfig` 和 `calcIdcConfigs` 生成请求视图。DB 未命中会缓存空值 30 秒，降低穿透风险。\n\n全量查询入口是 `handleGetAllBucketsRequest`。缓存 key 由 `getAllBucketCacheKey(queryIdc, requestEnvIdc)` 生成，格式为 `all_<queryIdc>_<requestEnvIdc>`。如果 `decryptedAllBucketCache` 已存在，会复制全量桶并重新执行 `calcIdcConfigs`，再用 `bucketsToCacheItem` 生成带 ETag 的响应。只有缓存缺失时才用 `dbKeyLock` 控制 DB 回源。\n\n`asyncUpdateAllBktCache` 是全量缓存的核心后台任务。它优先读取远程缓存中的 `bucketNameSetKey`，批量拉取桶对象，对逻辑过期或缺失的桶分批回源 DB 并刷新远程缓存；失败时回退到 DB 全量查询。刷新完成后同时更新 `allSimpleBucketsCache`、`simpleBucketCache`、`decryptedAllBucketCache` 和已有的 `allBucketsCache` key，并通过 `syncBucketNamesWithDB` 对账远程桶名集合。\n\n`GetAllBucketsSimple` 和 `GetBucketSimple` 是轻量查询接口。它们使用忽略 AK/SK 的缓存；`handleGetBucketRequestSimple` 在 bktmeta 未注册但 `db.TosMetaCache` 有 TOS 元数据时，会用 `buildBktFromTosAdminBucket` 构造 `Unregistered: true` 的临时 `meta.Bucket`。\n\n### 单元化与 IDC 代理\n\n`calcIdcConfigs` 根据请求里的 `idc` 和 `client.ENV_IDC_HEADER` 计算返回视图。如果目标 IDC 命中 `IdcConfigs`，会把桶的 `BackendBucket`、`IDC`、`IDCType`、`IDCRegion`、`HijackConf`、`GatewayConf` 覆盖为该配置；如果没有命中，则清空 `IdcConfigs`。随后它会结合 `IdcProxySettingApi.getAllIdcProxiesFromCache` 为跨 IDC 请求填充 `Proxies`。\n\n`fillIdcTypeAndRegion` 和 `getIdcTypeAndRegion` 负责给桶和 `IdcConfigs` 标注 region/type。优先使用 IDC 代理表中的 `Region`、`Type`，否则根据 `env.GetRegionFromIDC`、`venv.IsAggregateIdc`、`venv.IsCentralIdc` 做兜底判断。\n\n### BPM 工单流程\n\n`handleCreateBucketBPMRequest` 用于 BPM 注册桶。若桶已存在，它只合并 `Category` 和 `Providers` 后调用 `updateBucket`；若不存在，则根据 `BackendType` 构造后端桶。TOS 场景由 `fillBPMTosBucketInfo` 处理：已存在 TOS 元数据时补齐 IDC、服务树、PSM 和默认 provider；需要创建 TOS 桶时，使用 `categoryShortNameMap`、`sceneTosVRegionMap`、`shortCategoryServiceTreeNodeIdMap` 生成 `TosBucketCreateReq`，再进入 `createAndUpdateTosBucket`。\n\n`handleCreateTOSBucketsBPMRequest` 是按账号和类目批量创建 TOS 桶的 BPM 入口。它根据 `bucketNamePattern` 和类目短码生成桶名，调用 `createAndUpdateTosBucket` 创建真实 TOS 桶，再调用 `createBucket` 注册 bktmeta。返回 `CreateTosBucketBPMResp`，其中 `AsyncCreate` 表示 TOS 创建走了异步审批。\n\n`createAndUpdateTosBucket` 定义在 `vsre.go`，但同时被 BPM 和 VSRE 使用。`TosBucketCreateReq.ServiceNode != 0` 表示创建 TOS 桶：如果 `rpc.TosV3Cli.CreateBucket` 直接返回 AK/SK，则同步写回 `BackendBucket`；如果返回 `SysMsg == \"Accepted\"` 且没有 AK/SK，则写入 `dto.TempBucket`，状态为 `db.TicketWaitingForApprove`。`handleCreateBucketCallBackRequest` 收到回调后把临时工单更新为 `db.TicketSuccess`，补齐 AK/SK 并正式注册桶。\n\n修改类 BPM 入口包括 `handleModifyTOSBucketLimitsBPMRequest`、`handleModifyTOSBucketPropsBPMRequest`、`handleModifyTOSBucketPublicLevelBPMRequest`，它们最终调用 `rpc.BpmCli.CreateWorkflow`。`handleAppendTOSBucketManagerBPMRequest` 根据 `Type` 选择添加用户账号或服务账号，并调用 `rpc.TosV3Cli.AppendBucketManager`。\n\n### VSRE 变更流程\n\n`handleVsreTriggerRequest` 通过 `vsreCli.GetTicket` 拉取 V1 工单，然后由 `executeVsreBucketAction` 执行 `CreateAction`、`UpdateAction`、`DeleteAction`。创建和更新 TOS 桶时会先走 `createAndUpdateTosBucket` 或同步 TOS TTL；更新 ToB TOS 时会调用 `fillTobTosBucketCredential`，从 DB 中保留已有 credentials，避免前端变更覆盖密钥。\n\n`handleVsreIdcTriggerRequest` 处理 IDC 代理变更，最终调用 `createIdc` 或 `updateIdcProxies`。`handleVsreVolcTriggerRequest` 处理 Volcengine IAM 的创建、更新、删除。\n\nV2 工单入口是 `handleCreateVsreV2TicketRequest`。它只接受 `module=bktmeta-api` 或 `module=idc-proxy`；若请求头 `X-VA-Change-Degrade` 为 `1`，则降级为直接执行 V1 工单。正常情况下通过 `convertV1TicketToV2` 生成 `models.Ticket` 并调用 `vsreV2Cli.CreateTicketV2`。回调入口 `handleCallbackVsreV2TicketRequest` 会拉取 V2 工单、用 `convertV2TicketToV1` 转回旧结构、执行对应模块逻辑，并用 `sendChangeSystemEvent` 上报变更事件。\n\n### TOS、ToB TOS 与第三方依赖\n\n`InitThirdPartyClient` 初始化 Passport、ByteTree 和 account client。`getProviderByServiceNode` 使用服务树节点路径查询 TopAccount，再从 account 系统推导 provider；对 `data.ti.cdn_domain_procedure` 和 `bytedance.videoarch.des_api` 调用方，会按固定命名生成 provider，并在不存在时通过 `createGeneralAccount` 调用 general_console 创建账号。\n\n`handleGetTosBackendConfigRequest` 返回当前 IDC 的 `allBackends` 配置。`handleGetBucketDefaultProviderRequest` 优先从 `db.TosMetaCache` 取 TOS 元数据，失败再调用 `rpc.TosV3Cli.QueryBucket`，最后用 `getProviderByServiceNode` 推导默认 provider。\n\n`handleGetTosBucketS3InfoRequest` 返回 TOS 桶的 S3 协议信息。它从 `db.TosMetaCache` 读取 `S3Info.Endpoint` 和 `S3Info.Region`，再由 `fillDesTosS3Info` 根据 `config.Conf.TosS3Router` 补充 `TLSPSM`、`RouterPSM` 和 `RouterCluster`。\n\n`volcengine_handler.go` 管理 `meta.VolcengineIAM` 的 CRUD。`handleGetTobTosBucketBaseInfo` 通过请求头 `client.AccessKeyHeader`、`client.SecretKeyHeader`、`client.SessionTokenHeader` 查询 ToB TOS 桶基础信息：先查 bktmeta 已注册桶，再用 `listVolcBuckets` 遍历 `tosTobRegionEndpoints`，并把结果缓存到 `tobTosBktCache`。\n\n### 辅助接口与安全边界\n\n`GetAllEncryptionBuckets` 从 `decryptedAllBucketCache` 中筛选已加密桶，使用 `kms.Decrypt` 解密 `EncryptionInfo.Key`，并缓存 1 分钟。该接口通过 `middleware.ResponseZti` 暴露。\n\n`Signature` 支持两种签名：`buildSignature` 基于 `duration` 生成 deadline 签名，`buildSignature2` 基于 `encodeBody` 生成 body 签名。若 `accessKey` 不在本地 `keyMap` 中，会先查桶并校验 AK。\n\nJanus 查询入口如 `handleGetAllBucketsJanusRequest`、`handleGetBucketJanusRequest` 使用 `verifyDevSreReq` 校验 `x-devsre-authorization` JWT。返回 ToB TOS 桶给 Janus 时，`fillTobTosInfoJanus` 会清空 credentials；返回 TOS 桶时，`fillTosInfoJanus` 会补充 VPaaS 需要的 TOS 元数据。\n\n### 维护和测试\n\n`script.go` 提供运维类批处理：`handleFixBucketExtraRequest` 从 account storage 配置回填 `Bucket.Extra`；`handleCreateBucketIDCConfigBatchRequest` 和 `handleDeleteBucketIDCConfigBatchRequest` 批量创建或删除 IDC 配置。\n\n测试初始化集中在 `TestMain`：依次初始化 `ginex`、配置、指标、KMS、JWT、RPC、DB、TCC、ByteDoc、TOS 元数据缓存和第三方 client，然后创建全局 `proxySettingApi` 与 `bucketApi`。单元测试大量使用 `gomonkey` patch `rpc.TosV3Cli`、`rpc.BpmCli`、`db.DbHandler` 等外部依赖；新增测试应优先复用 `createTestContext` 和 `buildNewTestBucket`。\n\n修改此模块时需要特别注意缓存一致性：任何会改变桶内容、IDC 配置、Volc IAM 或 IDC 代理的路径，都应同步清理对应本地缓存；桶变更还需要考虑远程缓存中的单桶 key 和 `bucketNameSetKey`。新增后端类型时，至少要补齐 `checkBackendBucketBkt`、`validateBkt`、创建/更新路径、Janus 脱敏逻辑，以及必要的默认 IDC 配置生成逻辑。","other-tcc":"# Other — tcc\n\n## tcc 模块\n\n`tcc` 包负责从 TCC 拉取运行期动态配置，并把这些配置发布到本进程内的缓存、鉴权、AGW、远程缓存、接口限流和内存限制等模块。它不是业务处理模块，而是一个“配置同步层”：启动时初始化一次，之后按分钟级周期刷新配置。\n\n核心入口是 `InitConfig()`；核心客户端入口是 `GetTccClient()`。\n\n## 启动位置\n\n服务启动流程中，`main.go` 在数据库、RPC、JWT、KMS、三方客户端初始化之后调用：\n\n```go\nif err = tcc.InitConfig(); err != nil {\n\tpanic(err)\n}\n```\n\n随后 `middleware.StartRefreshAGWTenantAkSkCache()`、`remote_cache.Init()`、`mem_limit.InitMemLimiter()` 都会读取 `tcc` 已加载的配置。因此，`tcc.InitConfig()` 的执行顺序会影响 AGW 租户来源、远程缓存开关和本地接口限流初始状态。\n\n测试环境中，`tcc/base_test.go` 的 `TestMain()` 会先执行：\n\n```go\nginex.Init()\nconfig.InitConf(ginex.ConfDir())\n```\n\n确保 `config.Conf` 已经可用，再运行 `tcc` 包测试。\n\n## TCC 客户端\n\n`GetTccClient()` 位于 `tcc/tcc_client.go`，使用 `sync.Once` 懒加载 `*tccclient.ClientV2`：\n\n```go\nfunc GetTccClient() *tccclient.ClientV2\n```\n\n初始化时会：\n\n1. 调用 `tccclient.NewConfigV2()` 创建配置。\n2. 从 `config.Conf.TccInfo.ConfigSpace` 设置 `Confspace`。\n3. 使用 `config.Conf.TccInfo.ServiceName` 调用 `tccclient.NewClientV2()`。\n4. 如果创建失败，直接 `panic(err)`。\n5. 后续调用复用同一个 `client`。\n\n这意味着 `GetTccClient()` 依赖 `config.Conf` 已初始化。调用者不应该在 `config.InitConf()` 之前访问它。\n\n## 配置键\n\n`tcc/keys.go` 定义了当前模块使用的 TCC key：\n\n```go\nconst (\n\tRemoteCacheConfigTccKey         = \"remote_cache_config\"\n\tLocalCacheRefreshIntervalTccKey = \"local_cache_refresh_interval\"\n\tDefaultIDCConfigsTccKey         = \"default_idc_configs\"\n\tPSMAuthV2ConfigsTccKey          = \"psm_auth_v2_configs\"\n\tDevSreToken                     = \"dev_sre_token\"\n\tAGWTenant                       = \"agw_tenant\"\n\tMemLimitPercent                 = \"mem_limit_percent\"\n\tInterfaceRateLimiterTccKey      = \"interface_rate_limiter\"\n)\n```\n\n其中 `remote_cache_config`、`default_idc_configs`、`psm_auth_v2_configs`、`dev_sre_token`、`agw_tenant`、`interface_rate_limiter` 会被 `InitConfig()` 注册到周期刷新流程；`local_cache_refresh_interval` 和 `mem_limit_percent` 是按需读取。\n\n## 初始化与刷新流程\n\n`InitConfig()` 位于 `tcc/tcc_config.go`，负责配置初始加载和后台刷新：\n\n```go\nfunc InitConfig() error\n```\n\n执行步骤：\n\n1. 调用 `initInterfaceRateLimiterFromConfig()`，先用 `conf.yaml` 中的 `config.Conf.InterfaceRateLimiter` 初始化接口限流，作为 TCC 配置缺失时的兜底。\n2. 将 TCC key 和解析函数注册到全局 `parsers`：\n   - `RemoteCacheConfigTccKey` → `remoteCacheConfigParser`\n   - `DefaultIDCConfigsTccKey` → `defaultIDCConfigsParser`\n   - `PSMAuthV2ConfigsTccKey` → `psmAuthV2Parser`\n   - `DevSreToken` → `devSreTokenParser`\n   - `AGWTenant` → `agwTenantParser`\n   - `InterfaceRateLimiterTccKey` → `interfaceRateLimiterParser`\n3. 调用 `refreshTccConfigs()` 做一次同步刷新。\n4. 启动后台 goroutine：\n   - 先 `time.Sleep(util.RandomWaitTime(time.Minute))` 错峰等待。\n   - 再刷新一次。\n   - 之后每分钟执行一次 `refreshTccConfigs()`。\n\n`refreshTccConfigs()` 会为本轮刷新创建带 `K_LOGID` 的 context，并启动 BytedTrace custom span：\n\n```go\nsp, ctx := bytedtracer.StartCustomSpan(ctx, \"BktMeta\", \"AsyncRefreshTccConfigs\",\n\tbytedtracer.EnableEmitSpanMetrics, bytedtracer.EnableEmitSpanLog)\n```\n\n之后遍历 `parsers`，对每个 key 执行：\n\n```go\nparse(GetTccClient().Get(ctx, key))\n```\n\n如果某个 parser 返回错误，会记录 warn，并把该错误作为最终返回值；其他 key 仍会继续刷新。\n\n```mermaid\nflowchart TD\n    A[\"InitConfig()\"] --> B[\"读取 conf.yaml 限流兜底\"]\n    A --> C[\"注册 parsers\"]\n    C --> D[\"refreshTccConfigs()\"]\n    D --> E[\"GetTccClient().Get(ctx, key)\"]\n    E --> F[\"parser(value, err)\"]\n    F --> G[\"更新本地状态\"]\n    D --> H[\"后台每分钟刷新\"]\n```\n\n## 本地状态存储方式\n\n`tcc` 包中的动态配置主要保存在进程内变量中：\n\n```go\nvar (\n\tremoteCacheConfig atomic.Value\n\tdefaultIDCConfigs = map[string]config.DefaultIDCConfigs{}\n\tpsmAuthV2         = map[string]map[string]bool{}\n\tdevSreToken       = \"\"\n\tagwTenantConfig   atomic.Value\n)\n```\n\n`remoteCacheConfig` 和 `agwTenantConfig` 使用 `atomic.Value` 发布完整对象，读取方通过 `Load()` 拿快照。\n\n`defaultIDCConfigs`、`psmAuthV2`、`devSreToken` 是普通包级变量。刷新时 parser 会直接替换或更新它们，读取方通过对应 getter 访问。\n\n接口限流配置不保存在 `tcc` 包内，而是通过 `util.UpdateInterfaceRateLimiterConfig()` 发布到 `util/interface_limiter.go` 的 `atomic.Value` 快照中。\n\n## 远程缓存配置\n\n### `GetRemoteCacheConfig()`\n\n```go\nfunc GetRemoteCacheConfig() *config.RemoteCacheConfig\n```\n\n读取远程缓存配置。优先返回 TCC 中通过 `remoteCacheConfigParser()` 成功发布的配置；如果还没有 TCC 配置，则返回 `&config.Conf.RemoteCacheConfig` 作为兜底。\n\n相关配置结构在 `config/config.go`：\n\n```go\ntype RemoteCacheConfig struct {\n\tEnable              bool          `yaml:\"Enable\" json:\"enable\"\"`\n\tTTL                 time.Duration `yaml:\"TTL\" json:\"ttl\"`\n\tPipelineBatchSize   int           `yaml:\"PipelineBatchSize\" json:\"pipeline_batch_size\"`\n\tIgnoreLogicalExpire bool          `yaml:\"IgnoreLogicalExpire\" json:\"ignore_logical_expire\"`\n\tLockReleaseTTL      time.Duration `yaml:\"LockReleaseTTL\" json:\"lock_release_ttl\"`\n\tRefreshBatchSize    int           `yaml:\"RefreshBatchSize\"json:\"refresh_batch_size\"`\n}\n```\n\n### `remoteCacheConfigParser(value string, err error)`\n\n当 `value == \"\"` 或 TCC `Get` 返回错误时，parser 返回 `nil`，不会覆盖当前配置。\n\n当 `value` 非空且无读取错误时，会按 JSON 反序列化到 `config.RemoteCacheConfig`。解析成功后会把 TCC 中的秒级数值转换为 `time.Duration`：\n\n```go\nc.TTL = c.TTL * time.Second\nc.LockReleaseTTL = c.LockReleaseTTL * time.Second\n```\n\n然后通过 `remoteCacheConfig.Store(c)` 发布。\n\n### 使用方\n\n`remote_cache.Init()` 会根据 `tcc.GetRemoteCacheConfig().Enable` 决定是否初始化 Redis 远程缓存。创建 remote cache 时，默认 TTL 来自：\n\n```go\nc.WithDefaultTTL(tcc.GetRemoteCacheConfig().TTL)\n```\n\n`service/bucket_handler.go` 和 `service/async_task.go` 也会读取 `GetRemoteCacheConfig()`，用于判断缓存启用状态、批量刷新配置等行为。\n\n## 本地缓存刷新间隔\n\n`GetLocalCacheRefreshInterval(ctx)` 按需从 TCC 读取 `local_cache_refresh_interval`：\n\n```go\nfunc GetLocalCacheRefreshInterval(ctx context.Context) (time.Duration, string)\n```\n\n行为：\n\n1. 调用 `GetTccClient().Get(ctx, LocalCacheRefreshIntervalTccKey)`。\n2. 如果读取成功，再调用 `time.ParseDuration(val)`。\n3. 解析成功时返回解析后的 `time.Duration` 和原始字符串。\n4. 读取失败或解析失败时返回 `config.DefaultTTL` 和空字符串。\n\n默认值 `config.DefaultTTL` 是 `5 * time.Minute`。\n\n该函数在 `service/bucket_handler.go` 中用于本地缓存刷新判断，同时保留 TCC 原始值用于比较当前配置值。\n\n## 默认 IDC 配置\n\n### `defaultIDCConfigsParser(value string, err error)`\n\n解析 `default_idc_configs`。当 `value == \"\"` 或读取出错时，记录错误日志但返回 `nil`，不会中断整体刷新。\n\n解析成功后写入包级变量：\n\n```go\ndefaultIDCConfigs = map[string]config.DefaultIDCConfigs{}\n```\n\n其 JSON 结构对应：\n\n```go\ntype DefaultIDCConfigs []DefaultIDCConfig\n\ntype DefaultIDCConfig struct {\n\tIDC                  string         `yaml:\"IDC\" json:\"idc\"`\n\tDefaultBackendFields []BackendField `yaml:\"DefaultBackendFields\" json:\"default_backend_fields\"`\n}\n```\n\n实际 TCC value 会被反序列化为 `map[string]config.DefaultIDCConfigs`。查询 key 由 `GetDefaultIDCConfigs()` 组合：\n\n```go\nfmt.Sprintf(\"%s_%d\", idc, backendType)\n```\n\n### `GetDefaultIDCConfigs(idc string, backendType uint16)`\n\n```go\nfunc GetDefaultIDCConfigs(idc string, backendType uint16) (config.DefaultIDCConfigs, bool)\n```\n\n用于按 `idc_backendType` 查询默认后端字段。`service/response.go` 会在构造响应时调用它，把默认 IDC 字段合入桶响应数据。\n\n## PSM Auth V2 配置\n\n### `psmAuthV2Parser(value string, err error)`\n\n解析 `psm_auth_v2_configs`，目标结构是：\n\n```go\nmap[string]map[string]bool\n```\n\n第一层 key 是 PSM，第二层 key 是接口方法名或 `\"all\"`。\n\n读取失败或 value 为空时只记录错误并返回 `nil`；JSON 反序列化失败时返回错误。\n\n### `CheckAuthV2(ctx, psm, method)`\n\n```go\nfunc CheckAuthV2(ctx context.Context, psm, method string) bool\n```\n\n鉴权逻辑：\n\n```go\nif allowMethods, ok := psmAuthV2[psm]; ok && (allowMethods[method]) || allowMethods[\"all\"] {\n\treturn true\n}\nreturn false\n```\n\n含义是：\n\n- 指定 PSM 配置了当前 `method`，允许。\n- 或者该 PSM 配置了 `\"all\": true`，允许。\n- 否则拒绝。\n\n使用方是 `middleware.ResponseZti()`。当请求携带 `JWT-Sec-Token` 且 ZTI token 校验通过后，会使用 token 中的 `identity.PSM` 和当前接口 `mkey` 调用 `tcc.CheckAuthV2()`。不通过时返回 forbidden。\n\n## Dev SRE Token\n\n### `devSreTokenParser(value string, err error)`\n\n解析 `dev_sre_token`。当 value 为空或读取失败时记录错误并返回 `nil`；成功时直接赋值给包级变量 `devSreToken`。\n\n### `GetDevSreToken()`\n\n```go\nfunc GetDevSreToken() string\n```\n\n返回当前进程内保存的 dev SRE token。\n\n`service/bucket_handler.go` 中的 token 解析逻辑会调用 `tcc.GetDevSreToken()`，用于额外的 token 校验路径。\n\n## AGW 租户配置\n\n### `AGWTCCConfig`\n\n`tcc` 包定义了 TCC 版本的 AGW 租户配置：\n\n```go\ntype AGWTCCConfig struct {\n\tUseTCC  bool                      `json:\"use_tcc\"`\n\tTenants []*config.AGWTenantConfig `json:\"tenants\"`\n}\n```\n\n其中 `config.AGWTenantConfig` 定义在 `config/config.go`：\n\n```go\ntype AGWTenantConfig struct {\n\tName        string       `json:\"name\"`\n\tIpAllowlist []string     `json:\"ip_allowlist\"`\n\tAkSks       []AkSkConfig `json:\"ak_sks\"`\n}\n```\n\n### `agwTenantParser(value string, err error)`\n\n解析 `agw_tenant`。和多数 parser 不同，value 为空或读取失败时会返回：\n\n```go\nerrors.New(\"invalid agw tenant config\")\n```\n\n因此该 key 失败会让 `refreshTccConfigs()` 返回错误，并在 `InitConfig()` 首次同步刷新阶段导致启动失败。\n\n解析成功后通过 `agwTenantConfig.Store(c)` 发布。\n\n### `GetAGWTenantConfigs()`\n\n```go\nfunc GetAGWTenantConfigs() AGWTCCConfig\n```\n\n如果已有 TCC 配置，则返回其值；否则返回空的 `AGWTCCConfig{}`。\n\n`middleware.asyncUpdateAGWTenantCache()` 会先读取该配置：\n\n```go\nif tccCfg := tcc.GetAGWTenantConfigs(); tccCfg.UseTCC {\n\trefreshAGWTenantFromTCC(ctx, tccCfg)\n\treturn nil\n}\n```\n\n当 `UseTCC` 为 `true` 时，AGW AK/SK 缓存直接从 TCC 租户配置构建；否则走 AGW OpenAPI `/tenant/all` 拉取。\n\n## 接口限流配置\n\n接口限流是该模块里测试覆盖最细的一条配置链路。\n\n### 配置结构\n\n`config.InterfaceRateLimiterConfig` 定义如下：\n\n```go\ntype InterfaceRateLimiterConfig struct {\n\tEnable bool                          `yaml:\"Enable\" json:\"enable\"`\n\tLimits map[string]InterfaceRateLimit `yaml:\"Limits\" json:\"limits\"`\n}\n\ntype InterfaceRateLimit struct {\n\tQPS   float64 `yaml:\"QPS\" json:\"qps\"`\n\tBurst int     `yaml:\"Burst\" json:\"burst\"`\n}\n```\n\nTCC JSON 示例：\n\n```json\n{\n  \"enable\": true,\n  \"limits\": {\n    \"buckets.get\": {\n      \"qps\": 1,\n      \"burst\": 1\n    },\n    \"buckets.create\": {\n      \"qps\": 2,\n      \"burst\": 2\n    }\n  }\n}\n```\n\n### 初始化兜底\n\n`InitConfig()` 首先执行：\n\n```go\ninitInterfaceRateLimiterFromConfig()\n```\n\n该函数在 `config.Conf != nil` 时调用：\n\n```go\nutil.InitInterfaceRateLimiterConfig(config.Conf.InterfaceRateLimiter)\n```\n\n因此，TCC 配置尚未成功拉取前，接口限流可以先使用 `conf.yaml` 中的 `InterfaceRateLimiter`。\n\n### `interfaceRateLimiterParser(value string, err error)`\n\n解析 `interface_rate_limiter`。行为：\n\n- `value == \"\"` 或 TCC 读取错误：返回 `nil`，不覆盖当前限流快照。\n- JSON 解析使用 `json.Decoder` 并启用 `DisallowUnknownFields()`。\n- 解析成功后调用 `util.UpdateInterfaceRateLimiterConfig(c)`。\n- 如果存在未知字段、旧格式、非法 QPS 或非法 burst，会返回错误，并保留当前限流快照。\n\n这个“失败不发布”的语义由 `util.UpdateInterfaceRateLimiter()` 保证：它先构造新的 limiter map，只有所有配置都合法时才 `Store()` 新快照。\n\n### 运行时判断\n\n`middleware.Response()` 中会调用：\n\n```go\nif !util.AllowInterface(mkey) {\n\tlogs.CtxWarn(c, \"trigger local interface rate limit : %s\", mkey)\n\tdata = errno.ErrTooManyRequests\n}\n```\n\n注意这里传入的是 `mkey`，不是前面组装的 `rateLimitKey`。因此本地接口限流按接口维度生效；读接口中基于 `psm:mkey` 的细粒度限流由后续的分布式限流器处理。\n\n`util.AllowInterface(mkey)` 的行为是：\n\n- 没有快照或没有该 `mkey` 的 limiter：放行。\n- 找到 limiter：调用 `limiter.Allow()`。\n- `Enable == false` 时，`UpdateInterfaceRateLimiterConfig()` 会传入 `nil`，相当于清空所有本地接口限流。\n\n测试覆盖了这些关键语义：\n\n- `initInterfaceRateLimiterFromConfig()` 支持 `conf.yaml` 兜底。\n- TCC `enable: true` 会覆盖当前快照。\n- TCC `enable: false` 会清空当前快照。\n- 空值和读取错误不覆盖当前快照。\n- 非法发布不覆盖当前快照。\n\n## 内存限制配置\n\n`GetMemLimitPercent(ctx)` 按需读取 `mem_limit_percent`：\n\n```go\nfunc GetMemLimitPercent(ctx context.Context) string\n```\n\n读取失败时记录错误并返回空字符串；成功时返回 TCC 原始值。\n\n`mem_limit.InitMemLimiter()` 每分钟调用内部 `update()`，再通过：\n\n```go\ntcc.GetMemLimitPercent(context.Background())\n```\n\n获取百分比。`mem_limit` 模块会结合环境变量 `MY_MEM_LIMIT` 计算字节数，并调用 `debug.SetMemoryLimit()` 更新 Go runtime memory limit。\n\n该配置没有被注册到 `parsers`，因此不是由 `refreshTccConfigs()` 统一刷新，而是由 `mem_limit` 模块按需定时读取。\n\n## Parser 约定\n\n`tcc` 包用统一签名描述所有 TCC 配置解析器：\n\n```go\ntype parser func(value string, err error) error\n```\n\n`refreshTccConfigs()` 直接把 `GetTccClient().Get(ctx, key)` 的两个返回值传给 parser：\n\n```go\nparse(GetTccClient().Get(ctx, key))\n```\n\n当前 parser 的错误处理分为三类：\n\n| parser | value 为空或读取失败 | JSON 或发布失败 |\n| --- | --- | --- |\n| `remoteCacheConfigParser` | 忽略，保留当前配置 | 返回错误 |\n| `interfaceRateLimiterParser` | 忽略，保留当前快照 | 返回错误，保留当前快照 |\n| `defaultIDCConfigsParser` | 记录错误，返回 nil | 返回错误 |\n| `psmAuthV2Parser` | 记录错误，返回 nil | 返回错误 |\n| `devSreTokenParser` | 记录错误，返回 nil | 不涉及 JSON |\n| `agwTenantParser` | 返回错误 | 返回错误 |\n\n新增 TCC key 时应遵循同样模式：解析失败不要写入半成品状态；只有完整解析并校验成功后再发布。\n\n## 与 `config` 包的关系\n\n`tcc` 包依赖 `config.Conf` 中的两类信息：\n\n1. TCC 客户端配置：\n\n```go\nconfig.Conf.TccInfo.ServiceName\nconfig.Conf.TccInfo.ConfigSpace\n```\n\n2. 本地兜底配置：\n\n```go\nconfig.Conf.RemoteCacheConfig\nconfig.Conf.InterfaceRateLimiter\n```\n\n另外，`config.InitConf()` 自身会调用 `mergeTCCBaseConfig()`，从 TCC 的 `\"base\"` key 加载基础 YAML 配置并与本地配置合并。这个逻辑在 `config` 包中实现，不属于 `tcc.InitConfig()` 的 parser 刷新体系，但会影响 `config.Conf` 最终内容，也间接影响 `GetTccClient()` 和限流兜底配置。\n\n## 贡献注意事项\n\n新增动态配置时，通常需要改动以下位置：\n\n1. 在 `tcc/keys.go` 增加 TCC key 常量。\n2. 在 `tcc/tcc_config.go` 增加 parser。\n3. 在 `InitConfig()` 中注册到 `parsers`。\n4. 选择合适的发布方式：\n   - 完整对象快照优先用 `atomic.Value`。\n   - 配置发布到其他模块时，优先提供一个原子更新函数，例如 `util.UpdateInterfaceRateLimiterConfig()`。\n5. 为以下场景补测试：\n   - 空 value。\n   - TCC 读取错误。\n   - JSON 解析失败。\n   - 合法配置成功发布。\n   - 非法配置不能破坏当前可用配置。\n\n如果配置会影响启动关键路径，需要明确 parser 失败是否应该让 `InitConfig()` 返回错误。当前 `agwTenantParser()` 会在缺失或读取失败时返回错误，而多数其他 parser 会保留旧值并返回 `nil`。新增配置时要谨慎选择这一行为，因为它会直接影响服务是否能启动。","other-test-sh":"# Other — test.sh\n\n## test.sh\n\n`test.sh` 是仓库根目录下的本地测试入口脚本，用于在固定运行环境变量下执行 Go 单元测试，并生成覆盖率报告。它不定义 Shell 函数，也没有被代码中的其他模块调用；它更像一个开发/CI 辅助脚本，通过外部命令驱动整个测试流程。\n\n### 执行流程\n\n```mermaid\nflowchart TD\n    A[设置服务与运行环境变量] --> B[设置主机 IP 与仓库标识]\n    B --> C[通过 go list 枚举包]\n    C --> D[grep -v tests 排除 tests 包]\n    D --> E[doas -p PSM 执行 go test]\n    E --> F[生成 coverage.out]\n    F --> G[go tool cover 生成 coverage.html]\n```\n\n脚本按顺序完成两件事：\n\n1. 导出测试运行所需的环境变量。\n2. 执行 `go test` 并把 `coverage.out` 转换成 HTML 覆盖率报告。\n\n核心命令如下：\n\n```sh\ndoas -p ${PSM} go test -gcflags=\"all=-l -N\" -v -cover -coverprofile coverage.out $(go list ./... | grep -v tests)\ngo tool cover -html=coverage.out -o coverage.html\n```\n\n### 环境变量\n\n脚本在执行测试前显式导出多组变量，使测试进程可以按接近 BOE/UT 的方式启动。\n\n| 变量 | 值 | 作用 |\n| --- | --- | --- |\n| `PSM` | `toutiao.videoarch.bktmetaapi` | 服务标识，同时传给 `doas -p ${PSM}`。 |\n| `GIN_LOG_DIR` | `/Users/bytedance/go/src/code.byted.org/videoarch/bktmeta-api/output/` | Gin 日志目录。 |\n| `GIN_CONF_DIR` | `$(pwd)/conf` | 配置目录，依赖脚本从仓库根目录执行。 |\n| `GIN_MODE` | `release` | Gin 运行模式。 |\n| `RUNTIME_IDC_NAME` | `boe` | 运行 IDC 标识。 |\n| `TCE_ENV` | `ut` | 测试环境标识。 |\n| `CGO_ENABLED` | `1` | 启用 CGO。 |\n| `CI_REPO_NAME` | `toutiao.videoarch.bktmetaapi` | CI 仓库名。 |\n| `BYTED_HOST_IP` / `MY_HOST_IP` | `10.37.27.106` | IPv4 主机地址。 |\n| `BYTED_HOST_IPV6` / `MY_HOST_IPV6` | `fdbd:dc01:ff:306:58c5:890d:bb35:79a5` | IPv6 主机地址。 |\n\n`GIN_CONF_DIR=$(pwd)/conf` 是这个脚本最重要的路径假设：如果从非仓库根目录执行，测试会读取错误的配置目录。\n\n### 测试命令\n\n`go test` 的参数含义如下：\n\n- `-gcflags=\"all=-l -N\"`：关闭内联和优化，便于调试测试过程。\n- `-v`：输出详细测试日志。\n- `-cover`：启用覆盖率统计。\n- `-coverprofile coverage.out`：将覆盖率数据写入 `coverage.out`。\n- `$(go list ./... | grep -v tests)`：枚举当前模块下所有 Go 包，并排除路径中包含 `tests` 的包。\n\n`doas -p ${PSM}` 包裹 `go test` 执行。这里脚本只负责传入 `PSM`，具体的鉴权、环境注入或服务身份行为取决于本地 `doas` 实现。\n\n### 覆盖率报告\n\n测试完成后，脚本执行：\n\n```sh\ngo tool cover -html=coverage.out -o coverage.html\n```\n\n这会把 `coverage.out` 转换成 `coverage.html`。开发者可以直接打开 `coverage.html` 查看每个文件和代码行的覆盖情况。\n\n生成文件：\n\n- `coverage.out`：Go 覆盖率原始数据。\n- `coverage.html`：HTML 格式覆盖率报告。\n\n### 与代码库的关系\n\n这个模块不参与业务代码运行时调用链，也没有内部函数、类或导出 API。它通过 Go 工具链连接整个代码库：\n\n- 通过 `go list ./...` 发现仓库中的 Go 包。\n- 通过 `go test` 执行这些包的测试。\n- 通过 `go tool cover` 生成覆盖率视图。\n- 通过环境变量让测试进程读取本仓库的 `conf` 配置，并以指定服务标识运行。\n\n### 使用注意事项\n\n从仓库根目录执行：\n\n```sh\nsh test.sh\n```\n\n执行前需要确认：\n\n- 本机已安装 Go。\n- 本机可用 `doas` 命令。\n- 当前目录下存在 `conf` 目录。\n- 当前用户有权限写入 `coverage.out` 和 `coverage.html`。\n- 硬编码的 IP、IPv6、日志目录适合当前测试环境。\n\n如果只想调整测试范围，应修改 `$(go list ./... | grep -v tests)` 这一段；如果要调整运行环境，应优先修改前面的 `export` 变量，而不是在业务代码中写死测试配置。","other-util":"# Other — util\n\n## 模块概览\n\n`util` 包提供 bktmeta-api 中复用的横切工具：限流、指标上报、缓存时间抖动、加密、上下文处理、按 key 加锁、一次性初始化和 ETag 生成。它不承载具体业务模型，但被 `middleware`、`service`、`db`、`tcc`、`remote_cache` 等包广泛调用。\n\n核心定位是：\n\n- 在请求入口执行接口级限流和分布式限流。\n- 为 handler、DB 操作和中间件统一上报吞吐、延迟、错误指标。\n- 减少缓存同时过期或定时任务同时启动造成的流量尖峰。\n- 支持缓存击穿保护、Redis 热启动、OpenAPI 数据加密等基础能力。\n\n```mermaid\nflowchart TD\n    A[\"HTTP 请求\"] --> B[\"middleware.Response\"]\n    B --> C[\"AllowInterface\"]\n    C --> D[\"GetDistributedRateLimiter\"]\n    D --> E[\"业务 handler\"]\n    E --> F[\"BktMetaLocalLimiter\"]\n    E --> G[\"KeyLock / 缓存工具\"]\n    B --> H[\"EmitLatency / EmitThroughput / EmitError\"]\n```\n\n## 请求限流\n\n### 接口级本地限流\n\n接口级限流由 `interface_limiter.go` 实现，主要入口是：\n\n- `InitInterfaceRateLimiterConfig(cfg config.InterfaceRateLimiterConfig) error`\n- `UpdateInterfaceRateLimiterConfig(cfg config.InterfaceRateLimiterConfig) error`\n- `UpdateInterfaceRateLimiter(cfg map[string]config.InterfaceRateLimit) error`\n- `AllowInterface(mkey string) bool`\n\n`config.InterfaceRateLimiterConfig` 包含：\n\n- `Enable bool`\n- `Limits map[string]InterfaceRateLimit`\n\n`InterfaceRateLimit` 包含：\n\n- `QPS float64`\n- `Burst int`\n\n当配置关闭时，`UpdateInterfaceRateLimiterConfig` 会调用 `UpdateInterfaceRateLimiter(nil)` 清空快照，后续所有 `AllowInterface` 默认放行。配置开启时，每个 `mkey` 会创建一个 `golang.org/x/time/rate.Limiter`。\n\n`AllowInterface(mkey)` 的规则很简单：\n\n- 快照不存在或类型异常：放行。\n- 当前 `mkey` 没有配置限流器：放行。\n- 当前 `mkey` 已配置限流器：调用 `limiter.Allow()`。\n\n该实现使用 `atomic.Value` 保存 `interfaceLimiterSnapshot`。热更新时构造一份新的 `map[string]*rate.Limiter`，校验通过后整体替换；读取路径无锁。非法配置不会覆盖旧快照，例如 `QPS <= 0` 或 `Burst <= 0` 会返回错误并保留旧限流状态。\n\n`middleware.Response` 在执行业务 handler 前先调用 `util.AllowInterface(mkey)`。如果返回 `false`，请求直接返回 `errno.ErrTooManyRequests`，不会继续进入业务逻辑。\n\n### TCC 热更新\n\n接口级限流配置由 `tcc/tcc_config.go` 接入：\n\n- `initInterfaceRateLimiterFromConfig()` 在初始化阶段从 `config.Conf.InterfaceRateLimiter` 加载配置。\n- `interfaceRateLimiterParser(value string, err error)` 解析 TCC 下发的 JSON，并调用 `util.UpdateInterfaceRateLimiterConfig(c)`。\n\n解析使用 `json.Decoder.DisallowUnknownFields()`，因此 TCC 配置中出现未知字段会报错，避免静默接受拼写错误或结构漂移。\n\n### 分布式限流\n\n分布式限流由 `distributed_limiter.go` 实现：\n\n- `DistributedRateLimiter` 接口只定义 `Allow(name string) bool`。\n- `GetDistributedRateLimiter() DistributedRateLimiter` 根据 `config.Conf.RateLimiter.UseDistributedRateLimiter` 返回真实 harden 客户端或空实现。\n- `nopDistributedRateLimiterT.Allow` 永远返回 `true`。\n\n启用分布式限流时，`GetDistributedRateLimiter` 使用 `sync.Once` 初始化 `harden.Client`：\n\n```go\nharden.NewClient(\n    config.Conf.Meta.PSM,\n    harden.WithCluster(cluster),\n    harden.UseHTTP(),\n    harden.WithTimeout(100*time.Millisecond),\n    harden.PassOnErr(),\n)\n```\n\n如果 `HardenConfig.Cluster` 为空，默认使用 `\"default\"`。`harden.PassOnErr()` 表示限流服务异常时偏向放行，避免外部限流组件故障直接放大成主链路不可用。\n\n`middleware.Response` 对限流 key 的构造区分读写：\n\n- GET 请求：`X-Tt-From:mkey`，按调用方 PSM 和接口维度限流。\n- 非 GET 请求：只使用 `mkey`，写/删操作走全局接口维度限流。\n\n### 固定本地限流器\n\n`limiter.go` 中定义了进程内固定限流器 `BktMetaLocalLimiter`，用于服务层热点接口保护：\n\n- `AllBucketLimiter`：`QPS=300`，`Burst=150`\n- `GetBucketLimiter`：`QPS=3000`，`Burst=3000`\n- `AllBucketSimpleLimiter`：`QPS=100`，`Burst=50`\n\n`LocalLimiter.Allow(key)` 找不到 key 时默认放行；`LocalLimiter.Wait(key, ctx)` 找不到 key 时直接返回 `nil`。\n\n典型调用点：\n\n- `service.MetaBucketApi.handleGetAllBucketsRequest` 使用 `AllBucketLimiter`。\n- `service.MetaBucketApi.handleGetBucketRequest` 使用 `GetBucketLimiter`。\n- `service.MetaBucketApi.handleGetAllBucketsSimpleRequest` 使用 `AllBucketSimpleLimiter`。\n\n## 指标上报\n\n`metrics.go` 封装了 gopkg metrics 客户端：\n\n- `InitMetrics()`\n- `EmitThroughput(key string, tags ...metrics.T)`\n- `EmitLatency(key string, start time.Time, tags ...metrics.T)`\n- `EmitError(mkey string, tags ...metrics.T)`\n\n`InitMetrics` 使用 `config.Conf.Meta.PSM` 创建客户端，并调用 `metrics.SetTceTags()`。\n\n三个上报函数都会按 metric key 缓存 `metrics.Metric` 对象：\n\n- `throughputMetricMap`\n- `latencyMetricMap`\n- `errorMetricMap`\n\n首次上报时根据传入 tags 提取 tag name 创建 metric，后续复用缓存对象。上报失败只写 warn 日志，不中断业务流程。\n\n后缀约定：\n\n- `EmitThroughput` 使用 `WithSuffix(\"throughput\").IncrCounter(1)`。\n- `EmitLatency` 使用 `WithSuffix(\"latency\").Observe(cost)`，单位是微秒。\n- `EmitError` 使用 `WithSuffix(\"error\").IncrCounter(1)`。\n\n`middleware.ResponseMiddleware` 和 `ResponseMiddlewareWithoutAuthCheck` 会在请求结束时统一上报接口延迟、吞吐和错误；`db` 包中的 bucket、volc、idc proxy 等操作使用 `CommandThroughput` 和 `CommandLatency` 上报 DB 命令维度指标。\n\n## 缓存时间抖动\n\n`cache.go` 提供两个随机时间函数：\n\n- `RandomCacheExpireTime(cacheExpireTime time.Duration) time.Duration`\n- `RandomWaitTime(cacheExpireTime time.Duration) time.Duration`\n\n`RandomCacheExpireTime` 基于 `randFactor = 0.5` 生成 `[0.5*TTL, 1.5*TTL)` 附近的过期时间，用于避免大量缓存同一时刻过期。测试中以 `5*time.Minute` 验证结果落在 `2min` 到 `8min` 的宽松范围内。\n\n`RandomWaitTime` 生成 `[0, TTL)` 的等待时间，常用于定时任务启动前错峰，例如：\n\n- `tcc.InitConfig` 中刷新 TCC 配置前随机等待。\n- `service.NewMetaBucketApi` 中异步刷新 all buckets 缓存前随机等待。\n- `db/tosapi.go` 中后台同步逻辑随机等待。\n\n注意：当前包级 `random *rand.Rand` 由 `rand.New(rand.NewSource(time.Now().Unix()))` 创建。`math/rand.Rand` 本身不是并发安全对象；如果未来在高并发路径频繁调用这些函数，需要评估是否改为加锁、`rand.Int63n` 全局函数，或每 goroutine 独立随机源。\n\n## 加密与解密\n\n`aes.go` 提供：\n\n- `EncryptWithMetadata(key []byte, text string) (string, error)`\n- `DecryptWithMetadata(key []byte, crypted string) (string, error)`\n\n实现使用 AES-GCM。密文格式是：\n\n```text\nbase64(12字节IV + GCM密文和认证标签)\n```\n\n`aesEncryptBy` 的 IV 不是随机生成，而是取 `HMAC-SHA256(key, text)` 的前 12 字节。这意味着相同 key 和相同明文会产生相同密文。解密时 `aesDecryptWithKey` 会：\n\n1. 拆出前 12 字节作为 IV。\n2. 使用 AES-GCM 解密剩余内容。\n3. 重新计算 `HMAC-SHA256(key, origData)`。\n4. 比较前 12 字节是否等于 IV，校验数据与 IV 的一致性。\n\n调用方需要保证 key 长度符合 `aes.NewCipher` 要求，只能是 16、24 或 32 字节。测试中使用 32 字节字符串 key。\n\n主要使用点是 `middleware.encryptOpenapiData`：OpenAPI 响应成功时，将 `payload.Data` JSON 序列化后调用 `util.EncryptWithMetadata([]byte(agwTenantSk), string(v))`，把加密后的字符串写回 `payload.Data`。\n\n## 上下文取消隔离\n\n`context.go` 提供 `WithoutCancel(ctx context.Context) context.Context`。它返回一个包装后的 context：\n\n- `Deadline()` 永远返回无 deadline。\n- `Done()` 永远返回 `nil`。\n- `Err()` 永远返回 `nil`。\n- `Value(key)` 透传到原始 context。\n\n这个工具适用于需要继承 trace、日志或请求值，但不希望随请求取消而中断的后台依赖调用。当前主要用于 DB 写入时调用 ID 生成器：\n\n- `db/bucket.go`\n- `db/temp_bucket.go`\n- `db/idc_proxy.go`\n- `db/bucket_idc_config.go`\n\n例如创建 bucket 时，即使外层请求 context 被取消，`IdGenCli.Get(util.WithoutCancel(ctx))` 仍不会因为请求取消信号直接终止。\n\n## KeyLock：按 key 的轻量互斥\n\n`key_lock.go` 定义 `KeyLock`：\n\n- `TryLock(key interface{}) bool`\n- `WaitLock(key interface{}, retry int) bool`\n- `UnLock(key interface{})`\n\n内部使用 `sync.Map.LoadOrStore` 表示某个 key 是否已被占用。`TryLock` 成功时返回 `true`，失败时返回 `false`。`WaitLock` 会最多重试 `retry` 次，每次失败后 sleep `10*time.Microsecond`。`UnLock` 通过 `Delete` 释放 key。\n\n当前服务层使用它做缓存击穿保护，而不是全局互斥：\n\n- `MetaBucketApi.dbKeyLock` 在初始化时赋值为 `util.KeyLock{}`。\n- `handleGetAllBucketsRequest` 在本地缓存缺失时按 `cacheKey` 抢锁，只有抢到锁的请求会访问 DB 并回填缓存。\n- `handleGetAllBucketsSimpleRequest` 使用固定 key `all_simple_buckets_db_single_flight` 限制简单列表缓存回源。\n\n使用时必须保证成功 `TryLock` 后执行 `defer UnLock(key)`，否则该 key 会一直处于锁定状态。\n\n## Once：失败可重试的一次性执行\n\n`once.go` 中的 `Once` 类似 `sync.Once`，但语义不同：\n\n- `Try(f func() error) error` 只有在 `f` 返回 `nil` 后才会把 `done` 标记为完成。\n- 如果 `f` 返回错误，下次调用仍会再次尝试。\n- 并发调用时，慢路径使用 mutex，保证其他 goroutine 不会在 `f` 尚未返回时提前认为初始化完成。\n\n这适合“初始化成功后只执行一次，初始化失败允许后续重试”的场景。\n\n当前 `remote_cache/remote_cache.go` 使用包级 `once util.Once` 初始化 Redis 客户端和 `RemoteCache` 实例。`GetCacheInstance` 调用 `initOnce()`，因此支持热启动：如果第一次 Redis 初始化失败，后续请求仍可再次尝试初始化。\n\n## ETag 生成\n\n`md5.go` 提供 `MD5ETag(resp []byte) string`。它对响应字节计算 MD5，并使用 base64 编码结果。\n\n`service.bucketsToCacheItem` 在把 bucket 列表序列化为缓存响应体后调用 `util.MD5ETag(cachedResp)` 生成 ETag。中间件在返回缓存响应时会比较请求头 `If-None-Match` 和 `data.ETag`，匹配时返回 `304 Not Modified`。\n\n## 测试覆盖\n\n`util` 包的测试主要验证工具语义：\n\n- `aes_test.go` 验证 `EncryptWithMetadata` 和 `DecryptWithMetadata` 可以往返还原 JSON。\n- `cache_test.go` 验证随机 TTL 和随机等待时间落在预期范围。\n- `distributed_limiter_test.go` 验证配置开关会切换 harden 限流器和 nop 限流器。\n- `interface_limiter_test.go` 覆盖默认放行、关闭配置、指定 mkey 限流、热更新、非法配置保留旧快照，以及并发 `AllowInterface` 和配置更新。\n- `key_lock_test.go` 验证同一个 key 的互斥行为。\n- `limiter_test.go` 验证固定本地限流器的 `Allow` 和 `Wait`。\n- `metrics_test.go` 验证三个指标上报函数的首次创建和缓存复用路径。\n- `once_test.go` 验证 `Once.Try` 在并发情况下只在成功后停止重试。\n\n`util/base_test.go` 的 `TestMain` 会初始化 `ginex`、配置和 metrics，确保依赖 `config.Conf` 或 metrics client 的测试有完整运行环境。","other":"# Other\n\n## 模块概览\n\n`Other` 汇总了 `bktmeta-api` 的工程入口、运行配置、启动初始化、业务编排、响应封装和测试辅助模块。它不是单一业务包，而是服务从“构建产物”到“HTTP 请求处理”再到“外部系统访问”的完整支撑层。\n\n整体上，[README.md](readme.md) 定义对外 API 形态，[service](service.md) 承接 bucket、signature、IDC 代理等业务请求，[middleware](middleware.md) 与 [errno](errno.md) 统一响应协议，[db](db.md)、[rpc](rpc.md)、[remote_cache](remote_cache.md)、[kms](kms.md)、[jwt](jwt.md) 负责落到存储、缓存、TOS、BPM、KMS 等外部依赖。\n\n```mermaid\nflowchart TD\n    A[\"构建与部署脚本\"] --> B[\"服务启动\"]\n    B --> C[\"配置初始化\"]\n    C --> D[\"TCC 动态配置\"]\n    C --> E[\"数据库、缓存、RPC、KMS、JWT\"]\n    E --> F[\"Gin 路由与中间件\"]\n    F --> G[\"service 业务编排\"]\n    G --> H[\"db 持久化与缓存\"]\n    G --> I[\"rpc / remote_cache / kms / jwt\"]\n    G --> J[\"errno.Payload\"]\n    J --> K[\"middleware / janus 输出响应\"]\n```\n\n## 子模块协作\n\n工程生命周期从 [go.mod](go.mod.md)、[build.sh](build.sh.md)、[script](script.md) 和 [test.sh](test.sh.md) 开始：`go.mod` 固定模块身份和依赖版本，`build.sh` 生成 `${PRODUCT}.${SUBSYS}.${MODULE}` 二进制和部署目录，`script/bootstrap.sh` 根据 `settings.py` 拼接运行参数并启动服务，`test.sh` 则以固定环境变量执行包级测试和覆盖率生成。\n\n运行时配置由 [conf](conf.md)、[config](config.md) 和 [tcc](tcc.md) 共同承担。`conf/` 提供 YAML 静态配置，`config.InitConf(...)` 填充全局 `config.Conf`，`tcc.InitConfig()` 在启动后同步运行期动态配置，并影响接口限流、远程缓存、AGW 租户缓存和 [mem_limit](mem_limit.md) 的软内存限制。\n\n业务请求进入 Gin 路由后，通常由 [middleware](middleware.md) 的 `Response` 执行 handler，并把 `mkey` 与 `errno.Payload` 写入上下文。普通路由由 `ResponseMiddleware` 输出 JSON、ETag、日志、指标和 Trace；`/gateway/v1` 路由额外通过 [janus](janus.md) 转换为 `JanusPayload`，适配 Janus 网关格式。\n\n[service](service.md) 是核心编排层。`MetaBucketApi` 和 `IdcProxySettingApi` 负责参数绑定、校验和业务流程组织，再调用 [db](db.md) 的 `DbHandler`、`TosRegionBucketsApi`、`AllTosMetaCache` 读写 MySQL、ByteDoc/Mongo 和 TOS 元数据；需要外部操作时则通过 [rpc](rpc.md) 的 `TosV3Cli`、`BpmCli`，以及 [remote_cache](remote_cache.md)、[kms](kms.md)、[jwt](jwt.md) 等模块完成远程缓存、加解密和 BPM 鉴权。\n\n[util](util.md) 提供跨层能力，包括接口限流、分布式限流、指标上报、缓存时间抖动、按 key 加锁、ETag 和 OpenAPI 加密辅助。它被 `middleware`、`service`、`db`、`tcc`、`remote_cache` 等模块复用，是这些横切能力的公共基础。\n\n## 关键跨模块流程\n\n服务启动流程大致为：`bootstrap.sh` 启动二进制后，主进程初始化 `ginex`、加载 `config.Conf`，再依次初始化指标、KMS、JWT、RPC、DB、ByteDoc、TCC、远程缓存和内存限制。这个顺序保证 `rpc.InitRpc()`、`kms.Init()`、`remote_cache.Init()`、`mem_limit.InitMemLimiter()` 都能读取到稳定的静态配置和动态配置。\n\n请求处理流程大致为：HTTP API 进入路由后由 `middleware.Response` 执行业务 handler；`MetaBucketApi` 或 `IdcProxySettingApi` 协调 `DbHandler`、`TosV3Cli`、`BpmCli`、缓存和 KMS；业务结果统一包装为 `errno.Payload`；最后由普通响应中间件或 Janus 中间件输出给调用方。\n\n测试体系则通过各包 `TestMain` 复用近似启动链路，例如 [config](config.md)、[db](db.md)、[kms](kms.md)、[remote_cache](remote_cache.md)、[rpc](rpc.md)、[tcc](tcc.md) 会先初始化配置和依赖，再执行包内测试。[main_test.go](main_test.go.md) 提供启动冒烟测试，用于发现启动阶段的即时崩溃。","overview":"# bktmeta-api — Wiki\n\n# bktmeta-api\n\n`bktmeta-api` 是 Bucket 元数据管理服务，提供创建、查询、更新、删除 Bucket，以及获取签名、管理 IDC 代理配置、对接 BPM 工单和 TOS 平台的 HTTP API。项目模块名为 `code.byted.org/videoarch/bktmeta-api`，基于 Go 1.21 构建。\n\n新开发者可以先把它理解为一个“Bucket 元数据控制面”：HTTP 请求进入 Gin 路由后，由中间件完成鉴权、限流、响应封装和观测；业务层编排 Bucket、IDC、BPM、TOS、Volcengine 等场景；数据最终落到 MySQL、ByteDoc/Mongo、远端缓存和外部平台。\n\n```mermaid\nflowchart TD\n    启动入口[\"启动入口<br/>main.go\"] --> 配置[\"配置管理<br/>config / tcc\"]\n    启动入口 --> 中间件[\"请求中间件<br/>middleware\"]\n    中间件 --> 服务层[\"业务服务<br/>service\"]\n    服务层 --> 响应[\"响应协议<br/>errno / dto / janus\"]\n    服务层 --> 存储[\"持久化层<br/>db\"]\n    服务层 --> 外部系统[\"外部系统客户端<br/>rpc\"]\n    服务层 --> 安全[\"安全能力<br/>kms / jwt / signature\"]\n    存储 --> 运行时[\"运行期基础设施<br/>remote_cache / util / mem_limit\"]\n    中间件 --> 运行时\n    外部系统 --> 安全\n```\n\n## 主要能力\n\n服务对外暴露的核心接口围绕 Bucket 生命周期展开：\n\n- `POST /v1/buckets`：创建 Bucket\n- `GET /v1/buckets`：查询 Bucket 列表\n- `GET /v1/buckets/{name}`：查询单个 Bucket\n- `PATCH /v1/buckets/{name}`：更新 Bucket\n- `DELETE /v1/buckets/{name}`：删除 Bucket\n- `GET /v1/signatures/{bucketname}`：获取 Bucket 访问签名\n\n这些接口的主要实现集中在 [Bucket Service](bucket-service.md)。它以 `MetaBucketApi` 为核心，负责解析请求、执行业务校验、读写缓存和数据库，并在需要时调用 TOS、BPM、KMS 等外部能力。和审批、IDC、VSRE 相关的变更链路则主要在 [Workflow and IDC Services](workflow-and-idc-services.md) 中完成。\n\n## 请求如何流动\n\n一次典型的 Bucket 请求从 [Application Bootstrap](application-bootstrap.md) 开始。`main.go` 初始化配置、KMS、RPC、数据库、JWT、缓存和业务 API 实例，然后绑定 Gin 路由并启动服务。\n\n请求进入后，[Middleware](middleware.md) 负责统一入口处理，包括鉴权、限流、Trace、指标、OpenAPI 响应加密和标准 JSON 写出。业务 handler 通常不直接写 HTTP 响应，而是返回 [API DTOs and Responses](api-dtos-and-responses.md) 中约定的 `errno.Payload`，再由中间件统一包装。\n\n业务层执行时会根据场景访问 [Bucket Persistence](bucket-persistence.md) 或 [IDC and Volcengine Persistence](idc-and-volcengine-persistence.md)。底层数据库连接、ByteDoc/Mongo 初始化、ID 生成器和事务辅助由 [Database Layer](database-layer.md) 提供。远端缓存、限流、指标、按 key 互斥和一次性初始化等通用能力在 [Runtime Infrastructure](runtime-infrastructure.md) 中维护。\n\n## 关键端到端流程\n\n创建 Bucket 时，请求先进入 `MetaBucketApi` 的创建 handler。服务会校验参数、检查已有元数据、生成访问密钥和加密配置，必要时调用 TOS 平台创建真实 Bucket，然后把主 Bucket 信息和 IDC 配置写入数据库。这个过程中会用到 [Authentication and Security](authentication-and-security.md) 中的 KMS、AK/SK 生成和签名能力，也会通过 [RPC Clients](rpc-clients.md) 访问 TOS 或 BPM。\n\n更新 Bucket 时，业务入口通常会进入 `updateBucket` 或相关 Janus handler。更新链路会读取当前 Bucket、合并变更、刷新数据库，并通过 `remote_cache.GetCacheInstance()` 触发远端缓存访问。缓存实例使用 `util.Once.Try` 做延迟初始化，避免每个请求重复初始化 Redis-backed cache。\n\nIDC、代理和审批类流程由 `bpm_handler.go`、`idc_proxy_handler.go`、`vsre.go` 协同完成。它们把外部工单或 Janus 管理请求转换为实际元数据变更，并在数据库、TOS、BPM、事件中心之间保持状态一致。\n\n## 配置与启动\n\n项目使用本地 YAML 配置叠加 TCC 动态配置。启动时会先调用 [Configuration Management](configuration-management.md) 中的 `config.InitConf(path)`，加载 `config.Conf`，再初始化 TCC 客户端和运行时动态配置。\n\n本地开发时请先确认：\n\n1. 使用 Go 1.21。\n2. 配置文件路径可被 `config.InitConf(path)` 读取。\n3. MySQL、ByteDoc/Mongo、TCC、KMS、TOS、BPM 等依赖在当前环境可用，或已切换到测试 / fake 配置。\n4. 启动入口为 `main.go`，服务最终通过 Gin `r.Run()` 对外提供 HTTP API。\n\n如果只想理解业务主线，建议按这个顺序阅读：[Application Bootstrap](application-bootstrap.md) → [Middleware](middleware.md) → [Bucket Service](bucket-service.md) → [Bucket Persistence](bucket-persistence.md) → [RPC Clients](rpc-clients.md)。这条路径覆盖了从 HTTP 请求进入服务，到业务编排、缓存访问、数据库落库和外部系统调用的主流程。","rpc-clients":"# RPC Clients\n\n## 模块概览\n\n`rpc` 包封装了项目访问外部 TOS 平台和 BPM 工作流系统的 HTTP 客户端。模块对外暴露两个全局接口实例：\n\n- `TosV3Cli TosPublicV3Api`：访问 TOS Public V3 API。\n- `BpmCli BpmApi`：访问 BPM 工作流 API。\n\n业务层不直接构造 HTTP 请求，而是依赖这两个接口完成 bucket 查询、创建、追加管理员，以及 BPM 流程创建和取消。`main.go` 和测试入口会调用 `InitRpc()` 初始化这些客户端。\n\n```mermaid\nflowchart TD\n    A[\"main / 测试入口\"] --> B[\"InitRpc\"]\n    B --> C{\"TosAPI.Disable\"}\n    C -- \"true\" --> D[\"FakeTosPublicV3APi\"]\n    C -- \"true\" --> E[\"FakeBpmAPi\"]\n    C -- \"false\" --> F[\"kms.Client.GetConfigV2\"]\n    F --> G[\"TosPublicV3Client\"]\n    C -- \"false\" --> H[\"BpmClient\"]\n```\n\n## 初始化流程\n\n`InitRpc()` 是模块的统一初始化入口。\n\n当 `config.Conf.TosAPI.Disable` 为 `true` 时，模块不会访问真实外部服务，而是把全局客户端设置为：\n\n- `TosV3Cli = &FakeTosPublicV3APi{}`\n- `BpmCli = &FakeBpmAPi{}`\n\n这些 fake client 的所有方法都会返回 `MethodNotSupported`，用于不支持当前 region 或禁用外部 API 的场景。\n\n当 `config.Conf.TosAPI.Disable` 为 `false` 时，`InitRpc()` 会先通过 `kms.Client.GetConfigV2(config.Conf.TosAPI.IamSecret)` 获取 IAM secret。获取失败时会记录错误并 `panic`，因为真实 TOS 客户端无法在缺少鉴权信息的情况下工作。\n\n成功获取 secret 后，`InitRpc()` 构造：\n\n- `TosPublicV3Client`：使用 `JwtHost`、`IamSecret`、`PSM`、`Cluster`、`PlatformHost` 等配置。\n- `BpmClient`：使用 `config.Conf.ModifyTOSBucketBpmConfig.BpmApiUrl`。\n\n## TOS Public V3 客户端\n\n`TosPublicV3Api` 定义了业务层可使用的 TOS 操作：\n\n```go\ntype TosPublicV3Api interface {\n    QueryBucket(ctx context.Context, name string) (*PublicBucket, error)\n    GetAllBuckets(ctx context.Context) ([]*AdminBucketV1, error)\n    GetAllBucketsWithCache(ctx context.Context) ([]*AdminBucketV1, error)\n    CreateBucket(ctx context.Context, createRequest *CreateBucketRequest) (*CreateBucketResponse, error)\n    AppendBucketManager(ctx context.Context, appendRequest *AppendBucketManagerRequest) error\n}\n```\n\n真实实现是 `TosPublicV3Client`。它负责组装 HTTP 请求、添加通用请求头、获取 JWT token，并解析统一响应结构 `PublicBucketResponse`。\n\n### 查询 bucket\n\n`QueryBucket(ctx, name)` 请求：\n\n```text\nGET http://{TosPlatPSM}/public/v3/query/bucket?name={name}\n```\n\n响应中的 `data` 会被反序列化为 `PublicBucket`。业务层测试和服务逻辑中会使用 `PublicBucket` 表示单个 bucket 的完整元信息，包括 `BucketID`、`BucketName`、`Creator`、`TTL`、`Qos`、`Properties`、`SecurityLevel`、`PSM` 等字段。\n\n### 获取全量 bucket\n\n`GetAllBuckets(ctx)` 请求：\n\n```text\nGET http://{TosPlatPSM}/public/v3/buckets/all\n```\n\n响应先解析到 `AllBucketsData`，再返回其中的 `Buckets []*AdminBucketV1`。\n\n`GetAllBucketsWithCache(ctx)` 请求：\n\n```text\nGET http://{TosPlatPSM}/public/v3/bucketmeta\n```\n\n代码注释说明该接口使用 TOS Today+1 缓存的全量 bucket 数据，返回数据中的 `TTL` 字段不为空。它直接把响应 `data` 解析为 `[]*AdminBucketV1`。\n\n`AdminBucketV1` 是项目中更常用的 bucket 列表结构，包含 `ID`、`Name`、`Region`、`Creator`、`ServiceNode`、`BackendID`、`Public`、`TTL`、`S3Info`、`VRegion` 等字段。`db` 包的本地 region bucket 同步测试会直接依赖这个结构。\n\n### 创建 bucket\n\n`CreateBucket(ctx, createRequest)` 请求：\n\n```text\nPOST http://{TosPlatPSM}/public/v3/bucketbu\n```\n\n请求体来自 `CreateBucketRequest`。发送前会做两个本地补全：\n\n- 如果 `createRequest.Qos == nil`，会填充默认 `Qos`：\n  - `GetQps: 2000`\n  - `PutQps: 2000`\n  - `HeadQps: 2000`\n  - `DeleteQps: 1000`\n  - `PutRate: 3000`\n  - `GetRate: 3000`\n- 如果 `createRequest.Public == \"everyone\"`，会强制设置 `createRequest.SecurityLevel = \"L1\"`，因为公开 bucket 必须是 L1 安全级别。\n\n成功响应会解析为 `CreateBucketResponse`，包含 `BucketID`、`AccessKey`、`SecretKey`、`SysMsg`、`SysTicketID`。\n\n### 追加 bucket 管理员\n\n`AppendBucketManager(ctx, appendRequest)` 请求：\n\n```text\nPUT http://{TosPlatPSM}/public/v3/bucket/bucketmanager\n```\n\n请求体是 `AppendBucketManagerRequest`：\n\n```go\ntype AppendBucketManagerRequest struct {\n    ServiceAccounts []string\n    UserAccounts    []UserAccount\n    BucketId        int32\n    LoginUserEmail  string\n}\n```\n\n该方法只关心操作是否成功，调用 `doReq(ctx, req, nil)`，不解析响应 `data`。\n\n## TOS 请求执行与响应解析\n\n所有 `TosPublicV3Client` 的公开方法最终都会调用 `doReq(ctx, req, objPtr)`。\n\n执行流程如下：\n\n1. 设置 `X-TT-FROM: toutiao.videoarch.bktmetaapi`。\n2. 从 `ctx.Value(\"K_LOGID\")` 读取 log id；如果不存在或为空，则使用 `logid.GenLogID()` 生成。\n3. 设置 `X-TT-LOGID`。\n4. 调用 `getJwtToken()` 请求 JWT 服务。\n5. 设置 `x-jwt-token`。\n6. 使用 `chttp.DefaultClient.Do(req, chttp.WithCluster(cli.TosPlatCluster))` 发送请求。\n7. 调用 `handleRes(resp.Body, objPtr)` 解析统一响应。\n\n`getJwtToken()` 会请求：\n\n```text\nGET {JwtHost}/auth/api/v1/jwt\nAuthorization: Bearer {IamSecret}\n```\n\nJWT token 从响应头 `X-Jwt-Token` 中读取。响应 body 会被读取并丢弃，当前实现不从 body 解析 token。\n\n`handleRes()` 解析的统一响应结构是：\n\n```go\ntype PublicBucketResponse struct {\n    Status int             `json:\"status\"`\n    Msg    string          `json:\"msg\"`\n    Data   json.RawMessage `json:\"data\"`\n}\n```\n\n错误处理规则：\n\n- `Status == statusOK`，认为成功。\n- `Status == statusNotFound`，返回 `errors.New(\"not found\")`。\n- 其他非 0 状态返回 `fmt.Errorf(\"res status:%d, msg:%s\", res.Status, res.Msg)`。\n- `objPtr != nil` 时，把 `Data` 反序列化到目标结构。\n\n## BPM 客户端\n\n`BpmApi` 定义了工作流相关能力：\n\n```go\ntype BpmApi interface {\n    CreateWorkflow(ctx context.Context, workflowConfigID string, config interface{}) (*CreateWorkflowResponse, error)\n    CancelWorkflow(ctx context.Context, workflowID string) error\n}\n```\n\n真实实现是 `BpmClient`，通过 `BpmApiUrl` 访问 BPM HTTP API。\n\n### 创建工作流\n\n`CreateWorkflow(ctx, workflowConfigID, config)` 请求：\n\n```text\nPOST {BpmApiUrl}/inf/v1/workflow/record\n```\n\n请求体格式：\n\n```json\n{\n  \"workflow_config_id\": \"...\",\n  \"config\": {}\n}\n```\n\n成功响应中的 `data` 会解析为 `CreateWorkflowResponse`。该结构包含 BPM record 的主要字段，例如 `Id`、`Creator`、`Assignee`、`Status`、`WorkflowConfig`、`WorkflowKey`、`WorkflowName`、`CurrentAssignees`、`Ctime`、`Utime`、`Finished` 等。\n\n### 取消工作流\n\n`CancelWorkflow(ctx, workflowID)` 请求：\n\n```text\nPOST {BpmApiUrl}/inf/v1/workflow/record/{workflowID}/cancel\n```\n\n该方法不解析响应 `data`，只返回请求和响应状态错误。\n\n## BPM 请求执行与响应解析\n\n`BpmClient.doReq(ctx, req, objPtr)` 与 TOS 客户端类似，但有几个差异：\n\n- 使用 `http.DefaultClient.Do(req)`，不是 consul HTTP client。\n- JWT token 通过 `jwt.BpmGen.Generate(ctx, config.Conf.ModifyTOSBucketBpmConfig.SecretKey)` 生成，不需要额外 HTTP 请求 token 服务。\n- 请求头使用 `X-JWT-Token`。\n- 明确设置 `Content-Type: application/json`。\n\nBPM 统一响应结构是：\n\n```go\ntype PublicBpmResponse struct {\n    Code    int             `json:\"code\"`\n    Message string          `json:\"message\"`\n    Data    json.RawMessage `json:\"data\"`\n}\n```\n\n`handleRes()` 的错误处理规则与 TOS 类似：\n\n- `Code == statusOK` 表示成功。\n- `Code == statusNotFound` 返回 `errors.New(\"not found\")`。\n- 其他非 0 code 返回 `fmt.Errorf(\"res code:%d, message:%s\", res.Code, res.Message)`。\n- `objPtr != nil` 时，把 `Data` 反序列化到目标结构。\n\n## Fake 客户端\n\n`fake_client.go` 提供两个禁用态实现：\n\n- `FakeTosPublicV3APi`\n- `FakeBpmAPi`\n\n它们实现真实接口的全部方法，但每个方法都返回同一个错误：\n\n```go\nvar MethodNotSupported = errors.New(\"method not supported in this region\")\n```\n\n这让业务层可以继续依赖 `TosV3Cli` 和 `BpmCli` 接口，而不需要在每个调用点判断当前 region 是否支持外部 TOS/BPM 能力。是否启用真实客户端由 `InitRpc()` 统一控制。\n\n## 与代码库其他模块的关系\n\n`main.go` 通过 `InitRpc()` 建立全局 RPC 客户端。服务层和数据库同步逻辑通过接口类型使用这些客户端和数据结构：\n\n- `service/bpm_handler.go` 使用 `AppendBucketManagerRequest` 处理追加 TOS bucket 管理员的 BPM 请求。\n- `service/vsre.go` 使用 `CreateBucketRequest` 创建或更新 TOS bucket。\n- 多个 `service` 测试使用 `PublicBucket`、`AdminBucketV1` 模拟 TOS 返回数据。\n- `db` 包的本地 bucket 同步测试使用 `AdminBucketV1` 作为远端 TOS bucket 元数据输入。\n- `rpc` 包测试覆盖 fake client、`InitRpc()`、`CreateBucket()`、`AppendBucketManager()` 等行为。\n\n## 贡献注意事项\n\n新增 RPC 方法时，应优先扩展对应接口：TOS 能力放入 `TosPublicV3Api`，BPM 能力放入 `BpmApi`。同时需要更新真实 client 和 fake client，避免禁用外部 API 的环境出现编译或运行时不一致。\n\n请求方法应复用现有的 `doReq()` 和 `handleRes()` 模式，以保持 log id、鉴权头、错误格式和响应解析行为一致。只有当目标服务的响应格式不同，才应新增独立的响应结构和解析逻辑。\n\n修改 `CreateBucketRequest`、`AdminBucketV1`、`PublicBucket` 等 IDL 结构时，需要确认服务层和数据库同步逻辑是否依赖对应字段。当前这些结构不仅用于 RPC 响应解析，也被测试和业务逻辑直接构造使用。","runtime-infrastructure":"# Runtime Infrastructure\n\n## 模块定位\n\nRuntime Infrastructure 模块提供服务运行期的基础能力：内存软限制、远端缓存初始化、本地与分布式限流、接口级热更新限流、指标上报、上下文派生、按 key 互斥，以及带错误重试语义的一次性初始化工具。\n\n这些能力主要分布在三个包中：\n\n- `mem_limit`：根据 TCC 配置动态设置 Go runtime 内存软限制。\n- `remote_cache`：延迟初始化 Redis-backed `RemoteCache`，供 bucket 读写链路使用。\n- `util`：承载限流、指标、随机 TTL、上下文、锁和 `Once` 等通用运行期工具。\n\n## 整体关系\n\n```mermaid\nflowchart TD\n    启动入口[\"main / 初始化流程\"] --> 内存限制[\"mem_limit.InitMemLimiter\"]\n    启动入口 --> 远端缓存[\"remote_cache.Init\"]\n    业务请求[\"bucket handler / async task\"] --> 获取缓存[\"remote_cache.GetCacheInstance\"]\n    获取缓存 --> 一次初始化[\"util.Once.Try\"]\n    中间件[\"middleware.Response\"] --> 分布式限流[\"util.GetDistributedRateLimiter\"]\n    业务代码[\"service / db\"] --> 工具能力[\"util: 限流、锁、上下文、指标、随机等待\"]\n```\n\n模块的设计重点是：启动期尽早建立关键保护能力，业务路径中尽量使用惰性初始化和无锁读快照，避免基础设施不可用时把流量直接压到下游数据库或服务。\n\n## 内存软限制：`mem_limit`\n\n`mem_limit` 包通过 `runtime/debug.SetMemoryLimit` 控制 Go runtime 的软内存上限。入口函数是 `InitMemLimiter()`。\n\n### 初始化流程\n\n`InitMemLimiter()` 会：\n\n1. 创建全局 `*memLimiter`。\n2. 立即调用 `l.update()` 读取 TCC 配置并设置内存限制。\n3. 启动后台 goroutine，每分钟再次调用 `l.update()`，支持配置热更新。\n\n`update()` 从 `tcc.GetMemLimitPercent(context.Background())` 获取百分比字符串。配置为空时只记录 warn 日志，不修改当前限制；配置非空时调用 `doUpdate(value)`。\n\n### 限制计算\n\n`doUpdate(value string)` 依赖两个输入：\n\n- 环境变量 `MY_MEM_LIMIT`：Pod 内存上限，按十进制 `int64` 解析。\n- TCC 配置值 `value`：内存百分比，按十进制 `int64` 解析。\n\n规则如下：\n\n- `MY_MEM_LIMIT < 0`：返回错误。\n- `percent > 100`：返回错误。\n- `percent < 0`：调用 `debug.SetMemoryLimit(math.MaxInt64)`，相当于恢复接近默认的不限制状态。\n- `0 <= percent <= 100`：通过 `getMemBytes(total, percent)` 计算字节数，并调用 `debug.SetMemoryLimit(limitBytes)`。\n\n```go\nlimitBytes := getMemBytes(podMem, percent)\ndebug.SetMemoryLimit(limitBytes)\n```\n\n`getMemBytes(total, percent)` 的计算方式是整数乘除：\n\n```go\nreturn total * percent / 100\n```\n\n因此 `MY_MEM_LIMIT` 必须使用字节单位，否则实际限制会偏离预期。\n\n### 错误处理语义\n\n`InitMemLimiter()` 的首次 `update()` 如果失败，会记录错误并返回，不启动后续更新 goroutine。\n\n但 `update()` 内部调用 `doUpdate()` 失败时会记录 warn 并返回 `nil`。也就是说，解析错误不会向外传播到 `InitMemLimiter()` 的错误判断。这会让初始化流程继续启动后台更新，只是当前配置没有生效。\n\n贡献时需要注意这个语义：如果希望配置错误阻断启动，必须调整 `update()` 对 `doUpdate()` 错误的返回方式。\n\n## 远端缓存：`remote_cache`\n\n`remote_cache` 包封装 Redis 客户端和 `code.byted.org/videoarch/go-remote-cache` 的初始化。核心入口有两个：\n\n- `Init() error`\n- `GetCacheInstance() (c.RemoteCache, error)`\n\n### 初始化策略\n\n`Init()` 用于服务启动期：\n\n```go\nfunc Init() error {\n    if tcc.GetRemoteCacheConfig().Enable {\n        return initOnce()\n    }\n    return nil\n}\n```\n\n当 TCC 中远端缓存开启时，启动阶段必须完成初始化。代码注释明确说明：如果启动时连不上 Redis，认为是非预期状态，需要返回错误给上层，避免过大流量穿透到 DB。\n\n`GetCacheInstance()` 用于业务运行期：\n\n```go\nfunc GetCacheInstance() (c.RemoteCache, error) {\n    if err := initOnce(); err != nil {\n        return nil, err\n    }\n    return cache, nil\n}\n```\n\n它支持热启动：即使启动时没有调用 `Init()`，业务路径首次获取缓存时也会触发 `initOnce()`。\n\n### `initOnce()` 的执行内容\n\n`initOnce()` 使用 `util.Once.Try` 保证成功初始化只执行一次：\n\n1. 构造 `goredis.NewOption()`。\n2. 从 `config.Conf.RedisConfig` 填充 `ReadTimeout`、`WriteTimeout`、`DialTimeout`。\n3. 判断 `config.IsCodebaseCIEnvironment()`：\n   - CI 环境使用固定 Redis 地址 `redis://10.37.83.202:6380`。\n   - 设置固定密码并关闭 GDPR 校验。\n   - 非 CI 环境使用 `config.Conf.RedisConfig.Cluster`。\n4. 调用 `goredis.NewClientWithOption(cluster, option)` 创建 Redis 客户端。\n5. 用 `c.NewCacheBackend(cli)` 构造 remote-cache backend。\n6. 使用 `c.WithDefaultTTL(tcc.GetRemoteCacheConfig().TTL)` 设置默认 TTL。\n7. 成功后赋值到包级变量 `cache`。\n\n### 与业务链路的关系\n\n`GetCacheInstance()` 被 bucket 相关路径频繁调用，包括：\n\n- `createBucket`\n- `deleteBucket`\n- `overwriteBucket`\n- `updateBucket`\n- `syncBucketNamesWithDB`\n- `asyncUpdateAllBktCache`\n\n典型调用链：\n\n```mermaid\nsequenceDiagram\n    participant 请求处理 as 请求处理函数\n    participant 业务 as bucket 业务逻辑\n    participant 缓存 as remote_cache.GetCacheInstance\n    participant Once as util.Once.Try\n    participant Redis as Redis RemoteCache\n\n    请求处理->>业务: 更新或查询 bucket\n    业务->>缓存: 获取缓存实例\n    缓存->>Once: initOnce\n    Once->>Redis: 首次成功时创建客户端和缓存\n    缓存-->>业务: 返回 RemoteCache\n```\n\n如果初始化失败，`util.Once.Try` 不会把 `done` 标记为完成，后续调用仍会重试初始化。\n\n## 一次性初始化：`util.Once`\n\n`util.Once` 是对 `sync.Once` 思路的变体，区别是初始化函数 `f func() error` 可以返回错误。\n\n核心方法：\n\n```go\nfunc (o *Once) Try(f func() error) error\n```\n\n语义：\n\n- 第一次成功执行 `f()` 后，`done` 被设置为 `1`。\n- 如果 `f()` 返回错误，`done` 不会被设置，下一次 `Try()` 会再次尝试。\n- 并发调用时使用 `sync.Mutex` 保证只有一个 goroutine 执行 `f()`。\n- 等待中的 goroutine 会等到当前 `f()` 返回后再判断结果，不会在初始化未完成时提前返回成功。\n\n`remote_cache.initOnce()` 依赖这个语义实现“失败可重试，成功只初始化一次”。\n\n## 本地限流：`util.LocalLimiter`\n\n`util/limiter.go` 定义了固定的本地限流器集合，初始化发生在包级 `init()` 中。\n\n全局变量：\n\n```go\nvar BktMetaLocalLimiter *LocalLimiter\n```\n\n内置 key 和默认参数：\n\n- `AllBucketLimiter`：`300 QPS`，`150 burst`\n- `GetBucketLimiter`：`3000 QPS`，`3000 burst`\n- `AllBucketSimpleLimiter`：`100 QPS`，`50 burst`\n\n`LocalLimiter` 提供两个方法：\n\n```go\nfunc (ht *LocalLimiter) Allow(key string) bool\nfunc (ht *LocalLimiter) Wait(key string, ctx context.Context) error\n```\n\n行为规则：\n\n- key 不存在时放行。\n- `Allow()` 立即返回是否允许。\n- `Wait()` 会阻塞直到获得令牌或 `ctx` 结束。\n\n适合用于进程内保护热点接口或昂贵操作。它不跨实例共享状态。\n\n## 接口级热更新限流：`util/interface_limiter.go`\n\n接口级限流使用 `atomic.Value` 保存不可变快照：\n\n```go\ntype interfaceLimiterSnapshot struct {\n    limiters map[string]*rate.Limiter\n}\n```\n\n初始化时存入空 map，因此默认所有接口放行。\n\n### 配置入口\n\n提供三层入口：\n\n```go\nfunc InitInterfaceRateLimiter(cfg map[string]config.InterfaceRateLimit) error\nfunc InitInterfaceRateLimiterConfig(cfg config.InterfaceRateLimiterConfig) error\nfunc UpdateInterfaceRateLimiterConfig(cfg config.InterfaceRateLimiterConfig) error\n```\n\n最终都会进入：\n\n```go\nfunc UpdateInterfaceRateLimiter(cfg map[string]config.InterfaceRateLimit) error\n```\n\n当 `config.InterfaceRateLimiterConfig.Enable == false` 时，会调用 `UpdateInterfaceRateLimiter(nil)`，把限流器集合更新为空，达到关闭限流的效果。\n\n### 更新语义\n\n`UpdateInterfaceRateLimiter()` 每次构造新的 `map[string]*rate.Limiter`，校验通过后整体替换快照：\n\n```go\ninterfaceLimiter.Store(&interfaceLimiterSnapshot{limiters: limiters})\n```\n\n校验规则：\n\n- `limit.QPS <= 0` 返回错误。\n- `limit.Burst <= 0` 返回错误。\n\n这种设计让读路径 `AllowInterface(mkey)` 不需要加锁：\n\n```go\nsnapshot, ok := interfaceLimiter.Load().(*interfaceLimiterSnapshot)\nlimiter := snapshot.limiters[mkey]\nreturn limiter.Allow()\n```\n\n未配置的 `mkey` 默认放行。\n\n贡献时需要注意：每次更新都会创建新的 `rate.Limiter`，旧 limiter 的令牌状态不会保留。\n\n## 分布式限流：`util.GetDistributedRateLimiter`\n\n`util/distributed_limiter.go` 定义统一接口：\n\n```go\ntype DistributedRateLimiter interface {\n    Allow(name string) bool\n}\n```\n\n`GetDistributedRateLimiter()` 根据配置返回两类实现：\n\n- `config.Conf.RateLimiter.UseDistributedRateLimiter == false`：返回 `nopDistributedRateLimiter`，`Allow()` 永远为 `true`。\n- 配置开启：懒加载 `harden.Client`，并返回该客户端。\n\nHarden 客户端初始化参数：\n\n```go\nharden.NewClient(\n    config.Conf.Meta.PSM,\n    harden.WithCluster(cluster),\n    harden.UseHTTP(),\n    harden.WithTimeout(100*time.Millisecond),\n    harden.PassOnErr(),\n)\n```\n\n如果 `config.Conf.RateLimiter.HardenConfig.Cluster` 为空，默认使用 `\"default\"`。\n\n`harden.PassOnErr()` 表示限流服务异常时倾向放行，避免基础设施故障直接阻断主业务请求。当前调用方包括 `middleware.Response`。\n\n## 指标上报：`util/metrics.go`\n\n`InitMetrics()` 创建全局 metrics client：\n\n```go\nclient = m.NewClient(config.Conf.Meta.PSM, m.SetTceTags())\n```\n\n模块提供三类上报函数：\n\n```go\nfunc EmitThroughput(key string, tags ...m.T)\nfunc EmitLatency(key string, start time.Time, tags ...m.T)\nfunc EmitError(mkey string, tags ...m.T)\n```\n\n### Metric 缓存\n\n每类指标分别使用 `sync.Map` 缓存 `m.Metric`：\n\n- `throughputMetricMap`\n- `latencyMetricMap`\n- `errorMetricMap`\n\n首次遇到某个 key 时，会从传入 tags 中提取 tag name，并调用 `client.NewMetric(key, tagNames...)`。后续相同 key 复用 metric 对象。\n\n### 上报内容\n\n`EmitThroughput()`：\n\n```go\nm.WithSuffix(\"throughput\").IncrCounter(1)\n```\n\n`EmitLatency()`：\n\n```go\ncost := time.Since(start).Nanoseconds() / 1000\nm.WithSuffix(\"latency\").Observe(int(cost))\n```\n\n延迟单位是微秒。\n\n`EmitError()`：\n\n```go\nm.WithSuffix(\"error\").IncrCounter(1)\n```\n\n上报失败只记录 warn 日志，不影响业务流程。\n\n## 随机 TTL 与等待时间：`util/cache.go`\n\n`util/cache.go` 提供两个随机时间工具，主要用于缓存过期时间抖动和延迟执行：\n\n```go\nfunc RandomCacheExpireTime(cacheExpireTime time.Duration) time.Duration\nfunc RandomWaitTime(cacheExpireTime time.Duration) time.Duration\n```\n\n`RandomCacheExpireTime()` 使用包级 `randFactor = 0.5`，返回范围约为：\n\n```text\nttl * 0.5 ~ ttl * 1.5\n```\n\n它用于避免大量缓存 key 在同一时刻集中失效。\n\n`RandomWaitTime()` 返回范围为：\n\n```text\n0 ~ ttl\n```\n\n调用方包括 `NewMetaBucketApi`、`getBucket`、`InitConfig`、`InitTosMetaCache` 等，用于在初始化或刷新路径中引入随机等待。\n\n当前实现使用包级 `*rand.Rand`。如果未来在高并发路径中频繁调用，需要注意 `math/rand.Rand` 本身不是并发安全类型。\n\n## 上下文派生：`util.WithoutCancel`\n\n`WithoutCancel(ctx context.Context)` 返回一个不会被取消的 context：\n\n```go\nfunc WithoutCancel(ctx context.Context) context.Context {\n    return noCancel{ctx: ctx}\n}\n```\n\n`noCancel` 的行为：\n\n- `Deadline()` 返回空时间和 `false`。\n- `Done()` 返回 `nil`。\n- `Err()` 返回 `nil`。\n- `Value(key)` 继续透传原始 `ctx.Value(key)`。\n\n这适合用于请求结束后仍需要继承 trace、日志字段或业务值的异步 DB 操作。当前调用方包括：\n\n- `CreateBucket`\n- `UpdateBucket`\n- `CreateIdc`\n- `CreateTempBucket`\n\n使用时要明确：它会切断取消和超时信号。如果下游操作需要独立超时，应在 `WithoutCancel(ctx)` 外再包一层新的 timeout context。\n\n## 按 key 互斥：`util.KeyLock`\n\n`KeyLock` 使用 `sync.Map` 实现轻量的 key 级互斥：\n\n```go\ntype KeyLock struct {\n    m sync.Map\n}\n```\n\n方法：\n\n```go\nfunc (k *KeyLock) TryLock(key interface{}) bool\nfunc (k *KeyLock) WaitLock(key interface{}, retry int) bool\nfunc (k *KeyLock) UnLock(key interface{})\n```\n\n`TryLock()` 通过 `LoadOrStore` 抢占 key，返回是否成功。\n\n`WaitLock()` 会最多重试 `retry` 次，每次失败后 sleep `10 * time.Microsecond`。\n\n`UnLock()` 删除 key。\n\n典型用法：\n\n```go\nif !lock.TryLock(bucketName) {\n    return\n}\ndefer lock.UnLock(bucketName)\n\n// 这里执行同一个 bucket 只允许一个 goroutine 进入的逻辑\n```\n\n该锁没有 owner 校验，也没有自动过期机制。贡献时必须保证所有成功加锁路径都有对应 `defer UnLock()`，否则 key 会永久阻塞后续操作。\n\n## 运行期依赖关系\n\n这个模块依赖多个外部配置和基础设施：\n\n- `config.Conf.Meta.PSM`：用于 metrics client 和 Harden client。\n- `config.Conf.RedisConfig`：用于 Redis cluster、超时配置。\n- `config.Conf.RateLimiter`：控制是否启用分布式限流以及 Harden cluster。\n- `tcc.GetRemoteCacheConfig()`：控制远端缓存开关和默认 TTL。\n- `tcc.GetMemLimitPercent()`：控制 Go runtime 内存软限制百分比。\n- 环境变量 `MY_MEM_LIMIT`：提供 Pod 内存上限。\n\n启动顺序上，配置和 TCC 应在这些 runtime 能力之前完成初始化。否则 `InitMemLimiter()`、`remote_cache.Init()`、`InitMetrics()` 都可能读到空配置或默认值。\n\n## 贡献注意事项\n\n修改 `remote_cache` 时，需要保留 `util.Once.Try` 的失败可重试语义。Redis 初始化失败不能把 `once` 标记为完成，否则后续业务路径无法恢复。\n\n修改接口限流时，应继续保持“构造新快照后原子替换”的模式，避免读路径加锁。不要原地修改当前 snapshot 的 map。\n\n修改 `mem_limit` 时，要确认错误是否应该阻断初始化。当前 `doUpdate()` 的错误在 `update()` 内被吞掉，只记录日志。\n\n使用 `WithoutCancel()` 时，不要把它当作通用 context 复制工具。它只适合明确需要忽略上游取消的后台任务。\n\n使用 `KeyLock` 时，必须保证解锁路径完整；它不是可重入锁，也没有超时回收。","workflow-and-idc-services":"# Workflow and IDC Services\n\n## 模块概览\n\n`Workflow and IDC Services` 模块位于 `service` 包，主要由以下文件组成：\n\n- `service/bpm_handler.go`：处理 BPM 工单侧的 TOS Bucket 创建、注册、查询、变更、取消和回调。\n- `service/idc_proxy_handler.go`：管理 IDC 与代理配置，提供 Janus 接口和本地缓存。\n- `service/vsre.go`：处理 VSRE / VSRE V2 变更工单，将审批结果落到 Bucket、IDC Proxy、Volc IAM 等实际变更上。\n\n该模块处在 HTTP API、审批系统、TOS 平台、数据库和事件中心之间，核心职责是把“变更请求”转换为可执行的元数据操作：\n\n- 对外通过 `gin.Context` 接收请求。\n- 通过 `middleware.Response` 统一包装响应。\n- 使用 `errno.Payload` 表达业务结果。\n- 通过 `db.DbHandler` / `db.Db` 读写 Bucket、临时 Bucket、IDC Proxy 配置。\n- 通过 `rpc.TosV3Cli`、`rpc.BpmCli` 调用 TOS 和 BPM 外部系统。\n- 通过 `vsreCli` / `vsreV2Cli` 获取或创建 VSRE 工单。\n- 通过 `eCli` 向事件中心上报变更执行结果。\n\n```mermaid\nflowchart TD\n    A[\"BPM / VSRE / Janus 请求\"] --> B[\"Gin Handler\"]\n    B --> C[\"middleware.Response\"]\n    C --> D[\"业务 handle 方法\"]\n    D --> E[\"db.DbHandler / db.Db\"]\n    D --> F[\"rpc.TosV3Cli / rpc.BpmCli\"]\n    D --> G[\"vsreCli / vsreV2Cli\"]\n    D --> H[\"errno.Payload 响应\"]\n```\n\n## 入口模式\n\n本模块的 HTTP 方法普遍采用两层结构：\n\n```go\nfunc (api *MetaBucketApi) CreateTOSBucketsBPM(c *gin.Context) {\n    middleware.Response(c, \"bpm.buckets.tos.create\", api.handleCreateTOSBucketsBPMRequest)\n}\n```\n\n外层方法负责注册统一响应包装和接口名；内层 `handle...Request` 方法负责解析参数、执行业务逻辑并返回 `errno.Payload`。\n\n常见入口包括：\n\n- `CreateBucketBPM` → `handleCreateBucketBPMRequest`\n- `CreateTOSBucketsBPM` → `handleCreateTOSBucketsBPMRequest`\n- `CreateTOSBucketCallBack` → `handleCreateBucketCallBackRequest`\n- `ModifyTOSBucketLimitsBPM` → `handleModifyTOSBucketLimitsBPMRequest`\n- `ModifyTOSBucketPropsBPM` → `handleModifyTOSBucketPropsBPMRequest`\n- `ModifyTOSBucketPublicLevelBPM` → `handleModifyTOSBucketPublicLevelBPMRequest`\n- `AppendTOSBucketManagerBPM` → `handleAppendTOSBucketManagerBPMRequest`\n- `VsreTrigger` → `handleVsreTriggerRequest`\n- `CreateVsreV2Ticket` → `handleCreateVsreV2TicketRequest`\n- `CallbackVsreV2Ticket` → `handleCallbackVsreV2TicketRequest`\n- `CreateIdcJanus` → `handleCreateIdcJanus`\n- `UpdateIdcJanus` → `handleUpdateIdcProxiesJanus`\n\n## BPM Bucket 创建与注册\n\n### 单 Bucket 注册：`handleCreateBucketBPMRequest`\n\n`handleCreateBucketBPMRequest` 处理 `BPMCreateBucketWorkflow` 请求。请求结构组合了 `meta.Bucket`、`BPMWorkflowBasic` 以及不同后端类型的扩展配置：\n\n- `TobTosBucket *meta.ToBTosBucket`\n- `S3Bucket *meta.S3Bucket`\n- `FsBucket *meta.FSBucket`\n- `Qos *rpc.Qos`\n- `CreateTOSBucket bool`\n\n执行流程：\n\n1. 读取并反序列化请求体为 `BPMCreateBucketWorkflow`。\n2. 根据 `bucket.Name` 调用 `db.Db.GetBucketByName` 检查是否已注册。\n3. 如果已注册，只尝试补充 `Category` 和 `Providers`，必要时调用 `api.updateBucket`。\n4. 如果未注册，根据 `BackendType` 填充后端信息：\n   - `0` 或 `meta.BackendTos`：调用 `fillBPMTosBucketInfo`。\n   - `meta.BackendToBTos`：调用 `bucket.SetBackendToBTosBucket`。\n   - `meta.BackendS3`：调用 `bucket.SetBackendS3Bucket`。\n   - `meta.BackendFS`：调用 `bucket.SetBackendFSBucket`。\n5. 最终调用 `api.createBucket` 注册到 bktmeta。\n\n`fillBPMTosBucketInfo` 是 TOS 后端的关键分支。它会先查 `db.TosMetaCache.GetTosMeta(bucket.Name)`：\n\n- 如果 TOS 元数据已存在：补齐 `IDC`、`BizServiceNode`、`BackendBucket`、`Owner` 等字段。\n- 如果 TOS 元数据不存在且 `CreateTOSBucket == true`：构造 `TosBucketCreateReq`，调用 `api.createAndUpdateTosBucket` 创建 TOS Bucket。\n- 如果已有有效临时 Bucket 工单：返回 `errno.ErrCreateTosBucketWaitForApprove`。\n- 如果不允许创建 TOS Bucket：返回 `errno.ErrBucketNotFound`。\n\n### 多 Bucket 创建：`handleCreateTOSBucketsBPMRequest`\n\n`handleCreateTOSBucketsBPMRequest` 处理 `BPMCreateTOSBucketsWorkflow`，用于按账号和分类批量创建 TOS Bucket。\n\n关键输入字段：\n\n- `AccountName`\n- `AccountId`\n- `Categories`\n- `Description`\n- `Qos`\n- `TTL`\n\n创建逻辑依赖三个静态映射：\n\n- `bucketNamePattern`：按当前 `env.IDC()` 选择 Bucket 命名格式。\n- `categoryShortNameMap`：将 `image`、`object`、`original`、`encoded`、`poster` 转为短分类。\n- `sceneTosVRegionMap`：按 `IDC_短分类` 选择 TOS `v_region`。\n- `shortCategoryServiceTreeNodeIdMap`：按短分类选择服务树节点。\n\n每个分类会生成一个 `meta.Bucket` 和一个 `TosBucketCreateReq`，其中 `bucket.BackendBucket` 存储序列化后的 `TosBucketCreateReq`。之后调用：\n\n1. `api.createAndUpdateTosBucket`\n2. `api.createBucket`\n\n如果 TOS 平台返回异步创建，`api.createAndUpdateTosBucket` 会返回 `errno.ErrCreateTosBucketWaitForApprove`。此时接口不会立即失败，而是：\n\n- 设置 `CreateTosBucketBPMResp.AsyncCreate = true`\n- 将 Bucket 名称和分类写入 `BucketsCategories`\n- 继续处理后续分类\n\n返回结构：\n\n```go\ntype CreateTosBucketBPMResp struct {\n    BucketsCategories map[string]string `json:\"buckets_categories\"`\n    AsyncCreate       bool              `json:\"async_create\"`\n}\n```\n\n### TOS Bucket 创建核心：`createAndUpdateTosBucket`\n\n`createAndUpdateTosBucket` 定义在 `service/vsre.go`，但同时被 BPM 和 VSRE 创建流程复用。\n\n它从 `bucket.BackendBucket` 反序列化 `TosBucketCreateReq`：\n\n```go\ntype TosBucketCreateReq struct {\n    meta.TosBucket\n    ServiceNode  int                 `json:\"service_node\"`\n    VRegion      string              `json:\"v_region\"`\n    BackendID    int                 `json:\"backend_id,omitempty\"`\n    CacheControl string              `json:\"cache_control\"`\n    Headers      map[string][]string `json:\"headers\"`\n    Description  string              `json:\"description\"`\n    Applicant    string              `json:\"applicant\"`\n    Qos          *rpc.Qos            `json:\"qos\"`\n}\n```\n\n当 `ServiceNode != 0` 时，表示需要创建 TOS Bucket：\n\n1. 构造 `rpc.CreateBucketRequest`。\n2. 设置 `CallbackUrl` 为 `http://{config.Conf.TosAPI.CallbackHost}/gateway/v1/bpm/buckets/tos/create_call_back`。\n3. 检查是否已有有效 `TempBucket`：\n   - `TicketSuccess`：直接成功。\n   - `TicketWaitingForApprove`：返回等待审批。\n   - `TicketExpired`：重新发起工单。\n4. 调用 `rpc.TosV3Cli.CreateBucket`。\n5. 如果返回 `AccessKey`，表示同步创建成功，回填 AK/SK 并调用 `bucket.SetBackendTosBucket`。\n6. 如果没有返回 `AccessKey`，要求 `SysMsg == \"Accepted\"`，并创建 `dto.TempBucket` 记录等待回调。\n\n当 `ServiceNode == 0` 时，表示从已有 TOS 元数据更新 Bucket 信息，要求 `TosBucket.AccessKey` 和 `TosBucket.SecretKey` 存在，并尝试通过 `rpc.TosV3Cli.QueryBucket` 刷新 `TTL` 和 `Creator`。\n\n## TOS 创建回调与状态查询\n\n### 回调入口：`handleCreateBucketCallBackRequest`\n\nTOS 异步创建完成后会调用 `CreateTOSBucketCallBack`，请求体为：\n\n```go\ntype BPMCreateTOSBucketCallBackRequest struct {\n    BucketID   uint64 `json:\"bucket_id\"`\n    BucketName string `json:\"name\"`\n    Creator    string `json:\"creator\"`\n    AccessKey  string `json:\"ak\"`\n    SecretKey  string `json:\"sk\"`\n    TimeStamp  int64  `json:\"timestamp\"`\n}\n```\n\n处理流程：\n\n1. 根据 `BucketName` 调用 `api.dbh.GetValidTempBucketByName` 查询临时 Bucket。\n2. 如果 `TicketStatus == db.TicketSuccess`，直接返回成功，避免重复注册。\n3. 调用 `api.dbh.UpdateTicketStatusByName` 将状态更新为 `db.TicketSuccess`。\n4. 反序列化 `tempBkt.BackendBucket` 为 `TosBucketCreateReq`。\n5. 使用回调里的 AK/SK 更新 `TosBucket`。\n6. 调用 `tempBkt.SetBackendTosBucket`。\n7. 设置 `tempBkt.TTL`。\n8. 调用 `api.createBucket` 完成 bktmeta 注册。\n\n### 注册状态查询：`handleQueryTOSRegisterBucketStatus`\n\n`handleQueryTOSRegisterBucketStatus` 接收：\n\n```json\n{\n  \"buckets\": [\"bucket-a\", \"bucket-b\"]\n}\n```\n\n它会逐个 Bucket 判断状态：\n\n- 如果正式 Bucket 已存在：状态为 `db.TicketSuccess`。\n- 如果存在有效临时 Bucket：使用临时 Bucket 的 `TicketStatus`。\n- 如果都不存在或查询失败：按 `db.TicketExpired` 处理。\n\n整体状态 `WholeStatus` 的规则：\n\n- 任一 Bucket 失败：`db.TicketExpired`\n- 全部成功：`db.TicketSuccess`\n- 其他情况：默认 `db.TicketWaitingForApprove`\n\n## BPM TOS 变更操作\n\n本模块提供多类 TOS 变更工单入口，但真正的审批工单创建由 `rpc.BpmCli.CreateWorkflow` 或 TOS RPC 完成。\n\n### 限流变更：`handleModifyTOSBucketLimitsBPMRequest`\n\n请求结构为 `BPMModifyTOSBucketLimitsWorkflow`，其中嵌入 `ModifyTOSBucketLimitsBpmConfig`。\n\n处理逻辑：\n\n1. `c.BindJSON(bpm)`。\n2. 设置 `bpm.Host = config.Conf.TosAPI.PlatformHost`。\n3. 非 IE 机房执行 `testModifyTosBucketBPMPermission(c, bpm.Creator)`。\n4. 调用：\n\n```go\nrpc.BpmCli.CreateWorkflow(\n    c,\n    config.Conf.ModifyTOSBucketBpmConfig.ModifyLimitsBpmID,\n    bpm.ModifyTOSBucketLimitsBpmConfig,\n)\n```\n\n当前 `testModifyTosBucketBPMPermission` 是空实现，始终返回 `nil`。\n\n### 属性变更：`handleModifyTOSBucketPropsBPMRequest`\n\n请求结构为 `BPMModifyTOSBucketPropsWorkflow`，核心配置为 `ModifyTOSBucketPropsBpmConfig`，包含：\n\n- `CacheControl`\n- `Ttl`\n- `CanSetCt`\n- `Public`\n- `Writable`\n- 对应的 `Current...` 字段\n\n它使用 `config.Conf.ModifyTOSBucketBpmConfig.ModifyPropsBpmID` 创建 BPM 工单。\n\n### 公开级别变更：`handleModifyTOSBucketPublicLevelBPMRequest`\n\n请求结构为 `BPMModifyTOSBucketPublicLevelWorkflow`，核心配置为 `ModifyTOSBucketPublicLevelBpmConfig`，包含：\n\n- `SecurityLevel`\n- `DataTypeInfoArray`\n- `DataSourceInfo`\n- `CurrentPublic`\n- `Public`\n- `CurrentPublicValue`\n- `PublicValue`\n- `SdlcNum`\n- `Enable`\n- `Endpoints`\n\n它使用 `config.Conf.ModifyTOSBucketBpmConfig.ModifyPublicLevelBpmID` 创建 BPM 工单。\n\n### 追加 Bucket 管理员：`handleAppendTOSBucketManagerBPMRequest`\n\n`BPMAppendTOSBucketManagerWorkflow` 根据 `Type` 构造不同的 `rpc.AppendBucketManagerRequest`：\n\n- `Type == 1`：追加用户账号，使用 `UserName` 和 `UserEmail`。\n- 其他值：追加服务账号，使用 `ServiceAccountName`。\n\n最终调用：\n\n```go\nrpc.TosV3Cli.AppendBucketManager(c, req)\n```\n\n`LoginUserEmail` 固定由 `BucketCreator + \"@bytedance.com\"` 生成。\n\n### 查询与取消\n\n- `handleQueryTOSBucketBPMRequest`：读取 query 参数 `name`，调用 `rpc.TosV3Cli.QueryBucket`。\n- `handleCancelTOSBucketBPMRequest`：读取 query 参数 `workflow_id`，调用 `rpc.BpmCli.CancelWorkflow`。\n\n## VSRE Bucket 变更\n\n### 初始化\n\n`service/vsre.go` 的 `init` 初始化三个全局客户端：\n\n- `vsreCli = vsre.NewClient(PSM)`\n- `vsreV2Cli, _ = vsrev2.NewWithSD()`\n- `eCli` 根据 `env.Region()` 选择不同事件中心客户端\n\n`PSM` 固定为：\n\n```go\nconst PSM = \"toutiao.videoarch.bktmetaapi\"\n```\n\n### VSRE V1 触发：`handleVsreTriggerRequest`\n\n`handleVsreTriggerRequest` 从 query 参数读取 `ticket_id`，通过 `vsreCli.GetTicket` 获取工单，然后调用 `executeVsreBucketAction`。\n\n`executeVsreBucketAction` 按 `ticket.Action` 分发：\n\n- `vsre.CreateAction`\n  - 从 `ticket.CreateValue` 反序列化 `meta.Bucket`\n  - 如果是 TOS Bucket 且 `rpc.TosV3Cli != nil`，先调用 `createAndUpdateTosBucket`\n  - 调用 `api.createBucket`\n- `vsre.DeleteAction`\n  - 从 `ticket.DeleteValue` 反序列化 `meta.Bucket`\n  - 调用 `api.deleteBucket`\n- `vsre.UpdateAction`\n  - 从 `ticket.TicketChanges[0].NewValue` 反序列化 `meta.Bucket`\n  - TOS Bucket：检查 AK/SK，查询 TOS 刷新 TTL，调用 `bucket.SetBackendTosBucket`\n  - ToB TOS Bucket：调用 `fillTobTosBucketCredential`\n  - 调用 `api.updateBucket`\n\n`fillTobTosBucketCredential` 会从 DB 中读取现有 Bucket，保留原有 ToB TOS 凭证；如果变更里带了新的 AK/SK，则覆盖为新凭证。\n\n## VSRE V2 工单\n\n### 创建工单：`handleCreateVsreV2TicketRequest`\n\n`CreateVsreV2Ticket` 接收一个 VSRE V1 风格的 `vsre.Ticket`，并转换为 VSRE V2 模型。\n\n关键输入：\n\n- Header `x-va-change-application-id`：非降级模式必填。\n- Header `X-VA-Change-Degrade`：值为 `\"1\"` 时跳过审批直接执行。\n- Query `module`：必须是 `bktmeta-api` 或 `idc-proxy`。\n\n模块常量：\n\n```go\nvar (\n    VSREPlatform     = \"vstorage\"\n    VSREBucketModule = \"bktmeta-api\"\n    VSREIDCModule    = \"idc-proxy\"\n)\n```\n\n执行路径：\n\n1. 检查 `vsreV2Cli` 是否可用。\n2. 绑定请求体到 `vsre.Ticket`。\n3. 校验 `module`。\n4. 如果 `X-VA-Change-Degrade == \"1\"`：\n   - `bktmeta-api`：调用 `executeVsreBucketAction`\n   - `idc-proxy`：调用 `api.idcProxySettingApi.executeVsreIdcTicket`\n5. 非降级模式要求 `x-va-change-application-id`。\n6. Bucket 模块会调用 `GetVsreBucketActionAffectTobAccountID` 获取 ToB 账号影响面。\n7. 调用 `convertV1TicketToV2`。\n8. 调用 `vsreV2Cli.CreateTicketV2`。\n\n`convertV1TicketToV2` 会保留 V1 工单的 `Group`、`Action`、`Applicant`、`CreateValue`、`DeleteValue` 和 diff。对于 Bucket 模块，它还会设置：\n\n- `quality_inspection_params.all.bucket`\n- 如果存在 ToB 账号影响面，设置 `extensions[\"account_id\"]`\n\n### 回调执行：`handleCallbackVsreV2TicketRequest`\n\nVSRE V2 审批完成后调用 `CallbackVsreV2Ticket`。请求体为：\n\n```go\ntype VsreV2CallBackResponse struct {\n    VsreTicketId string `json:\"vsre_ticket_id\"`\n    Approve      string `json:\"approve\"`\n}\n```\n\n处理流程：\n\n1. 读取 Header：\n   - `X-VA-Change-Item-ID`\n   - `X-VA-Change-Event-ID`\n   - `X-VA-Change-Application-ID`\n2. 调用 `vsreV2Cli.GetTicketByIDV2` 获取 V2 工单。\n3. 调用 `convertV2TicketToV1` 转为 V1 工单结构。\n4. 根据 `v2Ticket.Module` 执行：\n   - `bktmeta-api`：`executeVsreBucketAction`\n   - `idc-proxy`：`api.idcProxySettingApi.executeVsreIdcTicket`\n5. 根据执行结果调用 `sendChangeSystemEvent` 上报 `EventStatusFinished` 或 `EventStatusFailed`。\n\n`sendChangeSystemEvent` 会构造 `eventModel.ServiceEvent`，其中服务树节点固定为 `30222`，PSM 为 `toutiao.videoarch.bktmetaapi`。\n\n## IDC Proxy 服务\n\n### API 对象：`IdcProxySettingApi`\n\n`IdcProxySettingApi` 管理 IDC 和代理配置：\n\n```go\ntype IdcProxySettingApi struct {\n    cache         *vfast_cache.VFastCache\n    allProxyCache *vfast_cache.VFastCache\n    dbh           *db.DbHandler\n}\n```\n\n通过 `NewIdcProxySettingApi(dbh)` 创建实例。构造时会初始化两个缓存：\n\n- `cache`：用于按 IDC 或 `idc_programEnvIdc` 缓存单个配置。\n- `allProxyCache`：用于缓存全量 IDC Proxy 列表，key 为 `allIdcProxyCacheKey`。\n\n### 创建 IDC：`createIdc`\n\n`handleCreateIdcJanus` 绑定请求体为 `meta.IdcWithProxies`，然后调用 `createIdc`。\n\n`createIdc` 会执行：\n\n1. `validateIdcMeta(&idcProxyDTO.IdcMeta)`：要求 `IDC` 非空。\n2. 遍历 `idcProxyDTO.Proxies`，逐个调用 `validateProxy`。\n3. 调用 `api.dbh.CreateIdc(ctx, idcProxyDTO)`。\n4. 删除 `api.allProxyCache` 中的 `allIdcProxyCacheKey`。\n5. 返回新建记录的 `idcProxyDTO.Id`。\n\n`validateProxy` 要求：\n\n- `proxy.IDC` 非空\n- `proxy.Addr` 非空\n\n### 更新 IDC Proxy：`updateIdcProxies`\n\n`handleUpdateIdcProxiesJanus` 绑定 `meta.IdcWithProxies` 后调用 `updateIdcProxies`。\n\n执行流程：\n\n1. 校验所有 `Proxies`。\n2. 调用 `api.dbh.UpdateIdcProxies(ctx, idcProxiesDTO)`。\n3. 删除单 IDC 缓存：`api.cache.Remove(idcProxiesDTO.IDC)`。\n4. 删除全量缓存：`api.allProxyCache.Remove(allIdcProxyCacheKey)`。\n5. 返回 `\"update success\"`。\n\n### 查询接口\n\n`IdcProxySettingApi` 提供以下查询：\n\n- `GetAllIdcsJanus` → `handleGetAllIdcsJanusRequest`\n  - 调用 `api.dbh.GetAllIdcProxies`\n  - 返回所有 `IDC` 字段\n- `GetAllRegionsJanus` → `handleGetAllRegionsRequest`\n  - 调用 `api.dbh.GetAllIdcProxies`\n  - 过滤空 Region 和 `env.UnknownRegion`\n  - 去重并按字典序排序\n- `GetIdcProxiesJanus` → `handleGetIdcProxiesJanusRequest`\n  - 优先读取 query 参数 `idcName`\n  - 兼容 VSRE，缺省时读取 query 参数 `id`\n  - 调用 `api.dbh.GetIdcProxies`\n- `GetAllIdcProxiesJanus` → `handleGetAllIdcProxiesJanusRequest`\n  - 调用 `api.dbh.GetAllIdcProxies`\n\n### 缓存读取\n\n`getIdcProxiesByProgramEnvIdcFromCache` 使用 key：\n\n```go\nfmt.Sprintf(proxyGetByProgramEnvIdcCacheKeyPattern, idc, programEnvIdc)\n```\n\n缓存未命中时调用 `api.dbh.GetIdcProxiesByProgramEnvIdc`，并将结果 JSON 序列化写入缓存。\n\n`getAllIdcProxiesFromCache` 使用固定 key `allIdcProxyCacheKey`。缓存未命中时调用 `api.dbh.GetAllIdcProxies` 并写入 `allProxyCache`。\n\n创建或更新 IDC Proxy 后必须清理相关缓存，否则后续读取可能拿到旧配置。\n\n## VSRE IDC 变更\n\nIDC Proxy 也支持 VSRE 工单执行。\n\n`VsreIdcTrigger` 使用 `handleVsreIdcTriggerRequest`：\n\n1. 从 query 参数读取 `ticket_id`。\n2. 调用 `vsreCli.GetTicket`。\n3. 调用 `executeVsreIdcTicket`。\n\n`executeVsreIdcTicket` 支持：\n\n- `vsre.CreateAction`\n  - 从 `ticket.CreateValue` 反序列化 `meta.IdcWithProxies`\n  - 调用 `createIdc`\n- `vsre.UpdateAction`\n  - 从 `ticket.TicketChanges[0].NewValue` 反序列化 `meta.IdcWithProxies`\n  - 调用 `updateIdcProxies`\n\n不支持删除动作，其他动作会返回 `errno.ErrVsreUnknownAction`。\n\n## 与其他模块的连接\n\n本模块不是独立服务层，而是连接多个已有模块：\n\n- `middleware.Response`：统一 HTTP 响应包装。\n- `errno`：统一错误码和响应载体。\n- `db.Db` / `api.dbh`：正式 Bucket、临时 Bucket、IDC Proxy 的持久化。\n- `dto.TempBucket`：TOS 异步创建时保存待审批状态。\n- `meta.Bucket`、`meta.TosBucket`、`meta.IdcWithProxies`：核心元数据模型来自 `bktmeta-sdk-go/meta`。\n- `rpc.TosV3Cli`：创建、查询 TOS Bucket，追加 Bucket 管理员。\n- `rpc.BpmCli`：创建和取消 BPM 工单。\n- `vsreCli`：读取 VSRE V1 工单。\n- `vsreV2Cli`：创建和读取 VSRE V2 工单。\n- `eventCli.EventClient`：变更执行后上报事件中心。\n\n## 开发注意事项\n\n新增 BPM 或 VSRE 入口时，应保持现有两层 Handler 模式：外层只做 `middleware.Response` 包装，业务逻辑放在 `handle...Request` 中。\n\n涉及 TOS Bucket 创建时，优先复用 `TosBucketCreateReq` 和 `createAndUpdateTosBucket`。该函数已经处理同步创建、异步工单、临时 Bucket、回调注册和 TTL 回填等分支。\n\n修改 IDC Proxy 写路径时，需要同步考虑缓存失效。当前 `createIdc` 会清理 `allProxyCache`，`updateIdcProxies` 会同时清理单 IDC 缓存和全量缓存。\n\n处理 VSRE V2 时，不要绕过 `convertV1TicketToV2` / `convertV2TicketToV1`，否则 diff、模块名、扩展字段和 ToB 账号影响面容易不一致。\n\n`testModifyTosBucketBPMPermission` 当前是空实现。如果未来补充真实权限校验，需要注意 IE 机房在 `handleModifyTOSBucketLimitsBPMRequest` 中有临时兼容逻辑：`env.IDC() != env.DC_IE` 时才执行该校验。\n\n错误返回应继续使用 `errno.Error`、`errno.ErrorWithCode`、`errno.OK` 或已有业务错误，如 `errno.ErrCreateTosBucketWaitForApprove`、`errno.ErrVsreContentInvalid`、`errno.ErrAKSKMissing`，保持调用方对错误码的稳定预期。"};

(function() {
  var activePage = 'overview';

  document.addEventListener('DOMContentLoaded', function() {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
    renderMeta();
    renderNav();
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });
    if (location.hash && location.hash.length > 1) {
      activePage = decodeURIComponent(location.hash.slice(1));
    }
    navigateTo(activePage);
  });

  function renderMeta() {
    if (!META) return;
    var el = document.getElementById('meta-info');
    var parts = [];
    if (META.generatedAt) {
      parts.push(new Date(META.generatedAt).toLocaleDateString());
    }
    if (META.model) parts.push(META.model);
    if (META.fromCommit) parts.push(META.fromCommit.slice(0, 8));
    el.textContent = parts.join(' \u00b7 ');
  }

  function renderNav() {
    var container = document.getElementById('nav-tree');
    var html = '<div class="nav-section">';
    html += '<a class="nav-item overview" data-page="overview" href="#overview">Overview</a>';
    html += '</div>';
    if (TREE.length > 0) {
      html += '<div class="nav-group-label">Modules</div>';
      html += buildNavTree(TREE);
    }
    container.innerHTML = html;
    container.addEventListener('click', function(e) {
      var target = e.target;
      while (target && !target.dataset.page) { target = target.parentElement; }
      if (target && target.dataset.page) {
        e.preventDefault();
        navigateTo(target.dataset.page);
      }
    });
  }

  function buildNavTree(nodes) {
    var html = '';
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      html += '<div class="nav-section">';
      html += '<a class="nav-item" data-page="' + escH(node.slug) + '" href="#' + encodeURIComponent(node.slug) + '">' + escH(node.name) + '</a>';
      if (node.children && node.children.length > 0) {
        html += '<div class="nav-children">' + buildNavTree(node.children) + '</div>';
      }
      html += '</div>';
    }
    return html;
  }

  function escH(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function navigateTo(page) {
    activePage = page;
    location.hash = encodeURIComponent(page);

    var items = document.querySelectorAll('.nav-item');
    for (var i = 0; i < items.length; i++) {
      if (items[i].dataset.page === page) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }

    var contentEl = document.getElementById('content');
    var md = PAGES[page];

    if (!md) {
      contentEl.innerHTML = '<div class="empty-state"><h2>Page not found</h2><p>' + escH(page) + '.md does not exist.</p></div>';
      return;
    }

    contentEl.innerHTML = marked.parse(md);

    // Rewrite .md links to hash navigation
    var links = contentEl.querySelectorAll('a[href]');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href');
      if (href && href.endsWith('.md') && href.indexOf('://') === -1) {
        var slug = href.replace(/\.md$/, '');
        links[i].setAttribute('href', '#' + encodeURIComponent(slug));
        (function(s) {
          links[i].addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(s);
          });
        })(slug);
      }
    }

    // Convert mermaid code blocks into mermaid divs
    var mermaidBlocks = contentEl.querySelectorAll('pre code.language-mermaid');
    for (var i = 0; i < mermaidBlocks.length; i++) {
      var pre = mermaidBlocks[i].parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = mermaidBlocks[i].textContent;
      pre.parentNode.replaceChild(div, pre);
    }
    try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}

    window.scrollTo(0, 0);
    document.getElementById('sidebar').classList.remove('open');
  }
})();
