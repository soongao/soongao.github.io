分布式限流。\n6. 失败时设置 `errno.CodeForbidden`，并写入 `mkey` 和 `data`。\n\n`ResponseZti` 还会设置 Trace span 的名称、调用方和业务状态码。错误响应会记录日志，并将 span 标记为错误。\n\n`ZtiResponseMiddleware()` 是 ZTI 路由的响应写出中间件。它只负责 CORS、禁用缓存、ETag 和 JSON 输出，不负责鉴权，也不负责指标上报。ZTI 路由应组合使用 `ZtiResponseMiddleware()` 和 `ResponseZti(...)`。\n\n## 与其他模块的连接\n\n`middleware` 模块连接了多个基础设施模块：\n\n- `kms`：`checkTokenValid` 使用 `kms.DecryptRequestToken` 解密 SDK token；AGW 初始化使用 `kms.Client.GetConfigV2` 获取 OpenAPI 密码。\n- `tcc`：AGW 缓存可从 `tcc.GetAGWTenantConfigs` 加载；ZTI 鉴权使用 `tcc.CheckAuthV2`。\n- `util`：提供接口限流、分布式限流、指标上报和 OpenAPI 响应加密。\n- `errno`：统一业务响应结构和错误码。\n- `bytedtracer`：为请求设置 span name、from service、业务状态码和错误标记。\n- `service` 包：`GetVolc`、`Signature`、`CreateVolc`、`GetTosBucketS3Info` 等业务入口通过 `Response` 接入统一响应模型。\n- `main`：启动阶段调用 `StartRefreshAGWTenantAkSkCache` 初始化 AGW 租户密钥缓存。\n\n## 新增接口时的约定\n\n新增普通 SDK 接口时，handler 应使用 `Response(c, mkey, f)`，并挂在带 `ResponseMiddleware()` 的路由组下。\n\n新增无需 token 校验的 simple 接口时，可使用 `ResponseMiddlewareWithoutAuthCheck()`，但 handler 仍应通过 `Response` 设置标准 payload。\n\n新增 OpenAPI 接口时，应使用 `OpenapiMiddleware()`。业务 handler 返回明文 `errno.Payload`，中间件会在成功响应时调用 `encryptOpenapiData` 加密 `Data`。\n\n新增 ZTI 接口时，应使用 `ResponseZti(c, mkey, f)`，并确保路由组包含 `ZtiResponseMiddleware()`。\n\n如果接口返回可缓存的原始 JSON，`payload.Data` 可以是 `[]byte`，并设置 `payload.ETag`。标准中间件会自动处理 `If-None-Match` 和 `304 Not Modified`。","other-build-sh":"# Other — build.sh\n\n## 模块概览\n\n`build.sh` 是仓库根目录下的构建入口脚本，用于生成 Go 服务二进制并整理运行所需的部署产物。脚本会读取 `script/settings.py` 中的 `PRODUCT`、`SUBSYS`、`MODULE`，拼接出最终可执行文件名：\n\n```bash\n${PRODUCT}.${SUBSYS}.${MODULE}\n```\n\n构建结果写入 `output/` 目录，主要包括：\n\n- `output/bin/${RUN_NAME}`：Go 编译出的服务二进制\n- `output/conf/`：从 `conf/` 复制出的配置文件，排除 `*_local.*`\n- `output/bootstrap.sh`、`output/pre_nginx.sh`、`output/settings.py`：运行或部署阶段需要的脚本和配置元信息\n\n## 执行流程\n\n```mermaid\nflowchart TD\n    A[\"执行 build.sh\"] --> B[\"启用 GO111MODULE=on\"]\n    B --> C[\"定位 CURDIR\"]\n    C --> D{\"script/settings.py 是否存在\"}\n    D -- \"否\" --> E[\"输出错误并退出\"]\n    D -- \"是\" --> F[\"读取 PRODUCT / SUBSYS / MODULE\"]\n    F --> G[\"创建 output/bin 与 output/conf\"]\n    G --> H[\"复制启动脚本和 settings.py\"]\n    H --> I[\"复制 conf/ 下非本地配置\"]\n    I --> J[\"go build 输出二进制\"]\n```\n\n## 关键步骤\n\n### 1. 启用 Go Modules\n\n```bash\nexport GO111MODULE=on\n```\n\n脚本强制启用 Go Modules，确保 `go build` 使用模块化依赖解析。这对依赖 `go.mod` 的构建流程是必要的。\n\n### 2. 解析脚本所在目录\n\n```bash\nCURDIR=$(cd $(dirname $0); pwd)\n```\n\n`CURDIR` 表示 `build.sh` 所在目录，后续用于检查和读取 `script/settings.py`。\n\n需要注意的是，脚本并没有在开头执行 `cd \"$CURDIR\"`。因此 `mkdir`、`cp`、`find conf/`、`go build` 等命令仍然依赖当前工作目录。实际使用时应在仓库根目录执行：\n\n```bash\n./build.sh\n```\n\n如果从其他目录通过绝对路径或相对路径执行该脚本，可能会把 `output/` 创建到错误位置，或找不到 `script/`、`conf/`、Go 源码入口。\n\n### 3. 校验 `script/settings.py`\n\n```bash\nif [ ! -f $CURDIR/script/settings.py ]; then\n    echo \"there is no settings.py exist.\"\n    exit -1\nfi\n```\n\n`script/settings.py` 是构建命名的必需输入。缺失时脚本立即退出，不会创建构建产物。\n\n### 4. 生成运行名 `RUN_NAME`\n\n```bash\nPRODUCT=$(cd $CURDIR/script; python -c \"import settings; print(settings.PRODUCT)\")\nSUBSYS=$(cd $CURDIR/script; python -c \"import settings; print(settings.SUBSYS)\")\nMODULE=$(cd $CURDIR/script; python -c \"import settings; print(settings.MODULE)\")\nRUN_NAME=${PRODUCT}.${SUBSYS}.${MODULE}\n```\n\n脚本通过 Python 动态导入 `settings.py`，读取三个字段并拼接二进制文件名。例如：\n\n```bash\noutput/bin/${PRODUCT}.${SUBSYS}.${MODULE}\n```\n\n这意味着 `settings.py` 中的 `PRODUCT`、`SUBSYS`、`MODULE` 不只是部署元信息，也直接影响构建产物名称。修改这些字段会改变 `output/bin/` 下生成的文件名。\n\n### 5. 准备输出目录\n\n```bash\nmkdir -p output/bin output/conf\n```\n\n`output/` 是部署包目录。`-p` 允许重复执行构建脚本，不会因为目录已存在而失败。\n\n### 6. 复制部署脚本\n\n```bash\ncp script/bootstrap.sh script/pre_nginx.sh script/settings.py output 2>/dev/null\nchmod +x output/bootstrap.sh output/pre_nginx.sh\n```\n\n脚本复制三个文件到 `output/`：\n\n- `script/bootstrap.sh`：通常作为服务启动入口\n- `script/pre_nginx.sh`：通常用于 Nginx 前置处理或部署前钩子\n- `script/settings.py`：保留构建和运行环境需要的模块元信息\n\n`cp` 的错误输出被重定向到 `/dev/null`，因此如果某个文件缺失，终端不会显示具体错误。但紧随其后的 `chmod` 仍可能失败。\n\n### 7. 复制配置文件\n\n```bash\nfind conf/ -type f ! -name \"*_local.*\" | xargs -I{} cp {} output/conf/\n```\n\n该命令会复制 `conf/` 目录下所有普通文件，但排除名称匹配 `*_local.*` 的本地配置文件。\n\n这体现了构建产物的约定：\n\n- `conf/*_local.*` 只用于开发者本地环境\n- 非本地配置会进入 `output/conf/`，供部署或运行环境使用\n\n配置文件会被平铺复制到 `output/conf/`，不会保留原始子目录结构。如果 `conf/` 下存在不同子目录中的同名文件，后复制的文件会覆盖先复制的文件。\n\n### 8. 构建 Go 二进制\n\n```bash\ngo build -a -o output/bin/${RUN_NAME}\n```\n\n`go build` 在当前工作目录执行，输出到 `output/bin/${RUN_NAME}`。\n\n参数含义：\n\n- `-a`：强制重新构建所有依赖包\n- `-o output/bin/${RUN_NAME}`：指定输出文件路径和名称\n\n由于没有显式指定包路径，`go build` 默认构建当前目录对应的 Go 包。因此该脚本假设仓库根目录就是服务主包所在位置，或至少当前目录是可构建的 Go 包目录。\n\n## 与代码库的关系\n\n`build.sh` 本身不被其他代码调用，也不调用项目内部函数。它是一个外部构建入口，连接了三个代码库约定：\n\n1. Go 构建约定：当前目录必须能通过 `go build` 构建。\n2. 部署元信息约定：`script/settings.py` 必须定义 `PRODUCT`、`SUBSYS`、`MODULE`。\n3. 配置发布约定：`conf/` 下非 `*_local.*` 文件会进入发布产物。\n\n因此，修改服务名称、部署模块名、配置布局或主包位置时，都需要同步检查 `build.sh` 的行为是否仍然符合预期。\n\n## 维护注意事项\n\n- 保持 `script/settings.py` 中 `PRODUCT`、`SUBSYS`、`MODULE` 可被 `python -c \"import settings\"` 正常读取。\n- 如果仓库切换到只支持 `python3` 的环境，需要调整脚本中的 `python` 命令。\n- 如果希望脚本支持从任意目录执行，应在解析 `CURDIR` 后显式切换工作目录。\n- 如果需要保留 `conf/` 子目录结构，当前的 `cp {} output/conf/` 需要改为保留路径的复制方式。\n- 被注释的 `ln -s` 行说明历史上可能存在 `boe.test.yml` 指向 `boe.staging.yml` 的兼容需求；恢复前应确认部署环境是否仍依赖这些配置别名。","other-conf":"# Other — conf\n\n## conf 配置模块\n\n`conf/` 模块保存 `bktmeta-api` 的静态 YAML 配置。它不包含 Go 函数、类或可执行逻辑，因此调用图中没有内部调用、外部调用或执行流；它通过配置键被服务启动、数据库初始化、缓存、TOS 接入、BPM 审批、TCC、Redis、限流等代码读取。\n\n核心模式是：\n\n```mermaid\nflowchart TD\n    A[\"base.yml 默认配置\"] --> B[\"环境配置文件\"]\n    B --> C[\"服务运行配置对象\"]\n    C --> D[\"MySQL / Bytedoc\"]\n    C --> E[\"TOS 平台 / BPM\"]\n    C --> F[\"Redis / 远程缓存\"]\n    C --> G[\"TCC / 限流 / 路由\"]\n```\n\n## 文件组织\n\n`base.yml` 是主默认配置，定义大部分公共字段和默认值。其他 `*.prod.yml`、`*.staging.yml`、`*.test.yml`、`*.ut.yml` 文件按机房、区域、业务形态或环境覆盖其中一部分字段。\n\n常见命名含义：\n\n- `boe.*.yml`：BOE 环境配置。\n- `boei18n.*.yml`、`boettp.yml`：BOE 国际化或 TTP 相关配置。\n- `my*`、`sg1`、`sgcomm1`、`alisg`、`jpsaas`：新加坡、马来西亚、SaaS 或国际化部署配置。\n- `useast*`、`no1a`、`ie`、`maliva`：海外区域配置。\n- `hl`、`lf`、`lq`、`gl`、`gl2`、`jj`、`xh`、`zb`、`zjg`、`hj`：国内不同机房或业务部署配置。\n- `*.default_tob*`、`*.default_tob_bp*`、`*.default_tob_imagex*`：ToB、BytePlus 或 ImageX 相关配置空间。\n- `test.staging.yml`、`lf.staging.yml`、`-.prod.yml`：测试或特殊环境数据库配置。\n- `toutiao_videoarch_bktmetaapi.yaml`：服务运行形态配置，按 `Develop` 和 `Product` 区分端口、日志、pprof、metrics、tracing 等开关。\n\n## 配置加载语义\n\n这些文件本身只声明键值，不执行逻辑。实际生效方式取决于代码中的配置加载器，但从结构上看，`base.yml` 提供完整默认字段，环境文件只覆盖差异项。例如：\n\n```yaml\nReadDB:\n  DSNTemplate: \"%s:%s@tcp(%s)/%s?charset=utf8&parseTime=True&loc=Local&timeout=%s&readTimeout=%s&writeTimeout=%s\"\n  Timeout: \"500ms\"\n  ReadTimeout: \"1s\"\n  WriteTimeout: \"2s\"\n  MaxIdle: 100\n  MaxOpen: 1000\n```\n\n环境文件通常只覆盖：\n\n```yaml\nReadDB:\n  Username: \"\"\n  Password: \"\"\n  DBName: \"videoarch_account\"\n  ConsulName: \"consul:toutiao.mysql.videoarch_account_read\"\n```\n\n因此新增环境配置时，应优先复用 `base.yml` 中已有字段，只在环境文件中声明环境差异，避免复制整份默认配置。\n\n## 数据库配置\n\n`ReadDB` 和 `WriteDB` 是读写 MySQL 连接配置，字段结构一致：\n\n- `DSNTemplate`：MySQL DSN 模板，默认在 `base.yml` 中定义。\n- `Username` / `Password`：数据库账号密码。多个生产配置中为空，通常表示由服务发现、密钥系统或运行环境补齐。\n- `DBName`：数据库名，例如 `videoarch_account`、`videoarch_vcloud`、`videoarch_bktmeta`、`videoarch_account_nontt`、`vbkttest`。\n- `ConsulName`：数据库地址或 Consul 服务名，例如 `consul:toutiao.mysql.videoarch_account_write`。\n- `Timeout`、`ReadTimeout`、`WriteTimeout`：连接与读写超时。\n- `MaxIdle`、`MaxOpen`：连接池参数。\n\n需要注意，部分配置的读写库并不完全对称。例如 `maliva.prod.yml` 中 `WriteDB.DBName` 是 `videoarch_vcloud`，但 `ReadDB.DBName` 是 `videoarch_account`。修改数据库配置时不要假设读写库名一定一致。\n\n## TOS 平台配置\n\n`TosAPI` 描述服务访问 TOS 平台所需的信息。常见字段包括：\n\n- `Disable`：关闭 TOS 平台能力，ToB / BytePlus 部分环境使用 `true`。\n- `Creator`：默认创建人。\n- `PSM`：TOS 平台服务名，例如 `toutiao.tos.tos_platform`、`bytedance.tos.tos_platform`。\n- `Cluster`：TOS 平台集群，例如 `default`、`sg`、`va`、`ie`、`euttp2`。\n- `JwtHost`：JWT 或云平台地址。\n- `IamSecret`：IAM secret 配置键。\n- `ModifyPropertyBpmUri` / `ModifyLimitBpmUri`：跳转式 BPM 申请链接前缀。\n- `PlatformHost`：TOS 平台 API 域名。\n- `CallbackHost`：回调域名。\n\n当 `TosAPI.Disable: true` 时，调用方需要按代码实现确认是否跳过 TOS 同步、桶属性修改或审批入口生成。配置层只表达开关，不保证所有业务路径自动禁用。\n\n## BPM 审批配置\n\n`ModifyTOSBucketBPMConfig` 用于桶属性、限额、公有级别修改的 BPM API 配置：\n\n- `AuthNodeID`：审批授权节点 ID，部分环境存在。\n- `BpmApiUrl`：BPM API 地址。\n- `SecretKey`：BPM 调用密钥。\n- `Partition`：分区，例如 `cn`、`i18n`、`us`、`tx`。\n- `ModifyPropsBpmID`：修改属性流程 ID。\n- `ModifyLimitsBpmID`：修改限额流程 ID。\n- `ModifyPublicLevelBpmID`：修改公有级别流程 ID。\n\n字段名需要严格保持一致。`base.yml` 和绝大多数环境使用 `ModifyTOSBucketBPMConfig`；`boe.staging.default_tob.yml` 中出现了 `ModifyTOSBucketBpmConfig`，大小写与主配置不一致。如果配置反序列化依赖精确字段名，这一项可能不会覆盖默认值。\n\n## Bytedoc 配置\n\n`BytedocSetting` 支持两种形态：\n\n直接连接：\n\n```yaml\nBytedocSetting:\n  ConnectURI: \"mongodb+consul+token://...\"\n  DbName: \"bktmeta\"\n```\n\n远程模式：\n\n```yaml\nBytedocSetting:\n  RemoteMode: true\n  RemoteSetting:\n    Host: \"toutiao.videoarch.bktmetaapi\"\n    Cluster: \"default\"\n    WithSD: true\n    Idc: \"my\"\n    Timeout: 30s\n```\n\n国内多机房配置通常使用 `RemoteMode`，通过 `Host`、`Cluster`、`Idc` 指向远端服务；国际化或 SaaS 配置更常见 `ConnectURI` 直连。部分 ToB 配置将 `ConnectURI` 和 `DbName` 置空，表示该环境不使用本地 Bytedoc 存储或由其他机制提供。\n\n## ToB TOS 区域与 S3 Endpoint 映射\n\n`TobTosRegionInfo` 是字符串形式的 JSON 数组，例如：\n\n```yaml\nTobTosRegionInfo: \"[{\\\"Region\\\":\\\"cn-beijing\\\",\\\"Endpoint\\\":\\\"tos-cn-beijing-inner.ivolces.com\\\"}]\"\n```\n\n`TobTosEndpointToS3Endpoint` 是 TOS endpoint 到 S3 endpoint 的映射：\n\n```yaml\nTobTosEndpointToS3Endpoint:\n  \"tos-cn-beijing.ivolces.com\": \"tos-s3-cn-beijing-inner.ivolces.com\"\n```\n\n这里 `TobTosRegionInfo` 不是 YAML 列表，而是字符串。读取方如果需要结构化数据，应先从配置中取字符串，再按 JSON 解析。\n\n## 路由、集群与缓存\n\n`TosS3Router` 在 `base.yml` 中定义 S3 访问路由，包含三组映射：\n\n- `TLSPSM`：不同区域的 TLS PSM。\n- `RouterPSM`：代理或目标 PSM。\n- `RouterCluster`：区域到 cluster 的映射。\n\n键名中既有纯区域名，如 `BOE`、`MALIVA`、`ALISG`、`I18N`、`EU-TTP`，也有组合键，如 `US-TTP-toutiao.tos.tosapi`。修改路由时需要确认调用方使用的是哪种 key 生成规则。\n\n缓存相关配置包括：\n\n- `CacheSize`：本地缓存容量。\n- `CacheRefreshTime`：本地缓存刷新间隔。\n- `RedisConfig`：Redis 集群与超时配置。\n- `RemoteCacheConfig`：远程缓存开关、TTL、批量大小、逻辑过期与锁释放 TTL。\n- `RateLimiter`：分布式限流配置。\n- `InterfaceRateLimiter`：接口级限流配置，默认 `Enable: false` 且 `Limits: {}`。\n\n`RemoteCacheConfig.Enable` 默认是 `false`，所以仅声明 Redis 不等于启用远程缓存，具体仍取决于代码中的开关判断。\n\n## 外部系统配置\n\n`VcloudControlConfig` 配置 Vcloud 控制面访问凭据：\n\n```yaml\nVcloudControlConfig:\n  AccessKey: \"...\"\n  SecretKey: \"...\"\n```\n\n`ByteTreeConfig` 配置 ByteTree 地址、分区和密钥：\n\n```yaml\nByteTreeConfig:\n  Domain: \"https://bytetree.byted.org\"\n  Partition: \"cn\"\n  SecretKey: \"...\"\n  JwtHost: \"https://cloud-i18n.bytedance.net\"\n```\n\n`AGWConfig` 控制 AGW OpenAPI 集成：\n\n- `Switch`：是否启用。\n- `OpenapiHost`：OpenAPI 地址。\n- `ServiceId`：服务 ID 查询串，包含 `boe`、`publish_online` 等参数。\n- `OpenapiUserName`：用户名。\n- `OpenapiPasswordConfigKey`：密码配置键。\n\n国内和部分国际化环境启用 `AGWConfig.Switch: true`；ToB、BytePlus、部分 TTP 环境关闭该开关。\n\n## TCC、ID 生成与业务集群\n\n`Tcc` 指定 TCC 配置空间：\n\n```yaml\nTcc:\n  ServiceName: \"toutiao.videoarch.bktmetaapi\"\n  ConfigSpace: \"default\"\n```\n\n多个 ToB / BytePlus 环境覆盖 `ConfigSpace`，例如 `default_tob`、`default_tob_bp`、`gl`。服务代码读取 TCC 时应以该字段决定配置空间，而不是从文件名推断。\n\n`IdGenerator` 控制 ID 生成器：\n\n```yaml\nIdGenerator:\n  Switch: true\n  NameSpace: \"global\"\n  CounterSpace: \"videoarch\"\n```\n\n`jpsaas.prod.yml` 将 `IdGenerator.Switch` 设置为 `false`。如果新增依赖 ID 生成器的逻辑，需要考虑该开关关闭时的行为。\n\n`AccountCluster` 和 `SGWCluster` 用于区分账户或网关集群，默认是 `default`，BytePlus 相关配置会设置为 `default_tob_bp`。\n\n## 服务运行配置\n\n`toutiao_videoarch_bktmetaapi.yaml` 与业务配置文件不同，它按运行模式划分为 `Develop` 和 `Product`：\n\n- `ServicePort`：服务端口，当前为 `8789`。\n- `DebugPort`：调试端口，当前为 `6790`。\n- `EnableTracing`：开启 tracing。\n- `EnablePprof`：开启 pprof。\n- `EnableMetrics`：生产为 `true`，开发为 `false`。\n- `LogLevel`：开发为 `debug`，生产为 `info`。\n- `ConsoleLog`：开发为 `true`，生产为 `false`。\n- `FileLog`、`DatabusLog`、`AgentLog`：日志输出开关。\n- `Mode`：开发为 `debug`，生产为 `release`。\n- `ServiceVersion`：当前为 `0.1.0`。\n\n这份文件更偏向服务框架启动参数，而 `base.yml` 和环境 YAML 更偏向业务依赖配置。\n\n## 新增或修改环境配置的注意事项\n\n新增环境文件时，优先从最接近的现有文件复制，再只修改差异字段：数据库 `DBName` / `ConsulName`、`TosAPI` 域名、`ByteTreeConfig.Partition`、`Tcc.ConfigSpace`、`RedisConfig.Cluster`、`AGWConfig.Switch` 等。\n\n修改字段名时要谨慎。YAML 反序列化通常依赖结构体 tag 或字段名匹配，`ModifyTOSBucketBPMConfig`、`TobTosEndpointToS3Endpoint`、`UseDistributedRateLimiter` 这类长字段名一旦大小写不一致，可能表现为“配置存在但不生效”。\n\n不要把 `TobTosRegionInfo` 改成 YAML 数组，除非同步修改读取代码；当前配置把它作为 JSON 字符串保存。\n\n不要从文件名推断业务行为。比如 `SyncTosBuckets`、`TosAPI.Disable`、`AGWConfig.Switch`、`RemoteCacheConfig.Enable` 都是显式开关，业务代码应读取配置值。\n\n该目录包含数据库密码、访问密钥、BPM secret 等敏感信息。提交或复制配置时应按仓库现有密钥治理方式处理，避免在文档、日志和测试输出中展开具体值。","other-config":"# Other — config\n\n## config 模块\n\n`config` 包负责应用配置的初始化、数据库连接配置读取，以及从 TCC 合并基础配置。当前测试文件覆盖了三个关键行为：测试进程初始化、MySQL 配置能力、TCC 基础配置合并。\n\n## 初始化流程\n\n测试入口定义在 `config/base_test.go`：\n\n```go\nfunc TestMain(m *testing.M) {\n\tginex.Init()\n\tInitConf(ginex.ConfDir())\n\tcode := m.Run()\n\tos.Exit(code)\n}\n```\n\n所有 `config` 包测试都会先执行这段初始化逻辑：\n\n1. `ginex.Init()` 初始化 `ginex` 运行环境。\n2. `ginex.ConfDir()` 返回配置目录。\n3. `InitConf(...)` 加载配置并填充全局配置对象 `Conf`。\n4. `m.Run()` 执行测试用例。\n5. 使用 `os.Exit(code)` 保留测试退出码。\n\n这意味着依赖 `Conf` 的测试，例如 `Conf.ReadDB.GetDSN()` 和 `Conf.ReadDB.NewDB()`，默认都运行在已经完成配置加载的环境中。\n\n```mermaid\nflowchart TD\n    A[\"测试进程启动\"] --> B[\"ginex.Init()\"]\n    B --> C[\"ginex.ConfDir()\"]\n    C --> D[\"InitConf(配置目录)\"]\n    D --> E[\"执行 m.Run()\"]\n    E --> F[\"os.Exit(退出码)\"]\n```\n\n## 全局配置对象 `Conf`\n\n`Conf` 是 `config` 包的全局配置入口。测试中直接访问或替换它，用于验证配置行为：\n\n```go\ndsn := Conf.ReadDB.GetDSN()\ndb, err := Conf.ReadDB.NewDB()\n```\n\nTCC 合并测试也会临时覆盖 `Conf`：\n\n```go\noldConf := Conf\ndefer func() { Conf = oldConf }()\n\nConf = &Config{\n\tMeta: Meta{\n\t\tPSM: \"test.psm\",\n\t},\n\tTccInfo: TccInfo{\n\t\tConfigSpace: \"default\",\n\t},\n\tSyncTosBuckets: false,\n\tTosAPI: TosAPI{\n\t\tCluster: \"local-cluster\",\n\t\tCreator: \"local\",\n\t},\n}\n```\n\n从这些使用方式可以看出，`Config` 至少包含以下配置区域：\n\n- `Meta.PSM`：服务 PSM，用于创建 TCC 客户端。\n- `TccInfo.ConfigSpace`：TCC 配置空间，会传递给 `tccclient.ConfigV2.Confspace`。\n- `ReadDB`：读数据库配置，提供 `GetDSN()` 和 `NewDB()`。\n- `SyncTosBuckets`：是否同步 TOS bucket。\n- `TosAPI`：TOS API 配置，包含 `Disable`、`Cluster`、`Creator` 等字段。\n\n## MySQL 配置\n\n`config/mysql_test.go` 验证 MySQL 相关能力。\n\n`IsCodebaseCIEnvironment()` 用于判断当前是否处于 Codebase CI 环境：\n\n```go\nfunc TestIsCodebaseCIEnvironment(t *testing.T) {\n\tassert.True(t, IsCodebaseCIEnvironment())\n}\n```\n\n`Conf.ReadDB.GetDSN()` 根据当前环境返回数据库 DSN：\n\n```go\ndsn := Conf.ReadDB.GetDSN()\nassert.True(t, len(dsn) > 0)\n```\n\n测试覆盖了两种路径：\n\n- CI 环境：直接调用 `Conf.ReadDB.GetDSN()`，断言返回非空 DSN。\n- 非 CI 环境：通过 `gomonkey.ApplyFunc` 将 `IsCodebaseCIEnvironment` patch 为 `false`，再断言返回非空 DSN。\n\n```go\npatches := gomonkey.ApplyFunc(IsCodebaseCIEnvironment, func() bool {\n\treturn false\n})\ndefer patches.Reset()\n\ndsn := Conf.ReadDB.GetDSN()\nassert.True(t, len(dsn) > 0)\n```\n\n`Conf.ReadDB.NewDB()` 会基于当前数据库配置创建数据库连接对象：\n\n```go\ndb, err := Conf.ReadDB.NewDB()\nassert.Nil(t, err)\nassert.NotNil(t, db)\n```\n\n测试文件通过空白导入注册 MySQL driver：\n\n```go\nimport _ \"code.byted.org/gopkg/mysql-driver\"\n```\n\n因此维护 `NewDB()` 时需要注意：它依赖驱动注册副作用，测试环境中必须保留该导入。\n\n## TCC 基础配置合并\n\n`mergeTCCBaseConfig()` 负责把 TCC 中 key 为 `\"base\"` 的基础配置合并进全局 `Conf`。\n\n测试覆盖了三个行为边界。\n\n### `Conf == nil` 时不处理\n\n```go\nConf = nil\nmergeTCCBaseConfig()\nassert.Nil(t, Conf)\n```\n\n当全局配置不存在时，`mergeTCCBaseConfig()` 应直接返回，不创建新的 `Config`，也不触发 TCC 请求。\n\n### `Meta.PSM` 为空时不处理\n\n```go\nConf = &Config{}\nmergeTCCBaseConfig()\nassert.Equal(t, \"\", Conf.Meta.PSM)\n```\n\n当 `Conf.Meta.PSM` 为空时，函数不具备创建 TCC 客户端所需的服务标识，应保持配置不变。\n\n### 成功合并时保留本地未覆盖字段\n\n成功路径中，测试 patch 了 `tccclient.NewClientV2` 和 `ClientV2.Get`：\n\n```go\npatches.ApplyFunc(tccclient.NewClientV2, func(psm string, cfg *tccclient.ConfigV2) (*tccclient.ClientV2, error) {\n\tassert.Equal(t, \"test.psm\", psm)\n\tassert.NotNil(t, cfg)\n\tassert.Equal(t, \"default\", cfg.Confspace)\n\treturn client, nil\n})\n```\n\n这里验证了两个契约：\n\n- `mergeTCCBaseConfig()` 使用 `Conf.Meta.PSM` 创建 TCC 客户端。\n- `Conf.TccInfo.ConfigSpace` 会传递到 `tccclient.ConfigV2.Confspace`。\n\n随后从 TCC 读取 `\"base\"` 配置：\n\n```go\npatches.ApplyMethod(reflect.TypeOf(client), \"Get\", func(_ *tccclient.ClientV2, _ context.Context, key string) (string, error) {\n\tassert.Equal(t, \"base\", key)\n\treturn baseConfigYAML, nil\n})\n```\n\n测试中的 TCC YAML 只覆盖部分字段：\n\n```yaml\nSyncTosBuckets: true\nTosAPI:\n  Disable: true\n```\n\n合并后断言：\n\n```go\nassert.True(t, Conf.SyncTosBuckets)\nassert.True(t, Conf.TosAPI.Disable)\n\nassert.Equal(t, \"local-cluster\", Conf.TosAPI.Cluster)\nassert.Equal(t, \"local\", Conf.TosAPI.Creator)\n```\n\n这说明 `mergeTCCBaseConfig()` 的合并语义不是简单替换整个 `Conf`，而是用 TCC base 配置覆盖明确提供的字段，同时保留 TCC 未提供的本地字段。\n\n## 维护注意事项\n\n修改 `InitConf`、`Conf` 结构或配置文件格式时，需要保证 `TestMain` 仍能完成初始化，否则依赖 `Conf.ReadDB` 的测试会失败。\n\n修改 MySQL 配置逻辑时，需要同时验证 `IsCodebaseCIEnvironment()` 为 `true` 和 `false` 两条路径，确保 `GetDSN()` 在两种环境下都返回可用 DSN。\n\n修改 `mergeTCCBaseConfig()` 时，重点保持这几个行为不变：\n\n- `Conf == nil` 时安全返回。\n- `Conf.Meta.PSM == \"\"` 时不访问 TCC。\n- 使用 `Conf.Meta.PSM` 和 `Conf.TccInfo.ConfigSpace` 创建 `tccclient.ClientV2`。\n- 从 TCC 读取 key `\"base\"`。\n- TCC base 配置只覆盖提供的字段，未提供字段保留本地值。","other-db":"# Other — db\n\n## db 模块\n\n`db` 包是 bktmeta-api 的持久化与缓存聚合层，负责 Bucket 元数据、IDC 配置、临时建桶工单、IDC 代理、火山 IAM 账号，以及 TOS 全量 Bucket 快照的读写。它同时连接 MySQL、ByteDoc/Mongo、TOS 管理 RPC、KMS 和指标系统。\n\n```mermaid\nflowchart LR\n    配置[\"config.Conf\"] --> InitDb[\"InitDb\"]\n    InitDb --> DbHandler[\"DbHandler\"]\n    DbHandler --> MySQL[\"MySQL 表\"]\n    配置 --> InitByteDoc[\"InitByteDoc\"]\n    InitByteDoc --> RegionBucketsApi[\"TosRegionBucketsApi\"]\n    RegionBucketsApi --> Mongo[\"ByteDoc/Mongo\"]\n    RegionBucketsApi --> Remote[\"远端 region_buckets 接口\"]\n    InitTosMetaCache[\"InitTosMetaCache\"] --> Cache[\"AllTosMetaCache\"]\n    Cache --> RegionBucketsApi\n    Cache --> TosRPC[\"rpc.TosV3Cli\"]\n```\n\n## 初始化流程\n\n测试入口 `TestMain` 展示了典型启动顺序：`ginex.Init()`、`config.InitConf()`、`util.InitMetrics()`、`kms.Init()`、`rpc.InitRpc()`、`InitDb()`、`InitByteDoc()`、`InitTosMetaCache()`。\n\n`InitDb()` 初始化全局 `Db *DbHandler`。`DbHandler` 内部维护读写分离的 `*gorm.DB`：`r` 用于读库，`w` 用于写库；重试参数来自 `config.Conf.RetryTimes`，写入事务默认使用 `5 * time.Second` 的重试间隔。若 `config.Conf.IdGenerator.Switch` 开启，`IdGenCli` 使用 `idgenerator.New()`；否则退化为 `EmptyIdGen`，其 `Get()` 返回 `0`，`MGet()` 返回指定长度的零值切片。\n\n`InitByteDoc()` 根据 `config.Conf.TosAPI.Disable` 和 `config.Conf.BytedocSetting.RemoteMode` 决定 ByteDoc 模式：\n\n- 本地模式：`initLocalByteDoc()` 必须成功，`TosRegionBucketsApi = &regionBucketApiImpl{tosAllBucketsCol: localTosAllBucketsCol}`。\n- 远端模式：本地 ByteDoc 快照是 best-effort；主接口通过 `buildRemoteBytedocCli()` 构造 `regionBucketApiRemoteImpl`。\n- 禁用 TOS API：跳过 ByteDoc 初始化。\n\n`initLocalByteDoc()` 使用 `config.Conf.BytedocSetting.ConnectURI` 连接 Mongo，初始化 `RegionTosAllBuckets` 集合，并通过 `ensureIndices()` 为 `region` 创建唯一索引。\n\n## 通用数据库写法\n\n大多数 `DbHandler` 方法遵循同一模式：\n\n1. 通过 `util.EmitThroughput()` 和 `util.EmitLatency()` 上报命令指标。\n2. 使用 `retry.Do()` 或 `retry.DoCanAbort()` 包裹数据库操作。\n3. 写操作通过 `db.w.Begin().Context(ctx)` 开启事务。\n4. 失败时调用 `RollbackTX(tx, err)`，该函数会合并业务错误与 rollback 错误。\n5. 主键通过 `IdGenCli.Get()` 或 `IdGenCli.MGet()` 生成，部分写路径使用 `util.WithoutCancel(ctx)` 避免上游取消影响 ID 获取。\n\n相关表名常量包括：\n\n- `TableBuckets = \"t_bucket\"`\n- `TableBucketsIdcConfig = \"t_bucket_idc_config\"`\n- `TableBucketTestRecord = \"t_bucket_param_test_record\"`\n- `TableTempBuckets = \"t_new_bucket_temp\"`\n- `TableIdcProxy = \"t_idc_proxy\"`\n- `TableIdcMeta = \"t_idc_meta\"`\n- `volcTable = \"t_volcengine_iam\"`\n\n## Bucket 元数据\n\nBucket 主数据存储在 `t_bucket`，多 IDC 后端配置存储在 `t_bucket_idc_config`。代码直接持久化 SDK 类型 `meta.Bucket` 和 `meta.BucketIdcConfig`。\n\n核心写接口：\n\n- `CreateBucket(ctx, bucket)`：写入前调用 `encryptBucket()`，然后在同一事务中插入主 Bucket 和 `bucket.IdcConfigs`。\n- `UpdateBucket(ctx, bucket)`：加密后更新主表字段，删除该 Bucket 的所有旧 IDC 配置，再插入当前配置列表。\n- `OverwriteBucket(ctx, bucket)`：只覆盖主表字段，不重建 `t_bucket_idc_config`。\n- `DeleteBucket(ctx, name)`：先查询 Bucket，再删除主表记录和关联 IDC 配置。\n- `CreateBucketIDCConfigs()` / `DeleteBucketIDCConfigs()`：单独维护 `t_bucket_idc_config`。\n\n读接口分为“原始密文”和“解密后”两类：\n\n- `GetUndecryptedBucketByName()`、`BatchGetUndecryptedBucket()`、`GetUndecryptedAllBuckets()`、`BatchGetUndecryptedAllBuckets()` 返回数据库中的加密字段。\n- `GetBucketByName()` 和 `ListBucketsByProvider()` 会调用 `DecryptBucketWithConfig()` 解密。\n- `PageBucketsForJanus()` 返回 `dto.PageBucketsResponse`，用于分页展示简化 Bucket 信息。\n- `GetAllBucketNames()` 只查询 `name` 字段，常用于批量扫描。\n\n注意：`encryptBucket()`、`encryptBucketIDCConfigs()` 和 `DecryptBucketWithConfig()` 都会原地修改传入对象。调用者如果需要保留明文对象，应自行复制。\n\n## 后端 Bucket 加解密\n\n`encryptBackendBucket()` 和 `decryptBackendBucket()` 根据 `backendType` 解析并处理 `BackendBucket` JSON。支持的后端类型包括：\n\n- `meta.BackendTos`\n- `meta.BackendS3`\n- `meta.BackendOss`\n- `meta.BackendMosaic`\n- `meta.BackendGCS`\n- `meta.BackendP2P`\n- `meta.BackendLarkDrive`\n- `meta.BackendToBTos`\n- `meta.BackendFS`\n- `meta.BackendToBCustomerS3`\n- `meta.BackendHDFS`\n\n敏感字段通过 `kms.Cipher.Encrypt()` 和 `kms.Cipher.Decrypt()` 处理。`ignoreAkSk=true` 时，`DecryptBucketWithConfig()` 会清空 AK/SK 或等价凭证字段，适合对外返回不含密钥的元数据。\n\nTOS 类型有额外行为：`decryptBackendBucket()` 会尝试从 `TosMetaCache.GetTosMeta()` 补充 `Public`、`Creator` 和 `TTL`。其中 `TTL` 只在 TOS Bucket 创建时间超过一天时采用缓存中的值。\n\n## Bucket 参数测试记录\n\nBucket 参数测试记录存储在 `TableBucketTestRecord`：\n\n- `CreateBucketTestRecord(ctx, bkt)` 会将同名同 IDC 的旧有效记录置为 `validate=false`，插入新的 `meta.BucketParamTestRecord`，并把主 Bucket 或 IDC 配置的 `TestStatus` 更新为 `meta.Bucket_Testing`。\n- `GetBucketTestRecord(ctx, bktName, idc)` 查询当前 `validate=1` 的记录。\n- `UpdateBucketTestResult(ctx, record, testStatus, err)` 更新测试记录状态和错误信息，同时同步更新 `t_bucket` 或 `t_bucket_idc_config` 上的测试状态。\n\n## RegionBucketsApi 与 ByteDoc\n\n`RegionBucketsApi` 抽象了 TOS 全量 Bucket 快照的存储接口：\n\n```go\ntype RegionBucketsApi interface {\n    CreateRegionBuckets(ctx context.Context, doc *RegionTosAllBucketsDB) error\n    QueryRegionBuckets(ctx context.Context, doc *RegionTosAllBucketsDB) error\n    UpdateTosAllBucketsDB(ctx context.Context, doc *RegionTosAllBucketsDB) error\n    ListAllRegionTosBuckets(ctx context.Context) ([]*RegionTosAllBucketsDB, error)\n}\n```\n\n`RegionTosAllBucketsDB` 是 ByteDoc 文档结构，包含 `Region`、`LastUpdateTime` 和 `AllBuckets []*rpc.AdminBucketV1`。\n\n本地实现 `regionBucketApiImpl` 直接操作 Mongo 集合：\n\n- `CreateRegionBuckets()` 使用 `InsertOne()`。\n- `QueryRegionBuckets()` 按 `region` 查询。\n- `UpdateTosAllBucketsDB()` 使用 `FindOneAndUpdate()`，条件包含当前 `lastUpdateTime`，用于避免覆盖并发更新。\n- `ListAllRegionTosBuckets()` 按 `region` 排序批量读取。\n\n远端实现 `regionBucketApiRemoteImpl` 使用 Hertz 客户端访问：\n\n- `POST /gateway/v1/region_buckets/create`\n- `POST /gateway/v1/region_buckets/query`\n- `POST /gateway/v1/region_buckets/update`\n- `POST /gateway/v1/region_buckets/list`\n\n`DoReq()` 会设置服务发现选项：`withSD`、`cluster`、`idc`、`env`，并保证上下文中存在 log id。响应 HTTP 状态码非 2xx 时返回错误；业务响应要求 `Code == janus.JanusOkCode`。\n\n远端 `ListAllRegionTosBuckets()` 读取成功后，会对每个文档调用 `UpsertLocalRegionBuckets()`。该方法只有在 `writeBack=true` 且 `localTosAllBucketsCol` 已初始化时才写本地快照；写入前先只投影查询 `lastUpdateTime`，若本地版本更新或相等则跳过，否则使用带版本条件的 `UpdateOne(..., SetUpsert(true))` 写入，避免旧大文档覆盖新数据。\n\n## TOS 元数据缓存\n\n`AllTosMetaCache` 是进程内缓存：\n\n- `BucketCache sync.Map`：`bucket name -> *rpc.AdminBucketV1`\n- `BucketListCache []*meta.TosBucket`：`GetAllTosBuckets()` 的 1 分钟列表缓存\n- `RegionVersionMap sync.Map`：`region -> lastUpdateTime`\n\n`InitTosMetaCache()` 会先同步一次 `asyncUpdateAllTosBktCache()`；如果失败会 panic。随后启动后台任务：\n\n- 每 5 分钟刷新 `AllTosMetaCache`。\n- 当 `config.Conf.SyncTosBuckets` 为真时，每 5 分钟执行 `asyncUpdateAllTosBucketsIntoBytedoc()`。\n- 每 10 分钟执行 `scanAllTicketStatus()`，将超时的临时建桶工单置为过期。\n\n`asyncUpdateAllTosBktCache()` 先通过 `Db.BatchGetUndecryptedAllBuckets(ctx, 300)` 构建 `bktmetaBucketCache`，再从 `TosRegionBucketsApi.ListAllRegionTosBuckets()` 读取所有区域快照。只有远端 `LastUpdateTime` 比本地 `RegionVersionMap` 更新时才处理该区域。处理 Bucket 时会结合 `regionAllowUpdateIdcs` 和 `needCheckAllowIdc()` 过滤 IDC，并在重名冲突时优先尊重 bktmeta MySQL 中的 IDC。\n\n`asyncUpdateAllTosBucketsIntoBytedoc()` 用于把当前区域的 TOS 管理面数据同步到 ByteDoc。它先查询当前区域文档，版本超过 5 分钟才刷新；随后调用 `rpc.TosV3Cli.GetAllBuckets()` 和 `rpc.TosV3Cli.GetAllBucketsWithCache()`。如果新数量小于旧数量，直接跳过更新，避免异常空洞数据覆盖旧快照。`getIdcFromAdminBkt()` 从 `AdminBucketV1.VRegion` 解析 IDC，并特殊映射 `CN-3DC`、`CN-ZG`、`CN6-3DC`。\n\n## 临时建桶工单\n\n临时 Bucket 存储在 `t_new_bucket_temp`，使用 `dto.TempBucket`。状态常量为：\n\n- `TicketWaitingForApprove = 0`\n- `TicketExpired = -1`\n- `TicketSuccess = 1`\n\n`CreateTempBucket()` 插入工单；`GetAllWaitingTempBucketsFromDB()` 查询待审批工单；`GetValidTempBucketByName()` 查询未过期工单；`DeleteTempBucket()` 删除记录。\n\n`UpdateTicketStatusByName()` 有一个重要保护：一旦工单已经是 `TicketSuccess`，后续不会被更新为其他状态。更新为 `TicketExpired` 时会设置 `ExpiredAt`。后台 `scanAllTicketStatus(ctx, expireElapse)` 会将创建时间超过 `expireElapse` 分钟的待审批工单标记为过期。\n\n## IDC 代理配置\n\nIDC 元数据和代理地址分别存储在 `t_idc_meta` 与 `t_idc_proxy`：\n\n- `CreateIdc(ctx, idcProxiesDTO)` 插入 `meta.IdcMeta` 和代理列表。\n- `GetIdcProxies(ctx, idc)` 查询 IDC 元数据及所有代理。\n- `GetIdcProxiesByProgramEnvIdc(ctx, idc, programEnvIdc)` 只查询匹配 `program_env_idc` 或空值的代理。\n- `UpdateIdcProxies(ctx, idcProxiesDTO)` 更新 IDC 元数据，并删除后重建全部代理。\n- `GetAllIdcProxies(ctx)` 一次读取所有 IDC 元数据和代理，在内存中按 IDC 分组。\n- `DeleteIdcProxies(ctx, idc)` 删除代理和 IDC 元数据。\n\n## 火山 IAM 账号\n\n火山 IAM 信息通过 `meta.VolcengineIAM` 对外暴露，数据库 DTO 是 `VolcIAMDTO`，表名为 `t_volcengine_iam`。\n\n- `CreateVolc()` 调用 `encryptVolc(volc, true)` 加密 `SecretKey` 后插入。\n- `UpdateVolc()` 只有在 `volc.Credentials.SecretKey != \"\"` 时才更新并加密 secret；其他字段按非空值构造更新 map。\n- `GetVolc(ctx, ak)` 按 access key 查询，未命中时返回 `nil, nil`。\n- `GetVolcByAccountId()` 按 `account_id` 查询，未命中返回空切片。\n- `ListAllPlatformVolcAccounts()` 查询 `account_id = 0` 的平台账号。\n- `GetAllVolcs()` 返回所有可成功解密的账号。\n- `DeleteVolc()` 按 access key 删除。\n\n## 贡献注意事项\n\n新增写接口时应沿用现有模式：指标埋点、`retry.Do()`、事务、`RollbackTX()` 和 `IdGenCli`。涉及密钥、secret、credential 的字段必须走 `kms.Cipher`，并确认 `ignoreAkSk` 场景不会泄露凭证。\n\n修改 TOS 缓存逻辑时需要同时考虑 MySQL 中的 bktmeta Bucket、ByteDoc 区域快照和 TOS 管理面 RPC。`asyncUpdateAllTosBktCache()` 中的 IDC 白名单和重名冲突处理是避免跨区域错误覆盖的关键逻辑。\n\n测试依赖 `TestMain` 初始化配置、KMS、RPC、数据库和缓存。部分测试是集成测试，会访问真实配置中的 DB/TOS/ByteDoc；远端 ByteDoc 与本地写回路径则大量使用 `gomonkey` patch `DoReq()`、Mongo 方法或 `rpc.TosV3Cli`。","other-errno":"# Other — errno\n\n## errno 模块\n\n`errno` 定义了项目内统一的业务响应结构和错误码。业务 handler 通常返回 `errno.Payload`，再由 `middleware.ResponseMiddleware`、`middleware.ZtiResponseMiddleware`、`middleware.OpenapiMiddleware` 或 `janus.ResponseMiddleware` 统一序列化、记录指标和设置 Trace 状态。\n\n```mermaid\nflowchart LR\n  A[\"业务 handler\"] --> B[\"errno.Payload\"]\n  B --> C[\"普通 middleware\"]\n  B --> D[\"Janus middleware\"]\n  C --> E[\"JSON / ETag 响应\"]\n  C --> F[\"日志、指标、Trace\"]\n  D --> G[\"JanusPayload\"]\n```\n\n## 核心结构\n\n`Payload` 是所有业务响应的基础结构：\n\n```go\ntype Payload struct {\n\tCode    int         `json:\"code\"`\n\tMessage string      `json:\"message\"`\n\tData    interface{} `json:\"data,omitempty\"`\n\tETag    string      `json:\"etag,omitempty\"`\n\tAlert   bool        `json:\"-\"`\n}\n```\n\n字段含义：\n\n- `Code`：业务状态码，不直接等同 HTTP 状态码。多数 middleware 最终仍以 `http.StatusOK` 返回。\n- `Message`：业务提示或错误信息。\n- `Data`：响应数据，`omitempty` 表示为 `nil` 时不会出现在 JSON 中。\n- `ETag`：缓存响应使用的 ETag。`ResponseMiddleware` 在 `Data` 是 `[]byte` 时会结合 `If-None-Match` 处理 `304 Not Modified`。\n- `Alert`：内部字段，`json:\"-\"`，不会序列化到响应体。\n\n`Payload` 有一个方法：\n\n```go\nfunc (p *Payload) Error() error\n```\n\n它返回 `errors.New(p.Message)`。注意这个方法签名不是 Go 标准 `error` 接口需要的 `Error() string`，因此 `*Payload` 本身不实现内置 `error` 接口。\n\n## 响应构造函数\n\n### `OK`\n\n```go\nfunc OK(data interface{}) Payload\n```\n\n构造成功响应：\n\n```go\nerrno.OK(result)\n```\n\n返回：\n\n```go\nPayload{\n\tCode:    CodeOK,\n\tMessage: \"ok\",\n\tData:    result,\n}\n```\n\n其中 `CodeOK` 为 `2000`。\n\n### `OKWithETag`\n\n```go\nfunc OKWithETag(data interface{}, etag string) Payload\n```\n\n用于需要缓存协商的成功响应。调用方把预序列化的响应或普通数据放入 `Data`，并设置 `ETag`：\n\n```go\nerrno.OKWithETag(bytes, \"etag-value\")\n```\n\n普通 middleware 在 `Data` 类型为 `[]byte` 时会直接写出字节流，并设置响应头 `ETag`；如果请求头 `If-None-Match` 与 `Payload.ETag` 相同，则返回 `304`。\n\n### `Error`\n\n```go\nfunc Error(err error) Payload\n```\n\n将普通 `error` 转成业务错误响应：\n\n- `err == nil` 时返回 `OK(nil)`\n- `err != nil` 时返回 `Code: 600`，`Message: err.Error()`\n\n`600` 是该函数内部硬编码的默认错误码。需要明确业务错误类型时，应优先使用 `ErrorWithCode` 或预定义错误变量。\n\n### `ErrorWithCode`\n\n```go\nfunc ErrorWithCode(code int, err error) Payload\n```\n\n使用指定业务码和 `err.Error()` 构造错误响应：\n\n```go\nreturn errno.ErrorWithCode(errno.CodeBadRequest, err)\n```\n\n该函数没有处理 `err == nil`，传入 `nil` 会触发 panic。\n\n### `ErrorWithCodeAndData`\n\n```go\nfunc ErrorWithCodeAndData(code int, err error, data interface{}) Payload\n```\n\n在错误响应中附带 `Data`，常用于部分成功、批量操作失败明细等场景：\n\n```go\nreturn errno.ErrorWithCodeAndData(errno.CodeInternalErr, err, ret)\n```\n\n同样要求 `err` 非空。\n\n## 错误码\n\n`errno/error.go` 中集中定义业务码：\n\n```go\nconst (\n\tCodeOKZero         = 0\n\tCodeOK             = 2000\n\tCodeCreated        = 2001\n\tCodePartialContent = 2006\n\n\tCodeBadRequest      = 4000\n\tCodeUnauthorized    = 4001\n\tCodeForbidden       = 4003\n\tCodeNotFound        = 4004\n\tCodeTooManyRequests = 4029\n\n\tCodeInternalErr        = 5000\n\tCodeServiceUnavailable = 5003\n\tCodeVsreErr            = 5004\n\tCodeGetDataErr         = 5012\n\tCodeParseDataErr       = 5013\n\tCodeDbErr              = 5014\n)\n```\n\n代码中的约定是：\n\n- `CodeOK == 2000` 表示普通接口成功。\n- `CodeOKZero == 0` 用于 BPM、Janus 等外部协议适配成功码。\n- `4xxx` 表示请求、鉴权、资源不存在、限流等客户端侧业务错误。\n- `5xxx` 表示内部错误、服务不可用、数据获取或解析失败等服务侧错误。\n\nmiddleware 会用 `Code` 判断日志级别和 Trace 状态：非 `CodeOK` 会记录错误指标；`Code >= CodeInternalErr` 通常按 error 级别记录，否则按 warn 级别记录。\n\n## 预定义错误\n\n模块提供了一组可直接返回的 `Payload` 变量，例如：\n\n```go\nerrno.ErrUnauthorized\nerrno.ErrTooManyRequests\nerrno.ErrBucketNotFound\nerrno.ErrBucketAkInvalid\nerrno.ErrSignatureInvalid\nerrno.ErrVsreContentInvalid\n```\n\n这些变量适合固定错误语义，例如鉴权失败、bucket 不存在、签名参数非法等：\n\n```go\nif bucket == nil {\n\treturn errno.ErrBucketNotFound\n}\n```\n\n如果错误消息需要包含动态上下文，使用 `ErrorWithCode`：\n\n```go\nreturn errno.ErrorWithCode(errno.CodeBadRequest, errors.New(\"missing access_key\"))\n```\n\n## 与 middleware 的关系\n\n业务层 handler 的常见签名来自 middleware：\n\n```go\ntype MyHandler func(c *gin.Context) errno.Payload\n```\n\nhandler 返回 `errno.Payload` 后，middleware 负责：\n\n- 写入 `gin.Context` 的 `ResultDataContextKey`\n- 统一输出 JSON 或缓存字节响应\n- 设置 CORS、缓存控制、ETag 等响应头\n- 上报吞吐、错误和延迟指标\n- 设置 BytedTrace 的业务状态码\n- 根据 `Payload.Code` 判断是否标记 Trace error\n\n普通 API 中成功响应通常直接返回：\n\n```go\nreturn errno.OK(resp)\n```\n\n参数错误或内部错误通常返回：\n\n```go\nreturn errno.ErrorWithCode(errno.CodeBadRequest, err)\nreturn errno.ErrorWithCode(errno.CodeInternalErr, err)\n```\n\n限流场景会直接使用：\n\n```go\ndata = errno.ErrTooManyRequests\n```\n\n## 协议适配\n\n`errno.Payload` 是内部统一响应，但不同入口会做协议转换。\n\n`middleware.toBPMPayload` 会把成功码从 `CodeOK` 转为 `CodeOKZero`：\n\n```go\nif p.Code == errno.CodeOK {\n\tjp.Code = errno.CodeOKZero\n}\n```\n\n`janus.toJanusPayload` 会把 `Payload` 转成 `JanusPayload`：\n\n```go\ntype JanusPayload struct {\n\tCode      int         `json:\"code\"`\n\tMessage   string      `json:\"message\"`\n\tRequestId string      `json:\"trace_id\"`\n\tResponse  interface{} `json:\"response\"`\n}\n```\n\n其中：\n\n- `Payload.Code == errno.CodeOK` 时，Janus 响应码为 `0`\n- `Payload.Data` 会映射到 `JanusPayload.Response`\n- `Payload.Message` 会保留为 `JanusPayload.Message`\n\n## 测试覆盖\n\n`errno/response_test.go` 覆盖了响应构造函数的基础行为：\n\n- `Error(nil)` 返回 `CodeOK` 和 `\"ok\"`\n- `Error(errors.New(\"ut error\"))` 返回 `Code: 600`\n- `ErrorWithCode` 使用传入 code 和错误消息\n- `ErrorWithCodeAndData` 会保留 `Data`\n- `OK` 返回 `CodeOK` 和传入数据\n- `OKWithETag` 返回 `CodeOK`、数据和 ETag\n- `Payload.Error()` 返回由 `Message` 构造出的 `error`\n\n新增或修改 `errno` 行为时，应优先补充这些构造函数和协议适配路径的测试，因为该模块是服务层、middleware、Janus/BPM/OpenAPI 响应格式的共同基础。","other-go-mod":"# Other — go.mod\n\n## 模块概览\n\n`go.mod` 定义了 `code.byted.org/videoarch/bktmeta-api` 这个 Go 模块的身份、Go 版本和完整依赖入口。它不包含运行时代码，因此没有函数、类、内部调用或执行流；它的作用是约束整个仓库的构建、测试、依赖解析和版本复现。\n\n该模块使用：\n\n```go\nmodule code.byted.org/videoarch/bktmeta-api\n\ngo 1.21\n```\n\n这表示仓库内所有 Go 包都属于 `code.byted.org/videoarch/bktmeta-api` 模块，并以 Go 1.21 的模块语义和标准库能力作为基线。\n\n## 在代码库中的作用\n\n`go.mod` 是本仓库的依赖根。开发者执行以下命令时，Go 工具链都会读取它：\n\n```bash\ngo test ./...\ngo build ./...\ngo mod tidy\ngo list -m all\n```\n\n它与 `go.sum` 一起保证依赖版本可复现。`go.mod` 负责声明模块需要哪些依赖和版本，`go.sum` 负责记录这些模块版本的校验和。\n\n本文件没有调用图，因为它不是可执行代码；它通过 Go module 机制连接到所有源码包。\n\n## 依赖结构\n\n依赖分为两个 `require` 块：\n\n- 第一个 `require` 块是当前代码直接依赖的模块，通常会在源码中被 `import`。\n- 第二个 `require` 块带有 `// indirect`，表示这些模块主要由直接依赖传递引入，或曾经由源码间接使用后被 Go 工具链保留。\n\n```mermaid\nflowchart TD\n    A[\"bktmeta-api 模块\"] --> B[\"HTTP/API 层\"]\n    A --> C[\"存储访问\"]\n    A --> D[\"配置与环境\"]\n    A --> E[\"可观测性\"]\n    A --> F[\"安全与身份\"]\n    A --> G[\"视频架构业务 SDK\"]\n\n    B --> B1[\"hertz / gin / ginex\"]\n    C --> C1[\"MongoDB / MySQL / Redis / TOS\"]\n    D --> D1[\"tccclient / consul / env\"]\n    E --> E1[\"logs / metrics / trace / lidar\"]\n    F --> F1[\"KMS / ZTI / IAM\"]\n    G --> G1[\"bktmeta-sdk-go / storagegw-go / cloud_gopkg\"]\n```\n\n## 主要直接依赖\n\n### HTTP 与服务框架\n\n模块同时声明了 Hertz 和 Gin 相关依赖：\n\n- `code.byted.org/middleware/hertz v1.13.5`\n- `github.com/gin-gonic/gin v1.7.7`\n- `code.byted.org/gin/ginex v1.8.1-0.20220524130704-969507f01e62`\n\n这说明仓库中可能存在基于 Hertz 的服务入口，也可能保留 Gin 或 Gin 扩展组件。贡献代码时应以实际源码中的路由注册、middleware 和 handler 风格为准，不要仅凭 `go.mod` 判断当前主框架。\n\n### 存储与缓存\n\n直接依赖覆盖了多种存储后端：\n\n- `code.byted.org/bytedoc/mongo-go-driver v1.2.9`\n- `code.byted.org/gopkg/gorm v1.0.9`\n- `code.byted.org/gopkg/mysql-driver v1.2.7`\n- `code.byted.org/kv/goredis/v5 v5.7.3`\n- `github.com/volcengine/ve-tos-golang-sdk/v2 v2.4.5`\n- `code.byted.org/videoarch/storagegw-go v1.1.56`\n\n这些依赖表明该服务可能同时访问 MongoDB、MySQL、Redis、TOS 或内部存储网关。新增数据访问代码时，应优先复用仓库中已有的连接初始化、DAO、repository 或 client 封装，避免在业务逻辑中直接散落新建连接的代码。\n\n### 配置、环境与服务发现\n\n相关依赖包括：\n\n- `code.byted.org/gopkg/tccclient v1.4.15`\n- `code.byted.org/gopkg/consul v1.2.6`\n- `code.byted.org/gopkg/env v1.7.15`\n- `code.byted.org/videoarch/env v1.1.5`\n- `code.byted.org/videoarch/caesar_config v1.0.9`\n\n这些模块通常用于运行环境识别、动态配置读取、服务发现或业务配置接入。修改配置项时，需要同步检查配置加载路径、默认值、线上 TCC/Consul 配置和降级行为。\n\n### 可观测性\n\n直接依赖包括：\n\n- `code.byted.org/gopkg/logs v1.2.25`\n- `code.byted.org/gopkg/logid v0.0.0-20241008043456-230d03adb830`\n- `code.byted.org/gopkg/metrics/v3 v3.1.35`\n- `code.byted.org/bytedtrace/interface-go v1.0.20`\n- `code.byted.org/lidar/agent v0.2.43`\n\n这些依赖支撑日志、LogID、指标、链路追踪和性能诊断。新增入口、外部调用或关键状态变更时，应沿用现有日志字段和 metrics 维度，避免创建无法聚合的新命名风格。\n\n### 安全、身份与权限\n\n相关直接依赖包括：\n\n- `code.byted.org/security/kms-v2-sdk-golang v1.2.100`\n- `code.byted.org/security/zti-jwt-golang v1.0.46`\n- `code.byted.org/videoarch/iamsdk v1.0.43`\n- `code.byted.org/videoarch/account-sdk v1.0.12`\n- `code.byted.org/videoarch/harden-sdk v1.1.4`\n\n这说明模块可能处理密钥管理、JWT、零信任身份、账号体系或权限校验。涉及认证、鉴权、加解密、token 解析的改动，应优先查找已有封装，避免绕过统一安全组件。\n\n### 视频架构平台能力\n\n与业务平台强相关的直接依赖包括：\n\n- `code.byted.org/videoarch/bktmeta-sdk-go v1.0.56-0.20260303081253-5e192687fdee`\n- `code.byted.org/videoarch/cloud_gopkg v1.0.182`\n- `code.byted.org/videoarch/event_center-sdk v1.1.5`\n- `code.byted.org/videoarch/go-remote-cache v0.0.5`\n- `code.byted.org/videoarch/vfastcache v1.0.10`\n- `code.byted.org/videoarch/vsre-client v0.0.1`\n- `code.byted.org/videoarch-sre/change_platform_sdk v1.4.2`\n\n这些依赖是该服务连接视频架构内部平台能力的核心入口。由于其中包含 `bktmeta-sdk-go`，当前仓库很可能既提供 bktmeta API 服务，也复用对应 SDK 中的数据结构、客户端或协议定义。\n\n## 版本管理注意事项\n\n`go.mod` 中存在多类版本格式：\n\n- 普通语义化版本，例如 `github.com/stretchr/testify v1.10.0`\n- 内部模块版本，例如 `code.byted.org/videoarch/cloud_gopkg v1.0.182`\n- 伪版本，例如 `v1.0.56-0.20260303081253-5e192687fdee`\n- `+incompatible` 版本，例如部分旧模块仍未完全采用 Go modules 的主版本路径规范\n\n升级依赖时需要特别注意传递依赖变化。比如 HTTP 框架、trace、metrics、Kitex/Hertz、Redis、GORM 或安全 SDK 的升级，可能影响初始化逻辑、middleware、连接池、上下文传递或错误类型。\n\n推荐的维护流程是：\n\n```bash\ngo get 模块名@版本\ngo mod tidy\ngo test ./...\n```\n\n如果只是清理无用依赖，应单独提交 `go.mod` 和 `go.sum` 变化，避免和业务逻辑改动混在一起。\n\n## 贡献代码时的判断原则\n\n新增 import 后，如果该依赖是源码直接使用的业务依赖，应出现在第一个 `require` 块；如果只是传递依赖，通常由 `go mod tidy` 标记为 `// indirect`。\n\n不要手工随意移动大量依赖或批量重排版本。Go 工具链会维护必要的格式，但依赖升级本身应有明确原因，例如修复漏洞、兼容新 API、解决构建失败或接入新的平台能力。\n\n当新增功能需要引入第三方库时，优先检查本文件中是否已有同类内部 SDK。例如缓存优先看 `code.byted.org/videoarch/vfastcache`、`code.byted.org/videoarch/go-remote-cache`、`code.byted.org/kv/goredis/v5`；配置优先看 `tccclient`、`caesar_config`；HTTP 客户端或平台访问优先看现有 `videoarch` 相关 SDK。","other-janus":"# Other — janus\n\n## 模块概览\n\n`janus` 包负责把服务内部统一的 `errno.Payload` 响应转换为 Janus 网关期望的响应格式。它只处理 `/gateway/v1` 路由组的响应封装、指标上报、链路追踪标记和错误日志，不直接实现业务逻辑。\n\n在 `main.go` 中，该中间件通过以下方式挂载：\n\n```go\njns := r.Group(\"/gateway/v1\")\njns.Use(janus.ResponseMiddleware())\n```\n\n业务 handler 仍然沿用 `middleware.Response(c, mkey, handler)` 模式执行，例如 `service.MetaBucketApi.GetBucketJanus`：\n\n```go\nfunc (api *MetaBucketApi) GetBucketJanus(c *gin.Context) {\n\tmiddleware.Response(c, \"buckets.getbucket.janus\", api.handleGetBucketJanusRequest)\n}\n```\n\n也就是说，Janus 响应链路分为两层：\n\n1. `middleware.Response` 执行业务函数，并把 `mkey` 与 `errno.Payload` 写入 `gin.Context`。\n2. `janus.ResponseMiddleware` 在 `c.Next()` 后读取上下文结果，转换为 `JanusPayload` 并输出 JSON。\n\n## 响应格式\n\nJanus 对外响应结构由 `JanusPayload` 定义：\n\n```go\ntype JanusPayload struct {\n\tCode      int         `json:\"code\"`\n\tMessage   string      `json:\"message\"`\n\tRequestId string      `json:\"trace_id\"`\n\tResponse  interface{} `json:\"response\"`\n}\n```\n\n字段语义：\n\n- `Code`：Janus 语义下的业务状态码。只有 `0` 表示成功。\n- `Message`：来自内部 `errno.Payload.Message`。\n- `RequestId`：JSON 字段名为 `trace_id`，当前实现未写入该字段。\n- `Response`：来自内部 `errno.Payload.Data`，承载真正的业务响应体。\n\n内部成功码是 `errno.CodeOK`，值为 `2000`。Janus 成功码由常量 `JanusOkCode` 定义，值为 `0`：\n\n```go\nconst (\n\tPSM         = \"PSM\"\n\tJanusOkCode = 0\n)\n```\n\n转换逻辑集中在 `toJanusPayload(c *gin.Context, p errno.Payload)`：\n\n```go\nfunc toJanusPayload(c *gin.Context, p errno.Payload) JanusPayload {\n\tjp := JanusPayload{}\n\tif p.Code == errno.CodeOK {\n\t\tjp.Code = JanusOkCode\n\t} else {\n\t\tjp.Code = p.Code\n\t}\n\n\tjp.Message = p.Message\n\tjp.Response = p.Data\n\treturn jp\n}\n```\n\n关键点：\n\n- `errno.CodeOK` 会被转换成 `0`。\n- 非成功码保持原值，例如 `4000`、`5000` 等。\n- `errno.Payload.Data` 被移动到 `response` 字段，而不是内部接口常用的 `data` 字段。\n- 参数 `c *gin.Context` 当前未被使用，保留了未来从请求上下文补充字段的可能性。\n\n## 执行流程\n\n```mermaid\nflowchart TD\n    A[\"/gateway/v1 请求\"] --> B[\"janus.ResponseMiddleware\"]\n    B --> C[\"c.Next 执行业务 handler\"]\n    C --> D[\"middleware.Response\"]\n    D --> E[\"设置 mkey 和 errno.Payload\"]\n    E --> F[\"janus.toJanusPayload\"]\n    F --> G[\"返回 JanusPayload JSON\"]\n    F --> H[\"上报指标与设置 Trace\"]\n```\n\n`ResponseMiddleware()` 返回一个 `gin.HandlerFunc`，核心流程如下：\n\n1. 调用 `c.Next()`，让后续业务 handler 先执行。\n2. 从 `gin.Context` 读取 `PSM`，为空时使用 `\"unknown\"`。\n3. 从 `middleware.MKeyContextKey` 读取接口指标名 `mkey`。\n4. 从 `middleware.ResultDataContextKey` 读取业务结果，并断言为 `errno.Payload`。\n5. 设置禁用缓存相关响应头。\n6. 使用 `c.JSON(http.StatusOK, toJanusPayload(c, data))` 输出 Janus 响应。\n7. 上报延迟、吞吐和错误指标。\n8. 更新 BytedTrace span 信息。\n\n## 与 `middleware` 包的协作约定\n\n`janus.ResponseMiddleware` 依赖 `middleware.Response` 写入的上下文键：\n\n```go\nmiddleware.MKeyContextKey       // \"mkey\"\nmiddleware.ResultDataContextKey // \"data\"\n```\n\n典型业务入口模式是：\n\n```go\nfunc (api *MetaBucketApi) GetAllBucketsJanus(c *gin.Context) {\n\tmiddleware.Response(c, \"buckets.allbuckets\", api.handleGetAllBucketsJanusRequest)\n}\n```\n\n`middleware.Response` 会负责：\n\n- 执行业务函数 `handleGetAllBucketsJanusRequest`\n- 获得 `errno.Payload`\n- 写入 `MKeyContextKey`\n- 写入 `ResultDataContextKey`\n\n`janus.ResponseMiddleware` 不做空值保护：\n\n```go\ndataRet, _ := c.Get(middleware.ResultDataContextKey)\ndata := dataRet.(errno.Payload)\n```\n\n因此所有挂在 `/gateway/v1` 下、使用该中间件的 handler 都必须通过 `middleware.Response` 或等价逻辑设置 `ResultDataContextKey`，否则会发生 panic。\n\n## 指标、日志与链路追踪\n\n`ResponseMiddleware` 会围绕 `mkey` 和来源 PSM 上报监控信息。\n\n来源 PSM 从上下文键 `PSM` 读取：\n\n```go\npsm := c.GetString(PSM)\nif psm == \"\" {\n\tpsm = \"unknown\"\n}\n```\n\n注意这里不是直接读取请求头。调用方如果希望指标中带上真实调用方，需要提前在 `gin.Context` 中设置 `janus.PSM`。\n\n延迟指标通过 defer 上报：\n\n```go\ndefer util.EmitLatency(mkey, time.Now(), metrics.T{Name: \"from\", Value: psm})\n```\n\n吞吐指标包含业务码和来源：\n\n```go\nutil.EmitThroughput(\n\tmkey,\n\tmetrics.T{Name: \"code\", Value: strconv.Itoa(data.Code)},\n\tmetrics.T{Name: \"from\", Value: psm},\n)\n```\n\n错误处理规则：\n\n- `data.Code == errno.CodeOK`：不记录错误。\n- `data.Code >= errno.CodeInternalErr`：使用 `logs.CtxError`。\n- 其他非成功码：使用 `logs.CtxWarn`。\n- 所有非成功码都会调用 `util.EmitError`，并设置 trace error 标记。\n\nBytedTrace 相关字段：\n\n```go\nbytedtracer.SetSpanName(sp, mkey)\nbytedtracer.SetFromService(sp, psm)\nbytedtracer.SetBusinessStatusCode(sp, int32(data.Code))\n```\n\n错误时额外设置：\n\n```go\nbytedtracer.SetIsError(sp, true)\nbytedtracer.SetErrorMessage(sp, data.Message)\n```\n\n## 与其他响应中间件的区别\n\n仓库里还有 `middleware.ResponseMiddleware()` 和 `middleware.ResponseMiddlewareWithoutAuthCheck()`。它们直接返回内部 `errno.Payload` 格式，成功码仍是 `2000`，数据字段是 `data`。\n\n`janus.ResponseMiddleware()` 的主要差异是：\n\n- 成功码从 `errno.CodeOK` 转换为 `0`。\n- 响应数据字段从 `data` 转换为 `response`。\n- 不处理 SDK token 校验。\n- 不处理 ETag 或字节缓存响应。\n- 不设置 CORS 响应头。\n- 面向 `/gateway/v1` 的 Janus 网关接口。\n\n## 测试支持\n\n`janus/base_test.go` 提供测试初始化：\n\n```go\nfunc createTestContext() (*gin.Context, *httptest.ResponseRecorder)\n```\n\n`TestMain` 初始化 GinEx、配置和指标：\n\n```go\nginex.Init()\nconfig.InitConf(ginex.ConfDir())\nutil.InitMetrics()\n```\n\n`janus/response_test.go` 覆盖两个核心行为：\n\n- `TestResponseMiddleware`：构造 Gin context，写入 `middleware.ResultDataContextKey`，验证中间件可执行。\n- `Test_toJanusPayload`：验证 `errno.OK(\"ok\")` 会转换成 `JanusOkCode`，且 `Response == \"ok\"`。\n\n当前测试没有断言完整 JSON 响应体、错误码转换、缓存头、指标和 trace 行为。修改该模块时，至少应保留成功码转换和 `response` 字段映射的兼容性。","other-jwt":"# Other — jwt\n\n## 模块职责\n\n`jwt` 包负责初始化用于 BPM 请求鉴权的 JWT 生成器。它不解析入站 JWT，也不负责 TOS 平台自身的 JWT 获取；本模块只维护一个包级全局变量 `BpmGen`，供 BPM 相关 HTTP 调用在发请求前生成 `X-JWT-Token`。\n\n核心代码位于 `jwt/jwt.go`：\n\n```go\nvar BpmGen jwt.Generator\n\nfunc InitJwt() {\n\tif config.Conf.TosAPI.Disable {\n\t\tlogs.Warn(\"skip init jwt because of tos api disabled\")\n\t\treturn\n\t}\n\tBpmGen = jwt.NewGenerator(jwt.WithRegion(config.Conf.ModifyTOSBucketBpmConfig.Partition))\n\t_, err := BpmGen.Generate(context.Background(), config.Conf.ModifyTOSBucketBpmConfig.SecretKey)\n\tif err != nil {\n\t\tlogs.CtxError(context.TODO(), \"init bpm jwt error, err: %v\", err)\n\t}\n}\n```\n\n这里导入的外部 JWT SDK 是 `code.byted.org/paas/cloud-sdk-go/jwt`，包内变量类型为 `jwt.Generator`。\n\n## 初始化流程\n\n`InitJwt()` 依赖 `config.Conf`，因此必须在 `config.InitConf(...)` 之后调用。主进程启动时的顺序在 `main.go` 中是：\n\n1. `ginex.Init()`\n2. `config.InitConf(ginex.ConfDir())`\n3. `kms.Init()`\n4. `rpc.InitRpc()`\n5. `db.InitDb()`\n6. `jwt.InitJwt()`\n\n`InitJwt()` 的行为分两支：\n\n- 当 `config.Conf.TosAPI.Disable == true` 时，记录 `skip init jwt because of tos api disabled`，然后直接返回。\n- 否则根据 `config.Conf.ModifyTOSBucketBpmConfig.Partition` 创建 `BpmGen`，再用 `config.Conf.ModifyTOSBucketBpmConfig.SecretKey` 调一次 `Generate` 做初始化期校验。\n\n需要注意：初始化期 `Generate` 失败只会记录错误日志，不会 panic，也不会阻止服务继续启动。此时 `BpmGen` 已经被赋值，后续调用方仍会再次执行 `BpmGen.Generate(...)` 并处理返回错误。\n\n```mermaid\nflowchart TD\n    A[\"main.main\"] --> B[\"config.InitConf\"]\n    B --> C[\"jwt.InitJwt\"]\n    C --> D{\"TosAPI.Disable?\"}\n    D -- \"是\" --> E[\"跳过初始化\"]\n    D -- \"否\" --> F[\"jwt.NewGenerator\"]\n    F --> G[\"BpmGen.Generate 校验\"]\n    G --> H[\"BPM 请求复用 BpmGen\"]\n```\n\n## 配置依赖\n\n本模块读取两个配置区域：\n\n`config.Conf.TosAPI.Disable`\n\n该开关来自 `TosAPI.Disable`。当它为 true 时，`InitJwt()` 不会初始化 `BpmGen`。这个开关通常用于禁用 TOS API 相关能力。\n\n`config.Conf.ModifyTOSBucketBpmConfig`\n\n结构体定义为 `ModifyTOSBucketBpmConfig`，对应 YAML 字段 `ModifyTOSBucketBPMConfig`：\n\n```go\ntype ModifyTOSBucketBpmConfig struct {\n\tAuthNodeID             uint64 `yaml:\"AuthNodeID\"`\n\tBpmApiUrl              string `yaml:\"BpmApiUrl\"`\n\tSecretKey              string `yaml:\"SecretKey\"`\n\tPartition              string `yaml:\"Partition\"`\n\tModifyPropsBpmID       string `yaml:\"ModifyPropsBpmID\"`\n\tModifyLimitsBpmID      string `yaml:\"ModifyLimitsBpmID\"`\n\tModifyPublicLevelBpmID string `yaml:\"ModifyPublicLevelBpmID\"`\n}\n```\n\n`jwt` 包只直接使用其中两个字段：\n\n- `Partition`：传给 `jwt.WithRegion(...)`，用于创建区域相关的 JWT 生成器。\n- `SecretKey`：传给 `BpmGen.Generate(...)`，用于生成 BPM 请求 token。\n\n例如 `conf/base.yml` 中的默认配置包含：\n\n```yaml\nModifyTOSBucketBPMConfig:\n  BpmApiUrl: \"https://BPM.bytedance.net/api\"\n  SecretKey: \"...\"\n  Partition: \"cn\"\n```\n\n## 对外暴露的组件\n\n### `BpmGen`\n\n`BpmGen` 是包级全局变量：\n\n```go\nvar BpmGen jwt.Generator\n```\n\n调用方直接通过它生成 token。当前代码没有提供封装函数，因此调用方需要自己传入 `context.Context` 和 `SecretKey`，并处理生成错误。\n\n主要使用点：\n\n- `rpc.BpmClient.getJwtToken(ctx)`\n- `service.createGeneralAccount(ctx, req)`\n\n### `InitJwt()`\n\n`InitJwt()` 是唯一初始化入口。它没有返回值，错误只通过日志暴露。\n\n贡献代码时要保持这个启动契约：调用方假设只要进程初始化过 `jwt.InitJwt()`，`jwt.BpmGen` 就可以用于 BPM 相关请求。若引入新的 BPM 调用路径，应复用现有 `BpmGen`，不要在业务代码里重复创建 `jwt.NewGenerator(...)`。\n\n## 与 BPM 请求的关系\n\n`rpc/bpm.go` 中的 `BpmClient` 会在每次请求前生成 JWT：\n\n```go\nfunc (cli *BpmClient) getJwtToken(ctx context.Context) (string, error) {\n\treturn jwt.BpmGen.Generate(ctx, config.Conf.ModifyTOSBucketBpmConfig.SecretKey)\n}\n```\n\n`doReq` 会把生成结果写入请求头：\n\n```go\nreq.Header.Set(\"X-JWT-Token\", token)\n```\n\n因此 `jwt` 包的职责边界是“提供 BPM token 生成器”，而不是发送 BPM 请求。BPM API 地址、workflow ID、请求体和响应解析都由 `rpc` 或 `service` 层处理。\n\n`service/tos_handler.go` 中的 `createGeneralAccount` 也直接使用同一个生成器：\n\n```go\ntoken, err := jwt.BpmGen.Generate(ctx, config.Conf.ModifyTOSBucketBpmConfig.SecretKey)\nif err != nil {\n\treturn err\n}\nr.Header.Set(\"X-JWT-Token\", token)\n```\n\n这意味着 `BpmGen` 是跨 `rpc` 和 `service` 的共享基础设施。\n\n## 测试结构\n\n`jwt/base_test.go` 提供测试入口：\n\n```go\nfunc TestMain(m *testing.M) {\n\tginex.Init()\n\tconfig.InitConf(ginex.ConfDir())\n\tcode := m.Run()\n\tos.Exit(code)\n}\n```\n\n这保证 `Test_InitJwt` 执行前 `config.Conf` 已加载。\n\n`jwt/jwt_test.go` 覆盖了两个分支：\n\n```go\nfunc Test_InitJwt(t *testing.T) {\n\tInitJwt()\n\tassert.NotNil(t, BpmGen)\n\n\tconfig.Conf.TosAPI.Disable = true\n\tInitJwt()\n\tconfig.Conf.TosAPI.Disable = false\n}\n```\n\n测试确认正常初始化后 `BpmGen` 非空，并执行了 `TosAPI.Disable == true` 的跳过分支。不过该测试没有断言跳过分支是否保持或清空 `BpmGen`。按当前实现，跳过分支不会修改已有的 `BpmGen`。\n\n## 维护注意事项\n\n`InitJwt()` 必须在 `config.InitConf(...)` 之后执行，否则会访问未初始化的 `config.Conf`。\n\n`TosAPI.Disable == true` 时不会设置 `BpmGen`。如果某个代码路径在禁用 TOS API 后仍调用 `jwt.BpmGen.Generate(...)`，可能出现空生成器调用风险；新增调用点时需要确认业务路径是否受同一开关保护。\n\n初始化期 token 生成失败不会中断启动。若后续业务要求“JWT 不可用时服务不可启动”，需要调整 `InitJwt()` 的签名，让它返回 `error`，并在 `main.go` 中显式处理。\n\n当前包名 `jwt` 与外部 SDK 包名相同，阅读 `jwt/jwt.go` 时要区分：文件顶部的 `package jwt` 是本项目包，import 中的 `code.byted.org/paas/cloud-sdk-go/jwt` 是 SDK 包。","other-kms":"# Other — kms\n\n## 模块概览\n\n`kms` 模块封装了服务侧使用 KMS 的加解密能力，当前测试覆盖了两类核心路径：\n\n- 数据密钥路径：`NewEncryptedKey` 生成加密后的密钥，`Decrypt` 将其解密回明文密钥。\n- 请求令牌路径：`ReqTokenCipher.EncryptWithMetadata` 生成加密请求令牌，`DecryptRequestToken` 解密并还原原始字符串。\n\n该模块依赖全局初始化流程，测试通过 `TestMain` 统一完成运行环境准备。\n\n## 测试初始化流程\n\n`kms/base_test.go` 中的 `TestMain` 是整个 `kms` 包测试的入口。它在执行任何测试用例前依次初始化基础设施：\n\n```go\nfunc TestMain(m *testing.M) {\n\tginex.Init()\n\tconfig.InitConf(ginex.ConfDir())\n\tutil.InitMetrics()\n\terr := Init()\n\tif err != nil {\n\t\tpanic(err)\n\t}\n\tcode := m.Run()\n\tos.Exit(code)\n}\n```\n\n初始化顺序很重要：\n\n1. `ginex.Init()` 初始化 Gin 扩展运行环境。\n2. `config.InitConf(ginex.ConfDir())` 基于 `ginex.ConfDir()` 加载服务配置。\n3. `util.InitMetrics()` 初始化指标系统。\n4. `Init()` 初始化 `kms` 模块自身。\n5. `m.Run()` 执行包内测试。\n\n这说明 `kms` 的测试不是完全隔离的纯单元测试，而是依赖配置、指标和 KMS 客户端状态的集成型测试。\n\n```mermaid\nflowchart TD\n    A[\"测试入口 TestMain\"] --> B[\"初始化 ginex\"]\n    B --> C[\"加载配置 config.InitConf\"]\n    C --> D[\"初始化指标 util.InitMetrics\"]\n    D --> E[\"初始化 KMS Init\"]\n    E --> F[\"执行测试 m.Run\"]\n```\n\n## 数据密钥加解密路径\n\n`kms/client_test.go` 中的 `TestNewEncryptedKeyAndDecrypt` 验证了数据密钥的完整生命周期：\n\n```go\nfunc TestNewEncryptedKeyAndDecrypt(t *testing.T) {\n\tek, err := NewEncryptedKey(meta.KeySize128)\n\tassert.Nil(t, err)\n\tassert.True(t, len(ek) > 0)\n\n\tdk, err := Decrypt(ek)\n\tassert.Nil(t, err)\n\tassert.True(t, len(dk) > 0)\n}\n```\n\n该测试确认了两个行为：\n\n- `NewEncryptedKey(meta.KeySize128)` 能够生成非空的加密密钥。\n- `Decrypt(ek)` 能够成功解密该密钥，并返回非空明文结果。\n\n`meta.KeySize128` 来自 `code.byted.org/videoarch/bktmeta-sdk-go/meta`，表示生成 128 位规格的数据密钥。测试没有校验明文密钥长度或内容，只验证 KMS 调用链可用、返回值非空且没有错误。\n\n贡献者修改 `NewEncryptedKey` 或 `Decrypt` 时，需要保证以下兼容性：\n\n- `NewEncryptedKey` 仍接受 `meta.KeySize128` 这类 SDK 定义的密钥规格。\n- 返回的 encrypted key 可以被同模块的 `Decrypt` 正常处理。\n- 错误必须通过 `error` 返回，而不是吞掉后返回空数据。\n\n## 请求令牌加解密路径\n\n`TestDecryptRequestToken` 验证请求令牌的加解密：\n\n```go\nfunc TestDecryptRequestToken(t *testing.T) {\n\tek, err := ReqTokenCipher.EncryptWithMetadata(\"ut_test\")\n\tassert.Nil(t, err)\n\tassert.True(t, len(ek) > 0)\n\n\tdk, err := DecryptRequestToken(ek)\n\tassert.Nil(t, err)\n\tassert.Equal(t, dk, \"ut_test\")\n}\n```\n\n这里有两个关键组件：\n\n- `ReqTokenCipher`：请求令牌使用的加密器。\n- `DecryptRequestToken`：请求令牌专用解密函数。\n\n测试先使用 `ReqTokenCipher.EncryptWithMetadata(\"ut_test\")` 加密字符串，再通过 `DecryptRequestToken` 解密，最后断言结果等于原始值 `\"ut_test\"`。\n\n这条路径强调的是语义正确性，而不仅是返回值非空：请求令牌解密后必须精确还原原始字符串。\n\n## 与代码库其他部分的连接\n\n`kms` 测试直接依赖以下包：\n\n- `code.byted.org/gin/ginex`：提供运行环境初始化和配置目录。\n- `code.byted.org/videoarch/bktmeta-api/config`：加载服务配置。\n- `code.byted.org/videoarch/bktmeta-api/util`：初始化指标能力。\n- `code.byted.org/videoarch/bktmeta-sdk-go/meta`：提供密钥规格，例如 `meta.KeySize128`。\n\n从调用关系看，`kms` 模块暴露给外部使用的关键函数包括：\n\n- `Init`\n- `NewEncryptedKey`\n- `Decrypt`\n- `DecryptRequestToken`\n\n测试文件本身没有被其他模块调用，但它们定义了 `kms` 模块对外行为的最低契约：初始化必须成功，生成的加密密钥必须可解密，请求令牌必须能完整往返。\n\n## 修改建议\n\n修改 `kms` 模块时优先保持以下约束：\n\n- 不要绕过 `Init()` 的初始化职责；测试和运行时都依赖它建立 KMS 客户端或相关全局状态。\n- 修改请求令牌逻辑时，同时验证 `ReqTokenCipher.EncryptWithMetadata` 和 `DecryptRequestToken` 的兼容性。\n- 修改数据密钥格式时，确保旧的 `NewEncryptedKey` 输出仍能被 `Decrypt` 正确识别，或者明确处理迁移兼容。\n- 如果新增密钥规格，建议补充类似 `meta.KeySize128` 的往返测试，覆盖生成和解密两个步骤。","other-main-test-go":"# Other — main_test.go\n\n## 模块概述\n\n`main_test.go` 是 `main` 包中的启动冒烟测试模块。它只包含一个测试函数 `TestM(t *testing.T)`，用于在 `go test` 环境中异步调用应用入口函数 `main()`，并让进程保持运行 5 秒。\n\n该模块的核心目的不是验证业务逻辑，而是检查应用在启动阶段是否会出现即时崩溃，例如 `panic`、初始化失败、配置加载失败或 `log.Fatal` 触发的进程退出。\n\n## 代码结构\n\n```go\nfunc TestM(t *testing.T) {\n\tgo main()\n\ttime.Sleep(5 * time.Second)\n}\n```\n\n`TestM` 是普通 Go 测试函数，符合 `testing` 包的测试命名约定：\n\n- 函数名以 `Test` 开头\n- 参数为 `*testing.T`\n- 由 `go test` 自动发现并执行\n\n需要注意，`TestM` 不是 Go 测试框架中的特殊入口 `TestMain(m *testing.M)`。它只是一个名为 `TestM` 的普通测试用例。\n\n## 执行流程\n\n测试执行时会发生以下步骤：\n\n1. `go test` 发现并运行 `TestM`\n2. `TestM` 通过 `go main()` 在新的 goroutine 中启动应用入口\n3. 当前测试 goroutine 调用 `time.Sleep(5 * time.Second)`\n4. 如果 5 秒内 `main()` 或其启动逻辑触发 `panic`，测试进程会失败\n5. 如果 5 秒结束后没有致命错误，`TestM` 返回，测试结束\n\n```mermaid\nflowchart TD\n    A[\"go test 运行 TestM\"] --> B[\"启动 goroutine\"]\n    B --> C[\"调用 main()\"]\n    B --> D[\"等待 5 秒\"]\n    C --> E[\"应用启动逻辑\"]\n    D --> F[\"TestM 返回\"]\n```\n\n## 与代码库的连接\n\n`main_test.go` 与主程序的连接点只有一个：\n\n```go\ngo main()\n```\n\n也就是说，该测试直接覆盖 `main.go` 中的 `main()` 启动路径。它不会调用其他本地函数，也没有被其他测试或生产代码调用。\n\n从依赖关系看：\n\n- 内部调用：无\n- 对外调用：`TestM` 调用 `main`\n- 被调用方：无\n\n这使它更像一个最小启动验证，而不是单元测试。\n\n## 行为特点\n\n`TestM` 的测试语义非常宽松：它没有断言，也没有检查服务是否真正 ready。测试通过只代表应用在 5 秒观察窗口内没有导致测试进程失败。\n\n这种模式通常用于发现以下问题：\n\n- 应用入口函数启动时发生 `panic`\n- 初始化依赖时崩溃\n- 配置或环境变量缺失导致立即退出\n- 服务监听端口、日志、后台任务初始化时出现致命错误\n\n但它不能证明：\n\n- 服务已经成功监听端口\n- HTTP/RPC 接口可用\n- 下游依赖连接正常\n- 后台 goroutine 没有静默失败\n- 应用在 5 秒后仍然健康\n\n## 维护注意事项\n\n`TestM` 会真实执行 `main()`，因此它可能受到运行环境影响。维护或扩展该测试时，需要重点关注：\n\n- `main()` 是否依赖本地配置文件、环境变量或密钥\n- `main()` 是否会绑定固定端口，导致测试环境端口冲突\n- `main()` 是否会连接外部服务\n- `main()` 是否会产生不可控副作用，例如写数据库、注册服务、启动定时任务\n- 固定的 `5 * time.Second` 是否会导致测试变慢或不稳定\n\n如果需要增强这个测试，优先考虑把 `main()` 内部的启动逻辑拆成可测试函数，例如 `run()`、`initServer()` 或类似已有模式，然后在测试中验证明确的返回值、错误和可观测状态。当前实现适合做启动冒烟检查，不适合作为精确的功能验证。","other-mem-limit":"# Other — mem_limit\n\n## 模块概览\n\n`mem_limit` 模块负责按 TCC 配置动态设置 Go runtime 的软内存上限。它读取运行环境中的 `MY_MEM_LIMIT` 作为 Pod 总内存，再读取 TCC key `mem_limit_percent` 作为百分比，最终通过 `runtime/debug.SetMemoryLimit` 设置进程内存限制。\n\n该模块在服务启动流程中由 `main.go` 调用：\n\n```go\n// init mem limiter\nmem_limit.InitMemLimiter()\n```\n\n初始化后，模块会立即尝试更新一次内存限制，并启动后台协程每分钟刷新一次。\n\n## 核心组件\n\n### `InitMemLimiter`\n\n`InitMemLimiter` 是模块唯一对外入口。\n\n它完成三件事：\n\n1. 创建包级变量 `l = &memLimiter{}`。\n2. 调用 `l.update()` 立即拉取并应用一次配置。\n3. 启动后台 goroutine，每分钟调用一次 `l.update()`。\n\n```go\nfunc InitMemLimiter() {\n\tl = &memLimiter{}\n\tif err := l.update(); err != nil {\n\t\tlogs.Errorf(\"init memlimiter fail, %s\", err.Error())\n\t\treturn\n\t}\n\tgo func() {\n\t\tfor range time.Tick(1 * time.Minute) {\n\t\t\tif err2 := l.update(); err2 != nil {\n\t\t\t\tlogs.Errorf(\"update memlimiter fail, %s\", err2.Error())\n\t\t\t}\n\t\t}\n\t}()\n}\n```\n\n注意：当前 `memLimiter.update` 对配置缺失和 `doUpdate` 失败都返回 `nil`，因此 `InitMemLimiter` 中的错误分支通常不会触发；实际错误主要通过日志暴露。\n\n### `memLimiter`\n\n`memLimiter` 是模块内部状态对象。\n\n```go\ntype memLimiter struct {\n\tmemLimit int64\n}\n```\n\n`memLimit` 保存最近一次成功设置到 runtime 的内存上限，单位是字节。它主要用于日志记录和测试观察，不对外暴露。\n\n### `memLimiter.update`\n\n`update` 从 TCC 读取 `mem_limit_percent`：\n\n```go\nif val := tcc.GetMemLimitPercent(context.Background()); val != \"\" {\n\t...\n\tif err := l.doUpdate(val); err != nil {\n\t\t...\n\t\treturn nil\n\t}\n\t...\n\treturn nil\n} else {\n\tlogs.CtxWarn(context.Background(), \"mem limit percent is empty\")\n}\n```\n\n行为要点：\n\n- 通过 `tcc.GetMemLimitPercent(context.Background())` 读取配置。\n- 如果 TCC 返回空字符串，只记录 `\"mem limit percent is empty\"`，不修改当前内存限制。\n- 如果读取到非空配置，则交给 `doUpdate` 解析并设置。\n- 如果 `doUpdate` 返回错误，`update` 记录 warn 日志并返回 `nil`，避免后台刷新协程因为单次错误退出。\n\n### `memLimiter.doUpdate`\n\n`doUpdate` 是实际计算和应用内存上限的函数。\n\n输入参数 `value` 是 TCC 配置中的百分比字符串。函数还会读取环境变量：\n\n```go\nmyMemLimit := os.Getenv(\"MY_MEM_LIMIT\")\npodMem, err := strconv.ParseInt(myMemLimit, 10, 64)\n```\n\n处理规则：\n\n- `MY_MEM_LIMIT` 必须能解析成非负 `int64`。\n- TCC 百分比 `value` 必须能解析成 `int64`。\n- 百分比大于 `100` 会返回错误。\n- 百分比小于 `0` 表示关闭自定义限制，调用 `debug.SetMemoryLimit(math.MaxInt64)`。\n- 百分比在 `0..100` 内时，调用 `getMemBytes(podMem, percent)` 计算字节数，并设置到 `debug.SetMemoryLimit`。\n\n计算逻辑：\n\n```go\nfunc getMemBytes(total int64, percent int64) int64 {\n\treturn total * percent / 100\n}\n```\n\n例如：\n\n- `MY_MEM_LIMIT=8589934592`\n- `mem_limit_percent=80`\n\n最终限制为：\n\n```text\n8589934592 * 80 / 100 = 6871947673\n```\n\n## 执行流程\n\n```mermaid\nflowchart TD\n    A[\"服务启动 main.go\"] --> B[\"InitMemLimiter\"]\n    B --> C[\"创建 memLimiter\"]\n    C --> D[\"立即 update\"]\n    D --> E[\"读取 TCC: mem_limit_percent\"]\n    E --> F{\"配置是否为空\"}\n    F -- \"是\" --> G[\"记录 warn，不修改限制\"]\n    F -- \"否\" --> H[\"doUpdate\"]\n    H --> I[\"读取 MY_MEM_LIMIT\"]\n    I --> J[\"计算并 SetMemoryLimit\"]\n    B --> K[\"后台每分钟刷新\"]\n    K --> D\n```\n\n## 与 TCC 的关系\n\n`mem_limit` 不直接管理 TCC client，而是依赖 `tcc.GetMemLimitPercent`：\n\n```go\nfunc GetMemLimitPercent(ctx context.Context) string {\n\tif value, err := GetTccClient().Get(ctx, MemLimitPercent); err != nil {\n\t\tlogs.CtxError(ctx, \"get mem limit percent error, %s\", err)\n\t\treturn \"\"\n\t} else {\n\t\treturn value\n\t}\n}\n```\n\n对应 key 定义在 `tcc/keys.go`：\n\n```go\nMemLimitPercent = \"mem_limit_percent\"\n```\n\n因此模块的动态行为由两个外部输入共同决定：\n\n- 环境变量 `MY_MEM_LIMIT`：Pod 或容器总内存，单位是字节。\n- TCC key `mem_limit_percent`：要应用的百分比字符串。\n\n## 与服务启动顺序的关系\n\n`main.go` 中 `InitMemLimiter` 的调用发生在以下初始化之后：\n\n- `ginex.Init`\n- `config.InitConf`\n- `kms.Init`\n- `rpc.InitRpc`\n- `db.InitDb`\n- `jwt.InitJwt`\n- `tcc.InitConfig`\n- `remote_cache.Init`\n\n这意味着 `mem_limit` 启动时 TCC client 已经完成初始化，可以通过 `tcc.GetMemLimitPercent` 拉取动态配置。\n\n## 错误处理语义\n\n`doUpdate` 会对非法输入返回错误：\n\n- `MY_MEM_LIMIT` 不是整数。\n- `MY_MEM_LIMIT` 小于 `0`。\n- TCC 百分比不是整数。\n- TCC 百分比大于 `100`。\n\n但 `update` 会吞掉 `doUpdate` 的错误，只写 warn 日志并保留当前 runtime 内存限制。这种设计避免了错误配置导致服务启动失败或后台协程中断，但也意味着配置错误需要通过日志或监控发现。\n\n## 测试覆盖\n\n`memlimit_test.go` 直接测试 `doUpdate` 的主要边界：\n\n```go\nos.Setenv(\"MY_MEM_LIMIT\", \"8589934592\")\n\nerr := l.doUpdate(\"80\")    // 合法，设置为 80%\nerr = l.doUpdate(\"110ab\")  // 非数字，返回错误\nerr = l.doUpdate(\"110\")    // 超过 100，返回错误\nerr = l.doUpdate(\"-1\")     // 小于 0，重置为 math.MaxInt64\n```\n\n`base_test.go` 中的 `TestMain` 初始化 `ginex` 和 `config`，但当前代码是在 `m.Run()` 之后调用 `InitMemLimiter()`。因此现有单测主要覆盖 `doUpdate`，不会实际覆盖初始化时的 TCC 拉取和每分钟刷新逻辑。","other-middleware":"# Other — middleware\n\n## 模块概览\n\n`middleware` 模块负责把 Gin handler 的返回值统一转换为 HTTP 响应，并在响应前后处理鉴权、限流、缓存协商、OpenAPI 加密、指标上报和 Trace 标记。\n\n业务 handler 通常不直接写 `c.JSON`，而是使用如下模式：\n\n```go\nmiddleware.Response(c, \"buckets.getbucket\", api.handleGetBucketRequest)\n```\n\n`Response` 执行业务函数并把结果写入 Gin context；外层的 `ResponseMiddleware`、`OpenapiMiddleware`、`BPMMiddleware` 等再统一完成 HTTP 输出。\n\n## 核心上下文约定\n\n模块通过 Gin context 在 handler 和中间件之间传递数据：\n\n- `MKeyContextKey = \"mkey\"`：接口标识，用于限流、指标、日志和 Trace。\n- `ResultDataContextKey = \"data\"`：业务返回的 `errno.Payload`。\n- `CallerPSMKey = \"CALLER_PSM\"`：调用方 PSM，由 `X-Tt-From` 或 `X-TT-From` 解析。\n- `MyHandler`：统一业务函数签名，类型为 `func(c *gin.Context) errno.Payload`。\n\n如果某个路由挂载了这些响应中间件，它的 handler 必须最终设置 `ResultDataContextKey`，通常通过 `Response` 或 `ResponseZti` 完成。否则中间件在读取 `dataRet.(errno.Payload)` 时会出现类型断言风险。\n\n## 请求处理流程\n\n```mermaid\nflowchart TD\n    A[\"路由组中间件\"] --> B[\"鉴权或调用方识别\"]\n    B --> C[\"c.Next 或 c.Abort\"]\n    C --> D[\"业务 handler 调用 Response/ResponseZti\"]\n    D --> E[\"设置 mkey 和 errno.Payload\"]\n    E --> F[\"统一写 HTTP 响应\"]\n    F --> G[\"上报指标、日志和 Trace\"]\n```\n\n## `Response`：业务执行与限流入口\n\n`Response(c, mkey, f)` 是多数业务接口的入口包装器。它不会直接写 HTTP 响应，只负责：\n\n1. 生成限流 key。\n2. 执行本地接口限流 `util.AllowInterface(mkey)`。\n3. 执行分布式限流 `util.GetDistributedRateLimiter().Allow(rateLimitKey)`。\n4. 通过 `f(c)` 执行业务逻辑。\n5. 将 `mkey` 和 `errno.Payload` 写入 Gin context。\n\n限流 key 规则：\n\n- `GET` 请求：使用 `X-Tt-From:mkey`，读接口按调用方隔离。\n- 非 `GET` 请求：只使用 `mkey`，写/删操作走全局接口限流。\n\n本地接口限流由 `config.InterfaceRateLimiterConfig` 或 TCC 的 `interface_rate_limiter` 配置驱动，底层使用 `golang.org/x/time/rate.Limiter`。未配置的 `mkey` 默认放行。\n\n## 标准 SDK 响应中间件\n\n`ResponseMiddleware()` 用于普通 SDK/API 路由组，例如 `/bktmeta-api/v1`、`/volcengine-iam/v1`、`/bktmeta-tob/v1`。\n\n它在 `c.Next()` 前校验 SDK 请求 token：\n\n- token header 名来自 SDK 常量 `client.REQUEST_TOKEN_HEADER`，实际为 `x-tt-reqToken`。\n- `checkTokenValid` 使用 `kms.DecryptRequestToken` 解密 token。\n- 解密后反序列化为 `client.RequestToken`。\n- 必须包含 `ClientPSM`、`InterfaceName`、`RequestTimestamp`。\n- 请求时间与当前时间差不能超过 `ValidRequestTimeInterval`，即 300 秒。\n- 在 `env.DC_SGCOMM1` 且 token 为空时，允许返回 `SdkVersion: \"unknown\"` 的降级 token。\n\n鉴权失败时，中间件会 `c.Abort()`，并设置 `errno.CodeBadRequest`。如果 token 中没有可用的 `InterfaceName`，会根据 HTTP 方法和路径推断 `mkey`，例如 `PATCH` 映射到 `client.InterfaceUpdateBucket`，`/bktmeta-api/v1/signature` 映射到 `buckets.signature`。\n\n响应阶段会统一设置：\n\n- CORS header。\n- 禁用缓存的 `Cache-Control`、`Pragma`、`Expires`。\n- `Data` 为 `[]byte` 时按缓存响应处理，支持 `If-None-Match` 与 `ETag`，命中时返回 `304 Not Modified`。\n- 其他数据走 `c.JSON(http.StatusOK, data)`。\n\n随后上报 `util.EmitLatency`、`util.EmitThroughput`、`util.EmitError`，并通过 `bytedtracer` 设置 span 名称、调用方服务和业务状态码。\n\n## 免 token 的 simple API 中间件\n\n`ResponseMiddlewareWithoutAuthCheck()` 用于 `/bktmeta-s/v1`。它不校验 `x-tt-reqToken`，但仍复用标准响应逻辑：\n\n- 调用方来自 `X-TT-From`，为空时为 `unknown`。\n- SDK 版本来自 `X-TT-Bkt-Simple-Sdk-Version`，为空时为 `unknown`。\n- 支持 `[]byte` 缓存响应与 ETag。\n- 上报同样的延迟、吞吐、错误和 Trace 信息。\n\n业务 handler 仍需要通过 `Response` 设置 `mkey` 和 `errno.Payload`。\n\n## ZTI 路径\n\nZTI 相关逻辑拆成两层：\n\n- `ResponseZti(c, mkey, f)`：handler 内调用，负责校验 `JWT-Sec-Token`。\n- `ZtiResponseMiddleware()`：路由组中间件，负责统一写 HTTP 响应。\n\n`ResponseZti` 使用 `token.VerifyToken(token, c.ClientIP(), \"\")` 校验 JWT，并取出 `identity.PSM`。随后调用 `tcc.CheckAuthV2(c, psm, mkey)` 判断该 PSM 是否允许访问当前接口。校验失败时写入 `errno.CodeForbidden`；成功时委托 `Response` 执行业务和限流。\n\n`ZtiResponseMiddleware` 本身不做鉴权，只在 `c.Next()` 后按标准逻辑输出 JSON 或 ETag 缓存响应。\n\n## BPM 响应中间件\n\n`BPMMiddleware()` 用于 `/bpm/v1`。它不读取调用方 header，而是固定使用：\n\n```go\npsm := \"bpm.bpm.bpm\"\n```\n\nBPM 响应通过 `toBPMPayload` 做兼容转换：当内部成功码为 `errno.CodeOK` 时，对外返回 `errno.CodeOKZero`；其他错误码保持不变。响应体通过 `json.Marshal(toBPMPayload(data))` 后使用 `c.Data(http.StatusOK, \"application/json\", bytes)` 输出。\n\n## OpenAPI 中间件与 AGW 鉴权\n\n`OpenapiMiddleware()` 用于 `/bktmeta-openapi/v1` 和 `/bktmeta-openapi-s/v1`。它在执行业务 handler 前调用 `checkAgwAuth`：\n\n- 必须存在 `Agw-Auth`。\n- `Agw-Auth` 按 `/` 拆分，第二段作为 AK。\n- `Agw-Auth-Ak` 必须与 `Agw-Auth` 中的 AK 一致。\n- AK 必须能通过 `GetAGWTenantSk` 从 AGW 租户缓存中找到 SK。\n\n当前实现只校验 AK 一致性和本地缓存是否存在，并未校验 `Agw-Auth` 中的时间戳、过期时间或签名字段。\n\nOpenAPI 响应的 `mkey` 会追加 `.openapi` 后缀，例如 `buckets.getbucket.openapi`。成功响应会调用 `encryptOpenapiData(c, agwTenantSk, &data)`：\n\n- 仅加密 `errno.CodeOK` 的响应。\n- 如果 `payload.Data` 是 `[]byte`，先反序列化为完整 `errno.Payload`，用于处理 allBuckets 这类缓存响应。\n- 对 `payload.Data` 做 `json.Marshal`。\n- 使用 `util.EncryptWithMetadata([]byte(agwTenantSk), string(v))` 加密。\n- 加密失败或序列化失败时改写为 `errno.CodeInternalErr`，并清空 `Data`。\n\n如果请求的 `If-None-Match` 与响应 `ETag` 相等，OpenAPI 直接返回 `304 Not Modified`，不会执行加密。\n\n## AGW 租户 AK/SK 缓存\n\n`agw.go` 维护进程内的 `sync.Map`：`agwTenantAkSkCache`。键为 AK，值为 SK。\n\n`StartRefreshAGWTenantAkSkCache()` 在服务启动时由 `main.go` 调用：\n\n1. 读取 `config.Conf.AGWConfig`。\n2. 如果 `AGWConfig.Switch` 关闭，直接返回。\n3. 通过 `kms.Client.GetConfigV2(AGWConfig.OpenapiPasswordConfigKey)` 获取 AGW OpenAPI 密码。\n4. 先同步执行一次 `asyncUpdateAGWTenantCache` 初始化缓存。\n5. 启动 goroutine，每 30 分钟刷新一次。\n\n`asyncUpdateAGWTenantCache` 有两种数据源：\n\n- 当 `tcc.GetAGWTenantConfigs().UseTCC` 为 true 时，使用 `refreshAGWTenantFromTCC` 从 TCC 配置写入缓存。\n- 否则请求 `AGWConfig.OpenapiHost + \"/tenant/all\" + AGWConfig.ServerId`，用 BasicAuth 拉取 `AkSkRsp`，再写入缓存。\n\n缓存刷新只执行 `Store`，不会清理已经移除的 AK。修改租户生命周期逻辑时需要注意这一点。\n\n## 路由接入关系\n\n`main.go` 中的主要挂载关系如下：\n\n- `/bktmeta-api/v1`：`ResponseMiddleware`\n- `/bktmeta-api/v2`：`ZtiResponseMiddleware`\n- `/volcengine-iam/v1`：`ResponseMiddleware`\n- `/bktmeta-tob/v1`：`ResponseMiddleware`\n- `/bktmeta-s/v1`：`ResponseMiddlewareWithoutAuthCheck`\n- `/bpm/v1`：`BPMMiddleware`\n- `/bktmeta-openapi/v1`：`OpenapiMiddleware`\n- `/bktmeta-openapi-s/v1`：`OpenapiMiddleware`\n\n各 `service/*_handler.go` 文件中的导出 handler 负责选择合适的 `mkey`，并通过 `Response` 或 `ResponseZti` 包装内部处理函数。\n\n## 测试覆盖重点\n\n`middleware/base_test.go` 和 `middleware/agw_test.go` 覆盖了主要行为：\n\n- `Response` 是否写入 `MKeyContextKey` 与 `ResultDataContextKey`。\n- 本地接口限流命中时是否返回 `errno.ErrTooManyRequests`，并阻止业务 handler 再执行。\n- 未配置限流的接口是否默认放行。\n- `checkTokenValid` 是否能解密并解析 SDK token。\n- `ResponseMiddleware`、`ResponseMiddlewareWithoutAuthCheck`、`ZtiResponseMiddleware` 是否能处理普通 JSON 和 ETag 缓存响应。\n- `ResponseZti` 在 token 缺失时是否返回 `errno.CodeForbidden`。\n- `toBPMPayload` 是否把内部成功码转换为 BPM 期望的 `0`。\n- `OpenapiMiddleware` 的 AGW header 校验路径。\n- `encryptOpenapiData` 的成功加密、序列化失败、错误 payload 跳过加密、加密失败。\n- `GetAGWTenantSk` 与 `refreshAGWTenantFromTCC` 的缓存读写。\n\n## 贡献注意事项\n\n新增接口时，优先复用已有模式：路由组挂载合适的响应中间件，handler 内调用 `Response(c, mkey, handler)`。`mkey` 是限流、监控和 Trace 的核心维度，应保持稳定且能表达接口语义。\n\n新增 OpenAPI 接口时，需要确认返回数据可以被 `json.Marshal`，并能被调用方用 AGW SK 解密。返回 `[]byte` 缓存体时，内容必须是可反序列化的 `errno.Payload`。\n\n修改鉴权逻辑时要区分三条路径：SDK token 鉴权在 `ResponseMiddleware`，ZTI JWT 鉴权在 `ResponseZti`，AGW AK/SK 校验在 `OpenapiMiddleware`。这些路径的失败码分别影响客户端兼容性和监控口径，不应混用。","other-readme-md":"# Other — README.md\n\n## README.md 模块说明\n\n`README.md` 是 `bucket meta api` 项目的接口入口文档，用来快速说明服务暴露的 HTTP API。该文件本身不包含可执行代码，因此没有函数、类、内部调用、外部调用或执行流；它的作用是记录对外 API 约定，帮助开发者理解 bucket 元数据服务的基础能力。\n\n## 接口能力\n\n该模块记录了 6 个 HTTP 接口，围绕 bucket 的创建、查询、更新、删除和签名获取展开。\n\n| 方法 | 路径 | 说明 |\n| --- | --- | --- |\n| `POST` | `/v1/buckets` | 创建 bucket |\n| `GET` | `/v1/buckets` | 获取所有 bucket 信息 |\n| `GET` | `/v1/buckets/{name}` | 获取指定 bucket 信息 |\n| `DELETE` | `/v1/buckets/{name}` | 删除指定 bucket |\n| `PATCH` | `/v1/buckets/{name}` | 更新指定 bucket |\n| `GET` | `/v1/signatures/{bucketname}` | 获取指定 bucket 的签名 |\n\n## 资源模型\n\nREADME 中体现了两个主要资源概念：\n\n`bucket`：核心业务资源，通过 `/v1/buckets` 和 `/v1/buckets/{name}` 管理。\n\n`signature`：与 bucket 相关的签名资源，通过 `/v1/signatures/{bucketname}` 获取。\n\n这些路径暗示服务采用 REST 风格设计：集合资源使用 `/v1/buckets`，单个资源使用 `/v1/buckets/{name}`，并通过 HTTP 方法区分操作语义。\n\n## 请求流程概览\n\n```mermaid\nflowchart TD\n    客户端 --> API服务\n    API服务 --> Bucket集合接口\n    API服务 --> Bucket单项接口\n    API服务 --> 签名接口\n    Bucket集合接口 --> 创建或查询全部Bucket\n    Bucket单项接口 --> 查询更新或删除Bucket\n    签名接口 --> 获取Bucket签名\n```\n\n## 与代码库的关系\n\n该 README 是代码库的顶层说明文档，不直接参与运行时逻辑。调用图显示它没有内部调用、外部调用或被调用关系，因此它不会影响编译、服务启动或请求处理。\n\n开发者维护接口实现时，应确保实际路由、参数名称和行为与 README 中的 API 约定保持一致。尤其需要关注：\n\n`/v1/buckets/{name}` 中路径参数名为 `name`。\n\n`/v1/signatures/{bucketname}` 中路径参数名为 `bucketname`。\n\n`PATCH /v1/buckets/{name}` 当前说明为 `update bucket`，建议后续统一为中文描述，并补充请求体字段、返回结构和错误码。\n\n## 维护建议\n\n当前 README 只提供了接口列表，适合作为快速索引。若要支持新开发者接入，建议继续补充每个接口的请求示例、响应示例、状态码、鉴权要求、错误格式，以及 bucket 对象的数据结构定义。","other-remote-cache":"# Other — remote_cache\n\n## remote_cache 模块\n\n`remote_cache` 模块负责提供远程缓存相关的初始化与实例获取能力。当前可见代码主要是测试入口，验证了模块的初始化链路能够在完整配置环境下正常执行，并且 `GetCacheInstance()` 能返回非空缓存实例。\n\n## 对外入口\n\n模块实现位于 `remote_cache/remote_cache.go`，测试中直接使用了以下函数：\n\n- `initOnce()`：执行一次性初始化，测试期望返回 `nil` 错误。\n- `GetCacheInstance()`：获取缓存实例，测试期望返回值非空且错误为 `nil`。\n- `Init()`：模块级初始化入口，测试期望可重复调用且返回 `nil`。\n\n从测试行为看，`initOnce()` 更偏内部初始化逻辑，`Init()` 是更适合业务代码调用的公开初始化入口，`GetCacheInstance()` 用于拿到初始化后的缓存对象。\n\n## 测试初始化流程\n\n`remote_cache/base_test.go` 中定义了 `TestMain(m *testing.M)`，所有测试运行前都会先初始化运行环境：\n\n```go\nfunc TestMain(m *testing.M) {\n\tginex.Init()\n\tconfig.InitConf(ginex.ConfDir())\n\ttcc.InitConfig()\n\tcode := m.Run()\n\tos.Exit(code)\n}\n```\n\n初始化顺序很重要：\n\n1. `ginex.Init()` 初始化 GinEx 运行环境。\n2. `config.InitConf(ginex.ConfDir())` 从 GinEx 配置目录加载项目配置。\n3. `tcc.InitConfig()` 初始化 TCC 配置。\n4. `m.Run()` 执行 `remote_cache` 包内测试。\n\n这说明 `remote_cache` 的初始化依赖项目配置和 TCC 配置已就绪；如果在业务代码或新测试中绕过这些前置步骤，`Init()`、`initOnce()` 或 `GetCacheInstance()` 可能无法按预期工作。\n\n```mermaid\nflowchart TD\n    A[\"TestMain\"] --> B[\"ginex.Init\"]\n    B --> C[\"ginex.ConfDir\"]\n    C --> D[\"config.InitConf\"]\n    D --> E[\"tcc.InitConfig\"]\n    E --> F[\"Test_init\"]\n    F --> G[\"initOnce\"]\n    F --> H[\"GetCacheInstance\"]\n    F --> I[\"Init\"]\n```\n\n## 核心测试用例\n\n`remote_cache/remote_cache_test.go` 中的 `Test_init` 覆盖了模块最基本的生命周期：\n\n```go\nfunc Test_init(t *testing.T) {\n\terr := initOnce()\n\tassert.Nil(t, err)\n\n\ti, err := GetCacheInstance()\n\tassert.Nil(t, err)\n\tassert.NotNil(t, i)\n\n\terr = Init()\n\tassert.Nil(t, err)\n}\n```\n\n该测试验证三件事：\n\n- `initOnce()` 可以在完整配置环境下成功初始化。\n- 初始化后 `GetCacheInstance()` 可以返回可用实例。\n- `Init()` 可以成功执行，且不会因为此前已调用过 `initOnce()` 而失败。\n\n这也暗示 `remote_cache` 初始化逻辑应具备幂等性，至少在测试覆盖的调用顺序中，直接调用 `initOnce()` 后再调用 `Init()` 是合法的。\n\n## 与代码库其他模块的关系\n\n`remote_cache` 测试依赖以下模块完成环境准备：\n\n- `code.byted.org/gin/ginex`\n  - 提供 `ginex.Init()` 和 `ginex.ConfDir()`。\n  - 用于建立运行时配置目录上下文。\n\n- `code.byted.org/videoarch/bktmeta-api/config`\n  - 通过 `config.InitConf(ginex.ConfDir())` 加载项目配置。\n\n- `code.byted.org/videoarch/bktmeta-api/tcc`\n  - 通过 `tcc.InitConfig()` 初始化 TCC 配置。\n\n调用图中没有发现其他模块调用 `remote_cache` 的测试函数；业务侧对 `remote_cache` 的实际调用应集中在 `remote_cache.go` 提供的 `Init()` 和 `GetCacheInstance()` 等入口上。\n\n## 贡献注意事项\n\n修改 `remote_cache` 初始化逻辑时，需要保持以下行为：\n\n- `Init()` 应作为稳定入口，适合外部模块调用。\n- `initOnce()` 的一次性初始化语义不能破坏。\n- `GetCacheInstance()` 在初始化完成后必须返回非空实例。\n- 初始化逻辑应兼容测试中的调用顺序：`initOnce()` → `GetCacheInstance()` → `Init()`。\n- 新增测试时应复用 `TestMain` 中的环境初始化方式，避免在未加载 `config` 和 `tcc` 的情况下直接测试远程缓存逻辑。","other-rpc":"# Other — rpc\n\n## 模块概览\n\n`rpc` 包封装了本服务对外部系统的 HTTP/RPC 调用，主要包含两类客户端：\n\n- `TosV3Cli`：访问 TOS Platform Public V3 API，用于查询 bucket、拉取全量 bucket、创建 bucket、追加 bucket 管理员。\n- `BpmCli`：访问 BPM workflow API，用于创建和取消审批流。\n\n模块通过接口变量暴露能力：\n\n```go\nvar TosV3Cli TosPublicV3Api\nvar BpmCli BpmApi\n```\n\n业务层不直接构造 HTTP 请求，而是依赖这两个全局客户端。`InitRpc()` 根据配置初始化真实客户端或 fake 客户端。\n\n## 初始化流程\n\n`InitRpc()` 是模块入口，服务启动和测试初始化都会调用它：\n\n- `main.go` 调用 `rpc.InitRpc()` 完成运行时初始化。\n- `rpc/base_test.go` 的 `TestMain` 在测试前依次初始化配置、JWT、指标、KMS 和 RPC。\n- `db/base_test.go`、`service/base_test.go` 也会在测试环境中调用 `rpc.InitRpc()`。\n\n```mermaid\nflowchart TD\n    A[\"main.go / TestMain\"] --> B[\"InitRpc()\"]\n    B --> C{\"config.Conf.TosAPI.Disable\"}\n    C -->|true| D[\"FakeTosPublicV3APi\"]\n    C -->|true| E[\"FakeBpmAPi\"]\n    C -->|false| F[\"kms.Client.GetConfigV2\"]\n    F --> G[\"TosPublicV3Client\"]\n    F --> H[\"BpmClient\"]\n```\n\n当 `config.Conf.TosAPI.Disable == true` 时，模块不会访问外部 TOS/BPM 服务，而是将：\n\n```go\nTosV3Cli = &FakeTosPublicV3APi{}\nBpmCli = &FakeBpmAPi{}\n```\n\nfake 客户端的所有方法都会返回：\n\n```go\nvar MethodNotSupported = errors.New(\"method not supported in this region\")\n```\n\n当配置未禁用时，`InitRpc()` 会从 KMS 读取 `config.Conf.TosAPI.IamSecret` 对应的密钥。如果 KMS 读取失败，函数会记录错误并 `panic`，因此 KMS 初始化必须早于 `InitRpc()`。\n\n真实客户端初始化字段来自配置：\n\n- `TosPublicV3Client.JwtHost`\n- `TosPublicV3Client.IamSecret`\n- `TosPublicV3Client.TosPlatPSM`\n- `TosPublicV3Client.TosPlatCluster`\n- `TosPublicV3Client.TosPlatHost`\n- `BpmClient.BpmApiUrl`\n\n## TOS Public V3 客户端\n\n`TosPublicV3Api` 定义了业务层可使用的 TOS 能力：\n\n```go\ntype TosPublicV3Api interface {\n    QueryBucket(ctx context.Context, name string) (*PublicBucket, error)\n    GetAllBuckets(ctx context.Context) ([]*AdminBucketV1, error)\n    GetAllBucketsWithCache(ctx context.Context) ([]*AdminBucketV1, error)\n    CreateBucket(ctx context.Context, createRequest *CreateBucketRequest) (*CreateBucketResponse, error)\n    AppendBucketManager(ctx context.Context, appendRequest *AppendBucketManagerRequest) error\n}\n```\n\n真实实现是 `TosPublicV3Client`。\n\n### `QueryBucket`\n\n`QueryBucket(ctx, name)` 查询单个 TOS bucket：\n\n```go\nGET http://{TosPlatPSM}/public/v3/query/bucket?name={name}\n```\n\n响应中的 `data` 会反序列化为 `PublicBucket`。业务侧常用于判断 TOS bucket 是否已存在或补齐 TOS 元信息，例如：\n\n- `service/bucket_handler.go`\n- `service/tos_handler.go`\n- `service/vsre.go`\n- `service/bpm_handler.go`\n\n### `GetAllBuckets`\n\n`GetAllBuckets(ctx)` 拉取 TOS 全量 bucket 列表：\n\n```go\nGET http://{TosPlatPSM}/public/v3/buckets/all\n```\n\n响应中的 `data` 先反序列化为 `AllBucketsData`，再返回其中的 `Buckets []*AdminBucketV1`。\n\n`db/tosapi.go` 中的同步逻辑会调用它把 TOS bucket 信息同步到本服务的数据视图中。\n\n### `GetAllBucketsWithCache`\n\n`GetAllBucketsWithCache(ctx)` 调用 TOS Today+1 缓存接口：\n\n```go\nGET http://{TosPlatPSM}/public/v3/bucketmeta\n```\n\n该接口直接返回 `[]*AdminBucketV1`，并且注释说明缓存结果中的 `TTL` 字段不为空。`rpc/tos_test.go` 也用测试断言体现了这个差异：\n\n- `GetAllBuckets` 返回的 bucket 不期望出现 `TTL > 0`\n- `GetAllBucketsWithCache` 返回的 bucket 期望至少存在 `TTL > 0`\n\n测试中对 `\"Failed to fetch data\"` 做了兼容处理，用于绕过 TOS platform BOE 请求 Redis 超时的情况。\n\n### `CreateBucket`\n\n`CreateBucket(ctx, createRequest)` 创建 TOS bucket：\n\n```go\nPOST http://{TosPlatPSM}/public/v3/bucketbu\n```\n\n请求体是 `CreateBucketRequest` 的 JSON。\n\n方法内部有两个默认化逻辑：\n\n```go\nif createRequest.Qos == nil {\n    createRequest.Qos = &Qos{\n        GetQps:    2000,\n        PutQps:    2000,\n        HeadQps:   2000,\n        DeleteQps: 1000,\n        PutRate:   3000,\n        GetRate:   3000,\n    }\n}\n\nif createRequest.Public == \"everyone\" {\n    createRequest.SecurityLevel = \"L1\"\n}\n```\n\n因此调用方如果不传 `Qos`，会默认使用固定的读写 QPS 和带宽配置；公开 bucket 会被强制设置为 `SecurityLevel == \"L1\"`。\n\n响应中的 `data` 会反序列化为：\n\n```go\ntype CreateBucketResponse struct {\n    BucketID    uint64 `json:\"bucket_id\"`\n    AccessKey   string `json:\"ak\"`\n    SecretKey   string `json:\"sk\"`\n    SysMsg      string `json:\"sys_msg\"`\n    SysTicketID uint64 `json:\"sys_ticket_id\"`\n}\n```\n\n### `AppendBucketManager`\n\n`AppendBucketManager(ctx, appendRequest)` 给 bucket 追加管理员：\n\n```go\nPUT http://{TosPlatPSM}/public/v3/bucket/bucketmanager\n```\n\n请求体是 `AppendBucketManagerRequest`：\n\n```go\ntype AppendBucketManagerRequest struct {\n    ServiceAccounts []string      `json:\"service_accounts\"`\n    UserAccounts    []UserAccount `json:\"user_accounts\"`\n    BucketId        int32         `json:\"bucket_id\"`\n    LoginUserEmail  string        `json:\"login_user_email\"`\n}\n```\n\n业务层常在创建 bucket 后或审批回调中调用该方法，为服务账号或用户账号补充管理权限。\n\n## TOS 请求公共逻辑\n\n所有 `TosPublicV3Client` 方法最终都会调用 `doReq(ctx, req, objPtr)`。\n\n`doReq` 会统一设置请求头：\n\n```go\nreq.Header.Set(\"X-TT-FROM\", \"toutiao.videoarch.bktmetaapi\")\nreq.Header.Set(\"X-TT-LOGID\", logID)\nreq.Header.Add(\"x-jwt-token\", token)\n```\n\n`logID` 优先从 `ctx.Value(\"K_LOGID\")` 获取；如果上下文没有该值，则使用 `logid.GenLogID()` 生成。\n\nJWT token 由 `getJwtToken()` 通过 IAM secret 向 JWT 服务申请：\n\n```go\nGET {JwtHost}/auth/api/v1/jwt\nAuthorization: Bearer {IamSecret}\n```\n\ntoken 从响应头 `X-Jwt-Token` 读取。\n\nTOS 请求通过 consul HTTP 客户端发送：\n\n```go\nchttp.DefaultClient.Do(req, chttp.WithCluster(cli.TosPlatCluster))\n```\n\n这意味着 `TosPlatPSM` 和 `TosPlatCluster` 必须与服务发现配置匹配。\n\n响应统一由 `handleRes(rd, objPtr)` 处理。TOS 标准响应结构是：\n\n```go\ntype PublicBucketResponse struct {\n    Status int             `json:\"status\"`\n    Msg    string          `json:\"msg\"`\n    Data   json.RawMessage `json:\"data\"`\n}\n```\n\n处理规则：\n\n- `Status == 0`：认为成功。\n- `Status == 404`：返回 `errors.New(\"not found\")`。\n- 其他非零状态：返回 `fmt.Errorf(\"res status:%d, msg:%s\", res.Status, res.Msg)`。\n- `objPtr != nil` 时，将 `Data` 反序列化到目标结构。\n\n## BPM 客户端\n\n`BpmApi` 定义审批流相关能力：\n\n```go\ntype BpmApi interface {\n    CreateWorkflow(ctx context.Context, workflowConfigID string, config interface{}) (*CreateWorkflowResponse, error)\n    CancelWorkflow(ctx context.Context, workflowID string) error\n}\n```\n\n真实实现是 `BpmClient`。\n\n### `CreateWorkflow`\n\n`CreateWorkflow(ctx, workflowConfigID, config)` 创建审批流记录：\n\n```go\nPOST {BpmApiUrl}/inf/v1/workflow/record\n```\n\n请求体结构固定为：\n\n```go\nmap[string]interface{}{\n    \"workflow_config_id\": workflowConfigID,\n    \"config\":             config,\n}\n```\n\n响应中的 `data` 反序列化为 `CreateWorkflowResponse`。`service/bpm_handler.go` 中修改 TOS bucket 配置、权限、公开级别等流程会通过 `rpc.BpmCli.CreateWorkflow` 发起 BPM 审批。\n\n### `CancelWorkflow`\n\n`CancelWorkflow(ctx, workflowID)` 取消审批流：\n\n```go\nPOST {BpmApiUrl}/inf/v1/workflow/record/{workflowID}/cancel\n```\n\n该方法不需要响应数据，成功时只依赖公共响应码判断。\n\n## BPM 请求公共逻辑\n\n`BpmClient.doReq(ctx, req, objPtr)` 会统一设置请求头：\n\n```go\nreq.Header.Set(\"X-TT-FROM\", \"toutiao.videoarch.bktmetaapi\")\nreq.Header.Set(\"X-TT-LOGID\", logID)\nreq.Header.Set(\"X-JWT-Token\", token)\nreq.Header.Set(\"Content-Type\", \"application/json\")\n```\n\nBPM 的 JWT token 不是通过 HTTP 获取，而是由本服务的 JWT 组件生成：\n\n```go\njwt.BpmGen.Generate(ctx, config.Conf.ModifyTOSBucketBpmConfig.SecretKey)\n```\n\n请求通过 `http.DefaultClient.Do(req)` 发送。\n\nBPM 标准响应结构是：\n\n```go\ntype PublicBpmResponse struct {\n    Code    int             `json:\"code\"`\n    Message string          `json:\"message\"`\n    Data    json.RawMessage `json:\"data\"`\n}\n```\n\n处理规则与 TOS 类似：\n\n- `Code == 0`：成功。\n- `Code == 404`：返回 `errors.New(\"not found\")`。\n- 其他非零状态：返回 `fmt.Errorf(\"res code:%d, message:%s\", res.Code, res.Message)`。\n- `objPtr != nil` 时，将 `Data` 反序列化到目标结构。\n\n## IDL 与数据结构\n\n`rpc/tos_idl.go` 集中定义 TOS/BPM 交互结构体。重要类型包括：\n\n- `PublicBucket`：单 bucket 查询结果，包含 `BucketID`、`BucketName`、`TTL`、`BackendID`、`Writable`、`Qos`、`Properties`、`SecurityLevel`、`ServiceNode`、`PSM` 等字段。\n- `AdminBucketV1`：全量 bucket 列表项，包含 `ID`、`Name`、`Region`、`Creator`、`ServiceNode`、`BackendID`、`Public`、`TTL`、`S3Info`、`VRegion` 等字段。\n- `CreateBucketRequest`：创建 bucket 请求，包含 `Name`、`Creator`、`ServiceNode`、`TTL`、`VRegion`、`BackendID`、`CacheControl`、`SecurityLevel`、`Public`、`Headers`、`Qos` 等字段。\n- `Qos`：TOS bucket 的限流配置。\n- `AppendBucketManagerRequest`：追加 bucket 管理员请求。\n- `CreateBucketResponse`：创建 bucket 的返回结果，包含 `BucketID`、`AccessKey`、`SecretKey`、`SysTicketID`。\n- `CreateWorkflowResponse`：BPM 创建审批流返回结果，定义在 `rpc/bpm.go`。\n\n`BackendInfo` 和 `XFlowBPMJob` 也定义在该文件中，但当前 `rpc` 包实现没有直接使用它们。\n\n## fake 客户端\n\n`rpc/fake_client.go` 提供两个 fake 实现：\n\n```go\ntype FakeTosPublicV3APi struct{}\ntype FakeBpmAPi struct{}\n```\n\n它们分别实现 `TosPublicV3Api` 和 `BpmApi`，但所有方法都返回 `MethodNotSupported`。\n\n这些 fake 客户端主要用于：\n\n- TOS API 被配置禁用的区域或环境。\n- 避免不支持的区域误调用外部 TOS/BPM 服务。\n- 在测试中验证禁用模式下的行为。\n\n需要注意，fake 客户端不是 mock 数据源，不会返回伪造 bucket 或 workflow 数据；它们只表达“当前区域不支持该方法”。\n\n## 与业务模块的连接\n\n`rpc` 包是业务服务访问外部系统的边界层。主要调用关系如下：\n\n```mermaid\nflowchart LR\n    A[\"service/bucket_handler.go\"] --> C[\"rpc.TosV3Cli\"]\n    B[\"service/bpm_handler.go\"] --> C\n    B --> D[\"rpc.BpmCli\"]\n    E[\"service/tos_handler.go\"] --> C\n    F[\"service/vsre.go\"] --> C\n    G[\"db/tosapi.go\"] --> C\n```\n\n典型使用场景：\n\n- `service/bucket_handler.go`：创建或批量创建 bucket 时查询 TOS bucket，并调用 `AppendBucketManager` 补充权限。\n- `service/bpm_handler.go`：BPM 创建 bucket、审批回调、修改 TOS bucket 配置时调用 `CreateWorkflow`、`CancelWorkflow`、`QueryBucket`、`AppendBucketManager`。\n- `service/tos_handler.go`：查询 TOS bucket 信息。\n- `service/vsre.go`：创建 VSRE 相关 bucket 时调用 `CreateBucket`、`QueryBucket`、`AppendBucketManager`。\n- `db/tosapi.go`：异步同步 TOS 全量 bucket 数据时调用 `GetAllBuckets` 和 `GetAllBucketsWithCache`。\n\n## 测试覆盖\n\n`rpc/base_test.go` 的 `TestMain` 建立集成测试环境：\n\n```go\nginex.Init()\nconfig.InitConf(ginex.ConfDir())\njwt.InitJwt()\nutil.InitMetrics()\nkms.Init()\nInitRpc()\n```\n\n`rpc/f_client_test.go` 验证 fake 客户端的所有方法都会返回 `MethodNotSupported`。\n\n`rpc/tos_test.go` 覆盖真实 TOS 客户端方法：\n\n- `TestTosPublicV3Client_QueryBucket`\n- `TestTosPublicV3Client_GetAllBuckets`\n- `TestTosPublicV3Client_GetAllBucketsWithCache`\n- `TestTosPublicV3Client_CreateBucket`\n- `TestTosPublicV3Client_AppendManagerBucket`\n- `TestInitRpc`\n\n这些测试依赖真实配置、KMS、JWT 和外部 TOS 环境，因此更接近集成测试，不是纯单元测试。\n\n`rpc/bpm_test.go` 调用 `BpmCli.CreateWorkflow`，并断言错误中包含 `\"not exist\"`，用于验证不存在 workflow 配置时的错误路径。\n\n## 开发注意事项\n\n新增外部 RPC 能力时，优先遵循现有模式：\n\n1. 在接口中增加方法，例如 `TosPublicV3Api` 或 `BpmApi`。\n2. 在真实客户端中实现 HTTP 请求构造。\n3. 复用 `doReq` 和 `handleRes`，不要在业务方法中重复处理公共响应格式。\n4. 在 fake 客户端中补齐同名方法，并返回 `MethodNotSupported`。\n5. 在调用方使用 `rpc.TosV3Cli` 或 `rpc.BpmCli`，不要绕过接口直接构造客户端。\n\n修改响应结构时要特别注意 `handleRes` 的二段式反序列化：外层公共响应先解析到 `PublicBucketResponse` 或 `PublicBpmResponse`，内层 `data` 再解析到具体结构。如果外部接口返回的 `data` 形状变化，错误通常会表现为 `\"unmarshal res data\"`。","other-script":"# Other — script\n\n## script 模块\n\n`script` 模块负责服务运行时启动配置。它不包含业务逻辑，主要由 `bootstrap.sh` 读取 `settings.py` 中的服务标识，准备日志目录，拼装启动参数，并最终执行二进制文件。\n\n核心文件：\n\n- `bootstrap.sh`：服务启动入口脚本。\n- `settings.py`：定义产品线、子系统、模块名等部署元信息。\n- `pre_nginx.sh`：当前为空文件，作为可选 nginx 前置脚本占位。\n\n## 启动流程\n\n`bootstrap.sh` 的执行入口格式为：\n\n```bash\n./bootstrap.sh <RUNTIME_ROOT> [PORT]\n```\n\n如果未传入 `RUNTIME_ROOT`，脚本会默认使用 `bootstrap.sh` 所在目录作为运行时根目录。\n\n启动流程如下：\n\n```mermaid\nflowchart TD\n    A[执行 bootstrap.sh] --> B[确定 RUNTIME_ROOT]\n    B --> C[创建 log/app 和 log/rpc]\n    C --> D[检查 settings.py]\n    D --> E[读取 PRODUCT SUBSYS MODULE]\n    E --> F[拼接 PSM 和 BinaryName]\n    F --> G[设置 GIN_LOG_DIR 和 PSM]\n    G --> H[拼接启动参数]\n    H --> I[exec bin/PRODUCT.SUBSYS.MODULE]\n```\n\n## `settings.py` 配置\n\n当前配置内容：\n\n```python\nPRODUCT=\"toutiao\"\nSUBSYS=\"videoarch\"\nMODULE=\"bktmetaapi\"\n\nAPP_TYPE=\"binary\"\n```\n\n这三个字段会共同组成服务名和二进制文件名：\n\n```bash\nSVC_NAME=${PRODUCT}.${SUBSYS}.${MODULE}\nBinaryName=${PRODUCT}.${SUBSYS}.${MODULE}\n```\n\n因此当前服务标识为：\n\n```text\ntoutiao.videoarch.bktmetaapi\n```\n\n脚本最终会执行：\n\n```bash\nscript/bin/toutiao.videoarch.bktmetaapi\n```\n\n并传入：\n\n```bash\n-psm=toutiao.videoarch.bktmetaapi\n-conf-dir=<script目录>/conf/\n-log-dir=<RUNTIME_ROOT>/log\n```\n\n如果启动时传入第二个参数 `PORT`，还会追加：\n\n```bash\n-port=<PORT>\n```\n\n## 运行时目录\n\n`bootstrap.sh` 会根据 `RUNTIME_ROOT` 派生两个目录：\n\n```bash\nRUNTIME_CONF_ROOT=$RUNTIME_ROOT/conf\nRUNTIME_LOG_ROOT=$RUNTIME_ROOT/log\n```\n\n其中 `RUNTIME_CONF_ROOT` 当前只被定义，没有在后续逻辑中使用。实际传给二进制的配置目录是：\n\n```bash\nCONF_DIR=$CURDIR/conf/\n```\n\n日志目录会被初始化为：\n\n```text\n<RUNTIME_ROOT>/log/app\n<RUNTIME_ROOT>/log/rpc\n```\n\n并通过环境变量传给进程：\n\n```bash\nexport GIN_LOG_DIR=$RUNTIME_LOG_ROOT\nexport PSM=$SVC_NAME\n```\n\n## nginx 与端口处理\n\n`settings.py` 中保留了 nginx 相关配置注释：\n\n```python\n# REQUIRE_NGINX = True\n# PRENGINX_SCRIPT = \"pre_nginx.sh\"\n```\n\n`bootstrap.sh` 会尝试读取：\n\n```bash\nREQUIRE_NGINX=$(cd $CURDIR; python -c \"import settings; print(settings.REQUIRE_NGINX)\" 2>/dev/null)\n```\n\n当前 `settings.py` 没有定义 `REQUIRE_NGINX`，因此该变量会为空，脚本不会按 nginx 模式处理端口。\n\n如果环境变量 `REQUIRE_HTTP_MESH=True`，脚本会强制：\n\n```bash\nREQUIRE_NGINX=False\n```\n\n在 `IS_HOST_NETWORK=1` 时，脚本会根据是否需要 nginx 设置运行时端口环境变量：\n\n```bash\nif [ \"$REQUIRE_NGINX\" == \"True\" ]; then\n    export RUNTIME_SERVICE_PORT=$PORT1\n    export RUNTIME_DEBUG_PORT=$PORT2\nelse\n    export RUNTIME_SERVICE_PORT=$PORT0\n    export RUNTIME_DEBUG_PORT=$PORT1\nfi\n```\n\n这里的 `PORT0`、`PORT1`、`PORT2` 需要由外部部署环境提供。注意这些环境变量只用于导出 `RUNTIME_SERVICE_PORT` 和 `RUNTIME_DEBUG_PORT`，不会自动成为二进制启动参数；真正传入二进制的 `-port` 仍来自 `bootstrap.sh` 的第二个命令行参数。\n\n## `pre_nginx.sh`\n\n`pre_nginx.sh` 当前为空。`bootstrap.sh` 没有直接调用它。\n\n`settings.py` 中的注释展示了一个可能的部署约定：\n\n```python\n# PRENGINX_SCRIPT = \"pre_nginx.sh\"\n```\n\n这说明该文件可能供外部部署系统或运行时框架在 nginx 启动前执行，但在当前模块代码中没有实际接入逻辑。\n\n## 与代码库其他部分的连接\n\n`script` 模块通过约定连接服务二进制和运行时环境：\n\n- 二进制文件必须位于 `script/bin/` 下。\n- 二进制名称必须等于 `${PRODUCT}.${SUBSYS}.${MODULE}`。\n- 配置目录固定传为 `script/conf/`。\n- 日志根目录通过 `GIN_LOG_DIR` 和 `-log-dir` 同时提供。\n- 服务标识通过 `PSM` 环境变量和 `-psm` 参数同时提供。\n\n因此，修改 `s
