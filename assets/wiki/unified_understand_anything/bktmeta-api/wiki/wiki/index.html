var PAGES = {"api-dtos-and-responses":"# API DTOs and Responses\n\n## 模块概览\n\nAPI DTOs and Responses 模块定义接口层使用的数据传输结构、统一业务响应体、Janus 网关响应适配，以及创建 Bucket 时的响应与校验辅助逻辑。核心约定是：业务处理函数返回 `errno.Payload`，中间件再根据接入面把它包装成最终 HTTP JSON。\n\n```mermaid\nflowchart LR\n    H[业务 Handler] --> P[errno.Payload]\n    P --> J[janus.toJanusPayload]\n    J --> R[HTTP 200 JSON]\n    P --> M[指标 / 日志 / Trace]\n    S[service 校验辅助] --> P\n```\n\n## DTO 结构\n\n### `BucketSimpleInfo`\n\n定义在 `dto/page.go`，用于分页查询 Bucket 列表的轻量结果。\n\n```go\ntype BucketSimpleInfo struct {\n    Name     string `gorm:\"column:name\" json:\"name\"`\n    Creator  string `gorm:\"column:creator\" json:\"creator\"`\n    IDC      string `gorm:\"column:idc\" json:\"idc\"`\n    Category string `gorm:\"column:category\" json:\"category\"`\n}\n```\n\n字段同时带有 `gorm` 和 `json` tag，说明它既可直接承接数据库查询结果，也可作为 API 响应序列化对象。`IDC` 表示当前 Bucket 配置中心。\n\n### `PageBucketsResponse`\n\n定义分页列表响应：\n\n```go\ntype PageBucketsResponse struct {\n    Buckets    []*BucketSimpleInfo `json:\"buckets\"`\n    TotalCount int64               `json:\"totalCount\"`\n}\n```\n\n`Buckets` 保存当前页数据，`TotalCount` 保存总数。调用方通常将它作为 `errno.OK(data)` 的 `Data` 返回。\n\n### `TempBucket`\n\n定义在 `dto/tempBucket.go`：\n\n```go\ntype TempBucket struct {\n    meta.Bucket\n    SysTicketID  uint64 `gorm:\"column:sys_ticket_id\" json:\"sys_ticket_id\"`\n    TicketStatus int8   `gorm:\"ticket_status\" json:\"ticket_status\"`\n    ExpiredAt    int64  `gorm:\"expired_at\" json:\"expired_at\"`\n}\n```\n\n`TempBucket` 嵌入 `meta.Bucket`，并追加工单相关字段。它用于临时 Bucket 或审批流程场景，调用关系中可见 `createAndUpdateTosBucket`、`GetValidTempBucketByName`、`UpdateTicketStatusByName`、`DeleteTempBucket` 等逻辑依赖该结构。\n\n注意 `TicketStatus` 的 `gorm` tag 写法是 `gorm:\"ticket_status\"`，不同于其他字段的 `gorm:\"column:...\"` 风格；修改映射逻辑时需要确认 GORM 行为是否符合预期。\n\n## 统一业务响应：`errno.Payload`\n\n`errno.Payload` 是服务内部统一返回结构：\n\n```go\ntype Payload struct {\n    Code    int         `json:\"code\"`\n    Message string      `json:\"message\"`\n    Data    interface{} `json:\"data,omitempty\"`\n    ETag    string      `json:\"etag,omitempty\"`\n    Alert   bool        `json:\"-\"`\n}\n```\n\n字段含义：\n\n- `Code`：业务状态码，不等同于 HTTP 状态码。\n- `Message`：业务状态说明或错误信息。\n- `Data`：响应数据，空值时不输出。\n- `ETag`：缓存或版本校验标识，空值时不输出。\n- `Alert`：内部标记，不参与 JSON 序列化。\n\n成功响应通过 `OK` 或 `OKWithETag` 创建：\n\n```go\npayload := errno.OK(dto.PageBucketsResponse{\n    Buckets:    buckets,\n    TotalCount: total,\n})\n```\n\n```go\npayload := errno.OKWithETag(data, etag)\n```\n\n错误响应有三类构造方式：\n\n```go\nerrno.Error(err)\nerrno.ErrorWithCode(errno.CodeBadRequest, err)\nerrno.ErrorWithCodeAndData(errno.CodeBadRequest, err, detail)\n```\n\n`Error(nil)` 会返回 `OK(nil)`。非空错误会返回 `Code: 600` 和 `err.Error()`；如果需要稳定的业务错误码，应优先使用 `ErrorWithCode` 或预定义错误。\n\n`Payload` 上的 `Error()` 方法返回的是 `error`：\n\n```go\nfunc (p *Payload) Error() error {\n    return errors.New(p.Message)\n}\n```\n\n这不是 Go 标准 `error` 接口要求的 `Error() string`，因此 `Payload` 本身不实现 `error`。它只是一个把 `Payload.Message` 转成 `error` 的辅助方法。\n\n## 错误码与预定义错误\n\n`errno/error.go` 定义了业务错误码。主要分组如下：\n\n- 成功类：`CodeOKZero`、`CodeOK`、`CodeCreated`、`CodePartialContent`\n- 请求错误：`CodeBadRequest`、`CodeUnauthorized`、`CodeForbidden`、`CodeNotFound`、`CodeTooManyRequests`\n- 服务错误：`CodeInternalErr`、`CodeServiceUnavailable`、`CodeVsreErr`、`CodeGetDataErr`、`CodeParseDataErr`、`CodeDbErr`\n\n预定义错误以 `Payload` 变量形式存在，例如：\n\n```go\nvar ErrBucketNotFound = Payload{\n    Code:    CodeNotFound,\n    Message: \"bucket not found\",\n}\n```\n\n这些变量适合用于稳定、可复用的业务失败场景，例如鉴权失败、Bucket 不存在、参数非法、DB 熔断、VSRE 异常等。由于它们是包级变量，业务代码如果需要携带请求级 `Data`，应创建新的 `Payload`，不要修改这些全局变量。\n\n## Janus 响应适配\n\n`janus/response.go` 将内部 `errno.Payload` 转换为 Janus 接口格式：\n\n```go\ntype JanusPayload struct {\n    Code      int         `json:\"code\"`\n    Message   string      `json:\"message\"`\n    RequestId string      `json:\"trace_id\"`\n    Response  interface{} `json:\"response\"`\n}\n```\n\n转换逻辑在 `toJanusPayload` 中：\n\n```go\nfunc toJanusPayload(c *gin.Context, p errno.Payload) JanusPayload {\n    if p.Code == errno.CodeOK {\n        jp.Code = JanusOkCode\n    } else {\n        jp.Code = p.Code\n    }\n\n    jp.Message = p.Message\n    jp.Response = p.Data\n    return jp\n}\n```\n\n内部成功码 `errno.CodeOK` 是 `2000`，Janus 成功码是 `0`。因此 Janus 调用方看到的成功响应为：\n\n```json\n{\n  \"code\": 0,\n  \"message\": \"ok\",\n  \"response\": {}\n}\n```\n\n失败时，Janus 保留原始业务错误码：\n\n```json\n{\n  \"code\": 4004,\n  \"message\": \"bucket not found\",\n  \"response\": null\n}\n```\n\n`ResponseMiddleware` 是实际输出响应的 Gin 中间件。它从 `middleware.ResultDataContextKey` 读取 `errno.Payload`，禁用缓存，然后以 HTTP 200 写出 Janus JSON：\n\n```go\ndataRet, _ := c.Get(middleware.ResultDataContextKey)\ndata := dataRet.(errno.Payload)\n\nc.Writer.Header().Set(\"Cache-Control\", \"max-age=0, no-cache, no-store, must-revalidate, proxy-revalidate\")\nc.Writer.Header().Set(\"Pragma\", \"no-cache\")\nc.Writer.Header().Set(\"Expires\", \"0\")\nc.JSON(http.StatusOK, toJanusPayload(c, data))\n```\n\n该中间件还会：\n\n- 从 `middleware.MKeyContextKey` 读取接口指标名。\n- 从 `PSM` 上下文值读取来源服务，缺省为 `\"unknown\"`。\n- 调用 `util.EmitLatency`、`util.EmitThroughput`、`util.EmitError` 上报指标。\n- 设置 BytedTrace span 名称、来源服务、业务状态码。\n- 当 `data.Code != errno.CodeOK` 时按错误码级别写日志；`CodeInternalErr` 及以上写 error，其余写 warn。\n\n使用该中间件的 Handler 必须保证在上下文中写入 `middleware.ResultDataContextKey`，且值类型必须是 `errno.Payload`，否则这里的类型断言会 panic。\n\n## Service 响应与 Bucket 校验\n\n`service/response.go` 中的公开响应结构是 `CreateBucketResponse`：\n\n```go\ntype CreateBucketResponse struct {\n    AccessKey string `json:\"access_key\"`\n    SecretKey string `json:\"secret_key\"`\n}\n```\n\n它被 `createBucket`、`handleCreateBucketWithAkSkRequest` 等创建 Bucket 流程使用，通常作为 `errno.Payload.Data` 返回。\n\n同一文件还包含创建或更新 Bucket 前的校验与默认 IDC 配置补齐逻辑。\n\n### `validateBkt`\n\n`validateBkt(b *meta.Bucket) error` 负责校验并规范化 `meta.Bucket`：\n\n1. `Name` 不能为空。\n2. `IDC` 为空时使用 `env.IDC()`。\n3. `Providers` 为空时使用旧字段 `Owner`。\n4. 调用 `checkBackendBucketBkt` 校验主 `BackendBucket`。\n5. 遍历 `IdcConfigs`，补齐 `Name`，校验 `IDC` 非空，并校验每个 IDC 配置的 `BackendBucket`。\n\n`checkBackendBucketBkt` 会根据 `BackendType` 解析不同后端配置，并调用对应 SDK 类型的 `Validate()`：\n\n- `meta.BackendTos` → `meta.TosBucket`\n- `meta.BackendS3` → `meta.S3Bucket`\n- `meta.BackendOss` → `meta.OSSBucket`\n- `meta.BackendMosaic` → `meta.MosaicBucket`\n- `meta.BackendGCS` → `meta.GCSBucket`\n- `meta.BackendToBTos` → `meta.ToBTosBucket`\n\n如果 JSON 解析失败，会返回类似 `parse tos bucket error:...` 的错误；如果 SDK 校验失败，则直接返回 `Validate()` 的错误。\n\n### `fillDefaultIDCConfigs`\n\n`fillDefaultIDCConfigs(ctx, b)` 从 TCC 读取默认 IDC 配置，并尝试为 Bucket 追加 `IdcConfigs`：\n\n```go\nif c, ok := tcc.GetDefaultIDCConfigs(b.IDC, b.BackendType); ok && c != nil {\n    for _, defaultIdcConf := range c {\n        idcConfig, err := buildDefaultIDCConfig(b, defaultIdcConf)\n        ...\n        b.IdcConfigs = append(b.IdcConfigs, idcConfig)\n    }\n}\n```\n\n它只记录日志，不向调用方返回错误。单个默认配置构建失败时会写 error 日志，但不会阻断其他配置处理。\n\n### `buildDefaultIDCConfig`\n\n`buildDefaultIDCConfig` 根据当前 Bucket 的后端配置复制出一个新的 `meta.BucketIdcConfig`。目前自动补齐逻辑只处理：\n\n- `meta.BackendTos`\n- `meta.BackendS3`\n- `meta.BackendToBTos`\n\n流程是：\n\n1. 从 `meta.Bucket` 中解析对应后端结构，例如 `b.GetTosBucket()`。\n2. 遍历 `config.DefaultIDCConfig.DefaultBackendFields`。\n3. 使用 `setFieldValue` 通过反射设置字段。\n4. 将修改后的后端结构重新 `json.Marshal` 到 `idcConfig.BackendBucket`。\n\n如果后端类型不是上述三类，函数会返回只包含 `Name` 和 `IDC` 的 `BucketIdcConfig`，`BackendBucket` 保持空值。\n\n### `setFieldValue`\n\n`setFieldValue(obj, fieldName, value)` 是反射字段写入工具。它要求 `obj` 必须是指针，并通过字段名查找结构体字段：\n\n```go\nfieldValue := objValue.FieldByName(fieldName)\n```\n\n类型不完全一致时有两类兼容逻辑：\n\n- 目标字段是 `*bool` 且传入值是 `bool` 时，会自动取地址，兼容 S3 配置。\n- 如果传入值可转换为目标类型，则使用 `Convert` 转换。\n\n否则返回 `field <name> type does not match.`。字段不存在时返回 `field <name> does not exist in the object.`。\n\n这里依赖 `DefaultBackendFields.FieldName` 与 SDK 结构体字段名完全一致，也就是 Go 字段名，而不是 JSON 字段名。新增默认字段配置时需要按 SDK 类型的真实字段名填写。","application-bootstrap":"# Application Bootstrap\n\n## 模块定位\n\nApplication Bootstrap 模块由 `main.go` 承担，是服务的组合根。它负责初始化运行时依赖、构造服务层 API 实例、绑定 Gin 路由，并最终通过 `r.Run()` 启动 HTTP 服务。\n\n该模块不承载具体业务逻辑；业务处理集中在 `service.MetaBucketApi`、`service.IdcProxySettingApi` 及各类中间件、RPC、DB、缓存模块中。`main()` 的主要价值是定义启动顺序和对外 HTTP 面。\n\n## 启动流程\n\n```mermaid\nflowchart TD\n    A[\"main()\"] --> B[\"ginex.Init 与 config.InitConf\"]\n    B --> C[\"util.InitMetrics 与 kms.Init\"]\n    C --> D[\"rpc.InitRpc\"]\n    D --> E[\"db.InitDb 与 jwt.InitJwt\"]\n    E --> F{\"db.Db 是否为空\"}\n    F -->|是| X[\"logs.Fatal 并 panic\"]\n    F -->|否| G[\"InitByteDoc 与 InitTosMetaCache\"]\n    G --> H[\"初始化 service、tcc、中间件缓存\"]\n    H --> I[\"remote_cache.Init 与 mem_limit.InitMemLimiter\"]\n    I --> J[\"注册路由并 r.Run\"]\n```\n\n`main()` 的初始化顺序有依赖关系：\n\n1. `ginex.Init()` 先初始化 Ginex 运行环境。\n2. `config.InitConf(ginex.ConfDir())` 使用 Ginex 配置目录加载服务配置，并在内部执行 `mergeTCCBaseConfig`。\n3. `util.InitMetrics()` 初始化指标上报能力。\n4. `kms.Init()` 初始化 KMS 客户端，执行流会进入 `getIAMAkSk` 获取 IAM AK/SK；失败会直接 `panic`。\n5. `rpc.InitRpc()` 初始化外部 RPC 客户端，执行流包含 `TosPublicV3Client`、`FakeTosPublicV3APi`、`BpmClient`。\n6. `db.InitDb()` 初始化主数据库连接，并写入全局 `db.Db`。\n7. `jwt.InitJwt()` 初始化 JWT 相关能力。\n8. 显式检查 `db.Db == nil`，数据库不可用时通过 `logs.Fatal(\"init db error\")` 和 `panic(\"init db error\")` 终止启动。\n9. `db.InitByteDoc()` 初始化 ByteDoc 相关存储能力。\n10. `db.InitTosMetaCache()` 初始化 TOS 元数据缓存。\n11. `service.InitThirdPartyClient()` 初始化服务层依赖的第三方客户端。\n12. `tcc.InitConfig()` 初始化 TCC 动态配置；失败会 `panic`。\n13. `middleware.StartRefreshAGWTenantAkSkCache()` 启动 AGW 租户 AK/SK 缓存刷新逻辑。\n14. `remote_cache.Init()` 初始化远端缓存；失败会 `panic`。\n15. `mem_limit.InitMemLimiter()` 初始化内存限制器。\n16. 创建 Gin 引擎、注册路由，最后执行 `logs.Fatal(\"%v\", r.Run())`。\n\n`defer logs.Stop()` 在 `main()` 退出前执行，用于收尾日志系统。`code.byted.org/lidar/agent/init` 通过空白导入触发包级副作用初始化，代码中不直接引用其符号。\n\n## API 实例构造\n\n路由注册前会创建两个核心 API 对象：\n\n```go\nproxySettingApi := service.NewIdcProxySettingApi(db.Db)\napi := service.NewMetaBucketApi(db.Db, proxySettingApi)\n```\n\n`service.NewIdcProxySettingApi(db.Db)` 负责 IDC 代理配置相关接口。  \n`service.NewMetaBucketApi(db.Db, proxySettingApi)` 负责 Bucket 元数据、TOS、Volc、BPM、Janus 等主要接口，并依赖 `proxySettingApi` 处理部分 IDC 代理能力。\n\n这两个构造函数都依赖已经初始化完成的 `db.Db`，因此它们必须出现在 `db.InitDb()` 和空值检查之后。\n\n## HTTP 路由结构\n\n所有 HTTP 路由都挂在同一个 `ginex.Default()` 返回的路由引擎上。不同前缀通过不同中间件区分认证、响应格式和调用来源。\n\n| 路由前缀 | 中间件 | 主要用途 |\n| --- | --- | --- |\n| `/bktmeta-api/v1` | `middleware.ResponseMiddleware()` | 主版本 Bucket 元数据接口 |\n| `/bktmeta-api/v2` | `middleware.ZtiResponseMiddleware()` | ZTI 响应格式接口 |\n| `/volcengine-iam/v1` | `middleware.ResponseMiddleware()` | Volcengine IAM AK 管理接口 |\n| `/bktmeta-tob/v1` | `middleware.ResponseMiddleware()` | TOB 凭证查询接口 |\n| `/bktmeta-s/v1` | `middleware.ResponseMiddlewareWithoutAuthCheck()` | 简化版无鉴权 Bucket 查询接口 |\n| `/gateway/v1` | `janus.ResponseMiddleware()` | Janus 网关、运维、BPM 回调、批处理接口 |\n| `/bpm/v1` | `middleware.BPMMiddleware()` | BPM 工单提交与校验接口 |\n| `/bktmeta-openapi/v1` | `middleware.OpenapiMiddleware()` | OpenAPI 版本的完整查询接口 |\n| `/bktmeta-openapi-s/v1` | `middleware.OpenapiMiddleware()` | OpenAPI 版本的简化查询接口 |\n\n## 主要路由分组\n\n### `/bktmeta-api/v1`\n\n该分组是主业务 API，绑定到 `service.MetaBucketApi`：\n\n- `GET /buckets` → `api.GetAllBuckets`\n- `GET /buckets/:name` → `api.GetBucket`\n- `GET /buckets/listByProvider` → `api.ListBucketsByProvider`\n- `POST /buckets` → `api.CreateBucket`\n- `PATCH /buckets/:name` → `api.UpdateBucket`\n- `PUT /buckets/:name` → `api.OverwriteBucket`\n- `DELETE /buckets/:name` → `api.DeleteBucket`\n- `GET /signature` → `api.Signature`\n- `GET /buckets/:name/s3info` → `api.GetTosBucketS3Info`\n- `GET /buckets/tos/authority/all` → `api.GetAllTosAuthorityBuckets`\n- `POST /buckets/createWithAkSk` → `api.CreateBucketWithAkSk`\n- `GET /tob/cred/:name` → `api.GetTobTosBucketBaseInfo`\n\n### `/bktmeta-api/v2`\n\n当前只注册加密 Bucket 查询：\n\n- `GET /buckets/encryption` → `api.GetAllEncryptionBuckets`\n\n该分组使用 `middleware.ZtiResponseMiddleware()`，响应格式和鉴权语义与 v1 不同。\n\n### `/volcengine-iam/v1`\n\n该分组提供 Volcengine IAM 凭证管理：\n\n- `POST /:access_key` → `api.CreateVolc`\n- `PUT /:access_key` → `api.UpdateVolc`\n- `GET /:access_key` → `api.GetVolc`\n- `DELETE /:access_key` → `api.DeleteVolc`\n- `GET /volcs` → `api.GetVolcs`\n\n### `/gateway/v1`\n\n该分组面向 Janus 网关和内部运维流程，使用 `janus.ResponseMiddleware()`。它覆盖几类能力：\n\n- Bucket 查询与测试：`api.GetBucketJanus`、`api.GetAllBucketsJanus`、`api.BucketObjStorageParamTest`、`api.GetBucketTestRecord`\n- VSRE 触发与工单：`api.VsreTrigger`、`api.CreateVsreV2Ticket`、`api.CallbackVsreV2Ticket`\n- IDC 代理配置：`proxySettingApi.GetAllIdcsJanus`、`proxySettingApi.GetIdcProxiesJanus`、`proxySettingApi.CreateIdcJanus`、`proxySettingApi.UpdateIdcJanus`\n- TOS 后端信息：`api.GetTosBackendConfigJanus`、`api.GetTosServiceNodeJanus`、`api.GetTosBpmJanus`\n- Bucket 批量更新：`api.UpdateBucketsIdcJanus`、`api.UpdateBucketsPsmJanus`、`api.UpdateBucketsSkJanus`、`api.CreateBucketBatch`\n- IDC 配置批处理：`api.CreateBucketIDCConfigBatch`、`api.DeleteBucketIDCConfigBatch`\n- Volc 运维：`api.GetVolcJanus`、`api.GetAllVolcsJanus`、`api.VsreVolcTrigger`\n- BPM 回调：`api.QueryTOSBucketBPM`、`api.CreateTOSBucketsBPM`、`api.ModifyTOSBucketLimitsBPM`、`api.CreateTOSBucketCallBack`\n- Region Bucket 同步：`api.CreateRegionBuckets`、`api.QueryRegionBuckets`、`api.UpdateTosAllBucketsDB`、`api.ListAllRegionTosBuckets`\n- 脚本入口：`api.FixBucketExtra`\n\n因为该分组混合了查询、运维、批量写入和回调入口，新增路由时应优先确认调用方是否确实是 Janus 或内部系统，并保持响应格式与 `janus.ResponseMiddleware()` 一致。\n\n### `/bpm/v1`\n\n该分组只暴露 BPM 工单相关入口：\n\n- `POST /bucket/submit` → `api.CreateBucketBPM`\n- `GET /bucket/exist` → `api.CheckBucketExistBPM`\n- `GET /bucket/registered` → `api.CheckBucketRegisteredBPM`\n\n它使用 `middleware.BPMMiddleware()`，不应和普通用户 API 共用中间件。\n\n### OpenAPI 与简化 API\n\n`/bktmeta-openapi/v1` 复用主查询处理函数，例如 `api.GetAllBuckets`、`api.GetBucket`、`api.Signature`、`api.GetTosBucketS3Info`。  \n`/bktmeta-openapi-s/v1` 复用简化查询处理函数，例如 `api.GetAllBucketsSimple`、`api.GetBucketSimple`。\n\n简化 API 只暴露读取能力，不注册创建、更新、删除接口。\n\n## 常量：TOB TOS Region 到 IDC 的映射\n\n`constant/constant.go` 定义了：\n\n```go\nvar TobTosRegionIDCMap = map[string]string{\n    \"cn-beijing\":     env.DC_LFTOBIAAS,\n    \"cn-shanghai\":    env.DC_SHTOBIAAS,\n    \"cn-guangzhou\":   env.DC_GZTOBIAAS,\n    \"cn-guilin-boe\":  env.DC_HLTOBIAAS,\n    \"ap-southeast-1\": \"johortobiaas\",\n}\n```\n\n该映射把 TOB TOS region 转换为 IDC 标识。大部分国内 region 使用 `code.byted.org/gopkg/env` 中的环境常量；`ap-southeast-1` 使用字面量 `\"johortobiaas\"`，注释说明其对应柔佛公有云机房。\n\n维护该映射时需要注意：\n\n- key 是 TOS region 名称，调用方应按 region 查询。\n- value 是 IDC 名称或环境常量值。\n- 新增 region 时应确认对应 IDC 是否已经在 `env` 包中有常量；没有常量时才使用明确的字面量。\n- 该文件不参与 `main()` 启动顺序，但会影响依赖 region 到 IDC 解析的业务逻辑。\n\n## 失败模式\n\n启动阶段采用快速失败策略：\n\n- `kms.Init()` 失败直接 `panic`。\n- `db.Db == nil` 时先 `logs.Fatal(\"init db error\")`，再 `panic(\"init db error\")`。\n- `db.InitByteDoc()` 失败直接 `panic`。\n- `tcc.InitConfig()` 失败直接 `panic`。\n- `remote_cache.Init()` 失败直接 `panic`。\n- `r.Run()` 返回后通过 `logs.Fatal(\"%v\", r.Run())` 记录并终止。\n\n因此，Application Bootstrap 不做降级启动。只要核心依赖不可用，服务就不会继续暴露 HTTP 路由。\n\n## 扩展建议\n\n新增启动依赖时，应放在满足其前置条件的位置。例如依赖配置的初始化应在 `config.InitConf()` 之后；依赖数据库的初始化应在 `db.InitDb()` 和 `db.Db` 空值检查之后；依赖动态配置的逻辑应确认是否需要放在 `tcc.InitConfig()` 之后。\n\n新增 HTTP 接口时，应先判断入口类型：\n\n- 面向主业务调用方：优先放入 `/bktmeta-api/v1` 或后续版本分组。\n- 面向 ZTI 语义：放入 `/bktmeta-api/v2` 并使用 `middleware.ZtiResponseMiddleware()`。\n- 面向 Janus 或内部运维：放入 `/gateway/v1`。\n- 面向 BPM：放入 `/bpm/v1`。\n- 面向 OpenAPI：放入 `/bktmeta-openapi/v1` 或 `/bktmeta-openapi-s/v1`。\n- 只读简化查询：使用已有 simple handler，例如 `GetAllBucketsSimple`、`GetBucketSimple`。\n\n新增路由时应复用已构造的 `api` 或 `proxySettingApi`，避免在 `main()` 中直接引入业务处理逻辑。","authentication-and-security":"# Authentication and Security\n\n## 模块概览\n\nAuthentication and Security 模块负责服务启动阶段的安全依赖初始化、Bucket 访问凭证生成、加密密钥生成与签名下发。相关代码分布在：\n\n- `jwt/jwt.go`：初始化 BPM JWT 生成器。\n- `kms/client.go`：初始化 KMS 客户端、数据密钥、IAM SDK 默认客户端，并提供加解密能力。\n- `service/keygenerator.go`：为 Bucket 生成 AK/SK 和加密配置中的数据密钥。\n- `service/signature.go`：根据 Bucket AK/SK 生成客户端可使用的签名。\n\n该模块不是一个独立服务层，而是被 `main.go`、Bucket 创建流程、中间件鉴权流程和签名接口共同调用。\n\n## 初始化流程\n\n服务启动时，`main.go` 会调用：\n\n```go\nkms.Init()\njwt.InitJwt()\n```\n\n`kms.Init()` 是安全能力的核心初始化入口。它完成以下工作：\n\n1. 使用 `MyPSM` 创建 `gokms.KMSClient`。\n2. 通过 `Client.GetDataKey()` 初始化当前服务自己的 `Cipher`。\n3. 通过 `Client.GetDataKeyByName(\"reqToken\")` 初始化 `ReqTokenCipher`，用于请求 token 解密。\n4. 通过 `Client.DecryptDataKeyByPSM(GatewayPSM)` 初始化 `GatewayCipher`，用于和 storage gateway 共享的密钥体系。\n5. 读取 KMS 配置项 `iamaksk`，并调用 `iamsdk.InitDefaultClient()` 初始化 IAM SDK 默认客户端。\n\n```mermaid\nflowchart TD\n    A[\"main.go 启动\"] --> B[\"kms.Init\"]\n    B --> C[\"NewKMSClient(MyPSM)\"]\n    B --> D[\"GetDataKey\"]\n    B --> E[\"GetDataKeyByName(reqToken)\"]\n    B --> F[\"DecryptDataKeyByPSM(GatewayPSM)\"]\n    B --> G[\"getIAMAkSk\"]\n    G --> H[\"iamsdk.InitDefaultClient\"]\n\n    A --> I[\"jwt.InitJwt\"]\n    I --> J[\"jwt.NewGenerator\"]\n    I --> K[\"BpmGen.Generate\"]\n```\n\n`jwt.InitJwt()` 负责初始化全局变量 `BpmGen`。如果 `config.Conf.TosAPI.Disable` 为 `true`，函数只记录 warning 并跳过初始化。否则它会使用 `config.Conf.ModifyTOSBucketBpmConfig.Partition` 创建 JWT generator，并用 `SecretKey` 调用一次 `Generate()`。这里的错误只会被记录，不会阻止服务继续启动。\n\n## KMS 客户端与密钥\n\n`kms/client.go` 暴露了几个包级变量：\n\n```go\nvar Client *gokms.KMSClient\nvar Cipher *gokms.AesCipher\nvar GatewayCipher *gokms.AesCipher\nvar ReqTokenCipher *gokms.AesCipher\n```\n\n它们由 `kms.Init()` 初始化，后续业务代码直接使用这些全局 cipher。\n\n`GatewayCipher` 用在 Bucket 加密密钥相关逻辑中：\n\n- `NewEncryptedKey(size int)`：生成随机明文 key，并用 `GatewayCipher.Encrypt()` 加密。\n- `Decrypt(ciphertext string)`：使用 `GatewayCipher.Decrypt()` 解密密文。\n\n`ReqTokenCipher` 用在请求鉴权中：\n\n- `DecryptRequestToken(ciphertext string)`：调用 `ReqTokenCipher.DecryptWithMetadata()` 解密带 metadata 的 request token。\n- 调用方包括 `middleware/base.go` 中的 `checkTokenValid`。\n\n`NewEncryptedKey(size int)` 的 `size` 使用 bit 表示，例如 `meta.KeySize256` 会生成 `256 / 8` 字节的随机 key。随机数来源是 `crypto/rand.Read`。如果随机数生成失败，会返回包含实际读取长度的错误；如果 KMS 加密失败，会返回统一错误 `ErrFailedToEncryptWithKMS`。\n\n## Bucket AK/SK 生成\n\n`service/keygenerator.go` 中的 `genAkSk(b *meta.Bucket)` 在 Bucket 创建流程中被 `createBucket` 调用。\n\n逻辑分为三类：\n\n1. 如果 `b.AccessKey` 和 `b.SecretKey` 都已经存在，直接返回。\n2. 如果 `b.BackendType == meta.BackendTos`，从 `b.BackendBucket` 反序列化 `meta.TosBucket`，并复用其中的 `AccessKey` 和 `SecretKey`。\n3. 其他 Bucket 类型会生成新的 AK/SK。\n\n生成函数是：\n\n```go\nfunc genAK() string\nfunc genSK() string\nfunc genRandString(size int, chars []rune) (string, error)\n```\n\nAK 长度为 `SizeAK = 20`，字符集是数字和大写字母。SK 长度为 `SizeSK = 40`，字符集是数字、小写字母和大写字母。\n\n`genRandString()` 使用 `crypto/rand.Read()` 生成随机字节，再通过 `int(r) % len(chars)` 映射到字符集。`genAK()` 和 `genSK()` 在随机数生成失败时会记录错误，并分别返回兜底值 `DefaultAccesskey` 和 `DefaultSecretkey`。\n\n## Bucket 加密密钥生成\n\n`genEncryptionKey(b *meta.Bucket)` 同样在 `createBucket` 中调用，用于处理 `b.EncryptionInfo`。\n\n执行流程：\n\n1. 如果 `b.EncryptionInfo == \"\"`，说明 Bucket 未启用加密，直接返回。\n2. 将 `b.EncryptionInfo` 反序列化为 `meta.EncryptionInfo`。\n3. 如果 `em.Encrypted` 为 `false`，直接返回。\n4. 如果调用方已经传入 `em.Key`，返回错误 `\"pre-defined key is forbidden\"`，禁止外部预置加密 key。\n5. 根据 `em.Method` 生成密钥：\n   - `meta.EncMethodAES256CFB`：调用 `kms.NewEncryptedKey(meta.KeySize256)`。\n   - `meta.EncMethodAES128CFB` 或空 method：调用 `kms.NewEncryptedKey(meta.KeySize128)`，并将 method 规范化为 `meta.EncMethodAES128CFB`。\n6. 将 KMS 加密后的 key 写回 `em.Key`，再序列化回 `b.EncryptionInfo`。\n\n不支持的加密方法会返回 `\"unsupported encrypt method\"`。\n\n## 签名接口\n\n`service/signature.go` 中的入口方法是：\n\n```go\nfunc (api *MetaBucketApi) Signature(c *gin.Context)\n```\n\n它通过 `middleware.Response(c, \"buckets.signature\", api.handleSignatureRequest)` 接入统一响应包装。实际逻辑在 `handleSignatureRequest(c *gin.Context)` 中。\n\n请求需要提供：\n\n- `bucket`\n- `accessKey`\n- `duration` 或 `encodeBody`\n\n密钥查找逻辑如下：\n\n1. 先从本地 `keyMap` 查找 `accessKey`。该 map 中包含几个历史或固定账号。\n2. 如果不在 `keyMap`，调用 `api.getBucket(c, bucket, \"\", \"\", false)` 获取 Bucket。\n3. 校验 `bkt.AccessKey == accessKey`，否则返回 `errno.ErrBucketAkInvalid`。\n4. 使用 Bucket 中保存的 `SecretKey` 生成签名。\n\n签名有两种模式。\n\n`duration` 模式调用：\n\n```go\nfunc buildSignature(accessKey string, secretKey string, duration time.Duration) string\n```\n\n它会生成形如 `deadline: <unix_timestamp>` 的字符串，对该字符串做 URL-safe base64 编码，再用 HMAC-SHA1 和 `secretKey` 对编码后的 deadline 签名。最终返回：\n\n```text\n<accessKey>:<base64_hmac_sha1>:<base64_deadline>\n```\n\n`encodeBody` 模式调用：\n\n```go\nfunc buildSignature2(accessKey, secretKey, encodeBody string) string\n```\n\n它直接对传入的 `encodeBody` 做 HMAC-SHA1 签名，最终返回：\n\n```text\n<accessKey>:<base64_hmac_sha1>:<encodeBody>\n```\n\n如果 `duration` 解析失败，或者既没有 `duration` 也没有 `encodeBody`，接口返回 `errno.ErrSignatureInvalid`。\n\n## 与其他模块的连接\n\nBucket 创建流程依赖本模块补全安全字段：\n\n- `createBucket` 调用 `genAkSk()` 生成或继承 Bucket AK/SK。\n- `createBucket` 调用 `genEncryptionKey()` 生成 Bucket 加密密钥。\n\n请求鉴权依赖 KMS token 解密：\n\n- `middleware/base.go` 中的 `checkTokenValid` 调用 `kms.DecryptRequestToken()`。\n\n加密 Bucket 查询依赖 KMS 解密：\n\n- `handleGetAllEncryptionBucketsRequest` 调用 `kms.Decrypt()` 解密已保存的加密 key。\n\n签名下发接口依赖 Bucket 元数据：\n\n- `MetaBucketApi.Signature()` 通过 `api.getBucket()` 获取 Bucket，并用 Bucket AK/SK 构造签名。\n\n## 贡献注意事项\n\n`kms.Init()` 初始化的是包级全局变量，新增依赖这些变量的代码前，需要确保调用路径发生在服务初始化之后。测试中也需要显式调用 `kms.Init()`，现有 `TestMain` 已覆盖多个包。\n\n`genEncryptionKey()` 明确禁止外部传入明文或预置 key。修改加密算法支持时，应保持这一约束，并通过 `kms.NewEncryptedKey()` 统一生成加密后的 key。\n\n`buildSignature()` 和 `buildSignature2()` 使用的是 HMAC-SHA1 与 `base64.URLEncoding`。调整签名格式会影响现有客户端解析逻辑，不能只改服务端生成逻辑。\n\n`getIAMAkSk()` 在读取 KMS 配置失败时会 `panic`，并且默认假设配置值格式为 `\"accessKey,secretKey\"`。如果要增强健壮性，需要同步考虑启动失败语义和 IAM SDK 初始化依赖。","bucket-persistence":"# Bucket Persistence\n\n## 模块概览\n\nBucket Persistence 模块位于 `db` 包，负责 Bucket 元数据的持久化、加解密、IDC 配置维护、参数测试记录、临时建桶工单，以及 TOS 全量 Bucket 元数据缓存与跨 Region 同步。\n\n模块主要覆盖以下存储面：\n\n- MySQL/GORM 表：\n  - `t_bucket`：主 Bucket 元数据\n  - `t_bucket_idc_config`：按 IDC 覆盖的后端 Bucket 配置\n  - `t_bucket_param_test_record`：Bucket 参数测试记录\n  - `t_new_bucket_temp`：临时建桶/审批工单\n- Bytedoc/Mongo 集合：\n  - `RegionTosAllBuckets`：按 Region 保存 TOS 全量 Bucket 快照\n\n核心设计原则是：写入前加密敏感字段，读取后按场景解密或保持密文；主 Bucket 和 IDC 配置在事务中保持一致；TOS 元数据通过后台任务定期同步到内存缓存。\n\n```mermaid\nflowchart LR\n    调用方 --> DbHandler\n    DbHandler --> Bucket表[t_bucket]\n    DbHandler --> IDC配置表[t_bucket_idc_config]\n    DbHandler --> 测试记录表[t_bucket_param_test_record]\n    DbHandler --> 临时工单表[t_new_bucket_temp]\n    DbHandler --> 加解密[kms.Cipher]\n    后台任务 --> Tos缓存[AllTosMetaCache]\n    Tos缓存 --> Region快照[RegionTosAllBuckets]\n```\n\n## 主 Bucket 持久化\n\n主入口定义在 `db/bucket.go`，围绕 `DbHandler` 方法实现。所有数据库操作都会通过 `util.EmitThroughput` 和 `util.EmitLatency` 上报命令吞吐和耗时，并通过 `retry.Do` 或 `retry.DoCanAbort` 包裹重试逻辑。\n\n### 创建 Bucket\n\n`CreateBucket(ctx, bucket)` 的流程：\n\n1. 调用 `encryptBucket(bucket)`，加密 `meta.Bucket` 的敏感字段。\n2. 开启写库事务：`db.w.Begin().Context(ctx)`。\n3. 使用 `IdGenCli.Get(util.WithoutCancel(ctx))` 为 `bucket.Id` 生成 ID。\n4. 写入 `t_bucket`。\n5. 如果 `bucket.IdcConfigs` 非空，使用 `IdGenCli.MGet` 批量生成配置 ID，并逐条写入 `t_bucket_idc_config`。\n6. 提交事务；任一步失败时调用 `RollbackTX(tx, err)`。\n\n需要注意：`encryptBucket` 会原地修改传入的 `bucket`，调用完成后对象中的 `AccessKey`、`SecretKey`、`BackendBucket` 以及 `IdcConfigs[*].BackendBucket` 已经变为密文或重新序列化后的内容。\n\n### 更新 Bucket\n\n`UpdateBucket(ctx, bucket)` 用于完整更新主 Bucket 的核心字段，并重建 IDC 配置：\n\n1. 先调用 `encryptBucket(bucket)`。\n2. 在事务中按 `name` 更新 `t_bucket` 的字段，包括 `BackendBucket`、`BackendType`、`Owner`、`Providers`、`IDC`、`Category`、`AccessKey`、`SecretKey`、`TTL`、`Extra`、`HijackConf`、`GatewayConf` 等。\n3. 查询并删除该 Bucket 已存在的全部 `t_bucket_idc_config`。\n4. 为当前 `bucket.IdcConfigs` 重新生成 ID 并插入。\n\n因此，`UpdateBucket` 对 IDC 配置采用“先删后建”的语义，不保留旧配置 ID。\n\n`OverwriteBucket(ctx, bucket)` 也会调用 `encryptBucket(bucket)`，但只更新 `t_bucket` 主表，不处理 `t_bucket_idc_config`。它使用 `map[string]interface{}` 作为更新字段集合，适合只覆盖主表属性的场景。\n\n### 删除 Bucket\n\n`DeleteBucket(ctx, name)` 在同一事务内：\n\n1. 从 `t_bucket` 按 `name` 读取 Bucket。\n2. 删除 `t_bucket` 中该名称的记录。\n3. 删除 `t_bucket_idc_config` 中同名配置。\n\n删除逻辑以 Bucket 名称作为关联键，而不是以主键 ID 关联。\n\n## 查询路径与解密语义\n\n模块区分“密文读取”和“解密读取”。\n\n### 密文读取\n\n以下方法直接返回数据库中的密文数据，不调用 KMS 解密：\n\n- `GetUndecryptedBucketByName(ctx, name)`\n- `BatchGetUndecryptedBucket(ctx, names)`\n- `GetUndecryptedAllBuckets(ctx)`\n- `BatchGetUndecryptedAllBuckets(ctx, batchSize)`\n- `GetAllBucketNames(ctx)`\n\n`GetUndecryptedBucketByName` 使用 `retry.DoCanAbort`：当 GORM 返回 `gorm.ErrRecordNotFound` 时会中止重试，避免对不存在记录做无意义重试。\n\n`BatchGetUndecryptedBucket` 和 `GetUndecryptedAllBuckets` 都会额外查询 `t_bucket_idc_config`，按 `config.Name` 分组后回填到对应 `meta.Bucket.IdcConfigs`。没有 IDC 配置时，会填充空切片，而不是保留 `nil`。\n\n`BatchGetUndecryptedAllBuckets(ctx, batchSize)` 先通过 `GetAllBucketNames` 获取所有名称，再按批次调用 `BatchGetUndecryptedBucket`，用于避免一次性拉取过大的 Bucket 集合。\n\n### 解密读取\n\n`GetBucketByName(ctx, name, ignoreAkSk)` 先调用 `GetUndecryptedBucketByName`，成功后调用 `DecryptBucketWithConfig`。\n\n`ListBucketsByProvider(ctx, provider)` 查询 `owner = provider` 的 Bucket 列表，然后逐个调用 `DecryptBucketWithConfig(ctx, bucket, false)`。该方法只查询主表，不回填 IDC 配置。\n\n`DecryptBucketsWithConfig(ctx, buckets, ignoreAkSk)` 会并发解密列表中的每个 Bucket，内部使用 `sync.WaitGroup`，每个 Bucket 一个 goroutine。\n\n### `ignoreAkSk` 的含义\n\n`DecryptBucketWithConfig(ctx, bucket, ignoreAkSk)` 会处理三类数据：\n\n- `bucket.AccessKey`\n- `bucket.SecretKey`\n- `bucket.BackendBucket` 以及每个 `IdcConfigs[*].BackendBucket`\n\n当 `ignoreAkSk == false` 时，会尝试解密并回填明文 AK/SK。\n\n当 `ignoreAkSk == true` 时：\n\n- `bucket.AccessKey` 和 `bucket.SecretKey` 会被置空。\n- 后端 Bucket 中的访问凭证字段也会被置空，例如 S3 的 `Secret`/`KeyID`、TOS 的 `AccessKey`/`SecretKey`、GCS 的 `Credential` 等。\n- 非敏感配置仍会被解析、校验并重新序列化返回。\n\n这适合面向控制台或只需要展示配置但不能暴露密钥的接口。\n\n## 后端 Bucket 加解密\n\n`encryptBucket` 和 `DecryptBucketWithConfig` 都会委托到后端类型相关函数：\n\n- `encryptBackendBucket(backendType, bucketName, backendBucket)`\n- `decryptBackendBucket(backendType, bucketName, backendBucket, ignoreAkSk)`\n\n后端配置本质上是一个 JSON 字符串。代码会根据 `meta.Backend*` 类型调用 SDK 解析函数，例如：\n\n- `meta.GetTosBucket`\n- `meta.GetS3Bucket`\n- `meta.GetOSSBucket`\n- `meta.GetMosaicBucket`\n- `meta.GetGCSBucket`\n- `meta.GetP2PBucket`\n- `meta.GetTobTosBucket`\n- `meta.GetToBCustomerS3Bucket`\n- `meta.GetHDFSBucket`\n\n解析后会加密或解密对应敏感字段，再调用 `Validate()` 校验，最后 `json.Marshal` 回字符串。\n\n无需加密的后端类型会直接返回原始字符串：\n\n- `meta.BackendLarkDrive`\n- `meta.BackendFS`\n\n`meta.BackendHDFS` 会解析并校验，但没有敏感字段加解密。\n\nTOS 解密路径还有额外逻辑：如果 `TosMetaCache.GetTosMeta(tosBkt.Name)` 命中，会用 TOS 元数据补充 `Public`、`Creator`，并在 TOS Bucket 创建超过一天后使用缓存中的 `TTL`。\n\n## IDC 配置管理\n\n`db/bucket_idc_config.go` 提供独立的 IDC 配置增删接口。\n\n`CreateBucketIDCConfigs(ctx, bucketName, backendType, idcConfigs)`：\n\n1. 调用 `encryptBucketIDCConfigs(bucketName, backendType, idcConfigs)`。\n2. 开启事务。\n3. 使用 `IdGenCli.MGet(util.WithoutCancel(ctx), len(idcConfigs))` 批量生成 ID。\n4. 逐条插入 `t_bucket_idc_config`。\n\n`DeleteBucketIDCConfigs(ctx, bucketName, idcList)`：\n\n- 按 `name = bucketName and idc in (?)` 删除配置。\n- 不修改主 Bucket 表。\n\n`encryptBucketIDCConfigs` 会遍历每个 `meta.BucketIdcConfig`，只加密其 `BackendBucket` 字段，不处理主 Bucket 的 `AccessKey` 或 `SecretKey`。\n\n## Bucket 参数测试记录\n\n参数测试记录同样定义在 `db/bucket.go`。\n\n`CreateBucketTestRecord(ctx, bkt)` 会构造 `meta.BucketParamTestRecord`：\n\n- `BucketName` 来自 `bkt.Name`\n- `IDC` 来自 `bkt.IDC`\n- `BackendBucket`、`BackendType` 来自当前 Bucket 参数\n- `TestStatus` 初始为 `meta.Bucket_Testing`\n- `BucketDefaultConfig` 根据 `len(bkt.IdcConfigs) == 0` 判断\n- `Validate` 初始为 `true`\n\n事务内会先把同 Bucket、同 IDC、仍有效的旧记录置为 `validate = false`，再插入新记录。随后根据 `BucketDefaultConfig` 更新测试状态：\n\n- 默认配置：更新 `t_bucket.test_status`\n- IDC 配置：更新 `t_bucket_idc_config.test_status`\n\n`GetBucketTestRecord(ctx, bktName, idc)` 只查询 `validate = 1` 的当前有效记录。\n\n`UpdateBucketTestResult(ctx, record, testStatus, err)` 更新测试记录的 `TestStatus` 和 `ErrorMsg`，并同步更新主 Bucket 或 IDC 配置的 `TestStatus`。该方法不向调用方返回错误，只在数据库更新失败时通过 `logs.CtxError` 记录日志。\n\n## 临时 Bucket 工单\n\n`db/temp_bucket.go` 管理 `t_new_bucket_temp`，用于建桶审批或临时申请流程。\n\n状态常量：\n\n- `TicketWaitingForApprove = 0`\n- `TicketExpired = -1`\n- `TicketSuccess = 1`\n\n主要方法：\n\n- `CreateTempBucket(ctx, bucket)`：生成 ID 并插入临时 Bucket。\n- `DeleteTempBucket(ctx, name)`：按名称删除。\n- `GetAllWaitingTempBucketsFromDB(ctx)`：查询所有待审批工单。\n- `GetValidTempBucketByName(ctx, name)`：查询 `ticket_status != -1` 的有效工单。\n- `UpdateTicketStatusByName(ctx, name, status)`：更新工单状态。\n\n`UpdateTicketStatusByName` 有一个重要约束：SQL 条件包含 `ticket_status != TicketSuccess`，表示工单一旦成功，不会再被覆盖成其他状态。若更新为 `TicketExpired`，会同步设置 `ExpiredAt = time.Now().Unix()`。\n\n`tosapi.go` 中的 `scanAllTicketStatus(ctx, expireElapse)` 会周期性扫描待审批工单，超过指定分钟数后调用 `UpdateTicketStatusByName` 标记过期。\n\n## Region TOS Bucket 快照\n\n`db/bucket_doc.go` 抽象了 Region 维度的 TOS 全量 Bucket 快照。\n\n核心接口是 `RegionBucketsApi`：\n\n```go\ntype RegionBucketsApi interface {\n\tCreateRegionBuckets(ctx context.Context, doc *RegionTosAllBucketsDB) error\n\tQueryRegionBuckets(ctx context.Context, doc *RegionTosAllBucketsDB) error\n\tUpdateTosAllBucketsDB(ctx context.Context, doc *RegionTosAllBucketsDB) error\n\tListAllRegionTosBuckets(ctx context.Context) ([]*RegionTosAllBucketsDB, error)\n}\n```\n\n数据结构为 `RegionTosAllBucketsDB`：\n\n- `Region`：Region 名称\n- `LastUpdateTime`：版本时间，使用 UnixNano\n- `AllBuckets`：`[]*rpc.AdminBucketV1`\n\n模块提供两套实现：\n\n- `regionBucketApiImpl`：直接访问 Mongo collection。\n- `regionBucketApiRemoteImpl`：通过 Hertz HTTP 调用远端 gateway 接口。\n\n### 本地 Mongo 实现\n\n`regionBucketApiImpl` 直接操作 `tosAllBucketsCol`：\n\n- `CreateRegionBuckets`：`InsertOne`\n- `QueryRegionBuckets`：按 `region` 查询并 Decode\n- `UpdateTosAllBucketsDB`：按 `region + lastUpdateTime` 做乐观更新，更新 `lastUpdateTime` 和 `allBuckets`\n- `ListAllRegionTosBuckets`：按 `region` 排序批量读取\n\n`UpdateTosAllBucketsDB` 的过滤条件包含旧 `LastUpdateTime`，用于避免覆盖已被其他进程更新过的版本。\n\n### 远程实现\n\n`regionBucketApiRemoteImpl` 通过 `DoReq` 发送 HTTP 请求：\n\n- `CreateRegionBuckets`：`POST /gateway/v1/region_buckets/create`\n- `QueryRegionBuckets`：`POST /gateway/v1/region_buckets/query`\n- `UpdateTosAllBucketsDB`：`POST /gateway/v1/region_buckets/update`\n- `ListAllRegionTosBuckets`：`POST /gateway/v1/region_buckets/list`\n\n`DoReq` 会把标准 `http.Request` 转为 Hertz `protocol.Request`，设置 `X-Tt-From`，并根据配置附加服务发现参数：\n\n- `discovery.WithSD`\n- `discovery.WithDestinationCluster`\n- `discovery.WithDestinationIDC`\n- `discovery.WithDestinationENV`\n\n响应状态码必须在 2xx 范围内，业务响应 `Code` 必须等于 `janus.JanusOkCode`。\n\n`ListAllRegionTosBuckets` 在拿到远端结果后，会逐个调用 `UpsertLocalRegionBuckets` 尝试写回本地缓存集合。\n\n### 本地写回优化\n\n`UpsertLocalRegionBuckets(ctx, doc)` 用于把远端 Region 快照写回本地 Mongo。它有几个保护条件：\n\n- `doc == nil` 时直接返回。\n- `writeBack == false` 时跳过。\n- `localTosAllBucketsCol == nil` 时跳过。\n\n实际更新前会先做一次轻量查询，只投影 `lastUpdateTime`，避免把几十 MB 的 `allBuckets` 拉回本地。如果本地版本不旧于入参版本，则直接跳过。\n\n真正更新时使用条件：\n\n```go\nfilter := bson.M{\n    \"region\":         doc.Region,\n    \"lastUpdateTime\": bson.M{\"$lt\": doc.LastUpdateTime},\n}\n```\n\n并设置 `Update().SetUpsert(true)`。这样可以避免并发场景下旧数据覆盖新数据。\n\n## TOS 元数据缓存\n\n`db/tosapi.go` 中的 `AllTosMetaCache` 是内存缓存结构：\n\n- `BucketCache sync.Map`：`map[string]*rpc.AdminBucketV1`\n- `BucketListCache []*meta.TosBucket`：转换后的 TOS Bucket 列表缓存\n- `BucketListCacheExpireAt int64`：列表缓存过期时间\n- `RegionVersionMap sync.Map`：`map[string]int64`，记录各 Region 已应用的快照版本\n\n`InitTosMetaCache()` 初始化全局 `TosMetaCache`，并启动后台任务：\n\n1. 立即调用 `asyncUpdateAllTosBktCache(context.Background())` 初始化缓存。\n2. 每 5 分钟刷新一次 TOS Bucket 缓存。\n3. 如果 `config.Conf.SyncTosBuckets` 为真，每 5 分钟执行 `asyncUpdateAllTosBucketsIntoBytedoc`。\n4. 每 10 分钟执行 `scanAllTicketStatus` 扫描过期临时工单。\n\n如果 `config.Conf.TosAPI.Disable` 为真，会跳过 TOS 元数据缓存初始化。\n\n### 缓存刷新流程\n\n`asyncUpdateAllTosBktCache(ctx)` 的数据来源有两个：\n\n1. `Db.BatchGetUndecryptedAllBuckets(ctx, 300)` 读取 bktmeta 数据库中的 Bucket，用于解决重名 Bucket 的 IDC 冲突。\n2. `TosRegionBucketsApi.ListAllRegionTosBuckets(ctx)` 获取所有 Region 的 TOS 快照。\n\n每个 Region 的快照只有在 `RegionVersionMap` 中不存在，或远端 `LastUpdateTime` 更大时才会应用。\n\n写入 `BucketCache` 前会检查 Region 与 IDC 的允许关系。`regionAllowUpdateIdcs` 定义了每个 Region 可更新的 IDC 集合。对于 `cn`、`maliva`、`sg1`、`useast2a`、`useast5` 等容易混乱的 IDC，`needCheckAllowIdc` 会要求更严格的校验。\n\n当发现 TOS 缓存已有同名 Bucket 且 IDC 不一致时，会参考 `bktmetaBucketCache` 中的数据库记录：如果数据库中该 Bucket 的 IDC 也不等于新元数据的 IDC，则跳过这次更新。\n\n### TOS 列表转换\n\n`GetAllTosBuckets()` 会把 `BucketCache` 中的 `rpc.AdminBucketV1` 转成 `meta.TosBucket`。结果缓存 1 分钟，期间重复调用直接返回 `BucketListCache`。\n\n转换时会根据 IDC 推导 Region：\n\n- `IDC == \"cn\"` 时使用 `env.R_CN`\n- 其他 IDC 使用 `env.GetRegionFromIDC`\n\n生成的 `meta.TosBucket` 会填充 `Name`、`Cluster`、`IDC`、`Region`、`PSM`、`Type`、`Creator`、`Public`、`TTL` 等字段。\n\n### 同步 TOS 快照到 Bytedoc\n\n`asyncUpdateAllTosBucketsIntoBytedoc(ctx)` 用于把当前 Region 的 TOS 全量 Bucket 同步到 `RegionTosAllBuckets`。\n\n流程：\n\n1. 查询当前 Region 的已有快照：`TosRegionBucketsApi.QueryRegionBuckets`。\n2. 如果快照更新时间未超过 5 分钟，则跳过。\n3. 调用 `rpc.TosV3Cli.GetAllBuckets(ctx)` 获取全量 Bucket。\n4. 调用 `rpc.TosV3Cli.GetAllBucketsWithCache(ctx)` 获取 TTL 信息。\n5. 如果旧数据非空且新 Bucket 数量少于旧数量，则跳过更新，避免异常少量数据覆盖正常快照。\n6. 使用 `getIdcFromAdminBkt` 从 `AdminBucketV1.VRegion` 解析 IDC，并合并 TTL。\n7. 已有快照则调用 `UpdateTosAllBucketsDB`，否则调用 `CreateRegionBuckets`。\n\n`getIdcFromAdminBkt` 解析 `VRegion` 的格式类似 `Singapore-Central/sg1/Default/Gcs`，取第二段作为 IDC，并对 `CN-3DC`、`CN-ZG`、`CN6-3DC` 做特殊映射。\n\n## 事务、重试与上下文\n\n写路径基本都采用以下模式：\n\n```go\nreturn retry.Do(retryInfo, db.retryTimes, db.retryTimeout, func() error {\n    tx := db.w.Begin().Context(ctx)\n    // 写主表或关联表\n    if err != nil {\n        return RollbackTX(tx, err)\n    }\n    return tx.Commit().Error\n})\n```\n\n读路径使用 `db.r.Table(...).Context(ctx)`，写路径使用 `db.w.Begin()`。\n\n生成 ID 的调用通常使用 `util.WithoutCancel(ctx)`，例如 `CreateBucket`、`UpdateBucket`、`CreateBucketIDCConfigs`。这表示即使外层请求上下文取消，ID 生成仍不直接跟随取消信号中断。\n\n`GetUndecryptedBucketByName` 使用 `retry.DoCanAbort` 区分可重试错误与不可重试错误。其他查询多使用普通 `retry.Do`。\n\n## 贡献时需要注意的点\n\n新增后端类型时，需要同时更新：\n\n- `encryptBackendBucket`\n- `decryptBackendBucket`\n\n并确保：\n\n- 使用对应的 `meta.Get*Bucket` 解析函数。\n- 对所有敏感字段调用 `kms.Cipher.Encrypt` / `kms.Cipher.Decrypt`。\n- 调用 `Validate()` 后再序列化。\n- `ignoreAkSk` 分支清空所有凭证字段。\n- 不需要加密的后端类型应明确直接返回原始配置。\n\n修改 Bucket 写路径时，需要确认是否应同步处理 IDC 配置：\n\n- 需要重建 IDC 配置：使用或调整 `UpdateBucket`。\n- 只覆盖主表：使用或调整 `OverwriteBucket`。\n- 只新增/删除 IDC 配置：使用 `CreateBucketIDCConfigs` / `DeleteBucketIDCConfigs`。\n\n调用解密读取接口时，需要根据接口暴露范围选择 `ignoreAkSk`。面向外部展示或控制台列表时，通常应避免返回明文凭证。\n\n处理 TOS 缓存逻辑时，需要保持 `RegionVersionMap` 和 `regionAllowUpdateIdcs` 的约束，否则可能在跨 Region 同名 Bucket 场景下污染缓存。","bucket-service":"# Bucket Service\n\n## 模块概览\n\nBucket Service 以 `MetaBucketApi` 为核心，负责 bucket 元数据的创建、查询、更新、删除、缓存刷新，以及 TOS、ToB TOS、Volcengine、Janus 管理端等场景的适配。模块主要位于 `service/bucket_handler.go`，并由 `async_task.go`、`bucket_simple_handler.go`、`tos_handler.go`、`tos_s3_bucket_handler.go`、`volcengine_handler.go`、`script.go` 等文件补充后台刷新、简化接口和运维脚本能力。\n\n该模块不直接暴露裸数据结构给 HTTP 层，而是通过 `middleware.Response` / `middleware.ResponseZti` 包装 handler，例如 `GetBucket` 调用 `handleGetBucketRequest`，再进入 `getBucketByName` 和 `getBucket`。统一返回值使用 `errno.Payload`，成功响应通常由 `errno.OK` 或 `errno.OKWithETag` 构造。\n\n## 核心对象\n\n`MetaBucketApi` 是模块的服务对象，持有数据库句柄、缓存、IDC 代理配置、StorageGW 客户端和 ToB TOS 区域配置：\n\n```go\ntype MetaBucketApi struct {\n    bucketCache       sync.Map\n    allBucketsCache   sync.Map\n    simpleBucketCache sync.Map\n\n    allSimpleBucketsCache   atomic.Value\n    decryptedAllBucketCache atomic.Value\n\n    tobTosBktCache         sync.Map\n    bucketsByProviderCache sync.Map\n    dbh                    *db.DbHandler\n    idcProxySettingApi     *IdcProxySettingApi\n    storageGwCli           *storagegw.Client\n    dbKeyLock              util.KeyLock\n    tosTobRegionEndpoints  []*TosTobRegionEndpoint\n    encryptBucketsCache    bucketEncryptInfoCache\n}\n```\n\n主要缓存含义如下：\n\n| 缓存字段 | 内容 | 使用场景 |\n| --- | --- | --- |\n| `bucketCache` | 单个 bucket 的本地缓存，缓存未解密原始对象或空值 | `getBucket` |\n| `allBucketsCache` | 全量 bucket 响应字节与 ETag，按 `idc` 和请求 IDC 分组 | `handleGetAllBucketsRequest` |\n| `simpleBucketCache` | simple 单 bucket 缓存 | `GetBucketSimple` |\n| `allSimpleBucketsCache` | simple 全量 bucket 响应字节与 ETag | `GetAllBucketsSimple` |\n| `decryptedAllBucketCache` | 已解密但未计算单元化配置的全量 bucket | 避免新 IDC 组合穿透 DB |\n| `tobTosBktCache` | ToB TOS bucket 基础信息缓存 | `GetTobTosBucketBaseInfo` |\n| `bucketsByProviderCache` | provider 到 bucket 列表缓存 | `ListBucketsByProvider` |\n| `encryptBucketsCache` | 加密 bucket 信息，短期缓存 1 分钟 | `GetAllEncryptionBuckets` |\n\n`NewMetaBucketApi` 初始化这些缓存、StorageGW 客户端和 ToB TOS 区域配置，并同步执行一次 `asyncUpdateAllBktCache`。如果初始缓存构建失败，服务会 panic。随后它启动后台 goroutine，按 `tcc.GetLocalCacheRefreshInterval` 返回的间隔周期刷新全量缓存，并监听 `tcc.LocalCacheRefreshIntervalTccKey` 动态调整刷新周期。\n\n## 查询主流程\n\n单 bucket 查询入口是 `GetBucket`，核心路径是 `handleGetBucketRequest` → `getBucketByName` → `getBucket`。`getBucket` 的读取顺序是本地缓存、远程缓存、数据库。\n\n```mermaid\nflowchart TD\n    A[\"GetBucket\"] --> B[\"handleGetBucketRequest\"]\n    B --> C[\"getBucketByName\"]\n    C --> D{\"是否 nocache\"}\n    D -- \"是\" --> E[\"getBucketFromDBForSdk\"]\n    D -- \"否\" --> F[\"getBucket\"]\n    F --> G{\"bucketCache 命中\"}\n    G -- \"是\" --> H[\"processBucket\"]\n    G -- \"否\" --> I{\"remote_cache 命中\"}\n    I -- \"是\" --> H\n    I -- \"否\" --> J[\"getUndecryptedBucketFromDBWithTypeRegion\"]\n    J --> H\n    H --> K[\"errno.OK\"]\n```\n\n`processBucket` 做两件事：\n\n1. 调用 `db.DecryptBucketWithConfig(ctx, bkt, ignoreAkSk)` 解密 bucket 配置。\n2. 调用 `calcIdcConfigs(ctx, queryIdc, requestEnvIdc, bkt)` 计算单元化配置和代理信息。\n\n`getBucketByName` 支持通过请求头 `X-TT-From` 触发绕过缓存。当前 `nocache` 白名单包括 `toutiao.videoarch.vod` 和 `toutiao.videoarch.aether`。\n\n## 全量查询与 ETag\n\n`GetAllBuckets` 由 `handleGetAllBucketsRequest` 处理。请求会先经过 `util.BktMetaLocalLimiter.Allow(util.AllBucketLimiter)` 限流，然后读取查询参数 `idc` 和请求头 `client.ENV_IDC_HEADER`，生成缓存 key：\n\n```go\nfunc getAllBucketCacheKey(queryIdc, requestEnvIdc string) string {\n    return allBktCacheKey + \"_\" + queryIdc + \"_\" + requestEnvIdc\n}\n```\n\n如果 `allBucketsCache` 命中，直接返回 `errno.OKWithETag(cacheVal.cachedResp, cacheVal.etag)`。如果未命中，则优先从 `decryptedAllBucketCache` 复制全量 bucket，再按当前 IDC 组合调用 `calcIdcConfigs`，最后通过 `bucketsToCacheItem` 生成响应字节和 ETag。\n\n只有在 `decryptedAllBucketCache` 不存在时，才会走数据库兜底。兜底逻辑用 `api.dbKeyLock.TryLock(cacheKey)` 做进程内 single-flight，最多重试 `dbRequestRetryTimes` 次，每次失败后 sleep 500ms。\n\n## simple 查询\n\n`GetAllBucketsSimple` 和 `GetBucketSimple` 面向轻量元数据场景。\n\n`GetAllBucketsSimple` 使用 `allSimpleBucketsCache`，响应同样包含 ETag。缓存缺失时通过 `getAllBucketsFromDBWithTypeRegion(c, true)` 查询，并传入 `ignoreAkSk=true`，避免返回 AK/SK。\n\n`GetBucketSimple` 先读 `simpleBucketCache`。如果本地没有注册 bucket，会从 `db.TosMetaCache.GetTosMeta(bucketName)` 构造一个未注册的 TOS bucket：\n\n```go\nfunc (api *MetaBucketApi) buildBktFromTosAdminBucket(ctx context.Context, tosAdminBucket *rpc.AdminBucketV1) *meta.Bucket\n```\n\n该 fallback 会设置 `Unregistered: true`，并填充 `BackendBucket` 为 `meta.TosBucket` 的 JSON。\n\n## 缓存刷新与远程缓存\n\n`asyncUpdateAllBktCache` 是全量缓存刷新核心。它会创建带 logid 的 tracing context，并开启 `BktMeta/AsyncUpdateAllBktCache` span。\n\n远程缓存启用时，刷新流程优先读取 `bucketNameSetKey` 保存的 bucket name 集合，再通过 `PipelineGet` 批量获取 bucket。对于缓存 miss、空值缓存、逻辑过期的数据，会按 `cacheConfig.RefreshBatchSize` 分批调用 `batchGetUndecryptedBucketsFromDBWithTypeRegion` 回源 DB，并通过 `PipelineSet` 写回远程缓存。\n\n如果远程缓存 name set 为空，`initRemoteCache` 会用 `setAllBucketsNxKey` 做分布式锁，只允许一个实例从 DB 初始化全量远程缓存。`syncBucketNamesWithDB` 是兜底对账逻辑，用 `syncBucketNamesWithDBNxKey` 限制单实例执行，对比 `dbh.GetAllBucketNames` 和远程缓存集合，补充缺失 name 或删除多余 name。\n\n本地全量缓存刷新顺序：\n\n1. 获取未解密全量 bucket。\n2. 复制一份 `allSimpleBkts`，调用 `db.DecryptBucketsWithConfig(traceCtx, allSimpleBkts, true)`，构建 simple 全量和单 bucket 缓存。\n3. 对原始 `allBkts` 调用 `db.DecryptBucketsWithConfig(traceCtx, allBkts, false)`，存入 `decryptedAllBucketCache`。\n4. 遍历已有 `allBucketsCache` key，对不同 `queryIdc/requestEnvIdc` 组合重新计算 `calcIdcConfigs` 并更新响应缓存。\n5. 调用 `syncBucketNamesWithDB` 对账远程 name set。\n\n## 创建、更新和删除\n\n`CreateBucket` 入口绑定 `meta.Bucket` 后调用 `createBucket`。核心步骤是：\n\n1. 如果是 `meta.BackendTos`，解析 `bucket.GetTosBucket()`，调用 `fillTosBktInfo` 补充 PSM、Public、TTL，并尝试通过 `rpc.TosV3Cli.AppendBucketManager` 添加 `videoarch_bktmetaapi` 为管理员。\n2. 如果是 `meta.BackendToBTos`，调用 `fillTobTosIDC` 根据 region 补齐 IDC。\n3. 调用 `validateBkt` 校验 bucket。\n4. 调用 `genAkSk` 生成 AK/SK。\n5. 调用 `genEncryptionKey` 生成加密 key。\n6. 未传 `IdcConfigs` 时调用 `fillDefaultIDCConfigs` 自动补默认单元化配置。\n7. 调用 `api.dbh.CreateBucket` 落库。\n8. 调用 `removeBucketCache` 清理本地缓存，并异步删除远程单 bucket 缓存、把 bucket name 加入远程 name set。\n\n`UpdateBucket` 和 `OverwriteBucket` 分别进入 `updateBucket`、`overwriteBucket`，都会执行 `validateBkt`、写 DB、清理本地缓存，并在远程缓存开启时异步删除对应 key。\n\n`DeleteBucket` 调用 `deleteBucket`，先 `api.dbh.DeleteBucket`，再清理本地缓存，并异步从远程 name set 删除 bucket name、删除远程单 bucket 缓存。\n\n## IDC、Region 与代理计算\n\n`calcIdcConfigs` 是 bucket 返回前的关键加工函数。它根据 `queryIdc` 选择匹配的 `BucketIdcConfig`，并把匹配配置覆盖到 bucket 的 `BackendBucket`、`IDC`、`IDCType`、`IDCRegion`、`HijackConf`、`GatewayConf` 等字段。\n\n如果请求环境 IDC 是聚合机房，并且 bucket IDC 是 `cn` 或 `lf,hl`，函数会把 bucket IDC 调整到对应中心 IDC。之后它会基于 `getIdcMap` 返回的 IDC 代理配置，为跨 IDC 访问场景填充 `bkt.Proxies`。\n\n`fillIdcTypeAndRegion` 和 `getIdcTypeAndRegion` 用于在 DB 读取后补齐 `IDCRegion` 和 `IDCType`。它兼容 `cn`、包含 `oss` 的老 IDC、逗号分隔多 IDC，以及聚合 IDC、中心 IDC、边缘 IDC 的类型判断。\n\n## TOS 相关能力\n\n`fillTosBktInfo` 会优先从 `db.TosMetaCache.GetTosMeta` 获取 TOS 管理面元数据；缓存没有时，调用 `rpc.TosV3Cli.QueryBucket` 查询 TOS，并用 `filterTOSPSM` 去掉 PSM 中的 `.service.` 后缀部分。查询失败时默认使用 `toutiao.tos.tosapi` 兜底。\n\nJanus 管理端相关接口包括：\n\n| 函数 | 作用 |\n| --- | --- |\n| `GetAllBucketsJanus` | 分页查询 bucket，使用 `pageBucketsForJanus` |\n| `GetBucketJanus` | 查询单 bucket，并补充 TOS 或 ToB TOS 展示信息 |\n| `UpdateBucketsIdcJanus` | 批量迁移 TOS bucket 的 IDC |\n| `UpdateBucketsPsmJanus` | 批量更新 TOS bucket 的 PSM |\n| `UpdateBucketsSkJanus` | 批量更新 TOS bucket 的 SecretKey |\n| `GetTosBackendConfigJanus` | 返回当前 IDC 的 TOS backend 配置 |\n| `GetTosServiceNodeJanus` | 查询 TOS bucket 的服务树节点 |\n| `GetTosBpmJanus` | 返回修改属性和限流 BPM 地址 |\n\nJanus 请求鉴权由 `verifyDevSreReq` 完成，它读取 `x-devsre-authorization`，通过 `parseToken` 使用 `tcc.GetDevSreToken()` 校验 JWT。\n\n## TOS S3 与 CreateBucketWithAkSk\n\n`GetTosBucketS3Info` 通过 `handleGetTosBucketS3InfoRequest` 返回 `meta.TosS3Bucket`。它先调用 `getBucket` 获取 bktmeta 中的 AK/SK，再从 `db.TosMetaCache` 获取 S3 endpoint 和 region，最后调用 `fillDesTosS3Info` 补充 DES 访问所需的 `TLSPSM`、`RouterPSM` 和 `RouterCluster`。\n\n`fillDesTosS3Info` 的配置来源是 `config.Conf.TosS3Router`。PSM 查找顺序是先使用 `IDCRegion-PSM` 精确匹配，再使用 `IDCRegion` 兜底。\n\n`CreateBucketWithAkSk` 用于在请求中显式传入 AK/SK 创建 bucket。它会先检查 bucket 是否已存在；已存在则返回已有 AK/SK。不存在时，从 `db.TosMetaCache` 获取 TOS 元数据，构造 `meta.Bucket` 和 `meta.TosBucket`，通过 `getProviderByServiceNode` 推导 owner，最后复用 `createBucket`。\n\n## ToB TOS 与 Volcengine\n\nVolcengine IAM 的 CRUD 入口包括 `CreateVolc`、`UpdateVolc`、`GetVolc`、`GetVolcs`、`DeleteVolc`，底层分别调用 `api.dbh.CreateVolc`、`UpdateVolc`、`GetVolc`、`GetAllVolcs`、`DeleteVolc`。\n\nToB TOS bucket 基础信息入口是 `GetTobTosBucketBaseInfo`。它从请求头读取 `client.AccessKeyHeader`、`client.SecretKeyHeader`、`client.SessionTokenHeader`，先查 `tobTosBktCache`，未命中时调用 `getTobTsBucketInfo`。\n\n`getTobTsBucketInfo` 优先从 bktmeta DB 读取已注册的 `meta.BackendToBTos` bucket。若未注册，则遍历 `api.tosTobRegionEndpoints`，调用 `listVolcBuckets` 使用火山 TOS SDK 查询当前 credential 下所有 bucket，并把结果写入 `tobTosBktCache`。对于已经注册到 `simpleBucketCache` 的 ToB TOS bucket，不会用火山侧结果覆盖缓存。\n\n## 加密 bucket 查询\n\n`GetAllEncryptionBuckets` 由 `handleGetAllEncryptionBucketsRequest` 实现。它读取 `decryptedAllBucketCache` 中的全量 bucket，调用 `bkt.GetEncryptionInfo()` 找出开启加密的 bucket，并使用 `kms.Decrypt` 解密 encryption key。结果缓存在 `encryptBucketsCache` 中，过期时间为 1 分钟。\n\n## 参数测试\n\n`BucketObjStorageParamTest` 会通过 `getBucketFromDBForSdk` 确认 bucket 和测试 IDC 匹配，然后调用 `api.dbh.CreateBucketTestRecord` 创建测试记录，并异步执行 `executeBucketTest`。\n\n`executeBucketTest` 使用 `storagegw.Client` 对目标 bucket 执行完整对象链路测试：put、get、内容校验、head、delete。任一步失败都会调用 `api.dbh.UpdateBucketTestResult` 写入 `meta.Bucket_Test_Fail`；全部成功则写入 `meta.Bucket_Test_Success`。\n\n## 脚本与批处理接口\n\n`script.go` 提供面向修复和批量操作的接口：\n\n| 函数 | 作用 |\n| --- | --- |\n| `FixBucketExtra` | 根据 account storage 配置修复 bucket 的 `Extra` 字段 |\n| `CreateBucketIDCConfigBatch` | 批量为 bucket 创建 IDC 配置 |\n| `DeleteBucketIDCConfigBatch` | 批量删除 bucket 的 IDC 配置 |\n\n`FixBucketExtra` 会读取 `FixBucketExtraReq`，通过 `accountCli.GetConfigByName` 获取账号存储配置，将 `VodBucketConfigExtra` 转换为 `BucketExtra` 后写回 bucket。批量 IDC 配置创建通过 `buildBucketIDCConfigsToCreate` 和 `buildDefaultIDCConfig` 构造 `BucketIdcConfig`，再调用 `api.dbh.CreateBucketIDCConfigs`。\n\n## 区域 bucket 文档接口\n\n`bucket_doc_api.go` 对 `db.TosRegionBucketsApi` 做薄封装，提供 region bucket 的创建、查询、更新和列表能力：\n\n| 函数 | DB 调用 |\n| --- | --- |\n| `CreateRegionBuckets` | `db.TosRegionBucketsApi.CreateRegionBuckets` |\n| `QueryRegionBuckets` | `db.TosRegionBucketsApi.QueryRegionBuckets` |\n| `UpdateTosAllBucketsDB` | `db.TosRegionBucketsApi.UpdateTosAllBucketsDB` |\n| `ListAllRegionTosBuckets` | `db.TosRegionBucketsApi.ListAllRegionTosBuckets` |\n\n这些接口都绑定 `db.RegionTosAllBucketsDB`，错误统一转为 `errno.CodeBadRequest` 或 `errno.CodeInternalErr`。\n\n## 开发注意事项\n\n新增查询路径时，应优先复用 `getBucket`、`getBucketFromDBForSdk`、`getAllBucketsFromDBWithTypeRegion`，避免绕过解密、IDC 类型补齐和 `calcIdcConfigs`。\n\n修改 bucket 写路径时，需要同时考虑本地缓存和远程缓存。当前创建、更新、覆盖、删除都会调用 `removeBucketCache`，远程缓存开启时还会异步删除单 bucket key 或维护 `bucketNameSetKey`。\n\n全量接口返回的是预序列化响应字节和 ETag，不是每次请求重新 marshal。修改响应结构或 `errno.OK` 格式时，需要确认 `bucketsToCacheItem` 的行为仍然符合客户端预期。\n\n`decryptedAllBucketCache` 是避免全量接口因新 IDC 组合穿透 DB 的关键缓存。涉及 `asyncUpdateAllBktCache` 或全量查询逻辑时，应保持“先构建未计算单元化配置的全量缓存，再按请求计算视图”的模式。","configuration-management":"# Configuration Management\n\n## 模块概览\n\n配置管理模块负责加载本地 YAML 配置、合并 TCC 基础配置、初始化 TCC 客户端，并持续刷新部分运行时配置。它覆盖两个包：\n\n- `config`：定义全局配置结构、MySQL 连接配置、本地配置加载和 TCC `base` 配置合并。\n- `tcc`：封装 TCC 客户端、TCC key 常量、动态配置解析、缓存和定时刷新逻辑。\n\n模块的核心全局入口是 `config.Conf`。大多数业务代码通过 `config.Conf` 读取静态配置，通过 `tcc.GetRemoteCacheConfig()`、`tcc.GetTccClient()`、`tcc.CheckAuthV2()` 等函数读取动态配置。\n\n## 配置加载流程\n\n服务启动时通常先调用 `config.InitConf(path)`：\n\n```go\nfunc InitConf(path string) {\n\tConf = new(Config)\n\tif err := caesar.Unmarshal(Conf, path); err != nil {\n\t\tlogs.Fatal(\"load config error: %v\", err)\n\t\tpanic(err)\n\t}\n\n\tmergeTCCBaseConfig()\n\n\tpretty.Println(Conf)\n}\n```\n\n执行顺序如下：\n\n1. 创建新的 `Config` 实例并赋值给全局变量 `config.Conf`。\n2. 使用 `caesar.Unmarshal(Conf, path)` 从本地配置文件加载 YAML。\n3. 调用 `mergeTCCBaseConfig()` 尝试从 TCC 读取 `base` 配置并合并。\n4. 使用 `pretty.Println(Conf)` 输出最终配置内容。\n\n`mergeTCCBaseConfig()` 是可降级逻辑：如果 `Conf` 为空、`Meta.PSM` 为空、TCC 客户端初始化失败、读取失败、内容为空或解析失败，都会记录 warning 并保留本地配置继续运行。\n\n```mermaid\nflowchart TD\n    A[\"InitConf(path)\"] --> B[\"caesar.Unmarshal 本地 YAML\"]\n    B --> C[\"mergeTCCBaseConfig()\"]\n    C --> D{\"Meta.PSM 是否为空\"}\n    D -->|\"是\"| E[\"跳过 TCC base\"]\n    D -->|\"否\"| F[\"读取 TCC key: base\"]\n    F --> G[\"yaml.Unmarshal 到 Config\"]\n    G --> H[\"mergo.Merge(&tccConf, Conf)\"]\n    H --> I[\"Conf = &tccConf\"]\n```\n\n## 本地配置与 TCC base 的合并规则\n\n`mergeTCCBaseConfig()` 从 TCC 读取 key `base`，解析成临时变量 `tccConf Config`，然后执行：\n\n```go\nmergo.Merge(&tccConf, Conf)\nConf = &tccConf\n```\n\n这表示最终配置以 TCC `base` 为基础，再用本地 `Conf` 中的非零值补充或覆盖缺失字段。实际效果是：\n\n- TCC `base` 可以提供公共默认配置。\n- 本地 YAML 可以保留环境、服务或测试场景的差异化配置。\n- 合并失败时不会中断启动，只记录日志并保留原始本地配置。\n\nTCC `base` 客户端使用 `Conf.Meta.PSM` 作为服务名，并启用鉴权：\n\n```go\ntccCfg := tccclient.NewConfigV2()\ntccCfg.Auth = true\ntccCfg.SetFirstGetTimeout(5 * time.Second)\n```\n\n如果 `Conf.TccInfo.ConfigSpace` 非空，会设置到 `tccCfg.Confspace`。\n\n## `Config` 结构\n\n`config.Config` 是模块的主配置结构，字段通过 YAML tag 映射到配置文件：\n\n```go\ntype Config struct {\n\tMeta       Meta   `yaml:\"Meta\"`\n\tWriteDB    *Mysql `yaml:\"WriteDB\"`\n\tReadDB     *Mysql `yaml:\"ReadDB\"`\n\tRetryTimes int    `yaml:\"RetryTimes\" validate:\"min=1\"`\n\n\tTosAPI          TosAPI          `yaml:\"TosAPI\"`\n\tBytedocSetting  BytedocSetting  `yaml:\"BytedocSetting\"`\n\tIdGenerator     IdGenerator     `yaml:\"IdGenerator\"`\n\tTccInfo         TccInfo         `yaml:\"Tcc\"`\n\tRedisConfig     RedisConfig     `yaml:\"RedisConfig\"`\n\tRemoteCacheConfig RemoteCacheConfig `yaml:\"RemoteCacheConfig\"`\n\n\tRateLimiter          RateLimiter                `yaml:\"RateLimiter\"`\n\tInterfaceRateLimiter InterfaceRateLimiterConfig `yaml:\"InterfaceRateLimiter\"`\n}\n```\n\n重要字段包括：\n\n- `Meta.PSM`：服务 PSM，既用于配置校验，也用于读取 TCC `base`。\n- `WriteDB` / `ReadDB`：MySQL 写库和读库配置。\n- `TccInfo.ServiceName` / `TccInfo.ConfigSpace`：运行时 TCC 客户端使用的服务名和配置空间。\n- `RemoteCacheConfig`：远程缓存默认配置，TCC 未加载成功时作为兜底。\n- `InterfaceRateLimiter`：接口级限流默认配置，启动时先从 YAML 初始化，再允许 TCC 热更新。\n- `TosAPI`、`BytedocSetting`、`ByteTreeConfig`、`AGWConfig`、`ModifyTOSBucketBpmConfig` 等：提供外部系统、审批流、服务树和网关相关配置。\n\n## MySQL 配置\n\n`config.Mysql` 描述数据库连接参数：\n\n```go\ntype Mysql struct {\n\tDSNTemplate  string `yaml:\"DSNTemplate\"`\n\tUsername     string `yaml:\"Username\"`\n\tPassword     string `yaml:\"Password\"`\n\tDBName       string `yaml:\"DBName\"`\n\tConsulName   string `yaml:\"ConsulName\"`\n\tTimeout      string `yaml:\"Timeout\"`\n\tReadTimeout  string `yaml:\"ReadTimeout\"`\n\tWriteTimeout string `yaml:\"WriteTimeout\"`\n\tMaxIdle      int    `yaml:\"MaxIdle\"`\n\tMaxOpen      int    `yaml:\"MaxOpen\"`\n}\n```\n\n`GetDSN()` 根据当前环境生成连接串：\n\n- 如果 `IsCodebaseCIEnvironment()` 返回 true，直接返回固定 CI 测试 DSN。\n- 否则使用 `fmt.Sprintf(m.DSNTemplate, ...)` 填充用户名、密码、Consul 名称、数据库名和超时参数。\n\n```go\nfunc IsCodebaseCIEnvironment() bool {\n\treturn len(os.Getenv(\"CI_REPO_NAME\")) > 0\n}\n```\n\n`NewDB()` 使用 `gorm.Open(\"mysql2\", m.GetDSN())` 创建连接，并设置连接池参数：\n\n```go\ndb.DB().SetMaxIdleConns(m.MaxIdle)\ndb.DB().SetMaxOpenConns(m.MaxOpen)\ndb.SingularTable(true)\n```\n\n因此，任何依赖数据库初始化的路径都会间接依赖 `config.Conf.WriteDB`、`config.Conf.ReadDB` 和 `Mysql.GetDSN()`。\n\n## TCC 客户端\n\n`tcc.GetTccClient()` 使用 `sync.Once` 懒加载单例客户端：\n\n```go\nvar (\n\ttccOnce sync.Once\n\tclient  *tccclient.ClientV2\n)\n```\n\n首次调用时，它读取：\n\n```go\nconfig.Conf.TccInfo.ServiceName\nconfig.Conf.TccInfo.ConfigSpace\n```\n\n并调用：\n\n```go\ntccclient.NewClientV2(config.Conf.TccInfo.ServiceName, tccConfigV2)\n```\n\n如果创建失败会直接 `panic(err)`。因此，调用 `GetTccClient()` 前必须确保 `config.InitConf()` 已经成功执行，并且 `config.Conf.TccInfo` 已正确配置。\n\n## 动态配置初始化与刷新\n\n`tcc.InitConfig()` 是动态配置入口，主要做三件事：\n\n1. 调用 `initInterfaceRateLimiterFromConfig()`，先用 YAML 中的 `config.Conf.InterfaceRateLimiter` 初始化接口限流。\n2. 注册各个 TCC key 对应的 parser。\n3. 调用 `refreshTccConfigs()` 立即刷新一次，成功后启动后台 goroutine 每分钟刷新。\n\n```go\nparsers[RemoteCacheConfigTccKey] = remoteCacheConfigParser\nparsers[DefaultIDCConfigsTccKey] = defaultIDCConfigsParser\nparsers[PSMAuthV2ConfigsTccKey] = psmAuthV2Parser\nparsers[DevSreToken] = devSreTokenParser\nparsers[AGWTenant] = agwTenantParser\nparsers[InterfaceRateLimiterTccKey] = interfaceRateLimiterParser\n```\n\n刷新逻辑由 `refreshTccConfigs()` 执行。它会创建带 `logid` 的 context，并通过 `bytedtracer.StartCustomSpan()` 上报异步刷新 span，然后遍历 `parsers`：\n\n```go\nfor key, parse := range parsers {\n\tif e := parse(GetTccClient().Get(ctx, key)); e != nil {\n\t\tlogs.CtxWarn(ctx, \"refresh tcc key: %s error, %s\", key, e)\n\t\terr = e\n\t}\n}\n```\n\n这里 parser 的签名是：\n\n```go\ntype parser func(value string, err error) error\n```\n\n这使 parser 可以同时处理 TCC 返回值和读取错误。\n\n## 运行时配置项\n\n### 远程缓存配置\n\n`remoteCacheConfigParser()` 解析 TCC key `remote_cache_config`：\n\n```go\nc := &config.RemoteCacheConfig{}\njson.Unmarshal([]byte(value), c)\nc.TTL = c.TTL * time.Second\nc.LockReleaseTTL = c.LockReleaseTTL * time.Second\nremoteCacheConfig.Store(c)\n```\n\n配置保存在 `atomic.Value` 中。读取时使用 `GetRemoteCacheConfig()`：\n\n```go\nfunc GetRemoteCacheConfig() *config.RemoteCacheConfig {\n\tif v, ok := remoteCacheConfig.Load().(*config.RemoteCacheConfig); ok {\n\t\treturn v\n\t}\n\treturn &config.Conf.RemoteCacheConfig\n}\n```\n\n这意味着 TCC 配置存在时优先使用 TCC；否则回退到 YAML 中的 `RemoteCacheConfig`。业务写入、覆盖、删除 bucket 时会通过 `remote_cache.GetCacheInstance()` 间接读取该配置，例如 `updateBucket()` 和 `overwriteBucket()` 相关流程。\n\n### 接口级限流配置\n\n接口限流有两层来源：\n\n- 启动时：`initInterfaceRateLimiterFromConfig()` 调用 `util.InitInterfaceRateLimiterConfig(config.Conf.InterfaceRateLimiter)`。\n- 运行时：`interfaceRateLimiterParser()` 解析 TCC key `interface_rate_limiter` 后调用 `util.UpdateInterfaceRateLimiterConfig(c)`。\n\n解析器使用 `json.Decoder.DisallowUnknownFields()`，因此 TCC JSON 中出现未知字段会返回错误，避免配置拼写错误被静默忽略。\n\n### 默认 IDC 配置\n\n`defaultIDCConfigsParser()` 解析 TCC key `default_idc_configs` 到包级变量：\n\n```go\ndefaultIDCConfigs = map[string]config.DefaultIDCConfigs{}\n```\n\n查询入口是：\n\n```go\nfunc GetDefaultIDCConfigs(idc string, backendType uint16) (config.DefaultIDCConfigs, bool) {\n\treturn defaultIDCConfigs[fmt.Sprintf(\"%s_%d\", idc, backendType)]\n}\n```\n\n调用方需要按 `idc_backendType` 的组合键读取默认后端字段配置。\n\n### PSM Auth V2\n\n`psmAuthV2Parser()` 解析 TCC key `psm_auth_v2_configs` 到：\n\n```go\npsmAuthV2 = map[string]map[string]bool{}\n```\n\n检查入口是 `CheckAuthV2(ctx, psm, method)`。当指定 PSM 对应 method 为 true，或允许 `\"all\"` 时返回 true：\n\n```go\nif allowMethods, ok := psmAuthV2[psm]; ok && (allowMethods[method]) || allowMethods[\"all\"] {\n\treturn true\n}\n```\n\n维护这段逻辑时要注意布尔表达式优先级。当前表达式依赖 `&&` 高于 `||` 的规则，但当 `psm` 不存在时仍会访问 `allowMethods[\"all\"]`，需要结合 Go 作用域和测试覆盖谨慎修改。\n\n### AGW 租户配置\n\n`agwTenantParser()` 解析 TCC key `agw_tenant` 到：\n\n```go\ntype AGWTCCConfig struct {\n\tUseTCC  bool                      `json:\"use_tcc\"`\n\tTenants []*config.AGWTenantConfig `json:\"tenants\"`\n}\n```\n\n解析成功后通过 `agwTenantConfig.Store(c)` 原子替换。读取入口是 `GetAGWTenantConfigs()`，未加载时返回空的 `AGWTCCConfig{}`。\n\n### DevSreToken 与内存限制\n\n`devSreTokenParser()` 将 TCC key `dev_sre_token` 写入包级变量 `devSreToken`，读取入口为 `GetDevSreToken()`。\n\n`GetMemLimitPercent(ctx)` 不参与定时刷新，而是在调用时直接读取 TCC key `mem_limit_percent`。读取失败时记录错误并返回空字符串。\n\n### 本地缓存刷新间隔\n\n`GetLocalCacheRefreshInterval(ctx)` 直接读取 TCC key `local_cache_refresh_interval`，并用 `time.ParseDuration()` 解析：\n\n```go\nif interval, err := time.ParseDuration(val); err == nil {\n\treturn interval, val\n}\nreturn config.DefaultTTL, \"\"\n```\n\n读取失败或解析失败时回退到 `config.DefaultTTL`，也就是 5 分钟。\n\n## 与业务代码的连接\n\n配置模块位于启动链路和运行时热更新链路的交界处：\n\n- 测试入口如 `util/base_test.go`、`tcc/base_test.go`、`rpc/base_test.go`、`service/base_test.go` 等会调用 `config.InitConf()` 初始化全局配置。\n- `service/bucket_handler.go` 的 bucket 更新、覆盖、删除流程会通过 `remote_cache.GetCacheInstance()` 间接使用 `tcc.GetRemoteCacheConfig()`。\n- `remote_cache/remote_cache.go` 初始化缓存时会读取远程缓存配置，并可能进一步触发数据库连接配置。\n- `service/tos_handler.go` 的 `InitThirdPartyClient()` 依赖 `config.Config` 中的第三方服务配置。\n- `util/interface_limiter.go` 通过 `InitInterfaceRateLimiterConfig()` 和 `UpdateInterfaceRateLimiterConfig()` 接收 YAML 与 TCC 中的接口限流配置。\n\n典型运行路径如下：\n\n```mermaid\nflowchart TD\n    A[\"bucket 更新请求\"] --> B[\"updateBucket / overwriteBucket\"]\n    B --> C[\"remote_cache.GetCacheInstance\"]\n    C --> D[\"remote_cache.initOnce\"]\n    D --> E[\"tcc.GetRemoteCacheConfig\"]\n    E --> F{\"TCC 是否已加载\"}\n    F -->|\"是\"| G[\"使用 remote_cache_config\"]\n    F -->|\"否\"| H[\"回退 Conf.RemoteCacheConfig\"]\n```\n\n## 失败处理与降级策略\n\n该模块区分启动关键配置和运行时可降级配置：\n\n- 本地 YAML 加载失败：`InitConf()` 记录 fatal 并 panic，服务不能继续启动。\n- TCC `base` 加载失败：仅 warning，继续使用本地 YAML。\n- `GetTccClient()` 初始化失败：panic，因为动态配置客户端无法创建。\n- 动态配置单个 key 刷新失败：记录 warning 或 error，不清空已有配置。\n- `GetRemoteCacheConfig()` 未加载 TCC：回退到 `config.Conf.RemoteCacheConfig`。\n- `GetLocalCacheRefreshInterval()` 失败：回退到 `config.DefaultTTL`。\n- `remote_cache_config`、`interface_rate_limiter` 等 key 为空：parser 通常忽略，不覆盖当前配置。\n\n这种设计保证了启动配置必须明确可用，而运行时配置可以在 TCC 短暂异常时继续使用最近一次成功加载的值或 YAML 兜底值。\n\n## 贡献注意事项\n\n新增配置字段时，应先判断它属于静态启动配置还是运行时动态配置：\n\n- 静态配置：添加到 `config.Config` 或相关子结构体，并补充 YAML tag。\n- 动态配置：在 `tcc/keys.go` 增加 key 常量，在 `tcc_config.go` 添加 parser，并在 `InitConfig()` 注册。\n- 需要热更新且被并发读取的配置，应优先使用 `atomic.Value` 或明确的同步机制。\n- JSON 类型的 TCC 配置建议像 `interfaceRateLimiterParser()` 一样使用严格解析，避免未知字段静默生效失败。\n- 涉及时间单位时要保持一致；当前 `RemoteCacheConfig.TTL` 和 `LockReleaseTTL` 会把 TCC 中的数值按秒转换为 `time.Duration`。\n- 调用 `tcc.GetTccClient()` 前必须确保 `config.Conf` 已初始化，否则会读取空全局配置并导致异常。","cryptographic-utilities":"# Cryptographic Utilities\n\n## 模块概览\n\n该模块位于 `util` 包中，提供两类低层工具：\n\n- `EncryptWithMetadata` / `DecryptWithMetadata`：对字符串进行 AES-GCM 加解密，并使用 Base64 作为外部传输格式。\n- `MD5ETag`：对字节内容计算 MD5 摘要，并以 Base64 字符串形式返回，用作 ETag 类标识。\n\n当前模块没有依赖项目内其他包，属于基础工具层。项目内主要调用点包括：\n\n- `middleware/base.go` 中的 `encryptOpenapiData` 调用 `EncryptWithMetadata` 加密 OpenAPI 响应数据。\n- `middleware/base_test.go` 和 `util/aes_test.go` 使用 `DecryptWithMetadata` 验证加密结果。\n- `service/bucket_handler.go` 中的 `bucketsToCacheItem` 调用 `MD5ETag` 生成缓存项的内容标识。\n\n## AES 加密格式\n\n`EncryptWithMetadata(key []byte, text string) (string, error)` 是对外暴露的加密入口。\n\n执行流程：\n\n```mermaid\nflowchart TD\n    A[\"EncryptWithMetadata\"] --> B[\"将 text 转为 []byte\"]\n    B --> C[\"aesEncryptBy\"]\n    C --> D[\"HMAC-SHA256(key, text)\"]\n    D --> E[\"取前 12 字节作为 IV\"]\n    E --> F[\"AES-GCM Seal\"]\n    F --> G[\"拼接 IV + 密文\"]\n    G --> H[\"Base64 编码返回\"]\n```\n\n最终返回值格式为：\n\n```text\nbase64(IV || AES-GCM密文与认证标签)\n```\n\n其中：\n\n- `IV` 固定为 12 字节。\n- `IV` 不是随机生成的，而是 `HMAC-SHA256(key, text)` 的前 12 字节。\n- `AES-GCM` 的输出包含密文和 GCM 认证标签。\n- 没有使用 AAD，`Seal` 的第四个参数为 `nil`。\n\n内部实现由 `aesEncryptBy(key, text []byte) ([]byte, error)` 完成：\n\n```go\nblock, err := aes.NewCipher(key)\nmac := hmac.New(sha256.New, key)\nmac.Write(text)\ncalculatedMac := mac.Sum(nil)\niv = calculatedMac[0:12]\n\naesgcm, err := cipher.NewGCM(block)\ncrypted := aesgcm.Seal(nil, iv, text, nil)\ncrypted = append(iv, crypted...)\n```\n\n`key` 必须满足 `aes.NewCipher` 的要求，即长度为 16、24 或 32 字节，分别对应 AES-128、AES-192、AES-256。长度不合法时，函数会直接返回 `aes.NewCipher` 的错误。\n\n## AES 解密格式\n\n`DecryptWithMetadata(key []byte, crypted string) (string, error)` 是对外暴露的解密入口。\n\n执行流程：\n\n```mermaid\nflowchart TD\n    A[\"DecryptWithMetadata\"] --> B[\"Base64 解码\"]\n    B --> C[\"aesDecryptWithKey\"]\n    C --> D[\"拆出前 12 字节 IV\"]\n    D --> E[\"AES-GCM Open\"]\n    E --> F[\"重新计算 HMAC-SHA256\"]\n    F --> G[\"校验 HMAC 前 12 字节等于 IV\"]\n    G --> H[\"返回明文字符串\"]\n```\n\n解密输入必须是 `EncryptWithMetadata` 生成的 Base64 字符串。解码后的二进制结构为：\n\n```text\nIV(12字节) || AES-GCM密文与认证标签\n```\n\n内部实现由 `aesDecryptWithKey(key, crypted []byte) ([]byte, error)` 完成：\n\n```go\niv = crypted[0:12]\ncryBlob = crypted[12:]\n\norigData, err := aesgcm.Open(nil, iv, cryBlob, nil)\n\nmac := hmac.New(sha256.New, key)\nmac.Write(origData)\ncalculatedMac := mac.Sum(nil)\n\nif bytes.Compare(calculatedMac[0:12], iv) != 0 {\n    return []byte{}, errors.New(\"[kms] hmac of data doesn't match IV (is data corrupted?)\")\n}\nreturn origData, err\n```\n\n解密阶段有几类校验：\n\n- Base64 格式错误会由 `base64.StdEncoding.DecodeString` 返回。\n- 解码后的数据长度小于 12 字节时，返回 `\"[kms] length of decrypted data smaller than block size, please check data\"`。\n- 去掉 IV 后的密文长度小于 12 字节时，返回 `\"crypto/cipher: input error\"`。\n- AES-GCM 认证失败后，代码仍会对 `origData` 计算 HMAC，并通常返回 `\"[kms] hmac of data doesn't match IV (is data corrupted?)\"`，因此上层不应依赖具体错误文本区分 GCM 失败和 HMAC 校验失败。\n\n## IV 生成策略的影响\n\n该实现使用 `HMAC-SHA256(key, plaintext)` 的前 12 字节作为 AES-GCM 的 IV。这意味着同一个 `key` 和同一个 `text` 会生成完全相同的密文。\n\n这个行为适合需要稳定加密结果的场景，例如测试断言或对相同明文得到可重复输出。但它也意味着该函数不是常见的随机 nonce 加密接口。调用方需要注意：\n\n- 不要把它当作“每次加密结果都不同”的接口使用。\n- 相同明文会暴露“内容相等”这一事实。\n- 更换密钥会改变 HMAC、IV 和最终密文。\n- 该格式与标准的“随机 nonce + 密文”AES-GCM 输出不兼容，必须使用本模块的 `DecryptWithMetadata` 解密。\n\n## `MD5ETag`\n\n`MD5ETag(resp []byte) string` 对输入字节计算 MD5 摘要，并返回 Base64 编码后的摘要字符串：\n\n```go\nfunc MD5ETag(resp []byte) string {\n    h := md5.New()\n    h.Write(resp)\n    return base64.StdEncoding.EncodeToString(h.Sum(nil))\n}\n```\n\n返回值不是常见的十六进制 MD5 字符串，而是原始 16 字节 MD5 digest 的 Base64 编码。\n\n示例形态：\n\n```text\nbase64(md5(resp))\n```\n\n该函数当前由 `service/bucket_handler.go` 中的 `bucketsToCacheItem` 调用，用于根据 bucket 数据内容生成缓存项标识。它适合作为内容变化检测值，不适合作为安全签名或防篡改机制。\n\n## 使用示例\n\n```go\npackage util\n\nfunc example() error {\n    key := []byte(\"12345678901234567890123456789012\") // 32 字节 AES-256 key\n\n    encrypted, err := EncryptWithMetadata(key, \"metadata text\")\n    if err != nil {\n        return err\n    }\n\n    plain, err := DecryptWithMetadata(key, encrypted)\n    if err != nil {\n        return err\n    }\n\n    _ = plain\n    return nil\n}\n```\n\n## 贡献注意事项\n\n修改该模块时需要保持加密格式兼容性。`DecryptWithMetadata` 当前假设前 12 字节一定是 IV，剩余部分是 AES-GCM 输出；如果调整 IV 生成、拼接顺序、Base64 编码方式或 AAD 参数，已有密文将无法解密。\n\n`MD5ETag` 的返回格式也属于调用方契约。若改为十六进制 MD5，会影响 `bucketsToCacheItem` 生成的缓存标识。","database-layer":"# Database Layer\n\n## 数据库层概览\n\n`db` 包负责初始化和封装项目的持久化依赖，包括 MySQL、ByteDoc/MongoDB、ID 生成器，以及事务回滚辅助逻辑。它不是一个纯 DAO 层，而是整个数据访问层的基础设施入口：`main.go` 和测试入口会先调用 `InitDb()`、`InitByteDoc()`，后续各业务文件再复用包级全局对象。\n\n核心文件：\n\n- `db/db.go`：MySQL、ByteDoc/MongoDB、ID 生成器初始化。\n- `db/utils.go`：事务回滚错误合并工具。\n- `db/types.go`：数据库层共享数据结构。\n\n## 初始化入口\n\n### `InitDb()`\n\n`InitDb()` 初始化 MySQL 读写连接和 ID 生成器。\n\n执行过程：\n\n1. 调用 `mysql.OpenInterpolation(OpenMysqlPSM)` 开启指定 PSM 的 MySQL 插值能力。\n2. 通过 `config.Conf.WriteDB.NewDB()` 创建写库连接。\n3. 通过 `config.Conf.ReadDB.NewDB()` 创建读库连接。\n4. 构造全局 `Db *DbHandler`：\n   - `r`：读库连接。\n   - `w`：写库连接。\n   - `retryTimes`：来自 `config.Conf.RetryTimes`。\n   - `retryTimeout`：固定为 `5 * time.Second`。\n5. 根据 `config.Conf.IdGenerator.Switch` 初始化 `IdGenCli`：\n   - 开启时调用 `idgenerator.New(...)`。\n   - 关闭时使用 `EmptyIdGen{}`。\n\n写库或读库初始化失败时，`InitDb()` 会记录错误并 `panic`。因此它适合作为服务启动阶段的强依赖初始化逻辑。\n\n### `DbHandler`\n\n```go\ntype DbHandler struct {\n\tr            *gorm.DB\n\tw            *gorm.DB\n\tretryTimes   int\n\tretryTimeout time.Duration\n}\n```\n\n`DbHandler` 保存读写分离的 GORM 连接和重试配置。当前文件只负责构造该结构，具体查询、写入和事务逻辑分布在同一 `db` 包的其他文件中，例如 `bucket.go`、`temp_bucket.go`、`volc.go`、`idc_proxy.go` 等。\n\n调用关系上，`main.go`、`db/base_test.go`、`service/base_test.go` 都会调用 `InitDb()`，说明它是运行服务和测试的共同前置条件。\n\n## ID 生成器\n\n数据库层通过 `IdGenWrapper` 抽象 ID 生成能力：\n\n```go\ntype IdGenWrapper interface {\n\tGet(ctx context.Context) (uint64, error)\n\tMGet(ctx context.Context, count int) ([]uint64, error)\n}\n```\n\n生产环境在配置开启时使用 `idgenerator.New(...)` 返回的客户端。配置关闭时使用 `EmptyIdGen`：\n\n```go\ntype EmptyIdGen struct{}\n\nfunc (e EmptyIdGen) Get(ctx context.Context) (uint64, error) {\n\treturn 0, nil\n}\n\nfunc (e EmptyIdGen) MGet(ctx context.Context, count int) ([]uint64, error) {\n\treturn make([]uint64, count), nil\n}\n```\n\n`EmptyIdGen` 的语义是“占位实现”：它不报错，但返回 `0` 或全 `0` 切片。调用方如果依赖 ID 唯一性，不能把 `0` 当作有效业务 ID 使用；它主要用于关闭 ID 生成器的环境、测试场景或兼容路径。\n\n## ByteDoc / MongoDB 初始化\n\nByteDoc 相关初始化由 `InitByteDoc()` 负责。它根据配置决定使用本地 MongoDB 存储，还是远程 ByteDoc API。\n\n### 总体流程\n\n```mermaid\nflowchart TD\n    A[\"InitByteDoc\"] --> B{\"TosAPI.Disable?\"}\n    B -->|是| C[\"跳过初始化\"]\n    B -->|否| D{\"BytedocSetting.RemoteMode?\"}\n    D -->|是| E[\"initLocalByteDoc<br/>本地快照，失败只告警\"]\n    E --> F[\"buildRemoteBytedocCli\"]\n    F --> G[\"TosRegionBucketsApi = regionBucketApiRemoteImpl\"]\n    D -->|否| H[\"initLocalByteDoc<br/>失败直接返回错误\"]\n    H --> I[\"检查 localTosAllBucketsCol\"]\n    I --> J[\"TosRegionBucketsApi = regionBucketApiImpl\"]\n```\n\n### `InitByteDoc()`\n\n`InitByteDoc()` 的第一层开关是 `config.Conf.TosAPI.Disable`。如果禁用 TOS API，会直接跳过 ByteDoc 初始化并返回 `nil`。\n\n未禁用时，根据 `config.Conf.BytedocSetting.RemoteMode` 分成两种模式。\n\n远程模式：\n\n- 调用 `initLocalByteDoc()` 初始化本地快照。\n- 本地快照初始化失败只记录 `Warn`，不会阻塞启动。\n- 调用 `buildRemoteBytedocCli(config.Conf.BytedocSetting.RemoteSetting)` 创建远程实现。\n- 将结果赋给全局 `TosRegionBucketsApi`。\n\n本地模式：\n\n- 调用 `initLocalByteDoc()`，失败直接返回错误。\n- 检查 `localTosAllBucketsCol` 是否完成初始化。\n- 使用 `&regionBucketApiImpl{tosAllBucketsCol: localTosAllBucketsCol}` 作为 `TosRegionBucketsApi`。\n\n这里的 `regionBucketApiImpl`、`regionBucketApiRemoteImpl`、`RegionBucketsApi`、`TosRegionBucketsApi` 和 `TosAllBucketsColName` 定义在同一 `db` 包的其他文件中。从初始化逻辑可以看出，`InitByteDoc()` 只负责选择实现和注入依赖，不直接处理 bucket 业务读写。\n\n### `initLocalByteDoc()`\n\n`initLocalByteDoc()` 负责连接本地 ByteDoc/MongoDB：\n\n1. 读取 `config.Conf.BytedocSetting.ConnectURI`。\n2. 如果 URI 为空，记录告警并跳过本地初始化。\n3. 使用 `mongo.NewClient(options.Client().ApplyURI(uri))` 创建客户端。\n4. 创建 bytedtrace server span：`bytedtracer.StartServerSpan(context.Background(), \"spontaneous_call\")`。\n5. 使用 `context.WithTimeout(ctx, timeout)` 控制 `Connect` 和 `Ping`，其中 `timeout` 为 `10 * time.Second`。\n6. 初始化全局对象：\n   - `MongoDBClient`\n   - `MongoDB`\n   - `localTosAllBucketsCol`\n7. 对 `localTosAllBucketsCol` 调用 `ensureIndices(...)` 创建索引。\n\n本地集合会创建一个索引：\n\n```go\nmongo.IndexModel{\n\tKeys:    bson.D{{Key: \"region\", Value: 1}},\n\tOptions: options.Index().SetUnique(true),\n}\n```\n\n这表示 `region` 字段在 `TosAllBucketsColName` 集合中必须唯一。索引创建失败只记录告警，不会让 `initLocalByteDoc()` 返回错误；连接和 ping 失败才会返回错误。\n\n### `buildRemoteBytedocCli()`\n\n`buildRemoteBytedocCli(remoteSetting config.ByteDocRemoteSetting)` 构造远程 ByteDoc API 客户端：\n\n- 使用 `byted.NewClient(...)` 创建 Hertz client。\n- 通过 `client.WithResponseBodyStream(true)` 开启响应体流式读取。\n- 如果 `remoteSetting.Timeout == 0`，默认设置为 `10 * time.Second`。\n- 返回 `&regionBucketApiRemoteImpl{...}`。\n\n远程实现的配置字段来自 `config.ByteDocRemoteSetting`：\n\n- `Host`\n- `WithSD`\n- `Idc`\n- `Cluster`\n- `Env`\n- `Timeout`\n- `WriteBack`\n\n这些字段原样注入到 `regionBucketApiRemoteImpl`，由远程实现负责具体请求行为。\n\n## 索引创建\n\n`ensureIndices(ctx, col, indices)` 是一个很小的 MongoDB 索引校验辅助函数：\n\n```go\nfunc ensureIndices(ctx context.Context, col *mongo.Collection, indices []mongo.IndexModel) error {\n\tcreated, err := col.Indexes().CreateMany(ctx, indices)\n\tif err != nil {\n\t\treturn err\n\t}\n\tif len(created) != len(indices) {\n\t\treturn errorIndex\n\t}\n\treturn nil\n}\n```\n\n它不仅检查 `CreateMany` 是否返回错误，也检查返回的已创建索引数量是否与请求数量一致。如果数量不足，返回包内错误 `errorIndex`，错误内容为 `\"Not enough indices.\"`。\n\n当前只有 `initLocalByteDoc()` 调用它，用于保证 `region` 唯一索引存在。\n\n## 事务回滚工具\n\n`RollbackTX(tx *gorm.DB, err error) error` 用于统一处理事务回滚时的错误合并。\n\n调用方通常是在事务失败路径中传入当前业务错误：\n\n```go\nif err != nil {\n\treturn RollbackTX(tx, err)\n}\n```\n\n它的处理规则是：\n\n1. 先调用 `tx.Rollback()`。\n2. 如果 `tx.Error == nil`，说明回滚本身没有错误，返回原始 `err`。\n3. 如果原始 `err == nil`，但回滚有错误，返回 `tx.Error`。\n4. 如果原始 `err` 是 `gorm.Errors`，调用 `errs.Add(tx.Error)` 追加回滚错误。\n5. 否则返回 `gorm.Errors([]error{err, tx.Error})`，同时保留业务错误和回滚错误。\n\n该函数被多个写操作使用，包括 `CreateBucket`、`UpdateBucket`、`DeleteBucket`、`CreateTempBucket`、`DeleteTempBucket`、`CreateVolc`、`UpdateVolc`、`DeleteVolc`、`CreateIdc`、`UpdateIdcProxies` 等。它的价值在于避免回滚失败覆盖原始业务错误。\n\n## 共享数据结构\n\n`InternalToBTos` 定义在 `db/types.go`：\n\n```go\ntype InternalToBTos struct {\n\tName      string `json:\"name\"`\n\tAccessKey string `json:\"access_key,omitempty\"`\n\tRegion    string `json:\"region\"`\n\tEndpoint  string `json:\"endpoint\"`\n}\n```\n\n它是数据库层可复用的数据传输结构，字段通过 JSON tag 暴露：\n\n- `Name`：名称。\n- `AccessKey`：访问密钥，使用 `omitempty`，为空时不会出现在 JSON 中。\n- `Region`：地域。\n- `Endpoint`：访问端点。\n\n## 与代码库其他部分的关系\n\n`db` 包的初始化入口由服务启动和测试共同调用：\n\n- `main.go` 调用 `InitDb()` 和 `InitByteDoc()`。\n- `db/base_test.go`、`service/base_test.go` 在测试入口调用初始化函数。\n- `db/db_test.go` 覆盖 `EmptyIdGen`、`InitByteDoc()` 和 `buildRemoteBytedocCli()`。\n- `db/utils_test.go` 覆盖 `RollbackTX()`。\n\n业务数据操作分散在同一包的其他文件中，并依赖这里初始化出的全局状态：\n\n- MySQL 操作依赖 `Db *DbHandler`。\n- TOS bucket 区域数据依赖 `TosRegionBucketsApi`。\n- 本地 ByteDoc 模式依赖 `MongoDBClient`、`MongoDB` 和 `localTosAllBucketsCol`。\n- 需要生成 ID 的逻辑依赖 `IdGenCli`。\n- 事务写操作失败路径复用 `RollbackTX()`。\n\n因此，修改这个模块时需要特别注意启动路径和测试路径的一致性。`InitDb()` 是强依赖初始化，失败会 `panic`；`InitByteDoc()` 则按模式区分强弱依赖，远程模式下本地快照失败不会阻塞，局部模式下本地存储失败会阻塞。","idc-and-volcengine-persistence":"# IDC and Volcengine Persistence\n\n## 模块概览\n\n`db/idc_proxy.go` 和 `db/volc.go` 负责两类持久化数据：\n\n- IDC 元数据与代理配置：写入 `t_idc_meta`、`t_idc_proxy`\n- 火山引擎 IAM 账号：写入 `t_volcengine_iam`\n\n这两个文件都挂在 `DbHandler` 上，遵循相同的数据库访问模式：\n\n- 读操作使用 `db.r`\n- 写操作使用 `db.w`\n- 所有数据库调用包在 `retry.Do(...)` 中\n- 每个公开方法都会上报 `util.EmitThroughput` 和 `util.EmitLatency`\n- 多表写入或删除使用事务，并通过 `RollbackTX(tx, err)` 回滚\n\n```mermaid\nflowchart TD\n    调用方[\"服务层 / 管理接口\"] --> DbHandler[\"DbHandler\"]\n    DbHandler --> IDC[\"IDC 持久化\"]\n    DbHandler --> VOLC[\"火山引擎 IAM 持久化\"]\n\n    IDC --> IDCMeta[\"t_idc_meta\"]\n    IDC --> IDCProxy[\"t_idc_proxy\"]\n\n    VOLC --> KMS[\"kms.Cipher\"]\n    VOLC --> VolcTable[\"t_volcengine_iam\"]\n```\n\n## IDC 持久化\n\nIDC 模块围绕 `meta.IdcWithProxies` 组织数据。一个 IDC 由一条 `meta.IdcMeta` 记录和零到多条 `meta.IdcProxy` 记录组成：\n\n```go\nconst (\n\tTableIdcProxy = \"t_idc_proxy\"\n\tTableIdcMeta  = \"t_idc_meta\"\n)\n```\n\n`t_idc_meta` 保存 IDC 自身属性，例如 `IDC`、`Type`、`Region`、`BillingRegion`、`Description`。  \n`t_idc_proxy` 保存该 IDC 下的代理配置，并通过 `idc` 字段关联 IDC。\n\n### `CreateIdc`\n\n`CreateIdc(ctx, idcProxiesDTO)` 创建一组 IDC 元数据和代理配置。\n\n执行流程：\n\n1. 上报 `CreateIdc` 吞吐与耗时指标。\n2. 开启写事务。\n3. 通过 `IdGenCli.Get(util.WithoutCancel(ctx))` 生成 IDC 元数据主键。\n4. 写入 `t_idc_meta`。\n5. 如果 `idcProxiesDTO.Proxies` 非空：\n   - 通过 `IdGenCli.MGet(util.WithoutCancel(ctx), len(...))` 批量生成代理主键。\n   - 逐条写入 `t_idc_proxy`。\n6. 提交事务。\n\n这里使用 `util.WithoutCancel(ctx)` 获取 ID，表示即使外层请求上下文取消，ID 生成仍不跟随取消信号中断。\n\n贡献时需要注意：`CreateIdc` 的代理写入分支中，`conn.Create(proxy).Error` 出错后当前代码传给 `RollbackTX` 的是之前的 `res.Error`，不是局部变量 `err`。如果修改这里，应确认回滚错误传递是否符合预期。\n\n### `GetIdcProxies`\n\n`GetIdcProxies(ctx, idc)` 根据 IDC 名称读取完整配置。\n\n执行流程：\n\n1. 从 `t_idc_meta` 查询 `idc = ?` 的第一条记录。\n2. 从 `t_idc_proxy` 查询同一 IDC 的所有代理。\n3. 返回 `meta.IdcWithProxies`。\n4. 如果没有代理，`Proxies` 会被置为空切片 `[]*meta.IdcProxy{}`，而不是 `nil`。\n\n该方法会先查 IDC 元数据，再查代理；如果元数据不存在或查询失败，直接返回错误。\n\n### `GetIdcProxiesByProgramEnvIdc`\n\n`GetIdcProxiesByProgramEnvIdc(ctx, idc, programEnvIdc)` 只读取代理配置，不读取 `t_idc_meta`。\n\n查询条件是：\n\n```sql\nidc = ? and (program_env_idc = ? or program_env_idc = '')\n```\n\n也就是说，返回结果包含：\n\n- 精确匹配 `program_env_idc` 的代理\n- `program_env_idc` 为空字符串的默认代理\n\n返回的 `meta.IdcWithProxies` 只设置 `IDC` 和 `Proxies`，不会补全 `Type`、`Region` 等 IDC 元数据字段。\n\n### `UpdateIdcProxies`\n\n`UpdateIdcProxies(ctx, idcProxiesDTO)` 更新 IDC 元数据，并用新的代理列表整体替换旧代理列表。\n\n执行流程：\n\n1. 开启写事务。\n2. 在 `t_idc_meta` 中按 `idc` 更新以下字段：\n   - `Type`\n   - `Region`\n   - `BillingRegion`\n   - `Description`\n3. 查询 `t_idc_proxy` 中当前 IDC 的已有代理。\n4. 如果已有代理非空，先全部删除。\n5. 如果新的 `Proxies` 非空：\n   - 通过 `IdGenCli.MGet(util.WithoutCancel(ctx), len(...))` 生成新代理 ID。\n   - 逐条插入新代理。\n6. 提交事务。\n\n这个方法不是按代理 ID 做增量更新，而是“先删后插”的替换语义。因此调用方必须传入完整的目标代理列表；遗漏的代理会被删除。\n\n### `GetAllIdcProxies`\n\n`GetAllIdcProxies(ctx)` 读取所有 IDC 元数据和所有代理，然后在内存中按 `IDC` 字段分组。\n\n执行流程：\n\n1. 查询所有 `t_idc_meta`。\n2. 查询所有 `t_idc_proxy`。\n3. 构造 `map[string][]*meta.IdcProxy`。\n4. 遍历所有 `meta.IdcMeta`，为每个 IDC 组装 `meta.IdcWithProxies`。\n5. 没有代理的 IDC 返回空切片。\n\n这个方法会一次性加载两张表，适合配置规模可控的场景。如果 IDC 或代理数量明显增长，需要评估分页或按需查询。\n\n### `DeleteIdcProxies`\n\n`DeleteIdcProxies(ctx, idc)` 删除一个 IDC 的代理配置和元数据。\n\n执行顺序：\n\n1. 删除 `t_idc_proxy` 中 `idc = ?` 的所有代理。\n2. 删除 `t_idc_meta` 中 `idc = ?` 的元数据。\n3. 提交事务。\n\n删除代理在前、删除元数据在后，避免留下依赖元数据已不存在的代理记录。\n\n## 火山引擎 IAM 持久化\n\n火山引擎 IAM 数据存储在 `t_volcengine_iam`：\n\n```go\nconst volcTable = \"t_volcengine_iam\"\n```\n\n数据库层使用内部 DTO `VolcIAMDTO` 映射表字段，外部接口使用 SDK 类型 `meta.VolcengineIAM`。\n\n```go\ntype VolcIAMDTO struct {\n\tId          uint64\n\tAccountId   uint64\n\tAccessKey   string\n\tSecretKey   string\n\tRegion      string\n\tHost        string\n\tSchema      string\n\tAssumeRole  string\n\tDescription string\n\tCreatedAt   time.Time\n\tUpdatedAt   time.Time\n}\n```\n\n字段映射中需要特别注意：\n\n- `Schema` 对应数据库列 `proto_schema`\n- `Description` 对应数据库列 `detail`\n- `SecretKey` 在数据库中保存密文\n- `AccessKey` 明文保存，并作为查询和更新的主要条件\n\n### 加密与解密\n\n火山引擎 IAM 模块通过 `kms.Cipher` 保护 `SecretKey`。\n\n`encryptVolc(volc, encryptsk)` 将 `meta.VolcengineIAM` 转成 `VolcIAMDTO`：\n\n- 总是复制 `AccountId`、`AccessKey`、`Region`、`Host`、`Schema`、`AssumeRole`、`Description`\n- 当 `encryptsk == true` 时调用 `kms.Cipher.Encrypt(volc.Credentials.SecretKey)`\n- 当 `encryptsk == false` 时不设置 `dto.SecretKey`\n\n`decryptVolc(dto)` 将 `VolcIAMDTO` 转回 `meta.VolcengineIAM`：\n\n- 设置 `meta.VolcCredentials.AccessKey`\n- 调用 `kms.Cipher.Decrypt(dto.SecretKey)` 解密密钥\n- 回填 `Region`、`Host`、`Schema`、`AssumeRole`、`Description`\n\n因此，所有返回 `meta.VolcengineIAM` 的读取方法都会尝试解密 `SecretKey`。\n\n### `CreateVolc`\n\n`CreateVolc(ctx, volc)` 创建火山引擎 IAM 账号。\n\n执行流程：\n\n1. 调用 `encryptVolc(volc, true)`，加密 `Credentials.SecretKey`。\n2. 开启事务。\n3. 写入 `t_volcengine_iam`。\n4. 提交事务。\n\n如果加密失败，方法会在进入数据库事务前直接返回错误。\n\n### `UpdateVolc`\n\n`UpdateVolc(ctx, volc)` 按 `access_key` 更新已有账号。\n\n执行流程：\n\n1. 调用 `encryptVolc(volc, volc.Credentials.SecretKey != \"\")`。\n2. 构造 `attrs map[string]interface{}`。\n3. 只把非空字段加入更新集合。\n4. 在事务中执行：\n\n```go\ntx.Where(\"access_key = ?\", dto.AccessKey).Update(attrs)\n```\n\n更新语义是“非空字段更新”：\n\n- `Region` 非空才更新 `region`\n- `Host` 非空才更新 `host`\n- `Schema` 非空才更新 `proto_schema`\n- `AssumeRole` 非空才更新 `assume_role`\n- `Description` 非空才更新 `detail`\n- `SecretKey` 非空才更新 `secret_key`\n\n这意味着调用方不能通过传空字符串清空字段；空字符串会被解释为“不更新”。`SecretKey` 为空时也不会重新加密或覆盖数据库中的密钥。\n\n### `GetVolc`\n\n`GetVolc(ctx, ak)` 根据 `access_key` 查询单个火山引擎 IAM 账号。\n\n执行流程：\n\n1. 查询 `t_volcengine_iam where access_key = ?`。\n2. 如果返回 DTO 的 `AccessKey` 不等于传入 `ak`，返回 `(nil, nil)`。\n3. 调用 `decryptVolc(dto)` 解密并返回。\n\n当前实现使用 `Find(dto)`，而不是 `First(dto)`。因此未命中时不会直接返回 GORM 的未找到错误，而是依赖 `dto.AccessKey != ak` 判断空结果。\n\n### `GetVolcByAccountId`\n\n`GetVolcByAccountId(ctx, accountId)` 查询某个账号 ID 下的所有火山引擎 IAM 配置。\n\n执行流程：\n\n1. 查询 `account_id = ?` 的全部 DTO。\n2. 如果没有记录，返回空切片。\n3. 逐条调用 `decryptVolc`。\n4. 任意一条解密失败都会使整个方法返回错误。\n\n注意参数 `accountId` 是 `string`，而 `VolcIAMDTO.AccountId` 是 `uint64`。调用方需要保证传入值符合数据库查询预期。\n\n### `ListAllPlatformVolcAccounts`\n\n`ListAllPlatformVolcAccounts(ctx)` 查询平台级火山引擎账号。\n\n查询条件固定为：\n\n```sql\naccount_id = 0\n```\n\n返回逻辑与 `GetVolcByAccountId` 相同：无记录返回空切片，有记录则逐条解密。这里的 `account_id = 0` 是平台账号的约定。\n\n### `GetAllVolcs`\n\n`GetAllVolcs(ctx)` 查询表中所有火山引擎 IAM 记录。\n\n与其他批量读取方法不同，`GetAllVolcs` 对解密错误的处理是跳过：\n\n```go\nfor _, dto := range allDTOs {\n\tvolc, err := decryptVolc(dto)\n\tif err == nil {\n\t\tvolcs = append(volcs, volc)\n\t}\n}\n```\n\n因此如果某条记录的密文损坏或 KMS 解密失败，该记录不会出现在返回结果中，方法也不会返回错误。贡献时需要确认这种“跳过坏记录”的语义是否符合上层调用预期。\n\n### `DeleteVolc`\n\n`DeleteVolc(ctx, ak)` 根据 `access_key` 删除火山引擎 IAM 账号。\n\n执行流程：\n\n1. 开启事务。\n2. 执行 `where access_key = ?` 删除。\n3. 提交事务。\n\n删除对象使用 `VolcIAMDTO{}`，与表结构映射保持一致。\n\n## 横切机制\n\n### 指标上报\n\n每个公开方法都会使用类似模式上报指标：\n\n```go\nretryInfo := \"CreateVolcengineIAM\"\nutil.EmitThroughput(util.CommandThroughput, metrics.T{\n\tName:  util.TagCommand,\n\tValue: retryInfo,\n})\ndefer util.EmitLatency(util.CommandLatency, time.Now(), metrics.T{\n\tName:  util.TagCommand,\n\tValue: retryInfo,\n})\n```\n\n`retryInfo` 同时作为：\n\n- 指标标签值\n- `retry.Do` 的操作名称\n\n新增方法时应保持这个模式，便于按命令维度观察吞吐、延迟和重试行为。\n\n### 重试\n\n数据库操作统一通过：\n\n```go\nretry.Do(retryInfo, db.retryTimes, db.retryTimeout, func() error {\n\t// 数据库操作\n})\n```\n\n读写方法都会重试。事务型写入也在 `retry.Do` 内部创建事务，因此每次重试都会开启新的事务。\n\n### 事务与回滚\n\n写入和删除方法通常使用：\n\n```go\ntx := db.w.Table(...).Begin().Context(ctx)\nif res := tx.Create(dto); res.Error != nil {\n\treturn RollbackTX(tx, res.Error)\n}\nreturn tx.Commit().Error\n```\n\nIDC 的多表写入、更新、删除必须在单个事务内完成，否则可能出现元数据和代理记录不一致。火山引擎 IAM 当前虽然大多是单表操作，也使用事务保持一致的写入模式。\n\n### 空切片返回约定\n\n多个查询方法在无数据时返回空切片，而不是 `nil`：\n\n- `GetIdcProxies` 的 `Proxies`\n- `GetIdcProxiesByProgramEnvIdc` 的 `Proxies`\n- `GetAllIdcProxies` 中每个 IDC 的 `Proxies`\n- `GetVolcByAccountId`\n- `ListAllPlatformVolcAccounts`\n\n这个约定对 JSON 输出友好，调用方通常可以直接遍历结果。","middleware":"# Middleware\n\n## 模块职责\n\n`middleware` 包负责 Gin 请求的统一入口和出口处理：认证、限流、标准响应写出、缓存协商、指标上报、Trace 标记，以及 OpenAPI 场景下的 AGW 租户密钥管理和响应加密。\n\n业务 handler 通常不直接写 HTTP 响应，而是调用 `Response(c, mkey, f)` 或 `ResponseZti(c, mkey, f)`，把业务结果以 `errno.Payload` 写入 Gin context。外层的 `ResponseMiddleware`、`OpenapiMiddleware`、`ZtiResponseMiddleware` 等再统一完成序列化和观测逻辑。\n\n## 核心数据约定\n\n模块通过 Gin context 传递处理结果：\n\n- `MKeyContextKey = \"mkey\"`：当前接口的业务方法名，用于限流、指标、Trace 名称。\n- `ResultDataContextKey = \"data\"`：业务返回的 `errno.Payload`。\n- `CallerPSMKey = \"CALLER_PSM\"`：调用方 PSM。\n- `\"bucket\"`：部分 handler 设置的 bucket 名，用于吞吐指标维度。\n\n`MyHandler` 是业务处理函数签名：\n\n```go\ntype MyHandler func(c *gin.Context) errno.Payload\n```\n\n`errno.Payload` 中被中间件直接使用的字段包括 `Code`、`Message`、`Data`、`ETag`。\n\n## 标准响应流程\n\n```mermaid\nflowchart TD\n    A[客户端请求] --> B[ResponseMiddleware]\n    B --> C{checkTokenValid}\n    C -- 通过 --> D[业务 handler]\n    D --> E[Response]\n    E --> F[MyHandler]\n    F --> G[写入 mkey 和 data]\n    C -- 失败 --> H[写入 BadRequest Payload]\n    G --> I[统一响应、指标、Trace]\n    H --> I\n```\n\n`Response(c, mkey, f)` 是普通业务接口的 handler 包装器。它本身不写 HTTP 响应，只负责限流和设置 context：\n\n1. 根据请求方法生成限流 key。\n   - `GET` 请求使用 `X-Tt-From:mkey`，读接口按调用方隔离。\n   - 非 `GET` 请求使用 `mkey`，写/删操作走接口级全局限流。\n2. 先检查 `util.AllowInterface(mkey)` 本地接口限流。\n3. 再检查 `util.GetDistributedRateLimiter().Allow(rateLimitKey)` 分布式限流。\n4. 限流通过时执行 `f(c)`，否则返回 `errno.ErrTooManyRequests`。\n5. 将 `mkey` 和 `errno.Payload` 写入 `MKeyContextKey`、`ResultDataContextKey`。\n\n使用该模式的 handler 必须保证最终设置了 `ResultDataContextKey`，否则外层中间件中的 `dataRet.(errno.Payload)` 会 panic。\n\n## `ResponseMiddleware`\n\n`ResponseMiddleware()` 是带 SDK request token 校验的标准响应中间件。\n\n请求进入时，它读取 `X-Tt-From` 作为调用方 PSM，空值降级为 `\"unknown\"`，并写入 `CallerPSMKey`。随后从 `client.REQUEST_TOKEN_HEADER` 读取请求 token，并通过 `checkTokenValid` 校验。\n\n`checkTokenValid` 的规则是：\n\n- 在 `env.DC_SGCOMM1` 且 token 为空时允许通过，返回 `SdkVersion: \"unknown\"`。\n- 其他环境下 token 不能为空。\n- 使用 `kms.DecryptRequestToken` 解密 token。\n- 解密后的 JSON 必须能反序列化为 `client.RequestToken`。\n- `ClientPSM`、`RequestTimestamp`、`InterfaceName` 必须有效。\n- 请求时间与当前时间差不能超过 `ValidRequestTimeInterval`，即 300 秒。\n\ntoken 校验失败时，中间件会 `Abort` 请求，并设置 `errno.CodeBadRequest`。如果能从 token 中解析出 `InterfaceName`，则使用它作为 `mkey`；否则按请求方法和路径推断，例如 `PATCH` 对应 `client.InterfaceUpdateBucket`，`POST` 对应 `client.InterfaceCreateBucket`，`/bktmeta-api/v1/signature` 对应 `\"buckets.signature\"`。\n\n响应阶段统一处理：\n\n- 设置 CORS header。\n- 设置 `Cache-Control`、`Pragma`、`Expires` 禁用缓存。\n- 如果 `data.Data` 是 `[]byte`，按缓存响应处理：\n  - `If-None-Match` 等于 `data.ETag` 时返回 `304 Not Modified`。\n  - 否则设置 `ETag` 并用 `c.Data` 输出原始 JSON 字节。\n- 如果 `data.Data` 不是 `[]byte`，用 `c.JSON(http.StatusOK, data)` 序列化。\n- 调用 `util.EmitLatency`、`util.EmitThroughput`、必要时 `util.EmitError`。\n- 通过 `bytedtracer` 设置 span name、from service、业务状态码和错误信息。\n\n## `ResponseMiddlewareWithoutAuthCheck`\n\n`ResponseMiddlewareWithoutAuthCheck()` 保留标准响应写出、ETag、指标和 Trace 逻辑，但不校验 request token。\n\n它使用：\n\n- `X-TT-From` 获取调用方 PSM。\n- `X-TT-Bkt-Simple-Sdk-Version` 获取 SDK 版本。\n\n该中间件适合不需要 SDK token 校验的轻量接口或 simple API。业务 handler 仍应通过 `Response(c, mkey, f)` 写入 `mkey` 和 `data`。\n\n## `BPMMiddleware`\n\n`BPMMiddleware()` 面向 BPM 调用场景，调用方 PSM 固定为 `\"bpm.bpm.bpm\"`。\n\n它在业务 handler 执行后调用 `toBPMPayload` 转换响应：\n\n- `errno.CodeOK` 会被转换为 `errno.CodeOKZero`。\n- 非成功 code 保持原值。\n- `Message` 和 `Data` 原样保留。\n\n转换后的 payload 通过 `json.Marshal` 后由 `c.Data(http.StatusOK, \"application/json\", bytes)` 输出。该中间件会上报 `EmitLatency` 和 `EmitThroughput`，但不像 `ResponseMiddleware` 那样设置完整错误 Trace。\n\n## OpenAPI 与 AGW 鉴权\n\n`OpenapiMiddleware()` 用于 AGW/OpenAPI 暴露接口，核心差异是请求鉴权依赖 AGW 租户 AK/SK，成功响应会被加密。\n\n```mermaid\nflowchart TD\n    A[StartRefreshAGWTenantAkSkCache] --> B[agwTenantAkSkCache]\n    C[OpenapiMiddleware] --> D[checkAgwAuth]\n    D --> B\n    C --> E[业务 handler]\n    E --> F[encryptOpenapiData]\n    F --> G[加密后的 Payload]\n```\n\n`checkAgwAuth(c)` 读取并校验：\n\n- `Agw-Auth`：格式注释为 `auth-协议版本/$access_key/$timestamp/$expiretime/$signature`。\n- `Agw-Auth-Ak`：必须与 `Agw-Auth` 中解析出的 AK 一致。\n- `GetAGWTenantSk(ak)`：必须能从本地缓存找到 SK。\n\n当前实现只校验 AK 参数一致性以及 AK 是否存在于缓存中；时间戳、过期时间和签名内容没有在该函数内校验。\n\n鉴权失败时，中间件设置 `errno.CodeForbidden`。鉴权成功时执行后续业务 handler。响应阶段会将 `mkey` 加上 `\".openapi\"` 后缀，用于指标和 Trace 区分。\n\n`encryptOpenapiData(ctx, agwTenantSk, payload)` 只处理 `payload.Code == errno.CodeOK` 的成功响应：\n\n1. 如果 `payload.Data` 是 `[]byte`，说明可能是 allBuckets 缓存的完整响应体，先反序列化回 `errno.Payload`。\n2. 将 `payload.Data` 序列化为 JSON。\n3. 使用 `util.EncryptWithMetadata([]byte(agwTenantSk), string(v))` 加密。\n4. 将加密结果写回 `payload.Data`。\n\nOpenAPI 响应也支持 ETag。如果客户端 `If-None-Match` 命中，直接返回 `304`，不会执行加密。否则加密后输出 JSON；如果原 payload 带 `ETag`，会写入 HTTP header，并从 JSON payload 中清空 `ETag` 字段。\n\n## AGW 租户 AK/SK 缓存\n\n`agw.go` 维护全局 `agwTenantAkSkCache sync.Map`，结构是：\n\n```go\nak -> sk\n```\n\n`StartRefreshAGWTenantAkSkCache()` 在进程启动时由 `main` 调用，负责初始化和周期刷新：\n\n1. 读取 `config.Conf.AGWConfig`。\n2. 如果 `AGWConfig.Switch` 关闭，记录日志后直接返回。\n3. 从 KMS 读取 `OpenapiPasswordConfigKey` 对应的 AGW OpenAPI 密码。\n4. 调用 `asyncUpdateAGWTenantCache` 做首次同步；首次失败会 panic。\n5. 启动 goroutine，每 30 分钟刷新一次缓存；周期刷新失败不会清空已有缓存。\n\n`asyncUpdateAGWTenantCache(agwConfig, password)` 有两种数据源：\n\n- 当 `tcc.GetAGWTenantConfigs().UseTCC` 为 true 时，调用 `refreshAGWTenantFromTCC`，从 TCC 配置写入 AK/SK。\n- 否则请求 AGW OpenAPI：`GET {OpenapiHost}/tenant/all{ServerId}`，使用 BasicAuth 传入 `OpenapiUserName` 和 KMS 中读取的密码，然后将响应反序列化为 `AkSkRsp`。\n\n`AkSkRsp` 的响应结构是：\n\n```go\ntype AkSkRsp struct {\n    Data []config.AGWTenantConfig `json:\"data\"`\n}\n```\n\n`refreshAGWTenantFromTCC(ctx, tccCfg)` 和 HTTP 刷新逻辑都会遍历 `tenantConfig.AkSks`，将每组 `Ak`、`Sk` 写入 `agwTenantAkSkCache`。\n\n`GetAGWTenantSk(ak)` 是 OpenAPI 鉴权读取缓存的唯一公开入口，返回 `(sk, true)` 或 `(\"\", false)`。\n\n需要注意：当前刷新逻辑只会新增或覆盖 AK/SK，不会删除已经从远端配置移除的旧 AK。\n\n## ZTI 响应路径\n\n`zti_middleware.go` 提供基于 `JWT-Sec-Token` 的 ZTI 鉴权路径。\n\n`ResponseZti(c, mkey, f)` 是 ZTI 场景的 handler 包装器：\n\n1. 从 header 读取 `JWT-Sec-Token`。\n2. 调用 `tk.VerifyToken(token, c.ClientIP(), \"\")` 校验 token。\n3. 校验成功后取 `identity.PSM`。\n4. 调用 `tcc.CheckAuthV2(c, psm, mkey)` 做 PSM 到接口的授权校验。\n5. 授权通过后调用普通 `Response(c, mkey, f)`，因此仍会走 `Response` 内的本地限流和
