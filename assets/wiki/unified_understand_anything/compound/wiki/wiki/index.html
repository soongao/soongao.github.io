n` 返回更新后的版本。\n- `ErrorCode_InvalidGeneration` 表示 generation 不匹配。\n\n这组模型通常用于需要 CAS 或版本冲突处理的场景。\n\n### 过期与扫描\n\n`ExpireRequest` / `ExpireResponse` 用于修改过期时间：\n\n- `Key`、`TableName`、`TimeUnit` 必填。\n- `TtlOrTs` 表示相对 TTL 或绝对时间戳，含义由 `TimeUnit` 决定。\n- `TimeoutMillisec` 和 `Base` 可选。\n\n`ScanRowRequest` / `ScanRowResponse` 用于扫描一行或一组键值：\n\n- `ScanRowRequest.Key`、`TableName`、`Limit` 必填。\n- `StartPoint` 是默认字段，不是指针；未设置时为零值 `nil`。\n- `Offset`、`TimeoutMillisec`、`Priority`、`IoPriority`、`Base` 可选。\n- `ScanRowResponse.Resps` 是 `[]*ScannedKV`，每个 `ScannedKV` 包含 `Key`、`Value`、`TtlInMillisec`。\n\n## 枚举与数据库接口\n\n本包生成的枚举包括：\n\n- `ErrorCode`：请求错误码，例如 `ErrorCode_Success`、`ErrorCode_NotFound`、`ErrorCode_InvalidGeneration`、`ErrorCode_ServiceUnavailable`。\n- `TimeUnit`：TTL 单位，包括 `Second`、`MilliSecond`、`AbsoluteTimeSecond`、`AbsoluteMilliSecond`。\n- `ExistType`：当前只有 `ExistType_ExistNX`。\n- `Priority`：读路由优先级，例如 `ReadMasterOnly`、`ReadSlavePreferred`。\n- `IoPriority`：IO 优先级，包括 `Normal`、`Low`、`Idle`。\n- `Flags`：读取标志，包括 `NoCacheInsert` 和 `HeaderOnly`。\n- `BatchResponseCode`：批量整体状态，`Error` 或 `Success`。\n\n每个枚举都生成了固定辅助方法：\n\n```go\nfunc (p ErrorCode) String() string\nfunc ErrorCodeFromString(s string) (ErrorCode, error)\nfunc ErrorCodePtr(v ErrorCode) *ErrorCode\nfunc (p *ErrorCode) Scan(value interface{}) error\nfunc (p *ErrorCode) Value() (driver.Value, error)\n```\n\n其他枚举也遵循同样模式。`Scan` 和 `Value` 让这些枚举可以作为 `database/sql` 字段读写；底层存储值是 `int64`。\n\n## 读写协议执行流\n\n每个结构体都实现 `Read(iprot thrift.TProtocol)` 和 `Write(oprot thrift.TProtocol)`。\n\n`Read` 的执行模式固定：\n\n1. 调用 `apache_warning.WarningApache(\"TypeName\")`。\n2. `ReadStructBegin` 进入结构体。\n3. 循环 `ReadFieldBegin` 读取字段 id 和 thrift 类型。\n4. 根据字段 id 分派到 `ReadFieldN`。\n5. 类型不匹配或未知字段调用 `iprot.Skip(fieldTypeId)`。\n6. 对必填字段检查 `isset...` 标记，缺失时返回 `thrift.INVALID_DATA`。\n7. 所有错误通过 `thrift.PrependError` 补充结构体名和字段名。\n\n`Write` 的执行模式也固定：\n\n1. 调用 `apache_warning.WarningApache(\"TypeName\")`。\n2. `WriteStructBegin(\"TypeName\")`。\n3. 依次调用 `writeFieldN`。\n4. 可选字段先通过 `IsSet...()` 判断指针是否非空。\n5. 写入 `WriteFieldStop` 和 `WriteStructEnd`。\n\n必填字段在 `Write` 时不会额外检查零值。例如 `GetRequest.writeField1` 会直接写 `p.Key`。调用方构造请求时必须保证必填字段语义正确。\n\n## 可选字段与默认值模式\n\n生成代码用指针表达 optional 字段：\n\n```go\ntype GetRequest struct {\n\tTimeoutMillisec *int64\n\tPriority        *Priority\n\tFlags           *Flags\n}\n```\n\n对应访问方法分三类：\n\n- `IsSetTimeoutMillisec()`：判断字段是否真正出现在对象中。\n- `GetTimeoutMillisec()`：字段未设置时返回包级默认变量 `GetRequest_TimeoutMillisec_DEFAULT`。\n- `SetTimeoutMillisec(val *int64)`：直接设置指针值。\n\n这意味着 `Get...()` 返回零值不代表字段曾经被设置。需要区分“未设置”和“设置为 0”时必须使用 `IsSet...()`。\n\n枚举可选字段可以用生成的指针函数构造：\n\n```go\npriority := abase.PriorityPtr(abase.Priority_ReadMasterOnly)\n\nreq := &abase.GetRequest{\n\tKey:       []byte(\"object-id\"),\n\tTableName: []byte(\"table\"),\n\tPriority:  priority,\n}\n```\n\n## Base 与 BaseResp\n\n请求模型通常包含：\n\n```go\nBase *base.Base `thrift:\"Base,255,optional\" ...`\n```\n\n响应模型通常包含：\n\n```go\nBaseResp *base.BaseResp `thrift:\"BaseResp,255,optional\" ...`\n```\n\n普通编解码路径中，`ReadField255` 会调用 `base.NewBase()` 或 `base.NewBaseResp()`，再调用对应的 `Read`。快速路径中，`k-abase.go` 还生成了 `GetOrSetBase()` 和 `GetOrSetBaseResp()`：\n\n```go\nfunc (p *GetRequest) GetOrSetBase() interface{}\nfunc (p *GetResponse) GetOrSetBaseResp() interface{}\n```\n\n这些方法在字段为空时创建 `base.Base` 或 `base.BaseResp`，用于 Kitex 运行时统一注入和读取基础元信息。\n\n## Kitex 快速路径\n\n`k-abase.go` 是同一套模型的性能补充代码。每个主要结构体都生成：\n\n- `FastRead(buf []byte) (int, error)`\n- `FastReadFieldN(buf []byte) (int, error)`\n- `FastWrite(buf []byte) int`\n- `FastWriteNocopy(buf []byte, w thrift.NocopyWriter) int`\n- `BLength() int`\n- `DeepCopy(s interface{}) error`\n\n普通 `Read` / `Write` 基于 `thrift.TProtocol`，适用于通用协议路径；`FastRead` / `FastWriteNocopy` 基于字节缓冲和 nocopy writer，供 Kitex 高性能编解码路径调用。业务代码通常不直接调用这些方法，但在新增字段或排查序列化问题时，需要同时关注 `abase.go` 和 `k-abase.go` 是否由同一次 IDL 生成保持一致。\n\n`DeepCopy` 会按字段递归复制结构体、切片、嵌套请求响应以及 `base.Base` / `base.BaseResp`。调用图中可以看到它会创建目标结构体，例如 `NewBatchExpireRequest()`、`NewBatchXGetResponse()`，再复制字段值。\n\n## RPC Args/Result 包装类型\n\n每个服务方法都有对应的 `AbaseService...Args` 和 `AbaseService...Result`：\n\n```go\ntype AbaseServiceGetArgs struct {\n\tReq *GetRequest `thrift:\"req,1\" ...`\n}\n\ntype AbaseServiceGetResult struct {\n\tSuccess *GetResponse `thrift:\"success,0,optional\" ...`\n}\n```\n\n这些类型不是业务请求本身，而是 Thrift RPC 方法调用层的包装结构。`abaseservice` 客户端和服务端分发代码会使用它们：\n\n- 请求进入 RPC 时包装成 `AbaseServiceGetArgs`。\n- 响应从 handler 返回后包装成 `AbaseServiceGetResult`。\n- `ReadField1` 通常创建具体请求，例如 `NewGetRequest()`。\n- `ReadField0` 通常创建具体响应，例如 `NewGetResponse()`。\n- `SetSuccess(x interface{})` 通过类型断言设置 `Success` 字段。\n\n## 与仓库其他部分的关系\n\n`kitex_gen/abase/abaseservice` 是本模块最直接的消费者。它生成：\n\n- `client.go`：面向调用方的 `kAbaseServiceClient`，方法签名使用本包请求/响应模型。\n- `server.go`：服务注册入口，`RegisterService` 绑定 `AbaseService` 实现。\n- `abaseservice.go`：底层 `kClient`、方法元信息、handler 分发、args/result 编解码。\n\n`kitex_gen/base` 是本模块的公共依赖，提供 `base.Base` 和 `base.BaseResp`。所有字段 id 为 `255` 的 `Base` / `BaseResp` 都通过该包读写。\n\n仓库中的 `fuxi/client/abase` 当前使用的是外部 `code.byted.org/videoarch/object_data_access/kitex_gen/...` 包，不是这个 `code.byted.org/videoarch/compound/kitex_gen/abase` 包。排查调用链时需要先确认导入路径，避免把两个 Abase 生成模型混用。\n\n## 使用与维护注意事项\n\n不要手工编辑 `kitex_gen/abase/abase.go`、`k-abase.go` 或 `abaseservice` 下的生成文件。字段、枚举、方法签名应从 `idl/abase/abase.thrift` 修改后重新生成。\n\n新增 optional 字段时，调用方应使用 `IsSet...()` 判断是否设置，而不是只看 `Get...()` 的返回值。\n\n新增 required 字段会影响反序列化兼容性。生成的 `Read` 会在字段缺失时返回 `thrift.INVALID_DATA`，旧客户端或旧服务端可能无法互通。\n\n处理批量响应时不要只看 `RespCode`。`BatchResponseCode_Error` 只表示至少存在失败项，最终业务判断需要遍历 `Rsps` 并检查每个响应的 `ErrCode`。\n\n需要传递 `Base` 或读取 `BaseResp` 时优先使用已有字段和生成方法，不要在业务层重新定义并行元信息结构。","generated-rpc-and-protocol-models-base":"# Generated RPC and Protocol Models — base\n\n## 模块职责\n\n`kitex_gen/base` 是 Kitex/Thrift 生成的基础协议模型包，定义 RPC 请求、响应中通用的基础字段，并提供标准 Thrift 协议与 Kitex 二进制快路径的编解码能力。\n\n该模块包含三个核心结构：\n\n- `TrafficEnv`：流量环境标识，用于描述是否开启特定流量环境以及环境名。\n- `Base`：请求侧通用元信息，包含调用链、客户端、地址、透传扩展字段等。\n- `BaseResp`：响应侧通用状态信息，包含状态码、状态消息和扩展字段。\n\n代码由 `thriftgo` 与 Kitex 生成，文件头明确标注 `DO NOT EDIT`。业务代码应通过 IDL 变更重新生成，而不是直接修改这些文件。\n\n## 文件结构\n\n`base.go` 提供标准 Thrift 模型定义和基于 `thrift.TProtocol` 的读写逻辑，包括：\n\n- 结构体字段定义\n- 构造函数：`NewTrafficEnv`、`NewBase`、`NewBaseResp`\n- 默认值初始化：`InitDefault`\n- Getter / Setter\n- 可选字段判断：`IsSetTrafficEnv`、`IsSetExtra`\n- 标准协议读写：`Read`、`Write`\n- 字段级读写：`ReadFieldN`、`writeFieldN`\n- 字符串表示：`String`\n\n`k-base.go` 提供 Kitex 生成的高性能二进制编解码逻辑，包括：\n\n- `FastRead`\n- `FastWrite`\n- `FastWriteNocopy`\n- `BLength`\n- `DeepCopy`\n- 字段级快路径读写与长度计算函数\n\n`k-consts.go` 只包含 `KitexUnusedProtection`，用于避免生成代码中的 unused import 问题。\n\n## 数据模型\n\n### `TrafficEnv`\n\n`TrafficEnv` 描述流量环境信息。\n\n```go\ntype TrafficEnv struct {\n\tOpen bool   `thrift:\"Open,1\" frugal:\"1,default,bool\" json:\"Open\"`\n\tEnv  string `thrift:\"Env,2\" frugal:\"2,default,string\" json:\"Env\"`\n}\n```\n\n字段含义：\n\n| 字段 | Thrift ID | 类型 | 默认值 | 说明 |\n|---|---:|---|---|---|\n| `Open` | `1` | `bool` | `false` | 是否启用流量环境 |\n| `Env` | `2` | `string` | `\"\"` | 流量环境名称 |\n\n`NewTrafficEnv` 会创建带默认值的对象：\n\n```go\nenv := base.NewTrafficEnv()\nenv.SetOpen(true)\nenv.SetEnv(\"boe\")\n```\n\n### `Base`\n\n`Base` 是请求侧通用上下文结构。\n\n```go\ntype Base struct {\n\tLogID      string            `thrift:\"LogID,1\" frugal:\"1,default,string\" json:\"LogID\"`\n\tCaller     string            `thrift:\"Caller,2\" frugal:\"2,default,string\" json:\"Caller\"`\n\tAddr       string            `thrift:\"Addr,3\" frugal:\"3,default,string\" json:\"Addr\"`\n\tClient     string            `thrift:\"Client,4\" frugal:\"4,default,string\" json:\"Client\"`\n\tTrafficEnv *TrafficEnv       `thrift:\"TrafficEnv,5,optional\" frugal:\"5,optional,TrafficEnv\" json:\"TrafficEnv,omitempty\"`\n\tExtra      map[string]string `thrift:\"Extra,6,optional\" frugal:\"6,optional,map<string:string>\" json:\"Extra,omitempty\"`\n}\n```\n\n字段含义：\n\n| 字段 | Thrift ID | 类型 | 是否可选 | 默认值 | 说明 |\n|---|---:|---|---|---|---|\n| `LogID` | `1` | `string` | 否 | `\"\"` | 请求日志或链路 ID |\n| `Caller` | `2` | `string` | 否 | `\"\"` | 调用方标识 |\n| `Addr` | `3` | `string` | 否 | `\"\"` | 调用来源地址 |\n| `Client` | `4` | `string` | 否 | `\"\"` | 客户端标识 |\n| `TrafficEnv` | `5` | `*TrafficEnv` | 是 | `nil` | 流量环境信息 |\n| `Extra` | `6` | `map[string]string` | 是 | `nil` | 额外透传字段 |\n\n可选字段通过 `nil` 判断是否存在：\n\n```go\nb := base.NewBase()\n\nif !b.IsSetTrafficEnv() {\n\tb.SetTrafficEnv(base.NewTrafficEnv())\n}\n\nif !b.IsSetExtra() {\n\tb.SetExtra(map[string]string{})\n}\n\nb.Extra[\"scene\"] = \"delete_video\"\n```\n\n`GetTrafficEnv` 和 `GetExtra` 在字段未设置时返回包级默认变量：\n\n- `Base_TrafficEnv_DEFAULT`\n- `Base_Extra_DEFAULT`\n\n这两个默认变量在当前代码中未初始化，因此未设置时通常返回 `nil`。\n\n### `BaseResp`\n\n`BaseResp` 是响应侧通用状态结构。\n\n```go\ntype BaseResp struct {\n\tStatusMessage string            `thrift:\"StatusMessage,1\" frugal:\"1,default,string\" json:\"StatusMessage\"`\n\tStatusCode    int32             `thrift:\"StatusCode,2\" frugal:\"2,default,i32\" json:\"StatusCode\"`\n\tExtra         map[string]string `thrift:\"Extra,3,optional\" frugal:\"3,optional,map<string:string>\" json:\"Extra,omitempty\"`\n}\n```\n\n字段含义：\n\n| 字段 | Thrift ID | 类型 | 是否可选 | 默认值 | 说明 |\n|---|---:|---|---|---|---|\n| `StatusMessage` | `1` | `string` | 否 | `\"\"` | 状态描述 |\n| `StatusCode` | `2` | `int32` | 否 | `0` | 状态码 |\n| `Extra` | `3` | `map[string]string` | 是 | `nil` | 额外响应信息 |\n\n典型使用方式：\n\n```go\nresp := base.NewBaseResp()\nresp.SetStatusCode(0)\nresp.SetStatusMessage(\"success\")\nresp.SetExtra(map[string]string{\n\t\"trace\": \"enabled\",\n})\n```\n\n业务代码中可以看到对 `BaseResp` 的直接使用，例如 `core/service/checker.go` 中通过 `SetStatusCode` 和 `GetStatusCode` 读写视频删除相关状态。\n\n## 编解码路径\n\n该模块同时支持两套编解码接口：\n\n- 标准 Thrift 协议路径：`Read` / `Write`\n- Kitex 二进制快路径：`FastRead` / `FastWriteNocopy`\n\n```mermaid\nflowchart TD\n    A[\"RPC 字节流\"] --> B[\"FastRead 或 Read\"]\n    B --> C[\"Base / BaseResp / TrafficEnv\"]\n    C --> D[\"业务代码读写字段\"]\n    D --> E[\"Write 或 FastWriteNocopy\"]\n    E --> F[\"RPC 字节流\"]\n```\n\n### 标准 Thrift 协议路径\n\n`base.go` 中的 `Read` 和 `Write` 通过 `github.com/cloudwego/kitex/pkg/protocol/bthrift/apache.TProtocol` 工作。\n\n读取流程以 `Base.Read` 为例：\n\n1. 调用 `apache_warning.WarningApache(\"Base\")`。\n2. 调用 `iprot.ReadStructBegin()` 进入结构体。\n3. 循环调用 `iprot.ReadFieldBegin()` 读取字段类型和字段 ID。\n4. 根据字段 ID 分发到 `ReadField1` 到 `ReadField6`。\n5. 如果字段类型不匹配，调用 `iprot.Skip(fieldTypeId)` 跳过未知或不兼容字段。\n6. 读到 `thrift.STOP` 后调用 `iprot.ReadStructEnd()` 结束。\n\n字段读取函数只负责读取单个字段并赋值。例如：\n\n- `Base.ReadField1` 读取 `LogID`\n- `Base.ReadField5` 创建 `TrafficEnv` 并调用 `_field.Read(iprot)`\n- `Base.ReadField6` 读取 `map<string,string>` 并赋给 `Extra`\n\n写入流程以 `Base.Write` 为例：\n\n1. 调用 `apache_warning.WarningApache(\"Base\")`。\n2. 调用 `oprot.WriteStructBegin(\"Base\")`。\n3. 按字段写入 `writeField1` 到 `writeField6`。\n4. 可选字段在字段级函数中判断是否设置。\n5. 调用 `oprot.WriteFieldStop()`。\n6. 调用 `oprot.WriteStructEnd()`。\n\n`TrafficEnv` 和 `BaseResp` 使用相同模式。\n\n### Kitex 快路径\n\n`k-base.go` 中的快路径基于 `github.com/cloudwego/gopkg/protocol/thrift.Binary`，直接在 `[]byte` 上读写，避免完整 `TProtocol` 抽象带来的额外开销。\n\n核心方法：\n\n| 方法 | 说明 |\n|---|---|\n| `FastRead(buf []byte) (int, error)` | 从二进制缓冲区读取结构体，返回消费的字节数 |\n| `FastWrite(buf []byte) int` | 写入二进制缓冲区，不使用 nocopy writer |\n| `FastWriteNocopy(buf []byte, w thrift.NocopyWriter) int` | 写入二进制缓冲区，并支持字符串 nocopy 写入 |\n| `BLength() int` | 计算当前对象序列化后的二进制长度 |\n| `DeepCopy(s interface{}) error` | 从同类型对象深拷贝字段 |\n\n典型快路径写入顺序：\n\n```go\nb := base.NewBase()\nb.SetLogID(\"log-id\")\n\nbuf := make([]byte, b.BLength())\nn := b.FastWrite(buf)\n_ = n\n```\n\n`BLength` 必须与 `FastWrite` / `FastWriteNocopy` 的实际写入逻辑保持一致。调用方通常先用 `BLength` 分配缓冲区，再调用快路径写入。\n\n## 字段处理细节\n\n### 可选字段\n\n`Base.TrafficEnv`、`Base.Extra` 和 `BaseResp.Extra` 是 optional 字段。\n\n判断函数：\n\n```go\nfunc (p *Base) IsSetTrafficEnv() bool {\n\treturn p.TrafficEnv != nil\n}\n\nfunc (p *Base) IsSetExtra() bool {\n\treturn p.Extra != nil\n}\n\nfunc (p *BaseResp) IsSetExtra() bool {\n\treturn p.Extra != nil\n}\n```\n\n写入时，optional 字段只有在 `IsSet...` 返回 `true` 时才会序列化：\n\n- `Base.writeField5`\n- `Base.writeField6`\n- `BaseResp.writeField3`\n- `Base.fastWriteField5`\n- `Base.fastWriteField6`\n- `BaseResp.fastWriteField3`\n\n这意味着空 map 和 nil map 行为不同：\n\n```go\nresp := base.NewBaseResp()\n\n// 不会写出 Extra 字段\nresp.SetExtra(nil)\n\n// 会写出 Extra 字段，长度为 0\nresp.SetExtra(map[string]string{})\n```\n\n### 默认字段\n\n非 optional 字段总会被写出：\n\n- `TrafficEnv.Open`\n- `TrafficEnv.Env`\n- `Base.LogID`\n- `Base.Caller`\n- `Base.Addr`\n- `Base.Client`\n- `BaseResp.StatusMessage`\n- `BaseResp.StatusCode`\n\n即使它们是零值，也会进入序列化结果。\n\n### map 字段\n\n`Extra` 字段是 `map[string]string`。\n\n标准协议路径中：\n\n- `ReadField6` / `ReadField3` 使用 `ReadMapBegin`\n- 循环读取 key 和 value\n- 最后调用 `ReadMapEnd`\n\n快路径中：\n\n- `FastReadField6` / `FastReadField3` 使用 `thrift.Binary.ReadMapBegin`\n- 循环读取 key 和 value\n- 不需要显式 `ReadMapEnd`\n\n写入 map 时，快路径会先预留 map header 长度，再遍历 map 统计真实元素数量，最后回填 `WriteMapBegin`：\n\n```go\nmapBeginOffset := offset\noffset += thrift.Binary.MapBeginLength()\n\nvar length int\nfor k, v := range p.Extra {\n\tlength++\n\toffset += thrift.Binary.WriteStringNocopy(buf[offset:], w, k)\n\toffset += thrift.Binary.WriteStringNocopy(buf[offset:], w, v)\n}\n\nthrift.Binary.WriteMapBegin(buf[mapBeginOffset:], thrift.STRING, thrift.STRING, length)\n```\n\nGo map 遍历顺序不稳定，因此 `Extra` 的序列化字段顺序不保证稳定。协议语义不依赖 map 顺序，测试中不要断言完整二进制字节序等价。\n\n## 深拷贝行为\n\n`DeepCopy` 在 `k-base.go` 中生成，用于同类型对象之间复制字段。\n\n`TrafficEnv.DeepCopy` 直接复制标量字段。\n\n`Base.DeepCopy` 会：\n\n- 复制 `LogID`、`Caller`、`Addr`、`Client`\n- 如果 `src.TrafficEnv != nil`，创建新的 `TrafficEnv` 并调用其 `DeepCopy`\n- 如果 `src.Extra != nil`，创建新的 map 并复制 key/value\n\n`BaseResp.DeepCopy` 会：\n\n- 复制 `StatusMessage`\n- 复制 `StatusCode`\n- 如果 `src.Extra != nil`，创建新的 map 并复制 key/value\n\n类型不匹配时返回错误：\n\n```go\ndst := base.NewBaseResp()\nerr := dst.DeepCopy(base.NewBase())\n```\n\n该调用会返回类似 `%T's type not matched %T` 的错误。\n\n## 错误处理\n\n生成代码使用 `goto` 标签集中包装错误。错误会通过 `thrift.PrependError` 增加上下文信息，例如：\n\n- 结构体开始读取失败：`read struct begin error`\n- 字段读取失败：`read field <id> '<name>' error`\n- 字段类型不匹配且跳过失败：`skip type <type> error`\n- 字段写入失败：`write field <id> error`\n\n字段名来自这些映射：\n\n- `fieldIDToName_TrafficEnv`\n- `fieldIDToName_Base`\n- `fieldIDToName_BaseResp`\n\n这让协议层错误能定位到具体字段，便于排查 IDL 不兼容、字段类型变更或上游返回异常数据。\n\n## 与代码库其他部分的连接\n\n该模块是多个生成服务和业务路径的基础依赖。\n\n请求侧 `Base` 被服务生成代码使用，例如：\n\n- `compound/mdap/mdap_service.go` 的 `ReadField255`\n- `compound/mdap/k-mdap_service.go` 的 `GetOrSetBase`\n- `kitex_gen/abase/abase.go` 的 `ReadField255`\n- `kitex_gen/abase/k-abase.go` 的 `GetOrSetBase`\n\n响应侧 `BaseResp` 被客户端、服务和测试使用，例如：\n\n- `client/video_delete/video_delete.go` 中多个删除接口创建 `NewBaseResp`\n- `core/service/checker.go` 中 `VideoDelete` 通过 `GetStatusCode` / `SetStatusCode` 处理状态\n- `compound/mdap/k-mdap_service.go` 和 `kitex_gen/abase/k-abase.go` 中的 `GetOrSetBaseResp`\n- `client/oda/oda_test.go` 和 `comm/midware/downstream_ratelimit_test.go` 中构造测试响应\n\n这些调用说明 `base` 包不是业务实现层，而是 RPC 边界上的公共数据模型。业务代码通常只需要构造、读取和设置字段；协议读写由 Kitex 框架或生成服务代码调用。\n\n## 维护注意事项\n\n不要手动编辑 `kitex_gen/base/base.go`、`kitex_gen/base/k-base.go` 或 `kitex_gen/base/k-consts.go`。字段、类型、optional 语义、Thrift ID 等都应从 IDL 修改后重新生成。\n\n变更 IDL 时需要特别关注：\n\n- 字段 ID 必须保持兼容，不能随意复用已有 ID。\n- 修改字段类型会导致旧数据被 `Skip`，或在强依赖场景中产生协议兼容问题。\n- optional 字段的 `nil` 与空值语义不同。\n- `Base` 和 `BaseResp` 是跨服务公共模型，变更会影响生成代码、客户端、服务端和测试。\n- 快路径的 `BLength`、`FastWriteNocopy`、`FastRead` 由生成器保证一致，人工修改很容易破坏序列化长度计算。","generated-rpc-and-protocol-models-bytedance":"# Generated RPC and Protocol Models — bytedance\n\n## 模块定位\n\n`kitex_gen/bytedance/videoarch/compound` 是 Kitex 根据 Thrift IDL 生成的 RPC 接入层和协议模型代码，主要提供两类能力：\n\n1. `compoundservice` 包：`CompoundService` 的客户端、服务端注册、Invoker 和 Kitex `ServiceInfo` 元数据。\n2. `mdap` 包：MDAP 相关请求/响应结构的 Thrift 编解码、字段访问、深拷贝和默认构造逻辑。\n\n这些文件带有 `Code generated by Kitex ... DO NOT EDIT.` 标记，业务逻辑不应在这里修改。服务实现、参数校验、查询构造和处理流程位于 `handler/`、`mdap/service/`、`core/service/` 等业务包中；本模块负责把这些业务方法暴露为 Kitex 可调用的 RPC 接口，并把 Thrift 二进制数据转换为 Go 结构体。\n\n## RPC 服务包装\n\n`compoundservice.Client` 定义了 `CompoundService` 的完整客户端接口，方法覆盖资产组、来源、产物、属性、查询、删除、TTL、文件 URL、处理任务以及内部索引维护：\n\n```go\ntype Client interface {\n\tCreateAssetGroup(ctx context.Context, req *mdap.CreateAssetGroupRequest, callOptions ...callopt.Option) (*mdap.CreateAssetGroupResponse, error)\n\tQueryAssetGroups(ctx context.Context, req *mdap.QueryAssetGroupsRequest, callOptions ...callopt.Option) (*mdap.QueryAssetGroupsResponse, error)\n\tSetAttr(ctx context.Context, req *compound.SetAttrReq, callOptions ...callopt.Option) (*compound.SetAttrResp, error)\n\tGetFileURLs(ctx context.Context, request *compound.GetFileURLsRequest, callOptions ...callopt.Option) (*compound.GetFileURLsResponse, error)\n\tUpdateIdxWithEventForInternal(ctx context.Context, req *compound.UpdateIdxWithEventReq, callOptions ...callopt.Option) (*compound.UpdateIdxWithEventResp, error)\n}\n```\n\n`NewClient` 和 `NewClientWithBytedConfig` 创建客户端时会注入 ByteDance Kitex 套件：\n\n- `client.WithDestService(destService)` 指定目标服务名。\n- `byted.ClientSuiteWithConfig(serviceInfo(), config)` 或 `byted.ClientSuiteWithConfig(serviceInfoForClient(), config)` 注入内部治理、编解码和服务元信息。\n- `client.NewClient(serviceInfoForClient(), options...)` 创建底层 Kitex client。\n- 返回值包装为 `kCompoundServiceClient`，对外暴露带 `callopt.Option` 的 IDL 兼容方法。\n\n每个客户端方法的执行模式一致：先通过 `client.NewCtxWithCallOptions(ctx, callOptions)` 把调用选项写入 `context.Context`，再委托给内部 `kClient`。内部 `kClient` 构造对应的 `CompoundServiceXXXArgs` 和 `CompoundServiceXXXResult`，通过 `p.c.Call(ctx, \"MethodName\", &_args, &_result)` 发起真实 RPC，并返回 `_result.GetSuccess()`。\n\n```mermaid\nflowchart LR\n    A[\"业务调用方\"] --> B[\"compoundservice.Client\"]\n    B --> C[\"kCompoundServiceClient\"]\n    C --> D[\"kClient\"]\n    D --> E[\"client.Client.Call\"]\n    E --> F[\"远端 CompoundService\"]\n```\n\n## 服务端注册和本地 Invoker\n\n服务端入口在 `compoundservice/server.go`：\n\n- `NewServer(handler compound.CompoundService, opts ...server.Option)` 创建 Kitex `server.Server`。\n- `NewServerWithBytedConfig(handler, config, opts...)` 使用显式 `byted.ServerConfig`。\n- `RegisterService(svr, handler, opts...)` 把已有 server 与 `CompoundService` handler 绑定。\n\n`NewServer` 会按顺序添加：\n\n1. `byted.ServerSuite(serviceInfo())`\n2. 调用方传入的 `server.Option`\n3. `server.WithCompatibleMiddlewareForUnary()`\n\n随后执行 `svr.RegisterService(serviceInfo(), handler)`。如果注册失败会直接 `panic`，这符合生成代码常见模式：服务启动阶段失败应立即暴露。\n\n`invoker.go` 提供 `NewInvoker` 和 `NewInvokerWithBytedConfig`，用于创建 `server.Invoker`。它们同样注册 `serviceInfo()`，并在 `RegisterService` 后调用 `s.Init()`。该入口通常用于测试、本地执行或框架内部直接调用链路，例如 `core/test/test_common.go` 中的 `localRun` 会使用 `NewServer` / `NewClient` 搭建本地调用环境。\n\n## ServiceInfo 和方法分发\n\n`compoundservice.go` 中的 `serviceMethods` 是 Kitex 方法表。每个 RPC 方法通过 `kitex.NewMethodInfo` 绑定三类信息：\n\n- handler 函数，例如 `createAssetGroupHandler`\n- args 构造函数，例如 `newCompoundServiceCreateAssetGroupArgs`\n- result 构造函数，例如 `newCompoundServiceCreateAssetGroupResult`\n- streaming 配置，当前全部为 `kitex.StreamingNone`\n\n`newServiceInfo` 组装最终的 `kitex.ServiceInfo`：\n\n```go\nsvcInfo := &kitex.ServiceInfo{\n\tServiceName:     \"CompoundService\",\n\tHandlerType:     (*compound.CompoundService)(nil),\n\tMethods:         methods,\n\tPayloadCodec:    kitex.Thrift,\n\tKiteXGenVersion: \"v1.22.0\",\n\tExtra:           map[string]interface{}{\"PackageName\": \"compound\"},\n}\n```\n\n服务端收到请求后，Kitex 根据方法名找到 `MethodInfo`，创建 args/result，调用对应 handler。handler 再把泛型 `handler interface{}` 断言为 `compound.CompoundService`，把反序列化后的请求字段传给业务实现：\n\n```go\nfunc queryAssetGroupsHandler(ctx context.Context, handler interface{}, arg, result interface{}) error {\n\trealArg := arg.(*compound.CompoundServiceQueryAssetGroupsArgs)\n\trealResult := result.(*compound.CompoundServiceQueryAssetGroupsResult)\n\tsuccess, err := handler.(compound.CompoundService).QueryAssetGroups(ctx, realArg.Req)\n\tif err != nil {\n\t\treturn err\n\t}\n\trealResult.Success = success\n\treturn nil\n}\n```\n\n这个分发层不做业务校验。以 `QueryAssetGroups` 为例，真实业务调用链会进入 `handler/handler.go` 和 `mdap/service/mdap.go`，再通过生成的 `GetSpace()`、`GetMediaTypes()`、`IsSetSpace()` 等访问器读取请求字段。\n\n## MDAP 协议模型\n\n`mdap/k-mdap_service.go` 是高性能 Thrift 编解码实现。它围绕每个请求/响应结构生成以下方法族：\n\n- `FastRead(buf []byte) (int, error)`：从 Thrift binary buffer 读取结构体。\n- `FastReadFieldN(buf []byte) (int, error)`：读取指定字段。\n- `FastWrite(buf []byte) int`：写入 Thrift binary buffer。\n- `FastWriteNocopy(buf []byte, w thrift.NocopyWriter) int`：支持 nocopy writer 的写入路径。\n- `BLength() int`：计算序列化后所需 buffer 长度。\n- `fieldNLength()`：计算单个字段长度。\n- `DeepCopy(s interface{}) error`：结构体深拷贝。\n\n典型读取流程会循环读取 field begin，根据 `fieldId` 和 `fieldTypeId` 分派到字段读取函数。类型不匹配时调用 `thrift.Binary.Skip` 跳过未知或不兼容字段；必填字段缺失时返回 `thrift.NewProtocolException(thrift.INVALID_DATA, ...)`。\n\n例如 `CreateAssetGroupRequest.FastRead` 要求以下字段必须存在：\n\n- `Space`，field id `1`\n- `Name`，field id `2`\n- `MediaTypes`，field id `3`\n- `SourceConfigs`，field id `4`\n- `Base`，field id `255`\n\n可选字段使用指针表示，例如 `Description *string`、`Creator *string`、`ArtifactConfig *mdap_model.ArtifactConfig`，写入时通过 `IsSetDescription()`、`IsSetCreator()`、`IsSetArtifactConfig()` 判断是否输出字段。\n\n## 基础字段和模型依赖\n\nMDAP 请求普遍依赖 `kitex_gen/base` 和 `kitex_gen/mdap_model`：\n\n- 请求结构通常包含 `Base *base.Base`，字段号为 `255`。\n- 响应结构通常包含 `BaseResp *base.BaseResp`，字段号为 `255`。\n- 资产组、来源、产物等实体来自 `mdap_model`，例如 `AssetGroup`、`Source`、`Artifact`、`SourceConfig`、`ArtifactConfig`。\n\n读取嵌套结构时，生成代码会调用对应模型构造函数和编解码方法：\n\n```go\n_field := mdap_model.NewArtifactConfig()\nl, err := _field.FastRead(buf[offset:])\np.ArtifactConfig = _field\n```\n\n对于列表和 map，代码会预分配容器并逐项读取。列表中的结构体常见优化模式是先创建连续 value slice，再把元素地址 append 到目标 slice：\n\n```go\n_field := make([]*mdap_model.SourceConfig, 0, size)\nvalues := make([]mdap_model.SourceConfig, size)\nfor i := 0; i < size; i++ {\n\t_elem := &values[i]\n\t_elem.InitDefault()\n\t_elem.FastRead(buf[offset:])\n\t_field = append(_field, _elem)\n}\n```\n\n这种模式减少了逐元素堆分配，但调用方仍应把返回结构视为普通指针对象使用。\n\n## 与业务代码的连接点\n\n本模块是业务代码和 RPC 框架之间的边界层。常见入口关系如下：\n\n- `client/compound/compound.go` 初始化远端客户端时调用 `compoundservice.NewClient`。\n- `core/test/test_common.go` 的本地测试链路调用 `compoundservice.NewServer` 和 `compoundservice.NewClient`。\n- `handler/handler.go` 实现对外 RPC handler，并返回生成的响应结构，例如 `CreateSourceResponse`、`QuerySourcesResponse`、`UpdateAssetGroupResponse`。\n- `mdap/service/mdap.go` 使用生成模型的 getter 和 isset 方法读取请求参数，例如 `GetCreator()`、`GetArtifactConfig()`、`GetIDs()`、`GetMediaTypes()`。\n- `mdap/service/mdap_validator.go` 使用同一批访问器做参数校验，例如 `ValidateCreateAssetGroupRequest`、`ValidateQueryAssetGroupsRequest`。\n- `core/service/pack_url.go` 在 `MGetArtifacts` 链路中通过生成模型的 `GetDomainType()` 判断文件 URL 权限。\n\n因此，新增或变更 RPC 字段时，不能只看生成代码。需要同步关注 IDL、业务校验、handler、service 实现、测试用例以及调用方字段访问。\n\n## 维护注意事项\n\n这些文件应通过 Kitex/IDL 重新生成，而不是手写修改。手动改动会在下一次生成时丢失，也容易破坏字段号、必填约束或 Thrift 兼容性。\n\n字段兼容性主要由 Thrift 字段号决定。已有字段的 field id 不应复用或改变；新增可选字段应优先使用新的 field id，并确保业务层通过 `IsSetXxx()` 或 getter 处理缺省值。\n\n`Base` 和 `BaseResp` 是请求/响应的基础上下文字段，许多生成结构把 field `255` 作为必填字段处理。构造请求或响应时如果遗漏这些字段，反序列化或调用链路可能返回 required field not set 错误。\n\n`MustNewClient`、`MustNewClientWithBytedConfig`、`NewServer`、`NewInvoker` 等入口会在初始化失败时 `panic`。业务启动代码可以使用这些函数快速失败；需要显式处理错误的客户端初始化场景应使用 `NewClient` 或 `NewClientWithBytedConfig`。","generated-rpc-and-protocol-models-mdap-model":"# Generated RPC and Protocol Models — mdap_model\n\n## 模块定位\n\n`kitex_gen/mdap_model` 是 MDAP 领域模型的生成代码包，承载 RPC 层、Thrift 协议层和服务层之间共享的数据结构。它定义了资产组、源文件、衍生产物、媒体元信息、存储位置、任务执行配置等模型，并为这些模型生成序列化、反序列化、拷贝和可选字段判断方法。\n\n该包由生成器维护：\n\n- `mdap_model.go`：由 `thriftgo` 生成，包含枚举、结构体、`Read` / `Write`、`GetXxx`、`IsSetXxx`、`NewXxx` 等常规 Thrift 代码。\n- `k-mdap_model.go`：由 Kitex 生成，包含高性能二进制编解码方法，如 `FastRead`、`FastWriteNocopy`、`BLength`、`DeepCopy`。\n- `k-consts.go`：仅提供 `KitexUnusedProtection`，用于避免生成代码中的 unused import 问题。\n\n这些文件头部都标记了 `DO NOT EDIT`。需要调整字段、枚举或协议时，应修改上游 IDL 并重新生成代码，而不是手工改生成文件。\n\n## 核心数据模型\n\n### 媒体元信息\n\n媒体元信息用于描述源文件或产物的基础属性。服务层会根据 `Source.MediaType` 校验 `Source.Meta` 能否反序列化为对应结构：\n\n- `\"video\"` → `VideoMeta`\n- `\"image\"` → `ImageMeta`\n- `\"audio\"` → `AudioMeta`\n- `\"text\"` → `TextMeta`\n\n`VideoMeta` 是容器级视频元信息，包含 `Duration`、`Width`、`Height`、`Codec`、`FPS`、`Bitrate`、`Size`，并可包含多路 `VideoStreams` 和 `AudioStreams`。\n\n`ImageMeta`、`AudioMeta`、`TextMeta` 中部分字段是 optional 指针字段。例如：\n\n```go\nbitDepth := int32(8)\nmeta := &mdap_model.ImageMeta{\n\tWidth:    1920,\n\tHeight:   1080,\n\tFormat:   \"jpeg\",\n\tSize:     1024,\n\tBitDepth: &bitDepth,\n}\n```\n\n读取 optional 字段时，如果需要区分“未设置”和“设置为零值”，使用生成的 `IsSetBitDepth`、`IsSetHasAlpha`、`IsSetEncoding` 等方法。`GetXxx` 方法会在字段未设置时返回类型零值。\n\n### 存储与输入配置\n\n`StoreLocation` 表示一个文件位置：\n\n- `Type`：`StoreType_TOS`、`StoreType_HDFS`、`StoreType_NAS`\n- `Path`：实际 URI 或路径\n- `DownloadURL`：optional 字段，主要由查询接口在需要签名 URL 时填充\n\n`SourceConfig` 描述源文件如何进入系统：\n\n- `Type`：`SourceType_VDA`、`SourceType_MessEngine`、`SourceType_TOS`、`SourceType_URL`、`SourceType_HDFS`\n- `NeedFetch`：是否需要拉取\n- `FetchStatus`：拉取状态\n- `Locations`：可用存储位置列表\n- `Config`：binary 字段，服务层按 JSON 字节处理\n\n`Config` 的具体 JSON 结构由 `Type` 决定：\n\n- `SourceType_VDA` → `SourceConfigVDA`，要求 `VodSpace` 非空\n- `SourceType_TOS` → `SourceConfigTOS`，要求 `Bucket` 非空\n- `SourceType_URL` → `SourceConfigURL`\n- `SourceType_MessEngine`、`SourceType_HDFS` 当前没有专用配置结构\n\n服务层的 `validateSourceConfigConfig` 使用 `sonic.Unmarshal` 校验这些 `Config` 字节。\n\n### 资产组、源和资产\n\n`AssetGroup` 是 MDAP 的组织单元，包含：\n\n- 标识字段：`ID`、`Space`、`Name`\n- 媒体范围：`MediaTypes`\n- 统计字段：`SourceCount`、`Size`\n- 创建信息：`Creator`、`CreateTime`、`UpdateTime`\n- 输入配置：`SourceConfigs`\n- 产物配置：`ArtifactConfig`\n- optional 描述：`Description`\n\n`Source` 表示一个接入的源文件，包含 `BizID`、`AssetGroupID`、`MediaType`、`Format`、`Meta`、`Config`、`Tags` 等字段。`CreateSource` 会把 `Source.Meta` 和 `Source.Config` 持久化到属性系统中，`parseSourceFromQuery` 再从属性路径恢复为 `Source`。\n\n`Asset` 是更轻量的业务资产模型，当前字段包括 `ID`、`BizID`、`Name`、`AssetGroupID`、`Tags`、创建更新时间。\n\n### 产物模型\n\n`Artifact` 表示由 `Source` 或其他 `Artifact` 衍生出的结果：\n\n- `DeriveType`：`DeriveType_Source` 或 `DeriveType_Artifact`\n- `DeriveID`：来源对象 ID\n- `Contents`：一个或多个 `ArtifactContent`\n- `AssetGroupID`：所属资产组\n\n`ArtifactContent` 按 `Type` 区分 payload：\n\n- `ArtifactType_Snapshots`：`Contents` 中的每个元素是 JSON 序列化后的 `ArtifactSnapshots`\n- `ArtifactType_Audio`：`Contents` 中的每个元素是 JSON 序列化后的 `ArtifactAudio`\n- `ArtifactType_Image`：`Contents` 中的每个元素是 JSON 序列化后的 `ArtifactImage`\n\n`ArtifactBlob` 是产物外部文件的索引信息，包含 `Location`、`Size` 和 optional `ContentType`。服务层的 `buildArtifactAttrs` 会把 `ArtifactContent.Contents` 做 base64 编码后写入属性系统；`parseArtifactFromQuery` 读取时再 base64 解码回 `[]byte`。\n\n## 模型关系\n\n```mermaid\ngraph TD\n  资产组[\"AssetGroup\"]\n  源配置[\"SourceConfig\"]\n  产物配置[\"ArtifactConfig\"]\n  存储位置[\"StoreLocation\"]\n  任务执行[\"JobExecution\"]\n  源[\"Source\"]\n  产物[\"Artifact\"]\n  内容[\"ArtifactContent\"]\n  文件块[\"ArtifactBlob\"]\n\n  资产组 --> 源配置\n  资产组 --> 产物配置\n  源配置 --> 存储位置\n  产物配置 --> 存储位置\n  产物配置 --> 任务执行\n  源 --> 源配置\n  产物 --> 内容\n  内容 --> 文件块\n  文件块 --> 存储位置\n```\n\n## 生成方法的使用方式\n\n每个结构体通常都有以下生成方法：\n\n- `NewXxx()`：创建对象并调用 `InitDefault()`。\n- `InitDefault()`：初始化默认值。当前多数模型没有复杂默认值，但读取嵌套结构时生成代码仍会调用它。\n- `GetXxx()`：nil-safe getter。optional 字段未设置时返回零值。\n- `IsSetXxx()`：仅为 optional 字段生成，用于判断字段是否真实存在。\n- `Read(iprot thrift.TProtocol)` / `Write(oprot thrift.TProtocol)`：常规 Apache Thrift 协议读写。\n- `FastRead(buf []byte)` / `FastWrite(buf []byte)` / `FastWriteNocopy(buf []byte, w thrift.NocopyWriter)`：Kitex fast codec 路径。\n- `BLength()`：计算 fast codec 写入所需字节长度。\n- `DeepCopy(s interface{}) error`：按字段深拷贝同类型对象。\n\n`FastWrite` 只是 `FastWriteNocopy(buf, nil)` 的包装。字符串和二进制字段在 `FastWriteNocopy` 中会走 `WriteStringNocopy` 或 `WriteBinaryNocopy`，用于减少拷贝。\n\n`FastRead` 按 Thrift field id 读取字段，类型不匹配时调用 `thrift.Binary.Skip` 跳过未知或不兼容字段。这保证了新增字段在旧客户端上通常可以被跳过，但字段 id 和类型仍必须保持兼容。\n\n## 序列化执行流\n\n常规 RPC 编解码走 `Read` / `Write`，Kitex 高性能路径走 `FastRead` / `FastWriteNocopy`。嵌套结构会递归调用子结构的读写方法，例如：\n\n- `AssetGroup.FastReadField11` 读取 `[]*SourceConfig`，每个元素继续调用 `SourceConfig.FastRead`。\n- `AssetGroup.FastReadField12` 读取 `ArtifactConfig`，继续调用 `ArtifactConfig.FastRead`。\n- `ArtifactConfig.FastWriteNocopy` 写 `StoreLocations` 和 `JobExecution` 时，会调用元素的 `FastWriteNocopy`。\n- `BLength` 会递归调用嵌套对象的 `BLength`，用于提前计算缓冲区大小。\n\n生成代码的写字段顺序不一定等于字段编号顺序。例如一些 `FastWriteNocopy` 会先写数值字段，再写字符串字段。Thrift 依赖 field id 识别字段，调用方不应依赖二进制输出中的字段顺序。\n\n## 与服务层的连接\n\n`mdap/service/mdap.go` 是该模型包的主要业务消费者：\n\n- `CreateAssetGroup` 构造 `AssetGroup`，通过 `buildAssetGroupAttrs` 展开成属性路径。\n- `parseAssetGroupFromQuery` 从属性查询结果恢复 `AssetGroup`。\n- `CreateSource` 构造 `Source`，通过 `buildSourceAttrs` 写入属性系统。\n- `parseSourceFromQuery` 从属性路径恢复 `Source`，并校验 `Source.ID` 与 `AssetGroupID` 的身份一致性。\n- `CreateArtifact` 构造 `Artifact`，通过 `buildArtifactAttrs` 写入属性系统。\n- `parseArtifactFromQuery` 从属性路径恢复 `Artifact`，并解码 `ArtifactContent.Contents`。\n- `convertMediaDigestToArtifact`、`convertSnapshotDigestToArtifactSnapshots`、`convertAudioTrackDigestToArtifactAudio` 将外部 digest DTO 转换为 `Artifact` payload。\n- `populateArtifactDownloadURLs` 会反序列化 `ArtifactContent.Contents`，填充内部 `StoreLocation.DownloadURL` 后重新序列化回 payload。\n\n`mdap/service/mdap_validator.go` 定义了业务层约束。生成类型本身只表达协议结构，真正的请求合法性由这些校验函数保证，例如：\n\n- `validateStoreLocationsUnique` 要求同一组 `StoreLocation` 中每种 `StoreType` 最多出现一次。\n- `ValidateCreateSourceRequest` 要求 `AssetGroupID`、`BizID`、`MediaType`、`Format`、`Config`、`Meta` 存在。\n- `validateSourceMeta` 按 `MediaType` 校验 `Meta` JSON。\n- `ValidateCreateArtifactRequest` 要求 `DeriveID`、`Name`、`AssetGroupID`、`Contents` 有效。\n- `validateArtifactContentPayload` 按 `ArtifactType` 校验 payload 能否反序列化成对应产物结构。\n- `validateArtifactBlobs` 要求 blob 的 `Location.Path` 非空，`Size` 非负。\n\n`mdap/service/start_processing.go` 也会直接构造 `SourceConfig` 和 `StoreLocation`。例如 `resolveStartProcessingInput` 中会为 VDA 输入创建 `SourceConfig{Type: SourceType_VDA, Locations: []*StoreLocation{{Type: StoreType_TOS}}}`。\n\n## 属性路径映射\n\n服务层会把模型展开为 Compound 属性路径。常见映射如下：\n\n| 模型字段 | 属性路径示例 |\n|---|---|\n| `AssetGroup.Space` | `$.space` |\n| `AssetGroup.MediaTypes[i]` | `$.media_types[0]` |\n| `AssetGroup.SourceConfigs[i].Type` | `$.source_configs[0].type` |\n| `Source.Config.FetchStatus` | `$.config.fetch_status` |\n| `Source.Config.Locations[i].Path` | `$.config.locations[0].path` |\n| `Artifact.Contents[i].Type` | `$.contents[0].type` |\n| `Artifact.Contents[i].Contents[j]` | `$.contents[0].contents[0]`，值为 base64 |\n| `ArtifactBlob.Location.Path` | `$.contents[0].blobs[0].location.path` |\n\n注意 `StoreLocation.DownloadURL` 通常不是持久化字段。它由 `populateStoreLocationDownloadURL` 在查询返回阶段按需填充。\n\n## 枚举约定\n\n枚举类型包括：\n\n- `SourceType`\n- `FetchStatus`\n- `DeriveType`\n- `ArtifactType`\n- `StoreType`\n\n每个枚举都生成：\n\n- `String()`：转换为协议字符串名；未知值返回 `\"<UNSET>\"`。\n- `XxxFromString(s string)`：从字符串解析枚举，非法字符串返回 error。\n- `XxxPtr(v Xxx)`：返回枚举指针。\n- `Scan(value interface{})` / `Value()`：用于数据库 `sql.Scanner` 和 `driver.Valuer` 兼容。\n\n服务层持久化枚举时一般使用整数值字符串，例如 `strconv.FormatInt(int64(source.Config.Type), 10)`；解析时再转回对应枚举类型。\n\n## 贡献注意事项\n\n不要手工编辑 `kitex_gen/mdap_model/*.go`。字段、枚举、required/optional 语义需要从 IDL 修改并重新生成。\n\n新增 optional 字段时，调用方应使用 `IsSetXxx` 判断是否设置，避免把“未传字段”和“传了零值”混在一起。\n\n新增 `ArtifactType` 时，需要同步更新至少这些业务函数：\n\n- `validateArtifactContentPayload`\n- `artifactPayloadSize`\n- `populateArtifactDownloadURLs`\n- `convertDigestInfoToContent`，如果该类型来自 digest 转换\n- `artifactMIMEType`，如果影响 ID 生成中的 MIME 类型编码\n\n新增 `SourceType` 时，需要同步更新 `validateSourceConfigConfig`，并明确 `SourceConfig.Config` 对应的 JSON 结构。\n\n涉及 `ArtifactContent.Contents` 的代码需要记住两层序列化：业务 payload 先用 JSON 编码为 `[]byte`，写入属性系统时再由 `buildArtifactAttrs` base64 编码。直接读取属性值时不能把它当作原始 JSON 使用。","generated-rpc-and-protocol-models-medigest":"# Generated RPC and Protocol Models — medigest\n\n## 模块定位\n\n`proto_gen/medigest/medigest.pb.go` 是由 `medigest.proto` 生成的 Go Protocol Buffers 模型文件，包名为 `medigest`。它定义了 Medigest 任务的请求、响应、输入媒体、上传目标、截图策略、CVD 摘要任务和工作流编排等数据结构。\n\n该文件只提供协议模型和 protobuf 运行时元信息，不包含业务执行逻辑、参数校验、RPC client/server 方法或服务定义。生成信息显示：\n\n- `protoc-gen-go v1.36.11`\n- `protoc v7.35.0`\n- `NumServices: 0`\n- 外部依赖：`code.byted.org/videoarch/compound/proto_gen/params` 中的 `params.DigestTaskParams`\n\n## 请求模型主干\n\n核心入口类型是 `RunMedigestTaskRequest`，它把输入、上传配置、元信息和任务操作组合成一次 Medigest 调用。\n\n```go\ntype RunMedigestTaskRequest struct {\n\tInput      *Input\n\tMultiInput []*Input\n\tUpload     *Upload\n\tMeta       *Meta\n\tOperation  *MedigestOperation\n}\n```\n\n字段语义：\n\n- `Input`：单输入媒体。\n- `MultiInput`：多输入媒体，支持一次指定多个输入。\n- `Upload`：输出文件或摘要结果的存储配置。\n- `Meta`：任务元信息，例如任务类型、账号、触发来源和视频 ID。\n- `Operation`：具体执行什么任务，由 `Meta.TaskType` 决定使用哪个子字段。\n\n`Input` 描述媒体来源及基础媒体信息：\n\n```go\ntype Input struct {\n\tUri           string\n\tHeaders       *Headers\n\tDuration      int32\n\tSize          int32\n\tWidth         int32\n\tHeight        int32\n\tVideoDuration float32\n\tAudioDuration float32\n\tAvgFps        float32\n\tHdrType       int32\n}\n```\n\n`Uri` 支持注释中声明的多种形态，例如 `vid://${vid}`、`tos://${bucket}/${key}`、`http(s)://${url}`。`Headers` 可携带访问授权、解密信息和自定义头。\n\n`Meta.TaskType` 是请求分流的关键字段，注释中列出的取值包括：\n\n- `Snapshot`：截图任务。\n- `CVD`：单个摘要任务。\n- `MultiCVD`：一次输入执行多个摘要任务。\n- `CVDWorkflow`：多个 CVD 任务按节点依赖编排执行。\n\n## Operation 的任务形态\n\n`MedigestOperation` 同时承载 Snapshot 和 CVD 系列任务参数：\n\n```go\ntype MedigestOperation struct {\n\tStrategy    *Strategy\n\tTarget      *Target\n\tMode        string\n\tIndexOption *IndexOption\n\tCVD         *CVDTaskOperation\n\tMultiCVD    []*CVDTaskOperation\n\tCVDWorkflow *CVDWorkflowOperation\n}\n```\n\n使用时应按 `Meta.TaskType` 选择对应字段：\n\n- `Snapshot` 使用 `Strategy`、`Target`、`Mode`、`IndexOption`。\n- `CVD` 使用 `CVD`。\n- `MultiCVD` 使用 `MultiCVD`。\n- `CVDWorkflow` 使用 `CVDWorkflow`。\n\n该生成模型不会强制这些组合关系；错误组合需要在调用方或业务层校验。\n\n```mermaid\nflowchart TD\n    请求[\"RunMedigestTaskRequest\"]\n    元信息[\"Meta.TaskType\"]\n    操作[\"MedigestOperation\"]\n    截图[\"Strategy / Target / Mode\"]\n    单摘要[\"CVD\"]\n    多摘要[\"MultiCVD\"]\n    工作流[\"CVDWorkflow\"]\n\n    请求 --> 元信息\n    请求 --> 操作\n    元信息 --> 截图\n    元信息 --> 单摘要\n    元信息 --> 多摘要\n    元信息 --> 工作流\n    操作 --> 截图\n    操作 --> 单摘要\n    操作 --> 多摘要\n    操作 --> 工作流\n```\n\n## Snapshot 参数模型\n\n截图任务由 `Strategy` 和 `Target` 描述抽帧方式与输出规格。\n\n`Strategy.Type` 使用字符串表示策略类型，注释列出：\n\n- `TimeInterval`：按时间间隔抽帧。\n- `SpecifiedTime`：按指定时间点抽帧。\n- `SpecifiedFrames`：按指定帧号抽帧。\n- `SceneChange`：按场景变化抽帧。\n\n对应参数类型分别是：\n\n- `TimeInterval{Interval, Limit}`：`Interval` 单位为毫秒，`Limit` 为最大抽帧数量。\n- `SpecifiedTime{Times}`：`Times` 是毫秒级时间偏移。\n- `SpecifiedFrames{Frames}`：`Frames` 是帧号列表。\n- `SceneChange{Threshold, Limit}`：`Threshold` 取值注释为 `(0, 1)`，`Limit` 为最大抽帧数量。\n\n`Target` 控制输出图片尺寸和雪碧图配置：\n\n```go\ntype Target struct {\n\tScaleLong    int32\n\tScaleShort   int32\n\tSpriteConfig *SpriteConfig\n}\n```\n\n当 `SpriteConfig` 非空且 `Enable` 为 true 时，表示生成雪碧图。`ImgYLen` 和 `ImgXLen` 分别表示垂直和水平方向的小图数量。\n\n## CVD 摘要任务模型\n\n`CVDTaskOperation` 是摘要任务的核心结构：\n\n```go\ntype CVDTaskOperation struct {\n\tDigestType string\n\tDigestName string\n\tParams     *params.DigestTaskParams\n\tForce      bool\n\tUserData   string\n\tIdempKey   string\n\tRawParams  string\n\tClipParams *CVDClipParams\n}\n```\n\n字段要点：\n\n- `DigestType`：摘要类型，注释列出 `Snapshot`、`AudioTrack`、`BetterFrames`、`VOCR`。\n- `DigestName`：摘要名称，用于区分不同结果集。\n- `Params`：结构化摘要参数，类型来自 `proto_gen/params`。\n- `RawParams`：保留字符串参数传递能力，注释说明优先级低于 `Params`，会被解析为 `Params`。\n- `Force`：是否强制执行。\n- `IdempKey`：幂等标识；注释说明当前主要用于记录标识。\n- `ClipParams.MaxSliceDuration`：可选分片参数，单位为秒。\n\nCVD 工作流使用 `CVDWorkflowOperation`、`CVDNode` 和 `NodePolicy` 表达节点编排：\n\n```go\ntype CVDWorkflowOperation struct {\n\tNodes []*CVDNode\n}\n\ntype CVDNode struct {\n\tName      string\n\tOperation *CVDTaskOperation\n\tDepencies []string\n\tPolicy    *NodePolicy\n}\n```\n\n注意字段名是生成代码中的实际拼写 `Depencies`，不是 `Dependencies`。业务代码引用时必须使用 `GetDepencies()` 或 `Depencies` 字段名。\n\n`NodePolicy.NodeFail` 使用字符串表示失败处理规则，注释列出 `Ignore` 和默认的 `Abort`。\n\n## 上传与输出位置\n\n`Upload` 描述产物写到哪里：\n\n```go\ntype Upload struct {\n\tFilename string\n\tStorage  *UploadStorage\n\tFuxi     *UploadFuxi\n}\n```\n\n`UploadStorage` 面向对象存储：\n\n```go\ntype UploadStorage struct {\n\tSpace   string\n\tBucket  string\n\tHeaders *Headers\n}\n```\n\n`UploadFuxi` 面向 Fuxi：\n\n```go\ntype UploadFuxi struct {\n\tCluster string\n\tSpace   string\n\tSchema  string\n\tID      string\n}\n```\n\n`RunMedigestTaskRequest` 的注释说明 `Upload.Filename` 和 `UploadFuxi.ID` 等字段支持模板变量，例如：\n\n- `{{Vid}}`\n- `{{DigestType}}`\n- `{{DigestName}}`\n- `{{IdempKey}}`\n- `{{Input.Uri}}`\n- `{{Snapshot.FrameNo}}`\n- `{{BlobIndex}}`\n- `{{Meta.Id}}`\n\n这些变量只在协议注释中定义；替换逻辑不在本生成文件内。\n\n## 响应模型\n\n`RunMedigestTaskResponse` 同时覆盖 Snapshot 和 CVD 结果：\n\n```go\ntype RunMedigestTaskResponse struct {\n\tMode       string\n\tIndex      string\n\tFiles      []*MediaFileInfo\n\tNumber     int32\n\tCVDOutputs []*CVDOutput\n}\n```\n\nSnapshot 结果主要使用：\n\n- `Mode`：输出返回模式。\n- `Index`：当 `Mode=Index` 时有效，表示具体 FuxiID。\n- `Files`：抽帧文件列表。\n- `Number`：抽帧结果数量。\n\nCVD 结果使用 `CVDOutputs`。注释说明 `CVDOutputs` 与 `Input` 一一对应；非 `MultiInput` 场景通常取第一个元素。\n\nCVD 结果层级为：\n\n```go\ntype CVDOutput struct {\n\tResults *CVDResults\n}\n\ntype CVDResults struct {\n\tResults []*CVDResult\n}\n\ntype CVDResult struct {\n\tDigestID     string\n\tDigestSchema string\n\tPosition     string\n\tBlobCount    int32\n\tNBFrames     int32\n\tFiles        []*MediaFileInfo\n\tCode         int32\n\tMessage      string\n\tURN          *DigestURN\n}\n```\n\n`CVDResult` 中：\n\n- `DigestID` 是摘要存储 key。\n- `DigestSchema` 当前注释说明仅支持 `media_digest`。\n- `Position` 表示摘要存储位置，例如 `tos://...` 或 `fuxi://...`。\n- `Files` 保存文件型产物信息。\n- `Code` 和 `Message` 表示单个摘要结果状态。\n- `URN` 使用 `DigestURN{DigestType, DigestName}` 标识摘要类型和名称。\n\n## 生成代码行为\n\n每个消息类型都实现了标准 protobuf 方法：\n\n- `Reset()`\n- `String()`\n- `ProtoMessage()`\n- `ProtoReflect()`\n- `Descriptor()`，已标记废弃，应使用 `ProtoReflect().Descriptor()`\n- `GetXxx()` 形式的 nil 安全访问器\n\n访问器遵循 proto3 默认值语义。例如：\n\n- `GetUri()` 在接收者为 nil 时返回空字符串。\n- `GetForce()` 在接收者为 nil 时返回 `false`。\n- `GetHeaders()` 在接收者为 nil 时返回 `nil`。\n- `GetMultiInput()` 在接收者为 nil 时返回 `nil`。\n\n这意味着调用方不能仅凭 getter 返回零值区分“字段未设置”和“字段显式设置为零值”。需要区分时，应直接检查指针字段是否为 nil，或在上层协议中引入显式状态。\n\n文件初始化流程由 protobuf runtime 管理：\n\n- `init()` 调用 `file_medigest_proto_init()`。\n- `file_medigest_proto_init()` 使用 `protoimpl.TypeBuilder` 构建 `File_medigest_proto`。\n- `file_medigest_proto_rawDescGZIP()` 通过 `sync.Once` 懒加载压缩后的 raw descriptor。\n- `file_medigest_proto_goTypes` 和 `file_medigest_proto_depIdxs` 在构建完成后置为 nil。\n\n这些逻辑只服务于 protobuf 反射、序列化和描述符访问，业务代码通常不需要直接调用。\n\n## 与代码库其他部分的连接\n\n调用图显示，该模块主要被 `mdap/service/start_processing_prodia.go` 和相关测试使用。\n\n`buildRunMedigestTaskRequest` 会构造这些类型：\n\n- `RunMedigestTaskRequest`\n- `Input`\n- `MedigestOperation`\n- `CVDTaskOperation`\n- `UploadStorage`\n- `UploadFuxi`\n\n测试文件 `mdap/service/start_processing_test.go` 会直接构造或断言这些模型，例如：\n\n- 使用 `Input` 构造输入媒体。\n- 使用 `RunMedigestTaskRequest` 检查 Prodia 请求结构。\n- 调用 `GetInput()`、`GetUri()`、`GetOperation()`、`GetCVD()`、`GetForce()` 验证生成访问器返回值。\n\n因此，本模块在代码库中的角色是 Prodia / Medigest 请求响应的协议边界。上游服务负责把内部请求转换成这些 protobuf 模型；下游 RPC 或序列化层负责传输；业务规则、参数兼容、任务组合校验和模板变量替换都应在本文件之外实现。\n\n## 贡献注意事项\n\n不要手动编辑 `medigest.pb.go`。文件头已经声明 `Code generated by protoc-gen-go. DO NOT EDIT.`。需要变更字段、注释或协议结构时，应修改源 `.proto` 文件并重新生成代码。\n\n新增字段时需要注意：\n\n- 保持字段编号兼容，不能复用已发布字段号。\n- 字符串枚举目前没有生成 Go enum 类型，调用方仍会以字符串判断。\n- JSON tag 保留了 proto 字段名大小写，例如 `Uri`、`TaskType`、`DigestType`。\n- 结构化参数应优先放入 `params.DigestTaskParams`；`RawParams` 是兼容入口，不应成为新功能的首选扩展点。\n- `CVDNode.Depencies` 是既有协议拼写，修正拼写会影响生成字段名和 wire/schema 兼容策略，不能只在 Go 代码中改名。","generated-rpc-and-protocol-models-params":"# Generated RPC and Protocol Models — params\n\n## 模块概览\n\n`proto_gen/params/digest_params.pb.go` 是由 `params/digest_params.proto` 生成的 Go Protobuf 模型，包名为 `params`。它定义摘要处理相关 RPC 参数的数据结构，覆盖截图摘要、音频轨提取、VOCR、优帧选择、视频预测和视频 Profile 等任务。\n\n该文件是生成代码，不应手动修改。字段、枚举和 wire tag 的权威来源是 `.proto` 文件；需要调整协议时应修改 `params/digest_params.proto` 后重新生成。\n\n## 核心入口\n\n`DigestTaskParams` 是任务参数的聚合入口：\n\n```go\ntype DigestTaskParams struct {\n    SnapshotParams     *SnapshotTaskParams\n    AudioTrackParams   *AudioTrackTaskParams\n    VOCRParams         *VOCRTaskParams\n    BetterFramesParams *BetterFramesTaskParams\n    VideoPredictParams *VideoPredictTaskParams\n    VideoProfileParams *VideoProfileTaskParams\n}\n```\n\n注释中称其为 “union 转换为 oneof 结构”，但当前生成结果不是 Go Protobuf `oneof`，而是多个可选指针字段。调用方需要自行保证同一次请求中只设置符合业务语义的任务参数，避免同时设置多个任务分支造成下游歧义。\n\n```mermaid\nflowchart TD\n    A[\"DigestTaskParams\"] --> B[\"SnapshotTaskParams\"]\n    A --> C[\"AudioTrackTaskParams\"]\n    A --> D[\"VOCRTaskParams\"]\n    A --> E[\"BetterFramesTaskParams\"]\n    A --> F[\"VideoPredictTaskParams\"]\n    A --> G[\"VideoProfileTaskParams\"]\n    D --> H[\"DigestID\"]\n    E --> H\n    F --> H\n```\n\n## 枚举与字符串字段\n\n文件中生成了 10 个枚举类型：\n\n- `EnumScaleMode`：`Stretch`、`Fit`、`Adaptive`\n- `EnumOrientationMode`：`Original`、`Landscape`、`Portrait`\n- `ImageFormat`：`JPG`、`PNG`、`WEBP`\n- `SnapshotSampleOption`：`ByFps`、`ByOffsetTimes`、`BySceneChange`、`ByKeyFrames`、`ByFrameNos`、`ByFpsLimitNBFrames`\n- `ImageFeatureExtractionMethod`：`LBP`、`histogram`\n- `EnumSnapshotFilterMethod`：`FilterByFrameSift`\n- `EnumSnapshotAggregationMethod`：`AggrAsSpriteImage`、`AggrAsTosZip`\n- `AudioCodec`：`pcm_s16le`\n- `VideoPredictMethod`：`PredictImages`\n- `DigestType`：`Snapshot`、`AudioTrack`、`VOCR`、`BetterFrames`、`VideoPredict`、`VideoProfile`\n\n需要注意：不少业务字段实际是 `string`，注释中要求传入对应枚举名，例如：\n\n- `LayoutConfig.ScaleMode` 使用 `\"Stretch\"`、`\"Fit\"` 或 `\"Adaptive\"`\n- `LayoutConfig.OrientationMode` 使用 `\"Original\"`、`\"Landscape\"` 或 `\"Portrait\"`\n- `SnapshotSampleParams.Option` 使用 `\"ByFps\"` 等 `SnapshotSampleOption` 名称\n- `SnapshotAggregationParams.Method` 使用 `\"AggrAsSpriteImage\"` 或 `\"AggrAsTosZip\"`\n- `AudioPlaybackParams.Codec` 使用 `\"pcm_s16le\"`\n- `DigestID.DigestType` 使用 `\"Snapshot\"`、`\"AudioTrack\"` 等名称\n\n因此业务代码在组装参数时通常应使用枚举的 `String()` 结果或统一常量，避免手写字符串漂移。\n\n## 截图摘要参数\n\n`SnapshotTaskParams` 描述截图类摘要任务，是本模块结构最丰富的分支：\n\n```go\ntype SnapshotTaskParams struct {\n    PlaybackParams   *VideoPlaybackParams\n    SampleParams     []*SnapshotSampleParams\n    TTLParams        *DigestTTLParams\n    FeatureExtParams []*ImageFeatureExtractionParams\n    FilterParams     []*SnapshotFilterParams\n    AggrParams       *SnapshotAggregationParams\n    EnableHDRTonemap bool\n}\n```\n\n截图任务的典型执行语义可以理解为：先按 `VideoPlaybackParams` 限定回放片段和输出帧格式，再按一个或多个 `SnapshotSampleParams` 采样，随后可做特征提取、过滤，最后按 `SnapshotAggregationParams` 聚合输出。\n\n`VideoPlaybackParams` 包含：\n\n- `StartOffset`：起始偏移，字符串格式由调用方和下游解释\n- `DurationLimit`：处理时长限制\n- `Resolution`：`PlaybackResolution`，通过 `ScaleShort`、`ScaleLong` 限制短边和长边\n- `Format`：图片格式，注释指向 `ImageFormat`\n- `FrameSelectParams`：格式为 `${vsync_method}_${max_fps}`，约束形如 `(vfr|cfr)_\\d+(\\.\\d*)?`\n\n`SnapshotSampleParams` 支持多种采样策略：\n\n- `Option` 指定策略，例如 `\"ByFps\"`、`\"ByOffsetTimes\"`、`\"BySceneChange\"`\n- `Fps` 支持浮点数或 `${float}/duration`\n- `OffsetTimes` 指定时间点列表\n- `SceneChangeThreshold` 用于场景变化采样\n- `FrameNos` 当前注释说明仅支持 `1` 和 `-1`，表示首帧和尾帧\n- `FrameLimit`、`MinFrameLimit`、`MaxFrameLimit` 控制帧数限制，其中 `MinFrameLimit` 和 `MaxFrameLimit` 在 `Option=ByFpsLimitNBFrames` 时生效\n- `BlackFrameParams` 使用 `BlackFrameDetectionParams` 描述黑帧过滤阈值\n- `Jitter`、`IsRequired` 提供采样扰动和必要性标记\n\n`SnapshotFilterParams` 表示截图结果过滤。注释强调过滤是“对已有集合做减法”，不会改变存储结构，并且多个过滤方法串行执行。当前支持的具体参数是 `FilterByFrameSiftParams`，通过 `FrameSiftParams.Strategy` 传递策略。\n\n`SnapshotAggregationParams` 描述聚合方式。聚合会改变最终存储内容：\n\n- `AggrAsSpriteImageParams` 使用 `SpriteParams` 聚合为雪碧图\n- `AggrAsTosZipParams` 使用 `AsZipParams` 聚合为 TOS zip 文件\n\n雪碧图布局由 `LayoutConfig` 控制，包括 `GridCols`、`GridRows`、`Spacing`、`ScaleMode`、`CellWidth`、`CellHeight` 和 `OrientationMode`。zip 聚合参数 `AsZipParams` 包含 `CompressMethod`、`MaxCount`、`MaxSize`。\n\n## 音频轨参数\n\n`AudioTrackTaskParams` 由三部分组成：\n\n```go\ntype AudioTrackTaskParams struct {\n    PlaybackParams *AudioPlaybackParams\n    SampleParams   *AudioSampleParams\n    TTLParams      *DigestTTLParams\n}\n```\n\n`AudioPlaybackParams` 控制音频片段、编码和通道数：\n\n- `StartOffset`\n- `DurationLimit`\n- `Codec`，注释指向 `AudioCodec`，当前枚举值为 `\"pcm_s16le\"`\n- `Channels`\n\n`AudioSampleParams.SampleRate` 指定采样率。`DigestTTLParams` 与截图任务复用，用于配置创建时间和访问时间维度的 TTL。\n\n## 派生摘要任务\n\n`VOCRTaskParams`、`BetterFramesTaskParams` 和 `VideoPredictTaskParams` 都通过 `SourceDigestID` 指向已有摘要结果，再携带各自的业务参数：\n\n```go\ntype DigestID struct {\n    DigestType string\n    DigestName string\n    IdempKey   string\n}\n```\n\n`DigestID` 用于标识输入摘要，`DigestType` 应使用 `DigestType` 枚举名称字符串，例如 `\"Snapshot\"`。\n\n`VOCRTaskParams` 包含：\n\n- `SourceDigestID`\n- `Params *VOCRParams`\n\n`VOCRParams` 通过 `Service` 和 `Cluster` 指定视频 OCR 服务位置。\n\n`VideoPredictTaskParams` 包含：\n\n- `SourceDigestID`\n- `Params *VideoPredictParams`\n\n`VideoPredictParams` 包含 `Service`、`Method` 和 `TagID`。`Method` 注释对应 `VideoPredictMethod`，当前枚举值为 `\"PredictImages\"`。\n\n## BetterFrames 参数版本\n\n`BetterFramesParams` 是优帧选择参数的版本容器：\n\n```go\ntype BetterFramesParams struct {\n    V1Params *BFParamsV1\n    V2Params *BFParamsV2\n    V3Params *BFParamsV3\n    V4Params *BFParamsV4\n}\n```\n\n和 `DigestTaskParams` 类似，这里也不是 Go `oneof`，调用方需要按业务版本只填充一个版本参数。\n\n各版本字段如下：\n\n- `BFParamsV1.FeatureMethod`：注释说明仅支持 `LBP`\n- `BFParamsV2.FeatureMethod`：注释说明仅支持 `LBP`\n- `BFParamsV3.FeatureMethod`：注释说明仅支持 `Histogram`\n- `BFParamsV3.BeamSize`、`MaxPrecomputes`、`MaxBatchSize`：控制 MEKS v3 搜索规模\n- `BFParamsV3.StopConfig`：使用 `MEKSStopConfig` 配置 `MaxCuts`、`MinClip`、`Abs`、`Rel`\n- `BFParamsV4.EmbeddingMethod`：默认 `colorhist`\n- `BFParamsV4.MaxSelection`：支持 `\"10\"` 或 `\"$duration*0.5\"` 这类选择数量表达式\n- `BFParamsV4.SearchMethod`：默认 `prompt`\n- `BFParamsV4.Kwargs`：`map[string]string` 扩展参数\n\n## Video Profile 参数\n\n`VideoProfileTaskParams` 是独立任务分支，不依赖 `DigestID`：\n\n```go\ntype VideoProfileTaskParams struct {\n    Depackage    bool\n    Decode       bool\n    TaskNameList []string\n}\n```\n\n`Depackage` 和 `Decode` 用于控制是否执行解封装和解码相关 Profile，`TaskNameList` 限定具体任务名称集合。\n\n## 生成代码运行机制\n\n每个 message 类型都包含 Protobuf 运行时字段：\n\n- `state protoimpl.MessageState`\n- `unknownFields protoimpl.UnknownFields`\n- `sizeCache protoimpl.SizeCache`\n\n每个结构体都有一组标准生成方法：\n\n- `Reset()`：将结构体清零，并把对应的 `protoimpl.MessageInfo` 写入 message state\n- `String()`：通过 `protoimpl.X.MessageStringOf(x)` 生成字符串表示\n- `ProtoMessage()`：标记该类型是 Protobuf message\n- `ProtoReflect()`：返回 `protoreflect.Message`\n- `Descriptor()`：已废弃，保留兼容；新代码应使用 `ProtoReflect().Descriptor()`\n- `GetXxx()`：空指针安全 getter，接收者为 `nil` 时返回字段零值\n\n枚举类型也有标准生成方法：\n\n- `Enum()`：返回枚举指针\n- `String()`：返回枚举名\n- `Descriptor()`、`Type()`、`Number()`：提供反射信息\n- `EnumDescriptor()`：已废弃，保留兼容\n\n文件级描述符由 `File_params_digest_params_proto` 暴露。包初始化时执行：\n\n```go\nfunc init() { file_params_digest_params_proto_init() }\n```\n\n`file_params_digest_params_proto_init()` 使用 `protoimpl.TypeBuilder` 注册枚举、消息、Go 类型映射和依赖索引。旧式 `Descriptor()` / `EnumDescriptor()` 会调用 `file_params_digest_params_proto_rawDescGZIP()`，该函数通过 `sync.Once` 对 raw descriptor 做一次 GZIP 压缩缓存。\n\n## 使用注意事项\n\n不要直接编辑 `digest_params.pb.go`。任何协议变更都应从 `params/digest_params.proto` 发起，并保持字段编号兼容。\n\n使用 getter 时要区分“字段未设置”和“字段设置为零值”。例如 `GetPlaybackParams()` 返回 `nil` 可以判断 message 字段未设置；但 `GetFrameLimit()` 返回 `0` 既可能表示未设置，也可能表示业务上显式传入 `0`。当前 proto3 标量字段没有 presence 信息。\n\n多个“版本容器”或“任务容器”不是强 oneof。`DigestTaskParams`、`BetterFramesParams` 允许同时填多个指针字段，业务层需要在构造、校验或消费时明确互斥规则。\n\n大量策略字段使用字符串承载枚举名。调用方应统一使用已有枚举常量的 `String()` 或集中定义常量，避免 `\"AggrAsSpriteImage\"`、`\"ByFpsLimitNBFrames\"`、`\"pcm_s16le\"` 等值拼写不一致。\n\n`Descriptor()` 和 `EnumDescriptor()` 已标记废弃。新代码需要反射信息时，应优先使用 `ProtoReflect().Descriptor()` 或枚举的 `Descriptor()` 方法。","generated-rpc-and-protocol-models-toutiao":"# Generated RPC and Protocol Models — toutiao\n\n## 模块概览\n\n`kitex_gen/toutiao/videoarch/video_data_access` 是 Toutiao 侧 `VideoDataAccessService` 的 Kitex/Thrift 生成代码。它提供两类能力：\n\n- 协议模型：请求、响应、枚举、复合结构体，以及 Thrift `Read`/`Write`、Kitex fast codec、`DeepCopy` 等序列化辅助代码。\n- RPC 绑定：客户端 `videodataaccessservice.Client`、服务端注册函数、`server.Invoker`、`kitex.ServiceInfo` 和方法分发 handler。\n\n该模块不包含业务实现。真实读写 DB、缓存、视频元信息处理等逻辑应由实现 `video_data_access.VideoDataAccessService` 的业务 handler 提供。\n\n## 包结构\n\n```text\nkitex_gen/toutiao/videoarch/video_data_access/\n├── video_data_access.go                  # Thrift 模型、服务接口、Args/Result、apache thrift 读写\n├── k-video_data_access.go                # Kitex fast codec、BLength、DeepCopy 等生成代码\n├── k-consts.go                           # KitexUnusedProtection\n└── videodataaccessservice/\n    ├── client.go                         # 对外 RPC Client 和 NewClient 系列构造函数\n    ├── server.go                         # NewServer、RegisterService\n    ├── invoker.go                        # NewInvoker，用于 invoker 场景\n    └── videodataaccessservice.go         # ServiceInfo、method table、handler、内部 kClient\n```\n\n## 整体调用关系\n\n```mermaid\nflowchart LR\n    A[\"业务调用方\"] --> B[\"videodataaccessservice.Client\"]\n    B --> C[\"kVideoDataAccessServiceClient\"]\n    C --> D[\"kClient\"]\n    D --> E[\"client.Client.Call\"]\n    E --> F[\"Kitex 传输与 Thrift 编解码\"]\n    F --> G[\"服务端 method handler\"]\n    G --> H[\"VideoDataAccessService 业务实现\"]\n```\n\n客户端方法的路径基本一致：例如 `Client.MGetVideoInfo` 先调用 `client.NewCtxWithCallOptions(ctx, callOptions)` 注入单次调用选项，再转发到内部 `kClient.MGetVideoInfo`；`kClient` 创建 `VideoDataAccessServiceMGetVideoInfoArgs`、调用 `p.c.Call(ctx, \"MGetVideoInfo\", &_args, &_result)`，最后从 result 中返回 `_result.GetSuccess()`。\n\n服务端方向也保持统一：`NewServer` 或 `NewServerWithBytedConfig` 通过 `serviceInfo()` 注册业务 handler；请求进入后，由 `mGetVideoInfoHandler` 这类生成 handler 将通用 `arg/result` 断言为具体 Args/Result 类型，然后调用业务实现的 `MGetVideoInfo(ctx, realArg.Req)`。\n\n## 服务接口\n\n核心接口是 `video_data_access.VideoDataAccessService`。业务服务端必须实现其中所有方法，例如：\n\n- 视频元信息写入与更新：`CreateVideoInfo`、`UpdateVideoInfo`、`CreateEncodedVideoInfo`、`CopyVideoInfo`\n- 视频查询：`MGetVideoInfo`、`PlayerMGetVideoInfo`、`MGetVideoInfoFromDB`、`GetVideoInfoByVidFid`\n- 状态与扩展字段：`UpdateVideoPlayStatus`、`UpdateUserAction`、`UpdateVideoExtra`、`MUpdateVideoExtra`\n- 上传与原视频：`CreateUploadRecord`、`UpdateUploadRecord`、`MCreateOriginalVideo`\n- 海报与动态 Logo：`CreatePosterCandidates`、`MGetPosterCandidates`、`CreateDynamicLogoInfo`、`GetDynamicLogoInfo`\n- URI/SHA256 引用索引：`QueryUriReference`、`UpsertUriReference`、`DeleteURIReference`、`QuerySHA256Reference`\n- 属性元数据：`CreateAttrMeta`、`UpdateAttrMeta`、`GetAttrMetas`、`SetObjAttr`、`MGetObjAttr`\n- 原始表级读写：`ReadRawVideo`、`WriteRawVideo`\n\n注意代码中存在历史拼写：方法名是 `MGetVideoIDByUserRerefence`，请求/响应类型是 `MGetVideoIDByUserReferenceRequest` 和 `MGetVideoIDByUserReferenceResponse`。调用方和 handler 都必须使用生成出的实际方法名。\n\n## 客户端使用方式\n\n`videodataaccessservice.NewClient(destService, opts...)` 创建普通客户端；`NewClientWithBytedConfig(destService, config, opts...)` 允许传入 `*byted.ClientConfig`。两个函数都会设置 `client.WithDestService(destService)`，并接入 `byted.ClientSuiteWithConfig(...)`。\n\n`MustNewClient` 和 `MustNewClientWithBytedConfig` 只是 panic 版本，适合初始化阶段失败即退出的场景，不适合请求链路中动态创建。\n\n单次调用选项通过可变参数传入，例如超时、重试等 Kitex `callopt.Option`。生成包装层会把这些 option 写入 context，再调用内部 `kClient`。\n\n```go\ncli, err := videodataaccessservice.NewClient(\"目标服务名\")\nif err != nil {\n    return err\n}\n\nresp, err := cli.MGetVideoInfo(ctx, &video_data_access.MGetVideoInfoRequest{\n    VIDs: []string{\"v1\", \"v2\"},\n    Auth: \"调用方鉴权标识\",\n    Base: baseReq,\n})\n```\n\n## 服务端接入方式\n\n业务实现需要满足 `video_data_access.VideoDataAccessService`。注册方式有三种：\n\n- `NewServer(handler, opts...)`：创建并注册一个完整 Kitex `server.Server`\n- `NewServerWithBytedConfig(handler, config, opts...)`：带 `*byted.ServerConfig`\n- `RegisterService(svr, handler, opts...)`：把 handler 注册到已有 server\n- `NewInvoker` / `NewInvokerWithBytedConfig`：创建 `server.Invoker`，用于 invoker 模式\n\n`NewServer` 会追加 `server.WithCompatibleMiddlewareForUnary()`；`NewInvoker` 会在注册后调用 `s.Init()`。注册失败或初始化失败会 panic，这是生成代码的固定行为。\n\n## 协议模型约定\n\n所有请求/响应结构体都带 Thrift field id、frugal tag 和 JSON tag。`Base` 通常使用 field id `255`，响应中对应 `BaseResp`。业务代码应通过 `base.Base` 和 `base.BaseResp` 传递通用上下文、状态码和错误信息。\n\n生成结构体一般提供以下方法：\n\n- `NewXxx()`：构造对象，并为有默认值的字段设置默认值\n- `InitDefault()`：重置默认值\n- `GetXxx()`：读取字段；未设置 optional 字段时返回生成的默认值\n- `SetXxx()`：设置字段\n- `IsSetXxx()`：判断 optional 字段或非默认值字段是否应被序列化\n- `Read` / `Write`：Apache Thrift 协议读写\n- `FastRead` / `FastWrite` / `BLength`：Kitex fast codec 路径\n- `DeepCopy`：生成的深拷贝辅助逻辑\n\n一个容易踩坑的点是 optional bool 在 Go 中有两种生成形式。`MGetVideoInfoRequest.NeedVideoFileInfo` 是 `bool`，但用“是否等于默认值”判断是否 set；默认值为 `true`。如果直接字面量构造且不填该字段，Go 零值是 `false`，语义上会覆盖默认值。需要默认行为时优先使用 `NewMGetVideoInfoRequest()` 或显式设置字段。\n\n## 关键模型分组\n\n`VideoGroupInfo` 是通用查询返回的聚合视图，包含 `Provider`、`VideoStatus`、`UserReference`、`UserAction`、`OriginalVideoInfo`、`EncodedVideoInfos`、`Posters`、`Extra`、`LogoEncodedVideoInfos`、`PosterURI` 等字段。它依赖 `videoarch_common.VideoCommonInfo`、`EncodedVideoInfo` 和 `PosterCandidate`。\n\n`PlayerVideoGroupInfo` 和 `PlayerEncodedVideoInfo` 是播放侧裁剪后的视图。它保留播放需要的 `MetaInfo`、`FileHash`、`EncodedType`、`Codec`、`LogoType`、`FileExtra`、`PosterURI`、`CurrentLocation` 等字段，避免直接暴露完整写入模型。\n\n`VideoUpload`、`VideoInfo`、`VideoExtra` 和 `RawVideo` 表示更接近存储表结构的原始数据。`ReadRawVideoRequest.RequiredTables` 使用 `RawVideoTable` 控制读取 `VideoUpload`、`VideoInfo`、`VideoExtra` 中哪些部分；`WriteRawVideoRequest.Video` 则提交完整或部分 `RawVideo`。\n\n`AttrMeta`、`Annotation`、`AnnotationSchema` 用于对象属性体系。`SetObjAttrRequest`、`GetObjAttrRequest`、`MGetObjAttrRequest` 以 `Name`/`Names`、`SpaceID`、`AttrNames` 操作对象属性；`CreateAttrMetaRequest`、`UpdateAttrMetaRequest`、`GetAttrMetasRequest` 管理属性定义。\n\n`VidFid`、`URIReferences` 和 `SHA256Reference` 用于反查引用关系。URI 相关接口围绕 `URI`、`URIType`、`VideoID`、`FileID` 建索引；SHA256 相关接口围绕 `SHA256`、`Provider`、`UserID`、`VideoCreatedTime` 建索引。\n\n## 枚举\n\n本模块定义了少量本地枚举，并都实现了 `String()`、`FromString()`、`Ptr()`、`Scan()` 和 `Value()`：\n\n- `VideoIdFlag`：`RDONLY`、`WRONLY`、`RDWR`、`NOPERM`\n- `AnnotationAction`：`SKIP`、`WARN`、`DENY`\n- `CacheOptions`：`redis`、`abase`、`localcache`\n- `ConsistencyLevel`：`DEFAULT`、`WEAKEST`、`WEAK`、`STRONG`、`STRONGEST`\n- `URIReplaceType`：`DEFAULT`、`ALL`、`NONE`\n- `RawVideoTable`：`VideoUpload`、`VideoInfo`、`VideoExtra`\n\n`Scan` 和 `Value` 让这些枚举可以直接参与 `database/sql` 的读写转换，但枚举值本身仍由 IDL 决定。\n\n## ServiceInfo 与方法分发\n\n`videodataaccessservice.go` 中的 `serviceMethods` 是 Kitex 方法表。每个方法通过 `kitex.NewMethodInfo` 绑定四部分：handler、Args 构造函数、Result 构造函数、streaming 标记。当前方法都使用 `kitex.WithStreamingMode(kitex.StreamingNone)`，也就是普通 unary RPC。\n\n`NewServiceInfo()` 用于服务端，`NewServiceInfoForClient()` 用于非流式客户端，`NewServiceInfoForStreamClient()` 保留流式客户端入口。实际构造逻辑在 `newServiceInfo`，其中固定：\n\n- `ServiceName`: `VideoDataAccessService`\n- `HandlerType`: `(*video_data_access.VideoDataAccessService)(nil)`\n- `PayloadCodec`: `kitex.Thrift`\n- `KiteXGenVersion`: `v1.22.0`\n- `Extra[\"PackageName\"]`: `video_data_access`\n\n## 维护注意事项\n\n这些文件顶部均标记 `DO NOT EDIT`，应视为 IDL 生成产物。新增字段、接口或修改字段 id 时，应修改上游 Thrift IDL 并重新生成，而不是直接改 `kitex_gen`。手改生成代码会在下次生成时丢失，也容易破坏客户端、服务端、Args/Result 和 fast codec 之间的一致性。\n\n贡献业务逻辑时，通常只需要引用这些类型、实现 `VideoDataAccessService`，或通过 `videodataaccessservice.Client` 发起调用。不要在生成包内加入业务判断、默认鉴权、缓存策略或兼容分支。","generated-rpc-and-protocol-models-videoarch-common":"# Generated RPC and Protocol Models — videoarch_common\n\n## 模块定位\n\n`kitex_gen/videoarch_common` 是由 Thrift/Kitex 生成的公共视频协议模型包，包名为 `videoarch_common`。它提供视频归档链路中跨 RPC 边界传输的枚举、结构体、Apache Thrift 协议读写实现，以及 Kitex fast codec 二进制编解码实现。\n\n该目录内代码均为生成代码：`video_common.go` 由 `thriftgo` 生成，`k-video_common.go` 由 Kitex 生成，`k-consts.go` 只提供 `KitexUnusedProtection` 防止空导入。业务代码应消费这些类型，不应手写修改生成文件；字段变更应回到对应 Thrift IDL 后重新生成。\n\n## 文件职责\n\n| 文件 | 职责 |\n|---|---|\n| `video_common.go` | 定义枚举、结构体、构造器、getter/setter、`IsSetXxx`、Apache Thrift `Read`/`Write`、SQL `Scan`/`Value` |\n| `k-video_common.go` | 为同一批结构体生成 Kitex fast codec：`FastRead`、`FastWrite`、`FastWriteNocopy`、`BLength`、`DeepCopy` |\n| `k-consts.go` | 定义 `KitexUnusedProtection`，仅用于生成代码导入保护 |\n\n## 核心模型\n\n### 枚举\n\n`UserAction` 表示用户侧视频动作，包含 `UserAction_NoAction`、`UserAction_Shield`、`UserAction_MarkDeleted`、`UserAction_PermanentDeleted`、`UserAction_Available`、`UserAction_SoftDeleted`、`UserAction_VL0` 到 `UserAction_VL4`。配套方法包括 `String()`、`UserActionFromString()`、`UserActionPtr()`、`Scan()`、`Value()`，同时提供 `UserActionIDMap` 做字符串到数值 ID 的映射。\n\n`VideoStatus` 表示视频状态，包含 `VideoStatus_Unknown`、`VideoStatus_Uploading`、`VideoStatus_UploadFailed`、`VideoStatus_WaitingForUploading`、`VideoStatus_UploadSuccess`、`VideoStatus_EncodeSuccess`、`VideoStatus_EncodeFailed`、`VideoStatus_Encoding`、`VideoStatus_NonExist`。配套方法与 `UserAction` 相同，并提供 `VideoStatusIDMap`。\n\n`EnumURIType` 表示不同 URI 类型，例如 `EnumURIType_VideoURI`、`EnumURIType_PosterURI`、`EnumURIType_RemoteStoreURI`、`EnumURIType_PostCandidateURI`、`EnumURIType_AnimatedImageURI`、`EnumURIType_DynpostURI`、`EnumURIType_PosterURIEx`、`EnumURIType_CrcURI`、`EnumURIType_DrsChoiceURI`。\n\n这些枚举实现了 `database/sql.Scanner` 和 `database/sql/driver.Valuer`，因此可以直接参与数据库读写。`FromString` 方法只接受生成代码中列出的精确字符串，未知字符串会返回错误。\n\n### 结构体\n\n`Meta` 是可复用的视频元信息模型，字段全部为 optional 指针：`Height`、`Width`、`Format`、`Duration`、`Size`、`StoreURI`、`Definition`、`Bitrate`。\n\n`VideoCommonInfo` 表示通用视频信息，包含默认字段 `ID`、`FileID`、`FileName`、`CreateTime`、`UpdateTime`，以及 optional 字段 `MetaInfo`、`FileStatus`、`FileHash`、`Extra`、`Codec`、`LogoType`、`FileExtra`。\n\n`EncodedVideoInfo` 表示转码后视频信息，包含 `ID`、`OriginalID`、`EncodedID`、`FileName`、`CreateTime`、`UpdateTime` 等默认字段，以及 `OriginalInt64ID`、`MetaInfo`、`FileHash`、`EncodedType`、`EncodedTime`、`EncodedHost`、`FileStatus`、`Extra`、`Codec`、`LogoType`、`FileExtra` 等 optional 字段。\n\n`UploadRecord` 表示上传记录，默认字段包括 `VideoID`、`Provider`、`UploadInfo`、`UserReference`、`UserAction`、`VideoStatus`，optional 字段为 `Extra`、`PosterURI`。\n\n`ProviderInfo` 表示供应方配置，包含 `ProviderName`、`FileLimit`、`StorageQuota`、`CallbackURL`、`UserKey`、`WorkFlowName`、`WorkFlowVersion`、`CdnPreload`、`Transcode`、`GetMeta`、`CoverSnapshot`、`ID`，以及 optional 字符串字段 `Extra`。\n\n`PosterCandidate` 表示候选封面图，默认字段包括 `VideoID`、`Width`、`Height`、`URI`，optional 字段为 `SrcURI`、`Offset`、`Score`。\n\n`OriginalVideo` 是原始视频的扁平模型，默认字段包括 `VideoID`、`Provider`、`PosterURI`、`UserReference`、`UserAction`、`VideoStatus`、`StoreURI`、`Height`、`Width`、`Duration`、`Format`、`Hash`、`Name`、`Definition`、`Bitrate`、`Size`、`Extra`，optional 字段为 `FileExtra`、`Codec`。\n\n## 可选字段语义\n\n生成代码用 Go 指针或 nil map 表达 optional 字段。判断字段是否真的由调用方传入，应使用 `IsSetXxx()`，不要只依赖 `GetXxx()`：\n\n```go\ninfo := videoarch_common.NewEncodedVideoInfo()\n\nif info.IsSetEncodedTime() {\n\t// 字段确实出现在请求或对象中\n\tencodedTime := info.GetEncodedTime()\n\t_ = encodedTime\n}\n```\n\n`GetXxx()` 对未设置 optional 字段会返回对应的包级默认值，例如空字符串、`0`、`nil` map 或 `nil` 结构体指针。这会掩盖“未设置”和“设置为空/零值”的区别。写入 optional 字段时应传入指针或非 nil map，例如 `SetCodec(&codec)`、`SetExtra(extra)`。\n\n## 协议读写路径\n\n`video_common.go` 中每个结构体都有标准 Apache Thrift 协议方法：\n\n- `Read(iprot thrift.TProtocol)`：读取 struct begin，循环读取字段头，根据 field id 和 thrift 类型分发到 `ReadFieldN`，未知字段或类型不匹配字段通过 `iprot.Skip` 跳过。\n- `ReadFieldN(iprot thrift.TProtocol)`：读取单个字段并写入结构体字段。嵌套结构如 `MetaInfo` 会通过 `NewMeta()` 创建后调用 `Meta.Read()`。\n- `Write(oprot thrift.TProtocol)`：写 struct begin，按生成顺序调用 `writeFieldN`，最后写 field stop 和 struct end。\n- `writeFieldN(oprot thrift.TProtocol)`：写单个字段。optional 字段会先调用 `IsSetXxx()` 判断是否需要输出。\n\n```mermaid\nflowchart TD\n    A[\"Read / FastRead\"] --> B[\"读取字段头\"]\n    B --> C{\"字段 ID 和类型匹配？\"}\n    C -->|是| D[\"ReadFieldN / FastReadFieldN\"]\n    C -->|否| E[\"Skip 未知或不匹配字段\"]\n    D --> F[\"写入结构体字段\"]\n    E --> B\n    F --> B\n    B --> G[\"遇到 STOP 结束\"]\n```\n\n`k-video_common.go` 中每个结构体还实现 Kitex fast codec：\n\n- `FastRead(buf []byte) (int, error)`：基于 `thrift.Binary.ReadFieldBegin` 直接从二进制 buffer 解码，返回已消费字节数。\n- `FastReadFieldN(buf []byte) (int, error)`：解码单字段，例如 `ReadI64`、`ReadString`、`ReadDouble`、`ReadMapBegin`。\n- `FastWrite(buf []byte) int`：调用 `FastWriteNocopy(buf, nil)`。\n- `FastWriteNocopy(buf []byte, w thrift.NocopyWriter) int`：按生成顺序写字段，字符串通过 `WriteStringNocopy` 支持 nocopy 写入。\n- `BLength() int`：预估二进制编码长度，通常用于调用方提前分配 buffer。\n- `DeepCopy(s interface{}) error`：把同类型对象深拷贝到接收者，嵌套 `Meta` 和 `map[string]string` 会重新分配，指针标量会复制底层值。\n\n## 读写顺序与兼容性\n\nThrift 兼容性依赖 field id，而不是 Go 字段顺序。生成代码中的写入顺序可能与结构体声明顺序不同，例如 `EncodedVideoInfo.FastWriteNocopy` 会先写部分数值字段，再写字符串和 map 字段；这不影响协议兼容性，因为每个字段都会写入自己的 thrift field id。\n\n新增字段时应使用新的 field id，并保持旧字段 id、类型和含义不变。删除字段时也要考虑旧数据或旧服务仍可能发送该字段；当前 `Read` 和 `FastRead` 对未知字段会跳过，因此新增字段对旧读端通常是可跳过的。\n\n## map 字段处理\n\n`Extra` 和 `FileExtra` 多处定义为 `map[string]string`。在标准协议路径中，`writeFieldN` 会写 `WriteMapBegin(thrift.STRING, thrift.STRING, len(map))` 后逐项写 key/value；在 fast codec 中，会先预留 map header 长度，再遍历 map 计算实际元素数量并回填 `WriteMapBegin`。\n\n需要注意 nil map 和空 map 的语义不同：\n\n- nil optional map：`IsSetExtra()` 或 `IsSetFileExtra()` 为 false，不会写出字段。\n- 空但非 nil map：`IsSetXxx()` 为 true，会写出一个 size 为 0 的 map。\n- `OriginalVideo.Extra` 是 default 字段，不是 optional；`writeField17` 会始终写出该字段，即使 map 为 nil，也会以长度 0 写出。\n\n## 嵌套模型关系\n\n`Meta` 是 `VideoCommonInfo.MetaInfo` 和 `EncodedVideoInfo.MetaInfo` 的嵌套结构；`OriginalVideo` 则把类似元信息字段直接铺平为 `Height`、`Width`、`Duration`、`Format`、`Definition`、`Bitrate`、`Size`、`StoreURI` 等字段。\n\n```mermaid\nflowchart LR\n    A[\"VideoCommonInfo\"] --> M[\"Meta\"]\n    B[\"EncodedVideoInfo\"] --> M\n    C[\"OriginalVideo\"] --> D[\"扁平元信息字段\"]\n    U[\"UploadRecord\"] --> E[\"上传状态与扩展信息\"]\n    P[\"PosterCandidate\"] --> F[\"封面候选信息\"]\n    R[\"ProviderInfo\"] --> G[\"供应方配置\"]\n```\n\n## 常见使用模式\n\n创建模型时使用生成构造器可以保持调用风格一致：\n\n```go\nmeta := videoarch_common.NewMeta()\nheight := int64(1080)\nformat := \"mp4\"\nmeta.SetHeight(&height)\nmeta.SetFormat(&format)\n\ninfo := videoarch_common.NewVideoCommonInfo()\ninfo.SetID(123)\ninfo.SetFileID(\"file_id\")\ninfo.SetFileName(\"demo.mp4\")\ninfo.SetMetaInfo(meta)\n\nif info.IsSetMetaInfo() && info.GetMetaInfo().IsSetHeight() {\n\t_ = info.GetMetaInfo().GetHeight()\n}\n```\n\n枚举和数据库交互时可以使用 `String()`、`FromString()`、`Scan()`、`Value()`：\n\n```go\nstatus, err := videoarch_common.VideoStatusFromString(\"EncodeSuccess\")\nif err != nil {\n\treturn err\n}\n\ndbValue, err := videoarch_common.VideoStatusPtr(status).Value()\nif err != nil {\n\treturn err\n}\n_ = dbValue\n```\n\n需要复制生成模型时，优先使用对应结构体的 `DeepCopy`，尤其当对象包含 optional 指针、嵌套 `Meta` 或 map 字段时：\n\n```go\nsrc := videoarch_common.NewEncodedVideoInfo()\ndst := videoarch_common.NewEncodedVideoInfo()\n\nif err := dst.DeepCopy(src); err != nil {\n\treturn err\n}\n```\n\n## 与代码库其他部分的连接方式\n\n这个包通常位于 Kitex RPC 生成代码边界，供服务端 handler、客户端调用代码、数据转换层和测试夹具引用。业务代码一般不直接调用 `Read`、`Write`、`FastRead` 或 `FastWriteNocopy`；这些方法由 Kitex/Thrift runtime 在 RPC 编解码时调用。业务层主要使用结构体字段、`NewXxx()`、`GetXxx()`、`SetXxx()`、`IsSetXxx()`、枚举转换函数和必要时的 `DeepCopy()`。\n\n贡献者排查 RPC 字段缺失、optional 字段零值、或跨版本兼容问题时，应重点检查三类信息：结构体 tag 中的 thrift field id，`IsSetXxx()` 对应的 nil 判断，以及 `Read`/`FastRead` 中字段类型分发是否与发送端 IDL 一致。","generated-rpc-and-protocol-models":"# Generated RPC and Protocol Models\n\n## 模块概览\n\nGenerated RPC and Protocol Models 汇总了仓库中的生成式协议层代码：Kitex/Thrift 模型位于 `kitex_gen/`，Protobuf 模型位于 `proto_gen/`。这些子模块共同负责定义 RPC 边界上的请求、响应、枚举、领域实体、服务接口、Args/Result 包装类型，以及序列化、反序列化、深拷贝和 fast codec 能力。\n\n这些代码不承载业务实现。字段、枚举、方法签名和 wire tag 的权威来源是对应的 Thrift IDL 或 `.proto` 文件；需要调整协议时应修改上游协议定义后重新生成。\n\n## 子模块关系\n\n```mermaid\nflowchart LR\n  base[基础协议：Base / BaseResp / TrafficEnv]\n  mdapModel[MDAP 领域模型：AssetGroup / Source / Artifact / Meta]\n  compound[CompoundService RPC 绑定]\n  abase[AbaseService 缓存 RPC]\n  common[视频公共模型]\n  toutiao[VideoDataAccessService RPC]\n  params[摘要任务参数：DigestTaskParams]\n  medigest[Medigest 请求模型：RunMedigestTaskRequest]\n\n  base --> compound\n  base --> abase\n  mdapModel --> compound\n  common --> toutiao\n  params --> medigest\n```\n\n[base](base.md) 提供请求和响应的公共信封，例如 `Base`、`BaseResp` 和 `TrafficEnv`。这些通用字段会被 Kitex 生成的服务参数和结果结构复用，例如 [abase](abase.md) 中的 `GetRequest`、`SetRequest`、`BatchGetRequest` 等请求，以及 [bytedance](bytedance.md) 中 CompoundService 相关请求的基础字段。\n\n[mdap_model](mdap_model.md) 是 MDAP 领域对象的共享模型层，定义 `AssetGroup`、`Source`、`Artifact`、`ArtifactBlob`、`VideoMeta`、`ImageMeta`、`AudioMeta`、`TextMeta` 等结构。[bytedance](bytedance.md) 的 `compoundservice.Client` 和服务端注册代码把这些模型包装进 `CreateAssetGroupRequest`、`QueryAssetGroupsRequest`、`UpdateAssetGroupRequest` 等 RPC 方法中，对外暴露为 `CompoundService`。\n\n[videoarch_common](videoarch_common.md) 提供视频归档链路中的公共枚举和结构体，[toutiao](toutiao.md) 则围绕 `VideoDataAccessService` 生成客户端、服务端、Invoker、`ServiceInfo` 和方法分发逻辑。前者偏共享数据定义，后者偏 RPC 接入绑定。\n\n[params](params.md) 与 [medigest](medigest.md) 构成 Protobuf 侧的摘要任务协议。`params.DigestTaskParams` 聚合 `SnapshotTaskParams`、`AudioTrackTaskParams`、`VOCRTaskParams`、`BetterFramesTaskParams`、`VideoPredictParams`、`VideoProfileParams` 等任务参数；`medigest.RunMedigestTaskRequest` 再把输入媒体、上传配置、任务元信息和 `MedigestOperation` 组合为一次 Medigest 调用。\n\n## 关键跨模块流程\n\n### Compound MDAP RPC\n\n调用方通过 [bytedance](bytedance.md) 中的 `compoundservice.Client` 发起 `CreateAssetGroup`、`QueryAssetGroups`、`CreateArtifact`、`GetFileURL` 等 RPC。请求和响应结构承载 [mdap_model](mdap_model.md) 中的资产组、来源、产物和媒体元信息，并通过 [base](base.md) 的 `Base` / `BaseResp` 传递通用调用上下文和响应状态。\n\n### Abase 缓存访问\n\n[abase](abase.md) 定义 `AbaseService`，覆盖 `Get`、`Set`、`Del`、`BatchGet`、`BatchSet`、`BatchDel`、`IncrBy`、`Expire` 等缓存类 RPC。生成代码中的 Args/Result、`FastRead`、`FastWrite`、`DeepCopy` 和 `GetOrSetBaseResp` 会与 [base](base.md) 的 `BaseResp` 协同，统一请求上下文与错误状态承载方式。\n\n### 视频数据访问\n\n[toutiao](toutiao.md) 生成 `VideoDataAccessService` 的协议模型和 RPC 绑定，用于把视频数据访问能力暴露给 Kitex 客户端和服务端实现。[videoarch_common](videoarch_common.md) 提供跨服务复用的视频公共类型，使调用方和服务实现可以共享一致的枚举、结构体和 Thrift 编解码语义。\n\n### Medigest 摘要任务\n\n[medigest](medigest.md) 的 `RunMedigestTaskRequest` 是摘要任务入口，组合 `Input`、`MultiInput`、`Upload`、`Meta` 和 `MedigestOperation`。[params](params.md) 的 `DigestTaskParams` 提供具体任务参数分支，调用方需要按业务语义选择合适的任务参数，避免同一次请求中设置互相冲突的分支。","global-secondary-indexing":"# Global Secondary Indexing\n\n## 全局二级索引（GSI）\n\n全局二级索引模块负责把主表对象属性映射到 posting collection 中，使查询可以先按索引列命中 `oid`，再由上层回表读取主表数据。核心代码分两层：\n\n- `fuxi/core/service/index.go`：service 编排层，处理唯一索引、非唯一索引事件维护、快照补齐、Refresh、删除清理和分片键透传。\n- `fuxi/core/service/idx/*`：posting 存储层，通过 `idx.Operator` 统一暴露写入、删除、更新、查询和桶级维护能力。\n\n```mermaid\nflowchart TD\n  A[\"主表写入/删除\"] --> B[\"service/index.go 编排\"]\n  B --> C[\"唯一索引同步维护\"]\n  B --> D[\"非唯一索引事件维护\"]\n  C --> E[\"idx.Operator\"]\n  D --> E\n  E --> F{\"BucketEnabled\"}\n  F --> G[\"bucketedOperator\"]\n  F --> H[\"simpleOperator\"]\n  G --> I[\"posting collection\"]\n  H --> I[\"posting collection\"]\n```\n\n### 数据模型\n\n每个索引默认对应一个 posting collection，名称由 `getIdxCollection` 决定：\n\n- `cfg.Collection` 非空时直接使用。\n- 否则生成 `gsi_posting_{space}_{schema}_{name}`。\n\n旧版把复合索引列编码到单个 `key` 字段；当前存储已拆为 `col1/col2/...` 这类独立字段，具体字段名由 `entity.ColKey`、`entity.ColsFilter`、`entity.BaseFilter` 和 `entity.BaseFilterTyped` 统一生成。`EncodeIdxKey` / `DecodeIdxKey` 仅保留给外部对账和测试辅助，内部写入、删除、查询路径不再依赖字符串 key 中转。\n\nposting entry 记录至少包含：\n\n- `oid`：主表对象 ID。\n- `ver`：该 entry 对应的主表版本。\n- `sk`：可选的主表分片键，来自 `idxAddWithShardingKeys` / `idxUpdateWithShardingKeys`，用于索引命中后稳定回表。\n\n分桶模式的桶文档还包含：\n\n- `idx`、`space`、`schema`、`colN`：索引路由字段。\n- `idx_ver`：桶内乐观锁版本。\n- `cnt`：桶内 entry 数。\n- `min_ver`、`max_ver`：版本区间。\n- `entries`：`entity.BucketEntry` 数组。\n\n### Operator 路由\n\n`idx.Operator` 是 posting 层统一接口。调用方通过 `idx.GetOperator(cfg)` 路由：\n\n- `cfg.BucketEnabled=true`：使用 `bucketedOperator`，支持版本桶、split、merge 和桶级维护。\n- `cfg.BucketEnabled=false`：使用 `simpleOperator`，按行级 posting 存储，支持 typed 查询、ordered 下推和 `CountByIndex`。\n\nservice 层不直接分支判断模式，而是通过 `idxAdd`、`idxRemove`、`idxUpdateWithShardingKeys` 等 helper 统一调用 `Operator`。这些 helper 还负责版本归一、typed 列值构造和分片键清洗。\n\n### typed 索引列构造\n\n写路径使用 `buildIdxColVals`：\n\n- 读取 `admin.GetRegAttrMap(ctx, cfg.Space, cfg.Schema, \"\")`。\n- 调用 `entity.BuildIndexColVals(cols, cfg.Columns, attrMap, true)`。\n- `strict=true`，类型转换失败直接返回错误，避免把脏类型写入索引。\n\n读路径使用 `buildIdxColValsBestEffort`：\n\n- `strict=false`。\n- 转换失败时退回 string 值，不中断查询。\n- 如果 posting 中是 typed 行，错误类型不会命中，语义等价于“无此索引值”。\n\n删除和写入必须使用同一套构造逻辑。`idxRemove`、`idxUpdateWithShardingKeys` 对 old/new cols 都调用 `buildIdxColVals`，保证删除 filter 与历史写入行精确同构造。\n\n### 版本语义\n\nGSI 使用主表版本做 per-oid 收敛控制。service helper 入口先调用 `vers.NormalizeForIdx`，`idx.Operator` 公开方法入口再通过 `normalizeAtBoundary` 做边界归一。\n\n关键约束：\n\n- 非 V1、缺失或非法版本会归一到 `entity.VerBoundaryMin`。\n- `RemoveFromIndex` 使用上界删除语义：删除满足 `entry.ver <= upperVer` 的 entry。\n- `UpdateIndexWithShardingKeys` 本质是先 add 新 key，再 remove 旧 key。\n- add/remove 不做跨 key 事务；短暂双索引或旧 entry 残留由回表过滤与对账链路收敛。\n- `Refresh` 是 non-regressive upsert：只补当前 key，不清理旧 key，也不做唯一性冲突检测。\n\n### 主表分片键透传\n\n索引命中后回表可能需要主表分片键。service 层用两组函数处理：\n\n- `buildMainTableShardingKeys(ctx, space, schema, bizAttrs)` 从业务属性 map 中提取完整分片键。\n- `sanitizePostingShardingKeys(ctx, space, schema, in)` 在写 posting 前做白名单和完整性检查。\n\n分片键口径：\n\n- `admin.GetBytedocIdx` 返回的是存储层 key，不带 `$.`。\n- 事件和主表属性使用业务 key，通常带 `$.`。\n- `entity.StorageKeyToBiz` 用于存储层 key 到业务 key 的转换。\n\n`sanitizePostingShardingKeys` 的行为是保守的：\n\n- nil 或空 map 返回 nil。\n- 非分片 schema 返回 nil。\n- 缺任一白名单 key 或值为空返回 nil。\n- 白名单外 key 会被丢弃并打日志。\n- 完整命中时返回仅包含白名单 key 的新 map。\n\n业务路径应优先走 `idxAddWithShardingKeys` 和 `idxUpdateWithShardingKeys`，不要绕过 service helper 直接调用 `Operator.AddToIndexWithShardingKeys`，否则会跳过这层防御。\n\n### 查询路径\n\n`QueryIdx` 和 `QueryIdxWithLimit` 是原始 posting 查询：\n\n- 只返回 posting 层 oid。\n- 不回源主表。\n- 不过滤脏 entry。\n- 适合唯一索引冲突检测和对账扫描。\n\n业务查询不能直接把 `QueryIdx` 结果返回给用户。用户可见查询应走 meta 层索引查询路径，再通过主表查询做二次校验。代码注释中明确要求业务查询经过 `meta.queryIdByIdx → GetMetaByIDWithLimit`，由主表 filter 完成隐式回源过滤。\n\nordered 下推只适合 simple 模式。`bucketedOperator.QueryByIndexOrdered` 和 `QueryEntriesByIndexOrdered` 固定返回 `ErrOrderedNotSupported`，因为桶分页按 `min_ver` 游标遍历，无法表达业务索引列排序和 offset。\n\n`CountByIndex` 只在 simple 模式 posting collection 上按“等值前缀 + 可选单范围列”直接计数，不回源主表，因此接受最终一致误差。\n\n### 唯一索引同步维护\n\n唯一索引由写主表前的同步路径维护，不走事件异步路径。\n\n`HandleUniqIdx(ctx, space, schema, id, ver, set, exists)` 用于 SetAttr 前：\n\n1. 读取 `admin.GetIdxCfg`。\n2. 过滤 `cfg.IsUniq`。\n3. 用 `uniqIdxTouched` 判断本次变更是否命中唯一索引列。\n4. 对新 key 调 `QueryIdxWithLimit(..., 2)` 做冲突检测。\n5. 无冲突时通过 `idxAddWithShardingKeys` 预写新 entry。\n6. 返回 `cleanup` 和 `rollback`：\n   - 主表写入成功后调用 `cleanup` 删除旧 entry。\n   - 主表写入失败时调用 `rollback` 删除本次预写 entry。\n\n通配唯一索引用 `wildcardComboMap` 展开 old/new 组合，按集合差分决定新增和清理。非通配唯一索引用 `gmap.LoadAll` 按 `cfg.Columns` 顺序取完整列值，列不全会返回错误。\n\n`HandleUniqIdxForDel` 用于 DelAttr 前。它只在删除命中唯一索引列时生成 cleanup。非通配索引禁止删除完整唯一索引中的部分列；如果主表本来就缺列，则允许继续删除。\n\n### 非唯一索引事件维护\n\n非唯一索引由事件驱动维护，入口是 `HandleEvent(ctx, event, dryRun)`。\n\n执行流程：\n\n1. `fillEventScopeFromCtx` 补齐 `event.Space` / `event.Schema`。\n2. `admin.GetIdxCfg` 获取索引配置。\n3. 将 `event.Created`、`event.Updated`、`event.Deleted` 转成按 path 查找的 map。\n4. 调用 `handleNonUniqIdxForEvent`。\n5. 唯一索引在事件路径中跳过，只打印诊断日志。\n\n`handleNonUniqIdxForEvent` 对每个受影响的非唯一索引推导 old/new 完整性：\n\n- old 完整、new 完整、key 变更：`idxUpdateWithShardingKeys`\n- old 完整、new 不完整：`idxRemove`\n- old 不完整、new 完整：`idxAddWithShardingKeys`\n- old 和 new 都不完整：no-op\n\n列值来源按优先级取：\n\n1. 事件中的 Created / Updated / Deleted。\n2. `event.IdxSnapshot`。\n3. 惰性 `queryFn` 回源主表。\n\n`queryFn` 会一次性查询所有非唯一索引列，并在分片表中要求完整分片键。若索引列包含 `entity.FuxiAttr` 中的系统列，`selectContainsFuxiAttr` 会让回源 `QueryReq` 带上 `WithFuxiAttr=true`，否则系统列会被查询层过滤掉。\n\n### IdxSnapshot\n\n`BuildIdxSnapshot(ctx, event, existingData)` 在事件发送前预填 `event.IdxSnapshot`，用于减少消费端回源。\n\n它只处理非唯一索引，并且只补充非通配列。通配列需要消费端根据具体路径展开。补齐来源包括：\n\n- 事件当前值：`eventCurrentVals` 收集 Created.Val 和 Updated.After。\n- 调用方已持有的 `existingData`。\n- 必要时用 `Query` 定向补查缺失索引列。\n\n分片键处理是“尽量补齐”：\n\n- 如果事件或 `existingData` 已包含完整分片键，则写入 snapshot。\n- 不会为了单纯补分片键额外触发 Query。\n- 只有在确实需要回源补查索引列时，才强制校验分片键完整性；缺失时返回 `doc.ErrShardingKeyNotSet` 包装错误。\n\n### 通配索引\n\n通配索引由 `cfg.HasWildcardColumn()` 识别，事件维护入口是 `handleWildcardIdxForEvent`。\n\n当前实现会找到第一个包含通配符的列作为 `wcIdx` 和 `wcPattern`，然后：\n\n1. 从事件路径中筛选匹配通配模式的具体路径。\n2. 判断非通配列是否变更。\n3. 对 create-only 且没有命中通配路径的场景直接跳过，避免不必要回源。\n4. 非通配列变更时，回源收集当前所有匹配通配路径。\n5. 为每个具体路径生成 `wildcardBinding`。\n6. 对每个 binding 组合完整索引列，执行 add/remove/update。\n\n`expandWildcardAttrs(columns, attrs)` 是通配展开的通用 helper，用于唯一索引组合差分、Refresh 和整对象删除 cleanup。它要求非通配列完整存在，否则返回 nil。\n\n### Refresh 与删除清理\n\n`Refresh(ctx, space, schema, id)` 用于按主表当前快照补写索引：\n\n1. 读取全部索引配置。\n2. 收集所有索引列。\n3. 回源查询对象当前值。\n4. 解析 `entity.VersionColumn` 并归一化版本。\n5. 对每个索引执行 `idxAddWithShardingKeys`。\n6. 通配索引用 `expandWildcardAttrs` 展开多条 entry。\n\n`Refresh` 不清理旧 key，也不检查唯一冲突。它适合 backfill、缺失补写和幂等重放。\n\n`HandleIdxCleanupForDel(ctx, space, schema, id, ver, attrs)` 用于整对象删除成功后清理所有 GSI entry，包括唯一和非唯一索引。它按传入 attrs 构造索引 key，调用 `idxRemove`，删除上界为对象删除前版本。失败只打日志和指标，并提交 `uniqIdxRetryPool` 做异步退避重试，不阻塞主删除流程。\n\n### 分桶模式写入与查询\n\n`bucketedOperator.AddToIndexWithShardingKeys` 是分桶写入口：\n\n- 先把 typed cols 退化为 raw string cols。\n- 调用 `normalizeAtBoundary` 归一版本。\n- 通过 `retrySimple` 包住 `addToIndexCore`。\n\n`addToIndexCore` 有快慢两条路径：\n\n- 快路径：单次 `RawUpdate`，filter 包含版本区间、容量守卫和 `entries.oid != oid`，命中时直接 `$push` entry。\n- 慢路径：`txnFindBucketByVersion` 读取桶后决策：\n  - 无桶：创建覆盖全区间的活跃桶。\n  - oid 已存在且版本不旧：no-op。\n  - 活跃桶满：`txnSplitActiveBucket`。\n  - 封口桶需要拆分：`txnSplitSealedBucket`。\n  - 否则：`txnUpsertEntry`。\n\n分裂操作使用 `WithBulkTransaction` 保证多桶文档原子提交；普通 upsert 使用 `idx_ver` CAS 和 `expectedMatched=&1` 防并发覆盖。\n\n`RemoveFromIndex` 是条件直写：\n\n- filter 匹配 `min_ver <= dataVer < max_ver`。\n- entry 匹配 `oid` 且 `ver <= dataVer`。\n- update 使用 `$pull` 删除 entry，并递减 `cnt`、递增 `idx_ver`。\n- 删除成功后触发 `goTryMerge`，生产环境异步合并小桶。\n\n`UpdateIndexWithShardingKeys` 先 add 新 key，再 remove 旧 key。两步不包跨桶事务，这是有意设计；失败时可能留下双索引中间态，由查询回表和对账修复兜底。\n\n查询使用 `queryByIndexPaged` / `queryEntriesByIndexPaged`：\n\n- 通过 `forEachBucketPaged` 按 `_id` 游标分页遍历桶。\n- `QueryByIndex` 返回去重后的 oid。\n- `QueryEntriesByIndex` 返回去重后的 `BucketEntry`，同一 oid 同时存在有 sk 和无 sk entry 时优先保留有 sk 的版本。\n- 超过 `entity.MaxBucketsPerQuery` 返回 `ErrMaxBucketsExceeded` 并打日志。\n\n### 桶级维护\n\n分桶模式提供一组运维和修复接口：\n\n- `ReadBucket`：按 `_id` 读取桶。\n- `DeleteBucket`：删除封口桶，拒绝删除活跃桶。\n- `SealBucket`：把活跃桶封口，并校验 `maxVer` 大于桶最小版本和桶内最大 entry 版本。\n- `DedupBucketEntries`：按 oid 去重并重算 `cnt`。\n- `RemoveEntryFromBucket`：按桶 `_id` 删除指定 oid 的 entry。\n- `MergeBucketInto`：把 source 桶合入 target 桶。\n- `TryMergeBucket`：尝试与相邻小封口桶合并。\n\nsimple 模式不支持这些桶级操作，误调会返回 `ErrNotSupportedInSimpleMode`。\n\n测试如果需要确定性观测删除后的 merge，应调用：\n\n```go\n// 测试 setup 中使用，同步执行删除后的桶合并\nidx.SetGoTryMerge(idx.SyncMergeHook)\n```\n\n### 修复接口\n\n`index_repair.go` 实现 internal-only 修复 RPC 的 service 层。\n\n`RepairIdxEntry(ctx, req)` 用于修复可疑 posting entry：\n\n- 索引配置不存在：`skipped`。\n- 通配索引：当前统一 `skipped`。\n- 主表无 oid：`removed`，删除孤儿 entry。\n- 主表有 oid 但当前列值与 `item.Cols` 不一致：`removed`，删除旧 key 残留。\n- 主表版本大于 entry 版本：`added`，按当前列值补写新 entry。\n- 其他情况：`skipped`。\n\n`repairFetchMain` 通过 `Query` 回源主表，`repairDecideEntry` 实现决策树。补写时同样调用 `idxAddWithShardingKeys`，并通过 `buildMainTableShardingKeys` 补齐主表分片键。\n\n`RepairIdxBucket(ctx, req)` 用于修复桶：\n\n- 桶不存在：`skipped`。\n- 活跃桶：`skipped`，拒绝删除。\n- 非空封口桶：`skipped`，拒绝删除。\n- 空封口桶：调用 `DeleteBucket`，返回 `deleted`。\n\n### 与其他模块的连接\n\nGSI 模块依赖 admin 配置和主表查询能力：\n\n- `admin.GetIdxCfg`：读取索引配置。\n- `admin.GetRegAttrMap`：读取属性注册类型，用于 typed 索引列构造。\n- `admin.GetBytedocIdx`：读取主表分片键配置。\n- `Query`：回源主表补齐索引列、Refresh 当前快照、修复入口判定。\n- `doc.FindWithLimit`、`doc.RawUpdate`、`doc.CountBson`：posting 存储层最终落到 Bytedoc 操作。\n- `metrics.ReportGSIOps`：索引 add/remove/update/query 结果和耗时上报。\n\n业务查询应通过 meta 层使用 `idx.GetOperator(cfg)` 的查询能力，再回表过滤。对账和修复链路可以直接处理 raw posting entry，但必须理解其最终一致语义。","interface-definitions-and-tooling":"# Interface Definitions and Tooling\n\n## 模块概览\n\n`Interface Definitions and Tooling` 模块集中维护 Compound 的 Thrift 接口契约和少量文档/测试辅助脚本。它不包含服务实现逻辑，主要职责是定义跨服务通信的数据结构、RPC 方法、公共元信息，以及支撑仓库工程流程的脚本工具。\n\n模块由两类文件组成：\n\n- `idl/*.thrift`：Compound、MDAP、VDA、Abase 等服务和模型的接口定义。\n- `script/*.py`：仓库级配置、living spec 覆盖字段补齐、远程单测结果分析工具。\n\n## IDL 组织\n\n```mermaid\nflowchart TD\n    Base[\"base.thrift<br/>Base / BaseResp\"]\n    Compound[\"compound.thrift<br/>CompoundService\"]\n    MDAPService[\"mdap_service.thrift<br/>MDAP RPC\"]\n    MDAPModel[\"mdap_model.thrift<br/>资产/源/产物模型\"]\n    VDA[\"video_data_access.thrift<br/>视频数据访问 RPC\"]\n    Common[\"video_common.thrift<br/>视频通用模型\"]\n    Abase[\"abase/abase.thrift<br/>KV 存储 RPC\"]\n\n    Compound --> Base\n    Compound --> MDAPService\n    Compound --> VDA\n    MDAPService --> Base\n    MDAPService --> MDAPModel\n    MDAPModel --> Base\n    VDA --> Base\n    VDA --> Common\n    Abase --> Base\n```\n\n`base.thrift` 是所有主要接口的公共依赖。业务 IDL 通过 `include` 引入它，并在请求/响应中使用字段号 `255` 承载 `base.Base` 或 `base.BaseResp`，这是本模块中最稳定的跨接口模式。\n\n## 公共请求与响应元信息\n\n`idl/base.thrift` 定义通用调用上下文：\n\n- `TrafficEnv`：用于流量环境透传，包含 `Open` 和 `Env`。\n- `Base`：请求侧元信息，包括 `LogID`、`Caller`、`Addr`、`Client`、可选 `TrafficEnv` 和 `Extra`。\n- `BaseResp`：响应侧状态信息，包括 `StatusMessage`、`StatusCode` 和可选 `Extra`。\n\n大多数 Compound、MDAP、VDA 接口都要求请求中携带 `Base`，响应中返回 `BaseResp`。新增接口时应保持字段号 `255` 的约定，避免破坏已有生成代码和调用习惯。\n\n## CompoundService 接口\n\n`idl/compound.thrift` 是 Compound 对外暴露的主接口，命名空间为：\n\n```thrift\nnamespace go bytedance.videoarch.compound\n```\n\n它聚合了几组能力：\n\n- MDAP 资产管理代理：`CreateAssetGroup`、`MGetAssetGroups`、`QueryAssetGroups`、`UpdateAssetGroup`、`DeleteAssetGroup`。\n- MDAP Source 管理：`CreateSource`、`MGetSources`、`QuerySources`、`UpdateSource`。\n- MDAP Artifact 管理：`CreateArtifact`、`MGetArtifacts`、`QueryArtifacts`。\n- Fuxi 属性读写：`SetAttr`、`CopyAttr`、`DelAttr`、`Query`、`Del`、`Count`。\n- 文件 URL 签发：`GetFileURLs`。\n- 数据处理任务：`StartProcessing`。\n- 内部索引维护：`TTL`、`UpdateIdxWithEventForInternal`、`RefreshIdxForInternal`。\n- GSI 修复接口：`RepairIdxEntryForInternal`、`RepairIdxBucketForInternal`。\n\n### 事件模型\n\n`Event` 是 Compound 内部变更事件的核心结构，描述对象在某个 `Space`、`Schema`、`ID` 下发生的变更：\n\n- `Type` 使用 `EventType` 表示 `CREATE`、`SET_ATTR`、`DEL_ATTR`、`DEL`。\n- `Version` 使用 `Version.Before` 和 `Version.After` 表示版本推进。\n- `Created`、`Updated`、`Deleted` 分别记录创建、更新、删除的属性路径和值。\n- `Syncs` 使用 `SyncTarget` 标识命中的内部订阅系统，例如 `GSI`。\n- `IdxSnapshot` 保存 GSI 构建索引键所需的补充列快照，减少消费端回源主表查询。\n\n该结构服务于事件驱动链路：生产端在发送前预判内部订阅命中情况，并尽量补全索引所需字段；消费端根据 `Syncs` 和 `IdxSnapshot` 分流处理。\n\n### Fuxi 属性接口\n\nFuxi 相关结构定义了对象属性的写入、复制、删除、查询和计数能力。\n\n`SetAttrReq` 的核心字段包括：\n\n- `Schema`、`ID`：定位对象。\n- `Space`、`SchemaVersion`：可选空间和 schema 版本。\n- `Values`：待写入的 `AttrVal` 列表。\n- `Where`：可选条件写入。\n- `WriteMode`：写模式，默认 `WriteMode.Upsert`。\n\n`WriteMode.InsertOnly` 表示仅插入：对象已存在时返回 `AlreadyExists`，且不触发事件、唯一索引或主表写入副作用。新增调用方需要明确判断自身是否依赖历史 upsert 行为。\n\n查询条件通过递归表达式树建模：\n\n- `WhereClause` 可按 `Ids` 或 `Expression` 过滤。\n- `Expression` 可以是叶子条件 `LeafCondition`，也可以是带 `LogicType` 的子表达式列表。\n- `Operator` 支持 `EQ`、`NEQ`、`GT`、`LT`、`GTE`、`LTE`、`IN`、`NOT_IN`。\n\n`QueryReq` 使用 `Select`、`From`、`Where`、`Sort`、`Limit`、`Offset` 描述查询；`QueryResp` 返回 `AttrMetas` 和三层列表结构 `AttrVals`。\n\n### GSI 修复接口\n\n`RepairIdxEntryForInternal` 和 `RepairIdxBucketForInternal` 是事务模式 GSI 的离线修复接口，只适用于 `IdxCfg.TxnSupported = true` 的索引。\n\n`RepairIdxEntryReq` 接收最多 100 个 `RepairIdxEntryItem`。服务端根据 `Oid`、`Idx`、`Cols`、`Ver` 回源主表后自行决定修复动作，返回 `RepairIdxEntryResult.Action`：\n\n- `\"added\"`：补写索引 entry。\n- `\"removed\"`：删除错误 entry。\n- `\"skipped\"`：无需处理或被跳过。\n- `\"failed\"`：修复失败。\n\n`RepairIdxBucketReq` 仅用于清理“空封口桶”。活跃桶和非空桶必须返回 skipped，不应被删除。\n\n## MDAP 模型与服务\n\n`idl/mdap_model.thrift` 定义 MDAP 的领域对象，`idl/mdap_service.thrift` 定义这些对象的 CRUD 接口。\n\n核心模型包括：\n\n- `AssetGroup`：资产组，包含 `Space`、`Name`、`MediaTypes`、`SourceConfigs`、`ArtifactConfig` 等。\n- `Asset`：一组相关 Source 的集合。\n- `Source`：原始媒体输入，包含 `MediaType`、`Format`、二进制 `Meta` 和 `SourceConfig`。\n- `Artifact`：处理产物，支持从 Source 或 Artifact 派生。\n- `ArtifactContent`：按 `ArtifactType` 保存截图、音频、图片等内容，并可通过 `ArtifactBlob` 管理二进制对象引用。\n\n媒体元信息按类型拆分为 `VideoMeta`、`ImageMeta`、`AudioMeta`、`TextMeta`。其中 `VideoMeta` 可包含多路 `VideoStreamMeta` 和 `AudioStreamMeta`。\n\n`mdap_service.thrift` 中的接口按资源分组：\n\n- AssetGroup：`CreateAssetGroup`、`MGetAssetGroups`、`QueryAssetGroups`、`UpdateAssetGroup`、`DeleteAssetGroup`。\n- Source：`CreateSource`、`MGetSources`、`QuerySources`、`UpdateSource`。\n- Artifact：`CreateArtifact`、`MGetArtifacts`、`QueryArtifacts`。\n\nArtifact 查询和批量获取支持签发 URL：\n\n- `WithSignedURLs = true` 时启用 URL 签发。\n- `URLParam` 指定 `DomainType` 和过期时间。\n- `Auth` 在签发 URL 时必填。\n\n## 视频数据访问 IDL\n\n`idl/video_common.thrift` 定义视频领域通用结构，`idl/video_data_access.thrift` 定义 VDA 服务接口。\n\n常用通用模型包括：\n\n- `VideoCommonInfo`：原视频或文件信息，包含 `FileID`、`FileName`、`MetaInfo`、`FileHash`、`Extra`、`FileExtra`。\n- `EncodedVideoInfo`：转码视频信息，包含 `OriginalID`、`EncodedID`、`EncodedType`、`Codec`、`LogoType` 等。\n- `UploadRecord`：上传记录。\n- `PosterCandidate`：候选封面。\n- `OriginalVideo`：创建原视频时的一体化字段集合。\n- `UserAction`、`VideoStatus`：播放状态和视频状态枚举，并通过 `UserActionIDMap`、`VideoStatusIDMap` 提供字符串到 ID 的常量映射。\n\n`VideoDataAccessService` 覆盖视频数据的写入、读取、缓存、状态更新、URI 引用和迁移场景。典型接口包括：\n\n- 写入原视频：`MCreateOriginalVideo`、`CreateUploadRecord`、`CreateVideoInfo`、`CreateEncodedVideoInfo`。\n- 读取视频组信息：`MGetVideoInfo`、`PlayerMGetVideoInfo`、`MGetVideoInfoFromDB`。\n- 缓存刷新：`MRefreshVideoInfo`、`GetVideoInfoFromCache`。\n- 属性更新：`UpdateVideoExtra`、`MUpdateVideoExtra`、`UpsertVideoExtras`。\n- URI 引用：`QueryUriReference`、`MQueryUriReferences`、`UpsertUriReference`、`DeleteURIReference`。\n- 数据层读写：`InsertVideoUploadExtras`、`InsertVideoInfosExtras`、`ReadRawVideo`、`WriteRawVideo`。\n\n需要注意读取接口的一致性差异：\n\n- `MGetVideoInfo` 是默认推荐接口，但可能和后端数据库有 1 到 3 秒延迟。\n- `PlayerMGetVi
