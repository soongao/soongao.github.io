deoInfo` 使用本地缓存，QPS 更高，但可能有 1 到 10 秒延迟。\n- `MGetVideoInfoFromDB` 直接访问 MySQL，提供最强一致性，但不推荐常规业务直接使用。\n\n## Abase KV 接口\n\n`idl/abase/abase.thrift` 定义 Abase KV 服务接口，命名空间覆盖 `cpp`、`go`、`py`、`java`。该文件相对独立，但同样依赖 `base.thrift`。\n\n主要能力包括：\n\n- 单 key 操作：`Get`、`Set`、`Del`、`IncrBy`、`Append`、`Expire`。\n- 批量操作：`BatchGet`、`BatchSet`、`BatchDel`、`BatchIncrBy`、`BatchAppend`、`BatchExpire`。\n- CAS 风格操作：`XGet`、`XSet`、`BatchXGet`、`BatchXSet`。\n- 扫描：`ScanRow`。\n\n关键约束：\n\n- `ttl = 0` 表示永不过期。\n- `SetRequest` 中 `ttl_type` 和 `ttl` 必须同时设置才生效，否则按永不过期处理。\n- `XSetRequest` 中 `ttl_type` 和 `ttl` 必须同时设置，否则返回错误。\n- `XGet` 即使 key 不存在也可能返回 `Success`，调用方应使用返回的 `generation` 做 CAS。\n- 批量响应通过 `BatchResponseCode` 表示整体状态；即使整体为 `Error`，调用方也必须逐条检查子响应的 `errCode`。\n\n## 工具脚本\n\n### `script/settings.py`\n\n`settings.py` 是仓库级元配置：\n\n```python\nPRODUCT = \"bytedance\"\nSUBSYSTEM = \"videoarch\"\nMODULE = \"compound\"\nAPP_TYPE = \"binary\"\n```\n\n其他工程工具可以读取这些常量识别仓库归属和模块类型。\n\n### `script/spec-add-coverage-tbd.py`\n\n该脚本用于批量给 living spec 或 spec-delta 中缺少覆盖测试字段的 Scenario 补充：\n\n```markdown\n**覆盖测试**: TBD(待补全：归档前由 Owner 替换为真实测试路径)\n```\n\n执行入口是 `main()`，处理流程是：\n\n```mermaid\nflowchart TD\n    Main[\"main()\"]\n    Process[\"process(path)\"]\n    Split[\"split_into_scenarios(content)\"]\n    Patch[\"patch_scenario_block(block)\"]\n    FindEnd[\"find_block_body_end(block)\"]\n\n    Main --> Process\n    Process --> Split\n    Process --> Patch\n    Patch --> FindEnd\n```\n\n关键函数职责：\n\n- `split_into_scenarios(content)`：按 `#### Scenario:` 切分文档，并保留 Scenario header。\n- `patch_scenario_block(block)`：如果 Scenario 内没有 `**覆盖测试**` 字段，就在段落尾部插入 TBD 行。\n- `find_block_body_end(block)`：定位 Scenario 内容结束位置，遇到 `##` 或 `###` 标题时停止。\n- `process(path)`：读取文件、逐个 Scenario patch，并在内容变化时写回。\n- `main()`：遍历命令行参数中的 spec 文件并输出处理统计。\n\n脚本只识别以 `#### Scenario:` 开头的场景块；如果文档使用其他标题格式，不会被处理。\n\n### `script/utd_analyze.py`\n\n`utd_analyze.py` 用于分析远程 UT 结果，将状态文件、日志和结构化报告汇总为 JSON 和文本树。\n\n主流程由 `main()` 编排：\n\n1. 解析命令行参数。\n2. 通过 `_read_json_file()` 读取 `status.json`。\n3. 优先从 `--utd-log` 中调用 `_extract_go_test_failures_from_utd_log()` 提取 Go test JSON 失败信息。\n4. 如果日志中没有失败信息，再调用 `_maybe_structured_failures_from_result_dir()` 从结果目录解析 XML、JSONL、NDJSON。\n5. 调用 `_to_report()` 生成结构化 report。\n6. 调用 `_format_tree()` 生成可读文本。\n7. 通过 `_safe_write_json()` 和 `_safe_write_text()` 写出结果。\n\n主要解析函数：\n\n- `_parse_go_test_json_events(text)`：逐行解析 Go test JSON event。\n- `_extract_go_test_failures_from_utd_log(path)`：按 package 和 test 聚合 `run`、`pass`、`fail`、`skip`、`output` 事件，生成失败列表。\n- `_parse_junit_xml(path)`：解析 JUnit XML 中的 `failure` 和 `error` 节点。\n- `_maybe_structured_failures_from_result_dir(result_dir)`：遍历报告目录，跳过 `status.json`、`exception.json`、`pipeline_meta.json`，解析 XML 和 JSONL/NDJSON。\n- `_to_report(repo_root, status, result_dir, failures)`：生成标准 report，并通过 `_sanitize_url()` 移除远程 job URL 查询参数中的 `token`。\n- `_format_tree(report, max_failures_per_pkg, max_detail_lines)`：将 report 转为面向终端阅读的失败树。\n\n`_extract_file_line(text, repo_root)` 会从失败详情中提取第一个 `*.go:line` 位置；如果路径是绝对路径且提供了 `repo_root`，会转成相对路径，便于开发者定位失败。\n\n## 维护建议\n\n新增或修改 Thrift 接口时，应优先保持已有模式：\n\n- 请求/响应继续使用 `255: required base.Base Base` 或 `255: required base.BaseResp BaseResp`，除非历史接口已经是 optional。\n- 新字段使用新的字段号，不复用已删除字段号。\n- 对外语义变化必须写在 struct、enum 或 service 方法旁的注释中。\n- 对批量接口，响应中保留逐条结果，避免只返回整体成功/失败。\n- 对内部接口，在方法名或注释中明确 `ForInternal`、调用方范围和使用约束。\n\n修改脚本时，应保留当前执行流的幂等性：\n\n- `spec-add-coverage-tbd.py` 已存在 `**覆盖测试**` 时不重复插入。\n- `utd_analyze.py` 读取失败时倾向返回空结果而不是中断，以便 CI 后处理流程尽量产出报告。\n- 输出远程 URL 前必须继续调用 `_sanitize_url()`，避免泄露 `token`。","mdap-assets-and-processing-auth":"# MDAP Assets and Processing — auth\n\n## 模块概览\n\n`mdap/auth` 模块负责为 MDAP 相关业务提供全局复用的鉴权客户端。当前模块只有一个导出函数：\n\n```go\nfunc GetMDAPAuthClient() (mdapauth.Client, error)\n```\n\n它封装了 `code.byted.org/videoarch/mdap_auth` 的默认客户端初始化逻辑，并通过 `sync.Once` 保证进程内只初始化一次。\n\n## 核心实现\n\n模块级变量：\n\n```go\nvar (\n\tmdapAuthClientOnce sync.Once\n\tmdapAuthClient     mdapauth.Client\n\tmdapAuthClientErr  error\n)\n```\n\n`GetMDAPAuthClient` 的执行逻辑是：\n\n1. 首次调用时进入 `mdapAuthClientOnce.Do(...)`。\n2. 调用 `mdapauth.NewDefaultClient()` 创建默认 MDAP 鉴权客户端。\n3. 将客户端和错误缓存到包级变量 `mdapAuthClient`、`mdapAuthClientErr`。\n4. 后续调用直接返回缓存结果，不会再次初始化。\n\n```go\nfunc GetMDAPAuthClient() (mdapauth.Client, error) {\n\tmdapAuthClientOnce.Do(func() {\n\t\tmdapAuthClient, mdapAuthClientErr = mdapauth.NewDefaultClient()\n\t})\n\treturn mdapAuthClient, mdapAuthClientErr\n}\n```\n\n这里的关键模式是“懒加载单例”：\n\n- `sync.Once` 提供并发安全的只执行一次语义。\n- 初始化成功后，所有调用方共享同一个 `mdapauth.Client`。\n- 初始化失败后，错误也会被缓存；后续调用会继续返回同一个错误，不会自动重试。\n\n## 在代码库中的角色\n\n`mdap/auth` 不直接执行业务鉴权判断，而是提供底层 MDAP Auth Client 的统一入口。实际业务调用方会拿到 `mdapauth.Client` 后，再在各自服务逻辑中执行具体的权限校验。\n\n当前主要调用入口包括：\n\n- `core/service/pack_url.go` 中的 `getMDAPAuthClient`\n- `mdap/service/start_processing_auth.go` 中的 `getStartProcessingAuthClient`\n\n典型执行链路之一是获取文件 URL 权限校验：\n\n```mermaid\nflowchart TD\n    A[\"handler.MGetArtifacts\"] --> B[\"mdap/service.MGetArtifacts\"]\n    B --> C[\"core/service.AuthorizeGetFileURLAccess\"]\n    C --> D[\"core/service.getMDAPAuthClient\"]\n    D --> E[\"auth.GetMDAPAuthClient\"]\n    E --> F[\"mdap_auth.NewDefaultClient\"]\n```\n\n另一个相关链路是按资产组查询产物：\n\n```text\nqueryArtifactsByAssetGroupID\n  -> AuthorizeGetFileURLAccess\n  -> getMDAPAuthClient\n  -> GetMDAPAuthClient\n```\n\n这说明 `GetMDAPAuthClient` 位于“业务服务层”和外部 `mdap_auth` SDK 之间，承担统一初始化与复用客户端的职责。\n\n## 错误行为\n\n`GetMDAPAuthClient` 返回 `(mdapauth.Client, error)`，调用方必须处理错误：\n\n```go\nclient, err := auth.GetMDAPAuthClient()\nif err != nil {\n\treturn err\n}\n```\n\n需要注意的是，`sync.Once` 会缓存第一次初始化的结果。如果 `mdapauth.NewDefaultClient()` 第一次失败，`mdapAuthClientErr` 会持续返回该错误，除非进程重启或未来代码显式引入重置机制。\n\n因此，调用方不应假设再次调用 `GetMDAPAuthClient()` 可以恢复临时初始化失败。\n\n## 并发与生命周期\n\n该模块适合被请求路径上的代码直接调用：\n\n- 多个 goroutine 同时首次调用时，只有一个 goroutine 会执行 `mdapauth.NewDefaultClient()`。\n- 其他 goroutine 会等待初始化完成后读取同一份结果。\n- 客户端生命周期与当前进程一致，没有显式关闭逻辑。\n\n如果未来 `mdapauth.Client` 引入连接池、后台刷新或资源释放能力，需要重新评估这个单例生命周期是否需要增加关闭或重建机制。\n\n## 维护注意事项\n\n修改该模块时需要特别关注以下行为：\n\n- 不要绕过 `sync.Once` 直接初始化多个 `mdapauth.Client`，否则可能破坏连接复用或认证配置一致性。\n- 如果要支持初始化失败后的重试，不能只在现有 `sync.Once` 中加逻辑，需要重新设计缓存状态和并发控制。\n- 如果要支持测试注入，需要考虑如何替换 `mdapAuthClient`，同时避免影响并发调用路径。\n- 业务鉴权逻辑不应放进 `mdap/auth`，应继续保留在 `core/service` 或 `mdap/service` 等调用层中。","mdap-assets-and-processing-id":"# MDAP Assets and Processing — id\n\n## 模块概览\n\n`mdap/id` 负责 MDAP 资源 ID 的生成、解析、字段编码和兼容性处理。模块产出的 ID 固定为 40 字符，底层表示为 200 bits / 25 bytes，并使用自定义 Base32 字符集 `0123456789abcdefghjkmnpqrstvwxyz` 编码。\n\n模块覆盖两类 ID：\n\n- 标准 MDAP ID：由 `Generator.Generate` / 包级 `Generate` 生成，由 `Parser.Parse` / 包级 `Parse` 解析。\n- AssetGroupID：由 `GenerateAssetGroupID` / `BuildAssetGroupID` 生成，由 `ParseAssetGroupID` 解析，采用专门的可读前缀和固定字段布局。\n\n`mdap/service` 会直接依赖本模块：例如 `CreateArtifact`、`CreateSource` 会通过 `ParseAssetGroupID` 校验 asset group 归属，通过 `Generate` 创建 artifact/source ID，通过 `Parse` 反解 source/artifact 的账号、VDC、GroupKey 等字段。\n\n## 标准 MDAP ID 布局\n\n标准 ID 总长度为 200 bits，编码后为 40 个 Base32 字符。\n\n```text\n明文前缀 60 bits:\nT(5) + TEN6(30) + SUB4(20) + KV1(5)\n\n混淆后缀 140 bits:\nSET11(55) + DC2(10) + MT(5) + TS7(35) + X1(5) + RAND6(30)\n```\n\n字段含义定义在 `IDFields`：\n\n- `EntityType`：实体类型，支持 `EntityTypeAsset`、`EntityTypeSource`、`EntityTypeArtifact`、`EntityTypeAssetGroup`。\n- `TenantID`：由账号的 `TopAccountID` 经 `TopAccountIDToTenantID` 派生。\n- `AccountID`：账号 ID，来自 account 服务返回的 `AccountInfo.ID`。\n- `Space`：账号名称，生成时由调用方传入，解析时通过 `AccountID` 查询 account 服务补齐。\n- `GroupKey`：父 AssetGroup 的短键，用于子实体 ID 关联 asset group。\n- `KeyVersion`：混淆密钥版本，位于明文前缀，解析时用于选择 `Obfuscator`。\n- `VDC`：虚拟数据中心字符串，通过 `VDCToCode` / `CodeToVDC` 与 10-bit 数值互转。\n- `MIMEType`：MIME 顶层类型，使用 `MIMEType` 枚举。\n- `Timestamp`：以 `EpochMs` 为起点的 100ms 时间桶。\n- `Extension`、`WorkerID`、`Sequence`：共同承载 35-bit nonce；新 ID 要求 `Extension != 0`，用于区别历史 `X1=0` 布局。\n\n## 生成流程\n\n`Generate(ctx, entityType, space, groupKey, vdc, mimeType)` 是包级入口，会懒加载全局 `Generator`。全局生成器的 `WorkerID` 来自 `workerIDFromPodName`，它对 `env.PodName()` 做 FNV-1a hash，并截断为 15 bits。\n\n核心流程：\n\n```mermaid\nflowchart TD\n    A[\"调用 Generate\"] --> B[\"loadOrCreateGlobalGenerator\"]\n    B --> C[\"Generator.Generate\"]\n    C --> D[\"getAccountByName 查询账号\"]\n    D --> E[\"TopAccountIDToTenantID\"]\n    E --> F[\"nextTimestampAndNonce\"]\n    F --> G[\"generateFromFields\"]\n    G --> H[\"Obfuscator.Obfuscate\"]\n    H --> I[\"EncodeBase32 输出 40 字符 ID\"]\n```\n\n`Generator.Generate` 会先查询 account 服务，再校验：\n\n- `entityType.IsValid()`\n- `tenantID <= MaxTenantID`\n- `AccountInfo.ID` 在 `[0, MaxAccountID]`\n- `groupKey <= MaxGroupKey`\n- `VDCToCode(vdc)` 可识别\n\n随后调用 `nextTimestampAndNonce` 生成时间戳和 nonce。nonce 在每个 100ms 时间桶内随机初始化，然后进程内递增；如果同一时间桶耗尽到 `MaxNonce`，会通过 `waitForNext100ms` 等待下一个时间桶。\n\n`generateFromFields` 负责位级组装：先构造 60-bit 明文前缀，再构造 140-bit 后缀，并通过 `Obfuscator.Obfuscate` 做仿射置换，最后合并为 25 字节并调用 `EncodeBase32`。\n\n## 解析流程\n\n`Parse(ctx, id)` 是包级入口，实际委托给 `DefaultParser.Parse`。\n\n解析步骤与生成相反：\n\n1. `DecodeBase32` 将 40 字符 ID 解码为 `[TotalBytes]byte`。\n2. 使用 `big.Int` 读取 200-bit 整数。\n3. 高 60 bits 作为明文前缀，直接提取 `EntityType`、`TenantID`、`AccountID`、`KeyVersion`。\n4. 低 140 bits 作为混淆后缀，根据 `KeyVersion` 从 `KeyManager` 获取 `Obfuscator`。\n5. 调用 `Deobfuscate` 还原后缀字段。\n6. 解析 `GroupKey`、`VDC`、`MIMEType`、`Timestamp`、`Extension`、`WorkerID`、`Sequence`。\n7. 调用 `getAccountByID` 查询账号名称，填充 `IDFields.Space`。\n\n如果密钥版本不存在，`Parser.Parse` 会返回包装了 `ErrParseFailed` 的错误；如果 VDC code 不存在，也会返回 `ErrParseFailed: unknown vdc code ...`。\n\n## AssetGroupID\n\nAssetGroupID 使用独立布局，不经过 `Obfuscator`，但仍保持 40 字符长度：\n\n```text\ng + accountPart(4) + groupKeyPart(11) + dcPart(2) + padding(22)\n```\n\n相关入口：\n\n- `GenerateAssetGroupID(ctx, space)`：通过 `getAccountByName` 查询账号，生成随机 `groupKey`，使用当前 `env.VDC()`，再调用 `BuildAssetGroupID`。\n- `BuildAssetGroupID(accountID, groupKey, vdc)`：直接按固定宽度 Base32 片段拼接。\n- `ParseAssetGroupID(ctx, id)`：调用 `decodeAssetGroupID` 解析字段，再通过 `getAccountByID` 补齐 `Space`。\n\n`decodeAssetGroupID` 会进行严格校验：长度必须等于 `TotalChars`，前缀必须为 `g`，尾部 padding 必须等于 `assetGroupIDPadding`，`accountID` 和 `dcCode` 必须合法。输入会先 `strings.ToLower`，因此大小写 ID 可解析。\n\n`randomGroupKey` 使用 `crypto/rand` 生成 64-bit 随机数并裁剪到 `MaxGroupKey`，同时拒绝 0。\n\n## Base32 与二进制转换\n\n`base32.go` 提供两组编码能力：\n\n- `EncodeBase32` / `DecodeBase32`：处理完整 25 字节 ID。\n- `EncodeBase32Uint` / `DecodeBase32Uint`：处理固定宽度整数片段，主要用于 AssetGroupID。\n\n`IsValidID` 只检查长度和字符集，不校验字段语义、VDC、密钥版本或 account 存在性。需要字段级校验时应使用 `Parse` 或 `ParseAssetGroupID`。\n\n数据库存储可使用：\n\n- `ParseToBinary(id)`：字符串转 `[TotalBytes]byte`\n- `BinaryToString(data)`：二进制转字符串\n\n## 混淆与密钥管理\n\n`Obfuscator` 对 140-bit 后缀做可逆变换：\n\n```text\n混淆:   C = (P * A + B) mod 2^140\n解混淆: P = ((C - B) * A^-1) mod 2^140\n```\n\n`A` 必须是奇数，才能在模 `2^140` 下存在乘法逆元。`NewDefaultObfuscator` 使用内置默认密钥，`GenerateRandomKey` 可生成随机 `(A, B)`。\n\n`KeyManager` 维护 `keyVersion -> Obfuscator` 的映射。`DefaultKeyManager` 在 `init` 中注册版本 `0`。生成器创建时，如果 `GeneratorConfig.Obfuscator` 为空，会优先从 `DefaultKeyManager` 按 `KeyVersion` 获取；不存在时退回 `NewDefaultObfuscator`。\n\n## VDC 编码约束\n\n`vdc.go` 维护模块内固定的 `vdcList` 快照。编码从 1 开始，0 保留为非法值。\n\n开发时必须遵守一个重要约束：新增 VDC 只能追加到 `vdcList` 末尾，不能重排或删除已有项。否则历史 ID 中的 `dcCode` 会被解释成错误的 VDC。\n\n`VDCToCode` 用于生成路径，`CodeToVDC` 用于解析路径。AssetGroupID 和标准 MDAP ID 都依赖这组映射。\n\n## 与业务层的连接点\n\n`mdap/service` 主要通过以下方式使用本模块：\n\n- `generateAssetGroupID` 调用 `GenerateAssetGroupID` 创建 asset group ID。\n- `CreateArtifact` 和 `CreateSource` 调用 `ParseAssetGroupID` 解析并校验 asset group 的 `Space`、`AccountID`、`GroupKey`、`VDC`。\n- `generateArtifactID` 调用包级 `Generate` 创建 artifact ID。\n- `parseSpaceFromSourceID`、`parseSourceFromQuery`、`resolveStartProcessingInput`、`validateArtifactDeriveID` 调用 `Parse` 反解标准 ID。\n\n因此，本模块不仅是编码工具，还承担了跨服务身份一致性的基础校验：ID 中的 account、space、VDC、GroupKey 会被业务层用于判断请求是否引用了正确的资源归属。\n\n## 开发注意事项\n\n修改位宽、字段顺序、`Base32Charset`、`EpochMs`、`vdcList` 顺序或默认密钥都会影响历史 ID 兼容性，除非明确设计迁移路径，否则不要改动。\n\n新增实体类型或 MIME 类型时，需要同时维护 `types.go` 中的常量、`String` 方法，以及 `charToBits` / `bitsToChar` 可覆盖的字符范围。生成路径依赖 `charToBits[byte(...)]`，解析路径依赖 `bitsToChar[index]`。\n\n测试中可替换包级变量 `getAccountByName`、`getAccountByID`、`getPodName` 来隔离外部依赖。现有测试已经覆盖生成解析闭环、默认解析器、legacy worker/sequence 布局、非零 extension nonce、AssetGroupID malformed 字段拒绝等关键行为。","mdap-assets-and-processing-service":"# MDAP Assets and Processing — service\n\n## 模块职责\n\n`mdap/service` 是 MDAP 资产元数据与处理任务的服务层。它把 Kitex handler 收到的 `mdap` / `compound` 请求转换为底层 Fuxi 元数据操作，并负责：\n\n- 管理 `AssetGroup`、`Source`、`Artifact` 的创建、查询、更新和删除。\n- 统一校验请求参数、ID 合法性、配置格式和内容 payload。\n- 将 Thrift 模型扁平化为 Fuxi `AttrVal`，并从查询结果还原为 `mdap_model` 对象。\n- 支持从历史 `media_digest` schema 查询摘要结果，并转换为 MDAP `Artifact`。\n- 为 Artifact 中的 TOS 路径按需填充下载签名 URL。\n- 启动处理任务，按配置切换 `prodia` 或 `transcode_router` 后端。\n\n核心入口由 `handler/handler.go` 调用，例如 `CreateAssetGroup`、`MGetSources`、`QueryArtifacts`、`StartProcessing` 等。服务层不直接暴露 RPC，它返回统一的 `resp.Resp[*base.BaseResp]` 和业务模型对象。\n\n## 总体结构\n\n```mermaid\nflowchart TD\n    H[Kitex Handler] --> S[mdap/service 入口函数]\n    S --> V[请求校验]\n    S --> C[MDAPConfig]\n    S --> I[mdap/id ID 编解码]\n    S --> F[Fuxi 元数据服务]\n    S --> P[处理任务后端]\n    F --> A[AssetGroup/Source/Artifact schema]\n    P --> PR[prodia]\n    P --> TR[transcode_router]\n```\n\n模块文件分工如下：\n\n- `mdap.go`：资产组、源、产物 CRUD，属性构建与解析，digest 兼容查询，签名 URL 填充。\n- `mdap_validator.go`：请求参数与模型 payload 校验。\n- `parser.go`：Fuxi 查询结果解析、基础类型转换、数组属性辅助函数。\n- `start_processing.go`：`StartProcessing` 主流程、输入归一化、操作归一化、执行计划构建。\n- `start_processing_auth.go`：prodia 后端启动权限校验。\n- `start_processing_prodia.go`：构建并提交 prodia workflow。\n- `start_processing_transcode_router.go`：构建并提交 transcode_router HTTP 请求。\n\n## 配置加载\n\n`getMDAPConfig` 使用 `sync.Once` 缓存 `config.MDAPConfig`：\n\n```go\nfunc getMDAPConfig() *config.MDAPConfig {\n    mdapConfigOnce.Do(initMDAPConfig)\n    return mdapConfig\n}\n```\n\n`initMDAPConfig` 从 `conf.GetWithYAML[config.MDAPConfig](ctx, config.MDAP)` 读取配置。读取失败时：\n\n- 如果不是 `conf.IsNotFound(err)`，会打印日志。\n- 最终回退为空的 `config.MDAPConfig{}`，避免 nil 配置导致服务层 panic。\n\n该配置用于获取 schema、ArtifactType 到 digest schema 的映射、处理后端类型、prodia 参数、transcode_router 参数和 fallback task list。\n\n## 元数据存储模型\n\n本模块使用 Fuxi 的属性式存储。业务模型会被转换成 `[]*compound.AttrVal`，属性名使用 JSONPath 风格：\n\n```go\n&compound.AttrVal{Name: \"$.name\", Val: assetGroup.Name}\n&compound.AttrVal{Name: \"$.source_configs[0].locations[0].path\", Val: loc.Path}\n```\n\n数组字段使用显式下标展开。读取时再通过 `fmt.Sscanf` 和 map 按下标重建顺序。\n\n公共辅助函数：\n\n- `appendAttr`：追加单个属性。\n- `appendIndexedStringValues`：写入 `$.tags[0]`、`$.tags[1]` 这类字符串数组。\n- `parseOrderedQueryResults`：保持 Fuxi 返回顺序，将 `[][][]*compound.AttrVal` 转为 `[]queryResult`。\n- `parseQueryResults`：在 `MGet` 场景下转为 `map[id]attrs`。\n- `orderedStrings` / `orderedInts`：按下标恢复数组。\n\n需要注意，`orderedStrings` 和 `orderedInts` 按 `len(map)` 构造结果，如果中间下标缺失，会留下对应类型零值。\n\n## AssetGroup 流程\n\n`AssetGroup` 是 MDAP 的资产集合边界，也是后续 `Source` 和 `Artifact` 归属校验的基础。\n\n### 创建\n\n`CreateAssetGroup` 的执行顺序：\n\n1. `ValidateCreateAssetGroupRequest` 校验 `Space`、`Name`、`SourceConfigs`、`MediaTypes`、`Creator` 和 `ArtifactConfig`。\n2. `generateAssetGroupID` 调用 `mdapid.GenerateAssetGroupID`，ID 内编码 `space`。\n3. 构造 `mdap_model.AssetGroup`，初始化 `SourceCount`、`Size`、`CreateTime`、`UpdateTime`。\n4. `buildAssetGroupAttrs` 扁平化字段。\n5. 调用 `fuxi_s.SetAttr` 写入 `cfg.GetAssetGroupSchema()`。\n\n写入时 `SetAttrReq` 带有 `Space` 和 `Where` 的 `$.space == assetGroup.Space` 过滤，避免跨 space 写入。\n\n### 查询与解析\n\n`MGetAssetGroups` 会从第一个 ID 调用 `parseSpaceFromAssetGroupID` 得到 space，再通过 `buildAssetGroupWhereClause` 构造带 `Ids` 和 `$.space` filter 的查询条件。\n\n`QueryAssetGroups` 支持按以下条件组合查询：\n\n- `Space`\n- `Name`\n- `MediaTypes`\n\n`buildQueryAssetGroupsWhereClause` 使用 `AND` 合并条件，并按 `$.create_time` 倒序排序。查询完成后还会调用 `fuxi_s.Count` 返回总数。\n\n`parseAssetGroupFromQuery` 负责从属性 map 还原：\n\n- 基础字段：`Space`、`Name`、`Creator`、`SourceCount`、`Size`、时间戳。\n- `MediaTypes`\n- `SourceConfigs`\n- `ArtifactConfig.StoreLocations`\n- `ArtifactConfig.JobExecution`\n\n`ArtifactConfig` 会默认初始化为非 nil，且 `StoreLocations` 初始化为空切片。\n\n### 更新与删除\n\n`UpdateAssetGroup` 使用 `buildUpdateAttrs` 只写入请求中显式设置的字段，并总是更新 `$.update_time`。支持更新：\n\n- `Name`\n- `Description`\n- `SourceCount`\n- `Size`\n- `ArtifactConfig`\n- `SourceConfigs`\n\n`DeleteAssetGroup` 解析 ID 中的 space，构造 `compound.DelReq`，调用 `fuxi_s.Del` 删除对应 schema 下的数据。\n\n## Source 流程\n\n`Source` 表示某个资产组下的输入媒体源。Source ID 使用 `mdapid.Generate` 生成，包含 entity type、space、group key、VDC 和 MIME 顶层类型。\n\n### 创建\n\n`CreateSource` 的关键步骤：\n\n1. `ValidateCreateSourceRequest` 校验 `AssetGroupID`、`BizID`、`MediaType`、`Format`、`Config`、`Meta`。\n2. `mdapid.ParseAssetGroupID` 从 `AssetGroupID` 解析 `Space` 和 `GroupKey`。\n3. `generateSourceID` 将 `MediaType` 转成 `mdapid.MIMEType`，不支持的顶层 MIME 会返回错误。\n4. 构造 `mdap_model.Source`，写入 `cfg.GetSourceSchema()`。\n\n`buildSourceAttrs` 会持久化：\n\n- `$.biz_id`\n- `$.asset_group_id`\n- `$.name`\n- `$.media_type`\n- `$.format`\n- 可选 `$.asset_id`\n- `$.config.*`\n- `$.meta`\n- `$.tags[i]`\n- `$.created_time` / `$.updated_time`\n\n### 查询与一致性校验\n\n`MGetSources` 通过 Source ID 解析 space，再按 `Ids` 查询 `cfg.GetSourceSchema()`。\n\n`QuerySources` 必须传 `AssetGroupID`，可选 `BizID`。其中 `buildSourceQueryWhereClause` 固定包含：\n\n```go\n$.asset_group_id == req.GetAssetGroupID()\n```\n\n当 `BizID` 为空时，`QuerySources` 会额外调用 `fuxi_s.Count` 返回总数；当按 `BizID` 精确过滤时，总数返回 `nil`。\n\n`parseSourceFromQuery` 除了恢复字段，还会做重要一致性检查：\n\n- 持久化属性必须包含 `$.asset_group_id`。\n- Source ID 解析出的 `GroupKey`、`AccountID` 必须与持久化 `AssetGroupID` 一致。\n- 允许 VDC 不同，但不允许资产组身份不匹配。\n\n这可以防止错误迁移或手工写入导致 Source 跨资产组串联。\n\n### 更新\n\n`UpdateSource` 使用 `buildUpdateSourceAttrs` 更新显式设置字段，并总是写入 `$.updated_time`。如果同时设置了 `Config` 和 `FetchStatus`，`FetchStatus` 以请求顶层的 `FetchStatus` 为准，避免被 `Config.FetchStatus` 覆盖。\n\n## Artifact 流程\n\n`Artifact` 表示源或产物派生出的处理结果。它既支持写入 MDAP 自有 `Artifact` schema，也支持从历史 digest schema 查询并转换。\n\n### 创建\n\n`CreateArtifact` 的执行顺序：\n\n1. `ValidateCreateArtifactRequest` 校验 `DeriveID`、`Name`、`AssetGroupID`、`DeriveType` 和 `Contents`。\n2. `mdapid.ParseAssetGroupID` 解析资产组身份。\n3. `validateArtifactDeriveID` 校验 `DeriveID`：\n   - `DeriveType_Source` 要求 `DeriveID` 是 Source ID。\n   - `DeriveType_Artifact` 要求 `DeriveID` 是 Artifact ID。\n   - `AccountID` 和 `GroupKey` 必须属于同一个 `AssetGroupID`。\n4. `generateArtifactID` 根据首个 content 的类型选择 MIME 类型并生成 ID。\n5. `calculateArtifactSize` 计算总大小。\n6. `buildArtifactAttrs` 扁平化后写入 `cfg.GetArtifactSchema()`。\n\n`calculateArtifactSize` 的规则：\n\n- 如果 `ArtifactContent.Blobs` 非空，直接累加每个 `ArtifactBlob.Size`。\n- 否则解析 `ArtifactContent.Contents` 中的 JSON payload：\n  - `ArtifactType_Snapshots`：解析为 `ArtifactSnapshots`，累加 snapshots 和 sprites meta size。\n  - `ArtifactType_Audio`：解析为 `ArtifactAudio`，使用 `AudioMeta.Size`。\n  - `ArtifactType_Image`：解析为 `ArtifactImage`，使用 `ImageMeta.Size`。\n\n### 内容持久化格式\n\n`buildArtifactAttrs` 会将 `ArtifactContent.Contents` 的二进制 payload 使用 base64 存储：\n\n```go\nattrs = appendAttr(attrs,\n    fmt.Sprintf(\"$.contents[%d].contents[%d]\", i, j),\n    base64.StdEncoding.EncodeToString(payload),\n)\n```\n\n读取时 `parseArtifactFromQuery` 使用 `base64.StdEncoding.DecodeString` 还原。Blob 信息则按：\n\n- `$.contents[i].blobs[j].location.type`\n- `$.contents[i].blobs[j].location.path`\n- `$.contents[i].blobs[j].size`\n- `$.contents[i].blobs[j].content_type`\n\n进行展开和重建。\n\n## Artifact 查询的两种形态\n\n`QueryArtifacts` 支持两类查询入口，参数互斥。\n\n### 按 `AssetGroupID` 查询 MDAP Artifact schema\n\n当 `req.GetAssetGroupID() != \"\"` 时，`QueryArtifacts` 走 `queryArtifactsByAssetGroupID`：\n\n1. 从 `AssetGroupID` 解析 space。\n2. 可选执行 `fuxi_s.AuthorizeGetFileURLAccess`。\n3. 按 `$.asset_group_id == req.GetAssetGroupID()` 查询 `cfg.GetArtifactSchema()`。\n4. 按 `$.created_time` 倒序排序。\n5. 调用 `fuxi_s.Count` 返回总数。\n6. 如 `WithSignedURLs` 为 true，调用 `populateArtifactDownloadURLs` 填充下载地址。\n\n该模式不允许同时设置 `DeriveType`、`DeriveIDs`、`SourceBizIDs`、`Types`、`Name`、`Space`。\n\n### 按 `SourceBizIDs + Types + Name + Space` 查询 digest schema\n\n当未设置 `AssetGroupID` 时，`ValidateQueryArtifactsRequest` 要求：\n\n- `Space` 必填。\n- `SourceBizIDs` 非空。\n- `Types` 长度必须为 1。\n- `Name` 必填。\n- 当前不支持 `DeriveType` 和 `DeriveIDs`。\n\n查询流程：\n\n1. 通过 `cfg.GetArtifactTypeConfig(typeName)` 找到对应 digest schema 与 `DigestType`。\n2. 对每个 `SourceBizID` 构造查询 ID：\n\n   ```go\n   buildArtifactID(sourceBizID, typeCfg.DigestType, req.GetName())\n   ```\n\n   ID 格式为 `{biz_id}/{DigestType}/{DigestName}`。\n\n3. 查询配置中的 digest schema。\n4. `convertQueryToArtifact` 将 digest 结果转换为 `mdap_model.Artifact`。\n\n`MGetArtifacts` 也支持这种 `{biz_id}/{DigestType}/{DigestName}` 形式的查询 ID，但这种 ID 本身不编码 space，因此请求必须显式传 `Space`。\n\n## digest schema 到 Artifact 的转换\n\n历史 digest schema 查询结果先由 `parseMediaDigestFromQuery` 转为 `dto.MediaDigest`。字段映射包括：\n\n- `$.meta_data` → `MediaDigest.Metadata`\n- `$.user_data` → `MediaDigest.UserData`\n- `$.idemp_key` → `MediaDigest.IdempKey`\n- `$.object_list[i].uri/size` → `MediaDigest.ObjectList`\n- `$.drts_object_list[i]` → `MediaDigest.DRTSObjectList`\n- `$.drts_object_expire_at` → `MediaDigest.DRTSObjectExpireAt`\n- `$.created_at` → `MediaDigest.CreatedAt`\n\n随后 `convertMediaDigestToArtifact` 使用 `mediaDigest.ToDigestInfo(digestType)` 得到 `dto.DigestInfo`，再由 `convertDigestInfoToContent` 转换为具体 payload：\n\n- `SnapshotDigest` → `convertSnapshotDigestToArtifactSnapshots` → `mdap_model.ArtifactSnapshots`\n- `AudioTrackDigest` → `convertAudioTrackDigestToArtifactAudio` → `mdap_model.ArtifactAudio`\n\n如果转换得到的实际 `ArtifactType` 与请求配置的类型不一致，会返回错误。\n\n`MediaDigest.ObjectList` 会通过 `convertMediaDigestObjectsToArtifactBlobs` 转为 `ArtifactBlob`，默认 `StoreType` 为 `mdap_model.StoreType_TOS`。\n\n## 签名 URL 填充\n\n`MGetArtifacts` 和 `QueryArtifacts` 都支持 `WithSignedURLs`。参数校验阶段会调用 `fuxi_s.ValidateSignedURLRequest`，执行前会调用 `fuxi_s.AuthorizeGetFileURLAccess`。\n\n真正填充由 `populateArtifactDownloadURLs` 完成：\n\n- 对 `ArtifactContent.Blobs`，调用 `populateArtifactBlobDownloadURLs`。\n- 对 `ArtifactContent.Contents` 中的 JSON payload：\n  - `ArtifactType_Snapshots`：反序列化 `ArtifactSnapshots`，填充 snapshots 和 sprites 的 `Location.DownloadURL`，再序列化回 payload。\n  - `ArtifactType_Audio`：填充 `ArtifactAudio.Location.DownloadURL`。\n  - `ArtifactType_Image`：填充 `ArtifactImage.Location.DownloadURL`。\n\n底层统一使用：\n\n```go\nfuxi_s.GetFileURL(ctx, &compound.UriInfo{Uri: location.GetPath()}, urlParam, provider)\n```\n\n其中 `provider` 实际传入的是 space。\n\n## 参数校验策略\n\n`mdap_validator.go` 将校验集中在 `Validate*Request` 函数中。服务入口通常第一步调用对应校验函数，失败时直接返回 `mdap_resp.InvalidParam` 或其他业务错误。\n\n重要校验点：\n\n- `ValidateCreateAssetGroupRequest`：要求 `Space`、`Name`、`SourceConfigs`、`MediaTypes`、`Creator`。\n- `validateStoreLocationsUnique`：同一组 `StoreLocation` 中每种 `StoreType` 只能出现一次。\n- `validateSourceConfigConfig`：按 `SourceConfig.Type` 校验 `Config` JSON：\n  - `SourceType_VDA` → `SourceConfigVDA`，要求 `VodSpace`。\n  - `SourceType_TOS` → `SourceConfigTOS`，要求 `Bucket`。\n  - `SourceType_URL` → `SourceConfigURL`。\n  - `SourceType_MessEngine`、`SourceType_HDFS` 暂无额外结构校验。\n- `validateSourceMeta`：按 `MediaType` 校验 `Meta` 可反序列化为 `VideoMeta`、`ImageMeta`、`AudioMeta` 或 `TextMeta`。\n- `validateArtifactContentPayload`：按 `ArtifactType` 校验 content payload 可反序列化。\n- `validateArtifactBlobs`：要求 blob、location、location path 存在，且 size 非负。\n\n一个实现细节是 `ValidateUpdateSourceRequest` 只有在同时设置 `Meta` 和 `MediaType` 时才校验 meta 类型；只更新 `Meta` 而不更新 `MediaType` 时，不会读取已有 Source 来判断类型。\n\n## StartProcessing 主流程\n\n`StartProcessing` 是处理任务启动入口，接收 `compound.StartProcessingRequest`，按配置选择 `prodia` 或 `transcode_router`。\n\n```mermaid\nflowchart TD\n    A[StartProcessing] --> B[校验 Auth 和后端类型]\n    B --> C[buildStartProcessingPlan]\n    C --> D[归一化输入]\n    C --> E[归一化操作]\n    C --> F[解析 space 和 taskListID]\n    F --> G{后端}\n    G --> H[startProcessingWithProdia]\n    G --> I[startProcessingWithTranscodeRouter]\n```\n\n### 输入归一化\n\n`normalizeStartProcessingInputs` 要求 `Input` 和 `MultiInput` 必须二选一：\n\n- `Input`：单输入模式。\n- `MultiInput`：多输入模式，不能为空。\n\n每个输入由 `resolveStartProcessingInput` 解析，优先级为：\n\n1. `SourceID`\n   - 不能同时设置 `AssetID`、`VID`、`AssetGroupID`。\n   - 使用 `MGetSources` 查询 Source，取 `Source.AssetGroupID` 和 `Source.BizID`。\n2. `AssetID`\n   - 当前不支持，直接返回 `InvalidParam`。\n3. `VID + AssetGroupID`\n   - 两者必须同时设置。\n   - 会调用 `CreateSource` 自动创建一个 video/mp4 Source。\n4. 其他情况返回错误。\n\n多输入时所有输入必须属于同一个 `AssetGroupID`。\n\n### 操作归一化\n\n`normalizeStartProcessingOperations` 支持两种模式：\n\n- 顶层 `OperatorId`、`TemplateId`、`UserData`：单操作。\n- `MultiOperation`：多操作，不能和顶层操作字段混用。\n\n`normalizeStartProcessingOperation` 会做两件事：\n\n- `validateStartProcessingOperatorID` 校验 `OperatorId` 必须是 `cfg.ArtifactTypes[*].DigestType` 中配置过的值。\n- `cfg.GetDigestTaskParamsByTemplateID(templateID)` 获取 `DigestTaskParams`，为空则返回内部错误。\n\n归一化后的 `startProcessingCVDOperation` 会设置 `force: true`。\n\n### 执行计划\n\n`buildStartProcessingPlan` 汇总输入和操作后：\n\n1. 从 `AssetGroupID` 解析 `space`。\n2. 调用 `getTaskListIDForTranscodeRouter` 从 `AssetGroup.ArtifactConfig.JobExecution` 中选择 task list。\n3. 如果资产组未配置可用 task list，使用 `cfg.GetTranscodeRouterFallbackTaskListID()`。\n4. 收集所有 `vids`。\n\n`getTaskListIDForTranscodeRouter` 优先选择 `JobExecution.Type == operatorID` 的 `JobExecution.ID`；找不到时使用第一个非空 `JobExecution.ID`。\n\n## prodia 后端\n\n当 `cfg.GetProcessingBackendType()` 为 `prodia` 时，`StartProcessing` 会先执行 `authorizeStartProcessing`：\n\n- 使用 `getStartProcessingAuthClient` 获取 `mdap_auth` client。\n- `ExtractPrincipal` 解析 auth。\n- `CheckPermission` 检查 `mdap.tenant.start_task` 对当前 space 的权限。\n\n`startProcessingWithProdia` 构建 prodia workflow：\n\n1. `buildProdiaCallbackURI` 从配置生成 `{type}:{cluster}:{topic}`。\n2. `buildProdiaCallbackArgs` 将 MDAP 内部 callback 参数和用户 callback 参数封装在一起。\n3. `buildRunMedigestTaskRequest` 生成 `medigest.RunMedigestTaskRequest`。\n4. `startProdiaWorkflow` 将 protobuf payload 发送给 prodia SDK。\n\n`buildRunMedigestTaskRequest` 根据 plan 自动选择：\n\n- 单输入：设置 `RunMedigestTaskRequest.Input`。\n- 多输入：设置 `RunMedigestTaskRequest.MultiInput`。\n- 单操作：`TaskType` 为 `CVD`，设置 `Operation.CVD`。\n- 多操作：`TaskType` 为 `MultiCVD`，设置 `Operation.MultiCVD`。\n\nprodia client 由 `getProdiaWorkflowClient` 按 `idc + cluster + secret` 缓存，避免重复创建。\n\n## transcode_router 后端\n\n当后端为 `transcode_router` 时，只支持单输入和单操作。`StartProcessing` 会在 plan 构建后校验：\n\n```go\nif backend == \"transcode_router\" && (len(plan.inputs) != 1 || len(plan.cvdOps) != 1) {\n    return mdap_resp.InvalidParam.WithMsgF(\"transcode_router backend does not support MultiInput or MultiOperation\"), \"\"\n}\n```\n\n`startProcessingWithTranscodeRouter` 构建 HTTP JSON payload：\n\n- `Input.Type = \"Vid\"`\n- `Input.Vid = plan.inputs[0].vid`\n- `Upload.Type = \"Mdap\"`\n- `Upload.Mdap.Space = plan.space`\n- `Control.TaskListId = plan.taskListID`\n- `Operation.Task.Type = \"CVD\"`\n- `Operation.Task.CVD` 填入 digest 参数\n\n`getTranscodeRouterTtEnv` 会按顺序读取环境：\n\n1. `req.Params.Env[\"X-Tt-Env\"]`\n2. `req.Params.Env[\"x-tt-env\"]`\n3. `req.Base.TrafficEnv.Env`，且要求 `TrafficEnv.Open == true`\n\n`startTranscodeRouterExecution` 使用 Hertz client 发送请求：\n\n- 设置 `Content-Type: application/json`\n- 如果有 tt env，设置 `X-Tt-Env`\n- 如果有 auth，设置 `X-Jwt-Token`\n- 如果 `withSD` 为 true，设置服务发现选项和目标集群\n- 如果调用方 context 没有 deadline，默认加 10 秒超时\n\n响应要求 HTTP 2xx，并从 `response.RunId` 或 `response.RunID` 中取 run id。\n\n## 与外部模块的连接\n\n本模块主要依赖以下外部能力：\n\n- `fuxi/core/service`\n  - `SetAttr`：创建或更新元数据。\n  - `Query`：查询元数据。\n  - `Count`：统计分页总数。\n  - `Del`：删除元数据。\n  - `GetFileURL`、`AuthorizeGetFileURLAccess`、`ValidateSignedURLRequest`：签名 URL 能力。\n- `mdap/id`\n  - `GenerateAssetGroupID`、`ParseAssetGroupID`\n  - `Generate`、`Parse`\n  - `MIMETopLevelToChar`\n- `fuxi/core/config`\n  - `MDAPConfig` 提供 schema、ArtifactTypes、处理后端和回调配置。\n- `videoarch/azeroth/v2/dto`\n  - `MediaDigest.ToDigestInfo` 用于兼容 digest schema 查询。\n- `videoarch/prodia-sdk-go`\n  - prodia workflow 启动。\n- `middleware/hertz/byted`\n  - transcode_router HTTP 调用。\n- `mdap/auth` 与 `videoarch/mdap_auth`\n  - prodia 启动权限校验。\n\n## 贡献时需要注意的约束\n\n新增字段时，需要同时维护写入和读取逻辑：\n\n- 创建路径：`buildAssetGroupAttrs`、`buildSourceAttrs` 或 `buildArtifactAttrs`。\n- 更新路径：对应 `buildUpdate*Attrs`。\n- 解析路径：`parseAssetGroupFromQuery`、`parseSourceFromQuery` 或 `parseArtifactFromQuery`。\n- 校验路径：必要时补充 `Validate*Request` 或内部 `validate*` 函数。\n\n新增 `ArtifactType` 时，至少需要检查：\n\n- `artifactMIMEType`\n- `artifactPayloadSize`\n- `validateArtifactContentPayload`\n- `populateArtifactDownloadURLs`\n- `convertDigestInfoToContent`，如果该类型需要从 digest schema 转换\n- `config.MDAPConfig.ArtifactTypes` 中对应类型名、`DigestType` 和 schema 配置\n\n修改 `StartProcessing` 时，需要分别考虑 `prodia` 和 `transcode_router` 的能力差异。当前 `prodia` 支持多输入和多操作，`transcode_router` 明确只支持单输入和单操作。","mdap-assets-and-processing":"# MDAP Assets and Processing\n\n# MDAP Assets and Processing\n\n## 模块概览\n\n`mdap` 资产与处理模块围绕 MDAP 资源生命周期组织：先通过 [id](id.md) 生成和解析稳定资源标识，再由 [service](service.md) 完成 AssetGroup、Source、Artifact 的元数据管理与处理任务调度；[auth](auth.md) 提供进程内复用的 MDAP 鉴权客户端，作为后续访问受保护 MDAP 能力的基础设施。\n\n三个子模块的分工是：\n\n- [auth](auth.md)：通过 `GetMDAPAuthClient` 懒加载并缓存默认 MDAP 鉴权客户端。\n- [id](id.md)：负责 `Generate`、`Parse`、`GenerateAssetGroupID`、`ParseAssetGroupID` 等 ID 编解码能力。\n- [service](service.md)：承接 Kitex handler 请求，完成校验、ID 使用、Fuxi 元数据读写、摘要兼容转换和处理任务启动。\n\n## 协作关系\n\n```mermaid\nflowchart TD\n    H[Kitex Handler] --> S[service 服务层]\n    S --> I[id 资源标识]\n    S --> F[Fuxi 元数据]\n    S --> P[处理后端]\n    S --> A[auth 鉴权客户端]\n\n    I --> AG[AssetGroupID 生成与解析]\n    I --> RID[Source 和 Artifact ID 生成与解析]\n    P --> PR[prodia]\n    P --> TR[transcode_router]\n```\n\n`service` 是模块组的业务编排中心。它不会直接实现 ID 位布局或鉴权客户端初始化，而是依赖 `id` 和 `auth` 提供的基础能力，把这些能力组合进资产创建、查询和处理任务启动流程中。\n\n## 关键跨模块流程\n\n创建资产组时，`CreateAssetGroup` 使用 [id](id.md) 中的 `GenerateAssetGroupID` / `BuildAssetGroupID` 生成带空间信息的 AssetGroupID，再将 AssetGroup 属性写入 Fuxi 元数据服务。\n\n创建 Source 或 Artifact 时，`CreateSource`、`CreateArtifact` 会先通过 `ParseAssetGroupID` 校验资源归属，再调用标准 ID 生成能力为 Source / Artifact 创建 40 字符 MDAP ID。后续查询、反解或校验资源字段时，`Parse` 会恢复账号、VDC、GroupKey 等编码字段。\n\n查询链路由 [service](service.md) 统一封装。`MGetAssetGroups`、`MGetSources`、`QueryArtifacts` 等入口把请求条件转换为 Fuxi 查询，并通过 parser 将查询结果还原为 `mdap_model` 对象；其中 `QueryArtifacts` 还会按 AssetGroupID 解析空间，并兼容历史 `media_digest` schema 的摘要数据。\n\n处理链路从 `StartProcessing` 进入。`service` 先解析 AssetGroupID、归一化 operation、构造处理计划，再根据 `MDAPConfig` 选择 `startProcessingWithProdia` 或 `startProcessingWithTranscodeRouter`，分别对接 `prodia` workflow 或 `transcode_router` 任务接口。\n\n## 阅读建议\n\n如果只关心业务入口和数据流，优先阅读 [service](service.md)。如果需要理解 MDAP ID 的稳定性、字段布局或 AssetGroupID 兼容规则，阅读 [id](id.md)。鉴权客户端的初始化和复用逻辑集中在 [auth](auth.md)。","other-agents-md":"# Other — AGENTS.md\n\n## AGENTS.md 协作入口\n\n`AGENTS.md` 是仓库根目录下的 Agent 协作入口文件。它不定义具体工程规则，而是把 Codex、Claude 或其他 AI agent 路由到项目内的权威规则文件。\n\n该模块没有函数、类、运行时调用或执行流；它的作用是文档级配置索引，通过文件约定影响开发、测试、提交和文档写作流程。\n\n## 核心职责\n\n| 区域 | 作用 |\n|---|---|\n| `三个权威源` | 明确仓库级规则的来源和职责边界 |\n| `全局规则` | 说明项目规则与用户级 Claude 规则之间的优先级关系 |\n| `写文档前` | 要求所有 `docs/` 写入动作必须由 `doc-init` skill 主导 |\n| `测试 / Commit / idx 包变更` | 将测试策略、提交规范、`idx` 包约束统一指向 `CLAUDE.md` |\n\n## 权威源分工\n\n`AGENTS.md` 将项目规则拆分到三个文件中：\n\n- [`CLAUDE.md`](./CLAUDE.md)：Agent 协作主配置，包含 commit 规范、测试执行策略、`idx` 包专项约束，以及文档规约入口。\n- [`docs/AGENTS.md`](./docs/AGENTS.md)：项目级文档规约，承接 `doc-init` 体系在本仓库中的扩展规则。\n- [`docs/overview/constitution.md`](./docs/overview/constitution.md)：项目级红线，由架构组维护，用于约束不能突破的架构和工程边界。\n\n这种结构避免把所有规则集中堆叠在根目录入口文件中。根目录 `AGENTS.md` 只负责定位和分流，具体规则由各自领域的文件维护。\n\n## 规则解析流程\n\n```mermaid\nflowchart TD\n    A[Agent 读取根目录 AGENTS.md] --> B[识别三个权威源]\n    B --> C[CLAUDE.md]\n    B --> D[docs/AGENTS.md]\n    B --> E[docs/overview/constitution.md]\n    C --> F[测试、提交、idx 约束]\n    D --> G[docs 写作规约]\n    E --> H[项目红线]\n    A --> I[读取全局 Claude 规则]\n    I --> J[按 Rules 触发索引补充规则]\n```\n\n## 与全局规则的关系\n\n跨项目通用规则位于：\n\n- `~/.claude/CLAUDE.md`\n- `~/.claude/rules/*.md`\n- `~/.claude/skills/`\n\n本仓库的项目级规则以 `AGENTS.md` 指向的三个权威源为准。当项目规则与全局规则冲突时，需要按照 `~/.claude/CLAUDE.md` 中的「Rules 触发索引」读取对应规则，并结合本仓库权威源判断适用优先级。\n\n## 文档写作约束\n\n任何对 `docs/` 目录的写动作都不能直接开始编辑，必须先由 `doc-init` skill 主导：\n\n```text\n/doc-init\n```\n\n实际规约入口是 [`docs/AGENTS.md`](./docs/AGENTS.md)。开发者或 Agent 在修改 `docs/` 内容前，应先读取该文件，确认当前文档属于哪个文档体系、是否需要初始化、是否需要遵守特定模板或元数据要求。\n\n## 测试、提交与 idx 包变更\n\n`AGENTS.md` 不直接展开测试命令、commit 格式或 `idx` 包限制，而是统一指向 [`CLAUDE.md`](./CLAUDE.md)。\n\n涉及以下操作时，应先读取 `CLAUDE.md` 对应段落：\n\n- 运行或选择测试命令\n- 编写 commit message\n- 修改 `idx` 相关包\n- 判断 Agent 协作流程中的默认行为\n\n## 维护原则\n\n修改 `AGENTS.md` 时应保持它的入口定位，不应把具体规则直接写入此文件。适合放在这里的内容是：\n\n- 新增或调整权威规则文件的入口链接\n- 更新各权威源的职责说明\n- 调整全局规则与项目规则的查找方式\n- 明确某类操作应跳转到哪个规则文件\n\n不适合放在这里的内容是：\n\n- 具体测试命令\n- 详细 commit message 模板\n- 文档模板正文\n- 架构红线细则\n- 某个包或模块的实现约束\n\n这些内容应继续维护在 `CLAUDE.md`、`docs/AGENTS.md` 或 `docs/overview/constitution.md` 中。","other-api":"# Other — api\n\n## 模块定位\n\n`docs/api` 是 Compound 的接口契约文档入口，覆盖两类接口：\n\n- Thrift RPC：以 `idl/compound.thrift` 为权威源，服务实现入口是 `handler/handler.go` 中的 `CompoundServiceImpl`。\n- Admin HTTP：以 `fuxi/fuxi_admin/router.go` 的路由和 `fuxi/fuxi_admin/adminapi/types.go` 的 JSON 结构为权威源。\n\n该模块本身不承载运行时代码，因此没有内部调用图；它的价值是把 IDL、handler、Admin 路由和错误码整理成开发者可读的接口说明，帮助接入方、排障人员和维护者理解 Compound 暴露了什么能力、请求响应契约是什么、实现入口在哪里。\n\n## 文档组成\n\n`docs/api/README.md` 是导航页，说明 API 文档覆盖范围、权威源和读者入口。\n\n`docs/api/api-reference.md` 是完整参考文档，当前包含：\n\n- `CompoundService` 的 11 个 RPC 方法\n- 核心 Thrift 枚举与结构体\n- `SetAttr`、`CopyAttr`、`DelAttr`、`Query`、`Del`、`Count`、`TTL` 的请求、响应和业务语义\n- `UpdateIdxWithEventForInternal`、`RefreshIdxForInternal`、`RepairIdxEntryForInternal`、`RepairIdxBucketForInternal` 4 个内部 GSI 接口\n- Admin HTTP 的 Schema Definition、Schema Binding、Configuration Management 和 Legacy Schema API 路由\n- RPC 与 Admin HTTP 的错误码和响应包装约定\n- 外部 IDL 依赖，包括 `video_data_access.thrift` 和 `abase.thrift`\n\n## 权威源关系\n\n```mermaid\nflowchart TD\n    A[\"idl/compound.thrift<br/>RPC 契约\"] --> B[\"handler/handler.go<br/>CompoundServiceImpl\"]\n    C[\"fuxi/fuxi_admin/router.go<br/>HTTP 路由\"] --> D[\"adminapi/types.go<br/>JSON 契约\"]\n    A --> E[\"docs/api/api-reference.md<br/>接口参考\"]\n    C --> E\n    D --> E\n    E --> F[\"业务接入、排障、运维修复\"]\n```\n\n维护本文档时需要遵守一个原则：文档不能成为新的事实来源。字段编号、字段名、required/optional、枚举值、JSON tag、路由路径和错误码都必须回到代码核对。\n\n## RPC 接口边界\n\nRPC 契约由 `idl/compound.thrift` 中的 `CompoundService` 定义。文档按接口使用场景组织，而不是按源码文件顺序展开。\n\n对外核心接口包括：\n\n- `SetAttr`：创建或更新对象属性。\n- `CopyAttr`：同 Schema 内复制对象属性，最终通过 `SetAttr` 完成写入。\n- `DelAttr`：删除对象属性。\n- `Query`：按 ID 或表达式查询对象，返回列式结构。\n- `Del`：删除对象，支持单对象和基于 `Where` 的批量删除。\n- `Count`：按条件计数，可在满足条件时命中 GSI posting collection。\n- `TTL`：内部过期处理接口。\n\n内部 GSI 接口包括：\n\n- `UpdateIdxWithEventForInternal`：消费变更事件并维护索引。\n- `RefreshIdxForInternal`：基于主表当前快照刷新对象索引。\n- `RepairIdxEntryForInternal`：修复离线对账发现的 GSI entry 异常。\n- `RepairIdxBucketForInternal`：清理事务模式下的空封口桶。\n\n这些接口的实现入口都在 `handler/handler.go`，文档中每个内部接口都会继续指向实际 service 层方法，例如 `HandleEvent`、`Refresh`、`RepairIdxEntry`、`RepairIdxBucket`。\n\n## 核心数据模型\n\n`api-reference.md` 中的核心结构体来自 `idl/compound.thrift`，包括：\n\n- `Version`：记录对象更新前后的版本号。\n- `Created`、`Updated`、`Deleted`：描述属性级变更。\n- `Event`：描述一次对象变更事件，是 MQ、GSI 更新和内部修复链路的重要输入。\n- `WhereClause`、`Expression`、`LeafCondition`：表达查询和写入条件。\n- `OrderByClause`：表达排序。\n- `AttrVal`、`AttrMeta`、`ChangedAttr`：表达属性值、列元数据和变更结果。\n\n其中 `Event.Syncs` 和 `Event.IdxSnapshot` 是 GSI 链路的重要字段。`Syncs` 由生产端预判本次事件命中的内部订阅系统，当前主要用于 `GSI` 分流；`IdxSnapshot` 用于补全索引列当前值，减少消费端回源主表的需要。\n\n## 写入接口语义\n\n`SetAttrReq` 是写入链路最关键的请求结构。它包含：\n\n- `Schema`、`ID`、`Space`、`SchemaVersion`：定位对象和 Schema。\n- `Values`：要设置的属性列表。\n- `Where`：业务乐观锁条件。\n- `WriteMode`：写模式，默认为 `WriteMode.Upsert`。\n- `Extra`、`Base`：扩展信息和基础请求上下文。\n\n`WriteMode.InsertOnly` 是一个需要特别注意的契约：对象已存在时返回 `AlreadyExists`，不修改主表、不产生 MQ 事件、不触发 idx 更新。对象不存在时行为与 `Upsert` 一致。\n\n`Where.Filter` 用于写入前的业务乐观锁预判。文档明确它是 fail-fast 机制：Filter 不匹配时返回 `InternalError`，避免进入事件构造、唯一索引处理和主表写入等更重路径。\n\n## 查询接口语义\n\n`Query` 的响应不是对象数组，而是列式结构：\n\n```thrift\nstruct QueryResp {\n    1: required list<AttrMeta>                 AttrMetas,\n    2: required list<list<list<AttrVal>>>      AttrVals,\n    255: required base.BaseResp BaseResp,\n}\n```\n\n阅读或维护文档时要保留这个结构说明：`AttrMetas[i]` 描述第 `i` 列，`AttrVals[obj][i]` 是第 `obj` 个对象在第 `i` 列上的所有值。数组属性可能返回多个 `AttrVal`，所以是三层列表。\n\n查询条件通过 `WhereClause` 表达：\n\n- `Ids`：按对象 ID 列表查询。\n- `Filter`：按递归表达式树查询。\n\n表达式树由 `Expression`、`LeafCondition`、`LogicType` 和 `Operator` 组成，操作符包括 `EQ`、`NEQ`、`GT`、`LT`、`GTE`、`LTE`、`IN`、`NOT_IN`。\n\n## GSI 内部接口\n\nGSI 相关 RPC 是内部接口，不面向普通业务接入方，但对排障和一致性修复很重要。\n\n`UpdateIdxWithEventForInternal` 接收 `UpdateIdxWithEventReq`，其中 `TrimmedEvent` 是裁剪后的事件。入口方法是 `UpdateIdxWithEventForInternal`，核心处理落到 `fuxi/core/service/index.go` 的 `HandleEvent`。事件类型决定索引动作：创建写入索引、删除移除索引、属性更新则对比前后值更新索引桶。\n\n`RefreshIdxForInternal` 用于按主表当前状态重建指定对象索引。它适合修复场景，不适合热路径调用。\n\n`RepairIdxEntryForInternal` 处理 entry 缺失、孤儿 entry、key 错位和版本滞后。服务端会根据主表快照自行决策 `added`、`removed`、`skipped` 或 `failed`，调用方不需要提前判断异常类型。\n\n`RepairIdxBucketForInternal` 清理空封口桶，只允许删除非活跃且为空的 sealed bucket。活跃桶和非空桶都会返回 `skipped`，底层 `DeleteBucket` 还包含 CAS 与活跃桶拒绝保护。\n\n## Admin HTTP 接口\n\nAdmin HTTP 文档覆盖 `fuxi/fuxi_admin/router.go` 中的控制面路由，JSON 请求响应结构来自 `fuxi/fuxi_admin/adminapi/types.go`。\n\n所有 `/admin/api/v1/*` 成功响应统一使用 `DataResponse`：\n\n```json\n{\n  \"data\": {},\n  \"status_code\": 0,\n  \"status_message\": \"OK\"\n}\n```\n\n错误响应使用 `BaseResponse` 或 `ErrorResponse`，通常不包含 `data`。\n\n主要接口分为三组：\n\n- Schema Definition：创建、查询、列出 Schema 定义。\n- Schema Binding：创建、查询、列出 Schema 绑定。\n- Configuration Management：更新绑定配置、查询配置历史。\n\n此外还保留 Legacy Schema API，例如 `/schemas/:name`、`/spaces/:space/schemas/:name`、`/validate` 等路径。\n\n维护 Admin 文档时要特别核对 JSON tag。例如 TTL 配置字段应使用 `created_time_attr`、`ttl_range`、`ttl_time`；`storage_policy` 是大小写敏感值，`Bytedoc` 首字母大写。\n\n## 与其他模块的连接\n\n`docs/api` 不直接被运行时代码调用，但它连接了多个实现区域：\n\n- `idl/compound.thrift`：RPC 契约来源。\n- `idl/base.thrift`：`base.Base` 和 `base.BaseResp` 的来源。\n- `kitex_gen/`：由 IDL 生成的 Go 类型，验证字段和枚举时需要参考。\n- `handler/handler.go`：RPC handler 入口。\n- `fuxi/core/service/`：写入、查询、索引、修复等业务逻辑实现。\n- `fuxi/fuxi_admin/router.go`：Admin HTTP 路由定义。\n- `fuxi/fuxi_admin/adminapi/types.go`：Admin HTTP 请求响应结构。\n- `docs/architecture/`：接口背后的业务逻辑、数据流、版本冲突和数据模型说明。\n- `docs/specs/`：各 capability 的行为契约。\n\n因此，API 文档更新通常不应只改 `docs/api/api-reference.md`。如果接口语义变化来自 IDL、handler 或 Admin 结构体，相关架构文档和 specs 也可能需要同步。\n\n## 维护建议\n\n修改 RPC 契约时，先更新并核对 `idl/compound.thrift`，再检查 `kitex_gen/`、`handler/handler.go` 和对应 service 实现，最后同步 `docs/api/api-reference.md`。\n\n修改 Admin HTTP 接口时，先核对 `router.go` 的路径和方法，再核对 `adminapi/types.go` 的 struct tag、响应包装和错误响应，最后同步文档示例。\n\n修改错误码时，需要同时检查 RPC 的 `base.BaseResp` 使用方式、Admin HTTP 的 `status_code` / `status_message` 约定，以及文档中每个接口的错误码表。\n\n文档示例应优先展示真实字段名和当前代码接受的结构，不应为了可读性改写字段名。尤其是 Thrift 的字段名、枚举值、JSON tag 和响应 envelope，必须与代码保持一致。","other-architecture":"# Other — architecture\n\n## 模块定位\n\n`docs/architecture/` 是 Compound 的架构知识入口，不承载运行时代码，而是把 RPC 数据面、Admin 管理面、存储抽象、GSI、事件链路、配置与数据模型串成可维护的开发者视图。开发者在修改 `handler/`、`fuxi/core/service/`、`fuxi/core/service/meta/`、`fuxi/core/service/idx/`、`rocketmq/`、`fuxi/client/` 或 `fuxi/fuxi_admin/` 前，应先从本模块确认调用边界与不变式。\n\n核心入口是 `docs/architecture/README.md`，它提供专题地图；深度说明在 `architecture-detailed.md`，业务路径在 `business-logic.md` 和 `data-flow.md`，数据与配置分别由 `data-model.md`、`configuration.md` 承接。\n\n## 架构主线\n\nCompound 分为两条平行控制面：\n\n```mermaid\nflowchart TD\n  调用方[上游业务调用方] --> 处理器[handler/handler.go]\n  处理器 --> 服务层[fuxi/core/service]\n  服务层 --> 存储抽象[MetaStorage 接口]\n  存储抽象 --> 后端[Bytedoc / Abase / ODA / TOS]\n  服务层 --> 事件[RocketMQ / TOS 溢出]\n  事件 --> 索引[GSI 异步维护]\n  管理端[Admin HTTP] --> 管理库[fuxi_admin DAL / MySQL]\n  管理库 --> 服务层\n```\n\n数据面由 `CompoundServiceImpl` 暴露 Kitex RPC，典型方法包括 `SetAttr`、`DelAttr`、`Query`、`Del`、`Count`、`CopyAttr`。Handler 只做参数接入和响应包装，核心逻辑下沉到 `service.SetAttr`、`service.DelAttr`、`service.Query`、`service.Del` 等函数。\n\n管理面由 Admin HTTP 服务维护 Schema、Binding 和 Configuration。`SchemaDefinitionsDAL`、`SchemaBindingsDAL`、`ConfigurationsDAL` 负责 MySQL 持久化，运行时再通过 `admin.GetSchema`、`admin.GetStorage`、`admin.GetIdxCfg` 等入口影响数据面的存储路由、TTL、GSI 与文件删除策略。\n\n## 关键不变式\n\n本模块最重要的价值是沉淀跨包不变式：\n\n- `MetaStorage` 实现层不自行重试；`iface.WrongVersion` 等冲突错误统一返回到 Service 层，由 `maxRetryTimes=3` 驱动重试。\n- 数据面和管理面分离：RPC 主服务监听 `:8888`，Admin HTTP 监听 `:6789`，两者故障域和数据通路独立。\n- 业务逻辑只依赖 `MetaStorage.QueryAttr`、`MetaStorage.Count`、`MetaStorage.UpdateAttr`、`MetaStorage.DelID`，不直接感知 Bytedoc、Abase、ODA 或 TOS 差异。\n- GSI 非唯一索引通过 RocketMQ 事件异步维护，唯一索引在写路径同步处理。\n- GSI event 只有 `vda_sync` 一个消费者，回调 `compound.UpdateIdxWithEventForInternal` 后再写 idx posting。\n- 大事件由 `rocketmq.QuickSent` / `sendChangeEvent` 判断大小，超过阈值时上传 TOS，并在 MQ 中只保留 `Event.URI`。\n- VOD 删除场景中，`checker.CheckVideoDelete` 返回 `executed=true` 且无有效本地 storage 时可以早退，避免错误进入 `MetaStorageSelector`。\n\n## 文档组成\n\n`README.md` 是导航层，列出架构原则、关键不变式、模块文档地图和横切话题。它适合用来判断“某个问题该读哪篇”。\n\n`architecture-detailed.md` 是整体架构展开，覆盖 Handler、Service、Client、Storage、Interface、Common、Event、Admin 等层次，并给出 `SetAttr`、`Query`、`Del`、中间件、存储选择、跨区域和事件发布的完整路径。\n\n`business-logic.md` 面向核心 CRUD 贡献者，详细描述 `SetAttr`、`DelAttr`、`Query`、`Del`、`Count`、`CopyAttr`、TTL、VideoDelete、事件系统和 GSI 编排。写路径修改通常要同步检查这篇。\n\n`data-flow.md` 是快速路径图，按 `SetAttr`、`Query`、`Del`、GSI Event 四条主链路描述执行顺序和一致性边界。\n\n`data-model.md` 描述 Admin MySQL 表、`MetaStorage` 抽象、内置字段映射、TOS 序列化、文件存储和 GSI posting 结构。\n\n`configuration.md` 描述静态配置、TCC、Admin 配置、中间件、metrics、日志、外部客户端和联邦配置。\n\n`modules/` 下是专题深挖，例如 `gsi.md`、`gsi-service-meta.md`、`gsi-reconcile.md`、`hlc-encoding.md`、`tos-storage.md`、`update-wrapper.md`、`version-conflict.md`、`video-delete-early-exit.md`。\n\n## 与代码的对应关系\n\n一次 `SetAttr` 请求的文档映射如下：\n\n1. `handler/handler.go` 中的 `CompoundServiceImpl.SetAttr` 接收请求。\n2. `service.SetAttr` 获取 Schema、解析分片键、读取旧值、计算 `Created` / `Updated`。\n3. `meta.GetMeta` 通过 `MetaStorage.QueryAttr` 读取当前版本。\n4. `meta.SetMeta` 通过 `MetaStorage.UpdateAttr` 写入新版本；冲突时返回 `iface.WrongVersion`。\n5. 唯一索引由 `HandleUniqIdx` 同步维护，非唯一索引由事件后续维护。\n6. 文件替换时调用 `storage.BatchDelIgn404Async` 异步清理旧 URI。\n7. 事件由 `rocketmq.QuickSent` 发出，`detectSyncs` / `hitGSI` 预判内部订阅目标。\n8. TTL 属性变化时调用 `postpone.SendTask`。\n\nGSI 查询和写入相关内容应同时阅读 `business-logic.md`、`modules/gsi-service-meta.md` 和 `modules/gsi.md`。service 层通过 `idx.GetOperator(cfg)` 选择 simple 或 bucket 模式；simple 模式核心原语包括 `simpleOperator.AddToIndex`、`RemoveFromIndex`、`UpdateIndex`、`QueryByIndex`。\n\n## 贡献注意事项\n\n修改运行时代码后，应同步检查本模块是否需要更新。尤其是以下变更不能只改代码：\n\n- `MetaStorage` 接口签名、错误码或重试语义变化。\n- `service.SetAttr`、`service.DelAttr`、`service.Del` 的副作用顺序变化。\n- `rocketmq.Event` 字段、TOS spillover 行为或 `Event.Syncs` 规则变化。\n- GSI simple / bucket 模式、`idx.GetOperator(cfg)` 路由或 reconcile 语义变化。\n- Admin 配置结构、Schema Binding、StoragePolicy、TTLConfig 或 GSI 配置格式变化。\n- 中间件链、限流、metrics、日志字段或外部客户端初始化策略变化。\n\n`docs/architecture/` 下的写入必须遵守项目文档规约，按仓库说明由 `doc-init` 体系主导。文档内容应以真实代码和测试为准，避免把规划中的字段写成已落地能力；例如 `CASFilter` 在现有说明中明确标注为未实现，当前可用的业务乐观锁路径是 `Where.Filter`。","other-archive":"# Other — archive\n\n## 归档模块\n\n`docs/archive/` 保存已经完成或冻结的文档化变更记录。它不是运行时代码模块，也不参与调用链；它的作用是保留历史决策、需求 delta、实施清单、迁移说明和验收证据，帮助开发者理解当前 `docs/specs/`、架构文档和代码约束是如何演进到现在的。\n\n当前行为契约以 `docs/specs/<capability>/spec.md` 为准；归档目录中的 `spec.md` 是当时 change 的 delta 或历史快照，不能直接当作最新事实来源。\n\n```mermaid\ngraph LR\n  A[进行中变更 docs/changes] --> B[验收与归档]\n  B --> C[历史归档 docs/archive]\n  B --> D[合并到现行规范 docs/specs]\n  C --> E[追溯设计与决策]\n  D --> F[当前行为契约]\n```\n\n## 目录组织\n\n常规归档目录使用 `YYYY-MM-DD-<change-slug>/` 命名，通常包含：\n\n| 文件 | 作用 |\n|---|---|\n| `proposal.md` | 说明为什么做、改什么、影响范围 |\n| `design.md` | 记录上下文、目标、关键决策、风险和迁移计划 |\n| `tasks.md` | 记录实施清单和验收状态 |\n| `specs/<capability>/spec.md` | 记录该 change 对 capability 的需求 delta |\n| `ARCHIVED.md` | 记录归档元数据、关联 commit、测试结果、delta 合并说明和红线确认 |\n\n部分目录不是常规 change archive，而是明确标注的状态快照或迁移报告，例如 `2026-04-04-gsi-feature-status-snapshot/` 和 `2026-05-07-setup-unified-doc-system/MIGRATION-FINAL-REPORT.md`。\n\n## 主要归档内容\n\n### Abase 库表配置\n\n`2026-02-21-abase-db-table-config/` 记录为 `storage_policy=abase` 增加结构化配置 `abase_config` 的设计。该配置通过 `AbaseConfig` 表达 `db_name` 和 `table_name`，目标是让 `fuxi-admin` 在写入或更新 schema binding 时校验 Abase 的库名和表名。\n\n关键约束是向后兼容：历史 binding 即使缺失 `abase_config`，读取和展示链路仍然可用；但新增或更新 `storage_policy=abase` 时必须提供非空的 `abase_config.db_name` 和 `abase_config.table_name`。\n\n### 移除旧连接配置字段\n\n`2026-02-25-remove-legacy-config-fields/` 记录从 `adminapi/types.go` 中移除已经迁移到 TCC `fuxi_init_config` 的连接参数。涉及结构包括 `TosStorage`、`RedisProtocol`、`Block`、`AbaseConfig`、`LocalCache`。\n\n该归档明确了保留字段和移除字段的边界：`TosStorage.Bucket`、`RedisProtocol.Cluster`、`Block.Cluster` 继续作为 TCC 查找 key；`AK`、`SK`、`Password`、`Timeout`、`PoolSize` 等连接参数移除；`BigDataConfig` 被移除；`LocalCache.CachePercent` 被补齐以对齐 SDK。\n\n### ODA kitex_gen 依赖升级\n\n`2026-03-15-upgrade-oda-kitex-gen/` 记录将 `code.byted.org/videoarch/object_data_access/kitex_gen` 从 `aea39368ddea` 升级到 `af117077` 的依赖变更。该变更不修改 `BytedocFind`、`BytedocCount`、`QueryBson`、`CountBson` 的调用方式，主要目标是保证新版 Kitex 生成代码编译通过并保持业务行为兼容。\n\n### GSI 功能状态快照\n\n`2026-04-04-gsi-feature-status-snapshot/` 是状态快照，不是 change archive。`ARCHIVED.md` 明确说明它用于保留 `docs/features/gsi-feature-status.md` 的历史证据，后续状态不再回填该快照。\n\n快照内容覆盖 GSI 的数据模型、存储操作、`idx` CRUD、service 编排、handler/API、后台任务、配置下发和测试状态。当前 GSI 行为应以这些 living spec 为准：`gsi-index-runtime`、`gsi-service-meta-orchestration`、`gsi-reconcile-framework`、`binding-index-config`、`offline-snapshot-reader`。\n\n### SetAttr 耗时埋点\n\n`2026-04-18-add-setattr-timing-logs/` 记录为 `SetAttr` 两条 Query 链路增加耗时统计的设计。归档中定义了 `Recorder`、`WithRecorder`、`FromContext`、`Track` 等辅助接口，并要求在 `SetAttr`、`QueryWithFuxiAttr`、`queryWithID`、`meta.GetMeta`、`GetMetaByIDWithLimit`、`storage.QueryAttr`、`abase.QueryAttr`、`abase.query`、`wrap.Set`、`meta.SetMeta`、`selector.UpdateAttr`、`abase.UpdateAttr`、`setAttr` 等环节记录耗时。\n\n设计原则是埋点不改变返回值、错误语义、重试行为、事件发送或 TTL 处理；只有整体耗时超过默认阈值 `200ms` 时，才在 `SetAttr` 返回前输出汇总日志。\n\n### Fuxi Admin 表名前缀\n\n`2026-04-18-fuxi-admin-table-prefix/` 记录通过 `TablePrefixPlugin` 支持多个联邦共享同一个 RDS 的设计。该方案在 `DBConf` 中增加 `TablePrefix`，并在 `Dal.Init()` 中、`gorm.Open` 之后和 `query.Use(db)` 之前注册 GORM Callback Plugin。\n\n该方案避免修改 `dal/model/*.gen.go` 和 `dal/query/*.gen.go`，通过 GORM Create、Query、Update、Delete、Raw、Row 回调统一修改 `Statement.Table`，在表名未带前缀时自动添加配置的前缀。\n\n### 统一文档体系\n\n`2026-05-07-setup-unified-doc-system/` 是 doc-init 体系自身的元归档。它记录了从 OpenSpec 风格目录迁移到 `docs/changes`、`docs/specs`、`docs/archive` 的过程，也定义了 living spec、change delta、archive、ADR、EARS 句式和文档分层规则。\n\n其中 `MOVED.md` 保存旧路径到新路径的重定向表；`MIGRATION-FINAL-REPORT.md` 记录归档后的补丁处理结果。这个目录是理解当前文档治理规则的重要入口，但具体写文档时仍应优先读取 `docs/AGENTS.md` 和 `docs/overview/constitution.md`。\n\n## 使用建议\n\n查看历史变更时，优先读对应目录的 `ARCHIVED.md`，再读 `proposal.md`、`design.md`、`specs/*/spec.md` 和 `tasks.md`。如果归档内容与 `docs/specs/` 冲突，以 `docs/specs/` 为准。\n\n新增归档时，不应手动改写已有历史目录。正常流程是先在 `docs/changes/<slug>/` 完成 proposal、design、tasks 和 spec delta，验收后将 delta 合并到 living spec，再移动到 `docs/archive/YYYY-MM-DD-<slug>/` 并补齐 `ARCHIVED.md`。","other-build-sh":"# Other — build.sh\n\n## 模块概览\n\n`build.sh` 是仓库的构建入口脚本，负责把服务二进制、启动脚本和配置文件打包到 `output/` 目录。它根据构建环境变量选择不同路径：\n\n- `BUILD_REGION=oci` 时，先执行 `/opt/common_tools/restore-parfait.sh`。\n- `TASK_FROM=SCM` 时，先构建原始二进制，再运行 `service_inline` 做代码合并或内联处理。\n- `IS_SYSTEM_TEST_ENV=1` 时，生成带覆盖率插桩的测试二进制；否则生成普通服务二进制。\n\n最终服务产物固定输出为：\n\n```text\noutput/bin/bytedance.videoarch.compound\n```\n\nSCM 构建路径还会额外生成：\n\n```text\noutput/bin/bytedance.videoarch.compound.origin\n```\n\n## 构建流程\n\n```mermaid\nflowchart TD\n    A[开始 build.sh] --> B{BUILD_REGION 是 oci?}\n    B -->|是| C[执行 restore-parfait.sh]\n    B -->|否| D[准备 output 目录]\n    C --> D\n    D --> E[复制 script 和 conf]\n    E --> F{TASK_FROM 是 SCM?}\n    F -->|是| G[构建 origin 二进制]\n    G --> H[克隆并执行 service_inline]\n    F -->|否| I[重新准备 output 目录]\n    H --> I\n    I --> J{IS_SYSTEM_TEST_ENV 是 1?}\n    J -->|否| K[go build 生成服务二进制]\n    J -->|是| L[go test -c 生成覆盖率二进制]\n```\n\n## 关键变量\n\n`RUN_NAME` 定义服务二进制名称：\n\n```bash\nRUN_NAME=\"bytedance.videoarch.compound\"\n```\n\n所有最终二进制都以该变量命名，避免构建脚本中散落硬编码路径。当前脚本会使用它生成：\n\n- `output/bin/${RUN_NAME}`\n- `output/bin/${RUN_NAME}.origin`\n\n`BUILD_REGION` 控制 OCI 区域下的前置恢复步骤：\n\n```bash\nif [ \"$BUILD_REGION\" = \"oci\" ]; then\n    bash /opt/common_tools/restore-parfait.sh\nfi\n```\n\n`TASK_FROM` 控制是否启用 SCM 专用构建流程：\n\n```bash\nif [ \"$TASK_FROM\" = \"SCM\" ]; then\n    go build -o output/bin/${RUN_NAME}.origin\n    bvc clone bytedance/framework/service_inline /opt/tiger/service_inline && /opt/tiger/service_inline/service_inline -c conf/service_inline_config.yaml || exit 1\nfi\n```\n\n`IS_SYSTEM_TEST_ENV` 控制最终产物是普通运行二进制还是系统测试覆盖率二进制：\n\n```bash\nif [ \"$IS_SYSTEM_TEST_ENV\" != \"1\" ]; then\n    go build -o output/bin/${RUN_NAME}\nelse\n    go test -c -covermode=set -o output/bin/${RUN_NAME} -coverpkg=./...\nfi\n```\n\n## 输出目录结构\n\n脚本会创建并填充以下目录：\n\n```text\noutput/\n  bootstrap.sh\n  bin/\n    bytedance.videoarch.compound\n    bytedance.videoarch.compound.origin   # 仅 SCM 构建路径生成\n  conf/\n    ...\n```\n\n`script/*` 会被复制到 `output/` 根目录，`conf/*` 会被复制到 `output/conf/`。复制完成后，脚本会确保启动脚本可执行：\n\n```bash\nchmod +x output/bootstrap.sh\n```\n\n## SCM 构建路径\n\n当 `TASK_FROM=SCM` 时，脚本先执行一次普通构建，生成原始镜像二进制：\n\n```bash\ngo build -o output/bin/${RUN_NAME}.origin\n```\n\n随后通过 `bvc clone` 拉取 `bytedance/framework/service_inline` 到 `/opt/tiger/service_inline`，并执行：\n\n```bash\n/opt/tiger/service_inline/service_inline -c conf/service_inline_config.yaml\n```\n\n这一步依赖 `conf/service_inline_config.yaml`。脚本注释说明，CDC 调试分支需要把当前发布分支透传给 `service_inline`，否则 `service_inline` 会回退到 SCM 仓库级 `merge_build` 配置里的 `master`。\n\n`service_inline` 执行失败时，脚本会立即退出：\n\n```bash\n|| exit 1\n```\n\n## 为什么会复制两次资源\n\n脚本在 SCM 逻辑前后都执行了相同的资源准备步骤：\n\n```bash\nmkdir -p output/bin output/conf\ncp script/* output/\ncp -r conf/* output/conf/\nchmod +x output/bootstrap.sh\n```\n\n第二次复制用于覆盖 `service_inline` 过程可能影响到的旧数据，并确保内联服务后的最终 `output/` 内容仍包含最新的启动脚本和配置文件。\n\n## 系统测试构建\n\n普通环境下，最终二进制由 `go build` 生成：\n\n```bash\ngo build -o output/bin/${RUN_NAME}\n```\n\n系统测试环境下，脚本改用 `go test -c` 生成测试二进制，并开启覆盖率：\n\n```bash\ngo test -c -covermode=set -o output/bin/${RUN_NAME} -coverpkg=./...\n```\n\n这会把测试可执行文件输出到与普通服务二进制相同的位置，方便下游部署或测试流程使用统一路径读取产物。","other-changes":"# Other — changes\n\n## 变更治理模块\n\n`docs/changes/` 是 Compound 文档体系中记录“进行中 change”的入口目录，用于承载还未归档的设计、实施计划、SQL、任务拆解和 spec-delta。它不是运行时代码模块，没有函数调用图；它通过文档结构约束工程变更的生命周期，并与 `docs/specs/`、`docs/archive/` 和 `docs/AGENTS.md` 共同组成 doc-init 治理模型。\n\n## 目录职责\n\n`docs/changes/README.md` 提供当前 active change 索引，表格字段包括：\n\n- `Slug`：change 目录名，例如 `fuxi-cdc-warehouse/`、`gsi-simple-flat-rows/`\n- `主题`：变更目标摘要\n- `Owner`：负责团队或角色\n- `当前状态`：例如 `Plan`、`Design`、`Implement`\n\nREADME 中还明确两条流程规则：\n\n- 每个 change 一个独立目录，目录内承载 proposal、design、tasks、spec-delta 或配套资产。\n- 完成验收后通过 archive checklist 归档到 `docs/archive/`，spec-delta 折叠进 `docs/specs/` 下的 living spec。\n\n该目录的写入流程不直接由普通编辑驱动。`docs/changes/README.md` 指向 `docs/AGENTS.md` 和 doc-init workflow，表示新 change 的创建、推进和归档应遵循项目文档治理规则。\n\n## Change 生命周期\n\n```mermaid\nflowchart LR\n    A[提出变更] --> B[创建 change 目录]\n    B --> C[编写 proposal 或 design]\n    C --> D[补充任务与实现资产]\n    D --> E[实现与验收]\n    E --> F[归档到 archive]\n    F --> G[折叠到 living spec]\n```\n\n典型生命周期如下：\n\n1. 在 `docs/changes/README.md` 的 Active 表中登记 change。\n2. 在 `docs/changes/<slug>/` 下维护变更材料。\n3. 设计阶段主要产物通常是 `proposal.md` 或 `design.md`。\n4. 实施阶段补充 `implementation-plan.md`、`tasks.md`、SQL、配置或验收说明。\n5. 实现完成并验收后，将 change 归档到 `docs/archive/`。\n6. 与长期行为相关的结论需要折叠进 `docs/specs/`，避免只停留在 change 文档中。\n\n## 关键目录与文件\n\n### `docs/changes/README.md`\n\n这是 active change 的人工索引。当前表中包含 GSI、Bytedoc、Fuxi CDC、fuxi_admin 启动校验等变更主题。\n\n需要注意，README 末尾记录了部分 GSI / Bytedoc change 已在 `2026-06-16` 归档，并说明 spec-delta 已折叠进 living spec。维护该索引时应避免 Active 表与归档说明长期不一致：若某个 slug 已归档，应从 Active 表移除或更新状态说明。\n\n### `docs/changes/fuxi-cdc-warehouse/`\n\n该 change 收口 Fuxi CDC 入仓链路中数仓侧的 Hive DDL 与 Dorado 流任务 SQL。它明确区分 Metis 与 Compound / Fuxi 的职责：\n\n- Metis：标准化多来源 CDC 事件并写入区域 `fuxi_cdc` topic。\n- Compound / Fuxi：定义数仓三张表的建表口径和落表 SQL。\n\n核心文件包括：\n\n- `proposal.md`：背景、三张表口径、线上落表方式、SQL 清单和区域替换规则。\n- `sql/hive/ddl_ods_fuxi_cdc_request_di.sql`：request ODS 表 DDL。\n- `sql/hive/ddl_ods_fuxi_cdc_event_di.sql`：event ODS 表 DDL。\n- `sql/hive/ddl_dwd_fuxi_cdc_snapshot_di.sql`：snapshot DWD 拉链表 DDL。\n- `sql/hive/dwd_fuxi_cdc_snapshot_di.sql`：历史分区补写或一次性回放 SQL。\n- `sql/hive/init_dwd_fuxi_cdc_snapshot_branches.sql`：snapshot / delta branch 初始化。\n- `sql/dorado/ods_fuxi_cdc_request_di.sql`：request 流任务。\n- `sql/dorado/ods_fuxi_cdc_event_di.sql`：event 流任务。\n- `sql/dorado/dwd_fuxi_cdc_snapshot_di.sql`：snapshot 流任务。\n\n### `docs/changes/gsi-simple-flat-rows/`\n\n该 change 记录 GSI Simple 模式从“单文档 `entries[]` 数组”改造为“每个 oid 一行”的设计与实施计划。\n\n核心文件包括：\n\n- `design.md`：方案 G++ 的正式设计，覆盖数据模型、CRUD 原语、Operator 接口、Query dedup、reconcile 决策树、风险和验收标准。\n- `implementation-plan.md`：按阶段拆解实现任务，覆盖 `FindOneAndUpdate` wrapper、`TxnStore` 扩展、`simpleOperator`、`bucketedOperator`、调用方迁移、测试与文档同步。\n\n## Fuxi CDC Warehouse change\n\n`fuxi-cdc-warehouse` 的目标是定义 Fuxi CDC 数仓三张表及其线上落表方式。\n\n三张表的口径如下：\n\n| 表 | 粒度 | 主要用途 | 降级策略 |\n|---|---|---|---|\n| `ods_fuxi_cdc_request_di` | 一条 request 消息一行 | 计量计费、请求级审计、按 LogID 排障 | 不可降级 |\n| `ods_fuxi_cdc_event_di` | 一个对象变更 item 一行 | 对象级事件明细、回溯修复 | 可暂停或降并发，但必须保留 offset 和最后成功分区 |\n| `dwd_fuxi_cdc_snapshot_di` | 同一对象最新态一行 | TTL 候选判定、生命周期治理 | 不可降级 |\n\n线上常态链路由三个独立 `stream_sql` 任务消费 `fuxi_cdc`：\n\n```mermaid\nflowchart LR\n    A[fuxi_cdc topic] --> B[request 流任务]\n    A --> C[event 流任务]\n    A --> D[snapshot 流任务]\n    B --> E[ods_fuxi_cdc_request_di]\n    C --> F[ods_fuxi_cdc_event_di]\n    D --> G[dwd_fuxi_cdc_snapshot_di]\n```\n\n### Request 流任务\n\n`sql/dorado/ods_fuxi_cdc_request_di.sql` 创建 `fuxi_cdc_source`，消费 `event_type = 'REQUEST'` 且 `source.event_source = 'APPL_CDC'` 的请求事实，并写入 `paimon.videoarch_mix.ods_fuxi_cdc_request_di`。\n\n关键字段包括：\n\n- `request_event_id`：Metis request-level `event_id`\n- `source_request_id`：ODA APPL_CDC `request_id`\n- `log_id`：ODA log_id\n- `method_type`：通过 `COALESCE(source.method_type, 'write')` 兜底\n- `request_detail`：请求级明细原因，例如 `zero_affected_count`\n- `date` / `hour`：由 `event_time_ns` 派生的分区字段\n\n`request_di` 是 Paimon 非主键表，只追加、不去重。\n\n### Event 流任务\n\n`sql/dorado/ods_fuxi_cdc_event_di.sql` 同样定义 `fuxi_cdc_source`，并通过 `fuxi_cdc_base` 临时视图规整字段。\n\n写入逻辑由两段 `UNION ALL` 组成：\n\n- 非 `REQUEST` 事件直接写入对象事件明细。\n- `APPL_CDC REQUEST` 通过 `CROSS JOIN UNNEST(base.items)` 展开 `items[]`，为每个对象 item 写一行。\n\n对象级 `event_id` 对 request item 使用：\n\n```sql\nSHA1(CONCAT(\n    base.event_id,\n    '|',\n    COALESCE(base.source_request_id, ''),\n    '|',\n    COALESCE(T.`primary_key`, ''),\n    '|',\n    COALESCE(T.`event_type`, ''),\n    '|',\n    COALESCE(T.`payload_mode`, '')\n))\n```\n\n`object_event_enabled` 会落到 `event_di`，但不在 event 表中过滤。snapshot 侧再使用该字段过滤对象主链路，避免 APPL_CDC 排查明细与 OPLOG / FULL_SCAN 主链路重复归并。\n\n### Snapshot 流任务\n\n`sql/dorado/dwd_fuxi_cdc_snapshot_di.sql` 直接写 `paimon.videoarch_mix.dwd_fuxi_cdc_snapshot_di`。它不是 event 任务的同源双写，也不需要手动初始化 branch。\n\n核心规则：\n\n- 只消费 `object_event_enabled = TRUE` 的对象主链路事件。\n- 非 `REQUEST` 事件直接写最终态。\n- `APPL_CDC REQUEST` 展开 `items[]` 后写对象最终态。\n- `DELETE` 或 `payload_mode = 'TOMBSTONE'` 时，`full_document` 置空，`is_deleted = 1`。\n- 去重与最终态归并由 Paimon 主键表、`sequence.field=event_time_ns,process_time,event_id` 和 chain table 自动完成。\n\n对应 Hive DDL `ddl_dwd_fuxi_cdc_snapshot_di.sql` 使用：\n\n```sql\n'primary_key' = 'date,hour,fed,space_name,schema_name,primary_key',\n'sequence.field' = 'event_time_ns,process_time,event_id',\n'chain.table.enabled' = 'true',\n'chain.table.snapshot.branch' = 'snapshot',\n'chain.table.delta.branch' = 'delta'\n```\n\n### 历史补写 SQL\n\n`sql/hive/dwd_fuxi_cdc_snapshot_di.sql` 只用于历史分区补写或一次性回放，不是线上常态链路。它从 `ods_fuxi_cdc_event_di` 中读取指定 `${date}` / `${hour}` 分区，并使用：\n\n```sql\nROW_NUMBER() OVER (\n    PARTITION BY fed, space_name, schema_name, primary_key\n    ORDER BY event_time_ns DESC, process_time DESC, event_id DESC\n) AS rn\n```\n\n只写入当前小时内同一对象主键的最新状态。\n\n## GSI Simple Flat Rows change\n\n`gsi-simple-flat-rows` 关注 GSI Simple 模式的数据模型和 idx 包接口重构。现有 Simple 模式名义上不分桶，但底层仍复用 bucketed 模式的单文档 `entries[]` 数组结构。该设计将其改为真正的行级模型。\n\n### 新数据模型\n\nSimple 模式新行结构为：\n\n```js\n{\n  _id: ObjectId,\n  idx: \"索引名\",\n  space: \"ByteDoc space\",\n  schema: \"ByteDoc schema\",\n  col1: \"索引列值\",\n  col2: \"索引列值\",\n  ver: 123,\n  val: {\n    _id: \"主表对象 id\",\n    sk: {\n      \"分片键名\": \"分片键值\"\n    }\n  }\n}\n```\n\n相比原 bucket 文档，Simple 行级模型移除：\n\n- `entries[]`\n- `cnt`\n- `idx_ver`\n- `min_ver`\n- `max_ver`\n\n普通索引为：\n\n```text\n(idx, space, schema, col1, col2, ..., colN, val._id)\n```\n\n该索引不是唯一索引。设计接受极小并发窗口下的重复物理行，并依赖 Query dedup、Update 清理和 reconcile cleanup 收敛。\n\n### CRUD 原语\n\n`AddToIndexWithShardingKeys` 的目标语义是确保一条完整行存在。底层计划使用 `FindOneAndUpdate`、`$setOnInsert` 和 `upsert=true`：\n\n```go\nfullDoc := bson.M{\n    \"idx\": idx,\n    \"space\": space,\n    \"schema\": schema,\n    \"col1\": cols[0],\n    \"ver\": ver,\n    \"val\": bson.M{\"_id\": oid, \"sk\": shardingKeys},\n}\nupdate := bson.M{\"$setOnInsert\": fullDoc}\n```\n\n`RemoveFromIndex` 区分两种删除语义：\n\n- 主表删除：`ver <= upperVer`\n- `UpdateIndex` 内部清理旧行：`ver < newVer`\n\n`UpdateIndexWithShardingKeys` 的关键决策是 cols-only early return：\n\n```go\nif stringSlicesEqual(oldCols, newCols) {\n    return nil\n}\n```\n\n当索引列不变时，idx 行的 `ver` 不追主表 dataVer；`ver` 只是行写入时的主表版本快照。\n\n### Query dedup\n\n由于设计中确认 ODA 不支持 `BytedocAggregate` / `BytedocDistinct`，Query 路径降级为应用层 dedup：\n\n- 物理行上限：`MaxRowsPhysical = 30000`\n- distinct oid 上限：`MaxRowsPerQuery = 10000`\n- 按 `val._id` 取最大 `ver` 行\n- `QueryEntriesCrossSpace` 按 `(space, val._id)` dedup\n\n当物理行命中上限时返回 `ErrMaxRowsExceeded`，作为热点信号。\n\n### Operator 接口重构\n\n设计将原来的 `*Simple` 后缀分流改为按配置选择实例：\n\n```go\nfunc GetOperator(cfg entity.IdxCfg) Operator {\n    if cfg.BucketEnabled {\n        return bucketedOp\n    }\n    return simpleOp\n}\n```\n\n调用方统一使用无后缀方法：\n\n```go\nop := idx.GetOperator(cfg)\nreturn op.AddToIndexWithShardingKeys(ctx, collection, cfg.Space, cfg.Schema, cfg.Name, cols, oid, ver, sk)\n```\n\n该设计影响以下调用面：\n\n- `fuxi/core/service/index.go`\n- `fuxi/core/service/index_repair.go`\n- `fuxi/core/service/meta/meta.go`\n- `fuxi/core/service/idx/reconcile/applier.go`\n- idx 包内测试和 service / meta / handler 相关测试\n\nSimple 实现中的桶级维护方法应统一返回 `ErrNotSupportedInSimpleMode`，包括 `ReadBucket`、`DeleteBucket`、`SealBucket`、`DedupBucketEntries`、`MergeBucketInto`、`RemoveEntryFromBucket` 和 `TryMergeBucket`。\n\n## 与代码库其他部分的连接\n\n`docs/changes/` 本身不被 Go 代码调用，但它对代码库有三类连接。\n\n第一类是设计驱动实现。例如 `gsi-simple-flat-rows/design.md` 明确影响 `fuxi/core/service/idx/`、`fuxi/client/doc/`、`fuxi/core/service/meta/`、`fuxi/fuxi_admin/` 和 reconcile 包。\n\n第二类是 SQL 资产直接服务线上任务。例如 `fuxi-cdc-warehouse/sql/dorado/*.sql` 是 Dorado stream job 的模板，`sql/hive/*.sql` 是 Paimon 表 DDL、历史回放和 branch 初始化脚本。\n\n第三类是文档治理连接。change 完成后，结论不能只留在 `docs/changes/`，需要同步到长期文档，例如 `docs/specs/`、`docs/comprehensive/` 或 idx 包内 README / SOP 文档。\n\n## 维护约定\n\n新增或修改 `docs/changes/` 时应保持以下约定：\n\n- 一个 change 使用一个稳定 slug 目录。\n- README Active 表中的状态要和目录真实状态一致。\n- `proposal.md` 说明“为什么做”和“范围是什么”。\n- `design.md` 说明“怎么做”和“关键取舍是什么”。\n- `implementation-plan.md` 或 `tasks.md` 拆到可执行步骤，并列出受影响文件。\n- SQL、DDL、配置模板应放在 change 目录内的明确子目录，例如 `sql/hive/`、`sql/dorado/`。\n- 已完成 change 应归档，并把长期有效的行为同步到 living spec。\n- 涉及 `docs/` 下写动作时，应遵循 `docs/AGENTS.md` 指向的 doc-init 流程。","other-claude-md":"# Other — CLAUDE.md\n\n## 模块定位\n\n`CLAUDE.md` 是 Compound 仓库的 AI 协作配置入口，约束 Claude Code / Codex 等 agent 在本仓库中的工作方式。它不是运行时代码，不参与 Go 编译，也没有函数、类、调用边或执行流；它的作用是定义“改代码、写文档、跑测试、提交 commit”之前必须遵守的项目级规则。\n\n该文件重点覆盖四类事项：\n\n- 项目宪法导入：通过 `@./constitution.md` 强制加载最高优先级原则。\n- 文档规约入口：所有 `docs/` 写动作必须由 `doc-init` skill 主导。\n- `fuxi/core/service/idx/` 专项红线：GSI 索引引擎变更需要额外分析、文档同步和用户放行。\n- 工程流程约束：commit body、远程单测、本地测试边界。\n\n## 配置关系\n\n```mermaid\nflowchart TD\n    A[\"CLAUDE.md\"] --> B[\"constitution.md<br/>项目宪法\"]\n    A --> C[\"docs/AGENTS.md<br/>项目文档规约\"]\n    A --> D[\"doc-init skill<br/>文档写作流程\"]\n    A --> E[\"fuxi/core/service/idx/<br/>GSI 索引引擎约束\"]\n    A --> F[\"script/run_remote_ut.sh<br/>远程单测入口\"]\n    A --> G[\"~/.claude/CLAUDE.md<br/>全局 commit 规范\"]\n```\n\n`CLAUDE.md` 本身不保存完整文档制度，而是作为路由层指向权威来源。开发者或 agent 需要根据任务类型继续读取对应文件，避免在多个入口之间维护重复规则。\n\n## 核心原则导入\n\n文件开头通过：\n\n```md\n@./constitution.md\n```\n\n显式导入项目宪法。该导入被标记为“最高优先级”，意味着 agent 在分析任何问题之前，都应先加载 `constitution.md` 中的架构红线和项目原则。\n\n这里的设计意图是把稳定、长期有效的工程原则从日常协作配置中分离出来：\n\n- `constitution.md` 维护项目级不可违反原则。\n- `CLAUDE.md` 维护具体协作流程和执行约束。\n- 其他专项规则通过路径引用进入，而不是复制到本文件。\n\n## 文档写作规约\n\n本仓库所有文档规则以 [docs/AGENTS.md](./docs/AGENTS.md) 为项目级入口。任何写入 `docs/` 的动作都必须由 `doc-init` skill 主导，不能直接按普通 Markdown 修改处理。\n\n主要路径约束如下：\n\n- 新功能或重大变更：使用 `docs/changes/<slug>/`，按 `proposal → design → tasks → spec-delta → archive` 流程推进。\n- 架构决策：写入 `docs/decisions/NNNN-<topic>.md`，编号必须为 4 位，并且不跳号、不复用。\n- living spec 修改：必须经过一个 change 的 archive，不能直接改最终规格。\n- spec / spec-delta：必须使用 EARS 五种句式之一，并包含 `Scenario` 与测试路径覆盖。\n\n需要特别注意的是，`brainstorming` skill 默认输出路径 `docs/superpowers/specs/` 在本项目不适用。Compound 的设计文档必须放入对应的 `docs/changes/<slug>/` 目录，不得新建 `docs/superpowers/`。\n\n## `idx` 包专项约束\n\n`fuxi/core/service/idx/` 是 GSI 索引引擎核心实现，涉及多步非事务写入、CAS 乐观锁、中间态修复等高风险逻辑。因此 `CLAUDE.md` 对该目录设置了比普通 Go 代码更严格的变更门槛。\n\n### 文档与代码一致性\n\n任何 `idx` 包变更前，都必须先核对文档是否与代码一致。必查文档包括：\n\n- `fuxi/core/service/idx/README.md`\n- `fuxi/core/service/idx/archive/docs/compound-ops/*.md`\n- `fuxi/core/service/idx/archive/docs/reconcile-compound-ops/*.md`\n- `fuxi/core/service/idx/archive/docs/{invariants,tla-outline}.md`\n- 相关函数的 godoc，尤其是首行中的相对路径引用\n\n代码修改过程中，只要触及复合操作，对应 `compound-ops/xxx.md` 就必须同步校对决策树、分层保证、并发场景和总结图。变更后，commit body 必须列出同步更新的文档路径。\n\n合并、cherry-pick、重构后合流进 `idx` 包时，还需要执行“接收侧文档巡查”。该巡查覆盖活文档、历史快照、架构文档、API 文档和 godoc，发现缺口必须当场补齐或追加专项 commit。\n\n### 逻辑变更前分析\n\n`idx` 包中的任何逻辑变更都不能直接进入实现阶段。包括但不限于：\n\n- 新增或删除接口\n- 修改 CAS filter\n- 调整重试策略\n- 改变路由规则\n- 引入新的中间态修复路径\n\n实现前必须产出 `.claude/idx-change-<topic>.md` 中间分析材料，至少包含两部分：\n\n- 包级功能影响面分析：公开接口、调用方、内部复合操作、Simple 模式、分桶模式、合并路径、修复路径。\n- 漏洞与风险分析：至少 3 个并发交错组合、新的中间态、检测与修复路径、CAS 协议冲突、版本路由不变式、幂等约定、容量约束影响。\n\n该文件是进入实现阶段的前置产物，不能只用口头说明替代。\n\n### 显式 Review 放行\n\n`idx` 包逻辑变更在修改 `.go` 文件前，必须通过 `AskUserQuestion` 工具向用户展示：\n\n- 变更方案摘要\n- 功能影响面分析关键结论\n- 漏洞与风险分析关键结论\n- 需要新增或修改的文档清单\n- 实现步骤和每步验收标准\n\n用户明确放行前，不得修改 `fuxi/core/service/idx/` 下任何 `.go` 文件。纯文档、注释或格式调整不受该限制，但 commit message 必须注明“仅文档”。\n\n### 豁免范围\n\n以下变更不会触发 `idx` 专项流程：\n\n- 纯测试文件变更，例如 `*_test.go` 中的 mock 或断言调整。\n- 函数签名不变的 import 调整、typo 修复。\n- 用户明确授权“跳过 idx 专项流程”。\n\n## Commit 规范\n\n基础 commit 格式来自全局 `~/.claude/CLAUDE.md`。Compound 额外要求 commit body 包含文档关联信息，例如：\n\n```text\n相关文档: docs/changes/example-change/design.md\n```\n\n提交前需要确认：\n\n- `docs/` 已按规约同步更新。\n- 文档与代码一致。\n- commit message 包含文档变更说明。\n- 若涉及 `idx` 包，commit body 列出所有同步更新的文档路径。\n\n## 测试执行策略\n\nCompound 的单测优先通过远程 CI 环境执行，统一入口是：\n\n```bash\nbash script/run_remote_ut.sh\n```\n\n常见执行方式包括：\n\n```bash\n# 指定测试文件\nTEST_KIND=file TEST_FILES=./pkg/a/a_test.go bash script/run_remote_ut.sh\n\n# 指定测试包\nTEST_KIND=package TEST_PACKAGE_PATH=./pkg/foo bash script/run_remote_ut.sh\n\n# 指定目录\nTEST_KIND=directory TEST_DIRECTORY=./fuxi/core/service bash script/run_remote_ut.sh\n\n# 指定文件并匹配测试名\nTEST_KIND=file TEST_FILES=./fuxi/core/service/idx/idx_test.go PATTERN=\"TestGSI\" bash script/run_remote_ut.sh\n```\n\n测试结果写入 `.utd/runs/<latest>/`：\n\n- `report.txt`：文本报告，适合人工快速查看。\n- `report.json`：结构化报告，适合脚本或工具解析。\n\n本地测试只适用于不依赖外部服务的纯逻辑测试：\n\n```bash\ngo test ./...\n```\n\n## 与代码库的关系\n\nCompound 是视频架构元数据管理服务，模块路径为：\n\n```text\ncode.byted.org/videoarch/compound\n```\n\n技术栈为 Go 1.23、Kitex RPC 和 Hertz HTTP。`CLAUDE.md` 不直接连接这些运行时模块，但它决定 agent 如何安全地修改它们，尤其是涉及文档一致性、远程测试和高风险索引引擎变更时。\n\n开发者贡献代码时，应把 `CLAUDE.md` 看作仓库级工作流守卫：\n\n- 普通代码变更：遵守文档同步、测试执行和 commit 规范。\n- `docs/` 变更：先进入 `doc-init` 体系。\n- `fuxi/core/service/idx/` 逻辑变更：先分析、再请求用户放行、最后编码。\n- 合并或 cherry-pick 后影响 `idx`：额外执行接收侧文档巡查。","other-client":"# Other — client\n\n## fuxi/client 客户端模块\n\n`fuxi/client/` 是 Compound 与外部系统、底层存储之间的适配层。它把 Bytedoc、ODA KV、Abase、fuxi-admin、账号、视频删除、VDA、Postpone 等外部能力收敛成服务层可调用的 Go 包，并在存储类客户端中实现统一的 `iface.MetaStorage` 接口。\n\n```mermaid\nflowchart TD\n    A[\"core/service/meta\"] --> B[\"iface.MetaStorage\"]\n    B --> C[\"doc.Impl：Bytedoc\"]\n    B --> D[\"oda.Impl：ODA KV\"]\n    B --> E[\"abase.Impl：Abase2/Tos\"]\n    A --> F[\"admin：配置与索引\"]\n    G[\"core/service/idx\"] --> H[\"doc 包级 GSI 原语\"]\n    A --> I[\"postpone / vda / compound\"]\n```\n\n### 统一存储接口\n\n`doc.Impl`、`oda.Impl`、`abase.Impl` 都实现 `iface.MetaStorage`：\n\n- `QueryAttr(ctx, metaSpace, queryFilter, orderBy, limit, offset)`\n- `Count(ctx, metaSpace, queryFilter)`\n- `UpdateAttr(ctx, metaSpace, queryFilter, update, version)`\n- `DelID(ctx, namespace, queryFilter, version, cnt)`\n\n服务层通过 `iface.QueryFilter` 传递 ID 列表、`compound.Expression` 和属性类型映射，通过 `iface.UpdateWrapper` 传递 set/delete 操作。Bytedoc 会把表达式转换成 Mongo `bson.M`；ODA 和 Abase 是 KV 后端，只支持按 ID 访问。KV 后端的共同规则是：有 ID 时即使带 `expr` 也按 ID 回源并忽略表达式；无 ID 且只有表达式时返回 `iface.NotSupportedInCurrentStorage`。\n\n### admin：配置读取与注册属性索引\n\n`fuxi/client/admin` 是对 `fuxi-admin-sdk` 的薄封装，同时补齐 Compound 内部类型转换。\n\n主要入口：\n\n- `GetTTL(ctx, space, schema)`：读取 TTL 配置。\n- `GetRegAttrMap(ctx, space, name, version)`：读取注册属性类型，返回 `map[string]compound.AttrType`；SDK 返回 nil 或空 map 时返回非 nil 空 map。\n- `GetStorage(ctx, space, schema)`：把 SDK 存储类型映射到 `entity.StorageType`，未命中时返回默认 `entity.Bytedoc` 和 `ok=false`。\n- `GetBytedocCollection(ctx, space, schema)`、`GetBytedocIdx(ctx, space, schema)`：读取 Bytedoc collection、分片键和索引配置。\n- `GetIdxCfg(ctx, space, schema)`：读取当前 space/schema 的 GSI 配置，优先使用 `cctx.GetContainerOrEmpty(ctx).IdxCfg` 注入值，其次调用 `fuxi_admin.GetGSIIndexes`。\n- `GetIdxCfgBySchema(ctx, schema)`：schema-only 查询使用，只返回 `GroupTypeAll` 级 binding 的 GSI，忽略 account/space 级配置，并按 binding ID 升序稳定去重。\n- `GetIdxBucketEnabled(ctx, space, schema, indexName)`：从 `GetIdxCfg` 结果中读取索引分桶开关。\n- `GetDelFile(ctx, space, schema)`：读取 schema binding 的 `Configurations.DeleteFile`，未配置默认 false。\n\n`GetIdxCfg` 和 `GetIdxCfgBySchema` 都硬编码 `entity.IdxCfg.TxnSupported = true`，不消费 SDK 下发字段。这是 GSI 事务实现的强约束，放开时必须同步修改 idx operator 选择逻辑。\n\n注册属性查找走 `RegAttrIndex`：\n\n- `BuildRegAttrIndex(attrs)` 将 pattern 分为 literal、prefix、default 三类。\n- `Lookup(key)` 优先级固定为 literal > prefix > default。\n- 同桶内按 pattern 字符串升序排序，保证重叠 pattern 下命中稳定。\n- `FuxiAttrIndex()` 返回系统保留列索引，应优先于 `GetAdminAttrIndex(ctx, space, schema, schemaVer)` 查询。\n\n### doc：Bytedoc 存储与 GSI 原语\n\n`fuxi/client/doc` 是功能最完整的存储适配器，既实现 `iface.MetaStorage`，也提供 GSI 索引层直接使用的 BSON 原语。\n\nMetaStorage 行为：\n\n- `Count` 和 `QueryAttr` 调用 `BuildMongoFilter` 把 `compound.Expression` 转成 Mongo filter；有 ID 时把业务 ID 转成 `_id = namespace + \"::\" + id`。\n- `QueryAttr` 在表达式查询时注入 `_space`、`_schema`，帮助 Bytedoc 路由到正确分片。\n- `UpdateAttr` 使用 `BuildMongoUpdate` 生成点号键 `$set`，避免覆盖父对象；新增路径用 `BuildMongoAdd` 生成嵌套 BSON。\n- `DelID` 使用 `DelBson` 删除匹配文档；当期望删除数不满足且带版本时返回 `iface.WrongVersion`。\n- 版本冲突检测依赖 `MatchedCount`，不是 `ModifiedCount`，避免“值未变化但命中过滤器”被误判为冲突。\n\nBSON 工具函数：\n\n- `BuildMongoFilter(expr, attrMap)`：递归转换 AND/OR 和叶子条件，操作符由 `convertOperator` 映射。\n- `BuildMongoUpdate(attrs, attrMap)`：更新路径使用点号键。\n- `BuildMongoAdd(attrs, attrMap)`：插入路径生成嵌套结构。\n- `BsonToMap(data)`：把嵌套 BSON 展平成 `map[string]string`。\n- `ValidateExpression(expr)`：严格校验叶子/复合节点结构。\n- `HasConcreteFieldConstraintInAllBranches(expr, field)`：判断所有 OR 分支是否都有某字段的 EQ/IN 具体约束。\n- `ExprIdHandler(metaspace, expr)`：归一化表达式路径，并把 `_id` 值转换为 Bytedoc 文档 ID。\n\nGSI 直接使用的包级函数：\n\n- `RawUpdate(ctx, collection, space, schema, rawUpdate, filter, expectedMatched)`：透传任意 Mongo update；`expectedMatched` 非 nil 时启用 ODA `ConsistentTransaction`。\n- `TryInsert(ctx, collection, space, schema, m)`：插入单文档，唯一键冲突返回 `ErrDuplicateKey`。\n- `FindOne`、`FindAll`、`FindWithLimit`、`DeleteMany`、`CountBson`：直接操作 posting collection。\n- `FindOneAndUpdate(ctx, collection, space, schema, filter, update, upsert)`：封装 `BytedocFindOneAndUpdate`，远端未部署该 RPC 且 `upsert=true` 时降级到 `BytedocUpdateMany(Upsert=true)`。\n- `BulkWrite(ctx, collection, space, schema, ops)`：把多步 insert/update/delete 作为单 RPC 事务提交，默认 `Ordered=true` 且 `Transaction=MustTransaction`。\n\n常见错误映射：\n\n| ODA 状态 | doc 语义 |\n|---|---|\n| `402` | `ErrShardingKeyNotSet` |\n| `403` / `11000` | `ErrDuplicateKey`（部分路径映射为 `iface.WrongVersion`） |\n| `409` | `iface.WrongVersion` |\n| `511` | `iface.ErrTxnConflict` |\n| `512` | `RawUpdate`/`FindOneAndUpdate` 为 `iface.WrongVersion`，`BulkWrite` 为 `iface.ErrConsistentTxnFailed` |\n\n### oda：ODA KV 存储\n\n`fuxi/client/oda` 封装 `objectdataaccessservice.Client` 的 group/item KV 接口：\n\n- `QueryAttr` 使用 `MQueryGroups` 批量按 ID 查询。\n- `SetAttr` 使用 `UpsertGroupItem` 写属性。\n- `DelAttr` 逐个调用 `DeleteGroupItem` 删除属性。\n- `DelID` 使用 `DeleteGroup` 删除整个对象。\n- `Count` 不支持，直接返回 `iface.NotSupportedInCurrentStorage`。\n\n返回数据结构中，每个属性作为一个 `GroupItem`，实际值保存在 `Attributes[\"key\"]`。查询时会根据 `Group.CreateTime` 调用 `shield.IsShielded`，被屏蔽的 ID 不进入结果。\n\nODA KV 写路径会把 `BUSY=2` 或状态码 `2` 识别为并发更新冲突，并翻译成 `iface.WrongVersion`。对象缺失状态码 `4002` 在未指定版本时映射为 `iface.ErrObjNotFound`，指定版本时映射为 `iface.WrongVersion`。\n\n### abase：Abase2/Tos 存储\n\n`fuxi/client/abase` 也是 KV 存储实现，底层使用 ODA 的 Abase RPC：\n\n- `query(ctx, metaSpace, id, useMaster)` 调用 `cli.Get`，并用 `serializer.Unmarshal` 解析 JSON 字符串。\n- `UpdateAttr` 通过 `setAttr` 做读改写；版本控制依赖 Abase `Generation`。\n- `Add` 走 `vers.NotExists()`，直接以 create-only CAS 语义写入。\n- `DelID` 调用 `cli.Delete`，带版本时传 `Generation`。\n- `Count` 不支持。\n\n`query` 会识别 `created_at` 字段并调用 `shield.IsShielded`；如果命中屏蔽，返回 `iface.ErrObjNotFound`。`created_at` 非 int64 字符串会直接返回解析错误。\n\n### 其它外部客户端\n\n`account` 负责账号体系接入：\n\n- `loadConfig` 调用 `cli.MGetAccount`，用 `atomic.Pointer` 刷新 ID 到账号名、space 到 top account 的缓存。\n- `init` 会启动 10 分钟周期刷新，并加入随机抖动。\n- `GetAccountName`、`GetTopicAccountBySpace` 查本地缓存。\n- `GetAccountByName`、`GetAccountByID` 把 SDK `acc.ErrNotFound` 统一转成 `ErrAccountNotFound`。\n- `GetAccountMDAPDomains` 使用 `DomainDict` 把 `mdap.DomainType` 转成 account-sdk domain type。\n\n`compound` 是对 Compound 自身 Kitex 服务的跨 IDC 调用封装，提供 `SetAttr`、`DelAttr`、`Del`，都使用 `retry.DoCanAbort` 并通过 `callopt.WithIDC(idc)` 指定 IDC。\n\n`bktmeta` 只封装 `GetBucket(ctx, bucket)`，底层客户端以 `config.PSM` 作为 calling PSM 初始化。\n\n`postpone` 用于 TTL 延迟任务：`TtlTasks` 异步遍历时间戳并调用 `ttlTask`，通过 `postpone-go-sdk` 发送 `CompoundServiceTTLArgs`，实际触发 Compound 的 `TTL` 方法。\n\n`vda` 是可选的视频数据读取补充路径。`GetQueryResp(ctx, vids)` 只有在 `ifReadFromVDA(ctx)` 返回 true 时才读取 VDA；当前实现固定 false。启用后会调用 `ctxReadRawVideo` 读取 `VideoUpload`、`VideoInfo`、`VideoExtra`，再组装成 `AttrMeta` 和三维 `AttrVal` 结果。\n\n`video_delete` 封装视频删除服务，提供 `DeleteTranscodeVideo`、`DeleteVideo`、`DelVideoDup`、`CancelDelOrgVideo`、`CancelDelEncodedVideo`。这些函数会自动补 `TagID`，并对 `WrongRegion`、`VideoNotExists`、`RecordNotFound`、`AlreadyHardDeleted` 等状态做幂等化处理。\n\n### 开发注意事项\n\n这些客户端大多在包 `init` 中初始化全局 `cli`，初始化失败会 `panic`。单测通常通过 `mockey.MockValue(&cli)` 或对应 mock client 替换全局客户端。\n\n新增存储能力时优先保持 `iface.MetaStorage` 语义一致：Bytedoc 可以下推表达式和分页，ODA/Abase 只能可靠支持 ID 路径。不要让 KV 后端在无 ID 表达式场景静默返回空结果，应返回 `iface.NotSupportedInCurrentStorage`。\n\n涉及 GSI 的写路径应优先使用 `doc.RawUpdate`、`doc.FindOneAndUpdate`、`doc.BulkWrite` 等包级原语，而不是绕过 `doc` 直接调用 ODA RPC。这样可以复用统一的错误码翻译、事务选项和测试替身。","other-comm":"# Other — comm\n\n## 模块定位\n\n`fuxi/comm` 是 Fuxi 侧的通用基础模块，主要提供 Kitex 中间件、响应封装、指标上报、HLC 版本号、限流器、任务池、配置、缓存、日志和测试辅助工具。它不承载具体业务模型，但被业务入口、存储层、索引层、测试代码反复复用。\n\n## 中间件\n\n`fuxi/comm/midware` 提供两个主要中间件：\n\n`LogMidware[T resp.RespIf](key string)` 包装 Kitex `endpoint.Endpoint`，在调用前后读取 `rpcinfo.GetRPCInfo(ctx)`，记录方法名、调用方、请求、响应、耗时和错误，并通过 `metrics.ReportAPIStatus` 上报 `api_status`。它通过反射读取响应对象的 `Success` 字段，再断言为 `resp.RPCResp[T]` 取得 `BaseResp` 状态码。\n\n`DownstreamRateLimitMiddleware(next endpoint.Endpoint)` 是下游带宽限流入口。当前 `methodNeedBandwidthLimiter` 对所有方法返回 `true`。中间件会用 `harden.HardenClient.AllowNFallbackShared` 预占 `BandwidthPreQuota`，失败时调用 `setRateLimitBaseResp` 把响应写成 `set_meta_resp.BandwidthLimitExceeded`，并跳过下游调用；成功时执行 `next`，然后通过 `bandwidthLimiterCompensation` 按实际响应大小补偿超出的带宽。\n\n```mermaid\nflowchart TD\n  A[Kitex 请求进入] --> B[读取 RPCInfo: method / psm]\n  B --> C{需要带宽限流}\n  C -- 否 --> D[调用 next]\n  C -- 是 --> E{AllowNFallbackShared 预占 50}\n  E -- 失败 --> F[setRateLimitBaseResp 写限流响应]\n  E -- 成功 --> D\n  D --> G{next 是否返回错误}\n  G -- 是 --> H[向上传递错误]\n  G -- 否 --> I[extractRespSizeFromResponse]\n  I --> J[ReserveNFallbackShared 补偿超额]\n```\n\n限流响应依赖 Kitex result 的常见结构：外层响应实现 `GetResult() interface{}`，内部 success 对象实现 `GetOrSetBaseResp() interface{}`，并且外层结构存在名为 `Success` 的字段。响应大小提取要求 `GetResult()` 返回值实现 `msgp.Sizer`，否则大小按 `0` 处理。\n\n## 响应封装\n\n`fuxi/comm/utils/resp` 把业务返回码和 Kitex `BaseResp` 的转换集中起来：\n\n- `Result` / `NewResult()`：为每个定义的结果分配递增 ID。\n- `ResultBase[T]`：用 `NewResultBase[T]()` 创建结果注册表，通过 `NewResp(res, code, msg)` 注册 `Resp[T]`。\n- `Resp[T]`：保存 `Code`、`Msg` 和 `Result`，提供 `WithMsgF`、`WithMsgE`、`ToBaseResp`。\n- `RPCResp[T]`：要求响应类型实现 `GetBaseResp() T`。\n- `RespIf`：约束 `BaseResp` 必须支持 `GetStatusMessage`、`GetStatusCode`、`SetStatusMessage`、`SetStatusCode`。\n\n`Resp.ToBaseResp(ctx)` 使用 `generic.Init[T]()` 创建目标 `BaseResp`，并写入状态码和状态信息。非零状态码会通过 `log.PrintE` 打印错误响应日志。`GetRespByCode[T](code)` 用于指标上报时把状态码映射回注册过的消息。\n\n## 指标上报\n\n`fuxi/comm/utils/metrics` 封装 `code.byted.org/gopkg/metrics/v3`。`newMetrics` 创建带固定 tag 列表的 `Metric`，`newTag` 会通过 `EscapeTagValueSimple` 统一清理 tag 值，空字符串会变成 `EMPTY_VALUE`。\n\n主要上报函数包括：\n\n- `ReportAPIStatus(ctx, method, space, schema, status, cost)`：上报 API 耗时和 QPS，tag 包含 `method`、`caller`、`space`、`schema`、`storage_policy`、`fed`、`status`。\n- `ReportAttrFormatInvalid(ctx, method, space, schema, reason)`：记录属性格式错误。\n- `ReportGSIOps`、`ReportGSIQueryBucketCount`、`ReportGSIAsyncPoolActive`、`ReportGSIAsyncPoolRejected`：记录 GSI 操作、查询桶数量和异步池状态。\n- `ReportSetAttrStage`：按微秒记录 SetAttr 各阶段耗时。\n- `ReportMDAPStartProcessing`：记录 MDAP 开始处理事件。\n- `RecordShielded`：记录 shielded 状态。\n- `ReportTTL`：当前实现使用 `ApiStatus` 指标名上报 TTL 相关状态。\n\n测试中可调用 `metrics.Mock()` 切换到内存记录模式，再用 `PopRecords(name)` 取出 `MetricsRecord` 断言 tag 和 value。\n\n## HLC 版本号\n\n`fuxi/comm/utils/hlc` 实现混合逻辑时钟。`HLC` 内部包含 `physicalTime`、`logical` 和 `encoding`。当前 V1 编码使用毫秒时间戳，高位存物理时间，低 16 位中 `bit[15:14] == 01` 表示 V1，剩余 14 位是 logical counter。\n\n常用入口：\n\n- `ParseInt64Str(str)`：从十进制字符串解析 HLC。\n- `IsV1Encoding(v)`：判断 int64 是否为合法 V1 编码。\n- `New(remoteHLC)`：基于远端 HLC 推进本地 V1 时钟。\n- `ToInt64()` / `ToInt64Str()`：编码为 int64 或字符串。\n- `NewerThan(a, b)` / `OlderThan(a, b)`：比较两个 int64 编码版本。\n- `HLC.NewerThan(other)`：比较两个已解析 HLC。\n\n迁移兼容规则很重要：V0 是旧版纳秒编码，可能因为截断出现负值或很大的正值；跨 V0/V1 比较时，代码明确认为 V1 永远比 V0 新，不能直接用裸 `int64` 大小判断。\n\n## 并发与限流工具\n\n`limiter.NewParallelLimit[T](limit)` 创建可动态调整的并发限制器。`Run(f)` 在当前运行数小于 limit 时执行函数并返回 `(executed=true, res, err)`；达到限制时返回 `executed=false` 和类型零值。`UpdateLimit(n)` 会更新后续调用的并发上限。\n\n`limiter.NewSlidingWinRateLimiter(percentage, windowSize)` 创建按秒窗口统计的滑动窗口比例限流器。调用方先用 `Put()` 记录进入量，再用 `TryAcquire()` 消费允许释放的额度。每个窗口的可释放数量是 `putCount * percentage / 100`，旧窗口会在超过 `windowSize` 后清理。\n\n`pool.New(size)` 创建轻量异步任务池，`Submit(fn)` 非阻塞提交，池满返回 `false`。任务 goroutine 内部会 `recover()`，保证 panic 后释放信号量。`RetryPool` 在 `Pool` 上增加 `SubmitRetry(fn func() error)`，失败后用指数退避和 ±25% jitter 重试；退避等待期间不占用池槽位，`Wait()` 只等待当前已经提交并运行中的任务，不等待尚未触发的 timer。\n\n## 通用工具\n\n`comm` 包提供上下文和 URI 辅助：`Ctx()` 创建带 `K_LOGID` 的 background context，`ExtractCaller(ctx)` 从 Kitex RPCInfo 读取调用方 PSM，`ExtractFromURI(uri)` 支持 `s3://bucket/object`、`az://bucket/object`、`oss://bucket/object` 和裸 `bucket/object`，`ExtractBkt(ctx, uri)` 只返回 bucket。\n\n`clock` 包提供测试时间控制：`Mock(t)` monkey patch `time.Now`，`FreezeAt(ts, ns)` 固定时间，`UpdateOffSet(d)` 添加偏移，`Demock(t)` 复原。`Overflow2038(times...)` 用于检测 Unix 秒是否超过 2038 边界。\n\n`conf` 包封装 TCC：`GetConfig`、`GetOrDef`、`GetOrPanic`、`GetWithJSON[T]`、`GetWithYAML[T]` 负责读取和解析配置。`ConfStack` 支持测试 mock 配置，`Mock` 写入当前批次，`Submit` 开启下一批，`Demock` 回退。\n\n`cache` 包定义 `Cache` 接口和 `InitCache`，底层使用 `vfastcache`。注意包级 `SetN`、`GetN`、`DelN` 当前受全局 `Disable = true` 控制，默认不会访问本地缓存；直接使用 `InitCache` 返回的实例才会执行实际缓存操作。\n\n`maps.NewTreeMap[K,V]` 基于红黑树实现 `SortedMap`，支持 `Min`、`Max`、`Floor`、`LowerThan`、`Ceiling`、`GreaterThan`。`generic.Zero[T]` 返回类型零值，`generic.Init[T]` 对指针类型返回指向零值的新指针。`errs.New` 和 `errs.Wrap` 会把调用文件、行号、函数名拼进错误信息，`CausedBy` 沿 `Cause()` 链查找根因。\n\n## 测试辅助与生成代码\n\n`utils/ast` 是测试断言包，提供 `Equal`、`NoErr`、`Err`、`Nil`、`LenSli`、`SliceEqIgnOrder` 等函数；`DetailedDiff` 能递归比较 struct、slice、map、pointer，并对疑似二进制字符串输出 base64 diff。\n\n`utils/test_utils/kitex_gen` 是测试用 Kitex 生成代码，包含 `base.BaseResp`、`comm.HelloReq`、`comm.HelloResp`、`helloservice.NewClient`、`helloservice.NewServer` 等类型和客户端/服务端包装。业务代码不应依赖这些测试生成类型；它们主要用于验证 `resp` 和中间件对 Kitex 响应结构的兼容性。","other-compound":"# Other — compound\n\n## compound 配置模块\n\n`conf/compound` 是 compound 服务的运行时配置目录。本模块不包含业务代码、函数、类或执行流程；它通过 YAML 文件为服务启动、外部依赖开关、消息消费和日志行为提供默认配置。\n\n当前模块包含两个配置文件：\n\n- `conf/compound/base.yml`：业务依赖与消息通道配置。\n- `conf/compound/kitex.yml`：Kitex 服务监听、debug server 和日志配置。\n\n调用图中没有检测到内部调用、外部调用或入站调用，说明这里是纯配置模块，运行时由代码库中的配置加载机制读取，而不是通过函数调用链直接执行。\n\n## 配置结构\n\n```mermaid\nflowchart TD\n    A[compound 配置] --> B[base.yml]\n    A --> C[kitex.yml]\n    B --> D[Redis 依赖]\n    B --> E[外部 Client 开关]\n    B --> F[MQ / Dbus 消费]\n    C --> G[Kitex 服务监听]\n    C --> H[Debug Server]\n    C --> I[日志 Logger]\n```\n\n## `base.yml`\n\n`base.yml` 定义 compound 服务依赖的外部组件默认配置。所有外部依赖默认都是关闭状态，适合作为基础配置或本地开发的安全默认值。\n\n### `RawVideoInfoRedis`\n\n```yaml\nRawVideoInfoRedis:\n    Enable: false\n    Cluster: \"\"\n    DialTimeout: \"100ms\"\n    ReadTimeout: \"10ms\"\n    WriteTimeout: \"100ms\"\n    PoolSize: 200\n    KeyPrefix: \"raw_video_info:\"\n```\n\n用于配置原始视频信息相关 Redis 访问。\n\n关键字段：\n\n- `Enable`：是否启用该 Redis 依赖。默认 `false`。\n- `Cluster`：Redis 集群名，默认空字符串。\n- `DialTimeout`：建立连接超时时间，默认 `100ms`。\n- `ReadTimeout`：读超时时间，默认 `10ms`。\n- `WriteTimeout`：写超时时间，默认 `100ms`。\n- `PoolSize`：连接池大小，默认 `200`。\n- `KeyPrefix`：Redis key 前缀，默认 `raw_video_info:`。\n\n贡献代码时需要注意：如果业务代码依赖该 Redis，必须处理 `Enable: false` 的场景，不能假设 Redis client 一定存在。\n\n### `ObjectDuplicationRedis`\n\n```yaml\nObjectDuplicationRedis:\n    Enable: false\n    Cluster: \"\"\n    DialTimeout: \"100ms\"\n    ReadTimeout: \"10ms\"\n    WriteTimeout: \"100ms\"\n    PoolSize: 200\n    KeyPrefix: \"object_duplication:\"\n```\n\n用于配置对象去重相关 Redis 访问。\n\n字段语义与 `RawVideoInfoRedis` 基本一致，区别是默认 key 前缀为 `object_duplication:`。这两个 Redis 配置应被视为不同业务域的存储配置，不应混用 key 前缀。\n\n### `VDAClient`\n\n```yaml\nVDAClient:\n    Enable: false\n```\n\n控制 VDA client 是否启用。当前配置只提供启停开关，没有服务地址、超时或重试等细节字段。\n\n### `ODMClient`\n\n```yaml\nODMClient:\n    Enable: false\n```\n\n控制 ODM client 是否启用。与 `VDAClient` 一样，当前模块只声明开关。\n\n### `VDARMQ`\n\n```yaml\nVDARMQ:\n    Enable: false\n    Cluster: \"\"\n    Topic: \"\"\n    ConsumerGroup: \"\"\n    WorkNum: 10\n    Orderly: true\n```\n\n配置 VDA 相关 RMQ 消费。\n\n关键字段：\n\n- `Enable`：是否启用消费。\n- `Cluster`：消息队列集群。\n- `Topic`：消费 topic。\n- `ConsumerGroup`：消费组。\n- `WorkNum`：worker 数量，默认 `10`。\n- `Orderly`：是否顺序消费，默认 `true`。\n\n如果后续代码启用该消费链路，需要确保 `Cluster`、`Topic`、`ConsumerGroup` 在对应环境配置中被覆盖；基础配置中的空字符串不能直接用于生产消费。\n\n### `ODADbus`\n\n```yaml\nODADbus:\n    Enable: false\n    Cluster: \"\"\n    Topic: \"\"\n    ConsumerGroup: \"\"\n    WorkNum: 10\n    Orderly: true\n```\n\n配置 ODA 相关 Dbus 消费。字段结构与 `VDARMQ` 一致。\n\n`VDARMQ` 和 `ODADbus` 都默认关闭，并且都采用顺序消费。修改 `Orderly` 会影响消息处理并发模型，提交前需要确认对应业务处理是否依赖消息顺序。\n\n## `kitex.yml`\n\n`kitex.yml` 定义 compound 服务的 Kitex 运行配置。\n\n```yaml\nAddress: \":8888\"\nEnableDebugServer: true\nDebugServerPort: \"18888\"\n```\n\n服务默认监听 `:8888`。Debug server 默认开启，端口为 `18888`。\n\n开发者需要注意：\n\n- `Address` 是服务对外监听地址。\n- `EnableDebugServer` 控制 debug server 是否启动。\n- `DebugServerPort` 是字符串类型端口配置。\n\n## 日志配置\n\n`kitex.yml` 中的 `Log` 节点定义日志目录和 logger。\n\n```yaml\nLog:\n  Dir: log\n  Loggers:\n    - Name: default\n      Level: info\n      Outputs:\n        - File\n        - Agent\n    - Name: rpcAccess\n      Level: trace\n      Outputs:\n        - File\n        - Agent\n    - Name: rpcCall\n      Level: trace\n      Outputs:\n        - File\n        - Agent\n```\n\n### `default`\n\n默认业务日志 logger：\n\n- `Name: default`\n- `Level: info`\n- 输出到 `File` 和 `Agent`\n\n本地开发如需更细日志，可以将级别改为 `debug`，但生产环境不建议随意开启更低级别日志。\n\n### `rpcAccess` 和 `rpcCall`\n\nRPC 访问与调用链相关 logger：\n\n- `rpcAccess`\n- `rpcCall`\n\n二者默认都是 `trace` 级别，并输出到 `File` 和 `Agent`。配置注释明确说明不建议修改，否则可能影响调用链构建和 tracing。\n\n## 配置覆盖与环境差异\n\n`kitex.yml` 中 `Log.Dir` 的注释说明：环境变量 `KITEX_LOG_DIR` 的优先级高于 YAML 中的 `Dir`。\n\n因此实际日志目录的优先级应按运行环境判断：\n\n1. 如果设置了 `KITEX_LOG_DIR`，使用环境变量值。\n2. 否则使用 `kitex.yml` 中的 `Log.Dir: log`。\n\n`base.yml` 中大量字段为空或关闭，说明它更像基础默认配置。不同环境通常需要通过环境配置、配置中心或部署系统覆盖以下字段：\n\n- Redis 的 `Enable`、`Cluster`\n- MQ/Dbus 的 `Enable`、`Cluster`、`Topic`、`ConsumerGroup`\n- 外部 client 的 `Enable`\n\n## 贡献注意事项\n\n新增外部依赖配置时，建议保持本模块现有模式：\n\n```yaml\nSomeDependency:\n    Enable: false\n```\n\n如果依赖需要连接池、超时、集群或 key 前缀，应显式声明默认值，避免业务代码依赖隐式默认行为。\n\n修改现有配置时重点检查：\n\n- 默认是否应该保持关闭。\n- 空字符串是否会被运行时代码正确拦截。\n- 超时时间是否符合调用链预算。\n- logger 名称是否被框架或 tracing 逻辑依赖。\n- `rpcAccess` 和 `rpcCall` 的级别是否会影响链路追踪。\n\n本模块本身没有可执行逻辑，因此测试重点不在单元测试，而在配置加载、环境覆盖和服务启动验证。","other-conf":"# Other — conf\n\n## 模块概览\n\n`conf/service_inline_config.yaml` 是服务内联工具的配置文件，用于声明当前仓库服务与外部依赖服务之间的内联关系。该模块不包含 Go/TypeScript/Python 等可执行代码，也不定义函数或类；它的行为由外部 Service Inline Tool 读取 YAML 后驱动。\n\n当前配置将主服务 `bytedance.videoarch.compound` 与非主服务 `bytedance.videoarch.object_data_access` 关联起来，使内联工具可以在处理 Compound 服务时同步拉取并应用 `object_data_access` 的配置。\n\n## 配置入口\n\n文件顶部的 `tool_version` 指定服务内联工具版本：\n\n```yaml\ntool_version: 1.0.0.1428\n```\n\n`services` 是核心配置列表，包含一个主服务和一个非主服务：\n\n```yaml\nservices:\n  - is_main: true\n    namespace: \"bytedance_videoarch_compound\"\n    psm: \"bytedance.v
