var PAGES = {"admin-api-and-schema-management":"# Admin API and Schema Management\n\n## 模块概览\n\nAdmin API and Schema Management 模块位于 `fuxi/fuxi_admin`，负责启动 Fuxi Admin HTTP 服务，并提供两类能力：\n\n1. 旧版 Schema 管理接口：围绕 `schema.Manager` 管理 schema 创建、查询、启用、代码生成和校验。\n2. 新版 Scope 配置管理接口：以 `group_type + group_name + schema_name` 为天然键，管理 schema definition、schema binding 和 binding configuration。\n\n服务入口是 `main.main()`。启动时会初始化 Hertz 服务、挂载 `LogMiddleware()` 和 `FederationProxyMiddleware()`，随后通过 `register()` 调用 `customizedRegister()` 注册路由，并在注册阶段完成配置加载、DAL 初始化和业务 handler 构造。\n\n```mermaid\nflowchart TD\n    A[\"main.main\"] --> B[\"byted.Default\"]\n    B --> C[\"LogMiddleware\"]\n    B --> D[\"FederationProxyMiddleware\"]\n    B --> E[\"customizedRegister\"]\n    E --> F[\"configs.New / Config.Init\"]\n    E --> G[\"dal.NewDal / Dal.Init\"]\n    E --> H[\"schema.NewDefaultManager\"]\n    E --> I[\"新版 Admin API handlers\"]\n```\n\n## 启动与路由注册\n\n`main.go` 定义了配置目录环境变量：\n\n- `KITEX_CONF_DIR`：由 `GetConfDir()` 读取，默认值为 `conf`。\n- `KITEX_CONF_FILE`、`KITEX_LOG_DIR` 在当前文件中只定义常量，未参与启动逻辑。\n- `DefaultConfFile` 为 `kitex.yml`，`DefaultLogDir` 为 `log`。\n\n`customizedRegister(r *server.Hertz)` 是核心路由注册点。它先注册 `/ping`，再加载配置：\n\n```go\ncfg := configs.New(GetConfDir())\nif err := cfg.Init(); err != nil {\n    panic(err)\n}\n\ndal := dal.NewDal(cfg)\nif err := dal.Init(); err != nil {\n    panic(err)\n}\n```\n\n`cfg.Init()` 会通过 Caesar/TCC 加载配置，并调用 `validateRegisteredFeds()` 校验 TCC key `registered_feds` 不是空列表。`dal.Init()` 会初始化数据库访问层，并在执行流中设置表名前缀、初始化 query 对象和 `AttrSchema` 相关访问对象。\n\n## 接口分组\n\n### 旧版 Schema 接口\n\n旧版接口由 `handler.SchemaService` 提供，底层依赖 `schema.Manager`，默认实现为 `schema.DefaultManager`。\n\n| 方法 | 路径 | Handler | 说明 |\n|---|---|---|---|\n| `PUT` | `/schemas/:name` | `CreateSchema` | 创建 schema，返回版本号 |\n| `GET` | `/schemas/:name/*version` | `QuerySchema` | 按名称和可选版本查询 schema |\n| `PUT` | `/spaces/:space/schemas/:name` | `EnableSchema` | 为 space 启用 schema |\n| `GET` | `/spaces/:space/schemas` | `QuerySchemaByProvider` | 查询 space 下启用的 schema |\n| `GET` | `/spaces/_all/schemas` | `QueryAllSettings` | 查询全部 space/schema 绑定关系 |\n| `GET` | `/schemas/_all` | `QueryAllSchemas` | 查询全部 schema |\n| `GET` | `/generate/:name/:version` | `GenerateCode` | 从 JSON Schema 生成 Go struct 代码 |\n| `POST` | `/validate` | `Validate` | 当前固定返回 `not supported` |\n\n旧版链路的核心模型是 `schema.Schema`。创建时会依次执行：\n\n1. `Schema.Expand()`：当前实现只把 `NativeSchema` 复制到 `FullSchema`。\n2. `Schema.SelfValidate()`：校验 `FullSchema` 非空、是合法 JSON，并能反序列化为 `fuxi-schema-validator.Schema`。\n3. `Schema.GenVersion()`：使用 `uuid.NewUUID()` 生成 time-based UUID。\n4. `DefaultManager.Create()`：写入 `dalModel.AttrSchema`。\n\n`DefaultManager.GenerateCodeFromSchema()` 会先调用 `Query()` 获取目标 schema，再调用 `utils.ConvertJsonSchema2Struct(schema, \"model\")`，由 `fuxi-schema-generator` 生成 Go 代码。\n\n### 新版 Admin API\n\n新版接口统一使用 `/admin/api/v1/` 前缀，并返回 `adminapi.SuccessResponse` 或 `adminapi.ErrorResponse` 风格的 JSON。注意：这些接口多数业务错误仍使用 HTTP 200 返回，真实结果码放在响应体 `status_code` 中。\n\n| 领域 | 方法 | 路径 | Handler |\n|---|---|---|---|\n| Schema Definition | `POST` | `/admin/api/v1/create_one_schema_definition` | `CreateSchemaDefinition` |\n| Schema Definition | `GET` | `/admin/api/v1/get_one_schema_definition` | `GetSchemaDefinitionByVersion` |\n| Schema Definition | `GET` | `/admin/api/v1/list_schema_definitions` | `ListSchemaDefinitions` |\n| Schema Binding | `POST` | `/admin/api/v1/create_one_schema_binding` | `CreateSchemaBinding` |\n| Schema Binding | `GET` | `/admin/api/v1/get_one_schema_binding` | `GetSchemaBindingByGroup` |\n| Schema Binding | `GET` | `/admin/api/v1/list_schema_bindings` | `ListSchemaBindings` |\n| Configuration | `POST` | `/admin/api/v1/update_binding_configuration` | `UpdateBindingConfiguration` |\n| Configuration | `GET` | `/admin/api/v1/get_one_configuration_history` | `GetConfigurationHistory` |\n\n## Schema Definition\n\n`SchemaDefinitionService` 管理 schema 定义版本。请求和响应类型定义在 `adminapi/types.go`：\n\n- `CreateSchemaDefinitionRequest`\n- `SchemaDefinitionResponse`\n\n`CreateSchemaDefinition()` 从 request body 解析 `schema_name` 和 `schema_value`，并从 header `x-vpaas-operator-name` 覆盖 `author`。它只做轻量格式校验：`schema_value` 去空白后必须以 `{` 开始、以 `}` 结束；不会像旧版 `Schema.SelfValidate()` 一样反序列化为 validator schema。\n\n创建成功后写入 `dal.SchemaDefinitions.Create(ctx, schema)`，版本号由 `uuid.NewUUID()` 生成，响应数据只包含：\n\n```json\n{\n  \"id\": 123,\n  \"version\": \"生成的版本号\"\n}\n```\n\n`GetSchemaDefinitionByVersion()` 支持两种查询方式：\n\n- 优先按 `id` 查询：`dal.SchemaDefinitions.GetByID(ctx, id)`。\n- 未提供 `id` 时，按 `schema_name` 查询；如果 `version` 为空，调用 `GetLatestByName()`，否则调用 `GetByNameVersion()`。\n\n`ListSchemaDefinitions()` 支持 `schema_name` 模糊搜索和 `only_latest=true`。`filterLatestVersions()` 在内存中按 `CreatedAt` 选择每个 `schema_name` 的最新版本，并按 `SchemaName` 排序。\n\n## Schema Binding\n\n`SchemaBindingService` 管理 scope 到 schema version 的绑定关系。scope 由 `adminapi.GroupType` 表示：\n\n- `space`\n- `account`\n- `@all`\n\n`GroupType.IsValid()` 只接受以上三个值。`@all` 是特殊全局 scope，创建和查询时都会把 `group_name` 规范化为 `\"all\"`。\n\n`CreateSchemaBinding()` 的执行流程：\n\n1. 读取 body 并反序列化为 `CreateSchemaBindingRequest`。\n2. 从 `x-vpaas-operator-name` 读取 `Author`。\n3. 调用 `validateCreateRequest()` 校验必填字段、`group_type` 合法性和 `Configurations`。\n4. 调用 `config.ValidateConfigurations()` 校验配置内容。\n5. 调用 `ensureConfiguredCollectionsUnique()` 校验 GSI 全局唯一性和 collection shape 一致性。\n6. 构造 `dalModel.SchemaBindings`。\n7. 调用 `dal.SchemaBindings.CreateWithConfig(ctx, binding, req.Configurations, req.Author)` 在事务中创建 binding 和首版配置。\n8. 返回新 binding 的 `ID`。\n\n`GetSchemaBindingByGroup()` 使用 `group_type + group_name + schema_name` 查询单个 binding，并通过 `getLatestConfigurationsForResponse()` 附带最新配置。配置不存在时如果 DAL 返回 `dal.IsConfigurationNotFound(err)`，接口会返回 `Configurations: nil`，不会把它作为失败处理。\n\n`ListSchemaBindings()` 根据 query 参数选择不同 DAL 查询：\n\n- 三个参数都有：`GetByGroup()`\n- 只有 `schema_name`：`ListBySchema()`\n- 有 `group_type + group_name`：`ListByGroup()`\n- 只有 `group_type`：`ListByGroupType()`\n- 都没有：`List()`\n\n## Configuration\n\n`ConfigurationService` 负责更新 binding 配置和读取配置历史。\n\n`UpdateBindingConfiguration()` 使用 `UpdateBindingConfigurationRequest`，要求：\n\n- `id` 非 0。\n- `configurations` 非空。\n- `author` 非空；通常来自 `x-vpaas-operator-name`。\n- `config.ValidateConfigurations(req.Configurations)` 通过。\n- `ensureConfiguredCollectionsUniqueForUpdate(ctx, req.ID, req.Configurations)` 通过。\n\n更新配置时不会覆盖旧记录，而是调用 `dal.Configurations.UpdateWithCAS(ctx, req.ID, req.Configurations, req.Author)` 创建新版本。CAS 细节在 DAL 层实现，handler 只负责参数和业务约束校验。\n\n`GetConfigurationHistory()` 从 query 参数 `id` 解析 binding ID，调用 `dal.Configurations.GetHistory(ctx, bindingID)` 获取历史记录和反序列化后的配置列表，然后组装为 `ConfigurationHistoryResponse`。每条历史记录包含 `version`、`created_at`、`author` 和当时的 `configurations`。\n\n## 配置结构与校验规则\n\n`adminapi.Configurations` 是新版配置的核心结构，当前支持：\n\n- `storage_policy`\n- `bytedoc_config`\n- `abase_config`\n- `tos_config`\n- `ttl_config`\n- `cdc_event`\n- `delete_file`\n- `gsi_indexes`\n\n`StoragePolicy.IsValid()` 接受 `tos`、`abase`、`oda`、`Bytedoc`。`config.ValidateConfigurations()` 会根据不同存储策略检查对应配置：\n\n- `Bytedoc`：要求 `bytedoc_config`、`route_table_id`、非空 `shard_key`；唯一索引的 `fields` 必须以 `shard_key` 为前缀。\n- `abase`：要求 `abase_config`、`route_table_id`、`db_name`、`table_name`。\n- `tos`：要求 `tos_config` 和 `tos_config.storage.bucket`。\n- `oda`：当前只校验 storage policy 合法，没有专属配置校验。\n\nGSI 校验集中在 `ValidateConfigurations()` 和 `collection_uniqueness.go`：\n\n- `gsi_indexes[i].name` 不能为空，去空白后用于重复判断。\n- `columns` 不能为空，列名不能为空，同一索引内不能重复。\n- `is_uniq` 和 `bucket_enabled` 互斥。\n- 每个索引最多允许一个包含 `*` 的通配列。\n- 唯一索引默认不允许通配列；可通过 TCC key `allow_unique_wildcard_gsi` 打开。\n- `collection` 必填。\n- 同一 pending 配置内 GSI name 不能重复。\n- 跨 binding 的 GSI name 不能重复。\n- 同一个 `collection` 不能同时被 simple GSI 和 bucketed GSI 使用。\n\nGSI 冲突会通过 `gsiNameConflictError` 暴露结构化错误详情。`adminapi.ErrorResponse()` 会识别实现了 `ErrorDetails() []ErrorDetail` 的错误，并把字段路径、冲突 binding、冲突 group/schema 等信息写入响应体 `details`。\n\n## GSI 唯一性与 Collection Shape\n\n`ensureConfiguredCollectionsUnique()` 用于创建 binding，`ensureConfiguredCollectionsUniqueForUpdate()` 用于更新配置。两者最终都会进入 `ensureConfiguredCollectionsUniqueWithBindings()`。\n\n更新时会先读取当前 binding 的最新 raw configuration，并用 `isRawGSIIndexesModified()` 判断 `GSIIndexes` 是否实际变化。如果没有变化，则跳过全局扫描，避免无意义的冲突检查。\n\n核心检查由 `ensurePendingGSINamesUniqueWithLoader()` 完成：\n\n1. `ensurePendingGSINameSelfUnique()` 检查 pending 配置内 name 重复。\n2. `ensureCollectionShapeConsistentSelf()` 检查 pending 内同 collection 的 simple/bucketed 混用。\n3. 批量加载其他 binding 的最新 raw configuration。\n4. 跨 binding 比较 GSI name。\n5. `checkCollectionShapeCrossBinding()` 检查跨 binding 同 collection 的 simple/bucketed 混用。\n\n这里使用的是 raw `adminapi.Configurations`，不是派生后的运行时配置；因此校验与用户提交的管理面配置保持一致。\n\n## 响应与错误模型\n\n新版 Admin API 使用 `adminapi.BaseResponse` 和 `adminapi.DataResponse`：\n\n```json\n{\n  \"data\": {},\n  \"status_code\": 0,\n  \"status_message\": \"OK\"\n}\n```\n\n`adminapi.ErrorResponse(err)` 会把 `errs.Err` 映射为管理面状态码：\n\n- `errs.Success` → `0`\n- `errs.ErrInvalidRequest`、`errs.ErrInvalidSchema`、`errs.ErrInvalidProperty` → `40001`\n- `errs.ErrInternal`、cache 错误及未知 5xxxx → `50001`\n- `errs.ErrReadDB`、`errs.ErrWriteDB` → `50002`\n\n旧版 `SchemaService` 使用 `errs.StatusCode(err)` 和 `errs.ToBaseResp(err)`，HTTP 状态码会从 `errs.Code` 推导，例如 `40000 / 100 = 400`。新版 Admin API 则通常固定 `errs.StatusCodeOK`，由 body 中的 `status_code` 表达业务失败。\n\n## 联邦代理中间件\n\n`FederationProxyMiddleware()` 只在 `env.Cluster() == \"default\"` 时生效，并且只处理 `/admin/api/v1/` 前缀的新版 Admin API。\n\n请求带 `?federation=目标集群` 时：\n\n1. 如果目标为空或为 `default`，继续走本地 handler。\n2. 如果请求已带 `x-fuxi-proxy-hop`，返回 `proxy loop detected`，防止循环代理。\n3. 移除 query 中的 `federation` 参数。\n4. 构造到 `http://bytedance.videoarch.fuxi_admin{path}` 的 upstream 请求。\n5. 设置 `discovery.WithDestinationCluster(targetCluster)`，通过服务发现路由到目标联邦集群。\n6. 显式复制 upstream response 的 header、status code 和 body 到当前响应。\n\n该中间件让 default 集群承担控制面入口，同时把具体联邦的数据写入请求转发到对应集群。\n\n## 与代码库其他部分的关系\n\n本模块本身不直接实现数据库细节，而是通过 `dal` 包访问持久化对象：\n\n- 旧版 schema 使用 `dalModel.AttrSchema` 和 `DefaultManager` 中的 `m.dal.Create()`、`QuerySchemaByName()`、`QueryAllSchemasFromDB()` 等方法。\n- 新版 schema definition 使用 `dal.SchemaDefinitions`。\n- 新版 binding 使用 `dal.SchemaBindings`。\n- 新版配置版本使用 `dal.Configurations`。\n\n配置加载由 `configs.Config` 负责，依赖 TCC/Caesar，并在启动时校验 `registered_feds`。存储策略和 GSI 行为的业务校验放在 `config.ValidateConfigurations()`，handler 在写 DAL 前统一调用它。\n\n贡献这个模块时，应优先保持以下边界：\n\n- Handler 负责 HTTP 参数解析、响应包装、日志和业务前置校验。\n- `adminapi` 只放请求/响应结构、枚举和响应转换逻辑。\n- `config` 放配置内容的纯校验逻辑。\n- `collection_uniqueness.go` 放跨 binding 的 GSI 全局约束。\n- `schema` 包维护旧版 `schema.Manager` 抽象和 schema 生命周期逻辑。\n- DAL 细节保持在 `fuxi_admin/dal`，不要在 handler 中拼 SQL 或绕过 DAL。","admin-persistence-layer":"# Admin Persistence Layer\n\n## 管理端持久化层\n\n管理端持久化层位于 `fuxi/fuxi_admin/dal`，负责把 Fuxi Admin 的 Schema、绑定关系和运行配置落到 MySQL。它基于 GORM 和 `gorm.io/gen` 生成的强类型 Query API，对上层 handler/service 暴露较窄的 DAL 方法，对下屏蔽表名、事务、JSON 序列化和错误包装细节。\n\n核心数据包括：\n\n- `AttrSchema`：旧版属性 Schema 表，对应 `attr_schema`。\n- `ProviderSetting`：旧版 provider 到 schema 的启用关系，对应 `provider_setting`。\n- `SchemaDefinitions`：新版 Schema 定义和版本历史，对应 `schema_definitions`。\n- `SchemaBindings`：分组到 Schema 版本的绑定关系，对应 `schema_bindings`。\n- `Configurations`：绑定关系上的配置版本历史，对应 `configurations`。\n\n```mermaid\nflowchart TD\n    A[\"服务启动<br/>customizedRegister\"] --> B[\"Dal.Init\"]\n    B --> C[\"setupTablePrefix\"]\n    C --> D[\"query.Use\"]\n    C --> E[\"ApplyTablePrefix\"]\n    D --> F[\"全局 q\"]\n    E --> F\n    F --> G[\"SchemaDefinitions / SchemaBindings / Configurations DAL\"]\n    G --> H[\"MySQL 表\"]\n```\n\n## 初始化与全局 Query\n\n入口是 `NewDal(cfg)` 和 `(*Dal).Init()`：\n\n```go\nd := dal.NewDal(cfg)\nif err := d.Init(); err != nil {\n    return err\n}\n```\n\n`NewDal` 只保存配置，不建立数据库连接。真正的初始化在 `Init` 中完成：\n\n1. 校验 `cfg`、`cfg.FuxiDB`、`FuxiDB.PSM`、`FuxiDB.DB`。\n2. 使用 `bytedgorm.MySQL(dbpsm, dbname)` 构造 MySQL dialector。\n3. 设置连接超时、读超时、写超时为 `1 * time.Second`。\n4. 调用 `gorm.Open` 建立连接。\n5. 调用 `setupTablePrefix(db)` 初始化 `gorm/gen` 的 `query.Query`。\n6. 将返回的 Query 同时写入 package 级全局变量 `q` 和当前 `Dal.query`。\n7. 记录实际表名日志。\n8. 随机 sleep 0-9 秒，用于服务启动时打散请求。\n\n`q` 是这个包里新版 DAL 的主要数据库入口，例如：\n\n```go\nq.SchemaDefinitions.WithContext(ctx).Find()\nq.SchemaBindings.WithContext(ctx).Where(...).First()\nq.Configurations.WithContext(ctx).Create(config)\n```\n\n旧版 `Dal` 方法则多数使用 `d.query`：\n\n```go\nd.query.AttrSchema.WithContext(ctx).Create(schema)\nd.query.ProviderSetting.WithContext(ctx).Find()\n```\n\n因此，调用 `SchemaDefinitions`、`SchemaBindings`、`Configurations` 这些 package 级 DAL 单例前，必须确保已经执行过 `Dal.Init()`，否则全局 `q` 不可用。\n\n## 表前缀机制\n\n持久化层支持通过 `cfg.FuxiDB.TablePrefix` 给所有表加前缀。这个逻辑分两层实现：\n\n- `TablePrefixPlugin`：GORM callback 插件，在 Create / Query / Update / Delete / Raw / Row 执行前修改 `db.Statement.Table`。\n- `query.ApplyTablePrefix(prefix)`：修改 `gorm/gen` Query 对象中预先绑定的表名和字段限定名。\n\n只依赖 GORM callback 不够，因为 `gorm/gen` 的字段表达式在 `query.Use(db)` 时已经绑定了原始表名。`setupTablePrefix` 因此会先注册插件，再创建 Query，最后对 Query 调用 `ApplyTablePrefix`。\n\n相关函数：\n\n- `(*Dal).setupTablePrefix(db *gorm.DB) (*query.Query, error)`\n- `(*TablePrefixPlugin).Initialize(db *gorm.DB) error`\n- `(*TablePrefixPlugin).applyTablePrefix(db *gorm.DB)`\n- `(*query.Query).ApplyTablePrefix(prefix string) *query.Query`\n- `applyPrefix(tableName, prefix string) string`\n\n`ApplyTablePrefix` 会更新以下表：\n\n```go\nq.AttrSchema\nq.ProviderSetting\nq.SchemaDefinitions\nq.SchemaBindings\nq.Configurations\n```\n\n`applyPrefix` 是幂等的：表名为空、前缀为空、或表名已经带前缀时会原样返回。\n\n## SchemaDefinitionsDAL：Schema 定义版本\n\n`SchemaDefinitionsDAL` 操作 `schema_definitions` 表。包内提供单例：\n\n```go\nvar SchemaDefinitions = &SchemaDefinitionsDAL{}\n```\n\n模型是 `dalModel.SchemaDefinitions`，关键字段包括：\n\n- `SchemaName`\n- `Version`\n- `SchemaValue`\n- `Author`\n- `CreatedAt`\n\n唯一索引语义由模型 tag 表达为 `(schema_name, version)`。\n\n主要方法：\n\n- `Create(ctx, schema)`：插入一条新的 Schema 定义。\n- `GetByName(ctx, name)`：查询某个 schema name 的所有版本。\n- `SearchByName(ctx, keyword)`：按 `schema_name LIKE %keyword%` 模糊搜索。\n- `GetByNameVersion(ctx, name, version)`：按名称和版本精确查询。\n- `List(ctx)`：列出全部定义。\n- `GetByID(ctx, id)`：按主键查询。\n- `GetLatestByName(ctx, name)`：按 `CreatedAt.Desc()` 取最新定义。\n\n空列表查询会返回空 slice，不返回 not found 错误：\n\n```go\nrecords, err := dal.SchemaDefinitions.GetByName(ctx, \"demo\")\nif err != nil {\n    return err\n}\n// records 可能是空 slice\n```\n\n单条查询在 `gorm.ErrRecordNotFound` 时会包装为 `errs.ErrInvalidRequest`：\n\n```go\nrecord, err := dal.SchemaDefinitions.GetByNameVersion(ctx, \"demo\", \"v1\")\n```\n\n注意 `GetLatestByName` 的“最新”基于 `created_at` 降序，而不是按 `version` 字符串排序。\n\n## SchemaBindingsDAL：分组到 Schema 的绑定\n\n`SchemaBindingsDAL` 操作 `schema_bindings` 表。包内提供单例：\n\n```go\nvar SchemaBindings = &SchemaBindingsDAL{}\n```\n\n模型是 `dalModel.SchemaBindings`，关键字段包括：\n\n- `GroupType`：例如 `space`、`account`、`@all`。\n- `GroupName`：分组标识。\n- `SchemaName`：绑定的 Schema 名称。\n- `SchemaVersion`：绑定的具体版本，或 `@latest`。\n- `Author`\n\n唯一索引语义由模型 tag 表达为 `(group_type, group_name, schema_name)`。\n\n### 创建绑定并写入初始配置\n\n`CreateWithConfig(ctx, binding, configurations, author)` 在事务中执行两个动作：\n\n1. 插入 `schema_bindings` 记录。\n2. 如果 `configurations != nil`，将 `adminapi.Configurations` 序列化为 JSON，插入 `configurations` 表，版本号为 `1`。\n\n```go\nerr := dal.SchemaBindings.CreateWithConfig(ctx, binding, initialConfig, author)\n```\n\n这个方法使用 `q.Transaction(func(tx *query.Query) error { ... })`，绑定创建和初始配置创建具有原子性。`binding.ID` 会在创建绑定后用于 `Configurations.SchemaBindingID`。\n\n### 查询绑定\n\n常用查询方法：\n\n- `GetByGroup(ctx, groupType, groupName, schemaName)`：按分组和 schema name 获取单条绑定。\n- `ListByGroup(ctx, groupType, groupName)`：列出某个分组下的所有绑定。\n- `ListByGroupType(ctx, groupType)`：列出某类分组的所有绑定。\n- `ListBySchema(ctx, schemaName)`：列出引用某个 schema name 的所有绑定。\n- `List(ctx)`：列出全部绑定。\n\n列表查询在无结果时返回空 slice。`GetByGroup` 无结果时返回 `errs.ErrInvalidRequest`。\n\n## ConfigurationsDAL：绑定配置版本\n\n`ConfigurationsDAL` 操作 `configurations` 表。包内提供单例：\n\n```go\nvar Configurations = &ConfigurationsDAL{}\n```\n\n模型是 `dalModel.Configurations`，关键字段包括：\n\n- `SchemaBindingID`\n- `Configuration`：JSON 字符串，内容来自 `adminapi.Configurations`。\n- `Author`\n- `Version`\n- `CreatedAt`\n\n这个表的业务语义是追加版本历史。更新配置时不会覆盖旧记录，而是插入一条更高版本的新记录。\n\n### 创建配置\n\n`Create(ctx, schemaBindingID, configurations, author)` 会把 `*adminapi.Configurations` 序列化为 JSON 字符串，写入 `Configuration` 字段，初始 `Version` 为 `1`。\n\n```go\nrecord, err := dal.Configurations.Create(ctx, bindingID, config, author)\n```\n\n序列化失败会包装为 `errs.ErrInternal`，写库失败会包装为 `errs.ErrWriteDB`。\n\n### 获取最新配置\n\n`GetLatestByBinding(ctx, schemaBindingID)` 按 `Version.Desc()` 查询最新记录，并反序列化为 `*adminapi.Configurations`：\n\n```go\nrecord, config, err := dal.Configurations.GetLatestByBinding(ctx, bindingID)\n```\n\n返回值分为两层：\n\n- `record`：数据库记录，包含 `ID`、`Version`、`Author` 等元信息。\n- `config`：反序列化后的业务配置。\n\n如果没有配置，会返回 `ConfigurationNotFoundError`。调用方可用 `IsConfigurationNotFound(err)` 判断：\n\n```go\n_, config, err := dal.Configurations.GetLatestByBinding(ctx, bindingID)\nif dal.IsConfigurationNotFound(err) {\n    // 调用方可按空配置处理\n}\n```\n\n`ConfigurationNotFoundError` 内部包装的是 `errs.ErrInvalidRequest`，同时保留 `SchemaBindingID`，便于上层区分“没配置”和真实读库错误。\n\n### 批量获取最新配置\n\n`ListLatestByBindings(ctx, schemaBindingIDs)` 用于一次查询多个 binding 的最新配置：\n\n```go\nconfigs, err := dal.Configurations.ListLatestByBindings(ctx, []int64{1, 2, 3})\n```\n\n返回值是 `map[int64]*adminapi.Configurations`。没有配置的 binding 不会出现在 map 中，由调用方按空配置处理。\n\n实现上会按 `SchemaBindingID` 和 `Version.Desc()` 排序，然后对每个 `SchemaBindingID` 只保留第一条记录。反序列化失败的记录会记录 warn 日志并跳过，不会让整个批量查询失败。\n\n### 配置历史\n\n`GetHistory(ctx, schemaBindingID)` 返回某个 binding 的全部配置历史，按版本降序：\n\n```go\nrecords, configs, err := dal.Configurations.GetHistory(ctx, bindingID)\n```\n\n`records` 和 `configs` 一一对应。反序列化失败的历史记录会被跳过，因此返回的记录数可能少于数据库中的实际行数。\n\n### 追加新版本\n\n`UpdateWithCAS(ctx, schemaBindingID, configurations, author)` 的注释称为 CAS 乐观锁更新，但当前实现没有执行带条件的 update，也没有比较外部传入版本。实际流程是：\n\n1. 调用 `GetLatestByBinding` 获取当前最新记录。\n2. 将新配置序列化为 JSON。\n3. 用 `current.Version + 1` 创建一条新记录。\n\n```go\nnewRecord, err := dal.Configurations.UpdateWithCAS(ctx, bindingID, config, author)\n```\n\n因此它更准确地说是“基于当前最新版本追加下一版本”。如果并发调用同时读取到相同最新版本，仍可能尝试插入相同的下一版本；最终行为取决于数据库唯一索引约束。\n\n## 旧版 AttrSchema 与 ProviderSetting DAL\n\n`dal.go` 中的 `Dal` 方法是旧版 schema/provider setting 的数据访问入口，主要操作 `attr_schema` 和 `provider_setting`。\n\n### AttrSchema\n\n相关方法：\n\n- `Create(ctx, schema)`：创建 `AttrSchema`。\n- `QueryAllSchemasFromDB(ctx)`：查询全部 schema。\n- `MQuerySchemaFromDB(ctx, names...)`：按 `Name IN (...)` 批量查询，返回 `map[name][]*AttrSchema`。\n- `MQuerySchemaVersionFromDB(ctx, name, versions...)`：按 name 和 version 列表查询。\n- `QuerySchemaByName(ctx, name)`：查询单个 name 的所有 schema。\n- `QuerySchemaByNameVersion(ctx, name, versions...)`：查询指定 name 下的指定版本。\n- `DeleteSchema(ctx, version)`：按 version 删除。\n\n`QuerySchemaByName` 和 `QuerySchemaByNameVersion` 会在 map 中找不到 name 时返回 `errs.ErrInvalidRequest`。\n\n### ProviderSetting\n\n相关方法：\n\n- `EnableSchema(ctx, space, name)`：插入一条 `ProviderSetting`。\n- `DisableSchema(ctx, provider)`：按 provider 删除。\n- `QueryAllSettings(ctx)`：查询全部设置。\n- `MQueryProviderSettingFromDB(ctx, spaces...)`：按 provider 批量查询。\n- `MQueryProviderSetting(ctx, spaces...)`：当前只是 `MQueryProviderSettingFromDB` 的薄封装。\n\n需要注意的是，`ProviderSetting` 模型包含 `Version` 和 `UpdatedBy` 非空字段，但 `EnableSchema` 当前只设置了 `Provider` 和 `Name`。如果数据库约束严格要求这些字段非空，调用方需要确认默认值或补齐写入逻辑。\n\n## 缓存代码状态\n\n`cache.go` 中定义了以下缓存相关逻辑：\n\n- `loopUpdateCache`\n- `updateCache`\n- `QuerySchemaFromCache`\n- `queryProviderSettingFromCache`\n\n但整个文件内容目前被注释掉，`Init` 中的缓存刷新和后台 goroutine 也被注释掉：\n\n```go\n//err = d.updateCache(context.Background())\n//go d.loopUpdateCache()\n```\n\n因此当前持久化层实际不启用内存缓存，所有公开查询路径都直接访问数据库。`Dal` 结构体里仍保留了 `cacheLock`、`schemaCache`、`providerSettingCache` 字段，这是历史实现遗留。\n\n## 生成代码与模型\n\n`dal/model/*.gen.go` 是 GORM 模型定义，提供表名、字段 tag 和 JSON tag。`dal/query/*.gen.go` 是 `gorm.io/gen` 生成的强类型查询封装。\n\n典型查询模式如下：\n\n```go\nrecord, err := q.SchemaDefinitions.WithContext(ctx).\n    Where(q.SchemaDefinitions.SchemaName.Eq(name)).\n    Where(q.SchemaDefinitions.Version.Eq(version)).\n    First()\n```\n\n`query.Use(db)` 会构造一个 `*query.Query`，其中包含所有表的查询对象：\n\n```go\ntype Query struct {\n    AttrSchema       attrSchema\n    ProviderSetting  providerSetting\n    SchemaDefinitions schemaDefinitions\n    SchemaBindings    schemaBindings\n    Configurations    configurations\n}\n```\n\n事务通过 `(*Query).Transaction` 执行：\n\n```go\nerr := q.Transaction(func(tx *query.Query) error {\n    if err := tx.SchemaBindings.WithContext(ctx).Create(binding); err != nil {\n        return err\n    }\n    return tx.Configurations.WithContext(ctx).Create(config)\n})\n```\n\n维护生成代码时要注意模型和 Query 字段是否一致。当前 `model.Configurations` 使用 `Configuration` 字段，但 `query/configurations.gen.go` 中暴露的是 `ConfigKey` 和 `ConfigValue` 字段；现有 DAL 没有直接引用 `q.Configurations.Configuration`，所以当前路径仍能工作，但如果后续要按配置内容查询或选择字段，需要先重新生成或修正 query 代码。\n\n## 错误处理约定\n\n这个模块统一用 `errs.New` 包装底层错误，常见分类包括：\n\n- `errs.ErrInternal`：内部错误、序列化失败、部分通用数据库错误。\n- `errs.ErrReadDB`：读库失败。\n- `errs.ErrWriteDB`：写库失败。\n- `errs.ErrInvalidRequest`：请求对象不存在或参数指向无效资源。\n\n单条查询通常把 `gorm.ErrRecordNotFound` 转成 `errs.ErrInvalidRequest`。配置查询是例外：`GetLatestByBinding` 会返回专门的 `ConfigurationNotFoundError`，让上层可以把“未配置”作为正常分支处理。\n\n列表查询通常不会把空结果当错误，而是返回空 slice 或空 map。\n\n## 与上层代码的关系\n\n启动链路中，`main` 经由路由注册进入 `customizedRegister`，再调用 `Dal.Init` 完成数据库初始化。初始化后的全局 `q` 被 handler/service 间接使用。\n\n从测试入口看，上层主要依赖这些 DAL 能力：\n\n- schema definition handler/service 使用 `SchemaDefinitionsDAL` 查询、创建和列出 Schema 定义。\n- schema binding handler/service 使用 `SchemaBindingsDAL` 创建绑定、按分组查询绑定、列出绑定。\n- configuration handler/service 使用 `ConfigurationsDAL` 获取最新配置、历史配置、批量配置，并通过 `NewConfigurationNotFoundError` / `IsConfigurationNotFound` 区分空配置场景。\n- 表前缀相关单测覆盖 `setupTablePrefix`、`TablePrefixPlugin.Initialize`、`query.ApplyTablePrefix` 和 `applyPrefix`。\n\n新增管理端持久化逻辑时，优先沿用现有模式：在 `dal/model` 中维护模型，在 `dal/query` 中使用或更新 `gorm/gen` Query，在 `dal/*_dal.go` 中封装业务粒度的数据访问方法，并用 `errs.New` 做统一错误分类。","common-utilities":"# Common Utilities\n\n## 通用工具模块\n\n通用工具模块覆盖 `fuxi/comm/utils`、部分 `fuxi/core/utils`、`fuxi/comm/midware` 和顶层 `util` 包，提供跨服务复用的基础能力：RPC 中间件、配置读取、指标上报、时间与限流工具、通用集合结构、响应码封装、测试断言、HLC 版本号、属性 key 匹配、异步任务池，以及 Thrift 结构体深拷贝。\n\n该模块不是业务编排层，主要服务于 `handler`、`core/service`、`mdap/service`、`idx`、`storage` 等上层代码，避免这些模块重复处理日志、指标、配置、错误包装和并发控制。\n\n## 整体结构\n\n```mermaid\nflowchart TD\n    A[RPC 入口] --> B[中间件]\n    B --> C[上下文容器 cctx]\n    B --> D[日志与指标]\n    E[业务服务] --> F[配置 conf]\n    E --> G[响应 resp]\n    E --> H[时间 timing]\n    E --> I[匹配 keys]\n    E --> J[并发 pool / limiter]\n    E --> K[版本 hlc]\n```\n\n核心调用关系：\n\n- `LogMidware` 在 RPC 调用结束后记录请求、响应、耗时，并调用 `metrics.ReportAPIStatus`。\n- `DownstreamRateLimitMiddleware` 在下游 RPC 调用前预扣带宽额度，调用结束后通过 `bandwidthLimiterCompensation` 按响应体大小补偿。\n- `timing.Track` 被 `QueryWithFuxiAttr` 等路径使用，通过 `Recorder.Record` 收集阶段耗时。\n- `conf.GetConfig`、`conf.GetWithJSON`、`conf.GetWithYAML` 是 TCC 配置读取入口。\n- `resp.ResultBase.NewResp` 注册响应码，`metrics.ReportAPIStatus` 再通过 `resp.GetRespByCode` 把状态码映射为指标 tag。\n- `keys.Matcher` 和 `keys.MatcherSet` 用于属性路径通配匹配，是 `Match` 的优化版本。\n\n## RPC 中间件\n\n### `LogMidware[T resp.RespIf]`\n\n`LogMidware` 是 Kitex `endpoint.Middleware`，负责统一记录 RPC 调用结果。\n\n执行流程：\n\n1. 调用 `cctx.WithContainer(ctx)`，确保上下文中存在容器。\n2. 通过 `rpcinfo.GetRPCInfo(ctx)` 读取 method 和 caller PSM。\n3. 执行下游 `next(ctx, request, response)`。\n4. 用 `printsdk.MarshalStringIgnoreError` 序列化请求和响应用于日志。\n5. 通过 `getBaseResp[T]` 从响应的 `Success` 字段中提取 `BaseResp`。\n6. 根据 `err` 和业务状态码选择 `CtxError`、`CtxWarn` 或 `CtxInfo`。\n7. 读取 `cctx.GetContainerOrEmpty(ctx)` 中的 `Space`、`Schema`，调用 `metrics.ReportAPIStatus`。\n\n`getBaseResp` 使用反射查找响应结构体中的 `Success` 字段，并要求该字段实现 `resp.RPCResp[T]`。因此接入该中间件的 RPC 响应需要保持生成代码中常见的 `Success` 响应模式。\n\n### `DownstreamRateLimitMiddleware`\n\n`DownstreamRateLimitMiddleware` 用于下游调用的响应带宽限流。\n\n关键常量：\n\n- `BandwidthPreQuota = int64(50)`：每次调用预扣的默认额度。\n- `hardenBandwidthLimiterKey = \"bandwidth\"`：Harden 限流 key 后缀。\n\n执行流程：\n\n1. 使用 `methodNeedBandwidthLimiter(methodName)` 判断方法是否需要带宽限制；当前实现始终返回 `true`。\n2. 调用 `harden.HardenClient.AllowNFallbackShared` 预扣额度。\n3. 若被限流，调用 `setRateLimitBaseResp(resp)` 写入 `set_meta_resp.BandwidthLimitExceeded`，并直接返回 `nil`。\n4. 若未限流，继续执行 `next`。\n5. 调用 `bandwidthLimiterCompensation`，用真实响应大小减去预扣额度，超出的部分通过 `ReserveNFallbackShared` 补偿扣减。\n\n`extractRespSizeFromResponse` 要求响应实现：\n\n```go\ninterface {\n    GetResult() interface{}\n}\n```\n\n并且 `GetResult()` 返回值实现 `msgp.Sizer`，否则响应大小按 `0` 处理。\n\n`setRateLimitBaseResp` 对响应结构有较强约定：响应必须是指针，包含 `Success` 字段；`Success` 对应的 result 必须实现 `GetOrSetBaseResp() interface{}`，并返回 `*base.BaseResp`。新增 RPC 类型接入该中间件时，需要确认生成结构满足这些反射和接口假设。\n\n## 上下文容器 `cctx`\n\n`fuxi/core/utils/cctx` 在 `context.Context` 中挂载请求级低基数字段，主要供日志和指标使用。\n\n核心函数：\n\n- `WithContainer(ctx)`：若上下文中没有容器，则注入新的 `container`。\n- `GetContainerOrEmpty(ctx)`：读取容器；不存在或类型异常时返回空容器。\n- `SetStoragePolicy(ctx, storageType, exists)`：写入低基数 `StoragePolicy` tag。\n- `JoinStoragePolicies(policies...)`：对多空间查询命中的 storage policy 去重、排序并拼接。\n\n`container` 当前包含：\n\n- `Space`\n- `Schema`\n- `StoragePolicy`\n- `IdxCfg`\n\n`init` 中调用 `comm.AddCusCtxKey(containerKey)`，用于把该 key 纳入通用上下文复制逻辑的预留列表。\n\n## 配置读取 `conf`\n\n`fuxi/comm/utils/conf` 封装 TCC Client V2。\n\n主要入口：\n\n- `GetConfig(ctx, key)`：读取原始字符串配置。\n- `GetOrEpt(ctx, key)`：读取失败返回空字符串。\n- `GetOrDef(ctx, key, def)`：读取失败返回默认值。\n- `GetOrPanic(ctx, key)`：读取失败记录日志并 panic。\n- `GetWithJSON[T](ctx, key)`：按 JSON 反序列化配置。\n- `GetWithYAML[T](ctx, key)` / `GetWithYAMLOrPanic[T]`：按 YAML 反序列化配置。\n- `IsNotFound(err)`：判断是否为 `tccclient.ConfigNotFoundError`。\n\n`getWith[T]` 会为每个 `Key` 缓存一个 `tccclient.Getter`，并使用 `sync.RWMutex` 保护 `getterMap`。同一个配置 key 后续读取会复用 getter。\n\n测试场景通过 `ConfStack` 支持 mock：\n\n- `Mock(t, key, value, err)`：设置当前 mock 批次中的配置。\n- `Submit()`：提交当前批次，并准备下一批 mock。\n- `Demock(t)`：回退一层 mock。\n- `GetConfig(key)`：从最近一次已提交 mock 开始向前查找。\n\n注意：mock 只有在包级 `mockedFlag` 为 `true` 时生效；真实读取路径仍会回落到 TCC client。\n\n## 指标 `metrics`\n\n`metricsV3.go` 是指标基础封装，业务指标文件只声明指标名、tag 和上报函数。\n\n基础类型：\n\n- `Metric`：提供 `WithTags(...) Emitter`。\n- `Emitter`：提供 `Emit(values...) error`。\n- `valContainer`：封装 suffix、数值和 metrics SDK 构造函数。\n- `newMetrics(name, tags...)`：创建 metrics v3 metric。\n- `newTag(key, val)`：创建 tag，并通过 `EscapeTagValueSimple` 清洗 tag 值。\n\n支持的 value 构造：\n\n- `counter(n)` / `CounterWithSuf`\n- `rate(n)` / `RateWithSuf`\n- `timer(n)`\n\n`EscapeTagValueSimple` 会把空字符串变为 `EMPTY_VALUE`，并把非字母、数字、`.`、`-`、`/`、`_`、`:`、`|` 的字符替换为 `-`，避免非法 tag 值污染指标。\n\n业务上报函数包括：\n\n- `ReportAPIStatus`：上报 RPC API 状态、耗时和调用次数。\n- `ReportAttrFormatInvalid`：上报属性格式错误。\n- `ReportTTL`：上报 TTL 任务状态。\n- `RecordShielded`：上报屏蔽命中状态。\n- `ReportGSIOps`：上报 GSI 操作状态。\n- `ReportGSIQueryBucketCount`：上报 GSI query 遍历 bucket 数。\n- `ReportGSIAsyncPoolActive` / `ReportGSIAsyncPoolRejected`：上报异步池水位和拒绝次数。\n- `ReportSetAttrStage`：上报 SetAttr 阶段耗时，单位为微秒。\n- `ReportMDAPStartProcessing`：上报 MDAP start processing 事件。\n\n测试中可调用 `metrics.Mock()` 进入 mock 模式，`PopRecords(name)` 取出并清空记录。`MetricsRecord` 提供 `AstTagEq`、`AstValIntEq` 等断言辅助方法。\n\n## 响应码封装 `resp`\n\n`resp.Resp[T]` 是业务响应码定义的通用结构：\n\n```go\ntype Resp[T RespIf] struct {\n    ID   Result\n    Code int32\n    Msg  string\n}\n```\n\n`RespIf` 描述生成的 `BaseResp` 类型需要具备的读写方法：\n\n```go\ntype RespIf interface {\n    GetStatusMessage() string\n    GetStatusCode() int32\n    SetStatusMessage(string)\n    SetStatusCode(int32)\n}\n```\n\n常用方法：\n\n- `Clone()`：复制响应定义。\n- `WithMsgF(format, args...)`：追加格式化消息。\n- `WithMsgE(err, format, args...)`：追加格式化消息和错误内容。\n- `ToBaseResp(ctx)`：生成具体 `BaseResp`，非 0 状态码会记录错误日志。\n- `AstEqRPCResp` / `AstCodeEq`：测试断言。\n- `GetBaseResp`：从 `RPCResp[T]` 中提取 BaseResp。\n- `GetRespByCode`：按状态码查找已注册响应。\n\n`ResultBase[T]` 用于集中注册响应码：\n\n- `NewResultBase[T]()` 创建注册表。\n- `NewResp(res, code, msg)` 注册响应码。\n- `GetResp(res)` 按 `Result` 获取响应定义。\n\n`NewResp` 会检查非成功状态码是否重复注册。由于 `codeMap` 是包级全局 map，不同 `ResultBase` 之间共享状态码注册结果，新增错误码时需要避免冲突。\n\n## 时间工具\n\n### `clock`\n\n`clock` 包用于测试中 mock `time.Now()`。\n\n主要函数：\n\n- `Mock(t)`：用 gomonkey patch `time.Now`。\n- `Demock(t)`：重置 offset、freeze 状态并取消 patch。\n- `UpdateOffSet(d)` / `ResetOffSet()`：设置或清除时间偏移。\n- `FreezeAt(ts, ns)` / `Unfreeze()`：冻结或恢复时间。\n- `Overflow2038(times...)`：判断时间戳是否超过 32 位 Unix 秒上限。\n\n`Mock` 中的 `time.Now` 实现优先返回 `fixedAt`，否则基于 `getCurTime()` 计算当前时间，再叠加 `offset`。\n\n### `timing`\n\n`timing` 包用于收集请求内分阶段耗时。\n\n典型用法：\n\n```go\nrec := timing.New()\nctx = timing.WithRecorder(ctx, rec)\ndefer timing.Track(ctx, \"SetAttr\")()\n```\n\n核心对象：\n\n- `Recorder.Record(stage, duration)`：追加阶段耗时。\n- `Recorder.Stages()`：返回阶段列表拷贝。\n- `Recorder.Total()`：返回所有阶段耗时之和。\n- `Recorder.FormatStages()`：生成多行日志文本。\n- `Track(ctx, stage)`：返回 defer 闭包；若 ctx 中无 recorder，则返回 noop。\n\n执行流中，`MGetAssetGroups`、`MGetSources` 经 `QueryWithFuxiAttr` 调用 `Track`，最终由 `Recorder.Record` 生成 `Entry`。嵌套阶段会导致 `Total()` 大于真实墙钟时间，因此慢请求判断应优先使用最外层阶段耗时。\n\n## HLC 版本号 `hlc`\n\n`hlc.HLC` 实现混合逻辑时钟，当前支持 V0 兼容解析和 V1 毫秒编码。\n\n结构字段：\n\n- `physicalTime int64`\n- `logical uint16`\n- `encoding uint8`\n\n编码规则：\n\n- V1 使用低 16 位的 bit `[15:14] == 01` 标识，`v1Tag = 0x4000`。\n- V1 的高位保存 Unix 毫秒时间戳，低 14 位保存逻辑计数。\n- V0 保留旧编码值，仅用于兼容和 CAS 判等。\n\n主要函数：\n\n- `ParseInt64Str(str)`：从十进制字符串解析 HLC。\n- `IsV1Encoding(v)`：判断 int64 是否为合法 V1 编码。\n- `New(remoteHLC)`：基于远端 HLC 推进生成新的 V1 HLC。\n- `ToInt64()` / `ToInt64Str()`：编码为 int64 或字符串。\n- `HLC.NewerThan(other)`：比较两个 HLC。\n- `NewerThan(a, b)` / `OlderThan(a, b)`：直接比较 int64 编码。\n- `String()`：生成日志可读格式。\n\n跨编码比较时，V1 永远比 V0 新，不能直接比较 int64 数值；V0 的旧纳秒编码可能为正且数值远大于 V1。\n\n## Key 匹配工具\n\n`fuxi/core/utils/keys` 提供属性路径匹配能力，支持普通字面量、`.` 分段、`*` 和数组通配符 `[*]`。\n\n旧接口：\n\n- `HasWildcard(col)`：判断是否包含 `*`。\n- `MatchingKeys(pattern, keys)`：返回所有匹配 key，结果排序。\n- `IsMatch(wildcard, str)`：只返回是否匹配。\n- `Match(wildcard, str)`：返回是否匹配，以及 `*` 捕获的区间。\n\n优化接口：\n\n- `NewMatcher(pattern)`：预编译单个 pattern。\n- `NewMatchers(patterns)`：批量预编译。\n- `NewMatcherSet(patterns)`：构建支持快速字面量和前缀匹配的集合。\n- `Matcher.Match(str)`：匹配单个字符串。\n- `MatcherSet.AnyMatch(str)`：判断任一 pattern 是否匹配。\n- `SplitByKind(patterns)`：把 pattern 分为 literal、prefix、default 三类。\n\n匹配规则：\n\n- `a.b.c`：精确匹配。\n- `a.*`：前缀匹配，匹配 `a` 后至少一个 segment。\n- `a.*.c`：中间 `*` 匹配一个 segment。\n- `arr[*]`：匹配 `arr[0]`、`arr[12]` 等数组下标格式。\n- `*[*]`：数组名前缀也可通配，但下标仍必须是整数。\n\n## 并发与限流\n\n### `pool.Pool`\n\n`Pool` 是轻量级有界异步任务池，基于 buffered channel 实现信号量。\n\n- `New(size)`：创建最大并发为 `size` 的池。\n- `Submit(fn)`：非阻塞提交任务；池满返回 `false`。\n- `Active()`：返回当前活跃任务数。\n- `Wait()`：等待已提交任务完成。\n\n每个任务 goroutine 内部有 `recover()`，可避免 panic 导致信号量泄漏。\n\n### `pool.RetryPool`\n\n`RetryPool` 在 `Pool` 基础上增加失败重试：\n\n- `NewRetryPool(size, maxRetries, baseDelay, maxDelay)`\n- `SubmitRetry(fn func() error)`\n- `Submit(fn func())`\n- `Wait()`\n\n`SubmitRetry` 失败后使用指数退避和 ±25% jitter，并通过 `time.AfterFunc` 重新提交。退避期间不占用并发槽位。`Wait()` 只等待当前正在执行的任务，不等待尚未触发的 timer。\n\n### `limiter.ParallelLimiter`\n\n`NewParallelLimit[T](limit)` 创建可动态调整的并发限制器。\n\n`Run(f)` 返回：\n\n- `executed`：是否实际执行。\n- `res`：函数返回值。\n- `err`：函数错误。\n\n当当前执行数达到 limit 时，`Run` 直接返回 `executed=false`。`UpdateLimit(n)` 可在运行时调整上限。\n\n### `NewSlidingWinRateLimiter`\n\n滑动窗口百分比限流器按秒维护窗口：\n\n- `Put()`：记录一次输入，并按 `percentage` 计算该秒可释放数量。\n- `TryAcquire()`：从当前秒或窗口内更早秒尝试获取释放额度。\n\n内部使用 `maps.SortedMap[int64, *window]` 存储窗口，窗口过期后会被移除。`percentage < 0` 或 `windowSize < 1` 时返回 `nil`。\n\n## 集合、泛型与基础类型\n\n### `maps`\n\n- `MergeInto(dst, srcList...)`：把多个 map 合并到 `dst`。\n- `EptIfNil(m)`：nil map 转为空 map。\n- `SortedMap[K,V]`：有序 map 接口。\n- `NewTreeMap(comparator)`：基于 `redblacktree` 的实现。\n- `GetNumComparator[T generic.Number]()`：数字比较器。\n\n`treeMap` 支持 `Floor`、`LowerThan`、`Ceiling`、`GreaterThan` 等范围查询方法，滑动窗口限流器依赖这些能力查找前序窗口。\n\n### `generic`\n\n- `Zero[T]()`：返回类型零值。\n- `Init[T]()`：非指针返回零值；指针类型返回指向元素零值的新指针。\n- `InitIfNil(t, initFunc)`：若指针为 nil，则调用初始化函数。\n- `Number`：数字类型约束。\n\n注意：`Init[T]` 使用 `reflect.ValueOf(t).Kind()` 判断是否为指针，调用方通常传入具体指针类型，例如 `*base.BaseResp`。\n\n### `tuple`\n\n`tuple.Couple[T,R]` 是简单二元组，提供 `Left()`、`Right()` 和 `NewCouple(left, right)`。配置 mock、metrics mock、key 匹配区间都复用该结构。\n\n## 错误、字符串、数字与存储 URI\n\n### `errs`\n\n`errs.New` 和 `errs.Wrap` 会把调用文件、行号和函数名写入错误消息。`Wrap(nil, ...)` 返回 `nil`。\n\n`CausedBy(e, target)` 沿着自定义 `CusErr.Cause()` 链查找目标错误，并同时支持 `errors.Is`。\n\n### `comm`\n\n- `ExtractCaller(ctx)`：从 Kitex `rpcinfo` 提取调用方 PSM，缺失时返回 `EMPTY_CALLER`。\n- `IsNil(any)` / `NotNil(any)`：基于 `gvalue.IsNil` 判断 interface、指针等 nil 值。\n- `Ctx()`：生成带 `K_LOGID` 的 background context，主要用于本地或测试辅助。\n- `AddCusCtxKey(str)`：登记自定义 context key。\n\n### `strs`\n\n- `Idx`、`LastIdx`、`IdxFrom`：字符串索引辅助。\n- `MayContainsBinary`：判断字符串是否可能包含非法 UTF-8 字节。\n- `BlankPtr`、`IsBlank`、`PrintPtr`：空字符串和字符串指针处理。\n\n`ast.DetailedDiff` 在比较字符串时会调用 `MayContainsBinary`；若疑似二进制内容，会用 base64 输出差异，避免日志不可读。\n\n### `nums`\n\n- `IsInt(s)`\n- `ToInt(s)`\n- `ToInt64(s)`\n\n这些函数返回解析结果和布尔成功标记，key 匹配中的数组下标校验依赖 `IsInt`。\n\n### `comm.ExtractFromURI`\n\n`ExtractFromURI(uri)` 支持去除 `s3://`、`az://`、`oss://` 前缀，并返回 bucket 和 object。`ExtractBkt(ctx, uri)` 只返回 bucket，解析失败时记录日志并返回空字符串。\n\n## 测试辅助\n\n### `ast`\n\n`fuxi/comm/utils/ast` 是测试断言包。\n\n常用断言：\n\n- `Equal` / `NotEqual`\n- `NoErr` / `Err` / `ErrIs`\n- `Nil` / `NotNil`\n- `True` / `False`\n- `EptStr` / `NotEptStr` / `NotEptStrPtr`\n- `EptSli` / `EptMap`\n- `LenMap` / `LenSli`\n- `Zero` / `NotZero`\n- `SliceEqIgnOrder`\n\n`Equal` 失败时会调用 `DetailedDiff` 输出结构化差异。`DetailedDiff` 支持 struct、slice、array、map、pointer、interface、`time.Time`，并通过 visited pointer pair 避免循环引用无限递归。\n\n链式断言：\n\n```go\nast.With(value, err).T(t).NoErr().Equal(expect)\nast.WithBool(ok, err).T(t).NoErr().True()\n```\n\n### `tst`\n\n- `NewID(t)`：生成 vvid V2 ID。\n- `RandByteArray(t, length)`：生成随机字节数组。\n\n## 业务辅助工具\n\n### `core/utils`\n\n- `GetBizSpace(space, schema)`：生成完整 namespace；BOE 环境会追加 IDC。\n- `GetSpaceSchema(namespace)`：从 namespace 反解析 space 和 schema。\n- `GetSpace(namespace)` / `GetSchema(namespace)`：分别提取单个字段。\n- `GetVRegion()`：BOE 返回 IDC，否则返回当前 vregion。\n- `GetVDC()`：返回 IDC。\n- `ParseID(ctx, id)`：解析 `v` 前缀 vvid，返回 account name 和时间戳；当前 `f` 前缀未实现。\n\n`Fed` 是包级变量，初始化时通过 `conf.GetOrPanic(context.Background(), config.Fed)` 读取配置，因此配置缺失会影响包加载。\n\n### `shield`\n\n`shield.IsShielded(ctx, id, timestamp, metaSpace)` 根据 TCC 配置 `shield_info` 判断数据是否命中屏蔽策略。\n\n判断步骤：\n\n1. 从 `metaSpace` 提取 schema。\n2. 读取 `map[string]ShieldInfo` 配置。\n3. 按 schema 查找屏蔽配置。\n4. 对 id 做 FNV32 hash，并按 `ShieldPercent` 判断灰度命中。\n5. 检查 `StartTimestamp` 和 `EndTimestamp`。\n6. 通过 `metrics.RecordShielded` 上报每个分支的状态。\n\n`ShieldInfo` 字段：\n\n- `ShieldPercent int32`\n- `StartTimestamp *int64`\n- `EndTimestamp *int64`\n\n### 顶层 `util`\n\n`HandlerError2BaseRespFunc` 把业务 handler error 转为 BaseResp 写入信息，默认调用 `errno.CodeMsg`，返回 `writeBase=true`。\n\n`DeepCopyThriftStruct[T,P]` 用于 Thrift 生成结构体深拷贝。类型参数 `P` 必须同时是 `*T` 并实现 `DeepCopy(s interface{}) error`。函数会创建新的 `T`，调用新对象的 `DeepCopy(obj)`，并返回新指针；输入为 `nil` 时返回 `nil`。\n\n```go\ncopied := util.DeepCopyThriftStruct(original)\n// copied 是独立副本，修改 copied 不会影响 original\n```\n\n## 贡献注意事项\n\n新增通用工具时应优先放在语义明确的小包中，避免继续扩大单个包职责。涉及指标 tag、响应码、配置 key、context value 的改动需要特别关注全局共享状态：`metrics.TagValMap`、`resp.codeMap`、`conf.getterMap`、`cctx.containerKey` 都会跨调用路径复用。\n\n涉及 RPC 响应结构的中间件代码大量依赖生成代码形态和接口断言，修改 `LogMidware`、`getBaseResp`、`setRateLimitBaseResp` 前应补充覆盖具体 Kitex 响应结构的单测。涉及时间、HLC、key 匹配和限流器的改动应优先保持旧编码、旧匹配规则和边界行为兼容。","core-metadata-service-core":"# Core Metadata Service — core\n\n## 模块定位\n\n`fuxi/core/service` 是 Core Metadata Service 的业务编排层，负责把 Kitex 请求转换成元数据读写、索引维护、事件投递、文件副作用和 TTL 任务。它不直接绑定单一存储，而是通过 `fuxi/core/service/meta` 选择底层 `iface.MetaStorage`，并结合 admin 配置决定 schema、索引、分片键、TTL、文件删除策略等运行行为。\n\n核心入口包括：\n\n- `Query` / `QueryWithFuxiAttr`：查询对象元数据并组装 `compound.QueryResp`\n- `SetAttr`：创建对象或设置属性\n- `Del`：删除对象\n- `DelAttr`：删除属性\n- `Count`：统计匹配对象数量\n- `CopyAttr`：复制属性到另一个对象\n\n```mermaid\nflowchart TD\n    A[\"服务入口<br/>Query / SetAttr / Del / DelAttr / Count\"] --> B[\"service.go<br/>参数校验、版本、事件编排\"]\n    B --> C[\"params / wrapper<br/>空间解析、属性校验、响应解析\"]\n    B --> D[\"meta 包<br/>GetMeta / CountMeta / SetMeta / DelMeta\"]\n    D --> E[\"GSI idx<br/>索引查询、分页下推、Count 下推\"]\n    D --> F[\"MetaStorage<br/>Bytedoc / ODA / Abase 等\"]\n    B --> G[\"rocketmq<br/>事件投递\"]\n    B --> H[\"admin / storage / postpone / vda<br/>配置、文件、TTL、视频信息\"]\n```\n\n## 数据模型与 key 约定\n\n模块内部同时处理两种 key 口径：\n\n- 业务层 key：通常带 `$.` 前缀，例如 `$.title`\n- 存储层 key：去掉 `$.` 前缀，例如 `title`\n\n转换由 `entity.StorageKeyToBiz` 和 `entity.BizKeyToStorage` 统一完成。查询、索引、分片键和表达式匹配代码都依赖这个约定，新增逻辑时不要手写字符串裁剪。\n\n系统保留列由 `entity.FuxiAttr` 定义，典型包括 `$._id`、`$._version`、`$._space`、`$._schema`、`$._created_at`、`$._updated_at`。这些字段由系统维护：\n\n- `QueryWithFuxiAttr` 在 `withFuxiAttr=true` 时允许返回系统列。\n- `DelAttr` 明确禁止删除 Fuxi 系统列。\n- 当系统列被 GSI 索引引用时，`SetAttr` / `Del` 会把相关系统列补进事件，保证索引消费端能正确维护 posting entry。\n\n版本由 `getVersion` 解析和生成。历史对象可能没有版本或存在 V0 版本，事件和索引路径会通过 `vers.NormalizeForIdx` 规整成 V1 编码。\n\n## Query 读路径\n\n`Query` 是 `QueryWithFuxiAttr(ctx, req, req.GetWithFuxiAttr())` 的薄封装。`QueryWithFuxiAttr` 的主要职责是：\n\n1. 根据 `req.Where.Ids` 和 `params.GetSpace` 按 space 分组。\n2. 根据是否存在 `Where.Filter` 分流到 `queryWithID` 或 `queryWithFilter`。\n3. 对结果做 `Select` 过滤、注册属性匹配和系统列过滤。\n4. 按 `compound.QueryResp` 的二维/三维结构组装 `AttrMetas` 与 `AttrVals`。\n5. 追加 `vda.GetQueryResp` 返回的视频信息。\n\n`queryWithID` 处理按 ID 查询。它会按 space 分组调用 `meta.GetMeta`，多 space 查询时把 `cctx.Container` 标记为 `_multi`，并汇总各 space 的 storage policy。\n\n`queryWithFilter` 处理带 filter 的查询：\n\n- 如果请求显式带 `Space`，直接调用 `meta.GetMeta`。\n- 如果请求没有 `Space`，走跨 space GSI 路径：`meta.QueryIdByIdxCrossSpace` 先按 schema 查询索引，再按 space 分组回表，最后用 `meta.PaginateMetaResultForQuery` 做统一排序和分页。\n\n`QueryWithFuxiAttr` 有两个值得注意的性能优化：\n\n- `isUniversalQuerySelect` 对 `Select == [\"$.*\"]` 或 `Select == [\"*\"]` 短路，避免构造 matcher 和逐 key 匹配。\n- `regAttrCache` 在单次 Query 请求内缓存 `admin.GetAdminAttrIndex` 结果，避免同 space/schema/schemaVersion 重复查注册属性索引。\n\n返回顺序由 `orderedQueryResultIDs` 维护：\n\n- 有 `Sort.Path` 时按查询结果中的排序字段重新排序。\n- 有 `Where.Ids` 时优先保持请求 ID 顺序并去重。\n- 否则使用 map key 顺序，不保证业务稳定顺序。\n\n## meta.GetMeta 与 GSI 查询路由\n\n`meta.GetMeta` 是主读路径的核心。它接收 `space`、`schema`、`WhereClause`、排序和分页参数，负责决定走索引还是主表。\n\n当 `where.Filter` 存在且没有显式 ID 时，会先尝试 GSI：\n\n- `queryIdByIdx`：普通 filter-to-index 路由，从表达式中提取 EQ 条件，使用 `selectBestIdxByPrefix` 选择最左前缀匹配的索引。\n- `queryIdByIdxOrdered`：分页/排序下推路由。当存在 `orderBy`、`offset` 或显式 `limit` 时，尝试在索引层完成排序和分页，只回表当前页 ID。\n- `QueryIdByIdxCrossSpace`：无 space 查询时使用 schema 级索引配置，按返回 entry 的 space 分组。\n\n索引命中后仍会回表复核。`queryIdByIdx` 只返回 posting list 的 oid，不直接作为最终结果；`GetMeta` 会继续调用 `GetMetaByIDWithLimit` 或 `getMetaByIDWithLimitGroupedByShardKeys`，用主表当前数据过滤掉 stale entry。\n\n数组下标路径是特殊情况。`exprNeedsInMemoryFilter` 检测到类似 `$.Arr[0]` 的路径后，避免把原始表达式直接下推给存储，改为回表后使用 `matchBizExpr` 在进程内复核。ordered 下推路径会使用 `matchBizExprDualPath` 同时注入业务 key 和存储 key，避免 filter path 口径不一致导致误删结果。\n\n如果分页相关操作无法在 GSI 下推，`GetMeta` 会检查主表存储能力：\n\n- Bytedoc 支持原生 order/offset/limit，可以回退主表。\n- ODA、Abase、TOS 等 KV 存储不支持原生分页，会返回 `ErrPaginationNotSupported`，避免静默返回错误分页结果。\n\n## Count 路径\n\n`Count` 只接受完整的 `Where`、`Schema`、`Space`，然后调用 `meta.CountMeta`。\n\n`CountMeta` 会先执行 `doc.ExprIdHandler` 统一表达式中的 ID/key 口径，再尝试 `countByIdx`。GSI Count 下推是白名单逻辑，只有全部满足才命中：\n\n- `where.Ids` 为空\n- filter 是单 leaf，或顶层 AND 且子节点全是 leaf\n- 只支持 EQ，以及最多一个范围列上的 GT/GTE/LT/LTE\n- filter 所有 path 必须被选中索引列完全覆盖\n- 仅支持 simple 索引，bucket 索引回退\n- 范围列必须是 `INT` 或 `NUMBER`\n- typed value 构造成功\n\n命中后通过 `idx.CountByIndex` 在 posting collection 上计数，不回源，语义是最终一致。未命中或索引查询失败时无损回退到 `storage.Count`，参数通过 `iface.NewQueryFilter` 封装。\n\n## SetAttr 写路径\n\n`SetAttr` 是创建和更新属性的统一入口，整体流程是“先查询当前快照，再构造事件和索引操作，最后 CAS 写主表”。\n\n关键步骤：\n\n1. 用 `params.WrapReq` 解析 ID、space、schema。\n2. 用 `wrapper.Set` 构造写入包装器。\n3. 依次执行 `ArrCheck`、`RegCheck`、`CharCheck`，校验数组完整性、注册属性和字符合法性。\n4. 用 `resolveShardingKeys` 从 `req.Values` 和 `req.Where.Filter` 合并分片键。\n5. 在最多 `maxRetryTimes == 3` 次循环内执行读改写。\n\n每次重试内：\n\n- 通过 `buildSetAttrQuerySelect` 预判需要查询的字段。它会包含本次写入字段、被命中索引需要的补充列，以及 Bytedoc 分片键。\n- 调用 `QueryWithFuxiAttr(..., true)` 获取当前对象快照。\n- 已存在对象禁止修改分片键。\n- `WriteMode_InsertOnly` 且对象已存在时返回 `AlreadyExists`，不会触发事件、索引或主表写入。\n- 如果 `Where.Filter` 存在且对象已存在，`meta.MatchWhereFilter` 会做内存预判；信息不足时放行，由 Bytedoc 做权威判断。\n- `getVersion` 生成 `oldVer` 和 `newVer`。\n- `diff` 计算 `Created`、`Updated`、`hasChange` 和被覆盖的旧文件。\n- `appendIndexedFuxiAttrChanges` 把被索引的系统列补进事件。\n- `HandleEvent` 做事件前置处理。\n- `HandleUniqIdx` 预写唯一索引，并返回 `cleanup` 和 `rollback` 函数。\n- `wrap.Set` 写主表；如果返回 `iface.WrongVersion`，回滚唯一索引并重试。\n- 主表成功后执行唯一索引旧 entry 清理。\n- 删除被覆盖的旧文件，受 `admin.GetDelFile` 控制。\n- `appendIndexedFuxiTimestampChanges` 用主表写入返回的 `nowTs` 补齐 `$._created_at` / `$._updated_at` 事件值。\n- `BuildIdxSnapshot` 预填 GSI 索引快照。\n- `rocketmq.QuickSent` 投递事件。\n- `handleTTL` 根据 `admin.GetTTL` 创建延期删除任务。\n\n慢请求通过 `timing.New` 记录分阶段耗时。总耗时超过 `slowThreshold == 200ms` 时打印 `[SetAttr slow]`，并通过 `metrics.ReportSetAttrStage` 上报每个阶段。\n\n## Del 与 DelAttr 删除路径\n\n`Del` 删除整个对象。它会先解析 space/schema，处理跨 region 请求，然后调用 `VideoDelete`。如果视频删除已经由下游执行且当前 storage 配置缺失或非法，`Del` 会直接返回成功，避免重复操作主表。\n\n主删除流程：\n\n1. 用 `resolveShardingKeys` 和 `injectShardingKeysIntoWhere` 给 Query/CAS 路由补充分片键。\n2. 查询待删除对象完整属性，使用 `wrapper.ParseQueryWithSysID` 保留 `$._id`。\n3. 对带 filter 的删除构造包含 ID、version、sharding key 的 OR 表达式。\n4. 调用 `meta.DelID` 执行 CAS 删除。\n5. 删除文件属性对应的文件，受 `admin.GetDelFile` 控制。\n6. 调用 `HandleIdxCleanupForDel` 清理 GSI。\n7. 对每个对象发送 `EventType_DEL` 事件。普通 Fuxi 系统列会从 `Deleted` 过滤掉，但被索引的 Fuxi 系统列会保留。\n\n`DelAttr` 删除单个对象上的属性。它和 `Del` 的主要差异是：\n\n- 删除前禁止删除 `entity.FuxiAttr` 系统列。\n- 查询后使用 `wrapper.Del(paths).Matches(query).CheckArray()` 计算实际命中的删除属性。\n- 禁止删除 Bytedoc 分片键。\n- 构造 `EventType_DEL_ATTR` 事件。\n- 调用 `HandleUniqIdxForDel` 处理唯一索引删除。\n- 调用 `meta.DelMeta` 删除属性。\n- 写成功后调用 `BuildIdxSnapshot`，再投递 MQ 事件。\n\n`Del`、`DelAttr`、`SetAttr` 都会在 `iface.WrongVersion` 时最多重试 3 次。`doc.ErrShardingKeyNotSet` 会统一映射为 `InvalidParam`，`iface.ErrObjNotFound` 会映射为 `NotFound`。\n\n## 分片键处理\n\nBytedoc 分片表要求 Query 和 CAS 写入都带上完整分片键。service 层统一用以下函数处理：\n\n- `resolveShardingKeys`：从写入 kv 和 `Where.Filter` 提取分片键，检测冲突。\n- `extractShardingKeysFromFilter`：递归遍历 `compound.Expression`，只收集 EQ 条件。\n- `injectShardingKeysIntoWhere`：把解析出的分片键以 AND leaf 形式补进 `where.Filter`。\n\n`resolveShardingKeys` 只在 `admin.GetStorage` 返回 `entity.Bytedoc` 且 `admin.GetBytedocIdx` 配置了分片键时生效。返回的 map 使用存储层 key，例如 `map[\"tenant_id\"]=\"123\"`。如果任一分片键缺失，则返回 nil，让底层存储按原有逻辑处理或返回 `doc.ErrShardingKeyNotSet`。\n\n## 事件与索引一致性\n\n写路径把事件作为索引维护和异步消费的核心契约。`SetAttr`、`DelAttr`、`Del` 发送的事件包含：\n\n- `ID`\n- `Type`\n- `Version.Before` / `Version.After`\n- `Created` / `Updated` / `Deleted`\n- `Extras`\n\n索引相关处理分为两类：\n\n- 唯一索引：`HandleUniqIdx` 在主表写入前预写新 entry，失败时 rollback；主表成功后 cleanup 旧 entry。`HandleUniqIdxForDel` 处理删除属性场景。\n- GSI：`BuildIdxSnapshot` 在投递前补全索引维护所需字段，降低消费端回源成本；整对象删除使用 `HandleIdxCleanupForDel` 直接清理索引桶。\n\n被索引的 Fuxi 系统列需要特殊处理。`appendIndexedFuxiAttrChanges` 在写主表前能补 `$._id`、`$._version`、`$._space`、`$._schema`；`appendIndexedFuxiTimestampChanges` 必须等主表写成功后，用 `meta.SetMeta` 返回的权威 `nowTs` 补 `$._created_at` 和 `$._updated_at`。\n\n## CopyAttr\n\n`CopyAttr` 复制源对象属性到目标对象：\n\n1. 解析目标 space 和 schema。\n2. 根据 `req.CopyKeys` 构造 from-to 映射。\n3. 调用 `Query` 查询源属性。\n4. 用 `attrMapping` 展开通配符映射，并检测目标 key 冲突。\n5. 对文件属性，如果 `FileAttrCopyType_Copy`，通过 `newUri` 生成目标 URI，并调用 `storage.Copy` 复制文件。\n6. 最终复用 `SetAttr` 写入目标对象。\n\n`attrMapping` 使用 `keys.Match` 支持通配符路径。目标路径中的 `*` 数量必须和源匹配捕获数量一致，否则返回错误。\n\n跨 region copy 当前实际不可用：代码在 `ToFuxiRegion` 不是当前 region 时直接返回 `not support to copy cross region yet`，后面的远程 `acc_cli.SetAttr` 分支不可达。\n\n## 与底层存储的连接\n\n`meta` 包通过 `CtxStorageSelector` 和 `MetaStorageSelector` 选择底层存储实现。读写参数通过 `iface` 层封装：\n\n- `iface.NewQueryFilter`：封装 ids、filter、注册属性类型表，供 `QueryAttr` 和 `Count` 使用。\n- `iface.NewSetParams`：封装 set/del、版本、filter 等写入参数，供 `UpdateAttr` 使用。\n- `iface.NewQueryFilterWithID`：用于带 ID 的删除/更新过滤场景。\n\n`GetMetaByIDWithLimit` 会先从 cache 批量读取，再把未命中的 ID 交给 `storage.QueryAttr`。返回前统一调用 `entity.StorageAttrToBiz` 转回业务 key。\n\n## 贡献注意事项\n\n修改读路径时要保留“索引只做候选集，主表负责最终复核”的契约。任何直接消费 `queryIdByIdx` / `queryIdByIdxOrdered` 返回 oid 的新代码，都必须自行做回源校验，否则 stale posting entry 会暴露给调用方。\n\n修改写路径时要保持副作用顺序：唯一索引预写在主表前，主表失败必须 rollback；MQ 事件必须在主表成功并补齐索引快照后发送；文件删除和 TTL 任务不能影响主写入成功语义。\n\n新增 filter、排序或分页能力时，需要同时检查 GSI 下推、Bytedoc 原生能力和 KV 存储不支持分页的失败语义，避免在 ODA/Abase 路径上静默忽略 `offset` 或 `limit`。\n\n新增系统列或 key 转换逻辑时，必须同步考虑 `entity.FuxiAttr`、`QueryWithFuxiAttr`、`appendIndexedFuxiAttrChanges`、`appendIndexedFuxiTimestampChanges`、`DelAttr` 的系统列保护，以及 GSI 事件消费所需字段。","core-metadata-service-errno":"# Core Metadata Service — errno\n\n## errno 模块\n\n`errno` 提供 Core Metadata Service 内部统一的错误码封装与错误消息转换能力。它的职责很窄：把业务错误表示为带 `Code` 和 `Msg` 的 `CompoundError`，并在接口返回前通过 `CodeMsg` 转成稳定的 `(code, message)` 结构。\n\n## 核心类型\n\n```go\ntype CompoundError struct {\n\tCode int32\n\tMsg  string\n}\n```\n\n`CompoundError` 是模块内唯一的结构化错误类型。它实现了 Go 标准库的 `error` 接口：\n\n```go\nfunc (e *CompoundError) Error() string {\n\treturn fmt.Sprintf(\"CompoundError: code: %d, msg: %s\", e.Code, e.Msg)\n}\n```\n\n`Error()` 主要用于日志、测试断言或被普通 `error` 链路打印时展示完整错误内容。业务返回时不直接使用这段字符串，而是通过 `CodeMsg` 提取 `Code` 和 `Msg`。\n\n## 错误构造\n\n### `ParamEmpty`\n\n```go\nfunc ParamEmpty(param string) *CompoundError\n```\n\n`ParamEmpty` 用于生成参数缺失或参数值为空的业务错误：\n\n```go\nreturn errno.ParamEmpty(\"user_id\")\n```\n\n返回的错误内容为：\n\n```go\n&CompoundError{\n\tCode: 4000,\n\tMsg:  \"user_id is missing or the value is empty\",\n}\n```\n\n当前模块中 `4000` 表示请求参数问题。调用方可以直接返回这个错误，也可以包裹后交给 `CodeMsg` 处理；`CodeMsg` 使用 `errors.As` 识别错误链中的 `*CompoundError`。\n\n## RPC 错误兜底\n\n### `RPCErr`\n\n```go\nfunc RPCErr(err error) error\n```\n\n`RPCErr` 用于规范化 RPC 调用错误。当 RPC 返回的 `err` 为 `nil`，但调用方仍然需要表达“请求失败”时，它会生成一个普通错误：\n\n```go\nfunc RPCErr(err error) error {\n\tif err == nil {\n\t\treturn errors.New(\"rpc request error\")\n\t}\n\treturn err\n}\n```\n\n注意：`RPCErr(nil)` 返回的是普通 `error`，不是 `*CompoundError`。因此后续经过 `CodeMsg` 时会被转换为通用 RPC 错误码 `5000`。\n\n## 错误码转换\n\n### `CodeMsg`\n\n```go\nfunc CodeMsg(err error) (int32, string)\n```\n\n`CodeMsg` 是模块最重要的出口函数，用于把任意 `error` 转成接口层可返回的错误码和错误消息。\n\n转换规则如下：\n\n| 输入错误 | 返回 code | 返回 message |\n|---|---:|---|\n| `nil` | `0` | `\"success\"` |\n| 错误链中包含 `*CompoundError` | `CompoundError.Code` | `CompoundError.Msg` |\n| 其他普通错误 | `5000` | `\"rpc request error: \" + err.Error()` |\n\n核心逻辑：\n\n```go\nfunc CodeMsg(err error) (int32, string) {\n\tif err == nil {\n\t\treturn 0, \"success\"\n\t}\n\n\tvar e *CompoundError\n\tif errors.As(err, &e) {\n\t\treturn e.Code, e.Msg\n\t}\n\n\treturn 5000, fmt.Sprintf(\"rpc request error: %s\", err.Error())\n}\n```\n\n`errors.As` 允许调用方使用标准错误包装方式保留业务错误语义：\n\n```go\nerr := fmt.Errorf(\"查询元数据失败: %w\", errno.ParamEmpty(\"vid\"))\n\ncode, msg := errno.CodeMsg(err)\n// code == 4000\n// msg == \"vid is missing or the value is empty\"\n```\n\n## 执行路径\n\n```mermaid\nflowchart TD\n    A[\"调用方传入 error\"] --> B{\"err == nil?\"}\n    B -->|是| C[\"返回 0 / success\"]\n    B -->|否| D{\"是否包含 *CompoundError?\"}\n    D -->|是| E[\"返回业务 Code / Msg\"]\n    D -->|否| F[\"返回 5000 / rpc request error\"]\n```\n\n## 与代码库的连接\n\n`errno` 不依赖项目内其他包，只使用 Go 标准库的 `errors` 和 `fmt`。这让它可以作为底层公共模块被接口层、业务层或工具函数安全引用。\n\n当前调用关系中，`util/biz_handler_err.go` 会调用 `CodeMsg`，说明该模块承担了业务 handler 错误返回格式化的职责。测试文件 `errno/code_test.go` 覆盖了 `CompoundError.Error`、`ParamEmpty`、`RPCErr` 和 `CodeMsg` 的主要行为。\n\n## 贡献注意事项\n\n新增业务错误时，优先沿用 `CompoundError` 表达明确的业务错误码和用户可读消息。只有无法归类的系统错误、RPC 错误或第三方错误才应走 `CodeMsg` 的 `5000` 兜底路径。\n\n如果新增类似 `ParamEmpty` 的构造函数，应保持返回类型为 `*CompoundError`，这样 `errors.As` 可以继续识别包装后的错误链。不要让业务错误只以普通 `errors.New` 返回，否则接口层会丢失具体业务码并被归类为 `5000`。","core-metadata-service":"# Core Metadata Service\n\n## 模块概览\n\nCore Metadata Service 是元数据读写的业务编排层，围绕对象属性、索引、存储选择、事件投递和删除副作用组织核心流程。模块组主要由 [core 子模块](core.md) 和 [errno 子模块](errno.md) 协作完成：`core` 负责执行 `Query`、`SetAttr`、`Del`、`DelAttr`、`Count`、`CopyAttr` 等元数据操作，`errno` 负责把参数缺失等业务错误统一表示为 `CompoundError`，并通过 `CodeMsg` 转换成稳定的返回码与消息。\n\n```mermaid\nflowchart TD\n    A[\"上游 Kitex 请求\"] --> B[\"core：业务入口与流程编排\"]\n    B --> C[\"params / wrapper：空间解析、属性校验、响应组装\"]\n    B --> D[\"meta：GetMeta / SetMeta / DelMeta / CountMeta\"]\n    D --> E[\"GSI idx：索引查询、分页、统计下推\"]\n    D --> F[\"MetaStorage：Bytedoc / ODA / Abase 等存储\"]\n    B --> G[\"rocketmq：变更事件投递\"]\n    B --> H[\"checker / TTL：删除与过期副作用\"]\n    B --> I[\"errno：CompoundError / CodeMsg\"]\n```\n\n## 子模块协作\n\n[core 子模块](core.md) 是请求进入后的主路径。它先完成参数校验、空间与 schema 解析，再根据请求类型调用 `service/meta` 中的 `GetMeta`、`SetMeta`、`DelMeta`、`CountMeta` 等能力。`meta` 层继续负责选择 `iface.MetaStorage`，并在可用时结合 GSI idx 做索引查询、分页下推或 Count 下推。\n\n[errno 子模块](errno.md) 为这些流程提供统一错误语义。比如参数为空时可构造 `ParamEmpty`，业务层最终通过 `CodeMsg` 输出 `(code, message)`，避免把 Go 的 `error` 字符串直接暴露给接口调用方。\n\n## 跨模块关键流程\n\n查询流程从 `Query` 进入，并委托给 `QueryWithFuxiAttr` 处理属性选择、过滤条件和响应组装。需要索引时，`GetMeta` 会进入 `queryIdByIdxOrdered`、`GetMetaByIdsFromIdx` 等路径，再按分片键组织到 `getMetaByIDWithLimitGroupedByShardKeys`，最后返回 `compound.QueryResp`。\n\n写入流程由 `SetAttr` 编排。它会结合 `MatchWhereFilter`、`SetMeta`、`NewSetParams`、`NewUpdateWrapper` 等组件完成条件匹配、属性更新、分片键注入和存储写入；涉及索引字段时，还会整理 Fuxi 属性变更并触发后续事件。\n\n删除流程由 `Del` 和 `DelAttr` 分别处理对象删除与属性删除。`Del` 会检查存储有效性、读取版本信息，并联动 `checker` 中的 `VideoDelete` / `vDelete` 等副作用；`DelAttr` 则通过 `DelMeta` 落到元数据层。\n\n统计流程由 `Count` 调用 `CountMeta`，在条件可被索引解析时走 `countByIdx` 与 `extractCountConditions`，否则回退到普通过滤与存储查询能力。\n\n整体上，`core` 决定“做什么”和“按什么规则做”，`meta` 与存储、索引系统决定“从哪里读写”，`errno` 保证异常场景对外有一致的错误契约。","domain-models-and-parameters":"# Domain Models and Parameters\n\n## 模块概览\n\n该模块定义 Fuxi 核心路径共享的领域模型、配置结构、参数归一化逻辑和请求/查询结果包装器。它不负责具体业务执行，而是为 `admin`、`doc`、`meta`、`idx`、`mdap` 等服务层提供稳定的数据结构和边界转换能力。\n\n主要代码分布：\n\n- `fuxi/core/config`：服务配置 key、PSM、`StorageCfg`、`MDAPConfig`。\n- `fuxi/core/consts/entity`：系统字段、类型检查、GSI bucket、索引列 typed value、事件、存储类型、scope。\n- `fuxi/core/utils/params`：从请求中解析 `space/schema/schema_ver/id`。\n- `fuxi/core/utils/vers`：HLC 版本封装和索引路径版本归一化。\n- `fuxi/core/utils/wrapper`：Set/Delete/Query 相关的属性展开、校验、序列化辅助。\n- `fuxi/core/utils/view`：基于 Vitess 的 SQL 解析实验性工具。\n\n## 配置模型\n\n### 服务常量与配置 key\n\n`config.PSM` 固定为：\n\n```go\nconst PSM = \"bytedance.videoarch.compound\"\n```\n\n`fuxi/core/config/keys.go` 中的常量使用 `conf.Key` 表示配置中心 key，例如：\n\n- `config.Fed`\n- `config.StorageCfgKey`\n- `config.MDAP`\n- `config.Event`\n- `config.DomainTokenCfg`\n\n这些 key 只描述配置入口，不包含加载逻辑。\n\n### StorageCfg\n\n`StorageCfg` 用于按 `space + schema` 选择存储后端：\n\n```go\ntype StorageCfg struct {\n\tFilter  []Filter           `json:\"filter\"`\n\tDefault entity.StorageType `json:\"default\"`\n}\n```\n\n`StorageCfg.Get(space, schema string)` 会先扫描 `Filter`，命中完全匹配时返回对应 `Filter.Storage`，否则返回 `Default`。\n\n```go\nstorage := cfg.Get(\"default\", \"media\")\n```\n\n`Filter` 的匹配条件是严格相等：\n\n```go\ntype Filter struct {\n\tSpace   string             `json:\"space\"`\n\tSchema  string             `json:\"schema\"`\n\tStorage entity.StorageType `json:\"storage\"`\n}\n```\n\n支持的存储类型定义在 `entity.StorageType`：\n\n- `entity.Tos`\n- `entity.Abase2`\n- `entity.Oda`\n- `entity.Bytedoc`\n\n### MDAPConfig\n\n`MDAPConfig` 是 MDAP 相关服务的配置聚合，覆盖 schema 名称、ArtifactType 映射、处理后端和 Prodia / Transcode Router 参数。\n\n关键字段：\n\n```go\ntype MDAPConfig struct {\n\tAssetGroupSchema string `yaml:\"asset_group_schema\"`\n\tSourceSchema     string `yaml:\"source_schema\"`\n\tArtifactSchema   string `yaml:\"artifact_schema\"`\n\n\tArtifactTypes map[string]ArtifactTypeConfig `yaml:\"artifact_types\"`\n\n\tTranscodeRouterStartURL           string `yaml:\"transcode_router_start_url\"`\n\tTranscodeRouterDestinationCluster string `yaml:\"transcode_router_destination_cluster\"`\n\tTranscodeRouterFallbackTaskListID string `yaml:\"transcode_router_fallback_task_list_id\"`\n\tWithSD                            bool   `yaml:\"with_sd\"`\n\n\tDigestTaskParamsByTemplateID map[string]string `yaml:\"digest_task_params_by_template_id\"`\n\tDefaultDigestTaskParams      string            `yaml:\"default_digest_task_params\"`\n\n\tProcessingBackendType string       `yaml:\"processing_backend_type\"`\n\tProdiaConfig          ProdiaConfig `yaml:\"prodia_config\"`\n}\n```\n\n默认值通过 getter 集中处理：\n\n- `GetAssetGroupSchema()`：空值返回 `\"mdap_asset_group\"`。\n- `GetSourceSchema()`：空值返回 `\"mdap_source\"`。\n- `GetArtifactSchema()`：空值返回 `\"mdap_artifact\"`。\n- `GetTranscodeRouterStartURL()`：空值返回默认 Transcode Router BOE URL。\n- `GetTranscodeRouterFallbackTaskListID()`：`nil` 或空值返回默认 task list id。\n- `GetProcessingBackendType()`：`nil` 或空值返回 `\"transcode_router\"`。\n- `GetProdiaCluster()`：`nil` 或空值返回 `\"default\"`。\n- `GetProdiaWorkflowDpName()`：`nil` 或空值返回 `\"default\"`。\n\n`GetDigestTaskParamsByTemplateID(templateID)` 用于按模板选择下游 JSON 参数：先查 `DigestTaskParamsByTemplateID[templateID]`，未命中或 `templateID` 为空时回退到 `DefaultDigestTaskParams`。\n\n`GetArtifactTypeConfig(typeName)` 从 `ArtifactTypes` 查找配置，未配置时返回 `nil`。调用方需要显式处理不存在的 ArtifactType。\n\nProdia 相关 getter 都容忍 `MDAPConfig == nil`：\n\n```go\ncfg.GetProdiaWorkflowName()\ncfg.GetProdiaCallbackTopic()\ncfg.GetProdiaSecret()\n```\n\n其中大部分空配置返回空字符串，只有 cluster 和 workflow dp name 有 `\"default\"` 默认值。\n\n## Scope 与公共参数解析\n\n`entity.Scope` 是请求执行时的最小作用域：\n\n```go\ntype Scope struct {\n\tSpace     string `json:\"space\"`\n\tSchema    string `json:\"schema\"`\n\tSchemaVer string `json:\"schema_ver\"`\n}\n```\n\n`fuxi/core/utils/params` 负责把不同请求形态归一为内部 `param` 接口：\n\n```go\ntype param interface {\n\tGetErr() error\n\tGetSpace(id string) string\n\tGetSchema(id string) string\n\tGetScope(id string) entity.Scope\n\tGetSpaceList() []string\n\tGetIDsBySpace(space string) []string\n}\n```\n\n入口函数：\n\n- `WrapReq(ctx, req ParamHolder)`：用于包含 `space/schema/schema_version/id` 的普通请求。\n- `WrapDel(ctx, req ScopeIDHolder)`：用于删除请求，不读取 schema version。\n- `WrapQuery(ctx, req *compound.QueryReq, ids ...string)`：用于查询请求，会把 `req.Where.Ids` 和额外传入的 `ids` 合并解析。\n\n解析流程：\n\n```mermaid\nflowchart TD\n    A[\"业务请求\"] --> B[\"WrapReq / WrapDel / WrapQuery\"]\n    B --> C[\"wrap\"]\n    C --> D[\"parseCommParams\"]\n    D --> E[\"GetSpace\"]\n    E --> F{\"请求显式设置 space?\"}\n    F -- \"是\" --> G[\"校验非空\"]\n    F -- \"否\" --> H[\"utils.ParseID 解析 id\"]\n    G --> I[\"写入 entity.Scope\"]\n    H --> I\n    I --> J[\"更新 cctx.Container\"]\n```\n\n`GetSpace(ctx, id, holder)` 的规则：\n\n1. 如果 `holder.IsSetSpace()` 为 true，则使用 `holder.GetSpace()`。\n2. 显式设置但值为空时返回 `empty space set`。\n3. 未显式设置时调用 `utils.ParseID(ctx, id)` 从 id 中解析 space。\n4. id 无法解析时返回 `invalid id %s` 包装错误。\n\n`parseCommParams` 还会更新 `cctx.GetContainerOrEmpty(ctx)` 中的 `Space` 和 `Schema`。如果一次请求涉及多个 space，则最终把 `ctn.Space` 置为 `\"_multi\"`。\n\n注意：`parseCommParams` 要求 schema 非空，空 schema 会设置 `p.err = errs.New(\"empty schema\")`。调用方必须检查 `GetErr()`。\n\n## 系统字段与属性类型\n\n### 字段命名约定\n\n业务层字段带 `$.` 前缀，存储层字段不带前缀：\n\n```go\nconst KeyPrefix = \"$.\"\n```\n\n转换函数：\n\n- `BizKeyToStorage(k string)`：移除 `$.` 前缀。\n- `StorageKeyToBiz(k string)`：增加 `$.` 前缀。\n- `BizAttrToStorage(m map[string]string)`：批量转换 map key。\n- `StorageAttrToBiz(m map[string]string)`：批量转换 map key，`nil` 输入返回 `nil`。\n- `BizKeyListToStorage(keys []string)`：批量转换 key 列表。\n\n系统保留列：\n\n```go\nconst DefaultIdColumn = \"$._id\"\nconst VersionColumn = \"$._version\"\nconst SpaceColumn = \"$._space\"\nconst SchemaColumn = \"$._schema\"\nconst CreatedAtColumn = \"$._created_at\"\nconst UpdatedAtColumn = \"$._updated_at\"\n```\n\n`FuxiAttr` 定义系统字段的注册类型，系统字段优先级高于 admin 注册属性。`wrapper.setWrapper.RegCheck` 中会先查 `admin.FuxiAttrIndex()`，再查业务注册属性，避免用户注册覆盖系统列。\n\n### 类型检查与值转换\n\n`TypeCheck(ctx, t, s)` 用于 Set 路径校验字符串值是否符合注册类型：\n\n- `compound.AttrType_BLOB`：总是通过。\n- `compound.AttrType_INT`：必须能 `strconv.ParseInt`。\n- `compound.AttrType_NUMBER`：必须能 `strconv.ParseFloat`。\n- `compound.AttrType_FILE`：总是通过。\n- `compound.AttrType_BOOL`：只接受 `\"true\"` 或 `\"false\"`。\n- 未知类型：记录日志并返回 false。\n\n`ConvertAttrValue(raw, typ)` 用于把字符串转换为真实 BSON 值，主要服务 GSI typed index：\n\n- `INT` 转 `int64`，失败返回 error。\n- `NUMBER` 转 `float64`，失败返回 error。\n- `BOOL` 转 `bool`，只接受 `\"true\"` / `\"false\"`。\n- `BLOB`、`FILE`、未知类型保持 string。\n\n它和 `TypeCheck` 的区别是：`TypeCheck` 只返回布尔值，`ConvertAttrValue` 返回转换后的原生值，并在失败时带错误原因。\n\n## 版本模型\n\n`fuxi/core/utils/vers` 用 `Ver` 封装 HLC 版本，同时保留两个特殊状态：\n\n```go\ntype Ver struct {\n\tnotSet   bool\n\tnoExists bool\n\th        hlc.HLC\n}\n```\n\n构造函数：\n\n- `New()`：创建新的 HLC 版本。\n- `NewBy(v *Ver)`：基于已有版本创建新版本；`nil` 输入返回 `NotExists()`。\n- `NotSet()`：表示未设置，对应 `ToInt64() == 0`、`ToInt64Str() == \"\"`。\n- `NotExists()`：表示不存在，对应 `ToInt64() == -1`、`ToInt64Str() == \"-1\"`。\n- `Parse(str)`：解析字符串，空串为 `NotSet()`，`\"-1\"` 为 `NotExists()`，其他走 `hlc.ParseInt64Str`。\n\n常用方法：\n\n- `ToInt64Str()`\n- `ToInt64()`\n- `IsNotSet()`\n- `IsNotExists()`\n- `NewerThan(other Ver)`\n- `String()`\n\n`NormalizeForIdx(raw int64)` 是索引路径的重要边界函数。它把来自主表、事件或修复任务的版本统一成 idx 包可处理的合法 V1 编码：\n\n- 合法 V1：原样返回。\n- V0：返回 `entity.VerBoundaryMin`。\n- `0`、`-1`、非法值：返回 `entity.VerBoundaryMin`。\n\n该函数不改写主表 `_version` 字段，只用于进入 idx 包前的归一化。`RemoveFromIndex`、`RemoveEntryFromBucket`、`UpdateIndexWithShardingKeys` 等索引流程都会通过边界 normalize 进入 `NormalizeForIdx`。\n\n## GSI 索引模型\n\n### IdxCfg\n\n`IdxCfg` 描述一个 GSI 索引定义：\n\n```go\ntype IdxCfg struct {\n\tName          string\n\tSpace         string\n\tSchema        string\n\tColumns       []string\n\tIsUniq        bool\n\tBucketEnabled bool\n\tCollection    string\n\tTxnSupported  bool\n}\n```\n\n关键语义：\n\n- `Columns` 是索引列名，通常含 `$.` 前缀，并与 admin 注册属性 key 对齐。\n- `BucketEnabled == false` 表示简单模式：每个 `(idx, key)` 一个 posting 文档。\n- `BucketEnabled == true` 表示分桶模式：posting list 按版本区间分裂、合并。\n- `Collection` 非空时使用自定义 collection；为空时由调用方按 `gsi_posting_{space}_{schema}_{name}` 生成。\n- `TxnSupported` 是历史字段，业务路径恒为 true，新代码不应基于它选择并发控制策略。\n\n`HasWildcardColumn()` 判断 `Columns` 中是否存在 `*`，用于识别 `$.tags[*]` 这类通配列。\n\n### IndexColVal\n\n`IndexColVal` 是 GSI typed index 的列值载体：\n\n```go\ntype IndexColVal struct {\n\tTyp compound.AttrType\n\tVal any\n\tRaw string\n}\n```\n\n它同时服务写入 doc 和构造查询 filter。核心不变式是：同一组 `(Raw, Typ)` 必须通过同一转换路径得到相同的 `BSONValue()`，这样写入、删除、查询、reconcile 重写才能构造同构的 `colN` 谓词。\n\n构造入口：\n\n- `NewIndexColVal(raw, typ)`：严格按类型转换，失败返回 error。\n- `StringCols(raws ...string)`：按 BLOB/string 语义构造，不会失败。\n- `BuildIndexColVals(vals, cols, attrMap, strict)`：按列名从注册属性表中取类型并批量构造。\n\n`BuildIndexColVals` 的 `strict` 决定失败策略：\n\n- `strict == true`：写入路径使用，转换失败直接返回 error，拒绝写入脏类型。\n- `strict == false`：读取 / Count 路径使用，转换失败回退为 BLOB/string。这样不会匹配 typed 行，语义上等价于“无此值”。\n\n辅助函数：\n\n- `RawCols(cols)`：取原始字符串，用于日志、key 序列化、兼容旧接口。\n- `BSONCols(cols)`：取真实 BSON 值，用于 doc/filter 构造。\n\n### Bucket 与 posting list\n\n`Bucket` 是分桶模式下的 GSI posting bucket 文档模型，对应 MongoDB/Bytedoc collection `gsi_posting_{space}_{schema}_{index_name}`。\n\n```go\ntype Bucket struct {\n\tID      interface{}   `bson:\"_id,omitempty\"`\n\tIdx     string        `bson:\"idx\"`\n\tSpace   string        `bson:\"space\"`\n\tSchema  string        `bson:\"schema\"`\n\tCols    []string\n\tIdxVer  int64         `bson:\"idx_ver\"`\n\tCnt     int           `bson:\"cnt\"`\n\tMinVer  int64         `bson:\"min_ver\"`\n\tMaxVer  int64         `bson:\"max_ver\"`\n\tEntries []BucketEntry `bson:\"entries\"`\n}\n```\n\n`BucketEntry` 保存主表对象和回表所需信息：\n\n```go\ntype BucketEntry struct {\n\tOid          string            `bson:\"oid\"`\n\tVer          int64             `bson:\"ver\"`\n\tShardingKeys map[string]string `bson:\"sk,omitempty\"`\n}\n```\n\n`ShardingKeys` 是为了分片主表回表查询准备的。只拿 `oid` 不一定能路由到正确分片，因此 GSI posting entry 会携带主表查询所需的分片键。历史数据可能没有 `sk` 字段，读取时允许为空。\n\n版本边界使用哨兵值替代旧的 `null` 语义：\n\n- `VerBoundaryMin`：负无穷，所有合法业务 V1 版本都大于它。\n- `VerBoundaryMax`：正无穷，也表示活跃桶。\n\n桶状态方法：\n\n- `IsActive()`：`MaxVer == VerBoundaryMax`。\n- `IsSealed()`：`MaxVer != VerBoundaryMax`。\n- `IsMinBoundary()`：`MinVer == VerBoundaryMin`。\n- `IsMaxBoundary()`：等价于活跃桶判断。\n- `IsFull()`：活跃桶 `Cnt >= BucketSize`。\n- `NeedsSplit()`：封口桶 `Cnt >= BucketSoftMax`。\n- `CanSoftAppend()`：封口桶 `Cnt < BucketSoftMax`。\n- `NeedsMerge()`：封口桶 `Cnt < BucketMergeThreshold`。\n\n默认阈值：\n\n- `BucketSize = 1000`\n- `BucketSoftMax = 1200`\n- `BucketMergeThreshold = 250`\n\n### Bucket BSON 序列化\n\n`Bucket.ToBson()` 把 `Bucket` 展开成 `bson.M`。`Cols` 不直接序列化为数组，而是展开成 `col1`、`col2`、`col3`：\n\n```go\nbucket := entity.Bucket{\n\tIdx:    \"UserCountry_IsPrivate\",\n\tSpace:  \"default\",\n\tSchema: \"schema_test\",\n\tCols:   []string{\"US\", \"false\"},\n}\ndoc := bucket.ToBson()\n```\n\n生成字段包含：\n\n```go\n// 示例字段：\n// idx, space, schema, col1, col2, idx_ver, cnt, min_ver, max_ver, entries\n```\n\n`BucketFromBson(data)` 负责反序列化：\n\n- 动态扫描 `colN` 字段并按 N 排序填充 `Cols`。\n- `min_ver` 缺失或为 nil 时使用 `VerBoundaryMin`。\n- `max_ver` 缺失或为 nil 时使用 `VerBoundaryMax`。\n- `entries` 支持 `bson.M` 和 `bson.D` 两种元素形态。\n- `sk` 支持 `map[string]string` 和 `bson.M`。\n\n### GSI filter 构造\n\n列字段名由 `ColKey(i)` 统一生成，`i` 是 0-based，返回 `col1`、`col2` 等。\n\n字符串列 filter：\n\n- `ColsFilter(cols []string)`\n- `BaseFilter(idx, space, schema string, cols []string)`\n- `BaseFilterCrossSpace(idx, schema string, cols []string)`\n\ntyped 列 filter：\n\n- `ColsFilterTyped(cols []IndexColVal)`\n- `BaseFilterTyped(idx, space, schema string, cols []IndexColVal)`\n- `BaseFilterCrossSpaceTyped(idx, schema string, cols []IndexColVal)`\n\n分桶版本路由使用 `VersionRouteFilter(idx, space, schema, cols, ver)`：\n\n```go\nfilter := entity.VersionRouteFilter(\"idx_name\", \"space_a\", \"schema_a\", []string{\"US\"}, ver)\n```\n\n它构造 V3 形态 filter，把分片键 `idx + col1..colN` 放在 `$and` 数组的独立等值 clause 中：\n\n```go\nbson.M{\n\t\"space\":  space,\n\t\"schema\": schema,\n\t\"$and\": bson.A{\n\t\tShardClause(idx, cols),\n\t\tbson.M{\"min_ver\": bson.M{\"$lte\": ver}},\n\t\tbson.M{\"max_ver\": bson.M{\"$gt\": ver}},\n\t},\n}\n```\n\n这样 Bytedoc 能正确提取分片键，避免路由失败。\n\n跨 space 查询使用 `CrossSpaceEntry` 在内存中把 `Bucket.Space` 和 `BucketEntry` 关联起来：\n\n```go\ntype CrossSpaceEntry struct {\n\tSpace string\n\tEntry BucketEntry\n}\n```\n\n该结构不对应 DB 文档，只用于查询流程的数据搬运。\n\n### RetryLimiter\n\n`RetryLimiter` 是 GSI 分桶写入/删除路径的全局重试比例限制器。它用双窗口加权滑动统计 `retries / calls`，当比例达到 `MaxRetryRatio` 时拒绝新的重试。\n\n全局实例：\n\n```go\nvar GlobalRetryLimiter = &RetryLimiter{windowStart: time.Now()}\n```\n\n使用方式：\n\n```go\nentity.GlobalRetryLimiter.RecordCall()\n\nif entity.GlobalRetryLimiter.AllowRetry() {\n\t// 执行一次重试\n}\n```\n\n行为要点：\n\n- `RecordCall()` 在重试循环前调用，记录首次调用次数。\n- `AllowRetry()` 允许时会自动增加 retry 计数。\n- 样本数低于 `retryMinSample` 时直接放行，避免冷启动误判。\n- 窗口通过 `rotate()` 惰性轮转，不需要后台定时器。\n\n## Set / Delete / Query 包装器\n\n`fuxi/core/utils/wrapper` 把外部请求中的属性 KV、查询结果和数组路径转换成 meta/doc 层需要的形态。\n\n### SetWrapper\n\n入口：\n\n```go\nwrapper.Set(scope, id, kv)\n```\n\n其中 `kv` 是 `[]*compound.AttrVal`，内部会转成 `map[string]string`。\n\n推荐调用顺序：\n\n```go\nw := wrapper.Set(scope, id, attrs).\n\tCharCheck().\n\tRegCheck(ctx).\n\tArrCheck()\n\nif resp := w.GetResp(); resp != set_meta_resp.Success {\n\treturn resp\n}\n\nnowTs, err := w.Set(ctx, id, oldVer, newVer, filter)\n```\n\n各步骤职责：\n\n- `CharCheck()`：当前是占位实现。\n- `RegCheck(ctx)`：校验属性是否注册，并用 `entity.TypeCheck` 校验字符串值类型。\n- `ArrCheck()`：解析数组字段，校验数组下标从 0 连续。\n- `Set(ctx, id, oldVer, newVer, filter)`：调用 `meta.SetMeta` 落库，返回实际写入时间戳 `nowTs`。\n\n`RegCheck` 的注册属性查找顺序：\n\n1. `admin.FuxiAttrIndex().Lookup(key)`\n2. `admin.GetAdminAttrIndex(ctx, space, schema, schemaVer).Lookup(key)`\n\n这保证系统字段优先。\n\n数组字段会在 `kv2Set()` 中合并为一个 `prefix+\"[]\"` 字段，值是 JSON 字符串。例如输入：\n\n```go\n// 输入 KV\n\"items[0].name\" = \"a\"\n\"items[1].name\" = \"b\"\n```\n\n会被合并为：\n\n```go\n// 落库 KV\n\"items[]\" = \"{\\\"[0].name\\\":\\\"a\\\",\\\"[1].name\\\":\\\"b\\\"}\"\n```\n\n`parseArray()` 支持嵌套数组路径，但数组完整性按每个出现的 prefix 单独检查。下标必须是数字，缺少 `]` 或下标非数字都会设置 `InvalidParam` 响应。\n\n### DelWrapper\n\n入口：\n\n```go\nwrapper.Del(paths)\n```\n\n调用流程：\n\n```go\nw := wrapper.Del(paths).\n\tMatches(existingMeta).\n\tCheckArray()\n\nif resp := w.GetResp(); resp != del_attr_resp.Success {\n\treturn resp\n}\n\ntoDelete := w.GetDel()\n```\n\n`Matches(kv)` 使用 `keys.NewMatchers(paths)` 匹配已有属性：\n\n- 命中的属性进入 `matchedKV`。\n- 未命中的属性进入 `notDel`。\n- `GetDel()` 返回真正要传给 meta 删除的 key 集合。\n\n`CheckArray()` 处理数组删除语义：\n\n- 如果命中 key 包含 `[`，取第一个 `[` 前的 prefix。\n- 删除项转换为 `prefix + \"[]\"`。\n- 如果同一数组 prefix 下还有未删除属性，则返回 `del_attr_resp.ArrayIncompleteDelete`。\n\n这意味着数组属性不支持只删除部分元素；一旦删除数组中的任意路径，就必须删除该数组 prefix 下全部数据。\n\n### QueryWrapper\n\n入口：\n\n```go\nresult := wrapper.Query(kv).GetAll()\n```\n\n它把存储层数组字段展开回普通路径：\n\n- 非数组字段原样返回。\n- 以 `[]` 结尾的字段会把 JSON 值反序列化为 `map[string]string`，再拼回 prefix。\n\n例如：\n\n```go\n// 存储层\n\"items[]\" = \"{\\\"[0].name\\\":\\\"a\\\",\\\"[1].name\\\":\\\"b\\\"}\"\n```\n\n展开为：\n\n```go\n// 查询结果\n\"items[0].name\" = \"a\"\n\"items[1].name\" = \"b\"\n```\n\nJSON 反序列化失败时只记录日志，不中断解析。\n\n### QueryResp 解析工具\n\n`key_attr.go` 提供若干 `compound.QueryResp` 解析函数：\n\n- `QueryExists(result, id)`：判断查询结果中是否存在 id。\n- `GetVersion(result)`：解析每个 id 的 `$._version`，返回 `map[string]vers.Ver`。\n- `ParseQuery(result)`：按 id 分组返回属性 meta。\n- `GetIds(result)`：提取首列 id。\n- `ParseQueryByID(result, id)`：取单个 id 的属性 map。\n- `ParseQueryWithSysID(result)`：与 `ParseQuery` 类似，但额外保留 `$._id`。\n- `ParseQueryWithSysIDByID(result, id)`：按 id 取带 `$._id` 的属性 map。\n\n`ParseQuery` 会把首列 `$._id` 作为分组 id，并跳过它，不放入属性 map。这避免 `$._id` 污染普通 diff、CopyAttr、通配路径等逻辑。\n\n`ParseQueryWithSysID` 是 GSI 专用补充：当索引列本身是 `$._id` 时，回源补全和删除清理需要能从查询结果中拿到系统 id。\n\n## 事件与存储辅助模型\n\n事件配置模型：\n\n```go\ntype EventCfg struct {\n\tMQ  EventMQCfg  `yaml:\"mq\"`\n\tTOS EventTOSCfg `yaml:\"tos\"`\n}\n```\n\n其中：\n\n```go\ntype EventMQCfg struct {\n\tCluster string `yaml:\"cluster\"`\n\tTopic   string `yaml:\"topic\"`\n}\n\ntype EventTOSCfg struct {\n\tBucket   string `yaml:\"bucket\"`\n\tSizeInKB int    `yaml:\"size_in_kb\"`\n}\n```\n\n`EventType` 当前只是 `string` 别名，事件类型常量不在本模块中定义。\n\n存储相关常量：\n\n```go\nconst (\n\tFuxiStorageKey = \"fuxi_storage_key\"\n\n\tSTORAGE_TOS   = \"STORAGE_TOS\"\n\tSTORAGE_ABASE = \"STORAGE_ABASE\"\n)\n```\n\n它们和 `StorageType` 不同：`StorageType` 是配置层枚举，`STORAGE_TOS` / `STORAGE_ABASE` 是字符串常量，主要用于属性或兼容路径。\n\n## SQL 视图解析工具\n\n`fuxi/core/utils/view/sql.go` 提供未导出的 `parse(sql string)` 和 `handleSelect(stmt)`，基于 `vitess.io/vitess/go/vt/sqlparser` 解析 SQL。\n\n当前能力较窄：\n\n- 只接受 `SELECT`。\n- 打印 select 列名、首个 table 名和 where 表达式。\n- 解析失败时返回 `errs.Wrap` 包装错误。\n- 非 `SELECT` 语句返回错误。\n\n该文件更像视图定义分析的基础工具或实验入口。它直接 `fmt.Print` 输出，不适合作为稳定库 API 暴露给业务路径。\n\n## 与服务层的连接\n\n该模块处在服务层和底层存储之间，承担“边界归一化”和“领域结构定义”的职责。\n\n典型连接关系：\n\n```mermaid\nflowchart LR\n    A[\"Kitex 请求\"] --> B[\"params.Wrap*\"]\n    B --> C[\"entity.Scope\"]\n    C --> D[\"wrapper.Set / Del / Query\"]\n    D --> E[\"meta.SetMeta / doc 查询\"]\n    C --> F[\"idx 索引服务\"]\n    F --> G[\"IndexColVal / Bucket\"]\n    H[\"配置中心\"] --> I[\"MDAPConfig / StorageCfg\"]\n    I --> J[\"mdap 服务\"]\n```\n\n关键调用路径：\n\n- `mdap/service` 通过 `MDAPConfig` getter 获取 source、artifact、processing backend 和 Prodia 配置。\n- `service/idx` 通过 `BucketFromBson`、`ToBson`、`BaseFilter`、`VersionRouteFilter` 操作 GSI posting bucket。\n- `service/idx/count.go` 使用 `ColKey` 构造 typed 或 string 列查询。\n- `wrapper.Set` 最终调用 `meta.SetMeta`，并把 `entity.SpaceColumn`、`entity.SchemaColumn` 注入 set map。\n- `params.WrapReq` / `WrapDel` / `WrapQuery` 为上层 handler 提供统一的 `space/schema/id` 分组视图。\n- `vers.NormalizeForIdx` 位于 idx 包入口边界，防止 V0、NotSet、NotExists 或非法版本进入 bucket 路由逻辑。\n\n## 贡献注意事项\n\n修改 typed index 相关逻辑时，优先保持 `BuildIndexColVals`、`NewIndexColVal`、`BaseFilterTyped` 的一致性。写入、删除、查询必须使用同构的 `IndexColVal` 构造，否则会出现索引残留或查询 miss。\n\n修改 bucket 字段时，要同步考虑 `ToBson()`、`BucketFromBson()`、`extractCols()` 和历史数据兼容。`min_ver` / `max_ver` 缺失时的哨兵回填是兼容旧数据的重要逻辑，不能随意移除。\n\n新增系统字段时，需要同时更新 `FuxiAttr`、字段常量和相关查询/Set 路径。系统字段应继续优先于 admin 注册属性。\n\n处理数组属性时，要遵守当前“数组整体写入 / 整体删除”的模型。`SetWrapper` 会把数组压成 `prefix[]` JSON，`DelWrapper` 会阻止数组部分删除，`QueryWrapper` 再把 `prefix[]` 展开回路径形式。\n\n新增请求包装入口时，应复用 `parseCommParams` 和 `GetSpace`，避免在 handler 或 service 层重复实现 space 推导、schema 校验和 context container 更新逻辑。","file-url-and-media-operations":"# File URL and Media Operations\n\n## 文件 URL 与媒体操作模块\n\n该模块覆盖两类能力：文件访问 URL 的鉴权与签名，以及媒体/文件变更事件的发送。核心代码位于 `fuxi/core/service/pack_url.go`、`rocketmq/event.go` 和 `rocketmq/syncs.go`。\n\n文件 URL 侧由 `GetFileURLs` 作为批量入口，根据 `mdap.URLParam.DomainType` 选择 Storage Gateway、ByteCDN 或 Volc TOS 的签名路径。事件侧由 `QuickSent` 作为变更事件入口，补齐上下文、时间戳和订阅目标后，经 `sendChangeEvent` 投递到 RocketMQ；超大事件会先上传到 TOS，再在 MQ 消息中只保留指针。\n\n## URL 签名入口\n\n`GetFileURLs(ctx, req)` 是批量生成文件访问 URL 的服务入口，返回 `compound.GetFileURLsResponse`。它的执行顺序是：\n\n1. `validateGetFileURLsRequest` 校验请求。\n2. `authorizeGetFileURLs` 调用 `AuthorizeGetFileURLAccess` 做 MDAP 权限校验。\n3. 使用 `gopool.NewPool` 并发处理 `req.UriInfos`。\n4. 每个 URI 由 `GetFileURL` 生成 `compound.FileInfo`。\n5. 单个 URI 失败时不会中断整批请求，而是把错误码和错误消息写入该 URI 对应的 `FileInfo.Status`、`FileInfo.Message`。\n\n```mermaid\nflowchart TD\n    A[\"GetFileURLs\"] --> B[\"validateGetFileURLsRequest\"]\n    A --> C[\"authorizeGetFileURLs\"]\n    C --> D[\"AuthorizeGetFileURLAccess\"]\n    A --> E[\"并发遍历 UriInfos\"]\n    E --> F[\"GetFileURL\"]\n    F --> G{\"DomainType\"}\n    G --> H[\"signStorageGWURL\"]\n    G --> I[\"signCdnURL\"]\n    G --> J[\"signTosVolcUrl\"]\n```\n\n请求校验分两层：\n\n- `validateGetFileURLsRequest` 校验 `req`、`UriInfos`、`Provider`。\n- `ValidateSignedURLRequest` 校验 `URLParam.DomainType` 和 `Auth`。\n\n`ValidateSignedURLRequest` 要求 `urlParam` 不为空，`DomainType` 落在支持范围内，并且 `auth` 非空。这里的 `auth` 后续会传给 MDAP Auth 客户端解析调用方身份。\n\n## 权限模型\n\n`AuthorizeGetFileURLAccess(ctx, provider, urlParam, auth)` 是 URL 获取权限的统一校验函数。它先通过 `getURLPermissionActionByDomainType` 把 `mdap.DomainType` 映射成权限动作，再调用 MDAP Auth：\n\n- `getMDAPAuthClient` 获取 `mdapauth.Client`。\n- `authCli.ExtractPrincipal(ctx, auth)` 从凭证中解析主体。\n- `authCli.CheckGetURLPermission(ctx, principal, provider, action)` 判断主体是否拥有当前 provider 下对应 URL 类型的获取权限。\n\n当前支持的权限动作包括：\n\n| DomainType | 权限动作 |\n|---|---|\n| `mdap.DomainType_VolcS3InternalOrigin` | `mdap.tenant.get_volc_inner_s3_url` |\n| `mdap.DomainType_VolcS3ExternalOrigin`、`mdap.DomainType_VolcS3DualStackDomain` | `mdap.tenant.get_volc_pub_s3_url` |\n| `mdap.DomainType_ByteInternalAll` | `mdap.tenant.get_byte_inner_all_url` |\n| `mdap.DomainType_ByteInternalDev` | `mdap.tenant.get_byte_inner_dev_url` |\n| `mdap.DomainType_ByteExternalCDN` | `mdap.tenant.get_byte_cdn_url` |\n| `mdap.DomainType_ByteExternalOrigin` | `mdap.tenant.get_byte_origin_url` |\n\n如果鉴权失败且 MDAP Auth 返回了申请链接，错误信息会包含 `apply url`，方便调用方引导用户申请权限。\n\n## 单文件 URL 生成\n\n`GetFileURL(ctx, uriInfo, param, mdapProvider)` 负责单个 URI 的 URL 生成。它依赖两类元数据：\n\n- `bktmeta.GetBucket(ctx, bucketName)`：根据 URI 第一段获取 bucket 元数据。\n- `account.GetAccountMDAPDomains(ctx, mdapProvider, param.DomainType)`：获取 provider 在指定域名类型下可用的域名。\n\nURI 的 bucket 名通过 `strings.Split(uriInfo.Uri, \"/\")[0]` 取得，因此传入的 `uriInfo.Uri` 必须以 bucket 名作为第一段。\n\n过期时间由 `getExpireDuration` 统一处理：\n\n- `Expire == 0` 时使用默认值 `3600` 秒。\n- `Expire > maxExpireSec` 时截断到 `2 * 365 * 24 * 3600` 秒。\n- 返回值类型为 `time.Duration`。\n\n`GetFileURL` 会把过期时间转换为 `URLExpire`，即当前时间加过期时长后的 Unix 秒级时间戳。\n\n## DomainType 与签名路径\n\n`GetFileURL` 按 `param.DomainType` 选择签名实现：\n\n| DomainType | 签名函数 | 访问形态 |\n|---|---|---|\n| `ByteExternalOrigin` | `signStorageGWURL` | Byte Storage Gateway 外部源站 |\n| `ByteInternalAll` | `signStorageGWURL` | Byte 内网全域 |\n| `ByteInternalDev` | `signStorageGWURL` | Byte 内网开发域 |\n| `ByteExternalCDN` | `signCdnURL` | ByteCDN |\n| `VolcS3ExternalOrigin` | `signTosVolcUrl` | Volc TOS 公网 S3 域 |\n| `VolcS3InternalOrigin` | `signTosVolcUrl` | Volc TOS 内网 S3 域 |\n| `VolcS3DualStackDomain` | `signTosVolcUrl` | Volc TOS 双栈 S3 域 |\n\n不支持的 `DomainType` 会返回 `pack_url_resp.ErrUnsupportedDomainType`。\n\n## Storage Gateway 签名\n\n`signStorageGWURL(ctx, ssl, domain, objectID, expire)` 用于 Byte 内部域和外部源站域。它先通过 `packStorageGWURL` 拼出原始 URL：\n\n```go\nscheme://domain/storage/v1/objectID\n```\n\n随后构造 `http.Request`，并通过 `iamsdk.DefaultClient.SignV4` 生成 query 签名 URL。这里使用了：\n\n- `iamsdk.UseQuery()`：签名写入 query。\n- `iamsdk.WithCustomQuerySelector(nonSelector)`：不选择额外 query 参与签名。\n- `iamsdk.WithExpires(expire)`：设置过期时长。\n- `iamsdk.DisableLogger()`：关闭 SDK 内部日志。\n\n`ssl` 为 `true` 时使用 `https`，否则使用 `http`。当前 `GetFileURL` 调用该函数时固定传入 `true`。\n\n## ByteCDN 签名\n\n`signCdnURL(ctx, ssl, mainDomain, objectID, expire)` 用于 `mdap.DomainType_ByteExternalCDN`。流程是：\n\n1. `getCDNToken(ctx, mainDomain)` 从 TCC 配置 `config.DomainTokenCfg` 中读取域名 token。\n2. 通过 `cdnClientCache.Fetch` 缓存或创建 `bytecdn.Client`。\n3. 非中国区域且非 BOE 环境时，在对象路径前追加 `obj/`。\n4. 调用 `client.BuildURLs` 生成带过期时间的 CDN URL。\n\nCDN 客户端缓存 TTL 为 `cdnClientExpire = 2 * time.Hour`。缓存 key 是 `mainDomain`。\n\n`IsCnRegion` 用于判断当前运行区域是否属于中国区域。它检查 `env.Region()` 是否为 `env.R_CN`、`env.R_CNTOB`、`env.R_ChinaEast`，或者 `env.IsBoeCN()` 为真。\n\n## Volc TOS 预签名\n\n`signTosVolcUrl(ctx, uriInfo, bucket, param)` 用于 Volc S3 域名类型。它先从 bucket 元数据中获取 TOS bucket：\n\n```go\ntosBkt, err := bucket.GetTosBucket()\n```\n\n随后通过 `getTosCli(ctx, tosBkt)` 获取 TOS 客户端，并根据 `param.DomainType` 选择 `TosDomainType`：\n\n- 默认：`gopkgTos.TosInternalS3Domain`\n- `VolcS3DualStackDomain`：`gopkgTos.TosDualStackS3Domain`\n- `VolcS3ExternalOrigin`：`gopkgTos.TosPublicS3Domain`\n\n`signTosVolcUrl` 使用 `gopkgTos.BatchObjectsPreSignedInput` 构造批量预签名请求。虽然当前只放入一个对象，但仍使用 batch API。对象 key 为 `uriInfo.Uri`。\n\n如果调用方传入了 `uriInfo.Options.TosVolcOptions`，函数会把其中的 `HTTPQuery` 和 `HTTPHeader` 透传给 TOS 预签名对象：\n\n```go\ngopkgTos.ObjectToPreSigned{\n    Key:    uriInfo.Uri,\n    Query:  query,\n    Header: header,\n}\n```\n\n返回前会校验：\n\n- `output` 不能为空。\n- `len(output.KeysUrlsMap)` 必须等于请求对象数量。\n- 最终返回 `output.KeysUrlsMap[uriInfo.Uri]`。\n\n`getTosCli` 使用 `tosClientCache` 缓存客户端，缓存 TTL 为 `tosClientExpire = 10 * time.Minute`，缓存 key 是 TOS bucket 名。创建客户端时会处理 `IDC == \"cn\"` 的特殊情况：如果当前 IDC 是 `LF`、`HL` 或 `LQ`，则使用当前 IDC；否则回退到 `LF`。\n\n## 变更事件发送入口\n\n`QuickSent(ctx, event)` 是文件/属性变更后发送事件的入口。它在调用 `sendChangeEvent` 前会补齐事件字段：\n\n- 如果 `event.Space` 为空，从 `cctx.GetContainerOrEmpty(ctx)` 读取 `Space`。\n- 如果 `event.Schema` 为空，从同一个 container 读取 `Schema`。\n- 如果 `event.TS == 0`，填充当前毫秒时间戳 `time.Now().UnixMilli()`。\n- 如果 `event.Syncs` 为空，调用 `detectSyncs(ctx, &event)` 预判内部订阅目标。\n\n`SetAttr`、`Del`、`DelAttr` 等服务逻辑会调用 `QuickSent`，因此这里是变更事件进入 RocketMQ 模块的主要边界。\n\n## Syncs 预判\n\n`detectSyncs(ctx, event)` 当前只识别 GSI 订阅目标。它调用 `hitGSI(ctx, event)` 判断事件变更字段是否命中索引列；命中时追加 `compound.SyncTarget_GSI`。\n\n`hitGSI` 的判断逻辑是：\n\n1. `event.Space` 或 `event.Schema` 为空时直接返回 `false`。\n2. 通过 `admin.GetIdxCfg(ctx, event.Space, event.Schema)` 获取索引配置。\n3. 把索引列拆成精确列和通配列。\n4. 遍历 `event.Created`、`event.Updated`、`event.Deleted` 的 `Path`。\n5. 精确列通过 map 判断；通配列通过 `keys.IsMatch` 判断。\n\n如果调用方已经显式设置了 `event.Syncs`，`QuickSent` 不会覆盖它。这一点由 `TestQuickSent_PreservesCallerSyncs` 覆盖。\n\n## RocketMQ 投递与大消息卸载\n\n`sendChangeEvent(ctx, event)` 负责实际发送。它有三种主要路径：\n\n```mermaid\nflowchart TD\n    A[\"sendChangeEvent\"] --> B{\"mockFlag?\"}\n    B -->|是| C[\"记录 records 后返回\"]\n    B -->|否| D{\"cfg 是否初始化?\"}\n    D -->|否| E[\"记录告警并丢弃\"]\n    D -->|是| F[\"jsonify 并序列化\"]\n    F --> G{\"消息大小 <= 阈值?\"}\n    G -->|是| H[\"send 投递 MQ\"]\n    G -->|否| I[\"storage.Upload 上传完整事件\"]\n    I --> J[\"MQ 中保留 URI 和精简事件\"]\n    J --> H\n```\n\n配置在包初始化时从 `conf.GetWithYAML[entity.EventCfg](context.Background(), config.Event)` 读取。如果配置不存在，模块不会 panic，但事件会在 `sendChangeEvent` 中被丢弃并打印告警。如果配置存在但 MQ 或 TOS 必要字段为空，则初始化阶段直接 panic。\n\n消息大小阈值来自 `cfg.TOS.SizeInKB`。事件序列化后：\n\n- 小于等于阈值：直接通过 `send(ctx, event.ID, eventBytes)` 投递 MQ。\n- 超过阈值：把完整事件 JSON 上传到 `cfg.TOS.Bucket`，然后在 MQ 消息中写入 `event.URI = bucket/key`，并清空 `Created`、`Updated`、`Deleted`。\n- 如果清空 C/U/D 后仍超过阈值，并且 `event.IdxSnapshot != nil`，继续清空 `IdxSnapshot`。\n\n这种分级卸载保证小事件完整走 MQ，大事件通过 TOS 保存完整内容，同时尽量在 MQ 中保留 `IdxSnapshot`，方便消费端在消息体足够小时直接使用。\n\n## 二进制字段 JSON 化\n\n`jsonify(ctx, event)` 在事件序列化前处理可能包含二进制内容的字段。它只处理 `event.URI` 为空的事件；如果 `event.URI` 已存在，会记录告警并返回。\n\n处理范围包括：\n\n- `event.Created[i].Val`\n- `event.Updated[i].Before`\n- `event.Updated[i].After`\n- `event.Deleted[i].Val`\n\n判断函数是 `strs.MayContainsBinary`。命中后会：\n\n- 设置对应元素的 `IsBase64 = true`。\n- 使用 `base64.StdEncoding.EncodeToString` 编码字段值。\n\n## 测试辅助模式\n\n`rocketmq/event.go` 提供了两类测试辅助能力：\n\n- `Mock(t)` / `Demock(t)`：开启或关闭 mock 模式。mock 模式下 `sendChangeEvent` 不会真正发送 MQ，只把事件追加到 `records`。\n- `PopRecords()`：返回并清空 mock 模式记录。\n- `SpyOn(t)` / `SpyOff(t)`：开启或关闭 spy 模式。spy 模式会记录事件，但不阻止正常发送。\n- `PopSpyRecords()`：返回并清空 spy 模式记录。\n\n`mockBeforeSerialize` 用于测试序列化前后的事件形态，代码中会在小消息和大消息路径分别把事件写入 `records` 后返回。\n\n## 与代码库其他部分的连接\n\nURL 生成能力不仅被 `GetFileURLs` 使用，也被 MDAP 查询链路复用。调用图显示，`MGetArtifacts`、`queryArtifactsByAssetGroupID` 等 MDAP 服务路径会进入 `AuthorizeGetFileURLAccess`，统一使用同一套 `DomainType -> action -> MDAP Auth` 权限模型。\n\n事件发送能力连接核心服务变更路径。`SetAttr`、`Del`、`DelAttr` 等操作通过 `QuickSent` 发出 `compound.Event`，RocketMQ 消费侧可以依赖 `Event.Syncs` 快速分流到 GSI 等内部订阅系统，而不需要每个 consumer 重复计算索引命中逻辑。\n\n## 修改注意事项\n\n新增 URL 域名类型时，需要同时检查三处：\n\n1. `ValidateSignedURLRequest` 的 `DomainType` 合法范围。\n2. `getURLPermissionActionByDomainType` 的权限动作映射。\n3. `GetFileURL` 中的签名分发逻辑。\n\n新增事件订阅系统时，优先扩展 `detectSyncs`，保持 `QuickSent` 只负责填充默认字段和调用检测逻辑。具体命中判断应像 `hitGSI` 一样独立成小函数，避免把多个订阅系统的规则混在入口函数里。\n\n修改大消息卸载策略时，需要关注 `sendChangeEvent` 中 MQ 消息大小与 `IdxSnapshot` 保留策略。当前行为是先保留 `IdxSnapshot`，只有精简后仍超阈值才移除；相关测试包括 `Test_sendChangeEvent_TOS_KeepsIdxSnapshot` 和 `Test_sendChangeEvent_TOS_StripIdxSnapshotWhenHuge`。","generated-rpc-and-protocol-models-abase":"# Generated RPC and Protocol Models — abase\n\n## 模块定位\n\n`kitex_gen/abase` 是由 `idl/abase/abase.thrift` 生成的 Kitex/Thrift 协议模型包，定义 Abase 服务的枚举、请求/响应结构体、服务接口和 RPC 参数/结果包装类型。核心文件是 `kitex_gen/abase/abase.go`，配套的 `kitex_gen/abase/k-abase.go` 提供 Kitex 快速编解码、长度计算、深拷贝和 `Base`/`BaseResp` 懒初始化辅助逻辑。\n\n这些文件是生成代码，文件头明确标记 `Code generated by thriftgo ... DO NOT EDIT`。需要变更字段、方法或枚举时，应修改 `idl/abase/abase.thrift` 并重新生成。\n\n## 服务接口\n\n`AbaseService` 是本包暴露的 RPC 契约：\n\n```go\ntype AbaseService interface {\n\tGet(ctx context.Context, req *GetRequest) (*GetResponse, error)\n\tSet(ctx context.Context, req *SetRequest) (*SetResponse, error)\n\tDel(ctx context.Context, req *DeleteRequest) (*DeleteResponse, error)\n\n\tBatchGet(ctx context.Context, req *BatchGetRequest) (*BatchGetResponse, error)\n\tBatchSet(ctx context.Context, req *BatchSetRequest) (*BatchSetResponse, error)\n\tBatchDel(ctx context.Context, req *BatchDeleteRequest) (*BatchDeleteResponse, error)\n\n\tIncrBy(ctx context.Context, req *IncrByRequest) (*IncrByResponse, error)\n\tBatchIncrBy(ctx context.Context, req *BatchIncrByRequest) (*BatchIncrByResponse, error)\n\n\tAppend(ctx context.Context, req *AppendRequest) (*AppendResponse, error)\n\tBatchAppend(ctx context.Context, req *BatchAppendRequest) (*BatchAppendResponse, error)\n\n\tXGet(ctx context.Context, req *XGetRequest) (*XGetResponse, error)\n\tXSet(ctx context.Context, req *XSetRequest) (*XSetResponse, error)\n\tBatchXGet(ctx context.Context, req *BatchXGetRequest) (*BatchXGetResponse, error)\n\tBatchXSet(ctx context.Context, req *BatchXSetRequest) (*BatchXSetResponse, error)\n\n\tExpire(ctx context.Context, req *ExpireRequest) (*ExpireResponse, error)\n\tBatchExpire(ctx context.Context, req *BatchExpireRequest) (*BatchExpireResponse, error)\n\n\tScanRow(ctx context.Context, req *ScanRowRequest) (*ScanRowResponse, error)\n}\n```\n\n`kitex_gen/abase/abaseservice` 基于这些类型生成客户端、服务注册和调用分发代码。典型路径是：\n\n```mermaid\nflowchart LR\n    A[\"业务代码\"] --> B[\"abaseservice.Client\"]\n    B --> C[\"AbaseService*Args\"]\n    C --> D[\"请求模型\"]\n    D --> E[\"Thrift 编码\"]\n    E --> F[\"Abase 服务\"]\n    F --> G[\"响应模型\"]\n    G --> H[\"AbaseService*Result\"]\n```\n\n## 协议模型分组\n\n### 基础 KV 操作\n\n`GetRequest` / `GetResponse` 用于读取单个键：\n\n- `GetRequest.Key`、`GetRequest.TableName` 是必填二进制字段。\n- `TimeoutMillisec`、`Priority`、`Flags`、`RetryInfo`、`Base` 是可选字段。\n- `GetResponse.ErrCode` 表示请求结果，`Value` 是返回值，`TtlInMillisec` 是剩余 TTL，`RetryInfo` 用于重试路由信息。\n\n`SetRequest` / `SetResponse` 用于写入单个键：\n\n- `SetRequest.Key`、`TableName`、`Value` 必填。\n- `TtlType` 与 `Ttl` 同时设置时才表达过期时间。\n- `ExistType` 当前只有 `ExistType_ExistNX`。\n- `SetResponse.ErrCode` 是写入结果。\n\n`DeleteRequest` / `DeleteResponse` 用于删除单个键：\n\n- `DeleteRequest.Key`、`TableName` 必填。\n- `DeleteResponse` 同时包含 `ErrCode` 和 `RespCode`。\n\n### 批量操作\n\n批量模型都采用相同结构：请求侧用 `Reqs` 包装单条请求列表，响应侧用 `Rsps` 包装单条响应列表，并通过 `RespCode BatchResponseCode` 表示批量整体状态。\n\n包括：\n\n- `BatchGetRequest` / `BatchGetResponse`\n- `BatchSetRequest` / `BatchSetResponse`\n- `BatchDeleteRequest` / `BatchDeleteResponse`\n- `BatchIncrByRequest` / `BatchIncrByResponse`\n- `BatchAppendRequest` / `BatchAppendResponse`\n- `BatchXGetRequest` / `BatchXGetResponse`\n- `BatchXSetRequest` / `BatchXSetResponse`\n- `BatchExpireRequest` / `BatchExpireResponse`\n\n`BatchResponseCode_Error` 不等价于每条请求都失败；调用方仍需要逐项检查 `Rsps` 中每个响应的 `ErrCode`。`NotFound` 在 IDL 注释中不被视为批量错误。\n\n### 数值与追加操作\n\n`IncrByRequest` / `IncrByResponse` 用于原子增量：\n\n- `Key`、`TableName`、`Delta` 必填。\n- 可选 `TtlType`、`Ttl`、`TimeoutMillisec`、`Base`。\n- `IncrByResponse.Value` 返回操作后的数值。\n\n`AppendRequest` / `AppendResponse` 用于追加或前插二进制值：\n\n- `Key`、`TableName`、`Value` 必填。\n- `Prepend` 为可选布尔字段，设置后表达前插语义。\n- `AppendResponse.Len` 返回写入后的长度。\n\n### 带 generation 的 X 系列\n\n`XGetRequest` / `XGetResponse` 和 `XSetRequest` / `XSetResponse` 用于带 `Generation` 的读写路径：\n\n- `XGetResponse.Generation` 返回当前版本。\n- `XSetRequest.Generation` 是必填字段，用于服务端校验。\n- `XSetResponse.Generatio
