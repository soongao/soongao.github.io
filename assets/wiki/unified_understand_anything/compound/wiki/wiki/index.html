run_remote_ut.sh]\n  E[运行环境] --> F[bootstrap.sh]\n  F --> G[bin/bytedance.videoarch.compound]\n  D --> H[utd remote_test]\n  D --> I[script/utd_analyze.py]\n```\n\n## bootstrap.sh\n\n`script/bootstrap.sh` 是服务运行时启动入口，用于准备 Kitex 运行环境并启动主二进制。\n\n执行流程：\n\n1. 设置默认服务标识：\n   ```bash\n   export PSM=${PSM:-bytedance.videoarch.compound}\n   ```\n\n2. 计算脚本所在目录：\n   ```bash\n   CURDIR=$(cd $(dirname $0); pwd)\n   ```\n\n3. 解析运行根目录：\n   - 如果传入第一个参数，则使用该参数作为 `RUNTIME_ROOT`\n   - 否则使用 `script/` 目录本身作为 `RUNTIME_ROOT`\n\n4. 导出 Kitex 相关环境变量：\n   - `KITEX_RUNTIME_ROOT=$RUNTIME_ROOT`\n   - `KITEX_CONF_DIR=\"$CURDIR/conf\"`\n   - `KITEX_LOG_DIR=\"${RUNTIME_LOGDIR:-${RUNTIME_ROOT}/log}\"`\n\n5. 确保日志目录存在：\n   - `$KITEX_LOG_DIR/app`\n   - `$KITEX_LOG_DIR/rpc`\n\n6. 使用 `exec` 启动服务二进制：\n   ```bash\n   exec \"$CURDIR/bin/bytedance.videoarch.compound\"\n   ```\n\n`exec` 会用服务进程替换当前 shell 进程，因此后续信号会直接传递给 `bin/bytedance.videoarch.compound`。这适合容器、部署平台或进程管理器启动服务时使用。\n\n常见调用方式：\n\n```bash\n# 使用 script/ 作为运行根目录\nbash script/bootstrap.sh\n\n# 指定运行根目录\nbash script/bootstrap.sh /opt/tiger/app\n\n# 覆盖日志目录\nRUNTIME_LOGDIR=/var/log/compound bash script/bootstrap.sh /opt/tiger/app\n```\n\n需要注意的是，`bootstrap.sh` 假定以下路径存在：\n\n```text\nscript/conf/\nscript/bin/bytedance.videoarch.compound\n```\n\n如果二进制不在 `script/bin/` 下，脚本不会自动查找其它位置。\n\n## doc-init-check.sh\n\n`script/doc-init-check.sh` 是纯 shell 实现的文档规约检查脚本，用于检查 `doc-init` 体系下的 living spec 和项目级文档入口是否满足约束。它不依赖外部工具，只使用 `grep`、`awk`、`sed`、`wc` 等常见命令。\n\n脚本启用：\n\n```bash\nset -uo pipefail\n```\n\n它没有启用 `set -e`，因为脚本需要在多个检查项之间累积 warning 和 error，再统一给出退出码。\n\n### 计数函数\n\n脚本内部定义了三个输出和计数函数：\n\n```bash\nnote_warn() { echo \"[WARN] $1\"; WARN=$((WARN+1)); }\nnote_err() { echo \"[ERR ] $1\"; ERR=$((ERR+1)); }\nnote_ok() { echo \"[OK  ] $1\"; }\n```\n\n其中：\n\n- `note_warn` 增加 `WARN`\n- `note_err` 增加 `ERR`\n- `note_ok` 只输出通过信息\n\n### 检查 living spec 的 EARS keyword\n\n脚本扫描：\n\n```bash\ndocs/specs/*/spec.md\n```\n\n每个 living spec 中以如下标题识别需求段：\n\n```markdown\n### Requirement\n```\n\n每条 Requirement 后续内容需要出现至少一个 EARS keyword：\n\n```text\nSHALL\nMUST\nWHEN\nWHILE\nIF\nWHERE\n```\n\n实现上使用 `awk` 在 Requirement 段内查找关键字。如果某条 Requirement 到下一个 Requirement 或二级标题前都没有命中关键字，则输出 warning。\n\n该检查用于降低需求描述过于散文化的风险，让 living spec 更接近可验证的规格文本。\n\n### 检查 Owner 字段\n\n每个 living spec 需要包含：\n\n```markdown\n> **Owner**:\n```\n\n缺失时记录 warning：\n\n```bash\ngrep -q '^> \\*\\*Owner\\*\\*:'\n```\n\n这对应 `docs/AGENTS.md` 中对 living spec 责任人的要求。\n\n### 检查 living spec 中的 TBD 占位\n\n脚本会统计 `TBD(`：\n\n```bash\ngrep -c 'TBD(' \"$f\"\n```\n\n在 living spec 中出现 `TBD(` 会产生 warning。脚本注释中说明：`spec-delta` 阶段允许 TBD，但归档为 living spec 后应替换为真实测试路径或确定内容。\n\n### 检查散落约束关键字\n\n脚本检查 `CLAUDE.md` 和 `docs/AGENTS.md` 中是否残留以下关键字：\n\n```text\ndoc-conventions\nspec-driven-docs\ngen_dir_docs\ncompound-dir-doc\n```\n\n命中内容会排除：\n\n```text\ndoc-init\n.plan-progress\ndoc-init-check.sh\n```\n\n如果仍有残留，则调用 `note_err`，最终退出码会变成阻塞型错误。\n\n这一项用于保证文档规约入口已经收敛到 `doc-init`，避免旧规则散落在多个入口中。\n\n### 检查 legacy README 清理进度\n\n脚本还会扫描带有如下标记的 README：\n\n```html\n<!-- compound-dir-doc -->\n```\n\n它排除 `.worktrees/`，并单独统计 `fuxi/core/service/idx/` 下允许保留的 README 数量。该检查只输出 `[INFO]` 或 `[OK]`，不计入 `WARN` 或 `ERR`。\n\n### 退出码语义\n\n`doc-init-check.sh` 的退出码用于本地 hook 或 CI 判断：\n\n| 退出码 | 含义 |\n|---|---|\n| `0` | 全部通过 |\n| `1` | 存在 warning，但没有 error |\n| `2` | 存在 error，或 `--strict` 下存在 warning |\n\n普通模式：\n\n```bash\nbash script/doc-init-check.sh\n```\n\n严格模式：\n\n```bash\nbash script/doc-init-check.sh --strict\n```\n\n在 `--strict` 模式下，只要 `WARN > 0` 就会返回 `2`。\n\n## install-doc-init-hook.sh\n\n`script/install-doc-init-hook.sh` 用于一键启用仓库内的 `doc-init` pre-commit 钩子。\n\n脚本启用严格模式：\n\n```bash\nset -euo pipefail\n```\n\n执行流程：\n\n1. 通过 Git 获取仓库根目录：\n   ```bash\n   ROOT=\"$(git rev-parse --show-toplevel)\"\n   ```\n\n2. 检查 `.githooks/` 是否存在。不存在时退出 `1`。\n\n3. 给 hook 和检查脚本增加可执行权限：\n   ```bash\n   chmod +x .githooks/pre-commit script/doc-init-check.sh\n   ```\n\n4. 设置当前仓库的 Git hooks 路径：\n   ```bash\n   git config core.hooksPath .githooks\n   ```\n\n启用后，Git 会从 `.githooks/` 查找 hooks。脚本输出中也给出了撤销方式：\n\n```bash\ngit config --unset core.hooksPath\n```\n\n该脚本只修改当前仓库的 Git 配置，不会修改全局 Git 配置。\n\n## run_remote_ut.sh\n\n`script/run_remote_ut.sh` 是远程单测执行入口，封装了 `utd remote_test` 的参数组装、结果目录创建，以及后续报告分析。\n\n脚本启用：\n\n```bash\nset -euo pipefail\n```\n\n因此任何未处理错误都会直接中止执行。\n\n### utd 二进制查找\n\n脚本优先使用环境变量 `UTD_BIN`，默认路径为：\n\n```bash\n$HOME/.bits-ut/utd\n```\n\n如果该路径不可执行，则回退到：\n\n```bash\n/data00/home/$(whoami)/.bits-ut/utd\n```\n\n两个路径都不可用时，脚本输出错误并退出 `1`：\n\n```text\nutd not found, set UTD_BIN or install to ~/.bits-ut/utd\n```\n\n### 远程测试参数\n\n脚本通过环境变量配置测试行为。主要变量如下：\n\n| 变量 | 默认值 | 作用 |\n|---|---|---|\n| `PIPELINE_FILE` | `.codebase/pipelines/ci.yaml` | 远程测试使用的流水线文件 |\n| `JOB_ID` | `build` | 流水线 job |\n| `WORKING_DIRECTORY` | `.` | 测试工作目录 |\n| `TEST_KIND` | `pipeline` | 测试类型 |\n| `TEST_DIRECTORY` | 空 | `TEST_KIND=directory` 时的目录 |\n| `TEST_PACKAGE_PATH` | 空 | `TEST_KIND=package` 时的包路径 |\n| `TEST_FILES` | 空 | `TEST_KIND=file` 时的文件列表 |\n| `PATTERN` | 空 | 测试过滤模式 |\n| `ENABLE_COVERAGE` | `true` | 是否开启覆盖率 |\n| `SAVE_TEST_LOG_MODE` | `1` | 测试日志保存模式 |\n| `PREPARE_ONLY` | `false` | 是否只准备流水线 |\n| `NOT_REUSE` | `false` | 是否禁止复用 |\n| `PRINT_TREE` | `true` | 是否打印分析后的树形报告 |\n| `RESULT_ROOT` | `.utd` | 结果根目录 |\n\n每次运行会生成基于时间戳的运行目录：\n\n```bash\nRUN_ID=$(date +%Y%m%d_%H%M%S)\nRESULT_DIR=${RESULT_DIR:-\"$RESULT_ROOT/runs/$RUN_ID\"}\n```\n\n结果文件包括：\n\n```text\nstatus.json\nexception.json\nutd.log\nreport.json\nreport.txt\n```\n\n### TEST_KIND 分支\n\n`TEST_KIND` 控制传给 `utd remote_test` 的范围参数。\n\n当 `TEST_KIND=directory` 时，必须提供 `TEST_DIRECTORY`：\n\n```bash\nTEST_KIND=directory TEST_DIRECTORY=./fuxi/core/service bash script/run_remote_ut.sh\n```\n\n脚本会追加：\n\n```bash\n--directory=\"$TEST_DIRECTORY\"\n```\n\n当 `TEST_KIND=package` 时，必须提供 `TEST_PACKAGE_PATH`：\n\n```bash\nTEST_KIND=package TEST_PACKAGE_PATH=./fuxi/core/service/idx bash script/run_remote_ut.sh\n```\n\n脚本会追加：\n\n```bash\n--package_path=\"$TEST_PACKAGE_PATH\"\n```\n\n当 `TEST_KIND=file` 时，必须提供 `TEST_FILES`：\n\n```bash\nTEST_KIND=file TEST_FILES=./path/to/foo_test.go bash script/run_remote_ut.sh\n```\n\n脚本会追加：\n\n```bash\n--files=\"$TEST_FILES\"\n```\n\n如果对应变量为空，脚本会退出 `2`。\n\n### 覆盖率、准备模式和复用控制\n\n默认开启覆盖率：\n\n```bash\nENABLE_COVERAGE=true\n```\n\n此时会追加：\n\n```bash\n--enable_coverage\n```\n\n只准备远程流水线：\n\n```bash\nPREPARE_ONLY=true bash script/run_remote_ut.sh\n```\n\n禁止复用：\n\n```bash\nNOT_REUSE=true bash script/run_remote_ut.sh\n```\n\n### 结果分析\n\n`utd remote_test` 执行完成后，如果本机存在 `python3`，脚本会调用：\n\n```bash\npython3 script/utd_analyze.py\n```\n\n并传入本次运行的 `status.json`、`utd.log`、`RESULT_DIR`、流水线参数和测试范围参数。\n\n分析输出：\n\n```text\n$RESULT_DIR/report.json\n$RESULT_DIR/report.txt\n```\n\n如果 `PRINT_TREE=true`，还会传入：\n\n```bash\n--print-tree\n```\n\n如果没有 `python3`，脚本不会失败，只输出：\n\n```text\npython3 not found, status_file=... utd_log=...\n```\n\n最后统一打印：\n\n```text\nresult_dir=...\n```\n\n调用方可以据此定位远程测试产物。\n\n## 与仓库其它部分的关系\n\n`script/bootstrap.sh` 连接运行时目录、Kitex 配置目录、日志目录和服务二进制，是部署或本地启动链路中的入口脚本。\n\n`script/doc-init-check.sh` 和 `script/install-doc-init-hook.sh` 连接文档规约体系与 Git 工作流。前者负责实际检查，后者负责把 `.githooks/pre-commit` 接入当前仓库。它们共同服务于 `CLAUDE.md`、`docs/AGENTS.md`、`docs/specs/*/spec.md` 等文档入口的质量约束。\n\n`script/run_remote_ut.sh` 连接仓库代码、`.codebase/pipelines/ci.yaml`、Bits 远程单测工具 `utd` 和本地分析脚本 `script/utd_analyze.py`。它适合作为本地开发时触发远程 CI 风格测试的统一入口。\n\n## 维护建议\n\n新增脚本时，优先保持当前目录已有模式：\n\n- 使用 `ROOT_DIR=$(cd \"$(dirname \"$0\")/..\" && pwd)` 或 `git rev-parse --show-toplevel` 定位仓库根。\n- 对开发或 CI 入口使用 `set -euo pipefail`，但像 `doc-init-check.sh` 这种需要累计检查结果的脚本可以只使用 `set -uo pipefail`。\n- 对可配置项使用环境变量覆盖，并提供明确默认值。\n- 对缺失的必填参数返回非零退出码，并把错误信息输出到 `stderr`。\n- 将生成产物放到固定目录，如 `.utd/runs/<RUN_ID>/`，避免污染源码目录。\n- 修改 `doc-init-check.sh` 时同步考虑 `.githooks/pre-commit` 的调用方式，避免本地 hook 和手动执行行为不一致。","other-service":"# Other — service\n\n## 模块定位\n\n`mdap/service` 承载 MDAP 的核心业务服务逻辑，负责资产组、来源、产物元数据的 CRUD，以及媒体摘要处理任务的启动。模块本身不直接实现存储，而是把 `mdap_model`、`mdap` 请求对象转换成 Fuxi Core 可读写的 `compound.SetAttrReq`、`compound.QueryReq`、`compound.CountReq`、`compound.DelReq`。\n\n主要文件分工：\n\n- `mdap.go`：资产组、Source、Artifact 的读写、查询、解析和摘要产物转换。\n- `mdap_validator.go`：请求参数校验和 payload 结构校验。\n- `parser.go`：Fuxi 查询结果解析、基础类型转换、索引数组辅助函数。\n- `start_processing.go`：`StartProcessing` 的输入归一化、操作归一化和执行计划构建。\n- `start_processing_prodia.go`：Prodia 工作流请求构建、回调参数封装、客户端缓存。\n- `start_processing_transcode_router.go`：TranscodeRouter HTTP 请求构建和调用。\n- `start_processing_auth.go`：启动处理任务的 MDAP 权限校验。\n\n## 核心依赖\n\n模块依赖三类外部能力：\n\n- Fuxi Core 服务：`fuxi_s.SetAttr`、`fuxi_s.Query`、`fuxi_s.Count`、`fuxi_s.Del`、`fuxi_s.GetFileURL`、`fuxi_s.AuthorizeGetFileURLAccess`。\n- MDAP ID 编解码：`mdapid.GenerateAssetGroupID`、`mdapid.ParseAssetGroupID`、`mdapid.Generate`、`mdapid.Parse`。\n- 处理后端：`startTranscodeRouterExecution` 调用 TranscodeRouter，`startProdiaWorkflow` 调用 Prodia。\n\n配置通过 `getMDAPConfig()` 懒加载并缓存 `config.MDAPConfig`。默认 schema 为：\n\n- `GetAssetGroupSchema()`：`mdap_asset_group`\n- `GetSourceSchema()`：`mdap_source`\n- `GetArtifactSchema()`：`mdap_artifact`\n\n`ArtifactTypes` 是 digest schema 的桥接配置，key 是 `mdap_model.ArtifactType.String()`，value 包含 `Schema` 和 `DigestType`。`QueryArtifacts` 和 `MGetArtifacts` 查询历史 digest 产物时依赖这个映射。\n\n## 数据持久化约定\n\nFuxi 属性统一使用 JSONPath 风格的字符串路径，例如 `$.space`、`$.source_configs[0].type`、`$.contents[0].blobs[0].location.path`。所有 `compound.AttrVal.Val` 都是字符串：\n\n- 数字通过 `strconv.FormatInt` 写入，解析失败时默认为 `0`。\n- 布尔值通过 `strconv.FormatBool` 写入，解析失败时默认为 `false`。\n- Source 的 `Meta`、`SourceConfig.Config`、`JobExecution.Params` 以原始字节转字符串保存。\n- Artifact 的 `ArtifactContent.Contents` 会先做 `base64.StdEncoding.EncodeToString`，读取时再解码。\n\n数组字段依赖连续索引恢复顺序。新增数组属性时，应保持 `xxx[0]`、`xxx[1]` 这种从 0 开始的连续路径，否则解析函数可能跳过不连续的数据。\n\n`parseOrderedQueryResults` 会保留 Fuxi 返回的行顺序，分页查询接口依赖这一点保持排序结果。`parseQueryResults` 会转成 `map[id]attrs`，只适合 `MGet` 这类不要求顺序的场景。\n\n## AssetGroup 流程\n\n`CreateAssetGroup` 的主路径：\n\n1. `ValidateCreateAssetGroupRequest` 校验 `Space`、`Name`、`SourceConfigs`、`MediaTypes`、`Creator`。\n2. `generateAssetGroupID` 生成包含 space 信息的资产组 ID。\n3. 构造 `mdap_model.AssetGroup`，设置 `CreateTime`、`UpdateTime`。\n4. `buildAssetGroupAttrs` 展开为 Fuxi 属性路径。\n5. 调用 `fuxi_s.SetAttr` 写入 `cfg.GetAssetGroupSchema()`。\n\n`MGetAssetGroups` 根据第一个 ID 解析 space，通过 `buildAssetGroupWhereClause` 同时设置 `Ids` 和 `$.space` 过滤，防止跨 space 误读。读取结果由 `parseAssetGroupFromQuery` 还原为 `mdap_model.AssetGroup`。\n\n`QueryAssetGroups` 支持按 `Space`、`Name`、`MediaTypes` 组合过滤，排序固定为 `$.create_time` 降序，并额外调用 `fuxi_s.Count` 返回 total。\n\n`UpdateAssetGroup` 只写请求中显式设置的字段，并总是追加 `$.update_time`。`DeleteAssetGroup` 使用 `compound.DelReq`，同样带 ID 与 space where 条件。\n\n## Source 流程\n\n`CreateSource` 要求 `AssetGroupID`、`BizID`、`MediaType`、`Format`、`Config`、`Meta`。它先用 `mdapid.ParseAssetGroupID` 取出 space 和 group key，再通过 `generateSourceID` 生成 Source ID。`generateSourceID` 会把 `MediaType` 转为 MIME 顶层类型字符，不支持的类型会返回错误。\n\n`buildSourceAttrs` 会持久化关键归属字段：\n\n- `$.biz_id`\n- `$.asset_group_id`\n- `$.asset_id`\n- `$.config.*`\n- `$.meta`\n- `$.tags[i]`\n- `$.created_time`\n- `$.updated_time`\n\n`parseSourceFromQuery` 会额外校验 Source ID 与持久化的 `$.asset_group_id` 是否属于同一 `AccountID` 和 `GroupKey`。这里不要求 VDC 一致，因此迁移或跨 VDC 持久化场景可以读取，但账号和资产组身份不能错配。\n\n`QuerySources` 必须带 `AssetGroupID`，可选 `BizID`。当只按资产组查询时会调用 `Count` 并返回 `total`；当带 `BizID` 时认为是精确过滤，不返回 total。排序字段是 `$.created_time` 降序。\n\n## Artifact 流程\n\n`CreateArtifact` 持久化 MDAP 自建产物，数据落在 `cfg.GetArtifactSchema()`：\n\n1. `ValidateCreateArtifactRequest` 校验 `DeriveID`、`Name`、`AssetGroupID`、`DeriveType` 和 `Contents`。\n2. `validateArtifactDeriveID` 校验派生对象类型，`DeriveType_Source` 必须派生自 Source，`DeriveType_Artifact` 必须派生自 Artifact。\n3. 校验 `DeriveID` 与 `AssetGroupID` 的 `AccountID`、`GroupKey` 一致。\n4. `generateArtifactID` 根据内容类型生成 Artifact ID。\n5. `calculateArtifactSize` 优先累加 `Blobs` 的 size；没有 blob 时从 payload 的 meta 中计算。\n6. `buildArtifactAttrs` 将 payload base64 后写入 Fuxi。\n\n`MGetArtifacts` 支持两种 ID：\n\n- MDAP Artifact ID：通过 `parseSpaceFromArtifactID` 路由到 `cfg.GetArtifactSchema()`。\n- 查询型 digest ID：格式为 `{biz_id}/{DigestType}/{DigestName}`，由 `parseQueryArtifactID` 识别，必须额外传 `Space`，再通过 `artifactTypeConfigByDigestType` 找到对应 digest schema。\n\n`QueryArtifacts` 也有两种请求形态：\n\n- `AssetGroupID` 查询：读 `mdap_artifact`，where 为 `$.asset_group_id == AssetGroupID`，按 `$.created_time` 降序，并返回 total。\n- `Space + SourceBizIDs + Types + Name` 查询：根据 `ArtifactTypes` 拼出 `{biz_id}/{DigestType}/{Name}`，读配置的 digest schema，按 `$.created_at` 降序，不返回 total。\n\ndigest schema 查询结果先由 `parseMediaDigestFromQuery` 转成 `dto.MediaDigest`，再由 `convertMediaDigestToArtifact` 转成统一的 `mdap_model.Artifact`。当前 `convertDigestInfoToContent` 支持 `SnapshotDigest` 和 `AudioTrackDigest`，分别映射到 `ArtifactType_Snapshots` 和 `ArtifactType_Audio`。\n\n## 签名 URL\n\n`MGetArtifacts` 和 `QueryArtifacts` 在 `WithSignedURLs` 为 true 时会先调用 `fuxi_s.AuthorizeGetFileURLAccess` 做 provider 级授权。provider 是本次查询的 space。\n\n授权通过后，`populateArtifactDownloadURLs` 会遍历：\n\n- `ArtifactContent.Blobs[*].Location`\n- `ArtifactSnapshots.Snapshots[*].Location`\n- `ArtifactSnapshots.Sprites[*].Location`\n- `ArtifactAudio.Location`\n- `ArtifactImage.Location`\n\n每个 location 通过 `fuxi_s.GetFileURL` 生成下载地址，并写回 `StoreLocation.DownloadURL`。payload 类型内容会先反序列化、填充 URL、再重新序列化回 `ArtifactContent.Contents[i]`。\n\n## StartProcessing 执行流\n\n`StartProcessing` 是启动媒体摘要处理任务的入口，支持 `transcode_router` 和 `prodia` 两种后端。默认后端来自 `config.MDAPConfig.GetProcessingBackendType()`，未配置时为 `transcode_router`。\n\n```mermaid\nflowchart TD\n    A[\"StartProcessing\"] --> B[\"校验 Auth 与后端类型\"]\n    B --> C[\"buildStartProcessingPlan\"]\n    C --> D[\"解析输入：SourceID 或 VID+AssetGroupID\"]\n    C --> E[\"解析操作：OperatorId/TemplateId 或 MultiOperation\"]\n    C --> F[\"解析 space 与 TaskListID\"]\n    F --> G{\"后端\"}\n    G --> H[\"startProcessingWithProdia\"]\n    G --> I[\"startProcessingWithTranscodeRouter\"]\n```\n\n输入归一化由 `normalizeStartProcessingInputs` 和 `resolveStartProcessingInput` 完成：\n\n- `Input` 和 `MultiInput` 必须二选一。\n- `SourceID` 模式会调用 `MGetSources` 得到 `BizID` 和 `AssetGroupID`。\n- `AssetID` 当前不支持。\n- `VID + AssetGroupID` 模式会先调用 `CreateSource` 自动创建 VDA Source。\n- `MultiInput` 中所有输入必须属于同一个 `AssetGroupID`。\n\n操作归一化由 `normalizeStartProcessingOperations` 完成：\n\n- 单操作使用顶层 `OperatorId`、`TemplateId`、`UserData`。\n- 多操作使用 `MultiOperation`，不能再混用顶层操作字段。\n- `validateStartProcessingOperatorID` 要求 `OperatorId` 匹配 `MDAPConfig.ArtifactTypes[*].DigestType`。\n- `TemplateId` 通过 `GetDigestTaskParamsByTemplateID` 映射到下游 `DigestTaskParams`。\n\n`getTaskListIDForTranscodeRouter` 会读取资产组的 `ArtifactConfig.JobExecution`，优先选择 `Type == operatorID` 的 job ID，否则选择第一个非空 job ID。没有可用 job 时使用 `GetTranscodeRouterFallbackTaskListID()`。\n\n## Prodia 后端\n\nProdia 后端支持 `MultiInput` 和 `MultiOperation`。执行前会调用 `authorizeStartProcessing`，通过 MDAP Auth 校验 `mdap.tenant.start_task` 权限，provider 为 space。\n\n`startProcessingWithProdia` 会构造：\n\n- `buildRunMedigestTaskRequest`：生成 `medigest.RunMedigestTaskRequest`，单操作写 `Operation.CVD`，多操作写 `Operation.MultiCVD`；单输入写 `Input`，多输入写 `MultiInput`。\n- `buildProdiaCallbackURI`：从 `ProdiaConfig.CallbackType/Cluster/Topic` 生成回调地址。\n- `buildProdiaCallbackArgs`：封装 space、task list、每个 digest 操作的参数，以及用户透传的 `CallbackUri`、`CallbackArgs_`。\n- `startProdiaWorkflow`：将 `RunMedigestTaskRequest` protobuf 序列化为 Prodia payload，并调用 `StartWorkflowExecution`。\n\nProdia client 按 `idc + cluster + secret` 缓存在 `prodiaWorkflowClientCache` 中。\n\n## TranscodeRouter 后端\n\n`transcode_router` 后端只支持单输入、单操作；如果计划中有多个 input 或多个 CVD operation，`StartProcessing` 会返回 `InvalidParam`。\n\n`startProcessingWithTranscodeRouter` 构造 `transcodeRouterStartReq`：\n\n- `Input.Type = \"Vid\"`，`Input.Vid` 来自解析后的 Source/BizID。\n- `Upload.Type = \"Mdap\"`，`Upload.Mdap.Space` 为资产组 space。\n- `Control.TaskListId` 使用计划中的 task list。\n- `Operation.Task.CVD` 包含 digest type、template、params、user data 和 force。\n\n`getTranscodeRouterTtEnv` 按优先级读取环境：\n\n1. `req.Params.Env[\"X-Tt-Env\"]`\n2. `req.Params.Env[\"x-tt-env\"]`\n3. `req.Base.TrafficEnv` 中开启的 env\n\n`startTranscodeRouterExecution` 使用 Hertz client 发送 POST，请求头包含 `Content-Type: application/json`，有值时追加 `X-Tt-Env` 和 `X-Jwt-Token`。如果 `WithSD` 开启，还会设置服务发现相关 option。\n\n## 校验策略\n\n`mdap_validator.go` 将校验集中在服务入口之前：\n\n- AssetGroup：要求基础字段、至少一个 `SourceConfig`、至少一个 `MediaTypes`，并校验 artifact store location 类型不重复。\n- Source：校验 `SourceConfig`，并按 `MediaType` 反序列化 `Meta`。\n- Artifact：校验 payload 能按 `ArtifactType` 反序列化为 `ArtifactSnapshots`、`ArtifactAudio` 或 `ArtifactImage`，并校验 blob location、path、size。\n- QueryArtifacts：显式区分 digest 查询和 asset group 查询，禁止混用两种查询字段。\n- 签名 URL：统一调用 `fuxi_s.ValidateSignedURLRequest` 校验 `URLParam` 和 `Auth`。\n\n新增字段时应同时更新三处：对应的 `build*Attrs`、`parse*FromQuery`、validator。否则会出现写入成功但读取丢字段，或读取可用但写入入口不接受的情况。\n\n## 测试关注点\n\n`mdap_test.go` 和 `start_processing_test.go` 主要通过 `gomonkey` patch 外部依赖，验证服务层自身行为：\n\n- 请求校验返回正确的 `mdap_resp`。\n- Fuxi 请求的 schema、space、where、sort、offset、limit 正确。\n- `parseOrderedQueryResults` 保留查询顺序。\n- Source 与 AssetGroup 的身份一致性校验。\n- Artifact payload、blob、digest schema 转换、签名 URL 填充。\n- `StartProcessing` 在 SourceID、VID+AssetGroupID、MultiInput、MultiOperation 下构造正确执行计划。\n- Prodia 与 TranscodeRouter 的后端分支、鉴权、回调参数和请求 payload。","other-specs":"# Other — specs\n\n## 模块定位\n\n`docs/specs/` 是 Compound 的 living specs 目录，用来保存各 capability 当前生效的需求契约。这里的文档不是设计草稿，也不是实现笔记，而是每个 capability 的 source of truth：归档后的需求、场景、覆盖测试和能力边界都以这里为准。\n\n该模块没有运行时代码，也没有函数调用链。它通过目录结构、Markdown 约定和归档流程连接到仓库其他部分，主要服务于开发、评审、测试补齐和后续变更判断。\n\n## 目录结构\n\n`docs/specs/README.md` 是 living specs 的总索引，列出所有 capability：\n\n- `abase-storage-db-table/`\n- `setattr-timing-instrumentation/`\n- `table-prefix-config/`\n- `table-prefix-plugin/`\n- `documentation-system/`\n- `gsi-index-runtime/`\n- `gsi-service-meta-orchestration/`\n- `gsi-reconcile-framework/`\n- `offline-snapshot-reader/`\n- `binding-index-config/`\n- `bytedoc-error-mapping/`\n\n每个 capability 通常包含一个 `spec.md`，少数 capability 也包含本地 `README.md`，例如 `documentation-system/README.md`。`spec.md` 保存该 capability 当前生效的目的、需求、场景和测试映射。\n\n## 工作方式\n\n`docs/specs/` 只在 change archive 阶段修改。新增、修改或移除 Requirement 时，不应直接编辑 living spec，而是先在 `docs/changes/<slug>/` 下完成 proposal、design、tasks 和 spec-delta，等 change 归档后再合并到对应 `docs/specs/<capability>/spec.md`。\n\n核心流转关系如下：\n\n```mermaid\nflowchart LR\n    A[\"变更提案\"] --> B[\"设计与任务拆分\"]\n    B --> C[\"spec-delta\"]\n    C --> D[\"实现与测试\"]\n    D --> E[\"archive\"]\n    E --> F[\"living spec\"]\n```\n\n这种流程保证 `docs/specs/` 始终表达“已经归档生效”的契约，而不是进行中的讨论。\n\n## `README.md` 索引职责\n\n`docs/specs/README.md` 维护 capability 级别的总览表。表格字段包括：\n\n- `Capability`：指向对应 capability 目录。\n- `主题`：用一句话说明能力范围。\n- `Owner`：该 capability 的维护方。\n- `最后归档合并`：最近一次归档日期。\n\n这个索引用于快速定位契约来源，也用于判断某个需求应该落在哪个 capability 下。新增 capability 时，需要在这里增加对应行，并创建 `docs/specs/<capability>/spec.md`。\n\n## `spec.md` 文档约定\n\n每个 `spec.md` 以 capability 标题开始，并在开头声明维护信息：\n\n- `Owner`\n- `Reviewers`\n- `创建日期`\n- `最后归档合并`\n\n随后通常包含 `Purpose` 和 `Requirements`。`Purpose` 说明能力边界和存在原因，`Requirements` 则用可验证的需求描述系统必须满足的行为。\n\nRequirement 下使用 Scenario 描述具体触发条件和期望结果，并通过“覆盖测试”绑定到真实测试文件、测试函数和必要的行号。例如 `binding-index-config/spec.md` 会把 `GetIdxCfg`、`GetIdxCfgBySchema`、`gsi_indexes` 字段校验等需求映射到 `fuxi/client/admin/admin_test.go` 和 `fuxi/fuxi_admin/config/validator_test.go` 中的具体测试。\n\n## EARS 与覆盖测试\n\n该模块要求每条 Requirement 使用 EARS 风格描述，常见关键词包括 `WHEN`、`IF`、`WHERE`、`MUST`、`SHALL`。这让需求更接近可执行验收条件，而不是笼统描述。\n\n每个 Scenario 都必须包含“覆盖测试”。设计阶段可以临时使用带说明的 `TBD`，但归档前应替换成真实测试路径。当前部分历史 spec 中仍存在 `TBD(...)`，这些条目表示已识别的测试缺口，例如：\n\n- `offline-snapshot-reader/spec.md` 中 placeholder reader 和 snapshot reader 的测试尚待补齐。\n- `gsi-index-runtime/spec.md` 中 typed index 列范围查询、写删匹配等测试尚待补齐。\n- `setattr-timing-instrumentation/spec.md` 中阈值日志触发路径仍缺少自动化集成测试。\n\n开发者修改相关代码时，应优先检查这些 `TBD` 是否已经可以补上。\n\n## 与代码库的连接\n\n`docs/specs/` 不直接调用代码，但通过测试引用和能力边界约束代码演进。典型连接方式包括：\n\n- GSI 运行时相关 spec 约束 `fuxi/core/service/idx/`、`fuxi/core/consts/entity/`、`fuxi/core/service/meta/`。\n- GSI 配置相关 spec 约束 `fuxi/fuxi_admin/config/validator_test.go`、`fuxi/client/admin/admin_test.go`。\n- repair / reconcile 相关 spec 约束 `fuxi/core/service/index_repair.go`、`fuxi/core/service/idx/reconcile/`。\n- Admin 表名前缀能力约束 `fuxi/fuxi_admin/dal/`。\n- Bytedoc 错误映射约束 `fuxi/client/doc/` 和 `handler/test_handler/handler_test.go`。\n\n因此，修改实现前应先查看对应 capability 的 `spec.md`，确认当前行为是否已被声明为契约；修改测试时也应同步确认覆盖测试引用是否仍准确。\n\n## 贡献注意事项\n\n不要把进行中的设计直接写入 `docs/specs/`。如果行为尚未归档，应放在 `docs/changes/<slug>/` 下。\n\n不要在 spec 中发明不存在的 API、函数或测试名。覆盖测试必须引用仓库中的真实路径和真实测试函数。\n\n不要把 Scenario 写成实现细节流水账。Scenario 应描述外部可观察行为，必要时再在说明中点出实现约束。\n\n如果某个需求目前只有手工验证或缺测试，应明确保留 `TBD(owner 待补：...)`，并写清建议补充的测试位置和断言目标。","other-test-handler":"# Other — test_handler\n\n## `test_handler` 测试模块\n\n`handler/test_handler` 是 Compound Handler 层的集成与回归测试包。它不提供生产 API，入口全部是 `go test` 发现的 `Test*` 函数，主要通过 `test.Cli` 或 `test.SrvImpl` 调用真实 RPC 实现，再向 `meta`、`doc`、`idx`、MQ mock、文件存储和视频删除 mock 验证副作用。\n\n```mermaid\nflowchart LR\n    用例[\"Test* 用例\"] --> RPC[\"test.Cli / test.SrvImpl\"]\n    RPC --> Handler[\"Handler RPC 实现\"]\n    Handler --> Meta[\"meta.* / service.*\"]\n    Meta --> Doc[\"doc.* / Bytedoc/ODA\"]\n    Handler --> MQ[\"rocketmq.Mock 事件\"]\n    MQ --> GSI[\"UpdateIdxWithEventForInternal\"]\n    GSI --> Index[\"索引 Collection\"]\n```\n\n## 文件分工\n\n`handler_test.go` 覆盖 Handler 主接口：`SetAttr`、`DelAttr`、`Del`、`CopyAttr`、`Query`、`Count`、RangeSearch、数组完整性、文件属性、视频删除、指标上报、版本冲突与多存储重试。\n\n`ttl_test.go` 覆盖 TTL 调度与执行，包括普通 schema 和带分片键的 `test.RangeSchema`。\n\n`handler_gsi_test.go` 覆盖 GSI 端到端路径：Handler 写入、MQ 事件、`UpdateIdxWithEventForInternal` 回放、索引 collection 直探、Query filter 命中。\n\n`handler_gsi_direct_test.go` 验证 `schema_test_index` 新文档格式：`space/schema + col1/col2/...`，并确认不再依赖历史 `key` 字段。\n\n`handler_bytedoc_dollar_and_test.go` 是 Bytedoc 分片键提取探针，专门验证 `$and`、`$or`、`$elemMatch` 等 filter 形态是否会触发 `doc.ErrShardingKeyNotSet`。\n\n`mocka_prepare_test.go` 提供 Mocka 生成/patch 需要的占位实现：`ICompoundServiceServiceE261f24e98fc4edeMockaImpl` 和 `ServerServer4a67d7f9ef24f3d1MockaImpl`，不是业务断言主体。\n\n## 通用 Handler 测试骨架\n\n`TestSetAndDelAndCopy` 是主链路回归入口。它遍历 `entity.StorageTypeList` 和 `withFuxiAttr` 两种开关，通过 `getSchemaByStorageType` 把 `entity.Tos`、`entity.Abase2`、`entity.Oda`、`entity.Bytedoc` 映射到对应测试 schema，然后进入 `testSetAndDelAndCopy`。\n\n`testSetAndDelAndCopy` 按顺序验证创建、查询、复制、覆盖、删除属性、删除对象等行为。它同时检查：\n\n- `rocketmq.Mock` 捕获的事件类型、`Created`、`Updated`、`Deleted`、`Extras`\n- 文件属性覆盖和删除后的真实文件状态\n- `WithFuxiAttr=true` 时的 `$._created_at`、`$._updated_at`\n- `CopyAttr` 对文件属性和 map 通配属性的展开结果\n- TOS/Abase 等最终一致读写路径的等待逻辑\n\n查询断言集中在 `astQueryEqual` 和 `astQueryEqualMulti`。`astQueryEqualMulti` 会把 `AttrMetas` 按字段名归一化，并跳过动态字段 `entity.VersionColumn`、`entity.CreatedAtColumn`、`entity.UpdatedAtColumn` 的精确值比较。\n\n最终一致性辅助函数包括 `queryDeletedObjectWithRetry`、`queryAttrAbsentWithRetry`、`assertAttrDeletedEventually`、`assertQueryEmptyEventually` 和 `waitUntilQueryEmpty`。新增依赖异步写入的用例时，应优先复用这些 helper，而不是添加固定长时间 `Sleep`。\n\n## GSI 测试支撑层\n\n`gsiSetup` 使用 `gomonkey.ApplyFunc` patch `admin.GetIdxCfg`，只对 `gsiSchema == test.RangeSchema` 返回 `gsiTestIdxCfgs`。测试索引矩阵由 `gsiTestIdxCfgs` 统一维护：\n\n- `idx_struct_tag_region_range`：非唯一 simple 索引，列为 `$.Idx.TagMap.*.TagCode`、`$.Idx.Region`\n- `idx_struct_region_visible_range`：非唯一 bucketed 索引，列为 `$.Idx.Region`、`$.Idx.IsVisible`\n- `idx_struct_unique_asset_file_range`：唯一 simple 索引，列为 `$.Idx.AssetFile`\n- `idx_struct_unique_tokens_range`：唯一 simple 数组通配索引，列为 `$.Idx.UniqueTokens[*]`\n\n`gsiSetAttr` 是 GSI 用例的核心写入 helper。它会 mock RocketMQ，自动补齐 Bytedoc 分片键，调用 `test.Cli.SetAttr`，断言事件包含 `compound.SyncTarget_GSI`，然后用 `gsiReplayUpdateFromEvents` 直接调用 `UpdateIdxWithEventForInternal` 回放索引更新。\n\n`gsiProbeIndexEntry` 和 `gsiWaitIndexDoc` 直接查询索引 collection。它们通过 `isSimpleModeIdx` 区分 simple 和 bucketed 文档格式：simple 模式查 `val._id`，bucketed 模式查 `entries.oid`。远程 Bytedoc 偶发返回 `doc.ErrShardingKeyNotSet` 时，helper 会把它当作“暂未可见”并等待最终收敛。\n\nGSI 用例分为三类：诊断用例 `TestGSI_Diagnostic_*` 定位事件、VDA-Sync/回放和通配索引问题；功能用例 `TestGSI_Idx*` 覆盖通配 map、复合 bucketed、唯一文件、数组通配唯一索引；格式用例 `TestGSI_DirectWrite_NewFormat` 检查新索引文档字段。\n\n## Bytedoc `$and` 分片键探针\n\n`handler_bytedoc_dollar_and_test.go` 关注 `schema_test_index` 上的分片键提取边界。`prepareBucketViaAddToIndex` 先通过 `idx.GetOperator(...).AddToIndex` 创建真实 bucket，再返回随机 `cols`、`probeOid` 和清理函数。`noopUpdate` 使用 `doc.RawUpdate` 执行 `$inc idx_ver`，只关心 matched 数和错误。`classify` 将结果归类为 402、成功、未命中或其他错误。\n\n探针的核心结论是：只要 filter 顶层出现 `$and`，Bytedoc 可能不再从顶层 `idx/col1/col2` 提取分片键。`TestBytedoc_ShardKey_V1_TopLevelAndBlock` 固化了这个已知失败形态。`v3Filter` 构造更安全的形态：把 `{idx, col1, col2}` 放在 `$and` 的一个独立扁平 clause 中，版本路由、容量守护、`entries.oid` 去重或 `$elemMatch` 放入后续 clause。`TestBytedoc_ShardKey_V3_*`、`V4_AddFastPathFilter`、`V5_RemoveFastPathFilter` 用 Update、Find、Delete 和真实 Add/Remove 快路径 filter 验证这一约定。\n\n## TTL 与 RangeSearch\n\n`TestTTLTrigger` patch `postpone.TtlTasks`，验证 `SetAttr` 根据 TTL 配置提交正确时间点，并在异步任务触发后删除目标范围。`TestTTL` 使用 `clock.Mock` 和 `clock.UpdateOffSet` 验证未过期、部分过期、全部 TTL 字段过期、根目录过期删除整对象等路径。\n\n`TestTTLTriggerWithRangeSearch` 和 `TestTTLWithRangeSearch` 覆盖带分片键的 TTL 请求。它们用 `$.session_id` 构造 `Where.Filter`，确保 TTL 调度和执行阶段都能携带路由条件。维护这两个用例时要以实际断言为准；源码中部分中文注释与 `gmap.Contains` 断言表达不完全一致，修改前应先确认产品预期。\n\n`TestRangeSearch` 是范围查询综合回归。它在 `test.RangeSchema` 下写入多条带 `$.session_id`、`$.scene`、`$.serial_no.start`、`$.serial_no.end` 的记录，覆盖 Query、Count、Sort、Limit/Offset、表达式更新、表达式删除，以及同时传 `ID` 和 `where` 中 `$._id` 时的双前缀回归场景。\n\n## 错误、重试与外部副作用\n\n`TestAbaseAndTosRetry` patch `meta.SetMeta`、`meta.DelMeta`、`meta.DelID` 返回 `iface.WrongVersion`，验证 SetAttr、DelAttr、Del 对 TOS/Abase 的一次重试和全部失败映射。\n\n`TestBytedocVersionConflict` patch ODA client 的 `BytedocInsertMany`、`BytedocUpdateMany`、`BytedocDeleteMany`，模拟重复插入、并发更新和并发删除。它验证版本冲突最终映射到 `set_meta_resp.ConcurrentUpdate`、`del_attr_resp.InternalError` 或 `del_resp.NotFound` 等响应。\n\n`TestDelVideo`、`TestDelTranscode`、`TestVideoDup`、`TestVD` 和 `TestVDResp` 通过 `video_delete.Mock()` 或 `toutiao_videoarch_video_delete.SetMock` 验证 `Extra` 中的 `video_delete_type`、`video_delete_param` 会触发正确下游删除 RPC，并正确透传失败状态码。\n\n`TestSetAttr`、`TestDelAttr`、`TestQuery`、`TestCopyAttr`、`TestDel` 使用 `metrics.Mock` 和 `metrics.PopRecords` 验证 API 状态指标的 caller、method、status、space、schema 和计数。\n\n## 运行与扩展建议\n\n远程 UT 是本包的首选运行方式：\n\n```bash\nTEST_KIND=file TEST_FILES=./handler/test_handler/handler_gsi_test.go PATTERN=\"TestGSI\" bash script/run_remote_ut.sh\nTEST_KIND=file TEST_FILES=./handler/test_handler/handler_bytedoc_dollar_and_test.go PATTERN=\"TestBytedoc_ShardKey\" bash script/run_remote_ut.sh\n```\n\n新增测试时优先复用现有 helper：GSI 写入走 `gsiSetAttr`，索引直探走 `gsiAssertIndexContains` 或 `gsiWaitIndexDoc`，普通查询比较走 `astQueryEqualMulti`，最终一致删除走 retry helper。涉及 Bytedoc sharded collection 的 filter 应避免把分片键散落在复杂 `$and` 顶层混合结构中，优先采用 `v3Filter` 的“独立扁平分片键 clause”模式。","other-util":"# Other — util\n\n## util 模块\n\n`util` 包提供仓库内跨业务模块复用的轻量工具。目前主要包含两类能力：\n\n- `DeepCopyThriftStruct`：对 Kitex/Thrift 生成结构体做类型安全的深拷贝。\n- `HandlerError2BaseRespFunc`：把业务 handler 返回的 `error` 转换为 Kitex 需要写入 `BaseResp` 的业务码和消息。\n\n这两个工具都不承载业务规则本身，而是服务于请求对象隔离和统一错误响应这类横切逻辑。\n\n## 深拷贝工具\n\n核心实现位于 `util/deepcopy.go`。\n\n```go\ntype thriftDeepCopier interface {\n\tDeepCopy(s interface{}) error\n}\n\nfunc DeepCopyThriftStruct[T any, P interface {\n\t*T\n\tthriftDeepCopier\n}](obj P) P\n```\n\n`DeepCopyThriftStruct` 专门面向 Thrift 生成结构体使用。Kitex 生成代码会为结构体生成 `DeepCopy(s interface{}) error` 方法，例如 `base.BaseResp`、`base.Base`、`compound.QueryReq`、`compound.WhereClause`、`compound.SetAttrReq` 等。该工具通过 Go 泛型约束要求入参必须同时满足：\n\n- 是某个结构体 `T` 的指针，即 `*T`\n- 实现 `DeepCopy(s interface{}) error`\n\n因此调用方可以直接传入具体 Thrift 结构体指针，返回值仍保持同样的静态类型，不需要类型断言。\n\n### 执行逻辑\n\n`DeepCopyThriftStruct` 的逻辑很短：\n\n1. 如果 `obj == nil`，直接返回 `nil`。\n2. 使用 `new(T)` 创建同类型的新对象。\n3. 调用新对象的 `DeepCopy(obj)`，把原对象内容复制到新对象。\n4. 返回新对象。\n\n```go\nfunc DeepCopyThriftStruct[T any, P interface {\n\t*T\n\tthriftDeepCopier\n}](obj P) P {\n\tif obj == nil {\n\t\treturn nil\n\t}\n\n\tvar newObj P = new(T)\n\t_ = newObj.DeepCopy(obj)\n\n\treturn newObj\n}\n```\n\n这里忽略 `DeepCopy` 的错误，因为泛型约束已经保证源对象和目标对象属于同一 Thrift 结构体类型；在正常生成代码路径下不会出现类型不匹配。\n\n### 使用场景\n\n这个工具主要用于“基于请求对象派生新条件，但不能修改原始请求”的场景。服务层经常需要在原始 `WhereClause` 上追加 `Ids`、注入分片键或构造内部查询条件，如果直接修改 `req.Where`，会污染调用方传入的请求对象，并可能影响后续重试、回滚、日志或其他分支逻辑。\n\n典型用法来自 `fuxi/core/service/service.go`：\n\n```go\nwhere := generic.InitIfNil(util.DeepCopyThriftStruct(req.Where), compound.NewWhereClause)\nwhere.Ids = sli.AppendIfAbsentStr(where.Ids, id)\nwhere = injectShardingKeysIntoWhere(where, resolvedSK)\n```\n\n这里的意图是：\n\n- 先复制 `req.Where`\n- 如果原请求没有 `Where`，用 `compound.NewWhereClause` 初始化\n- 在副本上追加 ID 和分片键\n- 保证 `req.Where` 本身不被修改\n\n类似模式也出现在 `Del`、`SetAttr`、`DelAttr`、`TTL`、`queryWithFilter` 等路径中。它们都把 `DeepCopyThriftStruct` 当作“请求派生前的隔离层”。\n\n### 被测试覆盖的行为\n\n`util/deepcopy_test.go` 覆盖了以下情况：\n\n- 基础结构体字段复制，例如 `compound.Version`\n- 嵌套结构体复制，例如 `base.Base.TrafficEnv`\n- map 字段复制，例如 `base.Base.Extra`\n- slice 字段复制，例如 `compound.SetAttrReq.Values`、`compound.QueryReq.Select`\n- nil 指针输入返回 nil\n- 修改拷贝对象不会影响原对象\n\n这些测试确认了该函数依赖的是 Thrift 生成代码的深拷贝语义，而不是浅拷贝。\n\n## 业务错误响应转换\n\n核心实现位于 `util/biz_handler_err.go`。\n\n```go\nvar HandlerError2BaseRespFunc = func(\n\tctx context.Context,\n\tbizHandlerErr error,\n) (writeBase bool, code int32, msg string, extra map[string]string) {\n\tcode, message := errno.CodeMsg(bizHandlerErr)\n\treturn true, code, message, nil\n}\n```\n\n`HandlerError2BaseRespFunc` 是传给 Kitex server 的业务错误转换函数。它在 `main.go` 中注册：\n\n```go\nsvr := compoundservice.NewServer(new(handler.CompoundServiceImpl),\n\tbyted.WithBizHandlerError2BizCodeMsgFunc(util.HandlerError2BaseRespFunc),\n\tserver.WithMiddleware(middleware.LogMidware[*base.BaseResp](\"cpd\")),\n\tserver.WithMiddleware(middleware.DownstreamRateLimitMiddleware),\n)\n```\n\n注册后，当业务 handler 返回 error 时，Kitex 会调用该函数决定是否写入 `BaseResp`，以及写入什么业务码和消息。\n\n### 错误码来源\n\n该函数本身不判断错误类型，而是委托给 `errno.CodeMsg`：\n\n```go\nfunc CodeMsg(err error) (int32, string) {\n\tif err == nil {\n\t\treturn 0, \"success\"\n\t}\n\tvar e *CompoundError\n\tif errors.As(err, &e) {\n\t\treturn e.Code, e.Msg\n\t}\n\treturn 5000, fmt.Sprintf(\"rpc request error: %s\", err.Error())\n}\n```\n\n因此当前映射规则是：\n\n| 输入错误 | `code` | `msg` |\n|---|---:|---|\n| `nil` | `0` | `\"success\"` |\n| `*errno.CompoundError` | `CompoundError.Code` | `CompoundError.Msg` |\n| 其他 `error` | `5000` | `\"rpc request error: <err.Error()>\"` |\n\n`HandlerError2BaseRespFunc` 固定返回 `writeBase = true`，表示无论错误内容如何，都让框架把转换后的业务码和消息写入响应的 `BaseResp`。`extra` 当前固定为 `nil`。\n\n## 模块关系\n\n```mermaid\nflowchart TD\n    A[\"业务 handler\"] --> B[\"Kitex server\"]\n    B --> C[\"HandlerError2BaseRespFunc\"]\n    C --> D[\"errno.CodeMsg\"]\n    D --> E[\"BaseResp 状态码和消息\"]\n\n    F[\"服务层请求派生\"] --> G[\"DeepCopyThriftStruct\"]\n    G --> H[\"Thrift 生成 DeepCopy\"]\n    H --> I[\"独立的请求副本\"]\n```\n\n`util` 位于业务服务和基础设施之间：\n\n- 对服务层，`DeepCopyThriftStruct` 提供请求对象隔离，避免内部查询、CAS 写入、TTL 查询等逻辑修改原始请求。\n- 对 RPC 框架，`HandlerError2BaseRespFunc` 提供统一的 error 到 `BaseResp` 转换入口。\n- 对生成代码，`DeepCopyThriftStruct` 直接依赖 Thrift 结构体自带的 `DeepCopy` 方法，不重新实现字段级复制逻辑。\n\n## 贡献注意事项\n\n新增使用 `DeepCopyThriftStruct` 的代码时，应只传入 Kitex/Thrift 生成结构体指针。普通 Go struct 如果没有实现 `DeepCopy(s interface{}) error`，无法通过泛型约束编译。\n\n当代码需要修改请求中的 `Where`、`Filter`、`Ids`、`Values`、`Base` 或其他引用字段时，优先复制后再修改：\n\n```go\nwhere := generic.InitIfNil(util.DeepCopyThriftStruct(req.Where), compound.NewWhereClause)\nwhere.Ids = append(where.Ids, req.ID)\n```\n\n不要用简单赋值替代：\n\n```go\nwhere := req.Where // 这会共享底层指针，后续修改会影响原请求\n```\n\n调整 `HandlerError2BaseRespFunc` 时，需要同步确认 `errno.CodeMsg` 的语义和 Kitex 的 `byted.WithBizHandlerError2BizCodeMsgFunc` 调用约定。特别是 `writeBase`、`extra` 和非 `CompoundError` 的兜底错误码，都会直接影响客户端看到的 `BaseResp`。","other":"# Other\n\n## 模块概览\n\n`Other` 汇总仓库根入口、文档治理、构建配置、RPC 接入层、Fuxi 基础能力、MDAP 能力和辅助工具。它不是单一运行时模块，而是一组支撑 Compound 服务开发、构建、文档化和运行的外围与横切模块。\n\n整体上可以分为四层：\n\n```mermaid\nflowchart TD\n  A[\"仓库入口与协作规则\"] --> B[\"文档治理与知识库\"]\n  A --> C[\"构建、配置与生成工具\"]\n  C --> D[\"运行时服务入口\"]\n  D --> E[\"Fuxi Core / Client / Admin / MQ\"]\n  E --> F[\"MDAP ID 与业务服务\"]\n  D --> G[\"测试与错误响应工具\"]\n```\n\n## 子模块协作方式\n\n仓库入口由 [README.md](readme-md.md)、[AGENTS.md](agents-md.md)、[CLAUDE.md](claude-md.md) 和 [constitution.md](constitution-md.md) 共同定义：`README.md` 给出项目身份，`AGENTS.md` 路由 agent 规则，`CLAUDE.md` 约束开发、测试、提交和文档写作，`constitution.md` 提供最高优先级红线。\n\n文档体系集中在 [docs](docs.md)，并继续拆分为 [overview](overview.md)、[architecture](architecture.md)、[api](api.md)、[operations](operations.md)、[changes](changes.md)、[archive](archive.md)、[specs](specs.md)、[decisions](decisions.md) 和 [research](research.md)。这些模块共同形成从项目背景、架构说明、接口契约、运维 SOP、进行中变更、归档记录到 living spec 的闭环。\n\n构建和工程元数据由 [build.sh](build-sh.md)、[script](script.md)、[conf](conf.md)、[compound](compound.md)、[go.mod](go-mod.md)、[idl](idl.md)、[kitex_info.yaml](kitex-info-yaml.md) 和 [pipeline_meta.json](pipeline-meta-json.md) 承接。它们分别负责产物打包、服务启动与远程单测、服务内联配置、运行时 YAML、依赖解析、Kitex 代码生成、服务元信息和 CI 作业索引。\n\n运行时能力围绕 [handler](handler.md)、[core](core.md)、[client](client.md)、[rocketmq](rocketmq.md)、[fuxi_admin](fuxi-admin.md)、[comm](comm.md)、[errno](errno.md) 和 [util](util.md) 展开。`handler` 接收 Kitex RPC，请求下沉到 `core` 的服务层和存储抽象；`client` 适配 Bytedoc、ODA、Abase 等外部系统；`rocketmq` 发布变更事件并触发 GSI 同步；`fuxi_admin` 提供管理面；`comm`、`errno`、`util` 提供中间件、错误码和通用工具。\n\nMDAP 相关能力由 [id](id.md) 和 [service](service.md) 组成：`mdap/id` 负责资源 ID 的生成、解析和校验，`mdap/service` 将资产组、Source、Artifact 等业务对象转换为 Compound/Fuxi Core 的读写请求。\n\n测试覆盖集中在 [test_handler](test-handler.md)，它通过真实 Handler、Meta、Doc、IDX、MQ mock 和文件存储验证端到端行为，补足 RPC 层、GSI 链路、TTL、版本冲突和多存储路径的回归保障。\n\n## 关键跨模块流程\n\nRPC 数据面从 `idl` 生成的契约进入 `handler`，再调用 `core` 服务层；服务层通过 `client` 的 `MetaStorage` 实现访问 Bytedoc、ODA 或 Abase，并通过 `rocketmq` 发布变更事件。错误由 `errno` 和 `util` 统一转换为 `BaseResp`。\n\nGSI 相关流程横跨 `handler`、`core`、`rocketmq`、`client` 和文档体系：写入产生事件，`rocketmq` 判断同步目标并处理大消息卸载，索引服务消费事件维护索引；相关约束和演进记录由 `architecture`、`specs`、`changes`、`archive` 和 `operations` 共同维护。\n\n文档与变更流程从 `AGENTS.md`、`CLAUDE.md` 和 `docs/AGENTS.md` 进入，进行中设计写入 `changes`，验收后归档到 `archive`，当前行为契约沉淀到 `specs`，重要架构选择进入 `decisions`，背景和术语则回到 `overview`。\n\n构建发布流程由 `build.sh` 汇总：复制 `script` 和 `conf`，根据环境选择普通二进制、覆盖率二进制或 SCM 内联路径；`pipeline_meta.json` 指向 CI 单测作业，`script/run_remote_ut.sh` 则承接远程测试执行。","overview":"# compound — Wiki\n\n# Compound\n\nCompound 是视频架构的元数据管理服务，负责承接上游 RPC/HTTP 请求，完成对象元数据读写、查询、索引维护、文件 URL 签名、MDAP 资产管理，以及 Fuxi Admin 的 Schema 与配置管理。代码库以 Go 1.23 构建，服务侧主要使用 Kitex 作为 RPC 框架，Hertz 用于 Admin HTTP 服务。\n\n新开发者可以先把 Compound 理解成三条主线：运行时请求从 [RPC Entry Points](rpc-entry-points.md) 进入，核心元数据能力由 [Core Metadata Service](core-metadata-service.md) 编排，底层索引、存储、协议模型和通用工具分别由 [Global Secondary Indexing](global-secondary-indexing.md)、[Storage and External Clients](storage-and-external-clients.md)、[Generated RPC and Protocol Models](generated-rpc-and-protocol-models.md) 与 [Common Utilities](common-utilities.md) 支撑。MDAP 相关资产生命周期则集中在 [MDAP Assets and Processing](mdap-assets-and-processing.md)。\n\n```mermaid\nflowchart TD\n    A[\"RPC 入口<br/>Kitex Handler\"] --> B[\"核心元数据服务\"]\n    A --> C[\"MDAP 资产服务\"]\n    B --> D[\"领域模型与参数\"]\n    B --> E[\"全局二级索引\"]\n    B --> F[\"存储与外部客户端\"]\n    B --> G[\"文件 URL 与媒体事件\"]\n    C --> B\n    C --> H[\"生成协议模型\"]\n    I[\"Fuxi Admin<br/>Schema 管理\"] --> J[\"管理端持久化层\"]\n    I --> D\n    E --> F\n    G --> F\n```\n\n## 代码库如何分层\n\nCompound 的服务入口层很薄。[RPC Entry Points](rpc-entry-points.md) 中的 `main.go` 负责启动 Kitex server，`handler/handler.go` 中的 `CompoundServiceImpl` 把 IDL 生成的方法转发到内部服务。handler 会做必要的参数校验和响应组装，但核心业务逻辑不会停留在入口层。\n\n核心业务集中在 [Core Metadata Service](core-metadata-service.md)。这里负责 `Query`、`SetAttr`、`Del`、`DelAttr`、`Count`、`CopyAttr` 等元数据操作的流程编排：解析 space/schema/id，校验属性与请求参数，选择元数据存储，触发索引查询或写入，并在需要时投递变更事件。业务错误统一通过 `errno` 转成稳定的返回码和消息。\n\n查询性能和索引一致性由 [Global Secondary Indexing](global-secondary-indexing.md) 支撑。主表属性会映射到 posting collection，查询时可以先通过索引命中 `oid`，再由核心服务回表读取完整元数据。索引维护逻辑主要在 `fuxi/core/service/index.go`，posting 存储能力通过 `fuxi/core/service/idx/*` 的 `idx.Operator` 暴露。\n\n[Storage and External Clients](storage-and-external-clients.md) 是业务代码访问外部系统的边界。`client` 侧封装 Bytedoc、Abase、ODA KV、账号、桶元数据、VDA、视频删除等元数据和业务系统；`core/storage` 侧封装对象上传、读取、探测、删除和复制。上层通常通过 `iface.MetaStorage` 或包级 helper 调用这些能力，而不是直接依赖底层 SDK。\n\n[Domain Models and Parameters](domain-models-and-parameters.md) 提供跨模块共享的数据结构和边界转换能力，包括配置 key、系统字段、索引 typed value、scope、请求参数解析、HLC 版本封装、属性校验和查询包装器。它是 `core`、`idx`、`mdap`、`admin` 等模块共同依赖的基础模型层。\n\n[Generated RPC and Protocol Models](generated-rpc-and-protocol-models.md) 位于 `kitex_gen/` 和 `proto_gen/`，承载 Thrift/Protobuf 生成的请求、响应、枚举、服务接口和 codec 代码。协议字段和方法签名的权威来源是 `idl/*.thrift` 与 `.proto` 文件；需要调整接口时，应修改上游协议定义后重新生成。\n\n## 关键端到端流程\n\n一次普通元数据查询通常从 Kitex handler 开始：`handler/handler.go` 接收请求后调用 `core/service`，核心服务通过 `params` 和 `wrapper` 解析请求上下文与属性约束。如果请求可以走索引，流程会进入 [Global Secondary Indexing](global-secondary-indexing.md) 查 posting collection，再回到主存储读取元数据；否则直接通过 [Storage and External Clients](storage-and-external-clients.md) 访问对应后端。过程中 [Common Utilities](common-utilities.md) 会参与日志、指标、响应封装、时间统计和上下文处理。\n\n一次元数据写入或删除会由 [Core Metadata Service](core-metadata-service.md) 编排主表变更、索引维护和事件副作用。核心服务写入存储后，会根据 schema 与索引配置同步维护唯一索引或非唯一索引；涉及媒体或文件变更时，还会通过 [File URL and Media Operations](file-url-and-media-operations.md) 中的 RocketMQ 事件路径通知订阅方。较大的事件内容会先上传到对象存储，再在 MQ 消息中保留引用指针。\n\nMDAP 资产流程从 RPC handler 进入 [MDAP Assets and Processing](mdap-assets-and-processing.md)。`mdap/service` 负责 AssetGroup、Source、Artifact 的校验、ID 生成或解析、摘要兼容转换和处理任务启动；实际元数据读写仍复用 [Core Metadata Service](core-metadata-service.md)。例如批量查询 AssetGroup 时，handler 会进入 `mdap/service`，再调用核心 `Query` 流程，并通过通用 timing 工具记录执行耗时。\n\nAdmin 侧是另一条独立入口。[Admin API and Schema Management](admin-api-and-schema-management.md) 使用 Hertz 启动 Fuxi Admin HTTP 服务，注册日志与联邦代理中间件，然后初始化 DAL 和业务 handler。Schema、binding、configuration 等管理数据最终落到 [Admin Persistence Layer](admin-persistence-layer.md)，该层基于 GORM 与 `gorm.io/gen` 生成的强类型 Query API 屏蔽表前缀、事务和 JSON 序列化细节。\n\n## 本地开发入口\n\n仓库模块路径是：\n\n```text\ncode.byted.org/videoarch/compound\n```\n\nGo 版本要求为：\n\n```text\ngo 1.23.2\n```\n\n首次进入代码库时，建议先阅读 `README.md`、`CLAUDE.md` 和 `docs/README.md`，确认本仓库的开发、测试、提交和文档约束。接口契约集中在 [Interface Definitions and Tooling](interface-definitions-and-tooling.md)；响应码常量可从 [Response Fixtures](response-fixtures.md) 开始查；横切工具和中间件可参考 [Common Utilities](common-utilities.md)。\n\n常见启动与排查路径是：先从 [RPC Entry Points](rpc-entry-points.md) 找到对外方法，再跳到对应的 [Core Metadata Service](core-metadata-service.md) 或 [MDAP Assets and Processing](mdap-assets-and-processing.md) 服务实现；如果问题涉及查询性能或索引一致性，继续进入 [Global Secondary Indexing](global-secondary-indexing.md)；如果问题涉及后端存储、账号、桶、VDA 或对象操作，则进入 [Storage and External Clients](storage-and-external-clients.md)。","response-fixtures":"# Response Fixtures\n\n# Response Fixtures\n\n`Response Fixtures` 是一组位于 `fuxi/core/consts/*_resp` 下的响应码定义包，用于把业务场景中的抽象结果映射成 Kitex `BaseResp` 可用的标准响应结构。\n\n这些包不处理业务逻辑，只负责声明：\n\n- 可复用的 `resp.Result` 标识；\n- 每个标识对应的错误码与错误信息；\n- 通过 `GetResp` 将 `resp.Result` 转成 `*resp.Resp[*gen_base.BaseResp]`。\n\n## 核心设计\n\n每个响应包通常分成两层：\n\n1. `base` 子包：只创建结果标识。\n2. 顶层响应包：把结果标识绑定到具体响应码和文案。\n\n典型结构如下：\n\n```go\n// base/base.go\nvar InvalidParam = resp.NewResult()\nvar InternalError = resp.NewResult()\n```\n\n```go\n// query.go / set_meta.go / mdap.go 等\nvar resBase = resp.NewResultBase[*gen_base.BaseResp]()\n\nvar InvalidParam = resBase.NewResp(base.InvalidParam, 4001, \"Invalid Param\")\nvar InternalError = resBase.NewResp(base.InternalError, 4002, \"Internal Error\")\n\nfunc GetResp(ctx context.Context, res resp.Result) *resp.Resp[*gen_base.BaseResp] {\n\treturn resBase.GetResp(res)\n}\n```\n\n这里的关键点是：`base.InvalidParam` 这类变量提供稳定的 `resp.Result` 身份，顶层包通过 `resBase.NewResp` 给它绑定具体的 code/message。业务代码只需要传入对应的 `resp.Result`，再由 `GetResp` 取回统一响应。\n\n```mermaid\nflowchart TD\n    A[业务代码选择 resp.Result] --> B[调用 GetResp]\n    B --> C[resBase.GetResp]\n    C --> D[返回 Resp<BaseResp>]\n    E[base.NewResult] --> F[NewResp 绑定 code/message]\n    F --> C\n```\n\n## 与 `resp` 工具包的关系\n\n本模块依赖 `fuxi/comm/utils/resp` 提供的三类能力：\n\n- `resp.NewResult()`：创建一个结果标识。\n- `resp.NewResultBase[*gen_base.BaseResp]()`：创建面向 `kitex_gen/base.BaseResp` 的响应注册器。\n- `resBase.NewResp(result, code, msg)`：注册某个 `resp.Result` 对应的响应码和信息。\n- `resBase.GetResp(result)`：按 `resp.Result` 取回响应对象。\n\n所有响应包都以 `gen_base.BaseResp` 作为底层响应结构，因此这些 fixtures 主要服务于 Kitex RPC 返回值中的基础响应字段。\n\n## 包与错误码段\n\n### `set_meta_resp`\n\n用于 SetMeta / SetAttr 类写入场景。\n\n定义在：\n\n- `fuxi/core/consts/set_meta_resp/base/base.go`\n- `fuxi/core/consts/set_meta_resp/set_meta.go`\n\n响应项：\n\n| 变量 | code | message |\n|---|---:|---|\n| `Success` | `resp.SuccessCode` | `resp.SuccessMsg` |\n| `InvalidParam` | `1001` | `Invalid Param` |\n| `InternalError` | `1002` | `Internal Error` |\n| `ArrayIncompleteSet` | `1003` | `Incomplete Array Set` |\n| `ConcurrentUpdate` | `1004` | `Concurrent Update` |\n| `AlreadyExists` | `1005` | `Already Exists` |\n| `BandwidthLimitExceeded` | `8001` | `Bandwidth Limit Exceeded` |\n\n`AlreadyExists` 专门用于 `SetAttr` 在 `WriteMode=InsertOnly` 下发现对象已存在的场景，注释中建议 HTTP 映射为 `409 Conflict`。\n\n### `copy_resp`\n\n用于复制类接口响应。\n\n定义在：\n\n- `fuxi/core/consts/copy_resp/base/base.go`\n- `fuxi/core/consts/copy_resp/copy.go`\n\n响应项：\n\n| 变量 | code | message |\n|---|---:|---|\n| `Success` | `resp.SuccessCode` | `resp.SuccessMsg` |\n| `InvalidParam` | `2001` | `Invalid Param` |\n| `InternalError` | `2002` | `Internal Error` |\n| `NotFound` | `2003` | `Source ID Record Not Found` |\n\n`GetResp(ctx context.Context, res resp.Result)` 接收 `context.Context`，但当前实现未使用 `ctx`。\n\n### `del_attr_resp`\n\n用于删除属性场景。\n\n定义在：\n\n- `fuxi/core/consts/del_attr_resp/base/base.go`\n- `fuxi/core/consts/del_attr_resp/del_attr.go`\n\n响应项：\n\n| 变量 | code | message |\n|---|---:|---|\n| `Success` | `resp.SuccessCode` | `resp.SuccessMsg` |\n| `InvalidParam` | `3001` | `Invalid Param` |\n| `InternalError` | `3002` | `Internal Error` |\n| `NotFound` | `3003` | `Not Found` |\n| `ArrayIncompleteDelete` | `3004` | `Incomplete Array Delete` |\n\n该包的 `GetResp(res resp.Result)` 不接收 `context.Context`。\n\n### `query_resp`\n\n用于查询类接口响应。\n\n定义在：\n\n- `fuxi/core/consts/query_resp/base/base.go`\n- `fuxi/core/consts/query_resp/query.go`\n\n响应项：\n\n| 变量 | code | message |\n|---|---:|---|\n| `Success` | `resp.SuccessCode` | `resp.SuccessMsg` |\n| `InvalidParam` | `4001` | `Invalid Param` |\n| `InternalError` | `4002` | `Internal Error` |\n\n### `del_resp`\n\n用于删除对象或记录场景。\n\n定义在：\n\n- `fuxi/core/consts/del_resp/base/base.go`\n- `fuxi/core/consts/del_resp/del.go`\n\n响应项：\n\n| 变量 | code | message |\n|---|---:|---|\n| `Success` | `resp.SuccessCode` | `resp.SuccessMsg` |\n| `InvalidParam` | `5001` | `Invalid Param` |\n| `InternalError` | `5002` | `Internal Error` |\n| `NotFound` | `5003` | `Not Found` |\n\n### `count_resp`\n\n用于计数查询场景。\n\n定义在：\n\n- `fuxi/core/consts/count_resp/base/base.go`\n- `fuxi/core/consts/count_resp/query.go`\n\n响应项：\n\n| 变量 | code | message |\n|---|---:|---|\n| `Success` | `resp.SuccessCode` | `resp.SuccessMsg` |\n| `InvalidParam` | `6001` | `Invalid Param` |\n| `InternalError` | `6002` | `Internal Error` |\n\n### `pack_url_resp`\n\n用于 URI 打包、bucket/domain 解析相关场景。\n\n定义在：\n\n- `fuxi/core/consts/pack_url_resp/base/base.go`\n- `fuxi/core/consts/pack_url_resp/pack_url.go`\n\n响应项：\n\n| 变量 | code | message |\n|---|---:|---|\n| `Success` | `resp.SuccessCode` | `resp.SuccessMsg` |\n| `InvalidParam` | `7001` | `Invalid Param` |\n| `BucketNotFound` | `7002` | `Bucket Not Found For Uri` |\n| `DomainNotFound` | `7003` | `Domain Not Found For Uri` |\n| `ErrUnsupportedDomainType` | `7004` | `Unsupported Domain Type` |\n| `InternalErr` | `7005` | `Internal Error` |\n| `PermissionDenied` | `7006` | `Permission Denied` |\n\n注意：该包当前没有定义 `GetResp` 函数。如果业务侧需要和其他响应包保持一致，需要直接使用已注册的响应变量，或补充同样形式的 `GetResp(res resp.Result)` 封装。\n\n### `ttl_resp`\n\n用于 TTL 清理、过期判断、状态校验相关场景。\n\n定义在：\n\n- `fuxi/core/consts/ttl_resp/base/base.go`\n- `fuxi/core/consts/ttl_resp/ttl.go`\n\n响应项：\n\n| 变量 | code | message |\n|---|---:|---|\n| `Success` | `resp.SuccessCode` | `resp.SuccessMsg` |\n| `InvalidParam` | `1000001` | `Invalid Param` |\n| `InternalError` | `1000002` | `Internal Error` |\n| `NotFound` | `1000003` | `Not Found` |\n| `NoTTLCfg` | `1000004` | `No TTL Config` |\n| `NotExpired` | `1000005` | `Not Expired` |\n| `InvalidState` | `1000006` | `Invalid Data State` |\n\n### `idx_update_resp`\n\n用于索引更新场景。\n\n定义在：\n\n- `fuxi/core/consts/idx_update_resp/base/base.go`\n- `fuxi/core/consts/idx_update_resp/update_idx.go`\n\n响应项：\n\n| 变量 | code | message |\n|---|---:|---|\n| `Success` | `resp.SuccessCode` | `resp.SuccessMsg` |\n| `InvalidParam` | `1001001` | `Invalid Param` |\n| `InternalError` | `1001002` | `Internal Error` |\n\n实现细节需要注意：`update_idx.go` 当前导入的是 `fuxi/core/consts/copy_resp/base`，而不是同目录下的 `idx_update_resp/base`。因此 `idx_update_resp.Success`、`InvalidParam`、`InternalError` 实际绑定的是 `copy_resp/base` 中创建的 `resp.Result` 标识。与此同时，`idx_update_resp/base/base.go` 中的 `NotFound` 等标识当前未被顶层响应包使用。\n\n### `idx_refresh_resp`\n\n用于索引刷新场景。\n\n定义在：\n\n- `fuxi/core/consts/idx_refresh_resp/base/base.go`\n- `fuxi/core/consts/idx_refresh_resp/query.go`\n\n响应项：\n\n| 变量 | code | message |\n|---|---:|---|\n| `Success` | `resp.SuccessCode` | `resp.SuccessMsg` |\n| `InvalidParam` | `1002001` | `Invalid Param` |\n| `InternalError` | `1002002` | `Internal Error` |\n\n`base` 中声明了 `NotFound`，但顶层包当前没有注册对应响应。\n\n### `idx_repair_entry_resp`\n\n用于 `RepairIdxEntryForInternal` RPC。\n\n定义在：\n\n- `fuxi/core/consts/idx_repair_entry_resp/base/base.go`\n- `fuxi/core/consts/idx_repair_entry_resp/query.go`\n\n响应项：\n\n| 变量 | code | message |\n|---|---:|---|\n| `Success` | `resp.SuccessCode` | `resp.SuccessMsg` |\n| `InvalidParam` | `1003001` | `Invalid Param` |\n| `InternalError` | `1003002` | `Internal Error` |\n\n包注释明确该错误码段为 `1003xxx`，与 `idx_update_resp` 的 `1001xxx`、`idx_refresh_resp` 的 `1002xxx` 相邻。\n\n### `idx_repair_bucket_resp`\n\n用于 `RepairIdxBucketForInternal` RPC。\n\n定义在：\n\n- `fuxi/core/consts/idx_repair_bucket_resp/base/base.go`\n- `fuxi/core/consts/idx_repair_bucket_resp/query.go`\n\n响应项：\n\n| 变量 | code | message |\n|---|---:|---|\n| `Success` | `resp.SuccessCode` | `resp.SuccessMsg` |\n| `InvalidParam` | `1004001` | `Invalid Param` |\n| `InternalError` | `1004002` | `Internal Error` |\n\n包注释明确该错误码段为 `1004xxx`，与 `idx_repair_entry_resp` 的 `1003xxx` 相邻。\n\n### `mdap_resp`\n\n用于 MDAP 相关接口，覆盖通用错误、AssetGroup、Processing、Source、Artifact 等子域。\n\n定义在：\n\n- `fuxi/core/consts/mdap_resp/base/base.go`\n- `fuxi/core/consts/mdap_resp/mdap.go`\n\n通用响应项：\n\n| 变量 | code | message |\n|---|---:|---|\n| `Success` | `resp.SuccessCode` | `resp.SuccessMsg` |\n| `InvalidParam` | `2001001` | `Invalid Param` |\n| `InternalError` | `2001002` | `Internal Error` |\n| `NotFound` | `2001003` | `Not Found` |\n| `AlreadyExists` | `2001004` | `Already Exists` |\n| `PermissionDenied` | `2001005` | `Permission Denied` |\n\n`PermissionDenied` 使用 `base.InvalidParam` 作为底层 `resp.Result` 标识注册，这意味着它和 `InvalidParam` 共享同一个基础结果身份。维护时需要确认这是有意复用，还是应该在 `base` 中新增独立的 `PermissionDenied` 标识。\n\nAssetGroup 响应项：\n\n| 变量 | code | message |\n|---|---:|---|\n| `CreateAssetGroupFailed` | `2002001` | `Create AssetGroup Failed` |\n| `MGetAssetGroupsFailed` | `2002002` | `MGet AssetGroups Failed` |\n| `QueryAssetGroupsFailed` | `2002003` | `Query AssetGroups Failed` |\n| `UpdateAssetGroupFailed` | `2002004` | `Update AssetGroup Failed` |\n| `DeleteAssetGroupFailed` | `2002005` | `Delete AssetGroup Failed` |\n\nSource 响应项：\n\n| 变量 | code | message |\n|---|---:|---|\n| `CreateSourceFailed` | `2003001` | `Create Source Failed` |\n| `MGetSourcesFailed` | `2003002` | `MGet Sources Failed` |\n| `QuerySourcesFailed` | `2003003` | `Query Sources Failed` |\n| `UpdateSourceFailed` | `2003004` | `Update Source Failed` |\n\nArtifact 响应项：\n\n| 变量 | code | message |\n|---|---:|---|\n| `CreateArtifactFailed` | `2004001` | `Create Artifact Failed` |\n| `MGetArtifactsFailed` | `2004002` | `MGet Artifacts Failed` |\n| `QueryArtifactsFailed` | `2004003` | `Query Artifacts Failed` |\n\nProcessing 响应项：\n\n| 变量 | code | message |\n|---|---:|---|\n| `StartProcessingAssetGroupNotFound` | `2005001` | `StartProcessing AssetGroup Not Found` |\n\n## 使用方式\n\n业务代码通常不直接构造 `BaseResp`，而是引用对应场景包中的结果变量：\n\n```go\nimport (\n\t\"context\"\n\n\t\"code.byted.org/videoarch/compound/fuxi/core/consts/query_resp\"\n)\n\nfunc buildBaseResp(ctx context.Context, invalid bool) any {\n\tif invalid {\n\t\treturn query_resp.GetResp(ctx, query_resp.InvalidParam)\n\t}\n\n\treturn query_resp.GetResp(ctx, query_resp.Success)\n}\n```\n\n对于没有 `context.Context` 参数的包，例如 `set_meta_resp`、`del_attr_resp`、`mdap_resp`：\n\n```go\nimport \"code.byted.org/videoarch/compound/fuxi/core/consts/set_meta_resp\"\n\nfunc buildSetMetaResp(conflict bool) any {\n\tif conflict {\n\t\treturn set_meta_resp.GetResp(set_meta_resp.AlreadyExists)\n\t}\n\n\treturn set_meta_resp.GetResp(set_meta_resp.Success)\n}\n```\n\n## 扩展新响应码\n\n新增响应码时，保持现有两层结构：\n\n1. 在对应 `base/base.go` 中声明新的 `resp.Result`。\n2. 在顶层包中使用 `resBase.NewResp` 绑定 code/message。\n3. 如该包已有 `GetResp`，无需改动调用方式。\n4. 选择错误码时遵循已有段位，避免跨业务域复用。\n\n示例：\n\n```go\n// base/base.go\nvar PermissionDenied = resp.NewResult()\n```\n\n```go\n// xxx.go\nvar PermissionDenied = resBase.NewResp(base.PermissionDenied, 9001, \"Permission Denied\")\n```\n\n如果新增的是全新业务域，建议沿用目录结构：\n\n```text\nfuxi/core/consts/<domain>_resp/\n  base/base.go\n  <domain>.go\n```\n\n## 维护注意事项\n\n`GetResp` 的签名目前不完全统一：多数包使用 `GetResp(ctx context.Context, res resp.Result)`，但 `set_meta_resp`、`del_attr_resp`、`mdap_resp` 使用 `GetResp(res resp.Result)`，`pack_url_resp` 没有 `GetResp`。调用侧需要按具体包的实际签名使用。\n\n部分 `base` 标识声明后没有被顶层包注册，例如 `idx_refresh_resp/base.NotFound`、`idx_update_resp/base.NotFound`。这类声明不会自动变成可返回响应，只有经过 `resBase.NewResp` 注册后才参与映射。\n\n响应变量应避免共享错误的 `base` 标识。`idx_update_resp` 当前导入 `copy_resp/base`，`mdap_resp.PermissionDenied` 当前复用 `base.InvalidParam`，这些实现会影响 `resp.Result` 到响应对象的映射关系。修改或新增响应码时，应优先确认 `base` 标识是否来自当前业务域。","rpc-entry-points":"# RPC Entry Points\n\n## 模块职责\n\nRPC Entry Points 是 Compound 服务的 Kitex 入口层，负责启动 RPC Server，并把 IDL 生成的 RPC 方法接入到内部业务服务。入口层本身不承载核心业务逻辑，主要完成四类工作：\n\n1. 服务启动与中间件装配：`main.go` 创建 `compoundservice.NewServer`，注册业务实现和通用中间件。\n2. RPC 请求参数的轻量校验：例如索引刷新、TTL、索引修复接口会在 handler 层拒绝明显非法请求。\n3. 调用内部服务：Fuxi 相关能力转发到 `fuxi/core/service`，MDAP 相关能力转发到 `mdap/service`。\n4. 组装 RPC 响应：将内部 `resp` 类型转换为 `base.BaseResp`，并填充业务返回字段。\n\n核心实现位于：\n\n- `main.go`：服务进程入口。\n- `handler/handler.go`：`CompoundServiceImpl`，实现 IDL 生成的 Compound Service 接口。\n- `harden/init.go`：初始化全局 `HardenClient`。\n\n## 启动流程\n\n`main()` 会先输出启动诊断日志，记录当前运行环境信息：\n\n```go\nlog.V2.Info().Str(\"compound: startup diagnostic\").KVs(\n    \"env_cluster\", env.Cluster(),\n    \"env_idc\", env.IDC(),\n    \"env_psm\", env.PSM(),\n    \"tce_cluster\", os.Getenv(\"TCE_CLUSTER\"),\n    \"service_cluster\", os.Getenv(\"SERVICE_CLUSTER\"),\n    \"tce_psm\", os.Getenv(\"TCE_PSM\"),\n).Emit()\n```\n\n随后通过 `compoundservice.NewServer` 创建 Kitex Server：\n\n```go\nsvr := compoundservice.NewServer(new(handler.CompoundServiceImpl),\n    byted.WithBizHandlerError2BizCodeMsgFunc(util.HandlerError2BaseRespFunc),\n    server.WithMiddleware(middleware.LogMidware[*base.BaseResp](\"cpd\")),\n    server.WithMiddleware(middleware.DownstreamRateLimitMiddleware),\n)\n```\n\n这里注册了三个关键扩展点：\n\n- `new(handler.CompoundServiceImpl)`：RPC 方法的实际实现。\n- `util.HandlerError2BaseRespFunc`：将业务 handler 返回的错误转换为 BizCode/BizMsg。\n- `middleware.LogMidware[*base.BaseResp](\"cpd\")`：统一日志中间件。\n- `middleware.DownstreamRateLimitMiddleware`：下游限流中间件。\n\n服务退出前通过 `defer` 调用 `log.V2.Flush()` 和 `log.V2.Close()`，确保日志被刷出。\n\n```mermaid\nflowchart TD\n    A[进程启动 main] --> B[输出环境诊断日志]\n    B --> C[创建 CompoundServiceImpl]\n    C --> D[注册错误转换函数]\n    D --> E[注册日志和限流中间件]\n    E --> F[svr.Run]\n    F --> G[Kitex 接收 RPC 请求]\n```\n\n## `CompoundServiceImpl` 的定位\n\n`CompoundServiceImpl` 是 IDL 生成服务接口的实现类型：\n\n```go\ntype CompoundServiceImpl struct{}\n```\n\n它的方法基本遵循同一种结构：\n\n```go\nfunc (s *CompoundServiceImpl) SomeRPC(ctx context.Context, req *SomeReq) (*SomeResp, error) {\n    res, data := service.SomeOperation(ctx, req)\n    return &SomeResp{\n        BaseResp: res.ToBaseResp(ctx),\n        Data:     data,\n    }, nil\n}\n```\n\n入口层通常返回 `nil` error，并通过 `BaseResp` 表达业务成功或失败。只有服务启动失败时，`main()` 会记录错误并 `panic(err)`。\n\n## Fuxi 数据接口\n\nFuxi 相关 RPC 主要转发到 `code.byted.org/videoarch/compound/fuxi/core/service`，在 handler 中使用别名 `fuxi_s`。\n\n### `Count`\n\n`Count(ctx, req)` 调用 `fuxi_s.Count(ctx, req)`，返回 `BaseResp` 和计数值：\n\n```go\nresp, count := fuxi_s.Count(ctx, req)\nreturn &compound.CountResp{\n    BaseResp: resp.ToBaseResp(ctx),\n    Count:    count,\n}, nil\n```\n\n### `TTL`\n\n`TTL(ctx, req)` 在入口层校验 `space`、`schema`、`id` 是否为空。任一为空时返回 `ttl_resp.InvalidParam`。\n\n校验通过后调用：\n\n```go\nresp := fuxi_s.TTL(ctx, req)\n```\n\n并将结果写入 `compound.TTLResp.BaseResp`。\n\n### `SetAttr`\n\n`SetAttr(ctx, req)` 调用 `fuxi_s.SetAttr(ctx, req)`，并将变更字段通过 `ChangedAttrs` 返回：\n\n```go\nres, attrs := fuxi_s.SetAttr(ctx, req)\nreturn &compound.SetAttrResp{\n    BaseResp:     res.ToBaseResp(ctx),\n    ChangedAttrs: gslice.PtrOf(attrs),\n}, nil\n```\n\n### `CopyAttr`\n\n`CopyAttr(ctx, req)` 调用 `fuxi_s.CopyAttr(ctx, req)`，返回复制成功的 key 映射：\n\n```go\nres, copiedMapping := fuxi_s.CopyAttr(ctx, req)\nreturn &compound.CopyAttrResp{\n    BaseResp:   res.ToBaseResp(ctx),\n    CopiedKeys: copiedMapping,\n}, nil\n```\n\n### `DelAttr`\n\n`DelAttr(ctx, req)` 调用 `fuxi_s.DelAttr(ctx, req)`，返回删除字段：\n\n```go\nres, deletedKeys := fuxi_s.DelAttr(ctx, req)\nreturn &compound.DelAttrResp{\n    BaseResp:     res.ToBaseResp(ctx),\n    DeletedAttrs: deletedKeys,\n}, nil\n```\n\n### `Query`\n\n`Query(ctx, req)` 调用 `fuxi_s.Query(ctx, req)`，内部服务直接返回完整的 `compound.QueryResp`，handler 只负责补齐 `BaseResp`：\n\n```go\nres, resp := fuxi_s.Query(ctx, req)\nresp.SetBaseResp(res.ToBaseResp(ctx))\nreturn resp, nil\n```\n\n从执行流看，部分 MDAP 查询最终也会走到 Fuxi 的 `Query` / `QueryWithFuxiAttr`，并通过 `utils/timing` 记录耗时，通过 `utils/cctx` 获取上下文容器。\n\n### `Del`\n\n`Del(ctx, req)` 调用 `fuxi_s.Del(ctx, req)`，只返回 `BaseResp`。\n\n### `GetFileURLs`\n\n`GetFileURLs(ctx, req)` 调用 `fuxi_s.GetFileURLs(ctx, req)`。内部服务返回响应对象，handler 将 `BaseResp` 写回后直接返回：\n\n```go\nres, response := fuxi_s.GetFileURLs(ctx, req)\nresponse.BaseResp = res.ToBaseResp(ctx)\nreturn response, nil\n```\n\n## 索引维护接口\n\n索引维护接口是该入口层中参数校验最明确的一组接口，主要面向内部调用。\n\n### `RefreshIdxForInternal`\n\n`RefreshIdxForInternal(ctx, req)` 用于刷新指定对象的索引。入口层要求以下字段都非空：\n\n- `req.GetSpace()`\n- `req.GetSchema()`\n- `req.GetID()`\n\n参数非法时返回：\n\n```go\nidx_refresh_resp.InvalidParam.ToBaseResp(ctx)\n```\n\n校验通过后调用：\n\n```go\nerr = fuxi_s.Refresh(ctx, req.GetSpace(), req.GetSchema(), req.GetID())\n```\n\n如果 `fuxi_s.Refresh` 返回错误，RPC 响应为 `idx_refresh_resp.InternalError`；否则返回 `idx_refresh_resp.Success`。\n\n### `UpdateIdxWithEventForInternal`\n\n`UpdateIdxWithEventForInternal(ctx, req)` 用于根据事件更新索引。入口层会打印裁剪后的事件：\n\n```go\nlog.Print(ctx, \"UpdateIdxWithEventForInternal %#v\", req.TrimmedEvent)\n```\n\n当 `req.TrimmedEvent == nil` 时返回 `idx_update_resp.InvalidParam`。校验通过后调用：\n\n```go\nerr = fuxi_s.HandleEvent(ctx, *req.TrimmedEvent, false)\n```\n\n第三个参数固定为 `false`，表示该入口按当前内部事件处理路径执行，不在 handler 层暴露额外模式开关。\n\n需要注意：当前代码直接访问 `req.TrimmedEvent`，没有在方法内处理 `req == nil`。测试中存在 `TestUpdateIdxWithEventForInternal_NilReqPanics`，说明 nil 请求会触发 panic 是当前已知行为，而不是被转换为 `InvalidParam`。\n\n## 索引修复接口\n\n索引修复接口包含入口层限流式参数保护，避免单次 RPC 请求承载过大的修复批次。\n\n```go\nconst (\n    repairIdxEntryItemsLimit = 100\n    repairIdxBucketIDsLimit  = 200\n)\n```\n\n### `RepairIdxEntryForInternal`\n\n`RepairIdxEntryForInternal(ctx, req)` 用于修复指定 `(oid, idx, cols, ver)` 列表对应的索引 entry。代码注释说明服务端会基于主表当前快照自行决策补、删或跳过。\n\n入口层校验：\n\n- `space` 不能为空。\n- `schema` 不能为空。\n- `items` 数量必须大于 `0`。\n- `items` 数量不能超过 `repairIdxEntryItemsLimit`，即 `100`。\n\n校验失败时返回 `idx_repair_entry_resp.InvalidParam`。\n\n校验通过后调用：\n\n```go\nresults, added, removed, skipped, failed := fuxi_s.RepairIdxEntry(ctx, req)\n```\n\n响应中会返回逐项结果和汇总计数：\n\n- `Results`\n- `Added`\n- `Removed`\n- `Skipped`\n- `Failed`\n- `BaseResp`\n\nhandler 还会打印修复摘要日志，包含 `space`、`schema`、总数和各类结果计数。\n\n### `RepairIdxBucketForInternal`\n\n`RepairIdxBucketForInternal(ctx, req)` 用于删除指定 collection 下的“空封口桶”。代码注释明确说明活跃桶和非空桶都会被 skipped。\n\n入口层校验：\n\n- `space` 不能为空。\n- `schema` 不能为空。\n- `collection` 不能为空。\n- `bucket_ids` 数量必须大于 `0`。\n- `bucket_ids` 数量不能超过 `repairIdxBucketIDsLimit`，即 `200`。\n\n校验失败时返回 `idx_repair_bucket_resp.InvalidParam`。\n\n校验通过后调用：\n\n```go\nresults, deleted, skipped, failed := fuxi_s.RepairIdxBucket(ctx, req)\n```\n\n响应中返回：\n\n- `Results`\n- `Deleted`\n- `Skipped`\n- `Failed`\n- `BaseResp`\n\n该方法同样会打印修复摘要日志。\n\n## MDAP 资源接口\n\nMDAP 相关 RPC 转发到 `code.byted.org/videoarch/compound/mdap/service`。这些方法基本不在 handler 层做参数校验，而是依赖 `mdap/service` 返回统一结果对象。\n\n### AssetGroup\n\n`CreateAssetGroup(ctx, req)` 调用 `service.CreateAssetGroup(ctx, req)`，返回 `AssetGroup`。\n\n`MGetAssetGroups(ctx, req)` 调用 `service.MGetAssetGroups(ctx, req)`，返回 `AssetGroups`。\n\n`UpdateAssetGroup(ctx, req)` 调用 `service.UpdateAssetGroup(ctx, req)`，只返回 `BaseResp`。\n\n`QueryAssetGroups(ctx, req)` 调用 `service.QueryAssetGroups(ctx, req)`，返回 `AssetGroups` 和 `Total`。这里使用 `gptr.Of(total)` 将总数转为指针：\n\n```go\nTotal: gptr.Of(total),\n```\n\n`DeleteAssetGroup(ctx, req)` 调用 `service.DeleteAssetGroup(ctx, req)`，只返回 `BaseResp`。\n\n### Source\n\n`CreateSource(ctx, req)` 调用 `service.CreateSource(ctx, req)`，返回 `Source`。\n\n`MGetSources(ctx, req)` 调用 `service.MGetSources(ctx, req)`，返回 `Sources`。\n\n`QuerySources(ctx, req)` 调用 `service.QuerySources(ctx, req)`，返回 `Sources` 和 `Total`。\n\n`UpdateSource(ctx, req)` 调用 `service.UpdateSource(ctx, req)`，只返回 `BaseResp`。\n\n### Artifact\n\n`CreateArtifact(ctx, req)` 调用 `service.CreateArtifact(ctx, req)`，返回 `Artifact`。\n\n`MGetArtifacts(ctx, req)` 调用 `service.MGetArtifacts(ctx, req)`，返回 `Artifacts`。\n\n`QueryArtifacts(ctx, req)` 调用 `service.QueryArtifacts(ctx, req)`，返回 `Artifacts` 和 `Total`。\n\n### Processing\n\n`StartProcessing(ctx, req)` 调用 `service.StartProcessing(ctx, req)`，返回 `RunId`：\n\n```go\nres, runID := service.StartProcessing(ctx, req)\nreturn &compound.StartProcessingResponse{\n    BaseResp: res.ToBaseResp(ctx),\n    RunId:    runID,\n}, nil\n```\n\n## 响应组装模式\n\n该模块最重要的约定是：内部服务返回的业务结果对象需要转换为 IDL 中的 `BaseResp`。\n\n常见模式如下：\n\n```go\nres := service.SomeOperation(ctx, req)\nreturn &SomeResponse{\n    BaseResp: res.ToBaseResp(ctx),\n}, nil\n```\n\n带业务数据时：\n\n```go\nres, entity := service.CreateArtifact(ctx, req)\nreturn &mdap.CreateArtifactResponse{\n    BaseResp:  res.ToBaseResp(ctx),\n    Artifact:  entity,\n}, nil\n```\n\n内部服务已经返回完整响应对象时：\n\n```go\nres, response := fuxi_s.GetFileURLs(ctx, req)\nresponse.BaseResp = res.ToBaseResp(ctx)\nreturn response, nil\n```\n\n因此，新增 RPC 方法时应优先保持这个模式：handler 层只做入口校验、服务调用和响应适配，不把核心业务逻辑放进 `CompoundServiceImpl`。\n\n## 错误处理约定\n\nRPC 方法通常返回 `(*Resp, nil)`，并通过 `BaseResp` 表示业务状态。例如：\n\n- 参数错误：返回对应常量包中的 `InvalidParam`。\n- 内部执行错误：返回对应常量包中的 `InternalError`。\n- 成功：返回对应常量包中的 `Success`。\n\n索引相关接口使用独立响应常量包：\n\n- `idx_refresh_resp`\n- `idx_update_resp`\n- `idx_repair_entry_resp`\n- `idx_repair_bucket_resp`\n- `ttl_resp`\n\n服务级 handler error 到 BizCode/BizMsg 的转换由 `main.go` 中的 `util.HandlerError2BaseRespFunc` 注册到 Kitex Server。\n\n## 与代码生成的关系\n\n`main.go` 中包含 `go:generate` 指令：\n\n```go\n//go:generate kitex -disable-self-update -thrift gen_deep_equal=true -module code.byted.org/videoarch/compound -service bytedance.videoarch.compound idl/compound.thrift\n```\n\nIDL 变更后，需要通过该指令重新生成 Kitex 代码。`handler.CompoundServiceImpl` 必须实现生成后的服务接口，否则编译会失败。\n\n入口层依赖的生成包包括：\n\n- `kitex_gen/bytedance/videoarch/compound`\n- `kitex_gen/bytedance/videoarch/compound/mdap`\n- `kitex_gen/bytedance/videoarch/compound/compoundservice`\n- `kitex_gen/base`\n\n## `harden` 初始化\n\n`harden/init.go` 定义了一个包级全局客户端：\n\n```go\nvar HardenClient = harden.NewClient(env.PSM())\n```\n\n它使用当前服务的 `env.PSM()` 初始化 `videoarch/harden-sdk/client`。该文件没有直接参与 `main.go` 的启动装配，也没有在 `handler/handler.go` 中被调用；它的作用是为依赖 `harden` 包的其他代码提供统一客户端实例。\n\n## 新增或修改 RPC 方法时的注意事项\n\n新增入口方法时，优先遵循现有分层：\n\n1. 在 handler 中实现 IDL 生成的方法签名。\n2. 只在 handler 层做必要的空值、批量上限、必填字段校验。\n3. 将核心逻辑放到 `fuxi/core/service` 或 `mdap/service` 等业务层。\n4. 使用 `res.ToBaseResp(ctx)` 组装 `BaseResp`。\n5. 对批量修复、内部更新等高风险接口增加明确的数量上限和摘要日志。\n6. 保持返回 `nil` error 的业务响应风格，除非生成接口或框架约定要求返回真实 error。\n\n对于 nil 请求需要特别谨慎。当前部分方法会通过 `req.GetXxx()` 安全读取字段，但也有方法直接访问字段，例如 `UpdateIdxWithEventForInternal` 使用 `req.TrimmedEvent`。如果要改变 nil 请求行为，应同步调整现有测试预期。","storage-and-external-clients-client":"# Storage and External Clients — client\n\n## 模块职责\n\n`fuxi/client` 封装 Compound 对存储系统和外部服务的访问入口。上层业务主要通过 `iface.MetaStorage` 抽象或包级 helper 调用本模块，不直接感知底层是 Bytedoc、Abase、ODA KV，还是账号、配置、视频删除等外部系统。\n\n核心职责包括：\n\n- 提供三类元数据存储实现：`doc.Impl`、`abase.Impl`、`oda.Impl`。\n- 从 `admin` 获取 schema、collection、索引、TTL、删除文件等运行时配置。\n- 将 Compound 的 `QueryFilter`、`UpdateWrapper`、`compound.Expression` 转换为底层存储可执行的请求。\n- 统一翻译底层错误，例如 `iface.WrongVersion`、`iface.ErrObjNotFound`、`iface.NotSupportedInCurrentStorage`。\n- 封装账号、桶元数据、延迟任务、VDA、视频删除、Compound 自调用等外部客户端。\n\n## 总体结构\n\n```mermaid\nflowchart TD\n    服务层[\"service / core 调用方\"]\n    管理配置[\"client/admin\"]\n    Bytedoc[\"client/doc<br/>Bytedoc + ODA BSON\"]\n    Abase[\"client/abase<br/>Abase KV\"]\n    ODA[\"client/oda<br/>ODA Group KV\"]\n    外部[\"account / bktmeta / postpone / vda / video_delete / compound\"]\n\n    服务层 --> 管理配置\n    服务层 --> Bytedoc\n    服务层 --> Abase\n    服务层 --> ODA\n    服务层 --> 外部\n    Bytedoc --> 管理配置\n```\n\n`service/meta`、`core/service`、`idx` 等上层模块根据配置选择后端：`admin.GetStorage` 返回 `entity.Bytedoc`、`entity.Abase2`、`entity.Oda` 或 `entity.Tos`，再落到对应 `iface.MetaStorage` 实现。\n\n## `iface.MetaStorage` 实现\n\n本模块中有三套主要存储实现：\n\n| 包 | 导出实现 | 底层能力 | 查询能力 | 写入并发控制 |\n|---|---|---|---|---|\n| `client/doc` | `doc.Impl` | ODA Bytedoc / Mongo 风格 BSON | 支持 ID、表达式、排序、分页、Count | Mongo filter + version 字段；ODA 事务错误码 |\n| `client/abase` | `abase.Impl` | Abase KV | 仅支持按 ID 查询；无 ID 纯表达式不支持 | Abase `Generation` CAS |\n| `client/oda` | `oda.Impl` | ODA Group KV | 仅支持按 ID 批量查询；无 ID 纯表达式不支持 | 底层 BUSY / object missing 错误翻译 |\n\nKV 后端的共同约束是：当 `QueryFilter` 同时包含 ID 和表达式时，当前实现按 ID 读写，表达式会被忽略。只有“无 ID + 仅表达式”的全表表达式查询、更新或删除会返回 `iface.NotSupportedInCurrentStorage`。Bytedoc 后端则会把表达式转换成 Mongo filter，并在底层执行。\n\n## Bytedoc 存储：`client/doc`\n\n`doc.Impl` 是功能最完整的元数据存储实现。它通过 `oda.GetCli()` 获取 `objectdataaccessservice.Client`，调用 ODA 的 Bytedoc RPC：\n\n- `QueryBson` → `cli.BytedocFind`\n- `AddBson` / `TryInsertBson` → `cli.BytedocInsertMany`\n- `UpdateBson` / `RawUpdateBson` → `cli.BytedocUpdateMany`\n- `DelBson` → `cli.BytedocDeleteMany`\n- `CountBson` → `cli.BytedocCount`\n- `FindOneAndUpdateBson` → `cli.BytedocFindOneAndUpdate`\n\n### 元数据读写流程\n\n`QueryAttr` 会先把业务 ID 转成文档 `_id`：`getDocID(metaSpace, id)`，格式为 `namespace + \"::\" + id`。然后调用 `BuildMongoFilter` 把 `compound.Expression` 转成 `bson.M`。如果包含表达式，还会注入 `_space` 和 `_schema`，避免 BytedocFind 缺少分片键时报 `ErrShardingKeyNotSet`。\n\n写入路径由 `UpdateAttr` 处理：\n\n- `version.IsNotExists()` 表示新增，使用 `BuildMongoAdd` 生成嵌套 BSON，然后走 `AddAttr`。\n- 普通更新使用 `BuildMongoUpdate` 生成点号表示法 BSON，避免 `$set` 覆盖父对象。\n- 删除属性通过 `$unset` 构造。\n- 有版本要求时，把 `entity.VersionKey` 加入 filter；`UpdateBson` 返回 `MatchedCount`，若为 0 且版本已设置，则返回 `iface.WrongVersion`。\n\n`DelID` 同样用 filter 承载 ID、表达式和版本条件。删除数量为 0 且调用方期望删除数量非 0 时，按版本是否设置区分 `iface.WrongVersion` 与 `iface.ErrObjNotFound`。\n\n### BSON 转换工具\n\n`doc/utils.go` 是 Bytedoc 表达式和 BSON 的转换层：\n\n- `BuildMongoFilter`：递归转换 `compound.Expression`，支持 `AND`、`OR` 和叶子条件。\n- `BuildMongoUpdate`：把属性 map 转成点号路径 BSON，例如 `a.b.c`。\n- `BuildMongoAdd`：把属性 map 转成嵌套 BSON，适合插入文档。\n- `BuildMongoOrder`：把 `compound.OrderByClause` 转成排序条件。\n- `BsonToMap`：把 BSON 文档展平成 `map[string]string`。\n- `ExprIdHandler`：校验表达式，并把 `_id` 条件值转换为 Bytedoc 文档 ID。\n- `ValidateExpression`：严格校验表达式结构，避免叶子和逻辑节点混用。\n- `HasConcreteFieldConstraintInAllBranches`：判断表达式在所有 OR 分支中是否都包含指定字段的 EQ / IN 约束。\n\n类型转换通过 `convertValue` 完成，内部委托 `entity.ConvertAttrValue`，失败时保留原始 string，保持 best-effort 行为。\n\n### GSI helper\n\n`doc` 还暴露了一组包级函数供索引层直接使用：\n\n- `RawUpdate`\n- `TryInsert`\n- `FindOne`\n- `FindAll`\n- `FindWithLimit`\n- `DeleteMany`\n- `CountBson`\n- `FindOneAndUpdate`\n- `BulkWrite`\n\n`BulkWrite` 用于 GSI 多步事务，接受 `[]BulkWriteOp`，转换为 `BytedocBulkWriteRequest`，并强制 `Ordered: true`、`Transaction: MustTransaction`。错误码翻译规则包括：\n\n- `402` → `ErrShardingKeyNotSet`\n- `403` / `11000` → `ErrDuplicateKey`\n- `511` → `iface.ErrTxnConflict`\n- `512` → `iface.ErrConsistentTxnFailed`\n\n## Abase 存储：`client/abase`\n\n`abase.Impl` 使用 `abaseService.Client` 访问 `bytedance.videoarch.object_data_access`。客户端在 `init` 中创建，配置了 RPC 超时、集群和长连接池。\n\n主要路径：\n\n- `QueryAttr`：遍历 `queryFilter.GetIDs()`，逐个调用内部 `query`。\n- `query`：调用 `cli.Get`，反序列化 `serializer.Unmarshal`，并根据 `created_at` 调用 `shield.IsShielded` 过滤屏蔽数据。\n- `UpdateAttr` / `DelAttr` / `Add`：统一走 `setAttr`。\n- `DelID`：直接调用 `cli.Delete`。\n\n`setAttr` 是 Abase 写入的核心。它在需要时先用 `query(..., useMaster=true)` 读取当前值和 `Generation`，校验 `entity.VersionKey`，再调用 `cli.Set` 带上 generation 做 CAS。底层返回 `abase.ErrorCode_INVALID_GENERATION` 时翻译成 `iface.WrongVersion`，由 Service 层负责重试。\n\n`Count` 在 Abase 中不支持，固定返回 `iface.NotSupportedInCurrentStorage`。\n\n## ODA KV 存储：`client/oda`\n\n`oda.Impl` 使用 ODA Group API 存储属性，每个属性作为一个 `GroupItem`，真实值放在 `GroupItem.Attributes[\"key\"]` 中。\n\n主要方法：\n\n- `QueryAttr`：调用 `cli.MQueryGroups` 批量读取 ID 列表，再把 `GroupItems` 映射回 `map[string]string`。\n- `SetAttr`：调用 `cli.UpsertGroupItem` 写入一组属性。\n- `DelAttr`：逐个调用 `cli.DeleteGroupItem` 删除属性。\n- `DelID`：调用 `cli.DeleteGroup` 删除整个对象。\n- `Add`：直接委托 `SetAttr(..., vers.NotSet())`。\n- `Count`：不支持，返回 `iface.NotSupportedInCurrentStorage`。\n\nODA KV 的并发冲突通过 `isODABusyConcurrentUpdate` 翻译：状态码 `2` 或错误文案中出现 `busy=2` 时返回 `iface.WrongVersion`。对象缺失状态码 `4002` 会根据版本条件翻译为 `iface.WrongVersion` 或 `iface.ErrObjNotFound`。\n\n## Admin 配置客户端：`client/admin`\n\n`admin` 包是 Compound 读取 fuxi-admin 配置的统一入口，`init` 中调用 `fuxi_admin.Init(utils.Fed)`。\n\n常用函数：\n\n- `GetTTL`：读取 TTL 配置。\n- `GetRegAttrMap`：读取注册属性类型，并显式转换成 `compound.AttrType`。\n- `GetStorage`：读取 schema 对应存储类型，未命中默认返回 `entity.Bytedoc, false`。\n- `GetBytedocCollection` / `GetBytedocIdx`：读取 Bytedoc collection 和索引。\n- `GetIdxCfg`：读取指定 `(space, schema)` 的 GSI 配置。\n- `GetIdxBucketEnabled`：判断索引是否开启分桶。\n- `GetIdxCfgBySchema`：仅从 `@all` 级 binding 读取 schema 通用 GSI，用于跨 space 查询。\n- `GetDelFile`：读取删除元数据时是否允许删除文件。\n\n`GetIdxCfg` 和 `GetIdxCfgBySchema` 都硬编码 `TxnSupported: true`，不消费 SDK 下发字段。这意味着当前索引写路径强制走事务实现，非事务 CAS 实现只保留在归档代码中。\n\n### 注册属性索引\n\n`reg_attr_index.go` 提供 `RegAttrIndex`，用于加速注册属性匹配：\n\n- `BuildRegAttrIndex` 把注册属性按 matcher kind 分成 literal、prefix、default 三类。\n- `Lookup` 按 `literal > prefix > default` 查找。\n- `Len` 返回索引大小。\n- `FuxiAttrIndex` 返回系统保留列索引。\n- `GetAdminAttrIndex` 从 `fuxi_admin.GetRegAttrMapEntry` 获取原始注册属性，并通过 `entry.GetOrInit` 惰性构建索引。\n\n同一桶内按 pattern 字符串排序，保证重叠 pattern 场景下命中结果确定；但业务上 overlap 仍应视为配置错误。\n\n## 外部服务客户端\n\n### `client/account`\n\n`account` 包封装账号 SDK。`init` 时调用 `loadConfig` 预热缓存，并启动 10 分钟周期刷新。缓存通过 `atomic.Pointer[map[int64]string]` 和 `atomic.Pointer[map[string]string]` 原子替换，避免读路径加锁。\n\n主要接口：\n\n- `GetAccountName`\n- `GetTopicAccountBySpace`\n- `GetAccountByName`\n- `GetAccountByID`\n- `GetAccountMDAPDomains`\n\n`ErrAccountNotFound` 是本包统一的账号不存在错误。`DomainDict` 负责把 `mdap.DomainType` 映射到账号 SDK 的 `acc.DomainType`。\n\n### `client/bktmeta`\n\n`bktmeta.GetBucket` 是 `bktmeta-sdk-go` 的薄封装。客户端用 `client.WithCallingPSM(config.PSM)` 初始化，供业务按 bucket 查询 `*meta.Bucket`。\n\n### `client/postpone`\n\n`postpone.TtlTasks` 异步为一组时间戳创建 TTL 延迟任务。它会启动 goroutine，逐个调用内部 `ttlTask`，构造 `compound.CompoundServiceTTLArgs` 并通过 `postpone-go-sdk` 发送请求。\n\n`ttlTask` 根据 `TCE_PSM` 决定 cluster：`TCE_PSM=TRUE` 时使用 `\"fuxi\"`，否则使用 `env.Cluster()`。发送时间为 `ts + delay`，其中 `delay` 默认为 10 秒。\n\n### `client/compound`\n\n`compound` 包是调用 Compound 自身服务的客户端封装，提供：\n\n- `DelAttr`\n- `SetAttr`\n- `Del`\n\n每个方法都用 `retry.DoCanAbort` 包裹，并通过 `callopt.WithIDC(idc)` 指定 IDC。当前代码中会创建 `r.DeepCopy(req)`，但实际 RPC 仍传入原始 `req`。\n\n### `client/vda`\n\n`vda.GetQueryResp` 用于从 Video Data Access 补充视频属性，但当前 `ifReadFromVDA` 固定返回 `false`，因此默认不会读取 VDA，直接返回空结果。\n\n启用后，逻辑会对每个 vid 调用 `ctxReadRawVideo`，读取 `VideoUpload`、`VideoInfo`、`VideoExtra`，再组装成 Compound 的 `AttrMeta` 和三维 `AttrVal` 返回结构。`ctxReadRawVideo` 对状态码 `4004` 或空 video 返回 `ErrVIDNotFound`。\n\n### `client/video_delete`\n\n`video_delete` 包封装视频删除服务，初始化 Overpass client 后关闭 `EnableErrHandler`，避免非 0 响应被自动包装成错误。\n\n主要接口：\n\n- `DeleteTranscodeVideo`\n- `DeleteVideo`\n- `DelVideoDup`\n- `CancelDelOrgVideo`\n- `CancelDelEncodedVideo`\n- `Mock`\n\n这些接口都会用 `retry.DoCanAbort` 重试，并按业务状态码做容错。例如 `WrongRegion`、`VideoNotExists`、`RecordNotFound`、`AlreadyHardDeleted` 在对应场景下会被视为可忽略结果。`DeleteVideo` 会自动写入固定 `token`，删除类请求缺少 `TagID` 时会填充 `from_fuxi_ + comm.ExtractCaller(ctx)`。\n\n## 错误和版本语义\n\n本模块的关键设计是把多种底层错误收敛到 Service 层理解的错误：\n\n- `iface.WrongVersion`：版本冲突或 CAS 失败，通常由上层重试。\n- `iface.ErrObjNotFound`：对象不存在。\n- `iface.NotSupportedInCurrentStorage`：当前存储后端不支持该操作，例如 KV 后端的表达式全表查询。\n- `iface.ErrTxnConflict`：事务写冲突，可退避重试。\n- `iface.ErrConsistentTxnFailed`：一致性事务预期校验失败，调用方应读新快照后重试。\n- `ErrShardingKeyNotSet`：Bytedoc 请求缺少分片键。\n- `ErrDuplicateKey`：唯一键冲突。\n\nBytedoc 使用 Mongo filter 和 `MatchedCount` 识别版本冲突；Abase 使用 `Generation`；ODA KV 使用状态码和错误文案识别并发冲突。贡献代码时应保持这些错误翻译稳定，因为 Service 层、idx 层和测试都依赖这些语义。","storage-and-external-clients-core":"# Storage and External Clients — core\n\n## 模块概览\n\n`fuxi/core/storage` 封装了 Fuxi 对对象存储的核心访问能力，主要覆盖两类客户端：\n\n- `terminator-sdk-go`：用于上传、读取、探测、删除对象。\n- `storagegw-go`：用于跨对象复制。\n\n模块对外暴露的是一组包级函数：`Upload`、`Get`、`Exists`、`Del`、`DelIgn404`、`BatchDelIgn404`、`BatchDelIgn404Async`、`Copy`。调用方不直接持有 SDK client，client 在包初始化阶段通过配置创建。\n\n## 初始化与配置\n\n该包有三个 `init()` 分布在不同文件中：\n\n- `terminator.go` 初始化全局 `cli sdk.TerminatorClient`。\n- `storagegw.go` 初始化全局 `sgwCli *storagegw.Client`。\n- `tob.go` 在配置存在且启用时初始化 ToB TOS 授权所需的 `thalassaClient`。\n\n`terminator.go` 和 `storagegw.go` 都会读取 `config.IAMCluster`。如果配置非空，会调用 `iamsdk.SpecifyCluster(cluster)` 指定 IAM 集群。随后使用 `config.TerminatorAK`、`config.TerminatorSK` 初始化 IAM 凭证。\n\n`terminator.go` 还会读取 `config.TerminatorCf` 到 `terminatorCfg`：\n\n```go\ntype terminatorCfg struct {\n\tCluster string `yaml:\"cluster\"`\n}\n```\n\n如果配置里存在 `cluster`，会通过 `sdk.WithCluster(cfgYaml.Cluster)` 传给 `sdk.NewTerminatorClient(config.PSM, opts...)`。\n\n`tob.go` 读取两份配置：\n\n```go\ntype thalassaCfg struct {\n\tEnable  bool   `yaml:\"enable\"`\n\tCluster string `yaml:\"cluster\"`\n\tAk      string `yaml:\"ak\"`\n\tSk      string `yaml:\"sk\"`\n}\n\ntype thalassaSK struct {\n\tSk     string `yaml:\"sk\"`\n\tCipher string `yaml:\"cipher\"`\n}\n```\n\n只有 `config.ThalassaCfg` 和 `config.ThalassaSK` 都存在，且 `thalassaCfg.Enable == true` 时，ToB 授权逻辑才会生效。\n\n## 核心调用关系\n\n```mermaid\nflowchart TD\n    A[\"业务调用方\"] --> B[\"Upload / Get / Exists / Del\"]\n    B --> C[\"checkTobTOS\"]\n    C --> D{\"ToB 授权启用?\"}\n    D -- \"否\" --> E[\"terminator-sdk-go\"]\n    D -- \"是\" --> F[\"genTobToken\"]\n    F --> G[\"Thalassa 获取桶临时凭证\"]\n    G --> H[\"sdk.WithStorageGWAuthorization\"]\n    H --> E\n    A --> I[\"Copy\"]\n    I --> J[\"storagegw-go\"]\n```\n\n这张图只展示主路径：Terminator 相关读写删除会统一经过 `checkTobTOS`，而 `Copy` 走独立的 StorageGW client。\n\n## 对象读写接口\n\n### `Upload(ctx, bkt, key string, bs []byte) error`\n\n`Upload` 将内存中的 `[]byte` 写入指定 bucket/key。实现上使用 `bytes.NewReader(bs)` 构造 reader，然后调用：\n\n```go\ncli.WriteR(ctx, sdk.UploadReq{\n\tBucket: bkt,\n\tKey:    key,\n}, rd, int64(len(bs)), opts...)\n```\n\n调用前会执行 `checkTobTOS(ctx, bkt+\"/\"+key, opts)`。如果 ToB 授权开启，会基于 bucket 生成 StorageGW 授权 token 并追加到 `sdk.ObjectOption`。\n\n典型调用方包括测试工具 `UploadTestFile`，以及 `rocketmq/event.go` 中的 `sendChangeEvent`。\n\n### `Get(ctx, uri string) ([]byte, error)`\n\n`Get` 通过 `cli.ReadL` 下载对象内容，并使用 `io.ReadAll(resp.R)` 一次性读入内存：\n\n```go\nresp, err := cli.ReadL(ctx, sdk.DownloadReq{URI: uri}, opts...)\nreturn io.ReadAll(resp.R)\n```\n\n因此它适合读取体积受控的对象。对于大文件场景，当前接口没有提供流式读取能力，调用方需要注意内存占用。\n\n### `Exists(ctx, uri string) (bool, error)`\n\n`Exists` 使用 `cli.HeadObjectL` 判断对象是否存在：\n\n- 无错误：返回 `(true, nil)`。\n- Terminator 错误码为 `404`：返回 `(false, nil)`。\n- 其他错误：返回 `(false, err)`。\n\n错误码识别通过 `getTerminatorErrCode` 完成，它使用 `errors.As` 判断错误是否包含 `errno.Payload`，再读取 `HttpStatus()`。\n\n## 删除接口\n\n### `Del(ctx, uri string) error`\n\n`Del` 是最基础的删除操作，调用 `cli.DeleteL(ctx, sdk.DeleteReq{URI: uri}, opts...)`。它不会忽略 `404`，也不做重试。\n\n### `DelIgn404(ctx, uri string) error`\n\n`DelIgn404` 在 `Del` 之上增加了 404 忽略逻辑：\n\n```go\nerr := Del(ctx, uri)\nif getTerminatorErrCode(err) == 404 {\n\treturn nil\n}\nreturn err\n```\n\n这适用于删除幂等语义：目标不存在时视为删除成功。\n\n### `BatchDelIgn404(ctx, uris []string, maxConcurrency int) error`\n\n`BatchDelIgn404` 是同步批量删除入口，内部固定使用 `maxRetries = 3`：\n\n```go\nreturn batchDelIgn404WithRetry(ctx, uris, maxConcurrency, 3)\n```\n\n内部实现使用 `errgroup.WithContext(ctx)` 和 `g.SetLimit(maxConcurrency)` 控制并发。每个 URI 会调用 `delWithRetry`：\n\n- 最多执行 `maxRetries + 1` 次删除尝试。\n- 删除成功立即返回。\n- 404 视为成功。\n- 非 404 错误会继续重试，最终返回最后一次错误。\n\n需要注意：`batchDelIgn404WithRetry` 中每个 goroutine 都返回 `nil`，单个 URI 的失败会被记录到 `failedURIs`，不会让 `errgroup` 提前取消其他任务。所有删除任务完成后，如果 `failedURIs` 非空，会打印错误日志并返回 `fmt.Errorf(\"batch delete failed for %d files\", len(failedURIs))`。\n\n### `BatchDelIgn404Async(ctx, uris []string, maxConcurrency int)`\n\n`BatchDelIgn404Async` 是 fire-and-forget 异步删除入口，常用于业务主流程不需要等待对象删除完成的场景。它的关键行为是：\n\n- `uris` 为空时直接返回。\n- 使用 `context.WithoutCancel(ctx)` 脱离父请求取消信号和 deadline。\n- 保留原始 `ctx` 上的 value，例如 logID / trace。\n- 在后台 goroutine 内使用独立的 `asyncDeleteTimeout = 5 * time.Minute`。\n- 忽略批量删除返回值，只通过日志观测失败。\n\n这个设计避免了请求 handler 返回后父 `ctx` 被取消导致异步删除被误杀，同时保留日志关联能力。当前业务层 `SetAttr`、`DelAttr`、`Del` 会调用该异步删除入口。\n\n## 对象复制\n\n`Copy(ctx, src, dst string) error` 使用 StorageGW client 复制对象。它先通过 `comm.ExtractFromURI` 分别解析源和目标 URI：\n\n```go\nsrcBkt, srcObj, err := comm.ExtractFromURI(src)\ndstBkt, dstObj, err := comm.ExtractFromURI(dst)\n```\n\n解析失败时会用 `errs.Wrap` 包装错误并带上原始 URI。复制实际调用：\n\n```go\nsgwCli.CopyObject(dstBkt, dstObj, srcBkt, srcObj, storagegw.NewCopyObjectOptions())\n```\n\n注意参数顺序是目标 bucket/key 在前，源 bucket/key 在后。`Copy` 当前不经过 `checkTobTOS`，ToB 授权逻辑只覆盖 Terminator SDK 路径。\n\n主要调用方是 `core/service/service.go` 中的 `CopyAttr`。\n\n## ToB TOS 授权路径\n\nToB 授权由 `checkTobTOS` 统一注入：\n\n```go\nfunc checkTobTOS(ctx context.Context, uri string, opts []sdk.ObjectOption) []sdk.ObjectOption {\n\tif !enable {\n\t\treturn opts\n\t}\n\tbkt := comm.ExtractBkt(ctx, uri)\n\topts = append(opts, sdk.WithStorageGWAuthorization(genTobToken(ctx, bkt)))\n\treturn opts\n}\n```\n\n当 `enable == false` 时，它是无副作用 passthrough。启用后，它会从 URI 中提取 bucket，并调用 `genTobToken(ctx, bkt)`。\n\n`genTobToken` 通过 `thalassaClient.GetBucketCredential` 获取桶级临时凭证，TTL 使用：\n\n```go\nconst (\n\tTtl10Hours     = 10 * 60 * 60\n\tTtlBuffer10Min = 600\n)\n```\n\n成功拿到 `AccessKey` 和 `SecretAccessKey` 后，会组装 `SGWAuthorizationToB`：\n\n```go\ntype SGWAuthorizationToB struct {\n\tExpiredTime     string `json:\"expired_time\"`\n\tAccessKeyId     string `json:\"access_key_id\"`\n\tSecretAccessKey string `json:\"secret_access_key\"`\n\tBucketType      string `json:\"bucket_type\"`\n\tSessionToken    string `json:\"session_token\"`\n}\n```\n\n随后 JSON 序列化，并使用 `encrypt.AESEncrypt([]byte(cipherKey), authJSON, true)` 加密，作为 `sdk.WithStorageGWAuthorization` 的参数传给 Terminator SDK。\n\n如果 Thalassa 获取凭证失败，函数会打印 `get bucket credential failed` 日志，并继续返回加密后的内容。这里的 `authJSON` 可能为空，调用方不会在本层中断请求，最终错误会由下游 SDK 或服务返回。\n\n## 错误处理与日志\n\n模块里有三类错误处理模式：\n\n- 配置和 client 初始化失败：直接 `panic`，因为包级 client 无法正常工作。\n- URI 解析失败：`Copy` 使用 `errs.Wrap` 保留上下文。\n- 对象操作失败：大多直接返回 SDK error，只有 `Exists`、`DelIgn404`、批量删除会特殊处理 404。\n\n批量删除会打印入口日志、成功汇总日志和失败汇总日志。失败日志会包含失败 URI 列表：\n\n```go\nlog.PrintE(ctx, \"BatchDelIgn404WithRetry - completed with %d failures out of %d, failed uris: %s\", ...)\n```\n\n异步删除通过 `context.WithoutCancel` 保留原请求上下文值，所以这些日志仍能和原请求 logID / trace 对齐。\n\n## 与代码库的连接点\n\n该模块位于存储访问边界，业务层不直接调用 Terminator 或 StorageGW SDK：\n\n- `core/service/service.go`\n  - `CopyAttr` 调用 `Copy`\n  - `SetAttr`、`DelAttr`、`Del` 调用 `BatchDelIgn404Async`\n- `rocketmq/event.go`\n  - `sendChangeEvent` 调用 `Upload`\n- `rocketmq/event_test.go`\n  - 多个测试通过 `Get` 校验对象内容\n- `core/test/storage.go`\n  - `UploadTestFile` 调用 `Upload`\n  - `assertFileState` 调用 `Exists`\n\n因此，新增存储行为时通常应优先在本包内扩展封装，而不是让业务层直接依赖外部 SDK。\n\n## 维护注意事项\n\n- `cli`、`sgwCli`、`thalassaClient` 都是包级全局变量，初始化发生在 import 阶段；新增测试时要注意配置依赖和全局状态。\n- `Get` 会完整读取对象到内存，不适合无上限的大对象读取。\n- `BatchDelIgn404Async` 不向调用方返回结果，失败只能通过日志观测。\n- `maxConcurrency` 没有在本层校验，调用方应传入合理值；注释建议范围是 `10-50`。\n- ToB 授权只覆盖 `Upload`、`Get`、`Exists`、`Del` 以及基于它们的删除路径，不覆盖 `Copy`。\n- `delWithRetry` 没有退避策略，短时间下游抖动时会快速重试。","storage-and-external-clients":"# Storage and External Clients\n\n# Storage and External Clients\n\n## 模块定位\n\n`Storage and External Clients` 是 Compound 的存储访问边界，负责把业务层请求拆成两类能力：\n\n- [client](client.md)：访问元数据存储和外部业务系统，例如 Bytedoc、Abase、ODA KV、账号、桶元数据、VDA、视频删除等。\n- [core](core.md)：访问对象存储本体，例如上传、读取、探测、删除对象，以及通过 `storagegw` 执行对象复制。\n\n业务层通常不直接关心底层 SDK 或存储类型，而是通过 `iface.MetaStorage`、包级 helper 或存储函数完成操作。\n\n## 子模块协作方式\n\n```mermaid\nflowchart TD\n    业务层[\"业务层 / service / core 调用方\"]\n    元数据[\"client：元数据与外部客户端\"]\n    配置[\"admin：schema / collection / 索引 / TTL 配置\"]\n    对象[\"core/storage：对象读写删除复制\"]\n    外部[\"账号 / 桶元数据 / VDA / 视频删除 / 延迟任务\"]\n\n    业务层 --> 元数据\n    业务层 --> 对象\n    元数据 --> 配置\n    元数据 --> 外部\n```\n\n`client` 更偏控制面和元数据面：它根据 `admin` 配置选择 collection、构造索引、转换查询表达式，并把 `QueryFilter`、`UpdateWrapper`、`compound.Expression` 翻译成 Bytedoc、Abase 或 ODA 可执行的请求。\n\n`core/storage` 更偏数据面：它封装 `terminator-sdk-go` 和 `storagegw-go`，提供 `Upload`、`Get`、`Exists`、`DelIgn404`、`BatchDelIgn404`、`Copy` 等对象级操作。调用方不需要持有底层 SDK client。\n\n## 关键跨模块流程\n\n### 写入与更新\n\n对象写入通常由业务层协调两部分能力：先通过 [core](core.md) 的 `Upload` 写入对象内容，再通过 [client](client.md) 的 `doc.Impl`、`abase.Impl` 或 `oda.Impl` 写入对象元数据。元数据侧会根据 `admin` 配置决定 schema、collection、索引和 TTL，并在 Bytedoc 路径中使用 `BuildMongoAdd`、`UpdateBson`、`FindOneAndUpdateBson` 等能力完成 BSON 写入或更新。\n\n### 查询与读取\n\n查询从 [client](client.md) 进入，由 `QueryAttr`、`Count` 等方法把 Compound 表达式转换为底层查询条件，例如 Bytedoc 路径会通过 `BuildMongoFilter` 生成 Mongo 查询。查询结果返回对象标识和属性后，业务层再按需调用 [core](core.md) 的 `Get` 或 `Exists` 读取对象内容或确认对象存在。\n\n### 删除与清理\n\n删除流程同时涉及元数据和对象内容。元数据侧可通过 `DelAttr`、`UpdateAttr` 或视频删除客户端处理业务状态；对象侧通过 [core](core.md) 的 `DelIgn404`、`BatchDelIgn404`、`BatchDelIgn404Async` 执行实际对象删除，并把 404 类结果视为可忽略结果，便于幂等清理。\n\n### 错误与兼容处理\n\n两个子模块都承担错误收敛职责。[client](client.md) 会把底层存储错误翻译为 `iface.WrongVersion`、`iface.ErrObjNotFound`、`iface.NotSupportedInCurrentStorage` 等统一语义；[core](core.md) 则通过 `getTerminatorErrCode` 识别对象存储错误码，支撑 `Exists`、`DelIgn404` 等幂等接口。\n\n## 阅读建议\n\n需要理解元数据模型、外部服务封装、Bytedoc/Abase/ODA 差异时，阅读 [client](client.md)。需要理解对象上传、读取、删除、复制和 ToB TOS 授权初始化时，阅读 [core](core.md)。"};
