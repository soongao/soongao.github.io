ideoarch.compound\"\n    name: \"code.byted.org/videoarch/compound\"\n\n  - is_main: false\n    namespace: \"bytedance_videoarch_object_data_access\"\n    psm: \"bytedance.videoarch.object_data_access\"\n    name: \"code.byted.org/videoarch/object_data_access\"\n```\n\n## 主服务配置\n\n主服务由 `is_main: true` 标识：\n\n| 字段 | 当前值 | 作用 |\n|---|---|---|\n| `is_main` | `true` | 标识这是当前仓库对应的主服务 |\n| `namespace` | `bytedance_videoarch_compound` | 服务命名空间，当前按 `psm` 中的 `.` 替换为 `_` |\n| `psm` | `bytedance.videoarch.compound` | Compound 服务的 PSM |\n| `name` | `code.byted.org/videoarch/compound` | 当前服务对应的代码仓库路径 |\n\n主服务不配置 `repo_branch`、`config_files` 或治理开关，表示这些内容由当前仓库自身管理。\n\n## 非主服务配置\n\n非主服务由 `is_main: false` 标识，当前只有 `bytedance.videoarch.object_data_access`：\n\n| 字段 | 当前值 | 作用 |\n|---|---|---|\n| `namespace` | `bytedance_videoarch_object_data_access` | 被内联服务的命名空间 |\n| `psm` | `bytedance.videoarch.object_data_access` | 被内联服务的 PSM |\n| `name` | `code.byted.org/videoarch/object_data_access` | 被内联服务的代码仓库路径 |\n| `repo_branch` | `master` | 拉取该服务配置时使用的分支 |\n| `config_files` | `[\"*\"]` | 复制该服务下的全部配置文件 |\n| `disable_service_govern_suite` | `false` | 不禁用服务治理套件 |\n| `disable_span_metrics` | `false` | 不禁用 span metrics |\n| `disable_trace` | `false` | 不禁用 trace |\n\n这里的 `config_files: [\"*\"]` 表示内联工具需要复制非主服务中的全部配置文件，而不是只复制特定文件。\n\n## 环境变量映射\n\n非主服务下配置了 `env`，用于根据当前环境中的 `TCE_CLUSTER` 生成对应的环境变量值。\n\n当前定义了两个环境变量：\n\n```yaml\nenv:\n  SERVICE_CLUSTER:\n    - rules:\n        TCE_CLUSTER: fuxi\n      value: fuxi\n  TCE_CLUSTER:\n    - rules:\n        TCE_CLUSTER: fuxi\n      value: fuxi\n```\n\n`SERVICE_CLUSTER` 和 `TCE_CLUSTER` 的规则列表完全一致，都是按当前 `TCE_CLUSTER` 做一对一透传映射。支持的集群值包括：\n\n- `fuxi`\n- `vod_china`\n- `vod_global`\n- `live_global`\n- `video_arch`\n- `vod_tob`\n- `vod_tob_bp`\n- `mdap`\n\n例如，当外部环境中的 `TCE_CLUSTER` 为 `vod_global` 时，内联工具会为非主服务设置：\n\n```yaml\nSERVICE_CLUSTER: vod_global\nTCE_CLUSTER: vod_global\n```\n\n## 执行关系\n\n该模块本身没有内部调用、外部调用或被代码调用的函数入口。实际执行流程发生在外部服务内联工具中：\n\n```mermaid\nflowchart TD\n    A[\"服务内联工具\"] --> B[\"读取 conf/service_inline_config.yaml\"]\n    B --> C[\"识别主服务 Compound\"]\n    B --> D[\"识别非主服务 object_data_access\"]\n    D --> E[\"从 master 分支复制配置文件\"]\n    D --> F[\"按 TCE_CLUSTER 映射环境变量\"]\n```\n\n## 与代码库的连接方式\n\n`conf/service_inline_config.yaml` 通过配置而不是代码调用连接到仓库其他部分。它的主要影响面是部署、构建或服务内联流程：\n\n- 声明当前仓库服务是 `bytedance.videoarch.compound`。\n- 声明 Compound 依赖 `bytedance.videoarch.object_data_access` 的配置。\n- 控制非主服务配置文件的复制范围。\n- 控制非主服务在不同 `TCE_CLUSTER` 下的 `SERVICE_CLUSTER` 和 `TCE_CLUSTER` 值。\n- 保持 trace、span metrics 和服务治理能力默认启用。\n\n修改该文件时应重点检查 `psm`、`namespace`、`repo_branch`、`config_files` 和 `env` 映射是否与实际服务部署环境一致。","other-constitution-md":"# Other — constitution.md\n\n## 模块定位\n\n`constitution.md` 是项目级开发宪法，定义 AI Agent 在本仓库内进行技术规划、代码实现、测试与文档协作时必须遵守的最高优先级原则。它不是可执行代码模块，没有函数、类、调用边或运行时执行流；它通过仓库协作规范生效，约束后续代码变更的设计边界。\n\n该文件当前声明版本为 `1.0`，标题行包含 `Ratified: $(date +%Y-%m-%d)`。这在 Markdown 中是普通文本，不会自动执行 shell 命令或替换为日期。\n\n## 生效范围与优先级\n\n本模块的治理条款明确规定：`constitution.md` 的效力高于任何 `CLAUDE.md` 或单次会话中的指令。也就是说，当项目内协作规则、会话要求或实现偏好与本文件冲突时，应以本文件为准。\n\n```mermaid\nflowchart TD\n    A[\"constitution.md<br/>项目最高红线\"] --> B[\"CLAUDE.md<br/>协作与执行规范\"]\n    A --> C[\"会话指令<br/>单次任务要求\"]\n    B --> D[\"代码实现\"]\n    C --> D\n    A --> D\n```\n\n这类约束不会通过程序调用链自动执行，而是由开发者和 AI Agent 在需求拆解、实现方案、测试设计、代码审查时主动应用。\n\n## 核心原则\n\n### 第一条：简单性原则\n\n简单性原则要求实现始终遵循 Go 的“少即是多”哲学。它主要约束新增功能、重构和依赖选择。\n\n具体含义包括：\n\n- 只实现 `spec.md` 中明确要求的功能。\n- 优先使用 Go 标准库，例如 Web 服务优先使用 `net/http`。\n- 避免不必要的抽象层、复杂接口体系和非必要依赖。\n- 简单函数和直接的数据结构优先于过度设计。\n\n对贡献者而言，这意味着提交方案时需要能说明“为什么现在需要这个抽象或依赖”。如果理由只是为了未来可能的扩展，通常不符合 `1.1 (YAGNI)`。\n\n### 第二条：测试先行铁律\n\n测试先行是不可协商条款。所有新功能和 Bug 修复都必须从一个或多个失败测试开始，然后再进行实现。\n\n本文件要求严格遵循：\n\n1. 先写失败测试，也就是 Red 阶段。\n2. 写最小实现让测试通过，也就是 Green 阶段。\n3. 在测试保护下整理代码，也就是 Refactor 阶段。\n\n测试风格上，单元测试优先采用 Go 常见的表格驱动测试模式。对于涉及依赖的逻辑，应优先编写集成测试并使用真实依赖，而不是默认引入 Mock。\n\n典型测试结构应接近以下模式：\n\n```go\nfunc TestExample(t *testing.T) {\n\ttests := []struct {\n\t\tname string\n\t\tinput string\n\t\twant string\n\t}{\n\t\t{\n\t\t\tname: \"处理有效输入\",\n\t\t\tinput: \"example\",\n\t\t\twant: \"example\",\n\t\t},\n\t}\n\n\tfor _, tt := range tests {\n\t\tt.Run(tt.name, func(t *testing.T) {\n\t\t\tgot := Example(tt.input)\n\t\t\tif got != tt.want {\n\t\t\t\tt.Fatalf(\"Example() = %q, want %q\", got, tt.want)\n\t\t\t}\n\t\t})\n\t}\n}\n```\n\n这里的 `Example` 只是表格驱动测试结构示意，不代表本模块中存在该函数。\n\n### 第三条：明确性原则\n\n明确性原则要求代码优先服务于人类理解，尤其强调错误处理和依赖传递。\n\n错误处理是不可协商要求：\n\n```go\nif err != nil {\n\treturn fmt.Errorf(\"执行某操作失败: %w\", err)\n}\n```\n\n所有错误都必须显式处理。向上层传递错误时，必须使用 `fmt.Errorf(\"...: %w\", err)` 包装原始错误，保留错误链，便于调用方使用 `errors.Is`、`errors.As` 或日志定位根因。\n\n本文件同时禁止使用全局变量传递状态。依赖必须通过函数参数或结构体成员显式注入。例如，优先使用：\n\n```go\ntype Service struct {\n\tstore Store\n}\n\nfunc NewService(store Store) *Service {\n\treturn &Service{store: store}\n}\n```\n\n而不是通过包级变量隐藏依赖关系。这样可以让调用路径、测试边界和并发行为更清晰。\n\n## 与代码库其他部分的关系\n\n`constitution.md` 由仓库入口规范引用，属于项目级红线文档。它与 `CLAUDE.md`、`docs/AGENTS.md` 共同构成本仓库的协作规则体系，其中本文件负责定义不可突破的开发原则，`CLAUDE.md` 负责更具体的协作、测试、提交和专项约束。\n\n它还直接引用 `spec.md` 作为功能范围边界：实现新功能时，应以 `spec.md` 中明确要求为准，不主动扩展范围。\n\n由于本模块没有运行时代码，Call Graph 中不存在 internal calls、outgoing calls 或 incoming calls。这一点很重要：它不是通过编译器或运行时执行来发挥作用，而是通过开发流程、代码审查和 Agent 行为约束影响整个仓库。\n\n## 贡献时的使用方式\n\n在修改代码前，贡献者应先用本文件检查方案是否满足以下问题：\n\n- 是否只实现了 `spec.md` 明确要求的功能？\n- 是否优先使用了 Go 标准库？\n- 是否先补充了失败测试？\n- 测试是否优先采用表格驱动形式？\n- 是否避免了不必要的 Mock？\n- 每个错误是否都被显式处理并用 `%w` 包装？\n- 状态和依赖是否通过参数或结构体成员显式传递？\n\n如果某个实现需要偏离这些原则，应先调整设计，而不是在代码中绕过约束。","other-core":"# Other — core\n\n## 模块定位\n\n`Other — core` 覆盖 `fuxi/core` 下的核心公共层：运行配置、实体常量、GSI 索引值编码、桶模型、统一存储接口、KV 序列化，以及少量服务级辅助逻辑。它不是一个单独的业务服务，而是 `service/index.go`、`service/meta`、`service/idx`、`client/doc|abase|oda` 等模块共享的基础设施层。\n\n```mermaid\nflowchart TD\n  A[业务写入与查询] --> B[service/index.go 与 service/meta]\n  B --> C[entity.BuildIndexColVals]\n  C --> D[idx.GetOperator]\n  D --> E[simpleOperator / bucketedOperator]\n  B --> F[iface.MetaStorage]\n  F --> G[doc / abase / oda 实现]\n  B --> H[serializer.Marshal / Unmarshal]\n  B --> I[VideoDelete 下游调度]\n```\n\n## 运行配置\n\n`fuxi/core/conf/kitex.yml` 定义 core 服务的 Kitex 默认配置：\n\n- `Address: \":8888\"`：服务监听地址。\n- `EnableDebugServer: true` 与 `DebugServerPort: \"18888\"`：启用 debug server。\n- `Log.Loggers`：\n  - `default`：默认 `info`，输出到 `File` 和 `Agent`。\n  - `rpcAccess` / `rpcCall`：默认 `trace`，注释明确不建议修改，否则可能影响 tracing 调用链构造。\n  - `Console` 输出被注释，注释提示仅本地开发使用，不应在生产启用。\n\n## entity：核心数据模型与 GSI 基础结构\n\n`fuxi/core/consts/entity` 是本模块最重要的公共包，提供 GSI、MetaStorage 和索引查询共用的数据结构。\n\n### 类型化属性值\n\n`ConvertAttrValue(raw string, typ compound.AttrType) (any, error)` 将业务原始字符串转换为原生 BSON 值：\n\n| AttrType | BSON 值 | 失败行为 |\n|---|---|---|\n| `AttrType_INT` | `int64` | `strconv.ParseInt` 失败返回 error，包括溢出 |\n| `AttrType_NUMBER` | `float64` | `strconv.ParseFloat` 失败返回 error |\n| `AttrType_BOOL` | `bool` | 只接受字面量 `\"true\"` / `\"false\"` |\n| `AttrType_BLOB` / `AttrType_FILE` / 默认 | `string` | 恒等返回，无 error |\n\n这里的行为是“可感知失败”的严格转换，供写入路径拒绝脏类型。注释中说明 `doc.convertValue` 基于它做 best-effort 封装，失败时回退原字符串。\n\n### GSI 索引列值\n\n`IndexColVal` 是 GSI `colN` 的 typed value 载体：\n\n```go\ntype IndexColVal struct {\n    Typ compound.AttrType\n    Val any\n    Raw string\n}\n```\n\n关键入口：\n\n- `NewIndexColVal(raw, typ)`：构造时完成类型转换。\n- `BSONValue()`：返回已转换的原生 BSON 值。\n- `StringCols(raws...)`：按 BLOB/string 恒等构造，主要用于存量 string 调用方和测试。\n- `RawCols(cols)`：取原始字符串，分桶模式复用历史 string 路由时使用。\n- `BSONCols(cols)`：取原生 BSON 值。\n- `BuildIndexColVals(vals, cols, attrMap, strict)`：写入、查询、Count、reconcile 共享的统一构造入口。\n\n`strict=true` 用于写入路径，转换失败直接返回 error；`strict=false` 用于查询路径，转换失败回退为 string，使 typed posting 行不匹配，语义上等价于“无此值”。不要在调用点手写 `col1`、`col2` 的值转换，否则 Remove filter 可能无法匹配 Add 写入的行。\n\n### 索引配置\n\n`IdxCfg` 描述 GSI 配置：\n\n- `Name` / `Space` / `Schema` / `Columns`：索引身份和列定义。\n- `IsUniq`：唯一索引标记。\n- `BucketEnabled`：选择分桶模式或 simple 行级模式。\n- `Collection`：自定义 posting collection；为空时由上层生成。\n- `TxnSupported`：历史字段，注释标记为 deprecated。当前 admin 入口硬编码事务路径，CAS 实现已归档到 `fuxi/core/service/idx/archive/`。\n\n`HasWildcardColumn()` 通过 `strings.Contains(col, \"*\")` 判断索引列是否包含通配符，覆盖 `[*]` 和普通 `*`。\n\n## Bucket 与版本路由\n\n`Bucket` 是 bucketed GSI posting list 的持久化结构。核心字段包括 `Idx`、`Space`、`Schema`、`Cols`、`IdxVer`、`Cnt`、`MinVer`、`MaxVer` 和 `Entries`。\n\n版本边界使用哨兵值而不是历史 null 语义：\n\n- `VerBoundaryMin`：负无穷，所有合法业务版本都大于它。\n- `VerBoundaryMax`：正无穷，同时表示活跃桶。\n- `IsActive()` 判断 `MaxVer == VerBoundaryMax`。\n- `IsSealed()` 判断 `MaxVer != VerBoundaryMax`。\n- `NeedsSplit()`：封口桶且 `Cnt >= BucketSoftMax`。\n- `CanSoftAppend()`：封口桶且 `Cnt < BucketSoftMax`。\n- `NeedsMerge()`：封口桶且 `Cnt < BucketMergeThreshold`。\n\n重要阈值：\n\n| 常量 | 值 | 含义 |\n|---|---:|---|\n| `BucketSize` | 1000 | 活跃桶目标上限 |\n| `BucketSoftMax` | 1200 | 封口桶迟到追加软上限 |\n| `BucketMergeThreshold` | 250 | 删除后触发合并的低水位 |\n| `MaxBucketsPerQuery` | 10000 | 单次索引查询桶数安全上限 |\n| `MaxIdxQueryResults` | 10000 | meta 层索引返回 id 上限 |\n\n`ToBson()` 将 `Cols` 展开为 `col1`、`col2`、`col3`。`BucketFromBson()` 支持从 `bson.M` 恢复桶，`entries` 可处理 `bson.A` 中的 `bson.M` 或 `bson.D`；缺失 `min_ver` / `max_ver` 时分别按 `VerBoundaryMin` / `VerBoundaryMax` 兼容。\n\n## BSON filter 构造\n\nentity 包集中维护 GSI 查询 filter，避免调用方分散拼接：\n\n- `ColKey(i)`：返回 `col{i+1}`。\n- `ColsFilter(cols []string)`：分桶模式 string colN。\n- `ColsFilterTyped(cols []IndexColVal)`：simple 模式 typed colN。\n- `BaseFilter(idx, space, schema, cols)`：分桶基础 filter。\n- `BaseFilterTyped(idx, space, schema, cols)`：simple 写入、查询、Count 的基础 filter。\n- `BaseFilterCrossSpace` / `BaseFilterCrossSpaceTyped`：跨 space 查询时省略 `space`。\n- `ShardClause(idx, cols)`：构造 `{idx, col1...}` 分片键等值 clause。\n- `VersionRouteFilter(idx, space, schema, cols, ver)`：构造 V3 版本路由 filter。\n\n`VersionRouteFilter` 的形态很关键：`idx + colN` 必须放在 `$and` 的独立 clause 中，`space` / `schema` 放顶层，`min_ver <= ver` 与 `max_ver > ver` 使用哨兵值直接表达。测试明确验证 `idx` 和 `col1` 不应出现在顶层。\n\n## RetryLimiter\n\n`RetryLimiter` 是 GSI CAS/事务重试比例的进程级保护器，单例为 `GlobalRetryLimiter`。\n\n- `RecordCall()`：记录一次首次调用。\n- `AllowRetry()`：判断是否允许本次重试；允许时累加 retry 计数。\n- 使用 `cur + prev` 双窗口加权滑动统计。\n- 样本数低于 `retryMinSample=100` 时直接放行。\n- `(retriesW+1)/callsW >= MaxRetryRatio` 时拒绝；边界值 10% 会被拒绝。\n\n测试覆盖了样本不足、正常比例、10% 边界拒绝、窗口轮转和双窗口过期清零。\n\n## iface：统一 MetaStorage 契约\n\n`fuxi/core/iface/iface.go` 定义多存储后端统一接口：\n\n```go\ntype MetaStorage interface {\n    QueryAttr(ctx, metaSpace, queryFilter, orderBy, limit, offset)\n    Count(ctx, metaSpace, queryFilter)\n    UpdateAttr(ctx, metaSpace, queryFilter, update, version)\n    DelID(ctx, namespace, queryFilter, version, cnt)\n}\n```\n\n实际签名使用 `QueryFilter`、`UpdateWrapper`、`SetParams` 和 `vers.Ver` 封装参数。`QueryFilter` 支持 ids、表达式和 attrMap；`UpdateWrapper` 同时表达 set 与 delete；`SetParams` 持有原始属性和类型映射。\n\n公共错误包括 `ErrObjNotFound`、`WrongVersion`、`InvalidParam`、`CntNotMatch`、`ErrTxnConflict`、`ErrConsistentTxnFailed`。其中 `ErrConsistentTxnFailed` 专用于 BulkWrite 事务的预期结果不匹配，调用方通常需要重新读取最新快照后重试。\n\n`iface/test_iface/meta_storage_test.go` 对 `doc.Impl`、`abase.Impl`、`oda.Impl` 进行统一 CRUD 行为验证，并覆盖嵌套键更新：更新 `a.b.c` 不应覆盖同级的 `a.b.d`、`a.x` 或顶层 `y`。删除不存在对象时，`vers.NotSet()` 期望 `ErrObjNotFound`，显式版本期望 `WrongVersion`。\n\n## serializer：map[string]string 的兼容序列化\n\n`fuxi/core/serializer/kv.go` 提供 `Marshal` / `Unmarshal`：\n\n- `Marshal(m)` 输出 JSON 字符串。\n- 对 `strs.MayContainsBinary(v)` 判断为可能含二进制的值，写入 key `_b.` + 原 key，value 为 base64。\n- 新格式总是写入 `_v: \"1\"`。\n- `Unmarshal(str)` 若 `_v != \"1\"`，按旧格式直接返回 JSON map。\n- 新格式会跳过 `_v`，并将 `_b.` 前缀 key 解码回原 key。\n\n这让历史“直接 JSON map”格式继续可读，同时支持二进制字符串值。测试覆盖随机 map、大段二进制 payload 和旧版本兼容。\n\n## VideoDelete 下游调度\n\n`fuxi/core/service/checker.go` 的 `VideoDelete(ctx, space, schema, extra)` 根据 `extra` 调用视频删除服务，并返回 `(base.BaseResp, executed, error)`。\n\n识别的参数：\n\n- `video_delete_type`\n- `video_delete_param`\n\n支持的类型：\n\n| 类型值 | 请求类型 | 下游调用 |\n|---|---|---|\n| `video_delete` | `vd.DelOrgVideoRequest` | `video_delete.DeleteVideo` |\n| `transcode_delete` | `vd.DelTranscodeVideoRequest` | `video_delete.DeleteTranscodeVideo` |\n| `dup_delete` | `vd.DelVideoDupV2Request` | `video_delete.DelVideoDup` |\n| `recover_video` | `vd.CancelDelOrgVideoRequest` | `video_delete.CancelDelOrgVideo` |\n| `recover_transcode` | `vd.CancelDelEncodedVideoRequest` | `video_delete.CancelDelEncodedVideo` |\n\n`extra == nil` 或缺少 `video_delete_type` 时不会触发下游，`executed=false`。未知类型或空 `video_delete_param` 返回 error。`VideoDelete` 会在下游 `StatusCode != 0` 时加上 `99000000` 做错误码映射。当前实现没有检查 `json.Unmarshal` 的 error，调用方应保证 `video_delete_param` 是对应请求结构的合法 JSON。\n\n## 与 GSI idx 子系统的连接\n\n`service/index.go` 是写路径汇聚点：`idxAdd`、`idxRemove`、`idxUpdateWithShardingKeys` 会先调用 `vers.NormalizeForIdx`，再通过 `buildIdxColVals` 使用 `entity.BuildIndexColVals(..., strict=true)` 构造 typed 列值，最后调用 `idx.GetOperator(cfg)` 分流到 simple 或 bucketed 实现。\n\n`service/meta` 是读路径汇聚点：`queryIdByIdx`、`queryIdByIdxOrdered` 和 Count 命中索引逻辑使用 `BuildIndexColVals(..., strict=false)` 或严格转换构造 filter。simple 模式依赖 `BaseFilterTyped` 的原生 BSON 值，支持数值范围 Count；bucketed 模式在内部通过 `RawCols` 退回 string 路由。\n\n贡献 GSI 相关代码时要保持三条约束：\n\n- 写入、删除、查询、reconcile 必须共享 `BuildIndexColVals` 的构造语义。\n- simple 模式使用 typed BSON；bucketed 模式当前仍使用 raw string cols。\n- 分桶路由 filter 使用 `VersionRouteFilter` / `ShardClause` 的 V3 结构，不要把分片键 clause 随意改回顶层。","other-decisions":"# Other — decisions\n\n## 决策记录模块\n\n`docs/decisions/` 用来沉淀 Compound 项目的架构决策记录（ADR）。它不是运行时代码模块，没有内部函数调用、外部调用或执行流；它的职责是维护项目级决策的索引、编号规则、状态语义，以及已经独立成文的决策记录。\n\n当前目录包含两类文档：\n\n- `README.md`：ADR 索引与流程入口，定义编号、状态和创建规则。\n- `registered-feds-startup-validation.md`：一条具体决策记录，描述 Fuxi Admin 启动期对 `registered_feds` 配置做强校验的方案。\n\n## 模块职责\n\n该模块承担三个职责：\n\n1. 作为 ADR 总入口  \n   `docs/decisions/README.md` 维护“编号锁定表”“决策清单”“状态枚举”“流程”和“关联资源”，开发者创建或查找架构决策时应先从这里进入。\n\n2. 约束 ADR 生命周期  \n   新 ADR 需要先在编号锁定表中抢占编号，草稿期使用 `9XXX-DRAFT-<topic>.md`，Review 通过后再改为正式 4 位编号。状态使用 `Proposed`、`Accepted`、`Superseded by NNNN`、`Deprecated`。\n\n3. 连接散落的关键设计  \n   当前项目尚无正式编号的 Accepted ADR。`README.md` 明确列出仍散落在其他文档中的关键决策位置，例如多步事务方案、GSI 异步链路单消费者、ODA Kitex Gen 升级、VOD 删除早退等。\n\n## 目录结构与关键文件\n\n### `docs/decisions/README.md`\n\n这是 ADR 的目录索引和流程说明。\n\n关键内容包括：\n\n- “编号锁定表”：用于多人并发创建 ADR 时抢占编号，要求 4 位编号严格递增，不跳号、不复用。\n- “决策清单”：列出当前尚未独立落地为 ADR 的关键设计，并指向现有文档。\n- “状态枚举”：统一 ADR 状态含义。\n- “流程”：说明从草稿、Review、Accepted 到 Superseded 的生命周期。\n- “关联资源”：连接架构总览、进行中变更和项目治理文档。\n\n当前编号锁定表中没有 Accepted ADR：\n\n```markdown\n| 编号 | 状态 | 主题 | Owner | 日期 |\n|---|---|---|---|---|\n| — | — | （暂无 Accepted ADR） | — | — |\n```\n\n### `docs/decisions/registered-feds-startup-validation.md`\n\n这是一条已成文但尚未纳入 `README.md` 正式编号表的决策记录，主题是 Fuxi Admin 启动期对 `registered_feds` 做强校验。\n\n它记录的核心判断是：`registered_feds` 是控制面的基础注册表配置，缺失、为空或无法解析时应在启动阶段 fail-fast，而不是让进程进入运行时后再暴露问题。\n\n该文档关联的实际代码组件包括：\n\n- `fuxi/fuxi_admin/configs/config.go`\n  - `Config.Init()`\n  - `validateRegisteredFeds`\n  - `normalizeRegisteredFeds`\n  - `RegisteredFedsTCCKey = \"registered_feds\"`\n  - `RegisteredFedsConfspace`\n- `fuxi/fuxi_admin/configs/config_test.go`\n- `fuxi/fuxi_admin/configs/tcc.go`\n- `fuxi/fuxi_admin/router.go`\n  - `customizedRegister`\n\n## ADR 生命周期\n\n```mermaid\nflowchart TD\n    A[抢占编号] --> B[创建草稿]\n    B --> C[填写背景、决策、影响、备选方案]\n    C --> D[提交 Review]\n    D --> E{是否通过}\n    E -->|通过| F[标记为 Accepted]\n    E -->|未通过| B\n    F --> G[改名为正式 4 位编号]\n    F --> H{后续是否被替代}\n    H -->|是| I[旧 ADR 标记为 Superseded by NNNN]\n    H -->|否| J[持续作为当前决策依据]\n```\n\n## `registered_feds` 决策说明\n\n`registered-feds-startup-validation.md` 记录的是一个配置初始化决策，而不是通用配置读取说明。\n\n启动流程中的关键关系是：\n\n```mermaid\nflowchart TD\n    A[customizedRegister] --> B[Config.Init]\n    B --> C[caesar.Unmarshal 加载基础配置]\n    C --> D[validateRegisteredFeds]\n    D --> E[读取 default confspace 的 registered_feds]\n    E --> F[JSON 解析为字符串数组]\n    F --> G[normalizeRegisteredFeds]\n    G --> H{是否存在有效 federation}\n    H -->|是| I[启动继续]\n    H -->|否| J[返回 error]\n    J --> K[panic 终止启动]\n```\n\n### 校验时机\n\n`Config.Init()` 在 `caesar.Unmarshal` 成功加载基础配置后调用 `validateRegisteredFeds`。因此，`registered_feds` 校验属于配置初始化的一部分，不是请求处理阶段的动态检查。\n\n### 失败语义\n\n以下情况都被视为启动失败：\n\n- TCC 读取 `registered_feds` 失败。\n- `registered_feds` 不是合法 JSON 字符串数组。\n- 配置值是空数组。\n- 归一化后没有任何非空 federation。\n\n其中，TCC 值为 `null` 会反序列化为 nil slice，按空清单处理。\n\n### 归一化规则\n\n`normalizeRegisteredFeds` 对配置项执行三类处理：\n\n- 去除首尾空白。\n- 丢弃空串。\n- 去重。\n\n这意味着 `[\" fed-a \", \"\", \"fed-a\"]` 这类输入最终只保留一个有效 federation：`fed-a`。\n\n### fail-fast 路径\n\n校验失败不引入新的退出机制，而是复用既有启动失败路径：`customizedRegister` 调用 `Config.Init()`，如果返回 error，则执行 `panic(err)`。这样进程不会在 `registered_feds` 无效时继续提供服务。\n\n### TCC confspace 选择\n\n该决策明确区分两类配置来源：\n\n- cluster 级基础配置：按 `env.Cluster()` 选择 confspace。\n- `registered_feds`：固定从 default confspace 读取。\n\n这样设计是因为 `registered_feds` 表达的是全局 federation 注册表语义，不应跟随单个业务联邦目录变化。\n\n## 与其他文档的关系\n\n`docs/decisions/README.md` 是决策记录入口，但不是所有设计事实的唯一来源。当前仍有部分关键决策保留在其他文档中：\n\n- 多步事务方案：`docs/architecture/modules/version-conflict.md`\n- GSI 异步链路单消费者：`docs/architecture/architecture-detailed.md`\n- ODA Kitex Gen 升级：`docs/archive/2026-03-15-upgrade-oda-kitex-gen/`\n- VOD 删除早退：`docs/architecture/modules/video-delete-early-exit.md`\n\n当这些内容需要形成稳定、可引用的长期决策依据时，应按 `README.md` 的流程提取为独立 ADR。\n\n## 维护注意事项\n\n新增或修改 `docs/decisions/` 下文档时，需要遵守项目文档规则：`docs/` 目录下的写动作必须由 `doc-init` skill 主导，具体入口见 `docs/AGENTS.md`。\n\n新增 ADR 时应保持以下一致性：\n\n- 文件名、编号锁定表和决策清单要同步。\n- 状态值必须使用 `README.md` 中定义的枚举。\n- 决策内容应引用真实代码符号，例如 `Config.Init()`、`validateRegisteredFeds`、`customizedRegister`，避免抽象描述脱离实现。\n- 如果决策替代旧方案，旧 ADR 状态应改为 `Superseded by NNNN`，新 ADR 的 Context 段应引用旧 ADR。","other-docs":"# Other — docs\n\n## 模块概览\n\n`docs/` 模块是 Compound 项目的文档入口与文档治理层，不包含可执行代码，也没有内部调用、外部调用或运行时执行流。它的作用是把项目级文档组织方式、写作约束、运维 SOP、Living spec、ADR、变更流程以及 MDAP 相关临时文档集中到一个可导航的位置。\n\n该模块主要由四类内容组成：\n\n- `docs/README.md`：项目文档总入口，提供文档地图和角色入门路径。\n- `docs/AGENTS.md`：面向 AI agent 和开发者的项目级文档规约扩展。\n- `docs/mdap_id.md`：MDAP ID 与 `AssetGroupID` 的编码设计说明。\n- `docs/mdap_schema.md`：`AssetGroup`、`Artifact`、`Source` 的 JSON Schema 文档。\n\n## 文档体系结构\n\n```mermaid\nflowchart TD\n    A[\"docs/README.md<br/>文档入口\"] --> B[\"overview/<br/>项目背景与红线\"]\n    A --> C[\"architecture/<br/>架构说明\"]\n    A --> D[\"operations/<br/>运维 SOP\"]\n    A --> E[\"changes/<br/>进行中变更\"]\n    A --> F[\"specs/<br/>Living spec\"]\n    A --> G[\"archive/<br/>已完成变更\"]\n    A --> H[\"mdap_id.md / mdap_schema.md<br/>MDAP 临时文档\"]\n    I[\"docs/AGENTS.md<br/>项目文档规约\"] --> A\n    I --> D\n    I --> F\n```\n\n`docs/README.md` 是读者入口，`docs/AGENTS.md` 是写作者入口。开发者阅读项目时通常从 `README.md` 进入；修改、创建或迁移文档时必须先遵守 `AGENTS.md` 中的项目特有规则，并叠加 doc-init skill 的通用硬规则。\n\n## `docs/README.md`\n\n`docs/README.md` 定义 Compound 文档地图。它不承载具体业务规则，而是把不同文档区域按职责组织起来：\n\n| 区域 | 职责 |\n|---|---|\n| `overview/` | 项目背景、技术栈、宪法、术语 |\n| `architecture/` | 架构总览、存储分层、GSI、HLC 编码、TOS 序列化、版本冲突等 |\n| `api/` | RPC / HTTP / Event 接口契约 |\n| `operations/` | 运维 SOP 索引和通用恢复指南 |\n| `decisions/` | ADR，使用 `NNNN-<topic>.md` 四位编号 |\n| `changes/` | proposal、design、tasks、spec-delta |\n| `specs/` | capability 的 source of truth |\n| `archive/` | 已完成 change 和状态快照 |\n| `research/` | 横向技术调研与源码分析 |\n| `mdap_id.md` / `mdap_schema.md` | MDAP 模块当前阶段的 ID 与 Schema 文档 |\n\n该文件还记录了 `QueryArtifacts` 的当前查询约束：请求必须提供 `Space`、`SourceBizIDs`、`Name`、单个 `Types`，且当前不支持 `DeriveType` 与 `DeriveIDs`。相关实现位置明确指向 `mdap/service/mdap_validator.go` 和 `mdap/service/mdap.go`。\n\n## `docs/AGENTS.md`\n\n`docs/AGENTS.md` 是 Compound 项目对 doc-init 通用文档规约的项目级扩展。它只写本项目特有规则，不复述 doc-init skill 的完整 14 章节规则。\n\n关键约束包括：\n\n- 文档写作必须由 `doc-init` skill 主导。\n- 新增 capability 或新功能必须走 `changes/<slug>/` 流程。\n- 架构决策必须写入 `decisions/NNNN-<topic>.md`。\n- 修改 living spec 必须经过一个 change 的 archive。\n- idx 包逻辑变更必须叠加项目根 `CLAUDE.md` 的 idx 包专项约束。\n\n### 扩展制品\n\n当前项目已落地两个扩展文档区域：\n\n| 扩展制品 | 路径 | 用途 |\n|---|---|---|\n| 运维 SOP 索引 + 通用恢复 | `docs/operations/` | 服务 idx 包高风险复合操作的 SOP 索引和恢复指南 |\n| Research 调研沉淀 | `docs/research/` | 横向技术调研、源码分析和长期沉淀 |\n\n尚未触发的扩展制品包括 `testing/`、`security/`、`observability/`、`performance/`、`release/`、`data-governance/` 等。它们不应提前空建，应由对应需求触发。\n\n### idx 包文档约束\n\nidx 包是该项目的高风险区域。涉及 idx 包逻辑变更时，不能只走普通文档流程，还必须满足项目根 `CLAUDE.md` 中的三段强制规则：\n\n1. 先核对 README、compound-ops、reconcile-compound-ops、godoc 四处文档。\n2. 产出包级别功能影响面分析和漏洞与风险分析，落到 `.claude/idx-change-<topic>.md`。\n3. 通过用户显式 Review 放行后再编码。\n\n`docs/AGENTS.md` 同时维护 idx 包 SOP 的就近留存清单，例如：\n\n- `fuxi/core/service/idx/README.md`\n- `fuxi/core/service/idx/reconcile/README.md`\n- `fuxi/core/service/idx/reconcile/offline/README.md`\n- `fuxi/core/service/idx/archive/docs/compound-ops/*.md`\n- `fuxi/core/service/idx/archive/docs/reconcile-compound-ops/*.md`\n- `fuxi/core/service/idx/docopstest/README.md`\n\n这些文档通过 `docs/operations/README.md` 建立索引。\n\n### capability 命名规则\n\n项目采用“领域前缀 + 主题”的 capability 命名方式，例如：\n\n- `gsi-index-runtime`\n- `gsi-service-meta-orchestration`\n- `gsi-reconcile-framework`\n- `abase-storage-db-table`\n- `binding-index-config`\n- `table-prefix-config`\n- `table-prefix-plugin`\n- `setattr-timing-instrumentation`\n- `offline-snapshot-reader`\n- `documentation-system`\n\n新 capability 必须在 `docs/specs/README.md` 登记 Owner 和最后归档合并日期。\n\n## `docs/mdap_id.md`\n\n`docs/mdap_id.md` 描述 MDAP ID 的 40 字符 Base32 编码方案。该文档覆盖两套 ID：\n\n- `Asset`、`Source`、`Artifact`：使用 `mdap/id` 的 200-bit、40 字符 Base32 ID。\n- `AssetGroup`：使用独立的 40 字符 Base32 ID 方案。\n\nMDAP ID 固定为 40 个字符，底层为 200 bits，即 25 bytes。字符集为小写 Crockford 变种 Base32，剔除了 `i`、`l`、`o`、`u`，用于降低人工排障时的混淆风险。\n\n核心位域包括：\n\n| 字段 | 含义 |\n|---|---|\n| `T` | 实体类型码，区分 Asset、Source、Artifact、AssetGroup |\n| `TEN6` | TenantID 编码 |\n| `SUB4` | AccountID 编码 |\n| `KV1` | KeyVersion，选择混淆密钥 |\n| `SET11` | 父 `AssetGroup` 的 55-bit `GroupKey` |\n| `DC2` | 机房 / 集群码 |\n| `MT` | MIME 顶层类型 |\n| `TS7` | 35-bit 百毫秒时间戳 |\n| `X1` | 扩展字段，新布局标记 |\n| `RAND6` | 随机 / 序列字段 |\n\n`Generate` 和 `Parse` 当前仍会调用 account 服务补齐 `space` 或校验账号。解析时如果账号查询失败，会直接返回错误，不再静默降级为空 `space`。\n\n`AssetGroupID` 使用独立格式：\n\n```text\ng + ACC4 + GK11 + DC2 + PAD22\n```\n\n其中 `GK11` 是 55-bit 随机 `GroupKey`，子实体 ID 可通过 `SET11` 携带该值，从而在不额外存储父组 ID 的情况下反推父 `AssetGroupID`。\n\n## `docs/mdap_schema.md`\n\n`docs/mdap_schema.md` 维护 MDAP 三类核心对象的 JSON Schema：\n\n- `AssetGroup`\n- `Artifact`\n- `Source`\n\n这些 schema 用于描述元数据结构，而不是 Go 代码中的运行时校验实现。\n\n### `AssetGroup`\n\n`AssetGroup` 表示一组 Source 及其派生产物的管理单元。主要字段包括：\n\n- `space`\n- `name`\n- `media_types`\n- `source_count`\n- `size`\n- `status`\n- `creator`\n- `create_time`\n- `update_time`\n- `description`\n- `source_configs`\n- `artifact_config`\n\n其内部定义了 `store_location`、`source_config`、`job_execution`、`artifact_config` 等结构，用于描述存储位置、Source 拉取配置和 Artifact 生产任务。\n\n### `Artifact`\n\n`Artifact` 表示从 Source 或另一个 Artifact 派生出的产物。主要字段包括：\n\n- `derive_type`\n- `derive_id`\n- `name`\n- `size`\n- `contents`\n- `created_time`\n- `updated_time`\n- `asset_group_id`\n\n`contents` 引用 `artifact_content`，其中的 `blobs` 是当前内容块内部的二进制对象表。payload 内的 `BlobRef` 使用 `$<index><suffix>` 引用 `blobs` 中的对象。\n\n### `Source`\n\n`Source` 表示一个具体媒体文件及其存储位置和元信息。主要字段包括：\n\n- `biz_id`\n- `asset_group_id`\n- `asset_id`\n- `name`\n- `media_type`\n- `format`\n- `config`\n- `meta`\n- `tags`\n- `created_time`\n- `updated_time`\n\n`config` 引用 `source_config`，其中包含源类型、是否需要 fetch、fetch 状态、存储位置列表和类型相关二进制配置。\n\n## 与代码库的连接方式\n\n该模块本身没有函数、类或运行时调用链，但它通过路径和规则约束连接到代码库：\n\n- `QueryArtifacts` 的参数约束对应 `mdap/service/mdap_validator.go` 和 `mdap/service/mdap.go`。\n- MDAP ID 的生成与解析对应 `mdap/id` 中的 `Generate` 和 `Parse`。\n- idx 包 SOP 文档与 `fuxi/core/service/idx/` 下的实现、godoc 和测试材料保持同步。\n- capability 文档通过 `docs/specs/` 作为行为契约的 source of truth。\n- 变更流程通过 `docs/changes/`、`docs/archive/` 和 `docs/specs/` 串联 proposal、design、tasks、spec-delta 和归档。\n\n## 维护注意事项\n\n修改 `docs/` 下文档时，优先判断变更类型：\n\n| 变更类型 | 应进入的位置 |\n|---|---|\n| 文档导航或入口调整 | `docs/README.md` |\n| 项目级文档规约调整 | `docs/AGENTS.md` |\n| 架构决策 | `docs/decisions/NNNN-<topic>.md` |\n| 新功能或 capability 变更 | `docs/changes/<slug>/` |\n| living spec 修改 | 先走 change，再归档到 `docs/specs/` |\n| 运维恢复步骤 | `docs/operations/` 或 idx 包就近 SOP |\n| MDAP ID 规则 | `docs/mdap_id.md`，后续应迁入 MDAP living spec |\n| MDAP 元数据结构 | `docs/mdap_schema.md`，后续应迁入 MDAP schema / api 文档 |\n\n文档自检命令为：\n\n```bash\nbash script/doc-init-check.sh\n```\n\n该脚本检查 EARS keyword、Owner 字段、TBD 占位、散落约束和历史 marker README 清理进度。","other-errno":"# Other — errno\n\n## 模块概览\n\n`errno` 模块定义 Compound 服务的轻量错误码模型，并提供业务错误到 `(code, msg)` 的转换函数。它主要服务于 Kitex/Byted 的业务错误响应链路：handler 返回 `error` 后，`util.HandlerError2BaseRespFunc` 调用 `errno.CodeMsg`，再由 `byted.WithBizHandlerError2BizCodeMsgFunc` 写入响应的业务码和消息。\n\n模块源码位于 `errno/code.go`，当前没有复杂的内部依赖，核心是 `CompoundError`、`ParamEmpty`、`RPCErr` 和 `CodeMsg` 四个公开符号。\n\n## 核心类型\n\n```go\ntype CompoundError struct {\n    Code int32\n    Msg  string\n}\n```\n\n`CompoundError` 是模块内的业务错误载体：\n\n- `Code` 表示业务错误码。\n- `Msg` 表示对外返回的错误信息。\n- `CompoundError` 实现了 Go 标准 `error` 接口。\n\n```go\nfunc (e *CompoundError) Error() string {\n    return fmt.Sprintf(\"CompoundError: code: %d, msg: %s\", e.Code, e.Msg)\n}\n```\n\n`Error()` 只负责生成调试友好的字符串，例如：\n\n```text\nCompoundError: code: 4000, msg: msg\n```\n\n注意：对外返回给客户端的业务消息不直接使用 `Error()` 的完整字符串。`CodeMsg` 识别到 `*CompoundError` 后，会返回其中的 `Code` 和 `Msg` 字段。\n\n## 错误构造函数\n\n### `ParamEmpty`\n\n```go\nfunc ParamEmpty(param string) *CompoundError\n```\n\n`ParamEmpty` 用于生成参数缺失或空值错误：\n\n```go\nreturn &CompoundError{\n    Code: 4000,\n    Msg:  param + \" is missing or the value is empty\",\n}\n```\n\n示例：\n\n```go\nif req.UserID == \"\" {\n    return errno.ParamEmpty(\"UserID\")\n}\n```\n\n最终通过 `CodeMsg` 转换后会得到：\n\n```text\ncode = 4000\nmsg  = \"UserID is missing or the value is empty\"\n```\n\n当前模块中 `4000` 表示参数类业务错误，但代码里没有集中定义常量。如果后续错误码增多，建议先补充命名常量，避免散落魔法数字。\n\n### `RPCErr`\n\n```go\nfunc RPCErr(err error) error\n```\n\n`RPCErr` 用于规范下游 RPC 调用错误：\n\n- 如果传入的 `err == nil`，返回 `errors.New(\"rpc request error\")`。\n- 如果传入的 `err != nil`，原样返回该错误。\n\n```go\nfunc RPCErr(err error) error {\n    if err == nil {\n        return errors.New(\"rpc request error\")\n    }\n    return err\n}\n```\n\n这个函数适合在调用方只知道“RPC 请求失败”，但没有拿到具体错误对象时补一个通用错误。若已有下游错误，应保留原错误，避免丢失上下文。\n\n## 错误转换函数\n\n### `CodeMsg`\n\n```go\nfunc CodeMsg(err error) (int32, string)\n```\n\n`CodeMsg` 是本模块最关键的出口函数，负责把 Go `error` 转成服务响应所需的业务码和消息。\n\n转换规则如下：\n\n| 输入错误 | 返回 code | 返回 msg |\n|---|---:|---|\n| `nil` | `0` | `\"success\"` |\n| 可通过 `errors.As` 匹配到 `*CompoundError` | `CompoundError.Code` | `CompoundError.Msg` |\n| 其他普通错误 | `5000` | `\"rpc request error: \" + err.Error()` |\n\n实现要点：\n\n```go\nfunc CodeMsg(err error) (int32, string) {\n    if err == nil {\n        return 0, \"success\"\n    }\n\n    var e *CompoundError\n    if errors.As(err, &e) {\n        return e.Code, e.Msg\n    }\n\n    return 5000, fmt.Sprintf(\"rpc request error: %s\", err.Error())\n}\n```\n\n这里使用 `errors.As`，因此即使 `*CompoundError` 被 `fmt.Errorf(\"...: %w\", err)` 包装过，也可以被识别为业务错误。\n\n示例：\n\n```go\nerr := fmt.Errorf(\"校验失败: %w\", errno.ParamEmpty(\"Name\"))\n\ncode, msg := errno.CodeMsg(err)\n// code == 4000\n// msg  == \"Name is missing or the value is empty\"\n```\n\n普通错误会被归类为通用 RPC 错误：\n\n```go\ncode, msg := errno.CodeMsg(fmt.Errorf(\"timeout\"))\n// code == 5000\n// msg  == \"rpc request error: timeout\"\n```\n\n## 服务接入链路\n\n`errno` 本身不直接依赖 Kitex。它通过 `util/biz_handler_err.go` 接入服务框架：\n\n```go\nvar HandlerError2BaseRespFunc = func(\n    ctx context.Context,\n    bizHandlerErr error,\n) (writeBase bool, code int32, msg string, extra map[string]string) {\n    code, message := errno.CodeMsg(bizHandlerErr)\n    return true, code, message, nil\n}\n```\n\n`main.go` 中将该函数注册到服务：\n\n```go\nsvr := compoundservice.NewServer(new(handler.CompoundServiceImpl),\n    byted.WithBizHandlerError2BizCodeMsgFunc(util.HandlerError2BaseRespFunc),\n    server.WithMiddleware(middleware.LogMidware[*base.BaseResp](\"cpd\")),\n    server.WithMiddleware(middleware.DownstreamRateLimitMiddleware),\n)\n```\n\n整体链路可以理解为：\n\n```mermaid\nflowchart TD\n    A[业务 Handler 返回 error] --> B[HandlerError2BaseRespFunc]\n    B --> C[errno.CodeMsg]\n    C --> D{错误类型}\n    D -->|nil| E[0 / success]\n    D -->|CompoundError| F[业务 Code / Msg]\n    D -->|普通 error| G[5000 / rpc request error]\n    E --> H[写入 BaseResp]\n    F --> H\n    G --> H\n```\n\n因此，业务 handler 只需要返回合适的 `error`：\n\n- 成功时返回 `nil`。\n- 参数错误等可预期业务失败返回 `*errno.CompoundError`。\n- 未分类错误返回普通 `error`，由 `CodeMsg` 统一映射为 `5000`。\n\n## 测试覆盖\n\n`errno/code_test.go` 覆盖了当前模块的主要行为：\n\n- `TestRPCErr` 验证 `RPCErr(nil)` 返回通用 RPC 错误，`RPCErr(err)` 保留原错误。\n- `TestParamEmpty` 验证参数空错误的 `Code` 和 `Msg`。\n- `TestCodeMsg` 验证 `nil`、普通错误、`*CompoundError` 三类输入的转换结果。\n- `TestCompoundError_Error` 验证 `CompoundError.Error()` 的格式。\n\n测试使用 `mockey.PatchConvey` 和 `goconvey` 断言。当前测试没有覆盖 `errors.As` 识别被包装的 `*CompoundError` 的场景；如果后续代码大量使用 `%w` 包装业务错误，建议补充对应用例。","other-fuxi-admin":"# Other — fuxi_admin\n\n## fuxi_admin 模块\n\n`fuxi/fuxi_admin` 是 Fuxi 的管理面服务，基于 Hertz 暴露 Schema 管理、Scope 绑定和配置版本管理接口。模块里并存两套入口：\n\n- 旧 Schema 管理接口：围绕 `schema.Manager`、`AttrSchema`、`ProviderSetting`，路径如 `/schemas/:name`。\n- 新 Scope 中心接口：围绕 `schema_definitions`、`schema_bindings`、`configurations`，路径统一在 `/admin/api/v1/*` 下。\n\n```mermaid\nflowchart TD\n  A[\"Hertz 路由\"] --> B[\"SchemaService<br/>旧 Schema 接口\"]\n  A --> C[\"SchemaDefinitionService<br/>Schema 定义\"]\n  A --> D[\"SchemaBindingService<br/>Scope 绑定\"]\n  A --> E[\"ConfigurationService<br/>配置版本\"]\n  C --> F[\"SchemaDefinitionsDAL\"]\n  D --> G[\"SchemaBindingsDAL\"]\n  D --> H[\"ConfigurationsDAL\"]\n  E --> H\n```\n\n## 启动与路由\n\n服务入口在 `main.go`：\n\n- `byted.Init()` 初始化运行时。\n- `byted.Default()` 创建 Hertz 服务。\n- 注册 `LogMiddleware()` 和 `FederationProxyMiddleware()`。\n- `register(r)` 调用生成路由和 `customizedRegister(r)`。\n\n`customizedRegister` 会初始化配置和数据库：\n\n1. `configs.New(GetConfDir()).Init()` 读取配置。\n2. `dal.NewDal(cfg).Init()` 初始化 GORM、gorm/gen 查询对象和可选表前缀。\n3. `schema.NewDefaultManager(dal)` 创建旧接口使用的 `schema.Manager`。\n4. 注册旧接口和新 `/admin/api/v1/*` 接口。\n\n新接口路由：\n\n| 路径 | Handler |\n|---|---|\n| `POST /admin/api/v1/create_one_schema_definition` | `SchemaDefinitionService.CreateSchemaDefinition` |\n| `GET /admin/api/v1/get_one_schema_definition` | `SchemaDefinitionService.GetSchemaDefinitionByVersion` |\n| `GET /admin/api/v1/list_schema_definitions` | `SchemaDefinitionService.ListSchemaDefinitions` |\n| `POST /admin/api/v1/create_one_schema_binding` | `SchemaBindingService.CreateSchemaBinding` |\n| `GET /admin/api/v1/get_one_schema_binding` | `SchemaBindingService.GetSchemaBindingByGroup` |\n| `GET /admin/api/v1/list_schema_bindings` | `SchemaBindingService.ListSchemaBindings` |\n| `POST /admin/api/v1/update_binding_configuration` | `ConfigurationService.UpdateBindingConfiguration` |\n| `GET /admin/api/v1/get_one_configuration_history` | `ConfigurationService.GetConfigurationHistory` |\n\n## API 响应模型\n\n新 `/admin/api/v1/*` 接口统一返回 HTTP `200`，业务结果放在 `adminapi.BaseResponse` 或 `adminapi.DataResponse`：\n\n- 成功：`StatusCodeSuccess = 0`，`StatusMessage = \"OK\"`。\n- 参数错误：`StatusCodeInvalidRequest = 40001`。\n- 内部错误：`StatusCodeInternalError = 50001`。\n- 数据库错误：`StatusCodeDatabaseError = 50002`。\n\n`adminapi.ErrorResponse(err)` 负责把 `errs.Err` 映射为业务状态码。普通 `error` 会被归类为内部错误。实现了 `adminapi.ErrorDetailsProvider` 的错误会把结构化详情透传到 `BaseResponse.Details`，例如 GSI 名称冲突会返回 `field_path`、`conflicting_name`、`conflicting_binding_id` 等字段。\n\n旧 `SchemaService` 使用 `c.IndentedJSON(errs.StatusCode(err), errs.ToBaseResp(err))`，HTTP 状态码会随错误类型变化，和新接口不同。\n\n## 核心数据类型\n\n`adminapi.Configurations` 是配置管理的核心结构：\n\n- `StoragePolicy`：支持 `tos`、`abase`、`oda`、`Bytedoc`。\n- `BytedocConfig`：包含 `route_table_id`、`shard_key`、`indexes` 等。\n- `AbaseConfig`：包含 `route_table_id`、`db_name`、`table_name`。\n- `TosConfig`：包含 `storage.bucket` 以及缓存、锁、限额配置。\n- `TTLConfig`：声明 TTL 字段、范围和秒级 TTL。\n- `CDCEvent`：通过 `CDCEventPolicy.MainSource` 选择 `APPL_CDC` 或 `BYTEDOC_OPLOG`。\n- `GSIIndexes`：声明全局二级索引，字段包括 `Name`、`Columns`、`IsUniq`、`BucketEnabled`、`Collection`。\n\n`GroupType` 表示绑定作用域，支持 `space`、`account`、`@all`。当 `GroupTypeAll` 被使用时，handler 会把 `group_name` 规范化为 `\"all\"`。\n\n## Schema 定义流程\n\n`SchemaDefinitionService.CreateSchemaDefinition` 创建新 Schema 定义：\n\n1. 读取 body 并反序列化为 `CreateSchemaDefinitionRequest`。\n2. 从 `x-vpaas-operator-name` header 覆盖 `Author`。\n3. 校验 `schema_name` 和 `schema_value` 非空。\n4. 校验 `schema_value` 字符串首尾是 JSON 对象形式 `{...}`。\n5. 用 `uuid.NewUUID()` 生成版本号。\n6. 调用 `dal.SchemaDefinitions.Create` 写入 `schema_definitions`。\n\n`GetSchemaDefinitionByVersion` 的查询优先级是：\n\n1. 如果提供 `id`，调用 `SchemaDefinitionsDAL.GetByID`。\n2. 否则如果提供 `schema_name` 且无 `version`，调用 `GetLatestByName`。\n3. 否则使用 `schema_name + version` 调用 `GetByNameVersion`。\n\n`ListSchemaDefinitions` 支持：\n\n- `schema_name` 非空：走 `SearchByName`，使用 `LIKE \"%keyword%\"`。\n- `schema_name` 为空：走 `List`。\n- `only_latest=true`：调用 `filterLatestVersions`，按每个 `schema_name` 的最新 `CreatedAt` 保留一条，并按 `schema_name` 升序返回。\n\n## Schema 绑定流程\n\n`SchemaBindingService.CreateSchemaBinding` 同时创建绑定和初始配置：\n\n1. 反序列化 `CreateSchemaBindingRequest`。\n2. 从 `x-vpaas-operator-name` header 读取作者。\n3. `validateCreateRequest` 校验 `group_type`、`group_name`、`schema_name`、`schema_version`、`configurations`。\n4. 调用 `config.ValidateConfigurations` 校验配置内容。\n5. 调用 `ensureConfiguredCollectionsUnique` 校验 GSI 全局约束。\n6. 构造 `dalModel.SchemaBindings`。\n7. 调用 `SchemaBindingsDAL.CreateWithConfig`，在事务内写入 `schema_bindings` 和首版 `configurations`。\n\n查询绑定时，`GetSchemaBindingByGroup` 要求 `group_type`、`group_name`、`schema_name` 三个参数都存在。`ListSchemaBindings` 会根据过滤器选择不同 DAL 方法：\n\n- 三个过滤器都有：`GetByGroup`。\n- 只有 `schema_name`：`ListBySchema`。\n- `group_type + group_name`：`ListByGroup`。\n- 只有 `group_type`：`ListByGroupType`。\n- 全空：`List`。\n\n返回绑定响应时会调用 `getLatestConfigurationsForResponse`。如果 `ConfigurationsDAL.GetLatestByBinding` 返回 `dal.ConfigurationNotFoundError`，响应中的 `Configurations` 会降级为 `nil`，不会把整个查询视为失败。\n\n## 配置版本流程\n\n`ConfigurationService.UpdateBindingConfiguration` 更新已有 binding 的配置：\n\n1. 读取并解析 `UpdateBindingConfigurationRequest`。\n2. 从 `x-vpaas-operator-name` header 读取作者。\n3. 校验 `ID`、`Configurations` 和 `Author`。\n4. 调用 `config.ValidateConfigurations`。\n5. 调用 `ensureConfiguredCollectionsUniqueForUpdate` 校验 GSI 约束。\n6. 调用 `ConfigurationsDAL.UpdateWithCAS` 创建新版本记录。\n\n`UpdateWithCAS` 当前实现是追加式版本管理：先读取最新版本，再插入 `Version = current.Version + 1` 的新记录。它不会覆盖旧配置，也没有显式更新已有行。\n\n`GetConfigurationHistory` 通过 `id` 查询配置历史，调用 `ConfigurationsDAL.GetHistory`，按版本倒序返回 `ConfigurationHistoryItem` 列表。历史记录中如果某条 JSON 反序列化失败，DAL 会记录 warn 并跳过该条。\n\n## 配置校验规则\n\n`config.ValidateConfigurations` 是配置写入前的基础校验入口：\n\n- `StoragePolicy` 必填且必须是已支持枚举。\n- `Bytedoc` 必须提供 `BytedocConfig.RouteTableID` 和非空 `ShardKey`。\n- `BytedocConfig.Indexes` 中唯一索引的 `Fields` 必须以 `ShardKey` 为前缀。\n- `abase` 必须提供 `RouteTableID`、`DbName`、`TableName`。\n- `tos` 必须提供 `TosConfig.Storage.Bucket`。\n- `GSIIndexes` 中 `Name`、`Columns`、`Collection` 都不能为空。\n- 单个 GSI 的 `Columns` 不允许空白或重复。\n- `IsUniq` 和 `BucketEnabled` 互斥。\n- 每个 GSI 最多允许一个包含 `*` 的通配列。\n- 默认不允许唯一索引包含通配列，除非 TCC 开关 `AllowUniqueWildcardGSIKey` 被解析为 `true`。\n- `TTLConfig` 中 `CreatedTimeAttr`、`TTLRange`、`TTLTime` 都必须有效。\n- `CDCEvent.Policy.MainSource` 只能是 `APPL_CDC` 或 `BYTEDOC_OPLOG`。\n\n## GSI 全局约束\n\nGSI 的跨 binding 约束集中在 `collection_uniqueness.go`，这是配置写入路径中最重要的保护逻辑。\n\n`ensurePendingGSINameSelfUnique` 保证同一个 pending 配置内 `GSIIndexConfig.Name` 去除首尾空白后不重复。\n\n`ensurePendingGSINamesUniqueWithLoader` 会跳过当前 binding，再批量加载其他 binding 的最新配置，检查 pending GSI name 是否与已有 binding 冲突。冲突错误使用 `gsiNameConflictError`，并通过 `ErrorDetails()` 输出结构化详情。\n\n`Collection` 允许共享，但必须保持 shape 一致：\n\n- simple GSI：`BucketEnabled=false`。\n- bucketed GSI：`BucketEnabled=true`。\n- 同一个 `Collection` 不能同时被 simple 和 bucketed GSI 引用。\n- 这个规则同时适用于同一个 pending 配置内部和跨 binding 场景。\n\n更新配置时，`ensureConfiguredCollectionsUniqueWithBindings` 会先加载当前 binding 的最新配置，并通过 `isRawGSIIndexesModified` 比较 `GSIIndexes`。如果 GSI 列表未变化，就跳过跨 binding 唯一性校验，避免无关配置更新被已有历史状态阻塞。\n\n## DAL 分层\n\n`dal.Init` 使用 `bytedgorm.MySQL` 初始化数据库连接，并通过 `setupTablePrefix` 支持表前缀：\n\n- 如果 `cfg.FuxiDB.TablePrefix` 非空，注册 `TablePrefixPlugin`。\n- 再调用 `query.Use(db)` 创建 gorm/gen 查询对象。\n- 最后调用 `q.ApplyTablePrefix(tablePrefix)` 让生成的 Query 元数据也带前缀。\n\n新接口使用的 DAL：\n\n- `SchemaDefinitionsDAL`：操作 `schema_definitions`，提供 `Create`、`GetByID`、`GetLatestByName`、`GetByNameVersion`、`SearchByName`、`List`。\n- `SchemaBindingsDAL`：操作 `schema_bindings`，提供 `CreateWithConfig` 和按 scope/schema 的查询方法。\n- `ConfigurationsDAL`：操作 `configurations`，把 `adminapi.Configurations` 序列化为 JSON 字符串保存，提供首版创建、最新配置、批量最新配置、历史版本和追加新版本。\n\n旧接口使用 `Dal` 上的方法操作 `AttrSchema` 和 `ProviderSetting`，例如 `Create`、`QuerySchemaByName`、`EnableSchema`、`QueryAllSettings`。\n\n## 旧 SchemaService\n\n`SchemaService` 是基于 `schema.Manager` 的老接口封装：\n\n- `CreateSchema`：读取路径参数 `name` 和请求体，调用 `manager.Create`。\n- `QuerySchema`：按 `name` 和可选 `version` 调用 `manager.Query`。\n- `EnableSchema` / `DisableSchema`：维护 provider 到 schema 的启用关系。\n- `QuerySchemaByProvider`、`QueryAllSettings`、`QueryAllSchemas`：读取 provider setting 和 schema 列表。\n- `GenerateCode`：调用 `manager.GenerateCodeFromSchema`，最终通过 `utils.ConvertJsonSchema2Struct` 生成 Go 结构体代码。\n- `Validate`：把 body 解析为 `map[string]interface{}` 后调用 `manager.ValidateProperty`；`DefaultManager.ValidateProperty` 当前直接返回“不支持”的 `ErrInvalidRequest`。\n\n`DefaultManager.Create` 会对 `schema.Schema` 执行 `Expand`、`SelfValidate`、`GenVersion`，再写入 `AttrSchema`。当前 `Expand` 只是把 `NativeSchema` 原样赋给 `FullSchema`，`SelfValidate` 会检查 JSON 合法性并反序列化为 `fuxi-schema-validator` 的 `Schema`。\n\n## 维护注意事项\n\n新接口的错误响应不要直接使用 HTTP 4xx/5xx；现有模式是 `c.JSON(errs.StatusCodeOK, adminapi.ErrorResponse(err))`。\n\n配置写入必须同时保留两层校验：`config.ValidateConfigurations` 负责单个配置对象合法性，`ensureConfiguredCollectionsUnique*` 负责跨 binding 的 GSI 全局约束。\n\n修改 GSI 规则时需要同时关注结构化错误详情。前端依赖 `BaseResponse.Details` 中的 `field_path` 和冲突信息定位表单字段。\n\n修改配置历史逻辑时要保持追加式版本语义。`configurations` 表是版本记录表，`UpdateWithCAS` 创建新行而不是更新旧行。\n\n涉及表名或环境隔离时优先走 `FuxiDB.TablePrefix`，不要在业务 SQL 中手写表前缀；现有机制在 `setupTablePrefix` 和 `query.ApplyTablePrefix` 中统一处理。","other-go-mod":"# Other — go.mod\n\n## go.mod 模块说明\n\n`go.mod` 定义了当前仓库的 Go 模块边界、语言版本、依赖版本和替换规则。它不是可执行代码模块，因此没有函数、类、内部调用或执行流；它的作用是在编译、测试、代码生成和依赖解析阶段为整个仓库提供统一的依赖图。\n\n当前模块路径为：\n\n```go\nmodule code.byted.org/videoarch/compound\n```\n\n这意味着仓库内包会以 `code.byted.org/videoarch/compound/...` 的形式被其他包引用。\n\n## Go 版本\n\n```go\ngo 1.23.2\n```\n\n该版本会影响：\n\n- 标准库 API 可用范围\n- `go` 命令的模块解析行为\n- `go test`、`go build`、`go mod tidy` 的兼容性\n- 依赖模块的最低工具链预期\n\n修改 Go 版本前，需要确认 CI、构建镜像、本地开发环境和代码生成工具链都已支持目标版本。\n\n## 替换规则\n\n本文件包含两个 `replace` 指令，用于覆盖默认依赖解析结果。\n\n```go\nreplace github.com/apache/thrift => github.com/apache/thrift v0.13.0\n```\n\n虽然间接依赖中出现了 `github.com/apache/thrift v0.21.0`，实际解析时会被强制替换为 `v0.13.0`。这通常用于规避 Thrift 版本兼容问题，尤其是 Kitex、Overpass、IDL 生成代码或历史 RPC 依赖仍绑定旧版 Thrift 行为时。\n\n```go\nreplace code.byted.org/videoarch/compound-go-sdk v0.0.0-20250526082633-932321153b5d => code.byted.org/videoarch/compound-go-sdk v1.0.1\n```\n\n该规则将指定伪版本的 `compound-go-sdk` 替换为正式版本 `v1.0.1`。如果代码生成结果或下游 SDK 仍引用旧伪版本，Go 模块解析会统一落到 `v1.0.1`。\n\n维护这些替换规则时要谨慎：删除或升级 `replace` 可能改变整个依赖图，尤其是 RPC 编解码、生成代码兼容性和 SDK 类型定义。\n\n## 依赖结构\n\n`go.mod` 使用多个 `require` 块组织依赖。Go 对块的顺序没有语义要求，但当前文件可以大致看作三类：\n\n```mermaid\nflowchart TD\n    A[\"compound 模块\"] --> B[\"服务框架\"]\n    A --> C[\"数据访问\"]\n    A --> D[\"视频架构 SDK\"]\n    A --> E[\"配置与观测\"]\n    A --> F[\"测试工具\"]\n    B --> G[\"Kitex / Hertz / gRPC\"]\n    C --> H[\"GORM / Mongo / MySQL\"]\n```\n\n### 服务框架依赖\n\n核心服务框架包括：\n\n- `code.byted.org/kite/kitex v1.19.3`\n- `github.com/cloudwego/kitex v0.13.1`\n- `code.byted.org/middleware/hertz v1.14.1`\n- `github.com/cloudwego/hertz v0.10.2`\n- `google.golang.org/grpc v1.66.2`\n\n这些依赖说明仓库同时涉及 Kitex RPC、Hertz HTTP 服务以及 gRPC 相关能力。新增服务入口、RPC client/server、HTTP handler 或协议适配代码时，优先沿用仓库中已有框架版本，不要局部引入不兼容的大版本。\n\n### 数据访问依赖\n\n主要数据访问依赖包括：\n\n- `code.byted.org/bytedoc/mongo-go-driver v1.1.6`\n- `code.byted.org/gorm/bytedgorm v0.9.19`\n- `gorm.io/gorm v1.25.11`\n- `gorm.io/gen v0.3.26`\n- `gorm.io/driver/mysql v1.5.1`\n- `gorm.io/plugin/dbresolver v1.5.0`\n- `vitess.io/vitess v0.21.0`\n\n这部分支撑 MongoDB、MySQL、GORM ORM、读写分离和可能的 SQL 解析或分库分表相关逻辑。涉及模型、DAO、事务或数据库连接配置时，需要关注这些库的版本约束，尤其是 `gorm.io/gorm` 与 `gorm.io/gen`、`code.byted.org/gorm/bytedgorm` 之间的兼容性。\n\n### 视频架构内部 SDK\n\n直接依赖中包含多组 `code.byted.org/videoarch/...` 模块，例如：\n\n- `code.byted.org/videoarch/account-sdk`\n- `code.byted.org/videoarch/azeroth/v2`\n- `code.byted.org/videoarch/caesar_config/v4`\n- `code.byted.org/videoarch/fuxi-admin-sdk`\n- `code.byted.org/videoarch/fuxi-schema-generator`\n- `code.byted.org/videoarch/fuxi-schema-validator`\n- `code.byted.org/videoarch/harden-sdk`\n- `code.byted.org/videoarch/iamsdk`\n- `code.byted.org/videoarch/prodia-sdk-go`\n- `code.byted.org/videoarch/storagegw-go`\n- `code.byted.org/videoarch/terminator-sdk-go`\n- `code.byted.org/videoarch/vvid`\n\n这些模块构成 Compound 与视频架构平台能力之间的主要连接点，覆盖账号、鉴权、配置、Schema、存储、数据处理、任务治理等方向。升级这类依赖时，除了编译通过，还需要重点检查生成代码、请求/响应结构体、枚举值、错误码和配置项是否发生行为变化。\n\n### 配置、日志、监控与链路追踪\n\n相关依赖包括：\n\n- `code.byted.org/gopkg/env`\n- `code.byted.org/videoarch/env`\n- `code.byted.org/gopkg/tccclient`\n- `code.byted.org/gopkg/logs`\n- `code.byted.org/gopkg/logs/v2`\n- `code.byted.org/gopkg/metainfo`\n- `code.byted.org/gopkg/metrics/v3`\n- `code.byted.org/gopkg/metrics/v4`\n- `code.byted.org/bytedtrace/...`\n- `code.byted.org/lidar/profiler/...`\n\n这类依赖通常贯穿服务启动、请求上下文、日志字段、运行环境识别、TCC 配置读取、指标上报和链路追踪。修改它们可能影响所有入口流量的观测能力，应避免只在局部代码中升级版本而不验证全局行为。\n\n### 消息、存储和外部系统\n\n重要依赖包括：\n\n- `code.byted.org/rocketmq/rocketmq-go-proxy`\n- `code.byted.org/gopkg/tos`\n- `github.com/volcengine/ve-tos-golang-sdk/v2`\n- `code.byted.org/ti/bytecdn_sdk`\n- `code.byted.org/videoarch/bktmeta-sdk-go`\n- `code.byted.org/videoarch/thalassa-sdk-golang`\n- `code.byted.org/videoarch/vfastcache`\n- `code.byted.org/videoarch/ttlcache`\n\n这些依赖说明仓库会连接消息队列、对象存储、CDN、缓存和内部元数据服务。相关调用通常会出现在异步任务、资源处理、上传下载、数据同步或缓存加速路径中。\n\n### 测试依赖\n\n测试相关依赖包括：\n\n- `github.com/agiledragon/gomonkey/v2`\n- `github.com/bytedance/mockey`\n- `github.com/smartystreets/goconvey`\n- `github.com/stretchr/testify`\n- `github.com/facebookgo/ensure`\n- `code.byted.org/gopkg/mockito`\n\n这些库支持 monkey patch、mock、断言和 BDD 风格测试。新增测试时应优先沿用同目录已有风格，避免在同一包中混用过多断言体系。\n\n## 直接依赖与间接依赖\n\n没有 `// indirect` 标记的依赖通常被当前模块源码直接 import，或者被显式保留用于工具、生成代码或运行时约束。\n\n带 `// indirect` 的依赖由直接依赖传递引入，或由 Go 模块解析保留。它们不一定能安全删除，因为：\n\n- 某些生成代码会隐式依赖特定版本\n- `replace` 可能依赖间接模块参与版本选择\n- Kitex、Hertz、GORM、追踪和安全 SDK 会引入大量传递依赖\n- `go mod tidy` 的结果取决于当前源码、测试文件和构建标签\n\n清理依赖前应运行完整的 `go mod tidy`、编译和测试流程，并检查 `go.mod` 与 `go.sum` 的差异是否符合预期。\n\n## 与代码库其他部分的关系\n\n`go.mod` 是整个仓库的依赖入口，所有包的 import 解析都会受到它影响。它连接的主要代码区域通常包括：\n\n- 服务入口：依赖 Kitex、Hertz、环境识别、日志和监控库\n- RPC client/server：依赖 Kitex、Overpass、Thrift、生成代码和链路追踪\n- DAO 和模型层：依赖 GORM、Mongo driver、MySQL driver、Vitess 相关能力\n- 配置层：依赖 TCC、环境 SDK、视频架构配置 SDK\n- 任务和异步处理：依赖 RocketMQ、缓存、重试和对象存储\n- 单元测试：依赖 mock、patch 和断言框架\n\n由于 `go.mod` 位于模块根目录，任何依赖变更都可能影响全仓构建结果。升级共享底座类依赖时，优先选择小步升级，并结合编译、测试和关键路径回归验证。\n\n## 维护建议\n\n修改依赖时遵循以下原则：\n\n1. 只升级当前变更真正需要的模块，避免顺手大范围刷新依赖图。\n2. 对 `replace` 指令保持显式说明意识，尤其是 `github.com/apache/thrift` 和 `compound-go-sdk`。\n3. 对 Kitex、Hertz、GORM、gRPC、Thrift、Protobuf 这类基础依赖，升级后检查生成代码兼容性。\n4. 对视频架构内部 SDK，升级后检查结构体字段、枚举、错误码和默认行为变化。\n5. 提交前确认 `go.mod` 与 `go.sum` 一起保持一致，不提交无法解释的依赖漂移。\n\n常用检查命令：\n\n```bash\ngo mod tidy\ngo test ./...\ngo mod graph\ngo list -m all\n```\n\n如果只是查看某个依赖为何存在，可以使用：\n\n```bash\ngo mod why <module-path>\n```\n\n例如：\n\n```bash\ngo mod why github.com/apache/thrift\n```\n\n这有助于判断依赖是源码直接使用、测试引入，还是由框架或生成代码传递引入。","other-handler":"# Other — handler\n\n## 模块定位\n\n`handler` 模块是 `CompoundServiceImpl` 的 RPC 入口层，负责把 Kitex 请求转换为 service 层调用，并统一返回 `BaseResp`。本组代码主要覆盖索引相关入口、修复入口，以及从 `SetAttr`/`DelAttr`/`Del` 到主表与索引表的端到端行为。\n\n核心入口包括：\n\n- `UpdateIdxWithEventForInternal`\n- `RefreshIdxForInternal`\n- `RepairIdxEntryForInternal`\n- `RepairIdxBucketForInternal`\n- `SetAttr`\n- `DelAttr`\n- `Del`\n- `Query`\n\n## 索引事件入口\n\n`UpdateIdxWithEventForInternal` 接收 `compound.UpdateIdxWithEventReq`，从 `TrimmedEvent` 取出 `compound.Event`，再调用：\n\n```go\nfuxi_s.HandleEvent(ctx, event, false)\n```\n\n这里的 `dryRun=false` 表示真实写入索引。测试确认了几个行为：\n\n- `TrimmedEvent == nil` 返回 `InvalidParam`，状态码 `1001001`\n- `fuxi_s.HandleEvent` 返回错误时，handler 不返回 Go error，而是在 `BaseResp` 中返回 `InternalError`，状态码 `1001002`\n- 成功时状态码为 `0`\n- 空事件也会继续调用 `HandleEvent`\n- `nil req` 会 panic，因为 Kitex getter 对 nil request 不是 nil-safe\n\n该入口是 GSI 消费者回放事件时使用的主要入口。非唯一索引在 `SetAttr`/`DelAttr` 写路径中通常先做 `dryRun=true` 校验，真正写入由 MQ 事件回放到 `UpdateIdxWithEventForInternal` 完成。\n\n## 索引刷新入口\n\n`RefreshIdxForInternal` 接收 `compound.RefreshIdxReq`，校验 `Space`、`Schema`、`ID` 后调用：\n\n```go\nfuxi_s.Refresh(ctx, space, schema, id)\n```\n\n行为约定：\n\n- `Space`、`Schema`、`ID` 任一为空，返回 `InvalidParam`，状态码 `1002001`\n- `fuxi_s.Refresh` 失败时返回 `InternalError`，状态码 `1002002`\n- 成功时状态码为 `0`\n- 参数会原样透传到 `fuxi_s.Refresh`\n- `nil req` 会 panic\n\nE2E 中 `RefreshIdxForInternal` 会通过 mock 的 `fuxi_s.Query` 回源主表，再重建索引。重复刷新应保持幂等：simple 行级索引模型下不会产生重复文档，`val._id` 仍指向同一个对象 ID。\n\n## 修复入口\n\n`RepairIdxEntryForInternal` 和 `RepairIdxBucketForInternal` 是索引修复能力的 handler 包装层。它们只做参数校验、调用 service、透传计数和结果，不在 handler 层重复 service 内部决策。\n\n`RepairIdxEntryForInternal` 调用：\n\n```go\nfuxi_s.RepairIdxEntry(ctx, req)\n```\n\n校验规则：\n\n- `Space` 不能为空\n- `Schema` 不能为空\n- `Items` 不能为空\n- `len(Items) <= 100`\n- 参数非法返回 `1003001`\n\n返回字段会透传 service 的结果：\n\n- `Results`\n- `Added`\n- `Removed`\n- `Skipped`\n- `Failed`\n\n`RepairIdxBucketForInternal` 调用：\n\n```go\nfuxi_s.RepairIdxBucket(ctx, req)\n```\n\n校验规则：\n\n- `Space` 不能为空\n- `Collection` 不能为空\n- `BucketIDs` 不能为空\n- `len(BucketIDs) <= 200`\n- 参数非法返回 `1004001`\n\n返回字段会透传：\n\n- `Results`\n- `Deleted`\n- `Skipped`\n- `Failed`\n\n两个入口的 `nil req` 都会 panic，原因同样是 Kitex getter 不是 nil-safe。\n\n## Handler E2E 测试基础设施\n\n测试使用两套内存存储模拟真实链路：\n\n- `e2eStore`：索引表内存 mock，来自 `docopstest.New()`\n- `mainStore`：主表内存 mock，由 `mainE2EStore` 实现\n\n`setupE2E` 会重置 `e2eStore`，并用 `gomonkey` patch `doc` 包访问：\n\n```go\ndoc.RawUpdate\ndoc.TryInsert\ndoc.FindOne\ndoc.FindWithLimit\ndoc.DeleteMany\ndoc.BulkWrite\ndoc.FindOneAndUpdate\n```\n\n同时会执行：\n\n```go\nidx.SetGoTryMerge(idx.SyncMergeHook)\nentity.GlobalRetryLimiter = &entity.RetryLimiter{}\n```\n\n这两个设置很关键：\n\n- `idx.SyncMergeHook` 让删除后触发的 bucket merge 同步执行，测试可以稳定观察合并结果\n- 重置 `GlobalRetryLimiter` 避免测试之间相互污染\n\n`setupSetAttrE2E` 在此基础上继续模拟主表、注册属性、存储配置和 MQ：\n\n- `admin.GetRegAttrMap`\n- `admin.GetAdminAttrIndex`\n- `admin.GetStorage`\n- `admin.GetDelFile`\n- `rocketmq.Mock`\n- `fuxi_s.QueryWithFuxiAttr`\n- `meta.SetMeta`\n- `meta.DelMeta`\n- `meta.DelID`\n\n`newSetAttrE2EFixture` 是 SetAttr E2E 的统一入口，它会安装 mock、注入 `admin.GetIdxCfg`，并返回带 `cctx.WithContainer` 的 context。这个 context 必须保留同一个 container 指针，否则 `service.SetAttr` 回填的 `Space`/`Schema` 无法被后续 MQ 事件看到。\n\n## 主表与索引表执行链路\n\n非唯一索引的完整链路是异步事件模型，测试中通过 `drainAndReplayMQ` 显式回放：\n\n```mermaid\nflowchart TD\n    A[Handler.SetAttr / DelAttr] --> B[meta.SetMeta / meta.DelMeta]\n    A --> C[HandleEvent dryRun=true]\n    A --> D[rocketmq 记录事件]\n    D --> E[drainAndReplayMQ]\n    E --> F[UpdateIdxWithEventForInternal]\n    F --> G[fuxi_s.HandleEvent dryRun=false]\n    G --> H[e2eStore 索引表]\n```\n\n唯一索引不同，`service.SetAttr`、`DelAttr`、`Del` 会同步调用：\n\n- `fuxi_s.HandleUniqIdx`\n- `fuxi_s.HandleUniqIdxForDel`\n- `fuxi_s.HandleIdxCleanupForDel`\n\n因此唯一索引在 handler 调用返回前已经完成占位、冲突检测或清理。\n\n## 覆盖的关键行为\n\n索引事件入口覆盖：\n\n- Created 事件写入索引\n- Updated 事件清理旧 key 并写入新 key\n- Deleted 事件清理索引\n- Create → Update → Delete 生命周期\n- 多对象同 key 查询\n- 复合索引部分列更新时通过 `fuxi_s.Query` 补查缺失列\n- bucketed 模式的 Create → Update → Delete\n- `Query` 不传 `Space` 时走跨 space 索引查询\n\nSetAttr/DelAttr/Del E2E 覆盖：\n\n- 非唯一索引 create/update/delete 属性/delete 对象\n- 唯一索引 create、改键、冲突、删除属性、删除对象\n- 唯一索引和非唯一索引混合配置\n- `Where.Filter` 乐观锁\n- 分片键禁止修改和禁止删除\n- `Del`/`DelAttr` 携带分片键 filter 的精确路由\n- `WriteMode_InsertOnly` 成功插入、已存在返回 `AlreadyExists`、默认 Upsert 回归\n\n## 分桶模式注意事项\n\nbucketed 索引对版本值有严格要求：版本必须满足桶区间路由条件。测试使用 `testVer` 构造合法 V1 HLC 值，避免普通小整数落在 `VerBoundaryMin` 之外导致查桶失败。\n\n分桶结构级测试 `TestE2E_SetAttr_BucketMode_TriggerSplit` 会写入 `entity.BucketSize + 50` 条记录，触发真实 `splitActiveBucket` 路径，并直接读取 `e2eStore.Collections` 验证：\n\n- 恰好一个活跃桶\n- 封口桶和活跃桶版本区间连续\n- `Cnt` 与 distinct oid 数量守恒\n- 所有 oid 都可通过 `QueryByIndex` 查回\n\n辅助函数 `readBucketsByKey` 会把底层 BSON 文档反序列化为 `entity.Bucket`，`assertBucketChainInvariants` 负责校验桶链不变式。\n\n## 查询相关行为\n\n`e2eQueryOidsAt` 使用：\n\n```go\nidx.GetOperator(entity.IdxCfg{BucketEnabled: bk}).QueryByIndex(...)\n```\n\n用于指定 `space` 的索引查询。\n\n`e2eQueryOidsCrossSpace` 使用：\n\n```go\nidx.GetOperator(entity.IdxCfg{BucketEnabled: bk}).QueryEntriesCrossSpace(...)\n```\n\n用于不指定 `space` 的跨 space 查询。\n\n`TestE2E_Handler_Query_CrossSpace_NoSpaceFilter` 验证了 handler `Query` 在不传 `Space` 时，可以通过跨 space 索引查出多个 space 的对象，再通过 mock 的 `metasvc.GetMetaByIdsFromIdx` 回表拼装响应。\n\n如果 filter 无法命中任何索引，`Query` 应返回非 0 状态码，并在错误信息中包含 `no matching index`。\n\n## 维护建议\n\n新增 handler 层索引逻辑时，应根据链路选择测试层级：\n\n- 只验证参数校验和返回码：mock service 层函数即可\n- 验证事件到索引表：使用 `setupE2E`\n- 验证 `SetAttr`/`DelAttr`/`Del` 到主表和索引表：使用 `newSetAttrE2EFixture`\n- 验证非唯一索引写入：记得调用 `drainAndReplayMQ`\n- 验证 bucketed 行为：使用 `testVer` 构造版本，并将查询辅助函数的 `bucketed` 参数设为 `true`\n\n对 `nil req` 的行为不要误改为返回错误；当前测试明确约束这些入口会 panic。","other-id":"# Other — id\n\n## 模块概览\n\n`mdap/id` 负责生成、解析和校验 MDAP 资源 ID。ID 固定为 40 个字符，底层表示 200 bits，使用自定义 Base32 字符集 `0123456789abcdefghjkmnpqrstvwxyz`，剔除了容易混淆的 `i/l/o/u`。\n\n模块支持四类实体：\n\n- `EntityTypeAsset`：`a`\n- `EntityTypeSource`：`s`\n- `EntityTypeArtifact`：`r`\n- `EntityTypeAssetGroup`：`g`\n\n常规 ID 由 `Generator.Generate` / 包级 `Generate` 生成，由 `Parser.Parse` / 包级 `Parse` 解析。AssetGroup 还有一条更轻量的专用路径：`GenerateAssetGroupID`、`BuildAssetGroupID`、`ParseAssetGroupID`。\n\n## ID 格式\n\n常规 MDAP ID 总长 200 bits，对应 25 bytes / 40 Base32 字符：\n\n```text\n明文前缀 60 bits:\nT(5) + TEN6(30) + SUB4(20) + KV1(5)\n\n混淆后缀 140 bits:\nSET11(55) + DC2(10) + MT(5) + TS7(35) + X1(5) + RAND6(30)\n```\n\n字段含义集中在 `IDFields`：\n\n- `EntityType`：实体类型字符，映射到 5 bits。\n- `TenantID`：30 bits，由 `TopAccountIDToTenantID` 从账号的 `TopAccountID` 派生。\n- `AccountID`：20 bits，来自 account 服务返回的 `AccountInfo.ID`。\n- `GroupKey`：55 bits，子实体关联父 AssetGroup 的短键。\n- `KeyVersion`：5 bits，明文保存，用于解析时选择混淆密钥。\n- `VDC`：10 bits，通过 `VDCToCode` / `CodeToVDC` 映射。\n- `MIMEType`：5 bits，使用 `MIMEType` 常量或 `MIMETopLevelToChar` 转换。\n- `Timestamp`：35 bits，从 `EpochMs = 2012-03-01T00:00:00Z` 起按 100ms 计数。\n- `Extension`、`WorkerID`、`Sequence`：由 35-bit nonce 拆出。新 ID 要求 `Extension != 0`，用于区别历史 `X1 = 0` 布局。\n\n`IDFields.Time()` 将 `Timestamp` 转回 UTC 时间，`IDFields.String()` 提供面向调试的字段摘要。\n\n## 生成流程\n\n常规生成入口是：\n\n```go\nid, err := id.Generate(ctx, id.EntityTypeAsset, \"space-a\", groupKey, \"agcq\", id.MIMETypeVideo)\n```\n\n包级 `Generate` 使用全局懒加载生成器。首次调用时，`loadOrCreateGlobalGenerator` 根据 `env.PodName()` 计算 `WorkerID`，固定使用 `KeyVersion: 0` 创建 `Generator`。并发场景下全局生成器受 `globalGenerator.mu` 保护，只会初始化一次。\n\n显式控制配置时使用 `NewGenerator`：\n\n```go\ngen, err := id.NewGenerator(id.GeneratorConfig{\n    WorkerID:   8,\n    KeyVersion: 0,\n})\nif err != nil {\n    return err\n}\n\nidValue, err := gen.Generate(ctx, id.EntityTypeAsset, \"space-a\", 789, \"agcq\", id.MIMETypeVideo)\n```\n\n生成过程的关键步骤：\n\n```mermaid\nflowchart LR\n    A[\"调用 Generate\"] --> B[\"按 space 查询账号\"]\n    B --> C[\"TopAccountID 转 TenantID\"]\n    C --> D[\"校验实体、账号、GroupKey、VDC\"]\n    D --> E[\"生成时间戳和 nonce\"]\n    E --> F[\"组装 IDFields\"]\n    F --> G[\"generateFromFields 编码\"]\n    G --> H[\"混淆后缀并 Base32 输出\"]\n```\n\n`Generator.Generate` 会调用 `getAccountByName(ctx, space)`。实际默认实现来自 `account.GetAccountByName`，测试中通过包变量替换。账号返回值参与两个字段：\n\n- `AccountInfo.ID` 转为 `AccountID`，必须在 `[0, MaxAccountID]` 内，否则返回 `ErrAccountIDOutOfRange`。\n- `AccountInfo.TopAccountID` 经 `TopAccountIDToTenantID` 转为 `TenantID`。`TopAccountID == 0` 映射为 `TenantID == 0`；非零时必须是 10 位十进制数，取前 2 位加后 7 位组成 9 位数。\n\n`nextTimestampAndNonce` 以 100ms 为时间桶。每个新桶随机初始化一个 35-bit nonce，范围为 `[MinNonce, MaxNonce]`，保证高 5 bits 即 `Extension` 非 0；同一桶内递增。递增到 `MaxNonce` 后，`waitForNext100ms` 等待下一个 100ms 桶。\n\n## 编码与混淆\n\n`generateFromFields` 先构造 60-bit 明文前缀：\n\n```text\nprefix = T << 55 | TenantID << 25 | AccountID << 5 | KeyVersion\n```\n\n然后构造 140-bit 后缀。后缀在混淆前按低位到高位排列：\n\n```text\nRAND6 | X1 | TS7 | MT | DC2 | SET11\n```\n\n后缀通过 `Obfuscator` 做仿射置换：\n\n```text\nC = (P * A + B) mod 2^140\nP = ((C - B) * AInv) mod 2^140\n```\n\n`NewDefaultObfuscator` 创建默认密钥，`DefaultKeyManager` 默认注册版本 `0`。如需密钥轮换，使用 `NewKeyManager`、`AddKey` 配置多个版本；`GeneratorConfig.KeyVersion` 决定生成时写入的版本，`Parser.Parse` 根据明文 `KeyVersion` 选择对应 `Obfuscator`。解析器找不到版本时返回 `ErrParseFailed` 包装的错误。\n\n## 解析流程\n\n常规解析入口：\n\n```go\nfields, err := id.Parse(ctx, idValue)\nif err != nil {\n    return err\n}\nfmt.Println(fields.AccountID, fields.Space, fields.Time())\n```\n\n`Parse` 使用 `DefaultParser`，显式密钥管理可用 `NewParser(km)`。\n\n`Parser.Parse` 的流程是：\n\n1. `DecodeBase32` 将 40 字符 ID 还原为 `[25]byte`。\n2. 用 `big.Int` 提取高 60 bits 明文前缀和低 140 bits 混淆后缀。\n3. 从前缀读取 `KeyVersion`，通过 `KeyManager.GetKey` 找到混淆器。\n4. `Deobfuscate` 后缀。\n5. 按 `RAND6 -> X1 -> TS7 -> MT -> DC2 -> SET11` 顺序解析后缀字段。\n6. `CodeToVDC` 将数值 VDC 转为字符串。\n7. 调用 `getAccountByID(ctx, accountID)` 补齐 `Space`。\n\n注意：解析依赖 account 服务。如果 `getAccountByID` 失败，`Parse` 会返回带有 `get account by id <id>` 上下文的 `ErrParseFailed` 错误。\n\n## Base32 与二进制存储\n\n`EncodeBase32` / `DecodeBase32` 只处理完整 200-bit ID，即 `[TotalBytes]byte` 和 40 字符串之间的转换。`IsValidID` 只校验长度和字符集，支持大写输入，但规范输出为小写。\n\n数据库需要存二进制时使用：\n\n```go\nraw, err := id.ParseToBinary(idValue)\nif err != nil {\n    return err\n}\n\nidValue = id.BinaryToString(raw)\n```\n\n`EncodeBase32Uint` 和 `DecodeBase32Uint` 用于固定宽度的小整数片段编码，例如 AssetGroup 专用 ID 的 `AccountID`、`GroupKey` 和 VDC code。\n\n## AssetGroup 专用 ID\n\nAssetGroup ID 使用独立格式，但仍保持 40 字符长度：\n\n```text\ng + accountID(4 chars) + groupKey(11 chars) + dcCode(2 chars) + padding(22 chars)\n```\n\n生成路径：\n\n- `GenerateAssetGroupID(ctx, space)`：通过 `getAccountByName` 查询账号，随机生成非零 `GroupKey`，使用当前 `env.VDC()`。\n- `BuildAssetGroupID(accountID, groupKey, vdc)`：直接按字段构造，适合已有字段或测试场景。\n- `ParseAssetGroupID(ctx, id)`：调用内部 `decodeAssetGroupID` 解析字段，再通过 `getAccountByID` 补齐 `Space`。\n\n`decodeAssetGroupID` 会校验长度、`g` 前缀、padding、Base32 字符、`AccountID` 范围和 VDC code。VDC code 为 `0` 或不存在于映射表时会报错。\n\n## VDC 映射\n\n`vdc.go` 内维护固定的 `vdcList` 快照，编码从 `1` 开始，`0` 保留为无效值。`VDCToCode` 和 `CodeToVDC` 基于初始化时构建的双向 map。\n\n维护约束很重要：新增 VDC 只能追加到 `vdcList` 末尾，不能重排或删除。否则历史 ID 中已经编码的 `dcCode` 会被解释成不同机房。\n\n`VDCCount()` 返回当前注册数量，测试中固定校验为 `265`，并验证如 `\"agcq\" -> 1`、`\"alisg\" -> 19`、`\"lf\" -> 140` 等哨兵映射。\n\n## 错误边界\n\n生成侧主要错误包括：\n\n- `ErrInvalidEntityType`：实体类型不是 `a/s/r/g`。\n- `ErrTenantIDOutOfRange`：派生后的 `TenantID` 超过 30 bits。\n- `ErrAccountIDOutOfRange`：账号 ID 为负数或超过 20 bits。\n- `ErrGroupKeyOutOfRange`：`GroupKey` 超过 55 bits。\n- `ErrInvalidVDC`：`VDCToCode` 无法识别输入。\n- `ErrWorkerIDOutOfRange` / `ErrKeyVersionOutOfRange`：`NewGenerator` 配置非法。\n- `ErrInvalidTopAccountID`：非零 `TopAccountID` 不是 10 位十进制数。\n\n解析侧主要错误包括：\n\n- `ErrInvalidID`：Base32 ID 长度不是 40。\n- `ErrInvalidCharset`：ID 包含自定义字符集外的字符。\n- `ErrParseFailed`：密钥版本未知、VDC code 未知或 account 反查失败。\n- `ErrUnknownVDC` / `ErrUnknownVDCCode`：VDC 字符串或数值编码不在快照中。\n\n## 测试关注点\n\n`generator_test.go` 覆盖 Base32 往返、实体类型和 MIME 映射、混淆器可逆性、nonce 新布局、全局生成器并发懒加载、二进制转换、密钥版本匹配、account 查询错误和范围错误。\n\n测试中的 `withStubbedAccounts` 通过替换 `getAccountByName` / `getAccountByID` 隔离 account 服务依赖；`testGenerateFromFields` 直接调用内部 `generateFromFields`，用于验证编码、解析和位布局本身。`asset_group_test.go` 单独覆盖 AssetGroup 专用 ID 的构造、解析、padding 校验、VDC 校验和账号查询错误。","other-idl":"# Other — idl\n\n## idl 模块\n\n`idl` 模块用于维护 Thrift IDL，并通过 `kitex` 生成项目使用的 RPC 代码。当前模块只有一个脚本入口：[idl/run.sh](/Users/bytedance/videoarch/compound/idl/run.sh:1)，不包含运行时代码、函数或类，也没有内部调用链。\n\n### 作用\n\n该模块的核心职责是把 Thrift 定义转换为 Go 代码，生成结果写入仓库根目录下的 `kitex_gen`：\n\n```sh\nkitex -module code.byted.org/videoarch/compound -gen-path ../kitex_gen ./compound.thrift\nkitex -module code.byted.org/videoarch/compound -gen-path ../kitex_gen ./abase/abase.thrift\n```\n\n这两条命令分别生成：\n\n- `./compound.thrift` 对应的 Kitex 代码\n- `./abase/abase.thrift` 对应的 Kitex 代码\n\n生成代码的 Go module 路径固定为：\n\n```text\ncode.byted.org/videoarch/compound\n```\n\n因此，生成代码中的 import 路径会与当前仓库的 Go module 保持一致。\n\n### 关键文件\n\n`idl/run.sh`\n\n这是唯一的生成入口。脚本顺序执行两个 `kitex` 命令：\n\n1. 读取 `idl/compound.thrift`\n2. 读取 `idl/abase/abase.thrift`\n3. 将生成结果写入 `../kitex_gen`\n\n`compound.thrift`\n\n主 IDL 文件，通常承载项目自身的 RPC 服务、结构体、枚举或请求响应定义。\n\n`abase/abase.thrift`\n\n基础依赖 IDL。它被单独生成，说明项目中有代码或其他 IDL 依赖 `abase` 下的类型定义。\n\n`kitex_gen`\n\n生成代码目录。业务代码通常不会直接依赖 `idl` 目录，而是 import `kitex_gen` 下的生成包。\n\n### 使用方式\n\n应在 `idl` 目录下执行脚本，因为脚本里的 Thrift 路径和生成路径都是相对路径：\n\n```sh\ncd idl\nsh run.sh\n```\n\n如果从仓库根目录直接执行：\n\n```sh\nsh idl/run.sh\n```\n\n脚本中的 `./compound.thrift` 会被解析为仓库根目录下的 `compound.thrift`，导致找不到文件。因此该脚本依赖当前工作目录为 `idl`。\n\n### 生成行为\n\n`kitex` 命令中的参数含义如下：\n\n```sh\nkitex \\\n  -module code.byted.org/videoarch/compound \\\n  -gen-path ../kitex_gen \\\n  ./compound.thrift\n```\n\n- `-module code.byted.org/videoarch/compound`：指定生成代码所属的 Go module。\n- `-gen-path ../kitex_gen`：指定生成代码输出目录。\n- `./compound.thrift`：指定输入的 Thrift 文件。\n\n两条命令是顺序执行的，没有额外依赖检测、清理逻辑或错误恢复逻辑。任意一条命令失败时，脚本会继续执行下一条，除非调用方显式使用 `set -e` 或 shell 环境中配置了失败即退出。\n\n### 与代码库的关系\n\n`idl` 模块本身不参与服务运行，也不会在业务执行链路中被调用。它是代码生成阶段的输入源。\n\n典型开发链路是：\n\n1. 修改 `idl/compound.thrift` 或 `idl/abase/abase.thrift`\n2. 在 `idl` 目录执行 `sh run.sh`\n3. 检查 `kitex_gen` 下生成代码的变化\n4. 更新依赖生成类型的业务代码\n5. 运行相关测试或编译检查\n\n业务代码应该依赖生成后的 Go 类型，而不是解析或读取 Thrift 文件本身。\n\n### 维护注意事项\n\n修改 Thrift 文件后，需要同步重新生成 `kitex_gen`，否则业务代码可能仍然引用旧的结构体、枚举或服务定义。\n\n如果新增 Thrift 文件，需要同时判断是否应该加入 `run.sh`。当前脚本只生成 `compound.thrift` 和 `abase/abase.thrift`，新增文件不会被自动处理。\n\n如果调整 Go module 路径，必须同步修改 `run.sh` 中的 `-module` 参数，否则生成代码的 import 路径会与仓库不一致。\n\n如果希望脚本在第一条生成命令失败时停止，可以在脚本顶部增加：\n\n```sh\nset -e\n```\n\n这属于脚本行为变更，需要确认现有开发流程是否依赖“继续执行后续生成命令”的行为。","other-kitex-info-yaml":"# Other — kitex_info.yaml\n\n## 模块概览\n\n`kitex_info.yaml` 是 Kitex 服务元信息文件，用于记录当前仓库对应的 Kitex 服务名称和生成工具版本。它不包含业务逻辑，也不会在运行时形成函数调用关系；它的价值在于为代码生成、服务识别和工程工具链提供稳定的元数据。\n\n```yaml\nkitexinfo:\n  ServiceName: 'bytedance.videoarch.compound'\n  ToolVersion: 'v1.13.3'\n```\n\n## 配置结构\n\n### `kitexinfo`\n\n顶层配置节点，承载 Kitex 相关元信息。\n\n### `ServiceName`\n\n```yaml\nServiceName: 'bytedance.videoarch.compound'\n```\n\n表示该模块所属的 Kitex 服务名。当前值为 `bytedance.videoarch.compound`。\n\n开发者在排查服务注册、生成代码归属、IDL 生成产物或内部工具识别问题时，可以把这个字段作为当前仓库的服务身份来源之一。\n\n### `ToolVersion`\n\n```yaml\nToolVersion: 'v1.13.3'\n```\n\n表示生成或维护当前 Kitex 相关代码时使用的 Kitex 工具版本。当前值为 `v1.13.3`。\n\n该字段通常用于判断生成产物和 Kitex 工具链版本是否一致。升级 Kitex 工具或重新生成代码时，需要关注该值是否随工具版本变化而更新。\n\n## 执行行为\n\n该文件没有可执行代码：\n\n- 没有函数、类或方法定义\n- 没有内部调用\n- 没有外部调用\n- 没有被调用关系\n- 没有检测到执行流\n\n因此，修改 `kitex_info.yaml` 不会直接改变运行时业务逻辑。但它可能影响依赖 Kitex 元信息的生成流程、服务识别流程或工程检查流程。\n\n## 与代码库的关系\n\n`kitex_info.yaml` 是代码库中的配置型模块，主要服务于 Kitex 工具链，而不是服务运行时路径。它与业务代码之间通常是“元数据支撑”关系：\n\n```mermaid\nflowchart LR\n  A[\"kitex_info.yaml\"] --> B[\"Kitex 服务元信息\"]\n  B --> C[\"服务名识别\"]\n  B --> D[\"工具版本追踪\"]\n  C --> E[\"生成代码或工程工具\"]\n  D --> E\n```\n\n这张图表达的是配置角色，而不是函数调用关系。根据当前调用图，该模块本身没有代码级调用边。\n\n## 修改注意事项\n\n修改 `ServiceName` 前需要确认服务身份是否确实发生变化。该字段通常应与仓库、IDL、服务注册配置和内部平台上的服务名保持一致。\n\n修改 `ToolVersion` 前需要确认是否真的完成了 Kitex 工具升级或重新生成流程。单独改版本号不会升级生成代码，也不能保证生成产物兼容新版本工具。\n\n如果只是修改业务逻辑，通常不需要改动该文件。只有在服务名迁移、Kitex 生成工具升级、重新生成 Kitex 相关产物，或修复工程元信息不一致时，才应考虑更新。","other-operations":"# Other — operations\n\n## 运维模块\n\n`docs/operations/` 是 Compound 的运维知识入口，面向构建、部署、恢复、CI 文档检查、包级 SOP 索引和新联邦集群初始化。该目录本身不包含运行时代码，因此没有内部调用图、外部调用或执行流；它通过引用真实脚本、配置文件和紧耦合代码路径，把“如何构建、启动、验证、恢复和初始化环境”的操作事实固定下来。\n\n```mermaid\nflowchart TD\n  A[\"docs/operations/README.md<br/>运维入口索引\"]\n  B[\"build-deploy.md<br/>构建、启动、测试、CI\"]\n  C[\"recovery.md<br/>文档恢复与关键路径\"]\n  D[\"ci-integration-guide.md<br/>doc-init-check 集成\"]\n  E[\"fuxi-admin-new-federation-cluster.md<br/>新联邦集群初始化\"]\n  F[\"idx 包 README / SOP<br/>GSI 紧耦合操作文档\"]\n\n  A --> B\n  A --> C\n  A --> D\n  A --> E\n  A --> F\n```\n\n## 目录职责\n\n`docs/operations/README.md` 是总入口，负责把长期有效的 SOP 和恢复材料索引到一个稳定位置。它明确区分两类内容：\n\n- `idx` 包内的紧耦合 SOP：保留在代码包附近，例如 `fuxi/core/service/idx/README.md`、`fuxi/core/service/idx/archive/docs/compound-ops/`、`fuxi/core/service/idx/reconcile/README.md`。\n- 项目级运维文档：保留在 `docs/operations/`，例如构建部署、恢复指南、CI 集成、新联邦集群初始化。\n\n`idx` 包文档被单独列为高优先级运维入口，因为它们满足“就近留存判据”：被 godoc 注释引用、包含代码内部不变式，或提供与实现强绑定的可执行示例。涉及 `idx` 包变更时，还需要遵守 `CLAUDE.md` 中的专项约束：文档代码一致、影响面分析、显式 review 放行。\n\n## 构建与部署\n\n`build-deploy.md` 描述 Compound 从源码到运行实例的交付链路，核心入口是 `build.sh`、`script/bootstrap.sh`、`.codebase/pipelines/ci.yaml`、`.codebase/apps.yaml` 和 `script/run_remote_ut.sh`。\n\n`build.sh` 负责生成 `output/` 目录，并根据环境变量选择构建方式：\n\n```bash\nif [ \"$SCM_SOURCE\" != \"\" ]; then\n    svc_inline merge -c service_inline_config.yaml\n    svc_inline build -o output/bin/bytedance.videoarch.compound\nelif [ \"$IS_SYSTEM_TEST_ENV\" = \"1\" ]; then\n    go test -c -covermode=count -coverpkg=./... \\\n        -o output/bin/bytedance.videoarch.compound\nelse\n    go build -o output/bin/bytedance.videoarch.compound .\nfi\n```\n\n产物布局固定为：\n\n```text\noutput/\n├── bin/bytedance.videoarch.compound\n├── conf/\n├── bootstrap.sh\n└── run_remote_ut.sh\n```\n\n`script/bootstrap.sh` 是运行入口。它设置 `KITEX_RUNTIME_ROOT`、`KITEX_CONF_DIR`、`KITEX_LOG_DIR` 和 `PSM`，创建 `log/app`、`log/rpc` 后执行：\n\n```bash\nexec $RUNTIME_ROOT/bin/bytedance.videoarch.compound\n```\n\nKitex 代码生成使用 `idl/compound.thrift`，服务名为 `bytedance.videoarch.compound`，模块名为 `code.byted.org/videoarch/compound`。生成产物位于 `kitex_gen/`，其中包括 RPC client、server、invoker 和 Thrift 数据结构。\n\nCI 配置由 `.codebase/pipelines/ci.yaml` 驱动，覆盖率门禁由 `.codebase/apps.yaml` 约束：项目覆盖率降幅最多 1%，增量代码覆盖率最低 70%。文档中特别强调，本项目测试口径以远程 UT 和 CI 为准，本地 `go test ./...` 不是最终通过标准。\n\n## 文档检查与 CI 集成\n\n`ci-integration-guide.md` 描述 `script/doc-init-check.sh` 的接入方式。当前默认路径是本地 pre-commit hook：\n\n```bash\nbash script/install-doc-init-hook.sh\n```\n\n该命令会配置 `.githooks/pre-commit`，提交前自动运行：\n\n```bash\nbash script/doc-init-check.sh\n```\n\n`doc-init-check.sh` 的退出码语义如下：\n\n| 退出码 | 含义 | 建议行为 |\n|---|---|---|\n| `0` | 全部通过 | 继续 |\n| `1` | 仅有 WARN | 提示但不阻塞 |\n| `2` | 存在 ERR | 阻塞提交或 CI |\n\nCI 集成文档给出三种方案：沿用 pre-commit、把检查注入构建或测试脚本、单独创建 lint pipeline。由于 `.codebase/pipelines/ci.yaml` 使用模板化 `template: go`，文档建议由 SRE / 平台组按实际模板能力选择接入点，避免破坏现有流水线兼容性。\n\n## 包 README 清理规则\n\n`cleanup-package-readmes.md` 记录历史模板 README 的清理策略。历史脚本 `script/gen_dir_docs.py` 曾批量生成带有 `<!-- compound-dir-doc -->` 标记的包级 README，其中大部分没有外部使用方，也不包含紧耦合不变式。\n\n保留 README 的条件只有三类：\n\n- 被 godoc 注释通过相对路径引用。\n- 描述代码内部不变式，代码变更必须同步更新。\n- 包含与代码强绑定的可执行示例，例如命令参数或配置 key。\n\n明确保留的 README 包括 `fuxi/core/service/idx/README.md`、`fuxi/core/service/idx/reconcile/README.md`、`fuxi/core/service/idx/reconcile/offline/README.md` 以及 `idx/archive/docs/` 下的复合操作 SOP 索引。其他模板 README 应在自然 PR 中逐步删除。\n\n## 新联邦集群初始化 SOP\n\n`fuxi-admin-new-federation-cluster.md` 是面向线上 Fuxi 新联邦集群的初始化手册，覆盖 `fuxi_admin`、`object_data_access` 和 `compound` 的创建顺序、TCC 配置、RDS DDL、TCE 依赖和常见失败模式。\n\n关键顺序是：\n\n```text\n确认集群名和区域\n→ 创建 TCC 目录\n→ 发布 Admin / ODA / Compound 初始化配置\n→ 准备 Admin RDS 表\n→ 预留 TCE quota\n→ 部署 Admin\n→ 部署 ODA\n→ 部署 Compound\n→ 验证启动状态\n```\n\n该 SOP 强调 `registered_feds` 是联邦集群清单的权威来源，位于 `fuxi_admin` 的 TCC `/default/registered_feds`。不要通过 ODA 或 Compound 的 confspace 目录反推集群列表。\n\nCompound 初始化依赖以下关键配置：\n\n| 配置 | 作用 |\n|---|---|\n| `federal` | 当前 federation 标识，例如 `video_arch` |\n| `storage_cfg` | 存储路由，默认通常为 `oda` |\n| `shield_info` | Shield 规则，空规则可用 `{}` |\n| `terminator_ak` / `terminator_sk` | Terminator 存储路径凭证 |\n| `event` | RocketMQ event producer 配置 |\n\n`event` 是高风险配置。只要 TCC 中存在该 key，`compound/rocketmq/event.go` 就会在包初始化阶段初始化 RocketMQ producer；错误配置可能导致服务监听端口前 panic。初始化阶段如果 MQ 和 TOS 资源没有验证，应避免创建该 key。\n\n## 恢复与关键路径\n\n`recovery.md` 是文档工作和代码理解的恢复入口。它记录旧版 `docs/comprehensive/` 到当前分类目录的迁移映射，并提供关键路径速查。\n\n核心运行时代码入口包括：\n\n| 功能 | 路径 |\n|---|---|\n| RPC 入口 | `main.go` |\n| Handler 层 | `handler/handler.go` |\n| 核心 CRUD | `fuxi/core/service/service.go` |\n| TTL 处理 | `fuxi/core/service/ttl.go` |\n| VideoDelete 检查 | `fuxi/core/service/checker.go` |\n| MetaStorage 接口 | `fuxi/core/iface/iface.go` |\n| 元数据封装 | `fuxi/core/service/meta/meta.go` |\n| 事件发布 | `rocketmq/event.go` |\n| 动态配置 key | `fuxi/core/config/keys.go` |\n\nAdmin 相关入口包括 `fuxi/fuxi_admin/main.go`、`router.go`、`biz/handler/*Handler.go` 和 `dal/*_dal.go`。外部客户端入口包括 `fuxi/client/admin/admin.go`、`fuxi/client/oda/oda.go`、`fuxi/client/vda/video_data_access.go` 等。\n\n这份恢复文档不是运行时规范，而是维护者在会话中断、目录迁移、代码变更或新成员接手时的定位工具。新增 API、存储逻辑、业务流程、Schema 管理、配置、构建流程或 GSI 行为时，应按文档中的维护表同步更新对应文档。\n\n## 与代码库的连接方式\n\n运维模块通过路径引用连接代码和平台配置，不参与编译，也不导出函数或类。它的准确性依赖以下事实源：\n\n- 构建事实来自 `build.sh`、`script/bootstrap.sh`、`kitex_info.yaml`。\n- CI 和覆盖率事实来自 `.codebase/pipelines/ci.yaml`、`.codebase/apps.yaml`。\n- 远程 UT 策略来自 `script/run_remote_ut.sh` 和项目级协作规则。\n- 文档检查事实来自 `script/doc-init-check.sh`、`.githooks/pre-commit`、`script/install-doc-init-hook.sh`。\n- 新联邦初始化事实来自 `fuxi_admin`、ODA、Compound 的 TCC key、RDS 表结构和 TCE 部署依赖。\n- GSI 运维事实来自 `fuxi/core/service/idx/` 下的 README、复合操作 SOP、不变式文档和 reconcile 文档。\n\n因此，修改构建脚本、启动参数、CI 模板、TCC key、Admin 表结构、ODA 集群映射、Compound event 初始化或 `idx` 包复合操作时，都需要检查 `docs/operations/` 是否仍然准确。","other-overview":"# Other — overview\n\n## Other — overview 模块\n\n`docs/overview/` 是 Compound 文档体系的项目级入口层，用来回答“这个仓库是什么、有哪些边界、哪些规则不能破、术语如何统一”。它不是运行时代码模块，因此没有内部调用、外部调用或执行流；它的作用是约束和导航代码贡献，而不是参与服务请求处理。\n\n该模块由四类文档组成：\n\n| 文件 | 职责 |\n|---|---|\n| `project.md` | 项目总览：Compound 定位、双服务组成、技术栈、模块清单、关键不变式 |\n| `project-detailed.md` | 深度项目说明：服务入口、目录结构、核心概念、外部依赖 |\n| `constitution.md` | 项目宪法：治理原则、红线、审批规则、扩展制品 |\n| `glossary.md` | 术语表：业务术语、GSI 术语、技术术语、错误码、外部服务、缩略语 |\n\n## 模块定位\n\n`docs/overview/` 位于文档体系的最上层，负责建立全仓库共享上下文。开发者进入 Compound 时，应先通过这里理解：\n\n1. Compound 是 VideoArch 的通用元数据管理服务。\n2. 仓库由 RPC 主服务和 Admin HTTP 服务组成。\n3. 元数据读写围绕 `MetaStorage` 抽象、Schema 绑定、版本冲突、事件发布和文件生命周期展开。\n4. `fuxi/core/service/idx/` 是高风险 GSI 索引包，修改前有显式 Review 和文档同步要求。\n5. Living spec、archive、ADR、远程 UT 等流程有项目级约束。\n\n## 文档之间的关系\n\n```mermaid\ngraph TD\n  A[overview 总入口] --> B[project.md 项目总览]\n  A --> C[project-detailed.md 深度说明]\n  A --> D[constitution.md 项目红线]\n  A --> E[glossary.md 统一术语]\n\n  B --> F[architecture 架构文档]\n  D --> G[specs / changes / archive 流程]\n  E --> H[代码与专题文档命名]\n```\n\n`project.md` 给出快速入口，适合贡献前建立全局视图；`project-detailed.md` 适合第一次深入阅读仓库结构；`constitution.md` 是修改代码和文档时必须遵守的项目规则；`glossary.md` 保证文档、代码注释、评审讨论使用同一套词汇。\n\n## 与代码库的连接\n\n`project.md` 和 `project-detailed.md` 将文档入口映射到实际代码路径：\n\n- RPC 主服务入口是 `main.go`，服务名为 `bytedance.videoarch.compound`，使用 Kitex 和 Thrift。\n- Admin HTTP 服务入口是 `fuxi/fuxi_admin/main.go`，服务名为 `bytedance.videoarch.fuxi_admin`，使用 Hertz。\n- RPC 请求处理层在 `handler/`，核心实现由 `CompoundServiceImpl` 承接。\n- 业务编排层在 `fuxi/core/service/`，覆盖 CRUD、TTL、索引更新等流程。\n- 元数据存储抽象在 `fuxi/core/iface/`，核心接口是 `MetaStorage`。\n- 存储语义层在 `fuxi/core/service/meta/`。\n- GSI 索引引擎在 `fuxi/core/service/idx/`，受 `constitution.md` 的 idx 专项红线约束。\n- 文件操作在 `fuxi/core/storage/`，对接 Terminator 和 StorageGW。\n- 事件发布在 `rocketmq/`，超大事件使用 TOS spillover 模式。\n- 外部依赖客户端集中在 `fuxi/client/`，包括 `admin`、`oda`、`vda`、`abase`、`postpone`、`video_delete` 等。\n\n这些路径不是单纯目录说明，而是开发者判断影响面的入口。例如修改 `MetaStorage` 语义时，需要同时检查 `UpdateWrapper`、`QueryFilter`、版本冲突文档以及各存储实现；修改 `idx` 复合操作时，还必须同步对应 `archive/docs/compound-ops/<op>.md`。\n\n## 项目级不变式\n\n`constitution.md` 定义了贡献时必须维护的不变式：\n\n- Living spec 是行为契约真理来源，路径为 `docs/specs/<capability>/spec.md`。\n- Requirement 必须使用 EARS 句式，Scenario 必须挂覆盖测试路径。\n- 涉及 `fuxi/core/service/idx/` 的逻辑变更必须先文档后代码。\n- `docs/archive/` 归档后不可修改，只能通过新增补丁文件补充。\n- 业务逻辑变更必须优先跑远程 UT：`bash script/run_remote_ut.sh` 或其子集。\n- ADR 编号必须严格递增，不跳号、不复用。\n- `docs/` 顶层不允许散落普通 `.md`，README 和 AGENTS 除外。\n\n其中最容易影响日常开发的是 idx 包红线：修改 `fuxi/core/service/idx/` 下任何 `.go` 文件前，需要向用户呈现变更摘要、影响面、风险、文档清单和实现路径，并获得明确放行。纯测试改写、函数签名不变的 import 调整、typo 修复，以及用户明确授权跳过时才可豁免。\n\n## 术语约定\n\n`glossary.md` 是跨代码和文档的命名基准。贡献文档或注释时，应优先使用其中已有术语：\n\n- 业务对象使用 `Space`、`Account`、`Object`、`OID`、`VID`。\n- Schema 相关内容使用 `Schema`、TTL 属性、FILE 属性。\n- GSI 相关内容使用 `Idx`、`Idx Snapshot`、`Bucket`、`Active Bucket`、`Sealed Bucket`、`Compound Op`、`Reconcile Task`。\n- 存储抽象使用 `MetaStorage`、`UpdateWrapper`、`QueryFilter`。\n- 并发错误使用 `iface.WrongVersion`、`iface.ErrTxnConflict`、`iface.ErrConsistentTxnFailed`。\n- 删除链路中的早退标志使用 `executed`。\n\n如果引入新概念，应先在 `glossary.md` 注册，再在专题文档或代码注释中展开，避免同一概念出现多个命名。\n\n## 阅读路径\n\n新开发者建议按以下顺序阅读：\n\n1. `docs/overview/project.md`：建立项目定位、服务组成和模块清单。\n2. `docs/overview/glossary.md`：熟悉核心术语，尤其是 Object、Schema、MetaStorage、Idx、Bucket。\n3. `docs/overview/constitution.md`：理解红线和审批规则。\n4. `docs/architecture/README.md`：进入架构专题。\n5. `docs/specs/`：查看具体 capability 的 living spec。\n6. 涉及 idx 包时，再阅读 `docs/architecture/modules/gsi.md` 和 `fuxi/core/service/idx/archive/docs/compound-ops/` 下对应操作文档。\n\n## 维护要求\n\n更新 `docs/overview/` 时，应保证它仍然只承担“入口、约束、术语”职责。详细设计应放到 `docs/architecture/`，行为契约应放到 `docs/specs/`，进行中变更应放到 `docs/changes/`，归档历史应放到 `docs/archive/`。\n\n当代码入口、服务端口、技术栈、模块职责、错误码或关键不变式变化时，需要同步检查 `project.md`、`project-detailed.md`、`constitution.md` 和 `glossary.md`。对于 idx 包相关变更，还要额外检查对应 compound-op 文档，确保代码、专题说明和项目红线保持一致。","other-pipeline-meta-json":"# Other — pipeline_meta.json\n\n## 模块定位\n\n`pipeline_meta.json` 是一个轻量级元数据文件，用于声明当前模块或任务关联的 CI 流水线配置与具体作业标识。它本身不包含可执行逻辑，也不会在运行时发起函数调用；它的作用是为代码库中的自动化系统提供定位信息。\n\n```json\n{\n  \"pipeline_file\": \".codebase/pipelines/ci.yaml\",\n  \"job_id\": \"unit_testing\"\n}\n```\n\n## 字段说明\n\n`pipeline_file` 指向实际的流水线定义文件：\n\n```json\n\"pipeline_file\": \".codebase/pipelines/ci.yaml\"\n```\n\n该路径表示 CI 配置位于仓库内的 `.codebase/pipelines/ci.yaml`。消费该元数据的工具可以通过这个字段找到完整的流水线定义。\n\n`job_id` 指定流水线中的目标作业：\n\n```json\n\"job_id\": \"unit_testing\"\n```\n\n当前值 `unit_testing` 表示该元数据关联的是单元测试作业。具体作业行为应以 `.codebase/pipelines/ci.yaml` 中对应的 `unit_testing` 配置为准。\n\n## 工作方式\n\n该文件通常不会被业务代码直接引用，也不参与应用运行流程。它更像是一个索引文件：\n\n1. 自动化工具读取 `pipeline_meta.json`。\n2. 根据 `pipeline_file` 找到 CI 流水线文件。\n3. 根据 `job_id` 定位流水线中的具体作业。\n4. 后续执行、展示或分析逻辑由外部工具完成。\n\n由于文件中没有函数、类或脚本入口，调用图中没有内部调用、外部调用或入口调用是符合预期的。\n\n## 与代码库的关系\n\n`pipeline_meta.json` 将当前上下文绑定到 `.codebase/pipelines/ci.yaml` 中的 `unit_testing` 作业。它不定义测试命令，也不描述测试策略；这些细节应维护在实际流水线文件中。\n\n修改该文件时需要保持两个字段与流水线配置一致：\n\n- `pipeline_file` 必须指向存在的流水线配置文件。\n- `job_id` 必须匹配该流水线文件中真实存在的作业标识。\n\n如果重命名或迁移 `.codebase/pipelines/ci.yaml` 中的作业，需要同步更新 `job_id`，否则依赖该元数据的工具可能无法定位目标 CI 作业。","other-readme-md":"# Other — README.md\n\n## 模块概览\n\n`README.md` 是 Compound 仓库的根入口说明文件，用于快速说明项目身份、技术栈和主要文档入口。它不包含 Go 代码、函数、类、运行逻辑或构建脚本，因此没有内部调用、外部调用或执行流。\n\n该文件的核心作用是让首次进入仓库的开发者快速确认：\n\n- 项目名称：`Compound`\n- 项目定位：视频架构元数据管理服务\n- 主要技术栈：Go 1.23、Kitex、Hertz\n- Go 模块路径：`code.byted.org/videoarch/compound`\n- 后续应阅读的权威文档入口\n\n## 文件内容结构\n\n`README.md` 当前由一个标题、一句项目描述和一组项目元信息组成：\n\n```md\n# Compound\n\n视频架构元数据管理服务。\n```\n\n这部分定义了仓库的最小项目身份。它没有展开业务模型、服务边界或部署方式，只承担“根目录识别牌”的职责。\n\n随后列出项目开发中最常用的入口：\n\n```md\n- 语言：Go 1.23\n- RPC：Kitex；HTTP：Hertz\n- 模块路径：`code.byted.org/videoarch/compound`\n- 主文档入口：[`docs/README.md`](./docs/README.md)\n- AI 协议入口：[`CLAUDE.md`](./CLAUDE.md)\n- 项目级文档规约：[`docs/AGENTS.md`](./docs/AGENTS.md)\n```\n\n这些条目把根 README 与更详细的项目文档、Agent 协作规范和文档写作规范连接起来。\n\n## 与代码库的关系\n\n`README.md` 本身不参与编译、测试、运行或依赖解析。它与代码库的连接主要是文档导航关系：\n\n```mermaid\nflowchart TD\n  根说明[\"README.md<br/>仓库入口\"]\n  主文档[\"docs/README.md<br/>主文档入口\"]\n  协作协议[\"CLAUDE.md<br/>Agent 协作配置\"]\n  文档规约[\"docs/AGENTS.md<br/>项目级文档规约\"]\n  模块路径[\"code.byted.org/videoarch/compound<br/>Go 模块路径\"]\n\n  根说明 --> 主文档\n  根说明 --> 协作协议\n  根说明 --> 文档规约\n  根说明 --> 模块路径\n```\n\n开发者通常从 `README.md` 开始，再根据任务类型跳转：\n\n- 理解项目整体文档：阅读 `docs/README.md`\n- 查看 AI Agent 协作、提交、测试、专项约束：阅读 `CLAUDE.md`\n- 修改或新增 `docs/` 下文档：阅读 `docs/AGENTS.md`\n\n## 维护原则\n\n修改 `README.md` 时应保持它的入口性质，避免把详细设计、接口说明或运行手册直接堆入根 README。更合适的做法是：\n\n- 根 README 保持简短，只放稳定的项目元信息和权威入口。\n- 详细文档放入 `docs/`，并从 `docs/README.md` 组织导航。\n- Agent、测试、提交、专项开发规则继续由 `CLAUDE.md` 维护。\n- 文档写作规范继续由 `docs/AGENTS.md` 维护。\n\n由于该文件是开发者进入仓库后最先看到的页面，新增内容应优先回答“这个仓库是什么、用什么技术、下一步去哪看”，而不是替代下游文档。","other-research":"# Other — research\n\n## 模块定位\n\n`docs/research` 是 Compound 的技术调研与方案推导模块，内容以 Markdown 研究文档为主，不包含可执行函数、类或运行时调用链。它的作用是把外部数据库实现经验转化为 Compound 内部 GSI、索引查询、视图、物化视图与 Posting List 存储设计的事实依据。\n\n该模块回答的不是“代码如何运行”，而是“为什么后续方案应该这样设计”。因此它的执行流表现为文档之间的推导关系：横向调研先建立事实底座，综合分析再收敛到 Compound 约束，专项方案最后进入工程细化。\n\n## 文档结构\n\n```mermaid\nflowchart TD\n  A[分布式数据库 GSI 与视图横向对比]\n  B[索引与查询能力横向对比]\n  C[视图实现横向对比]\n  D[Compound GSI 设计分析]\n  E[GSI Posting List 合并方案]\n\n  A --> D\n  B --> D\n  C --> D\n  D --> E\n```\n\n## 核心文档\n\n### `distributed-db-gsi-comparison.md`\n\n该文档是 GSI 与视图能力的总览型横向对比，覆盖 CockroachDB、YugabyteDB、TiDB、OceanBase、PolarDB-X、DuckDB 与 PostgreSQL。\n\n它围绕以下问题组织调研：\n\n- 索引存储在哪里：嵌入式 KV、索引即表、独立文件索引或进程内 ART。\n- Online DDL 如何生效：例如 CockroachDB 的 `BACKFILLING → DELETE_ONLY → MERGING → WRITE_ONLY → PUBLIC`，TiDB 的 `None → DeleteOnly → WriteOnly → WriteReorg → Public`。\n- DML 如何维护索引：主表与索引是否同事务提交，唯一索引如何冲突检测。\n- 查询如何使用索引：覆盖索引、回表、分片裁剪、CBO 选路。\n- 逻辑视图和物化视图如何落地：SQL 文本、查询树、普通表复用、全量刷新或增量刷新。\n\n这篇文档提供全局能力版图，是后续设计判断的主要事实来源。\n\n### `distributed-db-index-query-capabilities.md`\n\n该文档专门分析“索引最终能支持哪些查询能力”。它从存储结构、索引类型、复合索引、范围查询、编码有序性、覆盖索引、优化器与多索引合并等角度比较多个系统。\n\n关键结论包括：\n\n- 保序编码是范围查询、排序优化和复合索引能力的基础。\n- PostgreSQL 的 Index AM、Bitmap Index Scan、BRIN、Partial Index、Expression Index 是重要参考。\n- TiDB 全局索引不支持覆盖列，是能力边界示例。\n- DuckDB 的 ART 索引主要服务点查和约束校验，OLAP 主路径仍是向量化扫描。\n- NoSQL 索引能力明显弱于 SQL 数据库，尤其在复合索引、排序优化和 CBO 方面。\n\n该文档是 `gsi-design-analysis-for-compound.md` 中“索引提供什么能力”章节的上游依据。\n\n### `distributed-db-view-comparison.md`\n\n该文档聚焦视图实现，覆盖逻辑视图、物化视图、刷新策略、依赖追踪、权限模型、嵌套视图、循环检测和可更新视图。\n\n它比较了几类典型路线：\n\n- PostgreSQL / YugabyteDB：基于 `pg_rewrite` 和 `pg_depend` 的 rewrite-rule 体系。\n- CockroachDB / TiDB：存储标准化 SQL 字符串，查询时重新展开。\n- PolarDB-X：`DrdsViewExpander` 支持虚拟视图、预编译计划、独立优化、联合优化四条路径。\n- OceanBase：物化视图能力最完整，支持 MLOG、增量刷新、Fast LSM MV、依赖拓扑排序。\n- ScyllaDB：二级索引与物化视图共享写路径，体现“索引即视图”的设计。\n\n这篇文档为 Compound 是否复用视图能力实现部分索引、物化视图和派生数据结构提供参考。\n\n### `gsi-design-analysis-for-compound.md`\n\n该文档是研究模块中最接近 Compound 方案决策的综合分析文档。它不再按数据库逐个比较，而是围绕 Compound 的设计问题组织结论：\n\n- 索引存储介质及与原存储的关系。\n- 常态写入、Online DDL、Backfill 与故障恢复的一致性保障。\n- 索引应支持的查询能力。\n- 索引 key/value 的组织形式。\n- 部分索引与视图能力是否可以复用。\n\n文档给出的核心建议包括：\n\n- 采用“索引即表”模型，为索引建立独立 Bytedoc Collection 或独立 Abase 命名空间。\n- 索引元数据存储在 Admin MySQL，例如 `index_definitions`。\n- 主表与索引写入应尽量保持强一致。\n- 非唯一索引 key 追加主键或 object_id，保证索引条目唯一。\n- 范围查询要求保序编码。\n- 部分索引可以复用 Compound 现有 Expression / Filter 体系。\n- Online DDL 至少需要类似 `DeleteOnly → WriteOnly → WriteReorg → Public` 的状态机。\n\n这是后续 GSI 工程实现最重要的设计入口。\n\n### `gsi-value-merge-design.md`\n\n该文档是 GSI 工程细化后的专项方案，讨论低基数索引键下是否应把多个 `object_id` 合并成 Posting List / Bucket。\n\n它先解释为什么主流 OLTP GSI 通常不做 value 合并：\n\n- 单行写入会从 O(1) 变成 read-modify-write。\n- 热点索引键会导致锁竞争。\n- 大 value 会放大 B-Tree / LSM-Tree 页分裂和 compaction 成本。\n- MVCC 下每次修改大数组会产生巨大版本链。\n\n然后结合 Compound 的特点重新评估：\n\n- Compound 更偏读多写少。\n- Bytedoc 是 MongoDB 兼容存储，支持数组原子操作。\n- 低基数字段如 `status`、`type` 可能产生海量重复索引键。\n- RPC 访问存储时，减少网络操作次数比单机数据库内部 I/O 优化更关键。\n\n文档推荐的近期方案是 MongoDB 分桶模式：\n\n- 每个桶文档存储同一 `idx + key` 下的一批 `oids`。\n- 使用 `min_ver` / `max_ver` 形成连续版本区间。\n- 新写入优先落到尾部活跃桶。\n- 桶满后在事务中封旧桶并创建新桶。\n- 唯一索引不参与分桶，继续使用一对一文档。\n- 覆盖列通过 `cov` 字段按 `oid` 存储。\n\n该文档承接 `gsi-design-analysis-for-compound.md`，把“索引即表”进一步细化为低基数场景下的存储优化方案。\n\n## 推导方式\n\n该模块的文档遵循一致的研究路径：\n\n1. 冻结外部数据库版本或源码提交，避免混用不同版本行为。\n2. 从存储模型、DDL 状态、DML 路径、查询路径、回填、事务、视图或物化视图等维度拆解事实。\n3. 用横向表格归纳不同系统的共同模式和特例。\n4. 抽取对 Compound 真正有约束力的结论。\n5. 在综合设计文档中转化为推荐方案、状态机、元数据结构或数据模型。\n\n由于该模块没有运行时代码，`Internal calls`、`Outgoing calls`、`Incoming calls` 均为空；文档之间的引用关系就是主要“调用图”。\n\n## 与代码库其他部分的关系\n\n`docs/research` 不直接被业务代码调用，但它约束和解释后续实现方向：\n\n- GSI 元数据设计应参考 `gsi-design-analysis-for-compound.md` 中的 `index_definitions` 结构。\n- 索引写路径需要对齐该文档提出的主表写入、索引维护、状态感知 DML、回填幂等策略。\n- 低基数索引优化应参考 `gsi-value-merge-design.md` 的 `merge_mode`、bucket 文档结构和版本区间路由。\n- 视图、物化视图或部分索引能力设计应回看 `distributed-db-view-comparison.md` 和 `distributed-db-gsi-comparison.md`。\n- 查询优化、覆盖索引、范围查询和复合索引能力边界应回看 `distributed-db-index-query-capabilities.md`。\n\n## 维护注意事项\n\n新增研究文档应保持可追溯性：明确调研范围、版本或 commit、结论来源、验证方式和变更历史。已有文档使用“概述 / 架构设计 / 实现细节 / 测试验证 / 相关 Commit / 变更历史”的统一模板，新增文档应延续这一结构。\n\n修改结论型文档时，需要同时检查上游横向调研是否支持该结论。例如修改 `gsi-design-analysis-for-compound.md` 中的 GSI 存储建议时，应同步核对 `distributed-db-gsi-comparison.md` 和 `distributed-db-index-query-capabilities.md`；修改分桶或 Posting List 方案时，应确认它仍兼容 GSI 状态机、回填和唯一索引约束。","other-rocketmq":"# Other — rocketmq\n\n## 模块职责\n\n`rocketmq` 模块负责把 `compound.Event` 变更事件发送到 RocketMQ，并在发送前完成两类关键处理：\n\n1. **大消息分级卸载到 TOS**：当事件序列化后超过 `cfg.TOS.SizeInKB` 阈值时，`sendChangeEvent` 会把完整事件写入 `storage`，MQ 消息只保留必要元信息和 `URI`。\n2. **同步目标探测**：`QuickSent` 在调用方未显式设置 `Event.Syncs` 时，会通过 `detectSyncs` 判断本次变更是否影响 GSI，并填充 `compound.SyncTarget_GSI`。\n\n核心输入类型是 `kitex_gen/bytedance/videoarch/compound.Event`。事件中的 `Created`、`Updated`、`Deleted` 表示对象属性级别的新增、更新、删除变更；`IdxSnapshot` 保存索引相关字段快照；`Syncs` 表示下游同步目标。\n\n## 发送流程\n\n```mermaid\nflowchart TD\n    A[\"调用 QuickSent\"] --> B{\"Event.Syncs 已设置？\"}\n    B -- \"否\" --> C[\"detectSyncs 探测 GSI\"]\n    B -- \"是\" --> D[\"保留调用方 Syncs\"]\n    C --> E[\"sendChangeEvent\"]\n    D --> E\n    E --> F{\"消息是否超出 cfg.TOS.SizeInKB？\"}\n    F -- \"否\" --> G[\"完整事件进入 MQ\"]\n    F -- \"是\" --> H[\"完整事件写入 storage\"]\n    H --> I[\"MQ 消息保留 URI 和轻量字段\"]\n```\n\n`QuickSent(context.Context, compound.Event)` 是发送入口。它不会覆盖调用方已经设置的字段：\n\n- 如果 `Event.Syncs` 已有值，`QuickSent` 直接保留，不调用 `admin.GetIdxCfg` 做探测。\n- 如果 `Event.IdxSnapshot` 已有值，`QuickSent` 不会修改该快照。\n- 如果 `Event.Syncs` 为空，`QuickSent` 调用 `detectSyncs` 根据变更路径和索引配置推导同步目标。\n\n底层发送由 `sendChangeEvent(context.Context, compound.Event)` 完成。测试中通过 `Mock(t)`、`Demock(t)` 和 `PopRecords()` 验证发送结果，说明模块支持测试态拦截 RocketMQ 发送记录。\n\n## TOS 分级卸载\n\n`sendChangeEvent` 会根据序列化后的事件大小决定是否直接发送 MQ，阈值来自 `cfg.TOS.SizeInKB`。\n\n小消息路径：\n\n- `Event.URI` 为空。\n- `Created`、`Updated`、`Deleted` 原样保留在 MQ 消息中。\n- `IdxSnapshot` 原样保留。\n\n大消息路径：\n\n- 完整事件写入 `storage`，MQ 消息中的 `URI` 指向该对象。\n- MQ 消息中的 `Created`、`Updated`、`Deleted` 会被清空，避免 RocketMQ 消息过大。\n- 消费方可通过 `storage.Get(comm.Ctx(), *event.URI)` 读取完整事件并反序列化。\n\n`IdxSnapshot` 在 TOS 路径中有额外的保留策略：\n\n- 如果去掉 `Created`、`Updated`、`Deleted` 后，MQ 消息已经足够小，则 `IdxSnapshot` 继续保留在 MQ 消息里。\n- 如果 `IdxSnapshot` 本身也很大，导致轻量 MQ 消息仍超过阈值，则 MQ 消息中的 `IdxSnapshot` 会被移除。\n- 无论 MQ 消息是否保留 `IdxSnapshot`，写入 TOS 的完整事件都会包含原始 `IdxSnapshot`。\n\n这使下游在常见场景下可以直接从 MQ 消息拿到索引快照，同时仍能通过 `URI` 获取完整事件。\n\n## 二进制内容编码\n\n`sendChangeEvent` 在序列化前会处理变更值中的非安全字符串内容。测试通过 `mockBeforeSerialize = true` 触发该路径，并在收到消息后根据 `IsBase64` 还原：\n\n- `compound.Created` 使用 `Created.Val` 和 `Created.IsBase64`。\n- `compound.Updated` 使用 `Updated.Before`、`Updated.After` 和 `Updated.IsBase64`。\n- `compound.Deleted` 使用 `Deleted.Val` 和 `Deleted.IsBase64`。\n\n测试辅助函数 `decode(t, input)` 使用 `base64.StdEncoding.DecodeString` 还原内容。还原后，事件应与发送前的 `compound.Event` 完全一致。\n\n## 同步目标探测\n\n`detectSyncs(context.Context, *compound.Event)` 根据事件变更路径判断是否需要同步 GSI。它依赖 `admin.GetIdxCfg(ctx, space, schema)` 获取当前 `Space` 和 `Schema` 的索引配置，配置类型为 `entity.IdxCfg`。\n\n探测规则：\n\n- `event == nil` 时返回 `nil`。\n- `Space` 或 `Schema` 为空时返回 `nil`，且不会调用 `admin.GetIdxCfg`。\n- 没有索引配置时返回 `nil`。\n- 没有任何有效变更路径时返回空结果。\n- 任意 `Created.Path`、`Updated.Path`、`Deleted.Path` 命中任一索引列时，返回 `[]compound.SyncTarget{compound.SyncTarget_GSI}`。\n- 唯一索引 `IdxCfg.IsUniq == true` 也按 GSI 命中处理。\n- 复合索引只要命中其中一列，就视为需要同步 GSI。\n- `Created`、`Updated`、`Deleted` 切片中允许出现 `nil` entry，探测时会跳过，不应 panic。\n\n典型索引配置形态：\n\n```go\nentity.IdxCfg{\n    Name:    \"country_idx\",\n    Space:   \"default\",\n    Schema:  \"schema_test\",\n    Columns: []string{\"$.UserCountry\", \"$.IsPrivate\"},\n}\n```\n\n当事件变更 `$.UserCountry` 或 `$.IsPrivate` 时，`detectSyncs` 会返回 `compound.SyncTarget_GSI`。\n\n## 通配数组索引匹配\n\n`detectSyncs` 支持索引列中的数组通配路径。测试覆盖的模式是：\n\n```go\nentity.IdxCfg{\n    Name:    \"tag_idx\",\n    Space:   \"default\",\n    Schema:  \"schema_test\",\n    Columns: []string{\"$.tags[*]\"},\n}\n```\n\n以下变更路径都会命中 `$.tags[*]`：\n\n- `$.tags[0]`\n- `$.tags[1]`\n- `$.tags[2]`\n\n非匹配路径，例如 `$.title`，不会命中该通配索引。\n\n复合通配索引中的普通列也会独立命中。例如索引列为 `[]string{\"$.tags[*]\", \"$.status\"}` 时，单独更新 `$.status` 也会触发 `compound.SyncTarget_GSI`。\n\n## 与其他模块的关系\n\n`rocketmq` 模块处在事件生产链路的边界位置，连接变更事件、索引配置、对象存储和 MQ 发送：\n\n- `compound.Event` 来自 `kitex_gen/bytedance/videoarch/compound`，是模块处理和发送的核心数据结构。\n- `admin.GetIdxCfg` 来自 `fuxi/client/admin`，用于读取 schema 的 GSI/唯一索引配置。\n- `entity.IdxCfg` 来自 `fuxi/core/consts/entity`，描述索引名称、空间、schema、索引列和唯一索引标记。\n- `storage.Get` 来自 `fuxi/core/storage`，用于读取 TOS 分级卸载后的完整事件。\n- `comm.Ctx()` 提供读取 storage 时使用的上下文。\n- 测试断言使用 `utils/ast` 和 `testify/require`，mock 使用 `mockey`。\n\n## 开发注意事项\n\n修改 `sendChangeEvent` 时，需要同时保证三件事：\n\n- 小消息不能丢失 `Created`、`Updated`、`Deleted`、`IdxSnapshot`。\n- 大消息写入 TOS 的完整事件必须可通过 `URI` 还原。\n- TOS 路径下 MQ 消息应尽可能保留轻量但有价值的 `IdxSnapshot`，只有在它本身过大时才移除。\n\n修改 `detectSyncs` 时，需要重点保护这些边界行为：\n\n- 空 `Space` 或空 `Schema` 不应查询 `admin.GetIdxCfg`。\n- `Created`、`Updated`、`Deleted` 中的 `nil` entry 必须安全跳过。\n- 复合索引的任意列命中都应触发 GSI 同步。\n- `$.tags[*]` 这类通配列需要匹配具体数组下标路径。\n- 调用方已经设置 `Event.Syncs` 时，`QuickSent` 不应重新探测或覆盖。","other-script":"# Other — script\n\n## script 模块\n\n`script/` 目录放置仓库级辅助脚本，主要覆盖三类场景：服务启动、文档规约检查、远程单测执行。该模块没有被代码内其它模块直接调用；脚本都是面向开发、CI、部署或本地 Git 工作流的独立入口。\n\n```mermaid\nflowchart LR\n  A[开发者或 CI] --> B[doc-init-check.sh]\n  A --> C[install-doc-init-hook.sh]\n  A --> D[
