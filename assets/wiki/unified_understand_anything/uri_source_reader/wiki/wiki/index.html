var PAGES = {"application-entry-point":"# Application Entry Point\n\n## 模块概览\n\n`main.go` 是 Lambda 应用入口，负责把外部事件 `Input` 转成一次可执行的读取任务。它本身不解析 Parquet 或 CSV，也不直接写入最终存储；它的职责是参数校验、默认值填充、控制面上报初始化、数据源路由和 sink 构造。\n\n模块支持两类数据源：\n\n- `SourceTypeHDFSParquet`：读取 HDFS Parquet 文件，入口为 `hdfsparquet.Run`\n- `SourceTypeTOSInventoryCSV`：读取 TOS Inventory CSV 文件，入口为 `tosinventorycsv.Run`\n\n处理结果统一返回 `Output{JobID: cfg.JobID}`。\n\n```mermaid\nflowchart TD\n    A[\"Lambda 事件 Input\"] --> B[\"handler\"]\n    B --> C[\"Input.Normalize\"]\n    C --> D[\"创建 Tracker / Client / Reporter\"]\n    D --> E{\"SourceType\"}\n    E -->|hdfs_parquet| F[\"newSink\"]\n    F --> G[\"hdfsparquet.Run\"]\n    E -->|tos_inventory_csv| H[\"newSink\"]\n    H --> I[\"newTOSInventoryCSVConfig\"]\n    I --> J[\"tosinventorycsv.Run\"]\n    G --> K[\"最终进度上报\"]\n    J --> K\n```\n\n## 启动入口\n\n`main()` 只做一件事：\n\n```go\nfunc main() {\n\tlambda.Start(handler)\n}\n```\n\n`lambda.Start` 将 `handler(ctx context.Context, in Input)` 注册为 Lambda 事件处理函数。所有运行时行为都从 `handler` 开始。\n\n## 输入模型\n\n`Input` 是 Lambda 事件 payload。它包含任务级信息、数据源配置、分桶配置、并发限制、sink 配置和控制面配置。\n\n关键字段：\n\n- `JobID`：任务标识，用于追踪、幂等和输出命名；`Normalize()` 要求必填。\n- `SourceType`：决定执行 `hdfsparquet.Run` 还是 `tosinventorycsv.Run`。\n- `HDFSParquet`：当 `source_type == \"hdfs_parquet\"` 时必填。\n- `TOSInventoryCSV`：当 `source_type == \"tos_inventory_csv\"` 时必填。\n- `Bucketing`：控制 `store_uri` 到 bucket id 的映射。\n- `Limits`：控制 reader、sink 和批处理并发。\n- `Sink`：选择 `bucket_file` 或 `writer_rpc`。\n- `ControlPlane`：控制心跳和进度上报。\n\n`BucketingInput.Config()` 将入口层配置转换为 `internal/bucketing.Config`，供 reader 模块使用：\n\n```go\nfunc (in BucketingInput) Config() sharedbucketing.Config\n```\n\n## 参数归一化与校验\n\n`Input.Normalize()` 是入口层最重要的防线。它会校验必填字段、拒绝不支持的枚举值，并填充默认值。注意它会修改接收者；`handler` 先复制输入：\n\n```go\ncfg := in\nif err = cfg.Normalize(); err != nil {\n\treturn Output{}, err\n}\n```\n\n分桶规则：\n\n- `bucketing.num_buckets` 必须大于 0。\n- `bucketing.hash_alg` 为空时默认 `HashAlgHive`。\n- `HashAlgSpark` 未设置 `spark_seed` 时默认 `42`。\n- 其他 hash 算法会返回错误。\n\n限制参数：\n\n- `ReaderWorkers`\n- `SinkWorkers`\n- `ParquetParallelism`\n- `BatchRows`\n\n以上字段不能小于 0。值为 0 通常表示交给下游模块使用默认行为。\n\nHDFS Parquet 校验：\n\n- `HDFSParquet` 必须存在。\n- `store_uri_field` 必填。\n- `file_paths` 和 `root_path` 至少提供一个。\n- `format_field` 为空时默认 `\"format\"`。\n- `create_timestamp_field` 为空时默认 `\"created_at\"`。\n- 当 `sink.type == \"writer_rpc\"` 时，`sink.redis.cluster` 必填。\n\nTOS Inventory CSV 校验：\n\n- `TOSInventoryCSV` 必须存在。\n- `csv_uris` 必须非空。\n- 如果没有 `store_uri_column`，则必须提供 `key_column` 和 `bucket`，用于构造 `store_uri`。\n- `csv_format.compression` 为空时默认 `\"none\"`。\n- `create_timestamp_column` 和 `create_time_str_column` 不能同时设置。\n- `task_type` 只支持空字符串或 `tosinventorycsv.TaskTypeManifestExpand`。\n- 当 `task_type == \"manifest_expand\"` 时，`content_type_column` 必填。\n\n控制面默认值：\n\n- `ControlPlane` 为空时会创建空配置。\n- `PSM` 默认 `\"bytedance.videoarch.uri_task_control_panel\"`。\n- `Cluster` 默认 `\"default\"`。\n- `HeartbeatIntervalSec` 默认 `30`。\n- `ProgressReportIntervalSec` 默认 `30`。\n\n## handler 执行流程\n\n`handler` 是一次任务的编排器，流程如下：\n\n1. 复制并归一化 `Input`。\n2. 基于 Lambda `ctx` 创建 `runCtx`，用于向 reader 和 reporter 传播取消信号。\n3. 调用 `resolveReaderID(ctx, cfg)` 生成 reader 标识。\n4. 创建 `controlplane.Tracker`，记录 job、reader、source type 和本机 IP。\n5. 通过 `controlplane.NewClient` 创建控制面客户端。\n6. 创建并启动 `controlplane.Reporter`。\n7. 根据 `SourceType` 构造 sink，并调用对应 reader。\n8. 任务结束时设置 worker 状态并刷新最终进度。\n\n最终状态由 deferred closure 统一处理：\n\n```go\ndefer func() {\n\tif err != nil {\n\t\ttracker.SetWorkerStatus(controlplane.WorkerStateFailed, err.Error())\n\t} else {\n\t\ttracker.SetWorkerStatus(controlplane.WorkerStateDone, \"\")\n\t}\n\tflushCtx, flushCancel := context.WithTimeout(context.Background(), 3*time.Second)\n\tdefer flushCancel()\n\t_ = reporter.FlushFinalProgress(flushCtx)\n}()\n```\n\n这意味着 reader 或 sink 返回错误时，`handler` 会把状态标为 `WorkerStateFailed`；正常完成时标为 `WorkerStateDone`。最终进度刷新最多等待 3 秒。\n\n## 控制面与进度上报\n\n入口层把 `controlplane.Tracker` 同时作为内部进度观察者使用：\n\n```go\nvar progress progressObserver\nprogress = tracker\n```\n\n`progressObserver` 是本模块定义的小接口：\n\n```go\ntype progressObserver interface {\n\tOnFilesResolved(total int)\n\tOnFileDone(filePath string, bytesRead int64)\n\tOnRowsRead(rows int)\n\tOnBucketsSeen(bucketIDs []int)\n}\n```\n\nreader 模块只需要依赖这个接口，而不需要知道控制面实现细节。`handler` 负责把 `Tracker` 注入到 `hdfsparquet.Run` 或 `tosinventorycsv.Run` 的配置中。\n\n## 数据源路由\n\n### HDFS Parquet\n\n当 `cfg.SourceType == SourceTypeHDFSParquet` 时，`handler` 调用：\n\n```go\nsinkImpl, err := newSink(cfg, readerID)\n_, err = hdfsparquet.Run(runCtx, hdfsparquet.HDFSParquetConfig{...})\n```\n\n入口层负责把 `HDFSParquetInput` 映射为 `hdfsparquet.HDFSParquetConfig`，包括：\n\n- 文件来源：`RootPath`、`FilePaths`\n- 字段映射：`StoreURIField`、`FormatField`、`CreateTimestampField`、`VIDField`、`OIDField`、`ExtraField`\n- manifest 扩展开关：`ExpandTS`\n- 并发限制：`hdfsparquet.Limits`\n- 分桶配置：`cfg.Bucketing.Config()`\n- sink 回调：`Sink`\n- 进度观察者：`Progress`\n\n### TOS Inventory CSV\n\n当 `cfg.SourceType == SourceTypeTOSInventoryCSV` 时，`handler` 调用：\n\n```go\nsinkImpl, err := newSink(cfg, readerID)\n_, err = tosinventorycsv.Run(runCtx, newTOSInventoryCSVConfig(cfg, sinkImpl, progress))\n```\n\n`newTOSInventoryCSVConfig` 专门负责把入口层 `Input` 转成 `tosinventorycsv.Config`。CSV 字段既支持列名，也支持字符串形式的数字索引，具体解析由 `tosinventorycsv` 模块处理。\n\n## Sink 构造\n\n`newSink(in Input, readerID string)` 根据 `SinkInput.Type` 创建下游消费回调。\n\n支持的 sink 类型：\n\n- 空字符串或 `\"bucket_file\"`：调用 `sink.NewBucketFileCallback(defaultBucketFileSinkOutputDir)`，输出目录固定为 `\"hdfs_parquet_output\"`。\n- `\"writer_rpc\"`：调用 `sink.NewRedisWriterCallback`，通过 Redis 获取 bucket 到 writer endpoint 的映射，再通过 RPC 写入。\n- 其他值：返回 `unsupported sink type` 错误。\n\n`writer_rpc` 使用 `SinkRedisInput` 中的嵌套 Redis 配置：\n\n```go\nfunc (in *SinkInput) redisCluster() string\nfunc (in *SinkInput) redisKeyPrefix() string\nfunc (in *SinkInput) readRedisTimeoutSeconds() int\nfunc (in *SinkInput) readRedisMaxRetries() int\n```\n\n如果 `redis.key_prefix` 为空，`newSink` 使用 `JobID` 作为默认 key prefix。\n\n`writer_rpc` 相关默认超时：\n\n- `ConnectTimeoutSeconds` 默认 1 秒。\n- `RPCTimeoutSeconds` 默认 10 秒。\n- `Redis.ReadTimeoutSeconds` 默认 1 秒。\n- `EndpointBatchMaxWaitMS` 小于等于 0 时表示不显式设置，返回 `0`。\n\n`newSink` 创建 `NewRedisWriterCallback` 后，下游会继续执行 Redis 预热、endpoint 规范化和 bucket endpoint 缓存等逻辑，包括 `prewarmBucketEndpoints`、`bucketRedisKey`、`normalizeWriterEndpoint`、`splitEndpoint`、`redisValueToString` 等函数。\n\n## Reader ID\n\n`resolveReaderID(ctx, in)` 优先使用 Lambda 上下文里的 `TaskID`：\n\n```go\nif lambdaCtx, ok := lambdacontext.FromContext(ctx); ok && lambdaCtx != nil && lambdaCtx.TaskID != \"\" {\n\treturn lambdaCtx.TaskID\n}\n```\n\n如果当前不是 Lambda 运行环境，或上下文中没有 `TaskID`，则生成一个由 `time.Now().UnixNano()` 和 `rand.Int63()` 组成的临时 ID。这个行为让 `handler` 可以在测试或本地直接调用。\n\n## 扩展新数据源\n\n新增数据源时，应优先沿用当前入口模式：\n\n1. 添加新的 `SourceType` 常量。\n2. 在 `Input` 中添加对应配置结构体指针。\n3. 在 `Normalize()` 中做必填字段校验、默认值填充和枚举检查。\n4. 在 `handler` 的 `switch cfg.SourceType` 中添加分支。\n5. 将入口层配置转换成目标 reader 模块的配置。\n6. 注入 `cfg.Bucketing.Config()`、`Sink` 和 `Progress`，保持与现有 reader 的行为一致。\n\n## 扩展新 Sink\n\n新增 sink 时，主要修改 `newSink`：\n\n1. 在 `SinkInput.Type` 的注释中补充新枚举。\n2. 在 `newSink` 的 `switch sinkCfg.Type` 中新增 case。\n3. 尽量使用 `SinkInput` 中已有字段；如果需要新配置，添加到 `SinkInput` 或嵌套结构体中。\n4. 在 `Normalize()` 中补充与该 sink 强相关的必填校验。\n\n入口层目前假设 sink 可以作为批处理回调传入 HDFS 和 CSV reader。新增 sink 时需要确认它满足对应 reader 期望的 callback 接口。","bucket-assignment":"# Bucket Assignment\n\n## 模块概览\n\n`internal/bucketing` 负责把一个 `uri` 稳定映射到 `[0, numBuckets)` 范围内的桶编号。它是一个纯计算模块，不访问外部系统，也没有跨包调用；调用方只需要提供桶数量、哈希算法和 Spark seed，即可得到可复现的 bucket id。\n\n该模块目前支持两种哈希策略：\n\n- `\"\"` 或 `\"hive\"`：使用 `javaStringHash`，再通过 `positiveMod` 转为非负桶编号。\n- `\"spark\"`：使用 `murmur3String(uri, sparkSeed)`，再通过 `positiveMod` 转为非负桶编号。\n\n## 对外入口\n\n### `Config`\n\n```go\ntype Config struct {\n\tNumBuckets int\n\tHashAlg    string\n\tSparkSeed  uint32\n}\n```\n\n`Config` 是调用方保存分桶配置的轻量结构体：\n\n- `NumBuckets`：桶数量，必须大于 `0`。\n- `HashAlg`：哈希算法，支持 `\"\"`、`\"hive\"`、`\"spark\"`。\n- `SparkSeed`：仅在 `HashAlg == \"spark\"` 时参与 Murmur3 哈希计算。\n\n### `Config.ComputeBucket`\n\n```go\nfunc (c Config) ComputeBucket(uri string) (int, error) {\n\treturn ComputeBucket(uri, c.NumBuckets, c.HashAlg, c.SparkSeed)\n}\n```\n\n这是面向持有配置对象的调用方式。它不包含额外逻辑，只是把结构体字段转发给包级函数 `ComputeBucket`。\n\n### `ComputeBucket`\n\n```go\nfunc ComputeBucket(uri string, numBuckets int, hashAlg string, sparkSeed uint32) (int, error)\n```\n\n这是模块的核心入口。执行顺序为：\n\n1. 校验 `numBuckets > 0`，否则返回错误 `num_buckets must be > 0`。\n2. 根据 `hashAlg` 选择哈希实现。\n3. 使用 `positiveMod` 将有符号或无符号哈希结果折算到合法桶范围。\n4. 返回桶编号。\n\n返回值保证在成功时满足：\n\n```go\n0 <= bucket && bucket < numBuckets\n```\n\n## 执行流程\n\n```mermaid\nflowchart TD\n    A[\"调用方\"] --> B[\"Config.ComputeBucket\"]\n    B --> C[\"ComputeBucket\"]\n    C --> D{\"hashAlg\"}\n    D -->|空字符串或 hive| E[\"javaStringHash\"]\n    D -->|spark| F[\"murmur3String\"]\n    F --> G[\"bitsRotateLeft32\"]\n    F --> H[\"fmix32\"]\n    E --> I[\"positiveMod\"]\n    F --> I\n    I --> J[\"桶编号\"]\n```\n\n## Hive 分桶路径\n\n当 `hashAlg` 为 `\"\"` 或 `\"hive\"` 时，`ComputeBucket` 使用：\n\n```go\npositiveMod(javaStringHash(uri), numBuckets)\n```\n\n`javaStringHash` 的实现模式与 Java 字符串哈希公式一致：\n\n```go\nh = 31*h + 当前字符值\n```\n\n代码实现为：\n\n```go\nfunc javaStringHash(s string) int32 {\n\tvar h int32\n\tfor _, r := range s {\n\t\th = 31*h + int32(r)\n\t}\n\treturn h\n}\n```\n\n需要注意：这里通过 Go 的 `range` 遍历字符串，单位是 Unicode code point。对于常见 ASCII URI，这与 Java `String.hashCode()` 的结果一致；如果 URI 中包含非 BMP 字符，Java 的 UTF-16 code unit 语义和 Go 的 rune 语义可能不完全相同。\n\n## Spark 分桶路径\n\n当 `hashAlg == \"spark\"` 时，`ComputeBucket` 使用：\n\n```go\npositiveMod(int32(murmur3String(uri, sparkSeed)), numBuckets)\n```\n\n`sparkSeed` 会作为 Murmur3 初始种子传入：\n\n```go\nfunc murmur3String(s string, seed uint32) uint32\n```\n\n`murmur3String` 的处理流程是：\n\n1. 将字符串转为 UTF-8 字节切片：`data := []byte(s)`。\n2. 每 4 字节组成一个 little-endian `uint32` block。\n3. 对每个 block 执行 Murmur3 混合，包括乘法、`bitsRotateLeft32` 左旋和异或。\n4. 处理不足 4 字节的 tail。\n5. 将长度混入哈希值。\n6. 调用 `fmix32` 做最终 avalanche 混合。\n\n`bitsRotateLeft32` 和 `fmix32` 都是 Murmur3 实现细节，不应该被外部调用方直接依赖。\n\n## 取模语义\n\n`positiveMod` 用于避免 Go `%` 对负数取模时返回负值的问题：\n\n```go\nfunc positiveMod(v int32, n int) int {\n\treturn int((int64(v)%int64(n) + int64(n)) % int64(n))\n}\n```\n\n这使得即使 `javaStringHash` 或转换后的 Murmur3 值为负数，最终桶编号仍然落在 `[0, n)`。\n\n## 错误处理\n\n`ComputeBucket` 只会在配置非法时返回错误：\n\n- `numBuckets <= 0`：返回 `num_buckets must be > 0`\n- `hashAlg` 不是 `\"\"`、`\"hive\"`、`\"spark\"`：返回 `unsupported hash_alg: <value>`\n\n调用方应在批处理或 reader 初始化阶段尽早发现这些配置错误，避免在处理大量 URI 时重复失败。\n\n## 与代码库的连接\n\n该模块目前主要由 TOS inventory CSV reader 相关测试通过 `bucketing.Config` 间接使用，例如：\n\n- `TestRunWithClientParsesHeaderColumnsAndMetadata`\n- `TestRunWithClientParsesIndexColumnsWithoutHeader`\n- `TestRunWithClientUsesConfiguredBatchRows`\n- `TestRunWithClientUsesConfiguredSinkWorkers`\n- `TestRunWithClientSerializesSinkDeliveryAcrossWorkers`\n- manifest expand 相关测试\n\n这些调用说明 `bucketing.Config` 是 reader 配置的一部分，用于在读取 URI 数据时进行稳定分桶。模块自身没有依赖 reader，也没有外部副作用，因此适合作为可复用的基础计算组件。\n\n## 修改建议\n\n新增分桶算法时，应优先在 `ComputeBucket` 的 `switch hashAlg` 中增加分支，并保持以下约束：\n\n- 成功结果必须通过 `positiveMod` 归一化。\n- 不应改变 `\"\"` 默认到 `\"hive\"` 的现有行为。\n- 新算法应增加独立测试，覆盖固定输入、固定桶数和边界桶数量。\n- 如果算法需要额外参数，优先扩展 `Config`，再由 `Config.ComputeBucket` 转发给包级入口。","control-plane-reporting":"# Control Plane Reporting\n\n## 模块概览\n\n`controlplane` 模块负责把 reader worker 的存活状态和读取进度上报到控制面。它由三层组成：\n\n- `Client`：封装控制面 HTTP 调用，负责请求构造、服务发现、超时、响应 envelope 解析。\n- `Tracker`：线程安全地维护当前 reader 的运行状态和累计进度。\n- `Reporter`：周期性读取 `Tracker.Snapshot()`，并通过 `Client` 发送心跳和进度。\n\n```mermaid\nflowchart TD\n    A[业务入口 handler] --> B[NewTracker]\n    A --> C[NewClient]\n    A --> D[NewReporter]\n    D --> E[Start]\n    E --> F[runHeartbeat]\n    E --> G[runProgress]\n    F --> H[SendHeartbeat]\n    G --> I[FlushFinalProgress]\n    I --> J[SendProgress]\n```\n\n## 主要职责\n\n该模块面向 reader 类型 worker，上报内容固定使用 `Kind: \"reader\"`。\n\n心跳上报用于告诉控制面当前 worker 仍然在线：\n\n- 接口路径：`/api/v1/heartbeat`\n- 请求类型：`HeartbeatRequest`\n- 响应类型：`HeartbeatResponse`\n\n进度上报用于同步文件读取进度、行数、字节数、bucket 覆盖数量和 worker 状态：\n\n- 接口路径：`/api/v1/report_progress`\n- 请求类型：`ProgressRequest`\n- 响应类型：`ProgressResponse`\n\n## Client：控制面 HTTP 客户端\n\n`NewClient(cfg Config)` 创建底层 `byted.Client`，并补齐默认配置：\n\n- `Config.PSM` 为空时使用 `bytedance.videoarch.uri_task_control_panel`\n- `Config.Cluster` 为空时使用 `default`\n- Dial timeout 为 `1s`\n- Read timeout 和请求 timeout 为 `3s`\n\n`Client` 支持两种目标地址模式：\n\n- 显式 `Config.Endpoint`：`requestURL()` 使用 `strings.TrimRight(endpoint, \"/\") + path`\n- 空 `Config.Endpoint`：使用 `http://<PSM><path>`，并在请求上开启 Hertz discovery：\n  - `discovery.WithSD(true)`\n  - `discovery.WithDestinationCluster(c.cfg.Cluster)`\n  - `hconfig.WithRequestTimeout(defaultRequestTimeout)`\n\n所有实际请求都经过 `doJSON(ctx, method, path, payload, out)`：\n\n1. 使用 `json.Marshal(payload)` 序列化请求体。\n2. 通过 `protocol.NewRequest()` 构造 Hertz 请求。\n3. 设置 `Content-Type: application/json`。\n4. 调用 `c.cli.Do(ctx, req, resp)`。\n5. 要求 HTTP 状态码为 `200 OK`。\n6. 将响应解析为 `envelope[json.RawMessage]`。\n7. 要求 `env.Code == 0`。\n8. 如果 `env.Data` 非空，再反序列化到 `out`。\n\n控制面响应必须符合以下 envelope 结构：\n\n```go\ntype envelope[T any] struct {\n\tCode    int    `json:\"code\"`\n\tMessage string `json:\"message\"`\n\tData    T      `json:\"data\"`\n}\n```\n\n如果 HTTP 状态码不是 `200`，或 envelope `code` 非 0，`doJSON()` 会返回错误，并带上状态码、响应体或控制面错误信息。\n\n## Reporter：周期性上报调度器\n\n`NewReporter(client, tracker, heartbeatEvery, progressEvery)` 创建上报器。两个周期参数小于等于 0 时都会回退到 `30s`。\n\n`Start(ctx)` 启动两个 goroutine：\n\n- `runHeartbeat(ctx)`：立即发送一次心跳，然后按 `heartbeatEvery` 周期发送。\n- `runProgress(ctx)`：立即发送一次进度，然后按 `progressEvery` 周期发送。\n\n`Stop()` 会调用内部 `cancel()`，然后等待两个 goroutine 退出。`Start()` 对 `nil` receiver、`nil client`、`nil tracker` 都是安全的，会直接返回。\n\n周期性心跳和进度发送会忽略错误：\n\n```go\n_, _ = r.client.SendHeartbeat(ctx, HeartbeatRequest{...})\n_ = r.FlushFinalProgress(ctx)\n```\n\n这意味着后台上报失败不会打断 reader 主流程。需要确认最终进度是否成功写入时，应显式调用 `FlushFinalProgress(ctx)` 并检查返回的 `error`。\n\n## FlushFinalProgress：最终进度上报\n\n`FlushFinalProgress(ctx)` 从 `Tracker` 读取快照，并组装 `ProgressRequest`：\n\n```go\nProgressRequest{\n\tJobID:        snapshot.JobID,\n\tKind:         \"reader\",\n\tReaderID:     snapshot.ReaderID,\n\tWorkerStatus: snapshot.WorkerStatus,\n\tErrorMessage: snapshot.ErrorMessage,\n\tFiles: &ReaderFilesProgress{\n\t\tFilesTotal: snapshot.FilesTotal,\n\t\tFilesDone:  snapshot.FilesDone,\n\t\tRowsRead:   snapshot.RowsRead,\n\t\tBytesRead:  snapshot.BytesRead,\n\t},\n\tBucketsSeen:    snapshot.BucketsSeen,\n\tLastUpdateTime: snapshot.LastUpdateTime,\n}\n```\n\n该函数既被 `runProgress()` 周期性复用，也适合作为 reader 退出前的最后一次同步点。\n\n## Tracker：线程安全状态聚合\n\n`Tracker` 保存 reader 运行期间的累计状态，内部用 `sync.Mutex` 保护所有读写。构造函数是 `NewTracker(jobID, readerID, sourceType, ip string, port int)`，初始状态为：\n\n- `workerStatus = WorkerStateRunning`\n- `bucketsSeen = make(map[int]struct{})`\n- `lastUpdateTime = time.Now().UTC()`\n\n可写入的进度事件包括：\n\n- `OnFilesResolved(total int)`：设置 `filesTotal`\n- `OnFileDone(_ string, bytesRead int64)`：递增 `filesDone`，并在 `bytesRead > 0` 时累计 `bytesRead`\n- `OnRowsRead(rows int)`：在 `rows > 0` 时累计 `rowsRead`\n- `OnBucketsSeen(bucketIDs []int)`：把 bucket id 写入去重集合\n- `SetWorkerStatus(status, errorMessage string)`：设置 worker 状态和错误信息，空 `status` 会被忽略\n\n`Snapshot()` 返回不可变值对象 `Snapshot`，供 `Reporter` 组装请求。`BucketsSeen` 在快照里不是 bucket 列表，而是去重后的数量：`len(t.bucketsSeen)`。\n\n## 状态模型\n\n模块内定义了三个 worker 状态常量：\n\n```go\nconst (\n\tWorkerStateRunning = \"RUNNING\"\n\tWorkerStateDone    = \"DONE\"\n\tWorkerStateFailed  = \"FAILED\"\n)\n```\n\n调用方通常在任务开始后保持默认 `RUNNING`，任务结束前根据结果调用：\n\n- `tracker.SetWorkerStatus(WorkerStateDone, \"\")`\n- `tracker.SetWorkerStatus(WorkerStateFailed, err.Error())`\n\n随后调用 `reporter.FlushFinalProgress(ctx)`，确保最终状态、错误信息和累计进度被发送到控制面。\n\n## 与代码库其他部分的连接\n\n从调用关系看，`main.go` 的 `handler` 是该模块的主要入口调用方：\n\n- 使用 `NewClient()` 创建控制面客户端\n- 使用 `NewTracker()` 初始化 reader 状态\n- 使用 `NewReporter()` 创建周期上报器\n- 在任务生命周期中调用 `SetWorkerStatus()` 写入最终状态\n\n测试侧通过 `controlplane/reporter_test.go` 覆盖 `NewClient()`、`NewTracker()`、`NewReporter()`、心跳和最终进度上报行为。\n\n## 贡献注意事项\n\n新增上报字段时，应同时修改 `types.go` 中的请求结构、`Tracker` 的状态字段、对应事件方法以及 `FlushFinalProgress()` 的请求组装逻辑。\n\n`Tracker` 的所有状态访问都应继续经过互斥锁；不要从 `Reporter` 或业务代码直接访问内部字段。\n\n后台周期上报当前是“尽力而为”语义，错误被吞掉。只有最终同步需要强一致反馈时，才依赖 `FlushFinalProgress(ctx)` 的返回值。\n\n`ProgressRequest.LastUpdateTime` 的 JSON 标签是 `lastUpdateTime`，不是 snake_case。修改该字段名会影响控制面协议兼容性。","hdfs-parquet-source":"# HDFS Parquet Source\n\n## 模块概览\n\n`internal/source/hdfsparquet` 负责从 HDFS 上的 Parquet 文件读取 URI 数据，解析主 `store_uri`、可选 `extra` 字段和可选 TS manifest 内容，然后按 `Bucketing` 规则分桶并交给 `sink.BatchCallback`。\n\n模块入口是 `Run(ctx, cfg HDFSParquetConfig)`。它把处理过程拆成三个并发阶段：\n\n```mermaid\nflowchart LR\n    A[\"Run\"] --> B[\"ResolveFiles<br/>解析 HDFS 文件列表\"]\n    B --> C[\"readFiles / readSelectedColumns<br/>读取 Parquet 列\"]\n    C --> D[\"ParseURIFromBatches / parseBatch<br/>行转 ObjectRecord\"]\n    D --> E[\"parseRowObjects<br/>extra 与 manifest 扩展\"]\n    E --> F[\"DivideIntoBuckets<br/>按 bucket 分组\"]\n    F --> G[\"BatchCallback / ResultCallback<br/>写入下游 sink\"]\n```\n\n## 输入与配置\n\n`HDFSParquetConfig` 是模块的总配置：\n\n- `RootPath`：HDFS 目录 URI，例如 `hdfs://namenode/path/to/table`。当 `FilePaths` 为空时会递归扫描该目录。\n- `FilePaths`：显式指定的 HDFS 文件 URI。非空时不会扫描 `RootPath`。\n- `StoreURIField`：必填列，表示主 URI 列。\n- `FormatField`：可选列，用于判断是否需要展开 manifest。\n- `CreateTimestampField`：可选列，支持 `int64`、`int32`、`int`。\n- `VIDField`、`OIDField`：可选列，会透传到 `sink.ObjectRecord`。\n- `ExtraField`：可选列，非空时会初始化 `video_extra_query` 客户端并解析 `extra` JSON。\n- `ExpandTS`：是否展开 TS manifest。\n- `Limits`：控制读取、解析、sink 写入并发和批大小。\n- `Bucketing`：`internal/bucketing.Config` 的别名，用于 `ComputeBucket`。\n- `Sink`：接收分桶后的 `sink.Batch`。\n- `Progress`：可选进度回调。\n\n`Limits` 中的默认行为：\n\n- `ReaderWorkers <= 0` 时按 1 个读取 worker。\n- `SinkWorkers <= 0` 时按 1 个 sink worker。\n- `ParquetParallelism <= 0` 时 Parquet reader 并发为 4。\n- `BatchRows <= 0` 时每批读取 1000 行。\n- `parseWorkerCount` 复用 `ReaderWorkers`，未配置时为 1。\n- `parseBatchParallelism` 在单读取 worker 下为 4，否则为 2。\n\n## 文件解析与扫描\n\n`parseHDFSURI(raw)` 只接受 `hdfs://` URI，并拆出：\n\n- `NameNode`：`hdfs://` 加 host。\n- `Path`：URI path。\n\n`resolveNameNode(rootPath, filePaths)` 优先从 `FilePaths[0]` 提取 NameNode，否则从 `RootPath` 提取。`Run` 用它创建 `hdfs.FileSystem`。\n\n`ResolveFiles(fs, rootPath, filePaths)` 有两种模式：\n\n- `FilePaths` 非空：逐个调用 `parseHDFSURI`，返回每个 URI 的 HDFS path。\n- `FilePaths` 为空：解析 `RootPath` 后调用 `FindPartFiles` 递归查找文件。\n\n`FindPartFiles` 只收集 basename 以 `part-` 开头的文件，并跳过 `_SUCCESS`、`.`、`..` 以及隐藏文件。递归目录读取失败时，子目录错误会被忽略并继续扫描其他路径。\n\n## Parquet 读取\n\n`readFiles` 按 `Limits.ReaderWorkers` 启动多个 worker，每个 worker 调用 `readFile`。`readFile` 会：\n\n1. `fs.Stat(filePath)` 获取文件大小。\n2. `fs.Open(filePath)` 打开 HDFS 文件。\n3. 构造 `HDFSFileWrapper` 适配 `parquet-go/source.ParquetFile`。\n4. 调用 `readSelectedColumns` 读取需要的列。\n5. 关闭 wrapper，并把行数、批次数和文件大小交给 `collectReadStats`。\n\n`readSelectedColumns` 使用 `pqreader.NewParquetColumnReader(wrapper, np)` 按列读取。它先解析列路径：\n\n- `StoreURIField` 必须存在，通过 `resolveColumnPath` 查找。\n- `FormatField`、`CreateTimestampField` 是可选列，通过 `resolveOptionalColumnPath` 查找；列不存在时返回空路径。\n- `ExtraField`、`VIDField`、`OIDField` 只要配置非空就必须存在。\n\n列匹配逻辑在 `matchColumnPath`：\n\n1. 先尝试精确匹配 `parquet_go_root.<field>`。\n2. 再按字段路径后缀匹配，例如配置 `a.b` 可以匹配 schema 中以 `a.b` 结尾的列。\n3. 后缀比较大小写不敏感，依赖 `equalPathParts` 和 `normalizePathPart`。\n4. 无匹配返回 `column not found`，多个匹配返回 `column is ambiguous`。\n\n读取后每批生成 `ReadBatch`，其中每一行是 `RowData`。字符串字段通过 `coerceString` 清理空白；时间戳通过 `coerceInt64` 转为 `int64`，缺失值为 0，不支持的类型会中断读取。\n\n## URI 解析\n\n`ParseURIFromBatches` 从 `ReadBatch` 输入通道消费数据，输出 `URIBatch`。它按 `workerCount` 启动解析 worker，每个 worker 调用 `parseBatch`。输入结束或上下文取消后，它会关闭输出通道并汇总 `parseStats`。\n\n`parseBatch` 的处理策略：\n\n- 空批次直接返回空 `URIBatch`。\n- 行数少于 100 或 `parallelism <= 1` 时顺序处理。\n- 否则按 `parallelism` 切片并发处理，最后按分片顺序合并结果。\n\n单行解析由 `parseRowObjects` 完成。它会按顺序产生三类对象：\n\n1. 主 `storeURI`：非空时直接生成 `sink.ObjectRecord`。\n2. `extra` 扩展 URI：`extra` 非空且 `extraQueryClient` 可用时调用 `parseExtraObjects`。\n3. manifest 扩展 URI：`storeURI` 非空、`ExpandTS` 为 true、`shouldExpandManifest(storeURI, format)` 为 true 且 storagegw client 非空时调用 `parseManifestObjects`。\n\n最后 `parseRowObjects` 调用 `dedupeObjectsByStoreURI`，按清理后的 `StoreURI` 去重，并跳过空 URI。`VID`、`OID` 和 `CreateTimestamp` 会传递到主对象、extra 对象和 manifest 对象。\n\n## extra 字段解析\n\n`parseExtraObjects` 期望 `extra` 是 JSON object。JSON 解析失败、空 object、无 `extraQueryClient` 或没有可查询字段时都会静默返回空结果。\n\n`buildExtraQueryInput` 会把 JSON object 的每个 value 转成查询字符串：\n\n- `string` 和 `[]byte`：去空白后使用，空字符串跳过。\n- 其他类型：`json.Marshal` 后使用，空字符串或 `\"null\"` 跳过。\n\n随后分别调用：\n\n- `extraQueryClient.QueryExtraURI(ctx, queryInput, true)`\n- `extraQueryClient.QueryExtraURI(ctx, queryInput, false)`\n\n`collectQueriedExtraURIs` 会合并 file extra 和 video extra 的结果，去掉空 URI，并按 URI 去重。若两个结果都没有可用 URI，`chooseExtraQueryError` 会检查错误；`xquery.ErrNotFound` 和 `xquery.ErrNotAnnotated` 被视为可忽略错误，其他错误会包装为 `extract extra key=...` 返回。\n\n`getVideoExtraQueryClient` 用 `sync.Once` 创建单例 `video_extra_query` client。测试可通过 `resetVideoExtraQueryClientForTest` 重置状态。\n\n## manifest 展开\n\nmanifest 判断与解析委托给 `internal/source/manifest`：\n\n- `shouldExpandManifest` 调用 `manifest.ShouldExpand`。\n- `parseManifestObjects` 调用 `manifest.Expand`。\n- `newManifestParser` 调用 `manifest.NewParser`。\n- `parseManifestObjectPath`、`toParserURI`、`normalizeParsedStoreURI` 是对 manifest 包能力的薄封装。\n\n`parseManifestObjects` 从 `manifest.Expand` 得到 URI 列表后，为每个非空 URI 生成 `sink.ObjectRecord`。如果展开失败，`parseRowObjects` 会返回带 `expand manifest store_uri=...` 上下文的错误。\n\nstoragegw client 由 `newStorageGWClient` 创建。它从环境变量 `STORAGEGW_ACCESS_KEY`、`STORAGEGW_SECRET_KEY` 读取凭证；两者都非空时使用 `storagegw.WithCredential`。客户端总是附加 `storagegw.WithCluster(\"default\")`，PSM 来自 `env.PSM()`。创建失败时返回 `nil`，这会使 manifest 展开条件中的 `client != nil` 不成立。\n\n## 分桶与 sink\n\n`DivideIntoBuckets` 消费 `URIBatch`，通过 `sourcecommon.DrainBatchesWithWorkers` 并发写入 sink。每个输入批次被转换为 `sink.Batch`：\n\n- `FilePath` 和 `ScannedRows` 继承自 `URIBatch`。\n- `ProcessedURIs` 是 `len(batch.Objects)`。\n- `Buckets` 是 `map[int][]ObjectRecord`，key 来自 `Bucketing.ComputeBucket(object.StoreURI)`。\n\n当批次中没有对象时，转换函数返回 skip，不会调用 sink。`ComputeBucket` 返回错误会终止分桶阶段并向上返回。\n\n如果 `cfg.Sink` 实现了 `io.Closer`，`Run` 会在退出前关闭它。如果实现了 `ResultCallback`，`Run` 会在所有阶段结束后调用 `OnComplete(ctx, *result)`。\n\n## 错误与取消传播\n\n`Run` 为整个流水线创建可取消 context。读取、解析、分桶三个 goroutine 共用同一个 context，并通过容量为 3 的 `errCh` 上报首批错误。任一阶段出错都会调用 `cancel()`，推动其他阶段停止。\n\n错误包装通常保留文件、列、批大小或 URI 上下文，例如：\n\n- `read parquet file path=... size=...`\n- `resolve store_uri column file=... column=...`\n- `parse batch file=... store_uri=...`\n- `expand manifest store_uri=...`\n- `read file failed path=... size=...`\n\n`context.Canceled` 在 `Run` 的最终错误检查中会被忽略；其他错误会作为 `Run` 的返回错误。\n\n## 贡献注意事项\n\n修改读取列逻辑时，优先保持 `matchColumnPath` 的“精确匹配优先、大小写不敏感后缀匹配兜底”语义，否则可能破坏现有 Parquet schema 兼容性。\n\n修改 `parseRowObjects` 时要注意对象来源顺序和去重行为：主 `storeURI`、`extra`、manifest 都可能产生相同 URI，最终以首次出现的记录为准。\n\n增加新的可选字段时，需要同时扩展 `HDFSParquetConfig`、`RowData`、`readSelectedColumns` 的列读取和 `parseRowObjects` 的对象构造路径。\n\n调整并发时要保持通道关闭责任清晰：读取阶段关闭 `readBatchCh`，解析阶段关闭 `uriBatchCh`，分桶阶段只消费 `uriBatchCh` 并写 sink。","manifest-expansion":"# Manifest Expansion\n\n## 模块概览\n\n`internal/source/manifest` 负责把 HLS/DASH manifest 对象展开为其中引用的分片 URI 列表。它面向上游数据源中的对象记录工作：当记录本身是 `.m3u8` 或 `.mpd`，或显式标注为 `hls` / `dash` 格式时，模块会读取 manifest 内容，调用 `media-parser-go` 解析，并返回解析出的子对象 URI。\n\n该模块不直接依赖具体存储客户端实现，只要求调用方提供 `ObjectClient`：\n\n```go\ntype ObjectClient interface {\n\tGetObjectWithContext(ctx context.Context, bucketName, objectName string, opts *storagegw.GetObjectOptions) (*storagegw.ObjectInfo, error)\n}\n```\n\n这让 manifest 展开逻辑可以被 `hdfsparquet`、`tosinventorycsv` 等不同来源复用。\n\n## 入口判断\n\n调用方通常先判断对象是否需要展开。\n\n`FormatFromContentType(raw string) (string, bool)` 从 HTTP `Content-Type` 中识别 manifest 格式。它会去掉 `;` 后面的参数并忽略大小写，目前只识别：\n\n| Content-Type | 返回格式 |\n| --- | --- |\n| `application/x-mpegurl` | `hls` |\n| `application/dash+xml` | `dash` |\n\n`ShouldExpand(storeURI, format string) bool` 是核心判断函数：\n\n```go\nfunc ShouldExpand(storeURI string, format string) bool {\n\treturn IsFormat(format) || HasSuffix(storeURI)\n}\n```\n\n判断来源有两类：\n\n1. `IsFormat(format)`：`format` 清理空白并转小写后等于 `hls` 或 `dash`。\n2. `HasSuffix(storeURI)`：`storeURI` 去掉 query string 后，以 `.m3u8` 或 `.mpd` 结尾。\n\n因此，下面这些 URI 都会触发展开：\n\n```text\nbucket/path/index.m3u8\nbucket/path/manifest.mpd\nbucket/path/index.m3u8?version=1\n```\n\n## 展开流程\n\n核心入口是 `Expand(ctx, client, storeURI, format) ([]string, error)`。它读取 manifest 文件，解析出依赖的媒体分片或子 manifest URI，并返回字符串列表。\n\n```mermaid\nflowchart TD\n    A[\"调用方传入 storeURI\"] --> B[\"ShouldExpand 判断\"]\n    B --> C[\"Expand\"]\n    C --> D[\"ToParserURI / ParseObjectPath\"]\n    C --> E[\"NewParser 选择 HLS 或 DASH\"]\n    E --> F[\"NewIndexReader 读取对象\"]\n    F --> G[\"ObjectClient.GetObjectWithContext\"]\n    E --> H[\"parser.Decode\"]\n    H --> I[\"PostOrderList 生成 URI 列表\"]\n```\n\n`Expand` 的执行逻辑：\n\n1. 如果 `client == nil`，直接返回 `nil, nil`。\n2. 最多尝试 3 次解析。\n3. 每次先调用 `ToParserURI(storeURI)`，将存储 URI 规范化为 parser 使用的 `bucket/key` 形式。\n4. 调用 `NewParser(storeURI, format, client)` 创建 HLS 或 DASH parser。\n5. 调用 `parser.Decode(ctx, parserURI)` 解析 manifest。\n6. 解析成功后遍历 `segments.PostOrderList()`，取每个 segment 的 `URI()`。\n7. 调用 `NormalizeParsedStoreURI` 清理 URI，目前只做 `strings.TrimSpace`。\n8. 跳过空 URI，返回非空 URI 列表。\n\n如果 3 次都失败，`Expand` 会记录 warning 日志，然后返回 `nil, nil`。这个行为表示“展开失败时回退到原始索引对象”，而不是把错误继续抛给调用方。\n\n日志中会包含失败阶段：\n\n- `to_parser_uri`：`storeURI` 无法解析为 `bucket/key`\n- `decode`：manifest 解码失败，包括读取对象失败、parser 解析失败等\n\n## Parser 选择\n\n`NewParser(storeURI, format, client) mparser.MediaParser` 根据格式参数和 URI 后缀选择 parser：\n\n```go\nif strings.EqualFold(strings.TrimSpace(format), FormatDASH) ||\n\tstrings.HasSuffix(strings.ToLower(strings.SplitN(strings.TrimSpace(storeURI), \"?\", 2)[0]), \".mpd\") {\n\treturn mparser.NewDashParser(reader)\n}\nreturn mparser.NewM3U8Parser(reader)\n```\n\n选择规则：\n\n| 条件 | Parser |\n| --- | --- |\n| `format == \"dash\"`，忽略大小写和空白 | `mparser.NewDashParser` |\n| `storeURI` 去掉 query 后以 `.mpd` 结尾 | `mparser.NewDashParser` |\n| 其他情况 | `mparser.NewM3U8Parser` |\n\n注意：即使 `format` 是空字符串，只要文件后缀是 `.mpd`，也会使用 DASH parser。否则默认使用 M3U8 parser。\n\n## 对象路径解析\n\nmanifest 模块统一使用 `bucket/key` 格式表示对象位置。\n\n`ParseObjectPath(raw string) (ObjectPath, error)` 负责把字符串解析成：\n\n```go\ntype ObjectPath struct {\n\tBucket string\n\tKey    string\n}\n```\n\n解析规则：\n\n- 前后空白会被去掉。\n- 前后的 `/` 会被去掉。\n- 第一个 `/` 之前是 bucket。\n- 第一个 `/` 之后是 key。\n- bucket 或 key 为空时返回错误。\n\n示例：\n\n```go\nParseObjectPath(\"video-bucket/path/to/index.m3u8\")\n// ObjectPath{Bucket: \"video-bucket\", Key: \"path/to/index.m3u8\"}\n```\n\n无效示例：\n\n```text\n\"\"\n\"bucket-only\"\n\"/bucket/\"\n```\n\n`ToParserURI(storeURI)` 只是复用 `ParseObjectPath`，再拼回 `bucket/key`。它的作用是确保传给 `media-parser-go` 的 URI 已经过相同规则校验。\n\n## Manifest 读取适配\n\n`NewIndexReader(client)` 把项目内的对象客户端适配成 `media-parser-go` 需要的 `mparser.IndexReader`：\n\n```go\nfunc(ctx context.Context, uri string) (io.ReadCloser, mparsererrs.Err)\n```\n\n读取过程：\n\n1. 调用 `ParseObjectPath(uri)` 解析 bucket 和 key。\n2. 调用 `client.GetObjectWithContext(ctx, parsed.Bucket, parsed.Key, nil)` 获取对象。\n3. 校验返回对象和 `obj.R` 不为空。\n4. 返回 `obj.R` 作为 manifest/parser 的读取流。\n\n这里不会关闭 `obj.R`，读取流的生命周期交给 `media-parser-go` parser 处理。\n\n## 错误适配\n\n`mediaParserErr` 用来把普通 `error` 包装成 `mparsererrs.Err`。它实现了：\n\n```go\nfunc (e mediaParserErr) Error() string\nfunc (e mediaParserErr) IsNotFound() bool\n```\n\n`IsNotFound` 的判断比较宽松：\n\n- 原始错误是 `io.EOF`\n- 错误信息包含 `not found`\n- 错误信息包含 `404`\n- 错误信息包含 `nosuchkey`\n\n这些错误语义会被传递给 `media-parser-go`，供 parser 在解析多级 manifest 或缺失引用时做内部判断。\n\n## 与其他模块的连接\n\n`manifest` 是一个被数据源解析器复用的底层模块，主要调用方包括：\n\n- `source/hdfsparquet/extractor.go`\n  - `shouldExpandManifest` 调用 `ShouldExpand`\n  - `parseManifestObjects` 调用 `Expand`\n  - `parseManifestObjectPath` 调用 `ParseObjectPath`\n  - `newManifestParser` 调用 `NewParser`\n  - `hasManifestSuffix`、`toParserURI`、`normalizeParsedStoreURI` 分别复用本模块对应函数\n\n- `source/tosinventorycsv/reader.go`\n  - `objectsFromCSVRecord` 调用 `FormatFromContentType`\n  - `objectsFromCSVRecord` 调用 `Expand`\n\n典型链路是：\n\n```text\nParseURIFromBatches\n-> parseBatch\n-> parseRowObjects\n-> parseManifestObjects\n-> manifest.Expand\n-> manifest.NewParser\n-> manifest.NewIndexReader\n-> ObjectClient.GetObjectWithContext\n```\n\n这说明 manifest 展开发生在“从源数据提取对象列表”的阶段。展开成功时，下游拿到的是 manifest 内部引用的对象；展开失败时，`Expand` 返回 `nil, nil`，调用方可以保留原始索引对象作为回退结果。\n\n## 贡献注意事项\n\n修改这个模块时需要保持几个行为稳定：\n\n- `Expand` 当前是容错设计，失败后记录 warning 并返回 `nil, nil`，不要轻易改成向上返回错误，否则会影响批量解析链路。\n- `ParseObjectPath` 是跨模块复用的路径校验逻辑，改变解析规则会影响 `hdfsparquet` 相关包装函数。\n- `NormalizeParsedStoreURI` 目前只做去空白，调用方已经依赖这个轻量行为；如果要增加 URI 重写、协议补全或 query 清理，应先确认所有来源的 URI 约定。\n- `NewParser` 的默认分支是 HLS parser；新增格式时需要同步更新 `FormatFromContentType`、`IsFormat`、`ShouldExpand` 和 parser 选择逻辑。","other-bucketing":"# Other — bucketing\n\n## 模块概览\n\n`internal/bucketing` 提供统一的 URI 分桶计算逻辑。上层模块只需要传入对象的 `store_uri`、桶数量和哈希算法配置，即可得到稳定的 bucket id。\n\n该模块当前支持两种分桶对齐方式：\n\n- `hive`：使用 Java `String.hashCode` 风格的哈希，适合与 Hive 分桶逻辑对齐。\n- `spark`：使用 MurmurHash3 32-bit 哈希，并支持 `sparkSeed`，适合与 Spark SQL 风格分桶对齐。\n\n分桶结果始终通过 `positiveMod` 归一化到 `[0, numBuckets)` 范围内，避免 Go 对负数取模导致负 bucket id。\n\n## 核心 API\n\n### `Config`\n\n```go\ntype Config struct {\n\tNumBuckets int\n\tHashAlg    string\n\tSparkSeed  uint32\n}\n```\n\n`Config` 是上层 source 模块使用的分桶配置对象。\n\n字段含义：\n\n- `NumBuckets`：总桶数，必须大于 0。\n- `HashAlg`：哈希算法，支持 `\"\"`、`\"hive\"`、`\"spark\"`。\n- `SparkSeed`：Spark MurmurHash3 的 seed，仅在 `HashAlg == \"spark\"` 时使用。\n\n`HashAlg` 为空字符串时，`ComputeBucket` 会按 `\"hive\"` 处理。入口层 `Input.Normalize` 也会把空算法归一化为 `HashAlgHive`。\n\n### `Config.ComputeBucket`\n\n```go\nfunc (c Config) ComputeBucket(uri string) (int, error) {\n\treturn ComputeBucket(uri, c.NumBuckets, c.HashAlg, c.SparkSeed)\n}\n```\n\n这是 source 模块最常用的调用方式。它把结构化配置转发给包级函数 `ComputeBucket`。\n\n示例：\n\n```go\nbucketID, err := cfg.Bucketing.ComputeBucket(object.StoreURI)\nif err != nil {\n\treturn err\n}\nbuckets[bucketID] = append(buckets[bucketID], object)\n```\n\n### `ComputeBucket`\n\n```go\nfunc ComputeBucket(uri string, numBuckets int, hashAlg string, sparkSeed uint32) (int, error)\n```\n\n`ComputeBucket` 是实际的分桶入口。\n\n执行规则：\n\n1. 如果 `numBuckets <= 0`，返回错误：`num_buckets must be > 0`。\n2. 如果 `hashAlg == \"\"` 或 `\"hive\"`，使用 `javaStringHash(uri)`。\n3. 如果 `hashAlg == \"spark\"`，使用 `murmur3String(uri, sparkSeed)`。\n4. 如果算法不支持，返回错误：`unsupported hash_alg: <value>`。\n5. 对哈希值执行 `positiveMod`，得到合法 bucket id。\n\n## 哈希实现\n\n### Hive 路径：`javaStringHash`\n\n```go\nfunc javaStringHash(s string) int32 {\n\tvar h int32\n\tfor _, r := range s {\n\t\th = 31*h + int32(r)\n\t}\n\treturn h\n}\n```\n\n该函数实现 Java `String.hashCode` 风格的滚动哈希：\n\n```text\nh = 31*h + char\n```\n\n注意这里遍历的是 Go 字符串的 rune，而不是原始 byte。对于普通 ASCII URI，这与按字节处理效果一致；如果 URI 中包含非 ASCII 字符，需要注意它按 Unicode code point 参与计算。\n\n### Spark 路径：`murmur3String`\n\n```go\nfunc murmur3String(s string, seed uint32) uint32\n```\n\n该函数实现 MurmurHash3 32-bit 版本，流程包括：\n\n- 将字符串转成 `[]byte`。\n- 按 4 字节 little-endian block 处理主体数据。\n- 处理不足 4 字节的 tail。\n- 混入输入长度。\n- 通过 `fmix32` 做最终 avalanche 混合。\n\n相关辅助函数：\n\n```go\nfunc bitsRotateLeft32(x uint32, k int) uint32\nfunc fmix32(h uint32) uint32\n```\n\n`SparkSeed` 会作为 MurmurHash3 初始 seed。入口层 `Input.Normalize` 在 `hash_alg == \"spark\"` 且 `spark_seed == 0` 时会默认设置为 `42`。\n\n## 取模归一化\n\n```go\nfunc positiveMod(v int32, n int) int {\n\treturn int((int64(v)%int64(n) + int64(n)) % int64(n))\n}\n```\n\nGo 的 `%` 对负数会保留负号，例如 `-1 % 16 == -1`。哈希值是 `int32`，可能为负，因此模块使用 `positiveMod` 保证结果始终落在：\n\n```text\n0 <= bucketID < numBuckets\n```\n\n这也是 `bucketing_test.go` 中两个测试关注的核心行为。\n\n## 调用关系\n\n`internal/bucketing` 不依赖业务模块，只提供纯计算能力。它被入口配置和 source 处理链路复用。\n\n```mermaid\nflowchart TD\n    A[\"入口 Input.Normalize\"] --> B[\"BucketingInput.Config\"]\n    B --> C[\"bucketing.Config\"]\n    D[\"HDFS Parquet DivideIntoBuckets\"] --> E[\"Config.ComputeBucket\"]\n    F[\"TOS Inventory CSV reader\"] --> E\n    E --> G[\"ComputeBucket\"]\n    G --> H[\"javaStringHash / murmur3String\"]\n    H --> I[\"positiveMod\"]\n```\n\n主要连接点：\n\n- `main.go`\n  - `BucketingInput.Config()` 将 API 输入转换为 `internal/bucketing.Config`。\n  - `Input.Normalize()` 校验 `bucketing.num_buckets`，归一化默认算法，并处理 Spark 默认 seed。\n- `internal/source/hdfsparquet`\n  - `types.go` 中 `type Bucketing = sharedbucketing.Config`。\n  - `DivideIntoBuckets` 对每个 `object.StoreURI` 调用 `bucketing.ComputeBucket`。\n- `internal/source/tosinventorycsv`\n  - reader 在解析 CSV 对象后调用 `cfg.Bucketing.ComputeBucket(object.StoreURI)`，并按 bucket id 聚合对象。\n\n## 错误边界\n\n`ComputeBucket` 会直接返回配置错误，因此调用方必须处理 error。\n\n当前错误包括：\n\n- `num_buckets must be > 0`\n- `unsupported hash_alg: <hashAlg>`\n\n在正常入口链路中，`Input.Normalize()` 会提前校验这些配置：\n\n```go\nif in.Bucketing.NumBuckets <= 0 {\n\treturn fmt.Errorf(\"bucketing.num_buckets must be > 0\")\n}\n```\n\n但 `internal/bucketing` 仍保留自己的防御性校验，保证直接调用 `ComputeBucket` 或 `Config.ComputeBucket` 时不会产生非法 bucket id。\n\n## 测试覆盖\n\n`internal/bucketing/bucketing_test.go` 当前包含两个基础测试：\n\n```go\nfunc TestComputeBucketHive(t *testing.T)\nfunc TestComputeBucketSpark(t *testing.T)\n```\n\n它们分别验证：\n\n- `\"hive\"` 算法可以成功计算 bucket。\n- `\"spark\"` 算法可以成功计算 bucket。\n- 结果都位于 `[0, numBuckets)` 范围内。\n\n如果后续修改哈希实现，建议补充固定输入的 golden case，明确某个 URI 在给定桶数、算法和 seed 下的期望 bucket id，避免兼容性回归。","other-build-sh":"# Other — build.sh\n\n## build.sh\n\n`build.sh` 是项目的 Linux 构建脚本，用于准备构建依赖并生成 Go 可执行文件 `output/uri_source_reader`。脚本没有定义函数或类，也没有被代码内调用；它是一个顺序执行的外部构建入口。\n\n## 执行流程\n\n```mermaid\nflowchart TD\n    A[启动 build.sh] --> B{当前系统是否为 linux}\n    B -- 否 --> C[输出不支持系统并退出 1]\n    B -- 是 --> D[加载 .env]\n    D --> E[更新 apt 包索引]\n    E --> F[安装 bvc]\n    F --> G[克隆 hdfs_client 到 /opt/tiger/hdfs_client]\n    G --> H[重建 output 目录]\n    H --> I[go build 生成 output/uri_source_reader]\n```\n\n## 运行环境要求\n\n该脚本只支持 Linux：\n\n```bash\nif [ $(uname -s | tr A-Z a-z) != \"linux\" ]; then\n    echo \"Unsupported OS, only running this script on Linux\"\n    exit 1\nfi\n```\n\n系统名称通过 `uname -s` 获取，并用 `tr A-Z a-z` 转成小写后与 `linux` 比较。非 Linux 环境会直接退出，退出码为 `1`。\n\n脚本还隐含依赖以下环境：\n\n- 当前目录存在 `.env`，因为脚本使用 `. .env` 直接加载。\n- 系统使用 `apt` 包管理器。\n- 当前执行用户有权限运行 `apt update -y`、`apt install -y bvc`，以及写入 `/opt/tiger/hdfs_client`。\n- Go 工具链已可用，因为最后执行 `go build`。\n- 当前工作目录是 Go 模块或可构建的 Go 包根目录。\n\n## 关键步骤\n\n### 加载环境变量\n\n```bash\n. .env\n```\n\n脚本使用 POSIX shell 的 `.` 命令加载当前目录下的 `.env`。这会把 `.env` 中的变量注入当前 shell 进程，后续的 `apt`、`bvc`、`go build` 都会继承这些环境变量。\n\n脚本没有检查 `.env` 是否存在。如果文件缺失，shell 会报错，后续行为取决于 shell 的默认错误处理；由于脚本没有设置 `set -e`，单条命令失败后不一定立即终止。\n\n### 安装 `bvc`\n\n```bash\napt update -y\napt install -y bvc\n```\n\n构建前会刷新 apt 包索引并安装 `bvc`。这一步会修改系统级包状态，因此通常应在 CI 镜像、构建容器或受控 Linux 环境中执行。\n\n### 准备 HDFS 客户端\n\n```bash\nbvc clone -f data/inf/hdfs_client /opt/tiger/hdfs_client\n```\n\n脚本通过 `bvc clone -f` 将 `data/inf/hdfs_client` 克隆到固定路径 `/opt/tiger/hdfs_client`。`-f` 表示强制操作，可能覆盖目标路径中的既有内容。\n\n该步骤说明项目构建或运行时依赖 `/opt/tiger/hdfs_client` 下的 HDFS 客户端文件。这个依赖不是通过 Go 模块声明的，而是由构建脚本在系统路径中准备。\n\n### 重建输出目录\n\n```bash\nrm -rf output && mkdir -p output\n```\n\n构建前会删除整个 `output` 目录并重新创建。任何此前保存在 `output` 下的文件都会被清除。\n\n### 构建可执行文件\n\n```bash\ngo build -o output/uri_source_reader\n```\n\n最后使用 `go build` 构建当前目录对应的 Go 包，并将产物写入：\n\n```text\noutput/uri_source_reader\n```\n\n这里没有指定包路径，因此 `go build` 的构建目标是脚本运行时所在目录。\n\n## 与代码库的关系\n\n`build.sh` 是代码库的构建编排层，不参与 Go 程序运行时逻辑。它负责把外部系统依赖和最终二进制产物连接起来：\n\n- 外部依赖：`apt`、`bvc`、`/opt/tiger/hdfs_client`\n- 项目源码：当前目录下的 Go 包\n- 构建产物：`output/uri_source_reader`\n\n开发者修改 Go 代码后，可以通过该脚本在 Linux 环境中生成标准输出产物。若只需要本地快速编译且环境中已经准备好依赖，也可以直接运行：\n\n```bash\ngo build -o output/uri_source_reader\n```\n\n但这会跳过 `.env` 加载、`bvc` 安装和 HDFS 客户端准备，因此不等价于完整构建流程。\n\n## 维护注意事项\n\n该脚本当前没有启用严格错误处理。由于没有 `set -e`，例如 `.env` 加载失败、`apt install` 失败或 `bvc clone` 失败时，脚本可能继续执行到 `go build`。如果后续需要提高 CI 可诊断性，可以考虑在脚本顶部加入严格模式：\n\n```bash\nset -euo pipefail\n```\n\n另外，`/opt/tiger/hdfs_client` 是硬编码路径。如果不同环境需要不同安装位置，应优先通过 `.env` 中的变量配置，并在脚本中显式校验变量是否存在。","other-controlplane":"# Other — controlplane\n\n## controlplane 模块\n\n`controlplane` 包负责把 reader 运行状态上报到控制面。它提供三层能力：\n\n- `Client`：封装控制面 HTTP/Hertz 请求。\n- `Tracker`：线程安全地累计 reader 运行进度。\n- `Reporter`：周期性发送心跳和进度，并在结束时 flush 最终进度。\n\n该模块面向 reader 侧使用，当前所有上报请求的 `Kind` 都固定为 `\"reader\"`。\n\n## 核心流程\n\n```mermaid\nflowchart TD\n    A[\"reader 任务代码\"] --> B[\"Tracker 更新进度\"]\n    B --> C[\"Reporter 周期读取 Snapshot\"]\n    C --> D[\"Client.SendHeartbeat\"]\n    C --> E[\"Client.SendProgress\"]\n    D --> F[\"POST /api/v1/heartbeat\"]\n    E --> G[\"POST /api/v1/report_progress\"]\n```\n\n典型调用顺序是：\n\n```go\nclient, err := controlplane.NewClient(controlplane.Config{\n    Endpoint: \"http://control-plane.example.com\",\n})\nif err != nil {\n    return err\n}\n\ntracker := controlplane.NewTracker(\n    \"job-1\",\n    \"reader-1\",\n    \"hdfs_parquet\",\n    \"127.0.0.1\",\n    0,\n)\n\nreporter := controlplane.NewReporter(client, tracker, 30*time.Second, 30*time.Second)\nreporter.Start(ctx)\ndefer reporter.Stop()\n\ntracker.OnFilesResolved(10)\ntracker.OnRowsRead(1000)\ntracker.OnFileDone(\"/path/part-00000.parquet\", 1024)\ntracker.OnBucketsSeen([]int{1, 2, 2})\n\ntracker.SetWorkerStatus(controlplane.WorkerStateDone, \"\")\nreturn reporter.FlushFinalProgress(context.Background())\n```\n\n## Client：控制面请求封装\n\n`NewClient(cfg Config)` 创建控制面客户端。`Config` 包含：\n\n- `Endpoint`：显式控制面地址。非空时直接拼接 API path，例如 `Endpoint + \"/api/v1/heartbeat\"`。\n- `PSM`：未配置 `Endpoint` 时使用的服务名；默认值为 `bytedance.videoarch.uri_task_control_panel`。\n- `Cluster`：服务发现目标集群；默认值为 `\"default\"`。\n\n`Client` 使用 `byted.NewClient` 创建 Hertz byted 客户端，默认请求超时时间为 `3s`。当 `Endpoint` 为空时，`doJSON` 会启用服务发现选项：\n\n- `discovery.WithSD(true)`\n- `discovery.WithDestinationCluster(c.cfg.Cluster)`\n- `hconfig.WithRequestTimeout(defaultRequestTimeout)`\n\n对外方法只有两个：\n\n- `SendHeartbeat(ctx, req HeartbeatRequest) (*HeartbeatResponse, error)`\n- `SendProgress(ctx, req ProgressRequest) (*ProgressResponse, error)`\n\n它们分别调用：\n\n- `POST /api/v1/heartbeat`\n- `POST /api/v1/report_progress`\n\n响应统一按 `envelope[T]` 解析：\n\n```go\ntype envelope[T any] struct {\n    Code    int    `json:\"code\"`\n    Message string `json:\"message\"`\n    Data    T      `json:\"data\"`\n}\n```\n\n`doJSON` 只接受 HTTP 200；如果 envelope 的 `code != 0`，会返回包含控制面错误码和消息的 error。`data` 为空时不会继续反序列化业务响应体。\n\n## Tracker：reader 进度聚合\n\n`Tracker` 是 reader 状态的内存聚合器，内部用 `sync.Mutex` 保护所有字段，适合被读取线程和处理线程并发访问。\n\n`NewTracker(jobID, readerID, sourceType, ip string, port int)` 初始化：\n\n- `workerStatus` 为 `WorkerStateRunning`\n- `bucketsSeen` 为空 map\n- `lastUpdateTime` 为当前 UTC 时间\n\n进度更新方法：\n\n- `OnFilesResolved(total int)`：设置文件总数。\n- `OnFileDone(_ string, bytesRead int64)`：完成文件数加一；`bytesRead > 0` 时累计读取字节数。\n- `OnRowsRead(rows int)`：`rows > 0` 时累计读取行数。\n- `OnBucketsSeen(bucketIDs []int)`：按 bucket ID 去重统计，重复 ID 只算一次。\n- `SetWorkerStatus(status, errorMessage string)`：设置 worker 状态和错误信息；空 `status` 会被忽略。\n- `ReaderID() string`：读取 reader ID。\n- `Snapshot() Snapshot`：复制当前状态，用于上报。\n\n`Snapshot` 是上报前的稳定视图，包含 `JobID`、`ReaderID`、`SourceType`、`IP`、`Port`、`WorkerStatus`、`ErrorMessage`、文件计数、行数、字节数、去重后的 `BucketsSeen` 和 `LastUpdateTime`。\n\n## Reporter：周期上报与最终 flush\n\n`NewReporter(client, tracker, heartbeatEvery, progressEvery)` 创建 reporter。两个间隔参数小于等于 0 时都会回退到 `30s`。\n\n`Start(ctx)` 会启动两个 goroutine：\n\n- `runHeartbeat`：启动后立即调用一次 `sendHeartbeat`，之后按 `heartbeatEvery` 周期发送。\n- `runProgress`：启动后立即调用一次 `sendProgress`，之后按 `progressEvery` 周期发送。\n\n`Stop()` 会取消内部 context，并等待两个 goroutine 退出。\n\n`sendHeartbeat` 从 `Tracker.Snapshot()` 读取当前状态，然后调用 `Client.SendHeartbeat`。心跳请求字段包括：\n\n- `JobID`\n- `Kind: \"reader\"`\n- `ReaderID`\n- `IP`\n- `Port`\n- `Timestamp: time.Now().UTC()`\n\n周期性进度上报通过 `sendProgress` 调用 `FlushFinalProgress(ctx)` 实现。`FlushFinalProgress` 会读取 snapshot 并构造 `ProgressRequest`：\n\n- `JobID`\n- `Kind: \"reader\"`\n- `ReaderID`\n- `WorkerStatus`\n- `ErrorMessage`\n- `Files`\n  - `FilesTotal`\n  - `FilesDone`\n  - `RowsRead`\n  - `BytesRead`\n- `BucketsSeen`\n- `LastUpdateTime`\n\n需要注意：周期上报中的错误会被忽略，`FlushFinalProgress` 直接调用时会返回 `Client.SendProgress` 的 error。因此任务结束路径应显式调用 `FlushFinalProgress`，确保最终状态可以被调用方感知。\n\n## 状态与请求类型\n\nworker 状态使用字符串常量：\n\n```go\nconst (\n    WorkerStateRunning = \"RUNNING\"\n    WorkerStateDone    = \"DONE\"\n    WorkerStateFailed  = \"FAILED\"\n)\n```\n\n心跳请求类型是 `HeartbeatRequest`，响应类型是 `HeartbeatResponse`，控制面可通过 `next_interval_sec` 返回建议间隔；当前 `Reporter` 不会动态调整本地 ticker。\n\n进度请求类型是 `ProgressRequest`，文件维度进度放在 `ReaderFilesProgress` 中。`ProgressResponse` 只有 `Ack bool` 字段。\n\n## 测试覆盖\n\n`TestReporterFlushFinalProgressAndHeartbeat` 使用 `httptest.NewServer` 模拟控制面，验证：\n\n- `NewClient(Config{Endpoint: server.URL})` 能走显式 endpoint。\n- `Reporter.Start` 会触发至少一次 heartbeat 和 progress。\n- `Reporter.Stop` 能停止后台 goroutine。\n- `FlushFinalProgress` 会发送最终进度。\n- heartbeat payload 中 `JobID` 和 `Kind` 正确。\n- progress payload 中 `ReaderID`、`WorkerStatus`、文件总数、完成文件数、行数、字节数和去重后的 `BucketsSeen` 正确。\n\n该测试体现了模块的主要契约：reader 业务代码只需要持续更新 `Tracker`，`Reporter` 负责把 snapshot 转换为控制面请求。","other-diagnostics":"# Other — diagnostics\n\n## Other — diagnostics 模块\n\n`diagnostics/writer_rpc_diagnosis.html` 是一个独立的静态诊断看板，用于展示一次 `writer_rpc` 性能排查结果。它不依赖后端接口、打包流程或框架，所有数据都直接内嵌在 HTML、CSS 和 JavaScript 中，浏览器打开文件即可渲染。\n\n该页面面向排障场景：把 Lambda raw stdout 中聚合出的关键指标整理成可读的诊断结论，包括 `writer_rpc` 总耗时、本地构建成本、endpoint 扇出、worker 排队、RPC 长尾、高频慢 endpoint，以及后续排查建议。\n\n## 运行方式与代码边界\n\n这个模块只有一个文件：\n\n- `diagnostics/writer_rpc_diagnosis.html`\n\n它没有检测到内部调用、外部调用或来自其他模块的调用。页面中的两个日志入口是普通 `<a>` 链接：\n\n- `查看日志页`\n- `打开 raw stdout`\n\nJavaScript 代码不会发起 `fetch`、XHR、RPC 或动态资源加载请求。页面数据来自本文件内的常量数组和静态文案，因此它更像一次排障产物，而不是通用诊断系统。\n\n## 页面结构\n\n页面主体位于：\n\n```html\n<main class=\"shell\">\n  ...\n<\/main>\n```\n\n主要区域按诊断阅读顺序排列：\n\n1. 顶部标题与日志链接：`.topbar`\n2. 核心结论与运行概况：`.hero`、`.diagnosis`、`.scoreboard`\n3. 延迟拆解：`#latencyRows`\n4. `buildEndpointBatches` profile 摘要\n5. `writer_rpc` 调用路径说明\n6. 高频慢 endpoint 表格：`#endpointBody`\n7. 排查建议\n8. 证据摘录\n\n页面首屏重点给出结论：主瓶颈仍在 `writer_rpc`，但日志显示不是重试或 backpressure，而是固定 256 endpoint 扇出、endpoint worker 排队长尾、少数 endpoint RPC 长尾，以及本地 `buildEndpointBatches` 成本叠加。\n\n## 前端实现\n\n样式全部写在 `<style>` 中，没有外部 CSS 依赖。页面使用 CSS 变量定义视觉语义：\n\n```css\n:root {\n  --bg: #f6f7f9;\n  --panel: #ffffff;\n  --ink: #17202a;\n  --muted: #667085;\n  --teal: #008c89;\n  --blue: #3b6ea8;\n  --amber: #c77d18;\n  --rose: #c94b5f;\n}\n```\n\n颜色在页面中承担诊断语义：\n\n- `good` / `teal`：正常信号，例如 prewarm 正常、无重试压力\n- `warn` / `amber`：需要关注，例如 build 成本、长尾影响\n- `hot` / `rose`：主要风险，例如固定扇出和慢 endpoint\n- `violet`：用于排队等待类指标\n\n响应式布局通过两个断点控制：\n\n- `max-width: 1080px`：双栏布局收缩为单栏，信号卡片改为两列\n- `max-width: 720px`：移动端基本改为单列，表格保留横向滚动\n\n## 数据模型\n\n页面有两个核心数据数组。\n\n`latencyData` 描述延迟指标：\n\n```js\nconst latencyData = [\n  {\n    key: \"build_elapsed\",\n    label: \"buildEndpointBatches\",\n    desc: \"本地 records/object metas 构建成本\",\n    avg: 358.385,\n    p50: 147.341,\n    p95: 1369,\n    p99: 1779,\n    max: 2382,\n    color: \"amber\"\n  }\n];\n```\n\n字段含义：\n\n- `key`：指标唯一标识，也用于特殊归一化逻辑\n- `label`：页面展示名称\n- `desc`：指标解释\n- `avg`、`p50`、`p95`、`p99`、`max`：毫秒单位的统计值\n- `color`：对应 `.bar-fill.<color>` 的 CSS 类\n\n`endpointData` 描述 slow endpoint 聚合结果：\n\n```js\nconst endpointData = [\n  {\n    rank: 1,\n    endpoint: \"[fdbd:dc53:27:21c::55]:42257\",\n    count: 58,\n    avgRpc: 485.755,\n    maxRpc: 1931,\n    avgQueue: 731.806,\n    maxQueue: 1914,\n    signal: \"RPC + queue 双高\",\n    heat: \"hot\"\n  }\n];\n```\n\n字段含义：\n\n- `rank`：默认排序中的排名\n- `endpoint`：writer endpoint 地址\n- `count`：出现在 slow endpoint 明细中的次数\n- `avgRpc` / `maxRpc`：RPC 耗时统计\n- `avgQueue` / `maxQueue`：endpoint worker 排队耗时统计\n- `signal`：人工归纳的诊断标签\n- `heat`：徽标样式，对应 `.badge.ok`、`.badge.warn`、`.badge.hot`\n\n## 渲染流程\n\n页面初始化时执行两个渲染函数：\n\n```js\nrenderLatencyRows();\nrenderEndpoints();\n```\n\n整体关系如下：\n\n```mermaid\nflowchart TD\n  A[内嵌诊断数据] --> B[latencyData]\n  A --> C[endpointData]\n  B --> D[renderLatencyRows 渲染延迟拆解]\n  C --> E[renderEndpoints 渲染 endpoint 表格]\n  E --> F[表头点击更新 sortState]\n```\n\n`renderLatencyRows()` 会读取 `latencyData`，生成 `.latency-row` HTML，并写入 `#latencyRows`。条形图宽度基于 `max` 值归一化：\n\n```js\nconst base = item.key === \"total_rpc_elapsed\" ? maxTotalRpc : maxWall;\nconst width = Math.max(3, Math.round((item.max / base) * 100));\n```\n\n这里有一个重要设计：`total_rpc_elapsed` 是 256 个 RPC 的累加值，不等于壁钟时间，所以它使用 `maxTotalRpc` 单独归一化；其他壁钟相关指标使用 `maxWall` 归一化，避免 `total_rpc_elapsed` 把其他条形压得过短。\n\n`renderEndpoints()` 会复制 `endpointData` 后按 `sortState` 排序，再写入 `#endpointBody`。表头点击事件绑定在所有 `th[data-key]` 上：\n\n```js\ndocument.querySelectorAll(\"th[data-key]\").forEach((th) => {\n  th.addEventListener(\"click\", () => {\n    const key = th.dataset.key;\n    sortState = {\n      key,\n      dir: sortState.key === key && sortState.dir === \"desc\" ? \"asc\" : \"desc\"\n    };\n    renderEndpoints();\n  });\n});\n```\n\n当前排序状态由全局变量保存：\n\n```js\nlet sortState = { key: \"count\", dir: \"desc\" };\n```\n\n## 工具函数\n\n`ms(value)` 负责把毫秒数格式化为页面展示字符串：\n\n```js\nfunction ms(value) {\n  if (value >= 1000) {\n    return `${(value / 1000).toFixed(value >= 10000 ? 1 : 3).replace(/\\.?0+$/, \"\")}s`;\n  }\n  return `${value.toFixed(value >= 100 ? 0 : 1).replace(/\\.?0+$/, \"\")}ms`;\n}\n```\n\n行为规则：\n\n- 小于 `1000` 的值显示为 `ms`\n- 大于等于 `1000` 的值转换为 `s`\n- 较大的秒数使用 1 位小数\n- 通过 `replace(/\\.?0+$/, \"\")` 去掉多余的小数零\n\n`endpointCell(item)` 负责生成 endpoint 表格行。它依赖 `ms()` 格式化 RPC 和 queue 指标，并使用 `item.heat` 选择 badge 样式。\n\n## 诊断含义\n\n这个页面表达的核心判断是：\n\n- prewarm 正常：`bucket_count=32768`、`cached_buckets=32768`、`unique_endpoints=256`\n- 没有明显重试压力：`timeout_retries=0`、`retryable_retries=0`、`backpressure_retries=0`\n- 所有 batch 都固定提交到 256 个 endpoint\n- `submit_elapsed`、`max_queue_wait`、`max_rpc_elapsed` 的 p95/p99 长尾共同影响总耗时\n- `buildEndpointBatches` 的 p95 已经到秒级，需要纳入优化范围\n\n因此，页面没有把问题简单归因为 writer 服务端 RPC 慢，而是把瓶颈拆成四段：\n\n1. 本地构建 RPC records\n2. bucket 到 endpoint 映射\n3. 256 endpoint 并发扇出\n4. endpoint worker 排队与实际 RPC 长尾\n\n其中第 2 段 `state_lookup_elapsed` 被标记为非主要瓶颈；第 1、3、4 段是后续排查重点。\n\n## 修改数据时的注意事项\n\n如果要用新的日志结果更新页面，通常需要同步修改这些位置：\n\n- 顶部 invocation、日期和日志链接\n- `.scoreboard` 中的运行概况数字\n- `.signals` 中的摘要判断\n- `latencyData`\n- `endpointData`\n- `buildEndpointBatches Profile` 区域的 benchmark 和 allocation 文案\n- “证据摘录”中的 raw stdout 片段\n\n修改 `latencyData` 时要保持单位为毫秒，因为 `ms()` 默认按毫秒格式化。修改 `endpointData` 时，`heat` 必须匹配现有 badge 类：`ok`、`warn` 或 `hot`。\n\n如果新增可排序列，需要同时满足两点：\n\n- 表头添加 `data-key`\n- `endpointData` 中每条记录都有同名字段\n\n`renderEndpoints()` 会自动根据字段类型选择数值排序或字符串排序。","other-go-mod":"# Other — go.mod\n\n## go.mod 模块说明\n\n`go.mod` 定义了仓库的 Go 模块边界、语言版本和依赖集合。当前模块路径是：\n\n```go\nmodule code.byted.org/videoarch/uri_source_reader\n```\n\n这意味着仓库内包在其他代码中应以 `code.byted.org/videoarch/uri_source_reader/...` 的形式被导入。`go 1.25` 指定了该模块面向的 Go 语言版本和模块解析语义。\n\n本文件本身没有函数、类或运行时调用链；它通过 Go Modules 机制影响整个代码库的编译、依赖解析、测试和部署。\n\n## 直接依赖\n\n第一组 `require` 是业务代码直接依赖的模块，通常对应源码中的显式 `import`。\n\n```go\nrequire (\n    code.byted.org/gopkg/env v1.7.16\n    code.byted.org/gopkg/logs/v2 v2.1.60\n    code.byted.org/inf/hdfs-go-sdk-on-cgo v1.1.5\n    code.byted.org/kite/kitex v1.22.1\n    code.byted.org/kv/goredis v5.7.7+incompatible\n    code.byted.org/middleware/hertz v1.14.3\n    code.byted.org/overpass/bytedance_videoarch_uri_task_control_panel ...\n    code.byted.org/v_lambda/lambda-go-sdk v0.0.35\n    code.byted.org/videoarch/media-parser-go v0.0.8\n    code.byted.org/videoarch/storagegw-go v1.1.57\n    code.byted.org/videoarch/video_extra_query ...\n    github.com/google/uuid v1.6.0\n    github.com/xitongsys/parquet-go v1.6.2\n)\n```\n\n这些依赖可以按职责理解：\n\n```mermaid\nflowchart TD\n    A[\"uri_source_reader\"]\n    A --> B[\"HTTP/RPC：hertz、kitex\"]\n    A --> C[\"运行环境：env、logs/v2\"]\n    A --> D[\"存储访问：hdfs-go-sdk-on-cgo、storagegw-go\"]\n    A --> E[\"媒体能力：media-parser-go、video_extra_query\"]\n    A --> F[\"任务与计算：Overpass 控制面、lambda-go-sdk\"]\n    A --> G[\"数据格式与工具：parquet-go、uuid、goredis\"]\n```\n\n## 关键依赖说明\n\n`code.byted.org/middleware/hertz` 提供 HTTP 服务框架。如果仓库中存在入口服务、路由注册或 HTTP handler，通常会依赖它完成请求接入、上下文传递和响应输出。\n\n`code.byted.org/kite/kitex` 是 RPC 框架依赖。仓库如果需要调用或暴露 Kitex 服务，IDL 生成代码、client 初始化和 server 启动逻辑会通过该依赖构建。\n\n`code.byted.org/overpass/bytedance_videoarch_uri_task_control_panel` 是 Overpass 生成的服务客户端依赖，名称表明它连接 `bytedance_videoarch_uri_task_control_panel` 服务，通常用于任务控制面相关 RPC 调用。\n\n`code.byted.org/videoarch/storagegw-go` 和 `code.byted.org/inf/hdfs-go-sdk-on-cgo` 说明该模块需要访问存储系统。前者面向 VideoArch StorageGW，后者面向 HDFS，并且包名包含 `on-cgo`，构建或运行环境需要注意 CGO 相关配置。\n\n`code.byted.org/videoarch/media-parser-go` 和 `code.byted.org/videoarch/video_extra_query` 表明该模块和媒体 URI 解析、视频元信息或额外查询能力有关。\n\n`github.com/xitongsys/parquet-go` 用于读写 Parquet 数据。仓库中涉及批量数据、离线结果或结构化文件输出的代码可能会依赖它。\n\n`code.byted.org/kv/goredis v5.7.7+incompatible` 是 Redis 客户端依赖。`+incompatible` 表示该版本不完全遵循 Go module 的语义化主版本路径规则；升级时需要特别确认 import path 和间接依赖中的 `code.byted.org/kv/goredis/v5` 是否会产生重复或兼容性问题。\n\n`github.com/google/uuid` 用于生成或解析 UUID，通常出现在任务 ID、请求 ID、临时对象 ID 或幂等键生成逻辑中。\n\n## 间接依赖\n\n第二组 `require` 全部带有 `// indirect`，表示它们不是当前模块源码直接 import 的主依赖，而是由直接依赖递归引入，或者曾由 `go mod tidy` 根据构建图保留下来。\n\n这些间接依赖覆盖几个主要领域：\n\n- 链路追踪与监控：`bytedtrace-*`、`trace-client-go`、`metrics`、`prometheus`、`profiler`\n- 服务发现与配置：`consul`、`etcd`、`tccclient`、`configmanager`\n- RPC/IDL 生态：`cloudwego/kitex`、`thrift`、`protobuf`、`grpc`\n- 安全与身份：`kms`、`spiffe`、`zero-trust`、`certinfo`\n- 存储与压缩格式：`tos`、`ve-tos-golang-sdk`、`lz4`、`snappy`、`arrow`\n- 测试工具：`github.com/stretchr/testify`、`github.com/bytedance/mockey`\n- 配置解析与工具库：`viper`、`yaml`、`toml`、`cast`\n\n开发时通常不应手动编辑这些间接依赖。新增、删除或升级代码 import 后，应通过下面命令让 Go 工具链重新整理：\n\n```bash\ngo mod tidy\n```\n\n## 与代码库的连接方式\n\n`go.mod` 不参与运行时执行流，但它决定以下行为：\n\n- `go build` 如何解析源码中的 import。\n- `go test ./...` 使用哪些依赖版本编译测试。\n- Kitex、Hertz、Overpass、StorageGW、HDFS 等框架代码能否正确链接。\n- CI/CD 和部署环境复现依赖版本时的输入。\n- `go.sum` 校验依赖完整性时的模块版本来源。\n\n源码新增 import 时，如果该包属于新模块，`go mod tidy` 会把它加入 `require`。源码删除 import 后，如果没有其他包依赖该模块，`go mod tidy` 会移除对应条目。\n\n## 维护注意事项\n\n升级 `code.byted.org/kite/kitex`、`code.byted.org/middleware/hertz` 或 Overpass 生成客户端时，需要回归服务启动、RPC 调用和中间件行为，因为这些依赖通常影响框架初始化链路。\n\n升级 `hdfs-go-sdk-on-cgo` 时，需要确认本地、CI 和线上构建环境的 CGO 设置一致。\n\n升级 `parquet-go` 时，应验证 Parquet 读写兼容性，尤其是 schema、压缩格式和空值处理。\n\n处理 Redis 相关依赖时，需要注意当前同时存在直接依赖 `code.byted.org/kv/goredis v5.7.7+incompatible` 和间接依赖 `code.byted.org/kv/goredis/v5 v5.7.7`。如果后续代码迁移 import path，应统一版本路径，避免同一客户端以两个模块路径进入构建图。\n\n日常修改依赖的推荐流程是：\n\n```bash\ngo get <module>@<version>\ngo mod tidy\ngo test ./...\n```\n\n`go.mod` 和 `go.sum` 应一起提交，保证其他开发者和 CI 能复现相同的依赖解析结果。","other-main-test-go":"# Other — main_test.go\n\n## main_test.go 测试模块\n\n`main_test.go` 覆盖 `main` 包中 reader handler 的关键集成路径和配置归一化逻辑。它主要验证三类行为：\n\n- `handler` 处理 HDFS Parquet 输入时，能正确写出 `bucket_file` 结果并向 control plane 上报心跳和进度。\n- `writer_rpc` sink 能从 Redis 路由表读取 writer endpoint，并在测试结束后调用 writer 的 `MarkBucketDone`。\n- `Input.Normalize`、`SinkInput`、`newTOSInventoryCSVConfig` 等配置辅助逻辑能保持预期默认值、校验规则和字段传递。\n\n这些测试与 `main.go` 中的 `Input`、`SinkInput`、`ControlPlaneInput`、`HDFSParquetInput`、`TOSInventoryCSVInput`、`handler`、`millisecondsOrZero` 等实现直接耦合，因此更像端到端保护网，而不是纯单元测试集合。\n\n## 测试分层\n\n### 受环境变量保护的集成测试\n\n以下测试默认跳过，需要显式设置环境变量：\n\n- `TestHandler_HDFSParquetWithControlPlane_DirectInvocation`\n  - 环境变量：`URI_READER_RUN_HANDLER_CONTROLPLANE_TEST=1`\n  - 使用 `httptest.NewServer` 模拟 control plane。\n  - 验证 `/api/v1/heartbeat` 和 `/api/v1/report_progress` 都被调用。\n  - 验证上报 payload 中的 `job_id`、`kind=reader`、`reader_id`。\n  - 验证 `bucket_file` sink 在 `defaultBucketFileSinkOutputDir` 下产生输出。\n\n- `TestHandler_HDFSParquetWithRealControlPlane_DirectInvocation`\n  - 环境变量：`URI_READER_RUN_HANDLER_REAL_CONTROLPLANE_TEST=1`\n  - 默认 control plane 地址为 `http://127.0.0.1:8090`，可通过 `URI_READER_REAL_CONTROLPLANE_BASE_URL` 覆盖。\n  - 先调用 `createReaderControlPlaneJob` 创建真实 job。\n  - 再直接调用 `handler` 执行 HDFS Parquet reader。\n  - 最后通过 `waitForRealControlPlaneReaderReported` 轮询 job detail，确认 reader 已上报文件进度。\n\n- `TestHandler_HDFSParquetWithRedisWriterSink_DirectInvocation`\n  - 环境变量：`URI_READER_RUN_HANDLER_REDIS_WRITER_TEST=1`\n  - 使用真实 control plane、真实 Redis 路由和真实 writer Kitex 服务。\n  - 先通过 `assertRedisWriterRoutesReady` 确认每个 bucket 都有 writer endpoint。\n  - 调用 `handler`，sink 类型为 `writer_rpc`。\n  - 调用 `finalizeRedisWriterBuckets` 对每个 bucket 执行 `writerservice.Client.MarkBucketDone`。\n  - 最后等待 control plane 观察到 reader 进度。\n\n```mermaid\nflowchart TD\n    A[\"测试入口\"] --> B[\"prepareHandlerRuntimeEnv\"]\n    B --> C[\"newLambdaTestContext\"]\n    C --> D[\"handler\"]\n    D --> E[\"bucket_file 输出\"]\n    D --> F[\"control plane 心跳/进度\"]\n    D --> G[\"writer_rpc 写入\"]\n    G --> H[\"Redis 路由\"]\n    H --> I[\"MarkBucketDone\"]\n```\n\n## 直接 handler 测试的输入结构\n\n三个直接调用 `handler` 的测试都构造 `Input`，而不是通过 Lambda 运行时触发。典型配置包括：\n\n- `JobID`\n- `SourceType: SourceTypeHDFSParquet`\n- `Sink`\n  - `Type: \"bucket_file\"` 或 `Type: \"writer_rpc\"`\n- `Bucketing`\n  - `NumBuckets: 4`\n  - `HashAlg: HashAlgHive`\n- `HDFSParquet`\n  - `FilePaths: []string{testHandlerHDFSFile}`\n  - `StoreURIField: \"store_uri\"`\n- `Limits`\n  - `ReaderWorkers: 2`\n  - `BatchRows: 1000`\n  - `ParquetParallelism: 4`\n- `ControlPlane`\n  - `Endpoint`\n  - `HeartbeatIntervalSec: 1`\n  - `ProgressReportIntervalSec: 1`\n\n`newLambdaTestContext` 使用 `lambdacontext.NewContext` 注入 `ExecutorID`，handler 侧会把它作为 reader 身份来源。相关断言通过 `assertPostedReaderID` 和真实 control plane 查询确认该 ID 被正确传播。\n\n## control plane 测试辅助结构\n\n`testControlPlaneRecorder` 是内存记录器，用于 mock control plane 测试：\n\n- `heartbeatCalls` 记录心跳次数。\n- `progressCalls` 记录进度上报次数。\n- `heartbeats` 保存每次心跳请求体。\n- `progresses` 保存每次进度请求体。\n- `mu sync.Mutex` 保护并发写入。\n\nmock server 只接受两个路径：\n\n- `/api/v1/heartbeat`\n- `/api/v1/report_progress`\n\n其他路径会直接 `t.Fatalf`，用于尽早暴露 handler 的接口路径变更。\n\n真实 control plane 的 JSON 响应由以下结构解析：\n\n- `controlPlaneEnvelope`\n- `controlPlaneCreateJobResponse`\n- `controlPlaneJobDetailResponse`\n\n`doControlPlaneJSON` 统一完成请求构造、状态码检查、业务 `code` 检查和 `data` 反序列化。\n\n## Redis writer sink 测试\n\n`TestHandler_HDFSParquetWithRedisWriterSink_DirectInvocation` 验证 reader 与 writer RPC 路由的协作。\n\n关键常量：\n\n- `redisCluster = \"toutiao.redis.videoarch_storage_test\"`\n- `redisKeyPrefix = \"writer-reader-bucket4-job\"`\n- `numBuckets = 4`\n- 默认 writer service name 为 `\"uri-writer\"`\n\n`assertRedisWriterRoutesReady` 会检查 Redis 中每个 bucket 的路由键：\n\n```text\n{redisKeyPrefix}:bucket:{bucketID 的 5 位补零格式}\n```\n\n示例：\n\n```text\nwriter-reader-bucket4-job:bucket:00000\nwriter-reader-bucket4-job:bucket:00001\n```\n\n`finalizeRedisWriterBuckets` 对每个 bucket 执行：\n\n1. 从 Redis 读取 endpoint。\n2. 使用 `normalizeWriterTestEndpoint` 规范化 endpoint。\n3. 按 endpoint 复用 `writerservice.Client`。\n4. 调用 `MarkBucketDone`。\n5. 检查返回的 `ErrorCode` 必须为 `uri_writer.ErrorCode_SUCCESS`。\n\n`normalizeWriterTestEndpoint` 和 `splitWriterTestEndpoint` 的主要作用是处理 IPv6 host。未加方括号的 IPv6 host 会被转换为 `[host]:port` 形式，以满足 Kitex host port 格式要求。\n\n## 配置单元测试\n\n### `SinkInput` Redis 嵌套配置优先级\n\n`TestNewSinkWriterRPCPrefersNestedRedisConfig` 验证 `SinkInput.Redis` 中的嵌套配置会被以下方法读取：\n\n- `redisCluster`\n- `redisKeyPrefix`\n- `readRedisTimeoutSeconds`\n- `readRedisMaxRetries`\n\n同时测试 writer RPC 相关批处理配置保持原值：\n\n- `RPCTimeoutRetries`\n- `EndpointBatchMaxWaitMS`\n- `EndpointBatchMaxTasks`\n- `EndpointBatchMaxObjects`\n- `EndpointTaskQueueSize`\n\n`millisecondsOrZero` 用于把毫秒整数转换为 `time.Duration`。非正数会返回 `0`，由 `TestMillisecondsOrZeroRejectsNonPositiveValues` 覆盖。\n\n### endpoint batch 默认值\n\n`TestSinkInputEndpointBatchDefaultsLeaveCallbackDefaults` 确认空 `SinkInput` 不会主动覆盖 callback 层默认值：\n\n- `EndpointBatchMaxWaitMS` 转换后为 `0`\n- `EndpointBatchMaxTasks` 为 `0`\n- `EndpointBatchMaxObjects` 为 `0`\n- `EndpointTaskQueueSize` 为 `0`\n\n这保证未显式配置时，底层 writer callback 可以继续使用自己的默认策略。\n\n### TOS inventory CSV 配置\n\n`TestNewTOSInventoryCSVConfigUsesLimitsBatchRowsReaderWorkersAndSinkWorkers` 验证 `newTOSInventoryCSVConfig` 会从 `Input` 正确传递：\n\n- `Limits.ReaderWorkers`\n- `Limits.SinkWorkers`\n- `Limits.BatchRows`\n- `TOSInventoryCSV.CreateTimestampColumn`\n- `TOSInventoryCSV.TaskType`\n\n该测试防止新增字段后只更新输入结构、却没有传入具体 source 配置。\n\n### `Input.Normalize` 校验\n\n`TestInputNormalizeRejectsBothCreateTimeColumns` 验证 `TOSInventoryCSVInput` 中不能同时设置：\n\n- `CreateTimestampColumn`\n- `CreateTimeStrColumn`\n\n错误信息需要包含 `\"cannot both be set\"`。\n\n`TestInputNormalizeRejectsManifestExpandWithoutContentTypeColumn` 验证当 `TaskType` 为 `\"manifest_expand\"` 时，必须设置 content type column。错误信息需要包含 `\"content_type_column is required\"`。\n\n### HDFS Parquet 字段默认值\n\n`TestInputNormalizeDefaultsHDFSParquetFormatField` 验证 HDFS Parquet 输入在 `Normalize` 后会补齐默认字段：\n\n- `FormatField: \"format\"`\n- `CreateTimestampField: \"created_at\"`\n\n`TestInputNormalizeKeepsCustomHDFSParquetFields` 验证显式配置不会被默认值覆盖：\n\n- `FormatField: \"media_format\"`\n- `CreateTimestampField: \"event_created_at\"`\n\n### HDFS Parquet limits 传递\n\n`TestHDFSParquetLimitsCarrySinkWorkers` 明确覆盖 `LimitsInput.SinkWorkers` 到 `hdfsparquet.Limits.SinkWorkers` 的传递关系，防止 reader worker、sink worker、parquet 并发等限制字段在转换时遗漏。\n\n## 运行环境准备\n\n`prepareHandlerRuntimeEnv` 为直接调用 handler 的测试创建隔离日志目录，并通过 `t.Setenv` 设置：\n\n- `HDFS_LOG_DIR`\n- `KITEX_LOG_DIR`\n\n这避免 HDFS native client 和 Kitex 在测试环境中写入默认路径，也减少不同测试之间的日志目录冲突。\n\n`assertReaderOutputProduced` 会在最多 2 秒内轮询 `outputDir`，只要目录存在且包含文件即认为 bucket file sink 已输出成功。\n\n## 与主代码的关系\n\n`main_test.go` 不定义业务逻辑，而是围绕 `main.go` 的公开结构和包内辅助方法建立回归保护。它直接验证以下生产代码契约：\n\n- `handler` 能接受标准化后的 `Input` 并执行 source 到 sink 的完整链路。\n- `ControlPlaneInput` 的 endpoint 与上报间隔会驱动 heartbeat/progress 请求。\n- `SinkInput` 的 Redis 嵌套配置优先于旧式平铺字段。\n- `Input.Normalize` 负责补默认值和拒绝非法组合。\n- `newTOSInventoryCSVConfig` 与 `hdfsparquet.Limits` 必须完整接收并传递 concurrency、batch 和字段配置。\n\n修改 `main.go` 中的输入 schema、默认值、control plane API 路径、writer RPC 路由格式或 HDFS Parquet 字段映射时，应同步检查本文件中的断言是否仍代表预期行为。","other-makefile":"# Other — Makefile\n\n## 模块概览\n\n`Makefile` 提供代码库的基础开发命令入口，用于构建、测试和清理 Go 项目。它不包含业务逻辑，也没有内部函数调用关系；它的作用是把常用的 `go` 命令封装成稳定的 `make` 目标，方便开发者和自动化环境统一执行。\n\n## 目标定义\n\n```makefile\ndefault: build\n```\n\n`default` 是默认目标。直接执行 `make` 时，等价于执行：\n\n```bash\nmake build\n```\n\n### `build`\n\n```makefile\nbuild:\n\tgo build -o uri_source_reader\n```\n\n`build` 使用 Go 工具链编译当前目录下的 Go 包，并将输出文件命名为 `uri_source_reader`。\n\n关键行为：\n\n- 输出二进制文件位于仓库当前目录。\n- `go build` 未显式指定包路径，因此会构建当前目录对应的 Go package。\n- `-o uri_source_reader` 固定了产物名称，便于脚本、部署或本地运行时引用同一个文件名。\n\n常用命令：\n\n```bash\nmake build\n./uri_source_reader\n```\n\n### `test`\n\n```makefile\ntest:\n\tgo test -v ./...\n```\n\n`test` 执行整个 Go module 下的测试。\n\n关键行为：\n\n- `./...` 会递归匹配当前目录及所有子目录中的 Go package。\n- `-v` 开启详细输出，便于查看每个测试用例的执行情况。\n- 适合在提交前、本地调试后或 CI 阶段运行。\n\n常用命令：\n\n```bash\nmake test\n```\n\n### `clean`\n\n```makefile\nclean:\n\trm -f uri_source_reader\n```\n\n`clean` 删除 `build` 生成的二进制文件。\n\n关键行为：\n\n- 只清理 `uri_source_reader` 这个构建产物。\n- `rm -f` 在文件不存在时不会报错。\n- 不会清理测试缓存、Go build cache 或其他临时文件。\n\n常用命令：\n\n```bash\nmake clean\n```\n\n## 执行流程\n\n```mermaid\nflowchart TD\n    A[\"执行 make\"] --> B[\"default\"]\n    B --> C[\"build\"]\n    C --> D[\"go build -o uri_source_reader\"]\n\n    E[\"执行 make test\"] --> F[\"go test -v ./...\"]\n\n    G[\"执行 make clean\"] --> H[\"rm -f uri_source_reader\"]\n```\n\n## 与代码库的关系\n\n`Makefile` 是项目级入口文件，连接的是 Go 工具链而不是项目内部函数或类型。它没有调用代码中的函数、方法或包级 API；实际的编译和测试范围由 Go module、package 结构以及测试文件决定。\n\n开发者修改 Go 代码后，通常使用：\n\n```bash\nmake test\nmake build\n```\n\n来验证代码行为并生成可执行文件。\n\n## 维护注意事项\n\n当前目标未声明为 `.PHONY`。如果仓库中出现名为 `build`、`test` 或 `clean` 的同名文件，`make` 可能会认为目标已经是最新状态，从而跳过命令执行。若后续扩展该文件，建议添加：\n\n```makefile\n.PHONY: default build test clean\n```\n\n如果项目未来需要区分平台、注入版本号、设置构建标签或输出到专门目录，可以在 `build` 目标中扩展 `go build` 参数，但应保持 `make build` 作为主要构建入口。","other-sink":"# Other — sink\n\n## 模块概览\n\n`sink` 包是读取链路的输出层。上游 reader 将输入文件解析、分桶后，以 `Batch` 形式交给 sink；sink 再选择本地落盘、控制台打印或通过 Redis 路由写入 writer RPC 服务。\n\n核心回调边界定义在 `sink/types.go`：\n\n```go\ntype BatchCallback interface {\n\tOnBatch(ctx context.Context, batch Batch) error\n}\n\ntype ResultCallback interface {\n\tOnComplete(ctx context.Context, result Result) error\n}\n```\n\n`Batch` 是增量输出单元，包含来源文件、扫描行数、有效 URI 数和按 bucket 聚合的对象记录：\n\n```go\ntype Batch struct {\n\tFilePath      string\n\tScannedRows   int\n\tProcessedURIs int\n\tBuckets       map[int][]ObjectRecord\n}\n```\n\n`ObjectRecord` 保存写入侧需要的对象元信息，包括 `StoreURI`、`Size`、`StorageClass`、`ContentType`、`VID`、`OID` 和 `CreateTimestamp`。`Result` 是任务完成后的汇总信息，由 `OnComplete` 消费。\n\n## Sink 实现\n\n### `ConsolePrintCallback`\n\n`ConsolePrintCallback.OnBatch` 将每个批次的处理摘要打印到标准输出。它不会写文件，也不会实现 `OnComplete`。\n\n输出格式按 bucket ID 排序，使用 `sortedBucketIDs` 保证日志稳定：\n\n```text\nprocessed batch file=... scanned_rows=... processed_uris=... buckets={2:2,7:1}\n```\n\n该实现主要适合调试或本地观察批次形态。\n\n### `FileWriteCallback`\n\n`FileWriteCallback` 将批次摘要和最终汇总写入一个指定文件。\n\n通过 `NewFileWriteCallback(path)` 创建时会直接 `os.Create(path)`，也就是覆盖已有文件。内部使用 `bufio.Writer`，默认缓冲大小为 64 KiB，并用 `sync.Mutex` 串行化 `OnBatch`、`OnComplete` 和 `Close`。\n\n关键方法：\n\n- `OnBatch(ctx, batch)`：写入一行批次摘要。\n- `OnComplete(ctx, result)`：写入一行最终摘要，并立即 `Flush`。\n- `Close()`：刷新缓冲并关闭底层文件。\n\n批次摘要格式：\n\n```text\nprocessed batch file=/tmp/part-00000.parquet scanned_rows=1000 processed_uris=3 buckets={2:2,7:1}\n```\n\n最终摘要格式：\n\n```text\nsummary output_file=/path/to/output.log processed_files=334 processed_rows=54765489 processed_uris=60000000 processed_batches=1200\n```\n\n### `BucketFileCallback`\n\n`BucketFileCallback` 将对象 URI 按 bucket 写入不同文件，适合生成后续系统可消费的分桶文件。\n\n通过 `NewBucketFileCallback(outputDir)` 创建时会确保目录存在，并生成一个 `jobUUID`。每个 bucket 的文件名由 `fileName(bucketID)` 生成：\n\n```go\nfunc (c *BucketFileCallback) fileName(bucketID int) string {\n\treturn fmt.Sprintf(\"part-%05d-%s_%05d.c000\", bucketID, c.jobUUID, bucketID)\n}\n```\n\n`OnBatch` 的行为：\n\n1. 使用 `sortedBucketIDs(batch.Buckets)` 固定 bucket 处理顺序。\n2. 对每个 bucket 调用 `getWriter(bucketID)` 懒加载文件和缓冲 writer。\n3. 将每个 `ObjectRecord.StoreURI` 按行写入对应 bucket 文件。\n\n`OnComplete` 会先刷新所有 bucket writer，然后写入 `summary.txt`：\n\n```text\nprocessed_files=334\nprocessed_rows=54765489\nprocessed_uris=60000000\n```\n\n`Close` 会刷新并关闭所有已打开的 bucket 文件，然后清空 `files` 和 `writers` map。\n\n## Writer RPC Sink\n\n`RedisWriterCallback` 是生产路径中更复杂的 sink：它根据 bucket ID 从 Redis 查询 writer endpoint，把同一 endpoint 上的多个 bucket 合并成 RPC 请求，并调用 `uri_writer.WriterService.WriteBatch`。\n\n创建入口是：\n\n```go\nfunc NewRedisWriterCallback(cfg RedisWriterCallbackConfig) (*RedisWriterCallback, error)\n```\n\n主要配置项：\n\n- `RedisCluster`：Redis 集群名或直连地址列表，必填。\n- `RedisKeyPrefix`：bucket 到 endpoint 映射的 key 前缀，必填。\n- `WriterServiceName`：Kitex 服务名，默认 `\"uri-writer\"`。\n- `BucketCount`：大于 0 时会在初始化阶段预热 bucket endpoint。\n- `ReaderID`：非空时写入 RPC request 的 `Base.Extra[\"reader_id\"]`。\n- `ConnectTimeout`、`RPCTimeout`：Kitex 连接和调用超时。\n- `RPCTimeoutRetries`：RPC 超时类错误重试次数，默认 2。\n- `ReadRedisTimeout`、`ReadRedisRetries`：Redis 读取超时和重试次数。\n- `EndpointBatchMaxWait`、`EndpointBatchMaxTasks`、`EndpointBatchMaxObjects`：同 endpoint 微批聚合参数。\n- `EndpointTaskQueueSize`：每个 endpoint 的任务队列长度。\n\n### Redis 路由\n\nbucket endpoint key 由 `bucketRedisKey(prefix, bucketID)` 生成：\n\n```text\n<prefix>:bucket:%05d\n```\n\n例如 `bucketRedisKey(\"job\", 1)` 生成：\n\n```text\njob:bucket:00001\n```\n\n`lookupBucketEndpoint(ctx, bucketID)` 优先读取本地缓存 `bucketEndpoint`。缓存未命中时调用 `redisGet`，成功后会通过 `cacheBucketEndpoint` 写回缓存。\n\n初始化时，如果 `BucketCount > 0`，`prewarmBucketEndpoints` 会按 `redisMGetBatchSize` 批量 `MGET`：\n\n1. 扫描 `[0, BucketCount)` 的 bucket key。\n2. 将非空 Redis 值转换为 endpoint。\n3. 规范化 endpoint 格式。\n4. 缓存 bucket 到 endpoint 的映射。\n5. 为所有唯一 endpoint 预创建 Kitex client。\n\nRedis 值只接受 `string` 和 `[]byte`，空字符串会被忽略。\n\n### Endpoint 规范化\n\n`normalizeWriterEndpoint` 会清理空白，并处理 IPv6 endpoint。对于未带方括号的 IPv6 host，会转换为 Kitex 可用格式：\n\n```text\nfdbd:dc53:22:74a::49:35588\n```\n\n规范化为：\n\n```text\n[fdbd:dc53:22:74a::49]:35588\n```\n\n底层解析逻辑在 `splitEndpoint` 中。\n\n### 批次构建\n\n`RedisWriterCallback.OnBatch` 首先调用 `buildEndpointBatches(ctx, batch)`。该函数把 `Batch.Buckets` 转换为按 endpoint 分组的 `[]endpointBatch`。\n\n构建规则：\n\n- bucket ID 先通过 `sortedBucketIDs` 排序。\n- 空对象列表的 bucket 会跳过，不会产生 `DataRecord`。\n- 每个非空 bucket 通过 `lookupBucketEndpoint` 找到 endpoint。\n- 同一 endpoint 的多个 bucket 合并到一个 `endpointBatch`。\n- endpoint 顺序按首次出现顺序保留，因此输出顺序稳定。\n- 每个 bucket 转成一个 `uri_writer.DataRecord`。\n- 每个 `ObjectRecord` 通过 `toObjectMetasWithBacking` 转成 `uri_writer.ObjectMeta`。\n\n字段映射如下：\n\n```go\nuri_writer.ObjectMeta{\n\tStoreUri:        []byte(object.StoreURI),\n\tSize:            object.Size,\n\tStorageClass:    object.StorageClass,\n\tContentType:     object.ContentType,\n\tVid:             object.VID,\n\tOid:             object.OID,\n\tCreateTimestamp: object.CreateTimestamp,\n}\n```\n\n`buildEndpointBatches` 使用 `recordBacking` 和 `objectBacking` 预分配连续 backing 数组，减少大量对象转换时的分配压力。`writer_rpc_benchmark_test.go` 中的 benchmark 覆盖了接近线上日志形态的数据规模：约 26,750 个 bucket、56,000 个对象、256 个 endpoint。\n\n### Endpoint 队列与微批\n\n每个 endpoint 对应一个 `endpointState`。它持有：\n\n- `client writerservice.Client`\n- `taskCh chan endpointTask`\n- `doneCh chan struct{}`\n- 一个后台 goroutine：`endpointState.run`\n\n`OnBatch` 会为每个 `endpointBatch` 获取 `endpointState`，然后并发调用 `state.submit(...)`。因此不同 endpoint 可以并行写入；同一 endpoint 内部由单个 `endpointState.run` 串行消费 `taskCh`，保证同 endpoint 写入不会并发冲突。\n\n微批聚合发生在 `endpointState.run`：\n\n```mermaid\nflowchart TD\n    A[OnBatch 收到 Batch] --> B[buildEndpointBatches 按 endpoint 分组]\n    B --> C[endpointState.submit 入队]\n    C --> D[endpointState.run 聚合同 endpoint 任务]\n    D --> E[executeGroup 调用 WriteBatch]\n    E --> F[返回每个 task 的结果]\n    F --> G[recordSuccessfulWrite 更新统计]\n```\n\n聚合限制由以下方法读取：\n\n- `batchMaxWait()`：等待更多同 endpoint task 的最大时间，默认 `3ms`。\n- `batchMaxTasks()`：一次 group 最多聚合多少 task，默认 `8`。\n- `batchMaxObjects()`：一次 group 最多包含多少对象，默认 `120000`。\n- `endpointTaskQueueSize(callback)`：每个 endpoint 队列大小，默认 `24`。\n\n`endpointTaskGroup` 会记录聚合原因：\n\n- `\"max_tasks\"`：达到最大 task 数。\n- `\"max_objects\"`：达到或即将超过对象数上限。\n- `\"max_wait\"`：等待窗口结束。\n- `\"drained\"`：当前队列已取空。\n- `\"closed\"`：队列关闭。\n\n这些值会进入慢 endpoint 日志，便于判断慢是队列堆积、RPC 慢还是聚合窗口导致。\n\n### RPC 写入与重试\n\n实际 RPC 调用在 `endpointState.executeGroup` 中完成。它构造 `uri_writer.WriteBatchRequest`：\n\n```go\nreq := &uri_writer.WriteBatchRequest{\n\tSeqNo: seqNo,\n\tBatch: group.records,\n}\n```\n\n`SeqNo` 来自 `RedisWriterCallback.nextSequence()`，使用 `atomic.Int64` 全局递增。writer 返回的 `AckSeqNo` 会记录到 metrics。\n\n错误处理分几类：\n\n- RPC error：\n  - 如果 context 已取消，返回 `ctx.Err()`。\n  - 如果 `isRetryableWriteBatchRPCError(err)` 为真，并且未超过 `RPCTimeoutRetries`，等待 `retryableWriteBatchInterval` 后重试。\n  - 其他错误包装为 `[WriteBatch error]`。\n- `uri_writer.ErrorCode_SUCCESS`：成功返回。\n- `uri_writer.ErrorCode_RETRYABLE_ERROR`：最多按 `retryableWriteBatchRetryCount` 重试 3 次。\n- `uri_writer.ErrorCode_FATAL_ERROR`：直接失败。\n- `uri_writer.ErrorCode_BUCKET_NOT_OWNED`：直接失败。\n- `uri_writer.ErrorCode_BACK_PRESSURE`：指数退避后继续重试，初始 `100ms`，最大 `10s`。\n- 其他错误码：按默认错误返回。\n\n`isRetryableWriteBatchRPCError` 会识别以下超时或连接类错误文本：\n\n- `context.DeadlineExceeded`\n- `\"rpc timeout\"`\n- `\"deadline exceeded\"`\n- `\"connection read timeout\"`\n- `\"connection has been closed\"`\n- `\"peer close\"`\n\n### 成功统计与完成语义\n\n`OnBatch` 收集所有 endpoint 结果后，只对成功结果调用：\n\n```go\nc.recordSuccessfulWrite(write.bucketID, write.endpoint, write.uriCount)\n```\n\n该方法会更新：\n\n- `bucketEndpoint[bucketID] = normalizeWriterEndpoint(endpoint)`\n- `bucketTotals[bucketID] += uriCount`\n\n`RedisWriterCallback.OnComplete` 当前是 no-op，不会调用 writer 的 `MarkBucketDone`。测试 `TestRedisWriterCallbackOnCompleteDoesNotCallMarkBucketDone` 明确固定了这个语义。\n\n`Close` 会关闭 Redis client，并关闭所有 `endpointState` 的 `taskCh`，等待对应 goroutine 退出。\n\n## 指标与日志\n\n`RedisWriterCallback.OnBatch` 会构造 `writerRPCBatchMetrics`，记录批次构建、endpoint state 查找、提交、RPC 和重试耗时。\n\n批次级日志由 `logWriterRPCBatchMetrics` 输出，包含：\n\n- `status`\n- `file_path`\n- `scanned_rows`\n- `processed_uris`\n- `bucket_count`\n- `endpoint_count`\n- `records`\n- `objects`\n- `success`\n- `errors`\n- `build_elapsed`\n- `state_lookup_elapsed`\n- `submit_elapsed`\n- `total_elapsed`\n- `rpc_attempts`\n- `timeout_retries`\n- `retryable_retries`\n- `backpressure_retries`\n- queue、RPC、submit 的 p50/p90/p95/max\n- 慢 endpoint 分类计数\n\n慢 endpoint 判断阈值是 `writerRPCSlowEndpointThreshold = 500ms`。`classifySlowEndpointMetrics` 会将慢原因分为：\n\n- `queue_only`\n- `rpc_only`\n- `queue_rpc`\n- `mixed`\n\n`logWriterRPCSlowEndpointMetrics` 会按 `submitElapsed` 降序打印最多 `writerRPCSlowEndpointLogLimit = 3` 个慢 endpoint 的详细信息，包括 `seq_no`、`ack_seq_no`、队列长度、聚合原因、等待时间、RPC 时间和错误。\n\n## 与主流程的连接\n\n`main.go` 中的 `newSink` 根据输入配置创建 sink：\n\n```go\nswitch sinkCfg.Type {\ncase \"\", \"bucket_file\":\n\treturn sink.NewBucketFileCallback(defaultBucketFileSinkOutputDir)\ncase \"writer_rpc\":\n\treturn sink.NewRedisWriterCallback(sink.RedisWriterCallbackConfig{...})\ndefault:\n\treturn nil, fmt.Errorf(\"unsupported sink type: %q\", sinkCfg.Type)\n}\n```\n\n默认 sink 类型是 `\"bucket_file\"`。当类型为 `\"writer_rpc\"` 时，配置会从 `SinkInput` 和任务输入中组装：\n\n- Redis key prefix 优先使用 sink 配置；为空时使用 `in.JobID`。\n- `BucketCount` 来自 `in.Bucketing.NumBuckets`，用于 Redis 预热。\n- `ReaderID` 由调用方传入，并透传到 writer RPC request。\n- endpoint 微批、队列大小、Redis 读取和 RPC 超时参数都从 sink 配置读取。\n\n`newTOSInventoryCSVConfig` 会把 sink 实例作为 reader 的 `Sink` 字段传入，因此 reader 只依赖回调接口，不需要知道最终输出是文件还是 RPC。\n\n## 开发注意事项\n\n新增 sink 实现时，应优先实现 `OnBatch(context.Context, Batch) error`。如果需要任务级汇总，再实现 `OnComplete(context.Context, Result) error` 和必要的 `Close()` 方法。\n\n涉及 map 遍历时应使用 `sortedBucketIDs`，否则日志、文件写入和测试结果会受 Go map 随机遍历顺序影响。\n\n本地文件 sink 都使用 `sync.Mutex` 保护内部 writer 和文件句柄。如果上游配置了多个 sink worker，不能绕过这些锁直接操作内部字段。\n\n`RedisWriterCallback` 的并发模型是“endpoint 间并行、endpoint 内串行”。修改 `endpointState.run`、`drainAvailableTasks` 或 `waitForNextTask` 时，需要同时验证：\n\n- 同 endpoint 不出现并发 `WriteBatch`。\n- 不同 endpoint 仍能并行。\n- `EndpointBatchMaxTasks` 和 `EndpointBatchMaxObjects` 能正确切分 group。\n- context 取消时不会阻塞 `submit` 或重试 sleep。\n- `Close` 能关闭队列并等待 goroutine 退出。\n\nRPC 对象转换路径对分配敏感。`buildEndpointBatches` 当前通过 backing slice 降低分配，修改 `toObjectMetasWithBacking` 或 `endpointBatchBuildState` 时应跑对应 benchmark，避免退化大批量日志场景。","other-source":"# Other — source\n\n## `internal/source` 模块\n\n`internal/source` 负责把不同来源的数据读取成统一的 `sink.Batch`：解析对象 URI，补齐元数据，按 `Bucketing.ComputeBucket` 分桶，然后交给 `sink.BatchCallback`。当前支持两类来源：\n\n- `hdfsparquet`：读取 HDFS 上的 Parquet/Hive 表文件。\n- `tosinventorycsv`：读取 TOS Inventory CSV 文件。\n- `manifest`：共享的 HLS/DASH 清单展开逻辑。\n- `sourcecommon`：共享的 Sink drain、进度回调和并发投递逻辑。\n\n```mermaid\nflowchart LR\n  A[\"main.Run\"] --> B[\"hdfsparquet.Run\"]\n  A --> C[\"tosinventorycsv.Run\"]\n  B --> D[\"解析为 ObjectRecord\"]\n  C --> D\n  D --> E[\"Bucketing.ComputeBucket\"]\n  E --> F[\"sourcecommon.DrainBatchesWithWorkers\"]\n  F --> G[\"sink.BatchCallback.OnBatch\"]\n```\n\n## 统一输出模型\n\n所有来源最终都输出 `sink.Batch`：\n\n- `sink.ObjectRecord` 表示单个对象，包含 `StoreURI`、`Size`、`StorageClass`、`ContentType`、`VID`、`OID`、`CreateTimestamp`。\n- `sink.Batch` 包含 `FilePath`、`ScannedRows`、`ProcessedURIs` 和 `Buckets map[int][]ObjectRecord`。\n- `sink.BatchCallback.OnBatch(ctx, batch)` 消费分桶后的批次。\n- 如果 Sink 同时实现 `sink.ResultCallback`，来源读取结束后会调用 `OnComplete(ctx, result)`。\n- 如果 Sink 实现 `io.Closer`，`hdfsparquet.Run` 和 `tosinventorycsv.runWithClient` 会在退出时关闭它。\n\n`ProgressObserver` 在两个来源中保持同样的语义：`OnFilesResolved`、`OnFileDone`、`OnRowsRead`、`OnBucketsSeen`。\n\n## HDFS Parquet 来源\n\n入口是 `hdfsparquet.Run(ctx, HDFSParquetConfig)`。它的执行管线分三段：\n\n1. `readFiles` / `readFile` 从 HDFS 打开 Parquet 文件，调用 `readSelectedColumns` 读取配置列，输出 `ReadBatch`。\n2. `ParseURIFromBatches` 调用 `parseBatch` 和 `parseRowObjects`，把行数据转换为 `URIBatch`。\n3. `DivideIntoBuckets` 按 `Bucketing` 分桶，并通过 `sourcecommon.DrainBatchesWithWorkers` 投递给 Sink。\n\n`ResolveFiles` 支持两种文件解析方式：如果传入 `FilePaths`，只解析 HDFS URI 并返回路径部分，不访问 HDFS 列表；否则从 `RootPath` 递归查找 `part-` 文件，跳过 `_SUCCESS`、`.`、`..` 和隐藏文件。\n\n`readSelectedColumns` 使用 `parquet-go` 的 `ParquetColumnReader` 读取列。`StoreURIField` 是必需列；`FormatField` 和 `CreateTimestampField` 是可选列，缺失时静默为空或 `0`；`ExtraField`、`VIDField`、`OIDField` 只要配置了就必须能解析到列。列匹配由 `matchColumnPath` 完成，优先匹配 `parquet_go_root.<field>`，再做大小写不敏感的后缀匹配；多列命中会返回歧义错误。\n\n行解析的核心是 `parseRowObjects`：\n\n- 主对象来自 `store_uri`，空字符串会被跳过。\n- `extra` 只有在存在 `extraURIQueryClient` 时才解析，不会直接把 JSON 字段值当 URI 兜底。\n- `parseExtraObjects` 会同时调用 `QueryExtraURI(ctx, queryInput, true)` 和 `QueryExtraURI(ctx, queryInput, false)`，合并 file extra 与 video extra 的 URI。\n- `xquery.ErrNotFound` 和 `xquery.ErrNotAnnotated` 会被忽略，其他 extra 查询错误会中断当前批次。\n- `VID`、`OID`、`CreateTimestamp` 会传播到主对象、extra 对象和清单展开对象。\n- 最后通过 `dedupeObjectsByStoreURI` 按 `StoreURI` 去重。\n\n当 `ExpandTS` 为 true，且 `manifest.ShouldExpand(storeURI, format)` 返回 true 时，`parseManifestObjects` 会调用 `manifest.Expand` 展开 HLS/DASH 清单。触发条件是 `format` 为 `hls` / `dash`，或 URI 后缀为 `.m3u8` / `.mpd`。如果 StorageGW client 为空，或者清单展开失败，当前实现会保留原始索引对象并继续处理。\n\n`extra_query_client.go` 通过 `sync.Once` 缓存 `video_extra_query` client。测试通过替换 `newVideoExtraQueryClient` 和调用 `resetVideoExtraQueryClientForTest` 验证单例行为。\n\n## TOS Inventory CSV 来源\n\n入口是 `tosinventorycsv.Run(ctx, Config)`，实际测试和内部复用常用 `runWithClient(ctx, cfg, client)` 注入 fake StorageGW client。CSV 来源先把每个 CSV 对象下载到本地临时文件，再读取解析。\n\n关键路径：\n\n- `normalizeCSVURIs` 会去掉空值并排序。\n- `stageCSVObjectLocally` 使用 StorageGW 下载对象，最多重试 3 次，间隔 `200ms`。\n- 临时目录优先使用 Lambda context 的 `TempDir` 或 `TmpfsDir`，否则使用 `/tmp`。\n- `newCSVReader` 支持无压缩和 `gzip`，并设置 `FieldsPerRecord = -1` 与 `ReuseRecord = true`。\n- `buildRowExtractor` 根据 `CSVFormat.HasHeader` 选择按表头列名或按列下标解析。\n- `rowExtractor.objectFromRecord` 从 `store_uri_column` 获取完整 URI；如果没有配置，则用 `bucket + \"/\" + key` 拼接。\n\n时间字段由 `parseCreateTimestamp` 处理：可以直接读取 Unix 时间戳，也可以读取 RFC3339 字符串；Unix 时间戳会通过 `normalizeUnixTimestampToSeconds` 自动把纳秒、微秒、毫秒归一到秒。\n\n`objectsFromCSVRecord` 根据 `TaskType` 决定行输出：\n\n- 空 `TaskType`：直接输出当前 `ObjectRecord`。\n- `TaskTypeManifestExpand`：根据 `ContentType` 判断是否为 HLS/DASH；非清单内容会跳过；清单内容会调用 `manifest.Expand`，并把展开对象的 `OID` 设置为原始 `StoreURI`。\n- 其他 `TaskType`：返回 unsupported 错误。\n\nCSV 来源在 `processFile` 内部直接分桶并构造 `sink.Batch`，然后把 `sourcecommon.BatchEnvelope` 送入共享 drain 阶段。\n\n## 共享清单展开\n\n`internal/source/manifest` 封装 HLS/DASH 解析：\n\n- `FormatFromContentType` 支持 `application/x-mpegurl` 和 `application/dash+xml`。\n- `ShouldExpand` 统一判断格式字段和 URI 后缀。\n- `NewParser` 根据格式或后缀选择 `media-parser-go` 的 M3U8 或 DASH parser。\n- `NewIndexReader` 用 StorageGW 读取清单对象内容。\n- `Expand` 会尝试 3 次，成功后按 `segments.PostOrderList()` 返回 URI；失败时记录 warn 并返回空结果。\n\n调用方依赖这个“失败返回空”的语义来避免单个坏清单阻断整批任务。\n\n## 并发与错误传播\n\n`sourcecommon.DrainBatchesWithWorkers` 是 Sink 阶段的共享实现。它会对输入批次执行 `Transformer`，然后调用 `sinkCb.OnBatch`，最后触发 `progress.OnRowsRead` 和 `progress.OnBucketsSeen`。`SinkWorkers` 控制并发投递；首个 transform 或 Sink 错误会取消上下文并返回已有统计。\n\nHDFS Parquet 还有独立的三段并发：读取、解析、分桶。`Limits.ReaderWorkers` 控制读取 worker 数，也影响解析 worker 数；`Limits.ParquetParallelism` 控制 Parquet 解码并行度；`Limits.BatchRows` 控制列读取批大小。`parseBatch` 在行数较大且 `parallelism > 1` 时会把同一批行切块并行解析。\n\n贡献新来源时，保持两个约定最重要：输出必须是 `sink.Batch` 或 `sourcecommon.BatchEnvelope`，分桶必须使用 `Bucketing.ComputeBucket`；进度和 Sink 投递应复用 `sourcecommon.DrainBatchesWithWorkers`，避免不同来源出现统计和取消语义不一致。","other":"# Other\n\n## 模块概览\n\n`Other` 汇总了项目的支撑层与横向模块：构建入口、模块依赖、读取链路的公共能力、输出层、控制面上报、测试保护网，以及一次独立的诊断页面。它们共同支撑 `uri_source_reader` 从输入读取、URI 分桶、批次输出到运行状态上报的完整 reader 工作流。\n\n```mermaid\nflowchart LR\n  A[\"输入来源\"] --> B[\"source 解析与清单展开\"]\n  B --> C[\"bucketing 计算桶号\"]\n  C --> D[\"sink 批次输出\"]\n  B --> E[\"controlplane 进度上报\"]\n  D --> E\n  F[\"main_test.go\"] -. \"验证关键链路\" .-> B\n  F -.-> D\n  F -.-> E\n```\n\n## 子模块协作\n\n[go.mod](go-mod.md) 定义整个 Go module 的边界和依赖来源，支撑 `source`、`sink`、`controlplane` 等运行时代码使用 HDFS、Hertz、Kitex、Redis、Lambda SDK 等组件。\n\n[Makefile](makefile.md) 和 [build.sh](build-sh.md) 是开发与部署入口：前者封装本地常用的 `go build`、`go test`、清理操作，后者面向 Linux 环境准备依赖并生成 `output/uri_source_reader`。两者不参与运行时调用链，但决定代码如何被构建、测试和交付。\n\n[source](source.md) 是读取链路的入口层，负责将 `hdfsparquet`、`tosinventorycsv` 等来源解析为统一的 `sink.Batch`。其中 `manifest` 处理 HLS/DASH 清单展开，`sourcecommon` 负责 Sink drain、进度回调和并发投递。\n\n[bucketing](bucketing.md) 为 `source` 提供统一桶号计算。`Config.ComputeBucket` 使用 `hive` 或 `spark` 哈希策略把 `store_uri` 映射到稳定 bucket id，使不同输入来源能产出一致的分桶结果。\n\n[sink](sink.md) 是输出边界。上游通过 `BatchCallback.OnBatch` 投递包含 `ObjectRecord` 的 `Batch`，下游可选择控制台输出、本地 bucket 文件，或通过 Redis 路由到 writer RPC。`ResultCallback.OnComplete` 则承接任务完成后的汇总结果。\n\n[controlplane](controlplane.md) 负责运行状态上报。`Tracker` 累计 reader 进度，`Reporter` 周期性读取快照并通过 `Client.SendHeartbeat`、`Client.SendProgress` 上报到控制面接口，使读取链路具备可观测性。\n\n[main_test.go](main-test-go.md) 连接这些模块形成测试保护网，覆盖 `handler` 的 HDFS Parquet、control plane、Redis writer sink、配置归一化等关键路径，验证 `source`、`sink` 与 `controlplane` 的组合行为。\n\n[diagnostics](diagnostics.md) 相对独立，提供 `writer_rpc_diagnosis.html` 静态诊断看板，用于沉淀一次 writer RPC 性能排查结果。它不接入主运行链路，但服务于 `sink` 中 writer RPC 输出路径的性能分析。","overview":"# uri_source_reader — Wiki\n\n## 项目概览\n\n`uri_source_reader` 是一个用于读取 URI 清单、展开媒体资源、按 bucket 分发并上报执行状态的 Go Lambda reader。它接收一次读取任务配置，从 HDFS Parquet 或 TOS Inventory CSV 中抽取对象 URI，将对象稳定映射到 bucket，再通过不同 sink 输出到本地文件、控制台或 Redis 路由的 writer RPC endpoint。\n\n这个项目的主线很清晰：`main.go` 负责把外部事件标准化为任务配置，具体读取逻辑交给数据源模块，公共批处理能力由 source common 和 sink 承接，任务状态则由 control plane reporting 周期性上报。新开发者可以先从[应用入口 main.go](application-entry-point.md)理解任务如何被调度，再顺着数据源和 sink 读下去。\n\n```mermaid\nflowchart TD\n    A[\"Lambda 输入事件\"] --> B[\"应用入口 main.go\"]\n    B --> C[\"控制面上报 controlplane\"]\n    B --> D{\"数据源类型\"}\n    D --> E[\"HDFS Parquet Source\"]\n    D --> F[\"TOS Inventory CSV Source\"]\n    E --> G[\"Manifest Expansion\"]\n    F --> G\n    E --> H[\"Bucket Assignment\"]\n    F --> H\n    E --> I[\"Shared Source Pipeline\"]\n    F --> I\n    I --> J[\"Sink Callbacks\"]\n```\n\n## 它解决什么问题\n\n在视频架构场景中，上游清单通常来自不同存储和格式：有些是 HDFS 上的 Parquet 文件，有些是 TOS Inventory CSV；记录中可能直接是可处理对象，也可能是 HLS/DASH manifest，需要继续展开为实际分片对象。`uri_source_reader` 把这些差异收敛成统一的 `sink.Batch` 输出，让后续 writer 只关心“这一批对象属于哪个 bucket”。\n\n分桶逻辑由[Bucket Assignment](bucket-assignment.md)集中实现，保证同一个 URI 在相同配置下总是落到同一个 bucket。媒体清单展开由[Manifest Expansion](manifest-expansion.md)复用，避免不同数据源各自实现 HLS/DASH 解析。最终输出层由[Sink Callbacks](sink-callbacks.md)统一承接，支持调试打印、本地文件写入、按 bucket 拆文件以及 Redis 路由写入。\n\n## 端到端执行流程\n\n一次任务从[Application Entry Point](application-entry-point.md)开始。`handler` 接收 Lambda `Input` 后调用 `Input.Normalize` 做参数校验和默认值填充，然后初始化 `Tracker`、`Client` 和 `Reporter`。这些对象来自[Control Plane Reporting](control-plane-reporting.md)，用于持续上报 reader 的心跳和读取进度。\n\n随后入口根据 `SourceType` 路由到具体数据源：\n\n- `SourceTypeHDFSParquet` 调用[HDFS Parquet Source](hdfs-parquet-source.md)的 `hdfsparquet.Run`\n- `SourceTypeTOSInventoryCSV` 调用[TOS Inventory CSV Source](tos-inventory-csv-source.md)的 `tosinventorycsv.Run`\n\nHDFS Parquet 路径会先解析 HDFS 文件列表，再读取目标列。读取列时会处理 Parquet schema 路径兼容问题，例如列路径匹配、路径片段规范化和历史路径格式修正。之后 `ParseURIFromBatches` 将行数据转换成对象记录，必要时通过 manifest 模块展开 `.m3u8` 或 `.mpd` 中引用的子对象，最后按 bucket 分组并交给 sink。\n\nTOS Inventory CSV 路径会从 TOS 拉取 Inventory CSV 对象，在本地暂存后逐行解析。每行被转换成 `sink.ObjectRecord`，再按相同的 bucket 配置组装成 `sink.Batch`。这条链路同样可以复用 manifest 展开和共享批处理阶段。\n\n两个数据源在后半段都会汇入[Shared Source Pipeline](shared-source-pipeline.md)。这里负责把源数据项转换为标准 batch，调用 `BatchCallback.OnBatch` 输出，并通过 `ProgressObserver` 汇报读取行数和 bucket 信息。它也统一处理 worker 并发和错误取消，避免不同 reader 重复实现批次消费逻辑。\n\n## 核心模块如何协作\n\n[HDFS Parquet Source](hdfs-parquet-source.md)是当前最复杂的数据源模块。它连接 HDFS 文件解析、Parquet 列读取、URI 抽取、manifest 展开和 bucket 分组，是理解完整读取链路的最佳入口之一。它与[Manifest Expansion](manifest-expansion.md)的关系尤其重要：当 Parquet 行中的对象是 HLS/DASH manifest 时，解析链路会调用 `Expand`，通过 `ObjectClient.GetObjectWithContext` 获取 manifest 内容，再交给 `media-parser-go` 解析出子 URI。\n\n[TOS Inventory CSV Source](tos-inventory-csv-source.md)更轻量，重点在对象清单的读取和行解析。它与 HDFS 路径共享相同的分桶和 sink 输出模型，因此新增 sink 或调整 bucket 策略时，通常会同时影响两类数据源。\n\n[Sink Callbacks](sink-callbacks.md)定义了输出边界。上游只生成 `sink.Batch`，具体写到哪里由 callback 决定。`RedisWriterCallback` 会根据 Redis 中的 bucket 路由选择 writer RPC endpoint；`BucketFileCallback` 则适合本地排查，因为它会按 bucket 拆分输出文件。\n\n[Control Plane Reporting](control-plane-reporting.md)贯穿任务生命周期。入口初始化 reporter 后，读取过程中由 tracker 维护状态和累计进度，reporter 周期性发送心跳和进度；任务结束时再 flush 最终进度。控制面看到的是 reader worker 的存活状态、读取行数和 bucket 进展，而不是各个数据源的内部细节。\n\n## 开发与运行基础\n\n项目 Go module 为：\n\n```text\ncode.byted.org/videoarch/uri_source_reader\n```\n\n当前 `go.mod` 使用 Go `1.25`，主要依赖包括 Lambda SDK、Hertz、Kitex、Redis、HDFS SDK、StorageGW 相关能力以及 `media-parser-go`。本地开发前需要确保 Go 版本匹配，并能访问内部 `code.byted.org` 依赖源。\n\n常用入口可以参考[Other](other.md)中提到的 `Makefile` 和 `build.sh`。一般开发顺序是先运行测试确认基础链路，再按数据源或 sink 模块做局部修改。涉及读取行为时，优先补充对应数据源的测试；涉及输出格式或控制面进度时，同时检查 sink callback 和 reporter 的交互。","shared-source-pipeline":"# Shared Source Pipeline\n\n## 模块概览\n\n`sourcecommon/sink_stage.go` 提供共享的“批次消费阶段”：从输入 channel 读取源数据项，将每个数据项转换成 `sink.Batch`，可选写入 `sink.BatchCallback`，并向进度观察者汇报读取行数和 bucket 信息。\n\n它把不
