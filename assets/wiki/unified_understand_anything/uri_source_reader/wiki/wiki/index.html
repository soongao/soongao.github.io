同数据源的共同行为集中起来，避免各个 reader 重复实现这些逻辑：\n\n- 批次转换：通过泛型 `Transformer[T]` 适配不同输入类型。\n- Sink 写入：通过 `sink.BatchCallback.OnBatch` 输出标准 `sink.Batch`。\n- 进度汇报：通过 `ProgressObserver` 汇报行数和 bucket。\n- 并发处理：通过 `DrainBatchesWithWorkers` 控制 worker 数量。\n- 错误传播：首次错误会取消共享 context，并让其他 worker 尽快退出。\n\n该模块当前被 `source/tosinventorycsv/reader.go` 和 `source/hdfsparquet/bucketer.go` 复用。\n\n## 核心数据结构\n\n### `ProgressObserver`\n\n```go\ntype ProgressObserver interface {\n\tOnRowsRead(rows int)\n\tOnBucketsSeen(bucketIDs []int)\n}\n```\n\n`ProgressObserver` 是批次处理阶段对外暴露的进度回调接口。\n\n`DrainBatchesWithWorkers` 在一个批次成功转换并成功写入 sink 后调用：\n\n```go\nprogress.OnRowsRead(envelope.Batch.ScannedRows)\nprogress.OnBucketsSeen(envelope.BucketIDs)\n```\n\n因此，进度只统计已经完成当前处理阶段的批次。若 `transform` 失败、返回 `skip`，或 `sinkCb.OnBatch` 失败，该批次不会触发进度回调。\n\n### `BatchEnvelope`\n\n```go\ntype BatchEnvelope struct {\n\tBatch     sink.Batch\n\tBucketIDs []int\n}\n```\n\n`BatchEnvelope` 包装一个标准 `sink.Batch`，并附带排序后的 bucket ID 列表。`Batch.Buckets` 本身是 `map[int][]sink.ObjectRecord`，遍历顺序不稳定；`BucketIDs` 用于给进度观察者提供确定顺序的 bucket 列表。\n\n推荐通过 `NewBatchEnvelope` 构造：\n\n```go\nfunc NewBatchEnvelope(batch sink.Batch) BatchEnvelope {\n\treturn BatchEnvelope{\n\t\tBatch:     batch,\n\t\tBucketIDs: SortedBucketIDs(batch.Buckets),\n\t}\n}\n```\n\n### `BatchStats`\n\n```go\ntype BatchStats struct {\n\tProcessedURIs    int\n\tProcessedBatches int\n}\n```\n\n`BatchStats` 是 drain 阶段的返回统计：\n\n- `ProcessedBatches`：成功完成转换、sink 写入和进度汇报前置条件的批次数。\n- `ProcessedURIs`：累加每个成功批次的 `Batch.ProcessedURIs`。\n\n发生错误或 context 取消时，函数仍会返回已经完成的部分统计。\n\n### `Transformer[T]`\n\n```go\ntype Transformer[T any] func(item T) (BatchEnvelope, bool, error)\n```\n\n`Transformer[T]` 将输入 channel 中的元素转换为 `BatchEnvelope`。\n\n返回值语义：\n\n- `BatchEnvelope`：转换后的批次。\n- `skip == true`：当前输入项被跳过，不写 sink，不汇报进度，不计入统计。\n- `error != nil`：当前处理失败，触发整个 drain 阶段取消。\n\n调用方负责在 transformer 中完成源格式到 `sink.Batch` 的转换。例如 TOS inventory CSV 的 `processFile` 会生成 `BatchEnvelope`，HDFS Parquet 的 `DivideIntoBuckets` 也会构造同样的输出结构。\n\n## 执行流程\n\n```mermaid\nflowchart TD\n    A[\"输入 channel\"] --> B[\"worker 读取 item\"]\n    B --> C[\"Transformer 转换\"]\n    C -->|skip| B\n    C -->|错误| H[\"记录首次错误并取消 context\"]\n    C --> D[\"sinkCb.OnBatch\"]\n    D -->|错误| H\n    D --> E[\"ProgressObserver 汇报\"]\n    E --> F[\"更新 BatchStats\"]\n    F --> B\n```\n\n`DrainBatchesWithWorkers` 是主实现。`DrainBatches` 只是单 worker 版本的便捷封装：\n\n```go\nfunc DrainBatches[T any](\n\tctx context.Context,\n\tin <-chan T,\n\tsinkCb sink.BatchCallback,\n\tprogress ProgressObserver,\n\ttransform Transformer[T],\n) (BatchStats, error) {\n\treturn DrainBatchesWithWorkers(ctx, in, sinkCb, progress, transform, 1)\n}\n```\n\n### `DrainBatchesWithWorkers`\n\n```go\nfunc DrainBatchesWithWorkers[T any](\n\tctx context.Context,\n\tin <-chan T,\n\tsinkCb sink.BatchCallback,\n\tprogress ProgressObserver,\n\ttransform Transformer[T],\n\tworkers int,\n) (BatchStats, error)\n```\n\n执行步骤：\n\n1. 当 `workers <= 0` 时，自动降级为 `1`。\n2. 基于传入的 `ctx` 创建可取消的子 context。\n3. 启动指定数量的 worker goroutine。\n4. 每个 worker 从 `in` 中读取 item。\n5. 调用 `transform(item)` 生成 `BatchEnvelope`。\n6. 若 `skip == true`，记录日志并继续读取下一个 item。\n7. 若 `sinkCb != nil`，调用 `sinkCb.OnBatch(ctx, envelope.Batch)`。\n8. 若 `progress != nil`，调用 `OnRowsRead` 和 `OnBucketsSeen`。\n9. 使用 atomic 累加 `ProcessedBatches` 和 `ProcessedURIs`。\n10. 所有 worker 退出后，返回统计和错误状态。\n\n## 错误与取消语义\n\n模块使用“首次错误优先”的策略：\n\n```go\nsetFirstErr := func(err error) {\n\tif err == nil {\n\t\treturn\n\t}\n\terrMu.Lock()\n\tif firstErr == nil {\n\t\tfirstErr = err\n\t\tcancel()\n\t}\n\terrMu.Unlock()\n}\n```\n\n当任意 worker 遇到 `transform` 错误或 `sinkCb.OnBatch` 错误时：\n\n- 该错误会被保存为 `firstErr`。\n- 共享 context 会被取消。\n- 其他 worker 在下一次 `select` 时会通过 `ctx.Done()` 尽快退出。\n- 最终返回已经完成的 `BatchStats` 和 `firstErr`。\n\n如果没有业务错误，但外部 context 被取消，函数会返回当前统计和 `ctx.Err()`。\n\n需要注意：`batchIndex` 在调用 `transform` 前递增，因此日志中的 `batch_index` 表示“开始处理过的输入项序号”，不等同于成功处理批次数。\n\n## 并发模型\n\n`DrainBatchesWithWorkers` 对共享计数使用 `sync/atomic`：\n\n```go\natomic.AddInt64(&processedBatches, 1)\natomic.AddInt64(&processedURIs, int64(envelope.Batch.ProcessedURIs))\n```\n\n错误状态使用 `sync.Mutex` 保护，确保只有第一个错误被返回。\n\n并发使用时需要关注两个调用方责任：\n\n- `transform` 必须是并发安全的，或只访问当前 item 的局部状态。\n- `sinkCb.OnBatch` 如果在多 worker 下被并发调用，其实现也必须是并发安全的。\n\n如果 sink 实现不能并发写入，应使用 `DrainBatches` 或将 `workers` 设置为 `1`。\n\n## Bucket ID 排序\n\n`SortedBucketIDs` 用于从 `map[int][]sink.ObjectRecord` 提取稳定排序的 bucket ID：\n\n```go\nfunc SortedBucketIDs(buckets map[int][]sink.ObjectRecord) []int {\n\tids := make([]int, 0, len(buckets))\n\tfor bucketID := range buckets {\n\t\tids = append(ids, bucketID)\n\t}\n\tsort.Ints(ids)\n\treturn ids\n}\n```\n\n这让 `ProgressObserver.OnBucketsSeen` 接收到的 bucket 列表具有确定顺序，便于测试、日志分析和进度聚合。\n\n## 与代码库其他模块的关系\n\nTOS inventory CSV 的主流程大致是：\n\n```mermaid\nflowchart TD\n    A[\"Run\"] --> B[\"runWithClient\"]\n    B --> C[\"DrainBatchesWithWorkers\"]\n    C --> D[\"sinkCb.OnBatch\"]\n    C --> E[\"ProgressObserver\"]\n    C --> F[\"BatchStats\"]\n```\n\n已知调用关系包括：\n\n- `source/tosinventorycsv/reader.go` 的 `runWithClient` 调用 `DrainBatchesWithWorkers`。\n- `source/tosinventorycsv/reader.go` 的 `processFile` 调用 `NewBatchEnvelope`。\n- `source/hdfsparquet/bucketer.go` 的 `DivideIntoBuckets` 调用 `DrainBatchesWithWorkers`、`BatchEnvelope` 和 `NewBatchEnvelope`。\n- `sink/types.go` 提供 `sink.BatchCallback.OnBatch`，是该模块写出批次的下游接口。\n\n## 扩展新数据源时的使用方式\n\n新数据源通常只需要实现输入枚举和 transformer，然后复用 drain 阶段：\n\n```go\nstats, err := sourcecommon.DrainBatchesWithWorkers(\n\tctx,\n\tinputCh,\n\tsinkCb,\n\tprogress,\n\tfunc(item MyInput) (sourcecommon.BatchEnvelope, bool, error) {\n\t\tbatch, skip, err := convertToSinkBatch(item)\n\t\tif err != nil || skip {\n\t\t\treturn sourcecommon.BatchEnvelope{}, skip, err\n\t\t}\n\t\treturn sourcecommon.NewBatchEnvelope(batch), false, nil\n\t},\n\tworkers,\n)\n```\n\n实现 transformer 时应保持以下约定：\n\n- 无可处理数据时返回 `skip == true`，不要返回空批次。\n- 转换失败时返回非空 error，让 drain 阶段统一取消。\n- 成功时使用 `NewBatchEnvelope`，避免手动维护 `BucketIDs` 顺序。\n- `Batch.ScannedRows` 和 `Batch.ProcessedURIs` 应准确填写，因为它们直接影响进度和最终统计。","sink-callbacks":"# Sink Callbacks\n\n## 模块定位\n\n`sink` 模块定义 URI 读取流程的输出回调层。上游 reader 将解析出的对象聚合成 `Batch`，再通过 `BatchCallback.OnBatch` 交给具体 sink；读取结束后通过 `ResultCallback.OnComplete` 写入汇总信息或执行收尾逻辑。\n\n当前实现包含三类输出方式：\n\n- `ConsolePrintCallback`：将每个 batch 的处理摘要打印到标准输出。\n- `FileWriteCallback`：将 batch 摘要和最终 summary 写入单个文件。\n- `BucketFileCallback`：按 bucket 拆分写入本地文件，每行一个 `StoreURI`。\n- `RedisWriterCallback`：根据 Redis 中的 bucket 路由，将对象写入对应 writer RPC endpoint。\n\n```mermaid\nflowchart LR\n    A[\"reader 解析数据\"] --> B[\"sink.Batch\"]\n    B --> C[\"DrainBatchesWithWorkers\"]\n    C --> D[\"BatchCallback.OnBatch\"]\n    D --> E[\"本地文件/控制台\"]\n    D --> F[\"Redis 路由\"]\n    F --> G[\"writer RPC WriteBatch\"]\n    A --> H[\"sink.Result\"]\n    H --> I[\"ResultCallback.OnComplete\"]\n```\n\n## 核心数据结构\n\n### `ObjectRecord`\n\n`ObjectRecord` 是 sink 层接收的最小对象记录：\n\n```go\ntype ObjectRecord struct {\n    StoreURI        string\n    Size            int64\n    StorageClass    string\n    ContentType     string\n    VID             string\n    OID             string\n    CreateTimestamp int64\n}\n```\n\nHDFS Parquet 和 TOS inventory CSV reader 都会把原始输入转换成这个结构。`RedisWriterCallback` 会进一步把它转换成 `uri_writer.ObjectMeta`，字段映射由 `toObjectMetasWithBacking` 完成。\n\n### `Batch`\n\n`Batch` 表示一次送入 sink 的分桶结果：\n\n```go\ntype Batch struct {\n    FilePath      string\n    ScannedRows   int\n    ProcessedURIs int\n    Buckets       map[int][]ObjectRecord\n}\n```\n\n`Buckets` 的 key 是 bucket ID，value 是该 bucket 下的对象列表。多个实现都会通过 `sortedBucketIDs` 对 bucket ID 排序，保证输出顺序稳定。\n\n### `Result`\n\n`Result` 表示一次 reader 运行完成后的汇总：\n\n```go\ntype Result struct {\n    Files            []string\n    ProcessedFiles   int\n    ProcessedRows    int\n    ProcessedURIs    int\n    ProcessedBatches int\n}\n```\n\n本地文件类 callback 会使用它写 summary；`RedisWriterCallback.OnComplete` 当前是 no-op，不会推动 writer finalize。\n\n## 回调契约\n\n`sink/types.go` 定义两个接口：\n\n```go\ntype BatchCallback interface {\n    OnBatch(ctx context.Context, batch Batch) error\n}\n\ntype ResultCallback interface {\n    OnComplete(ctx context.Context, result Result) error\n}\n```\n\n上游通过接口调用 sink，不依赖具体实现。主要调用路径是：\n\n- `source/sourcecommon.DrainBatchesWithWorkers` 调用 `OnBatch`。\n- `source/tosinventorycsv.runWithClient` 和 `source/hdfsparquet.Run` 在读取完成后调用 `OnComplete`。\n- `main.newSink` 根据启动参数创建具体 callback，例如 `NewBucketFileCallback` 或 `NewRedisWriterCallback`。\n\n实现 callback 时需要注意：`OnBatch` 可能被并发调用，当前内置实现都通过 `sync.Mutex` 或 per-endpoint 队列保护共享状态。\n\n## 本地输出实现\n\n### `ConsolePrintCallback`\n\n`ConsolePrintCallback.OnBatch` 输出一行 batch 摘要：\n\n```text\nprocessed batch file=<path> scanned_rows=<n> processed_uris=<n> buckets={0:10,1:8}\n```\n\n它只用于观察处理进度，不持久化对象 URI。内部使用 `mu sync.Mutex`，避免并发 worker 同时打印导致日志行交错。\n\n### `FileWriteCallback`\n\n`NewFileWriteCallback(path string)` 会使用 `os.Create` 创建或截断目标文件，并初始化 64 KiB 的 `bufio.Writer`。\n\n`FileWriteCallback.OnBatch` 写入每个 batch 的摘要，格式与 `ConsolePrintCallback` 类似。`FileWriteCallback.OnComplete` 追加最终 summary：\n\n```text\nsummary output_file=<path> processed_files=<n> processed_rows=<n> processed_uris=<n> processed_batches=<n>\n```\n\n`Close` 会先 `Flush`，再关闭底层文件。调用方应在 reader 结束后关闭 callback，确保缓冲数据落盘。\n\n### `BucketFileCallback`\n\n`NewBucketFileCallback(outputDir string)` 会创建输出目录，并为本次任务生成 `jobUUID`。每个 bucket 的输出文件名由 `fileName` 生成：\n\n```go\npart-%05d-%s_%05d.c000\n```\n\n例如 bucket 12 会写到类似：\n\n```text\npart-00012-<jobUUID>_00012.c000\n```\n\n`BucketFileCallback.OnBatch` 按 bucket ID 排序后处理，每个 `ObjectRecord` 只写入 `StoreURI`，一行一个 URI。文件按需打开，`getWriter` 使用 `os.OpenFile` 的 `O_CREATE|O_WRONLY|O_APPEND` 模式，因此同一个 callback 生命周期内的多批数据会追加到对应 bucket 文件。\n\n`OnComplete` 会先刷新所有 bucket writer，再写入 `summary.txt`：\n\n```text\nprocessed_files=<n>\nprocessed_rows=<n>\nprocessed_uris=<n>\n```\n\n`Close` 会刷新并关闭所有已打开的 bucket 文件，然后清空 `files` 和 `writers` map。\n\n## Redis Writer RPC 输出\n\n`RedisWriterCallback` 是面向生产写入链路的 sink。它将 `Batch.Buckets` 按 Redis 中记录的 bucket-owner endpoint 分组，然后对每个 endpoint 调用 writer 服务的 `WriteBatch` RPC。\n\n### 配置入口\n\n构造函数是：\n\n```go\nfunc NewRedisWriterCallback(cfg RedisWriterCallbackConfig) (*RedisWriterCallback, error)\n```\n\n关键配置包括：\n\n- `RedisCluster`：必填，Redis 集群名或直连地址列表。\n- `RedisKeyPrefix`：必填，用于构造 bucket 路由 key。\n- `WriterServiceName`：为空时默认 `\"uri-writer\"`。\n- `BucketCount`：大于 0 时用于启动阶段预热 bucket endpoint。\n- `EndpointBatchMaxWait`、`EndpointBatchMaxTasks`、`EndpointBatchMaxObjects`：控制同 endpoint 任务合批。\n- `EndpointTaskQueueSize`：每个 endpoint 后台队列大小。\n- `ReaderID`：非空时写入 `WriteBatchRequest.Base.Extra[\"reader_id\"]`。\n- `ConnectTimeout`、`RPCTimeout`、`RPCTimeoutRetries`：Kitex 客户端和 RPC 超时策略。\n- `ReadRedisTimeout`、`ReadRedisRetries`：Redis 读取超时与重试。\n\n默认值在 `NewRedisWriterCallback` 内集中填充。例如 `RPCTimeout` 默认 10 秒，`EndpointBatchMaxTasks` 默认 8，`EndpointBatchMaxObjects` 默认 120000。\n\n### Redis 路由\n\nbucket 路由 key 由 `bucketRedisKey` 生成：\n\n```go\nbucketRedisKey(\"prefix\", 7) // \"prefix:bucket:00007\"\nbucketRedisKey(\"\", 7)       // \"bucket:00007\"\n```\n\n`lookupBucketEndpoint` 的流程是：\n\n1. 先调用 `cachedBucketEndpoint` 查本地缓存。\n2. 缓存未命中时通过 `redisGet` 读取 Redis。\n3. 使用 `normalizeWriterEndpoint` 标准化 endpoint。\n4. 调用 `cacheBucketEndpoint` 写入本地缓存。\n\n如果配置了 `BucketCount`，构造阶段会执行 `prewarmBucketEndpoints`，按 `redisMGetBatchSize` 批量读取 bucket 路由，并提前为唯一 endpoint 创建 Kitex client。\n\n### endpoint 分组与对象转换\n\n`RedisWriterCallback.OnBatch` 先调用 `buildEndpointBatches`。该函数会：\n\n1. 使用 `sortedBucketIDs` 稳定遍历 `batch.Buckets`。\n2. 对每个非空 bucket 调用 `lookupBucketEndpoint`。\n3. 按 endpoint 聚合成 `endpointBatch`。\n4. 把 `ObjectRecord` 转换成 `uri_writer.DataRecord` 和 `uri_writer.ObjectMeta`。\n\n转换逻辑在 `toObjectMetasWithBacking` 中完成。它使用调用方传入的 backing slice，减少每个对象单独分配的开销。\n\n### endpoint 状态与合批执行\n\n每个 writer endpoint 对应一个 `endpointState`。`endpointStateFor` 会复用已存在状态；首次访问时通过 `clientForEndpoint` 创建 Kitex client，再调用 `newEndpointState` 启动后台 goroutine。\n\n`endpointState.submit` 将当前 endpoint 的 records 封装成 `endpointTask` 放入 `taskCh`，然后等待 `resultCh` 返回。后台 `run` 循环负责把多个 task 合并成一个 `endpointTaskGroup`：\n\n- `drainAvailableTasks` 会立即尽量吸收队列中已有任务。\n- `waitForNextTask` 会最多等待 `batchMaxWait`，争取和后续任务合批。\n- 合批受 `batchMaxTasks` 和 `batchMaxObjects` 限制。\n- 如果新任务超过限制，会作为 carry 留到下一轮处理。\n\n合批完成后，`finishGroup` 调用 `executeGroup` 执行一次 RPC，并把同一个执行结果回传给 group 中的每个 task。\n\n### RPC 写入与重试\n\n`executeGroup` 构造请求：\n\n```go\nreq := &uri_writer.WriteBatchRequest{\n    SeqNo: seqNo,\n    Batch: group.records,\n}\n```\n\n`seqNo` 来自 `RedisWriterCallback.nextSequence`，使用 `atomic.Int64` 单调递增。\n\n错误处理策略分为三类：\n\n- RPC 调用错误：如果 `isRetryableWriteBatchRPCError` 判断为超时、连接关闭等可重试错误，并且未超过 `RPCTimeoutRetries`，等待 `retryableWriteBatchInterval` 后重试。\n- `ErrorCode_RETRYABLE_ERROR`：最多重试 `retryableWriteBatchRetryCount` 次。\n- `ErrorCode_BACK_PRESSURE`：使用指数退避，从 `backPressureInitialBackoff` 开始，最大到 `backPressureMaxBackoff`。\n\n以下响应会直接返回错误：\n\n- `ErrorCode_FATAL_ERROR`\n- `ErrorCode_BUCKET_NOT_OWNED`\n- 未识别的错误码\n- 超过重试次数后的 `RETRYABLE_ERROR`\n\n`ErrorCode_SUCCESS` 会记录 `ackSeqNo` 并返回成功。`OnBatch` 收集所有 endpoint 结果后，只要有任一 endpoint 失败，就返回第一个错误；成功的写入会通过 `recordSuccessfulWrite` 更新 `bucketTotals` 和 `bucketEndpoint`。\n\n## 指标与慢 endpoint 日志\n\n`RedisWriterCallback.OnBatch` 会为每批数据构造 `writerRPCBatchMetrics`，记录构建、状态查找、提交、RPC、重试、队列等待等耗时。\n\n`logWriterRPCBatchMetrics` 输出 batch 级别日志，包含：\n\n- endpoint 数量、record 数量、object 数量\n- 成功和失败 endpoint 数\n- RPC attempts、timeout retries、retryable retries、backpressure retries\n- queue wait、RPC elapsed、submit elapsed 的 p50/p90/p95/max\n- 慢 endpoint 分类计数\n\n慢 endpoint 判断由 `isSlowEndpointMetrics` 完成，阈值是 `writerRPCSlowEndpointThreshold`，当前为 500 ms。`classifySlowEndpointMetrics` 会把慢点分类为：\n\n- `queue_only`\n- `rpc_only`\n- `queue_rpc`\n- `mixed`\n\n`logWriterRPCSlowEndpointMetrics` 会按 `submitElapsed` 排序，最多输出 `writerRPCSlowEndpointLogLimit` 个慢 endpoint 的详细信息。\n\n## 生命周期与资源释放\n\n本地文件类 callback 都提供 `Close` 方法，但它不是接口的一部分。调用方如果持有具体类型或统一封装了关闭逻辑，需要显式调用它，否则 buffered writer 中的数据可能尚未完全落盘。\n\n`RedisWriterCallback.Close` 会：\n\n1. 关闭 Redis client。\n2. 拷贝当前所有 `endpointState`。\n3. 对每个 state 调用 `endpointState.close`。\n4. `endpointState.close` 关闭 `taskCh` 并等待后台 `run` 退出。\n\n`RedisWriterCallback.OnComplete` 当前不做任何事情。这意味着 writer RPC 的最终提交、finalize 或一致性确认不在这个 callback 中完成。新增相关语义时，应明确和 writer 服务的幂等、ack、重试策略配合。","tos-inventory-csv-source":"# TOS Inventory CSV Source\n\n## 模块职责\n\n`internal/source/tosinventorycsv` 从 TOS 上的 Inventory CSV 对象读取对象清单，将每一行转换为 `sink.ObjectRecord`，按 `sharedbucketing.Config` 计算桶号后组装成 `sink.Batch`，再交给下游 `sink.BatchCallback` 处理。\n\n入口函数是 `Run(ctx, cfg)`。生产路径会创建 StorageGW 客户端并调用 `runWithClient`；测试路径直接使用 `runWithClient(ctx, cfg, client)` 注入假的 `storageGWObjectClient`。\n\n## 整体执行流程\n\n```mermaid\nflowchart TD\n    A[\"Run\"] --> B[\"newStorageGWClient\"]\n    B --> C[\"runWithClient\"]\n    C --> D[\"读取器协程 processFile\"]\n    D --> E[\"stageCSVObjectLocally\"]\n    D --> F[\"newCSVReader / buildRowExtractor\"]\n    F --> G[\"objectFromRecord\"]\n    G --> H[\"objectsFromCSVRecord\"]\n    H --> I[\"按 StoreURI 分桶\"]\n    I --> J[\"DrainBatchesWithWorkers\"]\n    J --> K[\"sink.OnBatch / OnComplete\"]\n```\n\n`runWithClient` 负责调度：\n- `normalizeCSVURIs` 会去掉空字符串并排序，结果写入 `sink.Result.Files`。\n- `ReaderWorkers` 控制并发读取 CSV 文件，默认 `1`，最多不会超过文件数。\n- `SinkWorkers` 控制 `sourcecommon.DrainBatchesWithWorkers` 的并发消费数量，默认 `1`。\n- `batchCh` 连接读取阶段和 sink 阶段，容量为 `max(ReaderWorkers, SinkWorkers)`。\n- 任一文件读取失败或 sink 阶段失败时，会调用 `cancel()` 取消共享上下文。\n- 如果 `cfg.Sink` 实现了 `io.Closer`，`runWithClient` 会在退出前关闭它。\n- 如果 `cfg.Sink` 实现了 `sink.ResultCallback`，空文件列表和正常完成后都会调用 `OnComplete(ctx, result)`。\n\n最终 `Result.ProcessedURIs` 和 `Result.ProcessedBatches` 以 `DrainBatchesWithWorkers` 返回的 `BatchStats` 为准，而不是仅读取阶段本地统计。\n\n## 配置模型\n\n核心配置类型是 `Config`：\n\n- `CSVURIs`：TOS CSV 对象路径列表，格式由 `parseTOSObjectPath` 解析为 `bucket/key`。\n- `Bucket`：当 CSV 没有直接提供 `StoreURIColumn` 时，用它和 `KeyColumn` 拼出 `store_uri`。\n- `StoreURIColumn` / `KeyColumn`：对象 URI 来源。优先使用 `StoreURIColumn`；为空时必须提供 `KeyColumn`，并且 `Bucket` 不能为空。\n- `SizeColumn`、`ContentTypeColumn`、`StorageClassColumn`、`CreateTimestampColumn`、`CreateTimeStrColumn`：可选元数据列。\n- `CSVFormat.HasHeader`：为 `true` 时列配置按表头名称匹配；为 `false` 时列配置按从 `0` 开始的列下标解析。\n- `CSVFormat.Compression`：支持空字符串、`none` 和 `gzip`。\n- `TaskType`：空字符串表示按 CSV 原始对象输出；`manifest_expand` 会尝试展开媒体 manifest。\n- `BatchRows`：每个 batch 累积的 CSV 有效行数，默认 `1000`。\n- `Bucketing`：通过 `ComputeBucket(object.StoreURI)` 计算目标桶。\n- `Sink`：下游 batch 回调，类型别名为 `sink.BatchCallback`。\n- `Progress`：进度观察器，可接收文件、行数、桶等进度事件。\n\n## CSV 读取与列选择\n\n`newCSVReader` 使用 `bufio.NewReaderSize` 包一层 `1 MiB` 缓冲区，并创建标准库 `csv.Reader`：\n\n- `FieldsPerRecord = -1`：允许每行字段数不一致。\n- `ReuseRecord = true`：减少大 CSV 读取时的分配。\n- gzip 文件通过 `gzip.NewReader` 包装，关闭函数只关闭 gzip reader；底层文件由调用方关闭。\n\n`buildRowExtractor` 根据 `CSVFormat.HasHeader` 选择列解析方式：\n\n- 有表头时，先读取第一行 header，构造 `map[string]int`，再由 `selectorFromHeader` 按列名查找。\n- 无表头时，先读取第一条数据行作为 `firstRecord`，再由 `selectorFromIndex` 校验列下标范围，之后这条记录会被返回给 `processFile` 继续处理。\n- 未配置的列会得到 `csvColumnSelector{index: -1}`，读取值时返回空字符串。\n\n需要注意：`csvColumnSelector.required` 当前只被设置，没有在 `value` 或 `objectFromRecord` 中直接检查。实际必填约束主要由 `objectFromRecord` 对 `store_uri`、`key` 和 `bucket` 的逻辑保证。\n\n## 行到对象的转换\n\n`rowExtractor.objectFromRecord(record)` 负责把 CSV 行变成 `sink.ObjectRecord`：\n\n1. 先读取 `storeURI`。\n2. 如果 `storeURI` 为空，则读取 `key`，并用 `buildStoreURI(bucket, key)` 生成 `bucket/key`。\n3. `Size` 通过 `parseOptionalInt64` 解析；空值为 `0`。\n4. `CreateTimestamp` 通过 `parseCreateTimestamp` 解析：\n   - 优先使用数值时间戳列。\n   - 数值时间戳会通过 `normalizeUnixTimestampToSeconds` 归一化到秒，支持秒、毫秒、微秒、纳秒量级。\n   - 如果没有数值时间戳，则按 `time.RFC3339Nano` 解析字符串时间列。\n5. 直接保留 `StorageClass` 和 `ContentType` 字段原值。\n\n`isBlankRecord` 会跳过所有字段都为空字符串的记录。\n\n## 本地暂存与重试\n\nCSV 对象不会直接流式解析，而是先由 `stageCSVObjectLocally` 下载到本地临时文件。这样做让后续 gzip/CSV 读取只面对本地文件，也便于失败时统一重试。\n\n暂存流程：\n- `parseTOSObjectPath` 把 `bucket/key` 拆成 `parsedTOSObjectPath`。\n- `stageCSVObjectLocally` 最多尝试 `stageRetryMaxAttempts = 3` 次。\n- 每次通过 `client.GetObjectWithContext(ctx, bucket, key, nil)` 获取对象。\n- `stageObjectToLocalFile` 使用 `os.CreateTemp(resolveLocalTmpDir(ctx), tempFilePattern(key))` 创建临时文件。\n- `copyToFileWithContext` 用 `1 MiB` buffer 拷贝，同时在每轮读取前检查 `ctx.Done()`。\n- 暂存成功后返回 `stagedLocalFile`，调用方必须执行 `cleanup()` 删除临时文件。\n\n`resolveLocalTmpDir` 优先使用 Lambda 上下文里的 `TempDir`，其次使用 `TmpfsDir`，否则回退到 `/tmp`。重试间隔由 `sleepWithContext(ctx, 200*time.Millisecond)` 控制，取消上下文会立即中断等待。\n\n## Batch 生成与下游连接\n\n`processFile` 内部按 bucket 聚合对象：\n\n- 每条有效 CSV 行会先转成一个基础 `sink.ObjectRecord`。\n- `objectsFromCSVRecord` 可能返回一个或多个对象。\n- 每个对象用 `cfg.Bucketing.ComputeBucket(object.StoreURI)` 得到 bucket id。\n- 当前文件内累积到 `BatchRows` 行后调用 `flush()`。\n- 文件读完后会再 flush 一次剩余对象。\n\n每次 flush 生成的 `sink.Batch` 包含：\n- `FilePath`：当前 CSV 对象路径。\n- `ScannedRows`：本 batch 覆盖的有效 CSV 行数，不是字节数。\n- `ProcessedURIs`：本 batch 实际输出的对象数量。\n- `Buckets`：`map[int][]sink.ObjectRecord`，按 bucket id 分组。\n\n`sourcecommon.NewBatchEnvelope(batch)` 会把 batch 包装后送入 `batchCh`，再由 `sourcecommon.DrainBatchesWithWorkers` 调用下游 `OnBatch` 并汇总 `BatchStats`。\n\n## Manifest 展开模式\n\n`objectsFromCSVRecord(ctx, client, object, taskType)` 根据 `TaskType` 决定是否展开 manifest：\n\n- 空字符串：直接返回当前 `object`。\n- `TaskTypeManifestExpand`，即 `\"manifest_expand\"`：\n  - 先用 `manifest.FormatFromContentType(object.ContentType)` 判断内容类型是否支持展开。\n  - 不支持时返回 `ok=false`，该 CSV 行不会输出对象。\n  - 支持时先保留原始 manifest 对象。\n  - 再调用 `manifest.Expand(ctx, client, object.StoreURI, format)` 读取 manifest 内容并解析内部 URI。\n  - 展开失败时吞掉错误，仍返回原始 manifest 对象。\n  - 展开出的对象会设置 `StoreURI` 为子资源 URI，`OID` 为原 manifest 的 `StoreURI`，并继承 `CreateTimestamp`。\n  - 最后通过 `dedupeObjectsByStoreURI` 去重并过滤空 URI。\n\n这个调用链会进入 `internal/source/manifest`，由 `Expand` 创建 parser 和 index reader，并继续通过 StorageGW 读取 manifest 依赖的对象。\n\n## 进度与统计\n\n`ProgressObserver` 定义了四个事件：\n\n- `OnFilesResolved(total int)`：`runWithClient` 完成 CSV URI 归一化后调用。\n- `OnFileDone(filePath string, bytesRead int64)`：单个文件成功处理并 flush 后调用。当前传入的是 `stagedFile.objectSize`。\n- `OnRowsRead(rows int)` 和 `OnBucketsSeen(bucketIDs []int)`：本模块没有直接调用，但会把 `cfg.Progress` 传给 `DrainBatchesWithWorkers`，由 sink 阶段统一上报 batch 进度。\n\n文件级 `fileResult.rows` 统计的是有效 CSV 行数，`fileResult.uris` 统计的是分桶后的对象数；最终结果中的 URI 和 batch 数以 sink 阶段统计为准。\n\n## 错误处理边界\n\n常见错误来源包括：\n\n- CSV URI 为空或不是 `bucket/key` 格式：`parseTOSObjectPath` 返回错误。\n- StorageGW 客户端为空：`runWithClient` 返回 `storagegw client is nil`。\n- 暂存失败：`stageCSVObjectLocally` 会包装为 `failed after 3 attempts`。\n- 不支持的压缩格式：`newCSVReader` 返回 `unsupported csv compression`。\n- 表头缺失、列名不存在、列下标非法或越界：`buildRowExtractor` 返回错误。\n- 行数据缺少 `store_uri` 且无法通过 `bucket + key` 构造：`objectFromRecord` 返回错误。\n- `TaskType` 不是空字符串或 `manifest_expand`：`objectsFromCSVRecord` 返回错误。\n- 下游 sink 返回错误：`DrainBatchesWithWorkers` 的错误会取消上下文，并在文件阶段没有更早错误时作为最终错误返回。\n\nManifest 展开是一个有意放宽的边界：`manifest.Expand` 失败不会使 CSV 行失败，而是退回只输出原始 manifest 对象。\n\n## 贡献时的注意点\n\n修改读取路径时要同时关注三类测试入口：`runWithClient` 的端到端行为、`stageCSVObjectLocally` 的重试和临时文件清理、`newCSVReader` 的大文件读取特性。这个模块已经通过 `ReaderWorkers` 和 `SinkWorkers` 分离了文件读取并发与 sink 写入并发，新增逻辑应避免在 `processFile` 中引入共享可变状态。\n\n如果新增 CSV 字段，优先扩展 `Config`、`buildRowExtractor` 和 `rowExtractor.objectFromRecord` 这条链路；如果新增任务类型，集中扩展 `objectsFromCSVRecord`，并明确失败时是阻断整行还是退回原始对象。"};

(function() {
  var activePage = 'overview';

  document.addEventListener('DOMContentLoaded', function() {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
    renderMeta();
    renderNav();
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });
    if (location.hash && location.hash.length > 1) {
      activePage = decodeURIComponent(location.hash.slice(1));
    }
    navigateTo(activePage);
  });

  function renderMeta() {
    if (!META) return;
    var el = document.getElementById('meta-info');
    var parts = [];
    if (META.generatedAt) {
      parts.push(new Date(META.generatedAt).toLocaleDateString());
    }
    if (META.model) parts.push(META.model);
    if (META.fromCommit) parts.push(META.fromCommit.slice(0, 8));
    el.textContent = parts.join(' \u00b7 ');
  }

  function renderNav() {
    var container = document.getElementById('nav-tree');
    var html = '<div class="nav-section">';
    html += '<a class="nav-item overview" data-page="overview" href="#overview">Overview</a>';
    html += '</div>';
    if (TREE.length > 0) {
      html += '<div class="nav-group-label">Modules</div>';
      html += buildNavTree(TREE);
    }
    container.innerHTML = html;
    container.addEventListener('click', function(e) {
      var target = e.target;
      while (target && !target.dataset.page) { target = target.parentElement; }
      if (target && target.dataset.page) {
        e.preventDefault();
        navigateTo(target.dataset.page);
      }
    });
  }

  function buildNavTree(nodes) {
    var html = '';
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      html += '<div class="nav-section">';
      html += '<a class="nav-item" data-page="' + escH(node.slug) + '" href="#' + encodeURIComponent(node.slug) + '">' + escH(node.name) + '</a>';
      if (node.children && node.children.length > 0) {
        html += '<div class="nav-children">' + buildNavTree(node.children) + '</div>';
      }
      html += '</div>';
    }
    return html;
  }

  function escH(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function navigateTo(page) {
    activePage = page;
    location.hash = encodeURIComponent(page);

    var items = document.querySelectorAll('.nav-item');
    for (var i = 0; i < items.length; i++) {
      if (items[i].dataset.page === page) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }

    var contentEl = document.getElementById('content');
    var md = PAGES[page];

    if (!md) {
      contentEl.innerHTML = '<div class="empty-state"><h2>Page not found</h2><p>' + escH(page) + '.md does not exist.</p></div>';
      return;
    }

    contentEl.innerHTML = marked.parse(md);

    // Rewrite .md links to hash navigation
    var links = contentEl.querySelectorAll('a[href]');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href');
      if (href && href.endsWith('.md') && href.indexOf('://') === -1) {
        var slug = href.replace(/\.md$/, '');
        links[i].setAttribute('href', '#' + encodeURIComponent(slug));
        (function(s) {
          links[i].addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(s);
          });
        })(slug);
      }
    }

    // Convert mermaid code blocks into mermaid divs
    var mermaidBlocks = contentEl.querySelectorAll('pre code.language-mermaid');
    for (var i = 0; i < mermaidBlocks.length; i++) {
      var pre = mermaidBlocks[i].parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = mermaidBlocks[i].textContent;
      pre.parentNode.replaceChild(div, pre);
    }
    try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}

    window.scrollTo(0, 0);
    document.getElementById('sidebar').classList.remove('open');
  }
})();
